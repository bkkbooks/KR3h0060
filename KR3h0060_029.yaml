body:
  text: 珊瑚網卷二十九明汪砢玉撰名畫題跋五宋高宗御題李嵩服田圖每段重著色在絹素上長卷浸種云溪頭夜雨足門外春水生竹籃浸漪碧嘉榖抽新萌西疇將有事耒耜隨晨興隻雞登勾芒再拜新秋成耕云東臯一犂雨布榖初催耕緑野暗春曉烏犍苦肩頳我銜勸農字杖策東郊行永懷歷山下此事關聖情把耨云雨笠冒宿霧風蓑擁春寒破塊得甘霔齧塍浸微瀾泥深四蹄重日暮兩股酸謂彼牛後人著鞭無作難耖云脫袴下田中盎漿著塍尾巡行遍畦畛扶耖均泥滓遲遲春日斜稍稍樵歌起薄暮佩牛歸共浴前溪水碌碡云力田巧機事利器由心造翩翩轉圜樞衮衮鳴翠浪三春欲盡頭萬頃平如掌漸暄牛已喘長懷丙丞相布秧云舊榖發新頴梅黃雨生肥下田初播殖郤行手奮揮明朝望平疇緑針刺風漪審此一寸根行作合穗期淤蔭云殺草聞吳兒灑灰傳自祖田田皆沃壤泫泫流膏乳塍頭鳥啄泥谷口鳩喚雨敢望稼如雲工夫蓋如許拔秧云新秧初出水渺渺翠琰齊清晨且拔擢父子爭提攜既沐青滿握再櫛根無泥及時趂芒種散著畦東西插秧云晨雨麥秋潤午風槐夏涼溪南與溪北嘯歌插新秧拋擲不停手左右無亂行我將教秧馬代勞民莫忘一耘云時雨既已降良苖日懷新去草如去惡務令盡塵根泥蟠任犢鼻膝行生浪紋眷惟聖天子儻亦思鳥耘二耘云解衣日炙背戴笠汗濡首敢辭冒炎蒸但欲去稂莠壺漿與簞食停午來餉婦要兒知稼穡豈曰事攜幼三耘云農田亦甚劬三復事耘耔經年苦艱食喜見葉薿薿老農念一飽對此生饞水願天均雨暘滿野如雲委斯卷止此則耘後成闕典矣崇禎己卯夏豫至姑溪楊友翼真招飲山樓出書畫鑒賞其一卷為韓太沖田家風俗圖余諦審之故是李嵩服田圖後半而高宗御題與前卷無異其跋俱偽筆也因録諸詩於左以成全題云砢玉記於采石舟中灌溉云揠苖鄙宋人把甕慙闕何如銜烏鴉倒流竭池塘䆉稏舞翠浪蘧蒢蔭晝涼斜陽耿衰栁笑歌間女郎收刈云田家刈穫時腰鐮競倉卒霜濃手龜坼日永身罄折兒童行拾穗風色凌短褐歡呼荷擔歸望望屋中月登場云禾黍已登場稍覺農事優黃雲滿高架白水空西疇用此可卒嵗願言免防秋太平本無象村舍炊煙浮持穗云霜時天氣佳風徑木葉脫持穗及此時連枷聲亂發黃雞啄遺粒烏烏喜聒聒歸家抖塵埃夜窟燒榾柮簸揚云臨風細揚簸粳粃零風前傾㵼雨聲碎把玩玉粒圓短裙箕帚婦收拾亦已専豈圖較斗升未忘歌凶年礱云推挽人摩肩展轉石礪齒殷牀作春雷旋風落雲子有如布山川部婁勢相峙前時斗量珠滿眼俄有此春碓云娟娟月過墻􅉡􅉡風吹葉田家當此時村舂響相答行聞炊玉香會見流匙滑更須水轉輪地碓勞蹴踏籭云茅簷間杵臼竹屋細籭簸照人珠琲光奮臂風雨過計功初不淺飽食良自賀西鄰華屋兒醉飽正高卧入倉云天寒牛在牢嵗暮粟入庾田父有餘樂炙背卧簷廡却愁催賦租胥吏來旁午輸官王事了索飯兒呌怒李嵩錢塘江望潮圖在絹上細入小景神鰌怒決滄溟水浪沸波騰亘天起巨靈劈山山為開玉龍捲雪從東來腥風撼地坤輿剖長江萬鼓雷霆吼雄威欲吞吳越軍強弩三千皆縮手金隄既成事已非錢塘江上開皇畿雕闌玉檻照東海貪看秋潮忘黍離中原不復民易主百萬貔貅宿沙渚倚樓望潮了不來六帝同歸一丘土人間廢興何代無誰能耽樂思艱虞良工不解寫無逸丹青却作觀潮圖張仁近如心君不見十五湖上月十八江上潮君王連日醉伐鼓更吹簫簫聲忽如天上落大內臨江起飛閣繡户珠楹十二簾嬪娥嵗嵗觀潮樂潮水信可定日夕來朝宗人心獨不如而不思兩宫兩宫未雪恥屢下班師旨白馬素車神何不令天吳磔食大姦髓姦髓不可食國恥不可滌嗟爾江上潮雖雄亦何益潮無益於人看潮徒損神橫江鐵騎來三日飛埃塵厯數固有歸爾潮胡不仁致令鸞凰雛戚戚悲殘春春光浩無至華落隨暮雨回首幾秋風旌旗又如許又如許君勿悲古來在德不在險一杯之潮安足竒嘉陵楊基孟載李嵩堯民擊壤圖在絹上著色人物卷首𨽻書堯民擊壤四字中書舍人程洛書右堯民擊壤圖相傳韓滉本為南宋李嵩所摹嵩在畫院最善界畫者人謂其折算無遺今觀其人物各盡態度儼然太平氣象信乎非滉不能作非嵩不能摹也文徵明題後有豐道生跋篆書李唐作伯夷叔齊採薇圖宋高宗南渡創御前甲院萃天下精藝良工畫師者亦與焉院畫之名蓋始諸此自時厥後凡應奉待詔所作總目為院畫而李唐其首選也唐河陽人在宣靖間已著名入院後遂乃盡變前人之學而學焉世謂東都以上作者為高古良有以夫余總角時見鄉里七八十老人猶能道古語謂唐初至杭無所知者貨楮畫以自給日甚困有中使識其筆曰待詔作也唐因投謁中使奏聞而唐之畫杭人即貴之唐嘗有詩曰雲裏煙村雨裏灘看之如易作之難早知不入時人眼多買胭脂畫牡丹可槩見矣至正壬寅余獲此於沈恆氏愛其雖變於古而不逺乎古似去古詳而不弱於繁且意在針規表夷齊不臣於周者為南渡降臣發也嗚呼深哉昔米南宫嗜畫病世無真李成乃擬無李論以去其惑余他日見唐畫亦多率皆抱南宫之憾而此畫者所謂吾無間然者也因書顛末於左且以告夫來者云是嵗九月既望鄉貢進士錢塘宋杞授之記李唐虎溪三笑圖豫嘗遊匡山至虎溪未入東林寺首見一亭扁曰三笑因問其故謂晉逺師以陶淵明陸修靜且語且别握手相忘遂犯送客不過虎溪之戒乃相顧各掀髯而去今觀李唐此圖千載遺風具存人生不與路為仇二三子何哂之有紹興庚午季春陳夀題偶然行過溪橋正自不直一笑三人必有我師不笑不足為道人生一笑良難問此是同是别青山相與無言溪聲出廣長舌山村老拙仇逺敬書時年七十一元亮讚孔業修靜研聃玄逺公學翟曇髙居著幽禪人異道豈殊萬散一固全目擊輒有得參會各辴然胡為老緇褐蹈舞喜欲顛謾道遺其身襟袖猶褊􅝆彼酣適酒趣尚不醒者傳族史浪自苦窺管那知天永康胡長孺題高宗題李唐畫賜王都提舉并賜長壽酒恩霑長夀酒歸遺同心人滿酌共君醉一杯千萬春李唐秋江圖高宗御題秋江吞天雲拍水濤借西風扶不起斷雲分雨入江村回首龍沙幾千里淡庵老筆搖江聲髣佛阿唐慘淡情千秋萬古青山恨不見歸舟一葉橫淡庵劉靜修宋內院題馬逺四景花前靜榻間眠處竹下明窗獨出時著甚語言名定泰林間自有翠禽知一霎催花細雨回集芳堂下錦千堆浪紅狂紫渾爭發不待商量細細開初晴月向松間出盛暑風從水面來已比他人多數倍況能時復舉樽罍同雲漠漠雪霏霏安樂園中賞玩時酒放半醺簾半捲此情無使外入知馬逺三教圖絲不如竹竹不如肉一等是聲各分題目黃鶯啼不足流水和不足孔釋老聨兮拗直作曲咄西山隱人懷玉嘗聞諸怪怪道人云往年題三聖卷有曰五千言道德之祖六百函慧命之書而況於二百四十二年之春秋如天之至公而無私乎今此卷因書所記如右李皓江文忠公贊馬逺三教圖有坐地立地笑倒在地之語世傳以為嗢噱今觀此畫瞿曇氏前行曳踵却顧而吾夫子與柱下史比肩趍其後若猶有逺餘意惜世無江公為作贊也泰定元年八月二十又六日金華黃溍書昔在姬周時飬得三個兒不論上中下各各弄兒嬉胡為後世人彼此互瑕疵猶如龍舌頭三岐而一岐我不分彼我只作如是辭一峰藜羮不糝何足道麥馬充腸也即休畢竟有身皆是患寧須六臂與三頭吳中石佛覺恩書釋迦老來也仲尼老聃只得向背後義手若為此説有褒貶有輕重不惟不識豫言而亦不識三教聖人之道也矣幻住明本人謂三教一家以其迹異而心則同也何謂聖人貴名教老莊明自然佛居一方以空寂化流天下蓋求其善善之心本同也但常人不能同其同惟能異其異故瞻前忽後無有高下後身而先之論興焉夫道一而一之三之又不於其心於其迹斯所以戈矛填膺不可闢也不可一也吁孰能一之栖霞山人白珽近年吳興趙公子昂常自稱三教弟子惜此公已去世不及題此卷虞集書虞集伯生品列鼎峙各爭意氣誰識先師道本一致所生之俗儻同則所設之教豈異是老君未始不為釋迦釋迦未始不為夫子也釣臺鄭國題儒釋老那無二道了知一法印森羅回頭不用重傾倒明月清風漏泄多大德己亥清明前雙峨庸叟時中柱史惡周末之繁文則有剖斗折衡之意梵王子惡夫溺於富貴者故有割恩獨清之心要之皆有激而然至司寇則不然慮其亡也則曰我愛其禮懼其瀆也則曰禮云禮云玉帛云乎哉今觀翛翛然遺世獨立與夫垂拱者亦異矣夫至正癸卯嵗五月望日三山林世濟謹書馬逺作四皓奕棋圖橫卷在宋楮上後款臣馬逺落落四皓翁山林飬其靜羞為漢家臣苦辟秦苛政商顔高峩峩坐待天下定歘起佐儲皇上前啓名姓堪憐羽翼成難將口舌爭無語及扶蘇空歌紫芝咏豫閲陳留志園公姓庾字宣明居園中因以為號夏黃公姓崔名廣隱居夏里號夏黃公甪里先生姓周名術或曰灞上先生而亡其綺里季漫題五言一首并書商皓姓名於卷尾博雅之士為我補綺里名則幸也庚戌夏四月既望雲間米芾書商山嵬嵬上有紫芝採芝可療飢何獨西山薇西伯養老去古逺而獨夫殺士吾將疇依卯金之子海內威羅絡齮齕將奚為平生一識下邳兒肯隨漢邸同兒戲綺里綺里無人知抱遺老人會稽楊維禎在雲間草玄閣書白石蒼松嵗月間紅塵飛不到青山誤因一著爭先子老使虛名滿世間於越江漸天下蒼生苦秦虐高人多與許巢期當時不墮留侯計豈負山中詠紫芝敬亭謝俊不挾狙擊博浪鎚不泛采藥蓬萊舸儒坑無名免大索商顔逺遁我自我采薇亦可采紫芝芒碭小兒不敢羈秦亡漢興不三代約法三章民庶幾巖栖四皓喜亦譏言不出口笑且嬉九重一日禍戚姬黃石弟子有捷機假爾羽翼隨扶危後來安劉亦已遲先聲後實真絶竒黃鵠之歌一時足以慰晨雌老人不來天下之本幾乎墮商顔之想千載令人悲前楊有清詩後楊有樂府歌辭嗟余末學安敢捉筆為吳興錢鼎吕政之亢既避劉季之嫚不歸夫何應子房之策安盈之嗣於前而不知止雉鳴於後豈其心在商山之碁而無意於興亡之事也耶桐梓趙驥溪翁裹圖舟雨泊過我徵詩詠商雒時危每憶藍田山白首長吟向寥廓秦中四老是耶非風塵與歸如可作史稱爾皓逸姓名采芝曽歌山漠漠巴園橘叟何誕幻自云不減商山樂象戲寧為墨白棋畫手無稽傳乃錯老夫逢人苦好奕見畫應疑身有托商隱巴仙竟兩忘姑遂平生一丘壑賦詩獨也愧凡近前楊後楊學能博卷圖揖君往放舟九峰無雲有鳴鶴青溪翁載雨相過出此卷要豫同賦豫不能詩雖竭駑力豈能追逸足之塵哉愧亦甚矣前楊後楊浦城會稽二先生云隴右邾經識觀夢道人四先生天民也天生先生於秦而不使先生用於秦天老先生於漢而不使先生死於漢焚書坑儒非秦之暴也天所以逺先生之去也卑辭厚禮非漢之恭也天所以挽先生之出也吾故曰四先生天民也右胡牧仲先生之所作先師楊鐵崖嘗三誦之愛其文字簡而意趣高耳虛白聞而善之俾豫書諸卷中云陳文東識已剖巴園橘猶歌商嶺芝避秦非避漢一出繫安危曲江錢惟善白髮商山老清風扇八垠能安漢基業賴此秦遺民好爵非愛慕長松相主賓亦有種桃者武陵溪水濱追和楊别駕韻辛亥三月倪瓚千年憐四皓不悟世如棋既脫秦坑慘那扶漢鼎危冥鴻心已屈牝雉禍難追何似商巗下長歌茹紫芝河南程煜嬴氏肆其暴黔首無寧居五嶺已適戍驪山方送徒如何商巗中遺此四老夫紫芝當餱糧青松為屋廬悠悠木石間其樂固有餘薑叟在渭濱伯夷居海隅荷蓧有丈人耦耕見長沮夫子復此舉異世自同符我願從之遊須逺不可踰撫卷長太息懷賢正躊躇海叟袁凱安劉無上策來倩避秦人駭俗衣冠古扶顛羽翼新寵加龍目送怨入翠眉顰莫擬巴園橘飛騰别有神張濬四翁羽翼漫從遊不識安劉是滅劉解使初心回乃主寧知善計左留侯紫芝分合商山隱黃鵠歌憐漢室憂千載展圖增慷慨西風一曲感庭秋谷陽陳文東燦爛煙霞草木森采芝樂道自安心人間事業休相迫一局棋中造化深洛陽高萬杰書長安宫中易樹子函谷扶蘇新賜死良平不言殷鑒逺園綺乃作商山起漢之十年甲辰嵗太子卑辭將厚幣明年乙巳上伐布後年丙午方入侍龎眉此日驚龍顏紅粉明朝作人彘至今厭聽黃鵠歌望思臺前磷光紫芒碭聖人亦衰矣妻子之間乃如是昌乎通耶直如矢鑿鑿忠言在青史優旃之説誠荒唐孰謂考亭欺洓水紛紛俗儒不明理安得巨擘提其耳長春道人琴罷彈琳宫夷猶狎清歡放歌不知白日暮再展此圖燈下看恍然坐我夀隱上洪濤出海生波瀾不知何處有此山一重一崦開巗巒桃花萬樹迷逺洞竹皮三寸裁為冠鹿門無人共往還政好結屋於其間青精之米充渴飰赤脈之石為棋盤甪里綺里東西居黃公時來坐席端手分黑白見嬴項一子忽入咸陽關眼中世事亦如是底用感作悲人寰松子自落窗風寒牀頭酒熟巴橘酸陶然一醉天地寬老死不復登長安虛白師出是圖索題品敢獻笑大方之家惶愧惶愧范公亮塞白范寅仲氏馬逺山居小景何處人家水繞門白沙翠竹自成村老翁最得升平樂韋曲看花引子孫釣鰲叟買斷雲山隔竹溪此中高築釣魚磯候門稚子輕相笑齷齪惟甘老布衣穮蓘生百折泉源逺千莖竹樹幽飛來何處雁清影落芳洲立庵獨民朱文印水抱雲根淨林含雨氣涼徑鴻飛杳渺秋思滿瀟湘秋鍾湍激石齒齒驚飛雙睡鳬平蕪秋色裏對景獨思鱸鄭閎秋淨水逾碧竹多山更雄瀟湘無限景都在一雙鴻沈德全今夕何夕興無涯來訪山中宰相家艇子衝寒撑一個還能煉雪為烹茶盧彭祖題馬逺雪景萬里江天莫氷花散朔風捲簾看不足呼酒坐孤篷沈文矩鳥絶千山暗六花地靈珉布日韜霞溪居有客圍爐坐石鼎須烹鳳髓茶徐汝成地白風寒雪不開枯梢屋外壓將摧罏煨榾柮開門卧應沒情人乘興來蕭規雪埋門徑失壓樹白差差知己年來少無人訪戴逵武陵顧敬暮雲天一色飛雪滿江干野艇歸來晚推篷不厭看沈中大雪天地閉空江行旅稀維舟且未出高卧掩柴扉立庵又印文稱獨民馬待詔鶴荒山水圖原題評畫者謂逺畫多剩水殘山不過南渡偏安風景耳又世稱馬一角乃此獨大幅淋漓滿志瀑布從天而下洄旋曲澗波濤洶湧水紋作孫位筆法亭臺竹樹間幽人掀髯吟眺山半立鶴昻然者所云鶴荒也崇禎丁丑為黃越石持來余以仇英南極呈祥圖及宋板國策一部易之汪玉砢識馬逺畫鍾馗月下彈琴古柏蒼鬱樹身曲如几馗老坐其上撫琴一鬼自後聽之月影朦朧景界幽怪而衣摺木紋俱作𨽻篆法筆筆竒古可異雖相沿為馬逺或超出其上亦未可知卯上玉水汪子題高宗題馬麟亭臺圖卷後院深沉景物幽竒花名卉弄春柔翠華經嵗無遊幸多少亭臺廢不修景分逺近水邊橋際山坡多紅梅梅中一亭亭後積草如栁臺前有池四俱圭可若田應有所本也砢玉元人題馬麟畫卷為蝶戲長春圖美人撲蝶圖宸翰分明轉化機宫花委露蝶參差江南動直皆春意點染誰言在一枝淡妝小步出椒房回首薰風戲蝶雙香汗未同花蕊露不須羅扇重揮揚會稽朱瑾蛺蝶復蛺蝶戀花還戀人戀花顔色似人好戀人那及花長春回頭嵗月改漫與蝶相親新裁紈扇尚在手飛裾輕盈不動塵當時寫姿妙絶品見花想容尤逼真若憑飛夢繞蒼梧可擬湘靈非洛神於戲往事空嘆息粉墨浪傳人不識馬賁以畫為宣和待詔至興祖亦以畫為紹興待詔其二子公顯世榮又皆待詔於畫院世榮生逵與逺畫山水人物花果禽鳥精妙稱為絶品逺待詔光寧兩朝院中稱為獨步麟乃逺之子也馬氏之畫相傳數世其默契神會而若天成者豈他可及哉然麟不逮父而逺愛之多以己畫得意者題作馬麟故麟聲亦張得為祗候此幅麟自為者也若美人圖氣韻間逸則若賈師古之筆師古學伯時紹興畫院祗候宋學士謂二畫舊常在宫掖其信然矣廬山陳繼蝶戲長春圖乃院人馬逺子名麟者所畫美人撲蝶圖筆勢圓徑意非李伯時不能到皆絶品也舊時曽在宫掖故其間有上兄永陽郡王及楊妹子之字題者專指祐陵以為言恐未然也翰林學士宋濂題劉夫人作太真醉挹花露圖太真在當時惟宿酒未醒曉起傍花枝吸露此景最堪摹寫是象丰致灧灧眉目楚楚肌色如桃花想玉環紅汗浥也把菊盈盈掩絳唇固藉以解醒乎信出名筆哉第舊有奉華堂印知為建炎掌內翰劉夫人所繪惜裝演時為庸手剪去然暗中模索要自宋人揮染萬厯丁未重九日醉里汪砢玉題書宋中興四將畫像後右宋中興四將世稱張韓劉嶽自王公大人士下至牛童馬走妾婦裨官之口無不稱道其武勇忠義君子恥沒世而無聞焉寧不思景仰乎然以其生平大節校之則未免使人有慕有憾自建炎初至紹興十二年其戰陳之勇英謀偉略功冠三軍及其晚節末路先是劉武僖罷兵為萬夀觀使實紹興十二年六月也至八月嶽鄂王亦為萬夀觀使韓蘄王尋亦罷為醴泉觀使繼而鄂王沒至十二年十一月張循王始以罪免充醴泉觀使嗚呼建炎紹興之際諸將竭忠與金人力戰十有餘年之間幾復大業卒為秦檜所困使紹興二年秦檜既免榜其罪於朝堂示不復用自是而屏諸逺方諸將戮力恢復可圖矣繼而再用檜終以誤國悲夫然世稱四將齊名不復論其優劣得無憾焉今以信史考之蘄王性戅直勇敢忠義事關廟社必流涕極言嗜義輕財與士卒同甘苦深以和議為不然抗疏極言檜誤國之罪既罷遂杜門以終鄂王事親孝家無姬侍吳玠嘗飾名姝遺之乃辭曰主上宵旴豈大將安樂時耶却而不受帝欲為之營第辭曰金猶未滅何以家為或問天下何時太平答曰文臣不愛錢武臣不惜死天下太平矣循王常問其用兵之術答曰知信仁勇嚴缺一不可其忠憤激烈論議持正卒以得禍循王初贊檜成和議約盡罷諸將獨以兵權歸己及諸將己罷和議己定而居位無求去意及江邈有言乃求去吁循王握兵最早屢立戰功惜乎附檜殺鄂王為世所鄙薄矣劉公在諸將為先進然而律身不嚴馭軍無法不能事方之韓嶽不逮逺矣嗚呼世稱四將齊名而優劣若此不容不為之辨論今指揮中齋蔡公得其畫像慕其忠武俾貞木識於右方貞木窮鄉晚進安敢輕議謹考事迹輒疏於後中齋好賢禮士博覽古今其得是像宜寶藏之洪武庚午八月秋日包山俞貞木敬書珊瑚網卷二十九
