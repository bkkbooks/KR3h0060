body:
  text: 珊瑚網卷四十五明汪砢玉撰名畫題跋二十一磐礴漫興吾家凝霞閣向藏當代諸名畫為册約半千可供嘉客纍日之玩自余為東西南北之人先子登太白年而仙去歸來處悶天枯海中僅存此彚册猶足侈夜郎王也因綴册首曰不薄今人愛古人景陵九鷥圖著色縑素上宣德年製欵在畫上中央有御府圖書又蘆雁圖著色縑素上宣德年製同前清賞録云我朝宣廟憲廟孝廟皆善畫宸章輝煥皆在能妙之間特設仁智殿以處畫士寶鑑云章皇帝聖能天縱一出自然若化工之于萬物因物賦形不待矯揉而各遂生成也敬觀二圖柳絲鳥毣細過于髮一種生動之致又居然寫意家神逸品若前所云云者臣砢玉識王孟端竹石絹上邊景昭花果翎毛絹上王西園扁舟漁笛又蘆中丈人又園景又負薪行吟圖又墨竹四幅俱紙上各有對板詩如左問吾何處是吾家家在山中路不賖洞口一方青玉案門前萬樹碧桃花吹笙跨鶴逰塵海煮石餐霞度嵗華昨夜蘂珠宫燕罷滿天碧月淨無瑕仙興苑花淨盡緑隂長池上清筵為客張滿樹苦無彌月好殘枝猶有一分香耳邊歌板將春恨掌上瓊舟借醉狂説與東風還定約明年春早放輕航恨花落春歸晚飲故人臺榭行李入城經兩月樹頭杏子已全黃閙中每恨光隂速天下其唯朝市忙今日尊前僛舞袖明朝海上放歸航年將半百身無恙去去何愁道路長己未嵗遊金臺將歸留諸友城中寸土不可得新拓二畝真良謀淨水荷池堪洗研清風柳岸可梳頭枇杷摘盡金籯滿􅌬醁新開緑蟻浮常笑機雲無伎倆何須苦向洛陽遊丙辰嵗拓園地二畝草堂住近白鷗汀野老孤笻試一登舊事苦談終未巳主人不卧坐能聽燈殘紫熖金蟲細檻落清風玉麈輕知是别來曽夢筆江淹才思十分增擬過友人朱汝執新莊此山逈與他山别丹崖翠壁皆下風天地有意存本素東西有物能爭雄峰頭玉井詩句裏江上香爐圖畫中人物兩般並玉立聲價萬古誰終窮嵗己未遊金臺題考功喬希尤白巖卷吾家小園五畝強種菊開花鬬晚芳不信生無看花福年年客裏過重陽辛酉遊金陵居太學中年餘復上北都勞勞風塵中自春及冬無時遑息舟中感懷戲書一飛司訓王一鵬字九萬號西園詩宗元白淡雅成一家言人復瀟灑出塵有晉永和風致工書工畫每為人題署尾必曰西園故西園之名特著有王西園志見松郡乘一云國初人也此對板詩雖非題畫而韻語書法俱佳悉存之玉水記孫都癡墨蝦絹上春波浮藻葉晴日戲蝦鬚題畫又郭索圗絹上一甲雄天下橫行遍海涯題畫孫隆號都癡毗陵人開國忠愍侯孫生而頴敏有仙人風度寫禽魚草蟲自成一家號沒骨圖薑立綱畫并題絹上竹風敲韻來書案花月篩香入硯池沈石田山水二板俱無題有印記一倣黃子久筆又寫生二板俱紙上一作帶花絲瓜一作豆莢吳元博題畫無畫欵意是劉完菴天涯偏感物華新燈下間吟意轉親風雨滿城春寂寂不知誰是畫中人匏菴吳寬姚雲東墨梅紙上曉起輕寒細雨吹春回一月半開梅重門未啓金魚鑰風送馬聲何處來二月曉寒作贈橘奕綬文衡山秋塘釣艘絹上斷葦依塘秋滿川晚晴倚樹一汀煙青山最是供詩料忽共斜陽落釣船徴眀又徴仲倣巨然山水絹上水墨細入無欵唐六如寫生絹挂幅截字作對板入册草率杯盤試踏青虎丘山上可中亭日斜客散僧催掃藕節蓮房滿石庭吳趨唐寅與飲五臺作此戲墨仇實父柳浪鷗羣絹素極工緻得之髙明水後程季白欲配所藏仇册豫不允鷗羣雲水伴柳浪繫輕舠飛瀑青山處滿肩書册挑陳白陽著色牡丹又著色蛺蝶花俱紙上黃祿之倣趙松雪剔青地著色萱花後三幅俱全葉展青鸞尾花開鵠嘴黃小庭多樹此相對使憂忘又芙蓉碧江煙水渺無津溪畔芙蓉晚更新照水亭亭還自愛相看渾似浣紗人穀祥又山茶葉舒犀甲厚花放鶴頭丹嵗暮饒氷雪朱顔不改觀又丹桂秋風昨夜始吹開萬斛天香金粟堆兩駕仙郎豈凡手月中親奪一枝來酉室王穀祥陸叔平山水四幅金山北固劍丘垂虹四景又水墨折枝水仙梅花俱紙上朱青溪寫天池石壁名朗文衡山髙足尤鳯邱著色山水人物六板尤求為仇英之亞俱縑素斗方舜耕厯山版築求賢魯義姑浣紗女抱石曹孟德觀黃絹幼婦碑宋藝祖雪夜訪趙相又臨勾龍爽避秦女又臨唐女冠李季蘭真錢磬室攝山圖戊寅五月七日寫贈慧空師錢榖攝山吾未到羡爾獨能留畫已錢君得詩將王子求風煙原厯厯雲水自悠悠千里誠難别新吟漫爾留萬厯戊寅仲夏八日送慧空上人往攝山茂苑文嘉文休承前赤壁圖并書賦在紙上陳沱江倣大癡山水又子正花草八幅與文夀承題朱文石太室雪圖夷門侯懋功山水二幅項子京水墨蕉石對板為女郎徐安生泥金竹枝葉如斜架紙心似倒抽書此聮殆與蕉寫容非非而是是是而非吾不知其非亦不知其是是非無定書畫足徴項元汴國朝名繪大册此册前十五幀為用嘉石田雲東白陽諸筆乃余中表家物也余弱冠讀書白苧嘗假以自隨逮余江州歸詢之不可復得蓋三十年矣今得再觀于玉水自韻齋如逢故人其愈快可知也竹懶李日華杜東原山水過板紙上杜柳居人物二幅俱過板有小欵止一堇字杜古狂堇寫陶靖節白樂天二像靖節曵杖五柳之下樂天逍遙步履似對永豐坊垂桞皆衣冠雍雅神韻靜深望而知其為有道名公也君實姚雲東寫竹石松葵烏鳥雞冠荔枝枇杷諸幅石不可移移則匪貞竹不可撓撓則匪清清如夷齊貞比綺甪維竹維石乃金乃玉公綬寫并贊秋來未到闔閭城水竹村深逺夢生有客問豫將册去淡煙踈雨正關情公綬因張用節茂才之便附其同宗士行畫册以還又因竹之懈兩以致想也戊辰八月題前為棟為梁匪松之福惟曲而夀乃松之貞是以君子欲逃其名公綬寫松并贊秦有爵封斯為爾福嵗有寒虐乃見爾貞維福維貞作詩美名浦正題前畫松昔烏巢我樹母在喜烏來無母今何恃惟增返哺哀綬書于三牌之下戊戌五月烏有孝子情母胡去而來舊巢栖未穩啼向月中哀浦正題前古樹栖烏葵心一寸赤巋然獨傾陽其中含盛美無怪炫黃裳最爾凡卉木雜沓競芬芳請觀高士類能幾登忠良猗與此葵花合上君子堂成化戊戌五月八日公綬贊自題著色秋葵綘幘曽聞報曉籌曈曈日色映龍樓我家茒屋踈籬下搖落西風玉樹秋蓮花峰上間人題陳氏有德未能生擘閩南荔説著紅塵也動愁雨後紫綿垂顆顆不知宜夏却宜秋聞閩荔食至七月後方已故有宜秋之言雲東老仙徒惆悵南望為此品寫小像耳一樹酣黃熟爛金不須鈴索護山禽行厨載酒西園去盧橘休誇貢上林東吳陳天定題丙申夏季是册雲東而下即石田白陽諸畫九疑翁所云十五幀也後為徴仲伯虎諸筆又幾十五幀欵題未録其墨林梅花幅有竹懶水邊林下跋已刻集中矣余時得周服卿花鳥六板足掩宋人色韻因附入之天啓丙寅秋余在都門聞先子以此册共諸玩好質于珂雪姻家內有白玉大士高尺餘兩玉侍高半之琢緑松為岩座乃宋做最精工者太僕公嘗云玉像係馮具區先生所珍供焉逮余東歸費繁竟不及取贖殊軫念也然猶幸不落生面人及俗漢手樂卿筆記藝苑間情古秀州蔣藻書玄亭寂莫浣花多暇清白僅此傳家風雅藉斯情洽得先輩為命名合時賢而攬勝亦遊藝之一適也玉題姚雲東畫幀石壁空青𢃄斷雲碧蘿懸樹篆蛇紋人家盡向鍾南住誰肯林泉覓隱君許生民式頃自都下歸謁豫于雲東仙館求畫且請贅數語漫爾寫此以贈己酉十月大雲姚公綬製蔣文藻竹枝對板行書後詩門掩青山少見人梅花霜鶴自為鄰祇今瑪瑙坡前月唯映巢居閣下塵文藻與姚丹丘同隱大雲執師資之禮書畫步趨丹邱為酷肖杜青霞醉仙圖又陶靖節先生像又倪幻霞遺照俱臞男筆沈石田寫雞冠花水墨寫意秋叢軋露應曉欲鳴沈周文徴仲漁舟圖絹上重著色罷釣歸來不繫船江村月落正堪眠縱然一夜風吹去只在蘆花淺水邊徴眀書宋箋上陸叔平著色芙蓉紙小單條江水秋瀰溸瀠洄玉有文芙蓉向風立花影對繽紛唐六如雲關雪棧陳括倣徐熙滑法菜花圖甲子新夏客有餽櫻桃者兼遺一雀名曰櫻桃雀遂圖之以紀興云陳桂居士貞龍湫高隱圖欵云為儲封夏先生製居節文休承寫意橫幅揮毫試拂古龍尾醒酒更烹新鳯團文嘉千秋釣舸邀眀月玄宰畫陳眉公倣老米雲山對板為文夀承書山靜日長項又新竹枝小單條欵云德新漫興有題偶得殘楮即以硯頭餘墨作兩枝用墨如用金矣馬湘君蘭花竹石縑素水墨戊寅菊月晦日玄子為丈茂契君寫馬湘薛素君梅花蛺蝶紙斗方不愁春信斷為有夢魂來素素又水仙金箋橫披幽姿間靜倚新妝暗裏時聞度異香不是來從神女步何因涉水濕羅裳其昌又蘭石同前有董太史題香風從東來幽香忽西去欲以攜所思所思在何處趙內文叔寫生二板徐女郎安生墨竹二板繡水平陽氏墨花閣鑒藏沈石田自題畫二幀以下另册白日偏於靜處長軒窗虛淨覺風涼兩人清話當何事水志山經細較量平頭艇子鏡中過鬢腳蕭騷影細波碧水丹山儘堪飽惠州強飯笑東坡沈周啓南自題畫菜册東園昨夜雨肥勝大官羊黨氏銷金帳不知滋味長文徴仲題墨竹册息齋似而不逸松雪逸而不似陳白陽自題水墨百合花册玉瓣開和璞香鬚泛紫檀王酉室自題蘭菊二册緑葉轉光風紫英泛清馥不受當門鉏托根在空谷翠竹迎風舞黃花浥露開東籬剛命賞送酒白衣來陸包山自題畫繡毬菊花葉翠羅為幄花香玉作毬翩翩塵不染更喜態風流晚嵗事老農間來兼學圃不讀邵平書親傳陶令譜彭隆池題陸叔平畫水仙海棠邊庭桞暗金微雪御苑花開玉壘春蝴蝶飛來疑入夢凌波還見洛川神文五峰自題畫梅後一首為夀承題暗裏漫焚香雪中本無色隴頭音信稀祗有鄰家笛院落沈沈夜色微月華偏與淨妝宜難明緑樹枝頭雪且續梅花夢裏詩文彭文休承自題水仙册後一首題墨竹雨歇風清一棹橫微吟自愛晚潮平夕陽西下山千疊木落空江生逺情古木挺虬幹叢篁低碧枝湘江何許夢石上雨來時文肇祉題桃源圖咫尺桃源路更深神仙從此隔溪雲笑他秦帝空求術誰信塵凡已自分路入桃源深更深溪中流水洞中雲巖居别有堯天在只許漁郎占席分申時行題桃花何事隔人羣一半青山一半雲世上成蹊都浪説仙凡回首路頭分張鳯翼和董元宰題仙山讀書圖緑溪青嶂是秦餘靈境今歸藏史居素友詎迷初得路頑仙寧讀未焚書其昌倣黃子久筆意周公瑕題宋石門雪景册江上雲深合深深埋逺村曽無塵迹到止許釣舟橫張伯起題孫華林招隱圖幽篁鳴春風村深愜招隱振衣停蘭橈煙波逺山暝張方洲題畫册山共人間水共清滿林松籟助吟聲十年中外無塵騎何似斜陽䇿杖行間間三徑少行客寂寂中林有落花人世過于橋外隔松蘿隱映即仙家袁尊尼王伯穀題周少谷玉簪花展葉類衣羅含葩似玉簇佳人明月中誤將敲砌竹王延陵題畫水仙册出門大江橫銀濤數千頃仙子御輕飈環珮搖虛影中宵月無光天池氷壺淨輕盈何所之飛夢西湖冷張湖山題畫梅竹又玫瑰花各一絶梅花吹欲白竹影拂雲碧翛然映長林為君鬬竒色春腴紅玉軟香透紫茸溫材美名應稱終承雨露恩徴眀題畫竹二首修幹挺寒節踈隂生嫩涼溪南一尺雨髣佛見瀟湘日暮黃陵廟春深片雨晴怪來青鳯尾冉冉過牆生青箱藴玉朗哉顧願題其對板俱南中書家以非題畫不録王道父為酉室吏部從孫年十四失怙恃故并失其故家青氊遂逰休承先生門下見休承詩畫則嘖嘖稱賞不已引伸觸類于此道中恍然若有得也亡何為廣文從祖攜至溧水因入秣陵時可弱冠里中親友相過道父遂遍徴其書畫云周幾王祿之寫水墨牡丹又白毬有穀祥欵各題一絶香凝金掌露妝艷玉樓春若此名花色沉香亭北人朵朵冰鏤就團團玉簇成水晶簾影外相映太分眀文嘉山水己卯春日似道甫老契談志伊水墨花石號學山無錫人孫雪居著色蠟梅朱之蕃杉禽癸丑新涼為道行兄寫王舜之金蓮法相圖為晴峰先生寫于南都玄覽閣淳之蘭花周之冕石榴朱之士水仙蘭花呂芝人物周天球墨蘭金士龍水仙梅花馮曉人物陸儀吉菊花王中立秋海棠戚仲升蘆雁唐士良梅花顧時啓佛手柑金如初蘆雁王異荔枝吳時培花鳥蔣羽化鬬雞吳彬柑鳥陳士花鳥金爵樹石羣鷗王玄孫世良俱桃源圖孫有知雪景山水為古吳孫瑋孫枝蔣乾錢貢吳習朱竺張復陳祼袁玄三彬陶冶戴纓文室袁源浦鯨姚貞陳煥吳冠吳稚浦融戴雲姚俊李紹箕李士逹杜冀龍朱胤逹文從先許九枝湯時倬姚元治朱胤俊魏之璜戚伯堅盛茂燁王祖槐鄒之孟杜玄禮袁麗明謝道齡陸士仁文從昌吳門王道甫乃選部祿之公仲孫鄖樵保御之仲子為張幼于中表一云道甫即顧靜甫稱道行其所徴書畫俱隆萬間人共百四十家亦一時之盛也樂卿記右丞詩意張鳯翼書王中允之詩詩中有畫吳下諸君之畫畫中有詩虧父攜以自隨如日坐少文之室聽衆山皆響也萬厯己亥二月既望王稚登書行到水窮處坐看雲起時丙申春張復水穿盤石透藤繫古松生錢序山臨青塞斷江向白雲中陸士仁大壑隨階轉羣山入户登吳習蘇臺山人白雲回望合青靄入看無孫枝叔逹隔牖風驚竹開門雪滿山蔣乾虹橋時倚簷前樹逺看原上村錢貢滄洲江流天地外山色有無中強存仁緑豔開且靜紅衣淺復深周之冕服卿梵宇聊憑視王城遂渺然微密澗芳襲人衣山月映石壁文從昌登高萬井出眺逈二流明沈咸寒塘映衰草髙館落踈桐長洲沈繼祖丁酉九月既望偃卧盤石上翻濤沃微躬句吳真語吳一峯獨立何褵褷銜魚古槎上長洲張存仁厚卿山中一夜雨樹杪百重泉朱竺獨樹臨關門黃河向天外劉原起起之青臯麗已盡緑樹鬱如浮汝南周之冕丙申春日興闌啼鳥換坐久落花多郁喬枝丙申春空山新雨後天氣晚來秋張元舉乙未四月八日昔日嗜白樂天詩見之而喜有見之而哭有為之刻肌要皆嗜好然也吾友蔡虧父嗜王右丞詩詠歌之不足付之丹青狀貌幾于刻肌矣咫尺之內便覺萬里為遙然右丞最深于禪理而虧父方外之懷適與相契所謂身外身義中義則當得之象外可也可一居士張敉獻翼幼子摩詰句圖有檄徴得百餘幀大約人各二題乃並存者無幾姑置者過半而續至未已也余嘗得蔡虧父所彚畫册俱寫右丞詩意以摩詰詩中有畫也乃吳下諸先哲則畫中有詩矣因憶都中數年每見吾禾諸君子點染之好竊謂東吳一帶不能專􅍇余不揣敢遍求巨筆一鬯輞川遺韻絶勝嗜白香山者刻句盈肌乎藉是以開就李崇禎畫社庶令梅道人姚侍御諸公不至久落寞也勿靳吮毫而夷鄙人之請幸甚社走汪砢玉拜徴時戊辰改元之秋藉草飯松屑焚香看道書竹懶李日華秋山一何淨蒼翠臨寒城叔祥姚士麟清夜何悠悠叩舷明月中嘯海朱瑛逺樹蔽行人長天隱秋寒康侯戴晉戊辰十月靜言深溪裏長嘯髙山頭珂雪李肇亨空山新雨後天氣晚來秋會嘉戊辰冬仲明月松間照清泉石上流項聖謨畫時己巳春分二日之夕齋頭七松風不絶聲甚助筆興獨坐幽篁裏彈琴復長嘯易菴二年二月晦補圖古木無人徑深山何處鐘陳墉己巳二月望後寫吳仲圭筆意殘雨斜日照夕嵐飛鳥還徐榮啼鳥忽臨澗歸雲時抱峯徐伯齡湖上一回首青山卷白雲孔昭姚潛己巳二月試小道士墨草色搖霞上立春前三日寫松聲泛月邊時間照軒漏下三鼓矣陶菴姚潛月出驚山鳥時鳴幽澗中君輿朱大定谷靜惟松響山深無鳥聲元嘉萬祚亨白水明田外碧峯出山後㴠碧吳宏猷悠悠西林下自識門前山叔符吳必榮戊辰冬日荒城臨古渡落日滿秋山趙珂草際成棋局林端舉桔橰周志細枝風響亂踈影月中寒陸海青苔石上淨細草松下軟沈燁深林人不知明月來相照公亮范明光屋上春鳩鳴村邊杏花白禇素氏總向秋園裏花間笑語聲王烈己巳春孟倚杖柴門外臨風聼暮蟬駕翁項轂園廬鳴春鳩林薄媚新桞湛一寂瀾同題各畫竹喧歸浣女蓮動下漁舟玉洲仇世祥實父之孫積翠紗窗暗飛泉繡户涼皆令黃氏媛介香氣傳空滿妝華影箔通九畹孫氏蘭暉余幼見先君選古文辭可圖者索姑蘇諸名手書畫于泥金箋上曰桂苑叢珠較此更光彩陸離也沈石田自題畫册以後名家畫各自成册余早以繪事為戲中以為纍今年六十眼花手顫把筆不能久運運久苦思生至踈花散木剩水殘山東塗西抹自亦不覺其勞矣此册於西山展墓回途中拂拭且寫且行風淡波平蕩舟如坐屋底抵家喜遂成因題其後成化丁未春三月長洲沈周為世光賢侄贈并題又自題小册十二翻各一絶虛亭不礙秋落葉直入座可人招不來幽事如何作獨行殊寂寂秋靜過橋時忽被風吹袖山花亦不知石丈有芳姿此君無俗氣其中佳趣多容我自來去扁舟不可泊任隨流水流東而與南北人物兩悠悠山木半落葉西風方滿林無人到此地野意自蕭森溪靜風不過樹深啼鳥知山人未來處雲氣入茅茨青山間碧溪人淨秋亦淨虛亭藏白雲野鶴度幽徑獨過溪橋去間尋佳句行山亭虛白日客思與秋清緑樹迷昏霧青山生曉雲自天為此樂平與畫家分釣竿七尺玉夕陽千疊山山容恰好晚正值鳥飛還野樹脫紅葉回塘交碧流無人伴歸路獨自放扁舟湖北歸來日落扁舟滿載西風目送一行白鷺秋懷欲與天空右小册十二翻皆拙筆也宿田老兄索遺孫宗福蓋宗福侍父世資官于崇藩以將逺念而已畫皆江南所有宿田之命也其為命將禆宗福見而有所思大勝飴而㺯之矣成化二十三年季冬十有三日沈周沈啓南自題畫册十六幀各一首門前照溪影墻後交竹枝屋瓦多破碎落葉相蔽虧貧賤客不棄堂中羅履綦有酒願客醉此外無所知其二眺逺纍登頓喬梢拂雙鳬江長要天接雲懶欲風扶落日在溪山秀水橫眉鬚臺高興亦超空歌徹清都其三魚軒鶴影共清溪細水桃花一樹低聼鶴釣魚仙者事儘將風致倩人題其四流水無停迹靜者臨其傍跳珠石觸起飛花衣沁涼靜聽入希聲冉嗽空膏粱淡然與心契豈復嗟望洋其五白雲或改青山色黃葉還驚碧樹秋抱膝長吟人不識夕陽西下水東流其六路迂境自僻遂與塵世冥回溪𢃄門次澄波含石庭懸崖引平地因以開新亭叢蕉映人緑竹吹亦泠泠時復作孤往抱琴倩僮丁終少何標榜聊自安此生其七君舟我舫忽相逢江上斜陽映碧峰且釣且談情未盡白鷗飛處水融融其八林木蕭條山水清長灘淺瀨互縱橫何人晏坐心無事靜看秋雲隔嶠生其九迥回溪濯玉波聲破人影翛然樹影外詩遲步緩自騰騰况有涼颸寫微醉但教行樂清趣足不在紅妝惱山谷其十山罨畫水挼藍路緣林麓北人過野橋南個是阿誰能散逸裹茶前塢試泉甘其十一扁舟繫纜清溪側步入雲山路欲迷林靜跫然足音響藤花零落竹雞啼其十二松隂蓋路日遲遲一蹇馱詩獨去時記得遊仙有潘閬三峰回首畫中竒其十三黃鶴磯頭秋水落故人驀地相逢著十年短鬢詰吳霜是非不暇論城郭楚江萍實待誰嘗老矣吾儂思故鄉其十四山疊疊兮雲浮浮石嶙峋兮草木殞秋泛扁舟兮獨往採芳芷兮長洲洲何長兮不可以即聊短歌兮薄唁我憂其十五驅雲噴霧倐哉神工負山縮地怪哉愚公巃巃嵸嵸開此華嵩淋淋漓漓元氣攸通回視吾筆渺在握中其十六溪深將謂人靜攜壺問字忙忙兩翁方揖道士一叟又過橋傍沈周石田自題寫生册各一首老梅誰寫小江南太極心含個個香淡月半籠清絶處恍疑仙子謫塵凡梅花芳姿著酒滯枝頭行客村前醉不休斜出短墻春正暖不施朱粉自風流又梅翠條多力引風長點破銀花玉雪香韻友似知人意好隔闌輕解白霓裳玉蘭老矣東風白髮翁怕拈粉白與胭紅洛陽三月春消息在我濃煙淡墨中牡丹仕女鉛華面仙人粹白裘玉樓相見處月色向人流白毬荆棘叢中鬬冶容含風浥露淡交濃更誇獨得春香首都讓纎纎紫艷紅薔薇雪魄氷花涼氣清曲欄深處艷精神一鈎新月風牽影暗送嬌香入畫庭薝蔔誰道紅葩夏日芳獨留黃種吐秋光五尺竹闌關不住還將一半露宫妝秋葵丹桂迎風蓓蕾開摘來斜插竟相偎清香不與羣芳並仙種原從月裏來桂花高攀才子沾衣緑爭捶佳人壓鬢黃誰向蟾宫分得種年來人月滿庭芳又桂江上秋風花及時抱霜浥露見新枝東家桃李無言語却悔先榮不逮遲芙蓉秋滿籬根始見花却從冷淡遇繁華西風門徑寒香在除却陶家到我家菊花犀甲凌寒碧葉重玉杯擎處露華濃何當借壽長生酒只恐茶仙未肻容山茶白老葉禁寒壯嵗華猩紅點點雪中葩願希葵藿傾忠膽豈是爭妍富貴家山茶紅張騫𢃄得西來種中祕千珍及萬珍一個臭􅌩藏不盡又從身外覆精神石榴秋棚昨夜黑風呼鬼淚濙濙泣不枯眀日擔夫曉街上一筐新味賞明珠葡萄誰鑄黃金三百丸彈胎微濕露漙漙從今抵鵲何消玉更有餳漿沁齒寒枇杷三千年後實成時瑪瑙髙懸碧玉枝王母素無容物量却言方朔是偷兒桃子老松屈曲舞蒼虬萬壑泠泠泉自流堪羡主人多逸趣逍遙物外幾春秋古松亭前緑密玉成叢鳯宿枝頭煙雨空簫管一聲人未寢滿林明月浸清風叢竹萬里隨陽出塞長空江菰米綻秋香蘆花月白啼更罷啄盡寒汀一夜霜蘆雁芳入平蕪小院幽緑波紅雨半溪頭無情瓦雀喧春色不解飛花點點愁野花麻雀正喜羣芳壓樹稠忽驚紅紫一時休老來詩筆如神助春去花枝似鬼偷千尺遊絲縈暮景一樽芳酒浣離憂杜鵑聲裏東風惡滿地楊花點點愁題花鳥老我招邀即墨侯生生都是手中求無人領取春風意白髮先生笑下樓沈周總題石田自題花果册信知天上無雙品獨占人間第一春梅花一朵重簾玉春風百寶欄牡丹薄霧迷龍蔚涼飈灑佩環蘭數顆黃金彈枝頭駭鳥飛枇杷高棚一夜雨鬼淚泣秋風葡萄纍纍枝上實滿腹飽珠璣石榴薰風吹結子白玉銜新花梔子高冠紅突兀獨立似晨雞雞冠秋風吹冷艷晨露濕秋粧芙蓉千古陶彭澤籬邊有此花菊雪後無顔色凌寒見此花山茶凌波仙子佩湘浦夢中遺水仙紫萼破新粉青綬剪繁英睡香珊瑚網卷四十五
