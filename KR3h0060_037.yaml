body:
  text: 珊瑚網卷三十七明汪砢玉撰名畫題跋十三姚侍御春山雲樹圖春山屏風白雲障扁舟搖搖棹歌唱滄洲老樹縈薜蘿緑色更比前年多水禽不聞格格鳴茫茫芳草終日晴村莊路轉蘋花曲如此山川足此生君不見有朋有酒可游衍無雨無風興非淺不游不衍且不醉虛度年光自憔悴嘉興姚綬畫并題公綬秋溪弄笛圖尋山資杖藜到處勞步履落手得扁舟前溪秋似洗長橋卧波如卧龍嶺有篠樹無深松數峰青出白雲杪玉笛秖今吹曲終曲既終人不見紫毫束絹墨色光日日畫圖長見面公綬自題讀書圖青山白雲繞碧篠蒼烟橫茒茨短簷外時有松風鳴悠然讀書人琅琅咿吾聲所惜者分隂默契千古情推篷梅花圖昔泊西湖上老梅花正開香從􅏃底過影自水邊來笑若巡簷索詩如倚閣裁重看恨官繫夢想獨徘徊雲東逸史自題諸畫俱七言律仙源久已隔風塵未識山中有避秦人面恐非前度客桃花只是舊時春入深且自拋漁艇志路空懷復問津笑展新圖論往事知誰容易奪天真右桃源圖宦途跋涉利途危偏愛江南水竹居萬叠滁山都入畫一窗周草不教除空濛氣挹胸襟爽清冷光搖几席虛人世紅塵浮衮衮難從屏障上衣裾右水竹居亦是擅欒池上枝却緣殊色借胭脂清隂忽訝繁紅藉徑節難從染絳移結實定為朱鳳食騰空堪作赤龍騎多應血淚湘妃盡客賦梁園總未知題朱竹一作元人穀庵題松根梢都不見上下有雲遮願我三千嵗山中學服花筠石圖老節拂髙雲卑枝含宿雨托根湖石畔時有清風起竹枝開徑便見竹對人閒賦詩泠泠風觸佩正是雨晴時瓜蔓瓜熟蒂自落未落復如何採摘離藤去當無念舊窠此語可作道眼猶得魚兔而忘筌蹄之意也𢎞治紀元戊申元夕仙癡姚雲東自題諸畫俱七言絶遠山遙望有空青溪口花橫錦繡屏住在此鄉無一事日長閒録煮茶經溪山橫錦楊栁風微水不波放船載酒樂如何浮生百嵗同春夢青鏡年來髮易皤春波載酒亭如篛笠安溪口日似銅鉦掛樹頭但得有山兼有水古來何處不宜秋秋亭樹石松枝挑滿擔頭春石路崎嶇足苦辛薄暮敢投山舍宿城中多少待炊人山樵暮歸樹木蕭疏雪欲消空江水冷不生潮游魚未出虛垂釣簑笠回舟不待招空江釣雪長橋卧波如卧龍皛皛秋水類吳淞此客悠然曳杖去看盡晚山烟色濃晚山煙水紺園臺殿出樹杪山半斜陽磬幾聲野客乘舟何處去緑蘋洲上水波平夕陽古寺汲江然竹尋常事欸乃一聲何處歌泛宅浮家無限樂世途空說有風波江行棹歌一竿坐釣清如許志在髙間不在魚借問富春山下路行人誰厭子陵居髙閒釣叟水花浮滿白鷗沙山麓連雲迤邐斜客蕩輕舟歸去後一川風景屬漁家雲水漁家茫茫草澤望中寒未必全輸七里灘此外紅塵深似海清風獨上釣魚竿草澤垂竿白下追遊記昔年青山如畫樹如烟郭家歌舞楊家酒一度情思一悵然為曹竹西寓間看修竹過鄰家翠色娟娟亂紫霞掃石坐來忘却去一坡凉影日西斜竹西涼影竹不遮泉松閉壑倚樓日日有餘清雲東逸史雖能寫難寫風聲與水聲竹泉松壑茸茸碧草滿平坡春事相將一半過山鷓飛來人不在竹窗風雨落花多竹枝鷓鴣東風吹竹滿前溪溪竹叢深路欲迷日日雨多泥滑滑不堪雞鶻再三啼竹溪啼鳥山中竹樹總清妍潄石灘頭寂寂泉眼底塵埃無著處天風環佩獨泠然竹樹流泉孤巖兀兀長莓蘚上有竹枝清可人厯盡嵗寒俱挺拔眼中誰是百年身巖上竹枝茂草萎蕤生竹根竹隂分緑到柴門清樽堪此松花釀絶勝田家醉瓦盆柴門竹色髙原獨樹天邊趣怪石幽篁畫裏情莫笑王維成老懶只從筆底著秋聲幽篁怪石巖頭古木纒薜荔下有碧篠相因依向晚秋烟共秋雨溟光一𣲖入柴扉古木碧篠娟娟亂篠翠交加路入山中草映沙一賞頓忘塵土夢清風吹落紫藤花公綬在振衣亭作紫藤墨篠丙申十月五日人家種竹自然佳不對茒堂便對臺最愛一畨新雨過春泥又見笋穿階雨後新笋竹有清風石有苔是誰勾引此中來笑談忽憶梅花老何處吹簫月滿臺倣梅花老寫竹常煩提健筆柔枝密葉自生風誰知無限蕭森意不在湘南渭水東自題墨竹逸史畫竹如寫字枝葉皆從八法來苦苦欲求形似者清風安得掃塵埃同前年來為圃菜多嘗夢不思分漢署香堯韭禹糧如可食何愁不跨五仙羊自閒居食菜得趣故無漢署分香之想五仙之羊不跨猶跨濃黛消香淡兩蛾花隂試步學凌波專房似得傾城色不怕凉風到扇羅團扇仕女圖消受南風一味凉藕絲新織舞裙長臨池試展凌波步只恐紅蓮妬艷粧荷花仕女圖瑤臺無信托青鸞一寸芳心思萬端莫向東風倚修竹翠衫經得幾多寒修竹仕女圖羅襪生香踏軟莎叉橫玉燕鬢鬆鴉春心正是芭蕉葉羞見宜男並蒂花軟繡屏風小象妝細風亭館玉肌凉含情學寫鴛鴦字墨洗蕉花露水香芭蕉仕女圖二絶姚公綬老圃秋容秋深老圃霜初下秋空自然不俗幻他風景粧我清閒雅稱幽人茅屋玉樹後庭玉簮更緑歎杞菊與芙蓉厯陸雁來紅葉葉照人雙目酒熟興來最宜野飲喜楓林春花簇簇不類三秋分明二月戲筆寫成一幅莫道無情此際豈真冷淡誰解天留晚况翻憐衰颯盡空悲宋玉𢎞治六年九月雲東逸史畫并調望遠行姚榖庵蕉池積雪古蕉池積雪云者海昌勾曲外史張伯雨得漢銅洗後得白石樹水蕉其上置之洗中因有是名夫蕉所真有者池則洗為之亦有者積雪則以白石為之似有而實無者無非真無有非真有故曰有無相形伯雨其真知道者歟寫圖賦詩伯雨首倡羣公和之僅存劉師魯二篇以之成卷元社既屋伯雨亦亡流散而去為吳江村叟周氏所得遺什華蓋洞隱者饒介之録焉其卷今屬豫世姻陶君文式文式博雅好古裝裭愛護又付善畫者摹寫于册俾豫志本末伯雨師魯之作在卷不録豫追和伯雨一首乃書之作社中諸老宿之分𢎞治元年十月朔日嘉禾姚綬書仙人銅洗不復見翰墨淋漓天粟零蕉生池上有新緑雪滿嶺頭無故青追和清詩聊適興苦求遺卷亦勞形何如瀹茗澆喉吻帶月分江入大瓶雲東逸史好事品題亦小巧古來風韻未凋零仙人掌上一團碧摩詰圖中四序青靜對栽培供坐嘯懶教磨洗是忘形何當月下仍招我贈子中泠水滿瓶文式以書來滁陽索和其所謂蕉池卷者詩成踰年未有以寄之者豫還乃得觀其古卷固不敢題前詩文式强之既不得已書之卷尾而又書是册者非區區本意哉𢎞治庚戌春仲吕㦂識長稍羅展翠雲屏曽聽燕山夜雨零何處蕉池緑雪色也留詩句落丹青筆端造化空禆世眼底風花浪肖形誰寫西湖清氣味一枝香露浸銅瓶嶺南林光門前雪花大如手庭下百草皆凋零陶君何從得此本芭蕉雪裏仍青青峭拔自存堅白操巖寒不損孤髙形丹青誰是王摩詰便欲輸君玉膽瓶嘉善周澤曉起支頥靜倚屏蕉池生意不教零皚皚雪積雲根白揚揚風翻露葉青我向吟邊偏得趣誰于物外却忘形一般清味亭臺上絶勝梅花浸玉瓶新淦蕭子鵬人間芭蕉葉最大雪花一沾無不零云何池上數片葉戴雪不减天家青乃知仙翁有幻術山骨偷來𤣥化形何當掬取九霄露洗根供上琉璃瓶王准大化洪罏孰真宰範金削玉紛飄零雙魚傳來漢家洗孤鳳飛墮仇池青花層六出本無象秀聚三奇真有形重煩摩詰作詩畫小杓分清歸硯瓶姚江魏瀚樹濕雨初過天青雲已收主人尋友去門掩一山秋一木嘉善姚御史綬字公綬其父封公頗好善宅西大雲寺有侍者老矣常受公賑施一日公于田中觀刈穫忽見此侍者肩襆從宅後直入怪察之則細君就館産子又詣寺中消息云侍者病三日頃化去矣公心知是其托生及長而狷黠不若于訓年十六尚未識字其伯仲二兄咸舉茂才公令季子踐更縣尉怒其狂率杖之歸乃憤發就師𫝊日夜程書不休如是十年登進士第為監察御史請告還家悟前身是大雲寺侍者因自號雲東逸史其蕉池積雪原卷已載六硯齊筆記矣汪罔氏識沈石田乾坤四大景我所憶兮匡廬泉飛空直下香罏巔銀河為源彭蠡委萬古騰沸東南天左潨右射五老却蹇裳濡足愁攀緣崖傾石走霹靂鬬枯藤怪樹虬龍懸丹青洗出屏風叠跳珠濺玉聲鏘然誰能置我巖石間仰面落雪水底眠酒酣戲作五里霧山精嘯雨空中旋嗚呼我歌兮歌始放九江茫茫日在望倣趙松雪筆我所憶兮泰山松秦皇避雨駐六龍根如鐵石皮青銅千秋萬嵗枝䝉茸瞳瞳掛日扶桑小隱隱𠫭天翠黛濃鸞雛鳳㝅不知數和鳴上下如笙鏞潮聲真與東海應絶頂正見蓬萊峰金膏玉液散入地茯苓芝草生隆冬采而食之可不死雲車何日來相從嗚呼我歌兮歌正長黃河日暮流商商倣李晞古筆我所憶兮黃鶴樓瀟湘洞庭生素秋登髙抉眥極萬里烈風震蕩無時休九疑連綿似屏嶂白日黯慘蒼雲愁東攀枯木枝巃嵸西望雪嶺寒颼颼珠簾繡柱九天上倒影却射滄江流仙人坐弄紫玉笛往往飛花鸚鵡洲青蓮居士莫捶碎便須縱飲成糟丘嗚呼我歌兮歌愈急鴻鵠冥冥楚天碧倣黃鶴山樵筆我所憶兮峨嵋雪六月隂崖凍欲裂仙人赤腳翠巖行鶴氅飄飄玉光潔回飈吹散五溪雲落絮飛花滿城闕滴博蓬婆西海頭隂風慘淡旌竿折萬里雲凝雲不流層氷皓皓冬夏結我思仗劍游其巔石棧天梯殊斗絶六龍回日不敢過寒光凛冽千丈鐵嗚呼我歌兮歌益豪太白不動金天髙倣吳仲圭筆𢎞治戊午仲春閒居精舍漫摹古人筆意長洲沈周石田翁作山水好衍為長卷此其一也翁胸藏丘壑妙合造化出之筆端不煩意而自有無窮之趣且四景摹古人筆法鏘鏘如對前人面目也覽此卷不覺慨然有所興起墨池王渙沈啓南溪巒秋色圖每憶西禪地城中人不知香爐供課佛茗碗博題詩嗜淡黃金遠心閒白髮遲勞生堪自薄令我羡吾師豫雖江鄉人嵗入郭無虛月然未嘗一假居㕓市假必明公所往來逾三十年明公無煩于豫豫亦無所憚也今年夏五月一别逮十月下浣始相見出紙索畫與題以志契濶因寫溪巒秋色應之寫畢瀹籬豆茶為供時夜已過半矣庚寅沈周錦帆涇上千年寺水殿雲廊半不存只有老僧明月下立當清影夜敲門陶庵沈貞吉陶然道人交游愈久愈情深方外于今數道林清白不移人自老雙娥峯下月如心吳興沈恆吉明公何處好安禪城市山林别有天昨日鄰家分與地便開亭子看雲眠完庵延美藕華居月寒山亦白人語澗微譍傳取詩禪去前身我亦僧池上白蓮花又開情深應不厭頻來白頭却被青山笑投老相逢得幾回明師與豫有夙契每入城必訪師師亦不憚豫之煩也壬辰秋仲草又四日午飲山房見石田詩畫重題以紀一遊云方內陳䝉枯筆礬山頭氣象磅礴下作竹樹蕭森間小亭跨之意甚疏秀乃倪黃合併而出者碧苔箋題沈啓南自題天池亭月圖天池有此亭萬古有此月一月照天池萬物輝光發不特為亭來月亦無所私緣有佳主人人月兩相宜還如庾公樓其興亦不淺把酒醉月華夜夜作沉湎我是好詩人咏月三百首此亭不厭我將詩侑君酒石湖書院老樹圖范公亭東有古樹有身莫可限尺度只憑長六不長長邊老婪酣遺醜肚一幹朽盡皮肉空一幹輪囷葉粗蔽盤根到處走虬蛇風雨不驚知得地坐根納䕃且移時靜玩氣機成感寓人生安得如此頑不死不用常在世圖石湖書院老樹題沈周秋山圖秋至無所適牛峯期峻攀攜手相魚貫極力凌孱顔東來望城郭北指鬱江關凉風振木末葉飄巾履間俯見行旅人役役往復還如我二三子逍遙意自閒其中有達德髙誼雲薄天投簪在急流此道今則慳成化丙申嵗八月望奉陪味芝先生游西山牛頭峰謬以詩畫記其清賞沈周端居秉髙志道與黃綺謀耿耿千嵗懷安能一朝酬青陽肇嘉節羲馭逝不留樹木發華滋緑葉揚芳柔上有鳴春鳥嚶嚶求匹儔踟蹰不能寐攬衣起行遊况復有良朋分若金石投攜手出西郭眷言山水幽祓除激清波眺遠陟髙丘西北臨廣路巍巍列飛樓誰人為燕㑹交親結綢繆光景忽西馳娛樂殊未休豈不念合併欲邁路阻修顧望勿復道回身駕輕舟折彼蕙蘭花聊以忘我憂味芝以石田畫索豫題豫許諾踰日詩成書之乃春眺詩非秋眺詩也不覺失笑若豫者真諺所謂不辨春秋者也豸史劉昌巴山圖吳之為國水所涵有山平衍無巉巖我家多水少山處悵望翠微心所貪時能借墨補不足數紙連絡長畨粘峯巒重復間溪溆雜樹列布多楓楠或開大壑浸山足其椒半為浮雲含僧廬隱映遠木杪聽泉採藥我亦堪嘗聞巴蜀天下險未可一往尋鳬蠶子長之興浩不淺感此老鬢霜鬖鬖聊因圖此識所見卧逰一生還自甘存一留余有竹莊數日每談巴山之勝輒為踴躍酒半出素命筆圖成并為書此沈周南川髙士圖連峯何窈窕浚谷深且幽中有髙識士樂兹逍遙逰長勤事竹素抱志徯其時叶芙蓉製重襟約以珊瑚鈎搴芳古桂林翔聲籍南州鳳鳥不可狎乃在崑崙丘矯首望光塵遐鄙即無由信思聊致言墨卿慚謬悠惟謙吳君才德茂優為東崑名流也相别良多嵗月懷思不能置聊以拙畫鄙言通其知也癸巳沈周鶴聽琴圖余見王叔明畫鶴聽琴圖喜其命意髙古嘗臨摹三四幀殊自㑹心昨于友人處見梁楷亦有鶴聽琴圖雪中洞壑意趣超曠始知古人一樹一石必有所本固非流俗率意妄誕而無忌憚也歸卧北窗下懷思無己乃想像援筆觀者幸勿誚其效矉焉時天順癸酉七月念日也沈周余昔年得石田畫頗多然旋得旋去如此幅其一也更有寄竹鶴翁圖瀟灑有致詩亦真率有味書作擘窠書極雄快竟歸之漢碧云玉水記倣倪迂山水為髙太巖所藏迂翁畫為戲簡到存清臞學者豈易得紛紛墮繁蕪名家百餘祀所惜繼者無况有沖雅篇數語辨小圖吳人助清玩重價呼沽諸崔子强我能依樣求葫蘆墨澀不成運林慚澗與俱何敢惜典型虎賁實區區醜惡正須裂捲去莫須臾今夕秋燭下再見眼糢糊妄意加潤色泥塗還附塗崔子詎不見愛及屋上烏淵甫嘗索此小景蓋倣倪雲林筆意為之特草草耳今徵題持來燈下更添數筆雖曰潤色之終不能掩其陋也𢎞治辛亥九月前一日長洲沈周倣吳仲圭筆意層岑交亂雲厯厯映羣樹雲山互相依青白娟朝暮下有土著者靜居氣鬱聚修竹䕃髙宇細草被紆路幽深疑世違時復通杖履鳴琴值客來語歇客還去天機發所樂漠然非人故吳仲圭得巨然筆意墨法又能軼出其畦徑爛漫慘淡當時可謂自能名家者蓋心得之妙非可易學余雖愛而恨不能追其萬一間為此幅生澀自不足觀猶邯鄲人學步而併失其故矣沈周又倣梅沙彌山水秋風吹大澤落籜亦蕭蕭塊坐默無語衷抱還寥寥仰面睇髙天冥鴻不堪招白石翁沈石田水墨梅王理之補勾勒竹平生有眼厭桃李但托梅花是知己小橋初春帶淺水青鞋布襪從此始看花嚼蕊氷雪中清浹肺肝香沁齒歸來拈筆弄清真淡墨依稀春繞指花光補之今不作我欲師之竟誰是橫梢的厯寄疏略自我意為聊爾耳正如北人煮床簣笋味茫茫舉其似理之嫌我太草草斜補竹枝成玉倚要知君子德不孤勿謂畫圖而已矣崑山士人多畫梅與王理之論其用墨太重殊失清雅足有纍于梅矣因短縑在幀史德徵從容謂曰清雅果何似丈人當示一梢與梅出氣何如遂安弄此筆理之亦作錯刀數葉間于疏處仍題之以贈德徴𢎞治甲寅嵗端午日沈周沈啓南自贊畫像王生見我精神熟照寫今吾瘦于竹問年初及六十人享世渾無半分福一味耽農百不便門前湖水漲低田飢來讀書不當飽靜裏安心惟信天風昴雨壁溪堂破貧賤生成貧賤過隱服還勞郡守遺私篇或辱尚書和草木當衰那復真紙間坐上兩逰塵是非非是都休辨聊記明時無用人周自贊沈啓南送吳文定公行卷并圖贈君恥無紫玉玦贈君更無黃金箠為君十日畫一山為君五日畫一水欲持靈秀擬君才坐覺江山為之鄙峙而不動衍且長惟君之心差可比君初如蕡躓場屋復曽如郊失三子方其處逆自有道泰然委命而已矣時來獻策入明光兩元到手著探囊長裾本不利疾走三年一鳴驚鳳凰當時聞者皆喜忭意閒心小無矜張胸中所養已浩大盡付得喪于茫茫訊求細行無不合似此淳全何可當截瓊作柱豈摘齒用著終須推皇堂歸來哭親哀毁足鎮日聊生惟菜粥我因羸瘦勸進肉輒見麻袍淚相續琴和服吉當北行鄉人載道羡登瀛家中買書學教子地下丈人寧不榮文章祇今老更成浩蕩豈類今之作夜雪淮西躡亂鵝秋風赤壁招孤鶴其言則古人則今要將根底重詞林隆阡為我表先子發潛闡幽故誼深緘詩亦為閔蟄溺推我曷忘天下心聲光固是天下士先憂後樂君須任吳太史原博奔其先大夫之喪還蘇制甫終告别鄉里以行友生沈周造此追餞于祖道之末辭鄙曷足為贈太史寧無敖我乎君不見白石翁墨花破萬紙散落世眼中其間方寸地貯一太史公是時太史稱吳儂三載磊塊蟠翁胸太史趨朝天青雀凌春風有淚不作李都尉有賦不擬江文通直將三寸管五丈素寫出江南千峯與萬峰盡收蜀錦囊壓倒太史之奚僮絶壁直上髙穹窿呼吸似足開天聰忽復下墜數千尺俯身欲入黿鼉宫意者徑路絶乃有雲霞封萬古不盡流洗出玉玲瓏側耳將聽之疑是縑素間迸作羣靈霳長飈無形百草龎茸列缺崩崖吐出怪松厯亂羽葆屈蟠虬龍將崩未崩石似舞欲斷不斷橋飛虹乃有詞家酒人樵青釣童或騎蹇驢或駕舼或躡蠟屐或策短笻髙者穿木末若蜚鴻下者蹣跚勃窣如孤蜂兩儀不能主乍闢而乍䝉二曜不定光倐西而倐東木棧與鳥爭道人家擬鵲開窗漸窮至杳靄但有去路無來蹤猶云紙盡意未盡亂石拳㸃波洶洶真宰泣訴神無功太史不能長將向天去流落人間成楚弓菊亦召主城芙蓉但令居士緗几上秀色欲滴青濛濛擊節董源隕涕關同筆底一掃傾宗工沈翁豪翰何其雄嗚呼隆凖之孫豈必隆白石翁生平石交獨吳文定公而所圖以贈文定行者卷幾五丈許凡三年而始就草樹水石橋道無一筆不是古人而以胸中一派天機發之千奇萬怪種種有真理至于氣韻神彩觸眼若新落墨皴㸃了絶蹊徑豫所閲此老畫多矣無有如此者令黃鶴山樵梅道人見之却走三舍董北苑巨然師當驚而啼曰此子出藍掩吾名矣鑒賞者亦以豫為知言否白石翁畫聖也或曰此卷尤是畫中王也毋論一文進唐伯虎即勝國諸名家疇能及之或又曰東莊園可以狎主齊盟然是十三幅幅各非一體此卷如萬里長江千山夾之當是翁第一筆琅琊王世貞沈石田雪館情話成化己巳十一月二十有一日適周生辰宿田兄攜殽尊過厚遠來展祝翌旦雪作連有八日之留遂寫雪館情話圖系之詩贈座客洎諸子弟輩因倡而和得若干章為一卷若夫蔡州道清虛堂之雪蘇長公每與子由同處况皆有詩傳世為不磨之稱是知名勝之士然後可以致此耳今雖人品之殊而事緣之偶亦有雪可賞兄弟可樂推而論之未必長公不同此心也但蔡州有語下馬作雪詩滿地鞭箠痕清虛堂云出門自笑無所詣呼酒持勸惟君家一在途旅一在王定國所似自家情話之真今周之樂疑有倍于長公者其果有倍乎果無倍乎彼此一寫也彼此一樂也未始有過不及也逮其稱與傳者則不無彼此之間矣易曰君子以同而異此之謂歟詩復借蔡州韻以表仰止非敢强其同云仲冬草一日陽已吁枯根我生届其辰梳髮臨朝暾伯氏來展祝留我西小軒誓為忘歸草復為忘憂萱燕次雪作凍日夕呼酒溫開窗看玉樹剪刻千花痕澄懷挹清冽亦可助丹元坐鄙附熱徒何地容趨奔逍遙有書卷僵手尚可掀願保嵗寒節終老同丘園長洲沈周鷗波凍合棹難行亭館無如此處清下榻更逢連夜雪挑燈同話草年情飛籌送酒忘賓主呵筆題詩羡弟兄不獨蔡州成勝㑹亦傳今日是佳盟陳佃寒雲江郭路沉沉客在蓬門雪正深我欲留人天亦阻冷須添火酒加斟陶家莫說煎茶事王子難為返棹心此夜此情何處見溪山如玉照清吟沈豳修竹所翊南文㑹何所似苞桑合元根倡和雜長幼不肖慚劉暾時維仲冬月飛雪滿西軒易氣不害生宜先及勾萱韓休居首席意誼成春溫摛章動四座彌紙醉墨痕比肩志六朝下視唐開元得雋成軒渠不及汗且奔千奇出腹笥豈待故紙掀後之覽斯文將以繼梁園雲鴻沐手拜書沈印雲鴻清白傳家郊居屬嵗暮積雪在草根窗虛白于晝積素迎初暾梅花破清夢蹶起開瓊軒軒階玉成砌潑凍尋初萱熾炭見故舊滿室如春溫隂氣為消融塵慮無留痕陳蕃過黃憲得探萬物元酒酣爭劇辨雄如怒馬奔我獨不成章醉把長髯掀但喜披鶴氅泮奐逰西園陳九韶琴水漁夫白屋青衫飄風吹樹杪密雪擁墻根北隴含冬景東窗失曉暾空厨炊破甑窮巷絶髙軒龜手君臣藥憂心兒女萱清茶童子供濁酒故人溫枯梗瓊瑤蕊茒簷牙爪痕塵難紅我足山亦白其元地擁岡相槩波凝海不奔棹須留客繫簾莫倩人掀遙想蔡州道終非獨樂園沈璞吾兄仲冬草一日初度今年值小寒話到深情别非易酒逢知己量應寬清時喜得同鄉老瑞雪真宜作畫看莫謂今人偏讓古草廬聯榻兩袁安沈木東陽沈春伯印寫雪為圖坐雪晨匆匆應笑剡溪人出門措足渾無地開甕澆寒自有春燈照素麻千嶂出筆呵微凍六花新天時人事如相約打合清虛好主賔沈觀大寒林森聳石坡重復林下多作翠篠緣坡雪屋數椽二老促膝于其下屋後林背作一亭純用子久畫法卷端大書雪館情話極類徐季海沈啓南婁江雪櫂圖在紙上卷首陳瑄篆題我寫雲中意平林帶遠巒倩誰看玉潤呼酒破風寒因爾獨歸去令人殊未安山燈今夜榻聊作小盤桓秉智為余外甥其誼尤篤十二月二日自東崑來郡中慰余久客是夕雪作明日伺晴欲行小酌燈下寫婁江雪櫂圖系詩送之凡在座者皆連聲和響于後天寒嵗晚殊解寥落沈周别酒未閣手臨行意萬重江山寫新雪試看丈人峰諸中已富三冬學青衫稱少年遠尋東老寓獨羡外甥賢雪變寒江雨鍾鳴野寺天又驅羸馬去離思繞長川燕山陸堇鬢絲將滿鏡恥近覺非年四海少兄弟一杯從聖賢索詩煩許子倚劍在吳天歸路薄風雪扁舟當濟川三日雪不輟秉智尚阻宿承天僧寓是夕古狂陸君自巖天院來因繼拙惡而有二妙秉智請為和遂和之如右周重題入郭頻相見余當旅食年生涯休說隱王道正求賢吟寄春前酒寒增雪後天便應留信宿孤棹倚前川再用前韻以答秉老堇沈徵君南湖草堂圖十名人蹟御李齊裝楊湖不在北楊湖今在南開門見湖光一鏡空碧涵日午照黃襖月過陪清酣魚鳥相友于物物無不堪匪特主人愛客到意亦貪何當夾水志相與一縱談沈周南湖新緑漲平堤䦨壓春雲雨過時花片浮紅搖暖影柳絲垂碧蘸晴漪泥融紫燕營巢急風動金鱗出穴遲適興行吟知幾度荻溪驚滿錦囊詩延陵吳寬結得幽居寄此生鷗波千頃漾前楹坐觀雲物日千變卧聽波濤夜幾更風起巽離宜夜永月臨子午正潮平何當買棹尋真隱醉倚蓬窗一笛橫習齊朱旦雨過南湖漲緑波湖光皎皎鏡新磨門遮樛木無塵到人對薰風結釣蓑檢齊桑瑜浪紋鋪錦漫鷗沙四繞春隂翠栁遮燕愛輕風頻掠絮魚吹細雨却飛花般逰勝賞嘗移棹美景清歌自浣紗占斷東吳奇絶處鑑湖一曲並堪誇晉昌唐寅君住楊城北湖在君家南惟愛薰風和更喜宵月涵有魚供盤餐有酒終日酣出處固難同在我思亦堪髙人偶家此擇勝非所貪欲問湖鄉樂尚缺一宿談沈芾又次草堂住湖上門對離方開白鳥銜魚去溪翁放棹來渚花靜若我水色青于苔雅趣許誰得緑楊垂釣臺楊恩溯洄東上一茅堂堂枕晴湖沃土淮南子南次州曰沃土長波濺珠璣通北海東漢書孔融文才守北海景含詩畫帶西莊唐王給事别業川禽蟹蜃之屬見國語戀戀潛春渚沙鳥嘈嘈還夕陽笑把明窗塵仙藥漫理主翁原是賀知章海虞桑翹謙虛麗澤觀于水浩嘆南湖樂可湛出沔入河春潑潑印箕落斗夜厭厭斯干美室人應美平秩堪耕釣亦堪得景不須窮望外乞完却笑賀狂貪常熟吳寅西湖風致人皆仰我獨南湖景可觀花落無聲波影動鳥飛不動鏡光寒天垂星斗千尋下浪湧銀山萬頃寬意欲與君分一曲荻蘆深處恣盤桓桑榮右南湖草堂詩畫一卷啓南盛年更妙蹟也萬厯癸丑春獲于相城施氏漫搆俚言鑒定之不知其寫贈王原禹先輩也近讀吳寬桑翹長句始知四十九年之非因剪却舊跋重裝述贊云石田老仙畫法屢遷草堂圖引祖述恕先烟雲若斷竹木還連王家之珍於萬斯年是嵗十月朔張丑記癸未重九日寒山趙子惠攜其家藏名蹟來吾里余得觀是卷又其母文淑大幅花石殊不凡玉記石田話别期菊圖葵南親家遠顧荒落傾倒連日臨别甚覺不忍為圖與詩少志眷眷且期看菊一致報謁未知葵南能醉我否𢎞治庚申九月後一日姻生沈周一見話契濶心親迹似疏江湖木蘭棹燈火白茒廬夜郭溪先淨秋林露氣虛名園菊花繞徑造問何如匡山新霽圖吳山沈周作匡山新霽圖用巨然筆法水墨固戲事山川偶流形輟筆信人捲妍醜吾未明摹擬亦云贅所得在性情今在百尺樓彌筆雲烟生把酒重相對短鬢秋風生𢎞治己丑孟冬八日沈周重題翁昔少年初畫山蒼松黃竹雜潺湲直疑積雨得深潤不暇浮雲相往還世外空青秋一色巗前遠黛曉千鬟天台鶴鹿同人境尚恐翁歸向此間唐寅金山寺圖以下俱石田自題常惜忙未到到來方悟閒過江如隔世入寺不知山風氣薄詩骨夕陽浮醉顔古人誇一宿三宿我方還山居圖甲申菊月倣黃鶴山樵山居圖余詩以贈原已先生秋山骨稜層秋樹枝槎牙尚有餘霜葉㸃綴如春花緩步亦足賞何須坐亭車行行日將夕微吟酬物華江閣看山圖避俗耽幽僻逃名學古狂深松無六月江閣有餘凉策杖詩將就看山意自長何須尋絶島此地即仙鄉碧梧山館圖東風一夕至吹散麥秋寒花落春愁盡鶯啼午夢殘碧梧山館靜白葛道衣寬飯後吹新汲雲鐺試月團幽居秋意圖焚香净掃地隱几細開編取足一生內泛觀千古前風疏黃葉徑露發夕陽天物理終消歇幽居覺自妍秋窗月色圖老去不信老自然筋力疏忙緣一頓飯髮病十朝梳掃地風無力推窗月晒書秋蟲不解靜千聒夜凉初花沼禽魚圖野外著秋色因尋靜者居短垣花塞路曲沼鷺窺魚入坐無塵蹟堆床有道書自忘軒冕纍端為世情疏許由棄瓢圖一物有一纍吾形猶贅然區區此勺器亦合付長川浩浩天地間吾亦一瓢耳吾哉與瓢哉大觀何彼此元遺山擲瓢圖云不知黃屋不知堯喧寂何心寄一瓢我是許由初不爾只將盛酒杖頭挑較石田詩更進一籌繡水汪砢玉鑒藏并識珊瑚網卷三十七
