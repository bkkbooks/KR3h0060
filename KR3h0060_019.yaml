body:
  text: 珊瑚網卷十九明汪砢玉撰法書題跋禹碑文刻古逸書嶽麓山頂巨石上有禹碑郡守潘鎰始搜得之凡七十七字其文皆古篆不可識昌黎不能索之峋嶁而叠峰乃得之嶽麓焉豈神物顯晦有時耶石鼓未得専竒矣兹以字畫模糊稽古者類有遺憾故勒貞珉原本暨沈楊二公音譯附録於左以便後之君子考鏡焉此跋見長沙本王弇州以禹碑在祝融峯重刻者有二本而𨽻釋亦微不同大抵多以意會耳昌黎歌科斗拳身薤倒披鸞漂鳳泊拏虬螭是書之形勢焉銘辭極類汲冢周書穆天子傳中語楊用修所謂龍畫榜分螺書扁刻不啻倍屣嶧山琅耶也玉述石鼓文王文莊公辨正古逸書僅載其文元國子司業潘迪考訂音訓刋附于後岐陽石鼓十在鳳翔天興山阿唐鄭餘慶節度鳳翔移鎮文宣王廟唐衰亡其一鼓宋皇祐四年司馬待制池知鳳翔府使向傳師求之於外偶之田舍覩舂粱石臼有文察之鼓也向易以他臼於是十鼓復完徽宗時嘗鑄金填其刻文移置宣和殿金人入汴剔取其金而棄去之元取中原乃輦至燕京皇慶癸丑始置國學廂門下我太宗既即位建都于燕國子監仍元國學舊址石鼓在焉按石鼓至唐始顯自韋應物以為周文王之鼓宣王刻詩韓退之以為宣王之鼓宋程泰之以左氏有岐陽之搜之言以為成王之鼓虞世南禇遂良歐陽詢共稱其古妙韋應物以為李斯嶧山之罘刻字比之懸隔歐陽永叔謂非史籀不能作趙明誠謂決非周以後人所能到然永叔以為可疑者三四謂今世所有漢桓靈時碑往往尚在其距今未及千嵗大書深刻而磨滅者十猶八九此鼓至今實千有九百年鼓文細而刻淺理豈得存此其可疑者一也其字古而有法其言與雅頌同文而詩書所傳之外三代文章真跡在者惟此而已然自漢以來博古好竒之士皆略而不道此其可疑者二也隋氏藏書最多其志所録秦始皇刻石婆羅門外國書皆有而獨無石鼓遺近録逺不宜如此此其可疑者三也前世傳記所載古逺竒怪之事類多虛誕而難信况傳記不載不知韋韓二君何據而為文宣之鼓也其疑如此趙明誠金石録謂秦以前碑刻如此鼓及詛楚文泰山秦篆皆粗石如今世以為碓臼者性既堅頑難壞又不堪他用故能存至今愚以為石之粗者決難刻字雖刻亦不精好且易壞泐况石鼓今在國學豫所親見雖若堅頑而質理不粗使果粗也文豈能細刻豈能淺其刻又豈金所能填哉即不堪他用戰攻之際用為炮石豈不可乎明誠之言殊未然也獨金人馬子卿以字畫考之謂是宇文周時所造作辨餘萬言出入傳記引據甚明然其全文今不可見愚常讀北史蘇綽傳云自有晉之季文章競為浮華遂以成俗周文帝為相欲革其弊因魏帝祭廟羣臣畢至乃命綽作大誥奏行之是後文章皆依其體廢帝之事魏史栁虬執簡責之周文帝令太常盧辨作誥以喻公卿其體亦類前作蓋俱倣尚書也周本紀魏恭帝三年正月丁丑初行周禮建六官史臣謂周文帝恆以復古始為心而在魏文帝大統十一年十月嘗西狩岐陽又奉魏太子巡撫西境登隴刻石紀事至其子武帝保定元年十一月丁巳狩于岐陽三年九月又自原州登隴山五年二月行幸岐州由是觀之則石鼓之事宇文周所造無疑文體既倣尚書則詩體倣詩亦無疑况武帝天和九年春正月考路寢命羣臣賦古詩則狩獵大典依典古賦詩以刻于石理亦有之且武帝既有岐陽之搜復有路寢之賦則石鼓必作於武帝之世也獨字畫古妙謂非後人所能及此固然矣然自古惟命神化之學至宋大儒遂窮其奧字特一藝耳苟専精為之豈難至哉昔銀工婁生平摹墨本前人題志莫不以為天下之絶巧劉靜修獨謂人心之靈有可以參天地而贊化育者存苟専力於一藝其精密神工亦何不至是可見矣抑觀考古博古二圖集古金石二録凡篆文出於三代者皆鐘鼎器物欵識無刻石者惟贊皇山吉日癸巳四字以為周穆王時書鳳翔詛楚文以為春秋時書世傳殷比干吳季子墓碑以為孔子書雖皆刻石然前哲已悉辨其僞况班孟堅漢書郊祀志上起少昊顓頊中厯二帝三王直至秦始皇始有立石頌德之文是亦前世未有刻石之證也宋鄭漁仲亦曰三代而上惟勒鼎彝秦人始大其制而用石鼓始皇欲詳其文而有豐碑此亦可見刻石創始於秦也獨其謂秦用石鼓此有可疑或别有考非此之謂要之隋志所收有始皇石刻始皇以前未聞焉則石刻當斷自始皇為始其吉日癸巳以下皆因循而作而妄假古人者然始皇之所以刻石者亦緣傳國璽有以先之爾隋周相接而不識其文或偶失之或貴耳賤目以為尋常昔吾子行所謂二徐字蹟最多以其近世故不條具之意也馬氏之說真為不可易之論雖歐陽公數疑可以立決然則韋韓以下諸人之見豈非皆出於臆度乎宛郡王鴻儒懋學著余在厯下得王文莊辨岐陽文甚昭晰乃楊公士竒云石鼓文決非秦漢以下之人所能所謂文細刻淺者安知當時不深刻厯世久逺則磨滅如此而文字之存者計裁三之一耳其中不可辨識者又三之一則亦久逺之驗也斯言得之矣玉述檀山石刻贊皇縣擅山上有周穆王刻石四大字曰吉日癸巳筆力遒徑有劒拔弩張之勢閟重巖絶壑者數千年元皇祐中鎮守廣平宋公者搜得之令邑人劉莊鑿石輦歸嗣權守李佑置之㕔事右壁至元乙酉鐵冶提舉劉恭移石還檀山乃余家所藏陸廣畫其嶺端篆書此四字應是檀山圖也平陽玉子識于錦研齊詛楚文有秦嗣王欲用吉玉宣璧使其宗祝邵鼛布懇告於丕顯大沈久湫一云大神巫咸一云大神亞駝以底楚王熊相之多罪昔我先君穆公及楚成王是戮力同心兩邦若一絆以婚姻袗以齊盟曰萬葉子孫毋相為不相親即丕顯大沈久湫一云大神巫咸一云大神亞駝而質焉今楚王熊相庸回無道淫佚湛亂宣侈競縱變輸盟刺內之􅋿臣武虐不姑巫咸亞駝本並作罪刑戮孕婦幽刺親戚拘圉其叔父置諸冥室櫝棺之中外􅋿冒改久心不畏皇天上帝及大沈久湫一云不顯大神巫咸一云不顯大神亞駝之光威神而兼倍十八世之誼盟率諸侯之兵以臨加我欲剗伐我社稷伐滅我百姓求蔑法皇天上帝及大沈久湫一云大神巫咸一云大神亞駝之恤祠圭玉羲牲遂取吾邊城新􅙉及抑長吾不曰可今又悉興其衆張矜忍怒飾甲底兵奮士盛師以逼吾邊競將欲復其脫迹惟是秦邦之羸衆敝賦䩹䩱棧輿使介老將之以自救也巫咸巫駝本也作歐亦應受皇天上帝及丕顯大沈久湫一云不顯大神巫成一云不顯大神亞駝之幾靈德賜克劑楚師且復略我邊城數楚王之倍盟犯詛著諸名章以盟大神之威神秦自文世有三石初得大沈湫文於卻又得巫咸文於渭最後得亞駝文于洛其詞盡同惟所用以質於神者則隨其號以異書盡竒古間用鐘鼎遺制亦或雜有秦文蓋書畫始變者也詳在董逌嶧山碑玉筯篆一行十字字方二三寸秦相嶧山碑當時村落供命不給聚薪其下縱火焚之遂至刓缺唐人嘗取舊文勒石然碎碑未絶好竒者猶有搨本可求其殘雪滴溜鴻鵠羣遊之妙也程邈篆書張懷瓘云古文謂孔子壁中書篆書史程邈作也𨽻書程邈所獻也此邈篆四簡簡十二字鬲匾應勢筆力常有餘故在雲陽獄外所書與李斯相頡頏耳華山碑𨽻書西嶽華山碑廣川以為後漢延熹四年𢎞農太守孫璆建書曰五帝巡狩五嶽立宫其下宫曰集靈殿曰集仙歐陽公謂集靈惟見於此黃長睿云漢武集靈宫見於太華是不獨載于漢志桓談嘗賦之酈道元曰敷水北徑集靈宫其事甚備永叔何以云惟見此也又升菴金石刻以為新豐郭香察書疑東京無雙名弇州謂鄧廣德梁不疑成翊世鄧萬世王延壽謝夷吾蘇不韋費長房薊子訓此何人耶若其文爾雅可讀其行筆殊遒徑唐人𨽻分之法所由起耳蔡雍石經蔡中郎鐫七經於石才三十年而兵火損缺魏正始中又立一字石經相承以為七經正字後魏武定四年移洛陽齊神武自洛陽徙于鄴都河陽岸崩遂沒於水其得至鄴者僅半周大象中詔徙經于洛為軍人破毁有竊載還鄴者船壞多沈失其後得者盡破為橋基隋開皇六年自鄴京載入長安置于祕書內省議欲補緝立國學會亂用作柱礎貞觀初魏徴始收聚之十不存一其相承傳拓之本猶在祕府當時考驗至詳謂不盡為雍如馬日殫數輩相與成之然漢𨽻間古深於法度亦後世不及故兼存之趙綽曰唐造防秋館時穿地多得石經故路人氏逮今有之國初開地唐御史府猶得石經十餘石也皇象天發碑建業有吳時天發神䜟碑與漢𨽻殊異不用批法而挑跋平硬盡去棋算㪷環之纍𨽻與篆皆不得而名之信所謂八分也雖稍磨泐不可讀而典刑自在焉急就章元章書史皇象有急就草唐撫竒絶當葉夢得時再經摹搨國初時宋仲溫又刻石僅存其形似廣川以官書有象章草帖故自精深竒崛王元美謂章草𨽻之分變也自伯英創今草海內爭趨之章日以廢耳鍾元常帖鍾繇少時隨劉勝往抱犢山學書三年比還與太祖邯鄲淳韋誕孫子荆問楷隸等書用筆法見蔡雍筆法于韋誕坐上苦求不與自捶其胸因嘔血將危太祖以五粒靈丹救之及誕死陰令人盜伐其墓以得之故知多力豐筋者聖無力無筋者病一一從其消息而用之由是更妙繇曰用筆者天也流美者地也非凡庸所知臨終探囊以授子會曰吾精思學書學其用筆若與人居畫地廣數步卧畫被穿過表如厠忘歸每見萬類皆畫象之青人巢玉子識開皇蘭亭軸江南後主所重撥鐙法司蘇易簡題後有臣米友仁鑒定業汪逵藏有若象夫子尚與闕里門虎賁狀蔡雍猶傍文舉樽昭陵自一閉真跡不復存豫今獲此本亦可比璵璠翰林學士承㫖中書舍人易簡于玉堂北軒題慶厯中襄知福州才翁為監司相從二年故所藏墨跡竒書多亦傳撫善本後於京師王渙金吾借觀渙亡之後凡七本皆亡今覽是帖不覺歎息蘭亭以起草本為第一末後空一行者是有勳字圓印在空晉人謂之臨河序唐人稱蘭亭詩序或言蘭亭記歐公云修禊序蔡君謨云曲水序東坡云蘭亭文山谷云褉飲序通古今雅俗所稱俱云蘭亭至南宋髙宗宸翰題曰褉帖玉述神龍蘭亭序褉帖在唐貞觀中舊有二本其一入昭陵其一當神龍中太平公主借出搨摹遂亡而蘭亭自唐以後又分二𣲖其一出於禇河南是為唐本其一出於歐陽率更是為定武本餘如會稽本之類多唐賢所臨至宋理宗內府所藏有一百一十七刻逮遞傳遞勒何啻千餘種宜乎考論者如聚訟也昔人以蘭亭詩序為書家六經神龍本其壁中葩上物乎源崑子識定武蘭亭卷趙子固所藏落水本昔中原雲擾定李生獲褉帖真刻嘗以墨本投韓忠獻公公索之急及摹刻送官其後宋景文始得李本藏之公庫至薛師正出守子紹彭又從而易之蓋自韓宋以來士大夫得之是邦者真􅎓已相亂矣柬陽周致肅以此卷相視題識由髙平范公而下皆宋名臣其必識真矣乎鄜劉汶書薛紹彭自為一書辨定武石刻號稱詳密李學究本最所寶惜當時士大夫家有此刻者可僂指數而蘇才翁所蓄錢惟演家物也後陳季常得之後曽覿得之最後子固得之嘗江行覆舟入水瀕死猶手之髙出水面不置曰吾性命可棄也而此不可棄其見寶惜如此子固死遂流落江東豫聞諸陳子山子山聞諸張伯雨云此卷意度與今御府藏唐人響搨蓋相似而周君自言得之江東印章題跋其可徴其為李本何疑哉洪武四年嵗在辛亥冬十一月癸巳眉山蘇伯衡識世之論定武蘭亭其說頗不同有謂太宗詔歐陽詢搨本刻石禁中至晉時契丹輦至殺虎林棄而北歸宋慶厯中韓忠獻公壻李氏者獲之及宋景文公帥定武始從李氏之子購藏庫中相傳得於孟水清者並非熙寧中薛師正出守甚珍惜之别刻以惠求者其後師正之子紹彭又勒于他石潛易元刻以歸長安是定武有三刻矣有謂太宗既葬蘭亭繭紙而刻石亦見殉昭陵既發耕氓負石為搗帛用定武一士人見四周龍鳳文隱起知為禁中本以百金市之以歸謂之古定本王君貺知長安移文索入公庫又謂之古長安本既而公庫火石焚馮當世稱入石是定武則有二刻矣傳聞異辭是二說已不能歸於一致况欲索于肥瘦完損之間耶自後轉相摹刻者凡九十餘本而吾婺梅花本而下亦且十家則其去真益離矣此帖上有范文正公米南宫題識知為蘇才翁東齊所藏元祐戊辰南宫又獲之才翁之子洎自後流落靡常不能必其次第中間雖有韓魏公家記及錢氏忠孝家趙彝齊字印不敢意為之說然其精神氣韻實與他本懸絶宜為定武初刻無疑同郡周君致肅冒熱來求題漫一疏之不覺其辭之繁也洪武十年夏六月十又一日金華宋濓記玉堂學士天啓壬戌褉日程友季四招品新茗佳種出定武蘭亭五字不損本有米元章跋張疇齊趙子昻文衡山各臨一本又閲潘貴妃本復聽絃顧曲至夜分誠暢叙勝事也桃花潭水人砢玉識趙承㫖十六跋定武蘭亭上有王曉印章彥升家祕治平四年閏三月實録院裝持國和叔次道同觀攜定武帖過子固湧金門外邸樓因得展卷使人冷然有扁舟水晶宫之想端平三年修褉後九日千巖病翁施商輔蘭亭帖自定武石刻既亡在人間者有數有日減無日增故博古之士以為至寶然極難辨有鑱損五字者又有五字不損者獨孤長老送豫北行攜以自隨至南潯北出以見示因從獨孤乞得攜入都時靜心吳義士䏈舟與余北上出此卷相校即一刻也但五字損耳十三跋所同者無鑱損五字句及與吳義士聮舟相校段至大三年九月五日孟俯跋於舟中獨孤名淳明天台人靜心名森嘉興人蘭亭帖當宋未渡南時士大夫人人有之石刻既亡江左好事者往往家刻一石無慮數十百本而真贋始難别矣王順伯尤延之諸公其精識之尤者於墨色紙色肥瘦穠纎之間分毫不爽故朱晦翁跋蘭亭謂不獨議禮如聚訟蓋笑之也然傳刻既多實亦未易定其甲乙此卷乃致佳本五字雖損肥瘦得中與王子慶所藏本無異石本中至寶也至大三年九月十六日舟次寶應重題此假與十三跋同蘭亭誠不可忽世間墨本日亡日少而識真者益難其人既識而藏之可不寶諸十八日清河舟中河聲如吼終日屏息非得此卷時時展玩何以解日蓋日數十舒卷所得為不少矣草二日邳州北題此段同十三跋昔人得古刻數行専心而學之便可名世况蘭亭是右軍得意書學之不已何患不過人耶同前學書在玩味古人法帖悉知其用筆之意乃為有益右軍書蘭亭是已退筆因其勢而用之無不如志兹其所以神也昨晚宿沛縣十六日早飯罷題同前法書以用筆為上而結字亦須用工蓋結字因時相傳用筆千古不易右軍字勢古法一變其雄秀之氣出於天然故古今以為師法齊梁間人結字非不古而乏俊氣此又存乎其人然古法終不可失也二十八日濟州南待閘題同前二十九日至濟州遇周景逺新除行臺監察御史自都下來酌酒於驛亭人以紙素求書於景逺者甚衆而乞余書者坌集殊不可當急登舟解纜乃得休是晚至濟州北三十里重展此卷因題同前東坡詩云天下幾人學杜甫誰得其皮與其骨學蘭亭者亦然黃太史亦云世人但學蘭亭面欲換凡骨無金丹此意非學書者不知也十月一日同前大凡石刻雖一石而墨本輒不同蓋紙有厚薄粗細燥濕墨有濃淡用墨有輕重而刻之肥瘦明暗隨之故蘭亭難辨然真知書法者一見便當了然政不在肥瘦明暗之間也十月二日過安山北壽張書同前右軍人品甚髙故書入神品奴𨽻小夫乳臭之子朝學執筆暮已自誇其能薄俗可鄙可鄙三日泊舟虎陂待放閘書以上與十三跋同十三跋刻重校宣和格古論內靜心云此卷乃得之李公曽伯蓋宋畫士王曉之所藏曉徐黃同時人觀其寶惜如此誠不易也草日題吾觀禊帖多矣未有若此卷之妙者余北行三十二日秋冬之間而多南風船忩晴暖時對蘭亭信可樂也獨孤本攜以自隨此卷以歸靜心其寶藏毋忽七日書蘭亭與丙舍帖絶相似至大間僕偕吳靜心先生北上得此蘭亭與獨孤老所惠本並觀船忩中三十二日得意甚多屈指計之已復七年矣其子景良馳驛來京師復出見示使人眷戀不能去手噫靜心仙去其子能寶藏如此為之感嘆延祐三年七月二十三日書于咸冝坊寓舍子昻右定武蘭亭褉飲序當以此為第一真古今絶品至元三年嵗丁丑四月初吉揭傒斯謹題右定武蘭亭乃神妙之本其寶藏之不可輕易與人也康里巙題僕曩時侍趙文敏公學書暇日嘗論禊帖定武本佳者絶難得僧獨孤本見存更有趙子固及越人倪仲剛武唐吳靜心此三本流落人間不知何如至正甲申謁瑩之于竹莊出此本見示乃其祖靜心先生所藏文敏公題跋甚詳誠可寶也勾曲外史張天雨自永和九年至於今日千有餘嵗其間善書入神者當以王右軍為第一所謂龍跳天門虎卧鳳闕真不誣也右軍平生書最得意者為第一其真蹟為隋僧辨才所藏唐太宗以計獲之命禇遂良馮承素等摹搨以賜近臣刻石惟定武一本最得其真後世共寶之故石刻當以定武為第一石晉時為契丹輦其石投地棄中山境中後人取龕宣化堂壁薛紹彭易歸其第獻于朝髙宗南渡至揚州而失之其石已亡而碑本散落人間者有數然墨有濃淡紙有精粗摹手有髙下故雖出一石􅗥然不同又有真􅎓相雜非精鑒者不能識也豫平生所見定武本惟此一本紙墨既佳摹手復善無毫髮遺憾千古墨本中此本當為第一自右軍之下唐宋弗論千有餘年後能繼右軍之筆法者惟先外祖魏國趙文敏公當為第一文敏平昔所題蘭亭墨本亦多矣或一題數語或至再題則為罕見不可得矣惟此本凡十有六題復對臨一本可見愛惜之至不忍去手於文敏題跋中此本又當為第一也嗚呼一千年之前惟有一人一人惟有此得意書數千刻中惟此一刻墨本在世者何啻萬計皆化劫灰存至今日惟此一本最精後千年惟有一人一人惟有此一題為至精至賞舉千年之世書法之精妙者無過此一本以此論之金玉易得性命可輕好事家當為傳世之寶不可以尋常書刻觀也豫於至正二十五年秋七月購得於吳城如獲重寶玩弄不舍後之子孫當世寶之毋為富者財物所役毋為强者勢力所奪真吾之子孫也苟能専心臨摹數千遍雖不能企及前人要當不讓今世能書者遂識而藏之黃鶴山人王蒙書唐太宗得右軍蘭亭真蹟使趙模搨以十本賜方鎮惟定武用玉石鐫之江左所傳會稽石也錢氏歸朝定武冨民買之以還一云文宗朝舒元輿作牡丹賦刻之碑陰薛尚書帥定武求弗得子紹彭于公厨見鎮內石有賦在背乃别刻易之攜玉石歸長安宣和中詔取入乃連夜墨搨冀得多蓄流傳人間每疊三紙加氊墨焉故最下近石字內為真在上二紙字畫愈細榮芭云長安帥薛嗣昌紹彭之弟也時內侍梁師成為長安承受官批㫖取舊刻嗣昌倉卒以紙三幅作一重撫石第一本墨深第二本墨淺第三本又加淺世謂之蟬翼本一云唐歐陽詢摹蘭亭稿最為逼真太宗愛之刻置學士院後朱梁徙于汴耶律氏輦載寶貨圖書而北至真定德光殂棄此石于中山李學究得之不以示人韓忠獻之守定武也李生始以墨本獻公索之乃瘞地中另鐫以進公又一紀李生謝世其子出石模售每本須錢一千由是好事者爭取之其後李氏子負緡無從取償時宋景文守定乃出公帑金代輸之匣石藏于庫非貴游交舊不可得也一云慶厯間宋祁帥定武有士子攜此石至郡死於營妓家樂營將河水清見而識之取以獻祁為龕石郡齊遂以定武著名熙寧中河內薛珦出牧定武重摹于外以應求者自是定武有真贋矣珦子紹彭文刻别本留中山攜原石歸長安暗劖湍流帶左右五字各一二筆以私識之世因號五字損本宣和初彭弟嗣昌進上徽宗置睿思殿東壁靖康亂獨此石棄不取髙宗駐蹕廣陵宗留守汝霖見石馳獻踰月北騎大至盡棄御用諸物獨瘞石渡江後揚帥向子固奉密㫖搜訪竟不獲一云國朝宣德四年揚州某寺僧舍發地得二石乃蘭亭舊刻兩淮運使何士英命工截齊合之為一前所存者十八行止猶不二字後存者十行起能不二字明年士英致仕攜歸金華燬于火又有以何轉運獲石民間一面肥本一面瘦本惜遭回祿是定武絶迹矣余再考之得康伯可云舊刻與岐陽石鼓俱載以北宋定國常從北使言在所謂中京者則士英所得豈薛師正􅎓刻類耶又張藝叟云靖康中有得蘭亭真蹟者詣闕獻之半途而京城破後不知所在奢望何止李學究中山之獲近董𤣥宰云姜山人遊豫章得蘭亭石蓋農夫鋤田數見夜有火光以為異發而獲之已缺兩行真定武宋搨也惟好事者加意搜訪耳杆蘭主人玉識自山谷嘉定武以為肥不剩肉瘦不露骨於是士大夫爭寶之其實或肥或瘦皆有佳處又以定武自有三本獨民間李本為勝其餘用李本再刻益瘦細矣蔡山父云豫見唐刻本有二一是貞觀間石刻一是泗南山杜氏所藏本崇寧初米老嘗模于寶晉齊號為三米蘭亭鋒勢筆法絶不類他本區區珍愛定武者是不知有唐刻也其二唐刻為汪丞相逵藏而季路所蓄褉序至多有汪氏本刻同豫章自第十至十四行橫裂後有汪德輝忠衛社稷之家一印足徴吾家之不沾沾定武焉余更見賜潘貴妃正本弇州跋有云開皇石本禇可南臨本皆行筆也定武稍真為一時賞重然米南宫絶不喜之其後摹者日益楷而小非復故步矣相傳定武為歐陽率更臨故楷法多勝禇河南臨則行法勝蓋皆以其質之近為之耳米筆佻以故不為定武左袒噫先荆翁嘗收褉序數十種多宋搨乃余徒好之而不能守兒淵僅僅能執筆倣佛何日若米氏得唐刻本父子三人逐字撫于第一軒甘露降其家西山書院梧桐上以侈一時勝事庶不辜豫考定武意乎時癸未中秋日看桂花莊有十尋之蕉結甘露如九品蓮採供韻齊官窑吐壺厯小春朝猶未凋是亦足當寶晉墨瑞矣漫贅之俟後賢耽此道者蘭上里墨王侍者玉再識定武五字損本蘭亭僧茂隆作圖於紙上紹興壬戌正月晦日觀于三衢之傳舍傳明吳說紹興三十年十月丁巳孫覿攬桂折堂蘭亭已矣而定武舊本帖猶得於今見之是石之壽固永於人而紙之壽又永于石也泰定丙寅暮春之初觀于會稽寓舍不勝斯文之感嘉興後學俞鎮伯真父白文余見蘭亭石刻多矣如此本殊不易得世以筆墨肥瘦論者是殆得其形似耳鄧文原世傳蘭亭石刻甚多如月印千江在處可愛葉世昌考之備矣此卷五字鑱損本紙精墨妙又有僧隆茂宗所畫蕭翼賺蘭亭圖于後誠為佳玩至順四年十月柯九思跋禊帖一卷吳故家物收藏有緒後有吳傳明孫仲益跋語當紹興時定武石毁未久已為人所傳玩况二百餘年之後哉是可寶也安陽韓性明善世傳蘭亭刻石惟定武本為妙然古今議者不一故有叙訟之說葉世昌蘭亭考十卷最為詳博然不若姜白石所著簡明可誦大意謂真蹟隱臨本行世臨本少石本行世石本雜定武本行世然但言其自出耳未嘗及其真贋也惟齊東野語載姜白石所書偏傍考謂持此可以觀天下之蘭亭矣其所論凡十有五處余平生閲蘭亭不下百本求其合於此者蓋少近從華中甫觀此乃鑱損五字本非但刻搨之工而紙墨亦異以白石所論偏傍較之往往相合誠近時所少也其后跋者七人而鄧文肅善之柯奎章敬仲皆極口稱之二公書家者流而柯尤號博雅其言如此豫又何容贅一辭哉嘉靖十一年六月草有七日衡山文徴明識五字損本者湍流帶右天五字有損也又崇山字中斷六七八行為裂本亭到幽盛遊古不羣殊為九字不全本其天字全者為定武肥本天字小損者為定武瘦本至南紹興元年刋定武初搨後有寶字天印及御製跋為御府本先是元祐四年張操官邯鄲摹家藏真定武於石為邯鄲本若五字不損更有棗木刻本彼古今士人所藏褉帖即一定武未易殫述也玉水識又别本蘭亭姜白石題蘭亭出於唐諸名手所臨固應不同然其下筆皆有畦町可尋惟定武本鋒藏畫徑筆端巧妙處終身效之而不能得其髣佛世謂此本乃歐率更所臨豫謂不然歐書寒峭一律豈能如此八面變化也此本是真蹟上摹出無疑學右軍書者至蘭亭止矣今世所傳石本刓一角者皆定武所自出也然其工拙妍醜如人面之不同覽者自當具眼耳又定武一石前輩紛紛各有異論既有眼必知所擇定不向人言下轉也此卷有山谷題字山谷之言云爾乃知當時真贋混淆矣山谷之孫字子邁今為農丞過豫見後題欲令去豫不忍與以為去此題則蘭亭廢矣周翰者文及之字多見其名於書帖後雅尚如許亦足以贖粉昆之疵矣嘉泰壬戌十有二日白石道人姜䕫堯章書跋言白石蘭亭偏傍考云永字無畫發筆處微轉折和字口下橫筆稍出年字㸃畫上凑頂在字左人反剔嵗字有㸃在山之下弋口之右事字腳斜拂不挑流字內云字處就回筆不是㸃殊字挑腳帶橫是字下匹三轉不斷趣字波略反捲向上欣字缺右一筆作章草發筆之狀不是捺抱字已開口死生亦大矣亦字是四㸃興感感字戈邊是直作一筆不是一㸃未嘗不不字反挑腳處有一闕又仰字如針眼殊字如解瓜列字如丁形云字微帶肉各處模本蘭亭石刻癸丑二字略小而相連崇山二字傍注因寄所托因字中改曽不知曽字旁注作僧字向之二字痛哉痛字悲夫夫字斯文文字皆改而筆畫重視昔之下圈去二字東觀餘論云晉史逸少傳無曽字乃是徐僧權得之用名字小印押縫嵗久止存僧字後誤為曽字脫落添之耳封禺山史玉識時獲觀唐翰林書人劉秦妹所臨禊帖於修竹吾廬清泉白石間復州裂本蘭亭卷首錢霅川作賺蘭亭圖詳考諸裂本載重校宣和格古論鼠鬚注硯寫流觴一入書林久獲藏二十八行經進字回頭不比在塵梁吳興錢選舜舉右復州裂本蘭亭雁行定武宋理宗賜賈平章一百十七種號為十冊此其一也戊申嵗中元日趙子嵩觀於廬陵凌波閣伯慈伯武侍宋搨蘭亭以復州為勝蓋真定武乃瘦本復州以真本重模亦鐫損四字其字極瘦有風韻玉述玉枕蘭亭帖一在南京火藥劉家一在紹興府今皆不存褉帖自禇河南縮為小本或謂歐率更亦嘗為之此本有右軍小像題曰秋壑珍玩其賈氏所重刻者耶景定間似道柄國凡蘭亭遺刻之在世者鮮不資其玩好也金華王禕子克跋玉枕刻今在福州府庠趙松雪亦作此蠅頭小楷方四五寸字行如古木蘭亭余家藏褉叙又有大草書王元美所謂縱慢生稚與右軍真蹟不相似獨於督策處小近筆陳圖耳水玉磊砢者識永和九年王逸少為會稽內史時年三十有一與太原孫承公四十有一人修袚褉於蘭上里書序用蠶繭紙鼠鬚筆遒媚徑健絶代更無凡三百二十四字有重者皆具别體然中之字有二十許變轉悉異如有神助及醒後他日更書數十百本終不能及唐何延年謂此言過矣右軍書豈減禊帖但此帖字數比他書最多若千丈文錦卷舒展玩無不滿人意常在心目不可忘非若其他尺牘數行數十字如寸錦片玉玩之易盡也是不然蘭亭叙草誠有神助焉宋華鎮記聞右軍上已日修禊在天章寺有墨池鵝池皆遺迹池不甚深引溪為源每朝廷恩命至池墨必先見皇祐中忽三日連發未幾御書至趙清獻公嘗親到池上與僧約曰池墨果見當為聞于朝既􅌊香致禱須臾池面墨光墨色倍常因貯於罌獻之任屯田布罷任遊山以香酒祭地倐忽墨色見任留詩曰曹郎吏何多幸親見池中墨水生復齊漫録臨川王右軍墨池每貢士之嵗或見墨迹㸃滴如潑出水面則必有登第者又華鎮云鵝池與墨池相近中有白魚長數尺有捕者魚則騰躍而起其鬛如銀下前池而去後復見於池中是寄興處尚多靈異而專心上豈無神助乎若右軍自珍此稿祕藏于家七傳而至智永為子徽之𣲖舍俗為僧居越之永欣寺以其手臨真草千文八百本散施浙東諸寺蘭亭序則以授弟子辨才唐文皇三召恩賜甚厚求禊帖終不與善保家藏抑可重也蕭翼之賺殊多妙用正見蘭亭竒祕處尚論者何必拘拘以史證之邪夫宋之憲聖太后猶嗜蘭亭不去手劉珙春帖子云內仗朝初退朝曦滿翠屏硯池渾不凍端為寫蘭亭况文皇英邁風雅敻出千古宜乎寢食與禊帖俱故後人有玉枕之摹如賈師憲好蘭亭藏石刻主八千匣使其客廖瑩中𠫭校諸本擇其精者命婺工王用和以靈壁石刻于悅生堂經年乃就特補勇爵酬之所謂悅生蘭亭也善乎周公謹之言曰蘭亭不列官法帖中亦前輩選詩不入李杜之意潄六齊主人再識珊瑚網卷十九
