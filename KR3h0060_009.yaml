body:
  text: 珊瑚網卷九明汪砢玉撰法書題跋趙子昻諸賢天冠山題詠龍口巖峭石立四壁寒泉飛兩龍人間苦炎熱仙山已秋風洗藥池真人棲隱處洗藥有清池金丹要沐浴玉水自生肥鍊丹井丹成神仙去井洌寒泉食甘美無比倫華池咽玉液長廊巖循巖如長廊下有流泉注山中古仙人步月自來去金沙嶺攀蘿緣石磴步上金沙嶺露下色熒熒月生光炯炯升仙臺仙臺髙幾許時時覆雲氣一去三千年令人每翹企逍遙巖兹巖足逍遙下可坐百人豈徒木石居直與猿鶴鄰靈湫靈湫不受汚深淺何足計小憩松竹鳴蕭蕭山雨至寒月泉我嘗逰惠山泉味勝牛乳夢想寒月泉携茶就泉煮玉簾泉飛泉如玉簾立下數千尺新月橫簾鈎遙坐挂空碧長生池竹實鳯時至水清魚自行著我草亭裏危坐學長生道人巖道士本避世問之無姓氏如何千載後石室有人至雷公巖雷公起卧龍為國作霖雨飛電掣金蛇其誰敢豫侮石人峯巨靈長亘天何時化為石特立千萬年終古無人識學堂巖仙人非癡人山中猶讀書嗟我廢學久聞此一長吁老人峰有石像老人宛然如繪素稽首禮南極蒼蒼在煙霧月巖月巖如偃月風泉灑晴雪仙境在人間莫成兩竒絶鳯山山雞愛羽毛飲啄琪樹間照影寒潭靜翔集落花間仙芝巖窈窕石室間中有仙人躅説與牧羊兒慎勿傷吾足鬼谷巖鬼谷巖前石唐文字字竒何當拂蒼蘚細讀老君碑風洞石壁何空洞中有風泠然安知列禦冦不向此中仙釣臺仙者非有求坐石視投釣咄哉羊裘翁同名不同調磜潭神龍或潛淵石洞通水府勿遣兒曹劇飛空作雷雨聲香巖山險通鳥道水深有蛟龍誰言仙樂鳴高人方耳聾三山石我有泉石癖甚愛山中居何當從羣公講學讀吾書五面石洞中即仙境洞口是桃源何殊武陵路雞犬自成村小隱巖林藪未為隱山崖猶可梯終當携家去瑶草正萋萋一線天醯雞舞甕天井蛙居坎底莫作一線看開眼九萬里道士祝丹陽示余天冠山圖求賦詩將刻石山中為作此二十八首延祐二年六月二十四日松雪道人小隱巖山鬼小兒足木精遊女神據曽學真隱下視飛花塵聲香巖深睡失明珠猛走飛流涎松花卷輕雨滴滴百重泉學堂巖露盤下金薤雲笈流珠纓泠泠寒巖下猶有嬰兒聲鬼谷巖縱橫太古石短長千歲藤感彼巖居子獨飲古澗氷升仙臺寥寥入太清金門繚紫垣或云有宫府微誦五千言釣臺垂綸落澄潭小魚倐然來大魚引之去釣石何崔嵬一線天兹山可容天舉世皆笑之我不答此語鼓腹支其頤五面石分一只成五五石各有一誰能據其上面面不相識寒月泉曉汲寒泉清明月各在缶缶空不見月引水復在手金沙嶺金沙雖為貴履之傷我足愧彼側布人欲獲無量福長生池飲水人已去山中多白頭青蘋空淺處時見玉蟾浮老人峯髙帽側整整秀領沉重重積此太古雪遂名老人峯三山石三山不可度絶壁峙書堂流水日浩浩太極彌茫茫磜潭沉沉無底谷泱泱太古雲赤日焦下土老蛟眠不聞玉簾泉截玉作明簾不知簾外事應有碧眼仙隔簾見人至石人峯餐玉未得法變形成楚囚九轉乞換骨三沐期點頭仙足巖山深猿狖驚瞬息下神步空飛本無蹤長嘯天上去月巖顧樂嬉遨入地不得騁化為白玉泉倣徨返東井雷公巖神鈞起空洞隂火生羽翰我耳杳不聞白雲在天冠道人巖道人本無姓對客那有言龍口逆石髓鳥迹開雲根丹井金鼎閟寒泉真人彌不壞年深定飛騰子夜吐光怪洗藥池靈根乘月吐肉芝生土肥濯以上源水千歲永不飢鳳山孤飛千仞岡兩翼化為石年年春風時山花成五色風洞罡風轉空輪浩劫不停息此為天地根視之杳無迹逍遙巖形留非自在何者為逍遙青松在谷口白雲在山腰龍口巖弄月紅玻璃匿雲紫芙蓉近矣厭狡獪納息玄虛中長廊巖飛吟起霞珮馭氣躡天梯碧雲布參差纎修與巖齊靈湫靈龜道其前遊倏殿其後歲久深自韜清夜巖下走清容居士書越袁桷氏龍口巖噴薄細成霧噫嘻忽為風孰知生死關在此呼吸中洗藥池隱芝生肥水飛根潄靈泉流香到人世飲者夀萬年丹井古丹深藏井晨光發崖谷有能下取之錫以兩環玉玉簾泉神仙不愛寶萬古玉為簾顧遣天風約當明弄海蟾長廊巖細霧不濕衣落月見長影緩引步虛吟盡此秋衣冷金沙嶺昔踏金沙灘今陟金沙嶺卿來瑣骨觀即是太陽鼎飛升臺絶景斷塵情寥寥入太清可須臺百尺更待羽翰生逍遙巖昔誦逍遙逰長憶藐姑射百世待神人瘦影落寒石靈湫澄空如不測為谷廓能容沙石俱成寶龜魚總是龍寒月泉無盡山下泉普供山中侣各持一瓢來總得全月去長生池竹根飛赤鯉荷葉戲靈龜不道神仙宅長生别有池道人巖斷崖窮鳥道絶頂出秋旻能此髙居者誰非有道人老人峯冠顛風披披垂領雲皓皓諸峯羅兒孫獨得老人號雷公巖神物時時出人間皆震驚誰知崖上看才是小兒聲月巖巖圍徑尺雪天墮第二月豈無凌虛人飛行廣寒闕仙足巖失腳落人間一往不復收遂令學者步只循行迹求鬼谷巖開閣雲無定從衡石作關任渠名鬼谷亦未離人間風洞渾渾復皓皓刁刁仍泠泠空洞幾許如蓄此無適聲石人峯何年餐石髓屹立照清波如此成終古長生亦為何學堂巖翩翩學仙子羣居此山巔定無書可讀姑以聲相傳鳯山聖神千古上風雨九疑空只有山中竹旋為十二宫馨香巖潭水下深黝日星隱文章鼓雲出石氣灑雨作龍香釣臺危石上崟欹清風百尺垂故人恐多事莫道釣翁誰磜潭未始滿盈過何曾波浪興衆皆資善利此獨保無能三山石三山可飛度舟楫不能通莫執兹峯石摹緣浪費功五面石一石作五分何者是真面拄杖試敲看莫作點頭見小隱巖深潛避世塵長恐與名親故是絶知者誰言無隱人一線天太空誰是礙峽徑事幽行天體原無外通君一線明余賦此詩時以小字書之袁伯長學士禮部王繼學尚書趙承旨先後同賦雜書同一卷後云失去復得趙公如前而求書其後偶閲故紙得草藁餘紙漫録之虞伯生甫龍口巖飛泉龍口懸平石鰲背展髙會瀛洲人一笑滄海淺洗藥池長生底須學神芝何處采不見洗藥人清波湛然在丹井丹井只三尺四時無虧盈餘波飲可仙我亦願乞靈玉簾泉天孫織玉簾懸之千仞石垂垂不復收滴滴空山碧長廊巖誰謂山中險長廊亦晏然花開春雨足月落山人眠金沙嶺峻嶺接仙臺仙人獨往來簫聲吹月落鶴羽拂雲開升仙臺高臺去天咫有仙從此升遺迹若可攀山雲白層層逍遙巖老竹空巖裏懸崖飛水前欲識逍遙境試讀逍遙篇靈湫神龍蟠泥沙宅此巖之阻逰人勿輕觸歷歷聽秋雨寒月泉泉清孤月現夜久空山寒不用取烹茗自然滌塵煩長生池修竹夾清池一亭山之西長生人已去誰能汩其泥道人巖道人出白雲空簾為誰碧獨坐誰得知時有鶴一隻雷公巖谷口隂風來山頭暮雲舉但見飛電光山人賀春雨老人峯何年南極星墮地化為石至今明月夜清輝倚天碧月巖飛泉何許來明月此夜滿登髙立秋風妙趣無人欵仙足巖一足不能行神仙寧此留秪以形之似高蹤何處求鬼谷巖道散亦已久世變如浮雲石壁有太古為問空同君風洞清風貯深洞四時長氤氳飄然無遽發散我山中雲石人峯仙人立危峯欲作凌雲舉飄然閲浮世獨立寂無語學堂巖仙人讀書處樵子時聞聲猶勝爛柯者只看棊一枰鳯山孤鳯棲山中白雲護清境朝陽早飛來月落空巖冷馨香巖蛟涎漬頑石磴道何﨑嶇深潭湛古色興雲只須叟釣臺地非七里灘名乃千古同神仙聊戲劇何有一絲風磜潭山川萬古祕雲雨一潭幽何日卧龍起碧潭空自秋三山石三山豈仙居百世真道學荒臺明月秋懷哉彼先覺五面石竒石不為峯何用作五面獨立賞春暉水流花片片小隱巖抽矢射白額歸洞讀舊書小隱不可見後來誰卜居一線天青天何蕩蕩此中才一線大道本來明慎勿安所見東平王繼學士熙朱文龍口巖晴瀑噴飛沫曉雲噓空青我欲探頷珠第恐龍睡醒洗藥池仙苗濯靈根幽池發神光至今池中水猶作芝术香丹井丹成人已仙有井在崖竇如何葛稚川萬里覔勾漏長廊巖修廊深石室香煙曵晴虹步虛聲欲斷行道猶未窮金沙嶺佛將金布地仙以金為嶺笑殺塵世人愛金如愛命升仙臺真仙妙神化平地可飛升喝石為此臺將以遺雲仍逍遙巖萬物皆自適詎獨鷃與鵬何事巖下叟愛讀南華經靈湫巖阿泓水淺無龍曷為靈老君道猶龍占此一勺清寒月泉湛如規玉瑩冷若清氷冽汲來試酌之乃是一片月玉簾泉山月明銀鈎煙蘿垂帶緑何人啓巖扄挂此一簾玉長生池鑿池不為口遊鱗樂其天豈無赤鯶公飛駕琴髙仙道人巖道人昔修道鍊形巖穴中道成人已去白雲鎖青松雷公巖帝遣雷公來為民作年豐夭矯巖下羊孰云非雨工石人峯壁立千仞岡不與世俯仰憑誰喚元章來此拜石丈學堂巖天人無愚懵讀書乃真仙學堂在巖谷此道今誰傳老人峯老仙欲飛騰龍鍾恨無翼笙鶴等不來化作峯頭石月巖誰將修月斧斷此石一彎為報折桂人蟾宫在人間鳯山秋風吹竹實朝陽照梧樹定有吹簫人來此山中住仙足巖飫聞神仙名不見神仙形何年伸一足蹈在幽巖扄鬼谷巖鬼谷久為鬼蒼崖名不磨咄哉千載下儀秦一何多風洞白羽無用搖披襟坐空明不聞萬籟響但覺兩腋清釣洞桐江一絲風萬古蜚英聲築臺學嚴子道人不求名磜潭澄淵窈深碧波光射琳宫時有聽經叟恐是潭中龍馨香巖巖洞深水府貝闕棲幽靈腥霧襲人鼻時作龍涎馨三山石蓬瀛孰云逺神仙在人間中有列仙像白日生羽翰五面石一石俱五面吐納五方氣遙看石上雲時現五色瑞小隱巖陵藪未為僻巖穴入深窈山村總市㕓兹隱孰云小一線天巖上天萬里巖下天一線慎勿謂天小有眼看不見金華王奎景文甫龍口巖噓氣雲修修噴薄雨輕注手擘蒼壁開嶄然頭角露洗藥池長鑱斸靈根濯以上池水餘波濕黃精不洗俗子耳鍊丹井金月淪井底千載水渾赤短綆願汲深三咽生羽翼長廊巖虛􅓏開修廊回風走落葉夜月照無眠披衣來步月金沙嶺築塢真慢藏披沙亦良苦小嶺隔仙家黃金賤如土飛仙臺棄世如脫屣竦身即蓬萊臺空白雲滿笙鶴時歸來雷公巖微陽地中復一鼓元氣行驚起懶龍蟄毋作嬰兒聲石人峯振衣陟髙岡質化日已逺天荒地維折獨立心不轉學堂巖邃然若厦屋中隱列仙居常聞伊吾語不讀人間書老人峯細草胸垂鬍積雪髮飄素相逢或疑年甲子不知數月巖四萬八千戶斫此寶月圓剛風大地動明鏡驅上天鳯山何年覽輝下借此松桂棲春風一振羽百鳥不敢啼逍遙巖並木以為廬片石以為席朗誦逍遙逰小大各自適靈湫坎井蔽荆棘居然閟神靈願借一勺水為霖慰蒼生寒月泉清如三危露冷若太古雪舉瓢斟酌之一洗五情熱玉簾泉仙家金銀闕低垂白玉簾天風忽卷起珩瑀鳴纎纎長生池靈龜或千歲遊魚亦有神會此菊潭水盡夀南陽人道人巖道人仙去久道人名尚存樵青相雄長朅來欲爭墩仙足巖仙人本空飛可望不可即誰能及踵武徒爾泥形迹鬼谷巖清溪絶氛垢靈風滿巖扉空餘山水夀三歎遊仙詩風洞山開空洞腹百竅時一噫獨坐碧窗寒洗耳聼天籟釣臺危石可箕踞投竿俯深清寄語羊裘子釣魚非釣名磜潭潭色深黝黑無底通歸虛安得然犀照下燭鮫人居馨香巖巖谷下空嵌潭底正深黑心清香自聞龍坎在盤石三山石三山擁黌宫濟濟襟佩列但使本心明神􅋖不留訣五面石削成元氣中屹立髙崒律五面雖不同貞堅心若一小隱巖朝市亦可隱上界官府多濯足澗水下晞髮陽之阿一線天坐井祗見小一線難求通蒼蒼覆九有無人為發蒙括蒼林傳以道子昻諸賢賦天冠山五言詩二十八首模寫己盡矣豫遂作唐律一章題卷尾云間間道人吳全節青山特地聳天冠聞説羣仙駕紫鸞浮世黃金空白髮倚雲蒼玉尚玄壇松根怪石千年化檜頂飛泉六月寒宏景定辭神武去鷗波浩蕩錦江干天厯二年六月十有一日雨中書龍口巖日落露光吸春深雨沫飛昻藏無蟄相吐納有仙機洗藥池好在池中水誰留海上方至今人掬處千載有餘香丹井千年井水赤人道有遺丹姹女顔何在飛仙骨已寒玉簾泉泉飛到地垂借問卷何時昨夜崑岡火仙關渾不知長廊巖洞府廊千步苔封不盡春升堂并入室今古豈無人金沙嶺此嶺入仙家金星射日華極知同糞土何用化丹砂飛升臺石湧數層臺髙人去不回肉身無羽翼誰復是仙才逍遙巖欲識逍遙處兹泓隘九州一巖能幾許空有此名留靈湫山靈守此定雲霧起時時人道蓬萊淺龍歸人不知寒月巖寒月至泉底酌泉和月吞秋光氷人齒胸次幾乾坤長生池吞咽華池水仙傳不死方此池名美耳人夀若為長道人巖道人何許人巖冷耿餘情人己無形影如何問姓名雷公巖巖裏有雷公巖前劈怪松寥寥天宇大萬蟄幾秋冬老人峯神散形不化癡頑一老翁仙人鍊石髓何日為還童月巖老得仙藥依巖晝夜明可憐天上者不似我長生仙足巖石上巨人迹傳聞古亦然巖今露一足那不是飛仙鬼谷巖巖是仙人宅猶存鬼谷名黃冠如此衆誰解説縱橫風洞日日洞門開清風洞裏來天生仙鏡界不許有塵埃石人峯塊石立巖扄頑然不復靈空令千載下猶説是仙形學堂巖道侣作非像巖居恐腹虛仙經人不識當是讀何書鳯山何年來覽德疑此類岐周綵羽今誰見山名自爾留馨香巖是此斬蛟地腥風冷幾年空巖香氣滿定有水中仙釣臺臨水臺千尺人家不姓嚴今無釣鰲手贏得老龍潛磜潭磜髙開洞府此宅有龍君不盡池中水須容世上分三山石三片山根石侵雲品字排時時會孔老東觀復西齋五面石統體一太極居然五氣分無由知艮背面面自生雲小隱巖仙人不可見來往太虛空瑣瑣巖居者何由與爾同一線天巖髙天破碎一線不堪紉莫道女媧死彌縫自有人元統乙亥余自洪校文還吾宗丹陽師出示天冠山二十八詠皆朝貴手筆余何敢下注腳然以宗誼重師請不能辭它日見者必曰何物小子敢汚此卷則知罪矣祝堯龍口巖何年鑿山骨雙闕鬱崢嶸行人不敢近中有風雨聲洗藥池仙家種瑶草飬之日月華藥池流水出世上得胡麻丹井羽人千載去丹去春泉肥何如未央宫銀牀生夕霏玉簾泉泉影懸玉簾瀑布界青壁神君騎黃鶴隱士欹白石長廊巖長廊不可居四時嵐氣寒别有如堂者好作玄都壇金沙嶺金沙生嶺頭仙子鳬舄穩空谷無足音髙人樂真隱飛升臺步上升仙臺飄然隔萬塵天低星辰近雲氣常逼人逍遙巖朝看碧桃花夕譜洞簫曲大年駐清景逍遙本無欲靈湫山中有靈湫古來是龍宅墮月沈流光出雲透深碧寒月泉洞天在眼中石竇消古雪自有松桂林因之煮寒月長生池日月馳兩轂催逼世人老飬息長生池千歲童顔好道人巖石巖有仙居終古與石存千年榖城山寂寂誰與論雷公巖雷公不上天收聲息巖戶龜田嘉禾死為起作霖雨老人巖嫋嫋煙霧質宛宛星宿精千歲白髮青誰呼老人名月巖嫦娥老不嫁獨在氷雪宫何年入山中素影滿江東仙足巖仙迹本無蹤凌雲逐黃鵠忽見山中人來言有靈躅鬼谷巖日照神清洞雪封鬼谷巖古仙無姓氏槲葉剪春衫風洞洞口風泠泠日吹松桂寒泉聲夜相和環珮玉珊珊石人峯髙峯似石人天丁斧刀削不見宣和年千秋倚雲幄學堂巖仙骨出靈胎邈與文字謝如何學堂巖囊螢照中夜鳯山文鳥出丹穴飛下青琅玕永謝秦王女長依舜樂官馨香巖種花弱水西斬龍赤岸東夜風吹天香何似博山銅釣臺六鰲戴神山仙宅白玉樓釣客坐空臺此物不可求磜潭寒潭積重泉下有神物棲髙秋吹木葉不敢下漣漪三山石三山在何處迢遞大江東不得丹經訣欲訪浮邱公小隱巖牛下有歌詩丘中有鳴琴歎彼考槃人千載誰知心五面石三山水清淺五面石檀欒苔磴緑蘿合花房映竹盤一線天日車馳九萬天影積一線品彚涵太虛何如管中見柏臺馬伯庸父龍口巖呼吸通元氣飛潛順化機風雷生倐忽造物豈兒嬉洗藥池采藥白雲裏洗藥清池中池水尚香潔仙人已乘空丹井鑿石通泉脈鑄鼎鍊丹砂丹成騎鶴去滿地生雲霞玉簾泉燦爛金為屋玲瓏玉作簾百泉來百道定有老龍潛長廊巖磬聲逺搖曵鐙影明參差洞章歌已徹行道尚委蛇金沙嶺緩步長廊巖更上金沙嶺慎勿貴金沙忘却升仙境升仙臺黃鶴去不返白雲還自飛神仙豈無有何事蹈危機逍遙巖鵬摶九萬里籬鷃飛咫尺所以達觀人亦各適其適靈湫白雲縹眇起驟雨頃刻來神龍一奮迅為農蘇旱災寒月泉嚙水潄齒頰咽雪滌胃腸此泉若寒月飲之年命長長生池滄波幾清淺此水淨無滓應有得仙人洗髓伐毛去道人巖巖花自開落山鳥時來去道人息深深凡聖難窺覷雷公巖隱陽一靣薄蕭翹皆奮飛安知聲原氣蓄此甚細微老人峯雪披素髮短雲覆錦衣長逺近瞻南極髙峰有景光月巖空巖何圓圎老樹亦纚纚天光雲影中明月忽在指仙足巖神仙已霞舉誰復繼其躅安知蓬萊山在此不移足鬼谷巖昔有鬼谷子術知亦多竒遂令後世士靡靡競趨時風洞天地本空洞運化無停機泠然萬竅作起自一噓欷石人峯臨風衣自整對月影偏長獨立經寒暑真成石作腸學堂巖萬象自森列千載瞬息間仙家學無為心境乃清間鳯山鳯有五色瑞千載一來翔往者不可見相期白雲鄉馨香巖月中古桂根巖阿種來久秋風昨夜生馥馥透窗牖釣臺髙臺垂釣人應是經綸手尚父與嚴陵邂逅豈無有磜潭澄潭湛無底俯觀毛髮寒但見龜魚出焉知龍下蟠三山石海上三神山可望不可到即此是三山可與論至道五面石何年星墮天化作五面石面面不相看相看還是一小隱巖山深人寂寂澗曲水沄沄顧爾非忘世遺身在白雲一線天蒼蒼倘飛天天竟何形似莫於通塞中見此一線止京兆杜清碧本子昻行書詩詞白髮思家萬里回小軒臨水為花開故應動作詩千首知是風流楚客才雲淡風輕傍花隨栁將謂少年行樂齋閣林間小車城裏千古太平西洛瞻彼泱泱言思君子流水儼然如昨但清逰天際輕輕未辨暮愁離索長記得童冠相隨浴沂風舞吟詠鳶飛魚躍逝者如斯吾衰甚矣調理自存斟酌清廟朱絲舊堂金石隱几似聞更作農人告有事西疇窈窕挂書牛角右調雨中花北隴耕雲南溪釣月此是野人生計山鳥能歌江花解笑無限乾坤生意看畫歸來挑燈間眺風景又還光霽笑人生奔走如狂萬事不如沈醉細看來聚蟻功名戰蝸事業畢竟又成何濟有分山林無心鐘鼎誓與漁樵深契石上酒醒山間茶熟别是水雲風味順吾生素位而行造化任他兒戲右調雨中花昏曉相催百年忩暗忩明裏人生能幾贏得貂裘敝富貴浮雲休戀青綾被歸與未放懷煙水不受風塵昧右調點絳唇子昻漫書松雪翁雜書八則真迹每則有欵來多去多枉受奔波來少去少省些煩惱一菜一魚一茶一飯客亦可來主亦可辦道士桑芝田求善之先生書盤谷敘復求僕書歸來辭惜無蜀中冷金紙對之俟有此紙别為寫過偶畫得大士像一紙甚有圓滿慈悲之意用作林下布施也孟俯書致習公侍者昔徐信之製筆得名皆由出入叔父尚書門下日令縛一枝不如意輒使拆去細究其工所以得名今人能若是乎可為太息至大二年正月十日子昂志昨日無錫一道友封寄惠泉即命童試新茗果是味别明日當分送何山鐵鏡老看他舌端有眼否余與息齋道人同寓都城張氏林園日以繪事相講訂信非人間之樂也不見十年政如隔世可嘆可嘆今日其家僮回維揚就問道人與竹平安否至大四年二月二日戲書此間紙時髙士石可友在坐子昂友人牟成甫之貧香巖所謂錐也無者豐年猶啼飢况此荒歉將何以果其腹而贍其老稚淵明乞食魯公乞米賴多古賢可為口實仁人義士有能指魯肅之囷而實萊蕪之甑者乎吳興趙孟俯白趙集賢南谷二帖孟俯頓首拜覆南谷真人尊師靜侍孟俯頃到殊勝甚擬得遂晤言然竟成交臂而失至今以為恨舊年草六日還舍除夜來德清新歲二日忽路家遣吏見請三日急回城中乃蒙隆福有書經之召今日至德清别墅明日即過杭詣省中計事數日間即走都下區區情事吾師所深悉政擬卜築溪上以為終老之計而情願未遂極令人倣徨兼居行乏力尤所甚憂感尊師欲寫石壁間大字兾遣人至杭見教所書之文便當寫納但行役擾擾似不能一詣侍下以此為恨大不可言承惠篠至以為感所惠書著園人附航寄往城中乃成墨池敬勒手狀陳敘情素臨紙不勝馳神此行度已不能免然尊師有見教者是勿惜至意乃所望也餘冀萬萬珍重不備人日弟子趙孟俯稽首再拜林師來侍兾道意拙藁至今抄未成當令家下寄去也孟俯稽首再拜南國真人尊師侍者數日來若腹疾不果詣前問候不勝馳仰兹被誨帖惠以新冠領次感激無喻叔實不幸長逝昨日聞之為之痛傷聊以十兩奉之冀為轉達今晚還吳興不能詣别惟善保道體不宣孟俯再拜趙榮祿簡覺軒路教諸迹孟俯連日甚欲一詣行館共談而人事絆之意未能去知罪知罪昨日蒙惠帖下徵惡扎併前者同此奉納但竹石紙狹不可作且寫四詩續當為公作竹石也今日又有少事明旦僣屈台重過此一飯切告勿阻至扣至扣遲言敘不宣孟俯近獲晤言甚慰數年契濶之懷方欲奉陪尚羊湖山間而微恙乃能阻之兹承惠字則知仙舟已解纜矣瞻望悵然惠及沙闕不至舊愛否秋氣著人途中厚自愛不宣孟俯一節疏於上記遙想樓居仙人眺八極而自得唯有仰企而已人來得所惠書就審即日履候勝常為慰千萬承諭以令郎文書已一如來意見之行移旦夕當奉納也逺惠圓米細茶深仭厚意祗領感激無已草草具復寒燠朝暮兾惟善保不宣孟俯久别傾渴無喻伏承惠書審文斾至止不勝欣慰蒙惠白米鵝麵茶果深見盛意祗領感戢無已台體所苦小爾今服何藥専當詣使寓拜問併陳謝私也草草具復不宣孟俯得旨暫還直以家事冗擾未能奉狀計唯即日文候勝常孟俯本為先人墓石未立所以觸熱來歸而石尚未得至殊焦煩耳湖州前録事宣差今還宜興稅務提領在此為政甚平與弊家甚親今在貴里望吾兄照覷幸幸因便奉記草草唯加察餘兾善護不宣孟俯奉别甚久馳仰殊深去夏得旨南還日困塵事不得上記問候惟切傾企而已行次毗陵承專人惠書就審即日文候勝常慰不可言且蒙過愛特貽厚贐拜領豈勝感激舟中草草具答漸逺惟慎護興息不宣紈扇一握拜納付至李尚書墨竹即如來戒各題小詩其上甚愧塵涴畫軸極用惶恐惶恐望日謹空右趙榮祿與覺軒先生手簡共六紙有以知交誼之深家世之舊也先生學行純正為宋琅琊王字仲寶之後仕至蘭溪州判官今獲觀於其孫光大之彛齊老成典型不可復見矣尚賴翰墨文章有以見其風流哉至正二十年歲在庚子二月望日倪瓚謹題余聞荆溪有覺軒王先生繇文學起家至蘭溪州判官生晚不及識聞之四十年見其孫光大出松雪與先生手筆凡六紙內謂樓居仙人眺入極而自得者真可企仰光大乞書楮尾於是乎書至正乙巳冬十月二十有四日會稽抱遺叟楊禎在卷素齋試沈先生樂墨義興舊閥之家得松雪翁者元初唯王氏嶽氏兩家而已治生唐門幼學之時尚多見之到今五十年來訖無片紙存者而嶽氏之後蓋亦寂寥無聞焉今觀彛齊所藏六帖皆翁與其先大父往還書紙墨尚新則知王氏子孫之賢視它族所守厥有間哉因感而識之壬戌歲九月二十又二日為立冬日馬治子昂答子誠劄孟俯頓首再拜知州相公子誠閣下孟俯去嵗騎從來吳興因得略吐久别之懷所恨貧家無可將接坐來簡慢知我最深必不見咎别後賤體老病交侵藥裹不離左右者一年于兹獨坐空齋憒悶無聊子誠聞之必能見原耳他人前不欲道也兹承專價惠書就審履候勝常深以為慰承喻三皇廟碑及光福碑銘托愛如此其敢不書但恐筆墨蕪穢不堪上石耳漫爾書付去人更在裁之外蒙潤筆之贈子誠何必爾耶不敢引辭領次惶愧之極草草具瞻餘唯上為國家下為吏民慎謹興息不宣孟俯頓首再拜五月十九日李西涯跋趙文敏行書坡仙煙江疊嶂卷松雪大書見者絶少東吳王敬之氏有此其永寶之正德十五年十一月十一日李東陽書正德戊辰春三月二十日衡山文璧觀槐兩先生所藏松雪書為補此圖趙子昻書陶詩陸宅之文功楊眉菴徐武跋少無適俗韻一首孟俯書似明逺老兄古者書志凡嘉言譱行聞見必録故經傳皆曰志莫非修齊平治不徒夸多識資談柄是尚其不經者若齊諧志怪之類反以資惑聖人無取後世無傳焉魏晉而下其膾炙人口如世説者亦純駁相半務博者多資之然去經傳逺矣近世惟宋代特盛客談筆録何啻數百家若近思典刑敦倫諸録雖未敢儕諸經傳然敦倫美俗亦足為風化助彼夷堅酉陽無稽浮誕適足蠱愚導姦則又甚於齊諧者以是觀之志録可苟作乎宗人景周博學好古聞善必録皆使言者自書其事大率皆當代賢士大夫嘉言善行將以為循省資志亦善矣然善可法惡可戒與否則在客之見與景周之自擇至正甲辰立夏日雲間陸居仁在千山環翠樓書松江陸蒙者家富而好禮收蓄古書畫彛器甚多一時名人無不獲交有友聞録者楊亷夫陸宅之皆為之序余亦嘗書數詩與之蒙既死家破於兵此文流傳竟歸於余前松雪書亦其家故物因合作一軸異時當訪其子孫有識者還之時洪武四年七月十一日吳門楊基孟載記趙魏公書于規矩之中自有神仙蛻骨風度楊鐵崖狂怪不經而步履自髙陸宅之學藏真而自出機局三公雖髙下不同然皆能以其文章翰墨豪於一時陸景同不知何人乃能筆而得之留落之餘復為吾鄉楊先生所輯觀其題識宛然忠厚可掬皆足重也元聖髙士寶此卷數年矣間出相示因評數語如右東海徐有貞武功崇禎癸未重九日寒山趙子惠來吾禾訪女史黃皆令携其先凡夫所遺物欲售余因得觀此卷并衡山手録甫田全集李北海墨迹宋元人畫及古澄泥研作隂陽對扇開合宋做白玉飛鸞楊萱彩描漆囊魚耳宣罏種種又子惠近作云盛夏非關逼歲除凱風偏不借吹噓抽毫那有生花筆展卷寧無蠧字魚妝束有懷人杳渺榮枯不定任親疏斷雲孤月魂無倚荏苒年華獨掩居欵題扶風馬昭從夫姓也詩與字不下其先陸卿子至寫生逼真其母氏文淑也惜不免去婦嘆耳噫佳人薄命自古為然矣樂卿筆記鮮于奉常書詞子青天無數白天無數緑水繞灣無數灞陵橋上望西川動不動八千里路來時春暮去時秋暮歸去又還春暮人生七十古來稀好相看能得幾度漁陽困學書又草書唐絶真迹單條新妝宜面下朱樓深鎖春光一段愁行到中庭數花朵蜻蜓飛上玉搔頭玄晏先生好著書懶心久與市朝疏君看黃鵠關關去間羡羣鷗戀鼠餘伯機後絶兒淵以若為余設者因雙鈎於髙麗紙置諸屏間云秀水脈望生識小酉石倉間珊瑚網卷九
