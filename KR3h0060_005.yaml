body:
  text: 珊瑚網卷五明汪砢玉撰法書題跋黄文節公書漢人得道陰長生詩三篇維予之先佐命唐虞爰逮漢世紫艾重紆予獨好道而為匹夫髙尚素志不事王侯貪生得生亦又何求超迹蒼霄乗飛駕浮青要乗翼與我為仇入火不灼蹈波不濡逍遥太極何慮何憂遨戲仙都顧閔羣愚年命之遊如彼波流淹忽未幾泥土為儔馳走索死不肯蹔休余之聖師體道之眞昇騰變化松喬為隣惟余同學一十二人寒苦求道歴二十年中多怠惰志放五經避世自匿今廿餘年名山之側寒不遑衣飢不暇食思不敢歸勞不敢息奉事聖師承顔恱色面垢足胝乃見哀識遂傳要訣恩深不測妻子延年咸享無極黄白已成質行不堅痛乎諸子命也自天天不妄授道必歸賢勤加精研身投幽壤何時可還嗟爾將來勿為流俗富貴所牽神丹一成昇彼九天壽同三光何但億千維予垂髪少好道徳棄家隨師東西千億役使鬼神玉女侍側予得度世神丹之力忠州丰都山仙都觀朝金殿西壁有天成八年人書陰真君詩三章余同年許少張以為真漢人文章也以余考之信然因試生筆偶得佳紙為録此詩以與王瀘州補之之季子觀陰君所學守屍法耳猶須擇師勤苦如是乃能得之何況千載之後尚友古人求知道徳之主宰者乎紹聖四年四月丙午黔中禪月樓中書黄涪翁正書法語眞蹟兀然無事無改換無事何須論一段眞心無散亂他事不須斷過去已過去未來何用筭兀然無事何曽有人喚向外覓工夫總是癡頑漢糧不蓄一粒逢飯但知罵世間多事人事相趁渾不及我不樂生天亦不受福田飢來一缽飯困來展脚眠愚人以為笑智者謂之然非愚亦非智不是𤣥中𤣥要去如是去要住如是住身披一破衲脚著娘生袴多言復多語由來反相誤若欲度衆生無過且自度莫漫求真佛眞佛不可見妙性及靈臺何曽受薫鍊心是無事心面是娘生面刼石可動摇箇中無改變無事何須讀文字削除人我本㝠合箇中意種種勞筋骨不如林下睡兀兀舉頭見日出乞飯從頭􅀈將功用功展轉㝠蒙取即不得不取自通吾有一言絶慮忘縁巧説不得用心傳更有一語無過直與細極毫末大無方所本自圓成不勞機杼世事悠悠不如山丘青松蔽日碧澗常秋山雲當幕夜月為鈎臥藤蘿下塊石枕頭不朝天子豈羨王侯生死無慮更復何憂月水無形我常只寧萬法皆爾本自無生兀然無事坐春來草自青元符三年七月涪翁自戎州泝流上青衣廿四日宿廖致平牛口莊養正置酒弄芳閣荷衣未盡蓮實可登投壺奕棋燒燭夜歸此字可令張法亨刻之山谷行書當三錢大計五百五十餘字皆禪翁淡慮任真翛然自得之語書法清遒超朗知其胸不掛一塵也後擘窠大書一段又大判一行山谷書只是沉著痛快平生以飢鷹渴驥自命所以剽去蘇米姿媚而獨全神骨此巻又其合作也日華右魯直所書法語大如薝蔔華後年月字至末每行一字字幾並頭菡蓞在宋白楮上楮髙尺餘長二丈絶無接縫想公欲畢此紙故大揮足之耶時崇禎壬申冬盛友念修欲余嘉定盆樹姑以此卷相易成林獨樹入畫者約百本盆俱定均州龍泉青東磁宣徳填白嘉靖回青不一石俱靈壁將樂英崑種種愚父子得之於練川陳情甫輩供玩數十年矣今擬北㳺恐培灌失課如天啓丁夘之變致枯瘁不少遂割愛易去亦喜日夕對山谷老人墨彩也及余居蓮濵遂鈎其蓮登二字以名草堂又取弄芳閣用顔小眺處若世事悠悠至更復何憂一段昔年郁伯承嘗勒石今竹懶翁假閱著語然未題巻意將面商之耳奈未幾受貧累復質好事家可勝惋惜因憶癸亥秋寓金臺過呉蹇叔齋頭得觀山谷椀書蓮經為呉文端公所藏董𤣥宰宗伯跋之有云兄事蘇而弟蓄米真不啻解衣獲珠開花見佛如桃源漁父一見不再見何如法語久伴琴樽更開松扉竹檻中眉目也復何恨石林中人汪砢玉記于小窻濠樂處黄山谷草書釋典眞蹟元祐九年四月戊申書贈髙城蔣叔震山谷道人此數字本色書余在翰林時暇日同㬅碩揭公過看雲堂呉大宗師以古銅􅂒焚香嘗新杏因出示黄太史真蹟適松雪趙公亦至謂山谷公得張長史圓勁飛動之意今觀此卷信不誣矣余以老病空山安得諸公同一賞玩即臨風執筆益重懐賢之思云青城山樵者虞集謹識右山谷黄文節公書楞嚴經真跡一巻潛心蘭亭進以鐘張鋒芒圓勁猶神龍之自試韻度飄逸如天馬不可羈黄公行髙天下於一藝亦造古法觀斯遺墨從可槩見宗𤣥得而敬愛之不啻已出其風裁之峻整又可知矣展玩數四為之嘆服洪武丙辰立秋金華宋濓書于玉堂之署徐霖子仁據山谷與蔣叔震帖中語云是清公頌頗詆宋太史之失無所考未知然否凡事至於入神之境則自不可多有蓋其𤼵之亦自不易非一時精神超然格度之外者不爾也山谷書如此卷則真所謂神品矣捕龍蛇搏虎豹乗風霆而上下太清誰得而襲其蹤跡也汪宗道居留都繁麗之下博雅好古收蓄唐宋遺墨甚富此其尤祕重者間出相示賞歎彌日輒嵗月如此𢎞治癸亥秋九月既望蘇人祝允明書山谷真跡流傳者余及見凡三種在季氏王氏華氏皆大草筆勢牽連不絶人謂皆紹聖以後之筆蓋公嘗因錢穆父謂公猶未見自序帖心有所未平紹聖二年謫黔獲見之遂深契藏真之法而自入神矣此元祐九年四月戊申書者當是穆父初言時也山谷人品髙詣集諸家之成若虞道園宋潛溪謂其造鍾王及張長史之域而未及藏真者亦見諸先生不徒言也道園跋澷言此巻末指其所書何段文字潛溪雖云楞嚴經而子仁辨之謂乃清公頌據山谷與叔震手書云寄送清公頌頗見志願不忘般若中也以頗見二字似美叔震之意疑乎清公頌叔震所作者後云手抄去觀音贊論所抄當出其手書尚未知果否宗道好古之士宜更覈之可矣後學長洲沈周余晚生多幸平生獲觀涪翁真蹟巨巻不下數種如正書𤼵願文精妙入神字大於杯又大書發願文文字不同書於匹紙上字幾盈尺草諸上座乃書法三昧也又草書太白秋浦歌十五篇於粉箋上又草書杜少陵秦州雜詩又正書伏波將軍廟詩真得英雄矍鑠之氣以上皆書于紙上唯此乃絹書髙二尺許字及百行有竒凡千餘言文多不録妙備諸題中也此巻今歸我天籟閣元汴黄文節公小真行書三帖共一卷在楮上坐禪箴杭州五雲志逢禪師坐不拘身禪非涉境拘身心疲涉境非靜不涉不拘真光孤迥六門齊應萬行同如嗟爾初機未達𤣥微處沉潛隨掉能支離不有權巧胡為對治驅策仰按均調惛亂息慮忘縁乍同死漢隨宜令開靡專壁觀馳想頗多安那鉢那沿流劔閣無滯木鵝如火得水如病得醫病瘳醫罷火滅水傾一念清淨體寂常靈是靈是寂非靈非寂是非送生犯過無極前滅後與還如步走患乎不知知則無咎日猶背夜夜鏡不照此則不然圓明通透照而不縁寂而誰守萬象森羅太虛閃電推壊魔宫衝倒佛殿跛者得履瞽者發見法界塵寰齊輪頓現曠蕩郊㕓或坐或眠既明方便乃號金仙吾雖强説爰符聖言聖言何也要假重宣不動不禪是無生禪又云若學諸三昧是動非坐禪心隨境界流云何名為定故知歴代祖唯傳此一心祖光既逺大吾子幸堪任聊述無言㫖乃曰坐禪箴志逢餘杭人通貫三學嘗夢補彌勒處師子月佛者也得法於紹國師開寳初老于五雲山華嚴道場庭堅謝趙王賜酒庾信梁王修竹園冠蓋風塵喧行人忽枉道直進桃花源稚子還羞出驚妻倒閉門始聞上傳命定是賜中樽野爐然樹葉山桮奉竹根鳯池還更暖寒谷遂長暄未知稻粱鴈何時報君恩庾信字子山南陽新野人在周為開府義城公與滕趙諸王周旋欵至如布衣交趙王招字豆盧突好屬文學庾信楊堅輔政將遷周鼎招密圖之要堅至第飲於寢室後院伏壯士屢以佩刀割𤓰啖堅元胃覺變附耳語因辭出庭堅慈竹詩門中何物靈有竹慈為名一叢濶數步森森數十莖長莖覆短莖枝葉不崢嶸去年筍已長今年筍又生髙低相倚向渾如長㓜情孝子侍父立順孫隨祖行居然抱慈孝根底信天成吾聞唐之人孝行常欣欣鄆州張公藝九代同一門大帝聞其名衡茅降至尊馮宿丱嵗時隨父廬祖墳父子相隨孝靈芝特地春北海吕元簡四世同家主以至牛馬羊異母皆相乳虞鄉董公直鞠養諸孤遺鸜鵒與鵶鵲同巢而共枝孝行動天壤鳥獸皆隨時又聞猓􅛊獸死不相棄離􅝒􅘿與蛟魚子母長相隨獸面而人心此獸信有之獸心而人面其人誠可悲李鈞為侍御棄母在闕州母因殍餓死世闕何悠悠光禄李闕者亦是斯人流有母不侍養異居經千秋唐家法網寛貸死流遐陬崔湜為侍郎天子賜𤓰香㩦歸與愛妾老母不得嘗一旦惡貫盈殺之於路傍越公鐘紹京至孝何殊常小時得𤓰果先解進髙堂長大遇𤣥宗一夕登巖廊孝者名長新逆者汚人倫人既不如竹乃是一埃塵夫為人子者莫若事尊親夫為人父者莫若訓兒孫積善與仁孝可以立于身我願移此竹栽於率土濱使彼行人見皆為慈孝人樵童見此竹且莫伐我薪志賢堂印朱文御書之寳朱文魯直緑菜贊墨蹟蔡蒙之下彼江一曲有茹生之可以為䔩蛙蠙之衣采采盈掬吉蠲既澤不溷沙礫和以辛鹹宜酒宜餗在呉則紫在蜀則緑其臭味同逺故不録誰其𤼵之班我㫖蓄維女博士史君炎玉按此賛末句言史君炎玉蓋指眉陽望族史氏女名琰字炎玉髫丱資頴嗜學蘋蘩綫纊一不介意善屬文雅安張誾少卿出守眉陽聞其才賢納為冢嗣子履之婦炎玉日㳺心於編簡翰墨平生遊覽之勝燕笑之適與子履詩酒酬唱格調閒雅久而盈篋手自敘次目曰和鳴集而少卿之室於山谷老人為姑輩子履實其親表也因寓書致緑菜為信山谷珍其品以贊謝之褒其為古女校書云紹興甲戌秋徐宏中跋黄文節公書伏波祠詩右黄文節公書劉賓客伏波祠詩雄偉絶倫真得折釵屋漏之妙公嘗自言紹聖甲戌黄龍山中忽得草書三昧又云自喜中年字書稍進此詩建中靖國元年五月乙亥荆南沙尾書於時公年五十有七正晚年得意書且題其後云持到淮南示余故舊何如元祐中黄魯直書也按公自評元祐中書云徃時王定國嘗道余書不工余未嘗心服由今日觀之定國之言誠為不謬蓋用筆不知擒縱故字中無筆耳字中有筆如禪家句中有眼非深解宗趣豈易言哉此書豈所謂字中有筆者耶公元符三年自貶所放還建中靖國元年四月抵荆南崇寧元年始赴太平凡留荆南十閲月嘗有辭免恩狀云到荆南即苦癰疽𤼵於背脇毒痛二十餘日今方稍潰而此帖云新病瘍不可多作勞正𤼵背時也嘉靖十年辛夘冬臘月三日徴明書黄太史草書李太白憶舊遊寄譙郡元参軍玩物䘮志君子不取也余幼而失學粗喜冩字雖未知行草之妙亦嘗留心如蘇東坡黄山谷米元章數家翰墨甚酷愛見每見真偽僅能别之余守長樂郡客有董君詳者手擕草書一幅自云沉埋泥中人鮮能辨今求教而就贈君余拂拭展玩驚喜歎異謂君詳曰此山谷真蹟也居無何閩七季明父來訪出而示之明父隨曰李太白詩也前猶有文惜乎斷簡耳及觀全帙乃知憶舊逰寄譙郡元參軍之作考其遺落凡八十字噫雖豫章之筆無以復加然謫仙之詩不可不補故足而記之深有望於珠還劍合之時他日果如吾言豈不為盛事也哉其辭曰憶昔洛陽董糟丘為余天津橋南造酒樓黄金白璧買歌笑一醉累月輕王侯海内賢豪青雲客就中與君心莫逆囬山轉海不作難傾情倒意無所惜我向淮南攀桂枝君留洛北愁苦思不忍别還相隨下接迢迢訪僊城元貞乙未烈子野人張鐸書于山三英建坊之為已堂山谷書法晚年大得藏真三昧此筆力恍惚出神入鬼謂之草聖宜焉嘗記元祐中子瞻蘇公穆父錢公同觀公揮翰作草於寳梵僧舎子瞻賞嘆再四穆父在傍曰君見自序真蹟當更有得公一時心有所未平紹聖謫黔中始見石揚休自序帖縱觀不已頓覺超異乃服穆父之言也觀此信是紹聖後所書者凡與藏真合作但篇後有闕文當時藏真自敘有二本一為石揚休所蓄是矣一蓄蘇舜欽所蘇本前亦有所遺後世以為惋惜今此巻之不全殆天亦欲㝠契之也尚古宜寳藏之正徳改元清明日長洲沈周跋雙井之學大抵韻勝文章詩樂書畫皆然姑論其書積功固深所得固别要之得晉人之韻故雖形貌若縣而神爽㝠㑹歟此巻馳驟藏真殆有奪胎之妙非有若似孔子之類也其故乃是與素同得晉韻然耳今之師素者大率鹵莽求諸其外動至狂妄又是優孟為叔敖抵掌變幻眩亂人鬼只能惑楚豎子耳亦獨何哉巻跡英氣横𤼵於其本書故是平生神品尚古光禄先生藏獲過於至寳嘻老谷不死之神在華氏矣呉郡祝允明跋右一卷與蔣叔震書所謂清公頌同一筆意真紹聖後神化之書山谷大書贈元師詩冊元師自榮州來追送余於瀘之江安綿水驛因復用舊所賦此君軒詩韻贈之并簡元師從弟周彦公庭堅嵗行辛巳建中年諸公起廢自林泉王師側聞陛下聖抱琴欲奏南風絃孤臣䝉恩已三命望堯如日開金鏡但憂衰疾不敢前眼見黒花耳聞磬豈如道人山繞門開軒友此嵗寒君能來作詩賞勁節家有曉事揚子雲籜龍森森新間舊父翁老蒼孫子秀但知戰勝得道肥莫問無肉令人瘦是師胸中抱明月醉翁不死起自説竹影生凉到屋椽此聲可聴不可傳建中靖國元年正月辛未江安水次偶住亭書山谷楷書趙景道帖并絶句詩八首昌州使君景道宗秀也往余與公壽景珍遊時景道方為兒童嬉戲今頎然在朝班思公壽景珍不得見每見景道尚有典刑宣州院諸公多學余書景道尤喜余筆墨故書此三幅遺之翰林蘇子瞻書法姢秀雖用墨太豐而韻有餘於今為天下第一余書不足學學者輙筆愞無勁氣今乃舍子瞻而學余未為能擇術也適在慧林為人書一文字試筆墨故遣此不别作記庭堅頓首景道十七使君五月七日山谷道人硃文印九陌黄塵烏帽底五湖春水白鷗前扁舟不為鱸魚去收取身名四十年甓社湖中有明月淮南草木借光輝故應剖蚌登王室不若行沙弄夕霏右奉呈外舅孫莘老小黠大癡螳捕蟬有餘不足䕫憐蚿退食歸來北窻夢一江春月趂魚船桃李無言一弄風黄麗唯見緑忽忽人言九事八為律倘有江船吾欲東右歸自門下後省卧酺池寺書堂映日低風整復斜緑玉眉心黄袖遮大梁城裏雖罕見心知不是牛家花九疑山中萼緑華紫雲承襪到羊家真筌蟲蝕詩句斷猶託餘情開此花仙衣辟積駕黄鵠草木無光一笑開人間風日不可耐故待成隂葉下來湯沐冰肌照春色海牛押簾風不開直言紅塵無路入猶傍蜂須蝶翅來右和王仲至少監詠桃花四首用其韻革頃與徳麟逰頗聞元祐諸公言行之緒餘及兹朅來臨漳路鈐趙昌叔相與款厚因出示山谷道人與其先丹陽君往來書帖及詩詞想見前修風流餘韻而貴公子樂善喜文之髙致也舟陽君徳麟之兄而昌叔徳麟猶子也然則好事喜賓客蓋有家範云温革叔皮父光風轉蕙汎崇蘭此山谷先生小楷氣象石湖居士題漢武帝故事曰上起神屋以珠為簾箔玳瑁壓之東坡辭云銀蒜押簾此山谷改壓簾作押簾之自來也温叔皮字畫亦蒼老嘗為尚書郎著瑣碎録酺池寺書堂詩云人言九事八為律立儒讀主父偃傳上書言九事其八事為律令一事諫伐匈奴併識巻後建袁立儒書谿翁續得山谷題前定録等八詩小黠大癡螳捕蟬二篇居其中遺趙景道者小字送李伯牖者大字予兼而有之於好古博雅不曰徒費光陰矣寳祐甲寅中秋日書有谿翁堂印山谷老人與趙景道帖并絶句詩八首今藏海虞錢工部士𢎞家前有賈丞相似道恱生印及封字印蓋宋末嘗入其家恱生乃其堂名聞之昔人似道藏法書名畫甚富妙品輒用二印識之後宋人三跋中有石湖居士者予鄉先生范文穆公至能也正徳庚午春三月前進士呉門都穆巻中有宋元官印三前一為提領措置㑹子庫印後二為福建提舉司之印恐知之者或寡故附著之黄文節公草書秋浦歌紹聖三年五月乙未新開小軒聞幽鳥相語殊樂戲作草遂書徹李白秋浦歌十五篇時小雨清潤十三日所移竹及田野中人致紅蕉三十本皆已蘇息唯自籬外移橙一株植籬裏似無生意蓋十三日竹醉而使橙亦醉失其性矣知命自黔乞得一畫眉云頗能作杜䳌語故攜來然置之摩圍閣中時時作百蟲聲獨不復作杜鵑語而客談此鳥云此豈羊公鶴之苖裔耶余少頗草書人多好之帷錢穆父以為俗初聞之不能不慊已而自觀之誠如錢公語遂改度稍去俗氣既而人多不好老來漸嬾慢無復堪事人或以舊時意來乞作草語之以今已不成書輒不聴信則為畫滿紙雖不復入俗亦不成書使錢公見之亦不知所以名之矣摩圍閣老人題山谷道人印字學至唐最勝雖經生亦可觀其傳者以人不以書也褚薛歐虞皆太宗之名臣魯公之忠義公權之筆諫雖不能書若人如何哉豫章先生老友文章師表一世咳唾之珠聞者興起況其書又入神品宜其傳寳百世恭聞徽宗皇帝評公之書謂如抱道足學之士坐髙車駟馬之上横斜髙下無不如意聖人之言經也晚學小子尚安所云張安國跋書史㑹要以張安國為歴陽人若張于湖名孝祥字安國也豫章先生襟宇洞達意趣豪逸超然埃壒之表其書之妙當以九方皋相馬法觀之楊士竒敬題嘗見楊東山跋王盧溪遺引山谷家書云摩圍閣在黔州南寺閣正對摩圍峰蜀人呼天為圍屋極寛潔瀟洒冬温夏涼風物似江西大抵先賢君子直道而行雖處憂患無所悔尤胸次明淨無往不適也士竒又題書法之變至宋極矣然君謨尚有晉唐餘意蘇黄及米始大變也學者必求之忠惠之上其庶幾乎士竒三題涪翁書太白詩十五首筆法頗不類故常或疑非真蹟此不知書故也翁嘗自評元祐間草書筆意癡鈍用筆多不到晚入峽見長年盪漿乃悟筆法又云紹聖甲戌在黄龍山中忽得草書三昧晚年之作因與少時異矣安得復以故我求之其間或以筆勢猛氣逸出常度然不害其神駿也鏊題觀公自敘因錢穆父之言而改度前祓舊習且云摩闈閣老人固知為晚年筆鏊又題涪翁題元上人此君軒詩答王彦周卷此道沈霾多歴年喜君占斗斸龍泉我學淵明貧至骨君豈有意師無絃瀟灑豈非侯爵命道人胸中有水鏡霜鐘堂下月明前枝枝雪壓如懸罄敝帚不掃舍人門如願不謁青鴻君來聴道人寫風竹手弄霜鐘看白雲平生竊聞公子舊今年誰舉賈生秀未知束帛何當來但有一笻相倚瘦欲截老龍吟夜月無人處共江山說中郎解賞柯亭椽玉局歸時君為傳建中靖國元年三月辛未鐘陵黄庭堅魯直奉答彥周尚有元寧國路總管府推官楊載跋失録山谷嘗用澄心堂紙惟此卷用粉牋及李廷珪墨而筆法妙絶氣韻飛動謂之三絶樂卿凌波仙子生塵襪波上盈盈步微月被誰招此斷腸魂種作寒花寄愁絶含香體素欲傾城山樊是弟梅是兄坐對真成被花惱出門一笑大江横附山谷書水仙花詩黄山谷三言詩卷寄岳雲安九夏無間緑實瀟灑碧溪頭古松下卧槃陀晝復夜八徳水清且美盪精神浸牙齒亂雲根衆峰裏掬與斟隨器爾此帖與漢嘉安樂園題名絶相類豈亦謫僰時所書耶淳熙癸夘二月二十三日甫里陸游識退之出牧向潮州霽色衡山碧欲流魯直宜州遷謫去嶽雲九夏滿空浮美哉湘水獨清深洗濯遷人執熱襟峯裏雲根不同量解言隨器與渠斟魯直題來務觀題便云字與漢嘉齊不知僰道徑行路不涉祝融峰子西永康胡長孺題字汲仲皇慶元年龍集壬子四月丙子書於虎林山谷行書王長者墓誌銘稿在紙上横卷墓誌二篇辭多不具録銘曰以義力其窮以智謝其豐以理孝其終以文􅍁其封山谷行書宋故瀘南詩老史翊正墓誌銘稿翊正名扶銘曰人皆汲汲仰掇俯拾商禄計級脅肩求入君獨徐徐書耕筆鋤我躬則臞我心則腴緼袍後秃藜藿不肉哦詩滿屋金革匏竹瀘川洋洋樅栝其岡勒銘詔藏尚其嗣昌黄文節公手簡二通小行草真蹟在紙上横卷庭堅頓首承惠糟薑銀杏極感逺意雍酥二斤青州棗一蔀漫將懐向之勤輕凟不罪庭堅頓首天民知命大主簿霜寒想八嫂安裕九妳四妳大新婦普姐師哥四娘五娘六郎四十明兒九娘十娘張九咩兒韓十小韓曽兒湖兒井兒各安樂過江來甚思汝等寂寞且耐煩不須憂路上路上甚安稳但所經州郡多故舊須為酒食留連爾家中上下凡事切且和順三人輪管家事勿廢規矩三學生不要令推病在家依時節送飯及取歸書院常整齪文字勿借出也知命且掉下潑藥草讀書看經求清淨之樂為上大主簿讀漢書必有功矣十月十四日押丘報諸妳子以下各小心照𬋩孩兒門莫作炒切切余生武昌得此黄太史帖伏而玩之至再三不忍去手見其冲澹悠深出入平易近代書者其可及哉然公之風不大聲色嚴重崇髙隱然太山巖巖之勢又豈翰墨之所不精者乎俞貞木題又手簡一通庭堅頓首辱教審侍奉萬福為慰承讀書緑陰頗得閒樂甚善善欲為素兒録數十篇妙曲作樂尚未就爾所送紙太髙但可書大字若欲小行書須得矮紙乃佳適有賓客奉答草率庭堅頓首立之承命足下此帖不應㩦在長安逆旅中亦非貴人席帽金絡馬傳呼入省時所觀程子他日幅巾笻杖渡青衣江相羊喚魚潭瑞草橋清泉翠樾之間與山中人共小巢籠鶴菜飯掃石置風罏煮蒙頂紫茁然後出此卷共讀乃稱爾陸游此跋雖經刻然佳語姑存之涪翁雜録冊舊名山谷志林右雜録一冊相傳黄文節公魯直書舊有簽題曰山谷志林昔蘇文忠公有東坡志林蓋雜志其平時所聞見與凡對客談笑之語此冊則雜抄說苑世說中語初無倫敘豈有㑹于心而書耶抑自記以備㤀耶嘗見東坡亦有雜書古人格言亦無倫次題其後謂將以為詩文之用豈非其類耶然不可考矣文節公晚嵗沉著髙古此其少年之筆故㣲有不同耳殷君良貴特以相示輒題其後嘉靖辛丑十月六日文徴明識石曼卿大字楷書古松詩墨蹟在宋楮上横卷天之酒星化曼卿之神薄逰鶯花世界醉日月於酒船真能以大夢處世者歸主芙蓉城宜其仙也雪堂翁詩以實之今想與赤壁化鶴同翺翔其樂無涯曼卿詩句字畫名賢品賛蔑以加矣豈容言下著語此詠古松墨蹟余獲拜觀不覺神爽飛越自慶為平生之幸𢎞治乙丑冬十一月十日呉郡黄雲題于華氏之尚古樓嘉靖廿五年墨林子裝襲原值十五金余初獲見此傳正與家藏文畫為閉户著書深嵗月種松皆作老龍鱗相輝暎焉已而松塵告齋頭諸松偃葢儼青人巢作天際真人想不自知其迂逺也乃石祕閣松詩及樓鑰黄摻趙師夏沈周四跋己刻李冏卿六硯齋三筆不再贅僅録所遺黄跋兀兀成此珊瑚網余因更前畫句松老煙雲能自異書成嵗月與俱新姑享此百城之樂乎即孔方兄有絶交書何足顧哉但將松籟延佳客耳越燕兩國定豐世家紫源九裔後人識珊瑚網卷五
