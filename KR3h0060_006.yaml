body:
  text: 珊瑚網卷六明汪砢玉撰法書題跋米襄陽行草易説易曰天數五地數五五位相得而各有合此五行生成之數洪範曰五行生數天肇一於北至隂之所隂極生寒寒生水故曰北耦二曰南陽之數也陽極生熱熱生火東陽中也陽散而生風風生木隂正以收而生燥燥生金金中央也隂陽之所變者也隂陽交而生濕濕生土所以行成變化而行鬼神皆不出乎此夫體立而後成性以至稼穡皆五行之性也性定而後辨味皆五行之味也水物至隂其性流濕故淮江於山不若海之下故惟潤下所以指名之也五行聲色臭味而此獨舉味者人之所待以生養者特味為急故也元符元年春二年夏三年秋遊中天竺訪堂頭禪師紹聖四年同佛印訪禪師師已垂年苦留心於易芾遂贈其易義并大書讀易堂三字併遺之米元章書予觀米襄陽為天竺大士書易義數語深得乾造坤化之奥世每以能書稱襄陽而其學識乃如此豈知米公者哉蘇君昌齡請篆讀易堂三字以補其闕用鎮山門遂書於左方鄱陽周伯温識後二百六十一年當大元至正十五年三月朔旦也眉顔朱文野齋居士白文米南宫於書無所不讀生承平時以絶倫之資日接賢士大夫緒言餘論故共造詣益深使其僅能字學則當時諸賢豈肯前席耶世言王右軍能書而已殊不知其卓識偉見貽書殷深源勸其交驩桓温使深源從其言則温不至於跋扈而晉室尚可扶持襄陽豪逸乃肯與佛印同訪中天竺至為之書讀易堂豈以少林指心單傳固與羲皇周孔元無間耶襄陽論易以及於洪範五行五位五性五味然所謂五行具五味人皆可知獨金曰從革從革作辛辛為辛辣使以金銀銅鐵百計鬻之不能辛也此雖細事然子朱子門人固嘗以為問終不能折其為何如今已矣恨不能起襄陽於九原而質之吳人李君士明寄遊老子法中而嗜古好學出此卷以求題故粗書襄陽之為人而非敢及於讀易也洪恕記檇李項氏所藏米元章真跡惟山水歌與此卷耳余於五十年前借觀俯仰之間恍如隔世其昌米南宫大行楷書天馬賦遺集多訛脱髙君素收唐畫御馬感今無此馬故賦方唐牧之至盛有天骨之超俊勒四十萬之數而隨方以分色焉此馬居其中以為鎮目星角而電發蹄椀踣以風迅鬐龍顒以孤起耳鳳聳而雙峻翠華建而出步閶闔下而軒噴低羣駑而不嘶横秋風以獨韻若夫躍溪舒急冒絮征叛直突則建徳項縶横馳則世充領斷皆絶材以比德敢伺蹶以致吝豈肯浪逐苜蓿之堆盖當下視八方之駿髙標雄跨而獅子讓獰逸氣下衰而照夜矜穏於是風格靡頽色妙才駘入伏不動終日如坏乃得玉為銜飾繡作鞍儓棗秣粟豢肉脹筋埋若夫其報徳也盖不如偷盧噬盗䇿蹇勝柴鑄黄蝸而吐水畫白澤以除灾但覺駝垂就節䑕伏防猜妬心雖厲馴號斯諧誓俛首以畢世未伏櫪以興懷嗟乎所謂英風頓盡冗仗髙排若不市駿骨致龍媒如此馬者一旦天子巡朔方升喬嶽掃四夷之塵較岐陽之獵則飛黄騕䮍躡雲追電何所從而遽來何所從而遽來平海大師後園水丘公慧悟師看書襄陽米芾海岳能書又能詩書品超邁入神詩稱意格髙逺傑然自成一家嘗冩詩投許冲元自言不襲古人生平未嘗錄一篇投豪貴遇知已則不辭元豐中至金陵識王介甫過黄州識蘇子曕皆不執弟子禮其髙行如此時論章伯益書如宫女揷花嬪嬙對鏡自有一般態度能繼者惟海岳耳或云海岳學羅讓書盖其少時非得法於讓也此帖詞翰兼美誠佳品也㓜澄宜保藏之永樂甲辰秋前五日後義張肯識繼孟淮南老守米南宫筆法今評妙品中翰苑寥寥千古後不知誰復可相同天全有貞題米海岳小楷七帖大行皇太后輓辭餘慶元真相求賢佐裕陵知幾捲箔早戡變叱龍升静徳羣邪震清心後世矜大恩知欲報聖孝已踰曾温厚同光獻剛廉法寳慈擁扶樂推聖照徹托公欺南紀歸忠魄東朝足素規仁明存舊幄常似補天時奉議郎充江淮荆浙等路制置發運司管勾文字武騎尉賜緋魚袋臣米芾上進芾皇恐頓首再拜上覆芾闒茸無能猥繼清獻之緒為貧所迫冒昧宦遊試吏于江陵司訐之官甫幸善罷到侍郎選擬㑹稽征㕓遲次罹罰繼而間闗淮壖竊儀真鹺庾之禄幾年又以内艱而去流離困躓無所告語静思庸戇乃分之宜自此絶意榮望敢意字民復在畿邑家無縣譜斐然學製寧逃傷錦之譏曠敗必矣此芾之所甚懼也不圖寅縁幸㑹獲庇所天尚頼餘光下照匿瑕之仁庶免於戾此心口切私意自幸芾皇恐頓首再拜上覆芾昨准省劄為昌邑昌化實屬治圻兹者𤓰時甫及當代卞從政近得書報以二月二十二日滿罷促芾如期芾旦夕躬詣臺墀少伸參謁之恭祗受約束重惟唐山蕞爾之地屬𨽻京師號為難治顧芾昏䝉無似豈應在撫字之選惟是仰依盛徳宏量無所不容少寛此札前後稍缺芾皇恐頓首再拜上覆芾一介晩出獲齒士大夫之後隆名碩徳竊服舊矣名卑官下無從躐附賓舄瞻拜光儀今幸祗役部封當備使旋之末平時慕仰願見而不可得者浸浸獲伸矣引頸崇墉不勝欣躍歸誠之至芾皇恐頓首再拜上覆名上用米芾之印芾咨目皇恐頓首再拜上覆府判中丈臺座即日孟春之月青煒向燦恭惟贊貳王畿神明拱相臺候動止萬福芾謹薰沐染翰控問興居伏惟臺察不宣芾咨目皇恐頓首再拜上覆名上用米芾之印芾皇恐頓首再拜上覆芾疎逖下僚不敢進城申問臺閫仰惟中外泰定福禄滋至芾退惟僭易不任兢灼之情芾皇恐頓首再拜上覆芾皇恐頓首再拜上覆芾申調司籖肅嚴右記邇辰不審臺履何似仰惟貳車之賢宻佐守尹正直是與何福不除更祈恵令上體眷隆節宣自厚導迎此叚有缺芾皇恐頓首再拜上覆米元章小楷世不多見此七帖為項子長先生家藏前為大行皇太后挽辭是挽裕陵向后后崩於建中靖國元年後六帖是出宰時與朝貴扎輓辭筆法與褚河南哀册若出一手六扎行筆亦遒健但與前􅒯别或此老中年書也卣齊居士曹函光米南宫草書九帖帖語己刻不錄右草書九帖先臣芾真跡臣友仁鑒定恭跋洪武庚申中秋後六日鄱陽蔣惠敬觀於寳古齋范至能説米書初自沈傳師來後入大令之堂此九帖當時已入秘苑後有小米跋今在黄令君家前後完具尚昔之粘綴也其後一帖評唐人始言草法必應從晉此固通論殆亦其實錄耶麝煤䑕尾熏染終嵗所成若此今之學者其亦知之乎𢎞治癸亥吳郡祝允明跋海岳翁此卷嘗入紹興秘府後有子元暉題識盖海岳平生得意書也其子有登海岱樓詩一首下小字註云三四次冩間有一兩字好信書亦難事夫海岱書可謂入晉人之室而其自言乃爾後之作字者當何如耶甲戍九月廿三日觀於崔静伯氏敬題虎丘山人都穆此卷刻於文氏停雲館文太史鑒定所謂衆尤之尤也昔從石本想見其蹟今如葉公好龍真龍下室矣乙酉九月晦董其昌觀於西湖舫齋卷首有幾暇清賞印紹興印内府書印鈐縫有琳印黃琳私印向子固印卷尾有紹興府印建炎浙東安撫使之印建炎兩浙東路都總管司之印建炎重鈎越州管内觀察使印米元章行草四叚前有修内司鈐縫印余始與公故為僚友僕與叔晦為代雅以文藝同好甚相得於其别也故以秘玩贈之題以示兩姓之子孫異日相值者襄陽米黻元章記楚國米芾朱文印叔晦之子道奴徳奴慶奴僕之子鼇兒洞陽三雄李太史收晉賢十四帖武帝王戎書若篆籀謝安格在子敬上真宜批帖尾也余收張李明帖云秋深不審氣力復何如也真行相間長史在世間第一帖也其次賀八帖餘非合書倒念掲諦呪呵婆莎提菩諦掲僧羅般諦揭羅般諦揭諦揭早起志心念數十遍右米帖自都𤣥敬跋後為吾鄉項少溪公所藏至崇禎己巳二月歸於盛念修今年辛未季春復逸出因得錄此四段館刻中所不載也樂卿又長者明公二帖黻頓首再拜後進邂逅長者於此數厠坐末欵聞議論下情慰忭慰忭屬以登舟即徑出闗以避交遊出餞遂莫皇祗造舟次甚為瞻慕曷勝下情謹附使奉啓不宣黻頓首再拜知府大人丈棨下黻再拜明公懿徳茂履士所推慕武城未究逺業佇聞褒嘉共要别馳賀也子中書至面投黻再拜右米南宫長者明公二帖剛健端莊之中而有婀娜流麗之態蘇文忠公謂其超邁入神評語不虛後帖逺字宛然金錯刀法但知府大人不知為誰府字闕㸃疑有所為耳吳郡錢逵題米南宫詩翰李西涯篆于司首詩見苕溪詩話米黻文奉敕題右呈諸友等詩先臣芾真蹟臣米友仁鑒定恭跋右米元章詩翰有紹興及睿思殿圖印其子友仁題其後稱先臣芾盖君前臣名之義也元章書極精妙而友仁亦有家法父子並美自羲獻以後亦鮮聞之書法真贋每相混淆如米氏者江南偽本不知其幾此卷妙處望而可知太宰水村陸先生檢諸故篋重加裝飾物之顯晦故自有數哉先生方操黜陟之柄振幽起滯天下之士頼以不汩没於世者多矣識者幸毋以一事觀之正徳丙子二月十二日長沙李東陽題米襄陽行草集英詩蹟字大於掌集英春殿鳴梢歇神武天臨光下徹鴻臚初唱第一聲白面王郎年十八神武樂育天下造不使𫾣枰使傳道衣錦東南第一州棘璧湖山兩清照襄陽野老漁竿客不愛紛華愛泉石相逢不約約無逆手握古書同岸幘淫朋嬖黨初相慕濯髮洗心求易慮翩翩遼鶴雲中侣土苴尫䲭那一顧邇來器業何深至湛湛具區無底止可憐一㸃終不易枉駕殷勤尋漫仕漫仕平生四方走樂與英才並肩肘少有俳辭能罵鬼老學䲭夷漫存口一官聊具三徑資取捨殊塗莫迴首元祐戊申九月廿三日溪堂米芾米元章為林子中書蜀素為生平合作藏余家偶臨之萬厯丙午六月望董其昌平陽氏藏董書綾數十幅余裝屏張墨花閣廿餘載而易去米南宫中岳詩卷拜中岳命作芾雲水心常結風塵事久虛重尋釣鼇客初入選仙圖鼠雀真官耗龍蛇與衆俱却懷閒禄厚不敢著潛夫常貧須漫仕閒禄是身榮不託先生第終成俗吏名重緘議法口静洗看山情夷恵中何有圖書老此生宋室名書輙稱蘇黄米蔡餘無論焉然米南宫多為行草原其書皆從真楷來故落筆不苟而㸃畫所至深有意態非若今人不識歐虞徑造顛素為無本之學也此卷真蹟徐君臣寛當玩愛之徐有貞識右米南宫所書二詩遺於陳太修家輙為奴子竊出賣於王參軍處事覺追取得之余最好米氏翰墨將古銅瓶易之舍所愛而遂所愛是放一拈一者也魏應龍書米南宫湘西詩帖中書舍人署題南宫遺翰湘西夜冷榻留雲此夕還如入夢魂六月薜蘿嗟我欲一生林壑與誰論吳王舊賞今何在惠可餘光宛若存對榻東堂清話歇長風快雨洗松門逸少嘗自言表上晉穆帝専精任意帝索紙色類長短闊狹與王表相似令張翼冩效一毫不異乃題後答之逸少初不覺後更詳視乃嘆曰小人亂真耳宋米禮部作字有晉唐風流自言學書貴弄翰把筆輕自然手心虚振迅天真出於意外也其次要得筆意謂筋骨皮肉脂澤風神皆欲要全今觀此帖使毫行墨渾然天成雖不元章吾知其元章矣叔成其寳之元統甲戍六月上瀚斤玉山人顧厚書歐陽詢初見索靖所書碑唾之復見悟其妙卧其下者十日閻立本嘗至荆州視僧繇畫忽之次見略許三見坐卧留宿其下者十日書畫之妙以詢立本之真識尚未能造次窺况下幾等能辨之乎米禮部書法逺紹王右軍擅名一代當時寸紙數字人争售之以為珍玩此帖宜寳也然舉世豈乏歐陽率更莫我知也元統二年六月望日廬陵李簡士廉父書自天粟晝零之後洒染翰墨代不乏人必其不蹈故常始可以永其傳襄陽米禮部生平無他嗜好獨遊神心畫始學顔書已而厭其俗聞有李邕法又惡之遂學沈傳師自後數改遂成名家麻紙十萬散失多矣故知八法之妙者請於是觀焉淳熙丙申暮冬申吕企中書向晩得竒觀案有翰墨陳展開即可辨骨格出風塵尋常勢欹側此幅殊不倫字止五十六端人似垂紳復如旗整整又若車轔轔書家有定論俗士長相嗔不見蘇子瞻超妙還入神公昔家京口海嶽近為隣墨跡雖散落至寳終難湮如彼荆山玉旁逹見孚尹驚看忽入手幸合歸鄉人嵗久恐汚弊摹勒須堅珉銘文配瘞鶴終古焦山垠充道得此見示為題此於後聊以代跋語耳吳寛惆悵江東起暮雲騷人疑有未招魂神從海嶽真能降名與蘇黄得並論千嵗鶴歸林未冷百金馬死骨猶存因君話取書家事始信鍾王别有名東陽雪裏清光水裏雲分明詩筆舊精魂可應絶技能兼羙解使名家得擅論秦刻漢碑隨世改馬圖龜畫與天存不須更説鍾王事此道誰參衆妙門台人謝鐸次韻南宫此帖端勁莊重逈異常書前跋已詳自吳文定公三閣老詩辭嚴意宻三公同侍孝廟燮理之暇倡和優㳺為介軒靳閣老所題當時文物之盛猗歟休哉元汴米元章都梁十景詩蹟十景在泗州京洛風塵千里還船頭出汴翠屏間莫論衡霍衝星斗自是東南第一山第一山懷古龜峯髙聳接雲樓撞月鐘聲䟽鐡牛一百八聲俱聽徹夜行猶是不知休龜山寺晩鐘塔邊雲影任髙低閒逐清風自在飛四海望遥人久渴不成霖雨又空歸五塔寺歸雲西山月落楚天低不放紅塵㸃翠微鶴唳一聲松露滴水晶寒濕道人衣瑞巖庵清曉鐵笛誰吹一曲哀清風約我上層臺悠揚正到堪聽處怕惹閒愁却下來清風山聞笛山徑重重鎻緑苔松花曾見幾畨開羣仙費盡招呼力那得休官一箇來八仙臺招隠風輕雲淡午天春花外遊人載酒樽不是山屏遮隔斷牧童錯指是孤村杏花園春晝半山亭子老苔錢鑿破玻瓈引碧泉一片玉蟾留不住夜深飛入鏡中天玻瓈泉浸月自是韶光不耐秋水光山色一時休細將瓦礫分明看片片飛來落葉愁㑹景亭陳迹怪石纍纍玉作堆登臨晩景更徘徊夕陽無限堪停好莫到竒山空自迴寳積山落照襄陽米芾題并書米漫仕苕溪詩卷近刻入制林將之苕溪戲作呈諸友襄陽米漫仕黻松竹留因夏溪山去為秋久𢋫白雪咏更度采菱謳縷玉鱸堆案團金菊滿州水宫無限酒載與謝公遊半嵗依修竹三時看好花懶傾恵泉酒㸃盡壑源茶主席多同好羣峯伴不譁朝來還蠧簡便起故巢嗟余居半嵗諸公載酒不輟而余以􅔂每約置膳清話而已後借書劉李周三姓好懶難辭友知窮豈念通貧非理生拙病覺養心功小圃能留客青𠖇不厭鴻秋帆歸賀老載酒過江東仕倦成流落遊頻慣轉蓬熱來隨意住涼至逐縁東人境親疎集他鄉彼此同煖衣兼飽食恒覺愧梁鴻旅食縁交駐浮家為興來句留荆水話襟向卞峯開入剡如尋戴遊梁意賦枚漁歌堪話處幸有魯公陪宻友從春拆紅微過夏榮團枝殊自得顧我若含情漫有蘭隨色寧無石對聲却憐皎皎月依舊滿船行元祐戊辰八月八日作後有米友仁鑒定真蹟米襄陽詩卷七年烏帽抗黄塵晝錦歸來世又新若過武夷山下看人間不大敝精神蠅頭何慕久京華静洗黄塵眼界花萬寳精神在風月好詩追取不須賒數惡詩呈上陳建州覺民陳詩首唱云汩汩塵埃閲嵗華青山相見認空花清淮風月元無價憑仗詩翁為我賖又一萹云長淮千古自流東六月城頭日日風天際玉潢無出處夜山圍在月明中絶唱也為之刻而不復和米南宫草書畫山水歌并絶句真蹟在楮上十日畫一水五日畫一石能事不受相促逼王宰始肯留真蹟壯哉崑崙方壺圖挂君髙堂之素壁巴陵洞庭日本東赤岸水與銀河通中有雲氣隨飛龍舟人漁子入浦溆山木盡亞洪濤風尤工逺勢古莫比咫尺應須論萬里焉得并州快剪刀剪取吳淞半江水謝安舟楫風還起梁苑池臺雪欲飛杳杳東山攜漢妓泠泠修竹待王歸前有金章宗秘府瓢印御府寳繪朱文印御書之寳朱文方印鈐縫有御府瓢印人合同朱文小長印後有御書瓢印御府之印朱文方印羣玉中秘朱文鐘鼎篆方印南昌袁氏家藏珍玩子孫永保朱文方印趙氏子昂朱文太子少師姚廣孝圖書朱文方印米海嶽風度髙朗神情舒暢故下筆便與人不同或言其書自沈傳師來晩學李北海嘗觀名言書史則其於古人書未嘗不學然每以不及古人為言或曰真者在前氣焰爍人或曰若見真蹟慚惶殺人惟其不自滿假所以書入能品今觀此卷出入顔平原無一筆北海則此老胸中磈磊未易窺測也卷中書畫山水歌後絶句一首寄漢中王皆子美詩想隨所記憶而書者内有御府瓢印及羣玉中秘等印曾入金章宗賞鑒後有趙魏公印曾入松雪齋在本朝則袁忠徹家物也今歸谿陽史君史君好古博雅誠得所矣其永寳之嘉靖甲午十月十日長洲文彭敬跋米元章峴山詩蹟皎皎中天月團團徑千里震澤乃一水所占已過二娑羅即峴山謬云形大地地惟東吳偏山水古佳麗中有皎皎人瓊衣玉為餌位維列仙長學與千年對幽操久獨處迢迢願招類金􅀈帶秋威歘逐雲檣至朝隮輿馭颷暮返光浮袂雲盲有風驅蟾餮有刀利亭亭太隂宫無乃瞻星氣興深夷險一理洞軒裳偽紛紛夸俗勞坦坦忘懐易浩浩將我行蠢蠢須公起缺文右和林公峴山之作鹿門居士米芾後有文夀承跋與前題山水歌等語同故去之老米小詞真蹟風爐煮茶霜刀剖𤓰暗香透窻紗是池中藕花髙梳髻鴉濃粧臉霞玉尖彈動瑟琶問香醪飲麽米黻南宫自謂其書為刷書當自言其運筆之迅勁耳而人多以偏欹槎牙間求之如堊帚之掃壁老顛有知寧無撫几絶叫耶此幅研筆如鐵而秀媚之氣奕奕行間風華類得大令之神是南宫得意時筆也公詩有云棐几延毛子明牕管墨卿功名皆一戲未覺負生平觀此書如親見其寂寥所慕矣寳林顧起元薛道祖雲頂山詩真蹟山壓衆峯首寺占紫雲頂西遊金泉來登山緩歸軫昨暮下三學出谷已延頸山右髙劍外回首陋前嶺躋攀困難到頼此晝亦永巍巍石城出步步向松徑青霄屋萬檀下俯二川境玉壘連金雁西軒列阡畛青城與岷峨天際暮雲隠少城白煙裏水墨澹微影江流一練帶不復辯漁艇東慚梓澤隘右喜錦川逈磐陀石不轉枯枿弄芒穎四更月未出蕙帳天風𦂳客行弊帑垢到此凡慮屏暫時方外遊聊愜素心静明朝武江路拘窘逐炎景建中靖國元年七月廿四日翠微居士題上清連年寳享清適絶塵物外皆自製亭名也錄示詩句未見佳處想難逃老鑒也舊藁不存尚可記憶雨不濕行徑雲猶依故山看雲醒醉眼乗月棹迴瀾水上三更月烟中一葉舟寒臨重閣􅒯影帶亂山流暮烟春樹暗落日渭川明平林暗日疎野草經寒短霜乾葉飄零日出水清淺官冷繫懷非吏事地偏相訪定閒人一馬春風過微雨竹間歸路净無塵鷗鷺驚飛起秋風菱荇花一徑入中渚坐來惟鳥啼水雲生四面常恐世人迷緑逕無行路蒼苔露未晞曾夢春塘題碧草偶來露夕看紅蕖無人雲閉户深夜月為燈曉露凝荒徑斜陽滿畫橋不眠聽竹雨髙卧枕風湍橋横雲壑連朝渡雨暗鐙窗半夜棋微波拂凉吹澹烟生逺樹天寒湘水秋雨暗蒼梧暮乗月多忘歸往返帶霜露自然鷗鳥親日與漁樵遇去意已輕千里陌深杯難醉九迴腸㶚陵葉落秋風裏忍對霜天數鴈行已上雖記然全章皆忘之矣語固未佳要之恐平生經心一事老友必憐其散落便風早以為寄也紹彭再拜更有第三篇亦不見來信不言及必不在彼不知失去何處如何如何左綿山中多青松風俗賤之止供樵㸑之用郡齋刹不見一本余過而太息輙諷通守晉伯移植佳處使人知為可貴東川距綿百里餘入境遂不復有晉伯因以為惠沿流而來至此皆活作詩述謝并代簡師道史君紹彭上越王樓下種成行濯濯分來一葦杭偃盖可須千載榦封條已傲九秋霜含風便有笙竽韻𢃄雨偏垂玉露光免作㸑烟茅屋底華軒自在拂雲長通泉字法出官奴日日臨池恨不如雙鯉可無輕素練數行惟作硬黄書鄉闗何處三秦路馬足經年萬里餘多謝玉華宫畔客新詩未覺故情疎和巨濟韻臨池通泉為如字韻牽作實事也不笑不笑右宋薛紹彭書五紙薛氏三鳳名河東紹彭其後人也字道祖號翠微居士居長安符祐間以書名並米芾今書史㑹要所載是也水村陸公得此卷時愛重間出示余為識數語於後長沙李東陽薛尚功鍾鼎欵識册嘉熙三年冬十有一月望後十一日外孫朝請郎知臨江軍事楊伯萼拜觀于卄四叔外翁書室後二十年弁陽周密得之外舅泳齋書房集金石錄者多矣尚功所編尤為精詣况其墨蹟乎予舊於山隂錢徳平家屢閲之誠竒書也至正元年十二月甲子鑒書博士柯九思書於吳氏遜學薛紹彭臨蘭亭叙右薛紹彭臨蘭亭叙一卷按蘭亭叙石本佳者已難得臨本尤難得蘇易簡所藏臨本有三題曰有若象夫子尚興闕里門虎賁類蔡邕猶旁文舉尊昭陵自一閉真迹不復存余今獲此本亦可比璵璠其一本有王堯臣跋易簡子耆與米南宫友善元章以王維雪景畫六幅李主翎毛一幅徐熙棃花大折枝易得之元章贊曰熠熠客星豈晉所得養氣泉石留腴翰墨戲著僊談書存焉式鬱鬱昭陵玉盌已出戎温己無誰寶真物水月非虛移模奪質銀鏁金鐍璚機錦綍猗歟元章守之勿失其二舜欽云昔之善臨蘭亭者有馮承素湯普徹韓道政趙模諸葛正世罕得見故此三本亦皆莫詳何人所臨也至元二年嵗在丙子予至都城與友人豐城揭君子舟寓舍同巷得見其所藏紹彭臨本上有𢎞文之印又有古杭朱巽印月船小印若宋末在錢塘惟巽與賈似道家所蓄古書畫甚富且精好紹彭父􅀈嘗竊易取定本蘭亭石宣和間朝廷遣使索之紹彭乃并日夜模搨每搨叠三枚紙重搨之民間所貴惟此而已後此石龕寘睿思殿東壁建炎初宗澤遣人䕶送至維揚金人下維揚裹以去金主怒棄之江中近世吳君璋副樞家及龍興民家所得石號為佳者然視定武本逺矣則後之學書者欲見右軍筆意不其難哉此山谷先生所以有欲換凡骨無金丹之歎也嗚呼紹彭所搨本今亦無之况其所臨乎宋之名書者有蔡君謨米南宫蘇長公黄太史吳練塘最著然超越唐人獨得二王筆意者莫紹彭若也今紹彭書亦絶少則見其所臨尤盆盎之壘池也趙承㫖嘗曰時流易趨古意難復揭君之愛重此帖也宜也紹彭字道祖近見其晩憩監聽所賦詩清麗沈著有魏晉人風所居有清閟閣詳著樓氏攻媿集云九月甲子在興魯坊聾子巷冩臨川危素記唐人模搨鈎臨最精今晉帖存者多唐本也宋人遽不能精相去逺甚惟薛米兩家獨擅其能宋南渡後言墨帖多米氏手筆而薛書尤雅正禊序帖臨搨最多出其手必佳物然世亦鮮也雍虞集伯生書趙子固題照禪師道塲詩行書墨蹟重到招提十七年吟題墨色又成嫣蟠虬老桂枝垂舞像刻前碑石載鐫留賦縱然常滿壁𤣥機竟莫悟枯禪道塲法子藂居盛奚復蘆花施釣船子固戊申載題道塲已題壁素更留照師以傳永逺秋泊禪扉夜清吟入興頻風生水鱗甲雲放月精神禪有機禪祕詩無句法新舊題尋不見吹遍壁間塵此係壬辰嵗子固漫題也照師不以為謬戊申重來請書與重題共存每不自知醜耳孟堅再拜宋賢劄子十七帖綬頓首度支學士近奉宴言深慰勞吝忽承手札曲示勤私貺及吳中碑本及藤帽茶一奩傷復頗多不敢辭拒但増靦視之至謹因來介輙奉片幅為謝綬頓首四日名上冇宋綬公垂朱文卬清臣啓近遣一幹隨府伉持書并錄覽二書同詣鈴下計已呈露數日前追胥自彼還辱手教嵗不我與忽焉隆夏言念出處光景載環夷險均之政如宿昔天休踏道深篤報上忠純樂職裕人無有内外顧為簡書所縳不得車騎相過此可恨耳生拙守退伏盍族尸飡閒齋晝眠後池晩飲惟性所適頗無羈牽長杜櫟之扶疎同海鷗之放逸故人不為念也清臣頓首五月十八日承示諭張恢者嚮以明公昆玉世契之厚待之以禮不謂全不循理切恐仰玷盛徳然亦欲小警大戒可以完其出處諒惟深密公文如命頒下縣鎮矣衡竦息希啓前日辱屈臨感刻感刻歸聖兄弟並入開寳睿遂當獨牒奈何天清一室速治之開寳舍亦望令人諭主僧且那與小子書并一二親情同處也恐見令姪般出便據之也兼舉子紛然不可不先慮之也阻於面奉先此布一二希頓首完夫府判朝奉學士兄十四日之竒啓知遂往法濟不勝依依長安酥二箇葱雀鮓二罐水棃鳳棲棃各十枚小樂少許聊薦賓盤幸冀容納以鞫大獄不果拜違愴愴之懐不能勝述乍逺乞保重不備弟之竒再拜九兄知府郎中逵啟辱七月五日賜教承已西上今想對還當有休嘉也秋暑未熄伏惟動止佳福逵山間粗如兒女來歸已餘月老來如夢寐間爾未縁欵晤千萬為國加愛為國加愛不宣逵上潁叔知置大夫閣下八月六日燾再拜昨夕幸得侍坐早來廷中瞻望顔色不欵奉告伏審晩刻尊候萬裕改月自當至左右適自玉局審家親賓紛然逮今永定旦夕専得面拜使還不備燾再拜五伯父大人伯母縣君座前煜啓久疎修問秀州道中賢子見過傳雅誨極荷意愛之厚且承燕間多適氣宇泰然至慰至慰此欲詣邑圖一笑之樂屬至行迫窘悰頼不釋不克如願但向風怏怏無已劇寒惟以時自全保固壽福瞻禱瞻禱煜再拜致政太保太初兄執侍二日夢得叩頭人至辱教示審聞頓暄動止安健良深慰荷冗幹極荷留念悚悚不知幾時定可還日遲面欵入此月來淚眥頓昏痛作字艱强勉附報草草餘惟珍愛不次夢得叩頭季貢貢元親契商英皇恐女夫王偽之䝉收錄八月七日已觧商水任薦極餘溢遂可改京商英愛受賜與王氏均等㑹第二女夫楊開還蜀輙令請見恐或下問河東此間事盖楊生從商英者二年矣伏恐上知商英皇恐再拜邦彦頓首啟前日特辱降顧間冷之中倍増感激負疴屏迹造謁不逮第深悚惕邦彦頓首啟青谷德正夷塗勿抛控抛控馬多失挹水勿極量極量器多溢安史起天寳轉戰竟奔北辭臣獻頌詩要垂萬世則一字堪白首大書仍深刻誰作語溪圖十日在咫尺飛湍如有聲旁滙浸層碧巉絶半巖間髣髴見馬迹不覺手加磨真恐苔蘚没國姓前後異天運古今一向來文武才坐籌或操筆種種皆可稱俯仰重嘆息願君寳此圖置之丹粉壁昔人如可作想像壯胷臆末缺以文推之當是臆字攄頓首啓比不承誨下情渴仰知數辱顧訪皆失迎對但深愧感䝉教伏審晚來尊候萬福峴刻已領蚤暮當卜祗詣遽中馳此拜覆不宣攄再拜右司彦和尊兄座前世忠咨目頓首啓運史直閣侍史近間言誼良勤懷向北辰春雨伏惟漕輓餘閒台候曼福少懇近得㫖以本司官兵二月下旬以後劵食錢米有准擬權於貴司兊撥應副已有公文奉聞今去支期不逺敢煩順㫖速為兊撥錢三十萬貫告為嚴戒所屬星夜起𤼵得二月中旬到軍前以濟急俟朝廷降到錢即便𤼵還也千萬干凂悚仄未閒自愛不宣世忠咨目頓首啓運使直閣侍史説拜問門内眷聚伏想長少均協多慶賢壻以未接識不及别狀孥累輩乗二巨艦轉江入淮甸頗遲遲今猶未至次第經由髙沙兒軰若知良臣在彼必往請見大兒子近堂差泰州如臯監鹽偶得見闕便來赴官朝夕先過此相聚數日而後之任仲子調真州挺官尚有一年闕叔子嶽祠滿已一年半未得赴部同二季隨骨肉俱來賢嗣昆仲一一均福説再拜琚伏自廿二日具禀報之後深慮指揮未到勢不容留遂將牌印牒以次官權管姑作急難給假起𤼵方登舟間忽領珍染寵示省劄如觧倒懸感佩特逹之意無以云喻即星夜前邁矣瞻望鈞光在邇兹得以略切自炳照琚皇恐拜覆觀使開府相公尊兄鈞座前日入寺觀牡丹不覺已謝惜其穠艷故以詩悼之敢冀見和適上牡丹乗春芳風雨苦相妬朝來小庭中零落己無數魂銷梓澤國腸斷馬嵬路盡日向欄干踟蹰不能去右宋賢劄子十七帖皆一代名流鴻望魁壘英臣之筆往嵗客燕山嘗從朱禧公緑䕃亭中閱此朱公好古家藏名蹟甚富每愛惜此册以為劉公一札可當十部從事諸賢濯濯單言片翰並有風致非近世雕蟲之士所能比肩忠禧化去未久圖書散落此册為粥畫人持至江南思重參軍見之悽惋遂出重資購之命余題册尾余與思重皆忠禧文酒之客覩此不勝人琴之感非徒以諸公手澤之故耳王穉登書右宋賢十七札首名綬者宋宣猷公也名上有朱文印曰宋綬公垂公以楷名於宋今楷亦是正書遒勁有法清臣者葉學士道卿也蘇之長洲人衡者章侍制子也浦城人二公天聖嘉祐時人希者林子中也閩之竒者蔣潁叔也草法老勁似王荆公逵者不知何人其札乃與潁叔者故次於此燾者劉無言也行草出入蘇黄而風趣盎溢山谷云令天假以年江左又出一薄紹之矣殆非虚言夢得者葉石林也書法與停雲所刻正同商英者張天覺也書與語皆不免俗透末後句者固如是邦彦者周美成也攄者林彦振也二公書俱類蔡元長豈氣類相似耶世忠者韓蘄王良臣也史稱目不知書晩忽有悟能作字工小詞此札與運使借錢者時尚在軍中或出佐史手正書有蘇長公風致説者吳傳朋也李清照金石錄後序云尚餘五七簏盗穴壁取去為呉説運使錢價得之即此也琚者呉居父也行草逼肖米元章若不視其欵未有不以為元章者適者水心居士葉正則也嘉王之立實𤼵于公以與趙丞相議不合即拂衣歸水心詩早已精嚴晩尤髙古今詩亦淡宕可喜書法蔡君謨而自具風骨中間名煜者為青谷徳止者皆不知何人書亦可觀此册舊為朱忠禧物後為談岳山參軍名志伊字思量者得之後又轉入汪景辰家今年秋王越石舫中見之余極愛劉無居吳居父葉水心三札遂易得之略疏其人於後愧悚未能徧考以俟世之博雅者崇禎甲戍年秋九月閒止居士曹函光書宋名公翰墨風光為花好奕奕弄清温撩理鶯情趣留連蝶夢魂飲酣浮倒暈舞倦怯新翻水竹傍適意明紅似故園牡丹五言和人韻軾軾此間官屬中有㳺九思誠之自長沙􅌽之攝經幕其人有志趣曉民事亦嘗從元晦遊又有嚴昌裔慶曾永州人軾舊與之欵慤實可委信又有李悰静翁見為經屬雖才短頗氣直肯言此外又有兩三一人頗習吏事自楚來旁一行云武行中勇􅐧者極難收拾得數輩其餘亦頗似肯向前亦有顯過者凡百姓教詔之甚而不悛然後不免治之耳諸郡守得人者寡例多苟且其間亦多闕向来三司共作一味是人情今與兩臺約請公是選不可一毫欺朝廷但却似月前難得人到任後今已辟兩處詣頗以為然也吳伻到遵州後彼中事殊學血脉通貫見已攝守極通曉也李享規模只是理㑹兵財兩事甚有條緒至今傳道之林君本政書雖未盡要是根本之論得其家更有數書已往錄矣廣州農事近尤滅裂若今冬尚備數于此亦當考究料理也此間人事聞見極陋然資質寧無佳者軾再過學中與之論講經史學宫弊甚已修治增廣講堂之旁别前政生祠不免徙置佛寺用其處新濓溪二程先生祠庶來者知方向耳軾比領御筆理㑹買馬事既軾奏聞又御筆批下依奏依奏往返自庚逓共不廿日荷上不棄外應之如響凡有所見其敢不自竭况敢自有疎外耶其他可教者一二示免之軾再拜偶有時子納二十枚并州墨兩笏同寄軾又拜在兖海與青社宻邇嘗得希文侍郎音問忽嘗詗閣下昆季動静深在念也朝城三叔中舍嘗得書尺三叔母去年十二月傾逝在逺官極孤寂也雄州四叔推官在官下無恙軾再拜矯矯公孫才不羣白駒衝雪又新春忽過銀闕迷歸路誤認瑶臺尋故人訪我不嫌泥正滑留君深愧酒非醇歸時九陌鋪寒月清絶空教僕御嗔和子瞻兄招子髙晩飲轍昨日得米老書云欲來奉吾人過天寧素飯飯已閲真書然後同訪彦明想亦嘗聞左右也侵晨求見庶可偕行幸照察紹彭再拜鷄黍招要意已真後堂許到轉相親巧栽花竹豈多地净掃軒窻無一塵傾倒不知情話宻衰隤深畏酒行頻落花一夜成疎迹風雨還增客恨新米黻山頭崒嵂侵霄漢片幅之間據其半河水盤旋寒玉貫雲氣濛濛中截斷峯巒回合平若接山城嵯峨聳樓觀下有森森林木灌隠約浮空露纎巘沙平野曠征途逺行人凌兢馬欲汗天機滿前呈爛漫濃墨如新色凌亂渾沌鑿破太極判元氣淋漓風雨散若非定以范寛斷誰能展此竒手叚玉堂老仙重稱賞絶筆當為古之冠牙籖玉軸冝倒看縱得千金慎勿換老眼摩娑獲珍玩不敢留題只驚嘆吳郡郭麟孫端正纎柔如玉削窄韈宫鞵㬉襯吳綾薄堂上細看纔半搦巧偷强奪嘗春酌穏稱身材輕綽約微步盈盈未怕香塵覺試問更誰如様脚除非借與嫦娥著右咏鞵調蝶戀花逃禪老人楊無咎行藝當年帝所聞聲名久矣動簮紳文塲秉筆淵源厚詩席談經業履醇白髮忽驚蒿里暮青衫難問箬溪春兩京模範垂芳逺多少生徒淚滿巾太常少卿陳暘國歩阽危古所希曠無節仗不勝譏得夫人軰戡多難撥亂興衰亦庶幾丈夫効死以成仁何事臨危反愛身有靦閨門全節義傷今思古淚霑巾右二詩題節義榮夫人傳紹興十一年嵗在辛酉正月十一日錢唐吳説余家向藏宋人墨蹟共四十則僅錄前九幅其餘如王晉卿覆子中内翰送茶器珍核祖建為七姐禀丈母要糟藏翁孫姐姐書覆四哥宣贊姻事及范資政張孝祥吳傳朋諸劄未及錄也又有宋人翰墨一卷後題先起居贈開府儀同三司司空一帖先叔父修懿尚書儀同十八帖已上元祐唐午十二月知軍州事因移髙陽安撫使辭墳遂命褫裝付沈氏以防遺墜云亦迸逸錄為念耳夗水菰蘆中人識於自韻齋宋人手簡二通逵啓近已奉狀計徹左右秋杪氣勁伏惟體候清勝逵於此粗如前乃敢仰承大斾薄海陵而還今宜已安治府東南大計一出指麾使權益重不次之寵未可量也向寒惟希保重以慰卷卷不宣逵上潁叔制置大夫閣下九月廿五日端友皇恐再拜啓頃幸使斾久寓輦下可以朝夕承教而文禁拘牽不遂所欲迨今歉然方圖叙列區區先捧誨示重複尤增感悚宏才偉徳久處閒曠豈其所宜尚冀以道順適重加葆輔前即龍光無任瞻祝端友皇恐再拜珊瑚網卷六
