body:
  text: 珊瑚網卷二十二明汪砢玉撰法書題跋宋宣和癸卯御府所藏見鐵圍山叢談晉二王破羌路神諸帖首為竒絶唐人用硬黃臨二王帖至三千八百餘幅顔魯公墨迹至八百餘幅歐虞褚薛及名臣李太白白樂天等書字不可勝會命宋喬年掌之後繼以米芾輩宋潤州蘇氏家藏見淮海張邦基墨莊漫録太宗賜易簡御書宋玉大言賦并名真戒酒批答鍾繇賀吳滅關某上文帝表王右軍答會稽內史王述書雪晴寄山陰張侯帖獻之秋風詞梁蕭子雲節班固漢文唐褚遂良模本蘭亭李太白天馬歌賀知章醉中吟張旭書逸人壁顔魯公進文殊碑讀李陽氷篆新泉銘永禪師真草千文齊已題贈以上皆真迹米南宫書史元章云余閲書白首無魏遺墨故斷自西晉晉賢十四帖檢校太師李瑋於侍中王貽永家購得第一帖張華真楷鍾法次王渾次王戎次陸機次郗鑒次陸統表晉元帝批答次謝安次王衍次右軍次謝萬兩帖次王珣次臣詹晉武帝批答次謝方回次郗愔次謝尚內謝安帖有開元印縫兩小璽建中翰絲乾筆所書鋒勢鬱勃揮霍濃淡真如煙雲變怪多態清字破損余親臨得之濮州李丞相家多書畫其孫直祕閣李孝廣收右軍黃麻紙十餘帖一樣連成卷字老而逸暮年書也略記其數帖辭一云白石枕殊佳物深感卿至一云卿事時了甚快羣凶日夕云云此使鄴下一日為戰場極令人惆悵豈復有慶年之樂耶思卿一面無緣可歎可歎一云九日以當力見一云重熙八日過信安一云祠物皆治護信到便遣來謝云善錯也一云忽書云忽今送一云鶻等不佳令人弊見此輩吾衰老不復堪此餘不記也後有先君名下一印曰尊德樂道先君嘗官濮與李柬之少師以棋友善意其奕勝之豫時未生此帖世未見其此故是右軍名札又有歐陽詢故事十餘帖老筆相連其子通書評書一卷又張顛絹帖一卷七八帖乃少時書並在孝廣處王羲之來戲帖黃麻紙字法清潤是少年所書滿一幅其間數字難辨六朝寫經褊字注之後人復以雌黃塗蓋歲久膠落字見五分在丁晉公受繪像恩澤者房下云晉公故物也欲以二十千見歸余即以其直取君以與余往來議此帖書粘于後質于其鄰大姓賈氏得二十千蓋意其可贖今在賈氏十五年矣曽經人用薄紙拓書墨即透數行仍汙淨地可惜其家又有韓擇木八分一卷唐人薄紙摹五帖一幅王羲之筆精帖內兩字集在諸家碑上縫有貞觀半印王獻之日寒帖有唐氏雜迹印後有兩行謝安批所謂批後為答也唐太宗不敬獻之慰問帖故于帖上括去不次獻之白字謂之羊欣以應募而以前帖為薄紹之書跋尾書官姓名云大厯某年日月下刮去古姓名五代人題曰薛雍記之後題一行曰某年和傳遺余押字是薛丞相居正此是和凝丞相改為薛氏故物以遺薛也其後歸王文惠家文惠孫居髙郵并收得褚遂良黃絹上臨蘭亭一本乏資之官許余以五十千質之余時遷葬丹徒約王君友壻宗室時監羅務令輥亦欲往别約至彼交帖王君後余五日至豫方襄大事未暇見之事竟見云適沈存中借去吾拊髀驚曰此書不復歸矣余遂過沈問焉沈曰且勿驚破得之當易公王維雪圖其父嘗與見許也余因不復言後數日王君携褚書見過大歡曰沈使其壻以二十星資其行請以二十千留褚書余因不復取後十年王君卒其子居髙郵欲成姻事因賀鑄持至儀真求以二十千售之後蘇頌丞相家與沈之子傳毅同會問所在白分與其弟矣翊日蘇舜元子云屢見之王獻之送梨帖云今送梨三百顆晚雪殊不能佳上有梨幹黎氏印所謂南方君子者跋尾半幅云因太宗書卷首見此兩行十字遂連此卷末若珠還合浦劍入延平大和三年三月十日司封員外郎栁公權紀細題一行云又一帖十二字連之余辨乃右軍書云思言敘卒何期但有長歎念告公權誤以為子敬也縫有貞觀半印世南孝先字題孝先是本朝王曽丞相字劉季孫以一千置得余約以歐陽修真迹二帖王維雪圖六幅正透犀帶一條硯山一枚玉座珊瑚一枝以易劉見許王詵借豫硯山去不即還劉為澤守行兩日王始見還約再見易而劉死矣其子以二十千賣與王防太宗書竊類子敬公權能于太宗書卷辨出而復誤連右軍帖為子敬公權知書者乃如此其跋馮氏西升經唐經生書也乃謂之禇書者何也蓋能書者未必能鑒豫既跋定之蘇子曕于是題曰家雞野鶩同登俎春矧秋蛇總入奩君家兩行十二字氣壓鄴侯三萬籖蓋以晉史太宗贊貶子敬也然唐太宗力學右軍不能至復學虞行書欲上扳右軍故大罵子敬耳子敬天真超逸豈父可比也關景輝家刻石子敬帖節過觸事云云甚竒妙真迹在越州石尤之大夫家今在其子孫尉處晉庾翼稚恭真迹在張丞相齊賢孫汝欽家古黃麻紙全幅無端末筆勢細弱字相連屬古雅論兵事有數翼字上有竇蒙審定印後連張芝王廙草帖是唐人偽作薰紙上深下淡筆勢俗甚語言亦俗遂使至寶雜于瓦礫可歎余屢言與汝欽不拆也中貴髙樓楊氏收數帖蕭思話表一思話字有鍾法此乃無而武帝批答四字君臣筆氣一同紙古後破前完此是唐人所為然亦佳作今人不能為也又王珉書真草是真迹有鍾張法張翼當是作宋翼魏人非真又阮研草帖竒古非偽又一帖如竹片書亦好事者為之並無古印跋可考陳僧智永真草書歸田賦在襄陽魏泰處後有一跋題云開成某年白馬寺臨一過潭記白麻紙書世人收智永書未有若此真也虞世南出於此書魏誤題曰虞世南書耳智永千文唐粉蠟紙拓書內一幅麻紙是真迹末後一幅上有雙鈎摹字與歸田賦同意也料是將真迹一卷各以一幅真迹在中拓為數十軸若末無鈎填一字固難辨也是賈安公物作潤筆送王荆公其弟安國得之今在葉濤處安國壻也有古跋云契濶艱難不敢失墜學歐陽詬行體唐摹皇象急就章有𨽻法在故相張齊賢孫直清處右軍唐摹四帖一帖有裹鮓字薛道祖所收命為裹鮓帖兩幅是冷金硬黃一幅是禇薄紙摹右軍摹年更妙帖也其一幅云欲與彥仁集界上平自可且何所咨人乃王道平平其平字音便又見晉人語氣上有𢎞文印印在帖心面上不印縫四邊亦有小開元字印御府帖也宋子房收得唐開元摹右軍帖末有李林甫等臣跋今歸王詵翰林印皆在也內異熱一帖歸薛紹彭唐人摹右軍丙舍帖暮年書在吕文靖丞相家淑問處法書要録載是臨鍾繇帖薛紹彭模得兩本一以見贈唐摹右軍帖雙鈎蠟紙摹末後一帖是奉橘三百顆霜未降未可多得韋應物詩云書後欲題三百顆洞庭更待滿林霜蓋用此事開皇十八年三月二十七日參軍學士諸葛頴咨議參軍開府學士栁顧言釋智果跋其尾馮京家收唐摹黃庭經有鍾法后有褚遂良字亦是唐一種偽好物歐陽詢黃麻紙草書孝經是馬季良龍圖孫大夫直溫所收今歸薛紹彭家又率更令碧箋草聖四幅在故相齊賢張直清處吕夏卿子通直君有歐陽詢草書干文蔡襄跋為智永通直出示余欲跋答以必改評乃跋君欣然遂于古紙上跋正通直君失其名字李錞收歐陽信行書兵針是劉沖之丞相家物虞世南頭眩藥方雙鈎模本在鮑思傳家後為俗人添入羲之兩字傳入晉州法帖以為右軍書聾聵可笑世南汝南公主銘起草洛陽王護處見摹本云真迹在洛陽好事家有古跋後十年見真迹在故相張公孫直清處其後止貞觀十年十一月丁亥朔十六日小字注云赫赫髙門在裴丞相家是其銘然此幅文但至半而止行下有空白紙猶空十一字此蓋卒日猶未言葬也闕文尚多安得便言赫赫髙門不當後幅却與前幅不相連屬也其前褾紅綾色如新有名幾玄題其標云故祭酒崔十八丈綽常與冦章賀拔惎皆以鑒賞相尋每稱伏膺虞書多厯年所自會昌以來時覩斯帖因致其真𨽻有加頃年崔文送豫兄弟下第東歸必云此去獲見汝南帖亦何減于升第耶所惜者闕其銘文耳咸通二年春于存神室輟獻子凝良足嗇愛也幾玄不知為何人虞帖為時所重如此今好事家絶不曽見真迹摹本枕卧積時蚛牙頭風四摹帖一關中刻石帖今法帖所載耳世最少者子敬虞帖今好事家一字亦無耳有人收得虞永興與圓機書一紙剪開字字賣之至礬卿二字得麻一斗鶴口二字得銅瓶一枚房村二字得芋干頭隨人好之淺深唐中書令河南褚遂良所拓晉右將軍王羲之蘭亭集序并諫議大夫栁公權所得羣賢詩御史檢法李公麟製圖皆駙馬王晉卿家所藏所謂三絶褚登善枯木賦是粉蠟紙拓書後有未能二字豫辨是雙鈎唐人不肯欺人若無此雙鈎二字則皆以為真矣在承議郎壽春魏綸處余于潤州見之文勛有一軸黃麻紙李陽氷少時書吕穆仲侍郎收李陽氷白麻篆一卷筆細與縉雲石刻相似劉涇倅吳時得摹帖一卷乃李懷琳偽作七賢帖後人所撰也內摶赤猿帖云僕不想歘爾夢摶赤猿其力甚于貔虎良久反覆余乃觀天背地覩穹亦當不爽但僕之不達安得不憂吉乎報我凶乎詳告三日阮藉白繇君此帖比今刻石字多乃懷琳所撰語也而法書要録所載七賢帖太宗知其偽愛之以貞觀字印之入御府孫過庭草書書譜甚有右軍法作字落腳差近前而直此乃過庭法凡世稱右軍書有此等字皆孫筆也凡唐草得二王法無出其右又有千文一本是少年書不逮書譜並在王鞏家今歸王詵張伯髙五帖黃經紙少時書辭云往往興來五指包管等是也在楊傑家傑父學草故收得逐語斷處即剪作一軸黃油拳經紙與王仲至千文一同並無古印跋伯髙名犯廟諱豫與皎然請集中得之唐坰處黃楮紙伯髙千文兩幅與刁約家一同是暮年真迹每辨六七字刁氏者後有李玉徐鉉跋為人偽刻建業文房之印印之連合縫印破字每見令人歎息又薛紹彭收伯髙少時絹上草書兩幅蘇子純藏張顛草書又蘇泌房所藏詞云國士何日得至南中皆非伯髙真迹亦無古印跋光八郎帖今歸王詵吕公孺處李雍三帖第一改少傅帖深黃麻紙淡墨淳古如子敬第二縉雲帖淡黃麻紙第三碧箋勝和帖以尚書户部印印縫古印有陳氏圖書勾德元圖書記唐氏雜迹印丙子嵗第一歸薛紹彭第二歸髙公繪第三歸余張長史虎兒等三帖非真迹在王詵家蘇子才收碧箋文殊一幅曽公妙迹又有與夫夫帖一幅當是其嫂今在王詵家唐越國公鍾紹京書千文筆筆圓徑在丞相恭公孫陳幵處今為宗室令穰所購諸貴人題皆作智永千文豫驗出唐諱闕筆及以遍學寺碑對之更無少異令穰于是盡剪去諸人跋余始跋之太師顔真卿不審乞米二帖在蘇澥處背縫有吏部尚書銓印與安師文家爭坐帖責峽州别駕帖縫印一同爭坐位帖是唐畿縣獄狀磓熟紙韓退之以生紙録文為不敏也生紙當是草土所用內小字是於行間添注不盡又于行下空紙邊橫寫與刻本不同此帖在顔最為傑思想其忠義發憤故頓挫鬱屈意不在字天真罄露在於此書石刻粗存梗概爾余少時臨一本不復記所在後二十年寶文謝景溫尹京云大豪郭氏分內一房欲此帖至折八百千衆乃許取視之縫有元章戲筆字印中間筆氣甚有如余書者面喻之乃云家世收久不以公言為然峽州别駕帖白麻紙真字云踈拙抵罪也聖慈含𢎞猶佐列藩不逺伊邇是字類糾宗碑清甚又祭濠州使君文鹿肉帖並是魯公真迹山陽簿張君齊賢丞相之後收魯公二帖云奏事官至又田為憲之功後帖張淑郎官求辟類乞米帖及李太保帖曽公一軸五帖見石裔言在兄處送劉太沖序碧箋書王欽臣故物後有王參政名印王云因與唐坰兩出書各誤收卷去坰以將才不偶命而德其無鄰字剪去碧箋宜墨神彩艷發龍蛇生動覩之驚人不裝背揭去背紙以厚紙散卷之略出即卷去其子云與智永千文栁公權書栁尊師志歐陽鄱陽帖並同葬矣亦可歎息也或謂密為王詵購去劉涇在宿州平生初收白麻紙臨顔書太沖序乃其祕笈第一物至潤收封敖行李文饒太尉告許渾詩次得智永板本千文其後得余家十七帖曰本書及曰本告吳融司空圖贈辨光歌張顛辨光亞棲等書韓馬戴牛栁公權書隂符經有會昌日月姓名為馬玘借去未還今知其子永稽能保惜在合肥江南文房物也王仲修收唐湖州刺史楊漢公書有鍾法與襄州羅讓能書碑同余家亦收一紙後題會昌年臨寫鍾表今易歸薛紹彭家懷素絹帖第一帖胸中刺痛第二帖恨不識顔尚書第三帖律公好事是懷素老筆並在安師文處元祐戊辰嵗安公携至留吾家月餘臨學乃還後有吕汲公大防已下題今歸章惇懷素絹帖一軸雜論故事後人分剪為二十餘處王詵纍年遂求足元數又一云史陵者絹帖以六朝古賢一幀易與王詵懷素草書祝融髙坐對寒峯緑絹帖兩行此字最佳紫微常刻石有六行今不見前四行問夷庚云與王欽臣家雜色纈絹背以詩代懷帖同軸今聞王之子為宗室所購是懷素天下第一好書也懷素草書楮紙三幅在故相洛陽張公孫直清家朝端彥收懷素與皇少卿柬大紙一軸筆勢簡古吕昌道家有懷素兩帖少年所書也今歸錢協家又王欽臣有懷素以詩代懷寄浩公碧緑地雜色纈上草書老筆特妙馮京家收懷素絹上詩一首薛紹彭有懷素一軸絹書肅宗行書綾紙千文購於錢景湛處又王仲至處褚書麻紙一幅楊凝式小字黃麻紙一幅余皆見之歐陽詢孝經一卷薛臨寄錢公未見真迹洪元慎集右軍越州寺碑真迹在越州僧正子文處嘗通書許借未果余託提刑喬執中携告往質看亦不肯出欲沿幹至越為家難不果去今要度牒易張直清家楊凝式數帖真行甚好劉瑗收碧箋王帖上有勾德元圖書記保合太和印及題顯德嵗嘗愛吾家顧愷之淨名天女欲以畫易吾答以若有子敬帖便可易伯玉答曰此猶披沙揀金此語甚妙劉涇收許渾烏絲攔手寫詩一百篇字法極不俗第一篇湘潭雲盡暮煙出巴蜀雪消春水來盡是面覩西南世界一段物色自有識者知之剪前一幅易與杜介一幅在王詵處唐彭王傳徐浩書贈張九齡司徒告付九齡之孫在其後曲江仲容處用一尺絹書多渴筆有鋒芒辭云主大厦者柱石之力匡帝業者輔相之功生則保其雄名殁猶稱其盛德飾終未冗于人望加贈特至於國章故荆州大督都張九齡維嶽降神濟川作相開元之際寅亮成功讜言定於社稷先覺合於耆蔡永懷賢相可謂大臣束帛所加樵蘇必禁荆州之贈相府未崇爰從八命之秩更重三台之位可特贈司徒嘗借留余家半月王詵收敕一道是賜浙西節度旌節與顔魯公前中書門下如今制後郭子儀書名立人無下一畫字長題月日到真卿二字名如今落日押字左手下角孔目官名又知唐敕制皆真名不花押今時以片紙黏於前頭連敕落日書押字如常式文牒似不敬也三公第一等人各書名雖大紙吏文亦足收也許彥先有南州刺史告真卿二字吏部尚書時字甚淳徑唐人臨智永千文半卷在丞相蘇頌家蘇州邵元伯收蘇沂所摹張顛賀八清鑒帖與真更無少異又摹懷素自敘嘗歸於家今歸吾友李錞一如真迹程師孟語余四十千置得古摹蘭亭一本白玉軸欲出示竟不曽取今在子宏處無錫唐氏有雙鈎右軍十七帖有精彩錢唐僧了性收一卷楮紙一同唐坰家有一卷是錢氏物紙白唐氏又收碧綾黃庭經云是褚遂良書非也上有江南李重光清輝二字小印云是丁晉公家族人所質錢氏所收浩博帖云臣節分嚴外無掌之所故不薄上而諸位咸有法書臨拓甚多常州使君景湛房下往往為人購去薛紹彭收肅宗千文字也上皆有希聖字印忠孝之家圓錢印錢氏書堂印錢協房下有史孝山出師頌題作蕭子雲亦竒古又有寫白樂天詩一首是唐人書亦秀潤天氣殊未佳顔魯公帖緑棗花綾是唐人勾填圈深墨淺夫金玉為器毁之則再作何代無工字使其身在再寫則未必復工蓋天真自然不可預想想字形大不為篤論有人若問此中妙懷素自言初不知却是造妙語既再作不可復得拓而藏諸何陋之有王詵每余到都下邀過其第即大出書帖索余臨學因匱中翻索書畫見余所臨王子敬鵝羣帖染古色麻紙滿目皴紋錦囊玉軸裝剪他書上跋連於其後又以臨虞帖裝染使公卿跋余適見大笑王就手奪去諒其他尚多未出示又豫少時使一蘇州背匠之子吕彥直今在三館為胥王詵嘗留門下使雙鈎書帖又嘗見摹黃庭經一卷上用所刻勾德元圖書記乃余驗破者劉原父收周鼎篆一器百字刻迹焕然所謂金石刻文與上古書相表裏字法有鳥迹自然之狀李公麟收購亦多余皆嘗賞閲如楚鍾刻字則端逸逺髙秦篆果可冠古今法書之首米襄陽鑒收法書余白首收晉帖止得謝安一帖開元建中御府物右軍二帖貞觀御府物子敬一帖有褚遂良題印又有丞相王鐸家印記晉將軍會稽內史金紫光祿大夫王羲之字逸少官舍尚書二帖第一帖易于今坊州使君劉涇第二帖易于禮部員外楊傑唐貞觀御府物至豫家貞觀二小璽復合神物離合真有數耶自丙寅至壬午十七年間以紙毛三洗跋時崇寧紀元五月十五日劉涇於楊傑處得貞觀御府內史官奴帖余以十七帖以下諸物易歸余家先于唐坰處得右軍尚書帖云得於僧清道亦有貞觀印印文遂復合仍帶元截紙痕一條故一物也林希見余家此軸歎云祕府所有殆不過是嘗見閣下一卷貞觀字印相去五寸許不相連若真印印則四枚理無平均若偽雕必只一鈕用皆齊一也余聞之愠甚懶展閲愠極試取視之左右上下無一相當者疾呼林過與語所以公擊節曰公此書愈妙也方是時劉涇不信世有晉帖後十五年始得子鸞字帖云是右軍余云恐陳子鸞未經余目後薛紹彭亦云六朝書王羲之桓公破羌帖有開元印唐懷充跋筆法入神在蘇之純家之純卒其家定直久許見歸而豫使西京未還宗室仲爰力取之且要約云米歸有其真見歸即還余遂典衣以增其直取回仲爰已使庸工裝背剪損古跋尾參差矣痛惜痛惜快雪晴時帖云羲之頓首快雪時晴佳想安善未果為結力不次王羲之頓首山陰張侯是真字數行帶行今世無右軍真字帖末有君倩二字疑是梁秀縫有褚氏字印是褚令所印蘇氏有三本在諸房一余易得之一劉涇易得無褚印晉太宰中書令王獻之字子敬十二月帖黃麻紙辭云十二月劄至否中秋不復不得想未復還慟理為即甚省如何然勝人何慶等慶等大軍下一印曰鐸書是唐相王鐸印後有君倩字前有絹小帖是褚遂良題曰大令十二月帖此帖運筆如火筯畫灰連屬無端末如不經意所謂一筆書天下子敬第一帖也元與快雪帖相連蘇太簡家物上有國老才翁子美題跋云遼僧守一所藏先令以命服得之子美子激與余分藏以書畫寶玩易之李氏衛帖云衛稽首和南近奉敕寫急就草遂不得與師書耳但衛不能拔賞隨世所學規摹鍾繇遂多厯年二十著詩論草𨽻通解不敢上呈衛有一弟子王逸少甚能學衛真書咄咄逼人筆勢洞精字體遒媚師可詣晉尚書館書耳仰憑至鑒大不可言弟子李氏衛和南此帖比今閣帖字亦多亦其所撰也次無名帖次郗超帖亦摹入閣帖中次陸機衛恆帖衛亦摹入閣帖也後余以畫易于劉涇分前四帖與李錞皆貞觀間一種偽好物樂毅論智永跋云梁世摹出天下珍之其間書誤兩字遂以雌黃治定然後用筆今世無此改誤兩字本流傳余於杭州天竺僧處得一本上有改誤兩字又不闕唐諱是梁本也蘇耆家蘭亭三本一是參政蘇易簡參贊第二本在蘇舜元房上有易簡子耆天聖嵗跋范文正王堯臣參政跋云才翁東齋書嘗盡覽焉蘇治才翁子也與余友善以王維雪景六幅李王翎毛一幅徐熙梨花大折枝易得之毫髮備盡少長字世傳衆本皆不及長字其中二筆相近末後捺筆鈎回筆鋒直至起筆處懷字內折筆抹筆皆轉側𥚹而見鋒暫字內斤字足字轉筆賊毫隨之於研筆處賊毫直出其中世之摹本未嘗有也此定是馮承素湯普徹韓道政趙模諸葛貞之流拓賜王公者碾花真玉軸紫錦裝背在蘇氏舜元房題為禇遂良摹余曰跋樂毅論正書第一此乃行書第一也觀其改誤字多率意為之有禇體餘皆盡妙此書下真迹一等非深知書者未易道也第三本唐粉蠟紙摹在舜欽房第二本所論數字精妙處此本咸不及然固在第一本上也是其俗人所摹蓋第二本毫髮不差當世有十餘本一絹本在蔣長源處一紙本在其子之文處是舜欽本一本歸余家一本在之友處米姓祕玩天下蘭亭法書第一唐太宗獲此書命起居郎褚遂良檢校馮承素韓道政趙模諸葛貞湯普徹之流模賜王公貴人著于張彥逺法書要録此軸在蘇氏題為褚模觀其意易改誤數字真是褚法皆率意落筆餘字皆鈎填清潤有徑秀氣轉拓毫鋩備盡與真無異非深知書者所不能到世俗所收或肥或瘦乃是工人所作政當以此本為定壬午閏六月文江濟川洲亭艤寶晉齋艎對紫金浮玉羣山迎快風銷暑九日手裝宗室叔盎收蘭亭遂不及吾家本在舜欽本上因重背易其後背紙遂乏精彩然在都門最為佳本王闕求見余家印本曰此湯普徹所摹與贈王詵家本一同今甚思之欲得此以自解爾錢唐關景仁收唐石本蘭亭佳於定本不及余家板本也泗州南山杜氏父為尚書郎家世杜陵人收唐刻本蘭亭與吾家所收不差有鋒勢筆活余得之以其本刻板回視定本及近世妄刻之本異也此書不亡於後世者賴存此本遇好事者見求即與一本不可再得世謂之三米蘭亭羲之玉潤帖是唐人冷金紙上雙鈎摹連在稚恭帖後字大小一如蘭亭想其真迹甚妙智永臨右軍五帖獲于吳郡末云玄度忽腫至可憂慮疾候自恐難耳史稱玄度服巨勝實莫知所終此可鑒也因托薛紹彭書考妣會稽公襄陽丹陽二太夫人告贄為潤筆薛以書畫還往出處必同每以鑒定相髙得失評較宗室令穰收歐陽詢三軸第一軸蘇彥語針次幅故事兩段有開元縫印翰林之印李林甫臣等跋及知書樓官字末後唐賊蔣元暉題宣徽兩院使印余以智永三行帖陸柬之頭陀寺碑一幅易得語針第二軸草帖五紙第三軸行書故事皆有開元姚宋印跋草帖乃暮年書精彩動人行書少時書也唐司議郎陸柬之書頭陀寺前少兩幅獲於吳郡世未有此書內空山字後筆以氏族志檢之父名山才及王詵處收錢氏陸臨蘭亭皆遂空山字王仲孜收蘭亭詩一卷詞云悠悠大象運殆是一種分開物李雍勝和帖余以六朝古賢韓馬銀博山金華洞天石古鼎復忘記數物易得于吕公孺孫端問處余豫嘗以碧箋臨李三帖與真無異吕攜去裝褫矣朱巨川告顔書其孫灌園屢持入秀州崇德邑中不用為蔭余以金梭易之又一告類徐浩書在邑人王衷處亦巨川告也劉涇得余顔告背紙上有五分墨至今裝為祕玩然如徐告粗有徐法耳王詵與豫厚善愛之篤一日見語曰固願得之遂以韓馬易去尋于劉涇處換一石也此書至今在王詵處楊凝式類顔魯公爭坐位帖祕閣校理蘇澥家有三帖第一白麻紙曰景度上大仙第二第三小字與薛紹彭家所藏正書相似余三次易得後以第一易與王詵第二易與劉涇余家今收楮紙上詩云春來冰未冸冬至雪初晴為報方袍客豐年瑞已成王以畫易于趙叔盎元章所收尚有王右軍初月帖大令中秋帖陶隱居朱陽帖司空圖贈廣歌吳融博士歌歐陽詢度尚庾亮二帖張長史秋深帖懷素去夏帖關蔚宗有褚河南所模虞永興枕卧帖落筆精微僅如絲髮既存骨氣復有精神米見而愛之崇寧間遇其子長源于京口時蔚宗已下世米從長源求此帖長源靳之曰惟得公陸探微師子乃可從之長源復靳曰此畫不足以當此帖更得公案上盈尺硃砂乃可又從之長源又靳之曰細思二物皆有愧於虞帖非得公頭不可乃移書曰頃在揚州蔚宗待我甚厚示以此帖追想筆法寫一通去較其所藏妙若刻楮不復能辨米嘗以九物換劉季孫藏子敬帖不獲其意歉然張藝孫作詩云請君出竒帖與此九物并今日投汴水明日到滄溟又有破紙博珠玉之句亦可謂膏肓於書畫者米西清元暉謂其父所藏晉唐真迹無日不展于几上手不釋筆臨學之夜則以小笈置枕榜每見古帖不論資用以購之米禮部寶章待訪録首段本末前見畫史晉武帝以下諸名臣十四帖真迹武帝王戎書字有篆籀氣象竒古墨色如漆紙皆磨破美哉不可得而加矣世之竒書也在駙馬都尉李公照第謝奕謝安桓溫三帖真迹麻紙書在李公照家上有鍾紹京書印竇蒙審定字印印謝安一帖為後人恐墨淡復用深墨填過使人惋怛與前卷並有絹帖書爵號自為名筆庾翼帖全幅上有竇蒙審定印張芝王翼二帖非真同庾帖在張汝欽處王右軍筆陳圖前有自寫真紙緊薄如金葉索索有聲章公自云借于趙竦羲之雪晴帖真迹在承務郎吳郡蘇激處集賢校理舜欽子也帖尾有古跋君倩字及褚氏字印逸少稚恭進鎮帖真迹麻紙書著作郎王仲修藏官奴帖雙鈎麻紙本亦在仲修學士處桓溫破羌帖筆法竒絶與稚恭帖同是神物有開元印懷充跋在蘇澄道淵之子之純判官處又王書千文楮紙上筆力圓熟在宣州觀察支使王詵處故相圭之侄謬題賀知章書于韻字下王右軍紙妙筆精帖有貞觀印王大令今日寒帖有唐氏雜迹印為故相王曽家物在其孫景融處後為前龍圖侍制沈括存中取之古跋右軍作羊欣大令作薄紹之仍將大中嵗跋刮去數字填為薛雍記之而故相薛居正題曰和傳遺余此蓋和凝為薛氏故物歸居正耳唐太宗雅不喜子敬故時人以他名名之以應摹所謂紹之書曰乃於耳字不刮去及不次獻之頓首字猶在一分許可識大中所跋既不能辨復為不鑒之人所收遂使至寶永失其真好可痛也與前畫史所載有異王獻之送梨帖有黎氏印連栁公權跋羲之言敘帖兩行有貞觀半印徐僧權字在左藏庫副使劉季孫處據栁公權跋於唐太宗書前雜出獻之書乃將其父書却黏于獻之帖後云又一帖栁誤以父為子矣况不知書者乎逸少來戲帖麻紙上六朝人所臨寫旁注小真字數枚復以雌黃覆之在蘇州故相丁謂孫景處後以一萬質于鄆州梁子志處故相梁適孫也又有唐雙鈎橅帖亦在丁景處某皆有題跋黃素黃庭經是銛鋒筆行書恐非右軍殆六朝人所作界行有鍾紹京書印卷末真寫胎仙二字用陳氏圖書又有錢氏忠孝之家印紙跋云山隂道士劉君以羣鵝獻右軍乞書黃庭經此是也逸少真書此經與樂毅論太史針告誓文纍表也蘭亭洛神賦皆行書其他並草書也草十行敵行書一字行書十行敵真書一字耳又續題云此乃明州刺史李振景福中罷任過浚郊遺光祿朱卿名友文即梁祖之子後封博王王薨豫獲于舊邸時貞明庚辰秋也晉都梁苑因重背之中書舍人陶榖記是日降麻以京兆安彥威兼副都統米某跋云印小字乃唐越公鍾紹京印也此書在李太師第固是甲觀蘭亭燕集序唐粉蠟紙雙鈎摹本在蘇激處精神筆力毫髮畢備下真迹一等此係馮承素輩拓賜大臣者舜欽父集賢校理耆購於蜀僧元靄某與激友善每過公必一出遂親為背飾皇象急就唐橅竒絶在故相張公齊賢孫名直清字汝欽處今為楚州山陽主簿陳僧智永真草書歸田賦真迹在襄陽魏泰處故南昌人裝題曰虞世南白麻紙有古跋曰開成五年白馬寺臨一過潭記某官潭遊湖外携行賞跋纍日智永千文唐粉蠟紙拓書有古跋云契闊艱難不敢失墜信好事也在前國子監直講楊褒處得於外舅王安國某元豐五年過金陵見之內二真字雙鈎填者然人猶未信為拓焉又智永千文楮紙書唐人臨寫在宣德郎陳幵處恭公侄作梵夾册雖非真迹秀潤圓活逼真今已罕得某嘗三閲智永千文半卷黃麻紙唐人臨書在刑部尚書丹陽蘇頌處辨才弟子草書千文黃麻紙在龍圖閣直學士吳郡滕元發處滕以為智永書某閲其才空兩才字全不書固已疑之復空永字遂定為辨才弟子所書故特闕其祖師二名耳唐率更令歐陽詢書衛靈公天寒鑿池帖真迹麻紙在魏泰處信本書荀氏漢書節楮册小楷在潭州南楚門胡氏淳處又書道林之寺碑在潭州道林寺筆力險徑勾勒而成有刻板本又江南廬山多裴休題字塔諸額雖乏筆力皆種種可愛歐陽詢碧箋四聖草帖同後虞帖在張汝欽處祕書少監虞世南書汝南公主墓志真迹虞永興積時帖古雙鈎摹本在承議郎洛陽李熙處翰林學士維之孫亦縫有儲氏印某借橅石伯施枕卧帖雙鈎唐摹本在朝奉大夫錢唐關把處上有儲氏圖書古印關嘗謂某曰昔越州一寺修佛殿亍梁棟內龕藏一函古橅數十本所可記者王右軍十七帖世南枕卧帖十鬬九帖禇遂良奉書寧帖上皆有儲氏圖書字印致功精絶毫髮乾濃畢備關與僧善購得枕卧十鬬九書寧三帖中書令褚遂良書枯木賦唐粉蠟紙拓書也在承議郎合肥魏倫處收以為真迹魏氏刻石某官杭過潤借觀于甘露寺孫過庭草書干文真迹黃麻紙書縫有梁秀才收閲字印王氏圖書隨圈四轉其異製也在王詵處李雍多熱要葛粉帖真迹白麻紙上有唐氏雜迹字印陳氏圖書字印勾德元圖書記字印紫微舍人石揚休故物今在其孫前宿州支使夷庚處李北海四帖內一幅碧箋有唐氏雜迹勾德元印記陳氏圖書與石夷庚所藏多熱帖同在章子厚家唐禮部尚書沈傳師書道林詩在潭州道林寺四