body:
  text: 珊瑚網卷二明汪砢玉撰法書題跋孫䖍禮草書千文帖在白麻紙上垂拱二年吳郡孫過庭書第五本右衛胄曹㕘軍孫過庭字䖍禮唐垂拱時人草書専學二王余初得郭仲微所蔵千文一軸筆勢遒勁雖覺不甚飄縱然比之永師所作則過庭已為奔放矣而竇臮謂過庭之書千紙一類一字萬同余固已深疑此語既而復獲此書研窮之久視其興合之作當不减王家父子至其縱任優游之處仍造於踈此又非臮所能知也顔魯公與夫人書今亦在吾家皆蘇子由吉祥閣所見因復記之保寧賜第王詵晉卿李北海縉雲三帖真蹟已刻不録黄長睿評張從申書出于北海趙子固又以北海學子敬病在欹側若張從申無此矣然從申書實似北海之法華寺碑而北海出竒不窮故當勝三舍余嘗謂右軍如龍北海如象世必有肯余言者董其昌題張長史春草帖春草青青千里餘邊城落日見離居情知海上三年别不寄雲間一紙書右唐張伯髙春草帖鋒頴纎可尋其源而麻紙松煤古意溢目真足為唐人書法之冠晉蹟不可復見得見此蹟其末世之希世珍乎顔平原書之集大成者猶言杜詩韓文顔法亦出于此也因與袁君子英獲觀陳侯康民賞歎竟日壬子人日倪瓚題又濯烟帖上有明昌寳玩御府寳繪羣玉中秘讚印濯濯煙條拂地垂城邊樓畔結春思請君細㸔風流意不是靈和殿裏時按明昌有七印其一曰内府葫蘆印其二曰羣玉秘珍其三曰明昌寳玩其四曰明昌御覽其五曰御府寳繪其六曰明昌中秘其七曰明昌御府又宣和天水雙龍印有方圓二樣法書用圓名畫用方更宣和明昌二帝題籖法書用墨名畫用泥金又髙宗御府手卷畫前上白引縫間用乾卦圓印其下用希世藏方印畫卷盡處之下用紹興二字印墨蹟不用卷上合縫卦印止用其下希世小印其後仍用紹興小璽偶攷印記及此維時春雨方霽正顛旭蘭馨動也汪岡樂卿父識於滴翠軒顔魯公真書朱巨川告身真蹟眉公極稱陸跋精核辨博此唐徳宗建中三年六月給授中書舍人朱巨川告身符年月職名之上用尚書吏部告身之印計二十九顆世傳為顔魯公書按唐式書符令史事也代宗之喪魯公以吏部尚書為禮儀使楊炎惡其直換太子少師領使事及盧杞益不容改太子太師并使罷之是時適在間局而其忠義書法巍然為天下望巨川欲重其事特求公書亦知今世士大夫得請誥敇封贈多求善書者操筆同一意也米元章書史載朱巨川告顔書其孫灌園持入秀州崇徳邑中余以金梭易之劉涇得余顔告背紙上有五分墨裝為秘玩王詵篤好顔書遂以韓馬易去此書今在王詵處宣和書譜載顔書亦有朱巨川告今卷中並無宣和印記獨存梁太祖御前之印前後壓縫有宋髙宗乾卦紹興印耳豈舊蔵御府靖康之亂流落人間南渡收訪應募者截去本朝璽跋耶然五代時既入御府則宋時不應在灌園處豈王詵所得乃别本耶不可得而知矣此卷作字雖小而與東方朔贊用筆同其為顔書無疑告中細書不知出何人唐制惟侍中中書令為真宰相其曰同中書門下平章事雖行宰相事而未為真中世以後藩鎮節使多授中書令故勅後細書首行云太尉兼中書令臣在使完是年四月盧杞忌張鎰出之鳳翔故第二行云守中書侍郎同中書門下平章事臣張使其第三行云守給事中臣關播奉行杞愛播和柔易制是年十月即同平章事矣牒後細書首行云侍中闕第二行云守門下侍郎同平章事杞即盧杞也又吏部正員尚書一人侍郎二人其屬有四曰吏部司封司勲考功吏部郎中一人掌文官階品朝集禄賜告身尚書左右丞各一人掌辨六官吏户禮左丞總焉兵刑工右丞總焉故牒尾尚書侍郎左丞俱云缺而云判吏部侍郎范陽郡開國公翰者盧翰也後此二年為興元元年正月亦進同平章事符後書云判郎中滋者劉滋也貞元二年正月從吏部為左散騎常侍末後書令史不名亦可驗此告非令史筆矣一展閲間而唐之典故歴歴可考且魯公書得其背紙墨蹟尚裝為秘玩况真蹟耶宜如何寳愛也正徳丁丑五月望日陸完跋此跋雖刻眉公筆記然在真蹟後不可去右為魯公真蹟余始見摹本頗怪其神采未遒及是與仲醇同觀如探驪得珠為之一快萬厯壬辰二月三日錫爵書魯公此書古奥不測是學蔡中郎石經平視鍾司徒所謂當其用筆毎透紙背者仲醇得此自題其居曰寳顔堂昔米襄陽得王畧帖遂以寳晉名齋顔書固不減右軍王畧而伯醇鑒賞雅意又不獨在紙墨間也壬辰春二月董其昌題壬辰元旦後三日展此計大字一百八十一小字百四十一通總三百二十二字書譜唐神品三人篆李陽冰草張長史楷顔平原褚虞歐柳皆列精品中不得與公駕寳顔堂居士陳繼儒志余不知書嘗妄論書古人具妙莊嚴質即疾趨僂行神觀偉如今人似束芻戴冠纓能仰不能俯古人如俊鶻搏鵁鶄瞑目納爪盤飛虛空今人如下劣拳師口中叱叱時作乙勢古人如造凌風臺雖欹斜欲墮却自銖兩適均今人如百衲錦采色爛然絲理却絶比仲醇出顔魯公朱巨川誥觀之其頂足懸而相抱鬚鬛怒而不張以斜表正以拙布巧以緩運遒與前所云三法皆合此不待陸全卿校勘其為的的魯公無疑然持以示人疑信叅半蓋字學之衰乆矣其法蓋盡壊於長洲之文氏字取匀美圓淨而止其頓挫抑揚用而不盡用之際多所未講即如此誥一經模勒使塌拖如肉鴨都無可觀驊騮氣喪豈不惜乎姑為拈出紙尾歸仲醇蔵之以待識者辰玉王衡告身在絹上并鄧喬二跋已刻停雲館中不録有瑯琊王士騏鑒定孫克𢎞范允臨僧鴻恩諸留名顔真卿鹿脯帖真蹟又作深慰帖此帖有三本字形大小不倫其文亦小異一云為天台謝奕脩養浩齋所蔵一云宋時在李觀察士衡家今為辰玉所蔵一云有王冲隱題跋王名持字正叔長安人惜辰玉有帖而無跋崇禎癸酉春三月廿五日余獲觀鹿脯帖於金閶旅舍無題跋并觀懐素客舍三帖俱為項𤣥度物漫誌之以俟鑒定玉水柳城懸楷書度人經卷真蹟神品翰林學士諫議大夫知制誥賜紫金魚袋柳公權書於上都昭成觀永充供奉讀誦昭成觀内供奉經法大徳三洞道士孫文杲校勘觀察支使給事郎殿中侍御史内供奉長孫公受界造有唐開成三年嵗在戊午正月十六記卧雲道士來相辭相辭倐忽何所之紫閣當春凝煙靄東風吹折花枝枝藥成酒熟有時節寒食恐失松間期冥鴻復見傷分翼髙飛展轉心無疑滿瀉數盃酒狂吟幾首詩留不住去不悲醯雞蝣蜉安得知大順元年二月十九日華山道士魚又𤣥題右軍曽寫換鵝經珠黍仙書骨氣清㸔到柳公心正處千年筆諫尚馳名趙巖魯詹圓印硬黄小字臨黄庭曩晨見之獨小字度人經未之見此開成年柳誠懸得意細楷也有宣和題標可証時一展誦便到黍珠鬱羅蕭臺又何必太清頂𩕳之表前集賢待制馮子振奉皇姊大長公主命題正書之擅名者自魏鍾繇而至於宋得四十四人而唐柳誠懸實錚錚乎其間則夫墨妙筆精有不待贊矣其入宋秘書凡六帖而書人經者二此卷特其一爾是經乃晉宋人偽作至誠懸時相傳已久故信而書之近代紫陽方回則謂五季蜀王建時道士王喬始造且確然勿自疑不幾甚可笑歟使回見誠懸書此吾知其顙有泚矣洪武九年六月十五日翰林學士承㫖金華宋濓謹記深頓首頓首辱不鄙棄馳示柳誠懸真蹟希世之寳也前題後跋皆佳我師尊篤好致此異品掩然一拂過目已若刮金箆何當得把玩累日也大寳不敢久留竊恐穿壁飛去幸檢入合璧事類容别作報草草上記少宰相公蒲汀老師函丈門生陸深百拜蔵真草書清淨經在紙上貞元元年八月廿有三日西太平寺沙門懐素蔵真書時年六十一嵗蘇耆家蔵懐素居零陵以蕉葉代書日菴曰緑天自叙云醉來得意兩三行醒却欲書書不得又云人人來問此中妙懐素自云初不知皆透徹向上一步語所謂一拳打透虚空不為律縛者也禪與書念頭逸發故宜其然哉大梁劉世昌謹題右唐僧懐素草書清淨經筆法髙古其為真蹟無疑先君子於石田先生處嘗見之毎與余言其妙云後有劉世昌跋尾者是也石田没歸鄒氏屢欲物色一觀不可得鄒氏没又不知流落何處己未秋客來有示者精神煥發真有驟雨旋風之勢惜先君不得再見為憾卷後有蘇耆家蔵四字耆字國老其父子兄弟賞鑒精確所蔵法書名畫甚多素師自叙亦嘗在其家又有紹興小璽曽入思陵秘府韓平原當國時内府珍秘多入其家晝錦堂印是也在元為喬仲山所蔵故有喬氏簣成印僕平生最好素書所閲甚多未有如此之妙者也展卷累日不忍釋手因題其後而歸之嘉靖三十八年長洲文彭記唐釋懐素食魚帖老僧在長沙食魚及來長安城中多食肉又為常流所笑深為不便故乆病不能多書實愧予報諸君興善之㑹當得扶羸也即日懐素蔵真白素公草書超妙自得筆老而意新在當時已為獨步雖散流人間甚盛然自唐迄今二百餘年士大夫家所蔵罕有完者而此帖首尾皆具尤可珍也宣和甲辰七月中中浣竹西呉喆書東坡先生評蔵真書云此公能自譽觀者不以為過信乎其書之工也然其為人倘蕩本不求工所以能工如此没人操舟無意于濟否是以反覆萬變而舉止自若近于有道者耶今觀此帖有食魚食肉之語蓋倘蕩者也至于行筆遒勁如屋漏如屈鐵非工其能如是乎竹西又題蔵真既食魚肉公然舉以向人計其胸中當無一毫諱所以書法超妙至于如此士大夫日拙于偽遮䕶百出乃欲以其餘力辦天下事何可得耶靖康二年四月丙子李璜題後張宴沈石二跋巳刻亦硯亝三筆素公客舍等帖宋徽宗御書金字題簽吾自旦及今食噉苦不下非常悶悶復在客舍所求者並乏加以年老期汝等復得年月耳一日圓而能轉字字合節同桑林之舞也此段項子京刻研右圓字甚竒常以憂悶為其勞也冬熟將船取米物必寄千斛乃可時也藥物十月内示采取之還人不復耳三月一日報懐素小草客舍等帖唐代絶倫世亦罕見子孫宜寳之乾徳二年五月四日開封曹用家蔵懐素唐朝草聖超羣所謂筆力精妙飄逸自然非學之能至也熙寧九年二月一日河東薛紹彭帖首及接縫處俱有宣和政和紹興天水雙龍二小璽尾有内府圖書之印又有秋壑圖書懐仁集王聖教序古人摹書用硬黄自運懐仁書聖敎序特為姿媚唐時稱為小王書若非懐仁自運即不當命之小王也吾家有宋舍利塔碑云習王右軍書集今為習正合余因此自悟有㑹其昌髙閑上人千文閑之書不多存于世其學出張顛在唐得名甚顯董逌謂旭之縱横振發超忽滅没若雨雪霜雹雷轟雷激非有意于喜怒哀樂而于書發之者觀閑此書可知其善學旭矣乃米老欲懸之酒肆何耶世賢子識杜樊川書張好好詩并序有刻不録末有洒盡滿襟淚短歌聊一書字漫不可摹樊川此書深得六朝人風韻余所見顔柳以後若温飛卿與牧之亦名家也其昌韓致堯手簡十一帖昨日奉示及不任悚荷渥以風毒脚氣發動今日亦不任入謁彼此抱病徒切詠思出得且以相面為意幸甚幸甚謹狀八月二日渥狀某所聞甚不恒勿惜示及渥今日衰迫情地旦夕難勝况又孤侄已下兼與小男等四處分散中夜往往驚呌便達曉號咽衰邁之年不自堪忍計申令聞此寃慟必賜軫念不更滯留亦望眷私委曲見為仰托仰托小版計日夕相見諸郎君學問當進自此分飛未知何時復遂相見言及此黯然乆之珍重珍重謹狀渥狀轉家筆可以賜及十數管否特惠粉藥無非濟安不任佩荷之至楊氏方寫了竟未勘畢既承切要徐送的何故又忽急徴此方也本欲來拜謁見取藥方或慮無暇接客以俟别日香粉合複并裹半袜複并元樸陽子方複子伏奉撫渥熱躁甚曲不成字此信渥狀右紅花複子共三个廿日王信之行更俟面復虵藥神効已顯驗紫微不小悉兒必達中喜虵垂不濟入口便抜特謝謹疏乞不容易與人必恐所言詮處切託切託不是惡心肚蓋名方神藥自古皆禁妄傳縮水法亦乞不泄見有人相尤竟未見他非試驗不敢發大道無事且下訪何太踈徐所不㑹恡十二日渥狀眷憶諸郎君言極熱悶甚欲畧出人馬若閒伏願一借若可允遂稍早令來免衝甚熱苟或有幸他使亦乞在賜斯處謹狀廿一渥狀燈下狀曲不成字旬日前所諮啟乞一書與建州為右司李郎中經過希稍延接况承舍人亦與正郎舊知聞必切于施分今晩有的的人去若可踐言速乞封示幸甚幸甚渥雖承建州八座眷私自是旅客難于託人伏惟照察渥狀十月十五日渥狀楊學士兄弟來此消棃子兩日前已尋得花時伏望拴拔謹狀十四日渥狀今日若不他出可以畧借人馬否先冀到宅兼别行一兩處人事脫或有所拘牽即乞不垂形迹以俟後期伏惟昭察謹狀六月廿七日早渥狀前者三賢采戲共輸弟羅吾弟主辦渥偶先擲五隻深覺巋然幸有輸右省長行三儇輒欲助成一味適舍人傳語來使今謹送上所以在前狀中不言今特修此伏惟照察謹狀廿六日渥狀乏楮具小簡甚欲拜侍且是怕惱亂此㑹不知何時定為之眷私借及女使衣服不任悚荷來早令入州人馬必希踐言泉州書謹封納書中亦說託皆諮託必望周而述之幸甚謹狀九月渥狀憂眷借及米貳碩不任濟荷鈍拙無謀惟撓知與不勝愧赧之至即冀拜謁它冀面述謹狀廿二日渥狀春憶明珠余觀韓致堯出内庭後詩忠義感激詩語亦清壯超一時體律未嘗不嘆賞也今觀十一帖字字筆到亂離中借衣乞米真復可憐囑李右司狀情至曲折可喜元祐元年十月己亥黄庭堅温陵人韓奕出其祖致堯詩稿數十篇字正類此元祐丁卯九月望呉興天聖院竹軒林希題同觀者九人王公約莫士先姚舜諧李詢吳景淵盛師仲魯百能莫砥嘗見韓書乃為詩數十章其優游不及此也丙辰五月十四日西閣觀長樂冲元題韓偓借米與魯公乞米何異哉蔣之竒頴叔題元祐五年三月十四日孫元忠王揚休朱世英觀太學北齋與人簡牘事盡則言止至唐末尚然元祐庚午三月丙子繡江李格非題薊丘李衎拜觀右韓渥手書紹興九年四月七日臣米友仁恭覽審定毎愛歐陽詢𦂳結無比倫不意韓公手雍容解寫真紫山桃花源裏人家舊聞韓渥有香奩集意其為人才情風調而已今觀此心畫與其簡中所及亦骨鯁之人是可尚也至元辛卯夏六月戊寅因之江西拜别吾有清臣侍御于真陽獲觀滏陽馬昫題唐韓致堯手簡十一帖計其嵗月四百餘年矣觀古人率爾而作八法俱備今人雖盡思為書不能到也中有楊學士一帖簡齋慕其姓職相同因以市之為拾襲之蔵暇日出示命識其後云延祐丙辰冬十月既望後三日張仲夀題於有何不可之閣崇禎辛巳留觀此卷於韻石齋五日玉水記楊少師韭花帖真蹟晝寢乍興輖饑正甚忽䝉簡翰猥賜盤飡當一葉報秋之初乃韭花逞味之始助其肥羜實惟珍羞充腹之餘銘肌載切謹修狀陳謝伏惟鑒察謹狀七月十一日大徳壬寅忠宣後人張宴嘗收宣和書譜載楊凝式正書韭花帖商旅般渡紹興以厚價購得之故傳之于江南可與㕘政淛西迴攜來相惠大徳八年嵗在甲辰三月初十日集賢學士嘉議大夫兼樞密院判張宴敬書此帖元奎章閣舊蓄也頒賜與封巨鹿王時公元杜屋時王弟攜避通許蘆氏里國初希朱髙祖文稿中有此題跋决唐物無疑也今其孫塘興其壻崔應奎秀才始售之聞被賜時有蘇武牧羊圖一玉壺印一今止存此帖云正徳壬申夏通許人賈希朱記自顔柳氏没筆法衰絶加以唐末喪亂人物凋落文采風流掃地盡矣獨楊凝式筆勢雄傑有二王顔柳之餘可稱書之豪傑不為時代所汩没者其昌楊少師韭花帖米元章一見得正書之變余與董思翁見秀州項鑑臺齋中今年辛丑八十子毗攜過山中老眼摩挲頓覺一畨明淨陳繼儒記楊凝式夏熱帖在麻紙上字模糊不可録右楊凝式墨蹟一紙字畫竒古筆勢飛動天地間尤物也公字與顔公一等俱稱絶異然公素不喜作尺牘後人罕能見之益可寳也紫薇閣王欽若定戜題時大中祥符三禩天祝節書以上皆𨽻書右楊景度行書山谷有云俗書祇識蘭亭面欲換凡骨無金丹誰知洛陽楊風子下筆便到烏絲闌為前輩推重如此王欽若在祥符天祝節尚有暇及此耶此帖絶無發風動氣處尤可寳也大徳五年七月十九日直寄道人鮮于樞獲觀信筆書楊景度書出于人知見之表自非深于書者不能識也此帖沉著而又瀟洒真竒蹟可寳延祐丙辰嵗十月十三日吳興趙孟頫題楊凝式字景度華陰人登唐進士第為秘書郎歴梁後唐晉漢至周遷太子太保時人以楊風子呼之喜作字尤善顛草居洛下十九年凡琳宫佛祠牆壁間題記殆徧然揮洒之際縱放不羈或有狂者之目宋歐陽修嘗跋其書以謂凝式筆跡猶為雄强與顔真卿行書相上下此凝式夏熱帖若與平原劉中使帖合契要皆造極精妙之書汴也晩年何幸覿此不能不著其本末以喻來世云時癸未孟夏望前二日墨林項元汴敬識徐季海寳林寺詩蹟季穆家蔵書記柯九思印兹山昔飛來逺自瑯琊臺孤岫龜形在深泉鰻井開越王屢登陟何相傳詞才塔廟崇其巔規模稱壯哉禪堂清溽潤髙閣無恢炱照耀珠吐月鏗轟鐘隱雷揆予久纓弁末路遭邅迴一棄滄海曲六年稽嶺隈逝川惜東駛馳景憐西頽腰帶愁疾減容顔衰悴催賴居兹寺中去士多盧能洗心聽經論禮足蠲久灾永願依勝侣清江乗渡杯徐浩保大文房之記臣鍇鑒定飛來瑯琊峯突兀天光臺金鰻龍變化一竅滄溟開萬古共登眺作賦皆竒才春宫壓贔屭勾踐何雄哉混沌忽開闢窮徼連甌台湖波盪明鏡江流極奔雷人生如驚濤百折無一迴月出鯨海東日落崦嵫隈不畏蜀道難但傷嶺曄頽萋萋原上草苦為霜雪催靈均亦何心紉蘭重修能西山采蕨薇我獨罹其灾放浪任天真日飲三百杯五代末徐浩有書名觀其寳林寺詩無虛士也惜乎悲嗟無聊感慨功名之流落其亦寡于聞道者矣因走筆用其韻千古一時無哂由也黄鶴山樵王䝉書祗園不見凡草木只有芭蕉近僧屋南風幾番吹雨晴小窗忽分新上緑僧常吟成恨無紙旁葉何妨裁半幅濡毫倚窗揮洒餘字借芳華潤如玉有時窗前枕書卧夢在白雲非在鹿嗟予夙落風塵寰今亦逃禪願空谷跫然足音僧必喜喜我之來不待速移牀􅀈坐蕉陰中隔窗呼茶有童僕請為我賦蕉窗吟研池波寒墨花馥我欲借榻此窗下學作禪談閒秉燭縱遇催詩雨忽來蕭瑟還能慰孤獨吟成亦書蕉葉上謂吐驪珠三百斛由來善幻在僧家詩裏機鋒我獨觸公綬書于寳林寺之南軒成化七年閏九月八日東坡行書學徐季海真書學顔清臣兩家書相似徐稍圓耳觀寳林寺墨蹟信然時崇禎癸酉春社友項公定出此帖并元人手札二卷欲售留余處月餘恨未能模寫徒入寳山而已尊拙漫士識於金粟澤之汪岡九仞間珊瑚網卷二
