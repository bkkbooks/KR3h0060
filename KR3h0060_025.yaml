body:
  text: 珊瑚網卷二十五明汪砢玉撰名畫題跋一晉顧凱之洛神賦圖長康畫宓妃卷重著色人物衣折秀媚樹石竒古絹素破裂尚是宋裱世稱虎頭三絶允為繪事珍祕劉宋陸探微姜后免冠圖古免冠進諌圖周宣王姜后故實也劉宋時吳人陸探微所作其法遒徑傅色清潤人品端莊神氣超越六法具備出乎天成蓋世傳探微乃畫中之聖者也此卷希世之珍畫入神品其故實誠有補于風教觀之者使齊家治國咸有助焉駙馬都尉公當以十襲珍藏使子孫永保珍貝珠玉不足貴也元祐三年八月提舉太平興國宫賜紫金魚袋王至跋隋展子䖍畫黃山谷題云人間猶有展生筆事物蒼茫烟景寒常恐花飛蝴蝶散明窗一日百回看展子䖍乃大李將軍之師余家所藏人物卷最為竒古唐閻立本諸夷圖閻立本總章元年拜右丞相封博陵縣公有應務之才兼能書畫時天下初定異國來朝詔立本畫外邦人物此圖是也李嗣真云自江左陸謝云亡北朝子華長逝象人之妙號為中興至若萬國來庭奉塗山之玉帛百蠻朝貢接應門之敘位折旋矩度端簮奉笏之儀魁詭譎怪鼻飲頭飛之俗盡該毫未備得神情故朝廷號為丹青神化與兄立德同在上品云臨漢魏泰道輔記右圖起武興止狼牙修計國二十六為人二十八具列國狀貌道輔嘗有東軒筆記行于世吳道子鍾馗元夜出遊圖款云臣吳道𤣥奉㫖畫君不見元宵春夜玉京口魑魅陸離山怪吼髯夫當前黧婦後嬌姿百媚門楣秀大鬼跳梁山鬼波毬燈百戲舞且歌歡聲騰沸笑聲雜月光瑩白燈光多臘鬼作粱負鬼驅虹霓可駕雷可車雷奔霧集效勞勩崢嶸齊力彊肩輿旗鎗散漫非尋常人間此夜樂未央金吾不敢禁行迹乃知馗心方且剛斬馘妖邪祛瘴穢驚散鬼魂心膽碎乾坤清謐正氣淳一睹儀容生者畏想當唐室夢見時道子丹青親寫之披覽此圖殊慷慨醉裏揮毫為賦詩青城山人終南老馗狀酕醄虎韡烏辨鴨色袍青天白日不肯出上元之夜始出為遊遨鬼門關頭月輪髙烏犍背穩如駼騊鬼婦塗兩頰鬼子垂一髦徒御雜沓聲嗷嘈導以靈姑旗翼以大食刀荼壘左執鞭質矯右屬櫜方明前持漆燈張若後擁犛旄離朱罔兩不可一二數肩擔背負手且操竒形獰色使人怕一似摳駿梟獍兼猿猱戰場人血化燐火各出照地㸃㸃如焚膏隂風颯颯笑荒皋百怪屏氣不敢號汝輩逺遁莫我遭我欲飲汝血甘如飲醇醪我欲啖汝肉美如啖羊羔肯容汝輩在世長貪叨吁嗟乎老馗真為百鬼中一豪所以唐皇想其像詔令道子寫以五色毫吾嘗疑其事展圖再把短髮臨風搔憶當天寶年左右皆鬼曹太真宫中逞狐媚祿山殿上作虎嘷當時使有老馗者安得縱彼二鬼逃便須縛以蒼水使者之赤縧獻于天閽尸諸獸牢寢其皮拔其毛效爾一日驅馳勞坐令溫泉生汙泥驪山長蓬蒿上除唐家百年害下受唐史千年褒却來上元夜任爾燒燈并伐􅀢長洲吳寬君不見昔日開元全盛時君王圖治世清夷絶地天通幽明逺舉朝盡是皋與䕫天寶已後君心憊夢寐時時見妖怪當時玉笛最所欣有鬼盜之君獨齘終南進士名鍾馗藍袍破帽真黃眉自言能除虛耗鬼刳目劈啖如療飢奔魑走魅驅罔兩土逐羵羊水罔象千妖百怪匿其踪遂令道子圖其像嗟哉此圖更竒特不比當時舊遺墨如何却作上元遊醉眼摩娑諸鬼側青陽轉春東風遲風和月白流春澌玉花老梅含野姿垂楊拂水搖烟絲屬族相隨恣歡笑上下燈光炯相照魔騰鬼趭不得寧牛背穩騎無􅙚􅚤我觀此圖誠荒唐陳君得之奉髙堂但祝除君虛耗鬼何須向其攜家出遊有無之行藏姑蘇顧餘慶吳道子鍾馗圖衣紋筆勢皆有顧虎頭陸探微法東坡所謂筆所未到氣已吞真竒品也董其昌觀因題內教博士勢至像世稱道子筆法超妙為百代畫聖早年行筆差細中年行筆磊落如蓴菜條人物有八面生意活動其傅采于焦墨痕中略施微染自然超出縑素世謂之吳裝觀此大勢至像信然平陽世賢子識摩詰奕棋圖在絹素上卷首五大字為李西涯公篆書鈐縫有政和宣和二方印摩詰本詩人精思詣元化緒餘臻畫妙遂方吳子駕寫成三士奕棋圖意態蕭然各閒暇儒冠羽服對紋楸老僧傍晲成可詫形如槁木心死灰豈識枰中有機獲抑亦至人聊自適肯效澆風生變詐厯唐默計五百年一著指間猶未下樵丁不獨爛斧柯閲世紛爭幾王霸乃知非人看畫畫看人今古滔滔等晨夜俯仰跡已陳電掣明窗罅宣和殿中嘗寶玩題品愈重千金價當時內府收欲觀誰敢借流落長存天地間在在護持宜有神物為憑籍漢郡蒲道源鼎立門庭理一同何須局面互爭雄誰知奪角衝關事都在山僧冷眼中吳僧白雲英王維雪溪圖宋徽廟宸翰題簽蓬萊山道人間風日不到玉􅙞金鑰典祕甚嚴有平生畜眼未嘗老天旋地轉散落委棄故人李君祥得之出以示余其犀玉已被剔取所幸畫無恙耳展玩之餘不覺涕淚闌干蓋歎是圖之不遭也請靳固之以待異日萬金之購云蓬山道人劉詡題治平二年正月十九日沈遘章岵晏崇金山同觀余於三十年前獲觀右丞此幅僅盈尺有咫設色髙古位置幽逺有刺篙濟渡者有牧奴驅豕而歸者神彩溢目餘所見皆優孟也今在一友處命庸工所裝一時粉墨狼籍神氣索然偶復見之惋悵纍日墨林項元汴此卷歸程季白入唐宋元寶繪冊二跋俱截去王右丞江山雪霽圖畫家右丞如書家右軍世不多見余昔年于嘉興項太學元汴所見雪江圖多不皴染但有輪廓耳及世所傳摹本若王叔明劍閣圖筆法大類李中舍疑非右丞畫格又余至長安得趙大年臨右丞林塘清夏圖亦不細皴稍似項氏所藏雪江卷而竊意其未盡右丞之致蓋大家神品必于皴法有竒大年雖俊爽不耐多皴遂為無筆此得右丞一體者也最後復得郭忠恕輞川粉本乃極細謹相傳真本在武林既稱摹寫當不甚逺然余所見者庸史本故不足以定其畫法矣惟京師楊郵州將處有趙吳興雪圖小幀頗用金粉閒逺清潤迥異常作余一見定為學王維或曰何以知是王維余應之曰凡諸家皴法自唐及宋皆有門庭如禪燈五家宗派使人聞片語單詞可定其為何𣲖兒孫今文敏此圖行筆非僧繇非思訓非洪谷非關同乃至董巨李范皆所不攝非學維而何今年秋聞金陵有王維江山霽雪一卷為馮開之宫庶所收亟令人走武林索觀宫庶珍之如頭目腦髓以余有右丞畫癖勉應余請清齊三日始展閲一過宛然吳興小幀筆意也余用是自喜且夙世謬詞客前身應畫師余未嘗得覩其跡但以想心取之果得與真有合豈前身應入右丞之室而親攬其䃲礴之致故結習不昧乃爾耶庶子書云此卷是京師後宰門拆古屋于折竿中得之凡三卷皆唐宋書畫也余又妄想彼二卷者安知非右軍跡或虞禇諸名公臨晉帖也儻得合劍還珠殊足辦吾兩事豈造物妬完耶畀余於此卷中消受清福耶萬厯草三年歲在乙未十月之望秉燭書于長安客舍董其昌甲辰八月草日過武林觀于西湖昭慶禪寺如漁父再入桃源阿閦一見更見也董其昌重題馮開之快雪日記云吳崑麓夫人與豫外族有葭莩之親偶攜此卷見示述其先得之管後宰門小火者家有一鐵櫪門閂或云漆布竹筒搖之似有聲一日為物所觸遂破墮三卷此其一也然雙槐歲抄有云純皇好玩名畫古器南京西華門舊有二黑漆圓櫝振之則中空有聲蓋國初巨室之籍入者以不可啓視故棄于此守閽小內史張本穴而窺之則畫幀存焉一為王維傅色山水約三丈餘一為蘇漢臣所繪宋髙宗瑞應圖本以王畫送安寧蘇畫送黃賜皆太監坐厰守備者未幾寧死賜攖得之併以獻上賞賚甚厚益加寵任是二事何相符至此然雪霽圖有沈石田跋或即張本所得而流傳至北好事者重扃祕之偶入小火手耶此卷海內推為墨王自有神物護持之也繡里汪砢玉先得臨本復見真本跋王維小簇山水唐𤣥宗既命李思訓吳道子各圖嘉陵山水于大同殿璧王維又别用絹素寫之謂之小簇兹所圖山水具嘉陵三百里之勢正小簇法也一室之內覺江山萬里非遙自韻子珂玉識摩詰本輞川圖王右丞輞川圖與余昔在杭苕故家見者一樣前有集賢院御書印內合同印題摩詰本後書河北郭忠恕奉命復本則知為江南李後主時臨本也虎賁中郎更無辨處郭亦妙筆矣右丞唐開元天寶朝士名維字摩詰工詩畫輞川其所居自寫為圖精密細潤在小將軍著色山水右今如魯寶玉大弓絶無僅有吾昂霄珍之重之攜上天京名公相一見賞識鑒定價增十倍大德戊戌冬至廬陵民八十叟李珏元暉跋又詩園圖親畫早流傳已是人間五百年凝碧池頭秋句在當時幾負此林泉輞川圖本二本此從矮本所臨畫格高絶觀此猶有生意為賦短句袁桷清容字伯長詩中傳畫意畫裏見詩餘山色無還有雲光見復舒前溪漁父宿舊宅梵王居千古風流在披圖儼起豫摩詰嘗與裴迪倡和草絶紀輞川之勝至今讀之如身遊其間此本甚精緻尚可想見其景與詩㑹之時也因追而和之孟城坳春風孟城坳年年自花栁當日倦遊人何處談空有華子岡蜿蜒浮逺空慘淡凝古色出雲亦何心既雨返無極文杏館種杏白雲間因之葺茅宇鶯聲烟中曙虎跡夜來雨斤竹嶺苞竹秀孤嶺虛瀨㴠清漪秋風何時實鳳飢竹不知鹿柴崖蹙石林稠谷靜山泉響麏麚囿其間攸伏息下上木蘭柴手折木蘭花心憶懷沙侣墜露玉可和金盤差蒂所茱萸沜茱茰綻紫粟白雲封不開似待陶元亮共把菊花杯宫槐陌屯雲應廣陌零露濕古苔中街日停午四面風徐來臨湖亭積水涵倒影萬象凌虛來魚在山中泳花從天上開南垞亭亭一風榭脫履席可即階前白雙鶴相迎似相識欹湖岸中臨水澨酒醒呼隱君收緡玉梭起搖蕩空中雲栁浪年年黃金縷照影麴塵漪誰為南浦贈紉佩扈江籬欒家瀨鑿鑿沸白喧浩浩空清瀉漁翁互相呼放船莫輕下金屑泉洗耳山下泉永念童蒙歲敢希作聖功事心如事帝白石灘湍駛風逾清水明石可把倚杖獨移時白鷗翩然下北垞波影媚松樾山色麗石闌留連南川月不肯下雲湍竹里館此君儼相峙清坐一晤嘯天風振空聲萬境通寂照辛夷塢迎春發蒼柯映日在瓊萼欣欣各自私先開還早落漆園黽勉殉世名鞅掌嬰俗務漆以津自枯不如樗櫟樹椒園申椒芳聲逺秉德類幽人時來薦瑤席慎勿佞夫君天台楊敬德藍田可勝宋家莊認作伊家華子岡身後不知誰是主謾留副墨至今香食淡衣粗識幻身如何幻境却留神早知大地非真有已了前生不二因吳澄開元宇宙承平日華子岡頭曾燕適至今自貌輞川圖下有幽人交莫逆辛夷塢外萸沜隔亦復扁舟舂蕩潏竹君冰霰歲寒傲未便申椒能辨屈平生雅志厭朝市醒醉悠哉倦泉石是間山水無限趣况乃佳賔得裴迪規模想像郭忠恕垂四百年留妙迹鶯啼花落香句在誰信長安歎凝碧後來拊卷意迷茫且復追維三太息海南金元帥出此圖與余三十年前張子有家觀摩詰真卷無不似者則忠恕殆神仙者流信名下之士不虛也海粟子振猪龍兒嬉錦䙀好三郎歲晚歡娛老阿環姊娣擁華清朝士宮前誰敢到右丞脫却尚書履布襪青鞋弄烟水藍田别業堪畫圖矮本丹青自遊戲華子岡輞口莊烟亭竹館遙相望小橋摺轉青紅窗樹窠歷歷烟蒼蒼欒家瀨前兩舟工栁浪一尺春風狂詩成與和者誰子我外裴迪誰能雙邱壑風流妙如此安知畫外凄涼意凝碧池頭天樂聲白髮纍纍淚如雨亂後歸來舊第中元牆緑户老秋風人生過眼皆夢境乞與山僧開梵宫半幅吳綃如傳舍俟誰得此千金價客來寒具莫匆匆四百年前御厨畫按維本傳輞川乃宋之問别墅在藍田後表上為清源寺臨江李核意山曹霸玉花驄圖元章小行草杜贈曹將軍丹青引元祐戊辰獲觀于才翁之子及之對紫金浮玉書米黻廣平程巨夫觀髙秋風起玉關西踣鐵歸來十萬蹄貌得當時第一匹昭陵風雨夜聞嘶雍虞集題斡馬圖三大字為止庵書吾自小年便愛畫馬爾來得此見韓幹真跡乃始得其意云子昻題山隂王懌家藏唐人畫馬如相馬不在驪與黃天機入神即揮灑氣脫毫素先騰驤昔年曾畫穆王游八極八龍之駿雲五色後來又寫越影超光晚丹碧後來又寫漢武窮渥窪復見神駒來漢家勢走滅沒開風沙壯哉此馬健且雄玉花遍身雲滿鬃首如渴烏眼如電皎如匹練橫晴空使之陷陳當破敵萬馬不敢先秋風如何解鞍脫其局縱爾俶儻如游龍若不見四海罷征戰九夷盡梯航方將却爾宛水之西歸爾華山之陽幸逢韓供奉寫爾神杜拾遺歌爾良贈爾支道林愛爾神駿懸髙堂陸游題龍媒神飛影在紙雙瞳黑濕電光紫烏首昻昻渴奔水青鬃迎風拂不起逸氣難居皂櫪底勢欲陪龍走千里月支真馬有如此落筆一與王生似云是吾州韓畫士長安趙說題韓公畫馬稱神筆矯首昻藏山鬼泣眼明見此飲馬圖乃知矩度不可軼定嫌昔日徐庾體渴驥奔泉超法律騏驥驊騮老千里屹立天間甘伏櫪氣勢相宜適撡縱肉骨兼勻稱肥瘠世人但以驪黃求翠駁玉花煩剪剔若論右軍愛鵝趣知公愛馬應成癖山隂道士不換經已悟黃庭養生術特將此卷參馬祖待須一口西江吸江陵吳覿題左輔周垣隱白沙龍媒絶種進天家驕嘶玉勒憐豐草渴飲冰泉帶落花西狩還經千里棧東巡曾駕五雲車權竒滅沒猶驚電漫許拳毛世特誇岑津圉人唐衣冠天間畜神駿雖非金日磾不忝張景順飽食無嫌身賤卑時其渴燥張飲之長年牧養瘠者肥龍鬐鳳臆誇權竒韓幹仙翁揮翰手毫端幻出渴烏首氣不凋喪骨肉勻藝精端繼王裴後遙想騰驤析木津御勒難拘自在身斗水底用求他人淥波沄沄易水春吳興許采一青居士奚官小臣職奚為馬飢則秣渴飲之龍媒八尺千里姿雪花被身雲陸離渥窪異種來天池乘輿重惜間驅馳河清海晏無盤嬉壯士老死不得騎御栁春深白日遲寒甃淨汲冰花漪目光注電吻沫脂振迅欲掣青絡絲奚官小臣謹厥司猶恐若後呵譴施不必前身作馬逋馬語人心物性在善推嗚呼奚官小臣身卑賤馬不如人愚亦知奈何為人牧重爵厚祿不恤民渴飢浚刮膏血剔肉肌坐令溝壑轉老羸今之龔黃卓魯誰雲林叢社時所師為出馬圖陳馬詩淮隂龔復題韓公胸次有神竒寫得天間八尺駒曾為岐王天上賜不隨都護雪中驅霜蹄奮迅追飛電鳳首昂藏似渴鳥春草青青華山曲三邊今日已無虞吳興錢舜舉何年供奉仙寫此真乘黃矯矯天骨起爛爛隅目光豈無萬里姿御者非王良青衫老奚官肉眼空倀倀飲秣不以時羇􅎗無繇驤昂首思渥窪浩蕩充虛傷何來斗斛水似是出尚方雖霑金井思未效和鸞鏘蹭蹬十二間何異古道傍回首萬駑駘飽食馳康莊朝飲華清流暮垂紫逰韁此馬獨棄捐物理良可傷君王倘惠養請試苜蓿長石林道人吕量渴烏頂領紫駝峯跑地求泉鬛上衝不敢牽來向江水預防踴躍學蛟龍天台髙翔圉人扈從溫泉宫曉汲清波浮落紅驊騮解語意相得肉騣振動嘶春風天子臨軒催羯鼓繡茵檀板登床舞美人眄睞相輝光那復臨邊思報主潼關夜半𤇺火明錦綳兒來坐大庭此馬棄捐何足道顧影長城厭水腥丹丘柯九思賦天廏馬神龍姿目如明星耳如錐拳花鬃毛雲陸離揚鬐掉尾頳虹飛天廏馬間且驕縶以青絲勒以鑣渴不得飲瑤池泉飢不得食瓊田苖豆粟不滿腸胃枵口不能語足屢蹻天廏馬壯且武食主之食須報主莝秣失時罪在牧圉無如宋莊不得咀嚼棄其國人仇敵是與天廏馬爾不聞趙時廉將軍一飯斗米肉十斤被甲踞鞍走若雲破斬果腹殺劇辛北推燕胡西却秦至今萬古稱良臣又不聞漢季劉荆州有牛千斤角曲觩啖食十倍于常牛負重不若一牝麀老瞞渡江俘楚囚骨肉解割庖刃游天廏馬飽爾食草間豺狼逭誅殛威弧撥刺矢未直嗟爾神駿須畫力他年定遇田子方櫪上優游感恩德括蒼劉基龍性難馴萬里姿駸駸只欲望風馳奚官毋惜斗升水要載君王問具茨吳郡姚道昌五花雲散紫電光縶維未許飛龍驤垂頭欲就圉人飲渴烏作勢吞銀潢長安畫史擅筆力萬里猛氣收毫芒羽人乘風倦鞍勒一笑收拾藏巾箱世人不識真驌騮顧影尚爾分驪黃放鶴峯前有遺意神駿政可誇支郎韓性將軍西征過崑崙戰馬渴死心如焚榮勳脫鞍㵼汗血一飲瑤池三尺雪身如飛龍首渴烏白光照夜瞳流月長城凍合霜草乾駿骨削立天風寒木牛沈絶糧道阻中軍餓守函谷關太平此馬惜遺棄往往駑駘歸天間區區芻粟豈足豢忠節所盡人尢難摩挲畫圖不忍看萬古志士空長歎雷門唐珙當時四十萬匹中出羣意氣偏豪雄三騣剪花蹄削玉拳毛一團如旋風飛騰射獵南山下踏雪歸來汗猶赭奚官乍卸紫䭾韉解渴汲與華清泉鳳頭青絲掣欲斷一口擬吸天池乾日奔千里如電走飲秣翻落駑駘前東家蹇驢鈍莫驅熱浴冷水飢齕芻賢愚否泰亦如此撫膺歎息良馬圖會稽鄭嘉韓公畫馬得馬趣落筆宛有盧遵風腯肥不見筋骨露騰驤始知氣力雄朝逢圉人汲秋水精神炯炯雙方瞳卷中題詩十五客唯有括蒼留古色卷舒雪涕憶前修太息後來那可識越城戰鬭白日昏故物紛披橫道側子雲持來慰愁寂如造長安供奉堂前年沙漠射黃羊我馬飛行蹴雪霜誰挽天河洗兵甲但騎欵段還家鄉臨川危素題宛國來廷日榮河貢篚年赤墀騰紫電金埓護非烟表自殊方進思從上國宣雄姿王緒識神駿九皋憐蜀錦新裁韂秋金旋鑄鞭步因先八駿羣許壓三千試處岐王躍看時太僕牽清泉來碧甃瑶草獻瓊田弄影春風裏驕嘶御栁邊聽歌長踊躍教舞每蹁躚羯鼓聲逾壯鑾輿勢欲遷腥風搖太液烽火逼溫泉幸蜀謀非晚殱胡計失先潼關寧赴敵渭水肯遊畋殺氣橫西苑房星隱舊纒長安悲汗血仍為寫真傳瞿祐漢家天馬來西域項若啼雞身八尺秋風嘶雨入昭陵舊苑空餘烟草碧當年逐虜向沙場千里萬里行冰霜百戰歸來汗溝血斗水安足充枯腸食君之祿為君使背義偷生真可恥臨川老客獨傷心把卷看詩泪如水周景升掉尾玉驄金絡頭驕嘶騰踏吸寒流莫教重過長城窟水月光中漾髑髏張士竒雲間陵嘉同松陵張元道馬成龍觀于東郭草堂右唐韓幹用黃麻紙畫飲馬圖真跡畫馬開元中獨稱江都王緒曹髦之父子得骨肉勻停法於戲筆處稱裴絳州天寶間雖陳閣名擅一時而韓幹不肯師謂其徒摹寫形似唯曹家沈著神采生動有自然風格所謂竒也惟元朝趙松雪深得韓曹之法今觀此圖風致縱橫隨意所如稱為神手且題識盈卷極諸名家巨儒珠玉錦繡雲蒸霧蓊誠為希世寶也永樂丁酉仲秋月朔廬陵周岐鳳題吳興陸遂觀于四宜樓唐周昉士女圖泥金字標題款云臣周昉進卷為宋祕府所藏前立一女官紫袍束帶翠靴尖利如鞋弓兩手橫扇柄扇坐者應是妃嬪行戴碧玉蓮冠蟬紗映晳肌儼海棠初放按紈若有所思一侍女側髻若羊角手捧藻瓶素裳赤繻緑舄作岐頭樣一侍女圓髻若盂鉢花衫緑裙紫舄如前女式持帨于左一侍女拖髻若懸壺白襖紫褲紅舄亦如前女式抱琴俟抽抽者為垂鬟女子淡紅袍硃東粉紅幫更纎蹻也其抽琴囊甚力一姬以手擁髻體殊媻跚衣錦却立一裹唐巾後垂二帶紅袍繁䄇上下花補子握鏡向姬一姬髻頂覆如意插半月小梳凡三持小團扇倚繡床支頥生倦態一姬髻分心披後如幅巾著花半臂拈針引線向繡棚一作墮馬髻紫花脫圍腰對前姬刺繡一堆髻向頞儼宓妃粧緑衣紅襠背坐揮小紈一高髻大于面文綺殷攔著緑絲屩和身靠桐樹十三人惟二女官及兩小鬟身小餘俱肥大腰腹無異懷娠而肩則坦削具穠麗狀如畫史所載吾禾項子京即以所載跋後焉又項氏有虢國夫人行遊圖為周昉筆素地盡已爛去惟人馬獨存僅八騎也容體較前圖殊清俊砢玉識景元春院鬬雞圖昔郭汾陽之女謂周昉貌趙并得其神情今觀此春院鬬雞圖閨人具穠麗豐肥之態稚子得嬉笑襁負之狀介羽腷膊竦身悍目昻尾矯興躞蹀髙舉正在阿堵中也更竹樹花石種種咸臻六法應出仲朗手然與時維流火之初南枝蓓蕾作一二花卯水方流玉水子記于凝霞墨花二閣書畫笥唐人香山圖卷七人五百八十四拖紫紆朱垂白顱囊裏無金莫笑歎尊中有酒且歡娛吟成六韻神還旺飲到三杯氣尚粗嵬峩狂歌教婢拍婆娑醉舞遣孫扶天年高過二疏傳人數多于四皓圖除却三山五天竺人間此會且應無俞和碧樹丹崖處處春幅巾藜杖總閒身乾坤納納如許大一代風流只九人方和謝雍韓晉公五牛圖明顧氏藝閣藏公諱滉字太冲休之子史稱其在德宗朝鬷嘏無言深得相體矧出將又得統鎮之制此全人矣書法張顛畫師陸探微嘗自言不能定筆不可論書畫豈尋常筆墨所能倣佛哉牛圖黃麻紙上徽廟金書標題辛未歲豫得是卷適項孔彰來見之即取案頭宣德紙影去自此臨本不少其趙松雪三跋孔克表一跋為竹懶翁刻六硯三筆而卷已旋售真如烟雲之過眼然余所存戴嵩牛牛圖中有牧童影猶足侈夜郎王也砢玉識關同春山溪閣幅山色濃緑如潑樹屋以墨染之有筆愈簡而氣愈壯景愈少而意愈長畫史稱其師荆浩晚年有出藍之美余後得洪谷子雲壑圖真有筆有墨者畫家競多荆關余何幸獲此雙璧平陽玉子記于墨花閣貫休應真高僧像卷不由文字見真機直指人心意亦微多少老人迷未悟西來何事又西歸達磨擇火拈香還作麼道場元在一身中人間萬事休過分步步相隨是此公志公化成殿裏赴齊時自是神交匪夙期無量劫來揚化了南歸一笑已先知竺法華布囊破席任吾真卧雪當街待箇人爭奈時人多不識百千彌勒此身分長汀老子飯床踢倒儘由渠佛法何分細與粗臨濟將來本直綴全身脫去也如無普化禪師東家人死西家哀世上何人識破來只為豐干太饒舌至今巗罅不曾開寒山拾得拄杖請師權放却外通消息不須猜善知識破長沙悟三聖將何祇對來善導和尚翻身跳入毒龍湫嚇得慈明半死休直待他年六月下西歸一笑不回頭泉太道杖藜至處自悠然手托猪頭不是顛成佛善還因喫菜世間驢馬也升天金華聖者蝦蜆充飢困即眠長披一衲過炎天人問西來祖師意酒臺盤在廟神前蝦子和尚歲癸卯長至後八日山隂王英孫贊此卷相傳為十六羅漢及觀題偈皆初祖以後應真髙僧作者豈深于禪宗不屑果位者耶畫法亦非伯時以後有也貫休之徒方能為之董其昌題面目手腕描法如春蠶吐絲衣摺用玉筯篆也王子才亦參禪有得者又跋梵隆十散聖衣紋用水荇描法氣韻古淡余最喜其頌金華聖者云李日華此卷余得之梁溪華氏丁巳花朝董太史𤣥宰過余墨花閣題之後君實翁兩跋焉因考英孫字子才號作竹宋季人所藏有雪竇和尚卷云有無盡是兩頭語諸祖因不立言詮末代兒孫立户牖一花五葉失真傳又永嘉雖問曹溪路畢竟惟聞自己禪根器警拔誠難遇鑿透髙原始及泉觀此則應真諸贊深有得乎雪竇者矣余更有對月了殘經為姜氏德隱真筆其古朴遜前卷然不類世間所傳也砢玉識唐張戡獵騎圖張戡居近燕山得胡人形骨之妙畫戎衣鞍轡之精故入神品此卷非戡不能到余甚愛之宜什襲珍藏吳興錢選舜舉一犬前移五馬隨赭袍公子跨烏騅壯遊却憶飛狐北正是清秋出獵時文水髙若鳳戎王小隊獵秋野豹尾􅋶弓金絡馬蒼髯奚官喜追逐隔馬相呼意閒暇鞭梢生風箭飛雨烏騅如龍犬如虎沙平草淺狐兔肥穹廬月寒歸未歸晉安林泉生張戡者朔方人也當五季之世與胡瓌父子李贊華房從真俱以善畫番部人之屬名于時其畫以狼尾製筆蓋必有所取焉今觀戡所畫獵騎圖一卷其間人物犬馬弓矢服飾之類毫分縷析曲盡其妙觀其攬轡疾馳宛然有沙漠萬里之態于是知戡畫法精絶與胡李輩不相上下也吳郡沈石識張戡妙筆最能寫寫出胡沙好人馬赭衣壯士挾弓矢清秋出獵山之下山林霜後百草枯走犬前驅愁兔狐斯人往矣不可見撫時懷古披斯圖王庭松謹題燕角斜韜虎䩨中將軍騎氣正驍雄前鋒縱有韓盧技指示猶居第一功東南生謹題唐人作毛女圖著色絹上詩題斗方結草為衣類鶴翎初來一味服黃精宫鶯幾處銜花出猶向山中認得聲粵人謝翺秦宫一别竟忘還飲露飱風駐玉顔却笑祖龍仙分薄蓬萊空望海邊山清江敖英寶瑟無絃尚自隨秦聲那復記當時山頭剝棗分猿喫雲裏巢笙喚鶴騎見說劉郎驅阮籍空勞徐市覓安期華隂萬樹長松葉却笑君王未得知祝允明白雲堆毛女一雙丰姿端麗錯著綵繒樹皮背絆筠藍插花枝紛披如幕咸握一偃月鈎其亭亭玉立者豐趺著草兜其皎皎傲雪者繫襪至脛穿芒鞋殊逼絹素細裂古色黯然殆唐人筆也或問何以無彼時題者余舉唐詩曰曾折棕枝為寶櫛又編槲葉作羅襦有時問著秦宫事笑撚仙花問太虛是即為嵩華女寫照焉然有獨處者如玉姜輩蘇文忠公云霧鬢雲鬟不著衣山川良是昔人非祗應閒過商顔老獨自吹簫月下歸乃斯並肩者其魚氏道超道逺為秦時女真人歟楊鐵崖所咏華隂毛女藏雙魚飱松啖柏留春容若為此圖設矣繡里脈望生識梁趙巖神駿圖卷南山之下汧渭之間想見開元天寶年八坊分屯隘秦川四十萬匹如雲烟騅􅛖駰駱驪騮騵白魚赤兔騂皇龍顱鳳頸獰且妍竒姿逸態隱駑頑碧眼奚兒手足鮮歲時剪刷供帝間柘袍臨池侍三千紅粧照日光流淵樓下玉螭吐清寒往來蹙踏生飛湍衆工䑛筆和朱鉛先生曹霸弟子韓廏馬多肉尻雎圓肉中畫骨誇猶難金羈玉勒繡羅鞍鞭箠刻烙傷天全不如此圖近自然平沙細草荒芊綿驚鴻脫兔爭後先王良挾策飛上天何必俯首服短轅趙巖所畫此圖深得曹韓筆法余亦好畫何能及也故以杜子美詩書之大德五年菊節子昂右調馬圖乃後梁駙馬都尉趙巖筆也巖喜丹青工于人馬而胸次不凡能脫去筆墨畛域故其所作與尋常畫手不同圖後松雪所題筆法精謹異于他書豈亦重其畫而然耶此圖舊藏余友何翰林元朗處今始見之因題其後時萬厯丁丑三月草日茂苑文嘉趙巖畫人馬余不多見僅見此卷其筆法高古猶有曹韓遺意蓋梁人去唐猶未逺耳趙魏公得畫馬三昧者故深加賞歎録杜拾遺長歌于其後微此歌此書不稱此畫矣然拾遺集無此作魏公何從得之古今詞人之作散逸不傳者多寧獨此歌而已余按圖索駿乃并得詩恐天廏真龍不傳老杜雕龍也壬戌中秋後五日太原王稚登題蜀黃筌芙蓉宋思陵題照水枝枝蜀錦囊年年澤國為誰芳朱顔自得西風意不管千林一夜霜黃要叔富貴圖牡丹為富貴花王繪之者往往落俗古惟蜀待詔黃筌能工此種是畫設色布置神氣迥别至縑素碎脫而花瓣枝葉無少損定出要叔筆也售之者云有四幅今只得其二彼無限春風阿誰帶笑看也又題云疏簾古畫展春光葉葉枝枝富貴香自覺懶晴天氣勝千年尚襲錦江黃鴛水汪砢識李升林泉髙隱圖㫒五代蜀人世亦呼小李將軍自古雲林多隱者扶笻垂釣思悠然不妨濯足溪流畔畫裏相看認古賢子昻為厭繁華愛好山幽棲贏得此身間生平已足林泉興留取髙名滿世間京口郭天錫有客垂鈎還展卷何人策杖且觀雲掀髯濯足應髙士一種風標似不羣虞集伯生山青雲白萬林秋中有隱者心天遊行來濯足天地闊不與世輩同朋儔吳郡王希白周文矩唐宫春晚圖周文矩宫中圖婦人小兒其數八十一男子寫神而裝具樂器盆盂扇倚席鸚鵡犬蝶不與文矩句容人為江南翰林待詔作士女近周昉而加纎麗嘗為後主畫南莊圖號一時絶筆他日上之朝廷詔籍之閟閣宫中圖云是真蹟藏前太府卿朱載家或摹以見餽婦人髙髻自唐以來如此此卷豐肌長𥜗裙周昉法也余在嶠南于端溪陳髙之裔見其世藏諸帝像左右宫人梳髻與此略同而了鬟乃作兩大鬟垂肩項間雖醜而有真態李氏自謂南唐故衣冠多用唐制然風流實承六朝之餘畫家者言辨古畫當先問衣冠車馬蓋謂是也紹興庚申五月乙酉淡嵒居士張澄題董北苑溪山風雨圖右溪山風雨圖一卷無題識有私印曰容齊清玩官印曰紹興省試總轄諸司印按宋洪邁號容齊在理宗初以奎章閣學士知紹興府此卷有紹興人王某題稱知府相公所藏意者為洪氏物又有皇姊圖書印馮子振詩奉大長公主命題子振吾長沙人號海粟又號怪怪道人今私印用篆者仕元為集賢待制所稱皇姊為元公主則此卷又為元外戚家物又有李氏珍藏印不審為何人今為庶子吳君元博所藏也嘗記容齊隨筆稱畫之妙者人必以為似真江山之妙者則又以為似畫此世間常語今觀此圖凡溪山草木人物器具皆風雨也論畫者殆將以為真乎使其固幻然厯二代數百年宋元之江山皆不能有而此圖方入盛世為大夫君子所藏玩觀物者不以真幻為輕重可也長沙李東陽竹懶云洪谷子故有溪山風雨圖余嘗見王叔明所臨卷較此尚長二尺餘而景物更有歸僧扣寺門牧兒逐墮笠與浮鼻之牛守門之犬而此俱無之則西涯所云斷爛收拾不獨楮素脫落印章不全而已然其筆氣渾厚人物精采所作客舟倚樹搭蓋蓬席一婦一童子目睛仰注如生山樵有不能不遜步者專車一節想見偉人不可忽也此卷向藏余家今歸李氏清樾堂矣郭恕先升龍圖建武神仙事渺茫西桃王母惜劉郎赤龍一去無消息兒子東方御榻傍萬户千門築漢宫巍峩井幹與天通青禽當日銜書降從此瑤池碧樹紅馮子振奉皇姊大長公主命題海上參差十二樓閬風𤣥圃綵雲浮神仙尚厭人間世故作乘龍汗漫遊建章宫闕漏沈沈翠輦春游接上林未識嫦娥天上樂廣寒丹樹五雲深鄧文原雲旗來下覿仙姿漢殿隂隂碧瀨池眼見赤龍騰踏去穆王八駿不能追趙巖魯瞻宋復古鞏洛小景思陵籖題已泯宋復古用墨得摩詰之祕此卷曾入宋內府印欵俱有左驗彥廉寶藏之齊郡張紳題士行白文宋迪字復古洛陽人由進士為郎善山水松石此卷林徑深窈烟嵐開合蓋即鞏洛之景而模寫也曾入紹興內府故思陵題識尚存世傳宣和所藏未免白玉微瑕非若紹興皆極精選復有劉宸妃奉華寶藏之印又神品上上今圖後有奉華瑤暉堂印信為真玩也彥廉其保諸汝陽袁華書于陳氏春草軒雲烟淡容與岡嶺岌奔騰修塗繞巴蛇歸人如凍蠅宋侯天機深游戲精藝能風流各異代卧遊聊曲肱倪瓚落日下嵐嶺行人逢已稀隔烟望田舍應未掩荆扉鳥亂夕林暗草多秋徑微家人知候我賣畚郭中歸勃海高啓一望秋嵐似春路迷入谷無因斜陽欲雨未雨别嶺歸人幾人鐘斷鳥沈僧塢吹殘雞唱樵鄰峯迥忽見月出稚子相迎澗濱蜀郡王彛深谷含夕暉幽居入林迥澗底采芝還臨流見笻影松鶴已先歸蘿扉掩微暝張適青山鞏洛舊林園髣佛升平古意存雨外人歸秋葉浦烟中鳥下夕陽村昔年題字宸光合今日披圖野興繁風景西湖仍不異惟餘故老說中原吳郡謝徽山村晚色秋離離蕭條郭西初出時烟嵐莽蒼家住逺道路詰曲人歸遲重擔緣峻氣促息薄袂迎風寒倒吹鄰樵偶值得相問到門此夜如何其蘇人王行曾入思陵內府藏瑤琨緗軸舊裝潢山頭怪石如蹲虎溪上行人似散羊鸐谷逶迤迷短渚鯨波起伏見層岡至今玉璽分明在猶帶宣和雨露香東海釣鼇客陶振復古運意髙妙筆墨清潤大抵多師法李成議者謂山之體貌古今第一則復古之髙妙自有來矣袁子榮先生精于鑒畫以有奉華堂印知為思陵所藏時劉夫人侍高宗掌內翰文字居奉華堂故以其印識之後為陳氏彥廉所得自季迪諸公題識以來又幾十年矣先觀復古之畫復觀諸公之作恍然置我于林壑窈冥間與行旅相逐歸途也品在神妙不亦宜乎致翰林國史修撰事承務郎東吳張洪識北宋董北苑秋山行旅圖董其昌觀因定北苑畫米南宫時正見五本豫家所藏凡七本以為觀止矣都門又見夏口待渡卷吳閶泊舟又見此本皆世之罕物其昌重題珊瑚網卷二十五
