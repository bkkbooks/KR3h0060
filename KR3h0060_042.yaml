body:
  text: 珊瑚網卷四十二明汪砢玉撰名畫題跋十八文德承畫萬壑松風汪玉水購得文五峰萬壑松風圖從下數上凡五層第一層大松四樹踞盤石而生石根橫一平橋橋下湍流潄雪碎石滿澗第二層略見山脊錯落布中松五六樹樹根一老獨坐又二行者在松徑松間有亂流滚下第三層作小中松四堆在平岡上岡左右嵯岈露山腳犬牙相錯水淙淙其間一老者趺坐而琴一人倚樹而聽又二人促坐對語第四層寸樣小松三四帶雲氣雜之上作尖峰七八座左右各取勢為之峰罅迸瀑五處第五層削壁直下上下大小松樹皆披拂震動之象余王叔明臨展子禽北風圖筆法如此此等大局面畫非經著意布置與陶鑄古人法中者久未易窺其籓也竹懶李日華余又有驪山弔古圖五峰自題用董巨法珂玉記溪山仙館圖欵云隆慶戊辰九月五峯文伯仁寫樹林深杳隔洪崖五色霞屏映日開錯認桃花源上路不知真館是蓬萊彭年獨向山中訪隱君行窮千澗水沄沄仙家更在空青外只許人間禮白雲文彭文德承寫深山獨步欵云嘉靖庚戌春仲文伯仁欹枕亦吟行亦醉卧吟行醉更何營貧來猶有故琴在老去不過新髮生山鳥踏枝紅果老家童引釣白魚驚潜夫自有孤雲侣何必王侯知姓名自題山隱幽居雲木深烏啼花落書沉沉行人杖履多迷路不是書聲何處尋舊吳彭年又青緑山水山青雲白水拖藍緑樹黃茒小結菴只有紅桃霞一片令人對景憶江南五峯文伯仁嘉靖丙寅春日友人金白嶼出素紙索畫於席上草草戲筆觀之者勿笑耳伯仁再言又秋渚拂釣淺渚橫洲白露溥秋風蘋蓼水邊灘釣竿靜拂珊瑚樹雲斂青山倒影看丁未五月十又二日五峯山人文伯仁後有文休承題云疏樹罩烟薄霜溪拂鏡寒城中有塵土寧肯上漁竿又寄山圖此幅向為余家所藏萬有俱空寄是常青山處處住何妨一衣一鉢蕭然在大地真為選佛場潛菴改號寄山今日過訪因為寫圖并賦嘉靖丙辰春仲十又七日攝山老農文伯仁五峯自題畫幅雨過峯前玉一灣緑陰垂幄蔭潺湲不辭拄杖沿流去為愛虛亭貯碧山白雲重叠山千仞松樹高低澗走虹獨坐茒簷無個事漫看雲壑聽松風秋林斜日碧山遙鴈影排空暮靄消寂寂虛亭斷人跡晴波涵玉望迢迢鈎輈啼徹雨初收隔浦千山翠欲流有約吟詩過橋去風烟極目總宜秋此幅余以陸子剛玉玦與松陵吳益之交易者文五峯自題畫梅自誰剪玉粘枝白儘有清香入坐幽若使西湖貧處士臨波對月總悠悠辛丑冬歸自燕臺塵土之懷偶爾弄筆不覺頓釋江南一枝雪旖旎春風前莫遣金尊歇愁聞玉笛傳顧聞杜甫詩成東閣林逋夢繞西湖雪冷霜濃香重須知鐵幹氷膚文彭香滿疏簾月滿庭風詹鳴鐵研池氷夜寒人靜臯禽語却憶羅浮雪後登彭年雅負氷霜操終成鼎鼐功穠芳何足比祇自媚東風穀祥風傳玉圃香雪映瑶池色絶塞人未歸胡狀坐吹笛文嘉一雪垂垂合凍雲踈枝繁蕊玉增神可憐五月江城笛吹散香魂奈爾春周天球寒夜烹茶掃雪餘空齊人靜意何如最憐疏影橫斜處燈火微明紙帳虛朱朗孤山月透疏疏影庾嶺風飄冉冉香開處能催何遜賦飛來還㸃夀陽粧金用照水扶疏影臨風慘淡香高樓明月夜玉笛按新腔錢穀高齊雪霽淨無埃萬玉玲瓏帶月開疏影只宜何遜賦清芳疑是洛神來顧雲龍右題梅花詩十首皆書於五峰畫梅幀上秋日漫爾書之嵗在丙辰南屏翁志文夀承題畫蘭竹卷偶培蘭蕙兩三栽日燠風微次第開坐久不知香在室推窗時有蝶飛來西齊半日雨浪浪雨過新梢出短墻塵土不飛人跡斷碧陰添得晚窗凉余性喜蘭竹每見古人所作輒欲效之然不能得其倣佛暇日偶想像寫此數幅米老所謂若見真跡慚惶殺人者也時隆慶壬申三月草又七日在燕山寓舍作書於後三橋文彭又題水墨牡丹傾國初舒艷凌波尚怯寒春光兩相競併作一時看又題畫榴秋霜凋百卉錦顆有安榴還應兆多子積美生公侯又題水仙玉為丰骨翠為裳麗質盈盈試淡妝最是雪殘春欲去滿庭明月自生香三橋文彭文休承倣米雲山卷跋米氏雲山余所見者大姚村圖是石田臨本海嶽菴圖是先待詔所藏後歸之陳道復道復亦歸之石田瀟湘圖是孫鳴岐物後在中書舍人王子貞家苕溪春曉乃王吏部酉室尊公欵鶴所藏陳氏又有在大姚村妹家絹本小橫幅皆真蹟最後見杭人一卷則青緑紙本尤為精絶其餘所見雖多要亦不能出此上矣己巳秋余來苕溪所居日與道場山對所謂西塞山碧浪湖及松雪之水晶宫無日不接於目況以冷員散職居此真足以蕩滌胸中塵土萬厯丙子六月偶用米法寫此聊自遣興而已不足以追蹤其萬一也茂苑文嘉在耆英堂書米南宫真跡所見不過二三卷往從西吳閔氏見者大率與文休承所臨本相類吳文定有題語嘗記誦其詩云雲山烟樹總模糊此是南宫鶻􅊳圖自笑頂門無慧眼臨窗墨迹淡如無苕上人藏畫絶少惟此人共賞之余得一目甚幸甚幸休承是作不特墨氣之佳而八十老人用筆精妙可方駕南宫即友仁出亦當退舍也六止生周天球題文水倣著色米氏雲山此豫少時筆也時年少氣鋭刻意欲追二米而及之又見元章苕溪春曉於王吏部處而吾家所得海嶽菴圖為小米真筆朝夕展玩至忘寢食恨束於時學不得大肆其力今年力漸衰雖頗知用筆破墨之法而精力不逮往時偶展此卷惟有浩歎而已因書其上以志余之感時萬厯六年戊寅十月四日茂苑文嘉文水寫杜陵詩意掛幅諸詩即題其上石出倒聽楓葉下櫓搖背指菊花開杜句嘉靖己未十月望送子庸往金陵茂苑文嘉秋風去秣陵楓葉江頭赤欲識别離情一吸盡一石文嘉鶯花迷故國鵬鳥飛南溟八月秋風急家人側耳聽陳鏐嵗晚送千里林間飛一葉如此不歸來大川當利涉陸師道月白石頭城送客渡江滸飛夢逐江風依稀聽搖櫓張鳳儀緑酒朱絲琴送君清江涘别酒薦離觴殷勤勞五指彭年相送城西隈離心落葉催寒雲渺江滸飛逐片帆開朱朗文休承三梓圖三梓蒼蒼存手澤荒祠過客每懷賢黃家舊物徴遺紙為寫虬枝插紫烟范祠三梓相傳為文正公手植豫每過輒徘徊其下不獨以其樹也忍齊偶以其先公所遺舊紙索畫豫重其能寶愛世物為寫此圖再賦短句嘉靖乙酉春三月草五日文嘉又蘭亭圖曲水蘭亭宴風光屬暮春豈惟酬勝賞聊用樂嘉賔酒罰杯無算書成筆有神翻憐金谷㑹回首跡俱陳又西湖圖一段西湖趣居然入畫圖羣峰皆著寺畔岸獨飛鳬宿雨花應亂斜陽樹不孤果能移至此日日許來無又夀意綺宴開晴晝青鸞下紫霄麻姑來劈脯嬴女解吹簫麗景添春酒回風拂步搖何須羡蓬島滄海自新謡又歸隱歸來三徑未全荒拂拭重開舊草堂棐几净揩平似鏡硯池新浴粲生光客來親戚情多悅老去詩篇意未忘莫道歸遲遲亦好猶勝終老滯他鄊休承倣倪元鎮山水高天爽氣澄落日橫烟冷寂寞草𤣥亭孤雲亂小影文嘉落水照秋色悠然江上亭紅塵當少客此地少曽經文彭薄霧席疏林峨嵋江上青山公歸去晚秋色在空亭陸治題秋江獨釣此幅乃文水遺先子者秋老木葉脫江空水氣寒長安有塵土不上釣魚竿文水自題諸畫俱五言絶曽見尚書筆依稀二米間戲將烟雨意擬此越中山青山不逺世人自逺青山江上茒亭子清風日日閒日落逺山紫雨餘湖水平扁舟泊芳渚竹裏亂啼鶯四月緑陰成喬木下清影何處鳥啼花山人酒初醒山徑有柴關蕭然草樹間倚䦨無一事靜看鳥飛還江岸草蕭蕭江雲亂眼飄無愁茒屋底痛飲讀離騷日落暮山紫江深草閣寒尋詩得佳侣相對倚虛䦨叠嶂千巖轉回流九曲灣石橋閒立處常聽水潺潺雨餘飛澗急樹葉總蕭蕭欲覓揚雄宅衝泥過小橋髙天爽氣澄落日橫烟冷寂寞草𤣥亭孤雲亂山影雨過山含翠迎風樹作秋世情方擾擾消盡一溪流風定溪如鏡山明翠欲流扁舟乘興去應過白蘋洲雨餘沙磧明風起波紋亂何處棹歌聲孤舟倚頽岸日暮鳥飛還虛亭落木間遙看烟斂處一片雨餘山竹晚鳥啼寂秋清山影寒黃陵泊舟處愁下鷓鴣灘幽居深竹裏萬玉四山攢輸與高樓客憑䦨獨自看夀承題休承畫竹樹陰圍合孤舟盡日閒雨餘溪閣上獨對一青山休承自題石湖畫四首范相祠前水接天越溪莊上桞如烟石湖盡是青油舫不數西湖有畫船補陀巖下石梁橫醉卧能令萬慮醒亦有蒼苔昏日月只無江峽鬪雷霆行春橋影卧長虹落日波搖萬頃紅山似蓬萊人似玉杖藜徐步水晶宫拜郊壇逈插蒼天茶磨峰高凌紫烟一線太湖雲外見萬家燈火望中懸倣叔明溪山髙逸圖黃鶴山人骨已仙圖成髙逸尚流傳閒窗倣佛追遺法敢謂風烟似輞川舊見叔明溪山髙逸圖因追寫此紙深愧不似也萬㦄戊寅殘臘文嘉文休承山水水墨山水掛幅嘉禾汪氏鑒藏碧山雨過翠烟濃緑樹微微動晚風雲護仙宫瑶草滿古溪深處小橋通文嘉重巖噴飛瀑清風生古松相攜過橋去此興有誰同文彭又題四景幅詩翁㨂得雪中天雪淡梅清伴凍肩吟思一腔何處見蹇驢寒迹裏湖邊清溪曲曲抱山斜山下虛亭小隱家車馬不通人境寂疏林落日自交加青山隱隱水漪漪映樹蘭橈晚更移一縷茶烟衝宿鷺無人知是陸天隨千章林木擁招提林外平湖正渺瀰曽是秋來胥口見一痕山色淡修眉桃源圖偶然避世住深山不道移家遂不還却怪漁即太多事又傳圖畫到人間赤壁圖秋清山木夜蒼蒼月出波平斷岸長千古高情蘇子賦東風誰更說周郎林泉高逸圖蒼苔白石水𥻘𥻘雨過輕風不動塵攜客共尋溪上樂水邊林下作閒人癸丑四月晦日與和仲同坐停雲館中漫為林泉高逸圖并賦小詩為贈茂苑文嘉休承自題山水幅不論二米與房山巨眼方知破墨難曽是扁舟停北固夕陽江上數峯寒辛酉臘月七日文嘉清絶倪迂不可攀能將水墨繼荆關疏林斜日茒亭外一片江南雨後山漫將水墨結清緣寫法應從懶瓉傳大似輞川斤竹嶺疏筠斜日鎖寒烟辛未七月朔文嘉山齊雨坐漫焚香几淨窗明竹樹涼午睡起來無一事自翻殘墨寫瀟湘虛齊日午酒初醒殘墨餘香入硯屏小樣吳箋瑩似雪自臨南牖寫黃庭湖波如鏡繞山斜巖下雞鳴有隱家與客相攜過橋去緑陰清絶試新茶四月流林細雨餘高柯新竹滿幽居焚香燕坐心如水自捲湘簾閲道書清陰寂寂水泠泠日落羣山四面青記得滁陽行樂處峯回路轉有虛亭沉香烟暖碧窗紗緑桞陰分夏日斜夢覺只聞鈴索響不知山鳥啄枇杷幽軒正傍碧山開長夏清陰覆緑苔軒內主人今六􅐆推窗閒看鶴飛來太湖石畔種芭蕉色映軒窗碧霧搖瘦骨主人清似水煮茶香透竹間橋不著蓑衣坐野航白鷗流水帶殘陽渭川漁父休相妬只釣銀魚不釣璜罨畫溪山罨畫亭水風窗戶不須屏荷花一色烘雲錦圍著仙人是醉醒青竹長竿白鷺磯碧江還映緑荷衣憑將此假閒風物遮掩人間是與非三竿紅日一庭苔山鳥聲中醉夢回不是道人猶未起年來白眼亦慵開逺山淡淡翠眉低疏樹離離帶淺溪滿目秋光無著逺夕陽剛在小橋西茂苑文嘉急雨翻盆澗水喧黑雲堆墨暗前村衝泥不怕危橋滑要聽揚雄講法言此幅久在凝霞閣今已易去年來觀道漫澄懷長日焚香閉小齊秋到梧桐深幾許碧雲如玉朗空階品泉煮水陸鴻漸墨妙筆精王右軍煮泉寫帖關幽興白日看雲懷二君又落英圖花落江堤簇暖烟雨餘草色逺相連香輪莫碾青青破留與遊人一醉眠文嘉文外翰寫松壑虎嘯吳之西山舊無虎戊戌之春忽橫行林間因尋先人葬地與宿田兄同經其間且怖且行道逢山農多能形容其威猛作山有虎二章系於圖後歸之宿田云西山人家傍山住唱歌採茶上山去下山落日仍唱歌路黑林深無虎慮今年虎多令人憂繞山摶人茶不收墻東小女膏血留南村老翁空髑髏官司射虎差弓手自隱山家索雞酒明朝入城去報官虎畏相公今遊走西山有虎動成羣小兒夜啼爭撞門衆中最猛說白額當晝磨牙當道蹲腥風衝人行不得行人出門便愁食青天白日奈爾何老夫却愁陰類多長洲沈周成化十五年後十月常熟縣有虎來尚湖居民及其半濟殺之以送之縣縣復獻之府人莫以為異也因而作歌以紀之寫附此圖之後昔聞虎渡河去今見虎過河來深林幽谷不肯住青天白日來此胡為哉昂頭豎尾不聞吼頃刻便能登崖走健兒操舸徑乘之長篙殺之如殺狗曵來大道腥風起此畜袪除人盡喜縣官見之心亦驚連呼壯士有如此祥耶異耶人籍籍獻之大府喧自息府中諸衙競臠分髑髏為枕皮為席食其肉寢其皮虐人之報當如斯嗚呼虐人之報當如斯為人之上者寧不思李應禎何人捉筆圖猛虎出山耽耽氣猶怒即欲當前一梃之自笑書生不能武亂山西繞洞庭波山下爭傳虎迹多千年故事劉昆得何日離愁還渡河豫書題虎圖實與石田同一感題之意宿田翁語書之豫何可辭萬厯乙亥仲夏十有一日文嘉録於蔭白堂文水蛺蝶圖薝蔔花開香霧裏竹窗幽鳥勸提壺閒門盡日無人到自搨滕王蛺蝶圖丁酉嵗文嘉閒庭不種凡桃李春去初開白玉花午夢醒來看蝶舞只疑身世在南華彭年長日小庭隈幽花似玉開翩翩花上蝶應似竊香來穀祥梅雨絲絲潤幽花白白開乍晴香更逺蛺蝶過墻來文彭瑶圃仙葩白雪光瓊鬚鳳子薄雲裳暖風勾引到花傍翼粉褪粧深㸃玉舞衣生馥暗栖香輸到輕粉翅顚光師道餘題者尚有十數家文休承作蛺蝶圖蕭逺高逸非近世丹青之士所得夢見也同時題咏並濯濯名流今不可復作矣此扇出入懷䄂倣佛猶生薝蔔香也王稚登休承寫生諸幅疏枝冷蕊散寒香一樹垂垂映草堂輸却逋仙有新句水痕清淺月昏黃畫梅奕奕幽蘭傍砌栽紫花緑葉向春開曉涼庭院微風起吹徑清香度竹來墨蘭幽蘭奕奕吐竒芳風度深林泛逺香大似清真古君子閉門髙譽不能藏又誰見凌波自洛川海棠婀娜更嫣然山齊坐對渾成惱國色天香共可憐寫水仙西府海棠初聞絶塞歸番使見蔔萄入漢宫倣佛湘娥垂曉珮團絲碧玉掛玲瓏蔔萄錢磬室梅花鍾馗欵庚午臘月草又四日寫錢榖英風蓋世正氣近真民間柱石先朝直臣虹飛寶劍邪不敢臨百千妖厲化為空塵悟因弟子贊又樊川詩意入細青緑山水南陵水面漫悠悠風緊雲輕欲變秋正是客心孤逈處誰家紅袖倚髙樓欵云乙丑冬十一月既望寫樊川詩意錢榖右樊川詩意宋顧大中曽於南陵巡捕司舫子卧屏上畫此詩意而人不知其名未甚賞譽後為人具眼者竊去乃更歎息磬室因倣其意作此遂為精絶天啓辛酉春湯玉林共文氏萬壑松風持來俱有顧硯山印記余家玉鑲椰盂亦鐫硯山山房愚父子遂得二畫與盂供一室恍身在顧氏玉泓館不獨樊川詩意也汪砢玉識又蠶桑圖欵云甲寅二月十日寫錢榖衣被深功藏蠢動碧筐火暖起眠時題詩勸爾加餐葉四月吳民要買絲文嘉春到桑桑葉漸肥須筐高疊露華歸金刀切罷蠶眠起翹首迎人似欣饑彭年此幅凝霞閣最初收藏青門沈仕鴛湖圖鴛鴦湖西西板橋出郭移舟路不遙落花風起三春杪新水門閒五桞條在藻倏魚濠濮想臨流蘭佩楚人謡懸知舊是龍蛇窟每見波濤夜動搖戚元佐題夷門侯懋功南湖禪舍圖春晴野寺緑陰濃蘭槳湖南碧水通竹淨房櫳開士榻花深臺苑梵王宫微風僧晝鐘聲徹落日山門塔影空自愛禪棲同惠朗一方新月坐幽叢樵溪山項子京荆筠圖卷前有荆筠圖三大字為乙丑秋七月王稚登書入林聽擊竹選地靜班荆龍淵慧空上人持素索余繪荆筠圖為友人世賢汪君而徴其别號者遂併題一聨以呈手眼云墨林項元汴寫於攖寧菴余家季父畫蘭竹樹石頗妙絶至山水間亦佳勝然求完璧甚難惟此卷墨氣筆法俱自有神當入元鎮孟端堂奧矣是或緣慧空上人之請而荆筠翩翩典雅足可重之謂耶荆筠其寶之萬厯癸巳八月潮日項德裕識君卿父梧下生芳洲一水長種竹繞滄浪不雨朝常暝非烟夏亦凉采枝為杖紫裁籜置冠黃試待花成實青冥下鳳凰伯榖王稚登憐居㸃筆寄滄洲烟雨瀟瀟滿紙秋何日當攜葛陂杖御風還作渭川遊凌虛張鳳翼翠葆搖風鳳尾分秋聲萬斛隔窗聞庭除石友兼花客日日相看對此君吳門周善繼蕭蕭風雨滿滄洲帝子凌霄玉佩秋雲散楚天今夜月田君好共此君遊神卿蔣元龍一𣲖湖州畫裏詩娟娟風篠兩三枝今朝汶水帆前雨正是龍孫長籜時今朝原作朝來董其昌此詩已見白陽畫冊先子愛荆字世賢别號荆筠山人弱冠時與慧空慧鑑大洲竹堂定湖諸方外遊因識子京公是卷其初購之者也後更求子京作愛荆圖倣趙伯駒成青緑山水欵云墨林子項元汴為孝友汪君寫不知者俱疑非子京本色焉萬厯丁未夏華亭蔣神卿過訪留欵三宿臨别次伯起韻題卷至丁巳春董太史𤣥宰來吾家鑒賞書畫亦題卷後數十年間得諸名流為先子增重誠快事也不意崇禎戊辰春遭內外艱營殯事典質古玩是卷并周服卿號圖被友人强作媵物愛荆圖為盛氏所覩竟蹈前轍未幾余力索茲軸歸歷癸未初夏凡十六載矣此友忽持二卷來欲易余唐六如山水姚雪東畫菜及六几雙繡帨余與兒淵惟其意而莫違遂復還舊觀庶不致平泉失守遺憾千古冥冥中或亦禪寂諸老宿之力歟龍惕子汪砢玉識於韻石齊墨林畫幅一題句磴轉懸崖石松聲雜澗淙一題五言絶石路少經過山雲自來去為問高人居更在幽深處二幅久在凝霞閣因先君與項氏蘭臺兾長公酉山相善并倣梅道人洞庭漁父墨荷蘭石及所書高士傳俱遺之餘為友人乞去者不少玉記周少谷寫愛荆圖圖作山水是服卿所絶少者引首八分體為王伯榖書愛爾田家連理枝相看應咏鶺鴒詩懸知弟勸兄酬處伯氏吹塤仲氏篪張鳯翼似愛荆先生春風棠棣紫荆花酒滿金樽花滿霞相看好共宜男草應使君前席上誇王稚登似愛荆先生連理枝繁拂碧紗深深杯色映紅霞何因鍾得平生愛重感田家再合花陸士仁為愛荆先生題隱几先生南郭居薰罏筆格伴琴書鳥聲細碎話不了花面低徊笑欲舒竒石潄泉呈透漏古藤纒𣗳掛盤紆小齊清祕多真賞何獨荆枝愛有餘汪愛荆先生博古大雅有雲林金粟之風特表出之李日華孫叔達寫愛荆圖辛丑仲春為愛荆先生寫孫枝引首三大字亦為伯榖行書荆花日日好相依爛漫葳㽔勝紫微名𣗳年年人共醉不妨佳客到荆扉王稚登為愛荆先生題荆山一片玉無瑕溫潤從來君子誇山人執德心相比豈止春庭一𣗳花陸士仁為愛荆先生題卷內張伯起即書前詩後有賡題者未盡録張古塘愛荆圖卷首行草欵休休居士申時行為愛荆詞文書萬厯戊戌初夏日寫似愛荆先生古吳張龍章柴門無俗駕客至坐班荆不信塤篪異時聞咏鶺鴒為愛荆先生題張鳳翼庭前花發曉霞連露濕丁香紫玉鮮自遇田家兄弟後穠芳開處有人憐陳叔祼庭中栽得紅荆樹翠葉離離長自花欲與塤篪同感慨至今珍重在田家吳門周善繼駘蕩春光上翠微枝間纍纍綴芳菲願如連理塤箎樂不為風烟護紫衣長洲陸士仁昔聞孝義屬君家頃覩名圖誰敢誇獨步尚年堪作主幽然時對紫荆花梅墟周履靖沈士蘭作凝霞閣圖欵云甲午夏日為愛荆先生寫碧霞沈俊城南高閣枕湖頭繡栭文璫映碧流石榻漫陳霞作幕湘簾半捲月為鈎敲詩午夜驚牛斗對客花朝罄鷺鷗不必然藜竒夢醒一聲長嘯落滄洲梅癡道人周履靖日照君家近水樓層櫨曲折宿烟收天香桂子當窗落霞影蘭蓀倒檻流壁上畫圖皆晉宋牀頭彛鼎盡商周懸知閒夜茗鐺暖岸幘端為看月留元雅髙松聲莫謂幽棲逺市㕓知君心逸地應偏臺空夕照禽聲洽簾捲朝陽𣗳色鮮四顧雲霄新氣象一屏圖畫舊山川翻嫌作賦悲王粲只合賡歌大有年野濵王復元倔佹雲起五湖東稽古幽歡曲檻中每弄翠樽先月上暫拈碧篆忽霞蒙春城楊栁屏間緑秋水芙蓉鏡裏紅更有高齊得清賞品題竒石興無窮澄浦沈瀚聞君高閣市南頭畫棟朱甍曲檻幽晝信春風吹簡帙夜容明月上簾鈎仲宣此日空懷賦庾亮當年漫倚樓肯許一樽同嘯傲貧家亦典鷫鸘裘存素葉應時聞君饒逸興依水築岑樓簾捲朝霞勝窗披夜月幽登臨無俗駕詞賦盡名流余愧繩樞子閒時許暫遊耕巖散人王淑民子逸石隱稱高尚岑居逺俗氛簷前兩湖水窗裏一牀雲滿壁惟圖畫充梁亦典墳只應詩酒客可與閣霞羣秋潭智舷一葦吾翁於城南蓮花濵建閣曰凝霞玉遮君所題也曲徑臨流重垣幽邃供設玩好花竹扶疏倣佛倪迂清祕處諸客留贈尚有吳少君詩香來霞上居聽雨看莓苔項少嶽詩風月儘償松菊主溪山不負畫圖人趙凡夫詩輕風閒落荆花朵倩壓苔箋玉辟邪珠璣纍纍不止卷中圖句也若閣南為清賞齊貞𤣥子書額庭中小山翁手壘將樂靈璧玉峰英德宣城諸石於水邊藤陰外為木蘭小舫層臺高下宛然五嶽在望翁嘗作記有云吾齊之東磊磊然落落然蒼然黯然兀然泠然窈窕然為雲為霞為宛虹為隕星似霜似氷似罏似屏几得羣石爭竒獻巧錯落於梅蘭松竹間如文人之各吐所異耶觀止矣舍此惟有古玉璜佩可以煥蘚坳色乎齊東為維摩丈室竹懶作荆居士傳所云供烏思藏祕妙佛大士像對之默坐團蒲寂無音響而旃檀烟一縷出繞竹樹之罅得窺其蹤者以為蕭然天際真人也惜此時不及圖齊景耳懷日子玉記蔣虹橋臨池合作圖夫書稱魏晉畫擅宋元此人人知之至於書中有畫畫中有書人豈易知哉徐道冲乃臨池家而好繪事持真賞齊法帖命余倣臨池合作圖余愧非真畫者第朝昏盤礴敗筆盈簏年逾八旬粗知畫道與書通耳三吳蔣乾乙巳初夏識孫漢陽自題畫竹此贈余大父者尚有椿萱芝石圖為夀一片瀟湘翠若浮數竿蕭瑟倚寒流何人覓得西窗下六月閒聽風雨秋為懷荆汪文寫雪居孫克𢎞董𤣥宰自題畫幅米元暉作瀟湘白雲圖自題云夜雨初霽曉烟欲出其狀若此余從項晦伯購之每有所如攜以自隨至洞庭湖舟次斜陽篷底一望空濶長天雲物怪怪竒竒一幅米家墨戲也自此每將暮輒卷簾看畫卷覺所將米卷為剩物自荆江至巴陵連宵雷雨震蕩濤聲澎湃若有龍欲挾舟而去者今日甫意定遂親筆墨董其昌湘江上竒雲大似郭河陽雪山其平展沙腳墨瀋淋漓乃似米家父子耳古人謂郭熙畫石如雲不虛也時常荆校士歸為寫此并題董其昌畫家以天地為師其次山川為師其次以古人為師故有不讀書萬卷不行千里路不可為畫之語又云天間萬馬吾師也然非閒靜無他好縈者不足語此噫是在吾輩勉之無望庸史矣乙巳六月舟次城陵磯寫因臨吳真人書其昌舟中攜趙伯駒春陰圖趙文敏溪山清隱圖王叔明青辨圖倪雲林春靄圖南渚圖黃子久二幅馬扶風鳳山圖共十幅皆竒絶因作此小景記之戊午七月草五日望三塔灣其昌王弇州謂倪元鎮設色山水止二幅余見吳門老僧亦有其一豫鄉宋光祿所藏當有三本皆謹細有筆墨聊一倣之世所傳皆寂寥取韵類杜權耳丙辰秋董𤣥宰寫董太史思白山居圖饑食松花渴飲泉偶從山後到山前陽坡軟草厚如織因與鹿麋相枕眠董其昌陳眉公題大士像音既能觀色亦可聽此何以故耳目無性一根反源六根常定陳繼儒又仙人看奕圖緑髮丹臺坐結廬長松側仙客未通名對奕不相識雲來棋局暗雲去分黑白獨有雪髯猿旁觀無怖色又天池圖春當三月鳥聲忙桞浪參差麥浪涼此日吳閶好風景僧厨十里焙茶香白石山樵寫并題璩元瑜湛泉圖鏡臺澄徹碧天同千丈飛流百道通湛似層氷融大壑皎如寒月印秋空贈湛泉上人璩之璞李太僕倣黃大癡山水此與先子初識荆時見贈石流有激湍溪魚無滿尺鈎餌久不施持竿自標格倣黃子久富春山圖卷雪消春水動涵光凍栁垂枝未破黃不信滄江有詩句富春山下問漁郎竹懶寫於淡然無營齊倣吳仲圭筆意溪山醒雨天地夢老夫狂吟喚未醒憑仗歸來江上鶴浮雲冲破見疏星積雨中倣梅道人日華秋崖霜樹圖此贈余為號者并前後多未及入畫膢正續松屋吹烟朝一縷自吟風雨重陽句意中景物落空寒㸃筆秋崖寫霜樹片雲忽墮東陽堂收拾溪山入縑素瘦笻倚壁何所為手削藤枝作談麈日華雲裏漁竿圖淺著色掛幅此欲遺本省張撫軍者以余好之久留齊頭纍月矗天霞柱領東南潄雪飛泉下急灘渾俗有時還逺俗直從雲裏弄漁竿癸亥收燈後作日華題畫春蟲􅉡􅉡撲窗紗修竹庭前啼曙鴉昨夜空階墮明月幽人驚起嗅梅花竹懶翁李珂雪江干七樹圖欵云癸亥暮春為玉水親家寫李肇亨披來疑是竹林圖落落人間幾丈夫披拂南天礙斗極影聯楚澤動江湖昔董北苑有江干七𣗳黃子久諸人皆為之各出意態不必肖也今玉水拈為畫題余因為咏之日華為玉水親家㑹嘉衫青送行圖叠鼓津亭曉浮槎霄漢長還應有清夢時一到滄浪癸亥初夏奉送玉水親家北上李肇亨又雙松芝石圖欵云弟肇亨奉夀玉翁姻兄雙擎晚翠停仙葆細挹幽香結紫芝項又新自題山水雲過釣處峰疑吐石瞰桐江水自灣信手拈來竟誰是神遊子久富春山倣大癡筆項德新墨竹又一幅題云興到不知風起處自有秋聲凑筆來此幅在齊頭被盜桐陰洗硯墨生香又道清閒又道忙忙裏閒情人不識一枝風篠破愁腸為玉水兄寫德新墨梅此幅以余奠其先室時過齊頭作此相酬憶昔黃昏一枝清瘦有懷如隔但覷寒梢仍標凍蕊慣曽相識去年折損低枝尚兀自教人憐惜鶴氅尋蹤蹇驢踏雪何須金勒右未開明珠斛量粉肥紅綻欲試新粧晴日初烘多情含態漏泄馨香一春消息難藏掩芳唇欲吐衷腸未許蜂知還嫌月缺倚遍回廊右將開瓊脂勻搭酒暈香肌韶華一霎皎皎庭前低低墻外疏狂繞匝曉窗對鏡慵秋見翠羽嘈嘈輕壓纎手簮花折枝驚起池塘睡鴨右盛開凋謝南枝雨凄風緊每恨來遲水驛烟波夀陽嬌額一任分披還愁青子催期又早是羌笛聲悲待等和羮萬花俱後才信逢時右開殘補之有梅花卷上有栁梢青四詞豫作此枝追和其韵似玉水兄郢正弟德新墨荷焦墨濃淡成花葉是寫生中最得意之筆嬌花迎露發翠蓋逐風狂短棹菱歌處清溪水殿香無痕秋水映簾櫳翠蓋輕柔㺯曉風誰道江清能醒酒碧波終日照微紅日華題又新畫項君復初為墨林公第三子博雅好古翩翩文墨間與余契厚有年每過余齊頭或趺梅根話月或躋松巔語風或移燈寫石影或剪燭辨花色揮毫染素忘倦余亦時詣其讀易堂出所藏書畫玩好鑒賞不休意甚洽也不意癸亥冬日余自北還項君已謝人間世矣為繹韻唁之云斗酒無從共論文草年雅誼付斜曛黃金臺去空還我白玉樓成竟召君詩卷曽題梅上月畫圖猶帶竹邊雲堂留讀易看多構莫歎人琴不再聞時展其小阮孔彰為余作鴛社圖念斯際正欲補繪未盡景致恨不即促之與墨荷諸幅俱留不朽佳蹟可勝山陽之感砢玉記程大無作鍾山社圖大無名勝字仲竒歙人作墨山水吳門袁源復著色人物竹林人也鍾山侣也流風餘韻正可想見而吾輩且萍聚焉同調為期素心相照遂於萬厯癸丑秋半望日盟雞壇首約以課功針過無浪謔無俗靡繼定以五閲日一社主人備應用文具花枝茗香作清供友則自舉子業外詩文書畫琴奕鑒賞惟意所之是日遂集棲賢館其烟格泠泠步三絶之品而憑几潑墨者為羊關程仲竒氷襟月懷翛然據石撫流霞者是岐山姜還朴清臞鶴骨落落穆穆古色撲眉展螭箋記勝者係淳安應紱說劍風生抽琴雲逸㦸髯倫騎鶴客非蘇之朱君石耶淵淵獨坐奕奕畫龍竒致則潤州吳汝廷咄咄逼人矯矯繡虎英標則琅琊王伯厚蕉陰桐影間設繩牀清簟坐隱寂寂手談丁丁乃海上沈仲虞與分水何楚珍也若豫又何知亦盤白石分挹秋色而已至高山流水沉思忽往木葉脫石氣清抑永豐潘俊甫松風一榻間煮玉茗以品翠歡紅濯濯自喜實茜涇王綸仲風蘭雨菊對以玉人翩翩臨池擬文蕭古歙吳淡林耳外有香徑美人遮遮掩掩倚侍兒弄臨砌花故六曲蔣夜來乎是昔之賢祗七今之儔過十要亦各極一時之致以適其適初不沾沾江左微塵而供白眼清談曰此鍾山而竹林者也繡水盟餘汪砢玉紀於秦淮之止晉齊頓西來寫春江花月社即舊曲頓喜至乙卯秋尚為余作蘭竹飛白石便靣秦淮一帶水故是玉樹新聲陳梁佳境花月春江夜猶為吾輩勝場而無奈煞風景者徒起騷人之一唱三歎也時萬厯壬子秋余訪馬氏湘蘭舊館登其樹石之巔憑老姬人指㸃板橋故事云祠部恐廢纒頭不難毁數百年之佳麗今且移花無地著月無宫矣吳友羽南因作步院曲余和云試向藏鶯山子看斜陽流水斷橋酸若言歌舞繇斯罷何不香消院院殘自是與俞羡長諸君品藻今古平章風月主盟冶城可眺處而曲中鄭如英寇文華沙宛在輩咸能淋漓白練裙不讓桃根桃葉有青溪泛月諸作至癸丑春集靈谷梅花塢鳳臺杏花村有瑶陰㑹業合前韻語總標之曰春江花月社得頓姬瑶英約略破墨成圖絶勝纎纎初月上鴉黃海棠花下合梁州也於板橋乎復何恨封禺香史汪砢玉記於珍珠河舍吳中翰寫自韻子小影萬厯庚申花朝筆心如止水背如斷山挺若高岡之松清若幽谷之蘭家聲可以映氷潔友誼可以締嵗寒是將佩陸離之劍豈止戴進賢之冠者耶陳繼儒題是耶非耶千川一月非耶是耶銀杯盛雪如此氣韻胡不置諸巖壑之中蒼茫獨立瞻者知為玉潤而氷空吳東俞彥贊石有玉水有珠方頥偉度山海儲行徐徐動于于春風泛襟蘭氣舒不佻不銛材德俱是將為造物者以滋以植令之夷由快懌於福澤中而莫之可圉竹懶李日華夜光讓瑩止淵遜靜豐下其儀我知義勝藻瓊葩而見榮恱椿萱之髙映伯玉近與手隻像露一手余鮮昆季浮溪逺將名競且草以凌烟竚鴈王之題姓姚士粦瑩然如玉湛然若水古貌文心恬淡素履口絶雌黃胸酣經史山澤􅉅蘭廟廊簠簋亶其然乎愷悌君子社弟趙璞贊暗然自重自家珍友誼兼之學古人世上若當生李白安知君不作汪倫社僧智瓊贊豐其頤潄六藝之腴也艮其背載德輝而承之也鼎彛竹素志千秋也渾爾圭角去爾城府飲人以和也潛矣而躍息矣而摶扶搖我終不敢謂子為山澤之臞也珂雪李肇亨贊豪遊南北遍友天下士而竒絶締盟故君之度特廣博綜圖史尚論古賢聖而物色商周故君之趣特高閲歷世局至風雲百變而聞見不驚故君之􅋶特淵於爍哉玉韞山輝而居則閒閒出則炳炳者乎社弟高孟超題昔錢鏐鎮吳越尊賢渴士使名畫工二三十人在松江號鸞手校尉伺北方士子流移來者咸寫貌以聞擇清俊富厚者用之胡嶽方渡江畫工以貌奏鏐見之歎曰面有銀光竒士也即時召見今武英祕史吳君東生為先公及余傳小照真三毫妙技當今鸞尉也余時花甲半餘眉公諸名宿尚題品太過逮丁卯東歸公逺始知余之風雲百變矣噫余非銀光面安能應圖索駿耶姑對影蒙天而一笑古癡今迂尊拙人識於無營齊李長蘅宋比玉合作山水幅君畫蒼蒼帶雨松我圖冉冉出雲峰他時相憶還開看雲樹平添幾萬重李流芳題米友石寫江鄉夜話吏事仍山澤清樽卧白雲談𤣥夜欲半波浪寂無聞米萬鍾書於帆影閣并畫薛素君自題畫山水幽芳小小剪輕羅玉面檀心氣韻多好與避風藏繡箔天寒不遣試凌波素素誰將種蘭手寫此春風枝軟碧翻裙帶輕紅暈口脂蝶來沾粉膩雲動妬芳姿恰恰愁人處紛紛㸃鬢絲竹懶李日華題薛素筆題薛素花裏觀音薛姬能挾彈調筝鳴機刺繡又善理眉掠鬢人間可喜可樂以娛男子事種種皆出其手然花繁春老後人情不免有緑陰青子之思姬無可著力今又以繪法精寫大士代天下有情夫婦祈嗣此又是於姬已分上補一假大闕陷也乃歡喜以贊曰慧女春風手百花指端吐菩薩現花中自結真實果日華青樓中善繪事者先素有金陵馬湘後素有閩中林雪更有迹涉青樓而實閨處者為徐氏安生安生為余作六君子圖儼然雲林再現第恣情不檢竟蹈魚𤣥機覆轍明月照積雪徒賦百韻於秋郎前視素君之若洪度七十頂菖蒲冠也大徑庭矣彼不生此好乎誰為憐才至此極哉噫黃皆令寫南軒松單條南軒有高松直上數千尺柯葉長青春年齡自綿厯崇禎辛巳春日寫并題𢎞農黃媛介又烟水疏林幅雨外烟疏翠已成逺山如黛轉分明高柯自振秋風色鳥下滄江水正平辛巳冬日寫似汪老夫人博笑黃媛介丹青之在閨秀類多隱而弗彰萬厯癸邜冬仲得山陰范道坤氏倣倪迂山水覺清淑之氣果鍾於婦人時有吳興老儒女小字瑞丸解琴理能寫山水竹石張元長以扇請之為寫淡雲疏𣗳置一草堂其下頗得空山無人之致題云問竒人去後寂寞草𤣥亭女後不知所在天啓初寒山趙文俶著色花蝶草蟲為沒骨圖極韻藉風致未幾琉璃管碎厥女號子惠六法傳母氏無奈佳人命薄成霜飛訴也乃近日此道中在武林有葛無竒侍御家姬李因山水寫生俱擅長而松陵盛澤有楊影憐能詩善畫余見其所作水仙竹石淡墨淋漓不減元吉子固書法亦佳今歸錢蓉江學士矣吾禾若卜馧蕙金淑修輩頗有林下風然不及皆令既􅈺詞章復精翰墨也波郵怨唁梅諸作時致珠玉於內人詎意吾家廣陵散絶猶幸皆令為吾清瑶傳略不啻真真畫幛珊珊其來乎癸未夏四月草五日鴛上老鰥識西士作曼倩採桃圖白麋駕霧作仙遊手摘綏桃過十洲依舊寄身金馬籍紫泥海吸總無求大西洋琍瑪竇所攜諸畫像俱蠟地重著色人物儼映氷壺間是六法别傳異𣲖今西士在漳南者以此為生涯矣嘗見月上女圖佛光所攝處摩登伽作橫陳光景殊幻絶此採桃曼倩亦頗神彩生動余更有凖提像則紙上設色不但妙相莊嚴抑亦寶光煥發雖吳道子運筆諒莫能過允宜冠亞墨利加也香光道者玉識西畫固足異乃國初楊萱以髹筆妙繪染几屏几器具上山水人物花鳥無不精絶即古來名畫手莫能過也天啓初京師人家有彩漆酒盤四十面是萱所繪沿邊多損剝鬻古者賈老售得因揭裱成册葉如蕭字之移壁作齊也亦竒矣蓋萱能執藝事以諌至廷訊不撓其人故自超此雖遊方之內要與遊方之外同一化人妙用耳光跡昌元四十六丁亥之間人再識海國女主卑彌呼遺艷卷著色大人物日本所畫玉面花肥擁雪身緑雲委地恣華裀嬌顫時帶粗豪氣一種春風别樣新博古收藏家有籠底書畫無非寫閨中尤雲殢雨態蓋防神龍攝其竒祕也若此卷為卑彌呼遺艷乃倭國女主年長不嫁以妖惑衆侍婢千人守衛甚嚴然給飲食傳辭語則惟一男子不幾圖漢軍安趙偷乳長數尺著金踏踶辭配入山聚結羣黨戰退輒張帷幕與少男通乎若此更竒祕恐行欲寶衣龍不復顧金翅鳥王矣禾興毗飛居士識於墨花閣之香古笥拾遺元人高幅畫册烟渚雲巒克恭為景良作南宫一幅佳山水萬木叢生翠相倚幾家茒屋住參差都在陰森淺深裏從容飯罷客言還野橋平壓水西灣水上羣峰美如玉中為翠娥高髻鬟斜陽欲落尚未落放棹中流短歌作已知平陸是風波始信江湖為真樂誰闢層樓當絶頂霞外分明見孤影欲從何處挾飛仙只與遊人成逺景自能寫畫自題詩宋祚方將全盛時嗜好頗聞到泉石筆花開遍玉枝枝房山尚書南宫比一紙千金重當寧雖相先後數百年到此天機同一軌偶成烟渚寫清漪倣佛山間共水湄為報南宫應大笑老夫濡筆與題辭龍飛二十又五年仲春初吉宋克仲溫題晚窗分緑圖元貞三年嵗在丁酉中元日仲姬管道升作丹丘柯九思山水只欵無題蒙茸者巖停泓者泉築室其中百千斯年君子居之五福用全大癡老人為元實鄉兄作果肓齊圖且銘其上時年八十有二秋噴芙蓉碧陰墉薜荔清主人敬愛客留我坐西亭落日滿蒲渚清風來戶庭知子足文史汲古深綆瓶余在止善之緑波亭嘗賦此詩寄白生八月二日復為止善寫詩意圖瓉至正二年八月下浣寫贈貞居平原陸廣浣花溪頭車騎散鏡湖影裏畫圖開有客相尋草堂去何人却掉酒船回是人山林有真隱如此風塵無好懷青袍不似黃冠樂三楚風流安在哉鄭洪金門羽客方方壺作故人渺在雲林端手種梓樹隂團團不憤讀書從鬼谷何嫌賣藥近長安白日定趨天祿閣青春宜著鵕䴊冠相思灑盡金壺墨三十六峯生暮寒張雨珊瑚網卷四十二
