body:
  text: 珊瑚網卷三十六明汪砢玉撰名畫題跋十二憲廟御製曉晴色染山林紅陳陳寒鴉喜弄風雲斂碧空秋意重山橫野店畫橋東成化己巳孟春吉日中作白地團扇周圍以墨泥金寫詩及年月用二小璽圖繪寶鑑云皇明宣廟御筆有山水有人物有花果翎毛草蟲憲廟孝廟御筆皆神像及金瓶金盤牡丹蘭菊梅竹之類今觀此山水小景瀟灑出塵宛勝國氣韻蓋聖能天縱自各極其妙也臣砢玉謹識國初朱西村著色山水松吹凉生錦籜冠鳥還雲出坐中看勾溪數畝清泠水更著何人並釣竿西村朱朴畫并題時年七十有八村翁古田家徐幼文獅子林圖凉風堂珍藏踞地似揚威昻藏渾欲吼猛虎見還猜妖狐寧敢走右獅子峯林端斂夕霏泉石閟清景淡然娛人心相看忘日永右含暉峯空山無宿雲月起當殘夜漸出一峯間分光到林下右吐月峯不雨自橫空低垂疑飲澗樵子過還驚神僧度應慣右小飛虹扃鐍總忘機魔外自難入虛圓日夜明一塵元不立右禪窩萬竹雲朝合孤亭月夜明鳳來緣覽德非為玉簫聲右竹谷夜靜起山深隨風舒片影漠漠覆紫床獨卧衣裳冷右卧雲堂兀立夜迢迢松堂篆靄銷安心了無法徒受雪齊腰右立雪堂蒼蒼庭前柏明明西來意禪翁指示人又在第二義右指松軒雪中疏蕊開不知暗香發幽人試問時正值黃昏月右問梅閣疏鑿傍雲根虛寒深百尺時汲煮春芽為待參𤣥客右汲壺井非假琢磨功泓澄似鑑同朝來蓮葉盡波動覺秋風右玉鑑池余友徐賁幼文洪武間為獅林如海師作此十二景極為精妙余嘗題其上逮今四十餘年矣今默菴上人繼獅林之席今年春來京師過余出示此卷觀之真若隔世事幼文如海皆已謝世余耄獨存不能不興感於懷也上人復徵余識其後故書此以紀嵗月云時永樂十五年倉龍丁酉春三月望日太子少師吳郡姚廣孝識跋獅子林圖咏此卷獅子林圖徐幼文作凡十二段有題名篆𨽻寫之獨損缺其一按圖當是雪堂云各係以五言詩凡十二首不書名氏詞翰皆簡健後有少師榮公跋尾榮公稱余友幼文為獅子林如海作十二景極為精妙豫嘗題其上則卷中詩當是榮公手蹟郡志之所宜有也幼文名賁任至河南左布政工詩能畫吳門四傑其一也獅子林在蘇城東北隅本元僧維則之道場最號奇勝則好聚奇石類狻猊故取佛氏語名一石題獅子峰者是矣或云則得法于本中峯本時住天目之獅子巖蓋以識授受之源也姑蘇新志維則字天如姓談氏至正初人跋尾稱如海師豈即其人歟但榮公跋于永樂丁酉似為其徒攜至京師而作故有四十餘年之歎而興感于幼文如海之後世矣嘗聞榮公以少師還吳訪其師于獅子林至夜漏深微服往後門求見有僧暝目端坐止以手捫其頂曰和尚撤下自己事却去管别人事恁麼榮公憮然而去可謂本教中之喝棒豈即維則歟又聞榮公法名道衍嘗學于相城之靈應觀道士盡得其法機事執弟子禮豈遂其所見又應真耶顧風㫖巗峻糠粃事功異學中自有之不必深求其人亦可也暇日偶閲此卷因童裝之聊紀于此若獅子林之題咏尚多而幼文亦自有作天如詩尤可誦乃致幾卷以資閒中一覽嘉靖癸卯六月望儼山陸深書徐幼文竹窗風雨欲暝投僧舍風將雨忽來愁腸與詩思都被竹聲催東海徐賁畫并題風雨南禪夜那堪聽竹聲燈前同酒客但有感懷情啓與幼文晚過南禪寺信上人留宿適風雨灑玉竹聲搖戛深感于懷而幼文寫竹賦詩啓不能無言故詩以識渤海髙啓人去詩存竹更妍我當吳下想當年清風只在乾坤裏閒向珠璣掩世賢宋濂寫竹題詩贈老禪夜窗聽雨夢金蓮百年留得清風在三絶令人仰大賢東吳髙季迪徐幼文乃國朝洪武初名臣于未遇時寓僧舍值風雨夜窗寫竹賦詩曲罄懷抱到今百有餘年而遺墨如新可愛况學士宋公復為題志可謂三絶也敬書此以見尊重云安城劉宣成化間翰林幼文補快雪時晴圖欵云東海徐賁為之諸跋已刻六硯齊趙文敏為子久書快雪時晴四大字幼文補水墨雪景倣郭熙上以硃砂作一日遂覺晴景煥發玉識姚少師竹卷永樂六年夏五月余因病不出獨坐于壽椿堂之南窗忽想長洲舊業之竹歸心油然而生也故作短稍并詩以紀其事云翠葉䙰􅀈拂水雲凌霜徑節不同羣荒村寥落無人處誰謂茅菴有此君初八日午前書姚廣孝北地風髙捲塞雲黃沙吹起雁成羣客邊偶寫龍孫譜忘却江南有此君長洲戴冠次少師韻正德辛未季春上巳日壽椿堂上玉帶翁忽思故園寫秋風枝枝葉葉妙筆法湖州老將無能同故園平安有誰報風吹不到長安道何如手把珊瑚枝歸去江南弄釣絲沈周誰寫江南一片雲清風瀟灑不隨羣少師自得空川趣獨憶虛心抱節君長洲沈杰次原韻貌取湘篁入畫圖醉中拈筆墨模糊斑斑寫到關心處曽有湘妃此淚無邑人吳一鵬何處移來半畝雲秋風蕭瑟歎離羣僧家空學元無竹偶向禪床寫此君沈濤百尺喬枝上拂雲東風草木豈同羣我公曽截簫韶管奏向虞廷答聖君郡人顧福維摩示疾隱蒲團間寫江東翡翠竿想笑故栖歸未得朔風吹雪滿長安唐寅琅玕挺挺拂荒雲林下秋風伴鶴羣鳳輦不知何處去九疑空望泣湘君天童懷讓清午坐深館荒凉憶故廬故廬不可即寒稍竟何如拈毫寄幽想恍然見扶疏淋漓一枝裏思溢千畝餘誰能把清玩十襲真璠璵對此後百年風情儼其初斯人起遺慕夢寐與躊蹰楚烟雜湘雨題詩正愁豫義興杭濟玉堂學士東坡翁瀟灑墨竹生秋風海內流傳至今惜異世少師無乃同少師之身本法報法身報身僧家語也局促强置青雲道寄心慢作荒山枝髙堂烟雨吹如絲杭淮和前石田韻淇園稚子已成翁翛然落紙生清風百嵗山門留玉樹墨痕猶與當年同平安浪說無人報而今野外猶能道莫遣吳儂歌竹枝愁邊雙鬢易垂絲漕湖錢貴看竹無由返故園午窗墨瀋灑香痕釣竿漫有滄浪興恐負天邊雨露恩沐陽伊乘烟雨瀟湘隔水雲眼中清趣更無羣少師本是虛心者獨對清風寫此君永新胡錦輅維摩真性在清寒寫出瀟湘碧玉竿欲返故園歸未得秋風先報客平安古吳張珍我朝少師圓頂翁鳳凰池上寫清風油然歸思生筆底倣佛似與江南同一枝寄贈不望報至今浮落姑蘇道我來借看摩一枝禪榻茶烟在鬢絲姚哲玉帶曽聞侍五雲空門今日有誰羣閒過方丈觀遺墨灑灑清風似見君長洲沈源華景彰卧雲圖欵東湖叟為景彰寫卧雲山居圖幽人髙卧白雲窩聞說分明是華他嵐氣濕衣山住近苔痕上榻雨來多身疑太華峯頭宿神向南柯郡裏過况復傅霖人望久從龍未卜意何如延陵吳彛髙人愛向山中住野服幽然忘俗慮門連翠巘成比鄰席對長松作賓主石梁苔合少行踪落花滿地扃幽戶萬竿修竹森如束一道寒泉漱寒玉白雲來往本無心却就君家簷下宿君家有軒堪偃仰夜深雲卧衣裳冷滿窗雲影夢初回正值山頭明月上榻前雲山中月與君髙興皆清絶從今只合在山中一室閒眠自怡悅朱升幽人搆新居卜築山之陽長松翳深澗白雲藹巖房逍遙卧其下與雲兩相忘白雲本無心卷舒奚有常而以雲為邊于焉自徜徉披圖慕華躅願言挹清光梁溪修學巖阿有一士考槃遠囂氛衡門鎮長扃門外多白雲頽然卧其間夢遊湘江濆寒生紾絺綌影落羲皇墳無風自卷舒帶雨常絪緼收之歸肺肝吐出五色文壄心同盟久一笑忘憂勤醉呼扶遙子稽首雲中君梁溪王亨山雲來往潔如綿多在松扉竹徑邊雨釀曉寒侵鶴帳月移秋影落琴絃一官奔走豫將老長嵗棲遲爾獨賢便欲操觚遠相訪氤氲惟恐隔前川梅里吕敏又題白鸞不掃翠蘿深靜宿簷端伴獨吟寂寂枕書聊適興英英出岫信無心長年自悅便清夢萬里遙瞻識舊林只恐內江歸覲後也從龍去作甘霖東湖叟黃山有屋千萬間兵革由來俱瓦礫梅里有田十萬頃惟剩家儲書五車教得兒郎成令德大兒學成作官去為政成都大稱職小兒幹蠱能克家可見而翁有隂隲尊翁亦作南省郎繡衣駿馬黃金勒唯能翻笑躍紈綺隱居别業梁溪側怡然自號卧雲叟大榜髙書在幽室雲出似乎其宦遊雲歸似乎其屏迹夫雲出入本無心人亦如雲皆幻質微茫起乎膚寸間倐忽變化皆充溢乃知體物存妙理蒸成為菌樂虛出雲飛既動歸復靜心系虛靈有喧寂翁因卧雲復自號妙理充和更綿密今日翻翻來泮池索我題詩竟何益六十衰頽老病餘枯硯殘編已狼籍見善無言豈放情聊為長言一援筆吳下吕志學卧雲記士之處世有篤志于學能明一經取功名如拾芥有隱居樂善不求聞達視富貴如浮雲由其立志不同故其立身亦異也勾吳華景彰氏别業于梁溪之東津當其兵燹中廢為蓬蒿瓦礫所存僅餘數楹尚可為也乃構草堂于其南剪除荆蕪種花藝竹眼界廓然可遊可憩因晚年號為卧雲遂以為扁于焉逍遙以終衰朽來求文以記之豫以老拙固辭請之至再勉為之說曰凡山川之氣聚而為雲雲之為言運也觸石而起憑虛游行象回轉形也或從龍而行雨或無心而出岫變化萬狀舒卷莫測非神仙者流豈能卧于其中哉卧之云者偃休之也昔袁安卧雪以著亷士之名王祥卧氷以全孝子之行子之卧雲將安為乎非少陵雲卧衣裳冷之詩乎必也爵祿不及乎心榮辱不聞乎耳髙卧一室惟適之安青山在乎目前白雲宿于簷下油然而生始為白衣飄然而升化為蒼狗歘然而散則隨風浩蕩杳莫知其所之焉嗟夫人能知此可謂善達觀矣既知世態如雲知人生如夢何役役為身後計哉然則卧雲之義乃非玩春花延秋月聊寓意于雲耳自前朝至今百年之間岸為陵谷海為桑田者有之惟君家子孫相承基業不墜蓋由祖宗積德之隆式克至于今日嘗考之華氏大族本齊孝子之後髙曽以來資産巨萬至玉溪翁尤疏財仗義志獨出羣凡交游皆得時縉紳名公故鄉先生陸子方曽為文以美之事見墻東集觀其文可以知其人矣若是者豈非積德之報在子孫乎景彰長子約得過庭之訓出任成都內江簿仲子勤于治生復善幹蠱庭几燕息雲間睥睨物表優哉游哉藏以待老又安知蘧蘧然莊周夢蝴蝶乎栩栩然蝴蝶為莊周乎引而伸之書以為記洪武己未春正月既望前中憲大夫順德知府徐績王孟端湖山書屋圖卷首有友石遊戲四大玉柱篆為徐霖子仁書仲鏞與僕有夙昔之好嘗命僕作湖山書屋圖及羈塵鞅未副其意兹復以佳紙見遺乃促成之因寫是圖以歸焉吁佳紙佳畫斯為稱矣顧僕拙筆敢與此紙相輝光哉然仲鏞知我者也必不以是誚并書此以記其嵗月云鈐縫朱文遊戲翰墨四字印時永樂庚寅仲秋望日毗陵王孟端識友石先生畫品在能之上評者謂作家士氣皆備然其人品特髙能不為藝事所役雖片楮尺縑苟非其人不可得也此湖山書舍圖聯六紙而成修三十尺耕漁出沒村舍近遠烟雲變滅種種臻妙非纍月構思不可成豈獨今之所少哉子和藏此真希代之珍正德丙子三月既望衡山文徴明題毗陵王友石此圖文公為第次其品今觀其巗巒杳靄岞崿紛披參差出沒于蒼烟白浪之中以至溪橋林屋疏峰抗館農田漁艇畯父村樵幽踪往復恍若别在世外真可謂深詣湖山之致者矣讀書于此必能絶冥離類殊使人遙想而存之談太常思重性好博雅相示此圖輒遂題其後云隆慶二年夏六月十有八日俞允文記王孟端送行圖水墨山水單條客裏送君歸故鄉江天秋色正茫茫扁舟一個輕如葉半是詩囊半藥囊九龍山王孟端為彥如寫并題三江五湖口此際水痕收使節詢源委童時記釣游拒霜紅繞岸擺栁緑連疇晝錦榮殊甚歸承寵渥優髙得暘我别松江幾度秋渚花汀草不勝愁華船送子松江去夢落滄浪舊釣游王汝玉楚天木葉落天容編芳洲長歌一杯酒送上江南舟孤帆帶斜日一雁飛髙秋離情與江水相逐共悠悠王洪吳江渺無極蕭條十月初片帆河上發竟去不躊蹰由來君命重非為愛鱸魚楊士奇宦游才賦望江南紫蟹銀魚入夢甘想得到家吟樂處野橋籬落晚風酣鶴城楊斌玉壺秋水積水渺無際送君江上還九峯何處數迢遞白雲間舊業菱花老秋風鷗鷺閒故人能問訊相見一開顔王稱明道父吳江秋水濶送君龍江發相期霜降餘來看鳳城月胡儼官河水滿正秋霜鴻鴈南來熟稻粱此日送君還舊隱九峯佳處是鱸鄉姚廣孝乾坤清氣汀洲杜蘅歇南浦西風生美人鼓蘭楫路指江南行南行向何許東望吳松去吳松秋水多緑遍芙蓉渚渚外九龍山山邊三泖灣人家臨水住日暮采菱還采菱歌易斷送子愁零亂愁來可奈何思滿江南岸江南不可思動子情依依皇都春色早遲子促來歸李至剛大宗伯章碧水芙蓉兩岸開長卿初自日邊回故鄉耆舊遙相接影向孤村樹裏來翰林老友王達秋霜忽已凝客行歸故鄉仰瞻鴻雁唳豈為謀稻粱丈夫誓許國冥心浮輕航矧兹念桑梓澤灾勢懷襄白雲迢遞逺俯首師堅章解縉畫船曉發鳳城東江上青山雲幾重秋水連天三百里片帆一夜到吳淞王景又送行圖欵云友石生王芾畫㑹際明時得壯游故鄉雖好莫遲留春風一路看花去山色青青在馬頭余璿澤宫春貢選賢能萬里扶搖起大鵬上苑鶯花三日醉夜窗風雨十年燈雪消官柳黃猶淺水暖溪流緑漸增自古讀書期報國老夫拭目看飛騰折肱老人錢仲益王孟端山水卷甲申秋日王紱寫卷首李西涯篆書畫竹休將竹史看王猷家自有江山空庭莫訝千尋影萬里烟波咫尺間咫髙下青山遠近村清江處處繞柴門鑑湖一曲消多少須問君王再乞恩志同少宰得九龍山人山水長卷留豫家數月不欲空返為題四篆字意猶未巳復以二絶終之正德四年秋八月戊寅西涯李東陽賓之識玉峯深處細把平生履厯看直從湘水到吳山風帆雨屐知無數都在王郎尺素間長林疏影照江村茒屋蕭蕭自掩門莫笑白頭無舊業太平何地不君恩次韵二首後一首豫正德丙寅在陜西夢中得前二句明年丁卯謝病歸江南續成之涯翁是詩韵偶相類不復别作豈吾人同志真有所謂神交者耶石淙楊一清惟山南寧居士待隱園人品還從畫裏傳舊家元識九龍山他年曽著江行記忽漫相看尺素間處處清江曲抱村白雲碧石幾柴門九峯指㸃青如許偏得天家雨露恩常郡邵寶奉次國賢二泉將石亭王孟端水墨小景在宋箋上雲山淡含烟疏樹晴延日亭虛寂無人秋光自蕭瑟九龍山人王紱友石春溪凝翠圖前山後山蒼翠隈層層曲曲見樓臺雲隨曉月峯前墮鷗逐春溪樹裏來兩岸落花人蕩漿半汀殘雨客銜杯寰區何處有此地物外四時無㸃埃豈但右軍多筆法要知黃石是仙才奔灘觸浪飛頳鯉絶壁凝嵐護翠苔玉室金堂疑太華紫芝瑤草憶蓬萊相看六月不知暑一榻清風真快哉洪武丙子耐軒居士王達題孟端畫前山後山蒼翠深大樹小樹寒蕭森不知何處打魚者日暮泊船溪水隂鼇叟王紱自題山水山插層霄水接雲閉門默坐對爐熏無邊光景無窮趣月浸梅花夜正分又耕隱圖王舍人畫在國初如楊東里方正學之文實先輩典則自沈啓南文徵仲始一變其法縱橫姿態蓋李何以後之文也董其昌觀因題又喬柯竹石小掛幅鳴吉深愛雲林先生之畫常命僕擬之而久未得一日几間有此紙漫爾為之不覺風度灑然出人意表鳴吉見之無以優旃為叔敖乎呵呵永樂己丑立春日王孟端記空山昨夜秋琪樹芳華歇石上有叢篁常存嵗寒節孟端為鳴吉寫喬柯竹石索詩故賦如右他日重㑹于寒烟古澗濱當撫掌大噱也汝玉王孟端竹卷征衣漠漠帶風沙暫得歸來重可嗟在客每憂難作客到家誰信却無家解裝羞貰鄰翁酒借榻多分野衲茶堪笑此身淪落久夢中猶自謫天涯孟敷與僕先後雲中南歸相去百里間不遑一見乘便寫此竹奉寄并録初詩去發一笑也庚辰五月四日王紱故園歸計似團沙萬事荒荒付一嗟蟻國不須論幻夢燕巢今已過鄰家贈人墨老流離竹借榻詩存感慨茶百嵗此圖三展轉後來得失尚無涯洪武庚辰王舍人孟端與孟敷陳先生同涉難北歸間寫此竹及詩以寄中間曠懷歸况藹然可見遂和其韻以識感慨𢎞治甲子距庚辰得一百八年冬至日後學沈周題時年七十有八又孟端竹卷嫋嫋烟中映夕曛疏疏石上拂晴雲展圖却憶西江夜獨坐寒窗對此君五月初九日題于壽椿堂下有廣孝白文印儀軒朱文印秋林雨歇輕烟開清姿濯濯無纎埃特立一竿如玉立猗猗應是淇園來寂寞髙齊當日午相對令人轉清楚倣佛秋聲起座隅依稀碎影生庭戶嫩葉柔梢幾許長虛心已自含氷霜莫言翠袖天寒薄㑹見凌雲宿鳳凰昔年我亦嘗移植愛此青青無改色不似東園桃李花春風一夜吹狼籍青城山人題王孟端墨竹在宋金箋上橫幅孟端寫寄永年佳友用問平安之意不知骨老近况何如也此孟端書于卷首虎丘松壁無恙否泉石間諸公登覽之樂能相憶不無有佳作耶偶武孟家崑山曽到吳門相往來否可徵一詩寫于上舊嵗十月僕自北京歸聞孟敷已仙遊良可嗟也乃嗣能繼志尤為慰情煩詢之示及此三段孟端散書竹下有破硯生白文印鳳池退直寫琅玕醉墨淋漓尚未乾寄贈故人欣有意清風日日報平安義陽偶桓識龍香細細霜藤滑寫出瀟湘碧玉枝傾耳風簾明月夜飛瓊何處弄參差偶桓又識山館曽移玉數竿色常蒼翠影檀欒别來見說風姿在不减當年舊嵗寒梁用行書于玉堂之西序雙勾竹石小雨春池濕鳳毛天孫深處織鮫綃何人更立湘江水獨倚薰風憶舜韶王孟端寫并題又竹枝翠影蕭蕭鳳羽齊興狂猶復醉中題何當雪夜扁舟去載酒相尋造竹西辛巳三月友石生王紱為竹西先生寫并題王孟端虛亭秋色遠山淡含烟疏樹晴延日亭虛寂無人秋光自蕭瑟九龍山人茒齊煮泉圖小結茅齊四五椽蕭蕭竹樹帶秋烟呼童掃取空階葉好向山厨煮二泉友石生王紱江山萬里圖項子京家藏王孟端江山萬里圖一卷長四丈余嘗見之真希世之寶也今此卷後雖失主名余以為非孟端不能作此余家永師書千文八百本樂此能不憚煩乃爾此安知非孟端山水之興勃勃不能止奮忘倦之筆再圖此卷以豁胸中未盡之丘壑也耶不然何筆意相肖至此汪黃海攜此過余竹中覽畢書此黃海博雅好古未審以余言為當否智舷庚戌秋豫以訪友客黃之義水江行往返凡兩月餘凡曉岫夕巒疏隂空霽波光草色樹影沙痕如迎如醉若皴若抹偃仰濃淡頃刻異狀令人應接不暇萬斛一葉張飽帆者破巨浪者或難于上天或駛于過鳥未嘗不㑹心豁目詫為大觀呼濁醪獨釂也有紀行雜體詩僅貌十二三未盡委折為憾一日葦如大師攜示與然所藏江山萬里圖展閲次覺曩日烟雲變幻峯嶺奇峭估裝漁艇去來如織光景宛然在對真無聲詩可謂至寶惜楮尾想有脫落竟失主名偶髙谷傳過齊頭出與商略谷傳謂非宋元諸家誰克辦此豫賞其知言眉公亦云以蹊徑之奇怪論則畫不如山水以筆墨之精妙論則山水决不如畫觀是卷益信當湖洪邦基慶之宋南宫萬玉莊卷宋先生克字仲溫長洲南宫里人書學急就章得古人之妙尤善畫竹此圖雖寸田尺宅而千篁萬玉雨叠烟森蕭然無塵俗之氣允為世珍也龍惕子識夏太卿畫竹仲昭竹二幅一晴一雨晴者曰三徑清風雨者曰林塘過雨濃疏偃仰各得其宜時姚友叔祥為先君作壽叙及像贊曰共宋搨黃庭經遺之昶由甲科厯官太常卿楷書畫竹為當時第一畨胡海國兼金購求故有夏卿一個竹西凉十錠金之謠即一時寶惜可知已樂卿氏記于汪岡之萬玉凝青臺杜用嘉月舟圖倣荆關體成化四年仲冬十一月鹿冠道士杜瓊寫月舟上人見疑舫居士于松陵之穆溪戊子秋暮又見于吳城中居士以其能詩樂與之見出東原先生月舟圖于袖有不樂與之詩而略以緇流乎新住法雲院阿師名月舟去來原不繫身世總成浮印徹千江水觀空萬頃秋相逢問有漏資斧待誰修行舟江上月觀我鏡中天皓魄初弦後微波欲定前倦遊收釣具吟穩得詩禪曽到珠涇否三生舊有緣嘉禾周伯器名鼎此夜閒乘月長風謾引舟有僧如惠逺何樹是閻浮飛鏡三千界推蓬五月秋扣舷能見許豫亦事清修出定何招礙舟行月在天交遊千里外樽酒十年前白社誰非客曹溪即是禪搖搖無住著從此謝塵緣泊胥門月舟上人以圖索和和中無舟子解事語擊空明沂流光在人自為之壬辰三月綬志一棹清江近塵途更不由烟光分遠渚秋色自中流偶作有為偈非關無酒憂歸來有别個猶自未回頭東原先生贈月舟上人詩畫清絶一時山隂余玠見之遂和杜東原自題山水紛紛畫債未能償日日揮毫不下堂郭外有山閒自在也應憐我為人忙杜瓊杜淵孝先生明經博學家貧道尊貞淡醇和粹然為丘壑之表得朱長文樂圃東偏地結亭聚石號曰東原故曰郭外有山然云日日揮毫而所存者無幾余僅有其𤣥墓看梅圖倣趙善長山水而已卯水畫中人汪砢玉識沈貞吉山水題詞一竿風月一蓑烟雨家傍釣臺西住賣魚生怕近城門况肯到紅塵深處潮生解纜潮平鼓枻潮落放歌歸去時人錯認嚴光自是無名漁父八十三翁沈貞題于有竹居沈恆吉山水題詞此老粗疏一釣徒服也非儒狀也非儒年來只為酒糊塗朝也村酤暮也村酟胸中文墨半些無名也何圖利也何圖烟波染就白頾鬚出也江湖處也江湖時雨方霽寤寐北窗展玩古法名筆聊為作此贈誠菴老友一笑沈恆沈貞字貞吉弟恆字恆吉號陶菴又號陶然道人為吳興人即石田先生之父二處士並善丹青塤篪相映時謂趙文敏同流恆吉之畫師杜徴君余向有婁江勝感接待寺八景為貞吉所圖一一倣宋元人筆真合作也浮溪道脈浩然子識于天緑臺之積石瑤房珊瑚網卷三十六
