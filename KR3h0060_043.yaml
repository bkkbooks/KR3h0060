body:
  text: 珊瑚網卷四十三明汪砢玉撰名畫題跋十九唐宋元寶繪董太史題籖計二十冊宋以前大家都不作小幅小幅自南宋以後始盛又僧巨然筆絶少丈餘畫卷長卷亦惟院體諸人有之此冊皆北宋名蹟及吳興趙文敏之筆余於馬夏李唐性所不好故不入選佛場也董其昌舊總題王維雪溪圖第一板沈啓南先生題江山雪霽圖有曰平生所見沙溪孫氏所藏雪渡圖盈尺而已正此圖也或筆誤以溪為渡耳有徽廟御題有歷代小璽無復遺論當為希世之寶此冊開卷右丞營丘便足壓一世收藏賞鑒家知其不朽𤣥宰題李成晴巒蕭寺圖第二板宋時有無李論米元章僅見真跡二本著色者尤絶望此圖為內府所收宜元章畫史未之及也右角有臣李等字余藏之二十年未曾寓目茲以湯生重裝潢而得之本出自文夀承歸項子京自余復易於程季白季白力能守此為傳世珍令營丘不朽則畫苑中一假竒事戊午夏五之望𤣥宰題眉公妮古録李成晴巒蕭寺文三橋售之項子京大青緑全法王維今歸董𤣥宰余細視之其名董羽也此録刻已久豈𤣥宰未之見耶乃玉林裱時在戊午春矣何又有此一番新話子昂自題西洞庭圖第三板山之凹兮水之涯沙稜稜兮石礌礌有媺人兮如彼蘭􅉅思之不來兮使我心痗子昂自題東洞庭圖合前共板洞庭波兮山嶻嶪水可以濟兮不可以涉木蘭為舟兮桂為楫渺余懷兮風一葉畫洞庭不當繁於𣗳木乃以老木緣岸楂枿敗株居然榣落湖天寥濶之勢從此畫出是子昂章法迥絶宋元處是構凌雲臺手董其昌子昂洞庭兩山二小幅各題以騷語四句全學董巨川為𤣥宰所藏此亦見眉公妮古録關同雪圖第四板因觀王右丞雪溪圖始知此圖為王維伯仲𤣥宰米芾雲山第五板此畫法謂之潑墨王洽作祖意老米時猶及見之不則米老雖狂無此大膽獨創也旁有薛氏家藏印殆是米老為紹彭墨戲者耶𤣥宰題倪元鎮設色圖第六板紫溪翁過甫里先生舉酒屬和而歌曰一丘之木其棲深也屋我容不辱一溪之石其居平也席吾勞以息一竇之泉其音清也絃吾方在懸得乎人得乎天吾不知所以然而然先生辨而賡之曰采江之魚兮朝船有鱸采江之蔬兮暮筐有蒲左圖且書右琴與壺夀與夭與貴與賤兮歌與而以下缺至順三年春三月枌雲隱倪珽書余為希賢作此圖今已七年至元三年秋希賢攜以示余不復記憶因題詩於左方怡神息繁陰洗耳臨長流縱情邱壑間聊以寫我憂瓉重題觀此圖知雲林子初名倪珽其書法初年精楷後乃流便雲林畫世無設色者此更一竒倪雲林六君子圖第七板至正丙戌嵗二月倪瓉寫幾年曽識倪徴士能寫雲林作畫圖今日摩娑雙老眼青山倣佛是東吳東吳趙淑幾個臨流𣗳滄波落翠陰幽人不可見獨立望雲林彥常能與米顚相伯仲風流還只數倪迂應將爾雅蟲魚筆寫此喬林澗石圖句曲外史余家有荆蠻民喬林古木圖為天下倪畫之冠晚得六君圖亦堪鬪勝也𤣥宰題王䝉秋林書屋圖第八板元季四大家黃鶴山樵小幅絶少豫有青辨圖為叔明得意筆晚而獲此圖莽蒼飛動入冊無復遺恨矣董其昌曺知白吳淞山色第九板一片吳淞江上秋淡雲涼葉思悠悠何時蓴菜鱸魚膾却向先生畫裏遊潘純終南求捷徑少室索高價唯有懶雲西山深無俗駕陸居仁曺雲西吾郡人與倪迂同時以畫相倡和山水師馮覲覲宣和時宦官大都似右丞之娟秀𤣥宰王安道蒼崖古𣗳第十板古𣗳蒼蒼楓葉丹此中别似一人間如何忽起思鄉念不是台山是鴈山無欵元人題王安道名履婁江人精於醫不讓丹溪訪藥秦中不得遂游華山作詩紀竒絶有華山圖四十幅尚在武揮使家王弇州先生曽令陸叔平摹二十許幅及俞質父録其詩與序此圖細潤古雅非華山圖筆法更自超也𤣥宰題趙元山水第十一板趙善長畫師董元僅見於此董其昌商德符畫第十二板至正三年浴佛日鳳翔曇公以李廷圭墨見贈作此元集賢商琦與子昂同時𤣥宰陸天游丹臺春賞第十三板江南風物軼飈塵天際層峰意出羣乳竇雨晴飛玉液顛崖露冷瀤松雲丹砂勾漏何年受璚笈靈符此日聞借問安棲珠樹鶴山居如畫個中論陸廣陸天游徐幼文皆宗黃子久此圖尤天游善者機也𤣥宰題巨然山水第十四板僧巨然江山晚興卷宣和殿所收董其昌范寬江山蕭寺圖第十五板無跋郭忠恕摹王右丞蜀山圖第十六板卷後有宋景濓小楷跋余剪去謂恕先畫不一精此自可物色耳其昌黃公望橫幅第十七板善士尚友尚論古人誦詩讀書如炙如親與善人居如入芝蘭室久而不聞俱化而一之子好友珍閟簡書以褫以襲庋之室廬有扁其顔辟諸芬苾玉明氷壺知非二物鹿鳴􅊯􅊯停雲藹藹匪今斯友交道之在右芝蘭室銘楷書畫上淳熙戊申余居是山夏初與二三子相羊瀑流間得芝草三偶相比如卦畫成華如蘭玉明氷潔洞徹照眼乃悟芝蘭者非二物也因銘錢氏芝蘭室故併及之至正二年夏五月望大癡道人黃公望寓雲間𤣥真道院造又題象山先生玉芝歌黃子久小楷如此逼古不減晉唐當行家而題畫右欵草率具體竟掩其真書古人深逺善藏不必一一自見至如此畫之老以取力此書之嫩以取態皆變體也壬子九日其昌題大癡姚江圖第十八板畫團扇上子久之學米山能變米法故足並峙𤣥宰高彥敬山水第十九板元時以房山鷗波並稱趙文敏於高尚書數有題咏倪元鎮亦以黃子久不及房山為其脫盡畫師習氣所謂逸品也𤣥宰題梅道人畫第二十板吳仲圭學巨然自稱梅花和尚為已得其衣鉢如曺溪一𣲖自許不小觀此圖非妄也董其昌此册在萬厯丁巳春仲董太史𤣥宰攜至吾地余同項又新孔彰過其舟中得閲翌日太史挈雷仁甫沈商丞至余家更攜黃子久畫二十册與先子觀越宿始返之也後是冊歸程季白於己未秋余復閲於交逺閣已去馬文璧一幅元人著色櫻桃白頭翁鳥一幅補入王摩詰雪溪圖用五百金得之青浦曺啓新者又入王叔明秋林書屋圖太史因題其籖云今日始得加一唐字矣余時録其題語未幾季白遭魏璫毒手其家裝還歙崇禎壬申冬聞售於東倉王某并叔明青辨圖諸幅僅償千金未及原值之半也噫十餘年間滄桑之變一至此人與畫殆相閲而成古歟西吳龍惕子汪砢玉識於潄六齊宋元名家畫冊李成小卷得之光祿潘雲鳳趙大年對幅得之劉金吾禧荆浩一幅得之靖江朱光祿在明郭忠恕二幅得之顧中舍正誼趙吳興垂釣圖得之朱司成象言家名大韶余最愛吳興公及伯駒小景皆聞而購之共得百幅拔之衆尤得此草幅猶欲去朱鋭曹雲西未有可易者二十年結習之勤亦博得閒中賞玩人間清曠之樂消受已多東坡云我薄富貴而厚於畫豈人情哉然授非其人能不靳固瑞生有畫才少年篤嗜非耳食者因以歸之他日畫道成為余圖五嶽不負傳衣佳話庚戌十月其昌題天啓壬戌元日至十有三日無日不陰雨氷雪戚友相過皆噓呵瑟縮無少歡緒因發猛思拉徐潤卿汪玉水同兒亨過程季白齊樓煮茗團坐出觀董氏畫冊一一評賞營丘古淡蕭瑟趙大年對幅一作近景林樾環繞一坡陀岡拾級而上作苫茒廊房通高閣可以眺望而下止沙岸平橋不知何適其一作逺景平林漠漠之下有三子母牛一飲水一伸項垂胡瞪視一蔽翳叢薄間極有態而隔水仍是半邊圯橋或云二幅相凑然無接紉處蓋蹟分而意合當時直寫所到與所見耳天真之趣虛摶之則散漫不屬實據之則逼塞可厭妙處正在虛實相構有意無意間昔人嘲大年守宗禁不能逺適有所貌染以為定是朝陵回也然妙境㑹心豈必在泰山喬嶽哉蘇米輩直用相嘲耳非篤論也王晉卿梧庭霜樾四五碧梧葉已脫盡緑幹高挺與石烟莎雨共結空寒之韻真竒作也伯駒花溪漁隱設色鮮潤子昂青山白鷺意象高華朱鋭雪中驢綱種種纎備黃子久蒼率渾成董𤣥宰疑為北苑余謂未必曺雲西王叔明倪元鎮俱未確皆𤣥宰所欲去而未能者畨覆諦觀間遂令神情酣暢如昔人暮春修禊清夜遊園各各滿志無復陰寒凝沍之歎即黍谷召和不是過也吾輩樂此乃至不為寒暑所困豈復有疲厭哉李日華識前冊高頭此冊減半向在董處有大小冊之稱董氏集古畫冊共十四幅題者五幅五代周文矩一二南唐顧閎中三荷葉如錢三月時幅巾藜杖一追隨爾來勝事知多少惟有風標公子知御書之寶宋趙大年四趙千里五趙伯驌六蓮開宫沼年年盛香染斑衣葉葉新願借琴音奏清雅薰風凉殿夀雙親楊妹子題宋夏圭七此幅畫錢塘觀潮圖乍見之即定為閻次平及諦視始得細欵於𣗳梢則夏圭也又復展之於石角中亦注夏圭名意禹玉自愛不欲以姓名借客者與然次平之去夏圭乃不盈咫尺矣丁酉秋九月草一日龍游舟中書𤣥宰宋趙千里八宋趙希逺九高宗題池上疏烟籠翡翠水邊遲日戲蜻蜓賜志忠御書之寶宋馬逺畫列子御風十劉松年十一十二十三馬麟十四有細欵臣馬麟南望青山滿禁闈曉陪鴛鷺正差池共愛朝來何處雪蓬萊宫裏拂松枝瓢印御書靖江朱光祿得婁江王敬美家藏畫冊九十二幅余購之先後七年始得合併又汰其紙素渝損者及畫品不甚超者與夫樓臺鞍馬花卉禽魚之非余所習者僅存十有四幅皆唐宋名手神采奕然余所見海內收藏家畫冊甚多然非衆尤之尤也此本或無愧焉董其昌題婁江尚有王元美所藏宋畫冊四十幅逸季以歸王辰玉首有董元畫如大李跡餘皆院體梁溪嵇氏七十八幅惟李唐最精好余舊得三十六幅於長安以西園雅集伯時畫元章書為最趙伯駒畫杜詩次之後亦失去項氏頗無可憶者其昌唐宋元人畫冊𤣥宰鑒定春雨烏犍破緑疇牧童牽飲傍松楸而今洗耳無巢父千萬休教飲上流儉齊題戴嵩驅牛圖李贊華人馬衝雪圖徐熙文禽戲水圖巨然平湖舟泊圖絹素遙岑矗矗水潺潺苑屋松風晝掩關落日鐘聲來逺寺行人初向石橋還適齊宋徽廟荔枝對幀李伯時毛女對幀趙千里卧雪圖絹素疏林茒屋掩閒雲雪瀑懸崖霽色新好是杜陵詩興逸蹇驢隨意樂行春適齊劉松年田園樂二幀馬逺觀瀑圖馬麟奕碁圖趙松雪山水子昂二字欵陸瑾有山陰高㑹圖吳興此小景是臨陸瑾者吾松朱象𤣥司成家物董其昌觀盛子昭溪山拽杖圖積水潜通渭連村不近城青雲浮野濶春氣與人清鶯響出幽谷琴歌非逺征客心在三益山水向人鳴雲莊吳炳盛子昭停舟觀鴈圖秋色淡江渚晴林楓未凋逺村雲際擁孤島沼中搖鴈影雙翻水漁歌半倚潮停橈正回首霜信晚迢迢雲莊吳炳霞上寶玩集唐宋元名蹟品汪氏墨花閣甲唐詩緒言霞上開夫玉屑霏霏尚有天際真人之想況繪事泄胸中造化恍惚變幻不啻赤城上動金光沉緑綺夾月貫日綺散爛不收也玩之允宜寶之荆浩交泰圖第一幅在絹上絹細膩如南朝官紙世論洪谷子畫為唐末之冠此幅得之於高友明水𣗳石蒼古三羊有生動之趣因相傳為交泰圖真有筆有墨不獨善為雲中山頂以山水專門也砢玉識周昉採蓮圖第二幅在縑古色暗然傳稱仲朗長安人傳家閥閲善屬文善畫貴遊人物乃此雙女採蓮有穠麗之致而無豐肥之態是窮丹青之妙者也家藏已久尚有昉作折桂美人玉水題郭忠恕寒巗積雪第三幅絹素團扇上雒陽郭恕先善畫師關同然少能屬文能篆𨽻非尋常工藝所及在周為博士入宋為監簿夫亦曼倩陸沉金馬門意乎卒之忤旨流登州中道尸解去吾於所作寒巖積雪每想像其丰神不已玉水識黃筌八仙花第四幅絹碎惟存花朵枝葉孟蜀待詔黃要叔畫資諸家之善而兼有之故即一花而千年神彩依然不脫蓋其花竹師滕昌祐也然鶴師薛稷而時諺云黃筌畫鶴薛稷減價筌嘗畫四時花鳥於八卦殿鷹見畫雉連連掣臂蓋疑於神矣卒之隨孟昶詣宋闕雖恩賞不替而傷心黍離竟至不起其人品豈諸畫師所能及哉樂卿題崔白花下鵝羣第五幅絹微染黴余既有崔子西橫幅為桃澗雛黃極傅染之妙此則花枝紅蔭間一鵝雄者鼓翅相對呼其羣一鵝雌者伏地伸頸引其雛一雛唼母喙欲食二雛蹲倚若俟生動之趣儼然畫史謂白長於寫生尤工於鵝誠然哉余何幸獲此雙璧砢玉跋於三山草堂李營丘江山雪眺第六幅絹素斗方繪雪者無非在峯頭𣗳杪積粉堆素而已斯則漬焦墨成黯淡之色覺雪意恍然一云古人最喜畫雪如王摩詰林亭雪岫趙幹江行初雪關同關山積雪宋徽宗雪江歸棹黃大癡九峯雪霽現在人間皆守常法惟李營邱作峯巒林屋皆以淡墨為之而水天空處全用粉填此其超衆長而獨自標竒即吾家江山雪眺變局也故當年吳功甫極珍此冊價頗不資樂卿朱羲桃村雨牧第七幅絹素斗方北宋朱羲江南人畫牛得名作斜陽芳草村落荒閒之趣雖望戴嵩不及亦自名家此為桃花村舍烟雨中緑蓑牽犢而過正羲得意筆也桃花潭水人跋徐熙設色花鳥第八幅在紙上對板為思陵御書人言道院屬江西古一真人卧水湄可是瑞蓮花葉大載他書冊泛漣漪御書論畫者謂黃筌之畫神而不妙趙昌之畫妙而不神兼二者一洗而空之庶徐熙歟熙所作荷枝水禽於葉幹翎毛俱用金泥染倩殘芰焦色儼然奕奕生動真妙奪造化寶鑑以其畫多在澄心堂紙上乃此幀瑩净膩細所謂南朝官紙女兒膚也萬厯甲寅重九後余設湯餅㑹坐客出是冊為吳功甫物余以玉巵一犀觥二易之項又新程季白俱欲此前後數幅而未能奪余好也玉水記宣和帝御繪稻雀第九幅在絹上徽廟好書畫興學較藝如取士法由其天縱之妙得晉唐風韻尤注意花鳥是冊稻穗垂垂寒雀啄食㸃睛以墨漆隱然豆許高出縑素幾欲活動一云用李廷圭墨所謂百年如石一㸃如漆也押字用天水葫蘆小璽御畫此幅亦功甫物先君用兼金得之砢玉趙子固水仙第十幅在紙上有詩題對板翠帶懸璫重淩波步步輕春深不成怨錦瑟夜無聲翠屏道人氷肌玉骨照清波瑟瑟塵生襪底羅自是仙娥招不得滿江春雨夜如何孟載題避風無語步凌波翠壓輕綃鬱綺羅江上醉歸環珮重玉英香褪粉痕多鄭升玉骨氷肌不染塵霜風凛凛倍精神凌波翠袖輕移步倣佛桃源洞裏人金溪陳妥良工筆意奪天工寫出仙葩玉一叢窅窕臨波何處去却將餘種媚冬風玉阜性閒幾日東風雨乍晴獨騎官馬繞湖行詩成酒力都消盡人與仙花一樣清松軒以下截去翠袖金鈿白玉姿芳心無奈雨雲時陳王不作襄王夢解佩江頭欲贈誰盈盈羅襪凌波靜淡白光含月色新香散蘂珠春寂寂却疑姑射是前身徐賁淡墨輕風玉露香水中仙子素羅裳雲鬟霧鬢無纒束不是人間富貴粧歷山老人金鈿玉質緑羅衣素襪凌波月下歸解道仙人誰可伴水晶瓊樹兩依依倪輔此係掛幅用價二十金得之馮氏裝冊時無端中截凑入其詩題滿紙不能盡留至今追悔不已李公麟白描湘君湘夫人第十一幅紙上有對板伯時作畫多不設色此白描湘君湘夫人綰髻作雪鬆雲繞更細如針芒佩帶飄飄凌雲雲氣載之而行真足照映千古對題即書騷經二則欵為嘉靖丙辰正月榖旦長洲文徴明篆於玉蘭堂樂卿記李晞古秋山䇿蹇第十二幅絹畫團扇上遙山耶逺水耶吾望其色浮浮然玉水題李唐青林盤礴第十三幅絹畫扇高宗嘗題其畫云李唐可比唐李思訓觀此信然砢玉李河陽攜琴訪友第十四幅絹畫團扇傳稱李老筆意不凡年近八十猶待詔畫院是烟雲供養亦可作地行仙也樂卿識於藥房夏圭山雨欲來第十五幅團扇紙上溪雲初起日沉閣山雨欲來風滿樓其景象盡於禹玉筆端矣西吳菰蘆中人馬逺松澗盤桓第十六幅縑素上松身墨痕堆起應用易水輕烟也畫法臻妙不必言李迪楓林石壁第十七幅絹小斗方迪在孝光朝大有時名觀此何山水小景有不逮耶吳仲圭北固風帆第十八幅在絹上揚子北固為米氏留意處乃得入梅花老手覺江山勝槩在几席間千頃生識於采石磯邊夏九山滄江釣叟第十九幅絹畫團扇至正庚寅九月七日九山夏考昌寫畫題四字在前觚不觚録以畫當重宋而近忽重元價驟增十倍蓋取其氣韻勝也此幅氣韻大似倪迂王孤雲龍舟第二十幅絹掛幅截冊至治辛酉夏月孤雲居士筆界畫細整至王孤雲而極第龍舟為順帝所創乃至治間何以有此樂卿贅言東坡云凡事不欲勝人而惟書畫當為勝事愚父子於萬厯間集諸名畫半出家藏半易諸友內得之吳功甫為多合選各自成册自謂頗殫心力乃求其精妙如霞上寶玩者能幾何哉然東坡又云我操其勝則諸畫家皆負矣檇李罨畫居士汪砢玉識韻齊真賞集唐宋元名繪品汪氏家藏甲乙畫之鑒賞在人心目所㑹各有去取若此册品别有我以為甲而人以為乙有我以為乙而人以為甲似未可定然總屬真賞中無妨於甲乙之也畫冊向藏月香居右為自韻齊取風來絃自韻句內人於此習琴今藏東雅堂後為韻石齊竹懶翁以題所供靈璧總之為韻齊耳故名焉然松竹花影亦自寫韻不盡關同春郊遊騎第一幅在縑古色暗然山含嫩緑水拖藍桃李陰陰如欲酣矗矗漁罾村舍釀畫橋香徑且停驂砢玉題關穜團扇小景戴嵩牧豎籠禽第二幅在絹樹隙小欵存半畫牛自韓滉後為戴巡官及厲歸真裴文睍然裴寡合之性孑立於當年厲掉尾之圖見嗤於田父斯牛鼎足背立回顧儼然足為大武君傳神而童豎舍牧登樹以籠接蓄禽嵩乎野趣幽然不獨畫牛野性也劉松年秋林訪道第三幅絹素斗方結廬在山林訪乘秋氣新豈是讀易者抑亦草𤣥人趙令穰荷亭美人第四幅團扇絹上桞亭面面撲香風無暑氷肌花映紅故是大年柔嫩筆荷香清夏得無同月香居士題趙昌薝蔔畫眉第五幅在絹上畫史稱昌之所作不特取其形似直與花鳥傳神也趙子固三香圖第六幅在絹上彛齊居士善水墨白描斯作水仙梅花瑞香清而不凡秀而雅淡望而知其為孟堅筆也天門掃花人陳居中絶塞嬉春第七幅在絹上嘉泰畫院陳待詔専工人物番馬此又多山坡緑野楊士賢秋山松屋第八幅團扇絹上楊待詔多小景徑挺可取是圖石壁古松偃蓋屋宇幽人兩兩對坐廣除竹樹蕭疏間懸泉縈階下而逺山一抹外長空極目無盡誰云雄偉不逮郭熙耶玉水李唐山齊幽話第九幅絹畫團扇竹扉臨石澗紅樹隔虛亭危岫如雲壓選騷對坐聽蕭照松壑清陰第十幅絹畫團扇蕭照性本知書善畫值靖康中失身緑林嘗掠李唐簡其行槖惟粉奩繪筆因叩知其姓氏雅聞唐名即辭黨隨之南渡唐感其生全盡以所能授焉紹興中待詔畫院賜金紫繇妙得唐之神也是圖森松絶壑梵宇髙下其間遙山在天末如層波真景㑹意先筆游象外者乎鴛水松隱子跂於青人巢夏禹玉瀟湘晚渡第十一幅縑素小斗方高低藴藉筆寫出瀟湘色竹浪晚山橫歸帆不可息馬逺獨酌吟秋第十二幅在絹上馬氏世擅丹青逺在院中尤稱獨步觀此作墨氣淡蕩灑然塵外足徴家學之妙馬麟高山流水第十三幅在絹上人謂馬麟之畫不逮父猶夏森之於圭也逺愛其子多於已畫上題作馬麟此幅則為麟自欵作撫琴者於高山流水間一松橫偃如虬龍蟠空筆意高古奚必借重阿翁延譽耶平陽里不因人熱者跋馬騤卿蘆汀泛月第十四幅在絹上騤卿不見畫苑在宋元名繪册內為吳功甫鑒藏山豆即興祖後裔耶淺黛如約眉回瀾若截鐵篆寫千蘆景懸一月的是勝國以前筆也千頃生識錢舜舉得子圖第十五幅在紙上高懸碧玉枝得子是鳳實用賢則生者霅川筆寫出管道升竹石第十六幅在紙上有沈周寶玩印章魏夫人又再當年疏綺風情苔石烟濃淡墨痕眉嫵樣倚身修竹總嬋娟仲姬封魏國夫人方流玉水子梅道人溪山偕隱第十七幅在絹上余幼時習業藤花閣欲糊屏幛風父執沈澄甫以吳仲圭山水邊景昭花鳥二幅見遺俱碎如氷裂邊畫遇飈即成烏有仲圭畫久湮廢紙內矣歷三十餘年始簡裝入冊依然梅老復生也畫亦有幸不幸歟樂卿黃子久江村漁樂第十八幅在絹上漁船相問欵中流細雨風吹上逺樓不為江頭蝦菜事星辰昨夜應羊裘為魏塘徐舜舉題秀水吕㦂王若水秋塘鸂鶒第十九幅紙上小斗方淡軒花鳥竹石稱當代絶藝則自幼得趙文敏指授也觀淵此册天機溢發肖古而不泥古者乎脈望生吳瓘梅雀第二十幅在紙上吳瑩之為吾禾人多藏法書名畫寫梅學楊補之頗有逸趣其寒雀爪啄更生動宛然不下錢玉潭也崇禎戊辰春為先人窆厝費因出家藏書畫宋元代名蹟各百餘冊卷軸稱是并虎耳彛雉卣漢玉犀珀諸物易資襄事而古繪兩函尤時在念也至甲戌秋黃越石忽持前二冊來云得之留都俞鳳毛已售去十餘幅為王右丞團扇小景許道寧繪池草鳴禽句張擇端作興慶宫五王奕棋圖周昉折桂美人黃筌紅蜻淡竹花趙幹梨花趙昌月上海棠蘇漢臣貨即擔其閨人兩兩裝束即宋詞平頭鞋子雙鸞小也又二嬰鬬促織三孺子放風筝從訓養子石壁松亭界畫極工緻柱上細欵三朝供奉李嵩錢舜舉牡丹雙板梅道人折竹諸冊時越石欲余貫休應真卷為宋王才翁題偈馬和之破斧圖思陵楷毛詩吳仲圭寫明聖湖十景冊及本朝諸名公畫二十幅文沈落花圖咏長卷青緑商鼎漢玉兕鎮諸件余遂聽之易我故物即汰去其半不但頓還舊觀幅幅皆胡麻飰仙子矣玉水砢玉六法英華集唐宋元名蹟品汪氏潄六齊甲謝恭論畫有六法而首貴氣韻生動蓋骨法用筆非氣韻不靈應物寓形非氣韻不宣隨類傅彩非氣韻不妙經營位置非氣韻不真傳摹移寫非氣韻不化又前賢論畫有神逸能雅之懸以定品格有軒冕巖穴之辨以拔氣韻乃所謂氣韻者即天地間之英華也六要六長俱寓其間矣余故取之顔其首云梁張僧繇畫龍第一幅縑方余得水墨游龍一幅頭角峥嶸雲氣泱漭絹素膩於紙幾如古髹斷紋𤣥宰太史見之曰此僧繇筆也所謂一㸃睛即欲飛去者蓋僧繇在天監中以右將軍守吳興丹青馳譽於時此真骨氣竒偉規模宏逺與顧陸爭先者禾興汪砢玉樂卿甫識唐李昭道金碧四景第二至五幅俱縑素余墮地時先大父明甫在松郡得此圖攜歸塵翳不可辨先君世賢即付裝潢善手揉以沸液絲理猶聨鮮彩頓復舊觀凡山川林麓樓臺人物在烟霞縹眇間用金碧輝映昭晰四時之景賞鑒家見之無不曰非小李將軍安得有此一種家法砢玉記李升林壑高賢圖第六幅在絹上成都李升五代時以善畫著名此幅林壑幽閒人物高古傑作也玉水題於凝霞閣南之釣雪舫周文矩修竹美人第七幅絹素團扇有對板羽服翩翩縞袂新桃花如面玉為神若非解佩湘中女應是天台第一人禹泉夏曰瑚應是宋元人畫史稱周句容行筆􅍸硬戰掣蓋學其主李重光書法至畫仕女則無顫筆大約體近周昉而纎麗過之此圖是已乃南唐保大五年元㑹大雪别展曲燕李建勳徐鉉以下皆有倡和太弟集為曲燕圖御容高冲古主之太弟以下侍臣及法部絲竹周文矩主之樓閣宫殿朱澄主之池沼禽魚徐崇嗣主之雪竹寒林董元主之無非絶筆是人物尤周待詔所工也砢玉跂黃要叔錦葵第八幅縑素團扇余有黃少府所畫牡丹極傅染之妙茲錦葵一枝又灼灼如生豈師滕昌祐筆耶抑資諸家之善而兼有之也傾國名花與臨砌小艷有各極其致耳玉水米友仁山水第九幅縑素團扇元暉擅家學故烟雲變滅林泉㸃綴草草而成不失天真蓋意在筆先正是古人作畫妙處樂卿識夏圭寒山行旅第十幅在絹上禹玉筆法蒼老而墨色如傅粉之色觀此良然玉水馬和之鶉奔圖第十一幅絹橫披馬侍即寫衛風鶉奔章不寫宣姜妷事但寫鶉鵲奔彊樹石動合程法覽之冲然由其胸中自有風雅也又定中圖第十二幅絹橫披登丘相度得文公營徙之狀子來趨事得國人悅復之象其蒼莽攸鬱則𣗳之榛栗椅桐梓漆也定宿在中于以作室可想見矣此真千古句圖樂卿又干旄圖第十三幅絹橫披孑孑干旄建於車後兩服兩驂而維之正見衛大夫見賢之勤而彼姝者子罄折且前是欲以畀之之氣象耳衣折作馬蝗描古法昭燦如覩商周法物樂卿又載驅圖第十四幅橫披絹許穆夫人本無唁衛事故不作驅馬悠悠惟指其憂心焉而已乃猶作許大夫來告則以是夫人意中事故不妨象外描寫若馬工部之落筆飄逸倣吳裝法也右四冊為項又新所藏聞當時價值百鎰砢玉馬待詔春郊牧放第十五幅絹斗方躞蹀無須錦障泥桞絲不綰且長嘶落花好倩連錢色寫出蕭蕭散牧蹊平陽龍惕子題楊妹子畫菊并題第十六幅絹橫披有對板莫惜朝衣准酒錢淵明身即此花仙重陽滿滿杯中泛一縷黃金是一年賜大知閣有坤卦圖書楊氏畫記楊娃為寧宗后之女弟故稱妹子以藝文供奉內庭凡頒賜貴戚畫必命娃題署故稱大知閣然印文擅用坤卦人譏其僣越王弇州以其字柔媚而有韻乃此畫亦清妍而有致第畫記稗乘獨遺之不得與建炎劉夫人希並垂為缺事希掌內翰文字善畫師古畫上用奉華堂印玉水李薊丘墨竹第十七幅縑素團扇人謂息齊之竹真而不妙此則真而妙者也砢玉識趙松雪古木竹石第十八幅在絹上水墨飛白此幅得之於項氏為掛軸下有子京題云元趙孟俯子昂枯木竹石明嘉靖四十年秋八月購於吳淞張氏項墨林真賞敝字號柯博士山水第十九幅紙上小單條嶙峋淹潤至正三年夏五月既望作於香光精舍丹邱柯九思盛子昭赤壁圖第二十幅絹素團扇有對板白露橫江水接天百年餘興尚依然只今惟有江心月曽照坡仙載酒船虛菴虎豹虯鼉自滿胸却乘孤鷁泛秋風絶勝繞𣗳烏三匝驚散江心一炬紅荷鋤散人天地間自然之文惟畫能寓其形而并載其理故自舜妹嫘始封膜繼焉形理無窮寫之不盡代不乏名家也余自霞玩韻賞後復整舊藏搜新得成冊正見畫無絶筆耳然欲出則子美囊空欲處則淵明瓶竭有如昔人所云飢不可以當食寒不可以當衣者夫亦以左圖右史形理攸關不難更書癡作畫癡乎漫仕汪砢玉識丹青三昧集唐宋元名蹟品汪氏家藏甲乙杜東原先生云繪畫之事胸中造化吐露於筆端恍惚變幻象其物宜足以啓人之高致發人之浩氣蓋繇丹青中得厥三昧耳余嘗見趙伯駒畫卷自題標之遂於六法英華後復將丹青剔三昧焉王右丞雪圖第一幅縑素小單條上有舊題此欵偃曝談餘山水畫自唐始變古法蓋有兩宗李宗訓王維是也李之傳為宋趙伯駒伯驌以及於李唐郭熙馬逺夏圭皆李𣲖王之傳為荆浩關同董源李成范寬以及於大小米元四大家皆王𣲖李𣲖粗硬無士人氣王𣲖虛和蕭散此又慧能之禪非神秀所及也至郭忠恕馬和之又如方外不食烟火人另具一骨相者是摩詰雪圖足以冠斯冊矣繡水汪砢玉江參霅川秋意第二幅絹畫團扇霅川為江參所居深得湖天之趣平逺曠蕩盡在方寸此則兼層巒叠嶂秋意無窮不下三衢崇蘭圖也貫道霅川雪景第三幅絹畫團扇江即形貌清臞嗜香茶以為生其寫彼中雪景高潔之況可想見其撫絃不彈時鴛水菰蘆中人劉松年長樂清吹第四幅縑素斗方錢塘暗門劉在寧廟時以進耕織圖稱旨賜金帶此作宫中歌吹景纎悉在目未識曽經宸覽否樂卿又未央促麈圖第五幅縑素斗方劉待詔師張敦禮工人物山水精妙過於師如此圖焉乃有以劉夢松劉松老混之不知夢松所長水墨花鳥也松老所學東坡竹枝也三人各自成家耳黃居宷筍雀第六幅縑素斗方伯鸞為黃筌季子能世其家學作花枝翎毛皆妙得其真寫怪石山景往往過其父宋太宗朝授光祿丞委之搜訪名畫詮定品目當時較藝者視黃氏體製為優劣去取是所寫筍雀特其一斑不足窺全豹也蘇漢臣寫子卿持節第七幅縑素斗方開封蘇承信畫師劉宗古製作極工人物尤著色鮮潤體度如生而有嫌以筆端微滯者豈但見其寫意草草如此圖者耶魯宗貴寫黃鶯海棠花第八幅在絹上紹定魯待詔善畫花鳥窠石描染極佳是幅正所長陳珏觀瀑圖第九幅在絹上錢塘陳桂巖寶祐年待詔善著色山水人物趙彛齊設色水仙花第十幅絹橫披瀟疏竹徑浥香顔疑雪疑梅冷韻妍冉冉碧烟籠玉蘂盈盈白月㵼金鈿不禁清露翩躚態每爾回風綽約前自是凌波拾翠種倚䦨幽伴恰相憐咏水仙花此砢玉髫年韻語也見子固筆偶憶得題之錢玉潭薝蔔畫眉第十一幅在箋上舜舉花木翎毛師道昌此幅工緻中有老意吳仲圭山水第十二幅紙橫披至正三年春三月梅花道人戲墨草書梅花菴主是吾師水墨微蹤一一竒此紙拾他餘馥去淡烟疏樹晚離離沈周小字即題畫上黃子久山水第十三幅絹掛軸因壞其上截入冊一峰每作畫必登樓觀雲氣變幻以為布置仙筆也商琦集賢寫升平宴意第十四幅畫紙團扇四海一兮烟塵清休徴至兮品物亨原田兮膴膴灌木兮青青振鷺於飛兮肅肅黃鳥和鳴兮嚶嚶斯民兮何幸際時兮休明瞻彼樂土兮豈獨輞川乃知開元兮不為升平家給兮人足既安兮且寧以遊兮以息有觀兮有亭景山可仰兮流泉可聽朝夕晏晏兮逍遙百齡欲觀風兮此其徴猗歟帝力兮孰得而名蘇伯衡題德符畫上倪雲林竹石第十五幅絹單條此净名菴主墨妙也與吾家舊藏篝燈聽雨圖相似曹貞素寒林白石第十六幅紙橫披至正戊辰九月作於常清淨齊雲西老人曹知白盛子昭秋林垂釣第十七幅絹上有欵武塘盛懋魏塘盛洪甫善畫懋其子也世其家學而過之林塘生竹石第十八幅絹斗方對題失去詩録存翠羽風前葉秋聲雨一枝詩題春粉節䙀脫玉嬰兒陸天游破窗風雨第十九幅紙橫披四簷風雨晝昏昏小紙斜窗破墨痕翻得杜陵巫峽語歸雲擁𣗳失前村陸廣倪端牧羊圖第二十幅絹畫團扇一對合裱高友明水嘗得宋元人畫冊內倪迂山水一方是最得意者即揭出獨裝一卷餘悉作交易去余因得其倪端二幅頗工緻然端國初人也聊以殿此玉水崇禎己卯春日姑蘇時思𤣥為姑溪楊翼真覓余䕫雲石二畫冊宋元人掛幅刻期資余北征費仲夏余渡采石促之只償靈璧半百僅充行槖也秋中雲將倩赴約久稽索還原物余反快得安吾拙寧以清供易折腰乎為噴飰一笑玉記珊瑚網卷四十三
