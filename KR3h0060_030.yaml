body:
  text: 珊瑚網卷三十明汪砢玉撰名畫題跋六劉松年便橋圖在絹素上金碧山水突厥控弦百萬鴟張朔野傾國入寇當時非免胄一見幾敗唐事讀史者至此不覺膚粟毛豎於以見太宗神武戡定之勳蠻夷率服之義千古之後畫史圖之凛凛生色此卷為宋劉松年所作便橋流水六龍千騎山川烟樹種種精妙非松年不能為也孟俯少時曽觀於臨安之睦宗院兹復得瞻對於普花平章之宅回首三十餘年感慨係之矣敬題其後大德五年秋日吳興趙孟俯書此劉松年便橋圖丹青煥赫布置閒雅輦中旌旗氊裘戎屋塵沙雲樹具見當時景象良工苦心哉前有松雪道人題墨而潔縫印章似曽入裕陵內府者是可寶也正德庚辰十月既望文璧題劉松年著色九老圖在絹素上㑹昌五年三月二十四日胡吉劉鄭盧張等六賢皆多年夀豫亦次焉於東都弊居履道坊合尚齒之㑹七老相顧既醉且歡靜而思之此㑹希有因各賦詩一章以記之或傳諸好事者其年夏又有二老年貌絶倫同歸故鄉亦來斯㑹續命書姓名年齒寫其形貌附於圖右仍以一絶贈雪作鬚眉雲作衣遼東華表暮雙歸當時一鶴猶希有何况今逢兩令威洛中遺老李元爽時年一百三十六僧如滿年九十五前懷州司馬安定胡杲年八十九閒居同㑹在三春大抵愚年最出羣霜鬢不嫌杯酒興白頭仍愛玉罏薰徘徊玩栁心猶健老大看花意却勤鑿落滿斟拚酩酊香囊高挂任氤氲搜神得句題紅紙望景長吁對白雲今日交情何不替昔年同事聖明君衛尉卿致仕馮翊吉皎年八十八逍遙適意在閒居林苑園亭興有餘對酒最宜花藻發邀觀不厭栁條初低腰醉舞垂緋袖擊筯謳歌任褐裾寧用管絃來合雜自親松竹且清虛飛觥酒到須先飲賦詠詩成不住書借得商山賢四皓不知此後更何如前磁州刺史廣平劉爽八十七垂絲今日幸同筵朱紫居身是大年賞景尚知心未退吟詩猶覺力完全閒庭飲酒當三月在席豪歡象七賢山茗煮時秋霧碧玉杯斟處彩霞鮮臨階花笑如歌妓傍竹松聲當管絃雖未學窮生死訣人間豈不是神仙前龍武軍長史榮陽鄭璩年八十五東閣幽閒日暮春招邀皆是白頭賓官班朱紫皆相似年紀高低次第勻聯句每忘松竹意停杯多說古今人更無外事來心腑實有清虛入鬼神醉舞兩回迎勸酒狂歌一曲㑹余身今朝何事情偏重同作明時列任臣前御史內供奉官范陽盧真年八十三三春己盡洛陽宫天氣初晴景象中千朵嫩桃迎曉日萬株垂栁遂和風非論官位皆相似及至年高已共同對酒歌聲猶覺妙玩花詩思豈能窮先時共作三朝貴今日猶逢七老翁但願緑􅌬常滿酌烟雲萬里㑹應通前永州刺史清河張渾年七十七幽亭春晝共為歡印綬居身是大官遁蹟豈勞登逺岫垂絲何必坐溪磻詩聯六韻猶應易酒飲三杯未覺難每况襟懷同宴㑹共將心事比波瀾風吹野栁懸羅帶日照庭花落綺紈此席不須鋪錦帳斯筵堪作畫圖看刑部尚書致仕白居易年七十四七人五百八十四拖紫紆朱垂白須囊裏無金莫嗟嘆樽中有酒且歡娛吟成六韻神還旺飲到三杯氣尚粗嵬峩狂歌教婢拍㜑娑醉舞遣孫扶天年高過二疏傅人數多於四皓圖除却三山五天竺人間此㑹且應無豫少有山林之志後縻升斗碌碌紅塵以成七十時在紫微郎署偶得劉松年所繪白傅香山九老圖鍳觀之際不覺神遇於曠世之下景仰高風莫能自已因記舊所聞九老結社時各賦詩一章遂橅録於卷端庶企慕之誠獲見於厠名之末也在無逸武英二殿録中書舍人事馬芻識劉松年盧同烹茶圖老屋頽垣洛城裏緑樹團陰照窗几石牀散帙有餘清應是先生睡初起竹罏火暖蒼烟凝碧雲浮鼎香風生白頭老媪不解事時聞蚓竅蒼蠅聲柴扄日高為誰起肯愧鄰僧頻送米長鬚裹頭始出門想為韓公置雙鯉松年圖此寧無情似覺六碗通仙靈何當更畫月初出仰天涕泗行中庭絶憐牛李相傾軋獨羡先生保貞白孤忠耿耿孰與同足配能詩杜陵客右題指揮張侯所藏盧同烹茶圖蓋宋人劉松年筆也觀其布景蕭散用意清逺翛然有出塵之想噫盧同之趣非松年莫能寫其真而松年之畫今之所見者蓋亦寡矣張侯寶而藏之俾諸名公形之詠歌觀其好尚可以知其人焉趙郡李復書閉關高咏啜茶時咫尺蓬山發興竒為念顛崖辛苦者不同煮雪詫歌姬制河楊彞玉川先生多好竒清才逸韻誇當時披圖已及幾百載倣佛猶覺親容儀先生讀書閉柴扉翛然養道超希夷烹茶老婢腳不襪致鯉蒼頭鬚滿頥隔墻惡少不解事側目未免相陵欺收縛時蒙縣宰政長者處置非爾為鳳團煮鼎汲清澗適意啜飲哦新詩大賢寄蹟諒有以七碗豈必徒規規丹青模寫不盡意徑節高風千古垂嗚呼先生已逺兮吾將誰師臨川趙果鬢絲如織映烏紗反閉柴門自煮茶赤腳長鬚是家口猶勝草石與蛙蛇㑹稽胡惟仁玉川先生事幽獨寂寂茒堂倚林麓琴書前陳白日靜雲泛晴光落松竹平生茶竈為故人一日不見心生塵婢僕烹茶識茶性火斥老火溪泉新蒼龍躍入春濤底兔碗蜚香白花起枯腸自是氷雪清一飲枯腸更如洗洛陽公侯方醉眠先生未必無酒錢要使香風滿天地可但吹到公侯前當時先生索高價徑寸之珠空照夜千年猶著好茶名高價於今在圖畫四明山人烏斯道暗門劉絲綸圖長松覆前逺山聳後庭檻綴花石殊幽曠簷間一姬拗綸一嫗治絲一侍兒捧茶不襦而露纎紅故北妝也筆法細潤有生氣標題作馬逺萬厯壬子秋余在白下得之潤州吳汝廷歷三十餘年無有知其非逺者今崇禎壬午秋付裝潢淵兒於松身識其款曰松年蠅頭小楷雜鱗紋墨漬間不復可辨有如當時稱之為暗門劉者今一旦豁然恍覩其人可勝撫掌稱快檇李汪砢玉樂卿甫題於韻石齊夏圭長江萬里圖長二丈四尺絹墨如新雲山蒼蒼江漠漠紹興年間夏圭作珍重須知應制難卷尾書臣敬堪度却憶當時和議成偏安即視如升平惟聞緝熙較畫史兩河淪棄無人爭斯圖似寫南朝土還有樓臺在烟雨釣叟棋翁不可呼漁舟野店誰能數但覺層層境不同林泉到處生清風意逺筆精工莫比只許馬逺齊稱雄中原殷富百不寫良工豈是無心者恐將比物觸君懷恰宜剩水殘山也畫終思效一得愚更把飛鴻添在圖願君且向飛鴻問五國城頭有信無水村居士完書冢宰陸全卿又長江萬里圖長六丈四尺在絹上較前卷更異此卷長江萬里圖為今大參張夏山先生所藏豫嘗於京口見米元章澄心堂紙一卷筆勢竒怪有意外象家居時吳人持至一卷夏圭墨氣古徑可愛此卷則規模郭熙而平逺清潤有不盡之趣宋室倚長江為湯池故當時畫手多喜為之卒不能守而鐵騎飛渡矣乃相與為之浩嘆夏山字用載家金華山下景物絶勝而宦囊半貯此物將所謂行住坐卧不離這個耶復相與為之大笑是嵗嘉靖甲午八月吉觀於江西布政司之紫薇樓下遂書雲間陸深豫嘗見李伯時長江圖於陳太僕子有家筆法精絶及觀此卷乃宣和御府所收小璽具在定為北宋以前名手非馬夏輩所能比肩後有吾鄉陸文裕題跋書法秀整足與畫為二絶殊可寶也己未秋後五日董其昌後有宋解元跋誤以夏山為姓夏者故去之夏禹玉烟江疊嶂圖大江來自岷山逺萬里東流幾深淺洪濤巨浪日舂撞一𣲖西隨萬山轉萬山峩峩翠黛浮大孤小孤當中流高城逺出武昌樹衰草微連鸚鵡洲茒屋人家住深島雞犬不聞人跡少幾行歸雁日邊來一幅征帆天際小湘南雨歇秋風清落木黯慘哀猿聲荆門月出夜潮長九疑山碧秋雲橫我生自是優游者足跡何曽半天下長江萬里欲神游却喜今朝見圖畫圖畫再展未能休似有模糊寒具浮只恐通仙忽飛去驚絶當年癡虎頭康里百花宋寧宗朝畫院待詔夏圭山水師李唐用墨如傅粉今觀長江萬里圖往往潑墨縱筆濃淡醖釀出於自然真竒筆也夫大江發源於岷山而圭畫泉流回互跳珠噴雪可駭可愕至於濫觴之後直下一瀉舟楫縱橫旅店隱見渡口漁舠林邊鴉㸃烟巒雲樹戍樓城郭無不極其精妙所謂李唐以下無出其右者非耶唐宋以來君臣俱游心藝文皆有畫院以延攬名士良工宋之馬夏南渡稱首若禹玉者其可多得哉長幅如此卷又可多得哉覽閲既畢為題其後至於弧矢四方曽歷風波江濤之險者又余素所習見不覺其身之飄然於三峽間云爾翰林承㫖王汝玉夏待詔錢塘觀潮圖此幅畫錢塘江觀潮乍見之即定為閻次平及諦視始得細欵於樹梢則夏圭也又復展之於石角中亦注夏圭名意禹玉自愛不欲以姓名借客者與然次平之去夏圭乃不盈咫尺矣丁酉秋九月草一日龍游舟中書𤣥宰梁楷畫右軍書扇圖小卷畫法始從梁楷變觀圖猶喜墨如新古來人物為高品滿目烟雲筆底春古汴趙由俊松雪翁嘗以紈扇三十握遺故人欣笑隱拔其尤者分惠二把遂賦詩一絶戲調之子微出示此卷事適相類徴余語就書以贈之云故人當暑遺紈扇最愛千絲雪色新薄劣王郎閒㸃汚宜教老媪也生嗔泰定初元嵗在甲子上元後五日張淵清夫右軍書扇真偶爾老姥無知敢再煩松雪故人方外友欣然寫贈可同言江村民錢良右奉題為笑隱上人解嘲道傍題扇出無心晉世風流說到今絶勝寫詞陶學士故迷郵妓作知音吳興張世昌山陰用筆妙如神題扇行遭老媪嗔莫怪祗今無别識清涇濁渭向誰陳汾亭石巗合作從來出偶然蒲葵遺蹟恨無傳祗今尺素開圖畫猶足衣冠識晉賢吳郡羅元蕺姥手持扇邂逅成技癢五字妙入神百錢起貪想妄求笑無知競買遇真賞畫圖挹清風千載一俯仰吳下湯時懋梁楷東平相羲後嘉泰年畫院待詔賜金帶不受掛於院內嗜酒自樂亦號梁風子但傳于世者皆草草謂之減筆今觀此水墨題箑圖所作右軍立枯栁傍丰神俊邁筆意蕭爽老媪持扇俯僂有欣悅之狀是寫賣扇後復來耳畫在白紙上濶二尺許高不盈尺天啓丁卯長至日課花外史觀於東雅堂中僧牧溪花果翎毛紙上長卷咸淳改元牧溪右宋僧法常别號牧溪喜畫龍虎猿鶴蘆雁山水樹石人物皆隨筆㸃墨而成意思簡當不假妝飾余僅得墨戲花卉蔬果翎毛巨卷其狀物寫生殆出天巧不惟肖似形類併得其意象愛不忍置因述其本末以備參考墨林項元汴書於天籟閣這僧筆尖上具眼流出威音那邊鳥鵲花卉看者莫作眼見亦不離眼思之徑山千指庵圓信江參百牛圖江貫道戲作海野道人家藏墨牛圖因請示僕形勢百狀奔鳴起卧逼真自非三昧手之所作而畫工毛頴不可得而及也雲月莊叟書我本山陽田舍叟家有淮田數十畝江南倦客老不歸此田都為勢家有猶記小年學牧時去時日出歸日西我生衣食仰此輩愛之過於百里奚祗今辛苦耕硯席無處賣文長絶食卷中邂逅黑牡丹相逢喜是曽相識負郭無須二頃田一雙栗角能幾錢數口之家便可飽要如此圖知何年平生富貴非所願城府近來尤可厭何時倒乘牛背眠東風勝如仰看宣明面北村八十二嵗病叟湯炳龍東阡西陌烟雨青烏犍百尾臥且行引脰呞草仰鼻鳴嗟爾多牛便多事一蓑一笠足歸耕張翥仲舉桃林日夕霽烟浮百個烏犍得自由鞭索已無人已去不知誰放復誰收無所住釋善慶漫題百牛圖不見典故豈黑牡丹之遺習或江貫道祖百爵百鹿為之耶後有紹興二字必經裕陵乙覽中興創殘之餘生意未復九重邃居不以聲色自娛乃以原隰耕稼物情態度細入睿思不忘田野真中興英主也延祐改元七月初三山南遺老元熙題晦機幾年散放桃林後餘四百蹄猶可騎攬鏡掛書多事在能騎唯有一凝之白珽湛淵逺賈連車曉色昏傳聲叱叱度溪渾一麾八百閒蹄角可是江南烟雨村伯生題邵菴山中人有以百牛圖相示豫謂宣王考牧于阿于池九十其犉己詫其牛之多況濕濕之耳滿二百耶田舍翁每以多牛為富安得一黃犢歸耕南山下豫所愛一牛耳掩卷一粲山村老農書仇仁近濕濕羣行四百蹄耕犁初罷樂相隨春風緑遍川原草回首牧人知是誰鄧文原趙孟堅水墨雙鈎水仙長卷豫久不作此又方病目未愈子用徵索宿諾良急强起描寫轉益拙俗觀者求於形似之外可爾彝齊元貞二年正月草五日鮮于樞同餘杭盛元仁三衢鄭君舉觀於困學齊之水軒時將赴浙東僕夫束擔以雨少留吾自少好畫水仙日數十紙皆不能臻其極蓋業有専工而吾意所寓輒欲寫其似若水仙樹石以至人物馬牛蟲魚肖翹之類欲盡得其妙豈可得哉今觀吾宗子固所作墨花於紛披側塞中各就條理亦一難也雖我亦自謂不能過之子昻玉潤金明記曲屛小几翦葉移根經年汜人重見瘦影娉婷雨帶風襟零亂步雲冷鵝管吹春相逢舊京洛素靨塵緇仙掌霜凝國香流落恨正氷銷翠薄誰念遺簪水空天逺應想礬弟梅兄渺渺魚波望極五十絃愁滿湘雲凄凉耿無語夢入東風雪盡江清調夷則商國香慢辨陽老人周密公謹至正十二年三月晦日瓉同陳惟允觀于快雪齊水薄沙昏知草枯采香人逺隔湘湖誰留夜月神仙佩絶勝秋風九畹圖白粲銅盤傾沆瀣青明寶玦映珊瑚却憐不得同蘭蕙一識清醒楚大夫西湖仇逺仙子凌波佩陸離文魚先乘殿馮夷斫氷積雪揚靈夜鼓瑟吹笙㑹舞時海上瑶池春不斷人間金碗事堪疑天寒日暮花無語清淺蓬萊當問誰巴陵鄧文原翠袖氷姿隔暮雲凌波微步襪生塵江空嵗晚情無奈笑把明璫解贈人西秦張楧戲題子固為宋宗室精於花卉平生畫水仙極得意自謂飄然欲仙今觀此卷筆墨飛動真不虛語蘭雪坡劉笏歌水仙者曰凌波仙子言輕盈縹眇可凌波也子固此畫庶幾為花傳神矣叔野水仙花前人畫者罕見平原公子之筆清而疏甚可愛也今此卷繁而不俗尤覺可觀蓋疏則易清繁則易俗然則此作其可草草觀耶東吳林鐘水精宫闕夜不閉仙子出遊凌素波何事低頭弄明月不知零露濕衣多天台李至剛裙長帶裊寒偏耐玉質金相密更竒見畫如花花似畫西興渡口晚晴時嘉興張伯淳趙子固墨繪水仙花卷畫長丈餘後有孟堅欵子固彝齊二印文氷肌玉骨照清波瑟瑟塵生襪底羅自是仙娥招不得滿江風雨夜如何孟載迎風共語步凌波翠壓輕綃鬱綺羅江上醉歸環珮重玉英香褪粉痕多鄭升良工筆意奪天工寫出仙葩玉一叢窅窕凌波何處去却將餘種媚冬風玉阜性閒幾日東風雨乍晴獨騎官馬繞湖行詩情酒力都消盡人與仙花一樣清松軒玉骨氷肌不染塵霜風凛凛倍精神凌波翠袖輕移步倣佛桃源洞裏人金溪陳妥翠帶懸璫重凌波步步輕春深不成怨錦瑟夜無聲翠屏道人翠袖金鈿白玉姿芳心無奈雨雲時陳王不作襄王夢解佩江頭欲贈誰盈盈羅襪凌波靜淡白光含月色新香散蘂珠春寂寂却疑姑射是前身徐賁淡墨輕風玉露香水中仙子素羅裳雲鬟霧鬢無纒束不是人間富貴妝厯山老人金鈿玉質緑羅衣素襪凌波月下歸解道仙人誰可伴水晶瓊樹兩依依倪輔趙彝齊水仙蘭石圖并記五六年前吳興人持趙子固畫蘭一卷來其中雜以竹石草棘清絶而生意勃然詩翰亦脫塵閲幾夜分竟至忘寢以所直較乃弗之售為其人攜去迄今往來於懷常恨余家無子固墨迹成化壬寅蠟月草又六日鄰家子手一軸以進展觀乃子固筆也蘭與水仙皆花掩映於石蓋必冬春之交石竒而草茂種種臻妙殊起余觀按米芾畫史有曰趙孟堅字子固宋太祖十一世孫仕至郡守寓居嘉禾之海鹽好古博雅工畫水墨蘭蕙竹梅水仙逺勝著色可謂善於寫生芾於書畫自晉唐以下弗取其許子固不為輕矣此圖乃小小橫幅幅不過二三尺其題有云盆中之花開謝頻更圖中之花不開不謝久存如見伊人則子固之平生可槩見焉展閲之餘蘭若有光風泛叢之佳水仙若有凌波步月之態翛然林下韻度與塵埃眯目者可聯席語哉既得乎此則吳興之卷雖不得釋然矣因索楚騷及涪翁之作歌之併記嵗月俾余後人知所得之由如此姚綬書於雲東之仙村亭巖叟梅花圖并詩香滿羅幃疑不消笛聲吹斷夜迢迢霜蜚月落無尋處欲倩青衣使者招右梅魂玉頰寒肌强對人今年清瘦不勝春相知只有窗前月摹寫春風水上身右梅影卷中尚有探梅觀梅嚼梅夢梅畫梅折梅落梅諸作未及録金顯宗墨竹卷帶雨承華殿大定戊子十一月十一日夜戲寫顯宗去東坡與可未逺自得汴後漸染文物典章之道所以金之初政濟濟可觀但游於藝者非帝王所學獨不念宣政之失耶耳目所聞見且不知鑒尚何能取信於方策歟雖然猶勝於般樂怠傲流連荒亡之行也此大德十年春閏月旦日所題顯宗竹卷也閲十有一年君在湯氏愛余此跋偶見此卷欣然示之復俾豫書之後豫嘉君在之好事故為之書焉時延祐丙辰春正月望日疇齊張仲夀謹識金王淡游嵗寒三友圖黃華山中夜氣清月明風定聞吹笙梅花開向竹松裏雪香零亂墨光生京城好古之家多見淡游所作自是高古無俗氣皆未若此卷天真爛漫盡從書法中來絶去筆墨畦徑乃妙品也仲常其寶藏之廬陵歐陽𤣥題羲獻才情似水清暑窗葵扇與桃笙中州父子黃華老信是前賢畏後生中州人物獨黃華父子畫詩書逸出氊裘之表為可尚也觀淡游此卷筆意蕭然有蔡天啓風流蓋高尚書之所祖述而能冰寒於水者歟卷後有歐陽承㫖所賦詩不揆因次第其韻至正丙午六月晦日倪瓉房山仙人清似水醉倚長松吹玉笙梅花如雪孤鳳冷明月丹霄天籟生淡游舉筆便自天然絶無一㸃塵俗態梅花雖不逼真要之北客不見江南繁花亂蘂稍生澀耳王蒙翛竹風回玉佩清松聲相和紫鸞笙北人不識梅兄面難免王蒙說手生金人書畫兼美者以王黃華為最淡游為之子實肖之可方宋之二米也此圖世所謂嵗寒三友者蓋嘗流入江南故倪元鎮王叔明皆次歐陽文公韻題其後足為橘莊中佳玩也吳寬書雙井道人龍圖燕穆之楚江秋曉卷燕龍圖在王府以德業自勵後世乃以能畫稱觀此足見其藝之不凡但恨為此所掩噫以顔魯公之政事而世亦以書稱可見學之不可不慎也乙丑二月門山老樵齊郡張紳燕尚書生有巧思能奮志功業圖畫特其一事耳在燕府侍書時王求畫一筆不肯與蓋恐王之志尚偏也故其畫罕見於世此卷筆刀遒媚其在早年所製無疑也吳郡張適識江水滔滔日夜流帆􅀈來去幾曽秋畫圖不盡古今意感慨令人憶壯遊俞貞木初陽淡微茫猿啼楚江曉恬風展波鏡千里㵼瀰渺起語船上人驚飛岸邊鳥行裝亂填委徒御爭紛擾川后弭安流天吳沕深窈陰霾斂遙翳目斷秋旻杳響枻節歌長翔帆逗風小人生等萍寄奔涉何時了旅思協悲端羇情重憂悄忠沉不可見永弔鳴寒篠回首噭湘纍蒼山亂雲繞卞同臺城路黃陵廟下瀟湘浦依稀少年羇旅夢澤風生渚宫華落收盡峽雲巫雨長天帶水正日出三竿客船猶艤四望蒼蒼秋光都在白蘋渚流年暗驚易度向畫中空見舊遊如許鼓瑟人遙紉蘭事往誰折芳馨寄與消魂凝竚待收拾間情寫成新句心與鴻飛空江煙浪裏去年秋友人謝彥起氏為孟敷陳孝廉索賦楚江秋曉詞久未能成偶過許瀾伯讀書房時夏雨初霽軒窗朗徹因援筆賦此留瀾伯所歸諸孟敷殊愧不工也洪武草八年孟夏十有一日吳人王璲大船駕帆曉欲發小船載客客未絶行李匆匆不憚勞須臾㑹面須臾别江濤洶湧聲如雷名利縈擾心為摧楚天秋高何所有黃鶴磯頭多美酒便當吟笑解金龜勿向風波空皓首彭城錢復七澤蒼茫曙色微眼中風景尚依稀疏林半隱黃陵廟凉霧初消赤璧磯波動蒹葭涵石出沙喧鴻雁帶霜飛令人却憶曽游處濯足中流放櫂歸偶武孟楚江秋向曙畫裏景依然旭日浮波面凉風動樹巔同來桃葉渡相並木蘭船欲問西州信潯陽何處邊吳僧普震蒼茫巫峽曉搖落楚天秋神女千年廟商人萬里舟詩中曽想賦畫裏每思遊江海平生志窮經老一丘韓奕五更人語覺潮生估客帆檣候曉行樹色未分雲夢澤雞聲已動漢陽城天空曉角吹霜盡月落銀河入斗橫欲問楚南千古事至今江水為誰清孟郡陳寬孟賢南浦清霜覆荻花揚帆一半去長沙鳳皇山近猿聲急鸚鵡洲寒月影斜白髮此時傷九辨翠眉何處泣重華天明莫上江樓望滿地西風正憶家彭城劉珏天連湘漢水悠悠水色微茫接素秋殘月已沉三國恨亂雲初散九疑愁南方流落身將老西候蕭條客倦遊欲採蘋花悵無伴美人迢遞隔滄洲夢回江上算秋程水影迢迢積漸明落木西風連鄂渚亂山高浪隱湓城鐘邊野寺經僧起霜裏孤帆估客行往事獨悲前席誤不從賈誼問蒼生葭菼蒼蒼白露晞蕭條紅色帶微暉平沙雁逐寒潭起野樹鴉隨亂葉飛漸見九溪如練淨尚憐三户似星稀不堪昨夜南遊客悲向西風憶授衣長洲沈周右題計三十二人辭多不録任月山倣韓幹畫馬卷畫馬至韓幹能事畢矣豫嘗以師之日就月將頗得三昧視近世畫手優劣為何如出此以俟識者評品焉月山道人畫并題汪氏子民踣鐵蕭蕭古冀羣百年南北厭邊塵只今四海平如掌㑹見連鑣進紫宸清河張簡張氏仲簡憶昔唐家全盛日四十萬匹屯平川龍媒散落在何處苜蓿秋風生暮烟東臯妙聲九臯龍種何年離渥窪幾畨汗血定邦家當今偃武修文日香草春風步落花趙肅曹韓仙去已多時翰墨丹青萬古垂今日月山能踵跡手揮霹靂出天池嘉陵楊誠當年破虜已旋功功就名高氣若虹今日太平隨所戲青絲垂老受春風枀泉奉題微笑居士靈駒初産渥窪間騄駬驊騮總一般始自月山揮筆後如今只向卷中看檇李程本立彥德房宿流精氣勢雄何人寫入畫圖中奚官意趣真堪羡矯矯靈駒孰與同雲間王徵珊瑚網卷三十
