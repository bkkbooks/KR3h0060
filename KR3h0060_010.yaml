body:
  text: 珊瑚網卷十明汪砢玉撰法書題跋虞雍公誅蚊賦虞伯生書文多不緑右先太師丞相雍國忠肅公所著也先公文集舊刻蜀中成書未乆焚於兵火曾叔祖寶慶府君將求而之湖南亦未及如志而運革内附後先參政廣求之不能得眉州故人史公孝祥守興化聞黄伯固家有之懇不可得也集在京師屬閩教授謝中物色之來報云有軍官好書購得此欲集手與集相見然終不能得之先參政至淛須親戚韓大則得誅蚊賦草於侯頤軒道士處葢大徳庚子嵗也故人閒上人亦蜀中同出東南之家以舊故自吳門訪集臨川山中問此物所在出而視之則得之三十六年矣而先參政亦棄諸孤十七年詩書之緒不繼如綫感慨今昔血涕隨之偶得此卷録送上人貴得存遺珠於既失尚故物之可求也元統乙亥三月二十七日集謹識宋之南其宰執惟虞雍公為最賢觀其誅蚊賦所謂使天下之為人臣者得以安其君天下之為人子者得以寜其親則知公之志誅惡鋤姦者欲以寜君親也其以忠孝教天下後世者至矣伯生世其家學能于聖時致身西清被寵眷也殊甚及閒寂中乃書先太師此賦以贈人其志亦有所在乎閒上人再見伯生其為我驗之和林魯戚叔重父謹題因讀誅蚊賦深憐愛國情三公登間牒四海失昇平早覺文章貴争期徳業成雲仍蒙世禄翰墨負時名丹丘柯九思賦任齋惟庚寅吾以降觀雍公少年之作可以豫見報國之志觀邵庵詳書之意可以深惟追逺之情忠孝藹然萃於一門嗚呼盛哉間上人同是蜀人故獨得之當刻石寺中以傳永乆庶不為他時夜壑舟也至正十九年乙未三月後學蘇大年頓首再拜謹書黍民肆毒不勝誅屈宋文章太史書滄海遺珠留得在白雲深處伴僧居洛生王敬方父作更生佛兒為命世英西州睹威鳳南國剪長鯨不厭朝廷小終扶日月明誅蚊賦重録妙墨世從衡遂昌鄭元祐右邵庵虞公手書其先丞相誅蚊賦藁也賦稿初藏於侯頥軒家後為韓大則所得獻於公之先君子井齋先生後云至吳候道士因龍興閒上人謁公公於寓所一見具言賦藁公軒然而笑曰我已得之矣侯道士為之惘然葢大則初假之于侯而即以歸于公家而侯初不知也元統乙亥閒上人謁公于西江遂書以贈焉頥軒本洞庭仙壇觀道士其度師楊紫霞與侯亦蜀人宋季來吳一時名士之寓吳者若中書劉公丞相吳公皆與之交游名重於時寶祐間自吳逰天台中書公為之唱首作詩以餞其行而先師平舟先生亦次韻焉先子與侯交游粗深每出以示之先子求至懇切而侯迄不與先子歿後三年侯亦相繼而逝其徒李碧山與椿相知因予之請即以歸之至正甲午冬十月閒上人因持此卷訪子於家而徵予言予惟侯之平日靳吝於兩家遺墨跡若永為其有既而卒各歸于其後人豈故家文獻不絶如綫而天固假侯靳吝以待我後人耶所惜者公之先君子猶克親得賦稿而予先子雖獲一見平舟遺墨而終不能得之於生平也今公既即世而閒上人已老予恐事之或湮故為詳著於此云眉山楊椿䟦虞雍公誅蚊賦刻石䟽宋丞相雍國虞忠肅公嘗作誅蚊賦内傳後公之六世孫翰林侍講學士以文儒顯告老還江右而白雲閒上人與之有舊自吳訪之於臨川葢雍公文集舊嘗刻於蜀而版遄毁學士後雖貴而雍公集求之不得竟不復刋學士之文㕘政公大徳庚子嵗亦嘗至淛物色雍公集竟不可得而僅於道士侯頥軒處得誅蚊賦稿然竟藏於家上人以賦稿為請學士為發篋取讀上人真跡不敢望得學士手書一通東還吳則幸矣學士遂為草草謄録而仍記顛末於賦後上人念學士詩文好事者已悉為刋板若雍公之功業雖不繫於文字有無而誅蚊僅存耳兼聞江右近經冦亂百不一存於是上人欲以學士所書賦勒之金石庶乆永弗墜而上人老矣力弗逮乃以此賦于公之八世孫戡字勝伯者俾刻之勝伯既積學克世其家以世故棘囏益貧困固冝寶而藏諸而猶慮夫泯而不傳抑亦負上人之意敢以是干諸好事君子見助焉則賦刻諸石無難者矣至正十七年秋八月遂昌山樵鄭元祐書此賦之作其有所指乎不然驅之足矣誅之不足以勝誅也豈其心欲盡殱北人乎然而蚊有可殱者有不必殱者如曰掃出境曰殱厥渠魁不一施也南方蚊烏一鼓吻而蚊億萬今有人焉作相於南鼓為和議之談而致于廷而咂我甿其彼之鷏乎斯人也何不幸而不受誅于公節鉞之下以快一日之死而寜受誅于千載史鉞之誅於萬死不可以贖之日吁可悲也已賦序云余方窮居觀者遂謂其早年所作愚謂此二字雖外閫重寄而遥制於中弗獲以信其大義於天下後世則身都將相猶窮居匹夫同也嗚戲吾雍公誅鷏有術而付之紙上空談為五世孫所録徒致憾於無窮耳諸䟦柯鄭陳揚輩皆其孫同時言稿之失而得言録以遺於某亦既詳矣去公三百餘載而同其志者吳下有沈啟南氏見録本而購藏之嘉禾周鼎與苕溪張子静松陵史明古共借閱之鼎欲號此賦為鷏以發公地下一笑明古子静聞予言相掀髯大噱是日正月上旬之終嵗乙未皇明成化之紀元十有一年也此帖今藏余家往在無錫蕩口得於華氏中甫處少溪家兄重購見貽之物元汴雍國公虞丞相古劒歌至正庚寅十月余逰錢唐過四壁山中與青城山樵遇樵出示余古劒乃余先公相國所遺也余為作古劒歌以歌之古劒古劒元非鐵亦非干將與莫邪自從混沌鑄成來出鞘入鞘何生㓕輝天爍地不須磨肅氣稜稜凛霜雪是以曽將破敵酋采石江頭建勲業海晏塵清歌太平瑶匣藏之在岩穴或時拈出與人看千古萬古歎猛烈虞相古劒歌直引宋相虞忠肅公八世孫堪謁余雲間草𤣥閣自云先丞相有古遺器四日瓦琴石磬蜀王硯與此劒也劒長古尺三握具五寸弱握有二稜起欵識可辨者曰千萬嵗其鐔横寸二狀饕餮末甚鋭縵文為水銀古中末間黝漆色芒可吹毛星月下出之艷發孚尹凛凜然可寒鬼膽是誠千載物也於是酌堪以酒酒酣為作虞相古劒歌使與古虞公劒同傳為其家寶云昔聞虞公古劒可以追騰空迴落日千年宗社已丘墟子姓西來傳不失江淮都督憤國讐入稜痛骨三十秋采石江頭一提出寒芒夜走完顔酋堪兮堪兮傳八葉價金不售山西俠牀頭寶匣不敢開黄蛇上天走雄雷持謁龍間鐵龍父灑以延津水拭以赤厪土虹光一道裂蛟胎上指黄星落黄雨嗚呼舞鴻門刺魚肚二豎汝何足數我將假霜鍔代天子西山斫白額二東海斬蛟三頭然浚裂蚩尤殪玀猴大開太陽照九州堪兮堪兮勿失汝劒兮使我徒請尚方斬馬之具於朱㳺至正二十五年青龍集己巳王正上日抱遺叟楊維楨在雲間草𤣥閣書雍公孫子氣甚清示我楊顛古劒行劍鋒詩律兩竒絶秋蓮光彩玉庚庚楊顛健筆老縱横是亦鐵中之錚錚吐辭鬱嵂鳴不平吁嗟鳳凰來為盛世嗚一代惟數虞翁生余也學書學劍既老何由而成名右古劍行倪瓉己酉冬雍國丞相虞公古劍一具今藏其孫勝伯家毗陵倪元鎮匡廬陳惟寅既作歌詩詠之且要余同賦焉雍公古劍射日星鐵冶鑄出秋霜硎寒光耿耿試一掃魑魅罔象都逃刑匣藏鏽澁不敢動龜鱗虎文驚且竦閱歴星霜三百年社稷山河自兹重雍公磊磈雲夢胸白虹紫電符來同有時呼酒醉踏月浩歌起舞多英風采石江頭却鐵騎一戰突營誰可比材官勇將號如雲每視竒功獨懐媿劍鋒猶漬佞血鮮神物不隨陵谷遷只愁雷電破屋壁化作蒼龍飛上天淮海秦約文仲虞文靖詩卷真蹟白雲䕶窻雪鳴竹地罏深深火初熟樵客晨來午未還真人自與燒黄獨罏中􅖳汞輕千乗窻外日月飛兩螢尚有度生情未斷侍人長跪授黄庭玉臼搗霜月當户竹牕映雪書滿牀客來長揖不交語自撥丹火燒山香皎皎霜鶴立齋厨蕭蕭風竹鳴庭除窻間有客自髙坐堂上真人方讀書十一月壬辰明復真人約華隂楊廷鎮閩中潘子文四明王安道談道話於徐中孚丹房微雪灑空塵静雲晏遂復終日即事雜詩松隂鵠立候宫車風送飛花著白鬚水影漸隨簾側畔鸎聲祗在厰東隅近牀擬進新琴操載筆親題真畫圖太液雨餘波浪動龍舟初試散魚鳬早朝髙閣丹青起中天紫翠分窻當太白雪門對九疑雲伐木山人去吹簫帝子聞塵中歸未得春思轉紛紛録寄民瞻尊兄别後一笑虞集伯生鄧文肅公臨急就章大徳三年三月十日為理仲雍書于大都慶夀寺僧房已西鄧文原天厯庚子清明日汾亭石巖民瞻觀於武林宗陽明復齋𨽻古至正八年六月二十日㑹稽楊維楨偕河南陸仁同展卷於東滄聴海閣仁嘗學章草者以此卷入臨品之能云至正庚寅夏五月二十四日方外張雨謂素履齋書此蚤年大合作中嵗以往爵位日髙而書學益廢與之交筆硯始以余言為不妄殆暮年章草如隔世矣信為學不可止如此洪武十一年戊午嵗五月豐城余詮拜觀于東倉之甘泉里寓舍急就篇漢黄門令史游作葢推本蒼頡爰歴博學凡將等篇而廣之也今石刻相傳為吳皇象書比顔師古所著者無焦滅胡以下六十三字又頗有訛脫始東漢人以用藳法冩此章故又號章草此卷前元鄧文肅公所臨公繇房山髙公薦入掌制誥出持憲節斯乃應奉翰林時為理仲雍所書觀其運筆若神蜦出海飛翔自如仲雍名熈于闐人好古博雅為吳郡判官建言助役法民便之𢎞農楊子綸出示求題故并及之洪武十二年三月清明日後學袁華書於鰲峯精舍嘗論急就篇此小學家之說漢史㳺傚凡將為之也末叙長安涇渭街術後或増以齊國山陽二章宋歐陽修居史館日以餘力及於是篇取州名裒次之然是篇去古逾逺脫漏訛舛不無人欲辨其失得而増補亦徒自勞耳漢人以槀法書之故曰章草此章書之祖也近世人多尚草真行未始學而先習草如人未能立而欲走葢可笑也况章草之來作於科斗籀篆觀其運筆圓轉用意深妙烏有不通籀篆而能學者哉苟有聰明之人雖不通籀篆能彷彿其形似猶可其奈刻鵠不成者耶自東漢以降臻乎妙者惟皇象鍾繇王右軍而已唐宋間人臨鍾王所書亦不多見欲習之者不通籀篆誠難乎哉此卷巴西鄧文肅公所臨公在元時獨以文章名世而又以能書名世號稱三大家公與焉觀公運筆用意甚合古人之妙此卷實希世之寶也亮上人出示乞余題余故以草書之難習併録於卷末非但以警於人而有以自警也洪武二十七年蒼龍甲戌秋七月獨菴道衍冩于海雲東軒正統戊午中秋後二日武昌陳謙拜觀于毗陵之寓舍郭天錫手録詩雜記天錫名畀京口人風災鬼難之域僢卧接飲之士或雕其題而漆其齒或貫其胸而鏤其體服禽獸食草木鴃舌鳥語或斷髪文身而魋其結或毛以為車或革以為船亂鯨波涉雷淵夙夜虎兕之林寢食蛟龍之川梯山棧谷沙度繩行莫不來享來賔來貢其珍蜿蜒濩略扶服稽顙請吏而稱臣未始壓羊刑馬而要之盟也云云右㑹同館賦君不見王昭君家住秭歸啼處村生來住近離騷國悲歌慷慨惡離羣紉蘭結􅉅佩蘅芷芝澤頮面薇骨熏瑶琹慣識九歌譜懐感逺道偏消魂明妃曲客行蹔憩此禪林路遶溪流石磴隂山氣入舟知夜乆雨聲連樹覺村深寒添芋火増多事風落燈花息妄心憶與髙僧宿靈鷲月斜松頂一猿吟夜宿山寺光分顧兔一毫芒遍洒春明翰墨塲得趣妙從看劒舞全身功貴善刀藏夢花不羡雕蟲巧試草曽供倚馬忙昨過山僧餘習在小書紅葉拭新霜贈筆工范君用晚風索索酒初醒巖桂花開香滿庭掩書不讀亦不寐明暗一燈如露螢次韵袁通甫世間一切法如雲行空中太空不待雲因雲而見空清風鳴禽竹解籜窗下挑燈還看書前五言絶後摘句士女大集勢若禹峽春流胥濤秋壯壑赴岸滅前擁後推轡騎巷休輿轎道息武無可布視不得留謝叠山字君直妻李節婦以君直故與二子繫金陵獄一將官欲納之李紿曰爾能脫我械繫乃可議此將以為然禱上下釋其獄李即具湯沐約翼日出是夕伺二子熟寐解衣帶自經死藁葬城東濠二子放還後數年子定之復往裹骨歸葬卷吾李先生謹思贈詩云猝猝多羝屈幽幽獨雉經借渠施粉黛聊與照丹青孤槥何年寄重泉底處扄冇人能縮地不隔短長亭宋末沙門道燦姓陶氏自號無文龍興人文筆髙古不落禪僧窠臼多與一時名公鉅人還往其題蒲萄草蟲云汴都南薫門外蒲萄一架幾十里盛夏烈日景不到地當時民物昆蟲熙熙然囿於緑隂清影間今富陽道中葢彷彿髙皇帝舊京遺制也百年故國茂草連天不知蜎飛蠕動翔集何所造化生色乃於紙上見之悲夫宋周文謨太守有愛姬善棊而絶色史衛王以計取去十年不見一日周謁衛王忽見姬與衛王對局四目相顧驚喜不已遂賦念奴嬌詞云棊聲特地把十年心事恍然驚覺楊栁樓頭歌舞地長記一枝纎弱破鏡重圓玉環猶在鸚鵡言如昨秦筝别後知他幾換絃索誰念顧曲周郎樽前重見千種愁難著猶勝𤣥都人去後空怨殘紅零落緑葉成隂桃花結子枉恨東風惡盈盈淚眼見人欲下還閣司業鄧文原狀髙克恭云公性極坦易然與世落落寡合遇知已則傾肝鬲與友終身亦不復疑貳公在杭愛其山水清麗公退即命僮挈榼攜杖履適山中世慮氷釋竟日忘歸好作墨竹妙處不減文湖州畫山水初學米氏父子後乃用李成董巨源法造詣精絶公卒後購公遺墨一紙率千百緡為詩不尚鈎棘自得天趣嘗見公作畫時雖貴交在側或不暇顧揖有譏其簡傲者乆乃識其真浙右多豪門右族或飛語汙公公亦不為辨暨北歸行李無長物貸於人而後具舟費公掾行臺時嘗從大夫相威公入見世祖顧問再四曰是髙嘉甫兒耶賜中統鈔二千五百緡公嘗言自筮仕月給餐錢外所得僅止此房山有田二頃課僮奴耕作嵗入不能供給反卒之日家無餘貲識與不識皆為流涕易簀命喪葬用朱文公法及區畫家事甚悉此心不以生死亂衆謂講學之騐鮮于樞札云適與大兒議親來杭至常之新安暮泊溪口中夜墮水幾為溺鬼作五言自儆云勿浣衣上泥留作韋與弦因風寄達夫都司一笑又手抄諸賢遺稿張庭堅自靖人自獻于先王義君子之去就生死在于天下國家而不在于一身故其死非沽名其生者非懼禍而引身以求去者非要利以忘君也仁之所存義之所在鬼神其知之矣昔商之三仁或生或死或為之奴而皆無愧于宗廟社稷豈非謀出于素歟晦庵先生云胡致堂議論英𤼵人物偉然向嘗侍之坐見其數盃後歌孔明出師表誦張才叔自靖人自獻于先生經義陳了翁奏狀可謂豪傑之士也林僉憲善之春日絶句寶篆香消雨散絲誰撩詩興上花枝春風吹度南牕竹一片紅芳落硯池又西湖夕佳亭句晴雲木末山四圍新月荷花波萬頃石敏若栁花詩來時萬縷弄輕黄去日飛毬滿路傍我比楊花更飄蕩楊花只是一春忙吳雲道中遣興九絶句雨餘烟栁緑如苔水净沙明白鳥迴花氣滿船無覔處隔籬村舍瑞香開水村烟草暎花叢夢裏青山入瘦笻晩泊楓橋春睡重滿船風雨不聞鐘曉入招提草樹馨怪來松栢老龍形如何剥落氷霜盡依舊春風吹得青吳國池臺幾刼灰城闉蘭若鬱崔嵬老僧笑指峩眉石曽見承平出蜀來一枕落花溪上春翛然意與葛天隣世間多少邯鄲夢夢覺依前認不真水光净盡月波隨每遇垂虹起遁思不信鴟夷五湖去扁舟只為載西施花栁清明過雨初脩篁風動鳥相呼青山如此不歸去時向溪流照白鬚毗山嵐翠入苕溪曽倚池亭醉夕暉回首交朋半凋謝烟波無際白鷗飛卜居擬向水晶宫深築茅齋萬竹中三月江南蓴菜美季鷹何苦待秋風疊山贈命士云鴂鳴方歇楚臣憂草緑王孫滿地愁試借星圖看分野黍苗秀處是何州髙彦敬題初陽臺道中云二千里地好耕桑無數海棠官道傍風掠亂紅攙馬去春光更比路人忙子昻詩庭槐風静緑隂多睡起茶餘日影過自笑老來無復夢閒看行蟻上南柯鮮于伯機湖上新居云吾愛吾廬好臨池構小亭無人致青李有客覔黄庭樹古蟲書葉莎平鳥篆汀吾衰豈名世詎肯苦勞形題范寛雪山句前山積雪深隠約形體具後山雪不到查牙頭角露逺近復有千萬山一一倚空含太素懸崖斷溜氷滿壑野店閉門風倒樹戴表元題子昂疊軸云百折雲山路不通無名怪木淡書空相逢欲問秋風客不是巴中是剡中北村題姚静齋女柔徳一日三刲股捄其兄云女生他人媍兄死誰養親刲股與紾臂孰仁孰不仁張玉田山中白雲詞題紅葉云萬里飛霜千山落木寒艷不招春妬楓冷吳江獨客又吟愁句流水孤村似花繞斜陽芳樹甚荒溝一片凄凉載情不去載愁去長安誰問倦旅羞見衰顔借酒飄零如許謾倚新粧不入洛陽花譜為回風起舞尊前盡化作斷霞千縷記隂隂緑遍江南夜窻聴暗雨右調綺羅香賦松花云碧浮春葢黄㸃秋棋細芳泛月露委殘釵烟梳髙髻曽戲折幾度宿寄山房􅔇塵雲屑香入蜂鬚蜜房風味應别篘酒浮蕩愛霏霏粉黄清絶嫩苞新子憑誰香歌五粒到只怕東風吹盡長蕭蕭黄髮獨鶴歸來滿庭零亂金雪右調華胥引咏蟬云槐薫忽送清商怨依稀乍聞還歇故苑愁深危絃調苦前夢蛻痕枯葉傷情訴别是幾度斜陽幾回新月轉眼西風一禁幽恨向誰說低鬟猶記動影翠貂應悞我雙鬢如雪枝冷頻移隂踈難戀空負好秋時節凄凄切切漸迤邐黄氐砌蠶相接霜滴凉柯晚來聲更咽右調齊天樂題周草牕志雅堂云製荷衣傍山牕下隠雅志可閒時疑竹門深移花檻小動人芳意菲菲怕冷落蘋洲夜月想時將漁笛静中吹塵外榮華燈前兒女笑語忘歸分得烟霞數畝乍掃苔尋逕撥葉通池放鶴幽情吟鶯歡事老去却願春遲愛吾廬琹書自樂好襟懐初不要人知長日一簾芳草一卷新詩右蘋洲漁笛譜送人之西江云寒侵桂葉雁風擊碎珊瑚屑研凉閒試新霜晴帖頌橘騷蘭秋事正竒絶故人又作西江别書樓虚度中秋節碧欄倚遍愁誰說愁是新愁月是舊時月右調醉落魄嘯翁詞云草夢初回卷簾盡放閒愁去晝長無侣自對黄鸝語絮影蘋香春在無人處移舟去未成新句一硯梨花雨右調㸃絳唇圖書一室春暖垂簾蜜花滿翠壺薰硯席睡覺半窻晴白手寒不了殘碁篝香細勘唐碑無酒無詩情緒欲梅欲雪天時大徳十一年嵗次丁未十月初十日客寓燕山奔走暮歸黄塵滿面挑燈讀此詞一過想像江南如夢中也是夜一更畢天啓丁夘冬覩郭畀手録詩文一帙格外上下俱命墨可想其書畫擅勝倪迂追念郭髯我所愛者也余時病未痊聊摘一二旋為鬻古者索去姑存此以俟延津劒合淋漓滿志耳砢玉識貫雲石詩卷真蹟雄雷怨别雌電老雲海漫漫地無草朔塵不受紫檀風三寸蘆中元氣巧微聲轔轔喘不栖魑魅夢哭猩猩飢壯聲九漏雪如鐵酥燈焰冷春風㓕神妻夜傳髑髏杯倒捲崑崙飲腥血紫臺雲散月荒凉歸路人稀腔更長酸齊道人為西渶公子竹懶翁嘗雅集紫桃軒招周敏仲髙明水友余出所藏書畫鑒賞余獨喜老酸崛韵懶翁即手録遺余書法亦效之誠一時佳興也砢玉記俞紫芝楷書悟真至正癸夘十二月初吉桐江紫芝道人書于清隠齋張平子悟真篇仙道指南道光子野所著不知能得其㫖意否故余以為不若讀其本作反無成虧也此卷為俞紫芝所書深得松雪筆意而圭角稍露比之松雪正如獻之之於羲之也清癖劉君深知書法試共商確之𢎞治壬戌正月二十日海虞桑恱書吾子行書古文篆韵二帙余自志學習篆畫丁邜嵗自征建昌得古文篆韻于白鹿書院兵火之餘隻字無存友朋間以此役吾性不能辭一時率意寜無小失一日㑹應方中于阮舜咨之堂偶爾言之遂得其本歸證差謬有哂余者曰年如許亦晩矣因思小失為人所譏孰若證之以免魚魯焉遂不以老而廢筆聊備檢閲時至元丙戌中秋前三日秋岩老子記此本為吾子行先生筆也先生名丘衍住杭之先花坊時年二十七即不下樓樓上下分業子弟客至僮輙止不使登通焉使登乃登先生好古變宋末鍾鼎圖書之謬寸印古篆實自先生倡之真第一手趙吳興又晚效先生法耳所著有學古編字源七辨篆品三十八則私印有竹素山房吾氏子行我最嫩懐真樂飛丹霄數印印鼻小韋帶嘗在手弄之葢欲和其四稜令有古意是本正子行耑業秋巖得而證冩之者焉至正七年嵗次丁夘五月望嘉禾陶九成識吾子行為錢唐人不仕不娶離世異俗好古博雅隠居授徒四方之士相傾慕者冠履交于户内而子行不以貴賤為低昂可者與之不可者拒之居僅容膝迎送未嘗下樓留心古道樂志簞瓢不與世俗争妍巧葢亦尚友千載者𢎞治初得說文解字篆韻于沈石田氏所少者古文篆韵耳今復得子行手蹟不惟㸃畫足法且合之成全書良足快心耳嘉靖甲午中秋菽園庸史王鴻羽識王氏可儀吾禾沈叔雅𢎞嘉望子商丞工篆𨽻八分所往還多名流董氏戲鴻堂帖其手摹勒石也與余交有年矣叔雅垂盡時以是書授余曰此吾一生得力處也余即酬而閱之豁然心目焉葢篆既分韵可檢每體各書字文所出為古孝經石經周易古毛詩古尚書古周禮古禮記古春秋古論語古爾雅周書隂符經道徳經古老子古莊子古漢書碧落文籀文古文雜古文說文演說文荆山文石郭文開元文牧子文澄裕古文古世本古月令古樂章乂雲章汗簡鳳棲紀茅君傳天台經幢南岳碑華嶽碑三方碑雲臺碑彌勒傳碑王庶子碑樊先生碑貝丘長碑陳逸人碑比干墓銘季札墨銘趙琬璋古字略李商隠字略衛宏字說郭招卿字指庾儼字書朱育集字李宗吉釋字王存又切韵祝尚書韵崔希裕略古顔黄門說張庭珪劍名裴光逺集綴濟南集楊天夫集徐邈集張楫集李彤集孫彊集馬日集林宜集諸書觀止矣無以復加矣迺叔雅故今之子行也不但伎倆相當品行亦相若惜其父子相次作古無有繼之者哉萬厯庚申立秋日繡水汪砢玉識于稽古齋柯丹丘石屏記髙昌正臣博古好雅其燕處之室凡可以供清玩者莫不畢具名屏其一也異哉兹石方廣僅咫尺其文理粲然有髙深幽逺之思焉絶頂渾厚者如山如嶽飛揚飄忽者如烟如雲横流奔激者如江如河斷者若岸泓者若潭或如林麓之蓊鬱或如禽魚之逰戲使董北苑僧巨然復生其破墨用筆不足過矣古之人遇物之異者必書其冊若斯屏之異安得不為之書也因命之曰江山曉思復書其背而刻之至順二年夏四月望奎章閣學士院鑒書博士文林郎柯九思記余有紫檀界方一對首鐫行書云兀坐草𤣥風后為奸爾往鎮之世掌我編敬仲銘紹美製界圍雕鏤花鳥極精工信出自名手上飾漢玉昭文帶一粟米文一卧蠶文血蝕殊古而瑩潤面刻草𤣥閣佳器故楊鐵崖珍玩焉第妄想敬仲所記石屏如在或得與此書鎮共充韵齋𤣥賞則界間之禽鳥花卉倩屏上之江山曉思而益勝矣柯博士如有靈將仙風所觸應為我作撮合山也飲光居士汪砢玉識于乾坤一草亭饒介之幻住詩蹟晴松落雪踈如雨南風吹緑養天榆榆前開徧菡萏華池上露凉渾欲語道人觀化無方所塵世茫茫横岐路笑看草木嵗時新爭逐㳺塵何處去尋花摘葉情如許公子歸來與師遇蕭蕭茒屋畫為圖是故標師之出處紅衣落盡蓮滿房碧藕留絲終幻住至正二十五年寒十月一日過幻住出此卷乃知中峰與松雪一合相耳雖然峰亦留此戲後人也住幻思幻又造境幻又使人畫像幻今日復使我作幻語峰願力耶抑遺下則劇耶當問庵主人華葢峰浮邱先生童子紫𤣥洞饒分信手識之沈仲說次韵遺蹟次叔方先生見示詩韵右頓首上城南陋巷居新僦緑竹移栽幾箇斜藂桂山中招舊隠讀書堆裏認君家蜀人漫詫文園賦吳市争看衛玠車斷簡味腴如噉蔗虎頭癡絶至今誇右顧仲贄移居詩步屧春風裏翛然忘世情閉門無客到載酒汎江行雨過山如染潮迴水自生鷗沙𣺌千頃夢裏到承明右留笠澤别業詩王雲菴書香奩八詠卷寶鑑凝膏温泉流膩璚纎一把青絲墜水膚淺漬麝煤春花香石髓和雲洗玉女峯前咸池月底臨風輕把犀梳理陽臺行雨乍歸來羅巾猶帶瀟湘水右金盆沐髮鐵雅評作家語自别雅筆如何可到水鑑懸秋瓊腮凝素鉛華夜搗長生兔玉容自擬比姮娥粧成只恐姮娥妬花影涵空蟾光籠霧芙蓉一朶溥秋露年年只在廣寒宫今宵鸞影驚相遇右月奩匀面用事善幹運句鐵雅評在第二下粉凝紅氷香銷獺髓鏡鸞影裏人憔悴梨花帶雨不禁愁玉纎彈盡相思淚恨鎖春山嬌横秋水臉桃零落臙脂碎故將羅帕揾啼痕寄情欲比相思字右玉頰啼痕鐵雅評亦善描意淡掃春痕輕籠芳靨捧心不效吳宫怨楚梅酸蹙翠尖纎湘烟碧聚愁萋蒨紺宇寒凝月鈎金灧鶯吭咽處㣲偷歛新翻嫵態太嬌嬈鏡中蛾緑和香㸃右黛眉顰色鐵雅評前闗善扵形容評後闗自有嗚咽而有􅀈色金谷逰情消磨不盡軟紅香裏雙鴛印蘭膏步滑翠生痕金蓮脫落凌波影蝶徑遺蹤鴈沙凝潤為誰留下東風恨玉兒飛化夢中雲青蘋流水空仙咏右芳塵春迹鐵雅評非舊時月色誰能道此烟冷瑶櫺神逰貝闕芙蓉城裏花如雪更後仙郎同躡鳳凰翎千門萬户皆明月自然見夢海碧山青天荒地老滿身風露飄環玦髙樓畫角若無情一聲吹散雙飛蝶右雲牕秋夢鐵雅評栩栩蘧蘧結尤飄洒翠藻文鴛交枝連理金鍼停處渾如醉楊花一㸃是春心鵑聲啼到人千里喚醒離魂猶疑夢裏此情恰似東流水雲牕霧閣沒人知綃痕浥透紅鉛淚右綉牀凝思鐵雅評用意措辭髙出衆作暗擲龍文尋盟鸞鏡龜兒不似青蚨凖好句花房羞化彩蛾飛銀橋宻逓仙娥信錦屋瓊樓薄情飄性碧雲望斷紅輪暝珠簾立盡海棠隂待温遥夜鴛衾冷右金錢卜歡鐵雅評雪月神仙語意香奩八詠俱調寄踏莎行雲菴叜王徳璉撰雲間詩社香奩八題無春坊才情者多為題所困縱有篇什正如三家邨婦學宫粧院體終帶鄙狀可醜也晚得玉樓子八作衆推為甲而長短句樂府絶無可拈出者雲菴老先生寄示踏莎行八闋讀之驚喜先生葢松雪翁門倩今年八十有三矣而堅强清爽出語娟麗流便此殆雪月中神仙人也謹以付翠兒度腔歌之又評付龍洲生附八詠詩方後以見王孫門中舊時月色雖閱喪亂固無恙也至正丙午春三月初吉錦窩老人楊禎叙華清春晝賜温泉綰脫青絲撤一編翠雨亂跳花底月黒雲半掩鏡中天銅仙盤滿添香露玉女盆傾拾翠鈿攏得雲鬟髙一尺罟冠新上玉臺前金盤沐髮一片清光照膽寒玉容滿鏡掩飛鸞素娥照見黄金闕絳雪鎔開白玉盤翠㸃栁尖春未透紅生櫻顆落初乾好風與我披羅幙一朶芙蓉正面看月奩匀面天然玉質洗鉛華怪底偏將半面遮紅滴香氷融獺髓彩粘膩雨上梨花收乾通徳言難盡㸃濕明妃畫莫加聚得班班在何處軟綃寄與薄情家玉頰啼痕按樂圖開列滿堂春愁何獨損青楊蜀山烟雨雙尖痩漢栁風霜兩葉蒼索畫未成京兆譜欲啼先學夀陽粧蕭郎忽有歸期報喜色天長一㸃黄黛眉顰色是誰屧步印微茫便似名家春滿牀軟雪消時痕晃底好風生處步生香綵雲飛上鞦韆鐙芳草侵來蹴踘塲愁似闕成獨立綵鴛拾得在東牆芳塵春迹骨冷魂清酒力微路迷錯草是還非羅浮曉月相將闕巫峽斷雲何處飛金彈撇過驚忽忽玉龍嘶了尚依依不知直到鈞天所記得霓裳樂譜歸雲窻秋夢綵線添來日正遲香絨倦理一支頤心㳺飛絮渾無著身蛻枯蟬忽若癡花帨錯描愁伴覺金針閣住計誰知絶憐小玉情縁重倒死春蠶始絶絲繡牀凝思紫姑壇上囑方兄忽聴呼盧擲地聲星斗未分牛女㑹隂陽先判雨雲生青㠸朶子寜無兆玉蝶化身元有情寶鏡重圓三五夜重摩半月問虧盈金錢卜歡香奩有二十題裁剪俗思信配凡四先生又有和趙八節使廿詠尤膾炙於粉黛筵中惜逸去冷婉補何婉敢龍州生草琬孟文謹拜手䟦顧謹中詩卷陳君相見虞山陲驚詫潜夫麋鹿姿髪白每憐欺我老酒紅聊爾寄顔衰好䛕俗子休論相乆别故人欣說詩明日歸舟風迅順為傳消息慰癡兒暢月二十七日書海虞趙氏書樓友弟顧禄謹中楊子乆手札公望頓首再拜寜極路教先生閣下近侍誨談終日歡甚奉違後連日不克欵教渴心又將塵矣持受欲求大手臨黄庭堅樂毅論二帖以為矜式雖天寒㬉閤春温想不廢執筆也片楮代禀統于心照公望再拜寜極路教先生閤下公望摺申王叔明書溪南醉歸詩青山如翠束清溪溪水流花春不知自從識得南溪叟夜夜溪南扶醉歸醉歸夜黒愁難渡東風吹折溪邊樹來山鑒石架漁梁醉歸不知春夜長共坐溪邊翫明月緑蘿飛花散香雪酒醒月落正愁人那堪又與溪翁别醉眠草堂春日紅山妻報我酒初冽萬壑千巖紅雨深還向溪南聴啼鴂余舊時作溪南醉歸詩𤣥實草堂在荆溪之南他日余與令兄𤣥度自溪北歸小舟阻風𤣥實忽出此紙求書因書此王蒙此元人王蒙所書溪南醉歸詩而吾里李氏所藏也蒙字叔明自號黄鶴山人為趙文敏公外孫𤣥度𤣥實則張氏為宜興人兄弟並尚文雅一時士大夫多與之交故蒙書此遺之蒙以畫名今讀其詩甚流麗而其書頗亦似舅可藏而玩也吳寛題曰人嘗見黄鶴山人畫皆稱再世王維山人之學書間見此紙尤為悚人當不在趙魏公下魏公信居不有之譽而山人亦盡曷有之美矣後學沈周跋珊瑚網卷十
