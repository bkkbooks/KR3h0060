body:
  text: 珊瑚網卷八明汪砢玉撰法書題跋趙文敏公摹蘭亭叙蘭亭修禊帖石本甚多只定武刻全具右軍筆法獨孤長老見示舊刻肥瘦得中知為正本與子固藏者無異舟中時時展玩臨之不已惟此紙頗得其意至濟州遇景逺索去重題孟俯蘭亭自褚河南雙鈎以還未有能傳其神者即閣帖間有所摹復是影上捕影文敏公以書家其視右軍自謂能腕不負心故亦步亦趨似不愧優孟叔敖而運筆布形不免露本來面目然吳興此帖猶屭屓負山猛力竭盡矣真神品也偶於友人明古處見此遂以定武蘭亭易之而篋中寶録知當為此書奪氣也延陵吳寬蘭亭墨蹟永閟昭陵精華盡在定武一刻然屢經摹勒微以失真典刑僅存耳若他搨不足觀也文敏此帖奕奕有王謝家子弟風流氣别得一種意外神彩即起右軍使觀之吾知必嘖嘖首肯吳門周天球識正德元年秋日藏青老人嘉禾毛五雲京口褚勉盧志愛同觀二年夏望彭城富世觀于清照堂趙集賢臨蘭亭卷西涯篆書子昻親筆于卷首此卷松雪晚年筆力精神清徑飄逸擬之早年如出二手古人云筆隨人老斯言也豈欺我哉成化十六年庚子六月大熱偶觀此卷揮汗書之士竒之印朱文倣松雪書幾三十年未能入室懊惱懊惱書法必見多則進得眼入心乃應之於手也士竒載題昔人有評孟俯畫不如詩詩不如字者豫觀此卷但覺其爛漫掩映俱入神品蓋未敢以其言為確論云𢎞治戊申臘月十八日蘭亭居士識趙承㫖臨禊帖在紙上唐人臨模禊帖非必規規㸃畫間而意度獨至子昻此卷近之師道題子昻臨蘭亭帖而師道著題于上可謂二美矣雪澗翁宜善藏之不肖復何言趙孟籲題余見子昻臨臨河序何翅數百本無一字不咄咄逼真如郢人運斤成風庖丁奏刀批卻導窽因其固然如輪扁老于斫如大馬捶鉤不失毫􅉭得之心應之手在夫熟之而已此本經師道子俊鑒定增價十倍錢唐仇逺跋永禪師書千文八百本魏公所書當不减此此卷大德五年為韓定叟書定叟㑹稽人與公厚善集中有贈定叟及留别詩可考公以大德三年為江浙儒學提舉此當是為提舉過㑹稽時書是嵗公四十有七正中年書也跋者四人韓性字明善定叟諸姪道德文學元中世巨儒宇文公諒字子貞元統進士為史官張伯雨茅山道士句曲外史也三公並有盛名而祖銘亦禪宗大老所著四㑹語録其字石鼎杭州徑山僧云四明者本奉化人文璧𢎞治甲子七月草一日觀於沈潤卿氏之仰止樓吳郡都穆趙吳興真草千文結字難筋骨相承不爾則有斷續之態子昻書法獨步當世備聚諸體然變態不常或者以形似求之大類優孟抵掌耳􅀢題卧雲齊慶梓削鐻見者驚猶鬼神非旦夕之功也或者觀其表而不觀其裏則不足以議子昻書矣浦城楊載題松雪翁千文平生閲數卷未有如此本精絶直逼永師後之書家恐難追及嘉靖庚戌嵗閏月草三日觀于至德里之小樓嘉禾項元汴子京又四體千文卷延祐六年十月草三日為録事焦彥實書於松雪齊右文敏趙公四體書千文惜不見司馬子微五體書道德經較此何如也近代是書為最張雨記文敏公真草篆𨽻平日未嘗多寫觀此卷必為焦侯好事而書惜其九原不復作矣唐棣敬題又臨智永千文卷書法甚難有得於天資有得於學力天資髙而學力到未有不精奧而神化者也趙松雪書筆既流利學亦淵深觀其書得心應手㑹意成文楷法深得洛神賦而攬其標行書詣聖教序而入其室至于草書飽十七帖而變其形可謂兼有學力天資精奧神化而不可及矣此種千文又非平日率意之書若以鐵門限相並較之雖永師復作不能為髙下矣欽哉斯人欽哉斯人雍虞集伯生王孫書法有神機漫說籠鵝繼者稀千字禪家鐵門限何人入室更探竒楊一清趙魏國臨張旭京中帖凡五帖止存此秋深不審氣力復何如也僕疾弊何足論河南送物人近來得京中消息承彼數年不熟憂縣不復可論不委諸小大如何為活計嵗日有京中信使去者當數報委曲耳吳興趙孟俯臨張長史京中帖右趙文敏公所臨張長史京中帖筆法撡縱骨氣深穩為真蹟無疑且不用本家一筆故可寶也聞公嘗背臨十三家書取覆視之無毫髮不肖似此公之所以名世也觀此帖信然嘉靖九年禊飲日陸深跋于舟中國子祭酒趙文敏公小楷麻姑壇子仲穆書讀書城南又司馬溫公勸學三帖卷水精宫松雪齊道人趙孟俯書後二欵趙雍書今年四月十九日余自華亭過松陵之甫里田舍天氣驟熱因留度夏鄰有張君德常德機賢伯仲伯子多蓄名跡而希㑹面名跡亦罕以示人幽居默默如潜逃而己乃子元度亦不肯相過招邀數次不過黽勉一來六月十六日旱久而雨一雨浹旬茅屋上漏下濕獨坐惟有悲嘆因寄二君詩曰積雨不為休漂搖使人愁哀吟四壁靜病卧百蟲秋何人肯相念載酒一銷憂幸有兩張叟清詩逺見酬余六月末病臂瘡足痛呻吟幾及旬故云七月四日雨止風靜雲翳開朗泥潦尚沒足忽叔子來訪元度踵武亦至携榮祿此卷及其子趙雍遺墨以怡悅老眼濯甕牖之凉颸臨碧江之激湍相與玩詠不已因自念老景侵尋親朋淪落殆盡雖近在跬步如張君伯仲父子尚不得數數晨夕况二趙星宿光芒昭回霄漢夢寐亦所不覩安得不見其遺蹟而為喜忭哉遂記其後以寫余之憒憒者焉嵗次己酉倪瓉詩後改四句開門望原野江湖漭漾流誰能載美酒相從以銷憂以上字皆旁注趙魏公楷書道德經真跡二卷延祐三年嵗在丙辰草四五日為進之髙士書於松雪齊卷前白描老子立像延祐六年夏五月十九日吳興趙孟俯謹製又一卷余觀趙翰林書法深得晋人之㫖故筆端蒼徑精神煥發悅醒人目辛卯夏日獲觀良久不忍去手因識其末云太原王稚登墨林山人得之仲兄少溪子長手授其值七十金子昻小楷髙上大洞玉經在宋紙上有三千餘字橫卷右趙松雪大洞玉經後題云大德九年十月八日書按元成宗大德九年嵗在乙巳公時年五十二嵗先是公被召金書藏經許舉能書者自隨書畢所舉草餘人皆受賜得官執政將留公入翰苑公力請歸己亥改集賢直學士行江浙等處儒學提舉正其時所書也但其體専學元常與公平時書微有不同而用筆之精轉折之妙則無毫髮少異蓋公于古人書法之佳者無不倣學如元魏常侍沈馥所書魏定鼎碑亦常效之謂其得鍾法可愛則其於元常固惓惓矣至其晚年乃専法二王右軍黃庭子敬十三行之外不雜他人一筆所以深造自得為一代書學之祖也嘉禾子京項君以重價購得此卷持來求跋遂為書此然豫又嘗見翰林孔目何君元朗所藏一卷乃金陵王南原舊物字小如粟紙髙五寸餘精妙不可言今已歸之天府不可得而見矣猶幸得見此卷而明窗靜几時一展玩不惟塵眼為開而冲襟遐抱亦為之暢適古物日少子京其寶之萬厯三年四月十一日茂苑文嘉書于歸來堂趙書髙上大洞玉經中央黃素老君撰大元延祐三年嵗在丙辰五月望為石唐尊師書集賢學士資德大夫趙孟俯此卷乃趙魏公六十三嵗所書至精至妙非言辭贊美可盡蓋公之字法凡屢變初臨思陵後取則鍾繇及羲獻末復留意李北海此正所謂學羲獻者也舊嘗獲見周侍御家侍御既坐貶竄竊意必歸天上不知復流落人間今得披玩纍日抑何幸哉殷卣周彛而此卷不可得博雅君子尚思謹祕而傳焉金華宋濓題昔華陽洞中仙經多楊許二君手書結字畫符之妙所以為洞天千載祕寶近世吳興趙公子昻書法畢絶偏善小楷又嘗親授洞訣于茅山劉真人所以書此其可寶不愧古人矣僕參學以來忽焉老至得隱地於臨川華蓋浮邱壇東麓仙人茅公修行故處將結龕誦經得見此卷猶記是年與趙公同在京師今草三春公與劉君各已仙去遡瞻回風俯仰慨然大洞三境弟子虞集書至正九年嵗在己丑秋八月草二日拜觀於苕溪之上趙雍趙書金碧古文龍虎妙經延祐元年七月既望水晶宫道人書余昔年逰燕市嘗見趙文敏書龍虎經半是行草其人即携去真贋不暇辨也此卷疑是晚年所書得心應手非淺學可以倣佛豫何幸獲觀于檇李汪長公家惜歸迫不能手録此經潜心筆法聊題數語以志鴻泥之感萬厯乙未秋杪吳下杜大中書魏公楷書洛神賦大德三年十二月二日書與子中孟俯子建洛神規效宋玉神女精麗相埒而瀏亮過之或誣以感甄之事潜夫詩話力辨其非而東阿紀夢形容巧絶比李長吉前後復自相反何哉余頃見淳熙祕閣帖王令所草賦止掦輕袿之猗靡而下筆勢飄逸殆與此賦相頡頏今學士乃楷全文遒徑清婉尤為可愛子中得之以與通甫二君皆早世學士晚年筆力愈竒二君不及見之矣辛酉夏至日墻東老叟題陸子方栁誠懸云子敬洛神賦人間合有數本今世所見惟自嬉至飛十三行耳蔡君謨云子敬放肆豪邁與右軍差異臨學之家必謹其辨矣趙承㫖一手全文好事者欲考王氏父子之法此其可觀之乎延祐中集從承㫖在集賢翰林嘗出此賦真跡九行見示上有阜陵題字甚謹又三行别得之云是賈相似道購諸北方者也計其嵗月應是後此書十餘年乃得之耳蜀郡虞集伯生識于吳郡寓舍芙蓉洲至治二年九月十五日篆𨽻變真草興羲獻獨擅厥長時去浸逺真跡間見今世所傳惟石刻耳而石刻又不能得其初模者如洛神賦文字翰墨卓為二美復無完本昔曽子固記墨池謂羲之之書晚乃善則其所能蓋亦以積力自致非天成然後世未有能及者今觀趙公子昻所書是賦全篇亹亹逼真與他本絶異非蚤嵗晚年可比通甫子中余皆及識之子昻固以䏻書著大名于當世不假贊美二賢蚤記玉樓矣承㫖公亦既云亡欲求一字己不可得况若此賦哉通甫子仲長出以示余感慨久之仲長宜什襲珍收慎毋輕出至治癸亥立夏日書鳴鳯李氏時可周越法書苑王獻之字子敬羲之第七子官至中書令正書入神品洛神賦小楷烏絲欄寫成精密淵巧出于神智後有栁公權跋尾云子敬好寫洛神賦人間合有數本此其一焉寶厯元年正月二十四日起居即栁公權記亦楷題又桞璨題云天祐元年五月六日堂姪孫中書侍郎同中書門下平章事判户部璨續題子敬帖後越觀歐栁筆法全出此書也又載子敬初為謝安長史太元中起太極殿安欲使獻之題榜以為萬代之寶而難之乃說韋仲將題凌雲臺之事獻之知其㫖乃正色曰仲將魏之大臣寧有此事使其若此知魏德之下衰矣安遂不之逼又李嗣真論書體樂毅論太師針體皆真正有忠臣烈女之像告誓文曹娥碑其容慘悴有孝子順孫之象逍遙篇孤雁賦迹逺趣髙有拔俗抱素之象畫像贊洛神賦姿儀雅麗有矜莊嚴肅之象所謂見義以成字成字以得意非獨研精措理實根於教化矣至治三年七月草五日寓齊録記袁仲長泰定丙寅七月既望龔璛觀於吳中之寓舍於是昻翁之沒五年矣擬之于今此則人琴未遂俱亡者仲長寶之洛神賦嘗屢書之世傳十三行者以其所見入石非可遂以為據也栁誠懸謂人間合有數本則固不止是豈他本誠懸亦未之見耶此松雪老人所書全篇雖自用其體然應規合矩抑可謂善學大令者歟今人觸目贋本一見便疑其非不知其中固有不可以僞為者矣非仲長蓋未足以語此東陽栁貫識余家所藏舊刻洛神賦纍朝名人題識于後者今附録於此普通三年正月徐僧權湯法象滿騫姚察丁道矜唐懷充中書侍郎禮部尚書平章事集賢殿大學士崔所天嘉二年十月草三日中書舍人朱异姚懷珍開元十八年三月草七日參軍事學士諸葛頴釋智果咨議參軍開府學士栁碩言均宋丙子嵗正月十六日至正二十五年乙巳四月十二日袁泰記仲長趙公用意楷法窮極精密故其出而為行草縱橫曲折無不妙契古人不善學者下筆輒務為傾側之勢而未嘗窺其用意處是以愈工而愈不及也此賦筆法尤森嚴學書家宜守為律令仲長尚寶藏之泰定元年六月八日金華黃溍書子建之賦洛神麗矣然其於則逺焉子敬喜書之而子固亦喜書之豈其才情氣習有所相類者歟十三行真蹟不可復見一刻本翩翩逸氣猶能動人此全文固書中之佳者然細觀之殆少耎焉若以越中韻士與河朔少年馳逐耳知書法者當能辨之天全翁為石田髙尚書又書洛神賦卷魏國趙文敏公書此洛神賦當是大德之時後之學書者能闖其藩籬者蓋亦鮮矣况堂奧哉君羽其寶之後學危素燕城清净軒題又晚年書洛神賦公藏大令真蹟凡九行嘗為余手臨之于松雪齊此卷典刑具在居石刻之右句曲外史張天雨觀至順四年閏三月十九日𤣥文館記蔡襄云王子敬愛寫洛神賦故世多傳十三行而已余見陸子順所藏者其筆意峭拔陸得於文敏公且謂文敏晚年楷法之進蓋得此故也或者又謂陸藏十三行其法往往類歐搨今較文敏所藏書此賦誠中年臨本不同賦後所題年月當為公最後之筆故其法度如此元統二年六月考亭陳方題子貞當年子敬洛神賦歐褚臨摹不知數世人惟重十三行真贋難分爭抵牾趙公書法宗二王手寫全篇復前古上追黃庭下樂毅善刻唐臨俱未許殘編斷簡久脫略趙璧隋珠獲全睹宓妃下走天吳奔驪龍騰􅋮老蛟舞人間欲見不易得往往收藏祕天府江南故家多好事一紙寧論百金估臨池墨筆晝飛動貫月虹光夜吞吐願加什襲重珍護却恐雷霆來下取雲門唐珙溫如文敏𨽻楷之妙俊灑飄逸蓋得於洛神為多此卷尤見其波瀾老成蓋捐館前二嵗所書誠可寶也正統八年九月十三日泰和楊士竒志子昻行書歸去來辭趙文敏書歸去來辭南北所見無慮數十本或真或行各極精好淵明有道而隱者也其為文辭皆以發其冲淡幽逸之趣文敏居宦逹中獨能好之其志亦可尚矣方之晋人愛寫洛神賦者不賢乎哉此卷尤妙入神正宜寶之至正十六年嵗在丙申正月草六日藁城倪中書于杭城東橋寓舍外曲江錢惟善檇李鮑恂浚儀趙淑諸詩皆不録趙書勉學賦并序古人學才學藝而極於逹道今人學道之名返流入于才藝豈道無蹊徑可入耶由生死之念不切耳且學不至于道徒增情妄於理何益哉余故作此賦以勉其所謂學云辭曰三界虛廓惟念自縛念去覺存未離有作真净體中不容他著大地火聚如何凑泊雖靈鑒之可憑信此宗而無諾見欲逃于所常理必資乎參學生死事大一意包萬劫之輪回迷悟報深百界隱三千之酬酢所云學者不學六藝不學羣書孜孜矻矻惟道是需求願樂之半偈舍所重之全軀思香花以表其誠敬皈心而罔及形粗或五熱炙心而投火於必死之隙或半腰積雪而創臂於忘生之區臨寢食而終不暇顧對寒暑而安有其餘或降已為童奴或捨身為牀座或半夜腰石而負舂或七箇蒲團之坐破或視利飬如遊塵或棄功名如涕唾或千魔萬難益勵之以精勤或積世多生頓相忘于怠惰或驚幻影之忽遷或嘆隙隂之易過或形影相弔於空閒寂寞之廷而不見其㷀孤或身世相忘於苦樂順逆之場而不知其福禍如浮山典葉縣之厨演祖司白雲之磨楊政總院事而十載奔馳神照問經王而三周折挫蓋忘情於道注念於學而不暇擇利害較優劣者也原夫道為舟航道為梯級道為家舍道為飲食匪舟航無以越生死之迅流匪梯磴無以構涅槃之髙績微家舍何以收漂流暴露之狂蹤微飲食何以濟饑餒孤虛之陋迹覿面不委噬臍何及法無正像未三時之等差人何上中下三報之端的惟知進道之弗荒不擬真切之自積古有跛鱉千里之喻正法末世之談蓋表其自强不息者也偉矣哉學有多轍悟非一岐子韶聞月下之蛙圎悟聼日中之雞溈嶠撥火洞山渡溪見桃花而更不疑擊琅玕而忘所知德嶠遇紙燭之滅㑹通逄布毛之吹至若聞畫角洗鉢盂細抹將來從遮裏入是以望影而脫聖凡之羈鎖迎創而具齧鏇之𤣥機人徒見其悟之不難而不知其學之必到苟學力之不精何悟由之深造道離愛憎其學之之心對順逆肯存于懷抱道非取舍其學之之心遇佛魔必空其閫奧道體等平其學之之心苟動一意即資其顛倒道或具足其學之之心苟任馳求轉增其紛閙道非見聞其學之之心擬涉解㑹而以名自暴道非有無其學之之心苟滯一隅而誠難取效道如倚天長劍其學之之心不能覿體混融則不免為是非之所籠罩道如杲日道如太虛道如風輪道如火聚其學之之心或不具如是之天姿縱使讀四庫書禮五千藏吐懸河㵼瓶之詞章徒爾資其叶噪惟道一學最妙最𤣥既無義路亦匪言傳昧之則一門異轍了之則萬里同鄽佛祖為一大事而指鹿為馬學人走遍天下而掘地尋天絶思惟處强生節目無義味話特地加鞭逼生蛇化活龍粥飯氣髙揮大抹轉山河歸自己小兒戲羣號聚喧據七尺單守三條椽如遇怨敵如取頂巔學之之力既極悟之之理不偏理必學而至悟豫於是作而為賦今人徒見前輩悟在頃刻而不思古人於未悟之先其學之心未嘗不専精而謹懼其學之之心或不至道之洞府曰藝曰才豈吾徒之當慕嗟師道之既微驚法嵗之云暮惟學道之為學與百家而異路毛髮忽若當情針壁那容進步絶學之學以為學以非悟之悟而為悟不涉功勳豈客回互死偷一于象數未形之初具正眼于眹兆不彰之戶一語臨機萬靈莫措臨濟漫拖雷轟霆震之喝雲門空成石裂崖崩之句曰向上之不傳總羣機之共赴鞫其所以自來必𤣥學而為度或不勉勵其學力未有無因而自遇大哉能人為學之端視勤苦而無畏對寢食而等觀駕一乘而勇鋭憫三月而悲酸垂從範而塵沙不廣闡大猷而虛空靡寬由是四十九年弓折箭盡二三四七唇亡齒寒性天滅後學海枯乾古者謂不學佛法惟務體心蓋體心乃佛法之至學也又謂於己無事切勿妄求蓋無求亦佛法之至學也又謂學道之門别無竒特只要洗滌根塵下無量刻來業識種子蓋净根塵業識乃佛法之至學也又謂參禪一著要敵生死不是說了便休蓋精勤勇猛久逺不退亦佛法之至學也又謂參禪學非等閒宜廢寢以忘飱蓋廢寢忘飱於學之之頃曽不期然而然也又謂佛法可學無禪道可得無涅槃可證乃至無無亦無與無俱遣亦不外吾學之之理也或謂道本具足安用學為本具猶璞石之含玉安能免參學之斧鑿本具猶腴田之産禾安能免參學之鋤犁本具猶地中之水脉安能免參學之穿溝本具猶古鏡之藏光安能免參學之磨治本具猶木中之火焰安能免參學之鐄擊本具猶良醫之治病安能免參學之搗篩本具猶驪頷之夜光安能免參學之探索本具猶扇中之風性安能免參學之握揮本具猶貧士懷中之至寶匪參學之指導雖終身而罔知本具猶麥為麵體黍乃飯基苟不加參學之炊磨任萬劫以難齊一旦力邁先賢功侔古聖脫參學之幻因提本來之正令挫有作之鋒鋩擲無為之欛柄不加毫力掃生死魔於見知之稠林靡仗寸金斬涅槃將於證臨之深穽斥臨濟金剛王使之無地措躬驅德山木上座俾其望風乞命或智眼之不明豈當情之能競今之學者惟以本具之說相牽而不思實學真參即究竟原夫釋迦不天生逹磨非自證總由積學之真致此光明之盛者也審如是則學乎乃破生死斷煩惱證菩提出三界興保社起藂林之不可不由之徑也可不勉乎可不勉乎中峯大和尚所作勉學賦言言皆實乃學人喫緊用力下工夫之法門也豈止於老婆心切而已學於此玩誦而有得焉於無奈處豁然開悟則此賦亦為暗室之燭薪迷途之鄉導矣因以中上人見示於是疾書一過至治元年二月草二日弟子吳興趙孟俯記豫舊藏趙魏公雪賦中有破損十餘字余昔在京邸為弟持去不復返也今觀此勉學賦筆法尤精紙墨完好此非易得之物敬題于紙尾安所雅文請善珍之夢萱卞士華右趙松雪書中峯勉學賦真跡松雪生平深得意於中峯之道余家所刻停雲帖中松雪手札一十三紙與中峯者言言皆有道味故嘗書此賦謂暗室之燭薪迷途之鄉導此卷豫曩見在白下徐碧泉處先待詔欲假刻石最後為一豎子謀去殊為夢想今得復覽慨恱不勝敬識數語昔胡仲汲謂松雪之書上下三百年縱橫一萬里不虛耳隆慶丁卯春三月朔日文嘉趙承㫖書光福重建塔記真蹟卷塔者西域聖人之靈廟衆生滅罪致福之具也自阿育王建初後代震旦之來表剎興盛者莫盛於蕭梁之世焉光福塔者實梁大同權輿唐㑹昌暴殄復興咸通至趙宋宋至今朝大德中住山磻師時畢方鳥棲其巔以致鐵石瓦甓墮哉有不可葺者住持相師謨畫鼎創真人周靜翁仙宗而尚佛來自雙鳯作檀越主率寺鄰富而信者幼成徐公沙門願而幹者成徹德三公暨寺職班員㳙吉命匠篾棲鸞竹索以為綯材化羊杉縛以為架撤頂至踵革古從新即舊基越舊制别絫層級級至五半徐公脫屣索訶相師遷喬梵行施心願力惟靜翁不移走書告曰山中住持聞有更易倘林屋清師補處則塔緣幸甚香火幸甚既而疏來洞庭孤雲乃起一葦未杭翁已羽化嗚呼元度乎重來乎三嘆終至至末席溫或謂塔緣幸歟不幸歟余曰佛三祗百劫修六度萬行以戒定慧力成舍利益衆生者塔之謂也由塔即廟廟即貌貌佛聖德令衆歸命行檀波羅而得福田今嗇一緣將普萬化是符佛本願益衆生歟果元度之類歟子知其然而不知其所以然歟於是越明年具梵禮迎銅像出化東行首翁之兒婦魏氏母子承禎同調無改大父之道樂助而之任洋沙頭太倉蘇臺蓂見四新稇載而返尋不請之檀朱公閲工施財施藝特銀其相輪之頂復有刺血為墨書妙經者二渡長江入長淮募逺者三大槩草餘同袍輔勢忘倦宣勞聚諸材鳩諸工一舉而完七級自尖以還飾蓋至四嵗暮收工明年像復出西募春行夏歸秋作餘層列屋皆其落成輝輝乎摩尼圎明沓沓乎露盤屓贔碧瓦鱗集畫檐翬飛布䦨楯而寶鈴和鳴鎮山川而人天瞻仰具功德一十五種消罪業八萬四千不夜常光免責備於香火實一不幸而衆幸且甚也遂書延祐改元二月十日之建始來年五月望日之畢功系以辭曰阿闍世藏設利羅阿育得之出恆河八萬四千起塔婆後世則之廣興建四方玲瓏或八面蕭梁以前世未見我此靈廟實大同起伏二次三鳩工延祐以來又六冬清寧仙人德相佛福緣慈緣普澤物白花巖頭橛屼屼清也薄有銅像緣兩募一舉功其圎盡未來際民福田常光歷劫射牛斗羌椅椅兮淑吾後哿矣富人夀長久至治元年二月望日建皇帝陛下千萬夀佛慧雄辨大師本寺住持沙門了清撰前翰林學士承㫖榮祿大夫知制誥兼修國史趙孟俯書并篆題右記為松雪翁真跡無疑蓋亦是晚年得意之筆故其筆藴風神愈見精絶出塵云子昻碑板絶似李泰和余所見無慮二十本此卷筆意虛和尤可寶也董其昌書題於墨花閣薦福興福二碑俱集右軍書而有神㑹天成之趣非拘拘刻畫求肖者逺勝懷仁聖教以懷仁嗜竒偏于王跡中擇其峭刻頓挫者聨貫以布之雖于鈎掣映帶極意求其血脉而平和淡宕之致不存矣以故二碑乃千載碑書之模楷下是而歐顔栁褚非拘即縱若太和益放矣松雪翁此書正用薦福遒緊之筆視他本倣太和者大不類也玉冰親翁倍宜珍襲云崇禎元年春三月古秀李日華題先荆翁習舉業時即得趙書光福碑記置墨牀筆格間時一展玩也己未春董太史過余舍因觀此卷著數語後李璽卿見之以𤣥宰衡鍳未確為題云趙松雪書光福重建塔銘結搆用薦福興福二碑稍鬆活耳觀者以為倣李太和則失之矣未幾余重罹不憫君實太翁同珂雪親家來奠欵齊頭復見是卷喟然疏前之未盡焉乃余竟為殯事所需鬻諸藏玩并去趙跡至今猶悵先澤之不存也第卷留汪氏印記為可驗他年子孫或有購之者未知得合浦珠還否時值崇禎癸酉秋余獲文敏公玩花美人圖有嵗月不我與之嘆因識所録碑記後云禾興汪砢玉趙魏公楷書湖州妙嚴寺碑記在宋楮紙上橫卷公自篆卷首前朝奉大夫大理少卿牟巘撰中順大夫揚州路泰州尹兼勸農事趙孟俯書并篆額德清慈相寺鐘樓下十王牌位皆公手書精楷右湖州妙嚴寺記一通蓋趙文敏書端雅而有雄逸之氣在其意欲託之金石故不草草湖州公桑梓之鄉豈昔寺僧與公善而得之然得此自不凡矣靈芝主僧雨菴得而藏焉又乞豫書數語亦豈凡僧也耶惜豫語不能超凡有愧于公之書耳成化戊子十月七日永寧一客公綬朱文自有丹丘白文松雪記妙嚴寺中有云妙嚴乃佛心所見之事相也觀此書端妙嚴重知為松雪心中所見之事相焉又云幻十八開士於殿中金碧眩耀以此文此字勒堅珉樹諸殿中其光彩與開士爭光不直眩耀一時而已靈芝瞻上人得其真蹟可不寶之乎張震跋趙公書寺記子昔跋之兹來雨菴又有請焉請之意蓋欲豫志今昔嵗月昔為成化戊子十月七日豫歸自永寧今為辛卯十月八日來自丹邱一俯仰間四見寒暑念人生聚㑹幾何良可嘆息公書已不待贊子又未識幸一再閲是月十有二日燈下公綬書于芝園深處嘉禾姚氏丹丘子棲棲倦遊客芝園深處余宿之屢矣茲來為成化甲午中秋雨菴將移住上天竺竺國山前復肯著余行跡也耶雨菴索余送住上竺詩余歸速弗克就因出是卧軸請再志嵗月日詩則俟豫補書别紙也公綬趙公書法晋人所以妙絶千古余謬贊公書屢矣前此筆路猶未入公格範不意老年又復私淑公之書法固不待贊贊之者無間于往古來今無間于簮紱韋布則公之書得之于心應之于手通之天下使右軍復生亦必嘆賞蘭亭裹鮓墓田等帖料容其一著腳也雨菴以余言為何如壬寅孟夏五日逸史姚綬記趙松雪書中峯懷净土詩後系讃讃云净土偈者中峯和尚之所作也偈凡一百八首按數珠之一周也憫羣生之迷途道佛境之極樂或驅而納之或誘而進之及其至焉一也弟子趙孟俯欲重宣此義而說偈三千大千世界中恆沙河數諸衆生一一衆生一一佛一一唯心一净土而諸衆生無始來因癡有欲生愛渴根塵染纒不自覺流轉生死墮惡趣我師中峯大和尚慈悲憐憫諸衆生勤勤為作百八偈普告恆沙諸有情如身受病等痛切若人依師所教誨一念念彼阿彌陀一念已復無已念自然往生安養國阿彌陀佛為接引徑坐金色蓮花臺池中蓮花如車輪微風吹香遍法界頻伽並命及鸚鵡白鶴孔雀播妙音黃金界道七寶臺燕坐受茲勝妙樂諸惡苦趣咸無有悉皆我師之所度實無衆生師度者惟衆生心净土故是故我今稽首禮重讃我師之𢎞願延祐三年嵗在丙辰六月草四日大都咸宜坊寓舍書趙書春寒詩卷仲春尚寒氣林花無艷姿弊裘擁衰疾風雨何凄其始雷發東隅霽牖陽光披微風草際動落英池面移幽禽變圓吭遊魚揚四鬐我病自此愈泛舟溪水湄小輿指南蓋短笻步東毗機心不復有髙蹈農與羲笠澤茫茫鴈影微玉峯髙下護雲衣長橋寂寞春寒夜祗有詩人一舸歸子昻二月十九日珊瑚網卷八
