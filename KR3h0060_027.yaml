body:
  text: 珊瑚網卷二十七明汪砢玉撰名畫題跋三宋徽宗雪江歸棹圖臣伏觀御製雪江歸棹水逺無波天長一色羣山皎潔行客蕭條鼓棹中流片帆天際雪江歸棹之意盡矣天地四時之氣不同萬物生天地間隨氣所運炎涼晦明生息榮枯飛走蠢動變化無方莫之能窮皇帝陛下以丹青妙筆備四時之景色究萬物之情態於四圖之內蓋神智與造化等也大觀庚寅季春朔太師楚國公致仕臣京謹記宣和主人花鳥鴈行黃易不以山水人物名世而此圖遂超丹青蹊徑直闖右丞堂奧下亦不讓郭河中宋復古其同雲逺水下上一色小艇戴白出沒于淡煙平靄間若輕鷗數點水窮驟得積玉之島古樹槎蘖皆少室三花快哉觀也度宸遊之迹不能過黃河艮嶽一舍許何所得此景豈祕閣萬軸一展玩間即曉本來面目耶後有蔡楚公元長跋雖沓拖不成文而行筆極楚楚與余所藏題聽阮圖同結搆一時君臣于翰墨中作俊事乃爾令人思藝祖韓王椎朴狀琅琊王世貞題據蔡楚公題有四圖此當是最後景耳題之十又六年而帝以雪時避狄幸江南雖黃麾紫仗斐舋于璚浪瑤島中而白羽旁午更有羡于一披蓑之漁翁而不可得又二年而北竄五國大雪沒駝足縮身穹廬與飱氊子卿伍吾嘗記其度黃河一小詞有云孟婆孟婆你做箇方便吹箇船兒倒轉於戲風景殺且盡矣視雪江歸棹中王子猷何啻天壤不覺三嘆世貞又題朱太保絶重此卷以古錦為標羊脂玉為籖兩魚膽青為軸宋刻絲龍衮為引首延吳人湯翰裝潢太保亡後諸古物多散失余往宦京師客有持此來售者遂鬻裝購得之未幾江陵張相盡收朱氏物索此卷甚急客有為余危者余以尤物賈罪殊自愧米顛之癖顧業已有之持贈貴人士節所係有死不能遂持歸不數載江陵相敗法書名畫聞多付祝融而此卷幸保全余所乃知物之成敗故自有數也宋君相流玩技藝已盡余兄跋中乃太保江陵復抱桑滄之感而余亦幾罹其釁乃為記顛末示警懼令吾子孫毋復蹈而翁轍也吳郡王世懋敬美甫識宣和主人寫生花鳥時出殿上捉刀雖著瘦金小璽真􅎓相錯十不一真至于山水唯見此卷觀其行筆布置所謂雲峰石色迥出天機筆意縱橫參乎造化者是右丞本色宋時安得其匹也余妄意當時天府收貯維畫尚夥或徽廟借名而楚公曲筆君臣間自相倡和而翰墨場一段簸弄未可知耳王元美兄弟藏為世寶雖權相迹之不得季白得之若遇溪上吳氏出右丞雪霽長卷相質便知余言不謬二卷足稱雌雄雙劍瑞生莫嗔妬否戊午夏五董其昌題畫長五尺在絹上橫卷瘦金題首雪江歸棹圖上用雙龍小方璽半邊字若今之挂號然卷後有宣和殿製四字作瘦金體上用御書瓢印下有御押天下一人字其王司冦二跋已刻弇州續稿中又董跋吳瑞生所有王右丞江山雪霽卷後竟歸程季白季白與余善故獲覩其珍祕玉水記宋徽廟模衛協髙士圖瘦金書題簽著色極沈著可愛晉衛協所作世人莫能及故模寫其本然行筆用意不可得其萬一數百年間未有繼者伏蒙宣示聖作妙筆神智出於自然不見施為之迹協豈足尚哉臣京謹題徽廟畫卷真迹皆命蔡京跋於卷末余所見非一二若雪江歸棹圖其一也蔡書米海嶽謂為得意筆未可贋作此卷真迹無疑董其昌題道君集古今名畫一千五百件列為四門題曰宣和睿覽喜寫山水花鳥不謂嫻於人物至此模畫追法晉唐即此時五嶽觀諸博士寶籙宫授題應制者皆不能其纎毫倣佛如臨衛協此卷是也乙亥五月得觀於頑仙廬眉道人陳繼儒題宋徽廟摹唐人明皇訓子圖唐人所畫訓子明皇圖喜其畫法工巧神采奕燁當時九熊過庭之意描寫殆盡機暇倣佛成卷求之驪黃牝牡之外可也宣和殿製宣和帝手摹唐明皇訓子圖設色不甚深而人物古雅筆意精巧圖中隱几而坐者天顔肅穆目力注視奕奕有生氣童子媚好靜秀展卷畏篤一武將拱立豐下而謹若不敢肆者然可想其搴旗殺將之力餘一侍僮二介士皆各得其意風神態度可與顧陸爭衡真英筆也後跋亦出手書所謂瘦金體天骨遒美逸趣藹然細玩之信不在李重光下誠足珍矣元貞四年八月既望吳興趙孟俯書至正壬辰青溪野史邵亨貞寶藏鄭元祐敬觀宋徽宗著色山水思陵題籖泯滅不知圖名畫以人物花竹鳥獸禽蟲為神妙宫室臺榭園池器用為精巧獨山水清雄竒富變態無窮為難九重之筆渾然天成粲然日新已離畫工之度數而得詩人之清麗也紹興九年五月二日襄陽米友仁書嘗見雪江歸棹長卷暨此圖皆大設色倣佛唐人其鋪敘經營超軼畫家矩度要非畫流窺其堂奧也惜皆破如魚鱗神彩猶在嘆賞彌日前有謝常一詩長不及録宋徽宗竹禽卷絹素重著色雙釣竹二鳥集其上道君聰明天縱其於繪事尤極神妙動植之物無不曲盡其性殆若天地生成非人力所能及此卷不用描墨粉彩自然宜為世寶然蕞爾小禽蒙聖人所録抑何幸耶孟俯恭跋玉几橫箋寫小禽珍藏世永價千金要知微物霑光渥披卷深詳孟俯吟西淮武夫黃中徽宗萬幾之暇雅好書畫興學校藝如取士法丹青卷軸真天縱之妙有晉唐逸韻尤善墨花叢密處微露白道自家成趣不復襲古人軌轍極注思花鳥點睛每用墨黑漆隱然豆許髙出縑素間幾欲飛動畫中押字天水及宣和政和小璽或用瓢印蟲魚篆文汴也重購得此竹禽圖轉玩不忍釋手為其有生氣惜乎不喻致中和參兩化育惟以微技遊戲卒歸北狩哀哉後之覽者亦將有感于斯明墨林山人項元汴謹題宋道君著色鸂鶒卷在絹素上前有御筆二字又天下一人押鸂鶒灘頭狎浪隨君王縑墨慣娛嬉凄涼晚歲鴛鴦濼漠雁沙鴻未必知前集賢待制馮子振奉皇姊大長公主命題宣和雙鵲圖在紙上宋帝水墨雙鵲棲山查枝上極生動之趣余向見項又新家後歸吳友叔符舉以易無塵墨余因得之竟為竹懶翁所有乃宣和初何文縝為中書舍人帝以御畫雙鵲賜之蒼時為校書郎賦詩二章曰君王妙畫出神機弱羽爭巢並占時想見春風鳷鵲觀一雙飛上萬年枝又舍人簮筆上蓬山輦路春風從駕還天上飛來兩烏鵲為傳喜色到人間玉水識宣和雙蟹圖在絹上講餘機暇諫書空艮嶽江湖入眼中郭索能令天一笑畫圖何必面春風己未前史臣劉辰翁須溪氏白文印遊罷神霄樂意濃香飄小殿菊花風揮毫想見留情處只恐雙螯畫未工武林瞿祐瞿氏宗吉白文印道君善畫花烏尤善昆蟲此圖寫蟹腹背兩面飄逸若神固不徒形肖已也劉須翁題亦佳卷內裝潢尚是宋手曾入晉藩邸印識可驗足珍已項篤夀識畫絹素工淺色水草小橫卷首押冉字用御書瓢印鈐縫政和御璽前有晉國奎章朱文大方印後有晉府圖書朱文大印為吾禾項憲副少溪所藏後歸其姪孫公定丙寅秋曾留余處時與公定把盞持螯豫因談徽宗即南唐李煜神祖幸祕書省閲江南李主圖見其人物儼雅再三嘆訝繼而端邸生所以文采風流過李主十倍及北狩女直用江南後主見藝祖時典故坐中沈姬憮然曰兩主有如此才而不能橫行海內反不若無腸公子矣遂引滿大嚼千頃生識于東雅堂宋徽宗題宗室士雷湘鄉小景趙士雷官至襄州觀察使此圖為宣和祕府所藏之一也卷髙一尺八寸長八尺有竒畫法二李汀沙樹石金碧映帶鵁鶄鸂鶒計十二種回塘曲渚各臻其妙真佳品也墨林山人東坡題王晉卿畫兩峯蒼蒼暗石壁中有百道飛來泉人間何處有此景便欲往買二頃田壬戌春正十三日雨霰雜冰子為程友季白所招時李九疑翁暨長公珂雪徐君潤鄉在坐出書畫鑒賞首展一卷即王晉卿煙江疊嶂是當年吳功甫故物今一再見如鴟夷子皮重挹夷光膚采也玉水記朱迪功雪景宣和待詔朱迪功一時畫雪推精工筆蹤逺法王摩詰更説盤車妙無敵此圖似寫窮途客僕馬蕭蕭有羈色凍雲壓巖巖欲沈喬林封玉寒森森山根滅沒徑路絶客子欲行愁雪深雪深雲寒不可渡景色蒼茫野隂暮誰歟擁蓋獨臨淵豈是行吟覓新句古來繪事不易言正在位置經營間朱君此畫妙有骨一笑千金豈論直徵明楊補之墨梅絹上短橫卷繁華漸覺枝頭少冷蝶寒蜂盡不來寄語春風莫相妬明年還我最先開吕肅花滿南枝雪後繁暗香疏影水邊村幾年不見春風面此日看圖憶故園廬陵曾棨江國沙漫漫獨月夜將午有懷天一方悵罔益修阻一杯羅浮春宛見中林舞珠佩委不收厯厯紛可數薄暮浮雲馳滅沒見湘浦東風渺無頃暗入商賢俎陳明之攜此卷來將有所需余測其雅情於隱遂為賦此短句云圭字文敬號半江居士逃禪老人畫梅一幀在絹素上艷愛江南楊補之每將尺素寫冰姿暗香疏影渾如舊遮莫髙樓玉笛吹老梅誰寫小江南太極心含個個香淡月半籠清絶處恍疑仙子謫塵凡王汝玉梅花得意先羣芳雪後追尋笑我忙折取一枝懸竹杖歸來隨路有清香都穆春色到家園樹樹梅如雪怪底暗香清浮動黃昏月袁尊尼湯叔雅霜入千林圖此卷前梅後蘭為皇甫氏物昔王允道送水仙五十枝與山谷先生欣然作咏凌波仙子生塵襪之句至今膾炙人口余欲水墨畫五十枝俱梅號曰霜入千林圖凡落筆趣向疏淡稠疊纎悉去處癖於七載而就所謂能事不受相促迫是也他日此軸流傳名世之家為余愛惜之嘉泰改元歲在辛酉季夏上休日江右湯正仲叔雅書于丹丘寓舍云湯正仲字叔雅江右人楊補之甥寫梅法補之後居黃巖號間菴楷書遒徑學禇河南而加老有女嫁趙希泉寫梅竹每以父間菴圖書識其上周曾秋塘圖卷有北燕張氏家藏圖書瑤暉堂印秋秋瀟灑清幽人靜處水邊頭波細紋紋風色颼颼鷗鷺情相狎鳬鴛樂自由疏葦敗荷池沼白蘋紅蓼汀洲幾竿漁釣去已盡一段晚雲寒不收右一字至七字觀周曾秋塘圖有作琅琊聖與傍水芙蓉照晚粧溪禽沙鳥滿秋塘枯荷折葦蒹葭外不著黃花噴晚香集賢大學士趙世延敬題芙蓉滿意陂湖秋枯荷折葦林塘幽沙鳬野鴨浮清流霜中鳴鴈寒汀洲黃蘆紅蓼葉尚抽水石懶倦不自由大年小景方綢繆能事更費千金收瀟湘之南買一丘併與夢澤長唱酬前集賢待制馮子振奉皇姊大長公主命題家在東南雲錦鄉心魂元是水花香哦詩想入秋塘境鴛鷺驚飛一夕忙鮫人初息露香機花覆龍梭鳥自飛莫向西湖問煙水夜涼風露濕荷衣至治三年季春草有三日監修國史長史李洞奉皇姊大長公主教拜手稽首敬書慘淡枯荷折葦間芙蓉秋水轉崎灣鳴鴻飛度江南北却羡溪禽滿意間集賢直學士鄧文原敬題泛泛澄波緑滿池橫塘風景四時宜鴛鴦鸂鶒貪嬉戲春去秋來總不知集賢大學士王約謹題禽鳥雖非性稟全知幾猶得氣之先鴈鴻有信攙霜去鷗鷺無心狎我眠集賢學士中奉大夫致仕魏必復題荷枯葦折淡秋塘岸側芙蓉鏡裏粧水宿雲飛禽共樂不須别處覔瀟湘中書平章政事張圭敬題蘆荻蕭蕭秋水清拒霜迎日鬬紅英鵁鶄屬玉休驚訝歲晚江天得共行翰林直學士袁桷敬題水禽容與滿晴溪折葦枯荷淡夕暉安得扁舟江上去煙波相對兩忘機翰林侍讀學士李源道敬題兩兩幽禽渺渺陂蒹葭荷葉淡相依只愁夜半秋聲起滿耳西風吹夢歸御史中丞王毅敬題沙鳥飛鳴晚未休棹歌聲在白蘋洲題詩每恨無佳句欲翦橫塘一片秋翰林直學士曹元用敬題興入林塘翠未收錦鴛雪雁自沈浮欹蘆折葦荷香減寫作西湖暮雨秋趙巖枯荷容與淡相依蘆荻花香拂釣磯一段秋光成霽景向人鷗鷺自忘機翰林國史院編修官杜禧敬題繪鑑云周曾不知何許人與馬賁同時差髙於賁尤長山水而賁為宣和待詔畫人物花鳥山水二小景趙大年秋塘圖絹素精款識大年二字王孫愛寫秋塘景髣佛苕溪秋意圖白鴈青鳬亂沙渚荻花裊裊帶平蕪余少閲宣和畫譜每慕諸名士畫而未獲見恆恐歲久鮮有存者今觀秋塘圖乃宋王孫趙大年之筆也其殘沙斷岸落鴈飛鳬荻花衰草摹寫逼真自有神妙秋塘云乎哉吁畫之若此者能有幾乎世之竒物藏者當寶之黃鶴潭鑒定并詩跋塞雲飛碧天初爽八月江南鴈正過寒雨散羣迷晚渚夕陽分影落晴波苕花秋早香猶淡菰米霜微熟未多髙起聨翩飛不下溪頭矰繳奈渠何練溪大祐溪上風生八月秋苕花如雪滿汀洲數行鴈影橫霄漢萬頃波光浸斗牛野鶴唳殘山月上洞簫吹徹海雲收何如赤壁扁舟夜人事雖殊景物侔會稽張九功苕溪水落秋澄碧煙樹微茫露砂磧一行飛鴈下晴空疑有嚴親繫書帛嚴親白髮白於雪影落苕溪秋一色八月西風落藕花遊子何為尚行役圖中此景知何處太湖湖上煙水暮吳興畫手今已無對此令人重毫素昔曾弭節來湖州苕霅二川看白鷗今日南宫展圖畫令我因之懷舊遊曲江張伯恭一片秋光淡復濃黃蘆獵獵起羣鴻大年小筆天機妙寫入鵝溪咫尺中學古道人趙令穰江干雪霽圖右趙大年摹王右丞江干雪霽圖一卷上有宋緝熙殿寶賈秋壑米南宫趙仲穆私記顧仲瑛俞石澗題蓋思陵御府之物經諸家收藏賞鑒灼然希世之珍也大年本王孫而水墨丹青清森古淡無寶玦珊瑚紈綺豪貴之習可謂蟬蛻汚泥皭然髙映者矣宜其遺賞千秋重若璆琳乎太原王稚登昔人評趙大年畫謂得胸中千卷書更竒古又大年以宗室不得逺遊每朝陵回得胸中邱壑不行萬里船不讀萬卷書欲作畫祖其可得乎此在吾曹勉之無望庸史矣董其昌趙伯駒仙山樓閣圖仙山樓閣固翠水芙蓉境也是圖紅峯碧巒瑤臺瓊島琪樹金花真人飄渺霞際覺精神清潤使人望而知其詳焉非趙千里其誰倣佛與辛亥汪砢玉題是圖余見李氏清樾堂一軸正相似而畫法逺不及蓋臨本也後得伯駒作禹王治水圖為翰林楊榮跋人物長尺許筆路則疏徑矣嘗過項又新出趙千里四大幅金書千里二字時董元宰同閲云此顔秋月筆也觀此益見我家仙山樓臺為伯駒真迹無疑矣卯水汪砢玉重題於墨華閣書畫笥珊瑚網卷二十七
