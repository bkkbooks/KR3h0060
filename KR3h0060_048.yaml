body:
  text: 珊瑚網卷四十八明汪砢玉撰畫繼序自昔賞鑒之家留神繪者多矣著之傳記何止一書獨唐張彥逺總括畫人姓名而第之自軒轅時史皇而下至唐會昌元年而止著為歷代名畫記本朝郭若虛作圖畫見聞志又自會昌元年止神宗皇帝熙寧七年名人藝士亦復編次兩書既出他書為贅矣豫雖生承平時自少歸蜀見故家名勝避難于蜀者十五六古軸舊圖不期而聚而又先所藏殊尤絶異之品散在一門往往得免焚劫猶得披尋故性情所嗜心目所寄出於情深不能移奪每念熙寧而後遊心茲藝者甚衆逮今九十四春秋矣無復好事者為之紀述于是稽之方册益于見聞參諸自得自若虛所止之年逮乾道之三祀上而王侯下而工技凡二百一十九人或在或亡悉數畢見又列所見人家竒迹愛而不能忘者為銘心絶品及凡繪事可傳可載者裒成此書分為十卷目為畫繼若虛雖不加品第而其論氣韻生動以為非師可傳多是軒冕才賢巖穴上士髙雅之情之所寄也人品既已髙矣氣韻不得不髙氣韻既已髙矣生動不得不至不爾雖竭力巧思止同衆工之事雖曰畫而非畫嗟夫自昔妙悟精能取重于世者必凱之探微摩詰道子等輩彼傭工俗𨽻車載斗量何敢望其青雲後塵耶或謂若虛之論為太過吾不信也故今於類特立軒冕巖穴二門以寓微意焉鑒裁明當者須一肯首是年閏旦華國鄧椿公壽序論聖藝徽宗皇帝天縱將聖藝極于神即位未幾因公宰奉清間之宴顧謂之曰朕萬幾餘暇别無他好惟好畫耳故祕府之藏充仞填溢百倍于先朝又取古今名人所畫上自曹弗興下至黃居宷集為一百帙列十四門總一千五百件名之曰宣和睿鑒集蓋前世圖籍未有如是之盛者也於是聖鑒周悉筆墨天成妙體衆形兼備六法獨於翎毛尤為注意多以生漆點睛隱然豆許髙出紙素幾欲活動衆史莫能也政和初嘗寫仙禽之形凡二十題曰筠莊縱鶴圖或戲上林或飲太液翔鳳躍龍之形擎露舞風之態引吭唳天以極其思刷羽清泉以致其潔並立而不爭獨行而不倚間暇之格清迥之姿寓于縑素之上各極其妙而莫有同者焉已而又製竒峰散綺圖意匠天成工奪造化妙外之趣咫尺千里其晴巒疊秀則閬風羣玉也明霞舒綵則天漢銀河也飛觀倚空則仙人樓居也至于祥光瑞氣浮動于縹眇空明之間使覽之者欲跨汗漫登蓬瀛飄飄焉嶢嶢焉若投六合而隘九州也五年三月上已賜宰臣以下燕于瓊林侍從皆預酒半上遣中使持大杯勸飲且以龍翔池鸂􅀈圖并題序宣示羣臣凡預燕者起立環觀無不仰聖文觀奎畫贊歎乎天下之至神至精也其後以太平日久諸福之物可致之祥湊無虛日史不絶書動物則赤烏白鵲天鹿文禽之屬擾于禁籞植物則檜芝珠蓮金柑駢竹瓜花來禽之類連理並蒂不可勝紀乃取其尤異者凡十五種寫之丹青亦目曰宣和睿鑒册復有素馨末利天竺娑羅種種異産究其方域窮其性類賦之于咏歌載之于圖繪為第二册已而玉芝競秀于宫闥甘露宵零于紫篁陽烏丹免鸚鵡雪鷹越裳之雉玉質皎潔鸑鷟之雛金色煥爛六目七星巢蓮之龜盤螭翥鳯萬嵗之石並幹雙葉連理之蕉亦十五物作册第三又凡所得純白禽獸一一寫形作册第四增加不已至纍千册各命輔臣題跋其後實亦冠絶古今之美也宣和四年三月辛酉駕幸祕書省訖事御提舉廳事冉宣三公宰執親王使相從官觀御府圖畫既至上起就書按徙倚觀之左右發篋出御書畫兩軸于是上顧蔡攸分賜從官以下各得御畫兼行書草書一紙又出祖宗御書及宸筆所模名畫如展子虔作北齊文宣幸晉陽等圖靈臺郎奏辰正宰執以下逡巡而退是時既恩許分賜羣臣皆斷佩折巾以爭先帝為之笑此君臣慶會又非特幣帛筐篚之厚也始建五嶽觀大集天下名手應詔者數百人咸使圖之多不稱旨自此之後益興畫學教育衆工如進士科下題取士復立博士考其藝能當是時臣之先祖適在政府薦宗迪猶子子房以當博士之選是時子房筆墨妙出一時咸謂得人所試之題如野水無人渡孤舟盡日橫自第二人以下多繫空舟岸側或拳鷺于舷間或棲鴉于篷背獨魁則不然畫一舟人臥于舟尾橫一孤笛其意以謂非無舟人止無行人耳且以見舟子之甚間也又如亂山藏古寺魁則畫荒山滿幅上出幡竿以見藏意餘人乃露塔尖或鴟吻往往有見殿堂者則無復藏意矣亂後雖有畫院舊史流落于蜀者二三人嘗謂臣言某在院時每旬日蒙恩出御府圖軸兩匣命中貴押送院以示學人仍責軍令狀以防潰墜漬汚故一時作者咸竭盡精力以副上意其後寶籙宫成繪事皆出畫院上時時臨幸少不如意即加漫堊别令命恩雖訓督如此而衆史以人品之限所作多泥繩墨未脫卑凡殊乖聖王教育之意也論逺畫者文之極也故古今之人頗多著意張彥逺所次歷代畫人冠裳大半唐則少陵題詠曲盡形容昌黎作記不移毫髮本朝文忠歐公三蘇父子兩朝兄弟山谷後山宛丘淮海月巖以至漫仕龍眠或評品精髙或揮染超拔然則畫者豈獨藝之云乎難者以為自古文人何止數公有不能且不好者將應之曰其為人也多文雖有不曉畫者寡矣其為人也無文雖有曉畫者寡矣畫之為用大矣盈天地之間者萬物悉皆含毫運思曲盡其態而所以曲盡者止一法耳一者何也曰傳神而已矣世徒知人之有神而不知物之亦有神此若虛深鄙衆工謂雖曰畫而非畫者蓋止能傳其形不能傳其神也故畫法以氣韻生動為第一而若虛獨歸于軒冕巖穴有以哉自昔鑒賞家分品有三曰神曰妙曰能獨唐朱景真撰唐賢畫録三品之外更增逸品其後黃休復作益州名畫記乃以逸為先而神妙能次之景真雖云逸格不拘常法用表賢愚然逸之髙豈得附于三品之末未若休復首推之為當也至徽宗皇帝専尚法度乃以神逸妙能為次豫嘗取唐宋兩朝名臣文集凡圖畫記録考究無遺故于羣公略能察其鑒别獨山谷最為精嚴元章心眼髙妙而立論有過中處少陵東坡兩翁雖注意不専而天機本髙一語之確有不期合而自合者杜云妙絶動宫牆則壁傳人物須動字始能了請公放筆為真幹則千丈之姿于用筆之際非放字亦能不辨至東坡又曲盡其理如始知真放本細微不比狂華生客慧當其下筆風雨快筆所未到氣已吞非前身顧陸安能道此等語耶豫作此録獨推髙雅二門餘則不苦立褒貶蓋見者方可下語而聞者豈容輕議嘗考郭若虛論成都應天孫位景朴天王曰二藝爭鋒一時壯觀傾城士庶看之闐噎豫嘗按圖熟觀其下則知朴務變怪以效位正如杜默之詩學盧同馬異也若虛未嘗入蜀徒因所聞妄意比方豈為歐陽炯之誤耶然有可恕者尚注幸顯之論謂朴不及位逺甚蓋亦以傳為疑也此豫所以少立褒貶郭若虛所載往往遺略如江南之王凝花鳥潤州僧修範湖石道士劉貞白松石梅雀蜀之童祥許中正人物仙佛丘仁慶花王延嗣鬼神皆名筆也俱是熙寧以前人物山水家畫雪景多俗嘗見營丘所作雪圖峯巒林屋皆以淡墨為之而水天空處全用粉填亦一竒也豫每以告畫人不愕然而驚則莞爾而笑足以見後學之下也李營丘多才足學之士也少有大志屢次不第竟無所成故放意于畫其所作寒林多在巖穴中裁劄俱露以興君子之在野也自餘巢植盡生于平地亦以興小人在位其意微矣宇文龍圖季蒙云宣和御府曝書往往預觀李成大小山水無數軸今臣庶之家各自謂其所藏山水為李成吾不信也畫之六法難于兼全獨唐吳道子本朝李伯時始能兼之耳然吳筆豪放不限長壁大軸出竒無窮伯時痛自裁損只於澄心紙上運竒布巧未見其大手筆非不能也蓋實矯之恐其或近衆工之事米元章云伯時病臂三年豫始畫雖似推避伯時然自謂學顧髙古不使一筆入吳生専為古忠賢像其木強之氣亦不容立伯時下矣鳥獸草木之賦狀也其在五方自各不同而觀畫者獨以其方所見論難形似之不同以為或小或大或長或短或豐或瘠互相譏笑以為口舌非善觀者也蜀雖僻遠而畫手獨多于四方李方叔載德隅齋畫而蜀筆居半德麟貴公子也蓄畫至數十函皆留京師所載止襄陽隨軒絶品多已如此蜀學其盛矣哉畫之逸格至孫位極矣後人往往益為狂肆石恪孫太古猶之可也然未免乎粗鄙至貫休雲子輩則又無所忌憚者也意欲髙而未嘗不卑實斯人之徒歟蜀之羅漢雖多最稱盧楞伽其次杜楷丘文播兄弟耳楞伽所作多定本止坐立兩樣至于侍衛供獻花石松竹羽毛之屬悉皆無之不足觀杜丘雖各有此筆意不甚清髙俱愧長沙之武也舊説楊惠之與吳道子同師道子學成惠之恥與齊名轉而為塑皆謂天下第一故中原多惠之塑山水壁郭希見之又出新意遂令圬者不用泥掌止以手搶泥于壁或凹或凸俱所不問乾則以墨隨其形迹暈成峯巒林壑加之樓閣人物之屬宛然天成謂之影壁其後作者甚盛此宋復古張素敗壁之餘意也大抵收藏古畫往往不對或斷縑片紙皆可珍惜而又髙人逹士恥于對者十中八九而俗眼遂以不成器目之夫豈知古畫至今多至五百年少至二三百年那得復有完物斷金碎玉皆可寶也榮楫子雍酷好圖畫務廣藏畜每三伏中曝之各以其類循次開展遍滿其家每一種日日更換旬日始了好事家鮮其比也聞之故老曰承平時有一不肖子質畫一匣于人家凡十餘圖每圖止各有其半或橫或豎當中分剪如維山戴特徐熙芙蓉桃花崔白翎毛無一全者蓋其家兄弟不義之甚凡物皆如是分之不如是則不平也誠可傷歎論近徽宗建龍德宫成命待詔圖畫宫中屏壁皆極一時之選上來幸一無所稱獨顧壺中殿前柱廊栱眼斜枝月季花問畫者為誰實少年新進上喜賜緋褒錫甚寵皆莫測其故近侍嘗請于上上曰月季鮮有能畫者蓋四時朝暮花蘂葉皆不同此作春時日中者無毫釐差故厚賞之宣和殿前植荔枝既結實喜動天顔偶孔雀在其下亟召畫院衆史令圖之各極其思華彩爛然但孔雀欲升藤墩先舉右腳上曰未也衆史愕然莫測後二日冉呼問之不知所對則降旨曰孔雀升髙必先舉左衆史駭服宣和殿御閣有展子虔四載圖最為髙品上每愛玩或終日不捨但恨只有三圖其水行一圖特補遺耳一日中使至洛忽聞洛中故家有之亟告留守求觀既見則愕然曰御閣中正欠此一圖登時進入所謂天生神聖物必有會合時也聞之薛志曰明逹皇后閣初成左廊有劉益所畫百猿後志于右畫百寉對之舉動各無相犯頗稱上旨賞賚十倍也政和間每御畫扇則六宫諸邸競相臨倣一樣或至數百本其間貴近往往有求御寶者先大父在樞府日有旨賜第于龍津橋側先君侍郎作提舉官仍遣中使監修所有畫壁皆院人所作翎毛花竹及家慶圖之類一日先君就視之見背工以舊絹山水揩拭几案取觀乃郭熙筆也問其所自則云不知又問中使乃云此出內藏庫退材所也昔神宗好熙筆一殿専皆熙作上即位後易以古圖退入庫中不止此耳先君云幸奏知若只得此退畫足矣明日有旨盡賜且命輿至第中故第中屋壁無非郭畫誠千載之會也政和間有外宅宗室不記名多蓄珍圖往往王公貴人令其别識於是遂與常賣交通凡有竒迹必用詭計勾至其家即時臨摹易其真者其主莫能别也復以真本厚價易之至有循環三四者故當時號曰便冝三勾處士不記其名在宣和間鑒賞第一眷寵甚厚凡四方所進必令定品欲命以官謝而不為止賜處士之號令待詔畫院畫院界作最工専以新意相尚嘗見一軸甚可愛玩畫一殿廊金碧熀耀朱門半開一宫女半露身於户外以箕貯果皮作棄擲狀如鴨腳荔枝胡桃棐栗榛芡之屬一一可辨各不相因筆墨精微有如此者祖宗舊制凡待詔出身者止有六種如摹勒書丹􅏻背界作種飛白筆描畫欄界是也徽宗雖好畫如此然不欲玩好輒假名器故畫院得官者止依倣舊制以六種之名而命之足以見聖意之所在也本朝舊制凡以藝進者雖服緋紫不得佩魚政宣間獨許書畫院出職人佩魚此異數也又諸待詔每立班則畫院為首書院次之如琴院棋玉百工皆在下又畫院聽諸生習學凡係籍者每有過犯止許罰直其罪重者亦聽奏裁又他局工匠日支錢謂之食錢惟兩局則謂之俸直勘旁支給不以衆工待也睿思殿日命待詔一人能雜畫者宿直以備不測宣喚他局皆無之也圖畫院四方召試者源源而來多有不合而去者蓋一時所尚専以形似苟有自得不免放逸則謂不合法度或無師承故所作止衆工之事不能髙也凡取畫院人不専以筆法往往以人物為先蓋召對不時恐被顧問故劉益以病贅異常雖供御畫而未常得見終身為恨也髙麗松扇如節板狀其土人云非松也乃水栁木之皮故柔膩可愛其紋酷似松柏故謂之松扇東坡謂髙麗白松理直而疏折以為扇如蜀中織棕櫚心蓋水栁也又有用紙而以琴光竹為柄如市井所制摺疊扇者但精緻非中國可及展之廣尺三四合之止兩指許所畫多作士女乘車跨馬踏青拾翠之狀又以金銀屑飾地面及作星漢星月人物粗有形似以其來逺磨擦故也其所染青緑竒甚與中國不同専以空青海緑為之近年所作尤為精巧亦有以絹素為團扇特柄長數尺為異耳山谷題之云會稽內史三韓扇分送黃門畫省中海外人煙來眼界全勝博物注魚蟲蘋汀逰女能騎馬傳道蛾眉畫不如寶扇真成集陳隼史臣今得殺青書倭扇以松板兩指許砌疊亦如折疊扇者其柄以銅黶錢環之黃絲縧甚精妙板工罨畫山川人物松竹花草亦可喜竹山黃王公軒惠恭后家嘗作明州舶官得兩柄西天中印度那闌陀寺僧多畫佛及菩薩羅漢像以西天布為之其佛相好與中國人異眼目稍大口耳俱怪以帶挂右肩裸體坐立而已先施五藏于畫背乃塗五彩于畫面以金或朱紅作地謂皮膠為觸故用桃膠合桞枝水甚堅清中國不得其訣也邵太史知黎州嘗有僧自西天來就公廨令畫釋迦今茶馬司有十六羅漢張彥逺論收藏鑒識購求閲玩夫識書人多識畫自古蓄聚寶玩之家固亦多矣則有收藏而未能鑒識鑒識而不閲玩者閲玩而不能裝禠裝禠而殊亡銓次者此皆好事者之病也貞觀開元之代自古盛時天子神聖而多才士人精博而好藝購求至寶歸之如雲故內府圖書謂之大備或有進獻以獲官爵或有搜訪以獲錫賚又有從來蓄聚之家自號圖書之府蓄聚既多必有佳者妍􅑦渾雜亦在銓量是故非其人雖近代亦朽蠧得其地則逺古亦完全其有晉宋名迹煥然如新者已歷數百年紙素彩色未甚敗何故開元天寶間縱或以散耗良由寶之不得其地也夫金出于山珠産于淵取之不已為天下用圖畫嵗月既久耗散將盡名人藝士不復更生可不惜哉夫人不善寶玩者動見勞辱卷舒失所者撡揉使損不解裝禠者隨手棄捐遂使其迹漸少不亦痛哉非好事者不可妄傳書畫近火燭不可觀書畫向風日正餐飲唾涕不洗手並不可觀書畫昔桓玄愛重圖書每示賔客有非好事者正餐寒具以手捉書畫大點汚玄惋惜移時自後每出法書輒令洗手人家要置一平安牀褥拂拭舒展觀之大卷軸冝造一架觀則懸之凡書畫時時舒卷即免蠧濕豫自弱年鳩集遺失鑒玩裝理晝夜精勤每獲一卷遇一幅必孜孜葺綴竟日寶玩可致者必貨弊衣減糲食妻子僮僕切切嗤笑或曰終身為無益之事竟何補哉既而歎曰若復不為無益之事則安能悅有涯之生是以愛好愈篤近于成癖每清晨閲景竹忩松軒以千乘為輕以一瓢為倦身外之纍且無長物惟書與畫猶未忘情既頽然以忘言又怡然以觀閲常恨不得竊觀御府之名迹以資書畫之廣博又好事家難以假借况少真本書則不得筆法不能結字已墜家聲為終身之痛畫又迹不逮意但以自娛與夫熬熬汲汲名利交戰于胸中不亦猶賢乎昔陶隱居啓梁武帝曰遇固博涉思未能精苦恨無書願作主書令史曉愛楷𨽻又羡典掌之人人生數紀之內識解不能周流天壤區區惟恣五欲實可愧恥每以得為才鬼猶勝頑仙此陶隱居之志也由是書畫皆為精妙况余凡鄙於二道能無癖好哉郭若虛圖畫見聞志云彥逺字愛賔河東人能文字學𨽻書外多喜作八分書其家乃富有典刑而落筆不愧作者著法書要録一十卷歷代名畫記十卷自序其右云得此二書則書畫之事畢矣繡里平陽氏忠魁世裔家藏本米襄陽畫學大抵畫今人眼生者即以古人向上名差配之似者即以正名差配之好事者與賞鑒家為二等賞鑒家謂其篤好遍閲記録又復心得或自能畫故所收皆精品近世人或有資力元非酷好意作標韻至假耳目于人此謂之好事者置錦囊玉軸以為珍祕開之或笑倒余輒撫案大呌曰慙惶殺人無名人畫甚佳今人以無名為有名不可勝數故諺云牛即戴嵩馬即韓幹寉即杜荀象即章得是也今人絶不作故事者由所為之人不考古衣冠皆使人發笑古人皆云某圖是故事也蜀人有晉唐遺風國初以前多作之人物不過一指雖乏氣骨亦秀整林木皆用重色清潤可喜今絶不復見矣唐初畫舉人必鹿皮冠縫掖大袖黃衣短至膝長白裳也蕭翼御史至越見辨才云著黃衣大袖如山東舉子用證未軟裹白襴也李白像鹿皮冠大袖黃袍服亦其制鑒閲佛像故事圖以觀戒為上其次山水有無窮之趣尤以煙雲霧景為佳其次竹木水石其次花草至于士女翎毛貴逰戲閲殊不入清玩家具眼大抵人物牛馬一摸便似山水摹皆不成也山水心自匠得處髙也余少收畫見竒巧皆不録以為不應如是及長官于桂陽陽朔山始知有筆力不能到者向所不録翻恨不巧矣因知范至能所謂平地蒼玉崛起為天下偉觀第一者真非虛語也京西工拙其屏風上山林木竒古坡岸皴如董源乃知人稱江南蓋自顧以來皆一樣隋唐及南唐至巨然不移至今池州謝氏亦作此體坦然明白易辨者顧陸吳周昉人物滕邊徐唐竹花竹翎毛荆李關董范巨然劉道士山水戴牛曺韓馬韋馬亦復難辨蓋相似衆也蘇氏種瓜圖絶畫故事蜀人多作此等畫工甚非閻立本筆立本畫皆著色而細銷銀作月色布地今人收得便謂之李將軍思訓皆非也江南李主多有之以內合同印集賢院印印之蓋收逺物或是珍貴孫知微作星辰多竒異不類人間所傳信異人也然是逸格造次而成平淡而生動雖清拔筆皆不圓學者莫及然自有懷古圓徑之氣畫龍有神氣不俗也楊朏學吳生點睛髭髮有意衣紋差圓尚為孫知微逸格所破武嶽學吳有古意子洞清元作佛像羅漢善戰掣筆作髭髮尤工天人畫壁髮彩生動然絹素畫以粉點眼久皆先落使人惜之南嶽後殿壁天下竒筆傅古龍如蜈蚣董羽龍如魚東丹王胡環蕃馬見七八本雖好然非齋室清玩滕昌右邊鸞徐熙徐崇嗣皆如生黃筌惟蓮差勝雖冨艷皆俗黃筌畫不足收易摹徐熙畫不可摹易元吉徐熙後一人而已善畫草木葉心翎毛如唐徐後無人繼世但以獐猿稱可歎或云畫孝嚴殿壁畫院人妬其能只令畫獐猿竟為人所鴆錦峯白蓮居士又稱種峯隱者皆李崇光畫自題號意鍾山隱居耳每自畫必題曰鍾隱筆上著內殿圖書之印及押用內合同集賢院黑印有此印者是典于文房物也內合同乃其璽唐時皆用內合同為御印至梁髙祖始用御前之印也錢氏以內院倣之封函曰制姓名曰制公某人可某官官上用此印日月用國印李王山水唐希雅黃筌之倫翎毛小筆人收甚衆好事家必五七本不足深論唐希雅作林竹韻清楚但不合多作禽鳥又作疏林間戰筆小竹非善是效其主李重光耳江南周文矩士女面一如昉衣紋作戰筆此蓋布文也惟以此為别昉秀潤勻細董源平淡天真多唐無此品在畢宏上近世神品格髙無與比也峯巒顯晦雲霧出沒不裝巧趣皆得天真嵐色鬱蒼枝幹徑挺咸有生意溪橋漁浦洲渚掩映一片江南也董源峯頭不工絶澗危徑幽壑荒迥多真意巨然師董源今世多有本嵐氣清潤布景得天真多巨然少年時多作礬頭老來平淡趣髙劉道士亦江南人與巨然同師巨然畫則僧在主位劉畫則道士在主位以此為别荆浩善為雲生山頂四面峻厚關同人物俗石本出于畢宏有枝無幹李成師荆浩未見一筆相似師關同則樹相似范寬師荆浩浩自稱洪谷子王詵嘗以二畫相送題勾龍爽畫因重背入水於右邊石上有洪谷子荆浩筆字在合緑色抹石之下後數年丹徒僧房有一軸山水與浩一同而筆乾不圓於瀑水邊題華原范寬乃是少年所作却以常法較之山頂好作密林自此趨枯老水際作突兀大石自此趨硬信荆之弟子也李成淡墨如夢霧中如雲動多巧少真意范寬勢雖雄傑然深暗如暮夜晦暝土石不分物象之幽雅品固在李成上范寬山水嶪嶪如恆岱逺山多正面折落有勢晚年用墨太多土石不分本朝自無人出其右者溪出深虛水若有聲其作雪山全師世所謂王摩詰王瑞學關同人物益入俗道士牛戩筆墨粗豪縱放亦不俗格固在艾宣惠崇寶覺張經之上也禮部侍郎燕穆之司封郎宋迪直龍圖閣劉明復皆師李成復古此二公特細秀作松枝而無向背荆楚細甚秀趙昌王友之流如無才而善佞士初甚可惡終須憐而收録裝堂遮壁亦不棄趙昌王友鐔􅓺輩得之可遮壁無不為少程坦崔白侯封馬賁張自方之流皆能汚壁茶坊酒店可與周越仲翼草書同挂不入吾曺議論得無名古筆差排猶足為尚友江南劉常花氣格清秀有生意在趙昌王友之上江南陳常以飛白筆作樹石有清逸意人物不工折枝花亦以逸筆一抹為之以色亂點花欲奪造化本朝妙工也李甲華亭逸人作逸筆翎毛有意外趣木不佳蘇子嘗作墨竹從地一直起至頂余問何不逐節分曰竹生時何嘗逐節生運思清拔出于文同與可自謂與文拈一瓣香以墨深為面淡為背自與可始也作成林竹甚精子瞻作枯木枝幹虬屈無端石皴硬亦怪怪竒竒無端如其胸中盤鬱也吾自湖州從事過黃州初見公酒酣曰君貼此紙壁上觀音紙也即起作兩枝竹一枯樹一怪石見與後晉卿借去不復還王銑舉李成皴法以金緑為之似古今觀音寶陀山狀作小景亦墨作平地皆李成法也嗣濮王宗漢作蘆鴈有佳思大夫蔣長源作著色山水頂似荆浩松身似李成葉取真松為之如栗鼠尾大有生意石不甚工作凌霄花纒松亦佳作章友直善畫蛇龜以篆筆畫亦有意又能以篆筆畫棋盤筆筆相似其女並能之伯時病右手豫始作畫以李常師吳生終不能去其氣余乃取顧齊古不使一筆入吳生又李筆神彩不髙余為睛目面文骨木自是天性非師而能惟作古忠賢像也知音求者只作橫挂三尺軸惟寶晉齋中懸雙幅咸對長不過三尺標出乃不為椅所蔽又行過肩汗不著凡收畫必先收唐希雅徐熙等雪圖巨然或范寬山水圖齊整相對者裝堂遮壁乃于其上漸漸挂名筆絹素大小相當成對者又漸漸挂無對者蓋古畫大小不齊鋪挂不必端正若晉筆須第二重挂唐筆為襯乃可挂也觀此知昔人好尚今則無須如此古畫至唐初皆生絹至吳生周昉韓幹後來皆以熟湯半熱入粉捶如銀版故作人物精彩入筆今人收唐畫必以絹辨見文粗便云不是唐非也張僧繇閻令畫世所存者皆生絹南唐畫皆粗絹徐熙絹或如布真絹色淡雖百破而色明白精神彩色如新惟佛像多經香煙薰損本色絹素百破必好畫裂紋各有辨長幅橫卷裂紋橫橫幅直卷裂紋直各隨軸勢裂也直斷不當一縷嵗久卷自兩頭蘇開斷不相合不作毛槄亦蘇不可偽作其偽者快刀直過當縷兩斷依舊生作毛起槄文堅紉也濕染者色縷縷間乾薰者煙臭上深下淺古畫若不之脫不須背褾若不佳換褾一次背一次壞屢更矣深可惜蓋人物精神髮彩花之穠艷蜂蝶尺在約略濃淡之間一經背多或失之也檀香辟濕氣畫必用檀軸有益開匣有香而無糊氣又辟蠧也若玉軸以古檀為身檀身重今却取兩片刳中空合柄軸鑿乃輕輕不損畫常卷必用桐杉佳也軸重損絹軸不冝金銀既俗且招盜若桓靈寶不然水晶作畫挂幅必兩頭墜性重蜀青圓分雙鶯錦最俗不可背古畫只背今人裝堂亦俗也蘇木為軸以石灰湯轉色嵗久愈佳又性輕角軸引蟲又開軸多有濕臭氣檀犀同匣共發古香紙素既古自有古香也尋常畫多中損者縳破故也線褊絛濶指半絲細如綿者略略縳之勿用力余家書畫最上品者用姓名字印審定真迹字印神品字印平生真賞印米芾祕篋印寶晉書印米姓翰墨印鑒定法書之印米姓祕玩之印玉印六枚辛卯米芾米芾之印米芾氏印米芾印米芾元章印米芾氏已上六枚白字有此印者皆絶品玉印惟著于書帖其他用米姓清玩之印者皆次也無下品者其他字印有百枚雖參用于上品印也自畫古賢惟用玉印余家晉唐方帖千軸蓋散一百軸矣今維絶精只有十軸有竒書亦續續去矣晉畫必可寶蓋緣數晉物命所居為寶晉齋身到則挂之當世不復有矣書畫不可論價士人難以資取所以通書畫博易自是雅致今人收一物與性命俱大可笑人生適目之事看久即厭時易新玩兩適其欲乃是逹者太平清話畫者六書像形之一故古人金石鍾鼎𨽻篆往往如畫而畫家寫山水寫蘭寫竹寫梅寫葡萄多兼法書正是禪家一合相也畫用焦墨生氣韻書用淡墨生古色此又禪家賔主法也苔石一人樂卿氏組述畫史清裁吳畫曹弗興古稱善畫人物衣紋皴皴畫家謂曹衣出水吳帶當風宣和內府刻意搜訪不過兵符圖一卷余嘗見於錢唐人家上有紹興題印筆意神彩疑是唐末宋初人所為也晉畫衛協晉人也唐名畫記品第在顧凱之上世不多見其迹畫譜所傳髙士圖刺虎余並見之乃唐末五代人所為耳真迹不可見矣顧凱之畫如春蠶吐絲初見甚平易且形似時或有失細視之六法兼備有不可以語言文字形容者曽見初平起石圖夏禹治水圖洛神賦小身天王筆意如春雲浮空流水行地皆出自然傅染人物容貌以濃色微加點綴不求暈飾唐吳道子早年嘗摹凱之畫位置筆意大能仿佛宣和紹興便題作真迹覽者不可不察也謝赫云凱之畫迹不逮意聲過其實近見唐人摹本果得其説六朝畫陸探微與凱之齊名余平生止見文殊降虛真迹部從人物共八十人飛仙四皆各有妙處內亦有畨僧手持髑髏盂者蓋西域俗然此卷行筆緊細無纎毫遺恨望之神彩動人真希世之寶也今藏祕府後維摩像皆不逮之張彥逺謂體運遒舉風力頓挫一點一拂動筆新竒非虛言也展子虔畫山水大抵唐李將軍父子多宗之畫人物描法甚細隨以色暈開余見故實人物山水人馬等圖又見北齊後主幸晉陽宫圖人物面部神彩如生意度具足下為唐畫之祖六朝人畫魯義姑圖一兵士持戈作勇猛之勢義姑作安詳答問之態棄所生子于地作畏懼怖急挽母衣之狀而所抱之子以兩手抱義姑之項回視兵士一一如生筆法細潤傅色鮮明望而知其非唐畫舊藏申屠大用家今歸義興王氏王藏古畫至三百軸此為最也唐畫閻立本畫三清像異國人物職貢圖傳法太上像五星像皆宣和明昌物余並見之及見步輦圖畫上宫人三十餘輿輦皆曲眉豐頥神彩如生一朱衣髯官執笏引班後有贊普使者服小團花衣及一從者贊皇李衛公小篆題其上唐人八分書贊普辭婚事宋髙宗題印完真竒物也王芝子慶家收閻令畫西域圖為畫第一趙集賢子昻題其後云畫惟人物最難器服舉止又古人所特留意者此一一備盡其妙至於髮彩生動有欲語狀蓋虛無之間真神品也吳道子筆法超妙為百代畫聖早年行筆差細中年行筆磊落揮霍如蓴菜條人物有八面生意活動方圓平正髙下曲直折算停分莫不如意其傅采於焦墨䀶中略施微染自然超出縑素世謂之吳裝當時弟子甚多如盧稜伽楊庭光其尤者也五代朱繇亦能倣佛終不甚似覽者當自得之嘗見道子熒惑像烈焰中神像威猛筆意超動使人駭然上有金章宗題印祕在內府又見善人二燈摩利諸天像帝釋像木紋天尊像及行道觀音託塔天王毗沙門神等像行筆甚細恐其弟子輩所為耳王右丞維工人物山水筆意清潤畫羅漢佛像甚佳平生喜作雪景劍閣棧道騾綱曉行捕魚雪渡村墟等圖其畫輞川圖世之最著者也蓋其胸次瀟灑意之所至落筆便與庸史不同周昉善貴遊人物又喜寫真作仕女多穠麗豐肥有冨貴氣李思訓畫著色山水用金碧輝映為一家法其子昭道變父之勢妙又過之故時人號為大李將軍小李將軍至五代蜀人李升工畫著色山水亦呼為小李將軍宋宗室伯駒字千里復倣效之嫵媚無古意余嘗見神女圖明皇御苑出遊圖皆思訓平生合作也又見昭道海岸圖素絹百碎粗存神采觀其筆墨之源皆出展子虔輩也曹霸畫人馬筆墨沉著神采生動余平生凡四見真迹一奚官試馬圖在申屠侍御家一調馬圖在李士𢎞家並宋髙宗題印其一下槽馬圖一黑一騮色圉人背立見鬚眉髣佛甚竒其一余所藏人馬圖紅衣美髯奚官白玉面騂緑衣閹官牽照夜白筆意神采與前三畫同趙集賢子昻嘗題云善畫馬者甚衆而曹韓為之最蓋其命意髙古不求形似所以出衆工之右耳此卷曹筆無疑圉人太僕自有一種氣象非世俗所能知也集賢當代賞識豈欺我哉韋偃畫馬松石更佳世不多見其筆法磊落揮霍振動杜子美詩所謂戲拈禿筆掃驊騮倐見騏驎出東壁者余嘗收紅韉覆背驄馬圖筆力徑健騣尾可數如顔魯公書法往嵗鮮于伯機見之驚歎纍日嘗賦詩曰渥窪産馬如産龍韋偃畫馬如畫松竒文也惜不成章而卒韓幹初師陳閎後師曹霸畫馬得骨肉停勻法遂與曹韋並馳爭先及畫貴遊人物各􅀈其妙至於傅染色入縑素余嘗見其人馬圖在錢唐王氏二奚官引連錢驄燕支驕又見一卷朱衣白帽人騎騮五明馬四蹄破碎如行水中乃李伯時舊藏在京師見明皇舞馬圖三馬圖調馬圖五陵遊俠圖照夜白粉本上有幹自書內供奉韓幹照夜白粉本十字要知唐人畫馬雖多如曹韓特其最者後世李公麟伯時専師之亦可謂優入聖域者也戴嵩専畫牛為韓晉公滉幕客専師法于韓而青出于藍者不惟畫牛至于川原樹石牧子樵童亦各臻妙余凡七見真迹一在揚州司德用家二牛相鬭毛骨竦然一在四明士人家一牛引犢竒甚又見三牛圖渡水牛圖歸牧圖皆合作也古人云牛畜非文房清玩若其筆意清潤開卷古意勃然有田家原野氣象余于嵩有取焉韓晉公滉畫人物及牛圖嘗見其田家移居圖村童蟻戲圖醉客圖鼓腹圖醉學士圖及牛圖數本人物源流顧陸牛圖是其所長戴嵩得其緒餘有名于世是蓋人物不及而牛特過之也陳閎開元中人畫人物得名明皇幸蜀作金橋圖人物閎主之余見其照夜白馬圖筆法細潤在曺韓之下唐人花鳥邊鸞最為馳譽大抵精于設色穠艷如生其他畫者雖多且有得失歷五代而得黃筌資集諸家之善山水師李升隺師薛稷龍水師孫位至于花竹翎毛超出衆史筌之可齊名者惟江南徐熙熙志趣髙尚畫草木蟲魚妙奪造化非世之畫工所可及也熙畫花落筆頗重中略施丹粉生意勃然黃之子居寶居宷熙之孫崇嗣崇矩各得家學熙之下有唐希雅亦佳多作顫筆棘針是效其主李重光書法後有長沙易元吉作花果禽畜尤長於獐猿多遊山林窺猿狖禽鳥之樂圖其天趣若趙昌惟以傅染為工求其骨法氣韻稍劣也又如滕昌祐丘慶餘葛守昌崔白艾宣丁貺之徒皆得其緒餘以成一家要之花鳥一科唐之邊鸞宋之徐黃為古今規式所謂前無古人後無來者是也尉遲隱僧外國人作佛像甚佳用色沉著堆起絹素而不隱指平生凡四見真迹要不在盧稜伽之下楊庭光學吳生行筆甚細而不弱畫佛像多在山林中雜畫一一臻妙裴寬畫小馬宣和所藏一卷余嘗見之作山林間小馬十數蕭散間適筆甚間雅真竒作也張璪松石清潤可愛平生嘗見四本並佳後得山堂琴會圖趙子昻見之欲得不與因題云張璪松人間最少此卷幽深平逺如行山隂道中誠寶繪也翟琰師吳生筆法大不及惟得傅色法嘗見孔雀明皇像甚佳周古言畫在周昉之下文矩之上有夜遊圖傳之于世張萱工仕女人物尤長于嬰兒不在周昉之右平生幾見十許本皆合作畫婦女朱暈耳根以此為别覽者不可不知也王洽潑墨成水煙雲撡淡脫去筆墨畦汀余少年見一幀甚有意度今日思之始知為洽畫冉不可見也湯子升畫人物極妙江南人家有鑄鏡圖真希世之物也盧鴻畫傳世不多余見宋人摹其草堂圖筆意位置清氣襲人真迹可知其妙也范長壽醉道士圖曽成二本皆直軸筆法緊實可愛用色亦佳蜀人畫山水人物皆以孫位為師龍水尤位所長者也世言孫位畫水張南本畫火水火本無情之物二公深得其理嘗見孫位水官圖魚龍出沒于海濤神鬼變滅于雲漢覽之凛凛然真傑作也唐世名畫至多要皆望而知唐人别有一種氣象非宋人所可比也荆浩山水為唐宋之冠關同常師之浩自號洪谷子作山水訣為范寬輩之祖陸晃畫人物極工元章畫史稱其庶人章余常從同里葉氏見之描法甚細而有力又有解厄天官像等數圖皆粗惡可厭蓋晃畫自有二種細者為上五代畫左禮與韓虬同名畫像入妙曽見畫十六身小羅漢坐在巖石中筆意甚工不在韓虬之下關同霧鎖山關圖差嫩是早年真迹在京師人家董源天真爛漫平淡多竒唐無此品在畢宏上此米元章議論唐畫山水至宋始備如元章又在諸公之上樹石幽潤峯巒清勝早年礬頭頗多暮年一洗舊習余以祕府見春龍出蟄圖孔子哭虞丘子春山圖溪岸圖秋山圖及窠石二幀于人間約見二十本皆其平生得意合作源之後有鍾陵僧巨然及劉道士劉與巨然同時畫亦同但劉畫則以道士在左巨然則以僧在左以此為别耳要皆各得源之一體至米氏父子用其遺法别出新意自成一家然則源之正傳者巨然為最也董源山水有二種一樣水墨礬頭畫林野樹逺樹平逺幽深山石作麻皮皴一樣著色皴紋甚少用色穠古人物多用紅青衣人面亦粉素者二種皆佳作也周文矩畫人物宗周昉但多顫掣筆是學其主李重光書法如此至畫仕女則無顫筆李後主命周文矩顧𢎞中圖韓熙載夜宴圖余見周畫二本于京師𢎞中筆與周事迹稍異有史魏王浩題字并紹興印文房清玩亦可謂淫樂之惑耳徐熙畫花果多在澄心紙上至于畫絹絹文稍粗元章謂徐熙絹如布也唐希雅弟忠祚花鳥亦入妙品在易元吉之下若用墨作金針易不能及之也李升畫山水長見之至京師見西嶽降靈圖人物百餘體勢生動有未填面目者是其藁本上有紹興題印無之則唐人藁本也道士牛戩信筆作寒鵲野雉甚佳宣和畫譜載唐李漸畫馬筆和氣調今古無儔及見三馬圖與所聞甚不逮然自有一種氣韻不可以形似求之也支仲元畫神仙人物多作奕棋之勢筆法師顧陸緊細有力人物清潤不俗每見髙宗題作晉六朝髙古名筆者多仲元所作當有知者賞余言唐畫龍圖在東浙錢氏家絹十二幅作一幀其髙下稱是中止畫一龍頭一左臂雲氣騰湧墨痕如臂大筆迹圓徑沉著如印一鱗如二尺盤大不知當時用何筆如此峻利上有吳越錢王大書曰感應祈雨神龍并書事迹舊題作吳道子要之唐人無疑也嘗見紙上畫一人一騎甚佳後題永徽年月日太原王𢎞畫不知𢎞為何人遍考不出信知唐人能畫者固多紀録不能盡也仕女之工在于得其閨閣之態唐周昉張萱五代杜霄周文矩下及蘇漢臣皆得其妙不在施朱傅粉鏤金佩玉於腰帶中目視指爪情意凝貯知其有所思也又見文矩畫髙僧試筆圖在錢唐民家一僧攘臂揮翰旁觀數士人咨嗟嘖嘖之態如聞有聲真竒筆也董源夏山圖見在史崇文家天真爛漫拍塞卷軸不為虛歇烘鎖之意而幽深古潤令人神情爽朗古人行山隂道上應接不暇豈意數尺敗素亦能若是顧德謙蕭翼賺蘭亭圖在冝興嶽氏作老僧自負自藏之意口目可見後有米元暉畢少董諸公跋少董畢良史也跋云此畫能用硃砂石粉而筆力雄健入本朝諸人皆所不能比丘麈柄指掌非盛稱蘭亭之美則力辭以無蕭君袖手營度瑟縮其意必欲得之皆是妙處畫必貴古其説如此又山西童藻跋云對榻僧靳色可掬旁亦復不悅僧物果難取哉唐人畫李百妹産黃庭經圖曽于司德用家見一本萬山中一白衣婦人踞地臨溪洗一本經經之毫光燭天殊不知其意也胡瓌畫畨部人馬用狼毫制筆疏渲騣尾緊細有力至于室廬什物各盡其妙司德用家啖鷹圖真妙品也阮郜畫人物仕女極工且秀美見而愛玩錢唐人家有賢妃盥手圖尤佳絶五代婦人童氏畫六隱圖見於宣和譜今藏山隂王子才監簿家乃畫范蠡至張志和等六人乘舟而隱者山水樹石人物如豆許亦甚可愛黃筌畫枯木信筆塗抹畫竹如斬釘截鐵至京見二幅信天下竒筆也衛賢五代人作界畫可觀余嘗收其盤車水磨圖佳甚又見王子慶驢鳴圖亦佳但樹木古拙皴文不老耳胡翼工畫人物關同畫山水人物非其所長多使翼為之僧貫休畫羅漢髙僧不類世俗貌郭乾暉畫鷹鳥得名于時鍾隱亦有重名自謂不及乃變姓名受傭于郭經年得其筆意求去冉拜陳所以郭憐其誠盡以傳授故與齊名古人之用心如此郭澄畫馬甚俗嘗見人馬圖不過一工人所為殊無古意上有宣和題印又曽見滚塵馬圖後有篆文曰金陵郭澄極妙知是兩手又見馬圖亦俗始悟滚塵馬圖是無名人妄加篆文以取重不知反纍畫也陸瑾江南人畫捕魚圖大抵宗王右丞嫵媚過之又嘗見溪山風雨圖尤佳厲歸真五代人畫牛甚妙嘗見牧牛圖大幅逺山清潤人牛間適後有八分書羽士厲歸真筆舊藏喬仲山家今不知在何處張符畫牛得名于唐曽見渡水牛一卷甚平常在戴嵩之下符自號煙波子曹仲元三官及五方如來像豫曽見之聞江南王氏家有白衣觀音像未見大抵曹師吳生不得其法晚自作細筆畫以自别為一家孫夢卿松石悶禪圖在錢唐人家一松清潤一僧甚間雅一士人作問答尊師禮意筆法精妙稱為孫吳生名不虛得也僧傅古龍體勢勝董羽作水甚不逮僕平生于龍畫最多留心看覽葉公之迹不可復見祕閣曹弗興龍首于傳有之張僧繇吳道子輩所作不傳于世唐畫曽見錢氏所藏十二幅絹素作一首一臂五代傅古龍約看十四五本亦曽收過二三本大抵得蜿蜒升降之態而尤未免于畫法且看馬圖要識神駿龍圖要識變化故畫龍馬最難蓋一主于變化出沒必流于戲墨于畫法甚虧若拘于畫法則又乏變化之意故能畫尤難董羽専門之學亦不拘于形似元章云董羽龍似魚傅古龍似蜈蚣真知言哉常見董源龍數本皆清竒可愛源之長政不在是姑置勿論近世陳容公儲本儒家者流畫龍深得變化之意潑墨成雲噀水成霧醉餘大呌脫巾濡墨信手塗抹然後以筆成之升者降者俯而噓者怒而視者踞而瓜石者相向者相鬭者乘雲躍霧戰沙出水以珠為戲而爭者或全體發見或一臂一首隱約而可名狀者曽不經意而皆得神品豈胸中自有得于天者耶五代袁曦宋徐白善畫魚及觀其迹不過刀几間物耳使人起羮膾之興獨文臣劉家畫山水中風萍水荇觀之活動至于鱗尾性情遊潛回泳皆得其妙平生嘗觀其畫近見落花遊魚圖紅桃一枝飛花數片一赤鯉漾輕波吹落英深得詩人之意僧運能五代人善畫佛像得唐人法有古意宋畫武宗元宋之吳生也畫人物行筆如流水神彩活動嘗見朝元仙仗圖作五方帝君部從服御眉目顧眄一一如生前輩甚稱賞之營丘李成世業儒胸次磊落有大志寓意于山水凡雲煙變滅水石幽間平逺險易之形風雨晦明之態莫不曲盡其妙議者以為古今第一傳世雖多真者極少元章平生只見二本至欲作無李論蓋成平生所畫秪自娛耳既勢不可逼利不可取宜傳于世者不多宣和御府所藏一百五十九卷真偽果能辨耶翟院深臨摹倣佛亂真若論神氣則霄壤也宋復古李公年王詵陳用志皆宗師之得其遺意亦足名一世郭熙其弟子之最著者也范寬名仲立以其豁逹大度人故以寬名之畫山水初師李成既乃歎曰與其師諸人不若師諸造化乃脫舊習遊秦中遍觀竒勝落筆雄偉老硬真得山骨宋三家山畫超絶唐世者董源李成范寬三人而已嘗許之董源得山之神氣李成得山之體貌范寬得山之骨法故三家照耀古今為百代師法寬尤長雪山見之使人凛凛其弟子黃懷玉紀真商訓然黃失之工紀失之似商失之拙各得其一若懷玉刻意臨摹其雪山遇得意處淺意未易斷也郭熙河陽人師李成善得煙雲出沒峯巒隱顯之態嘗論畫山曰春山淡冶而如笑夏山蒼翠而如滴秋山明淨而如伏冬山慘淡而如睡觀其意論可以知其畫矣余平生見真迹約五十本然絶佳者不過一二十軸而已然山頂峻險學者苟失其意竟成匾薄無林深雲密之態後世楊士賢顧涼皆學之許道寧初賣藥長安市中畫山水以集衆故早年畫俗惡太甚至中年成名稍自檢束至細微處始入妙理傳世甚多佳本極少峯頭直峻而下是其得意筆也王詵字晉卿學李成山水清潤可愛又作著色山水師唐李將軍不今不古自成一家內臣馮瑾摹其筆墨臨倣亂真髙宗竟題作王詵觀者不可不察也然余能望而知之李伯時宋畫人物第一專師吳生照映千古者也畫馬師韓幹不為著色獨用澄心紙為之惟臨摹古畫用絹素著色筆法如雲行流水有起倒作天王佛像全法吳生士人喬仲常専師伯時倣佛亂真至南渡吳興僧梵隆亦師伯時但人物多作山水紋稍乏神氣若畫馬則全不能也伯時暮年作畫蒼古字亦老成余常見徐神翁像筆墨草草神氣炯然上有二絶句亦老筆所書佳作又常見伯時摹韓幹三馬神氣突出縑素今在杭州人家使韓幹生亦恐不能復甚過也王端畫人物古拙無神氣石恪畫戲筆人物惟面部手足用畫法衣文粗筆成之武嶽長沙人工畫人物尤長于天神星像用筆純熟其子洞清能世其學過父逺甚凡世間星像天神藥王等像傳流甚多神妙不俗大抵與武宗元相上下而神彩勝之宗元朝元仙仗圖昔藏張君錫家今歸杭人崔氏儘一匹絹作五帝朝元人物仙仗背項相倚大抵如寫草書然王士元畫山水屋木宣和畫譜止于山水部收山閣圖一卷至稱其兼有諸家之妙人物師周昉山水師關同屋木師郭忠恕凡所下筆皆極精微卻于宫室議論中貶之云如王士元輩可以皂𨽻目之議論相及者有如此髙克明畫山水雖工不免畫人之習無深厚髙古之氣趙幹畫山水多作江南景風致平俗杭人藏秋牧圖上有宣和題印甚佳翟院深學李成畫山水臨摹逼真自作多佳世所有成畫多此人為之王齊翰畫佛像神仙山水筆法雖佳不免近俗若入細者固勝易元吉徐熙後一人而已畫花鳥如生人但以獐猿名之裴文晲工畫有聲然形似有之古意不足也燕文季作山水清潤可愛然取其氣骨無有也李伯時摹李將軍海岸圖雖摹昭道法至于筆意水痕林叢處不能脫其習此幀在京師人家孫太古湖灘水石圖在浙右民家雙幅長軸中畫一石髙數尺湍流激注飛濤走雪聽之似覺有聲黃筌不能過也徽宗性嗜畫作花鳥山石人物入妙品作墨花墨石間有入神品者歷代帝王能畫者至徽宗可謂盡意當時設建畫學諸生試藝如取程文等髙下為進身之階故一時技藝皆臻其妙嘗命學人畫孔雀升墩障屏大不稱旨復命餘子次第呈進有極盡工力亦不得用者乃相與詣闕陳請所謂旨曰凡孔雀升墩必先左腳卿等所圖俱先右腳驗之信然羣工遂服其格物之精類此當時承平久四方貢獻珍異之物竒花異果無虛日徽宗乃作册圖寫每一枝二葉十五版作一册名宣和睿覽集纍至數百及千餘册余度其萬幾之餘安得工暇至此要是當時畫院諸人倣效其作特題印之耳然徽宗親作者余自可一望而識之鄆王徽宗第二子也能畫花鳥克肖聖藝墨花入能品常見一卷後題年月日臣某畫進呈徽宗御批其後曰覽卿近畫似覺稍進但用墨粗欠生動耳後作當謹之以此知一時諸王留心于畫者皆如此也張敦禮汴梁人畫人物師六朝筆意哲宗壻也嘗見其論畫曰畫之為藝雖小至于使人鑒惡勸善聳人觀聽為補豈可儕于衆工哉敦禮畫人物貴賤美惡容貌可見筆墨緊細神采如生江南見陳元逹鎖樹凍圖其忠義之氣突出縑素在京師見阮孚蠟屐圖人物山水樹石並倣顧陸後有敦禮所受追贈太師告命是其家藏之物子孫就以告命附其後真竒品也文與可竹真者甚少平生只見五本偽者三十本往見張受益古齋泥屏上倒垂枝上題熙寧二年己酉冬至日巴郡文同與可戲墨真竒作也後有絹畫三本一一如此題筆墨皆相似天地間未之見者尚多豈與可一日間能作此數本耶然真偽一見自可辨之東坡先生文章翰墨照耀千古復能留心墨戲作墨竹師與可枯木竒石時出新意余平生曽見謫黃州於路途民家雞棲豕牢間有藂竹木石因圖其狀作木葉亦細紋甚縷及在祕監得見拳石老檜巨壑海松二幀竒怪之甚墨竹凡見十四卷大抵寫意不求形似僕曽收枯木竹石圖上有元章一詩今為道士黃可玉所有矣米芾元章天姿髙邁書法入神宣和立書畫學擢為博士初見徽宗進所畫楚山清曉圖大稱旨命書周官篇于御屏書畢擲筆于地大言曰一洗二王惡札照耀皇宋萬古徽宗潛立于屏風後聞之不覺步出縱觀稱賞元章冉拜求索所用端硯因就賜之元章喜拜置之懷中墨汁淋漓朝服帝大笑而罷其為豪放類若此作畫善寫古賢像山水其源出董源天真發露怪怪竒竒枯木松石時出新意然傳世不多耳其子友仁字元暉能傳家學作山水清致可掬亦略變其尊人所為成一家法煙雲變滅林泉點綴生意無窮平生亦珍重不易與人當時翟耆年有詩云善畫無根樹能描朦􅺩雲如今身貴也不肯與間人其為世貴重如此余平生凡收數卷散失不存今但有一橫披紙畫上題數百字全師董源真元暉第一品也其弟友知亦善畫亦善書元章云幼兒友知代吾名書碑文及大字更無辨門下許侍郎尤愛其小楷云每示簡可使令嗣書謂友知也華亭李甲字景元作翎毛有天趣樹木不佳僕屢見其畫樹木甚拙禽鳥佳處多宋宗室如千里希逺皆得丹青之妙如大年小景墨雁雜禽又出尋常宗室筆墨之妙者也嗣濮王宗漢墨雁可入神品宋迪字復古師李成清甚士大夫畫中最佳不在李公年之下其猶子子房亦得家法劉涇字巨濟與元章為書畫友作枯木有竒意周怡者畫院人宣和末承應摹倣唐畫有可觀崔白蘆雁之類雖清致余平生不喜見之獨有一大軸絹濶一丈許長二尺許中濃墨塗作八大雁盡飛鳴宿食之態東坡先生大字題詩曰扶桑之蠺如盆盎天女織綃雲漢上往來不遣鳯銜梭誰能鼓臂三千丈云云真白之得意筆也李伯時十六小馬圖至京師始見之紙素數尺中作山林十六馬飲水齕草樂天趣於其間神駿可愛伯時小字題其後今在郝大參家徽宗自畫夢遊化城圖人物如半小指纍數千人城郭宫室旌旄鼓樂仙嬪真宰雲霞霄漢禽畜龍馬凡天地間所有之物色色具備為工甚致觀之令人起神遊八極之想不復知有人間世竒物也今在嘉興陳氏又見其臨李昭道摘瓜圖舊在張受益家今聞在京師某人處畫明皇騎三駿照夜白馬出棧道飛仙嶺下乍見小橋馬驚不進逺地二人摘瓜後有數騎漸至竒迹也程坦元章時人善雜畫往往見之張受益收松竹障八幅頗佳而人物甚俗城南李氏收鍾馗小妹二幀甚惡元章謂程坦能汙茶坊酒肆壁者此論真是花光長老以墨暈作梅如花影然别成一家政所謂寫意者也傳世不多僕平生止見四五本子昻學其枝條花用别法宋南渡士人多有善畫者如朱敦儒希真畢良史少董江參貫道皆能畫山水窠石若畫院諸人得名者若李唐周曽馬賁下至馬逺夏圭李迪李安忠樓觀梁楷之徒僕于李唐差加賞閲其餘諸人亦不能盡别也畢少董能畫山水不在朱希真之下僕常見之故表異以語後人馬和之作人物甚佳行筆飄逸時人目為小吳生更能脫去習俗留意髙古亦人未易到也池州畫工作九華秋浦圖元章云甚有清趣師董源余見凡有七八本其工緻甚多信元章之説不妄楊補之墨梅甚清絶水仙亦竒自號逸禪老人湯叔雅江右人墨梅甚佳大抵補之别出新意水仙蘭亦佳趙孟堅子固墨蘭最得其妙其葉如鐵花莖亦佳作石用筆輕拂如飛白書狀前人無此作也畫梅竹水仙松枝墨戲皆入妙品水仙為尤髙子昻専師其蘭石覽者當自知其髙下近世牧溪僧法常作墨戲用墨粗少古法亷布字仲宣畫枯木藂竹竒石清致不俗本學東坡青出于藍自號射澤老人畫松柏亦竒兼善山水清潤甚佳杭州龍井寺板壁畫松石古木二真得意之筆王清叔畫枯木竹石倣亷布法亦能亂真但筆墨少粗乏生意耳常州太平寺佛龕後壁有徐友畫水名清濟貫河中有一筆尋其端末長四十尺觀者異之友之妙豈在是哉筆法既老波浪起伏得其水勢相對活動愈看愈竒兵火間寺屋盡焚而此殿巍然獨存豈水能厭之耶金畫王庭筠字子端畫枯木竹石山水往往見之獨京口石民瞻家幽竹枯槎圖武陵劉進甫家山林秋晚圖上逼古人不在元章之下也楊祕監畫山水全師李成任詢字君謨草書入能品畫山水亦佳在王子端之下金顯宗章宗父也畫墨竹俗惡章宗每題其籖金人畫馬極有可觀惜不能盡知其姓名國朝龔聖豫先生名開淮隂人身長八尺碩大美髯讀書為文能成一家法畫馬専師曹霸得神駿之意但用筆頗粗此為不足耳畫人物亦師曹韓畫山水師米元暉梅菊花卉雜師古作卷後必題詩或贊跋皆新竒常自畫瘦馬題詩曰一從雲霧降天關空盡先朝十二間今日有誰憐駿骨夕陽沙岸影如山此詩膾炙天下人口真有盛唐風致嘗作雲山藁五册傳于世余常見之乃平生所臨畫藁亦竒物也江南畫工陳琳字仲美其先本畫院待詔琳能師古凡山水花竹禽鳥皆稱其妙見畫臨摹倣佛古人子昻相與講明多所資益故其畫不俗宋南渡二百年工人無此手也外國畫髙昌國畫用金銀箔子及朱墨點點如雨消灑在紙上畫翎毛如中國花草亦佳髙麗畫觀音像甚工其源出唐尉遲乙僧筆意流而至于纎麗雜畫古人作畫皆有生意運思落筆各有所主况名下無虛士相傳既久必有過人處畫之六法得其一二者尚能名世又得其全者可知也今人看畫不經師授不閲記録但合其意者為佳不合其意者為不佳及問其如何是佳則茫然失對余十七八嵗便有迂濶之意見圖畫愛不去手見鑒賞之士便加禮問遍借記録倣佛成誦詳味其言歷觀名迹恭考古説始有少悟若不留心不過為聽聲隨影終不精鑒也人物於畫最為難工蓋拘于形似位置則失神韻氣象顧陸之迹世不多見唐名手至多吳道子畫家之聖也照映千古宋李公麟伯時一出遂可與古作者並驅爭先得伯時畫三紙可敵吳生畫一二紙得吳生畫二紙可易顧陸一紙其為輕重相懸類若此古人以畫得名者必有一科是其所長如唐之鄭虔蜀之李升並以山水名宣和畫譜皆入人物等部畫目稱其能畫山水而所收止人物神仙耳其他不可枚舉余凡欲條宣和畫譜者數矣惜未得遂所欲也宋髙宗每搜訪至書畫必命米友仁鑒定題跋往往有一時附會迎合上意者嘗見畫數卷頗未佳而題識鑒者不可不知也世人收畫必欲盛飾以金玉不知金玉乃誨盜之端前賢事迹可鑒燈下不可看畫醉餘酒邊亦不可看畫俗客尤不可示之卷舒不得其法最為害物至于庸人謬子見畫必看妄加雌黃品藻本不識物亂訂真偽令人短氣耳看畫本士大夫適興寄意而已有力收購有目力鑒賞遇勝日有好懷彼此出示較量高下政欲相與誇竒鬭異博物耳今之輕薄子則不然縱目力略知一二見人好物故貶剝疵纇用心計購至于必得倘不得則生造毁謗必欲此物名譽身價不彰若鑒賞髙尚之士固不待破説平嘗目力未定者或為所惑已收一物性命與俱妄自稱譽人或欲之必作説難阻得善價而後已此皆心術不正不可不鑒看畫之法不可一途而取古人命意立迹各有其道豈可拘以所見繩律古人之意哉初學看畫不可不講明要妙觀閲記録否則縱鑒精熟見畫便知何能便識美惡之由茫然無對雖妄加議論支吾一時言吐俗謬識見淺短為知者所哂不可不學也人家子弟不可不留心看書畫蓋留心不于此則于彼所益非一端前輩名人巨公未有不逰意于此者陳無已詩云老知書畫真有益却悔嵗月來無多讀之可為浩歎古人畫稿謂之粉本前輩多寶蓄之蓋其草草不經意處有自然之妙宣和紹興所藏之粉本多有入神妙者宋人賞鑒精妙無出于米南宫元章然此公天姿極髙立論時有過處當時劉巨濟薛道祖林中子蘇志東兄弟皆不及之後有黃伯思長睿者出著法帖刋誤専攻米公之失余從而為辨析甚詳作此法帖正誤一卷専指長睿之得失當使元章復生不易吾言也俗人論畫不知筆法氣韻之神妙但先指形似者形似者俗子之見也古人論畫之神妙有云畫十二辰圖有十二遊蜂循環飛動畫婦人則有回身轉頭之異不可枚舉此皆迂謬其説以求竒非正論也今之人看畫多取形似不知古人最以形似為末節如李伯時畫人物吳道子後一人而已猶未免于形似之失蓋其妙處在于筆法氣韻神彩形似末也東坡先生有詩云論畫以形似見與兒童均作詩必此詩定知非詩人余平生不惟得看畫法于此詩至于作詩之法亦由此悟唐人畫絹多用碧綾剜背當時名士于蘭道上題字自經宣和紹興裝飾盡用拆去古迹邈不可得已唐人裱手卷多有紫綾作標首至有紅綾作引首用珊瑚為小軸如今藏經之狀宋末士大夫不識畫者多縱得賞鑒之名亦甚苟且蓋物盡在天府人間所存不多動為豪勢奪去賈似道擅國柄留意收藏當時趨附之徒盡心搜訪以獻今往往見其所有真偽相半豈當聞見不廣抑似道目力不髙一時附會致然也古人作畫有得意者多冉作如李成寒林范寬雪山王詵煙江疊障之類不可枚舉畫梅謂之寫梅畫竹謂之寫竹畫蘭謂之寫蘭何哉蓋花卉之至清畫者當以意寫之不在以形似耳陳去非詩云意足不求顔色似前身相馬九方皋其斯之謂歟畫有賔主不可使賔勝主謂如山水則山水是主雲煙樹石人物禽畜樓觀皆是賔且如一尺之山是主凡賔者近逺折算須要停均謂如人物是主凡賔皆隨其逺近髙下布景可以意推也染絹上深下淡薰絹上黑顔色黯淡捶碎者文理不真絲亂斷惟是畫佳者絹黑而丹青自明看畫不必以絲素明暗為辨看畫如看美人其風神骨相在肌體之外者今人看古迹必先求形似次及傅染次及事實殊非賞鑒之法也元章謂好事家與賞鑒家自是兩等家多資力貪名好勝遇物收置不過聽聲此謂好事若賞鑒則天姿髙明多閲傳録或自能畫或深畫意每得一圖終日寶玩如對古人雖聲色之奉不能奪也收畫之法釋道為上蓋古人用功于此欲覽者生敬慕愛禮之意其次人物可為鑒戒其次山水有無窮之趣其次花鳥其次畫馬可以閲神駿若仕士畨族雖精妙非文房所可玩者此元章之論也今人收畫多貴古而賤近如山水花鳥宋之數人超越昔人但取其神妙勿論世代可也只如本朝趙子昻金國王子端宋南渡二百年間無此作元章收晉六朝唐五代畫至多在宋朝名筆亦收置稱賞若以世代逺近不看畫之妙否非真知者也觀畫之法先觀氣韻次觀筆意骨法位置傅染然後形似此六法也若觀山水墨竹梅蘭枯木竒石墨花墨禽等遊戲翰墨髙人勝士寄興寫意者慎不可以形似求之先觀天真次觀意趣相對忘筆墨之迹方為得趣今人觀畫不知六法開卷便加稱賞或人問其妙處則不知所答皆是平生偶耳看熟或附會一時不知其源深可鄙笑收畫在山水花竹窠石等作挂軸文房舒挂若故實人物必須得橫卷為佳畫之為物有不言之妙古人命意如此須有具眼辨之方得其理若賞閲不精又不觀記録知其源流縱對顧陸名筆不過為鼠竊金以自寶奚貴其知味也哉山水之為物稟造化之秀隂陽晦冥晴雨寒暑朝昏晝夜隨行改步有無窮之趣自非胸中丘壑汪汪洋洋如萬頃波未易摹寫六朝至唐畫者雖多筆法位置深得古意自王維張璪畢宏鄭虔之徒出深造其理五代荆關又别出新意一一洗前習逮于宋朝董源李成范寬三家鼎立前無古人後無來者山水之法始備三家之下各有入室弟子二三人終不逮也世俗論畫必曰畫有十三科山水打頭界畫打底故人以界畫為易事不知方圓曲直髙下低昻逺近凹凸工拙纎麗梓人匠氏有不能盡其妙者况筆墨規尺運思于縑楮之上求其法度準繩此為至難古人畫諸科各有其人界畫則唐盡無作者歷五代始得郭忠恕一人其他如王士元趙忠義三數人而已如衛賢髙充明抑又次焉近見趙集賢子昻教其子雍作界畫云諸畫或可杜撰瞞人至界畫未有不用工合法度者此為知言也大凡觀畫未精多難為物此上下通病也余小年見神妙之物稍不合所見便目為偽今則不然多聞闕疑古人之所以傳世者也必有其實元人湯采真畫評議論甚髙精于賞鑒樂間外史玉水氏愛而輯之畫史畫法山水訣見宋郭思林泉髙致或云李成作凡畫山水意在筆先丈山尺樹寸馬豆人此其格也逺人無目逺樹無枝逺山無皴逺與雲齊逺水無波隱隱似眉此其式也山要雲塞石壁泉塞道路人塞樓臺樹塞石分三面路别兩歧樹看頂𩕳水看岸基此其訣也凡畫山水峻拔者峯平夷者岑峭壁者崖通穴者岫形圓者巒兩山夾路者壑兩山夾水者澗水注者溪泉通川者谷路下土平曰坡似土而髙者曰坂若能辨别乎此則知山水之倣佛矣觀者先看氣像次辨清濁定衆峯之揖拱列羣岫之威儀多則亂少則慢不多不少要分逺近逺山不可連近山逺水不可連近水山要回抱水要縈洄茂林古木寺觀可安斷岸頽堤小橋可置有路處人行無路處林木岸絶處古渡山絶處荒村水濶處征帆林密處店舍懸崖古木根露而藤纒臨流怪石嵌空而水痕凡作林木逺則疏平近則髙密有葉者枝柔無葉者枝硬松皮似鱗柏皮纒身生于土者修長而叢一作徑直生于石者拳曲而伶仃古木節多而半死寒林扶疏而蕭森凡畫山水須按四時春景則霧鎖煙籠樹木多隱隱逺水拖藍山色漸青夏景則林木蔽天緑蕪平坡倚雲瀑布近水幽亭秋景則水天一色霞鶩齊飛鴈橫煙塞蘆渚沙汀冬景則積地為雪水淺沙平凍雲黯淡酒旗孤村客舟倚岸樵者負薪風雨則不分天地難辨東西行人􅏛笠漁父蓑衣有風無雨枝葉斜披有雨無風枝葉下垂雨霽則雲收天碧薄靄依稀山光淺翠網晒斜暉曉景則千山一作門欲曙輕霧霏霏朦朧殘月氣像熹微暮景則山銜落日吠犬疏籬僧投逺寺帆卸江湄行人歸急半掩柴扉或煙斜霧橫或逺岫雲歸或秋江古渡或荒冢斷碑或洞庭春色或瀟湘霧迷如此之類謂之畫題筆法布置更在臨時山形不得犯重樹頭不得整齊樹藉山而為骨山藉樹以為衣樹不可繁要見山之秀麗山不可亂要顯樹之光暉若能留意於此者須心會于玄機形理論余嘗論畫以為人禽宫室器用皆有常形至于山石竹木水波煙雲雖無常形而有常理常形之失人皆知之常理之不常雖曉畫者有不知故凡可以欺世而取名者必託于無常形者也雖然常形之失止于所失而不能並其全若常理之不當則舉廢之矣以其形之無常是以其理不可不謹也世之工人或能曲盡其心而至于其理非博士逸才不能辨與可知於竹石枯木真可謂得其理者矣如是而生如是而死如是而攣拳瘠蹙如是而條達遂茂根莖節葉牙角脈縷千變萬化未始相襲而各當其處合于天造厭于人意蓋逹士之所寓也歟昔嵗常畫兩叢竹于淨因之方丈其後出守陵陽而西也余與之偕别長老道臻師又畫兩竹梢一枯木于唭東亝臻方治四壁于法堂而請與可與可既許之矣故余并為記之必有明于理而深觀之者然後知言之不妄元豐三年端陽月八日眉山蘇軾于淨因方丈書之東坡先生以雄文直節髙一代而其英偉秀傑之氣發為翰墨者姿態橫生峰穎遒徑尤非時人之所能及此帖文簡意足不易得也好事者宜寶藏之至正十九年龍集己亥四月既望後學雙文宇文公諒謹題急雨苕溪小繫船手披翰墨憶坡仙故家人物今煨燼撫卷題詩一慨然吳成龍文忠公畫記有形理之説真能發古人未言之微惜湖州公竹枝不與俱傳俾今之畫家不得觀其自惜哉然文忠此記之妙似不専於畫即書家亦然點畫肥瘦者形也結構圓融者理也形具而顯理隱而微形非理弗備猶文非理弗宣今作畫之求于形似其不能况理乎書亦惟于形又鮮得其似若語于理無不懵然以為誕矣文忠書本二王帖中來故機軸成家學者罕到中間妙處理形相傳非漫然塗抹已也此卷姑置畫而重其書自當與文忠公並稱宇內神物矣丙戌冬日張靜題此蘇文忠公行書畫記真迹卷在楮上宜入法書部因論畫之形理有會故留斯便覽寫竹説餘見余竹史揚松法見余松麈暈梅法見余梅花供吳仲圭云墨竹之法作幹節枝葉而已而疊葉為至難於此不工則不得為佳畫矣昔見于息齋學士譜中謂須宗文與可下筆要徑節實按而虛起一抹便過少遲留則不鈍厚不銛利矣法有所忌學者當知粗似桃葉細如桞葉孤生並立如又如井太長太短蛇形魚腹手指蜻蜓等狀均疏均密偏重偏輕之病使人厭觀必使疏不至冷繁不至亂翻正向背轉側低昂雨打風翻各有法度不可一例塗去如染皂絹然也汝求豫墨竹以為法切不忌吾言之諄諄董玄宰論畫嘗謂右軍父子之書至齊梁而風流頓盡自唐初虞褚輩一變其法乃不合而合右軍父子殆如復生此言大易會蓋臨摹最易神會難傳故也巨然學北苑元章學北苑倪瓉學北苑學一北苑耳而各各不相似使俗人為之與臨本同若之何能傳世也畫家以古人為師進此當以天地為師每朝起看雲氣變幻絶近畫中山山行見竒樹須四面取之樹有左看不入畫而右看入畫前後亦爾看得熟自然傳神傳者必以形形與心手相湊而相忘神之所託也樹豈有不入畫者將畫史收之生絹中茂密而不繁峭而不寒即是一家眷屬耳畫家之妙全在煙雲變中米虎兒謂王維畫見之最多皆如刻畫不足學也惟以雲山為戲此語雖似過正然山水中當著意生雲不用描染當以墨漬出令雲氣蒸蒸冉冉欲墮乃可稱生動之韻雲山不始于米元章蓋自唐時王洽潑墨便已有其意董北苑好作煙景煙雲變沒即米畫也余以米虎兒瀟湘白雲圖悟墨戲三昧故以寫楚山李思訓畫海外山董源畫江南山米元暉寫南徐山李唐寫中州山馬逺夏圭寫錢塘山吳興趙子昻寫苕霅山黃子久寫海虞山若夫方壺蓬閬必有羽人傳照余以意為之未知是否山之輪郭先定然後皴之從碎處積為大山此最是病古人運大軸只三四大分合所以成章雖其中細碎甚多要之取勢為主吾有元人論畫米髙二家山書正先得吾意古人云有筆有墨筆墨二字人多不曉畫豈有筆墨者但有輪郭而無皴法即謂之無筆有皴法而不分輕重向背明晦即謂之無墨古人云石分三面此語即是筆亦是墨凡諸家皴法自唐及宋皆有門庭如禪燈五家宗派使人聞片語單詞可定其為何派兒孫畫家右丞如書家右軍蓋大家神上品必于皴法有竒大年雖俊爽不耐多皴遂謂無筆此得右丞一體者也畫家以皴法為第一義皴法中以破網解索為難惟趙吳興得董巨正傳要用此皴法脫畫院庸史之習氣幽亭秀木古人常繪世無解其意者余為下注腳曰亭下無俗物謂之幽亭不擁腫經霜變黃者謂之秀木昌黎云坐茂樹以終日當作嘉樹則四時皆宜霜松雪竹雖凝寒亦堪目對畫樹之竅惟在多曲雖一枝一節無有可直之理其向背俯仰皆于曲中取之或曰然則諸家不有直樹乎曰樹雖直必有生枝發節必不直也董北苑樹作徑挺之狀特曲處簡耳李營丘則千屈萬曲無復直筆矣枯樹最不可少時于茂林中間見乃竒古茂樹惟檜柏楊栁桂槐要鬱森其妙處在樹頭與四面參差一出一入一肥一瘦處古人以木灰畫圈隨圍而點之正為此也畫樹本各有分别如畫瀟湘圖意在荒逺滅沒即不當大樹及近景叢木如園亭景可作楊栁梧竹及古檜青松若以園亭景樹移之山居便不稱矣若重山復嶂樹木又别當直幹直枝多有攢點彼此相藉望之模糊鬱匆似入林有猿啼虎嘯者乃稱至如春夏秋冬風晴雪雨又不在言也董北苑畫樹多不作小樹者如秋山行旅是也又有作小樹但只逺望之似樹其實憑點綴以成形者此即米氏落茄之原委蓋小樹最要淋漓約略簡于枝柯而繁于形影欲如文君之眉與黛色相恭合則是髙手也宋人多寫垂栁又有點葉栁垂栁不難畫只要分枝頭得耳點葉栁之難在樹頭圓鋪處只以汁緑漬出又要森蕭有迎風搖揚之意其枝頭須半明半暗又春二三月栁未垂條秋九月栁已衰颯俱不可混設色亦須體此意禪家有南北宗唐時始分畫之南北二宗亦時分也但其人非南北也北宗則李思訓父子著色山水流傳而為宋之趙幹趙伯駒伯驌以至馬夏輩南宗則王摩詰始用縇淡一變鈎妍之法其傳為張藻荆郭董巨米家父子以至元之四大家亦六祖之後有馬駒雲峰石迹迥出天機筆意縱橫恭乎造化者東坡贊吳道子王維畫壁亦曰吾于維也無間然知言哉山水孤煙逺村天邉獨樹高原非右丞工于畫道不能得此句米元暉嘗謂右丞畫如刻畫故余以米家山寫韻趙大年畫平逺絶似右丞秀潤天成真宋之士夫畫此一派又傳倪雲林雲林工致不敵而荒率蒼古勝矣今作平逺及扇頭小景一以此二人為宗使人玩之不窮味外有味也令穰寫湖天森遫之景極不多皴雖云學王維而維畫正有細皴者乃于重山疊嶂有之趙未能得其妙也元鎮自題獅子林圖余此畫真得荆關遺意非王蒙輩所能夢見也其髙自標置如此又張伯兩題雲林畫云無畫史縱橫習氣顧謹中題雲林畫云初以董源為宗及乎晚年畫益精而書法漫矣蓋倪書絶工緻晚乃失之而専精于畫一變古法以天真幽淡為宗要亦所謂漸老漸熟者若不從北苑築基不容易到爾縱橫習氣即黃子久未斷幽淡兩言則趙吳興猶遜迂翁其胸次自别也畫之道所謂宇宙在乎手者眼前無非是生機故其人往往多壽至于刻畫細碎為造物役者乃能損壽蓋無生機也黃子久沈石田文徴仲皆大耋仇英短命趙吳興止六十餘仇與趙品格雖不殊皆習者之流非以畫為寄以畫為樂者也寄樂于畫自黃公望始開此門庭耳向余集董太史畫論一卷今題跋內有者刪半矣繪事名目染不描采色塗染出渲翎毛謂之染渲界界畫屋宇描白描人物臨看真本對臨摸用紙拓影傳對面傳寫花果草木禽獸寫生畫則白描水墨淺絳色輕籠薄罩五色幹淡吳裝大著色古今描法一十八等髙古遊絲描十分尖筆如曹衣紋琴絃描如周舉類鐵線描如張叔厚行雲流水描馬蝗描馬和之顧興裔類一名蘭葉描釘頭鼠尾武洞清混描人多描撅頭描秃筆也馬逺夏圭曹衣描魏曹不興折蘆描如梁尖頭細長撇納也橄欖描江西顔輝也棗核描尖大筆也栁葉描似吳道子觀音筆竹葉描筆肥短撇納戰筆水紋描減筆馬逺梁楷之類柴筆描粗大減筆也蚯蚓描皴樹法松皮如麟皴寫針有鼠尾蝴蝶車輪瓜離等名柏皮如繩皴栁身皴如交義麻皮皴梅身要點擦橫皴梧桐樹身稀二三筆橫皴樹枝四等丁香范寬雀瓜郭熙火熖李遵道拖枝馬逺樹葉二十七等靜存處士續增十七等備寫形狀在繪事指蒙內描葉有八等墨葉一等著色葉一十八等皴石法會集諸名家論麻皮皴董源巨然筆麻皴直擦皴關同李成雨點皴范寬俗名芝麻皴諸家皴法俱備賴頭山丁香樹芝麻點掇皴小斧劈皴李將軍劉松年大斧劈皴李唐馬逺夏圭長斧劈皴許道寧顔暉是也名曰雨淋牆頭巨然短筆皴江貫道師巨然泥裏拔釘皴夏圭師李唐米元暉拖泥帶水皴先以水遍抹山形坡石大小之處然後蘸焦墨橫筆拖之又有亂雲皴彈渦皴鬼靣皴骷髏皴馬牙勾如李將軍趙千里先勾勒成山却以大青緑著色方同螺青苦緑碎皴染兼泥金石腳寫石二十六種飛白無色竹蘭上用雲母中等山字大青石太湖大黑石盤陀石筍上尖下大佛座大石卧虎同上骷髏與上同獅子可石大馬鞍半大石羊肚白色小石植竹蒲盆中馬牙勾描蚌蛤小石鵝子小碎石鷹座大石彈窩大石牡礪如雲母蝦蟆插劍細長如劍漿腦白粉點出小石亦可置盆筆架勢如山鬼靣坡腳亂石靈碑青黑石仕女竹木上用勾勒白描點苔古多有不用苔者恐覆山脈之巧障皴法之妙今人畫不成觀必須叢點不免有媸女添痂之誚若攢苔如仲圭渴苔如叔明乃得個中之旨染雲雲要湧起勢如飛動著色雲頭要現雲腳要淡無蹤影為妙董源山水上深墨描成雲淡苦緑逐染馬夏用禿筆淡描指甲雲亦以淡苦緑逐染若元暉彥敬山水上積染出懵懂雲借絹地而成雲也至青緑山水深墨細描白雲或粉染出或粉細細絲省破墨唐伯虎云作畫破墨不宜用井水性冷凝故也溫湯或河水皆可洗硯磨墨以筆壓開飽浸水訖然後蘸墨則吸上勻暢若先蘸墨而後蘸水被水沖散不能運動也濃淡徐充暖姝由筆山水中凡畫山峯青色露尖上濃下淡此何理也因極意觀審久驗其不然上下濃淡須一色乃得但為雲所掩隔腰腳者則變換耳前人未常言及去取丹青志畫山不畫小畫水不畫均畫石不畫巧畫樹不畫孤畫路不畫直畫境不畫重畫貴不畫醜畫賤不畫清畫錯不畫俗畫古不畫今兼擅畫者六法象形之一故古人金古鍾鼎𨽻篆往往如畫而畫家寫蘭寫竹寫葡萄寫梅多兼書法或畫用焦墨生氣韻書用淡墨生古色好尚唐喻鳬曰我詩無羅綺鉛粉冝不售畫亦同之嘗見黃子久山水一幅上有句曲張雨詩由來老筆荆關輩施粉施朱笑後生米南宫海嶽圖陳方叔常寄雲林簡云此圖拙古俗眼罕識前輩嘗評其畫云大米造妙入無言雲林胸次清曠筆意蕭逺當咄咄逼真矣暇日能寄小幅否耶倪迂畫在勝國時可稱逸品昔人以逸品置神品之上歷代惟張志和盧鴻可無愧色宋人中米襄陽在蹊徑之外餘皆從陶鑄而來元之能者雖多然承率宋法稍加蕭散耳吳仲圭欠有神氣黃子久特妙風格王叔明奄有前規而三家未洗縱橫習氣獨雲林古淡天然米癡後一人而已孝廟時直畫史鍾欽禮王吹王諤善山水吹嘗畫萬里長江圖進上孝廟悅之别索絹令畫十幅至三四而死其吳偉善人物嘗為皇太后傳神孝宗手捧絹格從旁跪覽焉吕紀善翎毛藝冠一世張珍善花果尺寸之楮人輒貴之林良蘆雁即古人亦不能及邊景照花鳥細巧工緻為當時獨步云見左輔王維禎掠間遂録鈐記郭熙畫于角有小熙字印趙大年永年則有大年某年筆記蕭照以姓名作石古文書崔順之書姓名于葉下易元吉書于石間宋思陵有御書之寶印書後有御書瓢印王晉卿家藏則有寶繪堂方寸印米元章有米氏審定真迹等印或用團印中作米芾字如蛟形江南李主所藏則有建業文房之印內合同印陳簡齋則有無住道人印記蘇武功家則有許國後裔蘇耆國老等印東坡則用一寸長形印文曰趙郡蘇軾圖籍吳傅朋曰延州吳悅曰吳悅私印功助余觀畫之術非細也圖山林巖壑則使人忘囂塵志淡薄圖川澤河海使人心膽疏通神氣浩蕩圖宫室則能營計毫釐布指髙下使人身如可居狀若可入圖鬼神威貌則使人啓敬圖父子提攜則使人知孝圖君臣上下節義則使人知忠圖昆弟夫婦而友愛之情深圖賔主而揖遜之儀見以至為兵為刑而愚人孺子見而亦知惕懼善感惡勸入之深勸之易吾謂他無如也是將可與文章並齒其助道之功豈淺淺乎美哉斯術之可尚者如此珊瑚網卷四十八
