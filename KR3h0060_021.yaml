body:
  text: 珊瑚網卷二十一明汪砢玉撰法書題跋淳化閣帖祖本松雪翁家藏書契以來逺矣中古以六藝為教次五曰書書有六義象形指事諧聲會意轉注假借書由文興文以義起學者世習之四海之內罔不同也秦滅典籍廢先王之教李斯變古篆程邈創𨽻書𨽻之為言徒𨽻之謂也言賤者所用也漢承秦弊舍繁趨簡四百年間六藝存者無幾漢末年蔡雍以𨽻古定五經洛陽辟雍以為復古觀者車日數十百兩其後𨽻法又變畫真行章草之説興言楷法則王次仲師宜官梁鵠邯鄲淳毛𢎞行書則劉德升鍾氏胡氏崔瑗崔實張芝芝弟文舒薑孟頴梁孔達田彥和常韋伯將張超之徒咸精其能至晉而大盛渡江後右將軍王羲之之徒總百家之功極衆體之妙傳子獻之超軼特甚故歷代稱善書者必以王氏父子為舉首雖有善者蔑以加矣當是時江左號禮樂衣冠之國而北朝尚用武其遺風流俗接于耳目故江左人士以書名者傳記相望歷隋而唐文皇尚之終唐之世善書者輩出其大者各自名家逸其名者不可勝數亦可謂盛矣宋興太宗皇帝以文治制詔有司善價遍購法書聚之御府甚者或賞以官時五代衰亂之餘視唐所藏存者百一古迹散落帝甚憫焉淳化中詔翰林侍書王著以所構書繇二代至唐釐為十卷摹刻祕閣題曰上石其實木也既成賜宗室大臣每人一本自此遇大臣進二府輒墨本賜焉後乃止不賜故世尤貴之黃太史曰禁中板刻古帖皆用歙州貢墨墨本賜羣臣今都下用錢萬二千便可購得元祐中親賢宅借板墨拓百本分遺宫僚用潘谷墨光輝有餘而不甚黟黑又多木橫裂文士大夫或不能盡别由此觀之刻同而墨殊亦有以也甲申嵗五月余于書鋪中得古帖三卷第二第五第八明年又得七卷多第八缺第九六月以其多者加栁公權帖一卷于錢唐康自臨許易得第九卷始為全書雖墨有燥濕輕重造有工拙而皆為淳化舊刻無疑是可寶也自太宗刻此帖後轉相傳刻遂遍天下有二王府帖大觀太清樓帖紹興監帖淳熙臨內司帖臨江戲魚堂帖黔江帖卷帙悉同又有慶厯長沙帖劉丞相私第帖碑工帖尚書郎潘師旦綘州帖綘州公庫帖稍加損益卷帙亦異其他瑣瑣者又數十家不可悉記而長沙絳帖最知名者要皆本此書法之帖不喪此帖之澤也余因記得帖之由遂托其本末著于篇是年八月大梁趙孟俯書文衡山跋華氏淳化祖石刻法帖六卷世傳淳化帖為法帖之祖然傳刻蔓衍在宋已有三十二本其間刻拓工拙楮墨精粗雖互有得失而失真多矣然淳化祖刻在當時已不易得劉潛夫嘗得李瑋家賜本謂直數百千其重如此况後世乎前輩辨此帖凡數條皆有證據今非但不可見雖見亦無據以為辨矣無錫華中甫偶得舊刻六卷相傳為閣本而銀錠擐痕隱然可驗楮墨既異字復豐腴至于行數多寡與今世傳本皆不同第六卷內宋人朱字辨證五條筆迹精妙類蘇書但其間有黃辨等字疑為黃長睿長睿宣政間人出坡公之後不宜引以為據也然豫考長睿所著法帖辨與此又似不同豈别一人也寡淺無識不敢自信漫記如此然此帖要非尋常傳刻本也第七卷朱書辨證十一條第八卷無朱書第九卷無朱書文衡山跋華氏續收淳化祖石刻法帖三卷余生六十年閲淳化帖不知其幾然莫有過華君中甫所藏六卷者嘗為考訂定為古本無疑而中甫顧以不全為恨余謂淳化抵今五百餘年屢更兵燹一行數字皆足藏玩况六卷乎嘉靖庚寅兒子嘉偶于鬻書人處獲見三卷亟報中甫以厚直購得之非獨數卷適合而紙墨刻拓與行間朱書辨證亦無不同蓋原是一帖不知何緣分析相去幾時卒復合而為一豈有神物周旋於其間哉昔趙文敏公求古閣帖凡三易而後完自跋其後謂雖墨有燥濕輕重造有工拙皆為淳化舊刻然則公所得固非一類也豈若此本散而復合殆如豐城之劍有不偶然者誠希世之珍也嘉靖九年秋七月既望文徴明識華氏閣帖合璧諸跋豫與華中甫平生有書畫之癖而古帖尤所酷嗜每從中甫求閲所藏必首及此蓋刻拓之妙固不待言而其聚散之迹又復竒異當為華氏世寶也庚子中秋道復書於東沙草堂淳化祖刻世絶其傳久矣惟有銀錠痕者為真世之所傳若譜系所載不可盡見其所見者皆尋常不足道淳熙之際復摹入石謂之修內司帖蓋以閣本不可復得也况今世哉中甫先得六卷刻拓之工世所罕見其六七卷中朱書評皆蘇長公筆且有銀錠痕可據每歎其竒妙謂他帖終不可續二十年後復得三卷朱書印章悉出原本莫不驚異神物終合中甫寶愛不在子固蘭亭之下中甫視天下之物舉不足以移其所好其所藏法書真迹若通天進帖顔書朱巨川誥劉中使帖皆世之竒寶余每造其真賞齋必焚香盥手盡出以閲終日忘倦蓋余與中甫忝為書畫友每一見必各出所得所見輒相較量自謂不在海嶽仲永巨濟之下所謂功名皆一戲未覺負生平者也今年癸卯秋九月因閲此帖見癸未嵗所題忽忽二十餘年字弱語稚因拆去而重題之後學文彭敬書文壽承氏茂苑文嘉鑒定為淳化閣帖祖刻真本後三卷豫得之驗其紙墨刻拓收藏印記行間朱書評語與中甫前六卷原是一帙因以歸中甫如珠還合浦劍入延平也歸後十五年為嘉靖乙巳四月再閲于真賞齋敬題其後肇錫豫以嘉名休承氏卷首有子昻趙氏印及雲房清玩印尾有巨鹿郡圖書印尚是宋氏裝裱背紙內每每有宋人手簡真迹尤可寶也華夏字中甫號東沙無錫世家右閣帖九卷隆慶末年歸于吾鄉項少溪公後于燕京復得第十卷湊完全帙人因競稱千金帖云考淳化以祖名者緣南唐李主重光所為建業帖經韓宋二徐鑒定至宋淳化間以此帖為祖而損益之一云后主命徐鉉以所藏法帖勒石名升元帖在淳化前故名祖刻嗣後大觀元祐淳熙俱有摹勒諸州鎮潭絳汝黔戲魚閲古羣玉悅生等堂至溫陵一拓有四十二家非不人人靈蛇荆璧而以視閣本瞪若也今閣帖有錠紋者世只二本一藏禹州馬氏一藏雲間顧氏有釋文考異審波磔而知人代尋點畫以分郡國辨析幾微卓有定見一藏無錫華氏即項駕部所獲也擁萬主人玉識米禮部跋王著定古今書唐太宗購王逸少書使魏徴褚遂良定真偽我太宗購古今書而使王著辨精粗定為法帖此十卷是也其間一手偽帖大半甚者以千字文為漢章帝張旭為王子敬以俗人學智永為逸少如其間以子敬及真智永為逸少者猶不失為名帖余嘗於檢校太師李瑋第觀侍中王貽永所收晉帖一卷內武帝王戎謝安陸雲輩法若篆籀體若飛動著皆委而弗録獨取郗愔兩行八十卷中使人慨歎又劉孝孫處見栁公權所收跋子敬送梨帖然于太宗卷辨出乃以逸少一帖連在後而云又一帖不知其為逸少也公權唐名家尚如此顧何議著今長安李氏所收逸少帖貞觀所收第一帖著名已非逸少真迹餘可知矣獨未知徐璹所訪者何如耳余抱疾端憂養目文藝思而得之粗分真偽因跋逐卷末以貽好事同志百年之後必有擊節賞我者余無富貴願獨好古人筆札每滌一硯展一軸不知疾雷之在傍而味可忘嘗思陶𢎞景願為主書令史大是髙致一念不除行年四十恐死為蠧魚入金題玉躞間遊而不害元祐三年倦遊閣襄陽漫仕米元章書第一漢章晉元晉武齊髙梁武梁髙簡文右七帖並一人手寫偽帖晉武帝當是孝武第二張芝後一帖是前五帖並張旭崔子玉鍾繇長風齊梁人書皇象後臣象言同章帝一手偽帖王􅘙二十四帖同上謝安前一帖是後六月帖同上第三庚翼已向帖杜預親故帖王循司馬攸王邵劉瓌之劉穆之王廞張翼陸雲山濤卞壼謝發羊欣右皆與漢章一手偽帖第四阮研蕭確並同章帝虞世南臨樂毅論者俗人偽帖餘皆真歐陽詢比年亦俗人偽作第五李斯書未知何人書程邈與章帝一手蔡琰同上何氏二帖歐陽詢敬祖鄱陽二並子敬孤不度德亮白二並諸葛書懷素同程邈既移屋足下並羊欣末有欣白字第六適得書知欲差涼比奉對兄靈伏想嫂宰相安和又不能疾不退夫人想大小知足下逺不快智永小陸是月也吾昨得張旭追尋子敬疾患二十日餘可可釋文餘字作僕定登釋文定聽右不注出者皆偽第七初月二日足下時事吾怪足下前從洛日月七日集成當力承足下子敬荀侯足下家極知僕近修小園右不注出者皆偽第八此蒸濕子敬代父月半同上尊夫人偽適欲遣書智果第九相過終無復日玄度時往來前告先以陳慕容並無名人偽帖薄冷益郎並歐書第十吾當託桓江州消息疾不退省前書近與鐵石知鐵石玄度何來遲忽動大唐左衛長史張旭書承冠軍故爾復面悲積還此得西問海鹽諸舍並未詳何人書獻之白不審疾鄱陽歸右並羊欣第八此郡之弊蘇太簡子耆謂之與王述書及一昨得安西及增慨三帖真迹自蘇氏歸我家淳化閣帖十跋此帖有顧從義釋文考異最詳盡然不可不參是跋也第一卷漢章帝書當是後人集漢章草法如聖教序類耳王著既謬稱章帝遂有謂千文不創自興嗣者得無愈失之耶晉武帝書品譜斷賦述俱所不載嘗見米芾所臨其大小帖幽深無際出有入無自是衛索間風度賦述僅稱元帝如發硎刃虎駭鶚視孝武如露滋蔓草風送驟雨文孝王雅薄綿密纎潤至康哀宣明簡文皆所不載覽其遺墨盡是夙工晉世書法之盛如此宋明略見賦述齊髙頗著能品梁武晉安故是箕裘黃伯思謂安軍破堽數朝三書糾繞若出一手定為贋作此殆未然帝王書多摹則前軌不解創構結法偶同亦何緣懸斷耶宣以祖後孫道子以弟先兄梁髙梁武判作二人著手如懸鎚何以無半册六朝史在腹良可笑也文皇大笴白羽取天下籠蓋一世而矻矻墨卿毛頴間工篤若此伯思謂吊江叔藝韞二帖為髙宗書核矣謂枇杷移營亦髙宗未有據也夫髙中二帝冝不辨菽麥乃髙工八法中能五言豈混沌一竅耶叔懷弟也臣也不當先伯智且置唐後則文孝王亦不必在宋明前皆著誤也第二卷張有道書變章法創今草為古今第一昔人謂其如清澗長流縈洄崖谷交龍駭獸奔騰拿攫今此諸法帖俱有之米元章以真迹久絶疑為長史書恐長史不便解此耳書詞祖希時面祖希張玄之也與大令同時其結體小踈亦在山隂之下余嘗疑其為大令書又以為張融思光巵言載之甚詳八月一帖自古雅米元章黃伯思謂崔子玉為唐人書無所據謂鍾元常宣示帖為右軍臨書白騎遂帖為大令臨書長風帖為逸少少年時書却琅琅可據雖然買王得羊尚可况贋元常真右軍大令哉皇象文武帖寫東觀校書郎髙彪送第五御史針語後一表云是唐人書亦以章法類有道八月帖耳書賦稱其龍蠖蟄起伸盤腹行書斷稱其沉著痛快才力似蔡雍而妖冶不迢肩吾品以上下葛洪謂之書聖然哉張茂先王茂𢎞一時名臣然俱入能品二帖風稜髙利雅亦相當元子有真淳之稱似未若虎兒恨不及見耳王氏諸彥無非上乘所謂觸目琅玕寧獨風範世將兩表評者謂得元常心印惟草四日帖為髙平三世豪翰評者謂方四章健逸發骫髀亷稜獨表光絶覽之故當爾爾衛公自誇得伯英骨與索靖一臺二妙似不及索安石虛和流動著品不弱帖所云道民者五斗米道也皇恐再拜政是佞其師尊耳米顛不知便意非真噫亦輕于持論矣書法至晉魏極矣縱復贋者臨摹者三四刻石猶足壓倒餘子詩一涉建安文一涉西京便是無塵世風吾於書亦云張華稱丞相王珉稱司徒衛瓘位至太保止稱尚書令皆王著不讀書故也第三卷庾元規書媞子江淮間呼母為媞書箱計是奉母作此人亂天下大舅不下桓元子但才不足可翼既蹇蹇書法亦古雅第欲遂比野鶩得耶按啓事似上陶太尉者沈嘉字長茂竇臮評其勢捷而踈鷙擊失中杜預二帖米元章黃伯思以書辭疑之過矣晉語雖不俗故大不可解伯思又謂劉超筆與元帝近因絶外交不應復有此帖絶外交語出自竇蒙然謂其一帖三行存者或即此耳徽操渙凝皆逸少子鳳毛鬱然懷祖乃有書名坦之不聞箕裘也今法亦似小拙司馬攸即齊王也見能品賦云突兀嵩華參差斗牛許之至矣劉瓌之御史中丞代王子敬題太極殿榜者賦稱元寶剛直兩王之次以僻故不能書其索征西前一帖章法純古雖數經摹勒銀鈎宛然劉穆之評者比其類昻藏謇諤之士紀札誠可疑所謂俗語也張翼逸少歎小人亂真者臨倣乃有餘自運不足王敬豫導之子見能品陸士龍以下書不甚著羊敬元孔彥琳皆入妙品評者謂羊槭若嚴霜之材婉如流風之雲謂孔如飛流懸沫吕梁之水工力故不如羊耳僧虔兩啓結法與王琰乞江郢帖同端雅之極用拙筆時手辦此耶此卷前輩評駁甚衆要之不足論其筆法非後人可及也獨題庾亮為元亮沈嘉為嘉長劉瓌之孔琳之王曇首皆去其一名謂杜預司馬攸卞壼劉穆之王僧虔為侍中山新沓為太守王廞司徒左長史也目為司徒山新沓杜征西司馬獻武王索征西晉人也謝莊宋人也皆列庾太尉王海陵間著不學至此何三館諸公不一糾正第四卷梁王筠沈約書諸書譜不載王結法殊散緩沈差有意耳阮交州在上下品行草入妙竇賦比之激溜懸磴垂條晚青張懷瓘云研行草出大王若飛泉交注奔流不息赫赫躍迅此帖信有之黃長睿槩疑非真過矣蕭確者邵陵王子竇稱其寬而壯賖而密綽約文質天然超逸所書孝經一則耳真偽未可辨也蕭思話庾品下上此帖亦佳梁武帝甚重蕭子雲肩之妙品今所書列子雖志在古雅如十月凍蠅何足師尚張懷瓘云當世多影效子雲肥鈍無力者悉非也此本定贋作不然石本翻易失真出師頌故應佳恨未之見耳長睿謂禇可南謫潭府時無侍中姓薛者又謂山河帖是枯樹賦中録出者虞永興大運帖歐陽率更比年帖是碑刻中録出者真書家董狐也率更行草圉圉寒儉吾未敢服膺懷瓘乃謂其跌宕流通驚竒跳駿不避危險示之二王可為動色羊簿以後略無徑敵豈吾見其杜德機耶夫欲以殘縑斷石寂寥數行而盡千古士難矣徐嶠之浩父賦述稱其婭姹鍾門逶迤王後陸柬之吳郡人書斷入妙品謂其工於倣效劣于獨斷今二帖與薛稷帖皆佳李北海翩翩自肆雖行草不同亦雲麾筆也陳逵晉人為中郎將今列之陳薄紹之宋人為丹陽尹與羊欣齊名今列之唐王著真村老開卷便供盧胡第五卷為蒼頡夏禹孔子史籀李斯程邈宋儋衛夫人古法帖隋朝帖智果帖梁武帝評書及何氏二帖蔡琰我生一帖敬祖一帖孤不度德亮白二帖懷素右軍一帖張旭晚後得足下二帖無名氏移屋及意識二帖著亦以時代錯雜真偽難辨故别為一本耳頡文科斗祝融峰神禹碑絶無此法至史籀皆偽作無疑黃長睿謂李斯田疇一帖乃李陽氷明州刺史裴君紀德碑語其字體亦當爾謂程邈所作𨽻書今漢碑中字此為偽搆果也宋儋開皇中人仕至校書郎竇蒙評其祖鍾而體流著亦不曉耶智果書梁武帝評乃袁昻疏有梁武帝答詔耳書辭不同者深山道士帖為栁産疏為袁嵩舞女仙人為蕭思話疏為薄紹之龍跳虎卧帖為梁鵠疏為韋誕疏不載王右軍評辭及遺李鎮東程曠平桓玄范惟均孔琳之帖不載孟光祿何者為正耳吾嘗怪其訾子敬薄伯英以為未當何氏者長睿謂為不知何氏以為歐陽率更亦以其書法近之耳敬祖一帖以為子敬語法俱似之或好事者摹其書若聖教序之類孤不度德二帖極與子敬帖中章草相同而差小移屋二行外遒緊飄逸及意識帖俱絶佳後有羊欣二字是欣書也第六卷為王右軍書開卷頓爾神豁米元章黃長睿謂適得書至慰馳竦耳皆近世不工書者偽作中間結體小踈韻度落凡時或有之謂盡偽作則吾豈敢惟殷生帖法既淺促又是輳合晉人書語為不得真耳然亦非郗愔書也七兒帖為之一慨甫過知命婚娶多畢種種琳球至惡者猶是道韞郎便堪樂死何必阿述始爾飄然與周益州諸帖意皆佳問君平子雲後然汶嶺遊目終否素願山川濟勝須種夙根耳景風帖謂是賈曽送張悅文唐人集右軍書果也庾子嵩逸少伯父行今稱子嵩似亦無害彥國老不得爾晉人固似其父况他人乎昔人謂右軍內擫大令外拓此大凡也元章諸君子泥之故右軍筆稍大者涉放者皆定其非真迹不知此公龍爪金錯變化萬端區區蠡管求之毋乃為永和諸賢笑地下乎第七卷右軍書多神妙都下帖當今人物眇然而艱疾若此令人短氣慨覽今昔末運所乘賢俊併墜致足摧感黃伯思謂初月至前從洛帖皆偽毫髮惝恍間非吾識所能辨也皇象帖楊用修謂勿勿非勿三也係石筆誤然此三字甚明恐是三思之三因促還皇象草故止之勿三耳承足下還來帖後有釋智永字流放無一筆鐵門限法或云是智永臨右軍書亦非也帖尾謹此代申不具非晉人尺牘語智永自作無疑自慰毒熱二帖云唐文皇臨本當别有據小園子帖米謂大令書似也右軍父子俱在神品安得不交有結法豈因展筆小縱便爾致疑當由內擫之言誤之也十七帖遊目汶嶺又復諄諄必欲果此一假竒事然自謂年垂耳順作書後不久當遂之岱矣不惟西遊未果汶嶺即岷嶺用古字升菴辨之甚詳第八卷昔人謂死罪帖足下各如常帖為非右軍書蒸濕帖大令代父書吾皆不辨然淡悶干嘔咸古字須右軍乃解作此蒸濕帖固一二大令風又焉知非乃公偶為之耶凝操徽渙咸有家學何據定為阿敬代筆也不去人間而欲求方外此或速弊是際竟語慨然慨然第九卷大令書神情散朗姿態超逸有御風飱霞之氣令人作天際真人想一時羊中散輩相推尊之光豔騰踔幾掩乃公梁唐二帝擬之河朔少年又辱之餓𨽻要之文武之政耳卷巾奉對帖是郗家離婚後語雅非敬懷不能作宋司空職遂纍大雅玄度帖翩翩敬筆第帖辭曰仁祖欲請為軍司謝仁祖卒時敬方十三不應便及時事長睿辨之極當但結法不類右軍恐方回書耳薄冷益部二帖米顛辨為歐陽其險近率更手也如非六朝後尺牘何長睿書絶不及米持論往往勝之者米以法黃以事差核耳第十卷大令書吾當託桓江州疾不退至分張帖元章諸君子謂為長史藏真贋迹吾不能辨第謂長史藏真去此尚三舍耳合觀伯英草與此結構同恐是大令創草黃長睿所論崇虛觀建自宋明帝泰始四年以此證書之偽亦得之然書筆鬱徑遒發縱出自餘子譬啖恆山紫花梨亦以為快也大令似不分右軍吾不知之習右軍者自虞永興褚河南後不能得一筆大令筆往往落李北海處趙吳興及爾時祝京兆手腕指間當自有神物司之敬安能強哉小祗園主人王世貞跋元祐拓本閣帖按法帖譜系及輟耕録所載二王府帖即淳化祖拓元祐中魏王從禁中借極拓百本墨用潘谷木多裂文夫淳化太宗元祐哲宗帝凡五世年已百餘且慶厯中詔僧希白模于祕閣去太宗未逺尚翻石以兾遐傳寧有百餘年而木板尚完好者此帙墨雖淡而橫紋甚夥牟學士巘遽定為元祐中豈有據而然乎抑失去篆尾之謂耶前有西野逸人禁林近侍二印後有李氏珍賞等印蓋宋金陵李泰家物也嘗侍光寧兩朝故有是帖豫特定為祖本以示世之博雅正德二年武功康海題劉模淳化祕本宋熙陵淳化閣采厯代法書以棗木刻置禁中大臣執政者即拓賜之此乃劉次莊模刻者復以楷書釋于後與舊刻相伯仲又在徽廟太清樓之前雖止存六卷是猶麒麟一毛虬龍片甲亦不易得也汝昜袁華題檇李沈氏淳化閣帖昔趙文敏公于蘭亭帖有日減無日增之説誠以其贋本之多故也豫于淳化閣帖亦云何者淳化帖傳于世者贋本既多雖有真本多遇拓工不知用墨之妙而得其筆意者殊少此本凡四册蓋今兵部主事檇李沈公家藏之物不惟本得其真而且拓時用墨有法致筆意不失為世不多見者惟沈氏子孫其寶之哉資善大夫南京吏部尚書蕭山魏驥識御賜官本閣帖此先朝官本帖賜侍書李邰者今歸蔡相家宣和殿御書此二十三字作三行徽宗瘦金書於前後有尤袤沈揆跋失録社友屠用明嘗謂余曰丁卯秋在武林得此官本閣帖只第八卷貯以古錦囊紙墨之佳目所僅覩遂傾槖得之未幾失去深用怏怏余因舉泊宅篇云前世法書名畫有傳之祕閣者謂之閣本流俗看書但云閣本則翕然稱美范文正公知睦州奏以唐處士方干配嚴光位干為御史方蒙逺祖下鸕鷀原取畫像家無以塞命鄉人但塑一幅巾道服者置之祠中元祐間有旨下諸郡取前賢所寫真命所在如法圖進睦守以嚴方應詔後人見玄英之像豈不謂之閣本哉夫當時所重若此宜乎今之追惜也乃鬱岡筆麈云世以淳化帖為法書之祖然皆王著臨書非從真迹響拓雙鈎者何以知之余見宋時御府所藏晉人真迹及唐模右軍帖多矣凡閣帖所載僅得其髣佛甚則併點畫形似盡失之豈有摹脫真迹而舛盩如是至於賞鑒不精真贋并收連綴蠧蝕不成文理又其小小者也學書者欲據之而希蹤鍾王不亦逺乎知此似可解脫若庸流徒珍贋本又奚啻供玄英像耶時用明索方干祕稿入唐詩統籖因話及此玉水泉州帖淳化官帖宋時已如星鳳今海內止傳一本是周草窗家物在頂庶常所時往索觀咨嗟嘆賞以為神物下真迹一等此耳閣之支甚多世亦無復存惟泉刻較祖本稍瘦而摹鐫特為蕭灑有生氣買王得羊不失所望謂是耶吾聞項本初在華東沙史明古家華得其九史得其一文待詔為之和合兩家各稱好事連城不吝延津終年其難致如此第得泉本日夕臨池助以筆意亦是快事豈其食魚必河之魴董其昌觀因題宋拓閣帖泉本第六卷泉本以淳化法帖翻刻於泉州郡庠至洪武四年知府古任常以劉次莊釋文敘而刻之仁宗皇帝命取入祕府人不可得而見矣是拓雖僅此卷神情爛漫真泉州善本也聞之先子云古帖不必全即斷圭數行亦是可寶曽憶秋朗叔得東觀古帖一本於吳閶攜歸項玄海見之賞玩不置及玄海檢所藏東觀本恰少此卷即強售補之即此一段竒緣可見物之尤者全與虧從來並行於世樂卿藏此以待緣偶何如戊辰臘月社弟髙孟超題淳化泉本第六是王右軍書向為姚禹門太史所藏後歸先荆翁日置案頭摹玩嘗云拓之新舊較然于紙墨無庸贅也據閣帖考異第六卷差涼帖內二行泉有斜裂紋伏想嫂帖內篤字泉模糊其中是本則然他刻完好清明足徴宋拓無疑焉崇禎戊辰臘日余過髙公玄居畫禮所供思憶觀音係丘彌陀塑撥瞿仙泥金夔龍阮閲王蒼之韻帖及泉州殘本乃李霞舉所遺與古半硯結鄰者余嘖嘖嘆賞歸而簡得此帖示公玄笑曰我爾真夜郎王矣然片璜半璧猶勝瓦礫如山果筆筆為我效用勝人多多許也余首肯久之更泫然見先人手澤隱隱古香間砢玉記祕閣續帖元祐中御府所藏真迹除淳化帖外刻續法帖不可得而見矣嗣是徽宗有太清樓續帖孝宗淳熙間有祕閣續帖卷尾題修內司恭奉聖旨摹勒上石此帖不易得其第三第四卷皆右軍書多縱筆變體極可愛內四月一日帖及後右軍諸子書稱𢎞白黃長睿謂為偽帖欲去之甚當第文壽承以為中數帖類米老所臨者則非也此帖刻于哲廟初米老書學尚未著不應其摹本已達巾禁當是唐人臨帖耳其第九第十所謂賀知章者似二王雜帖語今以歸賀不可知虞栁二君迹不類平日而甚有好致栁尤遒逸無名二紙其一詩亦唐語其一札似臨晉帖飛白五字出古𨽻若李懷琳書絶交書壽承以為至精無以加而山谷老人乃謂往在三館於閣下觀懷琳臨右軍絶交真迹大有竒特處今觀此十未得二三乃知懷琳之妙如此其所謂十未得二三者尚足馳騖後世也卷尾天監二年至臣雲小楷湘東所進云云行草皆懷琳臨筆今人却作嵇康書媒鬻而辨者以懷琳偽康書亦謬也唐人十二月節帖詞既鄙瑣書亦無雅致但結法差緊健中間尚可包王著周越耳大觀帖大觀帖拓于閣本既燬之後重出御府墨迹勾填入石較閣帖眉髙二寸有竒與諸行列語句亦多不同主之者為蔡京前標後題皆京筆京事業不滿人意而書學視王著稍勝故所拓有一種雄傑之氣與潭絳諸本厭厭學步者不同婁東楊中祕叔􅉅嘗遺余此帖云是汪象先物未知果否徊水玉精飲人識太清樓帖淳化閣帖化身為潭絳泉汝戲魚井欄往往不脫本來面目獨太清樓帖乃遜功帝出祕府真迹令劉無言輩摹勒登石無言妙于勢風韻尤勝人謂太清為淳化介弟母亦陳氏二方難為伯季者耶大觀凡十卷太清復有後十二卷則祕閣續帖僅改其標目耳而益以人間所流傳十七帖及孫過庭書譜云弇人絳帖宋尚書郎潘師道用淳化閣帖增入别帖重摹刻二十本于絳州北墨北紙極有精彩比淳化本又髙二字陳繹曽云骨法清徑足正王著肉勝之失豈但如昔人以絳為淳化嫡子乎後入晉王府不易得矣潭帖淳化帖頒行潭州摹刻一本與絳帖鴈行宋慶厯間長沙僧希白重摹本亦佳紹興間第三次重摹者失其真矣元陳繹曽云希白摹刻潭帖風韻和雅骨肉停勻但形勢俱圓頗乏峭健之氣石在潭之郡齋黔帖黔江帖北宋秦子明者為長沙副將買石令郡人湯正臣父子重摹僧寶月所翻閣本法帖世所稱潭帖者載歸壁之黔江紹聖院者此本字情墨法的係宋拓之佳者但以曹陶齋譜系考之多有參互處汝帖汝州帖乃摘諸帖中字牽合為之每卷後有汝州印後會稽重摹之謂之蘭亭帖其石不佳弇州以王宷輔道守汝州因遍搜諸碑帖篆分𨽻草而節取之自皇頡夏禹以至錢忠懿郭忠恕得十二卷其所留淳化亦不過十之一二自謂甚博而且精而不知其所得者多虎賁重儓之類耳且自以險急偏傾之勢發之石理粗而刻工拙所謂鮑老當場郎當舞袖者耶第其刻在汝大類社之樗今尚可拓也方衆甫汝志以汝舊有望嵩樓樓四壁皆帖石㟏嵌輶軒至輒拓以擕去人患苦之後因樓燬有司采此瘞之馬廄者積數十年迷不知所向矣成化中廄有光怪馬數夜驚察之是錮帖處因掘出洗刷置州吏舍是帖竟不知誰何人所拓也蓋閣帖自澤絳下摹刻極多即宜備一穜如關漢卿髙則誠雜劇不妨諸優各自般演鼎帖跋凡二十二卷紹興二十一年通判趙子濬刻今年春正在吳閶得王伯谷所藏宋拓絳帖頃擕以自隨疑為澧州帖觀其每數十行輒有武陵二字又疑為鼎帖及入常武署中翻閲第一卷以宋太宗為辨跋曰太宗皇帝御筆在絳州摹為諸帖之首後欵名曰鼎州提舉曰沅辰判事常武為鼎州而武陵其附城邑也乃定為鼎帖特為絳州二字所誤而世人只知有絳帖遂誤為絳州帖可絳帖鼎帖星鳳樓羣玉堂黔江澧州淳熙祕閣續帖世皆無傳至有對面不識者余乏具眼猶知牀頭捉刀為真魏武耶志此俟他日語伯谷了一公案也乙巳六月七日舟次城陵磯時自常荆校士還武昌書其昌武岡帖武岡武陵帖皆淳化之冢嫡世不多見今遂至二十卷實為竒絶刻拓婉峭時有勝于淳化者不可為耳食人道也其昌余見千金帖後又見顧研山秋壑閣帖又潭帖鼎帖星鳳帖獨晚年獲見武岡帖皆諸帖所未經刻者即刻者姿態翾瘦真異本也繼儒武陵帖二十卷較諸刻增益最多然博而不精臨江二王帖晉二王帖右軍上中二卷大令一卷前為二像扶侍者各一蓋宋臨江石刻也黃伯思謂淳化閣帖多贋本惟十七日等帖後有文皇敕字一卷最佳此本則汰去閣帖中之偽者而博采諸收藏家真迹及諸名刻命好手雙鈎上石掩映斐亹劇有生氣為書家一代冠冕是帙故弇州物也澄心堂紙李廷圭墨標之曰宋拓第一崇禎辛未中秋日歙友黃規仁持來獲觀於東雅堂臨江戲魚堂帖宋元祐間劉次莊以淳化閣帖十卷摹刻于臨江除去卷尾篆題而增釋文在潭帖之次陳繹曽云此帖在淳化翻刻中頗為有骨格者淡墨拓尤佳星鳳樓帖宋尚書趙彥約刻于南康雖衆刻重摹而精善不苟陳繹曽云是帖南宋曹士冕摹刻工而有餘清而不穠亞于太清樓續帖此外有利州帖宋慶元中劉次莊以戲魚堂帖并釋文重刻石于益昌其釋文字畫較臨江帖稍大又蔡州帖臨摹絳帖上十卷刻石出于臨江潭帖之上彭州帖亦刻歷代法帖十卷不甚精彩紙類北紙東庫本世傳潘氏子析居法帖石本分為二其後絳州公庫乃得其上十卷絳守重刻下十卷足之一部名東庫本其家復重刻上十卷亦足一部于是絳州有公私二本靖康兵火石並不存後金人重模者天淵矣若賜書堂帖宋宣獻公綬刻于山陽有古鐘鼎識文絶妙但二王帖未精石已不存後有重模本寶晉齋帖宋曹之格模刻在諸帖中最下為星鳳之子玉麟堂帖汴人吳琚居父模刻穠而不清多雜米家筆仗蓋琚字類米芾故也羣玉堂帖韓托胄刻所載前代遺迹最多後亦有宋人書至今有潘氏淳化閣帖乃潘允亮自摹入石顧氏淳化閣帖乃顧仲義借潘氏所藏宋本摹勒上石復刻淳化法帖釋文考異最為詳確餘刻玉泓館蘭亭栁公權蘭亭十七帖蘭馨煙條等帖潘氏亦鐫宋本蘭亭後有趙文敏公十八跋欲考閣帖者不可不知其支𣲖也甲秀堂帖尚有雪溪堂帖為王庭筠所刻寶晉齋帖為曹日新所刻曹昭明以此帖五卷為廬江李氏刻前有王顔書多諸帖未見後有宋人書亦多未見乃王元美以為廬山陳氏刻近多模本其真者頗淳雅可愛蔡中郎九疑山碑雖見宣和書譜而行筆絶類開元孝經陳思王詩及鷂雀賦亦然黃伯思辨其為李懷琳贋本極可據也惟眉山豫章襄陽諸尺牘奕奕有姿態耳東書堂帖周憲王為世子時手摹上石大約以淳化為主而祕閣續帖亦時有刪取至宋太宗以後蘇黃米蔡諸家勝國虞趙鮮于之迹皆與焉亦曽進御憲王臨池之力雖精惜天資少遜故粉釋有餘膚理不足蓋摹筆使古人之迹屈而從手必雙鈎廓填始可免此病也寶賢堂集古法帖晉靖王為世子時以閣帖絳帖大觀寶晉為主而益以邸中所藏宋元及明人墨迹摹勒上石于行欵次第頗不俗第石理既粗而摹刻拓三手俱不稱以此在諸帖下當孝廟時常進御親為手書褒美之其所自敘頗夸詡墨迹之盛而所見寥寥乃爾也真賞齋帖帖三卷第一為鍾太傅薦季直表初在相城沈啓南所李貞伯吳原博俱定為真迹後歸華氏第唐以來落何人手不入天府及竇臮賦述肩吾懷瓘品斷中又卷首有米芾印芾自言生覩真迹自晉而止無漢魏者寶章待訪諸録亦不言太傅此為妄益無疑結體雖與宣示墓田少異余嘗評之分法十六楷法十四要非二王以下人手第二右軍袁生帖妙甚徽宗時進御者第三唐人摹王方慶進先世書凡二十八人其存者僅此內右軍二帖有篆籀𨽻分法黯淡古雅出蹊徑之外餘帖雖有剛柔擫磔之異種種可玩沈啓南嘗從華氏乞得令文徴仲雙鈎復刻停雲館中此華氏本也摹本既精拓法亦佳為爾時法書墨本第一留山房中歸耕作勞假以散力世貞此即唐人所進萬嵗通天帖而首益以鍾書耳項孟璜家唐摹本即張句曲所嘆賞以為不見唐摹不足以言知書者清士篋中不多得妙迹遇拓本善者即應作難遭想矣况此石已災倍宜珍襲日華文氏停雲館十跋第一卷晉唐小楷自右軍黃庭至子敬洛神雖極摹拓之工然不離文氏故步虞永興破邪論敘規倣曹娥神明不足耳率更心經陀羅尼咒雖用筆甚徑而結法小圓似不類碑石存者隂符經真草兩帖俱有小法顔書麻姑壇不如舊本拙而存古意歐陽永叔謂魯公無此筆非也此是東方朔家廟碑縮小者度人護命經如匹銅雀遺瓦令人寶愛豈惟翰墨已耶第二卷唐人雙鈎王方慶所進真迹後有嶽珂張雨諸跋右軍二帖無上神品大令光祿并餘迹縱橫妙境雖再經摹勒回睫一閲諸迹喪氣李懷琳偽叔夜書見諸書苑甚詳此君精能之極幾于悟解胸次不甚髙故小乏風骨耳後湯文二跋亦詳縟可喜第三卷顔魯公祭姪文有天真爛漫之趣行狎之妙一至於此噫此草稿耳所謂無待而工者忠義真至之痛鬱勃波磔間千古不泯陳深陳繹曽文徴明三跋亦該洽稱是朱巨川告徐國柱流吏楷耳懷素千文作小行草號千金帖貴在藏鋒而少飛動之勢林藻郭郎帖古雅殊勝非後人可及楊少師神仙起居法後有米友仁商挺留夢炎諸跋山谷極推重之至目以散僧入聖昔人云張茂先吾所不解余于少師亦云第四卷宋名人書李建中宋初第一手蘇黃諸公起乃稍稍掩之書家者流譏其庸拙此行筆可見杜祁公行草僅免俗耳而耳觀相臾至黃裳陳晹跋如小兒塗鴉胡重也永叔鄉社老人動止供笑乃頗自矜許豈獨知人難哉文潞公乃無論結構亦老逸可念王荆公本無所解而山谷海嶽爭媚之何也中間僅一二紛披老筆蔡君謨二紙差強人意然多圉園未暢坡公語老共四紙雖結法小異而俱能於形勢外取態頴叟存故事耳惟顛米九帖燁燁光彩射人趙氏法書當以此帖第一其與人札云張旭俗子變亂古法髙間而下但可懸之酒肆後人評米書仲由未見孔子時氣象亦略相當人苦不自知耳第五卷蘇才翁子美各一紙宋人謂才翁書法妙天下則不敢信比之子美較老蒼耳子美亦自有字學范希文司馬君實如邵伯之甘棠不以書也馮當世范忠宣亦然林君復有書名而此不稱此外如少遊參寥薛道祖范文穆薑堯章李元中皆有可觀文穆南宋人誤置此中第六卷為南宋名人書如王定國錢穆父賀方回陳簡齋皆元祐政和間人文氏誤耳米敷文陸祕監之竒逸張千湖之調暢韓子蒼定國方回之老健虞雍公之儼雅皆有可采者張即之大擅臨池惡札之權垂此行押差未敗者耳朱紫陽張敬夫文信國儒林國禎千秋尚新豈在書乎葉少藴筆不佳嘗仕顯矣好構撰其人才亦下中第七卷為元名人書鄧文原二札皆有清令之色昔人評鮮于太常如漁陽健兒姿體充偉而少韻度此札殊有米顛糾糾風骨必仁亦瀟灑可念虞仁壽札似傷佻康里巙評者謂其雄劍倚天長虹駕海不無曲筆又謂如鶯雛出巢神彩可愛頡頏未熟末語得之巙又言吳興日可作萬字儂可三萬字恐無此理趙彥徴周景逺吳興之優孟揭曼碩顧伯防陳敬初之魯衛他如胡長孺袁清容饒介之張貞居王叔明不無一二佳者要亦偶然之合耳倪元鎮筆如風女兒灕漇長袖豈為丹青所攜借耶以俟鑒者第八卷為吳興趙文敏書行草尺牘若干首遒媚清麗妙有晉人風度小楷常清淨經千字文各一篇精工之極妙逼黃庭洛神惟凡骨未盡換耳昔人謂之儀鳳沖霄祥雲捧日又云上下五百年縱橫一萬里舉無其敵真知言哉第九卷宋承旨濓舍人璲各一紙書述稱宋氏父子不失邯鄲覺舍人小縱耳承旨翩翩有顔米筆詹孟舉敘字小楷可謂精能宋克章草書于彼法中太儇露未是合作然已足壓卷解學士似為銜橛所苦未甚馳驟然踠足差少禎明舉舉出藍之能沈學士一頌一札清婉流媚故是當家然與詹生俱淘洗宿習未盡書述謂沈大理毬鞠少年危帽輕衫然哉徐武功是米書之儇浮者馬刑部是米書之病狂者劉西臺是吳興之局促者李少卿愛寫此疏是其得意事故出得意筆有純綿裹鐵之狀張汝弼以小故佳耳再一展便不足言第十卷為祝京兆允明書古詩十九首秋風辭榜枻歌嘗從文嘉所見真迹清圓秀潤天真爛然大令以還一人而已顧華玉跋不能佳文徴仲代為書石者後有陳道復王履吉題字亦可觀書𫐠一篇京兆評國初至考正名筆差許仲溫民則而惡汝弼其所揚扢皆當味其微託固欲與吳興狎主齊盟矣書法倣章草不能造微亦自不俗此王元美先生所跋為停雲初拓本後入孫過庭譜增毛澤民李端叔王定國諸家其兩宋人倒置者改正焉王肯堂太史云近世盛行長洲文氏停雲館帖皆作待詔父子手腳而小楷尤為失真之極不特晉法書亡即褚虞歐顔筆意蕩然無遺矣吾友董玄宰刻戲鴻堂帖亦一色自書即雙鈎林印安及萬帖有王涯永存珍祕印大卷前有梁秀浟閲古書印後有殷浩印浩以丹秀以赭是唐末賞鑒之家其間有太平公主胡書印王溥之印是五代相家寶藏侍中國壻丞相子也淳化中太宗嘗借王氏所收書集入閣中十卷內郗愔兩行二十四日帖乃此卷中者仍于謝安帖尾御書親跋二字以還王氏其帖在李瑋家余同王渙之飲于李氏園池閲書畫竟日末出此帖棗木大軸古青藻花錦作褾破爛無存模晉帖上反安冠簪樣古玉軸余尋裂擲棗軸池中拆玉軸王渙之加糊共裝焉一坐大笑要余題跋乃題曰李氏法書第一亦天下法書第一也又晉謝奕桓溫謝安三帖為一卷上有竇蒙審印謝安帖後以濃墨橫拓遂全暈過後歸王詵家分為三帖云謝安帖以墨重暈唐人意寶此帖而反害之也李瑋云亦購于王氏晉右將軍會稽內史王羲之行書帖真迹天下法書第二右軍行書第一也帖辭伏想朝廷清和稚恭遂進鎮云云長慶某年月日太常少卿蕭祐鑒定在王禹玉家後有禹玉跋以門下省印印之時貴多跋後為章子厚借去不歸其子仲修専遣價請未至是帖亦甚草草石工又庸劣故不能大勝停雲玄宰書家能品作此欲傳百世乃出新安吳用卿餘清齋帖下甚可惜也此論與弇州俱為得之珂玉識珊瑚網卷二十一
