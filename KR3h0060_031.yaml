body:
  text: 珊瑚網卷三十一明汪砢玉撰名畫題跋七錢舜舉浮玉山居圖著色小卷長二尺題跋甚多直文華殿四明金湜篆首瞻彼南山岑白雲何翩翩下有幽棲人嘯歌樂徂年藂石映清泚嘉木淡芳妍日月無終極陵谷從變遷神襟軼寥廓興寄揮五絃塵影一以絶招隱奚足言右題余自畫山居圖吳興錢選舜舉吳興公蚤嵗得畫法於舜舉舜舉多寫人物花鳥故所圖山水當世罕傳此卷蓋其自寫山居景趣既高筆墨精妙尤為合作詩亦雅麗非近人語僕以戊子秋七月得於書肆如獲古圖史云因次韻識嵗月於後秋風動巗樹歸鳥何其翩我思巗中人可以樂忘年夫君乃詞客畫手故作妍吳興圖畫藪詎隨時好遷上巗雲積雪下巖水鳴絃展卷才尺許坐對兩無言山澤􅋯者張雨題於開元靜舍之浴鵠灣霅溪翁吳興碩學其於經史貫串於胸中時人莫之知也獨與敖君善講明酬酢咸詣理奧而趙文敏公嘗師之不特師其畫至於古今事物之外又深於音律之學其人品之高如此而世間往往以畫史稱之是特其游戲而遂掩其所學今觀貞居所藏此卷并題詩其上詩與畫稱知詩者乃知其畫矣至正八年九月八日大癡學人黃公望稽首敬題時年八􅐆無官落得一身閒置我當於丘壑間便欲松根結茅屋清秋採菊看南山顧阿瑛餘不之水浮玉山仙人來往乎其間圭璋藻思發天巧粉墨絹楮留人間錢翁山居窈綿密深潤山林閟白日翁去而今能幾年舊游一變成荒烟惟有墨跡長不泯夜夜白虹光滿天遂昌鄭元祐舜舉偏工著色山如斯水墨畫尤難蒼茫樹石烟霞外合作營丘老筆看楚石道人題何山西上道場山山自白雲僧自閒至人不與物俱化往往超出乎兩間洗心觀妙退藏密閲世千年如一日翁今仙去未百年人民城郭俱飛煙囊楮題詩留粉墨劒瘞豐城光在天倪瓚次韻遂昌翁所賦庚戌錦城方天瑞𤣥英先生後人得白雲山居圖倣佛桐廬山中隱所錢舜舉真跡别是一種風致漫系以詩山村老人仇逺翼翼山千朵蕭蕭屋數間石崖不可渡門徑幾曽關緑樹經秋在白雲終日閒依稀鏡湖曲西島水回環延祐四年九日書於杭城北橋題山居圖後草年前余閲錢舜舉山居圖於璜溪沈悅梅宅生紙用筆得王右丞家法緑淺墨深細膩精潤真與唐人爭衡圖為張貞居伯雨所得和詩一篇詞㫖甚逺詩法精妙殆非時製余初學貞居書以悅梅為吾壻張訓舅氏從其乞得之置古墨林卷中書雖存而圖則缺每有神劒異處之嘆成化癸卯二月四日恱梅之子志行以義新授承事郎載酒往賀出圖贈余兼得黃子久鄭明德琦楚石倪元鎮仇仁近諸作展誦之餘不忍釋手篝燈滄江虹月舟中且閲且和几得四首惟志所喜罔知形穢不可與古並也雖然古今人未必不可相及故韓退之送楊巨源嘗一言之余可無言以附尾耶神劒合并豈亦係之天也余之後人尚保勿失後學姚綬記右第一跋初得之為虹月舟物也故志喜以云然為物於虹月知第幾哉豫又初見之於今之日焉仲夏二日鼎追次諸作霅溪回羣山山勢相聯翩霅翁構山居往來已多年得趣自寫圖林壑香且妍起處與歌嘯於此無播遷外有白板扉中有朱絲絃貞居事品藻亮為知者言右張貞居先生韻展圖不獨可娛閒妙絶當求古作間長願眼明如此日短篷隨地看佳山右玉山顧阿瑛韻客常笑我不買山我愛水竹村幽閒石梁平坦行可度吠犬鳴雞鄰舍間昔人養性藏深密懶出户庭消永日花開花落罔知年補屋牽動蒼蘿烟錢公畫圖好山樹一緑交映如春天右遂昌鄭明德韻山麓沿溪上山居入樹間雨香泉决决風細鳥關關僻地真堪住新圖不等閒一時諸作手價重玉連環右山村仇仁近韻倪元鎮之作乃鄭遂昌韻故不次耳綬記霅錢之竒墨非勾曲玉山遂昌雲林山村諸大老不能以有聲之畫相為竒也非吾雲東逸史又安能繼諸老後塵其不為虹月舟聚竒也邪鼎題山居辭溪有山兮山有居山中之人兮樂何如朝開窗兮雲合暮開窗兮雲舒水循除兮宛轉樹繞花兮扶踈蔭前簷兮高栁摘南園兮佳蔬社祈年兮飲酒客乘月兮驅車囷屢登兮新榖架盈插兮舊書或託友兮麋鹿或混跡兮樵漁咏衡門兮翳翳忘夏屋兮渠渠既理亂兮不知曷庸心兮毁譽山中之人兮樂有餘故吾薄世味兮早歸歟吾適所安兮維其朝暮吾知止足兮庶幾無過山居兮伊何可抱元兮養素啓户牖兮見彼南山居之安兮意高閒仁者樂兮在靜日自落兮雲自還山中兮有猿有鶴四時之交兮良不惡起處食息兮於斯難以告人兮吾心之樂考槃澗阿兮碩人之軸獨寤歌兮獨寤宿瞻菉竹兮淇園歎白駒兮空谷彼寫圖兮人斯高世之士兮係以詩百年文物兮豫得之覩其物兮渺余思三月十又九日逸史重題錢舜舉畫品甚高人以花鳥見稱蓋未嘗多見其山水故也觀此山居圖七分用墨三分設色筆法絶類輞川復入顧愷之之域趙松雪素所師資豈真阿私所好哉况貞居於書肆中一見此圖而賞識之復和其詩語意冲淡字畫清逸無慚是翁大癡云知詩者乃知其畫亦名言耶故余大書特書不一書而足也是日綬過石雲橋記深墨寫山石淺緑敷樹林人家足亭榭魚鳥相浮沉古渡風扉合平橋野色侵日日塵中客於焉肯幽尋吾乎辨此志清世早投簪佳境若真有時攜孤桐琴一寫山林樂允契千古心古人得佳畫不限於大小幅或橫卷縑楮仙佛古賢花鳥樹石龍水之類米芾畫史首載晉人顧愷之戴逵不二三幅筆彩生動為不易得比及六朝有唐附以五代如張僧繇王維者蓋不多得其人古今一揆余得舜舉山居圖佳甚何在長幅大軸耶更越數百年即舜舉之筆何可得也政猶米芾之於顧愷之王維輩是己貞居謂如得古圖史者誠哉是言越三日甲寅過鴛鴦湖書水閣新展卷山居舊寫圖樹陰紛若有嵐氣逺還無上下峰巒互東西浦淑孤藍田莊子上單夾可風乎我欲移清霅沿流借好山塵飛隱几外趣在卜居間新水游魚動斜陽倦鳥還輕肥五陵內能得幾時閒展卷復展卷賦詩還賦詩鳥啼山葉晝人坐野花時暫輟任公釣重𤣥墨子絲風流千古事今日渺余思山裏貞居者摛詞類古人書當北海妙句逼杜陵真握筆消清夜開圖對好春都將眼前水洗盡半生塵挑燈論畫法尚友重文章夜色自爛漫歌聲方抑楊茅峰仙夢逺霅水墨波長二百年餘物來登逸史堂展閲生新喜吟哦結舊知燈花紅靡靡劒鍔白差差品藻當居上斯文合在兹鄰翁笑豫老樂此不為疲晡時書於西麗橋下跋後又和韻四首自為韻騷體三首唐選一首五言律六首喜甚而不已於詞由乎物之佳甚而不厭心目口手故也豫耄矣心目之不厭可倣佛吾丹丘一二口手之倦甚則虹月之一冗客况鄭倪仇顧與丹丘主人曠世相友豈桐村牧可穢厠耶八十三翁桐村周鼎書于武唐舟次山居圖歌吾地水竹有獨恨青山逺今得山居圖詩篇喜盈卷此圖何人作乃是霅翁選霅翁山水落墨強畫法駸駸乎晉唐矮屋不類緑野堂怪石絶似黃茅岡白雲去來書滿牀主人偃仰清晝長東菑西瀼無遺老樹外小橋迷碧草展圖不復得此翁松雪齊中昔為好齊中盡是搗玉塵等閒不許天風掃人雖已矣卷長留人得文章才夀考吁嗟得圖難攜上步虛壇毛骨盡森爽瀼瀼零露寒零露寒峭無語若山對面相爾汝今年借居擬避暑蔚然深秀閟行旅朝開暮闔窮煙霏誰能來此行采薇願圖幻出一拳石千巖萬壑爭光輝美哉仙伯貞居子得圖賦詩有如此百年遺吾勝百朋二老之神何日死貞居霅翁生同時時有先後云誰思水竹仙村永為寶星斗射虹光陸離落花茫茫絮漠漠一度披圖一歡樂我尚攜登天祿閣右歌張燈時始於分鄉鋪成於本覺寺明日𨽻古於皂林石門之間非欲夸有惟志愛之無已焉耳三月草三立夏日逸史綬題記舟中賴此能消日半匹溪藤意趣多霅叟畫圖凌晉宋貞居詩語逼陰何山回樹繞門空設雨過風輕水不波誰個躋攀窮險阻一聲長嘯出烟蘿過語兒溪賦七平長律十七韻蒼茫空濛還分明諸峰盤回如天成遙看津頭浮虹船紆徐空中擎金莖探幽窮竒相攀緣乘凉披紛聊征行東塗西皴殊連延高張低垂皆輕盈簷阿暈飛凌層霄䦨干蛇紆圍孤坪逶迤分岐村園深依稀穿雲橋梁平滄洲汪洋微風吹交流空虛斜陽橫丹青何時消餘間乾坤斯翁留其名藍田人亡遐吾思茅山仙來增詩情臨池揮毫千軍佳開圖游心雙眸清馳驅將追前修蹤咿嚅尤慙羣賢聲駑駘惡乎超神駒鷦鴮胡然儕遷鶯書題聯翩雖誇多揄揚優柔難求精孤懷悠悠清輝堂長波蕩蕩吳興城并刀裁淞誰之盟餘光當分吾諸生是月草五日余因訪韋庵廉訪使假榻於吾杭靈芝寺之碧鳳堂對雨無聊捉筆書此逸史記三日不展卷何異隔三秋今日一展之頓然消百憂片紙與隻字古人尚見收矧兹美圖史契我山居幽林鳥當我啼石瀨當我流寄傲倚南窗濯足弄扁舟回視五陵內輕肥乃浮漚吾生寶此卷俯仰儘優游在碧鳳堂人來索了清逋日紛如也比夜則飢蚊惱懷遂徹燈火無暇展卷四月二日早飯罷題余自辭官來忽忽十五年餘有志世外真樂凡於古人圖畫翰墨有關乎此者輒收蓄之今年春既得錢舜舉山居圖其上有張貞居和章脫去塵土深愜所志不越月又得羽客惠松雪學士遺扇一握絹素絶不剝爛手書七言四句云古墨輕磨滿几香研池新浴照人光北窗時有涼風至間寫黃庭一兩章於志又復愜之何幸疊得吳興二妙並皆珍重乃兼記耳我能山中行未能山中居他日故園裏跂望空躊躇黛色干雲霄相去百里餘誰開依林窗誰抄種樹書無山有水竹聊將襟抱舒况得山居圖詩什深起豫願言住西湖既樵而復漁方伯劉閻諸公邀余游吳山之紫陽菴飲至酣暢因得以窮山水之樂明日大參韓公復邀豫泛西湖登宴于靈𨼆寺山行凡兩日感而賦之逸史記人見余題山居圖太多或者笑之或者知余懸懸此圖餘二十年一旦得之譬諸與一交好者别久乍見必傾倒不自知言之重且復也此則知余者也士信於知己屈於不知己從古為然何足異哉是月三日西湖書院飲歸燈下記此中段長句二首一三月草三日舟至本覺寺作一草五日抵靈芝寺作又七言律一首語溪舟中蓋草四日也五言選二一則四月二日在靈芝一在靈隱不日最後一跋署是月三日則靈隱之作於是日跋於是夕前後凡二十餘首亦自訟其太多貽或者笑又自解曰士屈於不知已信於知已豫固非真知己者不笑其多愛其敏而贍也特笑其嗜古成癖有自溺以效蔡太保之顛欲巧為之解得乎既而强余續貂豫欲強分此卷為二物移虹月於桐村上也則怖余以米顛之自許分則死不許焉余亦以其所怖余者怖之坐客􅌓眙哄然一噱曰古今癡絶代不乏賢端陽前三日周鼎書前輩風流不可得得見風流在遺墨無聲詩數霅溪翁妙句尤能淡無跡黃鶴樓中寶藏久題品曽煩井西叟迂倪跛鄭相後先唾落珠璣欲盈斗𤣥英有孫白雲房又解轉藏人所藏回首桐廬好山色也曽仇覽栖鸞凰翩翩鶴背羣仙去環珮餘音渺何許神光吹不散罡風斗畔時時夜吐虹雲東逸史獬豸衣嗜古急忙如渴飢等閒光怪手可招筆底竒珍皆我歸銀海波寒蕩明月玉池秋水暖生肥對此不覺融心神吐詞連連如轉機古人今人曠百世前身後身無乃是卷舒舒卷兩相忘猶自不能忘夢寐漫將華鳥評吾霅一紙青山落屏几衮衮篇章題未盡癡黃言其學有本若為詩畫掩其名自古美才天所吝歸來乎雲東子所逸所勞者何事答言一掬硯池春儘力工夫了於此門外冗塵間自起方自揮毫掃生紙苕霅二溪同一水安知溪上山峩辨不在鴛湖鏡光裏明年甲辰春正月乙卯書於雲東仙館時年八十有四鼎識奉次前韻畫法師心者難得手與心融脫繩墨政如老霅山居圖宛宛猶疑見行跡此居依山往來久又如五畝置一叟但能容膝自然佳豈怪人嘲小於斗水竹村有吾堂房須得此圖吾寶藏先朝諸老遺賦咏句曲衆中孤鳳凰霅溪流水湯湯去併入苕溪知幾許詩語長留天地間雜沓春山暖雲吐嗟余早製芰荷衣濯足滄浪每樂飢有時散步夕陽裏芳草野橋隨意歸桃花栁花次第落萬緑繞簷陰自肥漁童連翩出泛艇織婦伊軋鳴當機我思古人雖異世畫絶癡絶今亦是考槃在澗復在阿永矢弗諼於寤寐桐村考牧光前作展卷大書橫棐几乾坤清氣流不盡倡和連篇乃張本閴寥短章余附尾才如襪線非余吝便欲拓起𤣥真子撅頭細雨同其事明月太虛今古心擲却浮名皆似此如吾老牧不吝作牛腰之軸還添紙尚伺倒傾三峽水洗盡徐寧塵萬斛不使飛來吾社裏是嵗二月朔姚綬書于白雲枕書窩卷初到卷末文采何翩翩模糊山水流一紙餘百年置藏雲東館披乘風日妍仙翁愛惜重至老心不遷新題時舉筆白雲在朱絃嗟余亦何者亦尾古人言楊循吉拜觀并題錢霅川畫山居圖詠元諸名公品題詞翰姚侍御丹丘公墨妙裝池成卷項少溪主人授弟墨林子珍祕錢舜舉桃源圖始信桃源隔幾秦後來無復問津人武陵不是花開晚流到人間却暮春吳興錢舜舉千古仙源境界真桃花别有洞中春桑麻處處陰連野雞犬家家住接鄰不識衣冠詩禮晉但知狂暴虎狼秦漁郎忽見驚相問共說還為避世人豐城孫而安錢舜舉金碧山水卷目窮千里筆不到自是餘生坐太凡一日興來何可遏開窗寫出碧嵓嵓江南北苑出竒才千里溪山筆底回不管六朝興廢事一樽且向畫圖開烟雲出沒有無間半在空虛半在山我亦閒中消日月幽林深處聽潺湲胸中得酒出孱顏木葉森森嵗暮殘落墨不隨嵐氣暝幾重山色幾重瀾吳興錢選舜舉畫并題錢玉潭五星形神圖趙子昂篆書五星贊錢公妙筆天下無寫出五星形神圖五星形神不可測趙公書能具其實趙書錢畫多絶竒如今世上稱難得陳公重價構此卷礱入文房如拱璧閒時開卷一展玩祗覺神明還舊觀余生何幸得一覽耀我雙眸光似電一天風雲愁凄凄四壁圖書翻飛飛忙呼陳公陳公急掩卷形圖恐欲升霄漢九龍山人王孟端題錢玉潭臨龍眠九歌圖右九歌圖乃龍眠居士李伯時之筆而元吳興錢舜舉所摹然不必計也但楮素潔白而用筆精妙有可愛玩雖然求龍眠而不得得舜舉斯可矣其上𨽻古且是虞學士伯生所書蓋當時虞公以𨽻法名天下宜其書於此也萬厯戊寅四月六日茂苑文嘉錢玉潭寫洪崖先生像神駕馭倒景太虛時總轡𤣥道不可分直悟天人際羣從皆成仙玩世不計年何當事神游許吾笑拍肩吳興錢選舜舉畫并題洪崖先生住西山移宅深密逃人寰幅巾烏靴腰角帶濶袖袍色濃嵐斑一笻九節相攜慣矮相家僮蕉扇攀崎嶇步武轉蹣跚皂服輕袪行用辦一僮肩裸鞭白騾役駛難馭馳坡陀後鞦側畔蹺足勢奈爾决驟奔傾何藍衫執鞭競馳逐紙帽皆擎無世俗一僮扶了一僮催髙束文書赤雙足一僮緑袂麻作履臂挑莊叟大瓠壺先生家具即是此焉用檢校隨身符豫章穹嶺鑰出谷雨卷雲飛露如沐神仙作獪蹤跡竒寫到吳興錢氏屋誰傳畫卷奉誰邊妙意恰得希微憐贈以菊徑歸來篇手自執犂忘鋤庋黃犢烏犍有餘地却復千年丹發匱右洪都西山有洪崖居古刻此吳興錢舜舉臨成一卷余輒為語書之徵明錢玉潭畫竹林七賢卷昔人好沈酣人事不復理但進杯中物應世聊爾爾悠悠天地間偷樂本無愧諸賢各有心流俗毋輕議右余用唐丞相閻立本法作晉七賢圖吳興錢舜舉選并題下有習懶翁印吳興錢舜舉作七賢圖輕毫淡墨不假丹青之飾似有取於晉代衣冠雅素之美想其儀形摹其樂趣觀嵇康之友六人或歌或飲或書或琴仰天席地優游自得吁曲肱飲水浴沂舞雩豈外是哉珍藏之哲馬魯丁載拜叔夜致憎因傲物嗣宗白眼視人間雖逃於酒終揚己爭似劉伶善閉關濬沖公服駕軺車偶過黃公賣酒壚邈若山河忽興嘆竹林還憶舊朋徒牟應龍題林下晉賢凡七人山王猶謂不足云老錢定有筆外意所畫如何無此君癡兒每以形似論如此風致殊蕭然此圖真可見妙手自是胸中有七賢夏溥題三對一乃獨藉使咸以終荷鍤事已達揮絃意何窮感此聞笛友嗤彼障簏翁筆端有啓事猶纍吾山公吳暾朝陽題門巷寡轍跡靜對溪南竹溪水靜堪染竹色與分緑有時淡相向襟抱如瑩玉安得萬蒼筤遍植青溪曲豈無嵇阮輩遁世尊往躅浩歌日酣燕達生亦云足往嵗居建康第一曲與蒼筤谷相對憶竹林衆君子故有此作今觀是圖遂書于後湘中劉致七賢游竹林趣向太孤絶山王偶然貴何物遂見黜金溪徐霖錢霅川醉女仙卷人物在山水間重著色絹素上右舜舉繪諸醉女仙其鴉鬢宫妝者約是玉源夫人輩其披髮卉服者逮是華陰宫人輩其炫晳暴膩者或是女几宛若輩至頽首舜姿而袍而束而纎靴露其肱殊不可解豈天魔舞遺艷耶故相與沉酣紅翠耶抑玉潭臨摹舊本耶此畫正如仙花示幻觀者應作蒲團水月觀錦窩老人題余又有宋人作毛女四幅識之者曰此亦錢舜舉筆也女形甚偉貌多豐艷或披翠羽或遮錦褌或編瑶草或掛瓊葉五彩爛然有絡鞮者有靳角者有兩兩踹駢趾者手各有執為鏟為筐為畫卷為雲母肩各有負為琴為扇為書帙為藥物為花果又各有所隨為鶴為鹿為猿為貍逸致灑灑焉供之一室中欲行欲止欲笑欲語欲分餐欲贈句宛然軟絲幛上南嶽夫人也癸酉春效米家書畫船訪舊於玉峰婁水間回值鬻古者示方鼎色如翡翠意欲得此四圖并名筆妙箑十握成窑五色盤盂及垍玉種種遂舉易之未幾囊空將鼎共宋畫百冊質姚尚書岱之處意若有所失然四圖幸有臨本在樂卿記錢霅川宫姬戲嬰圖殿閣森森氣自清不知人世有蓬瀛日長無事宫中樂閒與諸姬伴戲嬰吳興錢舜舉筆綵殿風生月扇秋內家新樣玉搔頭侍兒折得宫花看笑弄嬌雛不自由林伯恭小殿南薰扇影涼鳳雛嬌語倚新妝手中折得宜男草雨露深恩到北堂林伯庸金屋春閒午漏遲寧王玉笛罷愁吹嬰兒還自可人意索乳看花嬌更癡匡山李潤字士玉日長别院停針線瑜珥瑶環引一雙風靜緑蕉交鳳尾新涼分得到紗窗王渙跋錢霅川竹深荷淨李晞古樹石李龍眠人物畫史中俱列妙品只此圖能兼二絶真錢玉潭得意筆也鄧文原題豫家有玉潭翁三仙對奕圖每明窗靜几輒與友人展玩覺有生氣勃勃兹于民瞻齊中更得覩此恍若置虛舟于渭川澤畔清風習習自澗谷中來也直令人有遺世之想陸輔之吳興錢舜舉畫種種臻妙獨是卷寫少陵詩句務脫鉛華歸之冲淡竹樹扶疏冠裳嘯咏而當時一假納凉景色宛具筆端誠佳品也昔人謂王右丞畫中有詩吾於舜舉亦云雲間沈粲錢舜舉碩鼠圖爾形可憎無牙穿屋貍奴當前終難飽腹霅川翁錢選舜舉筆老穗纍纍落燒烟不堪嚼嚙汙殘涎玉堂學士存深戒為爾重歌碩鼠篇中書禮部員外郎元水貞翻盆觸鼎勢紛拏姦黠睢盱類不殊暫放田間尋野穗絶勝官廪作穿窬儒學提舉陳庭實黠吻工饞恣陸梁粟初黃候未登場君看一穗填渠腹可信年年盜太倉前集賢待制馮子振奉皇姊大長公主命題炎日催黃一穗雲田間飢鼠己嘗新翳行竊步安能飽紅腐倉中粟正陳趙巗古者大蠟迎貓為其食田鼠也禀質於陰竊民食以苟生猶惡而除之彼何人斯剝民肌髓以自奉尤可惡之甚者不抉其黨而盡去之民之害不息也噫蔡文淵斂袵敬書七尺長身愧負多清時空食幾囷禾營營倉鼠才分寸不奈詩人總譴訶翰林直學士袁桷敬題禾黍連雲待嵗功爾曹竊食素餐同平生貪黠終何用看取人間五技窮集賢直學士鄧文原敬題六月汗如雨誰信農家苦一粒未沾唇先飽田間鼠集賢學士王約華黍如雲已報豐止憂鼠穴未能空土風才及迎猫祭想得今年八蠟通國子博士栁贊苦盡榖才黃將收欲上場農夫未到口田鼠已盈倉直賢大學士陳皓詩人連類等丘山著意尤深一粟間九鼎雲雷富魑魅也應川澤破神姦監修國史長史李泂嘗謂李斯稱碩鼠相因紅腐豈云多畫工不作貍奴捕猶繪冥冥盜一禾翰林國史杜禧錢舜舉草蟲圖詩多集唐不録右霅川翁草蟲一卷精工絶倫即徐熙易元言不過以細巧得名不若此之奕奕生動纎悉具備殆以畫筆而兼化工者歟榮陽鄭彞錢舜舉瓜蔓圖嗟余憶昔少年日杖劒束書隨處適一朝游至青門東赤日炎炎何太炙枯腸渴吻難留題眼底幡然遇生客問之不肯言姓名乃是秦侯之子息勤勤拉我臨家庭淨掃蒼苔頻拂席氷盤托獻家園瓜始信東陵有遺蹟不比江南蕩子漿無限清涼透胸臆曽將家譜求新題還把中書掃香墨别來已及三十年欲覔他方無處摘今年作客來儒林偶見此圖深太息錢公舜舉非常倫好把珍藏莫輕擲高門積德如海深天錫此圖寧易得花英簇簇攢金錢瓞蔓綿綿添翠色子孫繁衍如此圖萬古流芳延世澤攜來索我題長歌不管胸中寸略窄興來但覺毛骨輕筆陳縱橫風雨疾雲西梅屋秋風展蔓熟平原翠葉金花密更妍憶昔邵平侯去後青門聲譽至今傳三山陳士竒吳興畫史擅良能筆底生春寫八稜寒嚼水晶思老杜味過崕蜜感東陵秋風落雨清殘暑夏日和氷解鬱蒸瓜瓞綿綿多賦咏子孫宜爾世相承嚴瀨上瓊簇簇青枝似錦鋪東陵傳入種天厨畫工細作丹青巧煩暑猶堪賽酪奴蜀山人虞集題東陵遺舊業千古播圖看耿耿金花簇綿綿翠瓞攢刃分瓊液潤齒嚼水晶寒陽節均能守流芳永世安雲西蔡瓛瓜蔓圖為王敬美所藏甲寅秋玉得之婁友云李薊丘秋清野思卷首題此絹高一尺長五尺許六硯齊三刻多遺誤大德庚子冬十二月息齊居士為友人仇仁父作嘉禾之寓舍坡石上前作小枯木四株小竹前後共六竿石傍細竹叢石大小五瑰蒼筠倚喬木古色秋逾好誰能著茅亭相伴此君老如是翁周景逺氏印聞仲賓方苦時行力疾為仁父作此圖尚能如此蕭散敬歎敬歎孟俯子昻說法已敬不必重贅大德五年三月草日困民鮮于樞拜觀虎林隱叟東坡嘗謂與可胸中自有成竹乃見於筆下今觀仲賓所作修篁徑節猗猗生意無盡非胸中有成竹其能若此耶噫大德壬寅中元日應桂以上書於絹上極目荒墟落木中空山人靜澗泉舂秋來不用為霖雨留得閒雲養卧龍文原秋清野思寄心象外語也仲賓畫此意不必行楚村疏蕪間大德六年魯郡吾衍題布衣道士石惹殘雲樹帶烟猗猗蒼玉正蕭然若人寫出胸中趣知道平吞幾渭川蜀普陳嗣昌青龍集己酉春正月十有二日㑹稽抱遺叟楊楨與吳郡張習古汲袁用雲間朱芾隴西李擴同覽于張氏麟三味軒所露沐疏篁葉葉青病蘇凉閣思橫生山人神往風塵表如見留題數老成梧溪居士王逢題時嵗癸丑十有草日也席帽山人王原吉氏醉居先生落筆處一竹一石病容開焚香披向幽齊看想見秋清野思來曲江錢惟善曲江居士錢思復氏秋風環珮玉珊珊出谷篔簹野思閒惆悵謫仙歸去後空留清影落人間永嘉曹睿薊丘筆法殊蕭爽與可風流竟未忘安得眉山老居士為君重記墨君堂華亭袁凱薊丘竹木出毫端便覺清風入座寒亦有高人明月夜夢回恍惚聽鳴鸞蔣季和一代衣冠李薊丘篔簹落筆似湖州題詩諸老并淪沒風雨江南幾暮秋天台陶九成誰持并州刀剪此秋練淨蕭蕭三五竿常帶月中影細林山人周之翰幽篁裊裊倚雲根舊雨空林淡墨痕欲覔薊丘吾老矣嵗寒心事與誰論雲間陸褧息齊墨竹文衡山𨽻于卷首大德癸卯夏四月息齊道人為蹇提舉鄉友作于王子慶祕校家之寶墨齊僕觀息齊墨竹多矣此卷老嫩榮悴風晴備盡意度尤可寶玩吳興趙孟俯題息齊墨竹雖曰規模與可蓋其胸中自有悟處故能振迅天真落筆臻妙簡齊賦墨梅有云意足不求顔色似前身相馬九方臯余於此公墨竹亦云大德七年閏五月望雪菴道人溥光謹題道人天機精心胸飽氷雪揮灑墨篔簹清風掃炎熱風晴與老嫩榮悴各分别珊瑚海底生琅玕挺竒節儼如坐推篷昏目一光潔王孫美詞翰筆勢蟠屈鐵偉哉老雪菴妙語重為說暮生何多幸從容復披閲此圖世所稀撫卷嘆三絶吕敬西清閣老李薊丘筆法妙過文湖州試拈雪繭翻墨瀋淋漓掃作湘雲浮籜龍迸玉翠胎綻秀出亭亭蒼玉幹十莖五莖何必多老嫩風晴總堪玩堅貞苦節凌嵗寒裊娜新梢翔鳳鸞靈飈宛度珮環響璧月或照蛟龍蟠薊丘薊丘難再得撫卷令人空唶唶品題况有松雪翁從知價重千金值義陽偶桓武孟息齊道人骨已仙紙上墨竹神猶全淇園萬幹總枯死此幅自待留千年丰姿瀟灑宛如玉顧我得覩崑岡前汲泉便試竹罏茗一洗萬慮開雲天誰知珍重承㫖筆猶來景肅儕高賢乾坤妙趣苟心㑹似勝俯默窺遺編雪菴老人通萬卷銀鈎鐵畫如扛椽古來人物誇道子傾城女色誰爭妍黃郎得此賁書屋玉函金籥來何緣古人邈矣見心跡何由一拜聊隨鞭徐源敬題仲山十年一見黃叔度倐來自為清風吹手中所把薊丘竹風晴老嫩凡數枝茒堂六月發蕭爽呼酒酬此瓊林枝想當此老握筆際其用在手筆不知縱橫妙用竹神死手亦無用心能之道人之心竹之祖生生化化無窮期松雪雪菴兩題辭書中有法後世師我因書法論竹法道理一致曽無歧卷中三物總神俊蟠螭舞鳳看威儀還君什襲當祕惜雷雨破壁寧無時後學沈周題溫日觀葡萄較六硯齊三刻微異舉世只知嗟逝水無人微解悟空花此一聯乃大唐貫休禪師之佳句也皇宋溫日觀為書之為後人策勵之端仍為寫龍鬚于後癸巳年三月卅日扁舟至天佛院晴窗晚興有兄副寺寶之此後寫葡萄一幀紙長宜以好詩書之為後名勝笑攬明月清風宗炳社夕陽秋日庾公樓修心未到無心地萬種千般逐水流日觀濃淡纍纍半幅披却疑月架影參差憑君問取乘槎使還似宛西舊折枝蜀益川張夢應敬題至元壬辰維夏書于雲間寓舍吳綃蜀繭筆底墨雲飛一片㸃㸃秋腴收得驪龍頷下珠興來一掃惜處有時慳似寶霧葉烟條幾度西風吹不凋减字木蘭花山陰曽寅孫奉題昔年添竹延秋蔓露葉離披馬乳寒今日天涯忽開卷還如架底夜涼看一片秋雲江上影老禪收拾入蒲萄小窗剩有詩為伴不博凉州意自高鄱陽仲輿葉衡題老僧妙墨遍中州好事攜將萬里游要識色空同不朽龍鬚馬乳等浮漚上饒陳鳳飛墨浪黏天潑潑枝纍纍數顆翻雲衣南風吹到燕山外帶得幽香巢底歸敬題日觀手卷後明瑞頓首辛卯㑹稽王斗祥觀于武川吳氏明逺樓題溫日觀葡萄滿筐圓實驪珠滑入口甘香氷玉寒若使文園知此渴露華應不乞金盤鄧文原金谷風露凉緑珠酒初醒錦帳不成眠月明墮清影虞集馬乳垂垂實龍鬚細細柔摘來堪釀酒不去博涼州彭城錢鼎子溫字仲言號日觀又號知非子華亭人宋季元初萍海四方止杭之瑪瑙寺善草書喜畫葡萄鬚梗枝葉皆草書法也世號溫葡萄時貴慕其畫贄金求之一筆不與逢佳士遽命紙筆雅好著恢帽短衣囊錢果猖翔街陌探囊投市中人問識溫相公否由是進止輒擁小兒呼溫相公時有賓肖羅漢醉則維筆竿杪草聖芬媚詩人遂有長竿醉草賓羅漢短褐徉狂溫相公之句溫性嗜酒然揚總統飲之酒一不霑唇每見則曰掘墳賊掘墳賊云云西吳龍惕子識於俠香軒珊瑚網卷三十一
