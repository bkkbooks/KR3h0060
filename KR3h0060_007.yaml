body:
  text: 珊瑚網卷七明汪砢玉撰法書題跋宋髙宗宸翰行書詩四首在白宋紙上後述通鑑數則不錄入門無平田石路穿細嶺隂風生澗壑古木翳渾井湛盧誰復見秋水光耿耿鐵花秀巗壁殺氣禁蛙黽幽幽生公堂左右立頑礦當年或未信異類服精猛胡為百嵗後仙鬼互馳騁窈然留清詩讀者為悲哽東軒有佳致雲水麗千頃熙熙覽生物春意頗凄冷我來屬無事暖日相與永喜鵲翻初旦愁鳶蹲落景坐見漁樵還新月溪上影悟彼良自咍歸田行可請髙居大士是龍象草堂大人非熊羆不逢壞衲乞香飯唯見白頭垂釣絲鴛鴦終日愛水鏡菡萏晩風凋舞衣開徑老禪來煮茗還尋宻竹逕中歸陳留春色掩思詩一日搜腸一百迴燕子初歸風不定桃花欲動雨頻來人間多待須微禄夢裏相逢記此杯白竹扇前客醉舞煙村渺渺欠髙臺種竹不必髙摇緑當我楹向來三家墅無此笙簫聲皇天有老眼為閟十月晴䕶我蕭蕭碧偉事鄰翁驚同林偶落此相向意甚平何須俟迷日可笑世俗情明年萬夭矯穿地聽雷鳴但恨種竹人南山合歸耕他時夢中路留眼記所更蒼雲屯十里不見陳留城思陵楷書付岳武穆手勅真蹟在帋上得卿九日奏已擇定十一日起發往黄舒州界聞卿見苦寒𠻳乃能勉為朕行國爾忘身誰如卿者覽卿奏再三嘉歎無斁以卿素志盪冦常苦諸軍難合今兀术與諸頭領盡在廬州接連南侵張俊楊沂中劉錡等共力攻破其營退却百歩之外韓世忠已至濠上出鋭師要其歸路劉光世悉其兵力委李顯忠呉錫張琦等奪回老小孳蓄若得卿出自舒州與韓世忠張浚等相應可望如卿素志惟貴神速恐彼已為遁計一失機㑹徒有後時之悔江西漕臣至江州與王良存應付錢糧已如所請委趙伯牛以牛舊嘗守官湖外與一軍相諳委也春深寒暄不常卿宜慎疾以濟國事付此親札卿須體悉十九日二更付岳飛上用御書之寳大方印任押髙宗行草洛神賦書絹上后欵云徳夀殿印花石綱間四海分西湖日日雨芳春孔明二表無人讀徳夀宫中冩洛神趙巗胡邦衡劄子銓伏䝉臺慈頒賜細肋上樽敢不跪受然顔有靦矣朝夕奉詣硯廬以謝伏幸台照右謹具呈宫使中書舍人台座正月日左奉議郎賜紫魚袋胡銓劄子盧陵蕭楚子荆建炎中自號三顧隠客胡銓邦衡師事之以春秋登甲科歸拜牀下告之曰學者非但拾一第身可殺不可辱勿禍吾春秋乃佳既卒銓志其墓門人諡曰清節先生所著有春秋辨子荆不甚著故記於胡公札後崇禎元年立冬日陳繼儒記忠簡公翰墨甚佳阜陵常問公曰卿冩字宛如卿為人公答曰臣㓜習顔真卿字今自成一家又曰朕前日侍太上於徳夀宫閣上治疊書畫因得卿紹興戊午所上封書真本太上與朕玩味久之喜卿辭意精切筆法老成英風義氣凛然飛動太上自藏之曰可為後代式但其後為秦檜之所批抹汙者朕啓太上令工遂行裁去裝揩公封事藁有周益公楊誠齋二公題跋在後公孫搢廣西僉憲刻於融州真仙巗此一段佳話補眉公未盡云委宛洞天有芒氏名玉者識於碧月珪几韓忠武王二詞遺蹟冬日青山瀟灑静春來山暖花濃少年衰老與花同世間名利客富貴與貧窮榮華不是長生藥清閒不是死門風勸君識取主人公丹方只一味盡在不言中右調臨江仙人有幾何般富貴榮華總是閒自古英雄都是夢為官寳玉妻孥宿業纒年事已衰殘鬢髮蒼蒼骨髓乾不道山林多好處只恐癡迷不了然右南鄉子世忠張樞相方少翁詞翰無利無名無榮無辱無煩無惱夜燈前獨歌獨酌獨吟獨笑况值羣山初雪滿又明月交光好假便饒百嵗擬如何從他老知富貴誰能保知功業何時了算簞瓢金玉所争多少一瞬光隂何足道但思行樂常不早待春來㩦酒殢東風眠芳草右滿江紅果卿張昇生逢垂拱不識干戈免田隴士林書圃終年庸非天寵才初闒茸老去支離何用浩然歸美似黄寉秋風相送塵事塞翁心浮世莊生夢漾舟遙指烟波羣山森動神閒意聳回首利鞿名鞚此情誰共問幾許淋浪春甕右黄鶴引方勺勺著泊宅編者汪龍溪手札去年得血疾半年有餘今春誤食胡桃能下血則知胡桃當忌也汪藻彦章順理行將去隨天分付來又書陳簡齋詩蹟耿耿虛堂一榻秋人間髙枕幾王侯亂雲未放曉山出片月不隨寒水流檢校一身渾是嬾平章千古得無愁湘波見説清人骨恨不移家阿那州山居水堂長日静鷗沙便覺京塵隔鬢華夢裏不知凉是雨􅐈簾微濕在荷花雨過妾家長千里春慵晏未起花香襲夢回略略事梳洗粧臺罷闚鏡盛色照江水郎帆十幅輕渾不聞櫓聲曲岸轉掀篷一見兮目成羞聞媒致辭心許郎深情一牀兩年少相看悔不早酒歡娯藏􅍐園嬉索鬭草含笑盟春風同心以偕老郎行有程期郎知妾未知鷁首生羽翼蛾眉無光輝寄來紙上字不盡心中事問遍相逢人不如自見真心苦淚更苦滴爛閨中土寄語里中兒莫作商人婦長千行風雨吳江冷雲天故國賒扶頭呼白酒揩眼認黄花客夢蛩聲歇邊心雁字斜明年又何處髙樹莫啼鴉九日家中去非史稱簡齋河目海口大耳聳峙其出處氣節翰墨文章為中興大臣之冠盖匪直詩名出后山之右已耳雨舟寳峴樓蓄名賢遺墨甚富此固其甲乙品云元嗣漢齡其永寳之嘉靖二十七年中秋日石川張寰偕岳子漳餘鑒賞于横山堂距兩舟仙逝忽九易春秋矣撫卷悵然者久之石川陸放翁草書大聖樂詞電轉雷驚自嘆浮生四十二年試思量往事虛無似夢悲歡萬狀合散如烟苦海無邊愛河無底流浪看成百漏舷何人解問無常火裏鐵打身堅須㬰便是華顛好收拾形骸歸自然乂何須著意求田問舍生須宦達死要名傳夀夭窮通是非榮辱此事由來都在天從今去任東西南北做个飛仙㳺陸務觀書長相思詞五首雲千重水千重身在千重雲水中月明收釣筒頭未童耳未聾得酒猶能雙臉紅一尊誰與同橋如虹水如空一葉飄然烟雨中天教稱放翁側船篷使江風蟹舍參差漁市東到時聞暮鐘悟浮生厭浮名回視千鍾一髮輕從今心太平愛松聲愛泉聲冩向孤桐誰解聽空江秋月明面蒼然鬢皤然滿腹詩書不值錢官閒常晝眠畫凌煙上甘泉自古功名屬少年知心惟杜鵑暮山青暮霞明夢筆橋邊艇子横蘋風吹酒醒看潮生看潮平小住西陵莫校程蓴絲初可烹淳祐戍申八月下浣笠澤陸㳺書放翁手簡二通真蹟行草在楮上游頓首拜仲信學士老友兄即日秋氣寖清伏惟尊候神相萬福兒子婚事甚荷留念初正以吾輩氣類故敢有請已令媒氏具道其詳尚何疑哉今又䝉垂誨已抵龜而决矣餘令媒氏禀日自此遂忝𤓰葛何幸如之羸苶控叙草草不宣㳺頓首拜仲信即省元學士友兄㳺頓首間濶頃叩甚至忽奉手帖欣重秋雨尊候輕安外禪師遺墨甚妙恨見之晚輙題數行不足稱發颺之意皇恐得暇見過不宣㳺奉簡明逺老友文字共四軸又五册納去五𣲖圖四軸數日前已就付來人去矣㳺放翁以詩名重天下受知周益公范文穆為中興大家嘗讀其劍南集愛不忍去手思見其人而不可得今得觀此二帖恍然如侍左右何其幸哉然放翁在當時不以書名而遒麗若此真所謂人品既髙下筆自然不同者也二帖一與仲信議婚一為明逺題卿禪師遺墨放翁到今不為久逺而此三人者皆不可知昔蔡明逺鄱陽一卒爾以魯公之書而傳仲信既與翁結婚而禪師遺墨有見晩之恨則二公要皆非尋常流輩人矣而余皆不知之鄙淺可笑此卷既歸墨林墨林博雅好古而蓄書極富必能考以補余之不迨也嘉靖戊午仲冬廿日後學彭謹題徽國文公朱夫子手帖熹頓首拜覆竊聞卜築鍾山以便親養去囂塵而就清曠使前日之所蹔㳺而寄賞者今遂得以為耳目朝夕之玩竊計雅懷亦非獨為避衰計也甚善甚感所恨未獲一登新堂少快心目耳䝉諭鄙文此深所不忘者但向來不度妄欲編輯一二文字至今未就見此整頓秋冬間恐可錄净向後稍閒當得具藁求教也所編乃通鑑綱目十年前草創今夏再修義例方定詳畧可觀亦恨未得拜呈須異時携歸請數日之間庶可就得失耳未由承晤伏紙馳情熹頓首上覆東三傳以讀春秋事猶可略也據綱目以考通鑑法不可不備也其始終條理之際而且下問如是極精微矣凡銘識率因其家子孫門人所述類多掩惡溢美之辭使富道徳而能文章者從而書之則必傳信於永久以張忠獻公之賢紫陽先生猶有悔况餘人乎故雖契家不肯假借凛然春秋之意世盍所知懼哉延祐改元詔取士一用朱氏學髙郵璛京口郭畀同觀于虎林般若僧房時八月十有四日敬書正治元年嵗在辛酉十月十八日敬觀於寓意齋桐山蘇希則再拜謹志右徽國文公考亭夫子手帖一以辭譔墓志一以致問起居而以編輯通鑑綱目義例得失取正於人皆不書官職名氏其誨已誨人之意藹然見於言表至今二三百年後風範猶在目前先生文章事業昭在簡册又豈後學窺其涯涘又奚待於稱揚褒美㢤今京口何彦徵得之於其外祖郭畀天錫彦徵寳而藏之亦庶幾知道者翰林學士士竒楊公復議其後均得拜觀文公之手澤誦之三復起敬時永樂庚子仲春清明後五日臨川吳均端肅書京口何彦徴氏所藏文公先生墨蹟得觀者以為至幸而題識之者互相發明殆無餘藴矣然通鑑一書上下數千百年則本春秋為萬世公論而於契家事蹟乃以性命之憂為説而辭之豈耳目所及不及簡册歟抑彼此所施有不可同者歟大賢君子必有以處之此則學者所當講求也詩曰魚潛在淵或在於渚其斯之謂歟宣徳三年嵗次戊申秋八月望日南郡楊溥識𢎞濟白文澹菴白文此卷手書凡三二書如前所云一書則折簡道問安者京口何彦徵寳藏之以示予於戲先生片紙隻字流傳於世不啻拱璧之難得况此晩年之筆其所言尤後學所當矜式者耶拜觀之餘謹識嵗月于後云宣徳四年嵗次己酉夏四月己夘臨江後學金㓜孜謹識右宋朱夫子晦菴先生手書二通觀其於撰述張魏公銘誌與他書所載不同不免悔之至其所修通鑑綱目十年而後成然汲汲尚欲求正於人則知前賢於為文及著書二事其不敢忽如此後進之士率爾妄作者觀於此可不少致其謹乎此卷今藏何彦徵氏間以請予識把玩之餘遂書此於末簡以歸之闗西後裔白文楊氏勉仁白文宣徳四年己酉秋七月庚午後學楊榮謹識朱考亭晝寒書卷卷首有崐山王綸理之篆書仙洲幾千仭下有雲一谷道人何年來借他結苑屋想應厭塵網寄此媚幽獨架梁俯清湍開徑玩飛瀑交㳺得名勝還往有篇牘杖屨或鼎來共此巖下宿夜燈照竒語曉䇿散逰目茗椀共甘寒蘭臯薦清馥至今壁間字來者必三讀再拜仰髙山悵然心神肅我生雖已後久此寄齋粥孤興屢呻吟羣逰幾追逐十年落塵土尚幸不逺復新凉有佳期幾日戒征軸宵興出門去急雨過原陸入谷尚輕埃解裝上銀燭虚空一曕望逺思翻慼恧袒跣亟躋扳冠巾如膏沐雲泉增舊觀怒響震寒木深尋得新賞一簣且再覆同來况才彦行酒屢更僕從容出妙句珠貝爛盈掬往生更亹亹後語非碌碌吾纓不復洗已失塵萬斛所恨老無竒千毫真浪秃右逰晝寒以茂林修竹清流激湍分韻賦詩得竹字乾道七年嵗次辛夘月朔後二日新安考亭朱熹書於晝寒方丈成化丙午仲夏之望集惟謙年丈廨中積雨新霽出晦翁手墨見示展讀之二十餘韻亮節清詞一洗塵俗而筆法尤遒勁端重目所罕覩所惜者其先有元人跋十八家惟謙尊人貞孝先生惡之悉為屏去猶存倪元鎮一絶盖髙其品耳雖然世不乏人第以時無人之見而嚴於取亦足以見貞孝先生之正大真足以繼晦翁之芳躅矣把玩不忍置因識其末翰林編修吳釴志觀晦翁書筆勢迅疾曾無意於求工而㸃畫波磔無一不合書家矩矱豈所謂動容周旋中禮者耶翁書自言初學為蔡端明所誚曰余學魯公乃唐忠臣公所學漢奸相也及考魏武本傳云漢世安平崔瑗與子實𢎞農張芝與弟昶並善草書而操亞之則魏武之善書信不誣矣今此詩帖真有漢魏風骨視唐宋以下自别何物俗儒將元人題品盡行屏棄豈非藝林中殺風景者哉展卷再三不勝慨恤吳下王世貞題真西山與王周卿手簡在粉箋上字磨滅不能抄周卿諱徳文吾鄉王氏之先也仕宋雖不甚顯然其學實出於其曽伯祖信伯先生帖中所謂先著作是也故西山真先生也特與之遊他如魏參政了翁㳺丞相似杜丞相範王侍制遂亦嘗薦舉陵陽李侍郎心傳因謂其所交皆天下正人然則此帖豈非其一左證也哉惟顒其善藏之吳寛謹題西山先生書似草草作諦觀之乃非草草者雖不用普人筆法而亦不出於法之外豈胸次髙故落筆便自不同耶然南渡諸公如魏鶴山李心傳兄弟書亦往往相類豈亦習尚使然耶宋之書法至是又一變矣王鏊張樗寮正書金剛般若波羅宻經跋樗寮即之七十八嵗喜再逢佛誕以天台教主印講主所校本敬冩此經遺天竺靈山志覺上人受持讀誦我願執情不作常觀般若六如覺性永明共悟實相本體流通利益均及有情時景定四年嵗次癸亥昔吳闗外門有駐節字大可二尺許古雅遒勁極得大書之體余少時見而愛之先主事都水公曰此張即之筆也後於一統志和州下載即之特善大書以是知先君盖有所見云若細書則未之聞也兹偶見此經大不過指尤俊健不凡乃知樗寮不獨善大書已也書史要㑹記樗寮厯陽人厯陽在和州即今含山明隆慶庚午春三月吳下陳鎏識弟子項元汴焚香捧持於天籟閣萬厯二年孟秋朔得於吳趨陸氏又一本寳祐元年七月十八日張即之奉為顯妣楚國夫人韓氏五九娘子逺忌以天台教僧宗印所校本親冩此經施僧看轉以資𠖇福即之謹題時年六十八嵗此本為項子長憲副所藏與子京本紙墨筆法不爽毫髪越衡邑界噉香人識於修幻齋張叔夏過韓平原慶樂園賦髙陽臺詞蹟古木迷鴉虛堂起燕歡遊轉眼驚心南圃東窻酸風掃盡芳塵鬢貂飛入平原草最可憐渾是秋隂夜沉沉不信歸魂不到花深吹簫踏葉幽徑去任船依斷石袖裹寒雲老桂懸香珊瑚碎擊無聲故園已是愁如許撫殘碑又却傷今更闗情秋水人家斜照西林宋丞相文信公劄子小行草真蹟在紙上横卷天祥皇恐頓首言西行侍讀尚書宏齋先生之坐前天祥在瑞陽時嘗以一介人徃候先生盤所先生錫之書教之以聖賢向上之學若天祥者雖非其人先生不鄙夷之盖亦竊自啓發而不敢自為暴棄者也出林之日長學問之功深味前輩此語疑事事妨吾學郡未一考被召除郎即丐香火以歸不從反得鄉節辭又不獲請不得已任事往時臯司所職者才刑獄一項持去楮新有秤提又適值冦氛不靖添此一事而任大責重矣天祥以楮為本職第一事日相劘切利病詳悉開諭百姓惟恐拂戾大槩只以血忱至公風動境内未嘗専事刑威楮功之所以垂成也贑冦猖獗血江閩廣三路千數里於此天祥白手用兵丁萬人聲罪致討首尾三月冦難以平未幾天祥以先人本生母之䘮即解印歸里里之羣不逞倡為一議喧動京師天祥遂因秤提得威虐之劾未幾又謗天祥討補之敗又謗天祥隠匿重服又裝㸃牆壁數其貪私不直一錢然後知鄉評之甚難而父母之國不可以行政也昔者吾宏齋先生盖嘗為鄉漕矣其所以能鎮服一路者盖出於宿徳重望若天祥小生乍出其以召罵賈禍也固宜往議論澒洞之初縉紳之號為知己者亦皆為紛紛所動不復見察訛以傳訛宜其成鬨特先生當其時適在綠野凡天祥一時所行事先生得之閭閻耳目之近果如人言之泰甚乎噫任事之難尚矣真實體國以政事自見乃語之生事謂之妄作而虚虚徐徐相招禄仕百事廢弛一切不問反竊愛根本䘏人心之美名曾不思根本在楮人心在物價無財用何以聚人無政事何以立國奈何其是非顛倒之甚耶先生忠忱愛國者也憤世疾邪者也區區肺肝安得從先生一日傾倒求一語以自信兹者伏聞先生以新天子蒲輪束帛之勤為時一出自大司冦進長六卿典事樞顓政柄使漸知公之爵之徳之齒千有餘嵗之下煥然重光僕何幸身親見之天祥謹頓首為國賀為世道賀不特為先生賀也天祥謗毁之餘頼君相保全無大督過束禮書入深林温理故讀為吾所為自是浩然方外之想矣先生即日膏澤六合僕也蓑笠太平與受公賜臨書馳仰神爽越飛伏乞臺照右謹具申正月日承心制文天祥劄子右宋丞相文信公劄子一幅盖賀包公宏父遷官時書也其中言在瑞陽時嘗遣一介人往候先生者盖公為户部郎官上疏論董宋臣之惡不報束裝將出闗時相遣人謂其不可差知瑞州故公在瑞州與宏父通問也其曰郡末一考被召除郎即丐香火以歸不從反得鄉節者盖公以癸亥為瑞州甲子十月召赴行在除禮部郎十一月除江西提刑也其曰以先人本生母之䘮解印歸里者盖公甲子為提刑乙丑伯祖母梁夫人歿實公尊府本生母也其曰宏齋先生嘗為鄉漕者盖宏父嘗知隆興府兼江西轉運也其曰先生當是時適在綠野者盖宏父為刑部侍郎知平江府以言事召赴闕辭改知紹興又辭疑是時罷歸正在景定末年公解印時也其曰先生以新天子蒲輪束帛之勤為時一出進長六卿典事樞者盖度宗初即位召宏父為刑部尚書簽書樞宻院事封南城縣侯故公賀以此書也其曰謗毁之餘頼君相保全無大督過束禮書入深林温理故讀自是浩然方外之想者盖是時臺臣黄萬石以公不職論罷之公於是闢文山築居第為山水之㳺故云然也反覆觀之其忠正之氣凛然見於言辭之間俛仰慨慕之餘若將見之况當時親灸之者能不感激發奮也歟是書今建陽縣尹張君光啓所家藏者盖光啓之五世從祖父日中宏父之館甥也倅守興化起兵應丞相恢復閩廣後抗節以死是書之傳也有自光啓裝潢以示予留玩累日敬書於後以歸之宣徳六年秋七月望日後學李時勉拜手敬書吳有大詩帖多年書問斷湖海竟悠悠一見心雖滿相看淚忽流彩烟山色暮碧瀬月痕秋明日登程去鶺鴒河上愁山中多雨水秋晩正妨農病菜和羮煮新粳𢃄濕舂擁沙埋廢井墮石折枯松寂寂猿啼晝白雲藏數峯客行情最苦草草共清樽萬水千山路今朝好出門鴈聲低度水村深中有人敲月下門滿屋秋風燈欲暗江山千里故園心右宋吳大有詩四首余愛其有唐季人風韻試書一通壬子七月二十日雲書珊瑚網卷七
