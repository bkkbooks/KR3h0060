body:
  text: 珊瑚網卷三十四明汪砢玉撰名畫題跋十雲林春霽圖余與宗晉道兄别十有六年矣忽邂逅吳下杯酒陳情不能相舍老杜所謂夜䦨更秉燭相對如夢寐者諷詠斯語相對愴然人生良㑹不易而况艱虞契濶若此者乎以十餘載而僅一面則人生果能幾㑹耶悲慨亦未有若此言也明日道兄將歸錢唐余亦鼓柁烟波之外因寫圖賦詩以寓别後戀戀不盡之情云至正十四年二月十二日倪瓚葑門客樓書是日昔刺正卿陸季和顧思恭同集開元道士來相訪索寫雲林春霽圖别我雲林已二載去濯滄浪泛五湖滿目波容蘸山黛撩人柳眼亂花鬚避喧政欲尋耕釣源上桃花無處無五株烟樹空陂上便是雲林春霽圖仙老御風歸洞府隠君鼓柁入江湖幾回夢見青雙眼十載相逢白盡鬚此日武陵溪上路桃花流出世間無僕與雲林别已及二年雲林棄田宅攜妻子繫舟汾湖之濱日與遊者皆烟波釣艇江湖不羈之士也回視鄉里昔之紛擾如脱弊屣真有見之士也至正十六年孟秋僕侍家叔𤣥度于開元而宗晉宗兄持此見示風塵眯目展卷浩然因為和詩其上吳興王䝉題雲林溪山春靄圖至正九年四月廿八日句吳倪瓚贈王元賓之廣陵十年不見老雲林片雲東來聞足音畫圖何處㸔秋色瑶江草堂深復深鐵笛道人在滄洲軒試老溫舊頴松江山色圖癸丑閏三月六日寫松江山色并詩贈子俊茂才用答佳餉幻霞子延陵倪瓚窮冬舟過吳淞渚千里夷猶少稽古范張肆小如壺中雞黍時時慰羇旅阿兄彈琴送飛鴻讀書頗有沉潛功阿弟煮茶敲石火滿江春雨聽松風圖盡四壁醒愁睡隱儿㗳然忘世慮扁舟一葉五湖逰身與閒雲無來去三月六日天氣清為爾咏出詩無聲袖有青銅錢二百為余沽酒作魚羮牛鳴野窌中雞登山木上黄鐘雜姑洗舂容以清亮别鵠暮鳴飛流水春演漾愛爾絃手忘令我形神暢憶昔擅能事宋袁余所尚錢君生獨後超軼絶塵鞅操琴晩聞道月斧揮天匠杳如清廟瑟朱絃聽一倡古道久寂寥古音亦淪喪促軫淚沾纓歌詩重悲悵溪山仙館圖辛亥二月廿九日留華亭南里潘君以仁宅因懐其年此日與心遠同在餘不溪開𤣥仙館乃作詩曰蕭蕭風竹和幽吟二月江村春雨深東主山中此時節隔溪梅李正陰陰瓚惠山圖至正五年三月八日𤣥素先生來林下瓚乃賦詩曰吳淞江水春映空浪波沄沄霞影紅耕田鑿井居其左令我長懐甫里翁夢見維舟江畔柳剥啄敲門散杯酒整冠起接平生歡石逕蘭芳重攜手雨後共行林下正見惠山先生命瓚寫之畫訖因書此詩于上張外史陳先生見之必大笑也倪瓚記佳樹陰森欲礙空畫成夜落燈花紅絶憐帶經自鋤者未忍竟别天隨翁汾湖春雲散高柳湖水微茫緑于酒翁歸天末見青山臨風莫負揮絃手陳芳用元鎮韻惠山圖名下有白文倪瓚之印畫邊有朱文雲林印字作麻姑仙壇體為雲林畫之最佳者若𤣥素先生姓陸居淞吳江之上千頃生識惠麓圖好畫能官黑仲明長松澗下濯冠纓當年小筆今重展回首蘭陵夢亦驚仲明高昌名族也嘗為宜興嘉定二州同知甚有惠政余至蘭陵郡每館于其家偶寫此圖贈仲明而陸信甫適至復取以遺信甫雖片紙亦可觀也至正廿三年八月二日偶適志學鄉友書齋中忽以見示轉瞬十有二年矣世殊事異為之慨然志學時寓笠澤施氏館中瓚記元鎮寫贈仲明辛卯十一月二十日廿二日復從仲明許假此以贈陸信甫雲林生記八月梁溪新晝霽溪南溪北水交流徵君滌硯臨池後貌得灣碕幾樹秋王䝉秋聲吹碎江南樹政是瀟湘腸斷處一片古今愁荒碕水亂流披圖驚歲月舊夢何堪説追憶謾多情人間無此清右調菩薩蠻筠菴王國器天末遠峰生掩冉石間流磵落寒清因君寫出三株樹忽起孤雲野鶴情虞堪葛翁井上久不住一日披圖生遠思記得山中有書報白雲長繞歲寒枝殷㢸雲林畫法學王維氣韻風流或過之猶記昔年清閟閣春風吹滿鳳皇枝西郊唐元暁色淒淒涼雨過也應草木漸飄零水邊石畔無人到惟有長松滿意清張緯石磴清泉急晴山緑樹多雲林惠山下風景近如何袁養福倪迂南渚圖南渚無來轍窮冬更閴寥水寛山隱隱野曠月迢迢想像寫南渚冬盡詩意圖至正廿四年十月六日倪瓚記窈窕茅堂石徑幽小山叢桂足淹留仙人已跨遼天鶴寫得雲林一段秋錢仲益昔年㸔來墨池鵞風雨扁舟載酒過一自春歸清閟閣幾番蛛網落花多嘉禾朱逢吉蕭散雲林子詩工畫入清吟情何浩蕩筆勢更縱横鄉里推高誼江湖足令名近傳乗鶴去應想在蓬瀛華亭顧禄倪元鎮夕陽山色夕陽渡口見青山誰識其中有此閒君本為樵北山北賣薪持斧到人間壬子八月十四日為彦昇寫并題一絶雲林生不見倪迂今百年故山喬木嶺蒼烟晴窗展軸觀圖畫澹墨依然見古賢唐寅一題江亭秋色又遠山湧翠山遠初晴湧翠林深末葉藏鸎日與漁樵為侶蕭然自適餘生癸丑正月二十日雲林生寫羣山重疊勢嵯峩蓼岸蘋洲水不波落葉蕭疎風淅淅淵明歸去盼庭柯儲思誠題晴川漾漾樹疎疎西郭門頭宿雨餘如此谿山着茅屋潘郎何必詫閒居馬怡偶因滌硯寫從容㸃染那能似畫工千載風流誰可擬令人猛憶米南宫甬東顧盟元鎮所居地名蝸牛廬俗呼黄犢廬又江渚風林江渚暮潮初落風林霜葉渾稀倚杖柴門閴寂懐人山色依微一望洞庭秋水相逢南浦孤篷江干有興騷客閒居久約漁翁至正癸卯九月望日畫贈伯徴君并題倪瓚倪迂谿陰山色圖地僻林深無過客松門元自不曾關展將一幅溪藤滑寫得谿陰數㸃山滄浪漫士倪瓚居卜清幽地圖開平遠山秋雲供眼界翠竹入簷間列嶂延西爽層巒簇晚鬟送青來綺闥擁緑鎖松關摩詰難加㸃關仝未及扳汩塵何日了嘯咏得清閒馬治題風月吟哦裏乾坤指顧中萬山排濶野一雨洗長空回齋松坡平遠圖門前漠漠風吹沙閉門倦客獨思家樓頭吹角夢初醒猶聞深院響琵琶白雲蕭條楓葉丹愁人行吟復坐歎歸心夜趂東流水夢入松溪第九灘少年持家學詩禮馮老御史之孫子觴半投筆調白羽拔劍醉舞為君起至正十年九月因過郡中留學之掾郎宅五日其子思誠溫粹勤儉而好學已能持家具甘㫖之奉今年才十有七嵗矣僕既寫此為贈并賦三絶句其上東海倪瓚九灘在荆谿倪迂遊蹤多在焉此圖當是其中年作以書法最工晩年字不稱畫矣董其昌觀倪元鎮着色山水着色雲林畫世所絶少惟新安汪景辰有此殁後為人持去至正三年癸未歲八月望日高進道過余林下為言僦居蘇州城東有水竹之勝因想像圖此并賦詩其上云僦得城中二畝居水光竹色照琴書晨起開軒驚宿鳥詩成洗硯没游魚好在雲林一老迂畫圖寄到玉山居向來王謝原同調宜向城東共讀書龍門良琦又溪山亭子東海倪迂畫溪山亭子贈孟佶文學歲乙未閏正月八日戲墨重㸔十七年闔閭城外蕩飛烟閒村蘭若風波外坐對湖山一惘然辛亥十一月九日復覽重題雲林子故人一别動經年雲樹雲山隔遠烟來㸔畫圖如夢裏焚香清對意悠然與雲林高士在儒林酌别今隔歲矣謹用韻寫上海雲方丈一教之王植又溪亭山色欵下丁未五月東海倪瓚畫石滑巖前雨泉香樹杪風江山無限景都聚一亭中張宣為士雍題聽松菴裏試茶還第二泉頭更㸔山猶有去年詩興在雲林清閟墨斑斑成化庚子三月廿六日吳寛題于京師官舍倪迂仙去幾時還留得溪亭對晩山老我今為亭上客啜茶閒試鷓鴣斑卞榮次韻朝㸔雲往暮雲還大抵幽人好住山倪老風流無處問野亭留得蘚苔斑華亭奚昊倪迂林亭山色來訪幽居秋滿林塵喧暫隔散煩襟風迴硯沼搖山影夜聽寒蛩和客吟危磴白雲侵野屐高桐清露濕瑶琴蕭然不作人間夢老鶴眠松萬里心壬子秋日戲寫林亭山色復係之詩贈潘翁仲暉少致濶云耳海岳居士倪瓚亭子清溪上疎林落照中懐人隔秋水無復問幽蹤又松亭秋色阿翁好讀閒居賦桃李春風滿庭户時與華陽道士行還隣甫里先生住寶淨僧居共齋粥已㸔富貴如風露我來三宿夜連牀行路荆榛歲將暮壬子九月十九日為潘翁仲暉寫松亭山色圖并賦七言題右方瓚華屋不能留此圖秀色今來照書户夸父空將碧嶂移羽人仍在丹丘住非人玩物物玩人老墨重披眼迷霧門前桃李換春風只有青松自遲暮此圖實吾蘇貴遊家物嘗目擊其人之愛䕶比珠玉人往物移今為淮揚趙文美所得文美號賞識其致重將逾于前而保于久也雲林先生戲墨在江東人家以有無為清俗先生此筆疎秀逾常然非丹青炫燿人人得而好之于此而好者非古雅士不可先生之道殆見溢于南而流于北矣文美持來求跋因次先生韻為詩庸寓得失之嘆云長洲沈周倪迂林亭逺岫壬子九月望日過孤山大士寶淨精舍留宿十九日為寫林亭遠岫并賦無住菴主懶瓚敬亭山色青如染古徳幽居在西崦片雲出岫本無心拂石縈林晴冉冉江南帆影又江南笑㸔羣狙芋四三道遇化城聊暫止更營寶刹小禪龕又林亭晚岫小單條更有霜林逺岫失錄十月江南未隕霜青楓欲赤碧梧黄停橈坐對西山晚新為題詩小著行幻霞子山中茅屋是誰家兀坐閒吟到日斜坐客不來山鳥散呼童汲水煮新茶趙覲倪元鎮疎林亭子谿聲㶁㶁流寒玉山色依依到翠屏地僻人閒車馬寂疎林落日草𤣥亭至正庚子八月十又二日倪瓚畫并題春水瀰漫好放船疎林亭子尚巋然赤䦨干外山無數指顧蒼烟白鳥還徐霖又清溪亭子數里清溪帶遠隄夕陽芳草亂鶯啼欲將亭子教搥碎多少離愁到此迷辛亥四月東海雲林生寫并絶句題贈叔經茂異時孝亷陳君同集溪上閒亭萊草邊越山吳樹總悠然何須把袂勞相别身世江湖萬里船景星澄江浸白石翠竹俯閒亭羣樹鬱蒼蒼我心同泛萍淡菴寂寂隄上亭藹藹堦前草逸思樂此中塵心自然埽廬陵楊士奇又紫芝山亭山房臨碧海燁燁紫芝榮雲上飛鳬舄月中聞鳳笙术烟生石竈竹雪洒前楹誰見陳高士希夷善養生八月廿日為叔平畫紫芝山亭圖并賦瓚倪雲林西園圖此幅舊藏玉處今歸燕都萬駙馬矣西園山翠近相望疏渠種柳作林塘幽吟一月不出户落地巖花春雨香題詩作賦慚草草便欲相從似幽討石上靈芝三秀英臨水登山不知老至正乙巳四月十七日作西園圖并賦此詩聊為醉樵大參清賞云延陵倪瓚一作句吳玉遮親家所藏倪元鎮真蹟最多俱得之梁溪談公子此西園圖亦談君所遺用筆遒勁直是荆關再生目中所罕見者也庚午春暮衙齋寂寥玉遮過苕上訪余出此見示為之欣賞焚香相對令人俗想都忘真異品也茂苑文嘉題于烏程縣學之碧梧精舍山郭幽居圖一名荆蠻民山郭幽居正向陽喬林古木鬱蒼蒼剡藤百幅誰能置為埽虬枝蔽日長荆蠻民寫雲林雨過踏青陽磵水濺濺老樹蒼不是硯㘭雲作陣疎篁空自拂簷長尚左生次韻丘崇崇兮下有流水樹森森兮匪櫟伊梓彼櫟蘖兮且壽梓棄為薪兮于材何有造物孔仁兮時誰歸咎韋羌山人陳基千年石上苔㾗裂落日溪回樹影深我是江南樵隱者人間何處有雲林胡寧十年不鼓江湖楫木葉蕭蕭鬢影秋忽憶滿川風雨夕雲林岸口獨維舟陸繼善倪元鎮生平不畫人物維龍門僧一幅有之亦罕用圖書惟荆蠻民一印者其畫遂名荆蠻民杜綰號雲林黄長睿亦號雲林子元鎮又嘗號倪幻霞又號滄浪漫士又號淨名菴主南村隱居圖陶令卜宅南村裏快雪初晴思一遊樹辨微茫來獨鶴櫓摇欹倒散輕鷗墨池繞溜春氷滿塵榻繙書夕照收相見惘然如有失掉頭吟咏出林丘雪後過子貞隱居寫此并詩以贈甲辰正月十二日雲林瓚高人卜築避塵埃山似蓮花水面開半晝猶眠疑是夜推窗只許月明來新淦鄧伯言尋山因避俗水竹是幽居無事還終老閒來可著書餘姚景星虚堂寂寂片雲籠山色蒼蒼一望中檻外笙簧驚夢起琅玕歴亂響西風士奇我愛溪頭山色還憐竹裏風聲寂靜元非人世茅茨總是逃名澹菴山高白石秀竹密緑陰濃窗映風光埽溪流月影重上清外史避世尋幽處虚堂倚石臺響泉清磬合飛嶠畫屏開竹散風前影松垂雨後苔浮沉應不問何似小蓬萊上官伯圭蓮涇隱居圖採蓮涇上漣漪緑苔石幽篁依古木遇着疎人周傑翁邀余把臂清池曲余邂逅仲傑隱居採蓮涇上戲寫此圖并賦詩為贈雲林生倪瓚洒埽空齋住渾忘應世情身閒成道性家散剰詩名古器邀人玩新圖揀客呈可憐山水興投老失昇平此余處圍城時懐雲林詩也今道路既通猶未得一聚首為恨適允恭將此索題因書其上句曲外史張雨雲湧岡巒起伏烟籠草樹淒迷空見蘭亭筆法不逢䕫府詩題徐賁三年不見雲林面應向烟波狎釣徒忽到劉郎舊遊處桃花無地覔𤣥都癸丑重九日復觀此圖有感而作持以索題者允恭也曲江錢惟善識憶適梁溪宅于今四十年賦詩清閟閣試茗惠山泉夜雨牽幽蔓春雲黯遠天鄉情與離思㸔畫共淒然呂志學羣樹葉初下千山雲半收空林門不掩經得幾多秋澹菴書倪迂林堂詩思圖林堂竹樹藹交陰求友嚶鳴亦好音絃誦諸生時列坐邑中宓子但鳴琴七月廿三日寫林堂詩思圖并詩以遺又新茂才瓚桐里湖堂圖一名高尚書圖七月一日風雨集桐里湖邊吹夕凉柳葉鎖烟籠翡翠荷花濺淚濕鴛鴦却疑身在瀟湘渚且㸔舟停雲錦鄉顧我自非徐孺子陳蕃下榻更銜觴留昌言高尚書堂戲寫此圖并賦贈焉瓚七月一日雅宜山齋圖靈巖對植雅宜山穹林巨石臨蒼灣若翁遁跡在其麓有子讀書長閉關松根茯苓煮可握簷下慈烏去復還寫圖愛此錦步障白雲紅杏春斕斑至正乙巳五月廿三日勾吳鄉瓚畫雅宜山齋賦詩以紀歲月云陳惟寅有雅宜山齋寅號大髯弟允號小髯安處齋圖湖上齋居處士家淡烟疎柳望中賖安時為善年年樂處順謀身事事佳竹葉夜香缸面酒菊苖春㸃磨頭茶幽栖不作紅塵客遮莫寒江捲浪花十月望日寫安處齋圖并賦長句倪瓚睡起山齋渴思長呼童煎茗滌枯腸軟塵落碾龍團緑活水翻鐺蟹眼黄耳底雷鳴輕着韻鼻風過處細聞香一甌洗得雙瞳豁飽玩苕溪雲水鄉陳方安素齋圖石潤苔㾗雨過竹陰樹影雲深聞道安素齋裏能容狂客孤吟壬子十月五日余過牧軒寫贈安素居士并詩瓚芥舟軒圖一名優鉢曇花壬子正月廿三日解后芝年講主于婁江朱氏之芥舟軒中芝年熟天台之教㫖嚴菩薩之戒儀七遮既淨一乘斯悟與語久之斂袵敬嘆因寫圖賦詩以贈優鉢曇花不世開道人定起北巖隈逺山迢遞窻中緑垂柳低昻水次栽丈室凈名禪不二三生圜澤夢應迴閒雲野鶴時相遇草草新詩為爾裁瓚平野軒圖國寶照磨有平野軒在揚州城郭中今寓是十許年矣至正九年十一月在開元寺為冩此圖并詩以贈雪筠霜木影差差平野風烟望遠時回首十年吳苑夢揚州依約鬢成絲烟鶴軒圖林宗道新闢小軒南望平蕪烟樹渺然有千里之意因名曰烟鶴葢取韋刺史遠鶴唳詩語為賦二詩并繪新圖書題卷末着之軒中以發幽賞烟鶴軒前枕石眠一聲清唳落紅烟攬衣起望行雲意遠思憑虚急欲仙楓落吳江烟雨空戛然鳴鶴紫烟中坐㸔雲影横江去明滅寒流夕照紅東吳倪瓚言閒雲散盡楚江遥千古雲林竟寂寥賴有丹書遺墨在㸔山㸔水總魂消張固懶瓚竹樹小山益公以道不見忽忽今七改年辛亥七月余來自苕溪偶遇松林之桐里雙井院數日矣以道適過慧日懺堂解后一見因寫竹樹小山并賦詩寄意云懶瓚一笑相逢豈有期因懐西崦話移時李公堂裏頻曾宿陸子泉頭舊有詩旅思淒淒非中酒人情落落似殘棊雲濤眼底三生夢鷗語秋汀又語離是日性源秋水三上人同集廿一日又小山竹樹二月獨凭䦨微茫烟樹間提魚來就煮問馬只看山岸柳渾無賴孤雲相與還持盃竟須飲春物易䦨珊雲林生寫小山竹樹為蘖軒老友倪迂園石荒筠圖蕭條江渚上舟檝晚相過卷幔吟青嶂臨流寫白鵝壯心千里馬歸夢五湖波園石荒筠翳風前怳浩歌𤣥度文學工詞翰藹然如虹之氣真江南澤中駒也十二月十四日侍乃翁訪僕江渚之上相與話舊踟蹰深動故園之感因想像喬木佳石翳没于荒筠草蔓之中遂寫此意并賦詩以贈焉己酉倪瓚記𤣥度張姓春樹筠石圖芝寶丹房苔石青荒筠春樹影縱横他時夜雨尋幽約筍脯芹羞酒滿罌四月十七日寫筠石春樹并詩以贈叔平道契雲林子瓚樹影離離岸草青江雲漠漠逺山横輕舟明日松陵路逢着仙人醉玉罌袁華次韻不見雲林近十年石筠烟樹轉清妍相思每動琴亡嘆重為題詩一泫然孫敏雙樹筠石圖飛雲樓上看飛雨鐵騎驅空千里來此日使君一杯酒為解羇人萬古哀故園荒蕪尚松竹旅舍蕭條惟草萊相知賴有陳博士詩卷酒瓢時往回至正十五年五月十七日雨中排悶訪雲浦判官為設茗讌因寫雙樹筠石并賦詩𤼵主人翁陳博士袁隱者陳掾郎一笑倪瓚使君高卧北窗下徵士遠從南渚來相㸔此日足可樂已徑古人何必哀政爾歡虞留笠澤底須服食慕蓬萊畫成筠石兼雙樹日暮方容倒載回陳基和六君子圖盧山甫每見輒求作畫至正五年四月八日泊舟弓河之上而山甫篝燈出此紙苦徵畫時已憊甚只得勉以應之大癡老師見之必大笑也遠望雲山隔秋水近㸔古木擁陂陀居然相對六君子正直特立無偏頗大癡江頭碧樹動秋風江上青山接遠空若向波心添釣艇還須畫我作漁翁朽木居士天風起雲林衆樹動秋色仙人招不來空山倚晴碧澂江趙覲黄公别去已多年忽見雲林畫裏傳二老風流遼鶴語悠然展卷對江天吳興錢雲此畫因大癡詩有居然相對六君子句遂名其圖乃松栢樟楠槐榆六樹行列修挺疎密掩映位置得宜而皆在平地且氣象蕭索有賢人在下位之象豈感當時世運否塞高流隱遁而為是歟盧山甫别號白石先生妙香道者識于葯房雲松圖華林郭裏陳高士三泖九峰時一遊欲結松亭㸔雲氣更招鳴鶴友浮丘辛亥春寫雲松圖并詩贈徳嘉高士瓚雙松圖松生樗櫟間山出雲雨外付與野亭人翛然靜相對瓚瀼東雙樹出雲林曾向維䖍畫裏尋風雨滿山秋夢醒一聲鳴鶴在山陰鐵笛道人山雲自多態虎魄邈難尋千載維䖍意悠然契我心安雅曹霸能為松寫真揮毫不復畫騏驎雲晴相約空山去千載蟠根有茯苓曲江居士錢氏思復印九峰只在泖雲西松下來尋隱者棲隱者不歸空見畫滿山風雨夜猿啼廣陵居竹埜人成氏元章印雲林山水無縱横習氣内景經云淡然無味天人糧殆于此發竅此圖是已其昌初柳圖以道因書余舊詩春日試筆一首今三十有餘年矣并書畫上喜㸔新酒似鵝黄已有春風拂草堂二月江南初破柳扁舟晚下獨鳴榔苔生不礙山人屐花𤼵應憐野老墻世外寧辭千日醉未容人事惱年光雲林子瓚倪元鎮翠竹喬柯此幅余得之項楚襄後營殯事售去篝燈共聽蕭蕭雨已是催花二月過翠竹喬柯渾漫興研山忽覺蘚文多三月二日宿無礙方文元璞長老命寫竹石寓已并賦以𤼵一笑云是夕基上人誠藏主賓講師同集倪瓚承塵賦鵬已多年雨木霜筠共愀然昨日不堪江上過數聲隣笛寺門前雙鸐軒人林石蕭蕭聽雨時為摹清閟閣前枝倪迂仙去今何在東海投竿掣巨鯔翠屏道人清詩蕭散疎仍密淡墨淋漓瘦更腴三絶真堪入三昧令人相對憶倪迂每見雲林小幅未嘗不佳此紙尤其得意筆也非得荆關肯綮者能之乎章憲水墨不難于蒼古而難于穉秀故春之始陽花之猶含女之早嬌香色態趣冲然媚人請以此觀雲林筆蓬峰鶴嶺中人汪砢玉題于潄六齋古木幽篁圖何遜來時梅似雪小山竹樹寫幽情東風吹上毘陵道為報相思夢亦清正月十日毘陵故人何士信先生來求余畫因寫古木幽篁圖并賦詩以贈甲寅倪瓚梁溪山水清且奇爽氣散入詩人脾雲林平生才俊逸江湖着處墨淋漓興來時作希世筆石上傑出春風枝何其仙夢化飛鶴使我對景成遐思倪雲林予湖海故人也以詩名重于世時寫山水作木石圖人每得之以為奇玩近聞雲林作古予不能忘情因題五十六字于右乙卯春彭城鎦壖古木修篁景最多汗青曾記誓山河靈槎一去無消息細㸔宣王石鼓歌道林老友吳庚一為曜闇先生流光冉冉逐驚波文物空思晉永和遼鶴重尋舊城郭當時風致已無多王璲素樹幽篁圖余留湖南時墨菴高士扁舟相遇不一月而來數番酒肴殷勤情意堪美醉後偶寫此圖以贈而邱止善適至復以遺止善雖片紙亦可觀也至正癸卯五月廿三日偶過伯帚徵士齋中忽以相示轉瞬十有二年矣世殊事異慨然時同集者徳機隱君也素樹幽篁澗石隈當年贈此好懐開如今寂寞空山裏誰復緘情折野梅我少陳公十五霜未應白髪視茫茫句哦夜雨懐無已冠着方山似季常夏沼已浮蓮蕋碧春衣猶怯樹陰涼久知服食清虚甚更試山翁煮石方海岳菴圖旦晩臨摹即全璧以歸也筠石喬柯圖橘窗春雨夜剪燭坐蕭條石上苔紋濕堦前蕙草消池塘幽夢遠鄉國美人遥古樹荒筠翳題詩不自聊瓚老迂遺墨宛然在汩汩寒泉漠漠雲滿紙琅玕題瑞室含毫頻媿續清芬孟載題老夫不向名山老却向何方畢此生白石巉巉秋葉裏憨憨鼾睡夢魂清絳霄宫崔𤣥白石邊古木伴幽篁三友相㸔耐歲寒幾度夢回明月夜涼陰移處下棲鸞碧樹山樵古木疎篁倚石邊不隨桃李鬭春妍平生留得氷霜操别有幽期在暮年青城山人王汝玉雙樹雨竹圖甫里宅邊曾繫舟滄江白鳥思悠悠憶得岸南雙樹子雨餘青竹上牽牛余自與庸叔别後不相見近十年矣班荆道舊殆若隔世因寫此以贈瓚誰將翰墨寫真形思入長空動杳㝠不謂吳槎空偃蹇却疑翠裏久娉婷烟雲曉濕蛟龍影風雨秋生翡翠翎疇昔扁舟曾入夢九疑山色倒空青吳郡金誠之古木竹石圖倚石蒼蒼玉一枝鵝池雨霽墨淋漓誰如緑水園中客落日虚亭獨咏詩六月五日寫贈緑水園主翁并詩瓚慨想高人竟杳然只于詞翰閲清妍當年杖履行吟處竹樹娟娟墨沼邊城南曹恕支機石在星槎遠棲鳳寒枝暘谷虚彷彿神遊清閟閣題詩忍對白頭餘弄翰焚香閉草堂高情常與世相忘如今遺墨人稀得珍重深宜什襲藏無錫朱昇又古木竹石圖劍光出匣耿秋蓮磨礪崢嶸濯渭泉為是一番風雨過青楓葉下竹娟娟雲林生為字一作又懶瓚先生懶下樓先生避俗避如仇自言寓此三株樹清閟閣中氣已投老鐵古人林木窠石本與山水别行大抵山水意高深迴環備有一時氣象而林石則草草逸筆中見偃仰虧蔽與聚散歴落之致而已李營邱特妙山水而林石更造微倪迂源本營邱故所作蕭散簡逸葢林木窠石之𣲖也竹懶竹石水仙圖仙子凌波素體輕襪羅微歩月華明滿懐心事無人説來向瀟湘訪女英至正己亥十二月廿又四日寫為秀卿仙史雲林子瓚倪迂竹枝岷江疎秀士棲隱闔閭城覔句仍工畫㸔山不愛名棊枰消永日琴調寄閒情摩捋鬚髯美春苗紫過纓惟允契友讀書工為歌詩而圍棋鼓琴無一不造其妙雖遊名公卿間無意于仕進故云爾壬寅十二月既寫竹枝奉贈又賦此詩瓚又水墨竹一枝二月六日夜宿幻住精舍明日寫竹枝遺無學上人并賦長句春水蒲芽匝岸生閶門山色着衣青出郊已覺清心目適俗寧堪養性靈花落鳥啼風嫋嫋日沉雲碧思㝠㝠禪扉一宿聽魚鼓喚得愁中醉夢醒無住菴主寶雲居士懶瓚甲寅窗前疎雨過石上晚雲生不是雲林叟無人有此清雲門山居士紳張紳之印雲門山居白文白文士行父朱文瘦倚清風玉一枝滄溟回首已塵飛三生石上因緣在應化遼東白鶴歸青城山人王汝玉玉堂清翰以墨畫竹以言作贊竹如泡影贊如夢幻即之非無覔之不見謂依幻人作如是觀丁巳逃虚子戲言𨽻書曉出閶門道西山滿意青金臺有遺墨寫得鳳凰翎東皋妙岩記得曾攜枕簟遊葑溪溪上草堂幽比來誰識賢君子歸卧江南烟雨秋檉居杜堇寫竹仍題句僧房一宿淹如何書甲子猶學晉陶潛鹿場居士寛元博朱文此二首題于詩斗上雲林墨竹陳郎鼓琴初月明能對楚人作楚聲江風動地波撼席蘆雪撲帳雲栖甍每驚逺道意慘愴忽此聚首心忙縈賦詩寫圖以為贈比竹貞徳琴亮清至正丁酉十一月五日余友陳兄惟允偕余隱長和過余旅寓為余鼓楚辭一再行因寫墨君并賦長句以贈時夜漏下二刻矣筆硯荒落自愧草草惟允當有以教我也倪瓚又墨竹市上休疑張伯清藥無二價制頹齡何當埽雪棲幽谷為爾松根採茯苓寫贈張伯清茂才并賦雲林子世間誰比伯夷清曾夢周文與四齡堪笑雲林倪處士要將竹石比參苓黄鶴山中人王䝉用韻日下寒溪淡緑霜前野竹雙清千里水明沙淨一枝雨偃風横馬治墨染湘南竹影杯分吳下蓴羮百世雲林一子陶韋五字詩名梁谿倪先生有别業在吳江之上既為伯清寫此圖復賦詩于右睹物思人臨文嗟悼而已初雲林竹石黄陵廟前雨過邯鄲谷口風生愛煞山人清致縱横澹寫秋聲戊申歲三月余避地雲間始還笠澤元暉都司以此紙索畫竹石并賦瓚去年溪上泊輕舟笑弄滄波狎海鷗雲去樓空無此客寒林留得數竿秋曲江居士烟竹圖曾向瀟湘把釣竿蒼蒼烟景暮江寒遠山一脈西來意付與高人面壁㸔淨名菴主寫樓中寫竹復題詩客邸春風三月時似假似真真又假古人惟有老坡知四明詹仲和霜筠圖戊申十月十八夜環緑軒中借榻眠舞影霜筠風細細縈窗素練月娟娟此生寄跡鴈遵渚何處窮源漁刺船染筆題詩更秉燭語深香冷一凄然夜漏午刻寫竹贈元度瓚疎竹圖以中每愛余畫竹余之竹聊以寫胸中逸氣耳豈復較其是與非葉之繁與疎枝之斜與直哉塗抹久之他人視以為如麻如蘆僕亦不能强辨為竹真没奈覽者何但不知以中視為何物耳瓚晴梢圖雨後空庭秋月明一枝窗影墨縱横沈君雅有臨池興瀟洒濡毫託意清雲林子寫晴梢并詩贈何闕貞士七月廿一日書倪君好畫復躭詩瘦骨秋來似竹枝前夜夢回如得見紙窗斜影月低時季廸高啓雲林畫竹卷老懶無悰筆老手倦畫止乎此倘不合意千萬勿罪懶瓚陳君惟寅天倪先生令子也天倪為黄清權高士之甥清介孤峭深似其舅讀書鼓琴不慕榮進澹泊無欲以終其身惟寅能守其家法者也世故艱巇安貧自樂窮經學古教授鄉里色養得母之歡心友愛盡弟妹之和樂詩文綴緝于以為娛予嘗愛其藻麗不羣蕭然有出塵之想聊摘跋語用歎才華暮春之辰忽過江渚復示新製相與諷詠因成長句以歎美焉瓚頓首二月十日燈下不見陳君動隔年暮春孤坐此江邊政憂江濶多風雨適喜君來共簡編諷咏新詩非漫爾艱虞遠别更悽然㸔花相約重相過已放柳梢維酒船摹董源畫法罨畫溪頭喚渡銅官山下尋僧水樹汀橋曲曲風林雲磴層層雲林山連青黛樹深藍家傍溪雲草結菴畫史欲存招隱意故將幽趣寫江南楊士奇倣李成筆意邃密齋宇靜風雨暮蕭蕭復此獲良覯芹菹酒一瓢羣緑淡清閟幽華炫叢條世事方疚如聊以永今朝辛丑五月十日齋居對雨畫此并賦詩倪瓚一時揮洒聊自適把玩今如徑寸珠淡泊中含太古意澤之癯有道之腴卞榮為良貴進士題偏頭關萬金吾持李營邱真蹟至長安蕭疎澹宕政如此筆意乃知雲林不獨師北苑其昌又自題山水歴過風霜不受欺相親相近石何危滿池墨水香浮研正是幽人落筆時曲全叟懶瓚爽氣初浮溢野藩山高石盎落秋㾗樹底一窗明簌簌風聲月色寄黄昏伯雨平陽氏舊藏倪畫為元人題逍遥天地一閒身浪跡江湖七十春惟有雲林堂下月于今曾照昔年人青城山人王汝玉為伯永題倪懶溪山圖疎木晴巒墨尚新清詩佳麗出風塵披圖便覺成今古詞翰誰能繼昔人休休翁盛㫤題此幅已失其詞語偶錄存敝篋因檢入之玉記倪王合作宋紙上濶幅山水獨坐古松下蕭條遺世心青山列屏嶂流水奏鳴琴安得忘機士與我息煩襟幽情寄毫楮跫然聞足音歲辛丑四月五日東海倪瓚畫松石望山圖并賦五言奉寄文伯友兄且以督屢約屢失期云蒼崖積空翠怡我曠古心飛泉落深谷泠泠絃玉琴塵消羣翳豁松雪洒閒襟清謡天籟𤼵如聆正始音曩余為倪東海畫此圖後倪自畫以轉惠他人今歸博廣文齋中又為畧加㸃綴補其筆墨未足者復和東海生韻題識畫端以正其事云黄鶴山中樵者王䝉雲林小像才之美徳之精坐陰石儼像形噫安得斯人兮復生天保贊産于荆蠻寄于雲林青白其眼金玉其音十日畫水五日石而安排滴露三歩回頭五歩坐而消磨寸陰背漆園野馬之塵埃向姑射神人之氷雪執玉弗揮于以觀其詳雅盥手不帨曷足論其盛潔意匠摩詰神交海嶽達生傲睨玩世諧謔人將比之受佩紫羅囊之謝安吾獨以為超金門之方朔也句曲外史張雨贊骨如鶴目如虎即之而雲凝望之而霞舉不據槁梧而吟迺箕踞長松之下吾知其為馬少游之徒陶𢎞景之伍然倜儻之氣足以糠粃一世清逸之懐足以遊覽千古戢其光芒約之規矩揚揚乎晏安之暇循修乎問學之聚如是而帶經以鋤者此一泰宇彼一泰宇京口陳方子貞贊顧玉山三教小像儒衣僧帽道人鞋天下青山骨可埋遥想少年豪俠處五陵鞍馬洛陽街謂其人有意于榮進與詠歌彈琴誦古人之書謂其濶畧于世故與能擴先世之業昌大其門閭逍遥户庭名聞京都忽自逸于塵氛之外駕扁舟于五湖性印朗月身同太虛非欲㑹𤣥覺于一致而貫通于儒者耶倪瓚造戊戌八月法喜精舍樓崇禎七年閏中秋新霽閲玉山像清腴微鬚頂笠束玦躡𤣥舄執孔雀尾扇坐雲鶴褥有書一冊在旁白描如鐵線然昔年見一幅其題句則天下作到處後二句云若説向時豪俠事五陵裘馬洛陽街所更凡八字樂卿記楊竹西高士小像嚴陵王繹寫四明鄭氏珍玩書記句吳倪瓚補作松石癸卯二月雲林山水竹西圖左一松右有小竹平坡上王繹貌竹西高士方巾深衣執杖立于坡間欵為前云三泖之水東流九峰之雲高浮篤生隱人是為楊侯楊侯之生才質具美能濟之以方來之講學兼本之以夙聞之詩禮此所以行修而文辭鬯而醇迺自號竹西子欲追踪乎葛天氏人謂其草𤣥之遐裔而不滯于其出處進退此所以不戚戚于賤貧不汲汲于富貴既無慚于次公之頴脱亦無忝于大年之秀𤼵此所以江海知名而畎畝躬畊夸非溢美論斯稱情吾聞其初度在邇壽星騰輝乎泖水吾題其像既以文若揆之心宜以禮能若此則添十祀而一成匪純但以八千歲為春秋而已也至正二十二年壬寅歲春二月遂昌山尚左老人鄭元祐明徳甫題汝豈無相漢之籌而遽從赤松之遊汝豈無霸越之䇿而自理鴟夷之舟仙蹤寄乎葛杖勁氣吞乎吳鉤集車轍乎户外登歌吹于西樓不識者以為傲世之叔夜識者以為在鄉之少游抱遺叟在雲間小蓬臺書鐵史白文印前不郎于漢庭後不簿于魏府翛然泉石之間樂與漁樵為伍泣岐之淚未乾不惑之年自許久知其為懐玉之隱仙又行將為雞窠之老父此竹西翁所以為天地之全人有光于四知之華譜也西磵居士蘇大年撰昌齡二字白文印西磵雲樵朱文印須眉之蔚蒼胸懐之淵亮其所同者不異中人之規模其所異者不同衆志之趨向抱豪傑之才而不屑于濟用具輪囷之膽而不輕于肆放故揮金有五陵俠士之風然愛客有四國公子之量當天下無事託詩酒以娛嬉方海内爭雄遠侯王以高尚所以冠林宗之巾曵長房之杖放浪乎西疇南畝之間逍遥乎九峰三泖之上噫微斯人吾誰與望扶風人馬文璧謹贊漢代伏波將軍孫挺立雪之標而陋執㦸之卑振關西之望而識天下之奇量江海而不畦趨烟霞而不覊輕探囊之金玉重集户之簪裾故瞻具乎雲間而譽流乎海隅但見萬竹之西高樓渠渠雲山不礙有琴有書蕭然為山澤臞矯然為列仙儒長欣欣宇宙而襟韻自殊頫仰自如也句吳生高淳敬贊元朴白文印薫然而嚴昻然而亷有龎有眉有長有髯巾逍遥而簷服上古而襜其閒情若陸龜䝉其仙趣若劉海蟾其動也以恬養智其靜也以智養恬燕處乎風篁之西笑傲乎雲山之尖世方酣戰乎觸蠻吾方澹造乎羲炎其豈杜徳機而物不可得覘者乎東海艾衲散民錢敬贊于海上之飛鯨樓瞳碧而方氣清而蒼髪之短不如心之長有五畮之圍一鑑之塘日晏坐于林堂物與我其相忘其泰宇定而發天光者耶席帽山人王逢敬題梧溪王逢白文王元吉氏白文雪鬢霜鬚山巾野服進不榮于軒冕退不厭于草木種數畝之田開一區之宇圖書左右雲山几席此非商顔之顥翁即空同之仙客也虚白道人茅毅贊東海遺老白文鶴立長身大布襦緑光瞳子雪眉須才名恥列三王後文物㸔來兩晉無牛度玉關廻紫氣龍眠滄海抱遺珠憑君更著東維輩畫作雲林五老圖靜慧士明白文珊瑚網卷三十四
