body:
  text: 珊瑚網卷四十六明汪砢玉撰名畫題跋二十二陳白陽自題花卉册删存酒香茅店日人醉玉樓天杏花烟花提㸃題采之遺所思美人在空谷蘭花清香疑紫玉何必數薔薇玫瑰夜深香滿屋疑是酒醒時百合結果多佳子甘酸合鼎調石榴夜深宫漏永和月映雕墻紫薇絶無脂粉態獨有向陽心秋葵千載白衣酒一生青女霜籬菊又墨花八種梅花水仙蔩花梔子石榴秋葵巖桂山茶梅花當盛日猶自勒春寒幾樹霏香雪偏宜竹外看荒圃淑氣回寒柯發光澤下有白玉花玲瓏映深碧堂背宜男草花間葉復柔應須好培植見說解忘憂薝蔔花開日園林香霧濃要從花裏去雨後自扶笻蠟蒂團赭玉文英簇綘綃秋來結佳果珍味不須調月上墻東阿秋光照庭户幽葩向人明泫以泠泠露秋令士氣肅桂子正流芳金碧輝煌處遂饒萬斛香丹葩間碧葉雪中自重叠山人倚醉時奈何映頳頰嘉靖丙申春二月淹留纍日獨坐靜寄菴戲作墨花八種燈下戲題八絶句以形索影以影索形糢糊到底耳道復白陽漫興册漫興二大字余勾勒眉于韻石齊以後半冊遺一知己庭中老梅樹雪後見花開自笑不如梅春風何日來雪裏呈嬌態風前逞素姿香魂何處覓清夢寄相思蕭蕭碧玉枝挺挺凌雲節白日引清風良宵㺯明月翠帶何飄遙紫莖多馥郁佳人千里心日暮倚空谷東風日夜發桃李不禁吹檢㸃穠華事辛夷落較遲春光何爛漫桃華發滿溪武陵香萬樹寧不放人題古梅二絶蘭竹幽蘭辛夷桃花後為海棠牡丹繡毬玫瑰梔子石榴茉莉荷花秋葵秋棠桂花芙蓉菊花山茶水仙瑞香三月韶光好名花說海棠嬌嬈看已足何用復聞香洛下花開日糚成富貴春獨憐雕落易為爾貯丰神東風吹琪樹幻出氷雪姿虛亭落清影夜半月明時色與香同賦江鄉種亦稀鄰家走兒女錯認是薔薇薝蔔含妙香來自天竺國笑殺葵與榴空斯好顔色未摘露前實先看雨後花名應出西海顔豈論東家浴起月到檻柔枝方可折薰風如有情吹簾數香雪波面出仙妝可望不可即薰風入坐來置我疑香域素質倚秋風向人渾欲語春花莫相笑丹心自能許紛披多碧葉秋至亂抽苗細蘂垂垂處春棠未足嬌金粟花開日天香散玉墀嫦娥解人意折贈最高枝江水秋彌潔瀠洄玉有文芙蓉向風合花影對繽紛清霜下籬落佳色散花枝載咏南山篇幽懷不自持窮冬多雪霰柔脆已先摧不是丹砂質寧能醉後開玉面嬋娟小檀心馥郁多盈盈仙骨在端欲去凌波穠香折麝臍細蘂秀鶴頂東風故飄蕩薰人醉不醒嘉靖秋七月望日道復作于五湖田舍之浩歌庭白陽生意滿前大幅過板朝曦山閣頓忘寒錦樹重重覆曲䦨獨有梅花似相識暗香撩我隔簾看梅花江村三月花如錦流水一溪春可憐若見漁郎倘相問寰中自古有神仙桃花最愛野花當路香家家塗抹冠新妝若還不解撩人意刺史如何亦斷腸海棠粉態含香露未乾氷肌猶怯曉宮寒沉香亭北人如玉一笑東風半倚䦨白牡丹花開不是辛夷種自得凝香饒紫苞昨夜月明庭下看恍疑羅䄂拂瓊瑤木筆竹籬新結度濃香香處盈盈雪色妝知是異方天竺種能來詩社攪新腸梔子茉莉開時香滿枝鈿花狼藉玉參差茗杯初歇爐烟燼此味黃昏我獨知茉莉露濕輕紈波不搖珠房雲冷細香飄也知巧作紅顔好只恐紅消倍寂寥荷花長門秋晚露凄凄雙䄂輕翻舊賜衣自笑不如桃與李春風吹向上林飛秋葵小窗秋色滿庭階寂寞無營自煮茶賴有短牆芳草積不教蝴蝶過鄰家秋色幽柔密意詩中見蕭瑟畫圖猶自看誰道别來知己少雲房水殿總生寒水仙露下芳苞拆紫英夜深香靄近人清援琴欲鼓不成調一片楚江空月明幽蘭王吏部分香册八分書二大字凝霞閣藏酉室王穀祥欵風引上春香雪弄江南色為有惜花心樓中莫吹笛深山殘雪後何處覔梅花酒醒香似水枝橫月已斜皎皎玉蘭花不受緇塵垢莫漫比辛夷白賁誰能偶佳人半醉後玉臉微生酡婀娜春風裏銷魂可奈何髙燭照初睡輕風度晚妝長門無個語只是待君王雕檻特藏春瑤臺倚太真香車傾一顧驚動洛陽塵六出吐竒葩風清香自逺樹如天竺林人在瑤華館榴房折錦囊珊瑚何齒齒試展畫圖看憑將頌多子玉兒本來潔新粧不愛濃秋風羅䄂薄飄揚若為容颯颯金風度嫣嫣秋色妍白衣還自至青女更相憐仙卉發璚英娟娟不染塵月明江上望疑是㺯珠人瑤環月下明翠帶風中舉胡然洛浦神胡然漢濵女右題梅二首辛夷桃花海棠牡丹薝蔔榴花秋葵菊花水仙二首陸子傳題花卉册渺渺微風約佩環楚江晴落研屏間玉人心逺瑶琴歇一卷離騷對掩關玉蘭風𥚑月珮紫霞紳秀質亭亭似玉人要使春風常在目自和殘墨與傳神蘭花花名婀娜怯東風色染胭脂别樣紅今夜碧天明月好不須高燭綘紗籠海棠嬌嬈萬態逞殊芳花品名中占得王莫把傾城比顔色從來家國為伊忙牡丹夜合花開香滿庭翠枝拂檻玉娉婷詩人賸有髙陽興相對泠然宿酒醒夜合江南五月緑枝勻剪剪輕羅簇綘新珍重東君憐寂寞故將穠艷綴餘春榴花向日層層折深紅間淺紅無心駐車馬開落任薰風蜀葵炎豔秋來故改妝薄羅閒淡試鵝黃傾城别有檀心在依倚西風送夕陽秋葵三徑秋容菊有芳九華佳色媚重陽金精炫彩叢栖露玉質含貞獨傲霜菊花林塘秋晚思寥寥雨浥仙姿淡玉標出水最憐新句好涉江無奈美人遙芙蓉錦屏叢鶴頂璚圃輝丹葩灼灼春工早東風幾度花山茶曾到孤山處士家六橋飛影入晴霞東風未放閒桃李先發江南第一花梅花五湖陸師道題仇實父西苑十景文太史題已刻集中不録萬嵗山太液池璚華島承先殿龍舟浦芭蕉園南臺樂成殿兔園平臺徴仲首書西苑大觀與項氏所藏帝王圖為十洲作以進御者同一粉本也藏吾家久矣玉水邱壑賦彩仇十洲摹本碧嶂看雲秋林讀書毛詩寫意昭君渡黑河蔡琰胡笳太真試騎宫娃戲嬰范文正小學銀燭秋光閒敲棋子胡姬調鳥閨孺爭金魚草花蜂蝶諸蟲計八板繪事家必胸中具有邱壑而後能傳染彩色與古人合轍此册雖中多艷致然要其筆底亦帶烟霞氣韻豈僅僅優孟而已乎平陽自韻子跋形氣流輝杜陵內史倣筆漁父張志和觀梅林和靖移居葛仙翁聽絃韓熙載三酸蘇黃輩奕碁趙松雪原本仇書圖貨郎擔二幅訪故月明千里鍾馗花月驅妖竹雀杳羽玉蘭海棠翠羽白燕梨花荷花牡丹子鵝緑蕪公雞秋色畫訣有應物寫形今工此道者鮮矣是册積厚流光恢恢乎有餘地也卯水千頃生題清暉勝賞雜臨舊本秋林綿繡竹籬茅舍春山䇿杖林壑飛錫秋岑幽居雪窗把卷桞堤垂釣蘆艇看雲芙蓉閒泛秋航把卷野渡孤舟寒林落葉夏潦圖秋漢圖雪獅猫梨花海棠雪景橫披梧月美人梁楷雪桞二板册內雪猫徐幼文題云家有猫山有虎皮毛牙爪同所異大小耳虎食人猫食鼠食人不仁哉食鼠良義矣義能保我禾苖與衣食不仁傷人父母及妻子君不見高官虐民一路哭卑官愛物千室喜寧卑不悔人比猫雖高逺耻人虎比嗚呼狀同心異俱謂人皮肉相謾不知理是册外尚有蘧餘造適壺中𤣥覽諸集非其至也故不槩入菰蘆中人識于山水清暉之樓陸包山臨王安道華山圖計四十幅陳鏐題册首余既為武侯跋王安道華山圖意欲乞錢叔寶手摹而未果踰月陸叔平來訪難其老侍之至暮口不忍言摹畫事也陸丈手其册不置曰此老遂能接宋人不至作勝國弱腕第少生耳顧欣然謂余為子留數日存其大都當更為䆒丹青理也陸丈畫品與安道同故特相契合畫成當彼此以意甲乙耳不必規規驪黃之跡也吾友人俞仲蔚周公瑕莫雲卿輩特妙小楷吾悉取安道敘記及古近體詩托仲蔚唐人雜記并詩托雲卿李于鱗一紀六詩喬莊簡一紀一賦托周公瑕都元敬一紀托程孟孺别書一册附于後此册成安道有靈不免作衛夫人泣矣甲戌夏日琅琊王世貞題陸叔平著色花品玉蘭牡丹芍藥木香玫瑰石榴秋葵共海棠玉簪芙蓉梅花色與玉同潔香將蘭共芳寧知璚樹上别有白雲妝一種天香異千株國色傾應憐花似臉半醉倚華清春色歸紅藥芳菲滿碧欄試歌溱洧贈何似省中看叢叢攢白玉朵朵簇璚妝露浥湘筠架芳英綴木香露蘂嬌春日烟梢刺曉風香烟龍腦重色借鳯綃濃向日承陽燧然空爛綘霞流丹染繁緑故自壓春華淡掃復濃妝交花不斷香適情聊玩物次第領風光愛此瑤階下花開白玉簪鬢雲斜嚲處不數鳯翹金芙蓉獨立處江月向人斜淡與秋相合春風别自花孤山一片雪春色在西湖詩到不吟處方知香影無吾友陸叔平於舉業之餘好游衍此藝輒得古人三昧法是作花品設色鮮華種種臻妙境雖擬之黃徐間亦不多讓也沛彭年題文五峯山水册雲壑飛泉楚江春曉春山覓句松隂濯足關河夜雨秋溪晚適千巖積雪灞橋逸興文休承花卉册風傳玉國香雪㺯瑤臺色還愁一片飛關山起孤笛清風從東來幽香忽西去欲以寄所思所思在何處庭院緑隂稠萱英色更幽清閒無個事相對可忘憂開花酷日中結實秋風裏誰言結實遲遲結偏多子砌下玉簪花清姿潔更幽何當晚粧罷斜插玉人頭月上墻東阿秋光在庭户幽葩照人眀坐下冷冷露把酒尋寒菊不知三徑荒醉中逄妙品能作淡然妝嵗宴頗寂厯茅齊亦清寒何物供吟目山花一樹丹右梅蕙萱榴玉簮秋葵菊山茶文水寫生逸致凝霞閣藏瑤篇曽覽梅妃傳素箑新窺㸃額圖不是孤山渾寂寞橫斜踈影照西湖梅花奕奕幽蘭傍砌栽紫莖緑葉向春開晚晴庭院微風發忽送清香度竹來蘭花三月曲江微雨乾東風一日遍長安圍烟簇粉春如海總待新郎馬上看杏花一枝出水本天然異種紅黃更可憐不是採珠臨洛浦英皇聨𬒮下湘川荷花黃金宮闕鬱嵯峩萬斛清芬散綺羅吳下高枝原有種天香莫怪屬君多木樨清水涉泠泠白石復齒齒誰將白玉盤置此清氷裏高堂六月生晝寒倣佛耳畔聞清湍翠蒲冉冉露珠攢煩君更植青琅玕蒲石怪石離竒蝕蘚乾千年古木翠虬摶鈎簾相對坐不語落日空庭自嵗寒古松文嘉題陶泓水暖墨花春掃出琅玕覆石根却怪舊逰曽見否凍雲晴雪渭南村鷓鴣聲裏雨瀟颼苔石根邊水暗流竟日過門無俗客爐薰清對數竿秋竹鄰二絶俱題休承竹項子京花鳥常春册長洲吳繼題計二十四板寫生至宣和殿畫院諸名手始具衆妙亦由徽廟自工此種畫法能品題甲乙耳元時惟錢舜舉一家猶傳古法吳中雖有國能多成逸品墨林子醖釀甚富兼以巧思間情獨饒宋意此諸册如入山隂道應接不暇也董其昌題己未春項又新邀余㑹董𤣥宰先生于讀易堂出書畫評玩至子京花鳥册𤣥宰嘆賞久之扈虛因云吾叔祖平生多水墨寫意若此渲染工緻又無欵式耳食者定不信也又新答云此先澤清芬允為家寶若題語為詩思著忙徂化未及耳况有水月墨蘭一紙是世人常見筆法奚必雅俗共鑒哉元宰遂跋干後未幾又新謝世玩好迸逸余得購新册重裝披閲之餘松風如故罏香不絶聊見當年一時雅集云珂玉記周服卿名花十二册孤根疑是木蘭堂怪得人呼作女郎繞砌春風憐謝傅一天明月夢唐昌冷魂未放清香淺深怨誰窺縞𬒮長謾說辛夷有瓜葛後開應是愧濃粧雁門文從先題玉蘭剪水凝霜妬蝶裙曲欄風味玉清溫粉㾗浥露春含淚夜色籠烟月斷魂十里香雲迷短夢誰家細雨鎖重門洗粧見說清明近檢㸃春衣置酒樽文從龍題梨花秋風用意勻顔色銷得攜觴與賦詩艷麗最宜新著雨妖嬈全在欲開時莫愁淺黛臨粧懶果信丹青㸃筆遲朝醉暮吟看不足羡他蝴蝶宿深枝文寵光題秋海棠溫情膩質可憐生浥浥輕韶入粉勻新暖透肌紅沁玉晚風吹酒淡生春窺墻有態如含笑對面無言故惱人莫作尋常輕薄看楊家姊妹是前身胡師閔題粉紅桃花渡江東下指蘇臺邂逅逄君放棹來客到正當三月上夜深先看海棠開燈燃小閣皆新火酒㵼芳樽是舊醅莫遣紅英扳折盡須教移入曲欄栽王稚登題西府海棠序入清和日漸長菁葱愛爾繞階芳開時恱見莊生夢謝處疑褰越女裳共訝臨風仍解舞還看承露更敷香前生為重探花業幻向枝頭未改粧薛明益題蛺蝶花庭院深沈白晝長階前仙卉吐羣芳含烟帶雨呈嬌態傅粉凝脂逞艷粧種自中秋須隔嵗開于初夏伴傾陽更誇結子纍纍碩何必汙邪滿稻粱吳幼培題罌粟花愛爾園葵十尺强不須培植自成行品題未必從巴蜀黃紫何勞競洛陽漆室漫憂吾獨樂公儀應拔我何傷由來衛足還稱智却勝嬌姿祗斷腸張鳯翼題蜀葵花江浦波心千葉殘紅干木末萬花酣夾城含露輝天仗高堞垂霞護錦官歡似美人臨鏡坐愁如思婦怯衣寒幽懷一片憑秋月桃李如今夢已䦨陸士仁題芙蓉花玉貌盈盈翠帶輕凌波微步不生塵風流誰是陳思客想像當年洛水人靈雨濛濛幻態輕驚魂想像逝懷傾願將玉佩遙相逐脫骨逍遙水上行杜大中題水仙二絶青女行霜下曉空山茶獨殿衆芳叢不知在外千林縞且看杯中一本紅性晚每經寒始拆色深却愛日微烘人言此樹猶難飬暮灌晨澆自課僮欽元穆題山茶花不因春事獨心驚亦笑江梅比瘦生取次繁華競紅紫若為踈影自參橫香消滿地魚鱗薄風起回塘蝶翅輕試問青青樹頭子糝鹽何日副調羮杜大綬題落梅先君早年即交吳下諸君子徴其書畫有桂苑叢珠及諸卷軸便面兹有所餘金葉箋為周服卿繪名花十二其著色之妙真趙昌復生也題咏則蘇臺書家各逞體法如蘭亭出世百花盡開光景戊辰春徽友吳集之來齊頭欲得叢珠册及少谷休承二册并他玩好余時為先慈喪事費不能祕作世傳又㸃蒼石屏名春山欲雨者共古梅兩大樹悉售之可念也尊拙廢人識董元宰自題山水小景册荒率莽蒼即為墨戲米氏父子畫往京口望江山即是粉本海嶽庵圖自言楚山清曉於南徐見之雲林學關同用側筆如東坡學徐浩用偃筆雲林畫有婀娜如美人者有潑刺如猛士者此所頭一筆畫大軸能爾即自佳黃子久得之虞山與天池山此新安江道中所見氣韻生動必在生知非學所及然大要以淡為主所謂淡者天骨自然况去塵俗若有意為淡去之轉逺畫聖𤣥宰董宗伯評項易庵畫冊古人論畫以取物無疑為一合非十三科全偹未能至此范寬山水神品猶借名手為人物故知兼長之難項孔彰此册乃衆美畢臻樹石屋宇花卉人物皆與宋人血戰就中山水又兼元人氣韻雖其天骨自合要亦功力深至所謂士氣作家俱偹項子京有此文孫不負好古鑒賞百年食報之勝事矣乙丑秋董其昌題第一板水墨入細山水第二板著色入細山水山深林密虛無人焉何也吾獨與大酉結菴采藥於此中矣白石山樵陳繼儒題第二板第三板雪景有馮三峨題李營邱凍泉圖具此面目王藍田雪岡卷展此神情孔彰添作兩松一艇則裴楷頰上三毛也日華第四幅鶴巢偃松人在傑閣仙山樓閣惟伯駒恕先獨得霞外之景是圖所以自出也眉道人第五幅夜雨孤檠烟樹模糊中有一室紅影淡淡而已此幅全法趙令穰比之二米反覺風流眉公一室十圭寒蛩聲喑折腳鐺邊敲石無火雨氣方酣燈魂未滅攬衣獨坐如逰皇古此境界非孔彰兄筆端不能拈出馮元鑑第六板寫杜句戚廷禎書信宿漁人還泛泛清秋燕子故飛飛蕭蕭踈踈而馬和之神韻俱在繼儒槐隂未斷雁信初來柳絲燕子落日半銜酒生涯詩世界儘于此中有㑹元鑑默然消受者不是忙人來爭世界者有鷺子竹懶第七板福菴老人栽松圖詩書此乞藍田圖之天啓二年春智舷萬松深處恨不攜我方牀石枕來日華第八板秋景碧山孤閣倚嶙峋俯仰林泉迹易塵惟有白雲與紅樹秋深霜老倍精神智舷第九板叠嶂浮嵐山霧溪雲淡掃開層層峭壁緑於苔有條蹊徑通峯頂不訪吟僧莫上來黃葉老人第十板釣圖江水悠悠白鷺飛風埃吹不上荷衣綸竿收起心無事貪看青山忘却歸葦如江風醒酒具江月釣詩筒舴艋無香火能容天地中竹懶李日華第十一板天啓二年春二月作為秋潭送谷響上人入匡廬石門澗補圖第十二板桞下漁舟數筆垂楊數筆山為渠圖個釣魚灣山當清絶松猶恨不寫吾家黃葉關智舷第十三板雪景秋潭題為氷上煮雪破衲蒙頭煮雪僧不知寒涕凍成氷爐中活火常防死未夕茒菴先㸃燈四顧寒林空寂然雪中僧舍起孤烟懸知煮雪燒紅葉不放盧同抱蝶眠智舷第十四板倣黃鶴山樵筆于玉珂旅舍戊辰秋七月苧袍沾杏雨蘭棹撥蘋花三峨馮元鑑題第十五板竹籬茆舍心清鑑底瀟湘月骨冷禪中太華秋眉道人久約樵翁共結鄰春山如待早歸人竹深有個茆亭子飽聼秋聲起澗濵元鑑第十六板入細山水狹長斗方上第十七板寒林墮葉以李營丘寒林圖寫出亭皋木葉古人思路不到此所謂跌下秋聲也繼儒第十八板聽秋二字眉公題恍疑身在緑天菴風雨來時忽捲簾濕翠壓簷雲暗壁幽人還道黑方甜秋潭老人第十九板蘭石門前客不來石畔蘭長滿元鑑題第二十板著色海棠蛺蝶第草一板設色緑萼梅白碧桃西府海棠第草二板寫漁人歸徑第草三板寫蘆中人此老蟠胸氣若虹拋竿終日坐溪東太公出後伯夷笑逃入畫圖蘆葦中眉公題第草四板美人前一首三峩題後一首眉公題意中已解眼中憐誰道焚香不有緣珍重花時護風雨相逢得意畫樓前小婦顔如玉妬心無奈徑忽見鏡中人撲碎粧臺鏡第草五板甲子夏水圖第草六板乙丑秋旱圖水旱二圖有霍衣蒿目之憂更進于畫所謂山林經濟使伯時見此必㸃頭道好其昌披水旱二圖使人欲涕此鄭俠流民遺意也圖中賑飢使者何在請質之畫諫孔彰繼儒易菴初年為余作鴛社圗氣象已不可一世樂卿萬玉林餘册魯千巖所寫墨竹八幅凡寫竹幹如篆固矣而踢枝用行草法則參差生動古人能事惟文蘇二公松陵唐希雅得其要妙元時王淡遊梅和上松雪丹丘而已我國家宋仲溫王孟端其庶幾乎近代作手吾未之見也魯得之畫竹須腕中有風雨蘇子云當其下筆風雨快此真得寫竹上上乘若於墨瀋中求之正墜箇中雲霧豫曽見丹淵先生古木竹枝筆氣雄逸有天成之趣米元章題之可謂世寶甲戌秋友人見示宋元墨竹七假共一卷其中有柯九思補文竹枝而不見古本想為鬻古者割去致古人精神不貫深為扼腕今以當日所見想而成之然亦不作古木即奎章之意耳丙子臘月錢唐魯得之識竹最菁竹善隂對有流泉聲泠泠風來颼颼鳯凰鳴六月張此暑氣清何須結廬渭川濵壬午長夏為玉翁老詞盟寫并題政洋州竹𣲖至今魯孔孫而得其傳且為墨君著題語語語是石室中意象焉孔孫嘗贈我竹石八幀有題者僅三幅詩又其後遺也余意未厭尚欲盡發其自藏萬玉林故以此册為餘耳玉水研池墨雨李珂雪自題册首林塘落日照扁舟柔櫓聲搖睡正悠料得清酣無俗夢鷗天漁國恣遨逰辛酉秋日寫於塘栖舟次肇亨水紋輕似縠山色翠于茶曉日春江路芒鞋踏軟沙戲倣文敏筆雲間變石姿澗響聞山語我欲坐松根寂寞待仙侶辛酉秋日寫空山落葉庚申九月寫雨後閒忩秋興發偶然枯筆寄沈淪幾分摹得蕭踈致也學倪迂不畫人高松聲題倣子久筆庚申秋晚沈中畏題二絶日落雲爭起山空鳥絶飛江村霜色滿一棹夜橫溪歸鴉有常期白鷗無定處葉落風蕭蕭夕陽在溪樹倣米雲山庚申秋日千峰堆藍晝藹藹亂雲擘絮秋紛紛槲葉短橋沙草岸不分晴雨日氤氲㑹嘉倣幼文筆高樹踈踈著葉遙山小小藏尖一半夕陽江面滿亭野色寒烟肇亨漁村曉色用白陽筆意又枯木竹石又梅枝水仙黃葉老人題柔花與柔葉似不耐氷霜最喜開時節衝寒獨自芳畫册便于展玩賞鑒家多好之然一失其所即不可得而保也戒菴老人漫筆常熟楊憲副五川藏書甚富後盡棄于不肖子至以繡􅌩宋墨供木工以祖父敕命紵面與家人婦作鞋成𢎞間葛維善為園亭于定山之上一時名流咏勝成巨卷後流落于石橋趙氏其從嫁女奴攜為糊鞋襯具余知而亟索之已毁矣又梁溪嵇氏有北宋名畫册主人去世後其妾竟剪畫作鞋樣一厮飬婦偶拾棄餘付女為夫所見知是家珍即命婦以糊紙進易僅得其半獲價不資噫彼塗鴉自好者宜以此報焉若收藏家當以書畫金湯盡一室之人而時喻之庶免此俗劫乎文徴仲自題四景畫册第一面春郊牧馬圖倣趙文敏筆後面行書春雷江岸抽瓊笋春雨霏霏晝簾靜去年雙雁不歸來寂寞䦨干度花影金錢無聊故歡冷短綆羸瓶汲深井佳人何事苦沾巾陌頭桞色棲芳塵朱絃疏羽觴急翻酒沾裙絳羅濕前歡悠悠追莫及天遠相思暮雲碧美人傷春情邑邑手撚花枝傍花立花飛萬㸃逐流萍黃蜂紫燕空營營右追和倪元鎮先生江南春詞嘉靖癸巳四月五日澄觀樓中書徴明此余丁亥嵗所作今抵丙午二十年矣聰明日减覽之慨然八月草日徴明重題時年七十有七第二面倣趙伯駒無題欵後面行草近來無奈病淹愁十日廢梳頭避風簾幕何曽捲悠然處古鼎香浮興至開書棐几困來時覆茶甌新凉如水簟紋流六月類清秋手拋團扇拈書册無情緒欲展還休最是詩成酒醒月眀徐度南樓空庭人散語音稀獨坐漏遲遲風撩翠幕無聊賴桐隂亂露下沾衣斗轉銀河東㵼月斜烏鵲南飛無端一事集雙眉睡思轉迷離墻西突兀高樓靜流螢度疑是星移何處一聲長笛等閒喚起相思辛卯閏六月二日徴明在停雲館書第三面倣黃鶴山樵小楷題此豫三十年前所作稚弱可笑然今老懶無復當年興致矣丁巳八月草日重題徴明年八十有八依依落日平西正池上晚凉初足看太湖石畔踈雨過芭蕉簇院落深沉簾櫳靜悄畫䦨曲猛然何處玉簫聲起滿地月明人獨風細輕紗透肉拚流酥盈盈新浴一假風情滿身嬌怯恍然寒玉青團扇子欲舉還垂幾番虛撥夜䦨獨笑慢自凄凉試打滅銀屏燭右秋閨調寄水龍吟徴眀第四面乾雪景倣巨然筆意無題欵山風吹雨作雪飛雪深一尺山無路背郭西南十里隂小蹇緣岡不成步却聞雞犬無人家行指青青轉來誤一杯還坐山間亭動搖倣佛江寒渡玉龍當簷垂欲墮銀浪翻窗驚指顧便欲船頭捉釣竿酒醒却在山中駐亂流不改山下泉扶踈最好巖前樹分明瀟湘真畫圖平生灞陵好詩句有情安得古人才應接紛忙罔知措歸來拂帽山堂髙悠然夢與飛仙遇右詩余庚戌歲在滁陽山中作今嘉靖癸巳四十有四年矣因作畫有感舊逰遂録其隂是嵗五月望後四日徴明時年六十有四又題菊石便面陸微軒以所藏石翁葵花扇頭示徴明使題其上徴明失之懊恨不能自巳乃作菊石報之顧徴眀烏足以承翁之乏哉雖然優孟衣冠孫叔敖人皆知其非也而楚王信之在微軒亦取其抵掌談語而已徴眀先子愛荆公自少喜購圖書古物每長日永夜展玩不休尤嗜名手製箑如吳中劉永輝用刀削骨而不打磨李昭慣作瓜子十三骨馬勳善圓頭棕竹尤精蔣蘇臺兼善直根其巧在銷沈少樓善倣馬勳桞玉臺技兼蔣李閔二舍稍次沈桞近金陵荷葉李開如川扇之便又善造面者前有何格之白面為佳後有陳朴之更能裱舊其一時名公若文氏父子須此二家便面方肯落筆謂其不滲墨不縮筆意耳至骨子自筠片外為犀象玳瑁香檀髙陽種種其面上書畫則文沈而下陳董以上大作家約千餘握內拔最精者得三百柄各繫古玉珀烏精西瑙伽楠諸珍墜其間骨不佳而面佳或面佳而敝者悉取裝册自姚雲東至項子京凡百六十板題曰葉葉清風又以徴仲休承白陽酉室數巨手書畫合作者人自成册共八十板題曰披之穆如雖家因好事貧然猶足自怡悅也無何閔天不弔余自歷下旋里百費蝟集遂割愛售之敢云風流散金石聊爾皎潔㺯文史焉不意壬午夏夢臼無釜更推莽棘荆刺中抑泛才不救丘壑辱矣因翻夙遺扇頭名蹟彚册標之云墨妙風生若欵為先人及余字號者别册標之云素交凉思夫亦孔方兄有絶交書每蒙天而一笑得氣蘇君子前耳噫噫百齡影徂千載心在彼金石録序易安祇竟大端此珊瑚網收不敏且繹多緒斯固羣賢題跋乎要是浮生夢譜哉西吳繡里毗飛居士汪砢玉識珊瑚網卷四十六
