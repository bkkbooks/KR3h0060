body:
  text: 珊瑚網卷二十明汪砢玉撰法書題䟦古搨王右軍書樂毅論石本舊傳樂毅論迺羲之親書於石其他皆紙素所傳唐太宗裒聚二王墨蹟惟樂毅論是石本其後隨入昭陵朱梁時耀州刺史温韜發陵得之復傳人間在宋髙紳為湖北轉運使道中聞砧聲清逺因視之乃樂毅石刻覆於下也而已斷裂矣遂載歸完理緝綴櫝以木箱所可辨者如此世之傳布皆止於海字則其碎而不可緝者良可惜焉迨紳子安世物故轉屬趙立之處其重模者猶有趙立之印一云公主以偽本易之原不曽入壙然聞梁模本為餘杭公主所珍耳又董逌以文皇於右軍書特留賞蘭亭樂毅論别一小函貯之太平公主私取樂毅論以歸及籍其家咸陽嫗竊舉袖中投之竈下香聞數日則原書故在紙也崇禎戊辰改元長至日得此付官奴本於項氏為墨林鑒藏丰神奕奕其整宻處足以鍼砭大令之放葢六本中之精好者無論停雲餘清諸鐫懸絶即予家宋搨修内史本禇河南臨本亦逕庭矣真下一等者乎因名之曰咸陽香帖檇李城南汪砢玉識時西席髙公𤣥見之曰此右軍晩年筆也蒼勁中每帶拙趣且紙墨逈異蠧紋斑駁其為皇祐以前所搨奚疑正鑒賞間曹友瞻明俄至一覩此帖即下拜曰願借三日以繹𢎞景所論極勁利而非用意處攜去後旋懇公𤣥致予欲償原值俟摹百本始璧余念夙好聴之究為據舷之索可勝悵悵李太翁君實因云樂毅論尊之者以為右軍訓子之式詆之者以為六朝偽迹出殷鐵石之手至沈存中云三館楷書非不精不麗求其好處到死無一筆世所傳樂毅論正是三館楷書耳兒淵好摹帖余聊以是言解之石墨池外史砢玉再識宋秘府黄庭經鑒定有金華戴良叔能䟦宋諸名賢論黄庭衆然但辨其非換鵝物卒未嘗定為何人書雖米南宫亦第云並無唐人氣格而已至黄長睿秘書始以逸少卒於昇平五年後三年為興寜二年黄庭始出不應逸少先以書之意宋齊人書然不可考矣予按陶隠居與梁武帝啟已有逸少名蹟黄庭勸進等語隠居去晉為近當時已悞有此書則此書雖非逸少筆其為晉宋間名人書無疑而趙魏公以為楊許舊蹟豈别有所見乎唐石刻數種並佳傳流近代轉亦失真無足觀者此本紙墨刻搨皆近古有宣和紹興印章想曽入秘府且陶學士䟦語甚詳字比諸刻瘦勁涪翁所謂徐浩摹本為是都𤣥敬不知何縁得之以遺從文慶雲今轉以付余亦楷法中第一等帖自可寳也癸夘上巳日徴明記西麓堂鵞羣帖又為鍾王小楷右黄庭西山初搨也當西山完刻時以黄紙印數十本而京兆歿其刻遂流落于星源潘氏又數十年為華氏孫氏再後方入吾家今以家刻與此本較之雖先民矩矱具存而字畫之間不無肥瘦具眼者自能辨之青嵐道人識崇禎庚辰小春日金陵曽子與過子出示子與波臣子也有芒氏記孝女曹娥婢倪雲林䟦已刻在停雲帖不録右軍昇平帖未變鍾法於露字初筆可見逼真尅㨗此刻尤為分明當是佳本張紳識士行雲門右小字曹娥碑越州石氏所刻古雅純質不失右軍筆意余平生所閲不下數十本俱不及此張雲門倪元鎮皆好古博雅之士其題語珍重如此可寳也元鎮題為辛亥嵗葢洪武四年在當時已不易得况今嘉靖壬子相去百八十一年又可多得邪太倉顧君出以相示漫識如此是嵗冬十一月十日徴明時年八十有三宋搨十七帖評考詳格古論内朱文公䟦及弇州四部稿竹懶六硯齋筆記右軍十七帖中間多與淳化法大同小異後有唐文皇押字者為館本黄長睿云右軍草書十七帖最為可師此書中龍也松巖居士識宋搨聖教序𤣥奕求法事與品題刻王元美集中右軍諸帖惟聖教序在行草間極有益學者近世文太史書法多出此世争購之無奈殘闕失真而全瓦始出至不可辨此本鑒定宋搨無疑為唐君少夷家物具見博雅王世貞右軍書蘭亭為最然定武本不可復得其次莫如聖教序雖本緝集自唐迄今碑故在長安學亡恙也余兩至長安摩挲其下不能去雖斷碑惡搨以為尚有典型况此是宋元間搨本學者易得蹊徑宜其為書家珍襲也苐搨久則刻殘刻殘則畫細學者又當求之言外王世懋右軍書法近世最重者淳化閣本即二王帖十七帖不能埒葢全在選刻之精存真跡也今繆傳者夥而閣本絶少欲見右軍真面目無如聖教序其集字摹刻皆出一時國工視宋所彚集摹刻髙出數等此冊尤是舊本精絶之甚當作書家上乗具法眼者展冊便得之周天球羲獻法書元人一十二䟦當代三鉅公續䟦王右軍東方贊大令洛神賦後刻普通三年正月徐僧權等天嘉二年十月卄三日中書舎人朱异不學蘭亭貯屋梁宓妃曼倩出裝潢王家舊物存羲獻絶勝遺金𤼵窖藏商丘宋无吴逸士宋子虚萬象翠寒晉人真跡千無一真往往皆唐人臨摹唐摹既少米氏所謂石刻髙者可降真跡一等此二帖紙墨絶佳借觀累日得其妙處汾亭石巖石民瞻印右王右軍東方畫贊唐人歐陽率更得其筆法而自成一家者大令洛神賦間以章草栁誠懸嘗謂子敬好冩是賦人間合有數本此其一焉者似不誣矣故鄉先生海粟王君舊有此二帖未及臨池而先生没其仲子東字起善者得諸故篋即成軸以襲藏是亦以手澤之氣所存非特為古人翰墨之重也蘇人錢良右敬題錢氏翼之二王翰墨妙絶今古筆法初本鍾元常後世尚王而少及鍾者亦猶周公孔子尊孔而不及周也友人王起善一日見示右軍書曼倩畫贊大令書洛神賦是其尊人海粟公所藏誠先朝故家舊物起善宜珍藏之毋為蕭生所惑也元統乙亥中秋日吳壽民書於蘇臺寓舎仲仁父書法以隸為楷世謂之隸楷漢魏而下鍾元常善隸書尤工小楷晉王右軍得其法所書樂毅論黄庭經東方朔畫贊各臻其妙右軍亦自謂他書多不及之故其轉折端方一波一拂遒勁妍美若雅士立朝垂紳正服濟濟儀容復如蟬翼鳥翅俱有翩翩自得之状大令所書洛神賦非止一本是書多用章草法漢魏風軌燦然可觀二帖皆石刻中善本况得覩其真跡者又何如邪顧復顧氏仁甫曼倩儀形漢廟堂洛神賦韻魏文章千金石刻人争購筆陣猶堪藏二王弋陽山樵李瓚李子鬯氏墨印憶四十年前客丁景仁書館題此詩白雲師持以見示頫仰疇昔為之歎息不置瀼居二王筆札為古今書家宗祖言書者必稱羲獻雖父子之序當爾而書之等第亦繇是而見焉然子敬嘗自謂其書過父至觀題壁乃始心服是卷以二帖合而為一豈無意與和氏之璧截肪而凝雪使天地間有二焉亦不並色矣汴段天祐由籀而篆篆而隸隸而楷楷而至二王蔑以加矣此東方畫贊洛神賦確乎見重於後世也近攻隸書者自負䡍出江左追踪漢氏凡稍渉永和法者則訾之曰此晉字也使誠知晉字為六朝唐宋之冠則無是語惟其未見二王真處輙于似晉者而輕肆雌黄之口而于二王其何傷于日月乎王起善家藏二帖雖是碑刻精神韻度自是絶塵他日有訾晉字或一見之豈不愧汗浹背乎至元二年丙子嵗夏五月八日天台舒叔獻書兩帖古意混然與世俗諸本頓異視規規然求其形似而無神情者相去逺矣葢學栁下恵者無如魯男子要當以此評書可以得古人彷彿至正十有八年秋七月卄六日趙郡蘇大年凝潤軒中題法書家王右軍畫像贊洛神賦有矜莊嚴肅之象今觀此刻信然而大令以章草法書洛神賦尤為竒偉王君其寳藏之朱徳潤題澤民谷陽龔先生子敬為僕題唐丁府君墓銘有云祖子孫一氣雖逺猶親古人所以嚴祭祀之義今觀起善逺祖右軍大令二帖乃其先子海粟齋所藏手澤存焉展卷起敬濟陽生丁應榮景仁書法流傳晉及梁石紋中斷象天潢君家自古家雞在松墨精㣲更世藏晉賢妙筆陣堂堂鑒賞元暉繼阿章父子吳興生聖代風流彷彿似諸王至元丙子暮春重觀於起善齋用宋李韻奉題應榮二王真跡宋御府所藏合三百三十餘紙靖康之難悉廢於金人之手矣今或遺逸於世者去晉益逺楮朽墨闇莫辨真􅎓而卒壽其書流傳天下則幸有石本在耳模刻者之功于是乎可賞若此二帖又二王之名書也然較之世所傳諸帖體格殊異葢彼皆短牘小簡信筆數行如樂毅論黄庭經與此贊則全篇成章宜其嚴整不苟異于他書而禊飲序出于觴咏游騁物感興廢之際筆意飄逸又不可執一論若洛神為子敬平生所好冩亦用意之書也然自昔人所見惟自嬉至飛十三行耳此獨得其全文何耶陳味道先生挾此示余城東之續古堂因歎二王書如雲行太虚態度不定觀書者又如魯僖登臺使每嵗分至啟閉皆八表同昏之雲雖不望可也吳寛題山谷嘗謂東方畫贊墨跡疑是吳通㣲兄弟書以其遣筆結字極似通㣲書黄庭外景也又疑洛神賦非子敬書謂宋宣獻周膳部少加筆力亦可到今觀此二帖則山谷之論其未然乎必有能辨之者王鏊濟之余生平所見方朔先生像贊多矣獨此本最為古搨而書法逈别葢北本與南𣲖異也大令洛神賦有楷書全本有十三行世多翻刻章草小書則僅見此種而已二帖是吾吳世傳舊物諸䟦尤勝自宋迄今最近者為吳文定王文恪亦垂百年况前此皆宋元間名人筆乎䟦至弋陽李瓚而丁應榮詩尾云用宋李韻知前此為宋人無疑矣二帖在宋時為人寳重如此又三百年後入余手那得不視為至寳寧但云下真蹟一等而已嘉靖中吳中刻二王帖選中洛神賦從此本翻出者徒具形似觀此便當燒却萬厯丁夘夏六月世懋謹識再應榮所謂宋李乃宋无李瓚二人非謂宋時人也然觀瓚再題云此十年前客丁景仁書館題則前題時亦當是宋末矣豈此帖在宋時歸丁應榮後歸王海粟而應榮復為之䟦邪不然海粟父子寳是帖已厯宋元二代耶戊子春正月世懋又題王大令保母帖保毋碑雖近出故是大令當時所剜較之蘭亭真所謂固應不同世人知愛蘭亭不知此也丙戌冬伯機得一本繼之公餘丈得此本令諸人賦詩然後朋識中知有此文丁亥八月僕自燕來還亦得一本又有一詩僧許僕一本雖未得然已可擬世人若欲學書不可無此僕有此猶恨驅馳南北不得盡古人臨池之工因公餘出示令人重歎孟頫撞破烟樓固未然唐模晉刻絶相懸莫將定武城中石輕比黄閍墓下磚姜侯才氣亦人豪辨析區區漫爾勞不向驪黄求駔駿書家自有九方臯臨摹舊説范新婦古刻今看李意如却笑南宫米夫子一生辛苦學何書千年鬰鬰閟重泉蹔出還隨刼火烟靳惜乾坤如有意流傳君我豈無縁漁陽鮮于樞伯機父題保母帖藏于項氏鵞羣閣此碑乃獻之為乳母書手鐫于磚上高尺一寸濶尺五寸餘前有小研影書類蘭亭約二百許字磚已裂為二片後有元人題語及詩數十首兹僅録二公所書見世人極重蘭亭不過歐虞所模唐工所鐫未若此本大令所自剜承㫖因有固應不同之語玉識瘞鶴銘并序華陽真逸撰上皇山樵人逸少書鶴夀不知其紀也壬辰嵗得于華亭甲午嵗化于朱方夫其未遂吾翔寥廓邪奚奪之遽也乃裹以𤣥黄之幣藏乎兹山之下仙家有立石旌事篆銘不朽詞曰相此胎禽浮丘著經迺徴前事出于上真余欲無言紀爾嵗辰𤣥門去鼓華表留聲我唯髣髴事亦微冥爾其何之解化惟寜後蕩洪流前固重扃右割荆門未下華亭爰集真侣瘞爾作銘瘞音系瘞鶴銘見稱于世不在蘭亭之下但以其僻在荒寂山僧憚于摹搨紿云崩裂墮江人間既少其本雖京口士大夫往來山中亦以僧言為信吾師南濠先生家藏碑刻甲于東南嘗錄其文悉加題品為金薤琳琅凡數十卷獨以未得此銘為恨邇者放舟京口冒雪渡江果得于山石之下親搨以歸由是此銘復傳人間而僧亦不能隠矣昔姜白石有蘭亭考俞夀老有蘭亭續考元慶敢竊其義取古今論辨輯為一編名之曰瘞鶴銘考天下後世豈無同余之好者乎正德戊寅正月十日姑蘇顧元慶謹書攷古者徒辨其非逸少書苕溪漁隠以為後人或同此號蔡君謨云自隋平陳中國多以楷𨽻相參瘞鶴文有楷𨽻筆當是隋書迺張舉本與此本有異而上皇山樵下作闕文銘後有丹陽宰四字邵亢本與此本亦小異銘後有丹陽仙尉江隂真宰八字豈此刻有三石耶是則考古者所當鑒定也雲在遲玉識于洗鶴竹嶼智永真草千文智永名法極為羲之七世孫永師鐵門限帖以律召調陽為真本俗稱律吕為誤蓋草召似吕其義則以閏餘對律召也楊文公談藪以此文中闕字太宗令王著冩足之王肯堂太史嘗見墨蹟用大麻紙真書頗類今中書體絶與石刻不類雲間沈度學士兄弟乃歩趨此老耳方折子識金陵栖霞寺碑陳江總撰文莫雲卿藏正德丙子余以應試始至南畿若清凉牛首靈谷雨花臺及聚寳門外諸勝處無不遊而攝山則未一到嘉靖癸夘嵗得交于雲浦盛君君雅有棲山之志寄余棲霞二大字圍竟五尺許甚妙然無書者姓名或是蔡君謨筆甲子之嵗偶得棲霞寺碑乃陳李沛書後為宋僧懐則翻刻字畫全擬懐仁集右軍書體而篆額題刻云僧有朋暇日雨牕因手製成冊是嵗乙丑九月霜降後三日謝湖老懶漫記于嘉趣堂九成宫醴泉銘繡水汪氏鑒藏歐陽率更書米海嶽稱其真到内史石刻惟醴泉銘化度寺二碑特妙化度缺其半醴泉銘文字可讀者皆後人重摹此本雖有缺文乃宋搨致佳下真一等者也董其昌觀于墨華閣因題晉人論詩不取楊栁依依而取訏謨定命逺猷辰告以為偏有風人之致書得具此眼應不置伯施信本于山隂廡外也然必得宋精搨如此本方堪㳺意耳玉水其什襲之崇禎戊辰二月竹懶李日華題于潄雲齋九成宫即隋之仁夀宫唐文皇避暑宫中乏水以杖琢地得水而甘勅魏徴撰文率更令歐陽詢書之書斷謂率更正書出大令森森焉若武庫矛㦸虞伯施稱其不擇紙筆皆能如意高麗亦知愛重遣使請之其名大如此弇州謂信本書太傷痩儉獨醴泉銘遒勁之中不失婉潤尤為合作眉公以此帖如深山至人痩硬清寒而神氣完腴能令王公屈膝非他刻可方駕也余未墜地時家甫得之於項氏其間缺字為文徴仲所補裝潢又得文氏善工尤足愛也砢玉化度寺邕禪師塔銘䟦碑刻尚存八百餘字世無翻本隻字皆珍大德十一年倉龍丁未秋九月十有七日嵩翁盧摯與友人太原劉致時中醴陵李應寳仲仁觀于宣城寓居之疏齋唐貞觀間能書者歐率更為最善而邕禪師塔銘又其最善者也至大戊申七月時中袖此刻見過為書其後呉興趙孟頫歐書世所傳者九成宫碑邕禪師塔銘見者或鮮嘗觀宣和内府所藏荀公曽帖其清勁精妙與此帖殆無異冝乎為世所寳也至順龍集壬申十月初吉迂翁雲中趙世延德敬父觀于金陵之筠雪齋歐書遒勁清古後世所師法者邕禪師塔銘又為之冠石刻羽化已久江南故家間見一二本皆未若此本之妙也為報自然冝什襲藏之雖有黄金白璧不可換也至大辛亥窮臘十有二日如是翁聊城周馳景逺書于金陵之寓舎吾家率更妙墨流傳人間甚多邕禪師塔銘乃其絶佳者此帖臨摹鐫搨又其絶精蓋是舊本至元庚辰二月丁亥歐陽𤣥題李宗道所藏此碑蓋書于貞觀五年十一月以後九成宫銘則六年四月也不知孰為後先而此碑尤精絶視九成宫又為藏鋒豈一時之刻者自有工拙耶再至元六年嵗在庚辰三月初吉蜀郡謝端題歐陽率更書姜白石以為追踪鍾王今觀此石刻尚使人驚絶矧真蹟哉因知白石之論為信然此化度寺碑蓋舊本収者冝寳藏之至元六年嵗庚辰三月十六日康里巙書此帖之妙不獨書法摹勒之工亦非後世所及近年趙文敏公書法為天下第一而刻者得其形神百無一二則知古今之殊可歎者多矣今日即使歐陽信本復作豈易得此刻工耶至正改元二月既望掲傒斯書于京師樂道里程文憲公故宅之西軒趙子固評楷書以化度寺九成廟堂三碑為古今集大成舎是他求是南轅而北轍也今來京師見化度舊本三其嚴勁縝密神氣深稳始悟子固之言為然况模榻之工如此本者尤難得也王沂長沙歐陽信本書在唐評為妙品鄭漁仲金石畧所載凡二十三種而行于南北者惟僧邕塔銘及醴泉銘而已二銘多所翻刻南本失于痩北本失于肥殊無精絶之本濓嘗于越見胡文恭公所藏醴泉銘肥痩適匀精彩煥𤼵識者定為初刻今觀此塔銘其精神絶與之類誠可寳玩也塔銘尤信本得意書姜堯章謂勝于醴泉駸駸入于神品其亦知言哉元諸大老置品評于其間者凡數人濓尚何言庸掇拾緒論而書于左方云洪武八年七月十五日金華宋濓記皇甫府君碑歐陽名跡入宣和内府者凡十四紙皇甫碑其一也皇甫君名誕仕隋死于漢王諒之難䘏典殊不薄後以子無逸貴于唐始克樹碑然于逝者未免有黍離之悲也乃吾家所藏此帖所謂筆畫險勁若鑄鐵所成較重模石本大逕庭矣平陽紫源九裔玉識虞恭公碑石在陕西邠州宜禄巡檢司率更書温虞公碑為真書第一筆學者率先學此弇州謂如郭林宗雖標格清峻而虚和近人他書不免作李元禮謖謖松風矣余家舊藏此榻缺落過半至字畫遒勁不在醴泉化度下也樂卿父識于雪巢夫子廟堂碑陜刻有孔子廟碑是唐僧夢英篆書夫子廟堂碑是虞永興真書唐人絶重之以為青箱至寳昔人有収得虞永興與圎機書一紙剪開字字賣之􅈨卿二字得麻一斗鶴口二字得銅研一枚房村二字得芋千頭隨人之好淺深今余所得虞本如層臺緩歩高謝風塵決非五代王彦超重刻冝字字珍之也玉水識破邪論序虞伯施世南書蹟本自希而楷法尤不易得小者惟破邪論序大者夫子廟堂碑而已破邪精能之極幾奪天工所以不入二王室猶似不能忘情于蹊逕耳當時永興與傳公同朝自當以博雅亮直相契許而此序誹亢不假借豈非二義互讐各精䕶法故耶瑯琊王世貞題禇登善書隂符經隂符經古未有自唐初褚河南先後奉命書百七十卷今石刻存者貞觀六年行草一卷永徽五年正書一卷而歐陽渤海亦有貞觀六年正書一卷其大小皆踰黍米而皆絶妙又道藏内隂符經數十種注釋亦如之獨趙文敏書最為定本蓋據歐陽本也弇州山人識褚書聖教序記余家藏褚河南聖教序後題永徽四年歲次癸丑十二月戊寅朔十日丁亥建皇帝在春宫日製此文尚書右僕射上柱國河南郡開國公臣褚遂良書婉媚遒勁波拂處遒健如鐵線蓋善本也又本永徽四年嵗次癸丑十月己夘朔十五日癸巳建中書令臣禇遂良書又本龍朔三年嵗次癸亥六月癸未朔廿三日乙巳建大唐禇遂良書按遂良以永徽六年貶漢州顯慶二年徙桂州未幾貶愛州嵗餘卒未嘗生及龍朔也遂良于貞觀末為中書令後罷永徽三年以吏部尚書同中書門下三品四年進尚書左僕射是余家所藏本為原刻無疑乃三本字有肥痩方圓寛緊之不同也兹豈石才叔蒼舒所得者耶文潞公愛翫令子弟臨之出示坐客盛稱公者為真才叔第云今日方知蒼舒孤寒潞公大哂客赧然余今有類是矣玉識薛稷雜碑時語買禇得薛不落夾謂少保嗣通書法有舅氏禇登善宅相也書貴得法然以㸃畫論法者皆蔽于書者也求法者當在體用備處一法不亡濃纎徤决各當其意然後結字不失疎密合度可以論矣薛稷于書得歐虞褚陸遺墨至備故于法可據然其師承血脉則于禇為近至于用筆纎痩結字疏通又自别為一家然世或以其痩快斷至到又似不綸成法者也劉景升為書家祖師鍾繇胡昭皆受其學然昭肥繇痩各得其一體後世不謂昭不及繇者觀其筆意他可以不論也董逌䟦歐陽通書道因法師碑道因與𤣥奘同譯經者見高僧傳碑文亦宏麗饒其家言然去簡栖頭陀不啻一小刼耳評者謂歐陽蘭臺痩怯于父而險峻過之此碑如病維摩高格貧士雖不饒樂而眉宇間有風霜之氣可重也余嘗謂皇象文武索靖載妖帖章草中鳥迹筆者顔真卿家廟茅山碑正書中玉筯筆者蘭臺道因碑正書中八分筆者此未易為俗人言也王家有是搨正合元羙䟦尚有通書摩利支天經也孫過庭書譜過庭官至率府錄事參軍昔人謂孫參軍書譜如食多骨魚得不償失以草書難讀也又謂千字一律如風偃草短之蓋落筆喜急速要是其自得趣耳董逌云陳留孫䖍禮好古博雅工文詞作草書咄逼羲獻尤妙于用筆雋㧞剛斷出于天材非功用積習所書善臨摹往往真贋不可辨文皇嘗謂過庭小子書亂二王則似真可知矣其書譜凡三詳弇州䟦中平陽千頃生識唐搨孝經八分𨽻書注作小𨽻字未有御䟦草書字方三四寸甚妙唐𤣥宗書孝經後有太子亨右相林甫左相適之等題名韋郇公陟稱彭城縣男蓋自吏部侍郎出為河南採訪始襲公爵此本封耳韋斌封平樂郡公可補本傳之闕書法豐妍勻適與太山銘同行押亦雄俊可喜當其時為林甫所蠱媚極矣猶知有是經耶三子同日就隕屬鏤南内淒凉廢食厭代唐家父子如此循覽遺跡為之慙慨元美玉得此刻于高明水今以之易緑端貢硯李北海雲麾將軍碑碑在良鄉學舎黎秘書嘗托邵長孺物色之已裂為柱礎委榛莽中李宛平輦嵌縣壁顔其齋曰古墨然雲麾碑有二其為李秀者僅存二百許字餘漫漶不可讀此為李思訓以畫名者而碑辭絶不之及蓋古人以藝為諱耳王元美云李北海翩翩自肆乍見不使人敬而久乃愛之如蔣子文佻達好酒骨青竟為神也吴興習之加媚似猶未得其遒嵎山子識陳州刺史李邕書東林寺碑有重摹者趙子固以北海學子敬病于欹側董𤣥宰以右軍如龍北海如象觀是刻與娑羅樹碑有出竒不窮也樂卿前陳州刺史李邕書岳麓寺碑論邕及得罪顛末悉元美四部稿李栝州冩碑有八百本獨岳麓最勝松雪亭林碑悉力摹之三鼓而氣衰矣董思白嘗語余曰碑版文以李為宗則方正而有姿韻信然陳繼儒題李北海麓山帖在雲麾娑羅之上岳麓之下眉公栝蒼太守李邕書葉有道先生神道碑縉雲記葉法善隠松陽夘酉山中嘗為其祖葉國重求郡守李邕碑文文成并求書邕不許法善乃具紙筆夜攝其魂使書畢持以示邕大駭世謂之追魂碑今余家所藏此刻為舊搨遒逸豐美可冠李書諸碑末行作數㸃傳是其魂冩至此聞雞唱欲急去故匆匆輟筆耳亦異矣毘飛居士汪砢玉識張長史郎官壁記董逌稱此書隠約深嚴筋脉結密又云守法度者至嚴則出乎法度者至縱而不可拘弇州謂旭以草聖名其楷法獨郎官壁記為最所藏九成廟堂化度虞公諸楷帖皆辟三舎矣此刻為重橅董𤣥宰云張伯高郎官壁記世無别本惟王奉常敬美有之陳仲醇摹以寄余知學草必自真入也有芒氏蕞書宋搨顔魯公書華嚴帖卷首有羅氏世家印真卿承聞大華嚴㑹已遂圜成取來日要詣彼隨喜如何幸周副老草不悉真卿頓首和南澄師大德侍者十日敬空鄴王書府藏記楊徽之蘇易簡張泊錢易同觀于玉堂之署右魯公書最佳頃年長安見于羅鄴王之猶子今復舉以遺余自此當永秘巾箱也范質襄蒙示魯公真筆歎服不足輒書短句莆田蔡襄魯公筆跡世無倫棗木傳摹多失真沙河千言宋開府頴川八段張敬因華嚴勝㑹多寳墨澄師大德彼何人錦囊玉軸勤愛䕶猶可流傳五百春嘉祐元年十月膝軒書顔書西京千福寺多寶佛塔感應碑文岑勛撰文徐浩書額石刻在西安天寳年間僧楚金建塔行法華懴前後道塲感舎利凡三千七十顆後葬舎利復建道塲又降一百八顆畫普賢變于筆鋒上連得一十九粒莫不圓體自動浮光瑩然事在法華經中厯過去未來阿僧祗刼世尊説法此佛即現寳塔空中賛美蓋佛惟空是以常在常現常滿耳弇州以此帖結法尤整密但貴在藏鋒小逺大雅不無佐史之恨公書如東方畫像家廟碑則天骨遒峻風稜射人也十種加成信者識顔平原與劉中使帖近聞劉中使至瀛州吴希光已降天慰海隅之心耳又聞磁州為盧思道所圍舍利將軍擒獲之吁天慰也無􅍁思道一作子期右唐太師顏魯公書劉中使帖真蹟載宣和書譜南渡後入紹興内府至元丙戌以陸東之蘭亭詩歐陽率更下闕帖真蹟二卷易得于張繡江處此帖筆畫雄健不獨與蔡明逺寒食等帖相頡頏而書㫖慷慨激烈公之英風義節猶可想見于百世之下信可寳也三月十有三日大梁王芝再拜謹題于寳墨齋北燕喬簣成仲山觀顔太師書世不多見不肖平生見真跡三本祭姪季明文馬病此帖祭姪行草馬病行真皆小而此帖正行差大雖體製不同然其英風烈氣見于筆端一也此語豈可為不知者道哉鮮于樞拜手書魯公書存世嘗見李光顏太保帖乞米帖馬病帖頓首夫人帖祭姪季明文允南母殷氏贈告明甫告并此八本觀于此書端可為鈎如屈金㸃如墮石東坡有云書至于顔魯公誠哉是言也時大德九年嵗在乙巳冬十月廿五日集賢學士通議大夫張晏敬書張晏私印逢山彦青端木家傳襄國張氏皆朱文瀛州帖視魯公他書特大而廪廩忠義之氣如對生面非石刻所能彷彿也余生平獲見真跡二小字麻姑記與此耳嘗有云桃源在何處乃見世道汙所以顔魯公細字記麻姑闕近荒忽特賢者適闕多闕世降俗陋假異境以明其志殆子欲居夷雖魯公忠貫日月而感旂常固不待售書名于代况筆精墨妙若是耶昔桓彛渡江傷晉之弱及見王導輩語則知有闕臣之地余于是觀公闕之快亦知夫唐爝未息歟史侯處厚尚義士也曠嵗月而得之既得之非尚義者不出示非其人處厚知所尚哉錢塘白珽謹題白珽玉父湛囦子右唐魯郡開國公太子太師顔真卿字清臣書劉中使帖真跡四十一字公嘗學書于張旭得屋漏㾗法衍㳺京師覽公書最多衍之所藏送辛晃序顔昭甫殷夫人二誥争座位帖朝囬馬病帖皆經宣和紹興御府然俱未若此帖之雄放豪逸豈特入季明之室將與元氣争長昔人云書一藝耳苟非其人雖工不足貴也惟公可以當之至大己酉中秋日拜觀于蘭谷大卿丈之第茅城田衍題太平之日生長京師乃得㑹觀諸公法帖故能考其筆法辨其真偽也如顔書且勿論碑本今専審其墨跡如乞米李太保馬病皆真行祭姪文行草字如錢許大四帖相若皆白紙頓首夫人行書澹黄紙字亦錢許大昭甫告正書甚嚴整有力白紙字亦錢許大全肖碑刻允南母告寸五大字筆力不及白紙此刻中使帖字最大觀其運筆㸃畫如見其人端有聞捷慨然効忠之態真希世之寳也時于明牕净几展玩之餘収卷三歎後之學書者非不屬志米芾所為心㑹而手不遂也飲中嘗用東坡硯山谷墨敬書于勸學齋鮮于伯幾題祭姪明文天下法書第二吾家法書第一此又題劉中使帖漁陽筆法信有所自名不虚得此卷余已刻之鴻堂帖中董其昌觀因題余所見顔魯公真跡争座帖前半鹿脯帖自書告身朱巨川告身皆喁喁未暢及見劉中使帖拳大行草書青紙上忠義之氣森然横人始知世間自有此真物非可偽襲者法書中神品第一後元人䟦亦佳文徴仲一簡大得此帖筆意其中𢃄字亦作一行冩于此見古人真趣眉公居士顔尚書與郭僕射争坐位帖論坐位帖在永興安師文家安氏析居分而為二人多見其前叚師文後乃併得之相繼入内府今前段至行香止為項又新所藏又新出以示余故搨本也廣川書䟦稱是顔書之烜赫者弇州謂稿草耳無一筆不作晉法所謂無意而出從容中道者也栁河東謝人恵筆帖近蒙寄筆深慰逺情雖毫管甚佳而出鋒太短傷于勁硬所要優柔出鋒須長擇毫須細管不在大副切須齊副齊則波磔有慿管小則運動有力毛細則㸃畫無失鋒長則洪瀾自由頃年曽得舒州青練筆指揮教示頗有性靈復有管小鋒長者望恵一二管即為妙矣公權桞尚書極力變右軍法蓋不欲與稧帖面目相似所謂神竒化為臭腐故離之耳凡人學書以姿態取媚鮮能觧此余于虞禇顔歐皆曽彷彿十一自學栁誠懸方悟用筆古淡處自今以往不得舎栁法而趣右軍也其昌懐素藏真律公三帖周越諸䟦俱刻帖中三帖乃㳺絲筆縈回怳渺中有挽强飲石之勁至不易得董逌稱其真出鍾草出張真字不見于世惟草獨傳體製該備迥出唐諸子也越燕裔玉識宋蔡忠恵萬安橋記萬安天下第一橋君謨此書雄偉遒麗當與橋争勝結法全自顔平原來惟䇿法用虞永興耳晝錦堂差近之荔枝茶譜不足道也瑯琊王世貞蘇文忠公書金剛經坡書金剛經刻石者二本其一後有甘昇提舉䟦為甘刻其一前有篆書十餘字凡坡書撆法多拂起是右軍臨宣示筆意甘本失之今此舊本也第石理麄漫鋒鎩多中斷耳能大師聴此經至應無所住而生其心言下大悟不識一字為人説法四十年右軍五十二後便是境界畢千載不可復得為之憮然羅池碑子瞻書羅池碑粵西人泛海必載以偕行謂可鎮風濤迺字畫遒勁古雅是公書中第一冝海若之效靈而銘辭為栁子厚其英勃之氣自作明神也若坡公書表忠觀碑結法不能如羅池老硬亦婉潤可愛醉翁豐樂二亭記蘇玉局擘窠大書出顔徐結體雖小散緩而遒偉俊邁自是當家醉翁偶創新矱翩翩動人無取大雅介甫沿之作誌更成捧心若能于壓字處用古韻差可耳馬劵帖太平清話以石刻在陸宣公書院院舊為嘉興縣學子瞻以天廐賜馬遺李方叔使鬻之而為書劵魯直又為䟦索十萬錢大是佳話然以子瞻故硬差作伯樂抑勒牙人亦見爾時詞客之横耳黄魯直中興頌後詩山谷中興頌碑後詩是論宗語俯仰感慨不忍冄讀迫急詰屈亦令人易厭書法翩翩有致惜摹榻久遂多失真蓋坡筆以老取妍谷筆以妍取老雖側卧小異其品格固已相當䟦尾云惜不得秦少㳺妙墨劖之崖石少㳺當亦善書爾時謫藤州故谷念之耳山谷書狄梁公碑昔人謂狄梁公事范文正公文之黄文節公書之為海内三絶然文篇法既俳書勢亦傾側未足絶也黄正書不足存有韻無體故也食時五觀帖古有食時五觀乃小乗經觕語耳然不可不時使何太宰王侍中讀之筆法極輕弱而鮮餘味米南宫天馬賦墨刻天馬賦筆勢雄强超逸真有千金蹀躞過都歴塊之氣賦語則不受銜囓膝生秃駒耳徐元玉後題一詩頗致代興意未敢盡許也真蹟向曽在余家米元暉書夫子廟記石刻在吴城中書亦穎秀可愛但結法既不古又乏變態耳黄魯直贈之書虎兒筆力能扛鼎教字元暉繼阿章取羲之獻之故事書家不愧箕裘者有大小鍾大小衛大小王大小歐陽大小米惟小米差弱耳趙吴興書赤壁賦子昻大書不如小楷書不如行豐碑大碣螭首龜趺要多非其至者須于閒窻散筆有意無意間求之耳赤壁賦刻之江右王邸中間亦有金錯刀法雖瀟洒縱逸而不乏矩度與蘇賦俱變體之佳者虞文靖垂虹橋記文靖此帖嚴雅中有餘意不失中古衣冠可重也雪菴茶榜元僧溥光書茶榜其辭紫方袍底語耳不得禪説真味書法風骨多遒勁略具顔栁及眉山豫章結法惜胸中無卍字骨令天趣流動而結習未忘超洒不足所書官學士後贈司徒唐不空三藏且然矣俞紫芝四體千文俞和元末人紫芝其别號也刻意吴興頗稱優孟此四體尤精然不免露本色耳宋俞秀老號紫芝此君亦號紫芝近俞允文絶不稱號忽刻一印亦曰紫芝三君子皆俞姓皆善書亦大竒事也七姬帖七姬誌銘為尋陽張羽撰東吳宋克書文既近古而書復典雅有元常遺意足稱二絶第其事太竒而不情楊用修䟦可謂得其隠真漢廷老吏也豐考功筆訣筆訣一冊故鄞人豐道生所著道生初名坊以罪竄易今名皆采古八法精語而時時傅以已意其最所宗事者右軍耳兼享魏晉而旁及唐人至宋元及近代則齒牙餘剩耳其書自古鐘鼎籀篆及小楷行草凡十餘種種各有法而以筆滯故不能無利鈍吾所謂豐氏有書學而無書才者此亦一徴也世貞珊瑚網卷二十
