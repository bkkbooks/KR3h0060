body:
  text: 珊瑚網卷十五明汪砢玉撰法書題跋文太史楷書老子傳跋前寫清净經白描太上像嘉靖戊戌六月十有九日為崑山煉師補書此傳於是余年六十有九矣歐陽公嘗言夏月據案作書可以消暑忘勞然余揮汗執筆祗覺煩苦爾豈公自有所樂也是日午後微雨稍凉但苦忩暗故首尾穠纎不類不免觀者之誚云丁酉七月望日文徴明書徴仲書赤壁賦小跋嘉靖癸卯嵗秋八月既望靜坐玉磬山房時日將昃凉颸拂衣桐葉飛地展卷自適誦長公此賦不覺有憑虛御風羽化登仙之興乃命童子滌硯檢笥獲扇書之聊紀暮年之筆畫也長洲文徴明識文太史書前後赤壁在烏絲黃宋箋工盡楷法之妙休承為補兩圖云作於歸來堂覺逸趣橫溢毫端可稱珠聫壁合萬厯丙辰春梁溪陶碎虛來客余家為煉秋石諸服食藥因攜此帖及徴仲山水二卷貫休應真像胡子霑所製瓶合售之先子時置賦于紫檀榻右坐卧展玩不休松色花光并扇頭所書相映發今一且咸作銀杯羽化可勝惋惜雪巢居士汪砢玉識鶴夢軒衡山書拙政園記并詩長卷槐雨先生王君敬止所居在郡城東北分婁齊門之間居多隙地有積水亘其中稍加濬治環以林木為重屋其陽曰夢隱樓為堂其隂曰若墅堂堂之前為繁香塢其後為倚玉軒軒北直夢隱絶水為梁曰小飛虹踰小飛虹而北循水西行岸多木芙蓉曰芙蓉隈又西中流為榭曰小滄浪亭亭之南翳以修竹而西出於水澨有石可坐可俯而濯曰志清處至是水折而北滉漾渺瀰望若湖泊夾岸皆佳木其西多栁曰栁隩東岸積土為臺曰意逺臺臺之下植石為磯可坐而漁曰釣磯遵磯而北地益迥林木益深水益清駛水盡别疏小沼植蓮其中曰水花池池上美竹千挺可以追凉中為亭曰净深循净深而東柑橘數十本亭曰待霜又東出夢隱樓之後長松數植風至泠然有聲曰聽松風處自此繞出夢隱之前古木踈篁可以憩息曰怡顔處又前循水而東果林彌望曰來禽囿囿盡縳四檜為亭曰得真亭亭之後為珍李坂其前為玫瑰柴又前為薔薇徑至是水折而南夾岸植桃曰桃花沜沜之南為湘筠塢又南古槐一株敷隂數弓曰槐幄其下跨水為杠踰杠而西篁竹隂翳榆槐蔽虧有亭翼然西臨水上者槐雨亭也亭之後為爾耳軒左為芭蕉檻凡諸亭檻臺榭皆因水為面勢自桃花沜而來水益微至是伏流而南踰百武出於别圃藂竹之間是為竹澗竹澗之東江梅數百植花時香雪爛然望若瑤林玉樹曰瑤圃圃中有亭曰嘉實有泉曰玉泉凡為堂一樓一為亭六軒檻池臺塢澗之屬二十有三總三十有一名曰拙政園王君之言曰昔潘嶽仕宦不達作閒居賦自廣以築室種樹灌園鬻蔬為拙者之政余自筮仕抵今餘四十年同時或起家至八座登三事而余僅以一郡倅老退林下其為政殆有拙於嶽者園所以識也雖然君於嶽則有間矣君以進士髙科仕為名法從直躬殉道非久被斥其後旋起旋廢迄擯不復其為人豈齪齪自守視時浮沉者哉嶽雖漫為閒居之言而諂事時人至於望塵雅拜乾沒勢權終罹咎禍考其平生蓋終其身未嘗暫去官守以即其閒居之樂也豈惟嶽哉古之名賢勝士固有有志於是而際㑹功名不能解脫又或升沉遷徙不得遂志如嶽者何限哉而君甫及强仕即解官家處所謂築室種樹灌園鬻蔬享有閒居之樂者二十年於此矣究其所得雖古之名賢勝士有所不逮也而何嶽之足云所謂區區以嶽自况則聊以宣其不達之志焉耳而其志之所樂固有在彼而不在此者是故高官膴仕人所慕樂而禍患攸伏造物者每消息其申使君得志一時而或橫罹災變其視末殺斯世而優游餘年果孰多少哉君子於此必有所擇矣徴明漫仕而歸雖蹤跡不同於君而潦倒末殺亦略相似顧無一畝之宫以寄其栖佚之志而獨有羡於君既取其園中景物悉為賦之而復為之記嘉靖十二年癸巳九月既望長洲文徴明著若野堂在拙政園之中園為唐陸魯望故宅雖在城市而有山林深寂之趣昔皮襲美嘗稱魯望所居不出郛郭曠若郊墅故以為名㑹心何必在郊埛近圃分明見逺情流水斷橋春草色槿籬茅屋午雞聲絶憐人境無車馬信有山林在市城不負昔賢高隱地手携書卷課僮耕繁香塢在若墅堂之前雜植牡丹芍藥丹桂海棠紫璚諸花孟宗獻云小築繁香塢雜植名花旁草堂紫蕤丹豔漫成行春光爛漫千機錦淑氣薰蒸百和香自愛芳菲滿懷袖不教風露濕衣裳髙情已在繁華外靜看游蜂上下狂倚玉軒在若墅堂後傍多美竹面有崑山石倚楹碧玉萬竿長更割崑山片玉蒼如到王家堂上看春風觸目總琳琅怡顔處取陶詞盼庭柯以怡顔云斜光下喬木眷此白日遲微人不可即暮景聊自怡青春在𤣥鬢莫待秋風吹夢隱樓在滄浪池之上南直若墅堂其髙可望郭外諸山君嘗乞靈於九鯉湖夢隱隱字及得此地為戴顒陸魯望故宅因築樓以識林泉入夢意茫茫旋起髙樓擬退藏魯望五湖原有宅淵明三徑未全荒枕中已悟功名幻壺裏誰知日月長回首帝京何處是倚闌惟見暮山蒼聽松風處在夢隱樓北地多長松踈林漱寒泉山風滿清聽空谷度凉雲悠然落虛影紅塵不到眼白日相與永彼美松間人何似陶𢎞景園有積水橫亘數畝類蘇子美滄浪池因築亭其中曰小滄浪昔子美自汴都徙吳君亦還自北都蹤蹟相似故襲其名偶傍滄浪構小亭依然緑水繞虛楹豈無風月供垂釣亦有兒童唱濯纓滿地江湖聊寄興百年魚鳥已忘情舜欽已矣杜陵逺一段幽蹤誰與爭志清處在滄浪亭之南稍西背負修竹石磴下瞰平池淵深泓渟儼如湖澨義訓云臨深使人志清愛此曲池清時來㺯寒玉俯窺鑑須眉脫屨濯雙足落日下回塘倒影寫修竹微風一以搖青天散􅨀渌小飛虹在夢隱樓之前若野堂北橫絶滄浪池中雌霓連蜷飲洪河落日倒影翻晴波江山沉沉時未雩何事青龍忽騰翥知君小試濟川才橫絶寒流引飛渡朱欄光炯搖碧落傑閣參差隱層霧我來倣佛踏金鰲願揮塵世從琴髙月明悠悠天萬里手把芙蓉照秋水意逺臺在滄浪池北高可尋丈義訓云登髙使人意逺閒登萬里臺曠然心目清木落秋更逺長江天際明白雲渡水去日暮山縱橫釣磯在意逺臺下白石净無塵平臨野水津坐看絲裊裊靜愛玉𥻘𥻘得意江湖逺忘機鷗鷺馴須知縯綸者不是羡魚人來禽囿在滄浪池南北雜植林禽數百本清隂十畝夏扶踈正是長林果熟初珍重筠籠分贈處小窗親榻右軍書此詩别見他畫桃花沜在小滄浪東折南夾岸植桃花時望若虹霞種桃臨野水春暖樹交花時見流殘片常疑有隱家微波吹錦浪曉色漲紅霞何必𤣥都觀山中有嵗華槐雨亭在桃花沜之南西臨竹澗榆槐竹柏所植非一云槐雨者著君所自號也亭下髙槐欲覆墻氣蒸寒霧濕衣裳踈花靡靡流芳逺清䕃垂垂世澤長八月文場懷往事三公勳業付諸郎老來不作南柯夢獨自移牀卧晚凉爾耳軒在槐雨亭後吳俗喜疊石為山君特於盆盎置土水石植菖蒲水冬青以適興語云未能免俗聊復爾耳有拳者石弗崇以巖上列萑莽下引寒泉有泉涓涓白石齒齒豈曰髙深不逺伊邇言敞東軒睨彼藂棘君子于何惟宴以適青青者蒲被于崇丘嵗云暮矣式宴以遊君子于遊匪物伊理古亦有言聊復爾耳豈不有營我心則勞載欣載遨以永逍遙芭蕉檻在槐雨亭之左新蕉十尺强得雨净如沐不嫌粉堵髙雅稱朱欄曲秋聲入枕凉曉色分忩緑莫教輕剪取留待隂連屋槐幄在槐雨亭西岸古槐一株蟠屈如翠蛟隂覆數弓舊種宫槐已十圍密隂徑畝翠成帷夢回𤣥蟻爭穿穴春盡青蟲對吐絲湘筠塢在桃花沜之南槐雨亭北修竹連亘境特幽逈種竹繞平岡岡逈竹成塢盛夏已經秋林深不知午中有遺世人琴樽自容與風來酒亦醒坐聽瀟湘雨京師香山有玉泉君常勺而甘之因號玉泉山人及是得泉於園之巽隅甘冽宜茗不减玉泉遂以為名示不忘也曽勺香山水泠然玉一泓寧知瑤漢隔别有玉泉清修綆和雲汲沙瓶帶月烹何須陸鴻漸一啜自分明瑤圃在園之巽隅中植江梅百本花時燦若瑤華因取楚詞為名春風壓樹森琳璆海月冷掛珊瑚鈎寒芒墮地失姑射幽夢落枕移羅浮不奈東風惡酒醒參橫山月落千年秀句落西湖一笑閒情付東閣只今勝事屬君家開田種玉生琪華瑤環瑜珥紛觸目琅玕玉相樹交加我來如升白銀闕綽約仙姬若氷雪倣佛蓬萊萬玉妃夜深下踏瑤臺月瑤臺𤣥圃隔壺天逺在滄瀛縹渺邉若為移得在塵世主人身是瓊林仙當年揮手謝京國手握寒英香沁骨萬里歸來抱雪霜嵗寒心事存貞白嗚呼嵗寒心事存貞白憑仗髙樓莫吹笛嘉實亭在瑤圃中取山谷古風江梅有嘉實之句因次山谷韻髙人夙尚志脫冠謝名場中心秉明潔皎然秋月光有如江梅花枝槁心獨香人生貴適志何必身巖廊不見山木災犧樽漫青黃所以鼎中實不愛時世嘗曽不如苦李全生衢路傍惻惻不忍置悠悠心自傷竹澗在瑤圃東夾澗美竹千挺夾水竹千頭雲深水自流回坡潄寒玉清吹雜鳴球短棹三湘雨孤琴萬壑秋最憐明月夜凉影共悠悠得真亭在園之艮隅植四檜結亭取左太冲招隱詩竹柏得其真之語為名手植蒼官結小茨得真聊咏左冲詩支離雖枉明堂用常得青青保四時珍李坂在得真亭後其地髙阜自燕移好李植其上珍李出上都辛勤逺移植却笑王安豐當年苦鑽核玫瑰柴在得真亭植玫瑰花名花萬里來植我墻東曲曉雨散春林濃香浸紅玉薔薇徑在得真亭前窈窕通幽一徑長野人緣徑擷羣芳不嫌朝露衣裳濕自喜春風屐齒香水華池在西北隅中有紅白蓮方池涵碧落菡萏在中洲誰唱田田葉還生渺渺愁仙姿净如拭野色淡於秋一片橫塘意何當棹小舟深净亭面水花池修竹環匝境極幽邃取杜詩云緑雲荷萬柄翠雨竹千頭清景堪消夏凉聲獨占秋不聞車馬過時有野人留睡起龍團熟青烟一縷浮栁隩在水花池南春深髙栁翠烟迷風約柔條拂水齊不向長安管離别緑隂都付曉鶯啼芙蓉隈在坤隅臨水林塘秋晚思寥寥雨挹紅蕖淡玉標出水最憐新句好涉江無奈美人何待霜亭在坤隅傍植柑橘數十本韋應物云洞庭須待滿林霜右軍黃柑帖亦云霜未降未可多得倚亭嘉樹玉離離照眼黃金子滿枝千里勤王苞貢後一年好景雨霜時向來屈博曽留頌老去韋郎更有詩珍重主人偏賞識風情原許右軍知右拙作前有行書已録似槐雨先生矣先生因畫烏絲精絶命再書小楷一過務欲盡其醜也甲午春二月望衡山居士文徴明題文衡山今日歌行草今日復今日今日何其少今日又不為此事何時了人生百年幾今日今日不為真可惜若言姑待明朝至明朝又有明朝事為君敬誦今日詩努力請從今日始徴明余就孰師時先君以此詩掛齊壁余雖不敢不努力然下劣徒虛今日耳崇禎改元成淵兒習業藤花閣余偶簡得前軸仍懸昔年故處為兒師高公𤣥和之云明日復明日明日何其多明日待明日萬事成蹉跎世人皆被明日纍明日無窮老將至晨昏滚滚水東流古今悠悠日西墜百年明日復幾何請君聽我明日歌讀之益深余明日之感也撫髀廢人識於伏櫪處文徴仲題詠遺蹟卜築清溪上𥻘𥻘玉一灣開門迎曉日隔浦見西山春浪桃花亂晴沙白鳥閒思親意無限遺澤釣遊間右清溪春思文璧境寂晝偏永心清暑氣微老兼踈筆硯性復懶裳衣隱几雙桐轉褰簾獨鳥飛茗薰聊自適不怪客來稀右夏日停雲館作文璧積雨浮宿潤新晴人意適消搖竹忩中啼禽破幽寂初陽動簷瓦殘溜時自滴曲巷行跡稀苔花繡深壁右即事一律徴明探梅山寺日斜時二月梅花尚滿枝勒雨故教開獨後尋春却恨到來遲香撩短鬢風前韻水洗微脂雪後肌悔不淹留到深夜坐看殘月上踈籬惆悵羅浮夢破時居然消息在南枝餘寒雪徑春回淺薄晚林塘月上遲翠竹參差明縞袖冷雲依約護香肌山公早辦風前醉不恨歸來倒接籬右竹堂寺看梅花之作徴明淡烟蒼靄晝沉沉白髮青春好自禁寂歷梅花猶勒雨蹉跎人日苦多隂步來野徑緣溪靜愛此茅堂入竹深車馬不驚魚鳥樂居然城市有山林壬辰人日與之北城别業小集是日風雨寂寥梅萼未破故詩及之徴明木末層軒倚泬寥西風白首不勝搔天垂一鏡蓬壺近雲擁千峰佛剎髙雨後新波浮碧落烟中逺渚見黃茅晚晴長嘯下山去一徑松風萬壑濤右登𤣥墓閣天池日暖雨烟生上已行遊春服成試向水邊修禊事忽聞花底語流鶯空山靈迹千年祕勝友良辰四美并一嵗一回春不厭故園光景有誰爭右上已日短簿祠前樹鬱蟠生公臺下石孱顔千年精氣池上劒二壑風烟寺裏山井冽羽泉茶可試草荒支澗鶴空還不知清逺詩何處翠璧苔花細雨斑右虎丘島嶼縱橫一鏡中濕銀盤浸紫芙蓉誰能胸貯三萬頃我欲身遊七十峰天逺洪濤翻日月春寒澤國隱魚龍中流倣佛聞雞犬何處堪追范蠡蹤半醉髙樓徙倚中葛巾平岸欲凌風山橫天際晴雲碧錦爛城頭落日紅千里關河都㑹壯萬家烟火嵗年豐望京懷古非吾事病目猶堪送逺鴻右登樓簷前朝雨踈踈落階下春泥活活生懶不出門驚樹合醉能開閣看雲行幽深獨有閒諳得迂僻都緣病養成報道東風三月盡一場花事却關情右雨中偶述夕陽樓上看新晴凌亂歸雲冉冉明萬里快瞻飛鳥沒一畨又是録隂成帶城碧瓦參差去隔水蒼烟繚繞生懷袖欣然風拂面醉聽乾鵲語前楹右新晴緑隂如水夏堂凉翠簟含風午夢長老去自於閒有得困來每與客相忘松忩試筆端溪滑石鼎烹雲顧渚香一鳥不鳴心境靜此身真不愧羲皇右夏日睡起傍市柴門鎮日開心閒車馬不驚猜雨中秋事芙蓉盡霜後時新橘柚來張翰未誇菰米飯陶潜自醉菊花杯近來較似嵇中散滿架殘書懶更裁右秋日閒居江上踈踈梅子雨烟中嫋嫋竹枝歌暖風初泛青蓮舫新水平添緑玉坡南去春光啼鳥寂西來山色過橋多美人只在橫塘曲手把芙蓉奈逺何右即事一枕清風卧北忩髙樓六月似秋凉陶情圖史忘貧病夾耳笙歌欲老狂客至僅能修茗供心閒聊爾續罏香淹留不覺斜陽盡月印花梢上短墻急雨中宵六月凉朝來新水滴橫塘一畨白苧生秋意無數青山上野航日暖晴沙鳬􅂒亂風來前浦芰荷香曾探世事驚塵土轉覺江湖興味長右夏日小齊如翼兩楹分短折分明玉磬陳蹈海要非平世事過門誰識有心人屋頭日出烏棲曉簷隙泥香燕壘春手種雙桐才數尺濃隂已見緑勻勻右偶作睡起西齊片雨過緑隂庭院晚凉多烏衣春盡渾無語白苧秋來謾有歌世態風雲從變幻山林日月未蹉跎却憐逸少猶多事時寫黃庭換白鵝永夏茅堂風日嘉凉隂寂歷樹交加客來解帶圍新竹燕起衝簾落晚花領略清言蒼玉麈破除沉困紫團茶六街車馬塵如海不到柴桑處士家右為松泉書曾攜書册住東甌此日因君憶舊游落日亂山斜帶郭碧天新水靜涵洲從知地勝身如隱近說官清嵗有秋西北浮雲應在念乘間一上謝公樓右贈槐雨先生文璧我生辛苦不逢辰見說丁年積漸亨力命相持懷御寇行藏無主卜君平尋常藥願空成感老大邅回正坐名勞謝微言知驗否秋風相送不勝情右贈日者徐生文璧三十相將始洗兒百年回首即非遲祖書敢謂今堪託父道方慚我未知願魯難憑蘇子論勝無聊有樂天詩人間切事惟應此對客那無酒一巵春風一笑錦綳兒共道頭顱較我竒門户關心能不喜賢愚有命可容期百年正賴培來久萬事誰云足自兹五十老親遺世網從今都是㺯孫時賤子今年四月十又三日始舉一兒彌月之次薄有湯餅之設因識二詩邀在席諸君同賦是嵗𢎞治丁巳豫年二十又八徴明書文待詔書十美詩卷傾國多因有美姿扁舟載去亦宜之戲瓢尚想當時事深涉何曽讀衛詩西施浮生難比草頭塵常托千金視此身若使琴心桃得動不知匪石是何人文君高抱琵琶障冷風淋漓衫袖濕啼紅安邉重用和親計駕馭英雄已不同明妃倚竹眠牀態自嬌夜深銀燭正髙燒不將春舞歸長袖宜自輕身好折腰飛燕飛絮無憑只趂風也知相逐水流東璃璃瓶薄珊瑚脆毁不求全妾命同緑珠徙倚閒庭暗淚垂不須再讀寄來詩已知一代容華盡地下相逢未是遲碧玉梅花香滿石榴裙祗用微頻艾納熏仙館已於塵世隔此心猶不負黃昏梅妃欲與君王共輦還馬嵬路狹轉頭難早知怨自生萌蘖悔不當時乞賜環太真閨門出入有常經女子何須獨夜行詩月西廂誰唱始至今傳說見分明鶯鶯短長濶狹亂堆牀細染輕槌玉色光豈是無心戀針線要將姓氏托文房薛濤徴明題文內翰諸絶墨蹟試茶初動蟹眼臨帖更盡烏絲啜罷冷淘槐葉漸吟雙調柘枝擁褐一瓢濁酒支頤半卷南華消受誰堪伴侣紙忩殘雪梅花右幽居二絶徴明黃金宫闕鬱嵯峨秋色盈盈月漾波吳下髙枝元有種天香莫怪屬君多已酉七月敷求將試應天賦此奉贈徴明千山疊翠斜陽外萬壑爭流春雨餘景色撩人歸未得髙情原不在溪魚三月光隂修禊後千村桃李杖藜中何時去覓王𤣥度把卷臨流一笑同解帶禪房春日斜曲䦨供佛有名花髙情更在樽壘外坐對清香薦一茶小病淹愁百念慵時時清夢越城東春風閒石草如積落日倚樓山滿空落落高松下午隂靜聞飛澗激清音幽人相對無餘事啜罷茶甌再鼓琴木多長夏翠交加野客孤吟坐日斜縱有殘春供醉眼碧波深映紫薇花滿眼青山迹未塵百年臺殿已沉淪只應寂寞蓮池水曽照當時入社人松葉滿山行徑微幽居更在竹藂西緑隂深寂詩成處愛惜新筠不忍題流泉爭㵼作狂瀾樹色蒼蒼帶逺山髙閣清幽人共坐不知日月幾摧殘小登臨眼境竒水雲沙樹渺差差猶憐興淺匆匆去不見湖中月上時水展晴空秋色逺樹沉平野日光寒生綃萬幅天開盡澄碧樓中暮倚䦨秋江雨過水潺潺踈樹平臯帶逺山正是幽人詩就處小舟閒我夕陽還傳呼曲巷使君來樹底柴門懶自開老病迂踈非傲客直愁車馬破蒼苔誰見金鳬水底墳空懷香玉閉佳人君王情愛隨流盡只有寒溪尚姓陳殘冬相見還相别燈火幽幽燦玉缸正自多情眠不得忽聽風雨打西忩夜與德孚坐小樓記此徴明文徵仲三題吉祥菴卷徴明舍西有吉祥菴往嵗嘗與亡友劉協中訪僧權鶴峰過之協中賦詩云城裏幽棲古寺閒相依半日便思還汗衣未了奔馳債便是逢僧怕問山徴明和云殿堂深寂竹牀間坐戀棕隂忘却還水竹悠然有遐想會心何必在空山越數年過之則協中已亡因讀舊題追思其韻塵蹤俗狀强追閒慚愧空門數往還不見故人遺約在黃梅雨暗郭西山時𢎞治十四年辛酉也抵今正德庚辰又二十年矣菴既燬于火而權師化去亦復數年追感昔遊不覺愴昔因再疊前韻當日空門對燕閒傷心今送夕陽還劫餘誰和邢和璞老去空悲庾子山他日偶與協中之子稚孫談及因寫此詩追圖其事付稚書藏為里中故實云時十六年辛已二月八日也衡山詩餘墨蹟富春山下畫舫新來正雨過青林波生碧渚千峰日照兩岸花開北郭池塘東門楊栁二十年前幾往還重登眺愛風烟如畫臨水樓臺追思少日情懷猶憶先人舊郡齊向范老祠前春風走馬客星臺上雪夜觀梅往事分明故交零落嘆惜光隂一瞬哉佇立久念白雲芳草頻去徘徊右調沁園春徴明輕風驟雨捲新荷湖上晚凉多行春橋外山如畫緣山去十里松蘿滿眼緑隂芳草無邉白鳥滄波夕陽還聽竹枝歌天逺奈愁何漁舟隱映垂楊渡都無繫來往如梭笑道玉堂金馬何如我短棹輕蓑右調風入松泛湖作為紫溪書徴明紅雨鏖花緑隂鏤日名園景色撩人游衫初試汗掩薄羅新節候今年差晚蹭嵗閏四月猶春應無那暖烘韶麗微翠惹游塵向尊前花下聽歌掩冉接笑逡巡古來四事難得是良辰起坐何曾問主斜陽亂主亦忘賔拚沉醉太湖石畔翠軟草敷茵右初夏賞牡丹調寄滿江紅徴明珊瑚網卷十五
