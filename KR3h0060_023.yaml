body:
  text: 珊瑚網卷二十三上明汪砢玉撰法書題跋蔡中郎石室神授筆勢記雍少時入嵩山學書於石室中常夜居不寢恍然一客厥狀甚異授以筆勢言訖而沒其言曰書肇於自然自然既立陰陽生焉陰陽既生形氣立矣藏頭護尾力在字中下筆用力獻酬之麗故曰勢來不可止勢去不可逼書有二法一曰疾二曰澀得疾澀二法書妙盡矣夫書本乎人性疾者不可使之令徐澀者不可使之令速筆惟軟則奇怪生焉九勢列後自然無師授而合於先聖陰陽者結字點畫上皆覆下下以上承遞相映𢃄無使反背轉筆左旋右顧無使筋節孤露藏鋒點畫出入之路左先右至回右亦爾護尾點畫勢盡用力收之疾勢出於啄磔之中又在豎躍之腹掠筆左出攢鋒峻躍用之澀勢悉在緊馭戰行之法橫麟豎勒之規伯喈小篆贊龜文針列櫛比龍鱗紆體放尾長翅短身延頸負翼狀如凌雲隤若黍稷之垂頴藴若蛇蟲之焚縕若連若絶似水似露緣垂下端逺而望之象鴻鵠羣遊絡繹遷延研桑不能數其詰曲離婁不能觀其障間般埀揖讓而辭巧蒼籀拱手而韜翰摛筆艷於紈素為六藝之範先伯喈𨽻贊鳥迹之變乃惟左𨽻蠲彼繁文崇茲簡易修短相副異體同勢煥若星陳鬱若雲布纎波濃點錯落其間若鐘簴設張庭燎飛煙似崇臺重宇層雲冠山遠而望之飛龍在天近而察之心亂目眩蟲篆既繁草藁近偽適之中庸莫尚於𨽻崔瑗草書勢書契之興始自頡皇寫彼鳥迹以定文章章草之法蓋又簡略應時諭指周旋卒迫兼功并用愛日省力絶險之變豈必古式觀其法象俯仰有儀方不副矩圓不中規抑左揚右望之若崎鸞企鳥峙志意飛移狡獸暴駭將奔來馳壯似連珠絶而不離畜怒拂鬱放逸生奇騰蛇赴穴頭沒尾垂機要微妙臨時從宜王珉行書狀邈乎嵩岱之峻極爛若列宿之麗天緯字挺特奇書秀出揚波騁萟餘妍宏逸虎踞鳯峙龍伸蠖屈資胡氏之壯傑兼鍾公之精密總二妙之所長盡要蔑乎文質詳覽字體究尋筆迹粲乎偉乎如圭如璧宛若盤螭之仰勢翼若翔鸞之舒翮或乃放手飛筆雨下風馳綺靡婉娩縱橫流離衛夫人筆陳圖夫三端之妙莫先於用筆六藝之奧莫深乎銀鈎昔秦丞相斯見周穆王書七日興嗟哂其無骨蔡尚書入鴻都觀碣十旬不返嗟其出羣故知達其源者少暗於理者多近代以來殊不師古而緣情棄道才記姓名或學不該贍聞見又寡致使成功不就虛費精神自非通靈感物不可與談斯道今刪李斯筆妙更加潤色總七條並作其形容列事於左貽諸子孫永為模範度將來君子時復覽焉筆要取崇山絶仞中毫八九月收之其筆頭長一寸管長五寸鋒齊腰強者其硯取煎涸斧石潤澀相兼浮津耀墨者其墨取廬山之松煙代郡之鹿膠十年以上強如石者為之紙取東陽魚網虛柔滑淨者凡學書先學執筆若真書去筆頭二寸一分若行草書去筆三寸一分執之下筆點畫芟波屈曲皆須盡一身之力而送之若初學先大書不得從小善鑒者不寫善寫者不鑒善筆力者多骨不善筆力者多肉多骨微肉者謂之筋書多肉微骨者謂之墨豬多力豐筋者聖無力無筋者病一一從其消息而用之一如千里陳雲隱隱然其實有形丶如高峯墜石磕磕然實如崩也丿陸斷犀象百鈞弩發丨萬歲枯藤崩浪雷奔􅗵徑弩筋節右七條筆陳出入斬斫圖執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能緊者心手不齊意後不前者敗若執筆遠而急意前筆後者勝又有六種用筆結構圖備如篆法飄揚灑落如章草凶險可畏如八分窈窕出入如飛白耿介特立如鶴頭鬱拔縱橫如古隸然心存委曲每為一字各象其形斯造妙矣永和四年上虞製王右軍題筆陳圖後夫紙者陳也筆者刀矟也墨者鍪甲也水硯者城池也心意者將軍也本領者副將也結構者謀略也揚筆者吉凶也出入者號令也屈折者殺戮也夫欲書先乾研墨凝神靜思預想字形大小偃仰平直振動令筋脈相連意在筆前然後作字若平直相似狀如算子上下方整前後齊平便不是書但得其點畫耳昔鍾繇弟子宋翼常作此書繇乃叱之翼三年不敢見繇即潛心改迹每作一波常三過折筆每作一點常隱鋒而為之每作一橫畫如列陳之排雲每作一戈如百鈞之弩發每作一牽如萬歲枯藤屈折如鋼鈎每作一放縱如足行之馳驟翼先來書惡晉太康中有人於許下破鍾繇墓遂得筆勢論翼乃讀之依此法學名遂大振真書及行書皆依此法若欲學草書又别有法須緩前急後字體行勢狀等龍蛇氣脈鈎連稜側起伏用筆亦不得使齊平大小一等每作字須有點處且作余字總竟然後安點其點須空中搖擲筆作之其草書亦須篆勢八分古𨽻相雜亦不得急令墨不入紙若急作意思淺薄而筆即直過惟有章草及章程行押等不用此勢但用擊石波而已其擊石波者缺波也又八分更有一波謂之隼尾波即鍾公太山銘及魏文帝受禪碑中已有此體矣夫書先須引八分章草入𨽻字中發人意氣若直取俗字不能先發羲之少學衛夫人書將自謂大能及渡江北遊名山比見李斯曹喜等書又之許下見鍾繇梁鵠書又之洛下見蔡雍石經三體書又於從兄洽處見張昶華嶽碑始知學衛夫人書徒費年月耳遂改本師仍於衆碑學習焉遂乃成書耳時年五十三或恐風燭奄及聊書之以遺教子孫耳永和十四年四月日逸少教子敬筆論十二章孫過庭辨其偽然議論亦不可廢吾察汝書性過人仍未間規矩父不親教自古有之略修筆勢論一篇開汝之悟凡諸字勢猶有十二章章有指歸定其模楷詳其舛謬撮其要實録其便宜或變體處多罕臻其妙轉筆處衆莫識其源懸針垂露之蹤難為體别揚波騰氣之勢足可迷人故辨其由堪愈膏肓之疾今書樂毅論一本及筆論一篇貽爾緘之祕之窮研篆籀省功而易成纂集精專形彰而勢顯存意學之者兩月即見成功大無性靈者百日亦似其本此作初成之時有丹陽僧求吾不復與後同學張伯英欲求見之吾云失矣創意十二章之一書字貴乎平穩用筆須有偃有仰有欹有斜或大或小或短或長欲書先構筋力然後裝束更在注意詳雅起發綿密踈濶相間始書之時不可畫其形像一遍正手腳二遍少得形勢三遍須似本趣四遍加其遒潤五遍兼其抽拔如其生澀筆下不滑兩行一度創臨惟須筆滑不得計遍數放心二凡書時貴乎沈靜令意在筆先字居心後未作之始結思成矣然下筆不欲急管是將軍故須遲重心不宜遲心是箭鋒遲則中物不入每書貴十遲五急十曲五直十藏五出十起五伏狀如驚蛇之透水激楚浪以成文妙似龍蛇之宛轉𢃄鸞鳯其徘徊擺脫直驚雷掣電此乃飛空妙密頃刻浮沈統攝鏗鏘啓發其意俠昏迷之輩漸覺稱心博學仁儒顯然開朗視形三視形象體變貌猶同逐勢瞻顔高低有趣分均點畫遠近相須播弄研精調和筆墨鋒纎來往踈密相當鐵點銀鈎方圓周整起手下筆忖展思量引説蹤由永傳今古智者榮身蓋世方懷浸潤之深愚者不俟佳談如暗塵之視錦生而知者發憤學而悟者忘飱此即妙中加妙新中更新金書錦字本須為先盡説安危以平穩為本分間布白上下齊平均其體制大字促之欲小小字放之欲大寬猛得所不失其宜橫則正如長舟之截小渚竪則直若春筍之抽寒谷點説四夫著點皆須磊落似大石之當衢或如蹲鴟或如科斗如瓜瓣如栗子存如鶚口尖如鼠屎如此之類各稟其像處戈五夫處戈之法落竿峨峨如長松之倚溪似欲倒也又如百鈞之弩初張其戈意妙理難窮放似弓張箭發收似虎鬭龍飛直似臨谷之徑曲類懸釣之鈎稜層切於雲漢倒載殞於山崖天門騰而地户躍四海謐而五嶽封玉燭明而日月敞綵繡亂而錦文翻夫以屈腳之法彎彎如角弓之張見鳥為鴈是也壯健六夫立人之法如鳥之在柱仁信位伏類是也宛腳之法如壯士之屈臂風飛流九氣類是也引牽急如雲中之電日月目因類是也踠腳􅀈幹上捺下撚終始轉折悉令和勻勿使蜂腰鶴膝放縱宜存氣力視筆取勢行中廓落如勇士伸鈎方剛對敵麒麟鬬角虎奏龍牙筋節弩拳勇身精健放法如此書進有功也夫作右邊折角牽下微開左畔幹轉令取登對勿使腰中傷慢視筆取勢直截向下趣義常存無不省悟教悟七日月目其之字處其中畫之法皆不得右右廂復宜粗於左橫畫須纎柱畫須粗分間布白遠近宜上下得所自然平穩當須遞相掩蓋不得孤靈形影及出其牙鋒者展轉翻筆之處即宜察而用之如作一橫畫須竪作一直看須存筋藏鋒滅迹隱端凡為一字數體俱入若作一紙皆須字字意别勿使相同觀形八夫臨文用筆之法復有數勢並悉不同或有藏鋒者大側筆者乏押筆者入結筆者撮憩筆者俟失息筆者逼逐戚筆者將將謂劣盡也緩以下筆不宜長短戰筆者合之斗庇筆者成機𢃄筆者盡翻筆者先然翻筆轉勢急而疾也疊筆者時劣緩不宜長起筆者不下打筆者廣度打廣而就狹謂快健也開要九夫作字之法甚是為難鋒銛來去之則反復往還之法可宜熟尋觀察然後下筆撇不宜遲遲則失力拔不宜緩緩則鈍腳不宜賖腹不宜促頭不宜斜角不宜峻又不宜作稜角二字合為一體者並不宜濶重不宜長單不宜小復不宜大密則勝踈短則勝長節度十夫欲作楷書須遵正體字之形勢並不得上寬下窄上短下長不宜傷密密則似荷瘵之纒不得展也不宜踈踈則似溺水之禽傷長則似死蛇挂樹短則似踏蝦蟇可不慎也察論十一臨書按帖之方至妙無窮或有回鸞返鵲之飾變體則於行中或有生成臨谷之戈放龍箋於紙上微筆則烽煙雲起如刀劍之相成落紙則椑楯施張蹙踏江波之錦若不端嚴手指無以表記心靈吾務斯道廢寢忘飱歷載彌年方稱美也譬成十二欲學書者當以其本緩緩臨之定其形勢不可失於規矩但形勢須快健手腕須輕便方圓大小各不相犯若欲經書須得大小字字相則莫以字易小而忙行筆勢莫以字大難而漫展毫頭如是則筋骨不等死生相混大凡字不可使一點失所若美人之無目一畫失所若壯士之無肱樂毅論一本書法筆勢具備苟能得此自外皆能勿以難學而慢之也古傳筆法二十四訣點法云作點向左以中指斜頓向右以大指齊頓作報答便以中指挫鋒須收鋒在內按筆收之又衄側下其筆含濡其鋒摩論簇心然後收筆填在圓平禁經云點如利鑽鏤金是也又半蟻法字宜上用之為避其旁點又側下其筆使墨精暗墜徐乃反揭則稜利矣右軍云作點皆須磊落如大石之當衢又點不變為布棋貴變通也更有打點當以指送筆似物之狀甚難用也一畫法云作橫畫皆用大指遣之若作策法即指擡筆上若作力法即用中節鈎筆澀進覆畫以中指頓筆然後以大指遣至盡處此三勢相近用法不同也鱗勒法須仰收禁經云畫如長錐界石是也又緊走仰收似長身之截小渚兩頭勢起使芒角不失遒潤借勢不策不鱗勒稍除之取古徑枯澀無求活利凡在字上宜用之擡筆法初緊策中擡鋒輕徑微勒向在按衄古今云鍾書宣示字長畫用又畫不為布算行草法云勢須險策露鋒飛動為勝二三畫一法云上潛鋒平勒中背鋒仰策下緊躍覆收名遞相鮮摘古經云黃庭經三關字用草法上衄側中策下奮筆橫飛遞相聳峙以險利為勝丨懸針法云鋒須先發管逐勢行䟐筆緊馭澀進如錐畫石禁經云懸針如長錐綴地是也又契字下雙筆須一弩一垂變換用之三勢不同或垂或躍或外掠而中弩右軍云懸針垂露難為體制衛夫人云如萬歲枯藤臨池訣云懸針法蘭亭年字盡其訣也張敬玄云申中字盡宜卓筆直審疾抽事字中畫宜執下筆便挑不宜停筆丨垂露法云鋒管齊下勢盡殺筆縮鋒又始築筆而極力終注鋒而作弩又無垂不縮此言頓筆以摧挫為功右軍云竪如春筍之抽寒谷也臨池訣云玉露本篆腳名玉筯如古叉倚物也乙背拋法云蹲鋒緊掠徐擲之則失勢遲則緩怯臨池訣云此鍾法稍涉八分尾法引過其曲轉蹲其鋒又徐收而蹲躍之不欲出須暗收使其如負芒刺則善右軍云援毫蹲節輕重有凖庾肩吾云欲拋還置駐鋒躍之也抽筆法云左罨掠須峻利右潛躍而戰行待勢卷而機駐揭摘出而暗收若便拋必流滑凡淺又側起平發緊殺按波為抽筆從腹內起庾肩吾云收放更留又人字第二筆云攙引仰拽是也夫木等字亦同用乙背躍法悉以中指遣至盡處以名指拒而躍之又云潛鋒暗勒勢盡然後躍之右軍背躍戈法上則俯而過下則曲而就蓋所以失之於前正之於後也又永禪師澀出戈法下以名指築上借勢以中指遣之按筆至下以名指衄鋒潛躍此名秃出法張旭折芒潛法鋒緊走意盡乃收而躍之鍾書常用也右軍云落筆峩峩如長松之倚溪唐太宗云為戈必潤貴遲疑而顧章草潛按微進輕揭暗躍揭欲利按欲輕輕則骨徑神清肥乃質滯鈍俗張敬玄云戈腳宜斜筆直抽直者緣上實下自成也水散水法上衄側中偃下潛挫躍鋒古經云黃庭樂毅同用桞宗元云散水幽蹤黃庭宗之是也臨池訣云或藏或露狀類不同要遞相顯異若頻有則兩點相近而下點當高此名潛相矚視外雖解摘內相附屬為上中潛鋒暗衄下峻躍潛遣蓋鍾法也行書勢微按而鈎揭以輕利為利冰氷水法上側覆殺下築而躍之須相承揖並連衄側輕揭則率字左右用之草法須借勢捷遣若緩遲則為病也火烈火法衄鋒暗按臨池訣云須各自立勢抵筆潛衄所謂視之不見考之彌彰古經云鍾書然字用火聯飛法暗衄微駐輕揭潛躍筆鋒連綿相顧不絶也禁經云聨飛如鴈陳當秋樂毅論燕然字用之虞永興兼字用其丰勢蓋中斷也宀顯異法上點駐鋒左右挫鋒橫書按筆勢須相順古經云出告誓文又上點側橫畫勒左一筆擺鋒右峻啄輕揭告誓實字用虞永興用之行法以圓峻飛動為美章草法擬於圓峻飛動其餘側務在露鋒鈎裹忌緩也辵平磔法不遲不疾戰筆側去勢卷不可便出須駐鋒而後放禁經云磔如生蛇度水是也鍾元常每作磔筆須三過折筆故唐太宗云為波必磔貴三折而遺毫司勾聚法圓角躍鋒作弩法勢未盡而躍之顔魯公云勾裹法用筆如紙下行日月目因罔向字皆用之張敬玄云固字轉角之勢初不宜稜角弩張即字體俗也非但固字凡轉筆一切貴其圓潤􅗵勾弩法圓角激鋒待筋骨而成要如武人屈臂右軍云回角不用峻及有稜是也衛夫人謂之徑弩法勻均勿字用之小奮筆法左側而獨立中衄折而右鈎古經云鍾書宣示字下用若中竪則左右暗衄而潛躍又簇鋒提進為系字下三點也彡衫袪上平點中啄下衄側乙外臂法左峻掠中潛鋒衄挫右蹲鋒外擲丨竪一法擡筆竪策挫鋒上下竪直也尚嘗字中竪畫用也丷八曾頭其腳法左潛揭而右啄曽頭用之左啄右側其腳用之冰暗築法馭鋒直衡有點連物則名暗築月其字內兩點是令衮筆法須按鋒上潛下衄又按鋒上下蹙衄之令今等字是爻縮出法上磔衄下磔出之此八分法蓋避雙出也又戔字上縮鋒作弩下出鋒作躍張云戔如束棘梁武帝答陶隱居論夫運筆斜則無芒角執筆寬則書緩弱點掣短則法擁腫點掣長則法離斯畫促則字勢慢拘則乏勢放又少則純骨無媚純肉無力少墨浮澀多墨莽鈍此并默然任之自然之理也若抑揚得所趣舍無違阻筆廉斷觸勢峰鬱揚波折節中規合矩分間下注濃纎有方肥瘦相和骨力相稱婉婉暖暖視之不足稜稜凛凛常有生氣適眼合心便為甲科衆家可識亦當復有串耳六文可工亦當復由習耳一聞能持一見能記且古且今不無其人大抵為論終歸於是程邈所以能變書體為之舊也張芝所以能書工學之積也既舊既積方可以肆其談云云又觀鍾書十二法平謂橫也直謂縱也均謂問也密謂際也鋒謂端也力謂體也輕謂屈也決牽掣也補不足也損有餘也巧布置也稱大小也字外之奇文所不書世之學者宗二王元常逸迹不睥睨羲之有過人之論後生遂雷同元常謂之古肥子敬謂之今瘦今古既殊肥瘦頗反如自省覽有異衆説張芝鍾繇巧趣精細殆同機神肥瘦今古豈易致意真迹雖少可得而推逸少至學鍾書勢巧形密及其獨運意踈字緩譬猶楚音習夏不能無楚過言不悒未為篤論又子敬不逮逸少猶逸少不逮元常學子敬者如畫虎也學元常者如畫龍也余雖不習偶見其理不習而言必慕之歟梁庾元威論書所學正書宜以殷均范懷約為主方正循紀修短合度所學草書宜以張融王僧虔為則體用得法意氣有餘章表箋書於斯足矣夫才能則關性命耽嗜殊妨大業但令緊快分明屬辭流便字不須語輒投聲若以己巳莫分東柬相亂則兩王妙迹二陸高才頃來非所用也王延之有言曰勿欺數行尺牘即表三種人身豈非一者學書得法二者作字得體三者輕重得宜意謂猶須言無虛出則善矣禁經永字八法宋桑世昌蘭亭考永字八法本此而未備古人用筆之術多於永字取法以其八法之勢能通一切字也學者宜潛心焉點為側橫為勒竪為弩挑為躍左上為側左下為䇿右上為啄右下為磔側蹲鴟而墜右勒緩蹤以藏機弩彎環而勢曲躍峻快以如錐策依稀而似勒掠倣佛以宜肥啄騰凌而速進磔抑惜以遲移側不愧卧勒常患病弩直過而力敗躍直峻而勢生策仰收而暗揭掠左出而鋒輕啄倉皇而疾掩磔䟐趞而開撑側不得平其筆常側筆就右為之口訣云先右揭其腕次輕蹲其鋒取勢緊則乘機頓挫借勢出之疾則失中過又成俗側鋒領右借勢輕揭潛出務於勒也或問不言點而言側何也曰筆鋒顧右審其勢顯而側之故名側也止言點而不明顧右無存鋒向背墜墨之勢若左顧右側則側無方故側不險而失於鈍鈍則芒角隱而書之神格喪矣筆訣云側者側下其筆使墨精暗墜徐乃反揭則稜利矣勒不得卧其筆中高下兩頭以筆心壓之口訣云頭傍鋒仰策次迅收若一出揭筆不躍而暗收則薄圓而踈筆無力矣勒筆鋒似及於紙須微盡仰策峻躍或問不言畫而言勒何也曰勒者躍筆而行承其虛畫取其徑澀則功成矣不言畫者應在不躍其一出便畫則鋒拳而怯薄也筆訣云策筆須仰仰筆覆收準此則形勢自章矣弩不宜直其筆直則無力立筆左偃而下最要有力口訣云凡榜卷微曲蹙筆纍走而進之直則衆勢失力滯則神氣怯散夫弩須側筆顧右潛躍輕挫則揭或問畫者中心竪畫也今謂之弩何也曰弩者勢微弩在乎躍筆下行若直置其畫則形圓勢質為書之病也筆訣云弩筆之法竪筆徐行近左引勢勢不欲直直則無力矣躍須蹲鋒得勢而出出則暗收又云前畫卷則别劍心而出之口訣云傍鋒輕揚借勢勢不勒筆不措則意不深躍與挑一也鋒貴於澀出適期於倒收謂欲挑還置也夫躍自弩出潛鋒輕挫借勢而躍之或問凡字出鋒謂之挑此言躍何也曰躍者語之小異耳以筆鋒去而言之躍自弩畫收鋒竪筆潛徑借勢而躍之筆訣云是即弩筆下殺筆躍起也法須挫衄轉筆出鋒佇思消息則神蹤不墜也策須研筆背發而仰收則背斫仰策也兩頭高中以筆心舉之口訣云仰筆潛鋒以鱗勒之法揭脆躍勢於右潛鋒之要在盡勢暗鋒捷歸於右也夫策筆仰鋒竪䟐微徑借勢峻顧於掠也夫作策法指擡筆上或問策一名折異畫今謂之策何也曰仰筆躍鋒輕擡而進之曰策也若及紙便畫不務遲澀向背偃仰者此備畫究成耳筆訣云始築鋒而仰策徐轉筆以成形是也掠者拂掠須迅其鋒左出欲利又云微曲而下筆心至卷處口訣云撇過謂之掠借於䇿勢以輕駐鋒右揭其腕加以迅出勢旋於左法澀而徑意欲暢而腕遲留則傷於緩滯夫側鋒左出謂之掠或問掠一名分發今稱為掠何也曰掠乃疾徐有凖手隨筆轉鋒自左出取險徑盡而為節發則一出運用無的故掠之精旨可守也孫過庭云遣不常速筆訣云從策筆下左出而鋒利不墜則自然佳矣啄者如禽之啄物也其筆不罨以疾為勝口訣云右上左之勢為卷啄按筆蹲鋒潛蹙於右借勢收鋒迅擲旋右須精顯衄去之不可緩滯夫筆鋒及紙為啄在潛徑而啄之或問擊謂之啄何也曰撇者蒙俗之言啄者因勢而立啄以輕徑為勝筆訣云啄筆速進徑若鐵石則勢成也磔者不疾不徐戰行欲卷復駐而去之又云䟐筆戰行翻筆轉下而出筆磔之口訣云右送之波皆名磔右揭其腕逐勢緊躍傍筆迅磔盡勢輕揭以暗收在徑迅得之夫磔法筆鋒須躍勢欲險而澀得勢而輕揭暗收存勢候其勢盡而磔之或問發波謂之磔何也曰發波之筆循古無迹凡若左顧右則勢鈍矣䟐重鋒緩則勢肥須遒徑而遲澀之筆訣云始入筆緊築而微仰便下徐行勢足而後磔之其筆或藏鋒或出鋒由人心之好為之也釋智果心成頌回展右肩頭頂長者向右展寧宣臺尚字是長舒左足有腳者向左舒實其典字是峻拔一角字方者擡右角國用周字是潛虛半腹畫稍粗於左右亦須著遠近均勻遞相掩蓋放令右盧用見岡月字是間開間合無字四點四畫為綜上開則下合也隔仰隔覆並字隔二疆字隔三在二三字仰覆用之回互留放字有磔掠重者若爻字上住下放茶字上放下住是也不可並放變換垂縮西堅畫字一垂一縮并字右縮左垂斤字右垂左縮上下亦然繁則減除王書忽字字皆去下一點踈當補續王書神字處字皆加一點分若抵背州册瓜之類皆須自相背立合如對目八字州字類皆須前相矚視孤單必大一點一畫成其獨立者是也重並仍促昌吕棗字上小林棘絲等字左促森渺字兼用之以側映斜為斜為側交欠以入之類以斜附曲謂冰為曲女安必互之類覃精一字功歸自得盈虛向背仰覆垂縮回互不失繞視連行妙在相承起伏行行皆相映𢃄聫屬而不背違也唐太守筆論欲書之時當收視反聽絶慮凝神心正氣和則契於妙心神不正字則欹斜志氣不和書必顛仆其道同魯廟之器虛則欹滿則覆中則正正者和之謂也大抵腕堅則鋒正鋒正則四面勢全次實指指實則筋力均平次虛掌掌虛則運用便易為點必收貴緊而重為畫必勒貴澀而遲為撇必掠貴險而徑為竪為弩貴戰而雄為戈必潤貴遲疑而右領為環必郁貴蹙鋒而緩轉為波必磔貴三折而遣毫側不得平其筆勒不得卧其筆須筆鋒先行弩不宜直直則失力躍須存其筆鋒得勢而出策須仰而出掠須筆鋒左出而利啄須卧筆而疾罨磔須戰筆外發得意徐乃出之夫點要作稜角忌圓平貴通變合策處策年字是也合勒處勒士字是也凡橫畫並上仰下覆三畫悉用之合掠即掠户字是也彡乃形影字右邊不可一向為之須皆下撇之爻須上磔衄鋒下磔放出不可雙出多字西撇一縮二少縮三亦縮四須出鋒巧左手躪躒則古秀而意深拙在乎輕浮則薄俗而直置採托菁葩芟雉蕪穢庶近乎翰墨脫專執自賢闕於師授則衆病蜂起衡鑑徒懸於暗矣虞世南筆髓論敘體文字經藝之本生政之始也蒼頡象山川江海之形龍蛇鳥獸之迹以為六體戰國政異俗殊書文略别秦患多門約為八體筆病訛謬凡五易焉並不述用筆之妙及蔡雍張索之輩鍾繇衛王之流皆造意精微自悟其道也辨應心為君妙用無窮手為輔承命竭股肱之用力為任使纎毫不撓尺丈有餘故也管為將帥處運用之道執生殺之權虛心納物守節藏鋒故也毫為士卒隨營任使迹不凝滯故也字為城池大不虛小不孤故也指意用筆須手腕輕虛褚公云未解書者一點一畫皆求象本乃轉自拙豈成書耶太緩無筋太急無肉側筆則遲鈍多肉直鋒則枯稿無肉終其誤也粗而不鋭細而能壯長者不為有餘短者不為不足釋真筆長不過六寸捉筆不過三寸真一行二草三指實掌虛右軍云弱紙用強筆強紙用弱筆弱者強之強者弱之遲速虛實若輪扁斫輪不疾不徐得之於心應之於手口不能言也掠拂輕重若浮雲散蔽晴天波撇勾截若微風搖於碧海氣如奔馬亦如朵鈎輕重出乎心而妙用應其手然且體約八分勢同章草而各有趣無問巨細皆有虛散其鋒圓毫絶按轉易也真書一體當覆腕上搶掠毫開下撤撥歷鋒則稍有筋力指端橫鈎蹲踞轉脆之狀矣釋行行書之體略同於真至頓挫盤礴若猛獸之摶噬進退斂距若秋鷹之迅擊故覆腕搶毫乃按鋒而直引其綰則外擴內旋結鋒而環轉結者上蹙旋毫不絶內轉鋒也加以掉筆聨毫若石瑩玉瑕自然之理亦如長空遊絲容曵而來往又如蟲壁絡徑而復虛遊絲斷而能續皆契以天真同於扁輪焉釋草草即縱心奔放覆腕轉蹙懸管聚鋒柔毫外拓左為外右為內伏連卷舒收攬吐納內轉藏鋒也既如舞袖揮拂而縈紆又若垂藤摎盤而繚繞蹙旋轉鋒如騰猿過樹逸蚌得水輕兵追虜烈火燎原或體雄而不可抑或勢逸而不可止縱狂逸不違筆意也右軍云透華嵩而不高踰懸壑而態越或連或絶如花亂飛若雄若逸如馬長奔但先緩引興心逸自急也仍接鋒取興興盡即已又生鏃鋒轉剔剜角多勾篆體或似蛇形亦如兵陳故兵無常陳字無常形又如水火之勢故云字勢如水火也契妙字雖有質迹本無為稟陰陽而動靜體萬物而成形達性變通不主其常故知書道玄妙必資神遇不可以力求也必資心悟不可以自取也字形者如目之視也目有止障明執字體即有執滯為目所視遠近不同如水之在器方圓豈由其水且筆妙喻水方圓喻字所視即同遠近即異故明執字體也字之態度心之暢也心悟非心合於妙也假如鑄銅為鏡非匠者之明假筆寫心非毫之到妙在澄心靜慮至微之間神應思徹又同鼓瑟綸音妙想隨意而生握筆使鋒逸態逐毫而應學者心悟於至道書妙於無為苟涉浮華終懵斯理可不察也率更書三十六法排疊字欲其排疊踈密停勻不可或濶或狹若夀臺畫筆麗嬴㸑亹系旁言旁之類八訣所謂分間布白又曰調勻點畫是也避就避密就踈避險就易避遠就近欲其彼此映𢃄得宜又如廬字上撇下尖下一撇不當相同逢字下捺拔出則上捺必作點亦避重疊而就簡徑也頂𢃄字之上上者多惟上重下輕欲其得勢如疊壘藥鸞驚􅀢聲醫之類八訣所謂如人上稱卞載又謂不可頭輕尾重是也穿插字畫交錯者欲其踈密長短大小勻停如中弗井曲册兼禹爽爾襄婁垂無密之類八訣所謂四面勻停八邉具備是也向背字有相向者有相背者各有體勢不可差錯相向如切如知以之類相背如北兆肥根之類偏側字有偏側欹斜亦當隨其字勢結體偏向右者如心戈衣幾之類向左者如朋及勿少之類正偏者如亥女丈人之類字法所謂偏者正之正者偏之又其妙也挑􅦸字之形勢有須挑􅦸者如戈几武氣之類如獻勵散斷左邊既多須得右邊􅦸之如省炙之類上偏者須得下􅦸之使相稱乃善相讓字之左右或多或少須彼此相讓方為盡善如馬旁系旁言旁諸字須左邊平直然後右邊可作否則妨礙不便如䜌字以中央言字上畫短讓兩系出如鷗鶠馳字兩旁俱上狹下濶亦當相讓使不妨礙為佳補空如我哉字作點須對左邊實處如襲譬餐贑之類欲其四滿方正也如醴泉銘建字是也貼零字之空脫處欲其聯屬不斷如令今寒冬之類是也粘合字之本相離開者即欲粘合使相顧盼拱揖乃佳如諸偏旁字卧鑒非門是也滿不要虛如園圃國回包南隔勾之類是也意連字有形斷而意連者如之以心小川州水求之類是也覆冒字之上大者必覆冒其下如雲空榮奢金夆巷泰之類是也借換如蘇之為蘇秋之為秋鵝之為鵝之類其字難結體故互換如此所謂東映西𢃄是也垂曳垂如都鄉邜降之類曳如水支欠皮更走民之類是也增減字有難結體者或因筆畫少而增添如新之為新建之為建是也或因筆畫多而減省如曹之為曺美之為美但欲體勢茂美不必論古字當何如書也應副字之減點畫稀少者欲其彼此相映𢃄故必得應副相稱而後可又如龍詩讐轉必一畫對一畫相應亦相副也撑柱字之獨立者必得撑柱然後徑健可觀如可下永亨亭乎句草矛巾弓十類是也朝揖凡有偏旁者皆欲相顧兩文成字者為多如鄒謝鋤儲三體成字者尤欲相朝揖八訣所謂迎相顧揖是也救應凡作字一筆才落便想第二三筆如何救應如何結果書法所謂意在筆先文向後思是附麗字之形體有宜相附近者不可相離如形影飛起超飲免凡文欠支旁之類以小附大以少附多是也回抱抱向左者昌丐易掬之類如鬼包旭之類包裹謂如圈圍之類四方包裹也尚向上包下齒凶下包上匱匡左包右旬胸右包左之類是也郤好謂其包裹鬬湊不致失勢結束停當皆得其宜也小成大字以大成小者如門之下大者是也以小成大如孤字只在末後一寧字在末後一欠字一拔類是也小大成形謂小字大字各有形勢也書法云大字難於結密而無間小字難於寬綽而有餘若能大小得宜則盡善也小大大小書法曰大字促令小小字放令大自然寬猛得宜譬如日字之小難與國字同大如一二字之踈亦欲字畫與密者相間必當思所以位置排布令相映𢃄得宜然後為上或曰謂上小下大上大下小欲其相稱亦一説也左小右大左高右低左長右短此三節皆字之病左右小大高低長短欲其相稱停勻為佳書法所謂長短合度粗細折中也褊作字狹長則有踈挂之病書欲其結束整齊收斂緊密排疊次第方為老氣書法云密為老氣此所以貴褊也相管領欲其彼此顧盼不失位置上覆下下承上左右皆然各自成形凡字各為一體則具體可觀分為異體則一筆自成一體可觀不可以其微小而忽之也至於踈密長短大小濶狹亦當細詳之應接字之點畫欲其互相應接兩點者兩相照應如八丷類三點走一點起一點𢃄一點應如瓜系類四點者兩旁兩點相應中間兩點相接如然無類至於水木州以之類亦然此皆言其大略又在學者能以意消詳觸類而長之可也孫過庭書譜真迹刻停雲館法帖全刋書法要録此僅撮三則若原拓不分篇也趨變適時行書為要顯勒方富真乃居先草不兼真殆於專謹真不通草殊非翰扎真以點畫為形質使轉為性情草以點畫為性情使轉為形質草乖使轉不能成字真虧點畫猶可記文回互雖殊大體相涉故亦貫通二篆俯貫八分包括籥章涵泳飛白若毫釐不察則胡越殊風至如鍾繇𨽻奇張芝草聖此乃專精一體以致絶倫伯英不真而點畫狼籍元常不草使轉縱橫自茲以降不能兼善者有所不逮非專精也雖篆𨽻章草工用多變濟成厥美各有攸宜篆尚婉而通𨽻欲精而密草貴流而暢章務險而便然後稟之以風神溫之以妍潤鼓之以枯徑和之以間雅故可達其情性形其哀樂驗燥濕之殊節千古依然體老壯之異時百齡俄頃又云今撰執使轉用之由以袪未悟執謂深淺長短之類是也使謂縱橫牽制之類是也轉謂鈎環盤紆之類是也又云數畫並施其形各異衆點齊列為體互乖一點成一字之規乃終篇之準違而不犯和而不同留不恆遲遣不恆疾𢃄燥方潤將濃遂枯泯規矩於方圓遁鉤繩之曲直乍顯乍晦若行若藏窮變態於毫端合情詞於紙上無間心手忘懷楷則自可背羲獻而無失達鍾張而尚工顔真卿述張長史十二筆意余罷秩醴泉特詣東洛訪金吾長史張公請師筆法長史於時在裴宅憩息已一年矣師公者甚衆求筆法或有得者皆曰神妙一日長史乃左右盼視怫然而起僕乃從行來至竹院小堂公乃當堂踞坐而命僕居乎小榻言曰筆法玄微難妄傳授非志士高人詎可言其要妙夫平為橫子知之乎僕曰嘗聞長史每令為一平畫皆須縱橫有象非此之謂乎長史曰然直為縱子知之乎曰豈非直者必縱之不令邪曲之謂乎曰然均為間子知之乎曰嘗蒙亦以間不容髮其此之謂乎曰然密為際子知之乎曰豈非謂築鋒下筆皆令完成不令甚踈之意乎曰然鋒為末子知之乎曰豈非末已成畫復使鋒健之意乎曰然力為體骨子知之乎曰豈非躍筆則點畫皆有筋骨字體自然雄媚之意乎曰然輕為曲折子知之乎曰豈非鈎筆轉角折鋒輕過亦謂轉角為暗過之謂乎曰然決為牽掣子知之乎曰豈非牽掣為撇鋭意挫鋒使筆不怯滯令險峻而成之謂乎曰然益為不足子知之乎曰豈非謂結構點畫有失趣者則以别點畫偏旁救應之謂乎曰然損謂有餘子知之乎曰豈長史所謂趣長筆短雖點畫不足常使意氣有餘乎曰然巧為布置子知之乎曰豈非欲書預想字形布置令其平穩或意外生體令有異勢乎曰然稱謂大小子知之乎曰豈非大字促令小小字轉令大兼令茂密乎曰然子言頗皆近之矣夫書道之妙妙在執筆令得圓轉勿使拘攣其次在識筆法其次在於布置不慢不越巧便合宜其次紙筆精佳其次變通適懷縱舍掣奪咸有規矩用筆當須知如錐畫沙如印印泥用鋒常欲使其透過紙背久之自然齊於古人矣此下尚有一半似後人所贅為陳明卿剛去之懷素論筆法律公常從塢彤受筆法彤曰張長史私教彤云孤蓬自振驚砂坐飛余自是得奇怪草聖盡於此矣顔真卿曰師亦有自得乎素曰吾觀夏雲多奇峰常師之其痛快處如飛鳥出林驚蛇入草如過折筆之路一一自然真卿曰何如屋漏雨痕素起握真卿手曰得之矣釋亞棲論書凡書通即變王變白雲體歐變右軍體桞變歐陽體永禪師褚遂良顔真卿虞世南李雍陸柬之等得書中之法後皆自變其體以傳於世俱得垂名若執法不變縱能入石三分亦被號為書奴終非自立之體此書家之大要也林韞撥鐙序略大凡點畫不在拘之長短遠近但勿遏其勢俾令筋骨相連意在筆先然作字自有容與徘徊翩翩然有磊落崔嵬之勢若平直相似狀若算子此畫爾豈書法耶吾昔受教韓吏部其法曰撥鐙推拖撚拽是也訣盡於此子其旨而味乎李約壁書飛白蕭字贊字在建鄴古壁韓晉公遷之南徐置於海榴堂座右昔創飛白蔡氏所得起於堊帚播於翰墨張王繼作子雲精極壁昏蜃素墨池古色翻飛露白乍輕乍濃翠箔映雪羅衣從風崩雲委地遊霧縈空撥刺勢動蟉蟠氣雄昆池駭鯨時閃鬭龍攢毫疊孔或橫或縱層層陳雲森森古松君子况德高人比蹤抱素自潔含草內融逸疑方外縱在規中密而不離踈而有容藝通造化比象無窮子雲臣梁蕭字逾真點畫均豐姿形端異迹絶繭素名空傳記明徵褒貶惟此一字張懷瓘十體略節案古文者黃帝史蒼頡所造也頡首四目通於神明仰觀奎星圓曲之勢俯察龜文鳥迹之象博采衆美合而為字是曰古文按大篆者周宣王太史史籀所作也始變古文或同或異謂之為篆篆者傳也傳其物理施之無窮以史官製之用以教授謂之史書秦趙高善篆始皇命以教胡亥故秦焚書惟易與史篇得全按籀文者亦太史史籀之所作也與古文大篆小異後人以名稱書謂之籀文甄豐定六書以為奇字是也其迹有石鼓文存焉按小篆者秦丞相李斯所作也增損大篆籀文謂之小篆始皇并六國斯時為廷尉乃奏不合秦文者於是天下行之畫如鐵石字若飛動作楷𨽻之祖為不易之法其銘題鍾鼎及作符印圖書至今多用焉按八分者秦羽人王次仲所作也次仲始以古書方廣少波勢以𨽻草作楷法字方八分言有模楷後人以若八字分散故名之為八分始皇之世出其數書小篆古形猶存其半八分已減小篆之半𨽻又減八分之半然可云乎似父不可云乎似子故知𨽻不能生八分矣本謂之楷書楷書者法也式也模也時人用寫篇章或寫法令亦謂之章程書按𨽻書者秦下邽人程邈所造也邈始為獄吏得罪始皇幽繫雲陽獄中覃思十年改大小篆方圓而為𨽻書三千字奏之始皇善之用為御史以奏事繁多篆字難成乃用𨽻字以為𨽻人佐書故名篆書按八分小篆之捷𨽻八分之捷也按章草者漢元帝黃門令史遊所作也遊作急就章解散𨽻體此乃存字之梗槩損𨽻之規矩縱任奔逸赴急就成因草創之意故名草書夫章草即𨽻書之捷亦章草之捷也按行書者後漢潁川劉德升所作也即正書之小偽務從簡易相間流行故謂之行書王獻之常白父云古之章草未能宏遠頓異真體合窮偽略之理極草縱之致不若藁行之間於往法固殊也大人宜改體觀其騰煙麗火則回祿喪精覆海傾河則玄冥失馭天假其魄非學之功故得之者先稟於天次質於功用而善學者乃學之於造化異類而求之固不取乎似本而各挺之自然王愔云晉世工書者多以行書著名按飛白者後漢左中郎將蔡雍所作也王隱云飛白變楷製也本是宫殿題署勢既徑丈字宜轉微不滿名為飛白按漢靈帝熹平年詔蔡雍作聖皇篇上時修飾鴻都門伯喈待詔門下見役人以堊帚成字心有悅焉歸而為飛白之書其體有二創法於八分窮微於小篆自非蔡公設妙豈能詣此可謂勝寄冥通縹眇神仙之事按草書者後漢張伯英之所造也草猶粗也粗書為本曰藁蓋草書之文祖出於此書之先因於起草自杜度妙於章草崔瑗父子繼能然伯英學崔杜之法溫故知新因而變之以成今草轉精其妙字之體勢一筆而成偶有不連而血脈不斷及其連者氣侯通而隔行唯子敬明其深指故行首之字往往維前行之末世稱一筆書是也實亦約文該思應指宣言列缺施鞭飛廉縱轡也張懷瓘用筆十法偃仰向背兩字併為一字須求點畫上下偃仰離合之勢陰陽相向陰為內陽為外斂心為陰展筆為陽須相應左右亦然鱗羽參差點畫編次無使齊平要如魚鳥之陳有前後舒徐之勢峰巒起伏起筆蹙衄如峰巒之狀殺筆亦須存結草真偏枯兩字或三字不得真草合成一字謂之偏枯須求映𢃄字勢雄媚斜正失則落筆結字分付點畫之法須依位次安排不可失其凖則遲澀能動勒鋒磔筆字須飛動無凝滯之勢是謂得法射空玲瓏謂煙惑識等字勢行草用筆不依前後尺寸規度不可長而有餘短而不足須引筆至盡處則字有凝重之態隨字變轉如蘭亭年字一筆作懸針其下歲字則變垂露又其間字體多變幻不同自首至尾一十八箇之字各别其意李後主書述略書有七字法謂之撥鐙自衛夫人并鍾王二家傳於歐虞褚顔等所謂七法者擫壓鈎揭抵導送是也今有顔魯公墨迹存於世歐陽文忠公筆記蘇子美嘗言用筆之法較之斜正之間便分工拙能知此及虛腕則羲獻之書可以意得也蘇文忠公論書獻之少時學書逸少從後取其筆不得知其長必能名也僕以為不然善書者不在筆牢浩然聽筆之所之而不失法度乃為善逸少所以重其不可取者獨以其小兒用意精至卒然掩之而出其不意也凡世之所貴必貴其難真書難於飄揚草書難於嚴重大字難於結密而無間小字難於寬綽而有餘書法備於正書溢而為行草未能正書而能行草猶未能莊語而輒放言無足道也把筆無定法要使虛而寬歐陽文忠公謂余當使指運而腕不知此語最妙方其運也左右前後却不免欹側及其定也上下如引繩此之謂筆正書初無意於佳乃佳爾章書雖是積學乃成然要是出於欲速古人云匆匆不及草書此語非是若匆匆不及乃是平時有意於學此弊之極遂至於周越仲翼無足怪者吾書雖不甚精然自出新意不踐古人是一快也題自作字東坡平時作字骨撑肉肉沒骨未嘗作此瘦妙也宋景文公自名其書鐵線若東坡此帖可謂云爾已矣元符三年九月二十四日遊三洲嵓回舟中書黃文節公論書心能輕腕手能轉筆書字便如人意古人工書無他異但用筆耳用筆不知擒縱故字中有筆如禪家句中有眼非深解宗趣豈易言也王氏書法以為如錐畫沙如印印泥蓋言藏鋒筆中意在筆前耳承學之人更用蘭亭永字以開字中眼目能使學家多拘忌成一種俗氣要之右軍二言羣言之表也帖中有張芝書狀二十許行索靖急就章數行清絶瘦徑雖王氏父子當斂手者也今之學書者知有二王而不求之二王之上亦未為善學二王者也筆力同中有異異中有同後百年如有别書者乃解余語耳張長史折叉股顔太師屋漏䀶王右軍畫沙印泥懷素飛鳥出林驚蛇入草索靖銀鈎蠆尾同時一筆心不知手手不知心法耳若有心與能者爭衡後世不朽則與工藝史有同功矣凡書要拙多於巧近世少年作字如新婦粧梳百般點綴終無烈婦態也肥字須要有骨瘦字須要有肉古人學書學其工處今人學書肥瘦皆病又嘗備得其人醜惡處如今人作顔體乃其瘵然者凡學書欲先學用筆用筆之法欲雙鈎回腕掌虛指實以無名指倚筆則有力古人學書不盡臨摹張古人書於壁間觀之入神則下筆時隨人意學字既成且養於心中無俗氣然後可作以示人為楷式凡作字須熟觀魏晉人書會之於心自然得古人筆法也欲學草書須精真書知下筆面背則識草書法草不難工矣今俗書庵字既於篆文無有又菴非屋不當從廣後漢皇甫規為中郎將持節監關中兵會軍大疫親入菴廬視三軍感悅即用此菴字為有依據回黨柏舟書云書字已佳但疑是單鈎肘臂著紙故尚有拘曲不放浪意態耳大槩書字楷法欲如快馬斫陳草法左規右矩此古人妙處來樊道舟中觀長年蕩槳羣丁撥掉乃覺少進意之所到輒能用筆余寓居開元寺之怡偲堂坐見江山每於此中作字似得江山之助然顛長史狂僧皆倚酒而通神入妙不飲酒忽十五年雖欲善其事而器不利行筆處時時蹇蹶計遂不得復如醉時書也顧况咏白髮出嫁宫人準擬人看似舊時山谷草書無乃似之米襄陽論書吾書小字行書如大字唯家藏真迹跋尾間或有之不以與求書者心既貯之隨意落筆皆得自然備其古雅壯歲未能立家人謂吾書為集古字蓋取諸長處總而成之既老始自成家人見之不知為何祖也世人多寫大字時用力捉筆字愈無筋骨神氣作圓筆頭如蒸餅大可鄙笑要須知小字鋒勢全備都無刻意做作乃佳自古及今余不敏實得之榜字固已滿世自有識者知之石曼卿作佛號都無回轉摺之勢小字展令大大字反令小是張顛教顔真卿謬論蓋字自有大小相稱且如寫太乙之殿作四窠分豈可將乙字肥滿一窠以對殿字乎蓋自有相稱大小不展促也余嘗書天慶之觀天之皆四筆慶觀多畫在下各隨其相稱寫之挂起氣勢自𢃄過皆如大小一般真有飛動之勢字有骨格肉須裹筋筋須藏肉帖乃秀潤生布置穩不俗險不怪老不枯潤不肥變態貴形不貴苦苦生怒怒生怪貴形不貴作作入畫畫入俗皆自病也唐官告在世為禇陸徐嶠之體殊有不俗者開元來緣明皇字體肥俗始有徐浩以合時君所好經生亦自此肥開元以後無復有矣石刻不可學但自書使人刻之已非已意也故必須真迹觀之乃得趣如顔真卿每使家僮刻字故會主人意修改波撇致大失真唯吉州廬山題名題訖而去後人刻之故皆得其真無做作之差乃知顔出於褚也夫真迹皆無蠶頭燕尾之筆與郭知運爭坐位帖有篆籀氣頗傑思也柳與歐為醜怪惡體但其弟公綽乃不俗於兄筋骨之説出於柳世人但以弩張為筋骨不知不弩張自有筋骨存焉書至𨽻興大篆古法壞矣籀各隨字形大小故如百物之狀活動完備各各自足𨽻乃始有展促之勢而三代之法亡矣又論臨摹二法世人多不曉臨摹之别臨謂以紙在古帖法書之旁觀其形勢而學之若臨淵之臨故謂之臨摹謂以薄油紙覆古帖書法之上隨其大小輕重而拓之若模畫之摹故謂之摹又有以厚紙覆帖上就明牖而摹之又謂之嚮拓焉臨摹二者迥殊不可亂也又論小楷提筆陳寺丞相伯修子也嘗於枕屏效元章筆迹書杜陵詩一日元章過之見而驚焉伯修命出拜元章甚喜因授以作字提筆之法曰以腕著紙則筆端有指力無臂力也曰提筆亦可作小楷乎元章笑顧小吏索紙書其作進黼扆贊表筆畫端謹字如蠅頭而位置規模皆若大字父子嘆服因請其法元章曰此無他每作字時不可一字不提筆久當自熟矣黃祕書伯思論書昔人運筆側掠弩躍皆有成規若法度禮樂不可斯須離也及造微妙則出沒飛動神會意得然所謂成規者初未嘗失今世人作一波畫尚未知厝筆處徒規規強效古人縱成亦不過為印刻字耳流俗言作書皆欲懸腕而聚指管端真必用此法乃善豫謂不然逸少書法有真一行二草三以言執筆去筆跗遠近耳今筆長不過五寸雖作書必在其三而真行彌近今不問正草字欲其聚指管端乃妄論也今觀晉宋及唐人畫圖執筆者未曽若此可破俗之鄙説凡書衡難從易方正在二者間不悟書意者強作橫書不斜則濁蜀中一人是已此體惟鍾索盡古人之妙宋齊人似之梁陳隋至唐終不近也衡一作橫張懷瓘云飛白全用𨽻法蓋八分之輕者今世人為此書巧全用草法正與古背馳矣又鮑照飛白用毫筆乃能成字或輕或重也蓋或輕若絲髮或重若雲山濃淡相錯乃成字若不用毫筆書之則不能若此唐人更不作章草書近來有濟及洪府人強學之所謂不堪位置舉止羞澀終不似真俗人未嘗知古人用筆處見其人書者隨象稱善皆曰鍾王復出矣漢甄豐稽正古文字其一古文魯堂壁中書也其二奇字即古文而異者古文高質而難遽造若三代鼎彛遺篆是已奇字怪巧而差異正若漢劉棻從揚雄所學及近世夏鄭公集四聲韻所載是已今人往往不能辨之遂盡以奇字為古文焉珊瑚網卷二十三上欽定四庫全書珊瑚網卷二十三下明汪砢玉撰法書題跋宋高宗翰墨志余自魏晉以來至六朝筆法無不臨摹或蕭散或枯瘦或遒徑而不回或秀異而特立衆體備於筆下意簡猶存於取舍至若禊帖則測之益深擬之益嚴姿態橫生莫造其原詳觀點畫以至成誦不少去懷也法書中唐硬黃自可喜若其餘紙扎俱不精乃託名取售然右軍在時已苦小兒輩亂真况流傳歷代之久􅎓本雜出固不一幅鑒定者不具眼目所以去真益遠惟識者久於其遠當自辨也余每得右軍或數行或數字手之不置初若食喉間少甘則已末則如食橄欖真味久愈在也故尤不忘於心手頃自束髮即喜攬筆作字雖屢易典型而心所嗜者固有在矣凡五十年間非大利害相妨未嘗一日去紙筆故晚年愈得趣橫斜平直隨意所適至作尺餘大字肆筆皆成每不介意至或膚腴硬山林丘壑之氣則酒後頗有佳處古人豈難到也士人作字有真行草𨽻篆五體人多以篆𨽻各成一家真行草自成一家者以筆意本不同每拘於點畫無放意自行之迹故别為户牖若通其變則五者皆在筆端了無關塞惟在得其道而已非手神頴悟力學不倦至有筆冢研川者似未易語此士人於書法必先學真書者以八法皆備不相附麗至側字亦可正讀不渝本體蓋𨽻之餘風若楷法既到則肆筆行草間自然於二法臻極奧乎妙體了無缺軼反是則流於塵俗不入識者目矣吾於次敘得之因筆其梗槩昔人論草書謂張伯英以一筆書之行斷則再連續蟠屈拏攫飛動自然筋骨心手相應所以率情運用略無留滯故譽者云應指宣事如矢發機霆不及激電不及飛皆造極而言創始之意又云忙不及草者豈草之本旨哉正須翰動若馳落紙雲煙方佳耳劉正夫論書字美觀則不古初見之使人甚愛次見之則得不到古人處三見之覺傍旁點畫不合古者盈盈在眼矣字不美觀者必古初見之不甚愛再見之得其到古人處三見之自偏旁點畫合法度者歷歷在眼矣故觀今之字如觀文繡觀古之字如觀鐘鼎學古人字期於必到若至妙處始會於道則無愧於古矣執筆要分直側直筆圓側筆方用法有異而執筆初無異也其所以異者不過遣筆用鋒之差變耳蓋用筆直下則鋒常在中欲側筆則微倒其鋒而書體自然方矣若夫執筆不可不方也古人學皆用直筆王次仲等始有倒法薑堯章書譜真行草書之法其源出於蟲篆八分飛白章草等圓徑古淡則出於蟲篆點畫波發則出於八分轉換向背則出於飛白簡便痛快則出於章草然而真草與篆各有體製歐陽率更顔平原輩以真為草李雍李西臺輩以行為真亦以古人有專工真書有專工草書者有專工行書者信乎真不能兼也或云草書千字不抵行書十字行書十字不扺真書一字意以草至易而真至難豈真知書者哉大抵下筆之際盡倣人則少神氣專務遒徑則俗病不除所貴熟習兼通心手相應斯為美矣白雲與率更書訣亦能言其梗槩孫過庭論之又詳皆可參稽之真書真書以平正為善此世俗之論唐人之失也古今真書之神妙無出鍾王二家今觀其書皆瀟灑縱橫何拘平正良繇唐人以書判取士而士大夫書類有科舉氣習顔魯公作干祿書是其證也矧虞顔柳前後相望故唐人下筆應規入矩無復魏飄逸之氣且字之長短大小斜正踈密天然不齊孰能一之謂如東字之長西字之短口字之小體字之大朋字之斜黨字之正千字之踈萬字之密畫多者宜瘦畫少者宜肥魏晉書法之高各盡字之真態不以已意參之耳或專喜平正極意歐顔或惟務圓勻專師虞永或謂體須稍匾則自然平正此又有徐會稽之病或欲其蕭散則字不塵俗又有王子敬之風豈足以盡書法之美哉真書用筆自有八法吾嘗採古人筆列以為圖今略言其指大點者字之眉目全藉顧盼精神有向有背隨字異形橫直畫者字之體骨欲其硬正勻淨有起有止貴長短相合結束堅實丿音撇音拂者字之手足伸縮異處變化多端要如魚翼鳥翅有翩翩自得之趣挑剔者字之步履欲其沈實晉人挑剔或𢃄斜拂或橫引向外至顔柳始正鋒為之正鋒則無飄逸之氣轉折者方圓之法真多用折草多用轉折欲少駐駐則有力轉欲不滯滯則不遒然而真以轉而後遒草以折而後徑不可不知也懸針者筆欲極正自上而下端若引繩垂而後縮謂之垂露翟伯壽問於米老曰書法當何如米老曰無垂不縮無往不收此必至精至熟然後能之古人遺墨得其一點一畫皆昭然絶異者以其用筆精妙故也大令以來用筆多矣一字之間長短相補斜正相柱肥瘦相混求妍媚於成體之後至於今尤甚焉結體用筆不欲太肥肥則形濁又不欲太瘦瘦則形枯不欲多露鋒芒露則意不持重不欲深藏圭角藏則體不精神不欲上小下大不欲左高右昻不欲前多後少歐陽率更結體雖太拘而用筆大備衆美雖小楷而翰墨灑落追蹤鍾王來者不能及也顔柳結體既異於古人用筆復溺於一偏豫評二家為書法之一變數百年間人爭效之字畫剛徑固不無為高明之助而魏晉風軌掃地盡矣然柳氏大字偏旁清徑可喜更為奇妙近世亦有效之者則俗濁不除不足觀故知與其太肥不若瘦硬也草書草書之體如人坐卧行立揖遜忿爭乘舟躍馬歌舞躃踊一切變態非苟然者又一字之體率有多變有起應如此起者當如此應各有義理王右軍書羲定字當字得字深字慰字最多多至數十字無有同者而卒未嘗不同也可謂所欲不踰矩矣大凡學草書先當取法張芝皇象索靖等章草則結體平正下筆有源然後倣右軍申之以變化鼓之以奇崛若泛學諸家則字有工拙筆多失誤當連反斷當斷反續不識向背不知起止不悟轉換隨意用筆任筆賦形失誤顛錯反為新竒自大令以來已如此矣况今世哉然而襟韻不高記憶雖多莫測塵俗若使丰神蕭散下筆便當過人自唐以前多是獨草不過兩字連屬纍數十字而不斷曰連綿遊絲此雖出於古人不足為奇更成大病古人作草如今人作真何嘗苟且其相連處特是引帶嘗考其字是點畫處皆重非點畫處偶相引帶其筆皆輕雖後變化多端未嘗亂其法度張顛懷素最號野逸而不失此法近代山谷老人自謂得長沙三昧草書之法至是又一變矣流至於今不可復觀唐太宗云行行若縈春蚓字字如綰秋蛇惡無骨也大揚用筆有緩有急有有鋒有無鋒有承接上文有牽引下文乍徐還疾忽往復收緩以倣古急以出奇有鋒以耀其精神無鋒以含其氣味橫斜曲直鈎環盤紆皆以勢為主然不欲相𢃄𢃄則近俗橫畫不欲太長長則轉換遲直畫不欲太多多則神癡以捺代以丨發代走走亦以捺代之唯丿則間用之意盡則用懸針意盡須再生筆意不若用垂露耳用筆用筆如折叉股如屋漏痕如錐畫沙如壁折此皆後人之論折叉股者欲其曲折圓而有力屋漏䀶者欲其無起止之迹錐畫沙者欲其鈎而藏鋒壁折者欲其無布置之巧然皆不必若是筆正則藏鋒筆偃則鋒出一起一倒一晦一冥而神奇出焉常欲鋒在畫中則左右皆無病也故一點一畫皆有三轉一波一拂又有三折一丿又有數樣一點者欲與畫相應兩點者欲自相應三點者必一點起一點𢃄一點應四點一起兩𢃄一應筆陳圖云若平直相似狀如算子便不是書又如口當行草時尤宜泯其稜角以寬間圓美為佳心正則筆正意在筆前字居心後皆名言也故不得中行與其工也寧拙與其弱也寧徑與其鈍也寧速然極須淘汰俗姿則妙處自見矣大要執之欲緊運之欲活不可以指運筆當以腕運筆執之在手手不主運運之在腕腕不知執欲作者亦須略考篆文須知點畫來歷之先後如左右之不同刺刺之相異王之與玉示之與衣以至秦奉泰春形同理殊得其源本斯不浮矣孫過庭有執使轉用之法當熟玩之用墨作楷墨欲乾然不可太踈行草則燥潤相雜潤以取妍燥以取險墨濃則筆滯燥則筆枯亦不可不知也筆欲鋒長徑而圓長則含墨可以運動徑則有力圓則妍美豫嘗評世有三物用不同而理相似良工引之則緩來舍之則急往世俗謂之揭箭寶刀按之則曲舍之則徑直如初世俗謂之回性筆鋒亦欲如此若一引之後已曲不復挺又安能如人意耶故長而不徑不如勿長徑而不圓不如不徑蓋紙筆墨皆書之助也行書嘗考魏晉行書自有一體與草不同大率變真以便於揮運而已草出於章行出於真雖行書各有定體縱復晉代諸賢亦各不相遠蘭亭記及右軍諸帖第一謝安石大令諸帖次之顔楊蘇米亦後世可觀者大要以筆力為貴少有失誤亦可輝映所貴乎濃纎間出血脈相連筋骨老健風神灑落姿態具備真有真之態度行有行之態度草有草之態度必須博習可以兼通焉臨摹摹書最易唐太宗云卧王濛於紙中坐徐偃於筆下可以嗤蕭子雲唯初書者不得不摹亦以節度其手易於成就皆須是古人名筆置之几案懸之座右朝夕諦觀思其運筆之理然後可以臨摹其次雙鈎蠟本須精神摹拓乃不失位置之美耳臨書易失古人位置而多得其筆意摹書易得古人位置而多失其意臨書易進摹書易忘經意與不經意也夫臨摹之際毫髮失真則神情頓異所貴詳謹世有蘭亭敘何翅數百本而定武本為最佳然定武有數樣今取諸本參之其位置長短大小無不一同而肥瘠剛柔工拙要妙之處如人之有面目無有同者以此知定武刻又未必得真迹風神矣字書全以風神超邁為主刻之金石其或苟哉雙鈎之法須得墨暈不出字外或郭填其內或朱其背正得肥瘦之本體雖然尤貴於瘦使工人刻之又從而刮治之則瘦者亦變為肥矣或云雙鈎時須倒置之則亦無容私意於其間誠使下本明上紙薄倒鈎何害若下本晦上紙厚却須能書者為之發其筆意可也夫鋒芒圭角字之精神大扺雙鈎多失此意又須朱其背時稍致意焉丹書筆得墨則瘦得朱則肥此常然也故書丹尤以瘦為奇而圓熟美潤常有餘燥徑老古常不足蓋朱使之然也欲石刻不失其真未有若丹書者之善矣然書時盤礴不無所勞韋仲將升高書凌雲臺榜下則鬚髮已白藝成而下斯之謂與若鍾繇李雍又自刻之可謂癖矣精神藝之至未始不與精神通其説見於昌黎送高間序與孫過庭乖合篇二語詳之矣夫字有藏鋒出鋒之異粲然盈楮欲其首尾相應上下相接為佳後學之士隨所記憶圖寫其形未能涵容皆支離而不相貫串黃庭與樂毅不同畫讚與蘭亭殊旨一時下筆各有其勢固應爾也豫嘗觀古之名書無不點畫振動如見其揮運之時山谷云字中有筆如禪家句中有眼信然哉方圓方圓者真草之體用真貴方草貴圓方者參之以圓圓者參之以方斯為妙矣然而方圓曲直各自有要真須涵泳一切於自然如草書尤嫌直橫分明橫直多則字有積薪束葦之狀而無散蕭之氣時時變換一出之斯為善矣向背向背者如人之顧盼指示相迎相揖相逐相奔發於左者應於右起於上者伏於下大要點畫之間施設各有情理求之古人惟王右軍為妙位置假如立人挑土王衣示一切偏旁皆須令狹長則右有餘地矣在右者亦然不可涉於太密太巧太密太巧是唐人之病也假如口字旁在左者皆與上齊鳴呼喉嚨唯喻等是也又如宀人疒尸等字須令覆其下走辵兀心等字須能承其上審其輕重使相負荷計其大小使相副稱為妙踈密書以踈為風神密為老氣如圭之四橫川之三直魚之四點畫之九畫必須下筆輕徑停勻為佳當踈不踈反成寒乞當密不密必至凋零風神風神者一須人品高二須師法古三須紙筆佳四須險徑五須高明六須潤澤七須向背得宜八須時出新意則自然長者如秀整之士短者如精悍之徒瘦者如山澤之臞肥者如貴遊之子徑者如武夫之勇猛媚者如美女之嬌嬈欹斜如醉仙端楷如賢士各任其態也夫遲以取妍速以取徑先必能速然後能為遲若素不能速而專事遲則無神氣若專事速又多失勢筆鋒筆鋒之初有搭鋒者有折鋒者其一字之體定於初下筆凡作第一字多是折鋒第二三字承上筆勢多是搭鋒若一字之間右邊多是折鋒應其左故也又有平起者如𨽻書藏鋒者如篆畫大要折搭多精神平藏善含畜兼之則妙矣廣川論體裁峻拔一角潛虛半股此於法書體裁當如此矣至於分若抵背合如並目以側暖斜以斜附曲然後成書而古人於此蓋盡之也趙子固書法論學唐不如學晉人皆能言之夫豈知晉豈易學哉學唐尚不失規矩學晉不從唐入多見不知量也僅能欹斜雖欲媚而不媚翻成畫虎之犬耳何也書字當立間架墻壁則不骫骳思陵書法未嘗不圓熟要之於間架墻壁處不著工夫此理可為識者道近得此方舊本虞永興破邪論序愛而不知其惡也故為此説正坐無壁牆也右軍樂毅畫讚蘭亭最真一一有墻壁者一榻直下是也李瑋家開皇帖行書之祖於此最昭昭化度及魯公離堆得此法左右陰陽極明麗丁道護啓法寺碑筆右方直下最具此法學者當垂情如此下筆則如麗方直端重楷正昧此則癡鈍墨豬矣黃庭賀揵有鍾體雖微欹側隱然亦有牆壁力命表徑利更高學者母但徇俗而不實本唯遺教經宛然是經生筆了無神明決非羲筆正如率更之玩長孫無忌面團團也識此已又識破懷仁聖教之流入院體也其逸筆處世謂之小王書此書一一體蘭亭玉潤霜寒諸帖即無此逸筆不知懷仁從何取入使後人未倣羲帖先為此態觀之可惡其流至於蘭溪經藏記烏龍廟記僧有交之集書極矣又須戒徐會稽之濁在跛偃李北海之濁在欹斜唯張從申得大令之通暢無二公之流弊且世云會稽出自蘭亭蘭亭即無偃筆也又云北海深悟大令大令不若是之欹跛也跛偃之流弊而悮吾坡公欹斜之弊流而為元章父子矣且如吳傳朋深得諸葛禎瑶臺寺碑筆法的是蘭亭中出矣公又生出一節病每下豎筆不直榻下乃仰筆尖鋒全無氣骨皆清和之弊為隘不恭學者更切自防之自點檢之朋友相警悟之前修長中之短亦無畏友以覺其非耳故豫深信間架牆壁為要也余自謂學古人當徑媚今人當無心可也中興後朱壑巖橫斜顛倒幾若楊少師孫勒川規矩恐下筆不中觀者元章曰奴書耳朱吾所取孫吾所戒也更從識者評之學𨽻楷於魏晉之下邈乎無以稽也縱有羲繇之迹號存絶者唯樂毅論海字秣陵本爾其唐元度魚帖本已非古本文次有德州畫讚而已若所謂力命表固繇精筆古徑幾不入俗眼然尊之敬之未容而友之也黃庭固類繇欹側不中繩度未學唐人而事此徒成畫虎類尖然則欲從入道於楷何從曰僅有三焉化度九成廟堂耳晉宋而下分而南北有丁道護襄雖有態度何取態度者書法之餘也骨格者書法之祖也今未正骨格先尚度態幾何不舍本而求末耶戒之戒之泛入之門先敬先戒平平直直輕輕勻勻俗咎率更體為排算固足以攻其短然先排算而尚氣脈乃可不排算而求之是未行而先馳理不至爾分間布白勿令偏側此誠格言每一字為率筆多筆少不同先須分布勻整若此未調順工何從生又有一般偏旁不可盡律以正字每字必欹歲字必舛有字不可破中叢字取居中而又左右皆須以古人所書求其義理執一而論第曰中正此李後主譏魯公為田舍翁又如褚河南如稱八分古雅有韻一切尚之甚有踈拙薛少保發越褚體飄揚透徹一尚不回幾至迂踈魯公之正其流也俗誠懸之徑其弊也寒古往今來中庸鮮能千載之下刻心苦神諸其然者要是文章之外唯此足以觀人發揮形容有足尚者不忍逮也又嘗妄論文章精到尚可改飾字畫落筆更不容加工求以益之適或壞之此吾知字書之貴一生眠則畫被坐則畫地將老無功此藝厥為不易哉分布六法左欲去吻一右欲去肩左右兩平陽啓法寺興國寺二石啓法最精歐虞之所自出興國粗甚如此兩手天不壽精而壽粗可嘆也北方多朴有𨽻體無晉逸雅謂之氈裘氣合於隋書同文軌開皇大業以逮武德之末貞觀之初書石無一可議此古今集大成之時也於是虞歐大宏厥聲始虞於龍聖道場歐於姚辨等刻亦未臻極及孔子廟堂碑飛來白鶴詩虞為法於世矣化度九成歐獨步於時矣欲求楷法舍此三者是南轅而北轍矣三書之法在平正恬淡分間布白行筆停勻且如橫書必兩頭均平不可如俗書左低右昻八訣所謂千里陳雲是也起筆既成冗類如鑿如錐則有泛冗錐則尖既不尖又必𢃄冗斯為絶妙及至書到右方住處捺筆不可面下須擁起向上於下如繩直其左方至筆之竪亦結筆在左穿心竪筆是也捺筆直下到立處微捺使鋒左向如畫之右肩突出鋒在上竪筆則突出鋒在左也又如十字處如中字牛字年字凡是一橫一直中停者皆當著心凝然正直平均不可使一高一低一斜一欹少涉世俗守此法既牢則凡施之間架自然平均使不俗氣俗之從生始於徐浩也知蘭亭韻致取有映𢃄不知先自背了繩墨欹斜跛偃雖上長下短右上滿喃左上右下滿所右下行草宜用棗心筆者以其摺裊婉媚然此筆須出鋒用之須捺筆鋒向左意趣只用筆腰不用筆尖乃可如真書直竪用尖則施之行草無態度此是要緊處人多未知之薑堯章孫過庭草書言能籠罨橫竪最善發明棗心筆於用之時每難揮運雙鈎懸腕久久得趣其要正在勿使筆尖也草書雖連綿宛轉然須有停筆為佳今長沙所開懷素自敘乃蘇滄浪輩書一向裊摺無典則北方有一本正不如此或欹或連乃為正當草極難於拙故蘇草不及行也晉賢草體虛淡蕭散此為至妙唯大令綰秋蛇便為文皇所譏至唐旭素等方作連綿之筆此黃伯思簡亝堯章所不取也今人但見爛然如藤纒者為草書之妙要之晉人之妙不在此法度端嚴中蕭散為勝耳右軍三卷僅一半真施老子印證簡亝堯章諸公議論去其間偽迹如求屏風帖早乘帖止開真帖五卷於海陵當此以為區處鄭夾漈六書偏旁例論六書起一成文衡為一縱為丨音衮邪為丿房必反反丿可會則屬諸聲聲則無不諧矣五不足而後假借生焉六書無傳惟藉説文然許氏惟得象形諧聲二書以成牽子會意復為假借所擾故所得者亦不能守焉所以顛沛淪於經籍之中如泛一葦於溟海靡所底止皆為假借之所魅也嗚呼六書明則六經如指諸掌假借明則六書如指諸掌若夫省文則有聲關於義者有聲關於義者六書之道備於此矣夾漈通志六書論經術之不明繇小學之不振小學之不振繇六書之無傳聖人之道惟藉六經六經之作惟藉文言文言之本在於六書六書不分何以見義小學之義第一當識子母之相生第二當識文字之有間象形指事文也會意諧聲轉注字也假借文字俱也象形指事一也象形别出為指事諧聲轉注一也諧聲别出為轉注二母為會意一子一母為諧聲六書也者象形為本形不可象則屬諸事事不可指則屬諸意耳或又曰孔壁舊書皆科斗文字佳城之文獨顯於世曰古文雜用籀體非一於科斗也蓋古文有墳書麒麟鍾鼎篆文有垂露復書雜體𨽻之八分變而飛白行書草本𨽻𨽻出於籀籀始於古文皆體於自然效法天地然則豫何取衷哉曰漢時遠步晉唐至宋滋弗逮矣蒼夏之迹遠矣幣刀鼎鬲世復寡傳贊皇石刻其非西周乎詛楚其興於近代乎石鼓泰山碑暨於兩京遺書舊畫學者不可不歷觀焉黃庭謂非右軍書其誰作耶曰永僧徐浩輩為之也樂毅論舊本希見於世宋初王侍書别寫刻之洛神賦亦後人託獻之而詭行之墓田丙舍其鍾太尉之懿乎傷寒數帖其王會稽之奧乎李陽冰庶子泉銘怡亭刻石二世詔無是過也浯溪碑雅厚雄深森嚴於瘞鶴萬安記其苖裔乎郎官廳壁序祭濠州文末年誥身同出一軌所謂不約於法而凡踏焉者一掃歐虞褚薛之疲苶張顔疇宗與曰宗古文籀篆其開於陳蔡乎石室之書今亡矣其言曰書肇於自然陰陽生焉形勢立焉若日月雲霧若蟲食木葉若刀戟縱橫皆有意象左回右顧無使孤露藏頭護尾力在字中疾澀之分執筆之度八體變法之玄竅崔瑗之儔咸受業焉光和建安諸作高明精粹非魏晉所擬議張留侯蕭相國談筆道鍾太傅著論可謂格言矣諸葛武侯其知書之變乎揚子雲訓纂其説文切韻之本乎曰溪書衡肯亭包蒙其義則衍極竊取之矣夫字有九德九德則法法始乎包犧成乎軒頡盛乎三代草乎秦漢極乎晉唐萬世相因體有損益而九德莫之有損益也或曰九德孰傳乎曰天傳乎又問何以自得曰無愧於人為自得九德出虞書臯陶謨鄭肯亭忠質文論三皇尚忠五帝尚質三王尚文八卦忠也古文質也籀文也篆則王降而霸矣𨽻其秦之法令乎古𨽻𨽻之古文也八分𨽻之籕也楷法𨽻之篆也飛白八分之流也行楷之行也草楷之走也𨽻之規為方草則圓其矩也六書之道散也鄭子經書要篇六書之要其諧聲乎聲原於虛而妙於物言者聲之宣也書者聲之寄也飛龍肇音漻哉闐乎其罔聞也夾漈山人當是正之有音無文者多矣逮皇元圖書重啓人文諧書之義實宗乎五雖古之三皇龍書穗書雲書諸作蔑以加諸猗歟休哉商之倒薤周之虎書魚書其象形耶夷考禽書龜鸞諸體不過名物作為分勿反至而窮析一為􅗵音及反􅗵為呼旱反轉為乙音隱反為隱為居月反彼此折一為入即穴也音綿又音入轉入為側加反側為人音吠反人為音泉至而窮一再折為五犯反轉為口犯反側凵為音方反為音播至而窮引一而統合之則為音圍圓則為音星至則環轉無異勢一之道盡矣然與一偶一能生而不能生天地之道陰陽之理也篆通而𨽻辟故有左無右有􅀢音阜無􅀈篆明而𨽻晦故有王元玉有未無朱篆巧而𨽻拙故有音覓無音炯有無篆縱而𨽻拘故有刀無七有禾無未音稽然則篆之於𨽻其猶筮之於龜乎又天五篇同上出衍極天地之數合乎五皇極之道中於五四時之用成於五六書之變極於五是故古文如春籀如夏篆如秋𨽻如冬八分行草歲之閏餘也𨽻之興也其周之末造乎其民趨於簡陋乎或問石鼓顯於李唐韓退之韋應物以為周文王宣王時歐陽永叔蘇子瞻謂非史籀不能作而夾漈以為秦文信乎曰以漆文知之然則筆曷始乎曰尚矣書曰作會非筆何會紀於太常非筆何紀蘇望歐陽棐以三仁為漢石經趙德夫洪景不非之諒也或曰古書籀𨽻其渝渝乎久矣而何言之䑁古獄反明也耶曰吾聞達於理者古今不能隔審其機者鬼神莫能閟夫道一而已矣然則用筆有異乎曰有請問曰篆用直分用側𨽻楷曰間出存乎其人其人可得聞乎曰顔柳篆七而分三歐褚分八而篆二問行草曰篆多褉序間以分側有石書之遺意焉然則執筆有異乎曰夫執筆者書法之機鍵也近世善執筆者莫如張顔吾以此按天下圖書不能逃乎玉尺也善執筆則八體具不善執筆則八體廢寸以內法在掌指寸以外法兼肘腕掌指法之常也肘腕法之變也魏晉間帖指掌字也嗚呼師法不傳人便其所習便其所習此法之所以不傳也故惠施卒而莊子深暝不言鍾子期死而伯牙毁琴絶絃蓋傷世之難與知也或曰絳州潘氏托采奇墨祕禇昉於蒼頡訖於宋初其雅博乎曰淳化間太宗出內藏古迹命王著臨榻工用精嘉大觀絳潭猶有似人之喜戲魚黔江鼎澧無慮數十有無不足計也江季路之辨審矣曰營咨道二十萬購夫子廟碑劉潛夫十餘載求雍僧塔銘􅀈乎曰鴻都斷石猶有存者其古刻之天球乎黃初闕里記詞翰爾雅其南金乎漢碑三百銷蝕無幾何君閣道夏淳于碑可以全見古人面貌君謀𨽻纂其憂思深矣魏晉相承善學𨽻古莫如鍾王蕭阮諸人神氣浸殊體式未散歷隋而唐始有專門之學自此益分矣嗚呼偷風並趂其末造之孱民乎豪傑之生不數其精神猶參錯於元化之間乎書不盡言言不盡意孔氏遺迹陽冰獨神會之魯公之書懷素喜而有得似不在語言文字之苴乎或問衍極曰極者中之至也曷為而作也曰吾懼夫學者之不至也虞伯生六書淵源序略魏晉以來善𨽻書以名世未嘗不通六書之義不通其義則不得文字之情制作之故安有不通其義不得其情不本其故猶得為善書者唐之諸賢以書義相究辨折循規蹈矩無復有點畫差訛之弊嗟夫世之不知六書之義而效其波磔以為媚誠妄人矣吾丘衍學古編略篆法匾者最好謂之音果匾徐鉉謂非老手莫能到石鼓文字也小篆俗皆喜長然不可太長長無法但以方楷一字半為度一字為正體半字為垂腳豈不美哉腳不過三有無可奈何者當以正腳為主餘略收短如幡腳可也有下無腳字如之等字却以上枝為出如草木之為物正生則上出枝倒懸則下出枝耳𨽻書人謂宜匾殊不知妙在不匾挑拔平硬如折刀頭方是漢𨽻無體括云古徑古拙斬釘截鐵備矣欵識文者諸侯本國之文也古者諸侯書不同文故形體各異秦有小篆始一其法近世學者取欵識字為用一紙之上齊楚不分人亦莫曉其謬有芒氏墨兩碎金張長史謂大字促令小小字展令大董內直謂大字貴結密不結密則懶散而無精神扁榜宜字字相照應又宜飄逸氣清雅不俗一字之美皆偏旁湊成分折看時各自成一美始為大字之盡善者小字貴開濶字內間架宜明整開濶一如大字體段諸美皆具也胸中有書下筆自然不俗坡詩有云退筆如山未足琛讀書萬卷始通神此良言也為書之妙不在憑文案本妙在應變無方行行須有活字字字須求生動有功無性神彩不生有性無功神采不實兼此二者然後能齊古人筆正之説真格言也筆正則古人筆法皆如吾手矣側鋒取妍鍾王不傳之祕需毫之次法與鋒合然後運筆無非法也捉筆在手便須運意不可妄落一筆一筆才落便想第二筆合作如何下倘寫一字不成須於衆碑尋之若無即出意自造不可轉意率然而作臨書最有功以其可得精神也字形在紙筆法在手筆意在心筆筆生意分間布白小心布置大膽落筆左者右之右者左之偏者正之正者偏之以近為遠以遠為近以連為斷以斷為連筆近者意遠筆遠者意近字看碑帖須象運筆又須把其氣象隨所寓成形結字得形體不如得筆法得筆法不如得氣象學字如女子學梳掠惟性虛者尤能作態度只學一家書學成不過為人作奴婢集衆長歸於我斯為大成行書非草非真兼真謂之真行𢃄草謂之行草篆添𨽻減篆長𨽻匾八分書殆不始於秦水經注齊地掘古冡棺前有八分書驗文乃太公三世孫胡公之墓科斗古文大篆小篆亦自五帝時有之矣如禹刻岣嶁碑則用科斗宣王刻石鼓則用籀書唐人錢譜太昊氏金尊盧氏幣其文具存悉皆小篆太公九府圜錢黃帝布刀亦是小篆蓋書契既作字體悉具決不始於秦也唐升元帖以匱紙摹拓李廷圭墨拂之為絶品匱紙者打金箔紙也其次即用澄心堂紙蟬翅拂為第二品濃墨本為第三品也升元帖在淳化祖刻之上隋開皇帖之下迄今皆不可復見也世有絳帖潭帖臨江帖此三書絳本已少惟潭帖為勝者以僧希白所臨也希白於字畫得佳處故於二王帖尤邃若臨江則失真遠矣又淳化帖大觀帖當時以晉唐善本及江南所收帖澤善者悉出上聖規摹故風骨意象皆存在識者鑒裁而學者悟其趣法書中唐人硬黃可喜若其餘紙札俱不精古人論墨之佳曰輕堅黟黑入硯無聲又曰其堅如玉其文如犀又曰繢彩奮發論硯之佳曰秀潤玉質論筆曰長而不徑不如勿長徑而不圓不如不徑皆至理也唐六典有裝潢匠注音光上聲謂裝成而以蠟潢紙也今製箋法猶有潢製之説人多不解作平聲又改為裝池益謬甚矣洞天清録云書與畫一致也書者以濟畫之不及者也使畫可盡則無事乎書矣古之善繪者或畫詩或圖孝經或貌爾雅或像論語暨春秋或著易象皆附經而行猶未失其初也世道日降往往溺志於車馬士女之華怡神於花鳥蟲魚之麗遊情於山林水石之幽而古意衰矣李西涯論篆額裝潢舊碑石刻法帖上篆額斷不可去不然却似賢人不著冠耳祝京兆論楷書及扇書一血二骨三肉四筋五圓六直七平八方九結構十變十者備謂之楷書書聚骨扇如令舞女在瓦礫堆上作伎飛燕玉環亦減態矣呵呵楊升菴論擘窠書字體有擘窠書今書家不解其義按顔真卿集有云點畫稍細恐不堪久臣今謹據石擘窠大書王惲玉堂嘉話云東坡洗玉池銘擘窠大字極佳又云韓魏公書杜陵畫鶻詩擘窠大字此法宋人多用之墨扎之祖也弇山人巵言自張懷瓘以十體斷書一曰古文二曰大篆三曰籀文四曰小篆五曰八分六曰𨽻書七曰章草八曰行書九曰飛白十曰草鄭昻論文字之大變八一曰古文二曰大篆三曰小篆四曰𨽻書五曰八分六曰行書七曰飛白八曰草書其意蓋取程邈以後之𨽻與鍾王之今楷合而一之不然則是取漢碑之𨽻皆屬之於八分而單以𨽻為楷也歐陽永叔以八分為𨽻洪適因之而豐道生直斥其妄據道生之意以𨽻為八分以真為𨽻也是是即吾所疑張鄭之後説也夫以分為𨽻歐陽氏之誤小以𨽻為分以真為𨽻豐氏之誤大也為豐氏之説大約與張鄭同其一曰𨽻書者程邈為御史以奏事繁多篆字難成乃用𨽻人佐書以赴急速官司刑獄用之其二云次仲作八分書謂割篆八分存𨽻二分是先有𨽻而有分固矣其三據淳化閣帖有邈天得一以清數語為據此皆吾所不敢信之故也閣帖所存邈數十字略無二鍾古意止是稍增一點一畫以行怪如尤倉元命包假書填難字類耳此李懷琳輩之所不為而可據為邈書乎又眀言漢因行之獨符印幡信題署用篆則此外皆用真𨽻書矣而何自漢末以前無一筆也歐趙所書之碑又何無一真𨽻而皆分書也各書既謂之分書則其法正存今何嘗八分八篆也以吾所見唯皇象天發神讖有五分之篆蔡雍夏承有四方之篆疑此即所謂八分而八分以其不易習故少傳耳衛恆所贊𨽻勢如砥平繩直規矩折修短相奮筆輕舉離而不絶等語亦自與正書不甚應其為古𨽻無疑者後閲陸子淵書輯云秦興同天下之書而李斯遂為世宗時則趙高胡母敬改省籀篆同謂之小篆程邈所上務趨便捷謂之𨽻書王次仲分取篆𨽻之間謂之八分自邈以降謂之秦𨽻賈訪三倉蔡雍石經諸作謂之漢𨽻鍾王變體謂之今𨽻合秦漢謂之古𨽻庾元威造為散𨽻羲獻復變新奇則以今𨽻謂之楷法黃庭樂毅謂之小楷史遊解散𨽻體謂之章草張伯英之法謂之草書衛瓘復采芝法兼乎行書謂之藁草羲獻之書謂之今草結微眇者謂之小草復有遊絲之草宋蔡襄為飛草謂之散草劉伯升小變楷法謂之行書兼真謂之真行𢃄草謂之草行蔡雍所作輕微大字謂之飛白自餘諸體以類生矣蓋自是而𨽻與八分之説始明然謂羲獻復變新奇别以今𨽻謂之楷法此語覺贅蓋受禪勸進即鍾氏之古𨽻也尚書宣示墓田丙舍戎路表即鍾氏之今𨽻也羲獻不過增華耳古𨽻亦非鍾造東漢以後碑刻皆如之特鍾氏入妙耳飛白即古𨽻今𨽻蕭子云頗作篆皆大書用帚筆輕拂過或有𢃄行者其體若白而勢若飛今亦不傳矣後世有以草書作雙絲下中露白者為飛白極可笑吾三十時為余定州作飛白歌蓋從俗之語也今人稱草𨽻篆雖失作者之意然古𨽻今𨽻方圓徑婉體自難合析為真𨽻似亦未為不通吾衍曰秦𨽻者程邈以文牘繁多難以用篆因減小篆為經用之法故不為體勢若漢疑法篆字相近非有批法之𨽻也即是秦權秦量上刻字人多不知亦謂之篆八分則漢𨽻之未有挑剔者比秦𨽻則易識比漢𨽻則微篆似若用篆筆作漢𨽻則得之矣由此而言之則次仲所成八分恐存𨽻八分就篆二分也衍之此論一洗懷瓘千古之疑盡闢豐氏恣談之陋也衍又曰𨽻書人謂宜匾殊不知妙不在匾挑拔平硬如折刀頭方是漢𨽻衍此語尤合作正受禪勸進之所以妙也近代文徵仲得之瘦而怪者韓擇木也豐而匾者唐玄宗也拙而醜者朱協極也沈存中云古人以散筆作𨽻書謂之散𨽻近歲蔡君謨之言又以散筆作草書謂之散草或曰飛草其法皆生於飛白章草古𨽻之變也行草今𨽻之變也芝旭草又行草之變也行書有二有真𢃄行者如右軍蘭亭霜寒來禽官奴之類是也正行配者右軍旦極寒雪晴晚是也毒熱尊體何如奉橘夫人平康蔡家賓至愛鵝蘄茶晚復毒熱有以為唐文皇臨者夫人平康蔡家賓有以為後人書者理俱有之道生云雙鈎懸腕讓左側右虛掌實指意前筆後此古人所傳用筆之訣也如屋漏痕如壁折如印印泥如錐畫沙如折叉股古人所論作書之勢也然妙在四指得力俯仰進退收往垂縮剛柔曲直縱橫轉運無不如意則筆在畫中而左右皆無病矣此法鍾王之後唯藏真得之為多庶幾於是者唐則伯施信本登善虔禮紹京泰和伯高清臣誠懸五季則景度重光宋則君謨元章元則子山子昻本朝仲行貞伯希哲徵仲數人而已鍾太傅解散古𨽻而為今𨽻然張芝草書是今𨽻之變觀其行筆可知則太傅之前如曹師諸公亦已作今𨽻但非程邈體耳語云真以點畫為形質使轉為性情草以點畫為性情使轉為形質縱橫牽制之謂使鈎環盤紆之謂轉向背得宜之謂點畫又云神彩為上形質次之𨽻以規為方草則圓其矩大字促令小小字舒令大大字難於結密而無間小字難於寬綽而有餘此偏至之語大須意會不可典要又云小心布置大膽落筆梁武帝云點掣短則法擁腫點掣長則法離澌畫促則字橫畫踈則形慢拘則乏勢故又少則純骨無媚純肉無力少墨浮澀多墨笨鈍張長史傳此於顔平原而語少變董內直曰左欲去吻右欲去肩指欲實掌欲虛李萃曰虛掌實指緩紉急送意在筆前字居筆後黃山谷云心能轉腕手能轉筆米元章云肉須裹筋筋須藏肉皆臨池者所宜知也李陽冰云點不變謂之布棋畫不變謂之布算方不變謂之斗圓不變謂之環此言篆法也篆亦須變况其他乎聞之張敬玄云楷書把筆妙在虛掌運腕不宜把筆苦緊然大令小時作書右軍從後掣其筆不得非耶曰此有力也非苦緊也顔桞自有力二王化於力者也習顔桞者未免苦緊習二王者不妨虛和以筋骨立形以神情潤色出沒須有倚伏開合藉乎陰陽一畫之間變起伏於鋒杪一點之內殊衄挫於毫芒一畫失所如壯士之折一股一點失所如美人之眇一目取蘭亭之半以參宣示則華實配矣取化度之半以參廟堂則方圓協矣王肯堂鬱岡齋筆麈右軍執筆圖東陽陳及時有跋云其圖懸腕者二腕就几者一於張彥遠法書要録目中而不見其文依其執筆似覺紙上有瑟瑟蠶食葉聲隨意所之略無滯凝其法當大指對用食指頭以小指疊無名指倚管則腕回而筆正忽使管歸於食指第二節內則鋒藏而筆直然用事又全在中指運動取力於肩則字畫秀潤氣骨遒徑孔子曰工欲善事必先利其器此右軍筆圖之所以不可無也凡作楷書須筆筆依法書之鍾繇王羲之獻之智永虞世南歐陽詢顔真卿七家乃合楷法其餘不過真書耳唐人所謂經生字也刻石手唐人為最今世所傳宋榻本神采飛動恍如真迹如雲麾將軍九成宫銘聖教序之類皆唐刻也其轉折波磔處俱稜角分明故鋒頴雖露而古意運筆意象隱然在目後世摹勒者亦妄意藏鋒而轉摺波磔處俱以圓渾為工故成無骨之身無幹之樹停雲戲鴻之刻手固劣亦書家誤之也古人作書多肥少瘦凡碑初刻未經多拓畫深而字必肥久而榻多畫淺而字漸瘦瘦非真相也余每笑世人學聖教序多作細畫不知誤學斷碑後字耳董玄宰論字生熟字與畫各有門庭畫可生書不可不熟畫須熟後生字須熟外熟論臨顔書余近來臨顔書因悟所謂折叉股屋漏䀶者惟二王有之魯公直入山陰之室絶去歐褚輕媚習氣東坡有詩至於子美書至於魯公非虛語也顔公惟蔡明遠序尤為沈古米海嶽一生不能倣佛蓋亦為學唐初諸公書稍乏骨氣耳燈下為此都不對帖雖不至入俗第神采璀璨即是不及古人處漸老漸熟乃造平淡米老猶隔敢自許逼真乎題以志吾愧陳眉公論筆墨見妮古録世人愛書畫而不求用筆用墨之妙有筆妙而墨不妙者有墨妙而筆不妙者有筆墨俱妙者有筆墨俱無者力乎巧乎神乎膽乎學乎識乎盡在此矣總之不出藴藉中沈著痛快論臨帖見太平清話臨帖切忌緊逼相逼而視吾身方在甕中安能運甕此亦旁觀棋枰小變法耳嘗訪古帖置之几上其益有五消永日汰俗情一益也分别六書宗派二益也多識古文奇字三益也先賢風流韻態如在筆端且可以披其遺行逸籍交遊宅墓四益也不必鈎拓日與聚首如薰修法自然得解五益也竹懶論小楷古人不貴小楷謂之𨽻書為胥𨽻所書耳梁武敕臣下書疏皆用行押筆自書唯署名稍謹耳唐文皇令三館諸生寫道釋諸經以其楷正名經生體士大夫不為也竹雨屢要豫作楷豫目昏甚苦之為作一絶以冷其意然實書家正論也鴨頭狸骨擅雄奇不數銀鈎蠆尾齊請看貞觀寫經手品流虞褚隔雲泥論治書四種唐人崇事法書其治書有四種曰臨曰摹曰嚮拓曰硬黃臨者置紙法書之傍睥睨纎濃點畫而倣為之摹者籠紙法書之上映照而筆取之嚮拓者坐暗室中穴牖如盎大懸紙與法書映而取之欲其透射畢見以法書故縑色沈暗非此不徹也硬黃者嫌紙性終𢃄暗澀置之熱尉斗上以黃蠟塗勻紙雖稍硬而瑩徹透明如世所為魚枕明角之類以蒙物無不纎毫畢見者大都施之魏晉鍾索右軍諸迹以其年久本暗又所宗師故極意取之臨書如雙鴻並翔各極其致不必為步驟之拘非於書有深詣者不能也以故屬之虞褚公以下三者則趙模馮承素輩職耳昔張思聰善摹古帖自名翻身鳯凰屠緯真考槃餘事古帖歷年遠而裱數多其墨濃者堅若生漆以手楷之纎毫無染兼之摩弄積久紙面光彩如砑古意生然故面舊而背色表新其側勒轉拓處並無沁墨水迹侵染字法且有一種異馨發自紙墨之外質薄者揭之堅而不裂以受糊多耳厚者反破裂莫舉以年遠糊重紙脆故也今之贋帖效南拓者近似之然以手微抹滿指皆黑效北拓者敲法入石大深字有邊䀶用墨不勻濃處若烏雲生雨淺者如白虹跨天殊乏雅致大率皆以川扇紙竹紙用挂灰爐煙瀝和水染成古色表裏湮透兩面如一試以一角揭著薄者即裂厚則性健不斷矣此俱以形似求之若以字法刻手敲手揭法過目翻閲雖同一宋拓而妍醜即别矣矧贋拓乎吳中近有高手贋為舊帖以竪簾厚粗竹紙皆特抄也作夾紗拓法以草煙末香煙薰之火氣逼脆本質用和糊若古帖嗅味全無一毫新狀入手多不能破其智巧精采反能奪目鑒賞當具神道觀法古之北紙其紋橫質鬆而厚不甚受墨北墨多用松煙色青而淺不和油蠟故北拓色淡而紋皺如薄雲之過青天謂之夾紗作蟬翅拓也南紙其文竪墨用油煙以蠟及造烏金紙水敲刷碑文故色純墨而有浮光謂之烏金拓珊瑚網卷二十三下
