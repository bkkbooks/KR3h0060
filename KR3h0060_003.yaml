  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0060_WYG_003-1a, image: WYG0818/WYG0818-0030c.png}
body:
  text: 珊瑚網卷三明汪砢玉撰法書題跋宋太宗行書蔡勅真蹟在金花箋上勅蔡行省所劄子辭免領殿中省事且悉事不久任難以仰成職不有總難以集序朕肇建綱領之官使率厥司况六尚之職地近清切事繁而員衆以卿踐更既久理宜因任俾領盾省實出柬求乃願還稱謂殊見撝謙成命自朕于義毋違爾其益勵前修以稱眷倚所請宜不允仍斷來章故兹詔示想宜知悉十四日御書之寳大方印勅大字勅蔡行元祐三年五月廿六日給事鄭穆拜觀天生聖人與物是殊拜觀是勅蓋可見矣行公在當朝功績大著宜膺是寵亦為不薄其徳望之盛子瞻已詳述庭堅不暇及聊志嵗月云時元祐乙亥五月八日山谷黄庭堅此卷乃太宗皇帝御筆勅一道蓋不允蔡行辭中書省事者覿兹字畫飛動若虎踞龍騰風雲慶㑹正以見聖天子生知不測逺異常流當時在廷之臣得之為至寳中書公非學問忠勤有素曷承寵錫若是哉誠金玉錦繡奚足比具宜乎蔡氏子孫當知其所重永永其蔵用是書之以誌景仰云淳祐丙午三月望日鄭清之頓首書于養魚莊欽惟我太祖聖化普浹夷夏清寧朝野士夫得以書畫為樂定千百載之良遇也伯温先生一日出此卷乃曰宋太宗皇帝手勅褘展玩之見其落筆驚人出言神化誠天生英特自出凡一頭地非世可指倫雖晉之王劉陶索唐之歐虞顔柳當駑視其間哉伯温氏寳愛此卷甚於木難尺璧非識相見須能洞鞠于兹也嗟羨不已拜書于末如此洪武二十二年四月二十六日烏傷王褘謹記徽宗瘦金書深村竹樹不知春逺水殘霞接斷津埜客衣冠渾懶散相逢疑是避秦人鳴野鶴作古村圖李西臺六帖署𨽻古中書舍人金溥為大司成王先生題司成為毘陵王文肅公也所示要山母今得一小籠予封全諮送不知可用否是新安缺門所出者復未知何所用望批示春冬衣厯頭賢郎未檢到其宅地基尹家者根本未分明難商量耳見别訪尋穩便者若有成見宅子又如何細希示及􅀢諮押孫號西行少車今有舊車如到彼不用可貨却也金部同年披風甚慰私抱殊未欵曲旋直暌離必然來晨朝車行邁適䝉示諭愈傷老懐惟冀保愛也萬萬不勝銷黯見女夫劉謨仲秀才并第二兒子在東京相次發書去如有事希周庇也押簡上金部同年九月十六日湯世帖碑文王道畧表西京之物也懐湘南拙詩附上同院劉學士隲同年邵兵部希差人通達或與面聞也建中又白貴宅諸郎各計安侍奉所示請改章服昨東封須得出身歴任家狀一本并須賫擎官誥勅牒去未審此來如何行遣也兼為壯子事已令彼僧在三學院安下近已往彼去未迴此左始初見説甚好只是少人管勾若未貨可且收拾課租亦是常計不知雅意如何也侯親家亦言可惜拈却押諮劉秀才久在科塲洛中拔解今西逰兼欲祇候府主希畧一見也右附前帖末建中白近賢郎秀才去専馳手書伏想已逹左右𤣥律將半陰風向嚴公理之外道養無爽此離羣寡侣望風懐賢無日不然也時光流速同年知心凋落大半耳加之官遥人事何牽纒至是哉惟再三保愛䖍禱䖍禱因人無恡玉音今在十秀才行謹寓狀諮問起居不宣同年兄李押中狀上屯田仁弟十一月十一日左右為河中有少里㑹家業被人羅織公途甚是分明希特與照燭建中白齊古同年仁弟相别已是隔年傾渇可量丹累垂示翰益認道友劣兄自去秋患脾胃氣于今餌藥未獲全愈復差出淮汴口祭醮然無力祇荷迴來冷氣又是發動歸休之計未成多難故也此外别無疾嗜慾已絶訖知仁弟又鼔盆莫且住脚也初夏惟保愛為切值女夫劉先輩補吏昭應託寓狀諮問起居不宣押書上齊古同年仁兄三月六日近蒙寄到書開却封却恐是留臺陳公也已附西京去要知之西臺字得中舉進士甲科太宗嘉之嘗直昭文館改直集賢院出為兩浙轉運副使恬於榮利乞西京留司御史臺愛洛中風土遂居之故號李西臺東城賦和靖詩云書似西臺差少肉者是也官至判太常寺善書札然絶不多見于世寳祐乙卯夏五建寧堂主題建袁立儒溪翁黄太史嘗有跋云李西臺與林和靖極相類但和靖傷瘦西臺傷肥蓋林處士清苦而李集賢重厚各似其作人耳建寧堂主并録其語予近得華山圖題曰崧髙維嶽歐陽公所記神清之洞及李西臺隱居之地在焉軸尾載西臺卜築始末甚詳此帖出于西臺逸筆無可疑者前史官文及翁書西臺書三十年前極罕得見近數數見之大槩雄實篤厚如其人涪翁傷肥之論無乃太嚴此六帖信意行筆天真爛漫尤可愛世謂平原攻媿後村不善書輒欲評書予之謂歟杭仇逺仁近山村民李西臺書吾鄉有石刻徑三寸許今見真蹟遒勁沉著誠不易得泰定二年乙丑四月望日京口郭畀曽觀同郡張監共集李西臺書與林和靖絶相類涪翁評之謂西臺傷肥和靖傷瘦和靖清苦之士也瘦之傷謂不誣西臺之書類其為人典重温潤何肥之重也哉莒溪唐氏易安室所蔵凡六帖觀者自能評之當以余言為然時至正二十五年夏六月朔㑹稽抱遺老人楊維禎在雲間草𤣥閣識老陸鐵頴書蔡忠惠公進謝御賜詩卷臣襄伏䝉陛下特遣中使賜臣御書一軸其文曰御筆賜字君謨者臣孤賤逺人無大材藝陛下親洒宸翰推著經義俾臣佩誦以盡謀謨之道事髙前古恩出非常臣感懼以還謹撰成古詩一首以叙遭遇干冐聖慈臣無任荷感兢榮之至朝奉郎起居舍人知制誥同判吏部流内銓上騎都尉賜紫金魚袋臣蔡襄上進皇華使者臨清晨手開寳軸香煤新沿名與字發新㫖宸毫洒落奎鈎文精神髙逺照日月勢力雄健生風雲滉然器質不可寫乃知學到非天真緘蔵自語價希代誰顧四壁嗟空貧臣聞帝舜優聖域臯陶大禹為其憐吁俞敕戒成典要垂覆後世如穹旻陛下仁明加舜禹豪英進用司鴻鈞臣襄材智最駑下豈有志業通經綸獨是丹成抱忠朴帝欲贊奏上古珍又聞孔子春秋法片言褒貶賢愚分考經内省莫能稱但思至理書諸紳乾坤大施入洪化將圖報効無縁因誓心願竭謀謨義庶裨萬一唐虞君芾于舊翰林院曽觀石刻今四十年於大丞相天水公府始覩真蹟書學博士米芾大觀三年仲冬上休日青社郡舍之簡政堂觀河南文及甫書昔人謂公書三公衣衮冕立赤墀之上今觀此帖使人肅然増敬固應與顔柳同年而語可不秘蔵耶甲寅六月上休日三呉禪客姨弟趙徳夫昔年屢以相示今下世未幾已不能葆有之覽之悽然汝南謝客家癸丑九月十一日臨安法慧寺舅家物蔵之久矣今得觀于檇李良可歎也乙丑四月三日崧識蔡忠惠公書為趙宋法書第一此王届老語也今觀此帖藹然忠敬之意見于聲畫不可與茶録牡丹譜同言也鮮于樞獲觀謹題僕來杭多獲覩前代名公法書此卷法度嚴密無一毫放縱意此可見古人用筆不苟也吳興趙孟頫謹書余嘗在秘府讀君謨文集閲其所上謝賜御書歎其君臣相遇之盛也及觀所書荔枝譜字畫精妙毎與同列難其博物之精而又惜其與武夷粟粒同一用心之勤耳雖然君謨當自珍愛其書謂有翔龍舞鳳之勢觀此書其言當不虚也識者解之豫章胡儼廌嘗讀蔡端明集載所上謝賜御書詩一首并答詔有云卿詞令根于温厚筆力極于深妙遵臯陶之謨而懋其稽古述帝舜之事而思其底績宣明順美良深嘉歎其君臣之義文字之美皆不待言而可知也詔當在其家類集者故并得之今此詩真蹟當在宋秘府不知何時復流落人間考其上嵗實仁宗皇祐四年壬辰距今永樂四年丙辰春秋三百有五十五年矣中間宋叔季四方之亂極矣鼎遷社屋海潰山移而一紙之書世傳寳之翰墨騰騫光輝如在夫豈獨以其書之善也哉侍郎黄公請余題識為作詩二首汴水東流宋鼎移中郎名字日星垂精神翰墨猶生氣想見彤庭諫諍時端明書法繼鍾王珮玉瓊琚在廟堂見説當時推第一米家應自媿踈狂翰林學士兼春坊大學士廬陵解縉書書以羲之蘭亭為盡善蓋等閒文雅也觀忠惠公真蹟非獨筆法精妙玩其詞一代明良相契告戒謹敕忠厚視等閒文雅不可同年而語明矣公虞得而秘蔵之其能以忠惠公之心為心又明矣洪武壬午嵗至後九日新安呉牧書蔡忠惠公書名重當時上嘗令寫大臣碑誌則以例有資利辭曰此待詔職也與待詔爭利可乎力不從竟已其人品如此其莊重凡落筆皆然豈以御前表䟽始不苟耶謙齋公傳先生得此甚加珍惜蓋非特重其人也長洲呉寛題㑹稽宋洵㑹稽劉真尹昌龍浦江趙友同夏原吉以上五人詞多不録蔡忠惠公二帖真蹟襄泣血言逆惡深重扶䕶南歸死亡無日不可循常禮不通誠意于左右今至富陽平安明日登舟或雨水少增當舟行至三衢也襄素多病遭此荼毒就令不死足膝日甚氣力日衰亦為廢人豈復相見耶辱君知愛之心不殊兄弟一念哀痛哽塞何言硬塞何言在道程頓官員勾當齊整無一闕乏感惕感惕襄叩頭子發郎中足下十三日襄啓逺承惠問厚意所存益有感著知日來體氣佳勝殊為慰也近被命尹治日以穰劇居不得暇移書致謝不盡縷縷惟眠食自重不宣襄拜手長官足下八月廿一日蔡君謨十帖真蹟裝為横卷襄啓及新記然作陶生手然亦可佳筆頗精河南以書作散卓不可為昔嘗惠兩管者大佳物今尚使之也耿子純遂物故殊可痛懐人之不可期也如此僕子直須還草草奉意殊畧三月十一日襄頓首家屬並安楚掾旦夕行襄啓入春以來屬少人便不得馳書上問惟深瞻想日來氣候陰晴之不齊計安適否貴屬亦平寧襄舉室吉安去冬大寒出入感冒勞頓百病交攻難可支持雖入文字力求丐祠今又䝉恩復供舊職恐知専以為信前者銅雀臺瓦研十三兄欲得之可望寄與旦夕别端石奉送也正月十八日襄頓首公綽仁弟足下襄得足下書極思詠之懐在杭㽞兩月今方得出關歴賞劇醉不可勝計亦一春盛事也知官下與郡侯情意相通此固可樂唐侯言王白今嵗為游閏所勝大可怪也初夏時景清和願君侯自夀為佳襄頓首通理當世屯田足下大餅極珍物青甌微粗臨行區區致意不周悉以上三帖草書襄再拜伏承縣君吉葬有日襄以行路并亡男齋僧赴期不及謹遣州校少持菲禮聊以伸親戚之好殊非豐腆深自為媿謹奉手狀啓聞旦夕前行此不一一襄上郎中七兄左右廿七日早襄啓去得於今蓋已洊嵗京居鮮暇無因致書第増馳系州校逺來特承手牘兼貽楮幅感戢之極海瀕多暑秋氣未清君侯動靜若何眠食自重以慰遐想使還専此為謝不一一襄頓首知郡中舍足下謹空九月八日謝郎春初將領大娘以下永安年下朱長官亦來泉州鈴候今見服藥日覺瘦倦至于人事都置之不復關意眼昏不作書然少賔客省出入如此情悰可知也不一一襄送正月十日襄啓中間承勞紆問適㑹疾未平殊不從容示書兩通知煩指幹新第有未備且與鐍鑰却候别作一畨并了之四人園子只與門下毎人一間園中地分與四人分種要他栽種也不一一襄奉書五日以上四帖皆行草書襄啓大研盈尺風韻異常亝中之華由是而至花盆亦佳品感荷厚意以珪易邽若用商於六里則可真則趙璧難舍尚未决之更須面議也襄上彦猷足下廿一日甲辰閏月丙午三月十二日晩欲尋軒檻到清樽江上煙雲向晚昏須倩東風吹散雨明朝却待入花園十三日吉祥院探花花未全開月未圓㸔花待月思依然明知花月無情物若使多情更可憐十五日山堂書䝉惠水林擒花多感天氣暄和體履佳安襄上公謹太尉左右以上三帖皆真行書蔡公書法真有六朝唐人風粹然如琢玉米老雖追蹤晉人風軌其氣象怒張如子路未見夫子時難與比倫也辛亥三月九日倪瓚題洪武己未四月雲間袁凱觀于蕭谿在宋號善書者蘇黄米蔡為首俗評以君謨居三公之末殊不知君謨用筆有前代意優劣自可判也己未四月陳文東拜觀後學陳迪觀崇禎四年三月廿四日獲觀此帖及米海嶽九帖張長史京中帖趙承㫖臨周文矩畫羲獻像梁趙巖神駿圖宋思陵題馬麟亭臺圖續觀神龍蘭亭東垣楷書萬應方蔡忠惠四帖乃十帖種種具體尤多効右軍内第九帖軒楹二絶差減墨妙𤣥宰眉公皆鑒此一帖為雙鈎廓填餘九幅並好砢玉識于韻石齋蔡端明書寒蟬賦并序昔人稱雞有五徳而作者賦焉至于寒蟬才齊其美獨未之思而莫斯述夫頭上有縷則其文也含氣飲露則其清也黍稷不食則其亷也處不巢居則其儉也應候守節則其信也加冠冕取其容君子則其操可以事君可以立身豈非至徳之蟲哉且攀木寒鳴賢才所不空歎余者僑處竊有感焉興賦云爾伊寒蟬之感運近嘉時以逰征含二儀之和氣禀乾元之清靈體真精之淑質吐崢嶸之哀聲希慶雲以優游遁太陰以自寧於是靈岳幽峻長林差參蟬爰集止輕羽鮮新清唱激發徳音孔嘉承南風以軒景附髙松之二華黍稷維馨而匪享竦身希陽于靈和唳乎其清翩乎其翔容麗蜩螗聲美宫商颷如飛焱之遺驚風眇輕雲之麗太陽華靈鳳之羽儀渚皇都乎上京跨天路于萬里豈蒼蠅之尋常爾乃振修緌以表首舒輕翅以迅翔華之墜露含煙煴以夕飡望北林以鸞飛集樛木以龍蟠彰淵信于嚴時禀精誠乎自然翩𦕈微妙緜蠻其形翔林附木一枝不盈豈黄鳥之敢希惟鴻毛其猶輕憑緑葉之餘光哀秋華之方零思鳳居以翹竦仰竚立而哀鳴若夫嵗聿云暮上天其凉感運悲聲貧士含傷或歌我行永久或謡之子無裳原思嘆于蓬室孤燈吟于首陽不銜子以穢身不勤身以榮巢志髙于鳴鳩節妙乎鴟鴞附枯枝以永處何瓊林之逈條惟雨雪之霏霏哀北風之飄飄既乃彫以金采圖我嘉容珍景曜爛暐象華豐竒侔黼黻艷比衮龍清和明潔羣動希蹤爾乃綴以空冕増成首飾纓蕤翩紛九流客翼映華蟲于朱衮表馨香于明徳于是公侯常伯乃紆紫黻執禮淵俯鳴佩玉仰撫貂蟬􅀈黄廬之多士光帝皇之得賢既騰儀像于雲闥望景曜乎通天邁休聲之五徳豈鳴雞之獨珍聊振思于翰藻闡令聞以長存于是貧居之士喟爾相與而嘆曰寒蟬哀唱其聲也悲四時云暮臨河裵徊感北門之憂殷嘆卒嵗之無衣望泰清之巍峩思希光而無階簡嘉蹤于皇心冠晨景乎紫微咏清風以慷慨發哀歌以慰懐蔡襄書右蔡君謨書寒蟬賦真蹟觀其大似褚河南書法乃御府收蔵之物也先朝評書者稱蘇子瞻蔡君謨黄魯直米元章為四大家並馳海内縱横于夷島之間隻字片楮而不易得今閲此帖楷法咸精殆髙駕三公而優入于神誠翰墨中之至寳也京兆宇文公諒楊宗道云先朝蔡君謨楷書最為可師端勁髙古落筆如削鐵此書中龍也張彦逺法書要録有云唐太宗購二王書右軍草書有千紙取其迹類相從率一丈二尺為卷臨學遂得右軍筆也余友黄聖儀好讀異書馳心翰墨家蔵此帖為師然于楷法大得其神韻耳近世君謨楷書絶少然已歸内府民間亦不復可得也善蔵之善蔵之廣信吳元善書蔡莆陽詩卷墨蹟可笑夭桃耐雪風山家牆外見踈紅為君持酒一相向生意雖殊寂寞同南劒州芋陽舖見臘月桃花長岡隆雄來北邊勢到舍下方迴旋三世白士猶醉眠山翁作善天應憐如彼發源今流泉兒孫何數鷹馬然有起家者出其間願翁夀考無窮年書戴處士屋壁山僧九十五行是百年人焚香猶夜起憙酒見天真生平持戒定老大有精神那知不變者那減故時新右題龍紀僧居室歐陽文忠公題其傍云此一篇極有古人風格雙溪為一流新構横鮮渚浮居紫宵傍卧影澄川下峽深風力豪石陗湍聲瀉古劒蟄神龍商㠶來陣馬晴光轉羣山翠色㸔萬瓦汀洲生芳草香樹自閒冶主郡黄士安髙文勇扳賈顧我久踈怦霜髦漸盈把臨津張廣筵窮晝傳清斚舞袖驚浪翻歌扇嬌雲惹驩餘適晚霽望外迷空野曽是倦遊人意慮亦瀟洒右題南劒州延平閣大雪壓空野驅車猶逺行乾坤初一色書夜忽通明有物皆遷白無塵頓覺清只㸔流水在却喜亂山平逐絮飄飄起投花㸃㸃輕玉樓天上出銀闕海中生舞極雍容態聞餘淅瀝聲客爐何暇煖官酤未能酲薄吹消春凍新陽破曉晴更登分界嶺南望不勝情自漁梁驛至福州大雪有懐寧越門前路歸鞍駐石梁西山氣色好晚日正相當右福州寧越門外石橋㸔西山晚照吉祥亭下萬千枝㸔盡將開欲落時却是雙紅有深意故留春色綴人思烘簾微日自生光吹面輕風與送香誰把金刀收絶艷醉紅深淺上釵梁的的名花對酒尊欄邊沉醉月黄昏今朝關外尋蘭蕙忽見孤芳欲斷魂杭州臨平精嚴寺西軒見芍藥滿枝追憶吉祥院賞花慨然有感書呈蘇才翁四月七日夙昔神都别于今湘水遭故情彌望切佳月事追遨太守才賢重清明土俗豪犀珠來戍削征鼓去啾嘈湖樹涵天濶船旗罥日髙醉中春𣺌渺秋外自陶陶新曲尋聲倚名花逐種褒吟亭披越岫夢枕覺胥濤議論刀矛快心懐鐵石牢淹留趨海角分散念霜毛鱸繪紅隨筯予之吳江瀧波緑滿篙君往嚴瀧試思南北路燈暗雨蕭騷崇徳夜泊寄福建提刑章屯田思錢唐春月並逰盡道瑶池瓊樹新仙源尋到不逢人陳王也作驚鴻賦未必當時見洛神嘉禾郡偶書輕瀾還故潯墜軫無遺音好在池邊竹猶存虛直心往還二十年相見惟清吟覺性既自如世味隨浮沉琅琅孤雲姿悵望空山岑豈不悟至理悲來難獨任無錫縣弔浮屠日開此泉何以珍適與真茶遇在物兩稱絶于予獨得趣鮮香筯下雲甘滑杯中露當能變俗骨豈特湔塵慮晝靜清風生飄瀟入庭樹中含古人意來者庶𡨕悟汲惠山泉煑茶紫綬金章被寵榮筆牀茶竈伴笭箵只知江海能行道未識朝廷舊有名笑我病去相䝉藥圭刀小試即春回瘡痍未復君知否國手于今數老來莆陽蔡襄道山清話予頃時于陜府道間舍于逆旅因步行田間有村學究教授二三小兒間與之語言皆無倫次忽見案間有小兒書卷其背乃蔡襄寫洛神賦已截為兩段其一塗汙已不可識問其所自得曰吾家敗籠中物也問更有别紙可見否乃從壁間書夾中取二三十紙大半是襄書簡亦有李西臺川牋所寫詩數紙因以隨行白紙百餘幅易之欣然見授問其家世曰吾家祖亦常為大官吾父罷官歸死于此吾時年㓜養於近村學究家今從而姓李然吾祖官稱姓名皆不可得而知頃時如此紙甚多皆與小兒作書卷及糊窗用耳㑹日已暮乃歸旅舍明日天未明即登途不及再往至今為恨也詮次至此偶憶是附入千頃生宋范忠宣手簡司馬温公史草短啟帖史草不及録純仁再拜近人回曽狀上必計通呈伏惟尊候多福伯康必更痊乎純仁勉强苟禄自取疲耗無足此處抹去念者日企軒御之來以釋傾渇天氣計寒必倦出應且盤桓過冬况伯初痊諒難離去咫尺無由往見豈勝思仰之情更祈以時倍加保重其他書不能盡純仁頓首上伯康君實二兄坐前九月十一日右伏䝉尊慈特有頒賜感佩之至但積下情謹奉狀陳謝伏惟照鑒謹狀月曰具位某狀此係温公筆温公起通鑑草于范忠宣公尺牘其末又謝人惠物狀草也幅紙之間三絶具焉誠可寳哉岐國汝述明可識温公修通鑑起草于書牘間可見當日用意之厪至答送物狀亦自為檢前輩之不苟如此可師也已嘉定八年十二月十四日任希夷觀于玉堂夜直此屬稿爾而字畫無一欹側惟公不欺之學何往而不在哉葛洪程珌趙崇龢同觀因相與嘆仰如此四百五十三字無一筆作草則其忠信誠慤根于其中者可知已永昌元年其嵗壬午晉元帝即位之五年也自正月王敦作亂至十二月慕容皝入令支而還毎事第書發端一二字或四五字其下則以云云攝之校今通鑑是年所書凡目時有異同此或初稿而後更刪定之歟始公辟官至局前後漢則劉貢父自三國七朝而隋則劉道原唐訖五代則范淳父至于削繁舉要必經公手乃定此永昌一年事公不以屬道原而手自起草何歟然則文正忠宣之手澤所存猶足企想元祐一時際㑹之盛豈固翰墨爭長為可傳哉至順二年嵗次辛未夏四月乙丑東陽柳貫題温公被命為通鑑給筆札辟僚屬其事至重其以牘背起草可以見其儉字必端謹可以見其誠比事而書該以一二字可以見其博紙尾謝狀稿此尋常之事亦出于手書可以見其遇事之不苟也方公作此時豈料其為後世之傳由今傳之盛徳之藴自然而形見蓋有不可勝言者敬慕不已謹題卷末司馬温公編通鑑用范忠宣公手帖起草方晉之東海内多事晉書多引小書世說論語之類極叢冗此載永昌之初一年或加之以潤色之辭矣公嘗自言編閲舊史旁采小說豈果為晉史故耶此則未之見也至順二年秋八月朔浦江吳萊謹跋司馬公作通鑑長編范忠宣實與共事大綱領處皆公手自筆削而元祐名臣漢唐以下人物非所倫也故其相繼為相使四夷懐畏人莫敢有議者今觀此卷一時典型猶在若冠冕而立殿陛之下展玩惟有景慕温公于通鑑書永昌元年事視此猶為詳備此特其初稿耳而作字方正不為縱逸之態其敬慎無所苟如此宜其十有九年始克成書歟今之文人以敏㨗為髙貴輕揚而賤持重使温公復生未必能與之相追逐也展玩之餘惟有掩卷太息而已至正元年夏四月二十三日後學黄溍書張南軒跋荆公書謂丞相平生何得有許忙事此言深中其病今觀温公此稿筆削顚倒訖無一字作草其謹厚詳審乃如此誠篤忠厚氣象凜然見於心畫之表彼浮躁急迫者安能如是耶後學宇文公諒書司馬公通鑑編年一變班馬舊史之習而國家興衰生民休戚善可為法惡可為戒者備此書矣故以事繫月以月繫年而不以日或以年不以月者蓋週嵗之中記事之要作為一編而君臣父子是非得失之互見使人得便觀覽有春秋之義例焉此稿標題晉永昌元年事是年王敦還鎮元帝崩乃江左立國之一變故公不得不手書之范忠宣與公繼居相位今獲手筆于一紙豈勝幸哉至正三年十月朔旦後學朱瀾書典午渡江後盜臣接跡起由其創業初所事不以理温公成通鑑善惡悉就紀心畫既嚴正形見在稿紙稿蓋人之所忽敬慎不少弛固宜公之心天地同終始隆慶辛未仲夏得于無錫安氏用價二十二金蘇子美草書二帖真蹟在粉箋上今春徧遊蘇城之民圃絶有佳處竒花偉石非他所見也如歸亭風月甚可喜使僕慨然忘歸深足樂耳蘇子美之後得之陳繹蘇滄浪㽞别王原叔古詩帖交道今莫言難以古義責錙銖較利害便有大行隔予生惟濶踈逢人出胸臆一旦觸駭機所向盡戈㦸平生交逰面化為虎狼額謗氣慘烈烈中之若病疫遂令老成人坐是亦見斥既出芸香署又下金華席摧辱實難任宦名必非惜罪始職于予時情末當隙今來濠州涯日夜自羞惜髙風激頽波相遇過平昔白玉露肺肝晴雲見顔色乃知天壤間自有道義伯明日又告行嗟嗟四海窄舜欽作詩留别原叔八丈閣下慶厯乙酉清明日書右宋蘇子美古詩百五十言留别原叔八丈蓋王洙原叔也詩語俊拔義氣悲壯歐陽公謂其廢放後時發憤悶于歌詩殆是類也字畫出入顔魯公徐季海之間而端勁沉著得于顔公為多當時評者謂為花發上林月滉淮水豈有然乎按子美慶厯四年丙戌十一月坐監進奏院㑹客事除名徙蘇州此詩後題清明日則是被放之三月間也時原叔以天章閣侍講史館檢討黜知濠州正坐子美事故詩云遂令老成人坐是亦見斥時子美年三十八原叔五十一故有老成及八丈之稱又有今來濠州涯及明日又告行等語當是隨原叔至濠及是乃别耳其後子美竟以慶厯八年卒于蘇凡居蘇四年宜其遺跡流傳吳中為多去今數百年所謂滄浪亭者雖故址猶存亦惟荒煙野草而已至于文章翰墨不少槩見宣和書譜謂斷章片簡人爭傳播豈在當時亦不易得耶此詩雖非蘇事而實赴蘇時作少宰徐公子容以為郡中故實因重價購之俾徴明䟽其大畧如此若其志節履行具正史者兹不復云嘉靖乙未文徴明跋宋孫之翰尺牘之翰啓孟冬薄寒伏惟徳表兄長朝奉尊體起居萬福之翰即日䝉恩不審邇來動止何似之翰改使河北向已上狀自後江行寡便不數拜問之翰八月廿二日方到本路十月中始還治舍内外幸亦如常末繇由省侍伏乞善保寢興専奉狀拜候不備弟之翰百拜徳表朝奉兄坐前十月十五日狀之翰孫之翰甫之也嘗著唐史要論必盥手始函之謂家人云萬一有兵燹之變貨財盡棄之此書不可失也公移少間増損未嘗去手其在江東為轉運使出行部亦以自隨過休亭止輒復修之㑹宣州有急變乗驛遽往行後金陵火延燒廨舍子弟親負其笥避於池中島上公宣州還入門問曰唐書在乎對曰在文潞公嘗從公借之己巳除夕陳繼儒記王荆公介甫正書楞嚴經要㫖余歸鍾山假道原本手自校正刻書寺中時元豐八年四月十一日臨川王安石稽首敬書霜筠雪栢鍾山寺投老歸歟寄此生王介甫既賦此詩元豐八年四月竟罷政而歸書經乃其時也繼遂為元祐矣假本道原即劉秘丞恕也經中十二者欲令法界衆生求男得男是時雱已卒介甫之意端有所為後舍半山所居為寺申其薦拔可嘆也作字有斜風疾雨之勢亦其性卞急使然然不妨得書法陵陽耄叟牟獻之書觀世音菩薩發妙耳門從聞思修入三摩地與眼耳口舌身意日刼相倍此一節楞嚴經之法髓也荆公暮年深悟佛理故特于是經提出而親書之所以深警禪之士豈復有心較世間之榮辱是非及字畫之工拙也哉後學王䝉慨歎而敬書之宋王安石字介甫號半山本撫州臨川人後居金陵官至丞相封荆國公諡曰文追封舒王凡作字率多淡墨疾書初未嘗畧經意惟達其辭而已然使積學盡力莫能到評書者謂得晉唐人用筆法美而不妖艷瘦而不枯瘁黄庭堅云荆公率意而作本不求工而蕭散簡逺如髙人勝士敝衣敗履行乎大車駟馬之間而目光在牛背此卷是荆公手書楞嚴經㫖要視其所摘乃深于宗教由其積學累功所至非尋常漫自抄寫可擬觀其書圓轉健勁别有一種骨氣風度俊逸有飄飄物外之想予家法書頗衆如此本者止獲是經卷世所希見寂寥之中一展閲之亦可以出生死㳺凈土不為無益絶勝羅塵網溺嗜欲饕餮墮于餓骨趣中歴刼不能超也豈特貴其書之竒妙而已哉墨林子項元汴敬識于攖寧菴其值三十金宋淮海張邦基墨莊漫録王荆公書清勁峭拔飄飄不凡世謂之横風疾雨黄魯直謂學王濛米元章謂學楊凝式以余觀之乃天然如此墨池編以介甫筆老不俗說郛所抄宋雜記謂荆公作字似忙者而山谷以荆公字法出於楊虚白今停雲館所鐫安石二札具在何嘗類楊景度也介甫書要㫖卷留余處彌月縱觀因述諸説如是樂卿識珊瑚網卷三
