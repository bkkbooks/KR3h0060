body:
  text: 珊瑚網卷四十一明汪砢玉撰名畫題跋十七王仲山自題小軸幽泉未出山潛與元氣結淒霏散為雲谷口薜衣濕聽泉圖萬木森森起翠濤一道懸泉如瀑布小橋盡日聽秋聲忘歸迷却來時路仲山王問寫嘉禾汪氏鑒藏俸鶴圖嘉靖戊申王仲子疏歸寶界山閒居十四年矣一日偶坐松下忽有孤鶴從西南來集松頂鳴舞終日乃去諦視之乃子向所俸鶴哀其窮而縱之者豫惟天地間物各欲自遂其性豫昔俸之雖甚寶惜終非其情兹處海嶠上下寥廓飛翔自如已無復人間世矣來集松頂豈有意故墟哉因圖此書俸鶴田記於左俸鶴田舊名爰居處於魯東門祀以大牢祀以鐘鼓而爰居勿樂何也以已養養之也然則鶴可俸乎有官則有俸鶴有官乎禮曰考其弓弩以上下其食鶴有職事乎其食可上下乎鶴産於青田翔於紫蓋啄東海之鱗食巨野之粟時乘雲氣遊太虛凌倒景逍遙鳴舞於無何有之鄉將偕鳯毛而獻瑞齊鵬運以圖南也今鎩其羽內之欄中儲田粟日給數合盛以瓶盎濾以清泉而食之食則得矣吾見其循牆而走不勝悲也命童子縱之三月翅成鶴飛去仲山王問識此幅余以供麟石松鶴出其後大有逸韻未幾石充友人湯餅物畫介竹懶翁眉矣樂卿記畫木筆花中郎宅裏花滿庭辛夷花發玉分明素色幽香比君子謝家珍樹何如此主人愛花世莫論酌酒邀賔夜未巳十二欄干清雲溥此花猶稱月中看仙姝淡掃蛾眉細聽徹玉簫騎白鸞歸剔銀燈寫花影龍尾鳯翰幽事屏髹几橫披白露消春睡朦朧喚花醒仲山王問寫於崇文館王酉室自題諸畫松隂竹色翠交加晏坐清談日未斜偶欲揮毫剛洗研只緣滌暑幾烹茶王穀祥薰風亭院雜英開窗滿蕉隂徑滿苔燕寢凝香自終日叩門那有俗人來蕉石秋花絡緯聲中秋夜長名華含露立東牆捲簾惟有纎纎月試看新粧半額黃秋葵一種名花當暑栽冰葩玉蕊亦竒哉枝頭浥露朝朝滴簾外霏香夜夜開已愛芳英㸃雲髻更憐餘馥泛茶杯寒窗就日深藏護生怕東風料峭來畫茉莉玉兒本來潔宫粧不憤濃秋風羅袖薄飄揚若為容畫玉簮秋葵諸名家和王祿之畫梅詩一枝天下春萬古江南色滿地玉𥻘𥻘鄰家起羌笛大謨愛此嵗寒香不染濃芳色開落應有時無妨畫樓笛顧奉艷奪巫山女芳傾洛水神逍遙霜月畔儼對斷腸人周詩照水扶疏影臨風慘淡神月明苑屋下誰愜傍幽人盾山黃姬水香散孤山雪花開處士家月明魂欲斷疏影碧窗斜石嶽黯淡一枝香晶然滿林雪素質倩誰憐芳心還自悅毛錫嘏香骨凝烟瘦幽姿帶雪妍誰家吹玉笛夢落枕屏邊許周野人但愛梅不往山中覔羅浮白雪香忽然滿几席張湖山遙聞黯淡香近見依微色月下一清吟風前有長笛彭年王祿之自題畫白燕梨花燕燕兩于飛差池玉羽衣梨花春院靜㺯影故依依又榴房多子圖余有一幅多錦葵石竹諸花風落亭臯霜色凝纍纍秋實錦英呈琅玕百顆赤瑛綻多子還誇安石名彭年題酉室寫水仙幅隂崖雪壓青松折暘谷冰開碧澗流已見華容兩秦媛玉鬟雲貌作春遊彭年題月為精魄水為神素質先含雪裏春羅襪凌波斷行跡誰能喚起弄珠人許子才題陸五湖松林髙士圖在紙上單條清風松下來泠然充兩耳安坐不為動明月涼如水白雲杳無聲萬籟從此起師道愛此青松間遺音尋太古惜無知音人空林誰與伍攜琴坐松下不彈自揮麈文嘉題五粒松含萬壑聲青山隱隱日初沈那知今古興亡事畫入幽人手底琴顧德育晚風初起颯如秋千尺長松翠欲流紗帽葛衣涼似水不須箕踞與科頭徐士義題子傳秋山攜卷掛幅秀汪凝霞墨花二閣世藏紅塵擾擾滿人間十日應無一日閒羡却茂林蒼璧下獨攜書卷對青山嘉靖甲辰臘月師道作又子傳雲松圖寫松青雲裏佳色藹成暮松作不老枝人比長年數跋仇十洲摹松雪沙苑圖此詩已載前卷沙樹歷歷沙草荒江上誰開芻牧場羣馬所聚何劻攘飲䬴而俯嘶而昂􅘆踶浴滚遂且驤或乳或卧或軋瘡三縱五橫烏騅赤兔照夜白連錢桃花鬬文章牝兮牡未可辨亦莫可識駑與良相骨相肉俱已矣老夫兩眼徒茫茫但愛各各無拘韁自縱自得肥更光肥哉肥哉空老死未試何以知爾長我知馬亦待駕御人馬兩得氣始揚請看溝汗流血漿爭前欲縳左賢王追風逐電一般走數匹之中當有强余見趙松雪所畫唐馬一卷縱觀之其態有立者伏者走者飲者浴者歸者嘶者奔者逸者戲而駢者或寢或喝奮發而生精神而密各能窮其狀今閲十洲此卷其運墨設色風韻氣骨斷斷乎自一手者不然何天間之若是耶時嘉靖丁未仲春之望許初仇實父雪棧圖王右丞劍閣圖余嘗見叔明臨本乃古尺小幅石田先生又廣之二圖余皆曾摹今俱不能記矣偶見實父此圖不覺有似人之喜因題其上萬厯乙亥六月文嘉識又臨池消夏圖湘簾寂寂夏堂虛竹影離離風外疏煮茗焚香消晏坐硬黃臨得右軍書師道題憑闌閒看白鷗飛山色溪光繞四圍六月不知城市暑逍遙應識久忘機陸安道余家藏十洲兩幅納涼圖聞之父執沈涵素云是其乃嶽姚禹門太史所遺上有詩斗為文徵仲題已失去矣今細觀此圖畫橋烟柳韆鞦院落絶似江南春光景余因改其名目彼時尚有實父宫蠶圖漢宫春曉諸卷先後為人賺去思之殊怏怏也萬厯己未春砢玉識於自韻齊周幼海題仇實父山水雨霽樹如沐山晴翠欲流村深行迹斷五月似清秋董𤣥宰題仇實父仙奕圖仇十洲蓬萊仙奕圖乃冷謙本謙學小李將軍所謂心死方得神活仙家之祕藏也仇實父以趙伯駒為之自得逺肖又云仇實父是趙伯駒後身即文沈亦未盡其法仇氏青鳥傳音圖絹素青緑山水人物大軸上張伯起詩今已另裱聞說瑤池羅列仙種桃結實成千年仙緣不隔人間世仙籙時令青鳥傳翰林女弟閨中秀弱冠周郎宰官後好逑方作百年期一鳯孤飛失其偶青春三復柏舟詩晨昏泣對襁褓兒鉛華不御謝膏澤金石矢心終不移屈指於今四十載男婚女嫁嬪風在須知緑鬢未全星尚見桑田變成海髙秋八月明婺星瑤空仙樂聞廣庭應是一籌添甲子緑雲五道迎三清金光獻壽來瑤島玉潤稱觴祝難老定知繩武在寧馨清門計日綸音表右青鳥篇為恆嶽世兄賦壽周母沈太夫人六十長洲張鳯翼此杜陵內史為吳江沈夫人作也萬厯甲寅秋余即從彼處周氏得之時吾家方具慶故去其詩焉先是有仇氏著色白衣大士像無論相好莊嚴而纓絡上堆粉圓凸宛然珠顆燦燦吳郡丹青閨秀志稱其能畫綽有父風信哉乃又云律之女行厥亦牝雞之晨也意以其善繪春宵祕戲動盈千幅耶然聞其孤潔獨處日惟焚香鼓琴滌硯揮毫不與夫偶六如居士所謂間來寫幅青山賣不使人間造業錢者則志贊云粉黛鍾靈翺翔畫苑仇媛慧心內朗窈窕之傑哉蓋女手見稱僅僅水墨斯真丹青獨擅者歟玉水記王履吉倣雲林筆意髙樹覆清溪松亭延落照為問京華人欲返思鱸棹秋日倣雲林筆意因有所懷賦此雅宜山人王寵履吉不以畫名此幅乃偶然興到隨筆㸃染耳然深得大癡雲林墨外之趣可見髙人胸中無所不能從伯穀齊見之為之心熱文嘉許元復題椿萱芝蘭圖莊椿自是長生樹萱亦能開百嵗花更有芝蘭在花下春風常駐列仙家髙陽許初嶽漳餘山水丹臺髙處鵲橋通上有靈源注谷中珠玉滿田金滿室鐵牛耕種領春風嶽岱嶽漳餘題郭少卿隱居圖太卿别墅清江濆回溪灌木生晴雲容至琴尊自永日境幽坐卧皆離羣山堂寂寂奏風竹石林冉冉生蘭薰秋來乘月理孤棹玉壺冰水懷夫君嶽岱陸叔平自題山水諸幅雪深一尺强當階盡埋沒赤腳踏層冰誅苑覆庭植笑殺竈下儂耽竒甚成癖雪後作此為友人易新覆花漫題俚語陸治萬宇結青蓮一柱三江合日月先到扉烟霞遲明發變化生雨雲恍惚見開合泠然覺𤣥理顧問不能答陽城陸治林卧忽經載相隨惟白雲芳隂閒度影馴鳥狎成羣攜席山仍合裁杯月自分何能同調者相與㺯天文包山子茗外寄幽賞琴中饒濮音一鑑灑毛骨萬象開靈襟蚓竅戰水火月圓破璆琳餘音與遺味優矣淡𤣥心天香書屋圖五嶺秋清瘴欲消尉陀城外鎖岧嶤金鵝油暖花爭發玉兔宫寒葉未凋明月自吹靈隱粟白雲誰誦小山謠天香莫怪誇君采曾躡仙人上漢橋陸治春城疊嶂圖欵云嘉靖壬子仲夏包山陸治西來疊嶂擁春城出郭徐看島嶼明極目遐瞻青未了側身髙俯緑初平晴巒雲淨空潭影長谷風疏散鳥聲笑拂當年題勝處青山留得飲中名疏林峰谷圖天朗秋髙風氣清虛疑逺籟動疏林憑闌極目俯千里把酒澄懷時一吟淡映逺峰宜落月倦依長谷想歸禽圖南正好摶雙翼脫骨逍遙違素心陸治陸包山倣大癡山水雞鳴苑屋午靄靄墟烟白市散人跡稀山空翠猶滴春意駿馬繡障泥紅塵撲四蹄歸時何太急日照杏花西秋思千山秋寂寂萬木葉蕭蕭詩意誰能領歸鞭人過橋石湖雪石湖一夜雪朱扉映玉開無人賦黃竹惟見越王臺烹茶圖茗碗月團新破竹爐活火初然門外全無酒債山中惟有茶烟陸治包山自題諸畫俱七言絶采真瑤島學餐霞洗髓天池煉嵗華還指西峰青可攬彩雲和露擁仙家右題天池仙館向為余家鑒藏樹樹桃花春雨香武陵何處問漁郎湖山表裏如圖畫洞口烟霞天一方桃源圖淇上琅玕落䕃清影消墨礙萬緣輕他時五藴俱亡後赤腳風梢頂上行包山陸治為筠如禪師作花邊何處酒家村竹閣沉隂半掩雲滿地夕陽山徑昃樵歌隔塢水中閒叠翠岧嶤倚碧空青娥髙髻出瑶宫微風忽動前溪影山館盤雲舞鏡中一川落影明霞色萬里蒼茫錯錦紅鏡裏乾坤乍明滅疏林瑶島盡秋空翠壁飛泉下急湍溪亭草閣鏡中懸楓林如錦憑欄外一片晴峰鎖淡烟匝塢連坡十里隂緑隂深處小橋通平岡宛轉仙家近雲復山重何處逢緑樹敷隂翠荇香扁舟十里下橫塘白鷗飛去青山暮落日唱歌烟水長山齊髙控懸蒼壁自有芳雲時卷舒百尺冰簾遮不斷月明空負夜窗虛晴嵐雲净空潭影長谷風疏散鳥聲笑拂當年醉題處青山留得飲中名繡壁摩空落日低遙扳木末聽天雞奔流觸石飛晴雪倒掛懸崖萬仞梯疏林映雪見江峯萬叠橫奔走玉龍况是晴光開晚照落霞酣葉錦玲瓏雪積溪橋行路難蔽天樓閣鎖重巒長途日莫西風急猶為梅花勒馬看松下寒泉落翠隂坐來長日淡𤣥心溪頭定是仙源路開遍桃花正可尋嘉靖戊申八月既望包山陸治草緑江南已催月團今復試新茗知君再看春山屐虎阜岡頭帶雨來嘉靖壬子友人攜琴過訪試雨前茶作此後二十三年春復同試陸羽泉重題萬厯乙亥三月三日也而余八丙七辰矣陸治識憑江絶地芙蓉起飛閣攢空玉蝀斜席上山河虛萬里掌中指㸃十洲花包山陸治畫并題緑樹沉沉翠靄浮遙山雨過白雲收江深草閣銷煩暑靜倚虛欄聽急流錢穀題離離楓色動髙秋逺黛橫空一抹浮我欲揚舲任超忽浩歌沿月卧滄洲包山居士罷釣吹蘆管江風裊鬢絲此聲人不解惟有白鷗知西村題杏花山禽圖汪氏所藏也禽乃白頭翁翠幕羈狂性聞儔每獨驚風雲徒長翼霄漢正懸情不識上林好還同出谷鳴修修頭上羽疑是伴愁生右壬午在陳湖館中作回首已五十二年矣陸治山禽只恐春狼籍恨向東風愁白頭壬申仲秋陳柱題甲子新夏客有餽櫻桃者兼遺一雀名曰櫻桃雀遂圖之以記興云陳柱附此以見陳君能畫也陸叔平畫沙暖睡鴛鴦匹鳥本來雙交栖情自香日髙春正暖天逺晝偏長懶性迷花醉驚魂逐絮狂不知憨態劇烟水逝茫茫又錦浪鸂鶒池上交花鏡裏糚韶華輝映彩鴛鴦風前湛露濛濛濕濺入儀毛錦浪香包山陸治又松枝喜雀春風海屋開華宴手縛蒼龍到席前乘子西池問王母桑田滄海定何年包山陸治包山畫練雀粉紅茶花舌冷風前鳥心香雨後花美人初睡起含笑隔窗紗又雛黃花影此幅乃凝霞閣新築時所懸風掉紫微落雨催青蕨齊山窗春夢熟囑爾莫輕啼又紅白牡丹芳園爛漫百花枝白白紅紅各有時冶葉娼條均造化和風甘雨入華滋老夫觀物逍遙地小筆分春竊㺯私日日不妨偷展卷擾人蜂蝶竟何知又緑牡丹余攜向南中遺友新裁魯縞竊青藍幻出宫粧别樣看鬢妥湘雲渾莫辨脂凝猗竹映姿寒若從帝子當華宴好向秦樓並倚闌縱有龜年新協律誰將清調曲中彈又西府海棠翠羽朱鈿虢國粧曉來新浴露華香何如馬上東風面蹴踘歸來帝子芳包山陸治東風吹墮胭脂淚散作妖花一樹丹可奈五更清夢斷杜鵑聲歇雨絲寒陳履端題錦城二月剪春霞斜倚東風酒力賒舞罷昭陽人不見新粧輕軃碧蟬紗顧聞題包山自題寫生諸幅俱七言絶夢轉羅浮月二更夜寒風力損花神不禁羌笛鄰家起吹落庭前幾片春梅花明妃扶醉打毬回斜倚東風笑未開仙仗欲臨魚鑰啓六宫齊擁絳紗來海棠蛺蝶枝頭逢蛺蝶相看應是此花身金屏合舞俱迷酒錦拍吹香總近人蛺蝶花輕韶和露染新黃醉日含風暗度香最是月明新雨後一番膏沐一番粧黃薔薇翠羽成叢玉作花露杯香㵼紫流霞只愁一笑傾陽蔡况說相逢衛玠車玫瑰花交頸鴛鴦並蒂花碧江相映錦成霞天南水盡雲無際管領秋光一雁斜芙蓉碧葉圓隂約素英何如寶髻玉叉橫當年化作雙飛燕猶是叉兒未死情玉簪一架琅玕翠蔓長秋風吹露壓銀牀珠影光寒凝玉液冰盤香細綻瑤漿葡萄了蘭圖余初得一幅八絶者是此後得一幅寫意者詩只六首起句云廣東梁中舍遺我客有贈我了蘭開有竒花與憑虛無日不賞酒次隨其品質㑹意處乃即賦之積成八絶因圖以為贈嘉靖甲子七夕包山治嘗聞東海仙崖種若個分攜西畹香細數花枝參造化却因竒偶辨隂陽其花出自廣南兩義一花各成竒偶不與秋蘭並九英仙葩二八自天成祇緣無力禁香重幻作骿支駕玉莖每莖十六花花各一義新裁魯縞袗秋衣肌骨冰瑛酒暈微獨立嫣然風自舉低回翻學舞容璣心蒂微紅迎風舞動亭亭浴露立西清淡薄秋容幻態輕獨有檀心禁不得一庭香思動蜂嬰直幹玉立露下猶香王㦸稜稜應節分枝枝柔玉級香雲凝粧擬待三更月露染生綃六幅裙花枝應節六葉叢生方空輕翼竊青黃製得霓裳稱淡粧香抱幽懷嬌不語含情渾欲待迎將瓣若輕綃蒂微青黃瓊幹冰義蘂玉容緗枝香魄引玲瓏分明月下歸環珮恍似羅浮夢裏逢弱蒂下垂花英若佩三尺丰標髙髻粧兩行叉玉一奩香朝朝擬待烟屏展徐攬輕羅上畫堂葉過三尺花多曉發左右平分溪山餘靄卷欵云辛丑二月陸治為溪陽先生寫吳溪陽先生者新安人其所居里名溪南先生溯流結廬因以溪陽自號嵗辛丑吳門陸叔平作溪陽圖貽之迄今癸未先生下世且十年所矣其長君惟明復丐邑人丁生補圖於後常挈之旅槖中時一寓目不勝太行白雲之悲惟明與遊多一時名流競為詩歌題贈而不佞為記其顛末如此是嵗重陽前一日江都陸弼書於白下長千里石字菴中溪山不可見展卷見溪山溪山雲霞色是君世外顔竟陵鍾惺獲觀於林茂之藏林館敬題時甲寅正月十一日附溪陽圖欵云癸未秋日丁雲鵬寫返照上髙林虞淵自寒沍祗隔一溪雲日聽潮音度長干釋洪恩蕭蕭溪上風吹老一楓樹遼陽隺不歸荒雲泣秋雨勾吳俞䇿憨頭陀句恍惚竹橋上深林扶鳩杖其丁元薦長孺詩不及録康虞先生攜此卷北遊余得題識其上今八年矣乙卯與蹇叔重遊此中再請披閲已乃復康虞曰君圖不忘先孝也何幸得嗣君雍侍側因樂而書之萬厯四十三年十月遂州鄭芬識崇禎戊寅冬仲獲觀此卷然包山尚有溪石圖文徵仲𨽻書溪石記為新安吳氏作乃康虞蹇叔俱與余有舊見圖如見其人也方流折玉者識謝樗仙山水長卷明嘉靖草六載丁未吳門六十老人謝時臣逺遊吳楚登太和次大别梯黃鶴涉匡廬下揚子江舟中推篷取興敢與溪山寫真積成長卷計三幅遙寄嘉禾少溪草堂少溪賞識名家此筆得所歸矣余向有樗倦所畫乾坤四大景為匡廬泉泰山松洞庭秋峨眉雪及仙山訪奕鹿鳴圖等幅莽蒼酣肆之筆大類石田艾齊玉水記謝樗仙自題諸畫幅樹杪重泉雨氣涼浴鳬飛鷺滿瞿塘杜陵新譜漁家傲竹笛聲傳到草堂貧居不借江湖重塵俗無榮杖履輕鬢入星霜風月侣閒題山色與泉聲雪滿青山罨畫船中流泛泛小如蓮無端棹入冰壺去一片清寒萬里天酒清花綺雪交加睡足春宵春夢賒半夜湖風打窗紙不知是雪是梅花嘗見眉公寫此詩想本此秃頴殘煤筆陳狂蒼柯白石意蒼蒼一從誤入珊瑚網却與明珠鬬夜光蒼柯白石倣梅道人戲墨羅浮仙子㑹湘妃同駕蒼虬海上歸環珮鏗鏘明月下翠濤和露濕天衣嵗寒三友圖疏影橫斜月色微霜禽粉蝶兩依依一聲悲角山城起人在西莊正掩扉畫梅樗仙夏景山水碁局堪消暑涼隂滿座隅長安塵土思不上隱淪裾又草堂雲樹圖碧山丹殿捲虛無百里春帆下五湖白日草堂雲樹午風流如見輞川圖謝時臣畫卧君山窗下山鳥與我言清風何飀飀松柏中夜繁久遊失歸趣宿此似故園林烟橫近郭溪月落古原髙陽許初書彭隆池畫樗仙圖逺峰疑著雨髙樹若含風水墨傳神妙樗仙繼石翁居士貞瀛州圖千山罨畫捲飛樓樓外寒泉百道流莫笑老夫心逺大曾將清夢到瀛州居節又村居圖茒詹日暖燕交飛雲過牆隂滿翠微中酒經旬掩關卧蒼苔渾欲上人衣商谷居節宋石門西方三聖遊戲園林圖無量壽佛勢至觀音衆生慈父誓願𢎞深應機廣度悲智同心或遊池沼或戲園林隨順根器善誘規針上智了達中下沈吟再喻再攝咸使歸欽一即一切萬象森森一切即一互顯互臨長河酥酪大地黃金惟心惟佛過去來今天地髮僧祖𤣥即宋旭義天台小幅欵云萬厯壬午臘月八日宋旭作上有眉公題夢遊同汝坐莓苔瀑布懸崖萬丈來夢裏瀑聲還撼夢不知真個到天台送編通遊天台作陳繼儒給菴圖偈卷并叙吾崇廣福寺有彬上人者邑之沈氏子生而俊偉長慕空宗年甫二十餘即探歷諸山訪參知識務求證悟未少間息邇者崇福寺野雲禪房啓演經期請延四方名德而彬亦與焉有首座近玉禪師乃先師玉芝老人之上足也風儀閒雅宗教該通一時同門罕出其右彬乃傾心師禮事之咨詢法要朝夕無怠禪誦之暇復手書圓覺經一部以為佩帶持習之資玉師知是法器屢决所疑儲以印可遂為更名曰明宗字之曰了義蓋取圓覺一經之㫖抑以冀其永荷天池之正法也曩因白蓮寺南詢本禪師贈以給菴之號每欲結菴於天池之側以為依栖之所而海印居士雖為廣其說矣然天池支𣲖尚未之能悉爰索余圖偈用表而出之乃為之偈曰曽聞長者創祗恆多劫勤求結勝緣八部天龍常擁護世尊說法顯真詮自從大教來東國財法兩施無間惑爭似沙彌出世心少年學道遍參尋尋師不憚山川杳幾處瞻依窮論討聞昔天池闡正宗每恨無緣一快逢但得此心能了悟誓使羣迷咸濟度殷勤久禮讚空王天與良緣遘此方此方髙㑹皆尊宿座上髙僧稱近玉語默幽閒儼玉芝信是當年親執持執持芝老歸常定復引兒孫聫慧命傳法須憑嗣法人巍巍龍象得僧彬歌貝泠泠容濟濟直下印心期爾始好從圓覺證心空得本何愁末未通事理雙融真不二曹溪一脈天池是天池法脈鎮長流流遍天涯潤不休普願衆生霑一滴慧眼頓開明歷歷祇今正法陵夷久知爾妙年能抖擻粗糲衡苑須適意備行不在莊嚴地即看當時須達拏黃金買地若為圖何如栖息林泉下擬作天人師丈夫時嘉靖乙丑秋七月望日景西居士祖𤣥書於文嘉道埸海印給孤說延秋吳一桂圖開秋玉衡指於太白水天晶瑩浩渺余俯仰區中頓覺塵霽喧息偶從泖上乘扁舟訪我景西居士於語溪芝溪之間適居士飯僧薦母名德雲集厠法席之左有法彬上人者僧相俱足梵唄朗暢緇儀楚楚煥如翬如一衆屬目真叢林之鸑鷟也居士謂余曰此上人妙齡精進數數親近老宿將來安所量也願假一言以品藻之堅翼其白行如何余辭曰古人目擊道存固不當斧鑿混沌以喪其真也明日上人介居士請於余曰南詢本禪師標貧子以給菴之稱未竟其說敢乞片言便朝夕顧名思義何慶快如之積念久矣幸無默默為也余曰子欲聞給菴之說乎昔須達長者財富無量藏庫充盈從一國土至諸國土凡貧窮伶仃顛沛罔賴者隨其所須恆滿其念非獨一世之劫為然緣其宿植德本以致生生充裕博攝困乏遂有給孤之名由是根熟願酬正值釋迦如來出興於世布金買地建立精舍普供三寶人天尋憶往念獲證初果豈徒然與子既以給菴為號豈能萬一如須達長者之布施乎曰無曰子已知無尚當有進於彼也且財法二施法施為上彼之財施雖永久輒能潤澤人間枯槁其視地上應化大士能以種種珍寶積滿三千大千世界及普遍恆沙國土又當云何大抵財施之資益也有封法施之化導也無盡又况住相有得之布施與不住相無得之布施大相懸絶不可算數譬喻子誠能發大願立大誓以悟為期無負此巍巍堂堂之道貌則一經行一習觀一慶讚一一如法使見之者輒生歡喜心而消其塵慮又終必能荷擔如來一段大事續諸佛慧命其為布施不既多乎則子與余逮景西居士永為大乘伴侣矣母竊自諉日住於給孤園給菴為號不為分外也無復俾人誚豫曰大言詹詹不應以大海納於牛跡蒲團之上善思維之是為給菴說嘉靖甲子中秋之吉海印居士方道成書汪南溟司馬肇林社記文水作圖合前卷余始事佛延𦙍公主肇林𦙍公兄事珂公同受天池衣鉢余因𦙍公紹介逆珂公其徒正觀明宗德斂從珂公至𦙍公亦紹其徒文溥文徹文言文濬與俱來至郡中則自如德昻郊勞如禮㑹祖意自唐昌至凡十有二人分席而居諸法衆皆供役余在告屏跡谼中珂公不得余俱相期給夏以待既就席日講楞嚴經於是洪吉明理以下有餘曹以聽法至真海覺辨以下十餘曹以修供至榗紳學士至者則方定之詹東圖陳仲魚方獻成方君在方羽仲鄭夷吾程子虛吳無懷吳延秋吾弟仲淹仲嘉山人則吳仲足余病間如得問法珂公至人寂然無思公雅言自思惟入思之不得猶必蓄疑而通焉醫者以藥藥瘍善矣不瘍而螫身以售惡用藥為不得而疑視不瘍而螫等耳珂公謂否不瘍不藥唯至人能長者宜未及此瘍而內藴不治將深即不深瘍如故也發而决之瘍乃已譬之精舍業已歷堂皇窮奧阼無問入門垣以外曽未得其門猥云居其宫而有之則臆說耳何以故無人故也善乎洪範有言思曰睿睿作聖夫非右券乎哉寂然無思則聖者事余謂諸佛無法法在遺經中世絶學從心開我佛土法惟心造為得其宗彼直將以無思無為知無見為見開宗蓋自此始末流乃復挾小知操獨見愈益支離惡門而鑿壞惡苦口而設醴何為者也珂公謂經以筏喻利涉將必由之亡楫而筏不前宗是矣故瘍則有毒門則有樞潰毒運樞宜無濟長者獨窺要眇猶不離乎文辭棄楫中流取辦一葦抑或繫筏川上而橋足以求前皆悖矣余唯唯蓋將自無知無見者求之㑹詔趣行不得請竊念班白且至奈何舍無礙而就不堪兩公語余有身為患一也善則以不堪為無礙不善則以無礙為不堪蓮出汙瀆不濯而芳蓬生麻中不扶而直長者蓮也豈必擇地而宜吾儕猶有蓬心願無忘此念耳衆曰善隆慶四年七月朔日毗師曼室著汪道昆印東林清絶地西土蔚藍天列嶂千山合羣峰四望全宰官捐淨土長者布金錢闢地依青嶂開池種白蓮招尋來惠逺放達任陶潛說法窺三昧談空證四禪慈雲三伏度法雨一幢傳象外清涼界山前水月懸聽經馴慧鴿施食下饑鳶寵命徵安石文章老惠連未須論去住同結上生緣宗公為妥山法師弟子余兄首事肇林延妥山說法則宗公與俱宗公能詩善顔魯公書不佞則以沙門惟談心印求證果以此為兢兢宗公所務者得無在外乎不侫望宗公者深故為綴數語如此藥師汪道貫書三月蓮花社同禁雲水足空瓢自汲泉敝緼深懷玉露頂夜經行拾枯午炊粟牽纒笑返余何日忘拘束荆南山中人員珂肇林社中送慧空禪子歸語溪兼簡同參石門居士曹源一宿覺今子復何如聽經來白社洗鉢臨清渠妄銷真不立六解一亦除夜參忘壁觀晝卧學空書論心千里外彈指三月餘涼飈動歸思白雲生郊墟卓錫語溪月先達故人廬肇林幻居子祖允中巫初結社緇素百人來慧逺遇斯度東村見復開鳥馴分石供花雨說經臺自愧陶元亮聞鐘駕未回錢珠道人王仲房齊代餘華剎明僧舊草堂沈居寧有劫閲世自無量靈氣千巖紫慈幃萬木蒼行持空寂住何處不清涼慧空上人避暑之栖霞吳門謁豫索贈言漫綴司勳皇甫汸書前有文五峰畫又宋石門為化儀作少室圖彬公一字化儀又號慧空克振宗風傍通翰墨與先君子最契合所遺手劄有謝西房種竹索素手卷題詠薦吳興周玉湖作畫皆韻事又一劄云貧衲七八載居少室接見皆清曠之士後歸梓里復溷常流恨不能即去山中燒折腳鐺煮菜度日不被世間籠繫才是云云遂别赴雙徑出給菴圖偈諸卷遺先君先君嵗供白粲燈油凡十餘載又慧空之侣慧鑑係龍淵壽堂髙足善博古為吾荆翁忘形交其遊峨嵋有諸名宿送行卷文休承項子京為之圖焦弱侯陳眉公為之記篇什甚繁亦老去歸先子每松窗靈石畔展閲諸卷如對青鬱鬱焉後余在東省遭艱被宵人罄齊頭物二上人所遺亦失去可勝悵悵然以法眼視之直如露亦如電也解脫月菩薩弟子汪砢玉識於密訓頗梨間珊瑚網卷四十一
