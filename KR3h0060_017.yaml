body:
  text: 珊瑚網卷十七明汪砢玉撰法書題跋王雅宜賦得撫孤松而盤桓并書憶昨玉山陽恭陪錦袍宴明公降顔色腐儒略踈賤樓銜雲端峯花滿川際甸逶迤匝金巵徙倚傳銀箭歸來卧蓬蒿斗柄忽三轉惟公傑魁人嶷立端華辨深山巨谷間龍虎騰雄變天開棟柱姿捫腹藏組練雲峰阻岷蜀濁河繞徐汴腰縣朱雀符手㺯白羽扇赤心日月傍青草郊原遍未拜黃霸徴俄擁疏公餞焚魚抱天和解帶酣清燕廓落得翺翔與時而舒卷煙霞散天質瀟灑江湖面千載永遊遨松喬何足羡正德丁丑八月朔旦為大參遁庵吳公七十有五誕辰敢獻短章揄揚厥美晚生王寵謹書履吉還山詩行草久欲歸西山囂喧漫鞅掌當陽麗江臯菰鴈獨欣賞巖餘白雲停水接紅霞上地軸闕墳夷天地滙泱漭鮫人鼓安流玄牝遺清響秀色溢層巒虛光涵萬象川原信沃膴景物初駘蕩覽化自靡寵遵性非外奬彼美丘園賁眷言興我想恭承休明日九軸今一家進則綰龜玉退則蟄龍蛇吾道苟不虧安用事咄嗟山川日間曠土風頗清嘉右雞鳴寺萬木黯成雨千崕殊欲秋魚龍成水戲巗壁亂雲流蓬纍栖窮士天心共海鷗侯生居語汝吾道付滄洲右山居山中有流水借問不知名映地為天色飛空作雨聲轉來深澗滿流出小池平恬淡無人見年年長自清右咏泉王寵王履吉題畫諸迹過雨山堂蒸翠雲四簷藤竹鳥聲聞青天不動峰文坼錦石相鮮澗道分流水桃花真隔世草衣木食自為羣籠鵝寫帖關幽興却憶風流晉右軍僧到清齋禮佛客來豪飲談天但得間消長日何須苦計千年生平最耽懶謾病後休欲支持或素或葷度日不巾不櫛隨時有客别離許久緘題相訊何如落得北忩高卧起來醉茗狂歌夢裏却忘家纍病中始信身間得句微吟抱膝有時枯坐閉關客自豫章逺過使從燕市初來為語禮文寬放應憐書劄懶裁屣步陵孤峴流目環歸霞鳴嚶藹以豫陽林荑漸花風光枝上泛日采水中華感物眷彌結悟空理已遐永言徹玄寂聊以遣紛拏環州信玲瓏灌莽何蔥蒨中有方丈室聊以酬清燕對嶺屯白雲旁林繞碧栫時聞樵採音日覽湖山變緑蟻忺獨持道書慵不卷玄言謝丹轂散髮却瓊辨頗懷康樂憂幸乏子牟戀寄言賞心人嵗晚同係眷已丑上已日雅宜山人王寵書于石湖禪院又題咏墨迹秋水百川灌雲帆楚翼飛大江離地紀旭日對天扉表裏黃圖壯東南紫蓋非英雄徂落盡霄漢仰垂衣右渡江瓜步臨江出鍾山不論雲風蘆吹淋瀝沙鳥拂氤氲北控淮徐阻南瞻斗極分輕帆移過穩把酒玩峯文右瓜步山玉壘疑連漢牙旗認插雲樓船橫海出斧越自天分紫翠中原氣山河大地文我皇開日月萬古淨妖氛右石頭城昔誦北山文今棲鍾阜雲秋林時夜嘯天樂忽空聞弟子胡麻薦頭陀罽席分那知江海客不亂衲衣羣右鍾阜我愛僧家不二僧還讓我羲皇勘破應無妄想知足便是良方掃徑貪看松竹扳罾喜得魚蝦恐説牀頭甕倒不覺林間日斜楊栁村邊小艇荷花池上清樽已遇田夫野叟何來公子王孫逺岸踈林斜日外春風碧水草堂前匡廬突兀開屏障坐看銀河一道懸石湖春色逐人來試問東林老萬回何處梅花承雪吐誰家栁色㺯煙開夾岸青山挂玉壺桃花流水入虛無何時天上偕微緑會向君王乞鏡湖王寵王雅冝楷書石湖八絶句石湖春色太可憐却似美人明鏡前錦甸平鋪鴨緑水白雲飛動蔚藍天星橋北挂㵼春流映出黃山水面浮霞石天青飛練鵲桃花氣暖醉輕鷗春山面面翠屏開盡繞吳王百尺臺一代霸圖憐燼滅五湖流水恨東回三月暮春春服成含風疊雪越羅輕生憎乳燕撩春色轉遣飛花蕩酒情越來溪上栁千絲畫鼓遊船晚更移一曲紫雲歌粵女雙鬟白雪舞吳兒數松磊葉千尺強恰如天際羣龍翔吟風嘯雨中琴瑟大澤深山藏棟梁古木朱藤踈著花淡雲斜日淨江沙黃金臺上無推轂白石山中有嵗華登山臨水春將歸獨樹桃花猶未飛玩世繁華真倐忽後時顔色轉霏微王寵陳白陽詩草藩籬不設處吾道是吾家地僻寬行迹林深多落花興闌覺老至力倦不途賖最愛茅簷月依依進復斜白陽山人道復屋上春鳩鳴村邊杏花白持斧伐逺揚荷鋤觀泉脈新燕識舊窠舊人看新厯臨觴忽不怡惆悵逺行客戊戌春日道復書緑蘿百轉露華輕紫翠重重繞帝城天上神宫金作屋雲間仙樂玉為笙澗盤九渡三天淨峯疊羣星一劍橫此日分萸嗟鶴馭月明倣佛步虛聲九日登高和作自愧迂踈常取咎更兼多病懶經營一生落落真和寄舉世滔滔亦可驚身外事機爭入夢眼前杯酒却關情茅齋此夜勞相問風雨明朝未許行客過田舍奉贈城上新月白溪邊新水涼多因心迹倦不得往來吟陳淳道復陸五湖行書詩箋人日立春前風光併作妍嶺雲鮮映日湖水淡生煙乳燕嬌花勝輕鷗送酒船韶華生樂事端不負諸賢為明夫道文書師道山回水轉渚宫開霸主樓船避暑來六月湖中天鏡曉百花深處美人回鹿泉雉苑猶春色玉劍金鈿又劫灰惟有溪邊緑楊栁千絲還拂掌中杯消夏灣作蒙山顧渚雨前春紗帽籠頭掩竹扄禪榻風飄詩欲就瓶笙聲轉酒初醒何人可獻驚雷莢有客曽為品闕汝山園生紫笋還期千里汲中泠春光滿地百花枝烏帽承塵半醉時莫放玉鞭催馬急瓊林還記宴歸時坐占溪亭松樹隂紅塵不染靜中心髙山流水千年調此趣應知不在琴霜葉垂垂落木秋江城細路逐山幽扁舟載渡者誰子溪上有人歌逺遊千山一白照人頭蓑笠生涯此釣舟不識江湖風雪裏豈能分得廟堂憂子傳陸師道書王酉室詩草蘭若閟林丘花朝共此遊風傳鈴閣響雨益劍池流俯瞰千人石高憑百尺樓當歌還對酒戀賞未回舟靈阜枕通波方舟薄晚過雨聲希澗谷霽色映松蘿秉燭還更酌飛觴不住歌歸家踏清影微月在簷阿右遊虎丘二首榖祥橫塘别墅敞危樓結夏乘風此度遊屏列蒼山開竹徑帷齊碧樹艤蘭舟阮渾視我仍青眼王粲違時已白頭對酒歡悰何以減山陽吹笛正悠悠遊宴逃暑應能暫閉關未消多把古賢扳欲拋杯酌方為懶少事篇章恐礙間風墮一庭鄰寺葉雲開半面隔城山浮生只説潛居易隱此求名事更艱右間居秋日祿之王榖祥書徐子與送琅琊王氏昆季詩草海內於今有大名自耕黃穄隱茅衡論詩未必推公幹作賦還應過長卿萬里白雲知我癖十年青眼望君情故人西去多傾倒况復相逢愧此生十年懷疏泪長枯兄弟伶俜滯海隅此度别離俱慷慨不知天地有﨑嶇孤忠久抱千秋恨元惡方嬰兩觀誅正是聖明新雨露恩波應已浹玄廬鳯洲兄弟赴闕上書賦此送之聖主初綱法令齊萬方歡喜報金雞豈知禁劾埋丹懇詎有恩慈漏紫泥北折天驕清逺徼南驅日域靜遺黎功多誰謂翻成譴汧督牙門死後題聞赦後再貽鳯洲兄弟獻忠向偽作枝山書竹懶翁見之曰此天目先生筆也遂改入此玉記黃士雅行草詩册兹山信靈氣南望接蒼梧海近罏峰暗天寒鏡水枯翠微空玉帛丹壑隱金符猶仰玄宫在千秋片石孤右題禹陵共遣區中纍來從物外遊溪山勝不改吳越迹空留逺浦蒹葭晚隂崕薜荔秋寒花送歸棹漁唱起江鷗右石湖秋泛春煙嫋嫋雨濛濛梁苑隋堤一夢中纎葉空憐半江水殘絲猶怯五更風永豐園裏情無限蘇小門前曲未終寄語飛花好棲泊莫教飄蕩恨西東長千栁淺白深紅鬬合歡絲絲香雨晝難乾會須一日三百盞無那東風十二闌水上新傳錦字艷樓頭長怨玉簫寒可憐春色隨花盡歸興還應帶月看息園賞牡丹蓬苑彯纓羡年少星裝千里赴神臯王程草色催緹騎仙闕花香待錦袍侍從雍容恩最渥文章清祕價偏高金昌楊栁還堪折緑酒紅亭揖佩刀送姚禹門還朝北上嶺南才子邁華風早嵗聲名動域中無用官嫌廣文冷誰知詩有拾遺工雙魚南北元非隔老驥雄心亦自同今夜思君淮海月清光解到五湖東答歐崙山郡博豈因貧賤事干謁閉户著書無斗糧猶耻王孫一飲惠未忘俠烈五陵狂黃金散盡留顔色白髮悲來歌慨慷相對秋風都市酒青天不語泣千將贈金孝亷子坤空自時標千里鈎與君同哭阮生途足離楚國方為玉泣下鮫人始自珠七首風霜羞烈士馬蹄花月憶名都各天南北應難見頭白臨岐酒一壺右送盧山人次楩還濬縣雛黃緑忩下芥羽含輕粉暖風階草長呼羣入花影右題叔平畫黃山南麓石湖東山色湖光蕩碧空十里橫塘芳草路菱歌清唱月明中姬水彭孔嘉書冬遊石湖記卷吳中山水之勝大而逺者曰洞庭小而近者曰虎丘大者險小者隘若夫逺而夷近而曠兼大小之勝者曰石湖故洞庭非好異探竒者弗之虎丘則軒冕綺羅之所萃大夫士清修雅尚者多為石湖之遊余竊自慶生長太平又適遇父執諸老與二三君子辭榮故里每良辰令序未始不遊遊未始不之石湖而亦未始不撰杖屨以從也今年夏四月十四三日遊焉儀制陸公子傳謂豫曰錦繡山川夔龍人物香山洛社何以加諸盛極必衰恐難常也昔海上雖用兵尚無門庭之禍越十日賊遽深入掠婁葑二郛五宿乃去六月四日賊再至焚戮金閶壞萬餘室邑里蕭條人迹久絶而去從入湖溯浙幸其意亟一草一木無犯焉然遊事遂少軍城晏開干戈載道雖欲繼往不遑暇也蠟月十有六日偶與周君公瑕袁君魯望張君伯起沈君道徴有事湖上宿楞伽僧舍既而納言石月張丈自崑山至秋卿補菴華公自無錫至明伯存叔兩文學侍焉開户呼酒數酌就寢翌旦遂偕諸公步自行春橋謁范穆祠覽觀音巖徑茶磨山抵治平寺觀所發越公井松下少憩肩輿進道厯紫薇村上方嶺涉吳山之西麓南望太湖雲濤煙嶠隱見於涳濛杳靄之間夾路梅蕊雪英芬芳飄灑而風不甚徑略無寒色魯望攜具盧侍御園小飲而返補菴乃啓泛舟之宴湖光山色風帆沙烏逺落天際近拂几席羽觴飛浮麗唱𢋫和可謂極臨眺之娛窮賞心之適矣華燭屢跋雲月微明諸公乘興復席地方酒酣樂極感慨係之望郊臺則憤闔閭之僣竊瞰越溪則偉勾踐之刷恥又竊怪夫吳士之輕揚剽鋭勇冠荆楚古善用之則爭盟中國今不善用則受侮島夷何古今人不相及也華公則曰兹遊擅山水之竒免風波之懼領泉石之趣謝登涉之勞良朋萃止詞客滿座邊烽畫警此夕稍息不惟得地之勝而人之勝天之勝兼有焉烏可無所述哉於是諸公賦詩陸公繪事俾豫記之時方多艱後會難卜恐他日之視今又若今之視昨也故追念陸公之言以適兹遊之不易得嘉靖甲寅蠟月既望隆池山樵彭年識卷首為文壽承大書石湖春曉陸子傳作圖于前約略彭記淡宕可觀而隆池書尤勝壬午冬無以卒嵗併陽明先生篆體古本學庸卷及內府金字經二函端溪古硯四臺售之矣玉記彭隆池詩帖卜築青溪館新開㺯水軒宵連明月漾曉愛落花旋鶴引攜琴薦鷗盤拂酒船達人遵智養豈復羡臨淵相近竹參差相過人不知幽花欹滿樹曲水細通池歸客村非逺殘樽席更移看君多道氣從自數追隨右五言二律彭年翻經纍嵗遊禾郡攜錫重來住竹林貝葉如山留海藏雨花隨地聽潮音詩成苑外碧雲合定入禪心片月沈慚愧當時社中客醉多猶自費招尋禾僧林竹堂懷詩過訪酬贈逺峰疑著雨髙樹若含風水墨傳神妙樗仙繼石翁日斜疏樹影秋靜碧溪寒隔浦山千疊詩成馬上看落日半山紫新霜踈樹紅詩人美秋興攜杖過橋東右題畫三絶隆池江南春色滿晴郊紫燕初飛未定巢最愛名園新栁外一枝穠杏倚風梢題杏君家庭下有仙樹還疑天上近移將素枝映月栽崑壁幽韻因風散楚香玉蘭粉合胭脂作晚粧富於顔色吝於香東風不肯全分付相對梅花各斷腸咏海棠庾信風流賦小園碧山當户緑池翻煮茶滌硯足幽事永日忘形與客言彭年文三橋詩帖心愛躬耕好身於畎畝宜辛勤自食力骯髒已非時征役吳民困風塵戍卒悲一燈論世事不覺淚交頤文彭題扇凝霞閣藏風雨來何迅山堂白晝昏斜飛愁入座縣溜訝翻盆望望委疇黍哀哀何處村皇天應有意且罄手中樽文彭書屏墨花閣供八月燕山颯素秋華堂髙宴亂觥籌圍棋不賭山隂墅看月常懷太白樓萬里飛騰心已盡一時佳會興難酬淹淹不醉歸無計卜夜應須暫爾留月上瑶臺興轉髙此時直欲數秋毫持杯無奈金波灧晤語何妨玉漏迢帝里風光開勝賞天涯鴻雁下青霄孟公不必先投轄忍使良霄漫寂寥楊通政宅看月二首文彭燕山西南擁皇都曲曲樓臺罨畫圗瑶草琪花紛玉澗璇題金榜映珊瑚煙霞自昔稱靈境風物如聞入化區咫尺紅塵不能到夢遊何日訪蓬壺劉羽泉約遊西山不果作文彭鏡湖湖水如鏡平峯巒罨畫搖空明浮雲靉靆自來往輕舟迅邁勞逢迎白鷗飛飛映山逺青蒲曲曲隨洲生風流賀入已千載轉憶悠悠身後名鏡湖仲夏新晴事事宜定罏香爇海南竒雙鈎淳化羲之帖細讀開元杜甫詩石鼎颼飀間鬭茗楷枰剝啄試圍棋新篁脫粉芭焦緑不怕星星兩鬢絲壽承幽谷質不變入室竟無香所以君子心兩兩自相忘錦江春色麗錦樹艷生輝婀娜臨風處偏增蜂蝶飛瓊花開六尺雪片舞千枝清夜撩明月穠香入蕙帷五月敷新艷朝暉麗紺粧空庭有佳色密葉映斜陽千蕊復萬蕊初疑安石榴分房出韶艷循玩及清秋秋葵有佳色日吐淡鵝黃楚楚山亭下孤雲映淺粧清露下江臯秋光淨如洗中有㺯珠人盈盈滴秋水素足明寒水輕盈雲裏身凌波何處去闌住軟香新右題畫蘭花海棠梔子石榴紫薇秋葵芙蓉水仙共八絶句三橋居士書犖確髙岡細路環離離樹影夕陽間分明秋日龍江道馬上遙看隔岸山十日春隂不裹巾喜看庭際緑苔新山齋聽雨惟髙卧忘却門前問字人玉色吳箋勝陟釐端州古硯墨花垂試拈閣帖間臨草不是羲之即獻之雁門文彭文文水書澄心窩銘一間房六尺地雖沒莊嚴都也精緻蒲作團布作被日裏可坐夜裏可睡燈一盞香一炷石磬幾聲木魚幾記龕常關門常閉好人放參惡人回避髮不除肉不忌道人心腸儒者服製上無師下無弟不傳衣鉢不立文字不談禪不説偈但無妄行亦無妄意不貪生不圖利了清淨緣作解脫計無罣礙無拘繫間便入來忙便出去省間非省間氣在家出家在世出世佛何人佛何處此即上乘此即三昧日復日嵗復嵗畢我這生任他後裔文嘉文休承詩草夜半羣動息五更有夢殘天雞呌一聲萬枕不遑安一日一百刻能有幾日間當其間睡時作夢更多端窮者夢富貴達者夢神仙夢中亦役役人生良鮮歡文水道人謾語江南五月暑未足終日只聞霖雨聲閉門愁坐自蕭索前溪水滿菰蒲生故人落寞忽在眼登堂一笑空相驚相驚猶未歇雲暗關山月君今棄我去令我心如缺欲止不可扳欲留不可説始知會合各有時何必淋漓託酒巵君今歸去自結湖山遊我今落落復作城市儔感君佳意為君説説罷不覺令人愁乘興叩禪關蕭然竹樹間路應回九折屋只住三間齋白月懸鏡花明菊破顔茶香解留客深夜不知還訪道園上人月白齋文嘉御史登埤白羽揮將軍出戰錦征衣已驚墅菽能留馬復訝舟桅似伏機嚦嚦胡笳悲逺塞蕭蕭鐵騎散重圍聖王發縱唯常道不遣窮追逞殺威即看北敵去雲中清漠真同衛霍風急遣遼陽安反側莫令赤子再從戎驕盈自取誅夷慘感格應知禱祀功千古華夷元不混萬年厯服正無窮湖上洞庭秋可憐玉方壺浸兩青蓮輕舠獨濟欣無浪病骨驚寒欲絮綿間展白詩愁漫興偶題黃雀入新篇近來我亦開涓滴半醉懷人一惘然二月竹堂梅夢明倚簷千樹雪濤平春隂漠漠江樓迥日暮迢迢湘水清長憶深杯臨古樹肯拚棋局對殘英閉門逸興何由遣坐看階前緑草生歸來三徑未全荒拂拭重開舊草堂棐几淨楷平似鏡硯池新浴燦生光客來親戚情多悅老去詩篇竟未忘莫道歸遲遲亦好猶勝終老滯他鄉茂苑文嘉書周幼海詩草山盡雲邉路林窺湖上天身疑出宇宙目已極風煙幻迹虛舟外間情短策前桃花春更好為憶避秦年三月淹歸候孤帆待好風稽山望不及落日思何窮水濶煙光外天低樹影中江蘺不能賦詩客旅愁同扶病看山出同人載雨過寒生幽谷早暝入亂峰多孤塔搖層靄長橋拒逺波將寒湖口勝拚為借漁蓑巖際披雲棲高寒夢不迷數峯孤枕上片月大江西度壑鐘聲小垂簷象緯低褰裳看未足何處報辰雞右舊作四首天球漫書城上高臺半切雲平臨睥睨送斜曛西山曲抱神京紫北斗中懸帝座文晚色千門雙杵動秋天萬里片鴻分黃金已改當年築綵筆何須太史聞扶桑一𣲖碧流溪春水溶溶漫拍堤兩岸緑蕪飛白鳥半忩紅日唱黃鸝硯頭雨歇尋漁具栁外風吹行杖藜自愛塵纓歌濯處憑將詩酒樂幽棲醉倚髙臺雲幾重青山歷歷見江東天風忽向闌干度一片芙蓉落掌中牛首層巒盧鴻石榻寄嵩山竹雪松雲共灑然我欲逃名巖穴去無如此地隔風煙山居小忩秋色滿庭階寂寞無營自煮茶賴有短墻芳草積不教蝴蝶過鄰家秋色繡嶺春雲拂翠文緑軒春酒醉蘭芬不知門外塵埃滿惟挾山中鸞鶴羣周天球書莫雲卿筆麈行書摺帖有數則刻舊兩集者去之壬午冬十二月余居長安旅邸嵗晏窮愁秉燭兀坐輒思良友與之揮麈一談而不可得也案頭信筆隨意書得數條題曰筆麈聊當友生一夕晤言之趣耳江南李後主嘗詔徐鉉以所藏古今法書入之石名升元帖此在淳化閣帖之前當為法帖之祖今遂不復得見片紙至呼淳化初刻為祖帖蓋不知有升元刻耳漢唐碑碣鍾王名迹乃多有存者何為此刻獨無僅存也何內翰良俊嘗言自唐以後無一好石刻蘇王亦無佳者趙吳興學李北海咄咄逼真但一入石便乏古意此不知何理余謂趙吳興於北海面目全似而神氣尚隔一塵亦山谷所謂欲換凡骨無金丹也豈待入石而後辨哉蘇黃廢古法自成門户惟米南宫篤意師古其書石者便勝諸家耳窮鴉飛數點流水繞孤村斜陽欲落處一望黯消魂此隋煬帝野望詩也何異唐人五言絶句體耶秦少遊改作小詞窮鴉作寒鴉海中有銀山生樹名女樹天明時皆生嬰兒日出能行至食時皆成少年日中壯盛日昃衰老日沒死日出復然若莊生所稱冥靈大椿以八千嵗為春秋皆旦暮也淵明詩云世短意長多斯人樂久生又云中觴縱遙情忘彼千載憂且極今朝樂明日非所求使九原而可作則願為陶公執鞭矣昔人謂天下之智無窮盎錯之不能並立久矣初盎道逢丞相申屠嘉密請嘉有所啓意在錯也而嘉恐以吳事見告輒拒之既乃引為上客而請間之説得行相從容燕侍力陳錯惡異時嘉奏請誅錯奈何帝以錯言先入嘉奏沮格發憤而死及七國之變盎又請間而錯遂不免蓋其為計甚密故卒遂其所圖是錯計出嘉上而盎計又出錯上信乎天下無第一手也吾於時事觀之益信然行惡見樂為惡未熟至其惡熟自見受苦行善見苦為善未熟至其善熟自見受樂又云於可樂中生不樂想於不樂中生可樂想於樂不樂能行捨想此等語大有名理宋孝宗問天竺僧云既是飛峰何不飛去答曰一動不如一靜又問觀音手中數珠念甚曰念觀世音菩薩又問自念自號作甚曰求人不如求已大抵禪宗機鋒決捷入理最深故文殊師利稱維摩大士辨才無滯智慧無礙諸佛祕藏無不得入吾儒中多從文字智慧得來非復聖賢心性學術所謂不如諸夏之亡也古人下筆先求合已次乃求之法度今人下筆先求合人次乃求之枝葉文章關氣運自是千古定論方在氣運中人自不覺及異代觀之毫髮不能掩如唐人未常不學漢人文章韓栁欲振六朝之衰今其文置之遷固間有不可辨者乎宋人未嘗不學漢魏詩法李杜遂欲憑陵陶謝今其詩置之漢魏間有不可辨者乎惟宋諸名人於古法多不甚句字摹擬縱其才具各成一家至謂子固本六經皆虛談也獨我朝號為復古文師左國兩漢詩必唐人銖銖而求寸寸而度今以為駕唐宋矣不知異代觀之竟作何狀豈唐人之不能及漢宋詩之不能及唐其才識皆出我朝諸公之下吾不信也然則不當師古哉曰非然探古人之理窟用古人之法律縱吾心匠以合一代之氣運而無徒銖銖寸寸若優孟之為叔敖其將有俟於命世之傑者乎山谷墨迹一帖云近有佳會率以故不得往豈食料禁不批放耶又一帖云花四枝漫送餘春可賞否戴花人安否米南宫書研山銘一幅後書云寶晉齋前軒書銘云五色水浮崑崙潭在頂出墨雲挂龍怪爍電痕下震澤闕極變化閣道門語亦奇麗可誦余甚愛之時時倣其筆意書以示識者淵明詩云故人賞我趣挈榼相與至班荆坐松下數斟已復醉父老雜亂言觴酌失行次不覺知有我安知物為貴悠悠迷所留酒中有深味此老可謂酒中見道夫至於人我俱忘寧復有富貴貧賤得失之故可以動其中耶昌黎公晚年遂有聲樂而服金石張籍祭文云乃出二侍女合彈琵琶筝既而遂曰公疾日浸加孺人侍湯藥白樂天思舊詩云退之服硫黃一病訖不痊微之錬秋石未老身􅀈然退之嘗譏人不解文字飲而自敗于女伎乎作李博士墓志戒人服金石藥而自餌硫黃乎何次道往瓦官寺禮拜甚勤阮思曠語之曰卿志大宇宙勇邁終古何曰卿今日何故忽見推阮曰我圖數千户郡尚不能得卿乃圖作佛不亦大乎今士大夫身享富貴臨老便思生天作佛鮮不為阮笑矣近時有善召乩仙者術甚竒余偶過海上潘方伯家方伯以他事召仙而余適入坐然余未有意求問也方伯強豫叩之因焚香稽首甫畢而仙至運乩大書曰雲卿前揖生欲接淅何以罄悃莫生能為右軍點畫左氏文萃捫虱髙談宛王景略之玩㺯圍棋遣興幾謝安石之風流眼底當物何人今乃拜乎玄教欲知生前因乎生原玉帝右史為草酒中敕待罪數年得謫今世余問何敕曰便是立世宗敕還能記否生酒中所草者詞極佳子但不應酒中撰代子一傳何如玉皇上清帝主敕明天子某髙帝開緒景運中天行廟多巡承祧偶乏昔黃河清徹曽開聖世之徴安陸分藩亦是民間之養兹遣嶽瀆之神定為山河之主嗚呼表隆天日足備聰明但年富春秋首存欽恤速圖警蹕母讓渭橋欽此書畢便去此文警策簡潔似不從人間來今余鄉士夫傳誦以為竒事曇陽事大有助名教第不幸生富貴家遂令張大聲息所稱弟子者又多非其人恐曇陽既志後必自懴悔人居城市無論貴賤貧富未免塵俗喧囂仰事俯育自有親朋交際寧可絶人逃世一事不復料理吾願出郭數里擇溪山清嘉林木叢秀處結廬三畝置田一區往返郡邑則策蹇從之良友相尋欵留信宿不見縣官面目躬親農圃之役伏臘稍給尊爼粗供嘯歌簷楹之下以送餘年其亦可矣肥甘可省蔬食可樂獨酒不聖則神理多惡茗不精則腥羶不化每赴招攜酒茗不備即九鼎八珍之饌皆為長物人久御肥甘炮炙之味不獨令腸胃受傷重令人心氣昏濁每三日一齋素可以養生可以養心夫富貴之士則營名利貧賤之士則營衣食鼎鼎百年內營營以老不知此生身心俱曠飲水自適放恣形骸之外盤礴溪山之間俯仰無纍于情起居咸順其欲語默不礙於俗視聽無逆於中有幾何日哉是造物者所最吝惜也古惟巢居之徒濠濮之侣能蟬脫塵壒造物不復能為之拘可謂遁天之民故曰不是間人間不得能間不是等間人信夫名利喧囂之地趨之者衆與人惟恐不多山川岑寂之間知之者希與人惟恐不少王摩詰詩云乘興每獨往勝事空自知此語識霞外之理余嘗呼童子入深山中擇清流茂林人迹不到處危崖斷澗藉草踞石竟日獨坐稍忍飢渴吞氣納津差不甚苦便謂此身與世俗了不相關忽聞樵牧隱隱出沒逺近妄意武陵桃源非逺他時或在朝市塵勞或應接俗子憤悶無緒輒念此一段幽絶之景移置目前覺心地清涼矣經史子集之外博聞多知不可無雜記録今人讀書而全不關覽小説家終是寡陋俗學宇宙之變名物之煩多出于此第如鬼物妖魅之説如今之燃犀録暌車志幽怪録等書野史蕪穢之談如水許傳三國演義等書焚之可也今富貴之家亦多好古玩然亦多從衆附會而不知所以好也且如蓄一古書便須考校字樣訛謬及耳目所不及見者真似益一良友蓄一古畫便須如宗少文澄懷觀道卧以遊之其他如商彛周鼎則知古人制作之精方為有益不然與在賈肆何異今世所見古器有商金銀及文王鼎樽匜古製便謂商周之器更為無之辨證者蓋漢人好制作今之玉器在漢人制者極為精巧且其人近古或以三代之物用其樣式為之遂各因其代名之耳豈必盡謂真商周耶間有為盜發古冡而出者亦如沅江九肋龞矣此好古博雅之士所當知也漢人器如博山爐之類以其無青緑遂謂漢銅器不為古豈知三代殉葬之物甚多而漢人鮮用故入土者少若漢物入土其青緑去三代當不甚相逺今玉器血侵尸古尚是漢代所出何銅器入土反無古色耶此可不辨而明也古器得土氣多者多青得水氣多者多緑水土雜者青緑間發蓋惟古帝王之陵墓造作堅固不為水所入或置石几上几不腐壞而器常懸虛其得土氣最清且無泥汙故有純青翠者此上品也其他民間或卿士大夫之冢郭中不能無土且不能無水沁故青緑間發者多純緑者則自江海大津中或水若無土者故金銀器絶無古者為世道流通致用之物故也可以知古今人嗜利之心同矣古今人不相及豈但德慧智術文章而已哉即百工技藝一代不及一代矣歷觀前代諸史惟善惡賢不肖自開闢以來人情想不甚相逺春秋戰國人心之傾危隂賊在卿士大夫中最多益有甚於今日者至謂人漸澆漓未為篤論余嘗謂世道之淳漓惟有一代之興則有一代之今古如我髙皇帝造草昧時風氣尚朴今復漸漓即以一人試觀之其為兒時以及皓首其間變幻數易人情不同甚矣况幾百年之相去乎蓋世道至於澆漓之極太朴盡散則天生真人為之滌除一畨使氣運再復旋環無端所謂百世可知即此説也蓋一代自有一代之淳漓古今宇宙自有一大氣運之淳漓第觀一代之淳漓最覺較此明白易見廷韓作散語有蘇黃之致書法米顛亦咄咄逼人此數則乃得之不經意草草者而天真朗然中載天上立世宗敇尤為竒話晴忩一展為之拍拍竹懶李日華識雲卿與劉生手簡昨夜坐偶得佳興寫小行書一紙頗有前人法度目中無知書者第可與足下相賞耳今奉去以償久負行書欲令運筆不暫畹滯痛去俗病自能合作學古本聖教序不如學新本蘭亭此語大有會心也褚河南筆趣絶羣離類枯樹賦新絶竒古便與二王抗行願足下留意焉習舉業倦時不妨遊萟此道若大成縱橫一時可令青紫奪氣莫廷韓詩詞墨迹小閣帶溪流山深事事幽應知草玄閣寂寞向滄洲羽客不可尋煙雲自來去時時神鴿飛誰辨丹成處明月來何時花深露華冷酒醒去空階佳人㺯花影曉露散金液翠旗千葉開羽經堪自著客第品泉來是龍為懷荆汪大書於龍潭舟十年裘馬熟長干飛夢隨君去不難桃葉渡頭歌舊葉木蘭舟上採芳蘭誰家明月酣春卧京兆梅花犯雪看愁絶倚樓嬌眼在粉啼容易傍人彈雲卿乍出蘭盆倦晚粧輕綃不掩雪肌香新纒羅襪勾春興何用雙飛小鳯凰咏理紈美人塗香莫惜蓮承步長愁羅襪凌波去只見舞回風都無行處蹤偷穿宫樣穩並立雙趺困纎妙説應難須從掌上看右東坡咏弓足詞調菩薩蠻并書於舊雨堂中是龍王伯穀詩卷萬里還家一草堂佩刀猶在問王祥心同玉女寒潭水鬢著銅官曉岫霜中聖且教田種秫長生須待海成桑春風倚杖柴門下無數南山近女墻千里山川命駕行鶡冠魚服暫藏名詞人盡訝青蓮待關尹遙瞻紫氣迎吳苑遊絲三月絮蘇堤芳草六橋鶯還家載得詩盈篋莫道扁舟似葉輕廣長庵作二首東山别墅半桑田夢草詩成憶惠連隔岸晚煙千嶂緑當樓明月一洲圓林中竹葉人人酒渡口芙蓉日日船此地不妨雲共卧戴逵誰送買山錢范仲昭别業虎山橋外水如煙雨暗湖昏不繫船此地人家無玉厯梅花開日是新年為愛荆先生書王稚登龍鬚蔓引青油幕瑪瑙珠傾碧玉盤日午漢宫開暑殿佳人共嚼水晶寒右題蔔葡太原王稚登書白石山樵詩詞諸迹步步穿危磴幽蘿引蔓長竹深山瓦緑松老羽衣香珍果從猿摘清泉共鶴嘗石罏趺坐久松壑忽斜陽入山一首似愛荆先生陳繼儒緑髮丹臺生結廬長松側仙客未通名對奕不相識雲來棋局暗雲去分黑白獨有雪髯猿旁觀無怖色右題仙奕圖山上多松柏上下多花果松老已千年果熟垂百顆擘茶染異香鑽石傳新火寫徑未終函已得前生我右寫經作樹底息微躬才容靜者通終朝醉花露無價賣松風采藥山中相注經河上公往來不一里鄰比竹溪東右避暑作不惜杖頭錢買花栽滿路愛花如愛子一步一回顧花前扳折人酷於風雨妬勸君莫乘花還作花都護右種花示客大隱在城市仙人好樓居四五百竿竹二三千卷書竹可題名書可讀况有新松翠如沐就中上座是阿誰君與梅花兩尊宿陳繼儒似玉水詞兄正我有好山長苦出少年羡汝獨安禪閉門刪草不辭倦對月讀經猶未眠藥竈夜留桑柘火茒堂秋淡荻蘆煙穿林有伴攜琴至聽到松風第幾絃眉公仙女吹簫忽下樓問年十七尚含羞五銖錢串同心結百和香勻半臂韝鏡裏見人驚却步夢中索母學梳頭起來笑點花簮戴多子先教采石榴友人五月納姬之作春風久唐突花事亦支吾猶有蘼蕪路青來范蠡湖春風蘸栁枝宿鳥棲不定笑踏斜陽中折花以相贈右暮春遊檇李二絶書似愛荆先生陳繼儒間往間來獨和歌栁花燕子水微波西湖堤上平如坻春草青青放白驢憶西湖作蕭蕭灑灑枝兩頭磊磊落落千章松晚坐竹忩無過客隔溪明月打山鐘迎秋早坐寂寂山堂報晚鐘繞身三匝見獰龍戲將帶縳龍腰上明月尋來是老松解脫偈燕燕于飛補葺舊巢堪宿草寮寬何須華屋水兒一曲山兒一曲翠微中鬚眉皆緑拄杖敲門有客來看修竹但家饒園蔬野蓛菊花蕊足松花飯熟日三竿圖些清福眉道人陳繼儒書於山陲喜庵陳眉公冬餘記書絹軸上余願為冬餘處士文逋俗逋不復叩門擁爐炙日濁酒陳書此目前輕安法三十年不能得也伯承以嵗抄踏氷霜訪余草堂信宿信宿非特髙義實以五十婚嫁皆畢二子皆秀才閉門讀書史無煩檢課伯承真冬餘處士也是晚同玄宰雜論因言知天命非有别法但安命不扳緣耳順亦非有别法但機稱順逆如風相似不分别耳龍溪子謂八十不踰規余以為即百嵗決不踰矩平天下止言潔矩耳庚戊十二月二十日陳繼儒記湯鄰初仿蔡蘇米四大家書燈夕詩一堂瑶京五夜溢寒光散落清輝滿下方無限素娥親剪就半天霞錦半霓裳鄰初煥光生碧海闕天空萬井晴搖玉樹風誰捲石家紅錦帳一時移入水晶宫湯煥水晶簾箔夜光珠隱映虹橋落九衢已見台階符泰運更看人壽比方壺鄰初道人霓裳隊裏按歌聲散作人間鼓吹鳴坐聽西樓更漏盡不知東海曙光生堯文吾家有文太史元旦早朝詩四大軸與此四體燈韻春王之月得輝映一堂也壬子芙蓉宵玉記張元汴書岣嶁山房記靈鷲山靈隱寺之西循曲徑踰小澗有泉泠然而清有石獅蹲而虎踞有梅數枝有竹數竿有屋數楹悠然其間者岣嶁山房也其中為樓曰紫蓋云者岣嶁山之别峯也樓之上下折為小室者五凡燕居欵客却暑避寒之所無不畢具樓之外插槿為籬疊石為垣刳竹為瓦引泉從垣間㵼出日夜作瀑布聲緑籬翠竹交映其前盛夏灑然如秋出樓之北躋石磴而上數十步結檜為亭曰來鶴因名為坪曰對奕又上數十步曰孤嘯臺為白砂丹井為禮斗閣為香雪巢其外為蹊桃茶坂梅塢橘坡蓋是山周遭不盈十畝而極備幽致入之者如遊於蓬萊方丈而莫能窮詰也山人姓李名元昭少喜任俠有提戈取功名之志稍長更讀古書工詩詞已而棄去習舉子業為諸生尋以祖爵襲千户侯亡何又棄去始一意養生之術躬負瓢笠與其徒雲遊湖海上凡名勝之區足迹殆遍歷七寒暑然後歸構山房為終焉之計室中刻木為小像傍列棺殮之具穴山為冢題曰岣嶁山人墓是時山人年六十有五今七十有九矣豫自甲子嵗聞山人名而訪之遂定方外交嗣是往來錢唐必造宿于山中徘徊纍日不忍去噫自余交山人逮今十餘年矣世故撓其外欣戚蕩其中役役營營竟成何事而山人負不羈之材挾文武之器乃能早謝去獨與造物者遊等勛業於浮雲視死生若旦暮今其年益耄神益強視聽益聰明步趨益蹻健雖其中所深詣非余所敢知乃以余自視年為減山人之半而神氣不逮逺甚顧猶馳逐于夢幻之場而不知返視山人為何如雖然山中煙景固自無恙余行且從山人偕隱矣作岣嶁山房記時萬厯丁丑張元汴撰贈汪君源崑號玉水序附録蓋聞山與水同源山起於崑崙水亦出於崑崙固也而終莫識其所自豫讀夏書熟記山水之源并習禹本記言水出崑崙去嵩髙五萬里外又讀爾雅云水出崑崙墟色白并千七百川色黃已讀山海經云崑崙之丘河水出焉東南流注于汜天之水已又讀淮南子云崑崙之墟河水出其東北陬然則水之源烏何定乎余乃縱觀漢史窮河源之篇謂出于闐其山多玉石采來天子案古圖書名其山為崑崙然非古所謂崑崙也因再索禹本記言崑崙其髙二千五百餘里上有金臺玉闕鴻烈解載崑崙之上有木禾珠樹玉樹懸圃閬風十洲記謂弱水繞之下有㵼珠噴玉之竒種種神怪真可􅌓眙而水源之出於是大都不誣也要皆揣摩遙度云爾去之官嵗奉朝命出按諸邉境歷濵海登萊等郡而見其砅礹鼓作漰湱澩灂㵗㶔􅪋􅲜潰濩泧漷而出沒于潏湟淴浹㶖㴸㴸瀹之中旋復往還于浟湙瀲灩沖瀜滉漾之內而渺瀰湠漫也乃知崑崙在西北河水出其東北陬東南流入渤海其一源出于闐之南山北流與蔥嶺合東注蒲昌海而有珕珋璿瑰水碧潛珉之異斷可識哉頃余持節便道歸故里訪汪君尊人愛荆公因識君於凝霞閣君諱國潤年未及冠而流奕清舉測其胸次洸洸若千頃波洵吾鄉竒士也方今聖天子在上海晏河清目不睹波揚而耳絶瓠子之歌三十一祀矣間者霖潦為沴暴漲河洛茶城古洪等閘淤塞四百餘丈當事者輒嚄唶不得其源而理之余甚憫焉汪君誠厚自淵瀋應賢良之詔當一出而為國圭璋中流砥柱豈異人任哉豫拭目以俟汪君諏吉甫冠因號玉水而字則源崑也豫特為之遡流窮源之論如此是為序余年十三四時文會于天寧之毗盧閣凡六載一時社友善書者為陳攖寧壽曦張華平永昌歐怪褚妍戛戛不相下也余十七而冠值萬厯癸卯季冬榖旦有故舊銀臺姚公欲遺贈言因凂攖寧代草并書陳君儒雅風流健筆應驅風雨惜久作若敖之餒每念之愴焉興感志此式後長水方折為玉子謾書珊瑚網卷十七
