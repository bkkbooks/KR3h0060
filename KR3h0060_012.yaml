body:
  text: 珊瑚網卷十二明汪砢玉撰法書題跋元天目山禪師劉順法語真迹小真行書蕭路教深達聖賢之道嘗以委順子自省其旨世間萬物各有數初不以逆而強致焉在乎知時識變樂天知命者固能隨順世緣無甚罣礙孔聖以此一貫之道呼示曽子領其旨一唯而已維摩居士以一然而談其不二吾之諸祖或擎拳豎指或捧或喝皆示其委順之一方便也老氏以天得一以清地得一以寧而發揚委順之道從上聖賢莫不以此而傳之後世倘欲别起一念殊勝竒特之見以屬強為則不委順也其順之之理一委之於造化豈聖人能轉之而凡人可料之唯貴深造逺詣堅確不易其正念之士方能如是與凡聖混同一區來去自由於萬象之表豈不慶快平生也哉又為之銘曰天地萬物混同一區無罣無礙靈妙自如用之於世不束不拘行之於時圓同太虛樂天知命逆順同途不委不順吾何所圖風清月白洞徹吾廬天厯二年西天目山師子正宗禪逆流沙門劉順敬書中峰禪師書九字梅花詠昨夜西風吹折千林梢渡口小艇滚入沙灘坳野橋古梅獨卧寒屋角疏影橫斜暗上書窗敲半枯半活幾箇壓雪幹欲開未開數點含香芭縱使畫工竒妙也縮手我愛清香故把新詩嘲天有月兮地有松可堪松月趣無窮松生金粉月生兔月抱明珠松化龍月照長空松挂衲松回禪定月當空老僧笑指松頭月松月何妨一處供右詠松月琦楚石詩翰船上見月如可呼愛之且復留斯須青山倒影水連郭白藕作花香滿湖仙林寺逺鐘已動靈隱塔髙燈欲無西風吹人不得寐坐聽魚蟹翻菰蒲中秋後二日與覺隱諸老曉過西湖率爾口占廷玉郎官索書録呈求教梵琦再拜興化打克賓只要法戰勝我遮裏不然掃除佛祖令住山五十載撲碎軒轅鏡鑽飯香滿堂有衆齋厨盛捧了出院人悟去也不定徒弟珠維那職事美滿悅可衆心一偈送之參方行腳了吾宗生死大事勉旃楚石道人梵琦元名公翰墨卷余讀姚江吳氏三葉墓志文而因知世運之有髙下也始銘南堂老人者唐公震也其言雖仙而猶清狷可喜時蓋去乾道中興未逺也中銘鴈峯隱人者陳公著也其言萎甚蓋宋就衰矣及觀銘天台賞官者臧公夢解也其言約以則蔚乎有古章時則聖元一統已五十年矣於呼文章髙庫與世運推移豈不信哉髙庳弗傳求事狀不朽難矣雖然纘承義烈使光逺而有耀則在吳氏後人也季章父為三葉後也隱居行誼無忝其先其能光逺而有耀者哉至正丁亥秋一日鐵崖山人楊維楨書昔人謂百年之計樹之以德若吳氏之三世行誼其樹之也逺矣其枝葉之蕃碩也必矣夫勳舊之家豈無纍數葉躋顯仕者然德或不繼雖如潁川陳氏猶不免公慚卿卿慚長之譏况其他乎此士君子之所以有取於吳氏也歟永嘉髙明則誠甫謹識南唐三世獨傳書世祿雖微德有餘莫問幾多喬木在海棠已可著巢居靈石山人張雨青山堂上和尚清逺禪師侍者賤迹留小溪三載劇辱寵眷所謂待我以國士者是也臨别承厚贐感愧兼極别來四載世殊事異思一會面而不得南望青山未嘗不惻愴悽然去嵗聞從者留宣城復聞青氊復舊喜而不寐但山川阻修音聞敻絶可恨邇來不審起居輕利否世事可忍否衆生易度否去年令法眷用章和尚示寂法門不幸良可慟哭近聞宗逺和尚赴五竺之選可為宗社之賀此老别來已二十餘年矣雖欲一見其可得乎如會次望引情不尚聞居粗迷亦逺庇所及也自前年五月來日念彌陀祈生淨土不識他年果如願否亦欲吾老師知吾近况何如故言及此曽作彌陀讚别紙求教會晤何時臨書惘惘惟覬明時保愛為大法夀重不盡元旭頓首奉書谷水二瓶附上竹深才五六嵗方從吳兄行之以學豫見其骨秀神清知其異時不碌碌也嵗改月易警齋定齋俱已謝世豫寓水北衛史君書孰忽吟僧觀西岩見過談及近日詩人多稱竹深豫因省記舊遊信口一律乘興拿扁舟偕西岩過石湖適值竹深他之悵然而返今又八九載西岩亦已圓寂矣昨暮偶訪曽兄心傳而竹深在焉相與道舊欣慨交心因舉舊作竹深亦不能無所感力請呈醜就書以贈時元貞乙未仲冬十有九日也谷陽陸定龍頓首永夜無寐起步階除明月在天西風入懷凄然知其為秋也輒用髙韻勉賦一章以寫余心以希印可併簡座上諸公應元秋髙氣清水露石濁潦淤泥俱隱迹感時忽忽夜不寐明月已向東山出出門仰瞻天無雲漸覺薄寒微中人須臾清光入庭户炯炯顔色疑如君萬物已非前所視慨念榮枯動幽思玄蟬寂寞噤無聲寒雁嗈嗈向南至河流洋洋山峩峩朝見花開暮辭柯相思美人隔秋水君兮不知可奈何獨立倣徨無所得自慚在君珠玉側明月西沉愈思憶積余鬱鬱其無極無欵五言一律前有鮮于伯機數段失録修竹深深處人間俗慮消時將碧玉調寄在白雲謡雪乳臨風瀹冰花對佛燒思君不可見乘興動蘭橈有感一詩寫奉則敬兄弟賢姪左瞽感爾多堂弟參之同翺翔翩翩西復東昌以鴻雁行攸居沙渚暖菰蒲生新芳秋風順節序亦復飽稻梁我獨有一弟去我竟誰將念之不可招血淚霑衣裳攖寧先生見之仁者之念亦不能不為我潸然也朝陽當亦相與興歎殊可悲耳乙卯十二月在金夀堂書揚子江頭十尺廬望中渾是小方諸八窗籟闕含清氣一水空明倒太虛邊草不栖闕露莖真濕玉蟾蜍晉家車胤如闕安事囊螢去照書席帽山人王逢題於樂意生香之亭時嵗己酉秋八月五日也右頓首拜復潁川教授先生尊座右自十九日因新令尹定役而入城日在縣治故未能往謁為慊昨晚從孟達親丈家飲散歸領尊翰且承英嗣見過惜不得見頃又來過我問信足仞不遺之盛心吳中搢紳先生求如尊先生文章道德指不一二屈尚欲以間暇日與遂昌公諸老過笠澤徜徉數日併聽教誨幸甚僭易就稟區區欲購得歐陽文忠公大全集一部煩因便於舊人家所藏者詢及示望分情連日稍涼計尊體納福聞微恙不克往問候須稍暇専謁屏著以謝不備沈右頓首拜令嗣甚聰俊必能多讀書此先生積德所致也右也年四十矣甚為寒心右贅言余又見沈仲説書致叔方教授後云小兒多蒙戒諭感感城中人來對右言小兒朝暮穢語責罵姚媪萬乞嚴訓不使肆縱幸幸是仲説四十後得子也蓋仲説之室鄒有賢德嘗為夫買妾殊美仲説詢知為故人女即擇配嫁之其室隨育子信食報之不爽哉而不為舐犢愛更難矣此卷久為先荆翁藏玩前有米襄陽山水橫幅髙君明水見之即囑戴老以靖窑壇盞十二求易附二佳箑作裝潢之資愚父子受盞却其箑竟為居間者所沒義有元名翰為張紳張文在程璠鮑恂王東諸人先後被此輩購去嘗憶文在句髙公山水趙公書今代何人與此馳及漁父詞云我是箇不識字煙波釣叟恍然在目也玉記元賢翰劄疏右前海寧州同知楊性所藏先友遺迹一卷凡十一人詩文若干篇性曰先君子字伯振至正間從事浙省一時名大夫士多與往來為詩文性收藏甚富兵火之後往往散失此其僅存者且以先友不著字與官爵劣於栁記求余記之以余嘗遊諸公間也盛熙明字熙明能書辟奎章閣書史著法書考傳於世堵簡字無傲能書畫浙省掾吳溥字溥泉以才識自負喜結交海內名士兵興福建守臣承制署為其省參知政事楊維楨字亷夫丁卯進士江浙儒學提舉俞氏兄弟者吳人杰字俊平江路推官庸字子中華亭縣尹書有晉人風葛元哲字元哲戊子進士翰林編修官髙明字則誠乙酉進士柯九思字敬仲奎章閣鑒書博士劉基字伯溫今御史中丞黃溍字晉卿甲寅進士翰林學士諡文獻文章為世推重此致政後所書謙恭端謹足為後進取法觀之猶可想其儀形嗚呼余嘗謂人子欲顯其親至録其所與交若栁子者可謂孝於其親無所不用其心然所記不過姓名爵里而已能併存其遺文如此可謂有加前人者哉東坡謂先友記六十七人考之於傳卓然知名者二十人今楊氏先友十一人其文章事業鮮不載國史者性言其所散去者趙文敏公康里巙公仲宏楊先生衆仲陳先生道士張伯雨則又無愧栁記多矣伯振君諱祖成仕至山隂縣尹嘗從學須溪劉先生性字彝仲學於亷夫少學詩於文獻齊郡張紳拜手謹題元人竹深處賦并敘諸詩卷姑蘇劉孟功先生性嗜竹種之數萬竿蔚然成林孟功日居其中同志者過之輒留終夕或信宿而去乃取杜少陵竹深留客處之句顔其所居曰竹深處蓋心有以契乎竹也鴻儒碩生咸為之品題余與先生相知之久因為之賦以貽之且以為竹逸之一助云爾繄豫生之好竒負磊落而不羈嘗縱歡乎淇水之湄弔古於嶰谷之蹊過瀟湘登九疑斐然武公之想邈焉伶倫之思慨重華之不作二妃徒悵悵以增悲因物懷人屢觸乎目惟凜凜之髙風托娟娟之修竹是竹也稟君子之貞抱幽人之獨鶴兮斯巢鳳兮斯宿宜雨宜晴宜寒宜燠挺蒼煙之萬竿散涼颷於三伏夜月篩瑣瑣之金秋聲戛鏘鏘之玉此其竹之可愛不一而足者也時有種竹主人謂豫曰子徒知愛其竹而嘗造於竹之奧區乎乃披蒙茸拉榛蕪遂探其幽遂造其虛肩摩足躡性逸情娛顧枝葉之繽紛覺蹊徑之縈紆緑雲垂幾尺之琅玕素濤拂萬籟之笙竽蕭蕭森森雅雅魚魚空翠浸毛骨湛露濕衣裾匪隱者之盤谷實神仙之奧都抗纖塵於朝夕鎔百慮於須臾主人於是設枕簟具壺觴于以嘯歌于以翺翔或鼓瑟而嬉或擊缶而歌或敲棊以剝啄或臨流以徜徉不知天壤之大日月之長茫乎桃源之迷沓乎橘林之藏未足以形容其倣佛適所以貽笑其荒唐豈若斯竹之深處乃可以晦吾迹而韜吾光也豫曰深乎深乎其竹之處乎昔靈均于蘭深乎其君之愛也靖節於菊深乎其身之退也濓溪於蓮深乎其道之大也之三子者皆其植物之深而子尤得其所以深真有以契其古于今所謂不以其迹而以其心者歟主人乃喜而為之歌曰竹之虛中兮惟吾身之容兮竹之徑外兮惟吾竹之介兮豫續而歌之曰匪竹之容我將奚從匪竹之介吾將奚賴歌畢賓主交歡遂鑽其言於竹間錢唐張時髙風星市門植竹千篔簹蒼雪下庭砌玄隂翳齋房晴旭龍聚島鮮颷鳯鳴陽碧滋潤簡編翠浥浮冠裳又披圖有真趣夙抱非羇寓遊蹤自南北夢寐還相遇朝哦栖遁詞暮誦琳琅句恍即故園居森森竹深處宙亭石宇種得琅玕萬個蒼滿林煙霧似瀟湘九秋露滴琴書潤六月風侵枕簟涼肯為潯陽留徑節佇看金府散清香挂冠有約來相訪並坐吹笙引鳯凰廬陵王復原樂彼數畝園青青萬竿竹中有讀書人開軒伴幽獨軒前輕隂掃不開軒後繁聲疑雨來春風淡蕩拂翠羽白露泠泠生莓苔八窗無塵從不掃吐蓐在地璚花老夜深對月任光微晝永乘風覺涼好有時早起坐石牀口中吹笙鵝管長有時枕書卧軒中清興窅入蓬萊宫蓬萊宫闕幾千里紅塵不到看書几彩鸞紫鳳情翩翩一段清光照流水昨日我來造竹下主人開門笑相迓山殽滿盤酒滿壺醉歌一曲為君謝豈不見園中桃又不見道傍栁昔日媚春華今日成衰朽何如此君含彩故青青獨向軒楹托根久勸君更種松與梅嵗寒清絶成三友隆溪黃仲瑶萬玉深中構草堂風清幽致逼瀟湘羣龍垂影秋無際獨客髙吟興正長雲壓四簷飄翠雨暑消三伏隕玄霜清芬不許紅塵入寒溢苔花滿石牀三山江輻一室幽偏半榻宜四邊修竹緑漪漪通宵明月無塵到長夏清風只自知每喜王猷同玩賞更從蔣詡共襟期階前忽見分龍角疑是春雷夜雨時安城彭敷恂碧琅玕下覔幽蹤行盡齋居路始通煙斂月梢金瑣碎風生雲幹玉琤琮秋光滿座隂長合靛色清神暑自空淨掃蒼苔夜留客解衣磅薄興無窮秀州金灝我愛髙人賦考槃買山結屋種琅玕煙梢影落虛窗寂風葉涼生翠簟寒已喜秋深存節操更期嵗晚報平安何當吹徹參差玉共看朝陽宿鳯鸞吳郡朱復吉公家種竹一萬箇已喜此中堪結茅珊瑚戛玉天籟動翡翠蔽空雲氣交呼僮去尋化龍杖留客坐看棲鳯巢何當開徑延益友共論大易明羲爻劍江徐疇種得篔簹數百竿築亭深處伴秋寒危梢滴露清堪掬密葉籠雲翠作團夜月虛濤翻素璧晚風清佩響雕欄漪漪絶勝淇園好會看窗前宿鳳鸞文江鄧資深帶雨含煙碧玉枝蕭森偏與靜相宜風生萬壑秋無際月到孤亭客未知逺憶楚山吹笛夜迥疑湘水泊舟時此君自昔持髙節長結幽人嵗晚期甫里趙宗文琅玕三徑緑成林瑟瑟涼生漠漠隂蔣詡琴尊間自適王猷車馬窅難尋四簷蒼雪翻鸞彩一榻清風引鳳吟客去浩歌淇澳罷永言同結嵗寒心長洲沈元種竹雲深處迢迢一徑通清隂湘浦月髙韻渭川風節操宜幽客逍遙稱老翁晚來丹鳯下栖向緑雲中余學夔金臺名宦姑蘇客客裏相逢見顔色手持詩卷錦離離珠玉聮篇光耀日自言平昔愛此君手栽十畝吳江濆蒼龍起舞淇園夕彩鳯長鳴湘水春客來倒屣邀偕去擊築彈棊不知暑紅塵半點飄不來好鳥一雙向人語逍遙深處深復深等間忘却樊籠心何時買棹東歸去願借繁隂事討尋閩中陳潤劉侯愛客仍愛竹種得琅玕滿書屋一片湘江雨外青千年嶰谷春前緑三徑縈回蒼雪深四時晴翠生繁隂過門二仲偏知已假榻羣公自盍簪元龍逸去真湖海肯學尋常兒女態祿米長捐佐酒資錦囊不惜供詩債清心獨有此君知搖落冰霜也不移為籬擬護新梢長掃籜應教舊幹滋邇來阿閣增光價五彩郇雲見揮灑振佩終隨鸞鳳羣投間暫寄風塵下漫説當年六逸溪鳥啼煙草碧萋萋風流文采如君少自有丹崖為品題三山林志書于玉堂之署君家舊住東吳上百畝篔簹繞簷長月明影拂青珊瑚箇箇凌雲絶塵想宦遊南北今十年朝回幾立春風前虛心不忘久要好夢魂常役霜筠邊故託髙人寫髙致翰墨淋漓湧空翠屈鐵交加篆籀文真假相資元不異披圖渾似故園看枕衾六月生隂寒脫巾露頂聽靈籟鏗金戛玉來雲端葆羽亭亭鳳鸞翥日上天門不知曙肯容借我洗煩囂便訪君家竹深處元虛金山長老萬玉蕭森蔽草堂惟通鶴徑破蒼蒼繁隂滿榻琴長潤秋色凝窗地自涼幽靜窅然居物外虛間渾訝是仙鄉一從髙步青霄上楚雨湘雲思渺茫吳僧湧西源修竹千竿一草堂幽深偏愛水雲鄉碧隂滿地春簾濕蒼雪侵幃夏簟涼詩刻粉筠初解籜聲傳茶臼逺飄香宦逰十載天南北猶想園林思不忘竹樵實積中吳門煙雨掩荆扉湘楚清分一徑微藂也蔽空忘晝永涼生入夜覺寒歸王猷疏散人皆羡劉向操持世不違儒業已聞沾寵渥休將宦思戀初衣倪維哲先生幽趣在琅玕手種窗前可萬竿三伏清隂不受暑一天明月自栖鸞翠濤夜捲瀟湘雨蒼雪晴飄嶰谷寒珍重鳳池留直節青青常與後人看紹興王鉉蕚軒瀟灑傍林巒萬玉扶疏護石欄雨沐風披看舞鶴山窗月白聽鳴鸞時調焦尾清聲逺曉閣藝編緑字寒佳趣可人君獨得肯分三徑共盤桓天台陳璲髙人適幽趣羡此琅玕清新梢和露滴舊葉迎鳳鳴結屋住深處時見茶煙橫焚香手遺編詎有塵慮縈一自綰章綬夢入吳中行覺來尚幽意滿抱涼吹生天水趙次進舊家吳下住萬玉俯澄溪翠色連花圃清隂接栁堤稀稠無隙地宛轉自成蹊琴就聲前和詩從節下題拂雲蒼幹直承露碧梢低佳趣王兼馬髙情阮與嵇豈容卑鷃集早見瑞鸞栖斑籜堪冠製玉牙或饌韲林林森畫戟矗矗列文犀門有軒車過亭多枕簟攜久晴鼯鼠出積雨鷓鴣啼瞻緑同淇澳分青若瀼西編籬須代篠截杖勝扶藜密葉縈香篆繁枝爨茗畦嫩書蝸畫健枯幹蟻行齊新譜憑誰撰遺編必自稽栽培忘歲月暌别隔雲泥得信欣無恙牽思夢欲迷青班聮玉筍何日聽黃鸝好乞還山假從容欵碧閨同郡釋啓分得瀟湘數畝隂中藏茅屋往來深半窗色淨涼偏入一榻聲清暑不侵雨長子孫金個個風生頭角玉森森此君今向圖中見時報平安慰客心方外釋冏竹菴憶昔山行到竹深緑凝清合晝隂隂塵衣欲挂應難入樵子興懷每見尋驟雨洗枝添秀色微風翻葉墮清隂笑看來往驅馳者休息誰從此處吟中吳釋􅕔書記鄧尉山客至頻留醉僧過只對吟渭川多雅興淇澳有遺音節操常應在冰霜老更禁七賢堪並美六逸漫同心逰宦今來往多情憶舊尋起有闕文三衢金關知君雅性恆愛竹幾年封植當華屋此君結根羡得所風雨年年長蒼玉緑隂滿地蔭階墀拂雲香葉何參差萬竿總含霜雪操數畝盡帶瀟湘姿藝窗晝啓無俗客秀色時能映緗帙猗猗堪比衛武賢青青差擬王猷宅我來薊北正天寒雪中無處尋琅玕坐想居家最深處便擬敲門試一看盧陵周崇厚書跋竹深處卷後劉孟功甫世家吳山水之間其先大夫退軒公嘗植竹數百本于庭清隂徑色照映几席蕭瑟檀欒之聲恆接于耳退軒公既捐館孟功以其竹有先人之遺澤瞻之敬之封之植之竹日以蕃乃揭其宴息之軒曰竹深處示不忘也既而宦逰四方雖欲有事于竹而不可得逮扈從北京去竹益逺蔑以舒其婉孌之懷遂屬其所交名卿巨儒作為詩文圖畫以發其思竹之藴余得觀其卷焉灝灝乎其文之雄也渢渢乎其咏之長也沕乎穆乎不見其端倪也若竹之綿亘杳藹連畛接町緑雲際天一目千頃者也鈎章棘句詞嚴義正若竹之密而不倚昧而不離森然而陳挺然而列峙振風不能搖其根祁寒不能易其節者也聲律清婉格調髙妙若竹之簸弄皓月戛擊鮮颷摐然而琳球鳴鏘然而韶鈞作者也意趣沖淡思致超軼若竹之中虛外直與道消息豐本擢枝樹德務滋跂之弗可及撓之弗可移者也此詩文之大略竹固有之矣以書而言之則竹深處三大字去篆而從𨽻戟立槊橫戈揮石墜若竹之含貞屬氣藏鋒蓄鋭毅然而不可屈者也以圖而言之則為方弗逾咫尺而曲盡萬竹之幽邃將不求其象於圖中而欲得其意於象外者也以是言之則竹之於人而不為無遇也夫竹植物也向使生於遐陬僻壤荒間閴寂之濱雖蕃若渭川盛若淇園音諧嶰谷之律材儷柯亭之椽苟弗遇其人則蕪沒乎薪槱之場芟刈乎樵斧之下稿死乎華實之餘澌盡乎朽腐之後者殆弗可以數計也其亦可悲矣乎求欲見遇乎其人而獲揚厲乎諸君子者詎可得哉然則竹之遇不遇其相去若是之懸殊也推之他物宜不異於竹矣故為跋其卷末南舟先子自少昵此君凝霞閣下水石罍盎間遍植公孫竹會稽志所謂髙不盈尺稚翠瀟疏可愛允宜几席佳玩每對之展竹深詩賦卷覺空青萬餘在玄圃中無風而神籟自韻焉因自稱筠居子又稱荆筠山人無何余自歷下還東垞庭中紫篠數百個盡為人所戕而此卷亦失去每念胡介夫句一文沒也還留竹四壁蕭然不賣琴那禁苔痕蘚均涼淒耶遂成竹史百卷已誦蔣捷山詞有二十年來無家種竹猶藉竹為名則卷語存笥正可藉竹為名况余尚有家乎今而後為髙元之萬竹先生可為許洞門前一竿竹亦可同此王猷興者請讀元賢題竹一過西吳醉里竹素主人汪砢玉識新筍晚花時珊瑚網卷十二
