body:
  text: 珊瑚網卷三十五明汪砢玉撰名畵題跋十一天真上人像单條至人遺庶類建道開鴻濛雲銷纎翳盡廓如太虛空微笑舉世人盡為塵所䝉髙山安可仰欲追杳無踪千春桃花巖宴坐誰與同山中有一士白髮垂兩肩手弄石上雲黙坐無一言泉響茆屋下花落石巖前衆人泊頽波彼獨全其天騎鸞霧中客胡乃稱神仙黄鶴山中樵者王䝉畵并詩能空一切有為法可斷百年無了縁一喝一捧嬴得機先不立文字却用賛詮要識天真真面目分明只在未生前蘭雪坡劉易海門有大士其名曰天真未離世間相不曽生一塵至正乙巳夏午日沈叔野拜大士蚤聞道拔足出凡塵被髮過兩耳貌若鴻荒人解屨坐苔石松隂庇其身沉黙寡言說于焉養天真樸素堅自守孰得為緇磷世人徒耽慕繪冩想形神何由往相覿同樂萬古春環中老人鮑恂下有檇李鮑恂朱文仲孚字印海隅藴秀異靈譽妙無蹤陽輝散空花淖音震祥風慧識啟荒寂慈喻拯罷癃永言賛宏化揆道將無同張翨下有張氏翔南印山中說法者天上講經來欲補髙僧傳慚無太史才山隂胡隆成叔明圖天真像筆力精到非天真莫能致叔明非叔明莫能圖天真誠所謂一代人傑也石門山人明秀拜觀右畫在宋楮上左有大松二枝掩盖下一頭陀盤膝坐石上石下有流泉一派此幅純用焦墨而蒼莽閑雅動人叔明得意筆也千頃生識黄鶴山樵太白圖榾榾追三月極儗加精緻便欲無此卷後軰豈可易右題王叔明太白圖沈周葛稚川移居圖六字王叔明分𨽻書圖上䝉昔年與日章畫此圖已數年矣今重視之始題其上王叔明識稚川執杖左攜一鹿後老妻騎牛抱一小兒二童隨之重山復嶺秀潤之筆非尋常潦草者比玉記石梁秋瀑圖已刻太平清話至正辛丑九月三日與陳徵君同宿愚菴師房焚香烹茗圖石梁秋瀑翛然有出塵之趣黄鶴山人王䝉冩其逸態云消雪飛泉挂石梁山間疎樹静蒼茫幽人自愛清秋景閒坐虛窻對夕陽周伯昻一道飛湍萬壑流平林如摵錦光浮山翁獨坐有何事洗耳端來笑許由耕雲題林際飛泉銀漢長水邊細草紫蘅香奔雷峽底雲雷起疑在匡山瀑布傍陸有恒洞天清曉圖霧閣雲窻縹緲間丹崖玉樹絶躋扳桃源咫尺無人識海上徐生漫往還黄鶴山樵一生居士精神健此筆前生是畫師南郭子綦今喪我東方曼倩不逢時澗溪巖岫絶幽遠草樹雲烟相蔽虧亦欲求翁冩東絹祗慙投老買山遲河東張翥山上出雲山下雨樹杪飛泉千丈吐何人結屋雲泉間滿地松隂如太古丹溪老仙性愛山芒鞵竹杖不放閒江湖安得具小舟挂冠來與此老游金溪金霖千巖萬山白雲心自閒結廬萬山深處也分得雲半間人生良鮮歡世事紛紛行路難早去同尋瑤草莫把倣畫圖看壺中金澗飛來晴雨蓮峰倒揷丹霄蘂仙樓閣隱岧嶤幾樹碧桃開了醉後豈知天地月寒莫辨瓊瑤一聲鶴呌萬山髙畫出洞天清曉筠菴喬松絶壑圖一作至正十三年二月晦日倪瓉冩蕭蕭風雨麥秋寒把筆臨摹强自寛幸賴俞君相慰藉松醪笋脯勸加餐與倪畫所題詩相同甲寅四月廿三日風雨中達侯茂異相訪于晩節軒中因為冩喬松絶壑圖并賦題黄鶴山樵王䝉黄鶴山樵倣右丞筆其昌此王伯穀家藏曽見于南有堂今復與𤣥宰同鑒如見社中人繼儒題叔明題畫千山春霽大峰㠝㠝碧烟起小峯戢戢樹如薺人家住在澗之阿面面軒窻翠微裏我曽採藥巖西東石門路滑花濛濛行看野雉雊朝日坐聽閑鳥啼春風可惜别來時節改地變山傾三千載只今雖苦混泥塗見此崔嵬興長在嗚呼安得倚空之梯九千尺獨上其巔絶聲跡林下野人髙林藹春霽野水浸平沙山脊浮雲合巖腰細路斜攜琴向江寺沽酒到漁家歸去幽居晩山僮掃落花立菴萬壑千巖裏蕭然獨掩門何當從杖履半日共琴樽江隂卞榮萬叠千峰凝翡翠一溪新水漲蒲萄仙翁際此風光好策杖攜琴步野橋呉僧肅嘉倣米海岳山水王郎筆力追前輩海岳新圖入卧遊獨鶴眠松猶警露孤猿挂樹忽驚秋陶潛宅畔五株柳范蠡湖中一葉舟同煑茯苓期嵗暮殘生此外更何求瓉倣巨然山水余見山樵畫多矣無不規摹古人遂足掩抑古人者雲林所謂五百年來無此君不虛也然諸格中以倣董巨為最此幅倣巨然又叔明平生第一得意筆畫家以皴法為第一義皴法中以破網解索為難惟趙呉興得董巨正傳要用此皴法脱盡畫院庸史習氣叔明是承㫖甥故猶似舅此幅置呉興畫中不可復辨也其昌黄鶴山樵清渰垂釣圖君家清渰上垂釣綠隂中露濕芙蓉月香銷菡蓞風移舟入烟渚横笛坐花叢自識忘機客無心問塞翁黄鶴山中人王叔明畫并題畫法摹書法求之董巨中宋朝輸米老五代有楊風暮景烟霞窟秋山桂樹叢惜哉黄鶴者已作雪眉翁延陵山樵遂初題茆屋烟霞裏乘閒理釣絲披圖無限意書此慰相思文江鄧九淵此圖為姑蘇寒山趙氏家藏其女孫字子惠者于癸未菊月攜過禾中尚有宋人西母像冠服殊古雅元顧定之墨竹瀟洒多出塵之致趙仲穆畫美人題箋得蘇漢臣姿態而錦文絶非庸筆可到周東村武王夢卜圖疑是周官白描仇寔父作鍾馗策蹇雖贋乃後隨鬼卒肩一大筐筐内縛諸魑魅有數小足掙筐外幻甚又子惠冩生種種是没骨設色纎艶若移香影不下其母端卿也余時得其過墻紅杏便面及絹素花石題蝴蝶花間蝴蝶舞欵書扶風馬昭徳隱戯筆更許補右丞詩意云課花外史識于軒軒王叔明山水卷溪山深秀黄鶴山人王䝉秋風動巖樹歸鳥何其翩我思巖中人可以樂忘年夫君本詞客畫手故作妍呉中圖畫藪肯為時好遷上巖雲積雪下巖水鳴絃展卷纔數尺坐對兩忘言句曲外史張雨題王叔明為文敏外孫而其畫法自立門户别取一種姿態與文敏無一筆相似其品格不下文敏宜矣髙啟黄鶴山樵精于繪事為古今獨步故此卷不越尋丈而山川掩映溪谷縈紆林木森茂屋宇參差儼然有千里綿延之勢而且用筆遒媚神采爛然倪雲林稱其筆力能扛鼎五百年來無此君觀此豈不益信臨川危素樂琴書所圖清河張公有秩蚤以明經登第為天子耳目官退食之餘不忘琴書之適故顔其燕息處曰樂琴書所而叔明為圖之洪武廿三年十月朢益齋王彦文跋溪山髙隱圖原題我于白雲中未嘗忘青山城府吾奇觀知往不知還往者不可勸來者又誰闗卧看飛鳥還山青雲自閑至正十八年三月廿七日呉興王叔明為仲賢畫花溪漁隱圖在紙上禦兒西畔霅溪頭兩岸桃花綠水流東老共酣千日酒西施同泛五湖舟少年豪俠知誰在白髮烟波得自由萬古榮華如一夢笑將青眼對沙鷗黄鶴山中樵者王䝉為玉泉尊舅畫并賦詩于上終日垂竿古渡頭時人誰識舊風流蹔依此處種桃者還憶當年載藥舟對景使人懷冉綺入山容我問巢由得魚沽酒共妻飲一醉忘機笑狎鷗邵良次韻此圖有二其在吾里項氏者筆氣髙縱意態蒼遠旁多邵良和詩較勝新安王氏所藏而余有文五峯臨幅自題云漫蹟為漁已息機青山綠水自相依一年好景惟春晝栁絮桃花燕子飛玉水記長林話古圖五字黄鶴山樵分𨽻書畫上鐵笛道人從山隂來余值之有余清齋云其處丘壑幽邃喬木秀鬱僧磬雲埋邨炊霧雜古趾猶存典刑髙人多于寄傲聽罷神悅老鐵復約余秋深偕遊焉作此以訂未來因縁至正八年春二月四日黄鶴樵者王子䝉草樹離離落照間清言輸與兩翁閒就中消受無人㑹滿耳清泉滿眼山文璧題王叔明秋山蕭寺紙上單條獨立風前認去鴻阮生何用哭途窮空江水急寒潮上大野風來落日紅木葉亂飛蕭帝寺雲情偏䕶楚王宫酬恩千里懷孤劍行李關河慘淡中邊城鼔角怨清秋起坐遙生關塞愁露氣下垂羣樹白星光亂㸃大江流百年南北人空老萬井升沉世若浮不為五湖歸興急要登嵩華看神州黄鶴山樵王䝉叔明詩畫叔明又有蕭寺風雨圖卷為華谿叟沈良跋俞燁題于都城寓舍雲間張遠魯男子閉户圖着色人物卷叔明筆雨傾風吼黒漫漫半死花枝失檻欄肉顫不禁珠淚迸全無惻隱不相看嫂溺手援尚可為坐懷不亂是吾師顔家叔子亦魯産難婦相隨執燭慈鐵笛道人題王叔明南邨草堂圖紙上淺着色南邨賦有序南邨九成陶先生别稱也先生世家天台幼岐嶷十嵗父兄口授以伏生書即成誦二十有志于科名執筆論當世事主者忌之即拂衣去將返乎天台守先壟適冦砦于鄉歸弗克遂宿留乎雲間因籍焉樹藝往來不離乎九峯之南人皆以南邨先生稱之年已七十餘矣著書累數十萬言不自知其勤也立身之潔終始勿渝真天下節義之士哉陳留張樞同乎先生之出處合乎先生之心志年相若也又相知為最深故特為之賦以道先生之髙情云予將行乎行何居音基乎思取友于遐陬慨名節之不立兮將何徴乎時流飾時妝以競好兮曽弗赧夫前修索瓊茒以筳篿兮藐四海之焉求靈氛盱衡以告予兮道無法而不週爾何瞀瞀于所從兮務因之以遠遊諒前聖之可徴兮斯焉豈無君子推古道以諮詢兮固殷周之多士山嵗寒以落木兮鬱蒼蒼乎松栢鳯飛舞而綷繚兮粲雲章之五色爾何遺乎美好兮棄荆璞而弗識望隱處之嵯峨兮泣平睪之廣衍紛衆樹之蓊薆兮羃文華以芳絢彼美人之修娉兮眷行藏于婉娩被慶雲以為衣兮濯甘泉以自潔覽甕牖于朝光兮聽天雞之啁哳表諤諤以無磷淄兮矧規旋而矩折挽芳馨以弭章兮函菱荴上音雖下音敷以俟風也矯中立曽弗倚兮又何疑乎屢空也亂曰南有邨兮雲間烟九㸃兮倚似青山星東壁兮燁煜江西流兮潺湲草生兮書帶風轉蕙兮汎崇蘭披汗竹兮霜班班菊晚節兮桂花丹鳶飛兮魚躍波動盪兮天寒雲間非夫人吾誰與兮又何訪遺逸乎商顔桑柘村深泗水南居民畊織力田蠶草堂燈火書聲起錦里杯盤野興酣抱負久知經濟用栖遲惟恐利名淹扁舟來往鷗波裏時與髙人共盍簮泰窩道人呉興錢雲南邨老人清且臞閉户十年工著書諸生解問楊雄字使者空求顔闔居推窻山在夕陽野掃徑栁垂春水渠卜隣若得遂吾願日日抱琴無日虚呉郡張洙南村草堂記南村草堂者陶君九成先生隱居之所也先生性冲澹不樂仕進厭囂塵湫隘遂徙家南村焉村之俗悉事農桑溝洫後正禾麻横從雞犬聲相聞桑梓之隂蔽野當古蹊水曲喬木童童若車盖而秀鬱者又不可以名狀也俗尚淳龎詭行異服者屏不與處而田叟埜老知古今非法言不道率子弟之趨事赴功者弗後期暇則相與飲勞嵗時伏臘有加焉以故先生樂其里俗之美願為終老也鉉齒少且賤承交于先生者有年矣不自意終嵗竟生浮湛而所謂南村草堂者嘗一接于夢寐間也衰老荒落焉能以文為哉竊惟爾祖陶處士為晉一代偉人方其居南村也必曰聞多素心人廼住居其宅當時交際者豈無名公鉅卿而堂髙數仞丹檻藻梲者何欲而不得而獨圜堵蕭然介然而不與世狎其懽悰暢洽乃見于田舍數人由其素心暴白以此而感彼不以一毫有累于其中千載之下聞風而企慕况在其子孫心同氣應者乎詩曰維其有之是以似之是為記沈鉉譔晨旭兮熹微宿露兮凄其君子履兹兮惕焉孝思追先德于久遠兮敬厥祀而弗遺春露祠江沙兮如雪野竹兮森列眷言故友兮綢繆話别啟柴扉以循步兮見衣上之明月月色柴門厥居兮髙明秋爽兮氣清簡編舒卷兮對此韓檠羌伊吾之不絶兮維聖賢之是程秋聲館西疇兮春及東作兮靡忒戴星而畊兮冒雨而息彼冕紱之雖貴兮寧易予之襏襫襏襫所呉郡顧祿謹中譔南村記横泖去呉淞不五十里自泖而攴于東南者曰泗又東而水勢益險峻曰蒲潮汐往來折入于海西睇九山若鳯翥駝奔雲卧中伏烟雨霽蒼翠落几案並横泖而聚者為村民俗尚古吾友陶九成先生築草堂以居焉先生讀書養素得其趣則曳杖于松溪菊圃之間疲則箕踞于平坡磐石之上或登髙眺遠則九山之秀與目謀泗水之清與心謀林木之蔚茂者與神謀也號曰南村盖有得夫晉庾亮登南樓于清秋之際陶處士見南山于采菊之時矣記未獲來徵余言余曰亮本善清談之流闇于識而短于才駐師武昌未聞有所規略至末路之窮乃乗月南樓與浩軰坐談以為興復不淺竟無補于中州之多故吁亦疎矣若處士則悠然南山其澹泊深遠之情思感慨之狀付之忘言視亮之談詠光景豈不霄壤哉今先生所居之村平林遠岫拱立離向闢其門則知宇宙之恢廓敞其軒則知雲烟之散聚鑿其牖則烏兎之飛走者在乎目之一矚也此南村之所以為南盖本于南山悠然之趣而南樓之賞不足以喻夫南山之勝南山之勝即先生南村之勝信可知已他日予舟南歸當攜琴訪先生于南村坐南村以鼓南風之操斯又一時佳興云洪武甲子冬十月十日東呉全節譔并書草堂結構溪南村南極夜照如朝暾南村老人應星象北山徒著移山文鈎簾看雲自怡悅銀蟾飛上青山缺烏皮曉坐凌秋空金碧九朶開芙蓉東村撾鼓迎春社西村育蠶盛桑柘甘霖既敷停桔橰黍禾秋深接農舍老人此時心炯然飱霞潄玉希神仙長生豈無石間髓洗耳更有山中泉爬羅剔抉藏奇古草堂又作圖書府折分穗書精鳥書陳倉親鑒宣王鼓浣華溪頭花自春浣華老翁徒苦辛亂離奔走皮肉皴何如栗里羲皇人羲皇之人豈求仕八十餘日縳塵市一朝解印賦歸來來落南村避徵使南村五老居赤城赤城繞屋烟霞明壯年東遊不歸去袖挾寳劍雙龍精厥祖移家金積上山中避人呼宰相雪班老鹿駕輕車路入桃花隔封壤子孫蔓延多隱居眼方獨授丹臺書草堂昨夜燒丹竈丹光一道飛虹蜺嗟我塵寰苦煩擾仰視南村若山島欲攜鐵杖叩髙堂引訪安期索𤓰棗陳留張璧識王叔明蘿壁山房圖小卷在紙上綠蘿蔓蒼壁花香散春雲松房孤定囘袈裟留夕薰山髙蘿月白獨立霜滿巾迴風振層巔崕雪洒餘芬昔在净名室雨花不露身心空諸觀寂漏盡本無因孰與幽境㑹賞竟無纎塵心期後來者矯首空嶙峋余在龍河濟𤣥津持此卷求余畫蘿壁圖并賦此詩老全室一見頷之而微笑是夜余閉户熟睡夜深扣户甚急起觀之乃全室也口誦前詩數迴相與唫笑至五鼓方去及旦遂題于卷首香光居士王䝉叔明識石壁掛青蘿禪房在其下松枝裁作扉茆覆不用瓦若人百念忘襟懷自瀟灑行看塢雲生坐聽巖泉㵼怡然朝復曛在境無取舍于中亦不存何有空與假一從入山來見山不見野寒拾千載人誰是同流者壬戌秋全室叟宗泐識季澶開士栖禪蘿壁下茒舍纔堪庇風雨堦前咫尺生白雲簷底尋常卧馴虎一念情忘萬境融印心不用楞伽句飢有松華渴有泉屋破自牽蘿薜補愧我移居山不深又著袈裟聯鷺序聖恩念老賜還山濯足靈源訪支許㑹稽具菴如玘太休白文青山多綠蘿綿綿掛石壁秀色無春冬佳氣連朝夕中有坐禪房巗扉窅而寂日出芝草香烟消琪樹碧心空境亦忘居安身自適不學解空人天花繞其席洪武十七年四月一日南屏山人同菴夷簡記懸崖薜荔接雲長正愛幽居在上方凉月紛紛秋弄景晴隂冉冉晝生香故依青壁置蘭若差勝翠㣲開竹房况是千巗搖落後盤空秀色更蒼蒼中呉𢎞道存翁白文蘿壁非常玩髙僧獨愛之蒼松同壽色老石借春姿引蔓斜連屋垂花直下池茶筵賔客散坐到月來時錢唐沙門徳祥青蘿壁下一僧房長日惟燒一炷香風在竹欄人在定鳥啣紅柿落柴牀余侍先師于南屏時見題此卷意不盡復述一絶迨今四十八年矣西宗意藏史出示故書于後前中峯守彛書蘿壁山房記山房以蘿壁名者乃昔濟上人禪息之所也上人字𤣥津性純粹清雅以解吟工書鳴于禪林當時名公多重之者王君叔明為繪山房圖題詩識之全室存翁具菴同菴止菴諸老師皆聲詩咏美𤣥津既沒餘五十年詩卷今為西宗意藏主所有予來南屏一日西宗出卷示予且曰意生也晚志慕古人當宗門全盛時諸老宿以道學相傾意以是時不得身侍巾舄于其間為歉巗居谷處草座麻衣世慮澹如獨慕古之心時往來于懷也忽交與有好事者以蘿壁山房詩卷見遺展玩欣然如親接對古老顔色因自喜以所居山房就名蘿壁其圖與詩如予素有而復歸于予者也夫道目擊耳聞無乎不在顧力行何如耳豈不聞靈雲師之于桃花孚上座之于畫角聞擊竹聲見弄師子皆足以發明向上一著子慕古人志在古道盍以靈雲軰自任豈求于彼而不察乎此必俟得古道于古人耶子其朂諸若乃山房名寔今昔不二諸老師所賦詩見之矣是為記宣徳五年秋九月初吉净慈住山天台沙門釋正需書蒼珉逗纎根翠蔓鬱盤結葉密珠瓔懸枝斷釵股折悠悠鑪篆銷寂寂啼鳥歇味禪坐深更虬髯弄明月前普福住山大振叔明靈石草堂圖在紙上水墨掛幅草堂之靈鍾山下靈石山中有草堂堂前森列皆石友具服再拜庸何妨晴嵐入簾凝研席暖芸吹香撲書帙客來無物欵清談旋束荆薪煮靈石夢菴坐深殘醉醒簾捲草堂開擁座千峯出横空一鶴來晚風松落子時雨石生苔却憶山中客披圖日幾迴彭城劉鉉山中靈石碧嵯峨髙士茒堂住澗阿幾樹松隂當戸密四時嵐氣入簾多依依猿鶴常相近寂寂親朋遠不過遙望西巖泉落處臨風時咏考槃歌呉人錢紳芝蘭室圖并記前書寳石泉壑四字後欵云王䝉畫俱篆字苾蒭香草也西土以名僧言其芳薌遠被薫襲羣草氣變形隨亦由僧之化俗使其改惡從善也楚騷以蕙荃比君子蕭艾喻小人舉世皆愛荃蕙而惡蕭艾古今人情之所同固無間于遐邇也薫蕕不可以錯糅言君子小人不可以同處也靈均辭微而㫖遠至如采三秀于山間紉秋蘭以為佩言善人君子終身親近不可遠也古諺有之與善人交如入芝蘭之室久而與之俱化夫芝瑞草也一莖五色三秀九岐菌生嵩華丹屋之上食之者千載不老蘭香草也綠葉紫莖丹葩玉菡越山楚澤幽芳襲人此二物草中之瑞而香者也集而為室壇壁楣撩無非芝蘭雖以菉葹之滋蔓荼蕕之苦臭淹漬既久安得不漸其瑞而染其香哉今以剛愎之資柔佞之質得與聖賢久處服其衣冠聽其言辭周旋禮樂左右規矩惡得不與之均化哉遠而西土近而中國聖賢之教人每取喻于草木盖此之易曉而樂于從善也錢唐有大苾蒭曰古林昌公幼祝髮于寳石山律戒精嚴智慧明了金函秘典日誦萬言于是分淨慈之半席主法㑹之首座暮年築室于城之東偏繪塑大覺金身圓通素像歌唄讃頌不舍晝夜乃闢西清離立奇石移植紫藟樹列蘭蓀倚檻則清心濯目憑軒則衣芳佩馨光淪日月香動徹飈古林于時宴坐室中招諸徒立廡下語其法嗣善福田樹以芝蘭所以集善友也芝蘭名室所以成就于已也從香起觀因義了心推一義而窮萬義窮萬法而歸一法理事既除法塵俱凈此覺皇之教也汝能因芝蘭之香瑞纚類尋源當為優鉢羅芬陀利乃天人愛見之奇華無盡根剛陀羅樹為救世清凉之妙藥苟能如是返觀從起實因芝蘭之室有以啟之也弟子再拜曰唯予聞而歎曰是苾蒭者可謂善教人者矣因香草之灑流也而知芝蘭可以化質復馴致乎悅世救人及其至也則此心之芳香不假外物無復形穢將普薫一切世界矣奚止事一室哉王䝉于是乎記俞和書不著維摩獅子床芝蘭為友産清香商巖采到連莖瑞楚畹傳來奕葉光春雨苾蒭還並秀曉風薝蔔每同芳也知臭味通𤣥化物我冥現與世忘豫章蒲菴來復築室古城曲樹此蘭與芝異芳間奇石宛有山林姿芝蘭日長茂離披滿前墀綠葉泫朝露五色含晴暉道人方宴坐境寂神不馳色香了無取眼鼻忽若遺嗟予老京客無地結茒茨浩歌望江水白雲有餘思臨川危素不以芝療飢豈用蘭為佩芝秀蘭自馨植此一室内道人結習盡與物了無礙白晝敞禪扉羣峰遠相對南屏山人夷簡草中惟有芝蘭好不數宜男指佞賢近喜亦從蕭寺種誰云獨許謝庭專尋常道氣留君子窈窕風姿媚佛天何用栴檀林下住只將瀟灑度年年始豐徐一䕫芝蘭百本遶階墀曄曄璚英間玉蕤楚畹光風搖綠葉漢廷春雨長銅池香飄衣袂堪紉佩味入齋一厨足療飢謝氏芳華歸寳石封胡羯末宛同時白雲峯如蘭禪扃閉幽寂石室生清芬奇葩雜芳樹藹然祇園春如何尋丈間迥與人寰分聲聞已知妄色相元非真浣以甘露枝净灑濁世塵餘芳倘可即相從問正因錢唐白􅀢紫芝采為食幽蘭紉作佩聊復助熏脩庶幾堪傲世一室靜生香諸塵自融㑹蒲團禪燕餘經卷了空外㗳然吾我忘誰云有三際京兆宇文公諒隱居結蓮社地僻無人聲瑤草穿堦綠幽蘭入夢清吟詩憐楚澤分坐憶南屏色應千花偈香同九畹英何當風月下相對說無生金華宋璲泉石閒齋圖掛幅冲懷澹如水萬境猶虛空忽聞還山詔喜入衰顔紅山中何所有手種石上松茅屋閴無人恒有雲氣封清燈照佛龕罏烟裊松風砯崖噴飛泉赴壑如撞鐘羣響自起滅聞心本無窮塵銷諸念寂夢覺非有蹤九旬談一妙正爾開盲聾孰持去來影觀作真實同去隨流水遠歸與雲相從無心任𤣥化泊然齊始終秋風動江漢波浪皆朝宗雲帆掛海月渺渺五湖東黄鶴山中樵者王䝉書并題天竺日章法師得㫖還山王侯叔明作泉石閒齋圖予乃題詩并為贈行奉詔還故山江船復東下獨帆如蜚鴻秋日照平野王侯贈新圖山水儼幽雅石崖天際髙茒屋長松下清香散佛龕妙觀了空假白雲席上生碧溜階前㵼神清境自閒所適無取舍佳趣正在兹健筆老能冩乃知遺世情獨有還山者安得添我身齋居共瀟灑洪武乙夘秋龍河宗泐書𨽻古三年京國住奉詔得還山猨鶴驚猶識雲松故自閒銅缾𤓰蛻綠笋坐豹遺斑莫爇龍香鉢留將在世間東臯妙聲書王叔明坦齋圖圖下冇愼獨清賞四字向為余家鑒藏老來自覺筆頭迂冩畫如同冩𨽻書老鶴一聲山館靜道人正是午餐餘坦齋老師出宋羅文紙命作泉石老年自覺不同作此應命不記月黄鶴山人書于坦齋仙館叔明阜齋圖與太平清話所載者異此圖彷彿竹裏館茒茨翛然傍川水倚床張册白日長復有孤桐置髹几沈周叔明聽雨樓圖在紙上卷首篆書聽雨樓三字欵云玉雪坡下周伯温白文印至正卄五年四月卄七日黄鶴山人王叔明于盧生聽雨樓中畫生名恒字士恒時東海雲林生同在此樓雨中市井迷烟霧樓底雨聲無着處不知雨到耳根來還是耳根隨雨去好將此語問風幡聞見何時得蹔閒鐘動鷄鳴雨還作依然布被擁春寒樵人張雨為盧山甫題至正八年二月十一日河濶樓低雨如洗祇疑身宿孤蓬底清晨倚檻看新晴依舊山光青滿几聽雨憐君隱市中我憂徭役苦為農田間那得風波險朝朝愁雨又愁風荆蠻民倪瓉虛牖濛濛含宿霧瀑流磵響來何處江湖近向枕邊鳴林風又送簷前去挾水隨雲自往還根塵不染性安閒多情一種嬌兒女淚滴天明翠被寒至正卄五年嵗在己巳盧士恒攜至緑綺軒見示輒走筆次韻貞居外史諸韻以寄意云陶蓬寄亭中人暨諸名勝當不黙然也後十又八年四月九日瓉記擬張外史倪隱居聽雨樓詩韻緗簾蹙浪縈香霧幽人髙卧雲深處月明叢桂小山空疎烟白鳥滄江去浮沉里社樂蕭閒大隱何妨市井間抛却喧啾清洗耳草樓六月雨聲寒易五六韻語前後乃協塵生兩耳何由洗喜聽雨聲茅屋底灑然心地自清凉靜對爐薫時隱几乾坤納納懸壺中書田霑潤稱書農也勝江湖風浪惡客舟飄泊怨秋風石磵老樵蘇大年𨽻古城市不著耳江湖留此心樓髙人更静唯有夜懷深醉翁倪隱居索和張外史聽雨樓詩走筆二首答之海氣雜嵐霧聽雨宜髙處風雨無時無倐來復倐去搖搖心懸旛胡為不自閒老人曽聽雨無被不知寒頭面都不洗聽雨重屋底兩耳任喧聒坐隱烏皮几筆畊墨畦中自適如老農二仙隔今古神文在閬風堅白老人書于素行精舍一榻春深雨滿樓杏梢微濕五更頭東風更緑江南㟁賣劍家家盡買牛荷氣香飄竹外樓雨聲滴碎采菱舟南風一夜生新漲魚鳥還知此樂不積雨生凉轉蓐收碧梧初霣滿城秋鄰家不識余心樂也愛書聲在小樓天地嚴凝萬壑氷不堪寒雨灑孤燈一樓清氣猶宜雪紙帳生春睡未能曲江錢惟善春雲靄江郭鳩鳴朝夢餘樓中雨颯至煩抱澹云除厯厯樹聲亂蕭蕭牕影虚如何門外客泥潦後行車渤海髙啓題山牕聽春雨冷氣襲病膚鋪床閉齋閣衣被薫香爐風燈苦屢挑夜茗亦再呼煩囂悉屏逐妙理在跏趺憶子草樓底兹情還有無齊郡張紳承平時貞居張道師與雲林倪徵君並以翰墨風致齊名呉中二人者亦雅相引重先君子與貞居游最蚤余時以童子侍坐隅尚能計其丰采今先君久已棄諸孤貞居亦化去天下多故而余始得從雲林君遊至正乙巳季夏之九日余謁君于盧士恒氏之聽雨樓獲觀近製詩若畫沖襟雅論令人塵慮灑然既而士恒出此卷徵題二君之作具在因賦存殁口號附于卷末以寓感之思云華陽洞裏烟霞閉靈石山中草樹荒惟有小樓曽宿處年年春雨滿滄浪黄冠野服神逾玉畫筆詩篇老更奇白首故人無在者小牕殘燭雨來時尋陽張附鳳江雨飛來夜氣澄小樓髙處冷于氷聲留蕉葉頻欹枕影亂簷花獨對燈遠客異鄕生白髮故人今夕擁青綾致君堯舜慚無術思入湖天睡未能淮南馬玉麟草樓聽夜雨春燈隔重簾瓶中新茗煮奩裏舊香添風珮潛歸浦雲璈亂綴簷乍驚來湛湛更覺去纎纎頗被風相妬還疑雪與兼喜隨漁艇泊愁怕客窻淹頭白盧貞士髙情苦未厭雲門山人張紳重題山風滿樓來雨脚耳底蕭蕭生遠情還丹化鶴度句曲破屋無人住洛城酒停深夜蒼燈在簾近餘寒濕葉鳴枝上漆書空爪迹繞簷依舊落春聲觀外史所題山甫盧隱居聽雨樓詩詞翰瀟灑令人有超然之想噫故物也士恒其慎藏之四月七日王謙冩于客居更深樓外何蕭瑟半𢃄滄江遠樹風疑是千秋霜葉下坐殘一穗燭花紅斯人雅致今安在此夕幽懷孰與同老我題詩成感慨雨聲有盡思無窮呉郡盧君山甫舊有聽雨樓山甫殁二十年而斯樓尚存余抵呉惜不得見其人今其子士恒攜張外史所題詩來示余余覽之不勝感慨遂為賦此至正卄又五年四月一日檇李鮑恂書奉題聽雨樓飛樓何凝隂雨氣正含霧蕭騷習羣霤淅􅅹散髙樹聲懸長風外坐想當瀑布習喧久漸息静寂乃真趣隂晴造化意年芳暗中度白髮如散絲憑君冩幽素開封鄭元雲林夜澄寂有雨瀰更佳漠漠着樹穩霏霏度簷斜入静意所便争喧競浮誇弛張任槖籥細大無根芽妙運出𤣥造至理忘紛拏變化本因妄聲聞耳生瑕不如且置之攝心静無譁危坐不須寐呼童剪燈花卧龍山民王宥勝國之季兵變之餘前軰翰墨存者無幾間或獲一見如遇雞彛兕敦不由不使人忻艶也聽雨樓詩句曲外史及一時名流所作詞翰兼美亦希世之寳也呉中盧士恒父藏于篋中一日出示于余余展卷觀之卷中作者多余故友兹覩其辭翰儼若覿彼風度而不忍釋手也士恒宜珍藏于家愼勿輕示于人焉洪武二年春二月初二日呉僧道衍書層檐集飛雷深砌走鳴瀑餘聲殷天籟清氣入林屋風波任喧洶燕坐暝雙目寘身得蕭爽洗耳絶塵俗香穟鬱水沉簾花映湘竹篝燈動春酌剪韭留夜宿與客對床眠清談未云足金陵嚴瑄幽人愛樓居燕坐風雨夕髙檐㵼飛湍空除墮殘滴傾耳疑枕流屏喧時岸幘江聲晚蕭蕭樹葉寒策策境絶迹更起趣澹情自適霽曉愜凭欄春深杏花色浚儀趙淑少年聽雨歌樓上銀燭昏羅帳壯年聽雨客舟中天濶雲低斷雁呌西風而今聽雨僧廬下鬢已星星也悲懽離合總無情一任空階㸃滴到天明右竹山先生所賦之詞今偶獲觀此卷因舉是詞誠甫俾書于卷末夫聽雨一也而詞中所云不同如此盖同者耳也不同者心也心之所發情也情之遇于景接于物其感有不同耳誠甫中年人有樓聽雨吾意其與在僧廬之下者同其情誠甫乃曰吾聽雨吾知在吾之樓而已遂書竹山姓蔣名㨗字勝慾義興人卷中諸先軰之詞之腔虞美人也奕集聽雨樓諸賢記右張雨字伯雨號句曲外史武林人學道三茅峰而才名滿天下若虞文靖公黄文獻公咸推重焉先生妙于書人得片紙以為寳至今好事之家多蓄之客至則相與為玩先生詩法黄太史清新髙邁不流于衆雖元氏翰林諸公皆以為不逮也倪瓉字元鎮號雲林生無錫人家最饒而先生脫畧紈綺一事于翰墨作為詩章妙絶一世人欲不服自不能不服也虞文靖公張外史伯雨深相契焉然先生性癖傲物多忤于時元末棄家泛舟五湖三泖間興至則捉筆冩烟林小景或竹枝偶流于市好事者爭貿之雖千金不靳也王䝉字叔明呉興人號黄鶴山人趙松雪之外孫也素好畫得外氏法然不求妍于時惟假筆意以寓其天機之妙為文章不尚矩度頃刻數千言可就君子咸以豪士目之蘇大年字昌齡揚州江都人元之翰林編修天下亂寓姑蘇為文章有氣不喜衰颯江海襟懷亦人中之豪也饒介之號醉翁江西人元末寓姑蘇以跌宕自任工于書法君子評之者謂渠不减懷素至今人家多有之周伯温號玉雪坡饒州人為人愼重為元氏左丞天下亂流寓胥臺而無所就然妙于古篆得趙文敏公遺意字頗肥而玉潤可愛士君子至今寳之錢惟善字思復松江人元末進士精于詩得杜子美法不苟作作必臻其妙張紳字仲紳濟南人慷慨激烈不瑣瑣于世事作為詩文雖不經意而自成一家能議論終日亹亹不能休盖北方豪傑之士為本朝浙江布政馬玉麟髙郵人為元長洲縣尹有政聲括蒼鄭明徳先生有碑卒于偽呉鮑恂字仲孚嘉禾人元氏乙亥科易經進士為本朝文淵閣學士為人愼重不可狎而學行名天下有學易舉隅行于世後以事累卒于外趙淑字本初紹興人元氏乙亥科書經進士龍馬賦為時所重稱然性耿介不易與人交交必久為本朝太學博士而殁張羽字來儀一名附鳳與髙啟行軰也治易工于文文學歐陽子縝密宛轉可愛雖前軰皆自謂不及也本潯陽人避亂寓湖州為本朝太常博士而終道衍字斯道姓姚氏姑蘇人𢎞才茂思為時所稱與張來儀髙季迪軰皆以文字相頡頏而澡身浴徳則非諸君所能及故天下皆以參寥潛子目之皇上龍興以賛佐功封少師賜名廣孝盖又以元之劉秉忠並稱云髙啟字季迪姑蘇人身長七尺而妙于詩得唐人體裁語精意圓句隱而暢前軰有所不及為本朝編修歸家以事卒王謙字鳴吉姑胥人以春秋學為府學教授王宥字敬助與髙啟能文陶振呉江人有詩才然性不覊人或易之韓奕字公望呉之良醫也好與名僧游所云蔣竹山則義興蔣氏也以詞章名世其清新雅麗雖周美成張玉田不能過焉右聽雨樓詩卷其間所載皆一世名士誠可寳也然余觀卷中人品有三其至髙者聞而知之其次者事而知之其又次者交而知之若伯雨張公元鎮倪公其殆最髙聞而知之者歟自叔明先生以下余髫年曽事之自來儀以下余少曽交之總若干人皆能以文章名世者也然自衍公外多湮没無聞至如伯雨元鎮二先生若精金美玉不可冺滅况其負超邁之才遺世獨立髙潔無累周覽六合盡大觀而無遺乎余幼在鄕里時嘗聞呉城盧士恒家存此卷欲一見不可得見者無不愛惜今吾友沈誠甫得之良可賀也誠甫寄至京索題始得焚香展卷清風凛然毛骨頓爽予復何言姑述卷中作者諸先軰出處大畧以為諸賢之記誠甫姓沈名睿號存畊有才識善吟與士大夫游予之布衣交觀斯卷者當仰其清風素範益厲其徳哉勿以吾言為謬永樂五年嵗丁亥二月初吉翰林侍讀學士奉訓大夫錫山後學王達識右聽雨樓詩畫一卷元季及國初諸名公為吾蘇盧山甫父子之所作也永樂間流落錫山沈誠甫氏誠甫嘗求王内翰達善記卷中諸公出處之大畧藏之以為至寳中念淳熬擣珍非遇易牙不足以知其味之美雲門韶濩非遇師曠不足以知其音之妙使後或非其人不視為篋中之故紙而覆諸醬瓿者鮮矣聞吾相城沈翁葢淵博雅好古其子若孫多賢而且才必能鑒賞乎此可以寳藏于永久不遠百里時以奉翁翁一見之喜乃以厚禮答之既而即瀕溪小樓扁以聽雨置卷坐右暇日輒游玩諷詠恍若接諸公之光儀而聆其謦欬也一時名人勝士登斯樓披斯卷未嘗不心醉神怡斯樓之名遂擅勝于東南是雖翁之髙致所就然亦豈不以斯卷之所在乎或曰諸公無恙日翁多親炙之者惜乎此卷不為翁作而為盧氏故物也余謂不然夏后氏之璜封父之繁弱豈為魯國而制耶魯之先公所得分噐子孫世守之以為至寳斯卷也其璜也其繁弱也翁之子孫寳之而守之又奚知其為盧氏物耶翁之孫啓南出以示余僣贅于左方云成化庚子清明日長洲陳頎識永之白文咏芝白文王叔明舫閣圖汪氏鑒藏遠山晴翠潑空來浮閣虛窻面面開檢理殘經無一事焚香啜茗話天台黄鶴山中人王䝉為九成香光居士溪流清急石盤紆虚閣深藏閬苑如神矣香光閑灑墨一林松色䕃幽居臨川危素太樸王叔明破窻風雨卷卷首𨽻書破窻風雨四大字欵云古田紙窻風破雨泠泠十載山中對短檠老矣江湖歸未遂畫間如聽讀書聲劉君性初以破窻風雨自居諸公賦詩成卷因作此圖併題絶句于左時至正卄六年嵗在丙午暮春之初王䝉環堵篝燈夜寂寥欺人風雨更蕭蕭詩成驚落雞窻筆夢破須來馬鬛瓢萬里浪開看異日連床屋漏耿今宵丈夫莫袖為霖手欲沃人間九土焦雲松陸居仁陸氏宅之硃文居仁白文破窻風雨記大名劉易性初氏蚤從宣城汪先生遊後值兵變辟地呉中今年從呉興來見余草𤣥閣出玉坡周公所篆破窻風雨四大字盖書汪先生贈語也求余文志之余聞破窻在錢唐時夜半讀書有颶挾怒濤從海門來肆其暴烈揚沙飄石怪雨與之俱若萬騎出祈連北鏖于大漠而矢石俱下若蟄龍决起千丈而滄溟之水倒立若黄河自天而落束以龍門吕梁而雷鳴雹噴也崇城如山者圯層觀如雲者墮其破窻如一葉漏蓬下寒磧上人懼其有不可支者明旦天地清霽賢郡長有過而詰之曰劉子破窻尚無恙否吾饋酒醪解汝愠性初啓窻一笑曰吾由敬亭過武林入雲門下苕霅遭風雨者凡幾吾皆安以為常子何置戚戚于其間哉而嘑酒共酌歌老杜秋風破屋辭以洗其中之磊塊者亦亂世一奇士也雖然少陵破屋不為一已憂而寓憂者天下之寒士也惟少陵能安秋風破屋而後能推大厦萬間之庇性初能安風雨破屋而後能居玉堂雲霧之窻吁處變而不失其常居安而不忘乎危是在性初性初謝曰某不敏敢忘先生之規至正甲辰嘉平初吉東維叟㑹稽楊維禎記破窻風雨記大名劉聘君遭世難走楚越間居無室宇所至即浮屠老子之宫而假寓焉每風雨連夕燈窻獨坐韋編相對誦讀之聲琅然與風雨相叶蕭蕭喈喈若環佩之鏘絲竹之沸發于簷牙接于人耳于以見君之學之勤而志之有在也翰林直學士汪公叔志過而賢之名其所寓曰破窻風雨而謁記于薊人李繹繹知君者也為言曰卑宫惡室人之所惡所不處也而君于牖户之間研覃經籍如居層軒髙棟然則其志可尚矣凄風苦雨人之所厭所不願也而君于隂晦之時吟詠篇章如遇光風霽月然則其守又可嘉矣抑聞昔人有以席為門而處窮厄者終能佐明主以定天下君之志其斯之志歟又聞有大雪僵卧而不干人者終能配往哲以垂令名君之守其斯之守歟由是窮而能達嗇而能豐向也蓬室環堵以棲遲今則朱門大第以容與豈非躭學篤志之驗窮經稽古之力耶坐有客作而前曰子之言足以復劉君矣遂書以遺之君名易字性初今寓呉興魏之貴宦仍以君祖父為稱首云至正一十有三年龍集癸卯冬十二月朔旦記蘭雪子脫畧干戈外踰十年未嘗有憂色所至讀書雖敗壁頺垣霜晨雪夜不倦斜風横雨有所不避也一日持枯腰軸過小蓬股曰吾讀書處號破窻風雨吾師汪翰林先生所命也鐵厓先生記其端文雄詩豪繼其後者珠貫玉叠公其無一言乎哉予應之曰列仙之儒之言倬乎雲漢之章矣予尚何云雖然當破窻風雨之時人不堪其憂而士之讀書窮理其間者不改其樂也是故觀風雨之勢足以助吾氣之浩然聽風雨之聲足以資吾趣之灑然風檣陣馬不足為其快也龍吟虎嘯不足為其壯也金舂玉應石裂竹折不足為其清也峻宇雕墻璇宫瑤臺雲窻霧閣不足為其坦而幽安以樂也當是時豈知破窻之陋風雨之厄哉破窻不能陋風雨不能厄則吾之神爽飛越若驂紫鸞駕白鶴度銀潢逰碧落上玉京以登五城十二樓也果能若所適則羣仙之地位清髙隔風雨者吾將告之以百萬億蒼生命墮顛崕受辛苦也雖然未造乎是則憂民之憂者必先憂己之憂樂民之樂者必先樂己之樂憂之如何憂其不能正己而已樂之如何樂其不復徇欲而已吁吾靈臺丹府若泰山盤石之安若青天白日之明若松泉蘭雪之潔則吾所處之地破窻之破自破而吾丹府之窻不可破也破窻之風雨自搖撼而吾丹府之窻不可以搖撼也則吾廓寸地于八荒開冲襟于千古者風雨且不識又安知所謂破窻也哉士不可以不𢎞毅吾于蘭雪子不能無所勸云東海濱艾納老友錢􅕔叙一燈風雨寒窻破讀書不知秋怒號恍如扁舟在江海但覺四壁皆波濤對牀髙卧無此客倚劍長歌空二毛曉看庭樹故無恙千峰雲氣落青袍武夷山樵者錢惟善劉郎讀書如學仙朝不出户夜不眠時聞破窻風雨夜正是澂心對聖賢苕溪王子圖景象敬亭山色青連天執經念子最清苦亹亹論道心相傳雞鳴喈喈天欲曙疏櫺蕭颯寒聲度庭前漂麥總不知屋上捲茒寧復顧人生窮達那可知玉堂金馬自有期青藜他日夜相訪却憶破窻風雨時宇文公諒敬亭山下讀書菴破紙窻寒儘自堪但怪蛟龍嘶匣底不知風雨暗江南雲横墨海秋帆斷花落彤樓曉夢酣五色石崩天項漏須君子脱巨鼇鑚時至正乙巳秋八月十五日㑹蘭雪聘君于鐵崖先生小蓬臺見示此卷遂為之賦金盡山人錢岳幽人讀書味真樂堅坐那知風雨惡他年髙步玉堂中還憶破窻寒寂寞三衢徐汝霖王叔明畫卷有聽雨樓與此卷絶類但此圖更清潤有趙呉興法尤可寳也跋者十餘人皆名士鐵崖語甚奇惜不傳于遺集董其昌觀于金閶官舫因題丙寅仲春望巖居髙士圖臨池學書王右軍澄懷觀道宗少文王侯筆力能扛鼎五百年中無此君題王叔明巖居髙士圖倪瓉琴聲相繼讀書聲坐覺乾坤氣獨清一曲髙山流水遠千編深雪小窻明音非妙指安能發學必通經可得成富貴人生俱有道韓公何論短長檠方外夷簡題後有陳留張璧長干沙門子仁靈谷沙門清源天竺沙門博洽諸詩失錄黄鶴山樵鐵網珊瑚圖鐵網網得珊瑚枝寄與東呉苑髙士翠羽飛來毛羽寒石化青羊叱不起金鼎夜煉天地根閉門不識桃花春呉烟拂草瀛洲綠鳥啼花落空愁人百壺美酒恣傾倒銷盡春愁人不老却從鶴背看塵寰四海如杯嵩華小黄鶴山中樵者王叔明畫并題天上仙人王子喬由來眼識天下士黄鶴山中卧白雲使者三徴那肯起崑崙樹老盤玉根青鸞對舞瑤臺春昨朝贈我神錦段謂我九老仙都人閬苑花前因醉倒謫下人間容易老百花樓中作酒狂一聲鐵篴乾坤小玉崖生范立奉和王公獨得天然趣揮毫不效丹青士澹墨銀箋掃畫圖琅玕屈鐵參差起碧苔暗水流石根深山花落黄鶴春琴書几杖白畫静何因致我塵埃人髙平之仙非潦倒醉後狂歌不知老有約盧敖賦遠遊九㸃齊烟望中小豫章胡儼次韻升中文兄示及叔明王公所寄詩畫令僕品題之僕隨口和韻升中歡賞既久即命書以冠其顛云珊瑚千年生海底至寳終當遇奇士黄鶴仙人狡獪徒笑蹋靈鼇輕掣起波濤洗盡泥沙根元氣尚帶龍宫春裹藏什襲贈知己長生范老非常人明窻玩之驚絶倒世間一任韶華老釣竿猶記拂長柯三㸃神山眼中小呉郡顧禄奉題王公外家襲金紫不比尋常韋布士一時結納多譽髦早嵗聲華倐然起閒移翠竹當雲根更有古樹枝含春自云珊瑚出鐵網投贈豈與塵中人范君相見即傾倒喜盍朋簮成二老玉壺滿泛紫流霞痛飲狂歌天地小益齋王彦文奉和黄鶴山人多意氣真是髙亭老仙士揮毫髣髴如有神怪石嶙峋筆端起琅玕玉樹生雲根畫圖奪得江南春邇來遨遊東海上持贈玉崖之髙人兩翁相逢遂傾倒醉裏不知天地老持竿共結滄洲期一釣猶嫌六鼇小奉和黄鶴山樵贈范玉崖詩韻東䝉李仁黄鶴山中名畫史自昔才華冠多士淋漓醉墨冩幽篁翠梢搖搖拂雲起古樹槎牙鐵石根虬枝紏結江南春苕華空繞外家宅玉堂仙去今何人清尊却憶花前倒憂樂只應懷范老畫圖難寄相思心滄溟浩渺珊瑚小安湖老人王士顯武韵廷珪墨掃金花紙知是香光老居士鳳向髙岡時一鳴龍從碧海雙飛起紫苔碧蘚㸃雲根占盡湖山無限春上題詩句添藻麗遠贈髙平英偉人此圖當世俱壓倒我亦倡酧繼諸老髙堂落筆風雨驚不覺氣吞雲夢小沈瑜奉和玉崖前韻山骨嶙峋浸秋水虎視眈眈如胄士青鸞三五閬風來下立瑤堦不飛起坡頭有樹蟠虬根上凌霄漢中含春只疑老蛟出海底化作千嵗之神人眼觀此圖欲絶倒飛上香罏尋五老一尊試酧湘江仙望望君山隔雲小諸生張禮僕既題詩于上興猶未已再賦一首贅于下方尚希玉崖文兄清覽云呉郡顧祿鶴山老樵列仙徒玉崖先生名世士一時傾盖兩相逢作畫賦詩髙興起欣然為冩竹數根傍有古樹囘陽春蛟龍盤拏鳳鸞舞清氣自然能逼人金壺墨汁都傾倒壓盡蘇公并米老須臾更著石嶙峋海上移來蓬股小黄鶴仙翁寄余詩畫兩學賢友俱有和章明窻展玩珠明玉潤照耀後先其修篁古木清趣不减在于崑閬間也喜不自已余初效顰之後復續此詩以謝諸公之佳貺云爾黄鶴仙翁有詩寄不比尋常書畫士天入丹山鸞鳳飛雷驚陸地蛟龍起人生如寄萍無根相逢意氣皆如春東呉文學最瀟灑二王尤是風流人長仙醉來玉山倒散盡黄金數東老更期李白共飱霞誰信壺中天地小錢唐范立圖作兩枯樹古幹嶙峋儼然積翠池所植後見宋人網魚圖愛其景色幽妍而售畫者欲余此幅遂舉以相易未幾網魚圖又歸之盛彦修矣烟雲過眼可勝三嘆封禺外史玉記王叔明雙松圖一個釣船千頃月兩株松樹滿山秋如今老作江南客水國漁鄕處處留王䝉畫并題碧眼支郎耳更聰軒楹占斷白雲中有聲聽到無聲處錯認長松是老龍丹丘柯九思聽松圖八十三翁馬士英書叔明為古松禪師冩年去年來年復年長松亂立南軒前綠隂遮却半天日聲氣欲驚山虎眠老僧時倚䦨干聽聽之有動還無靜風擊風敲朝暮聲飄然不礙芙蓉鏡松梢掛月月放光一白倒浸莓苔蒼濤聲響于彈八琅隔窻洶洶形體忘我亦乾坤清氣者十年埋没紅塵下踏遍東阡并南陌幾欲投閒閒未得聽松軒人年已大兩耳松聲幾經夏平生愛人青松軒耳聽不厭松聲繁他日東林結蓮社再招陶令來祇園聽松禪客耳能聰着個幽軒萬木中風捲翠濤聲急處海門飛出老虬龍廣信呉元善黄鶴樵叟竹石凌雲髙節鳳毛疎錯落霜根老不枯仙子已乗黄鶴去玉笙吹月向蓬壺題黄鶴樵叟竹石荏溪張輅菉竹猗猗白石齒齒紫萌紛填翠實甘美鳳兮鳳兮當來鳴而棲止方泉金彦楨風落湘江秋正波重瞳消息竟如何竹間猶有斑斑淚應是英皇恨更多五雲生王叔明竹趣圖欵云上䝉為怡雲上人冩蟄龍翻空翠濤響玉虹吐雨秋波爽天風吹出讀書聲時有幽人自來往錢唐王羽茅屋書聲雜澗聲一簾山色雨初晴蕭蕭翠竹無窮趣更有琴樽趣又清竹本無趣人自得竹之趣猶淵明之得園趣耳畫者題者其亦得竹之趣乎文中藏之亦同得此趣者矣丁丑嵗十月朢日浚儀張閒識我昔曽遊黄鶴山山人留我閉松闗山中風雨經十日萬壑千巗空翠間别來浪跡遊湖海嵗月茫茫不相待回首東南頻夢飛山空鶴去人何在畫裏依稀記往年水光山色自依然尋遊尚有山中客揮手誰招鶴上仙竹隂深鎖秋窻曙疑是山人吟嘯處人生行樂付東流萬事浮雲總何許我欲山中訪舊遊酒船横渡洞庭秋長歌黄鶴歸來曲盡洗胸中今古愁青城山人王汝玉磵底茒茨六月寒清風遶榻翠檀欒此君别有何情趣卷幔令人不厭看謝縉雲嶂參天列翠屏石泉飛雪洒嵒扃竹聲琴趣清如許塵世誰能洗耳聽義易偶桓又竹趣圖為王黄合作僕暇日為郡曹劉彦敬畫竹趣圖甫畢而一峯黄處士見過僕出此求印正處士以為可添一遠山井樵徑天趣逈殊頓増深峻矣時省郎耿君督兵華亭索僕畫甚急思拙筆弱頃刻不能就用輟此奉獻呉興王䝉謹題叔明公子文敏公之外孫也天姿神品其于翰墨深入晉漢至于鑒裁尤所精詣鷗波之宅相非子而誰耶至正壬辰冬公望一峯道人年七十三元人墨竹秋夜凉如水蒼竿戞擊清噴泉珠錯落帶月弄寒聲天台山人周景升題于竹西艸堂元人墨菊華上𤣥霜壓鬢寒葛巾漉酒不曽乾髙風千載無遺影誰冩墨花秋露團栗里秋香海漁子題水國秋髙八月凉誰將玉杵搗𤣥霜西風吹入東籬下萬朶無尋一㸃香錢唐凌雲翰江國秋風第一枝清香不殿義熈時柴桑午夜藤蘿月景入疎窻色更奇時甲午冬竹雅裴日英作于荆南客邸栗里秋香一云錢選筆先荆公得之呉功甫玉記元人情仙花輦圖花是情仙仙是花七香百合萬吹霞雪麋神力無教失漠漠冰天落内家桃花夢叟題仙輦非俗駕可彷彿乃以古樹根及虬枝盤結上覆雜花為幙一白鹿馭之坐輦者明璫翠翹冠碧瑤蓮瓣綴楓葉垂霞帔朱舄側粉幇如削圭玉手握團扇支頥娟娟若有所思即所謂情仙也前導兩侍見執綏按轡各錦纒頭揎臂絡金釧豹皮槲葉圍纎腰一紅屐蹻尖一黄靸弓様雙股現晳膩如毛衣狀偶語若有所指應促情仙赴約乎假使鹿仙相值定受騎頸矣故老鐵云雪麋神力無教失耳末句則亷夫當時極羡天魔舞女背行蓮掌疑仙姬墮此情種歟此幅為仇英所臨在余家余又有瑤島羣真圖亦元人卷後女真數隊一秉耜一挑大葫蘆作隊一荷簣一束芝艸一倚鹿一控鶴作隊一擁巨笠一種芝盆中作隊一跨鳳一乗青鸞在海天雲際作隊俱作毛女粧束焉客閱而咤之曰毛女一而已矣何若是其雜然耶余不答惟簡諸載記條列若干為毛女女譜分其仙凡得六類璀璀燦燦怪怪奇奇亦無形之丹青也梯仙國平陽沖𤣥子識于𤣥風閣之氣韻生動間元人着色春景山水橋囘綠水斜春樹隔烟霞隱處誰云識千峯只一家雲隱青山翠黛裛晴霞流水濺濺帶落花不覺雲間有雞犬始知空外有人家海漁元人松齋沐髮圖松翻翠影罥茒齋千里風雲入壯懷沐髮據床忘對客不知謝萬悵然囘張淵國初人列嶂飛泉過雨時迴風碧浪影差差扁舟底事不歸去更向晴波照鬢絲文嘉元人題江叟吹笛圖江楓葉赤蘆花白烟水茫茫晩山碧釣罷歸來酒一壺醉倚蓬窻弄長笛弄長笛無腔拍一任江南與江北八月蒼江蘆覆洲南洲老人迴釣舟壺漿飲空獨醉後横笛吹開天地秋弄節調音轉凄激蕭蕭兩鬢寒衝額山雲漠漠幽樹青江水𥻘𥻘江月白是時萬籟俱無聲寥寥玉宇聲縱横凉風淅􅅹隨處發𤣥鶴咬戞相和鳴鳬雁飛來如近覩鵁鶄徘徊鷺鷥舞靈妃不入水仙宫神龍盡出馮夷府一龍吟浪羣龍鬭鼓鬛揚髯擁先後傳宫換羽自浮沉過徵歸商迭清溜一聲呌破蒼旻裏鴻濛呼囘九澗底暘谷金烏忽驚起搖落烟波千萬里東海徐珵王弇州觚不觚錄畫當重宋而三十年來忽重元人乃至倪元鎮以逮明沈周價驟増十倍窑器當重哥汝而十五年來忽重宣徳以至永樂成化價亦驟増十倍大抵呉人濫觴而徽人導之俱可怪也今吾呉中陸子剛之治玉鮑天成之治犀朱碧山之治銀趙良璧之治錫馬勲治扇周治治商嵌及歙吕愛山之治玉王小溪治瑪瑙蔣抱雲治銅皆比常價再倍而其人至有與縉紳坐者近聞此好流入宫掖其勢尚未巳也噫畫重元人自昔已然當沈啓南之前有金文鼎集勝國十一名家觀其題跋可知矣惜元美先生未見此册耳有芒氏玉水磊砢者識珊瑚網卷三十五
