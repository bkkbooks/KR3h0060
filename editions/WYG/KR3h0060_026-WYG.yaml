body:
  text: 珊瑚網卷二十六明汪砢玉撰名畫題䟦二李成山水寒林山水寒林李營丘神境也其位置䃲礴自得其氣韻飄渺欲仙其骨力矯矯如逰龍其彩神霏霏若翥鳯迹簡而意淡登顧陸之堂細宻而精微入展鄭之室風日晴美時清心展閱恍置身在寒泉古木間耳世賢子萬厯癸夘秋歙客質繪冊于先子高君明水来見遽持去後再期明水以逾期不聴贖已濡墨㸃綴竹樹客訴非已物將奈之何惟所攜李咸熙畫一軸原值二百五十近付善手湯氏裝潢甫完無己將此畫典償之耳淚澘澘下也先子惻然稱貸多金存其畫客一去杳然未㡬董太史𤣥宰過舍極鑒賞是愊正欲䟦其上㑹兵憲邀宴連速不果先君遂自題數語至崇禎己夘夏竟被姑溪友人賺去余不憚千里追返内人嘆曰世已為無李論君何必作有李論而役役如此余笑曰不知其人視其畫誠如東坡所云縹渺營丘水墨仙乎因述當年典畫事爾爾龍惕子汪砢玉識名畫李成以山水供奉禁中然以子姓饒資為宫市珠玉大商不易為人落筆惟性嗜香藥名酒人亦不知獨相國寺東宋藥家最與相善毎往醉必累日不特紙素揮灑盈滿箱篋即舖門兩壁亦為淋漓潑染識者謂壁畫最入神妙惜在白堊上耳此宋時百嵗袁老楓窻小牘所載綴之用補畫史砢玉再識李營丘暮林叠岫圖桑苧未成鴻漸隠丹青聊作虎頭癡乆知圖畫非兒戲到處雲山是我師澤民朱潤元人范寛長江萬里卷范性落拓迂逺人因以寛目之後遂用題識其名故中立也昔在苑西有吳太學持范中立長江圖見示位置正如此卷猶心疑為裴旻之虎今見真本快心洞目之觀始信鑒裁不謬史官董其昌余有范華原雪景山樹依稀世號范臘梨云樂卿僧巨然山寺圗即治平寺圖其元人題䟦已刻六硯三筆此卷在梁谿華氏家余求之數載不得一觀今為公甫所有得展玩竟日其墨法筆法似右丞范寛與巨然平日淡墨輕烟少異葢唐宋人畫𣲖如出一家不可以格數輒較量也卷末諸名手論之偹矣余何容賛甲辰六月三日過南湖觀因題董其昌吾鄉吳太學功甫謝世後諸珍秘散出時先君得是圗又唐鐫靈壁石名列翠者及他書畫玩好無何為鬻古輩先後賺去復得無欵山水一軸竹懶翁見而題之曰骨格沉古秀鬱芊綿的是北宋董巨之筆或云夏禹玉已屬貎相矧更引而下乎具眼者自得之懶翁時過笑賞謂即巨然山寺圗矣汪砢玉識崔白林塘刷羽圗在絹幅上着色樹石芙蓉水邊立一鵞軒翅翹頸儼然生動雨後菰蒲翠色分水邉野雁已離羣杜陵對酒唫詩愛更憶山隂王右軍靜學題崔子西桃澗雛黄真蹟善聲而不知轉未可謂善歌也善繪而不善染未可謂善畫也是作桃紅覆澗水羣雛喙宿其間笋芽迸出樹根游蜂撲花不定神彩煥發氣韻生動最得傅染之妙固趙昌流輩歟昌之毎當晨露遶欄諦玩掌中調色工素自號冩生騐之以手捫摸不為采色所隠若蘭亭所蓄又非濠梁崔藝學莫工此也總之如善歌者得其轉法矣謂昌之可謂子西亦可矣砢玉題紡車圗卷首周天球大書故宋王居正筆王居正拙之子也俗以其小字呼為憨哥學丹青有父風師周昉士女略得其妙嘗于苑圃寺觀衆遊之處必據高隟以觀士女格態凡欲命筆則澄秘思慮故于形似為得右聖朝名畫評按王拙河東人也大中祥符間父子以畫馳名海内延祐四年七月予客燕都有持此圗相示者因以五十金購之乃賈師相故物也圗雖尺許而氣韻雄壯格意高古精采飛動真可謂神品者矣是嵗中秋日松雪道人趙孟頫識春風楊栁色麗日何清明田家作苦餘軋軋繰車鳴母子勤紡績不羡羅綺榮童稚嬉自樂小厖恬不驚緬思前盛日萬物遂所生王郎稱好畫奕世垂佳名詎意刼火餘留此天機精千金匪重價至寳那可輕暇時一披閱邈焉起遙情後二年四月三日重題子昂高克明雪意卷前有高克明三字後有州牟氏書齋清玩八字乃宋人書畫譜稱高克明得李成筆意蒼古清潤為北宋丹青名家思陵嘗有詩評云克明已往道寧逝郭熙遂得新成名則其品第皆出熙上也而其真迹世不多見此雪意卷廷美僉憲得之于道遜太僕圗不盈丈而三逺偹焉誠不意得者余題之為劉氏山房所藏第一云題竟廷美復強余詩余適遊雪湖得一律猶能記之因書以塞白湖山勝趣自難窮雪後登臨興倍濃大地盡成銀色界一塵不到水晶宫舟移月洞雲庭外人在氷壺玉鑑中我欲題詩誰屬和惜無魯望與逋翁成化己丑春仲天全翁有貞書于虞山上湖舟中赤脚真人龍鳯姿俯視藝苑時游嬉良工待詔金門裏高生前身應畫師含毫吮墨立良久自言臣是唐王維平生胸中無一物獨有山水能容之郭熙成名乃新進范寛得意纔並馳丹青競巧稱院體後来不比宣和時宻竹千岡松萬壑蒼翠峰巒白湖濼㟁傍桂楫何處移磵曲􅈋堂是誰縳行人暮歸天漠漠遙望前村愁雪落船頭一老自閒暇詩意分明入寥廓劉侯朝迴過燕市亦復愛畫入骨髓偶從太僕得此圗每一開之心輙喜天全仙翁惜題字評品數行非佞史翁今已逝侯亦亡兩洞庭荒渺湖水石田多才從後起况有佳兒好文事只今寄物欣有託賦詩獨媿前人耳宋社乆已屋宋畫如有神劉侯地下勿長笑楚弓得失皆吾人延陵吳寛郭熙春山對酌圗何處春山聳翠寒洒然林下見衣冠高情此日難為别且盡壺觴物外歡雲隠信筆題二老相忘共一家笑談酬酢總堪誇獨憐雲白山深處極目枝頭不見花北山錢復雲白山青風日柔有人同在此林邱一樽細酌東風裏解折山花當酒籌谷西郭河陽夏山行旅畫行旅者四時俱供筆端此其炎景山程耶雄偉清潤妙絶如許余每懸齋壁森然若在長林豐草中與䇿蹇停驂者相周旋焉熙嘗言畫山水數百里間必有精神聚處乃足畫散地不足畫也誠然哉玉水子文與可晩靄横看卷壬戌之秋程季白飛霞舫成招李君實及珂雪與余集舫中看新得漢玉圗書約三百方因示文同畫卷曰晩靄横看君實題其後用東坡思無邪齋章鈐記余共珂雪各印諸玉作譜婁東朱錦春撥阮奪落葉響吾輩無暇聴也歸而思此圗樹瘦于竹艇小于葉遙山逺水層出林端暮烟凝靄掩暎亭閣畫中人應爾横看無盡意躍躍焉東坡嘗稱與可下筆兼衆妙而不言其善山水乃山谷于吳君恵處見文湖州晩靄横卷兼有王摩詰闗仝筆力世僅以洋州竹一𣲖稱之何足以盡石室又與可至天彭館徐氏園杯酒談笑中肆筆成焦夫子像于亭壁曲盡寒酸態度焦葢博學導後進貌陋且怪性率不自飾者元豐壬戌郡守聶子固徙其壁于郡圃凝翠亭今有石刻在是與可又善人物也故坡公謂與可詩文不能盡溢而為書變而為畫畫皆詩之餘乎詎意此卷至崇禎初歸留都一大老後共徽廟竹禽卷殉葬斯刼一遭真珠沉滄海矣可勝憾憾秀水汪砢玉記後聞不果殉今在彈埽菴處文湖州竹枝卷若人今已無此竹寧復有那將春蚓筆畫作風中栁君看斷崕上瘦節蛟蛇走何時此霜竿復入江湖手東坡居士題延祐乙未秋九月十有八日薊邱李衎觀于毗陵趙東臯之書隠謹題翰墨真儒者事畫缺一字如山未知判取詩書萬卷来看風霜一枝此老墨君三昧雲山發興清竒我在蓬莱書府曾看晩靄横披余曩客京師獲觀文湖州晚靄横披圖山谷題識其上真絶品也文湖州平日丹青之妙不止墨竹故因及之鄧文原石室先生墨竹之妙與雪堂先生之書同具鍾王妙趣此卷為郭君天錫所藏文畫蘇書紙蠧而墨色如新題識俱有徵得一展玩何其幸㢤㑹稽王艮江夏費雄天台柯九思京兆杜本同觀本書𨽻古臨行話與崔公度到了神交蘓子瞻却是主林神不管黯隨凉月墮虛簷高郵龔􅀈為郭天錫題當今好事家多藏文竹觀者每以東坡題識定真偽此卷字畫兩優為真無疑汾石巖民瞻至治元年冬十二月七日與仁卿来訪天錫得觀石室先生墨君真跡薊丘李士行書僕平生篤好文筆所至必求披玩所見不啻數百卷真者僅十餘耳其真偽可望而知之文蘇同時徳業相望墨竹之法親授彭城故湖州之作多雪堂所題若必東坡題識而定真偽則膠柱鼔瑟之論也此卷文畫蘇題遂成全美余舊嘗見之每往来胸中未忘今復于益清亭中披閱令人不忍釋手故為之識同觀者倪元鎮至正二年七月十九日丹丘柯九思書至正六年十二月廿日觀于益清亭趙雍清貧太守石室翁渭川千畮藏胸中理間砥筆槃薄嬴兎走鶻落無留蹤雨稍晴葉各殊態揮灑位置分纎穠鍾峰隠居撥鐙法氣韻生動將無同墨君一𣲖来自東襪材當萃彭城公平生知己最親厚走筆調笑言舂容陳州官舍示長舌翛然化去當元豐烏乎一老不復作空瞻遺墨翔鸞龍汝陽袁華與可題竹欵有錦江道人文同為雪岸先生作蘇子瞻竹枝自題雲陽友舊最善墨竹與僕别㡬嵗月矣余在錢塘邀于長青閣小飲作此竹枝奉贈不知雲陽以為何如也輕翻雪浪煖低挹露珠圓萬籟夜俱寂清風盈耳邊郁文澤題曾遊赤壁誦遺文又向禪房見此君一段湘娥廟前意淋漓秋水與秋雲癸未秋七月日過以中上人方丈示坡仙竹枝賦此吳郡張雨老幹翛然舞新枝丹鳯棲後凋並松栢不受雪霜欺周貢題君不見昔日眉山草木枯儒宗疎秀生三蘇坡翁文藝更瀟洒興来畫竹世所殊一枝一葉有生意虛簷烏雀驚相呼鳯睛落落疑戛玉雨潤將將欲流酥相去于今二百載宛然遺墨懸座隅况乃忠恵舊藏物珍寳真與天壤俱袁桷題東坡自題畫松人間斤斧日創夷果見龍蛇百尺姿不是溪山曾獨往何人解作掛猿枝野水參差落漲痕疎林欹倒出霜根浩歌一棹歸何處家在江南黄葉村李龍眠孝經圗紙本鳯閣舍人楊公雅言孝經闗鍵六藝根本百行在世訓所重謂龍眠山人李公麟曰能圗其事以示人為有補元豐八年六月因摭其一二隨章而圗之龍眠居士圗孝經雖曰隨章摭其一二然自天子以至于庶人威儀動作之節與夫郊廟之規模閭里之風俗器物之制度畜産之性情亦畧備矣東坡謂其神與萬物交其智與百工通者覽之可想雖然龍眠畫賛者多矣至于書史稱妙絶而見者不多今覩其筆勢若清廟既陳而君子佩玉趨蹌于其間清和簡肅猶有晉宋閒人氣韻當時以書名者未必能如此也吾得此卷不徒愛其畫而尤愛其書特珍藏之毎紙壓縫有雙龍團印末有紹興字喬氏私印葢曾入南宋御府而又為喬仲山所藏云水村居氏陸完有王芝子慶王芝私印龍眠孝經圖嘗載雲烟過眼録藏西人王芝子慶所余後草窻周先生三百餘年往往獲覩其品題是物何多幸也子京李伯時畫呉中三賢像有鄆王書所咏已将勲業等浮鷗鳥盡弓藏見逺謀越國江山留不住五湖風月一扁舟范蠡西風淅淅動髙梧目送浮雲悟卷舒自是歸心感秋色不應髙興為鱸魚張翰把菊蕭條遶屋春不教鵝鴨惱比鄰滿身花影猶沈醉真是江湖一散人陸龜䝉覽夢得所藏吳中三賢因各書絶句鄆王押朱文鄆王之印王即徽廟也李龍眠作漢高等六圖眉公跋云李龍眠患右手米元章始學畫當時已推重如此是不然也龍眠細入元章寫意各不相襲余昔有此卷為東倉楊汝邁所惠先君即以贈華亭薛氏後轉入王越石手天啟三年冬十一月二十三日同李九疑太翁觀于春波舟次龍惕子汪砢玉李龍眠華嚴變相圖龍眠居士畫華嚴變相豈獨筆力超逸然此公性理皆通誠可歎服也庠謹書龍眠居士宿慧通親覩華嚴法界觀手畫毘盧妙相好靈知所現非幻作諸神勇識以次來衣冠纓絡嚴飾具乃至諸天諸大天福德貴神八部等威慈並承佛恩力各隨因地見形勢我思法雲頂中寳紫金灮聚超衆地一毛孔中一切見半月滿月諸寳王香雲鬘雲宫殿雲重重單複牙含揾悲愍衆生故在世今我愚蒙得瞻仰願如童真法王子彈指開門入寳閣普禮普讚盡未來與佛長住金剛定邵菴道人虞集生贊前一題乃後湖居士丹陽蘇養真書惜此圖為舊人摹本其鋪叙諸天八部龍神之妙不知真蹟流落何許得一瞻禮此生之幸也墨林李公麟毘耶問疾圖維摩大士身不有云何文殊來問疾惟其維摩身不有故能一念示于有惟其維摩未嘗病故感文殊來問疾不二法門共談演不在語黙與非黙三萬二千師子床恒河沙數香積國衆生重說不二門畫出空門貝多葉若作畫與非畫見則有黙與非黙異當知未曾開展時維摩文殊嘗說法風花雲葉水重重琚公道人如此說至大二年三月廿日枯木巖比丘行魁拜讚文殊如是設問太煞老婆心維摩如是酬荅面皮厚多少㸃檢将來總未勦絶居士元非病文殊謾詰徴無人知此意特地覓圖形至順壬申吳城此山若舟一生只解彈人短自病元來不㑹醫非是曼殊來勘破從前敗闕少人知慧雲沙門善慶靚粧士女何足觀此卷宜尊為畫聖老學菴居沙門天泉濡首舌頭尖似鑚净名心地曲如鈎二千三百年前事今日無言倚石樓洪武十二年知足山翁清楚真病何憂不易活原來假病極難醫是真是假無人識惟有文殊一箇知徑山心泰拜書李龍眠作毘邪問病圖前代諸碩師多著語于左中天民應上人得而藏焉洪武甲子㑹稽溥洽在吳門雨花堂寫李伯時維摩說不二法圖余曾見之頃氏二十餘年矣今日重展于蘇門舟次一彈指頃去來今謂是也丙辰夏日董其昌觀龍眠臨王摩詰輞川圖絹素上髙宗書在前李龍眠所臨王摩詰輞川圖畫法氣韵咄咄逼真卷首有思陵所題誠可寳也但所藏不謹想失去元祐間諸公䟦語深為惜哉至大三年正月既望趙孟頫敬題甲寅重九日得此卷于湯玉林云龍惕子記龍眠山莊圖潁濵先生題此心初無住每與物皆禪如何一丸墨舒卷作山川右墨禪堂清谿便種稻秋晚連雲熟不待見新舂西風薌自足右雲薌閣蒼壁立精鐵懸泉瀉天紳山行見已乆指與未來人右陳彭漈自龍晝飲潭石壁脩尾掛幽人欲下看雨雹晴相射右玉龍峽層崖落飛泉㣲風動喬木坐遣谷中人家家有琴筑右泠泠谷團團寳華巖重重䕃珍木歸來得商鼎試浴溪邊渌右寳華巖倚厓開翠壁臨潭置苔石有所獨無人君心得未得右觀音巖巖花不可扳翔蘂乆未墮忽下幽人前知子觀空坐右雨花巖溪深龜魚驕石瘦椿楠勁借子木蘭船寛我芒鞵病右鵲源山開稍有路水放不成川游人得所息真言才澹然右𤼵真塢山居少華麗牽茒結净屋此間不受塵幽人亦新沐右雲塢未見垂雲沜其如歸興何路窮雙足熱為我洗盤陀右垂雲沜伯時作龍眠山荘圖由建徳館至垂雲沜著録者十六處自西而南凡數里巖崿隠見泉源相屬山行者路窮於此道南溪山清深秀峙可游者有四曰勝金巖寳華岩陳彭漈鵲源以其不可緒見也故特著於後子瞻既為之記又屬轍賦小詩凡十二章以繼摩詰輞川之作云李公麟字伯時舒城人也舉進士用陸佃薦為刪定官又用御史薦為檢法官公麟博學好古多識奇字紹聖五年朝廷得玉璽下禮官諸儒議言人人殊公麟以為秦璽用藍田玉今玉色正青其書以龍蛇鳥合為文著帝王受命之符真秦李斯所為也議由是定公麟能行草書善畫尤工人物比顧陸云元符三年既歸老肆意於泉石間作龍眠山荘圖為世所寳藏其為文清婉工于詩而一時多稱譽焉右龍眠山莊圖宋李公麟伯時畫伯時舉進士入官以博學好古有盛名其畫葢取晋唐諸名家所善以為己有論者謂鞍馬過韓幹道釋追吳道𤣥山水似李思訓人物似韓滉瀟洒如王摩詰在宋當為第一手元符間歸老山中作此圖其景由建徳館至垂雲沜十有六又道南溪得勝景之可賞者有四皆山水清秀竹樹茂美喧囂塵俗之所不到東坡先生為之記潁濵又為賦詠葢妙絶一時人所寳愛不啻拱璧夫景以畫而傳畫則以人而重東坡先生髙風大節百世之望也凡詞翰之所賁及者天下其誰不重之然則龍眠山莊豈獨賴畫而顯哉先生嘗言君子可以寓意於物而不可以留意于物寓意于物則物長為吾樂留意於物則物足以為吾病伯時之矻矻於此葢留意之病也先生之文出於天縦以状物適情如風𤼵霆震歘然變化於俄頃之間於其所當止而止焉非所謂寓意于物者乎今數百年龍眠山川固在也其所經營締搆不可得而見也矣所可見者文章圖畫而已則文章圖畫固可以為不朽之託哉雖然亦有時而弊也特聊以寓意焉耳文選郎中龍士郁得此卷以求余言因題其後以歸之士郁求題余許之乆矣不欲孤其意勉綴數語既授之藁又欲親書及其半而苦之葢滿眼黑花不能成字遂閣筆至次日乃畢此亦余留意之病也景泰四年八月八日抑菴老人王行儉書于吏部之南軒是年七十五矣泰和王直李龍眠作楊太真瑶臺醉歸圖宴罷瑶池跨彩鸞天風吹墮碧雲端侍兒扶起嬌如醉斜嚲雲鬟上繡鞍西林雲鬢鬅鬙玉鳯欹攀鞍欲上意遲遲酒痕微涴臙脂色疑是瑶臺宴罷時希古為厭昭陽晝漏遲閑乗玉勒鞚青絲可憐鼙鼓南來日不得従容喚侍兒蘭谷方侍天顔醉玉醅腰肢無力下瓊臺臨歸恐有重宣敕斜倚金鞍首復回梅荘謾控青驄欲上鞍翠翹斜嚲髻雲寛半酣嬌態花無此贏得三郎着意看友梅霓裳舞罷酒㣲醒一笑春風百媚生従使君王看不已都門回首鼓鼙聲畏翁周寅温泉浴罷宴昭陽扶醉乗驂樂未央誰道翠華西幸日海棠紅委馬蹄香夢草唐家宫闕驪山頭瓊臺相映華萼樓君王荒滛惟酒色日月放浪花間遊楊家姊妹白如玉並肩圍坐芙蓉褥一時専寵無與俱買笑豈辭珠百斛沈香亭畔奏管絃清聲溜滑疑鈞天纒頭一賜輕數萬何惜狼藉遺金鈿虢國夫人偏婀娜傾城顔色欺嬌朶醉歸跨馬困無力懵騰欲上香韉坐侍兒羣擁弱難扶執鞭俯首顧女奴和裙穿鐙强扳鞿未能緩轡行前途嗚呼後人觀此當深念女色於人致昏墊早知蜀道苦悽凉亦擬帳中揮利劍故鄣呉珫宴罷瓊臺日暮還侍兒扶醉上金鞍應縁玉貌花難比承得君恩分外寛手攬雕鞍故上遲鬢雲斜嚲翠眉低玉驄似識嬌羞態鞚向東風不敢嘶竹隣宴罷承恩出九重半酣欲上玉花驄嫣然一笑東風裏粉黛三千總失容友竹金鞍欲上更遲遲滿鐙春風擁侍兒一種餘酣消未得漁陽醒眼却多時疑舫髙人卜宅鴛湖畔雅趣平生多清玩龍眠居士傳此圖見之不惜千金換初看恍惚楊太真寳冠金鳯蝶鴉雲雙成小玉侍嬌醉騎邊執勒髙将軍又疑日暮湘江曲靈妃倚馬愁紅玉帝子南逃去未歸顰眉望㫁蒼梧緑細覩仙妹多綽約宛然含笑東方朔霓裳舞罷蟬􅁂斜始知宴下瑶池樂西林學士披卷時雄文健羡仍留詩才人畫史不易得留作人間雙絶奇百花正芳艷遲遲春日長梨園笙歌靡十斛葡萄香美人睡初覺起來整新糚醉後嬌無力東風吹海棠侍兒鞚花驄欲上猶徜徉龍眠驅造化幻出非尋常翰苑羣公覩争摛月露章休文後裔賢重之如寳藏使我亦披覽裁詩并𤼵揚養素李龍眠醉僧圖在紙上款云李伯時畫人人送酒不曾沽終日松間挂一壺草聖欲成狂便發真堪畫作醉僧圖老泉書懐素詩并倣其草法唐僧懐素以草書名天下唐賢善書者亦推重之素有自叙一篇備載諸人之詞素深喜絹書吾家前後所得數軸了無紙上一字最先所得乃人之送酒詩也老泉山人學書垂四十年每愛此詩時詩寫之不下數十張矣龍眠李伯時因是時遂作此畫頗能状醉僧之態而老泉所書自成一種風格所謂二妙圖耳東邨閒居方外棠宇叟書鑒古齋雅玩余常見李龍眠山荘圖用墨妍秀設色精工真入摩詰之室若其畫人物佛像如以燈取影逆來順往若游絲迴還無迹雖吳道子顧虎頭不能過於此卷可見此卷因老泉先有醉僧詩伯時乃為補圖正所謂合之雙美也董其昌觀于恵山舟次龍眠居士李伯時五馬圖卷黄太史箋題右一匹元祐元年十二月十六日左騏驥院收于闐國進到鳯頭驄八嵗五尺四寸右一匹元祐元年四月初三日左騏驥院收董氊進到錦膊驄八嵗四尺六寸右一匹元祐二年十二月廿三日於天駟監揀中秦馬好頭赤九嵗四尺六寸元祐三年閏月十九日温溪心進照夜白右一匹青花驄原無箋恐即是滿川花也余常評伯時人物似南朝諸謝中有邊幅者然朝中士大夫多嘆息伯時乆當在臺閣僅為喜畫所累余告之曰伯時丘壑中人蹔熱之聲名倘來之軒冕此公殊不汲汲也此馬駔駿似吾友張文潜筆力瞿曇所謂識鞭影者也黄魯直書余元祐庚午嵗以方開科應詔來京師見魯直九丈於酺池寺魯直方為張仲模箋題李伯時畫天馬圖魯直謂余曰異哉伯時貌天廐滿川花放筆而馬殂矣葢神駿精魄皆為伯時筆端取之而去寔古今異事當作數語記之後十四年當崇寧癸未余以黨人貶零陵魯直亦除籍徙宜州過余瀟湘江上因與徐靖國朱彦明道伯時畫殺滿川花事云此公卷所親見余曰九丈當踐前言記之魯直笑云只少此一件罪過後二年魯直死貶所又廿七年余将漕二浙當紹興辛亥至嘉禾與梁仲謨吳徳素張元覽汎舟訪劉延仲於真如寺延仲遽出是圖開卷錯愕宛然疇昔拊事念往逾四十年憂患餘生巋然獨在彷徨弔影殆若異身也因詳叙本末不特使來者知伯時一叚異事亦魯直遺意且以玉軸遺延仲俾重加装餙云空青曾紆公卷書此卷已載雲烟過眼録三百年來余生多幸得獲覩焉畫於澄心堂紙上筆法簡古步驟曺韓曽入思陵内帑璽識精明直神品也近日摹數本于吳中自能辨之子京先大父懐荆公遊雲間得趙文敏臨此本及琥珀盞官窑吐壺攜歸今僅壺存耳元孫砢玉記李伯時臨劉商觀奕圖呉奕篆書石刻宋榻余所藏劉商觀奕圖繇唐迄今二百年絹素剥爛粉墨蕭瑟伯時為余臨之茅君勒之皆絶筆也噫劉商之畫非伯時則失其真伯時之筆非茅生則不能夀茅生之名豈以余言而遂傳歟眉陽蘇軾謹識七朝不廢劉商業翻刻重經四百年渺渺蟲絲尋寫法昏昏蜂翅影殘鐫熈寧寂寞風流逺兵火沉埋搨本傳高館清秋低首玩晴窻自是拂雲烟林屋蔡羽宛轉纎紋如洛絲輕毫銛刻兩精竒蕭蕭古墨含山色裊裊秋風亂客髭人世别來雲樹逺仙碁滅盡海田移滿窻晴日閒披覆為補眉陽未詠詩後學徐禎卿詩品中唐識令名又逢圖刻愛精成柯嫌嵗月還能爛碁怪神仙亦有争山色照人殘墨在松隂彌石亂雲生紙膚細細窮毫末一試晴窻老眼明長洲沈周一模一刻足堪傳信補劉公未了縁物外形骸真玩世山中樹木暗藏年但知對局相忘老不解旁觀也是仙我得細看增感慨怕拈枯筆續餘篇義興李瀛哲匠窮精能兹圖寳傳玩飛泉灑空中􅈝壁倚天半石床森雲霞厓松錯枝幹意到神具完絲縈縷不㫁明牕目力竭白日烟靄亂桃源或避秦商山豈辭漢宛轉蓬壺通縹緲赤城貫棋枰一以覆日月凡㡬換世途苦局促風燭易消散我欲従樵人重尋路迷漫神仙何有無盈襟徒浩嘆中山湯珍遺縑蕭瑟繙遺刻對奕風流共宛然墨翟九攻奇似弱孟明三北殿争先河山帶礪歸彈指日月虧盈易轉圜千載人間傳不朽品題坡老識龍眠繭光對奕真傳璧鐵畫微銛妙隠鋒蟬蛻仙人今尚在龍眠髙士邈難逢綺疏縈蚓雙蓬􅁂院落遊絲一瘦笻天禄校讐瞻傃逺瑶編玉樹慰相従右題劉商觀奕圖石刻時嘉靖四年冬十月望為余契重衡山文學士君乃郎夀承題夀承視余執行也請勤勤勉為書此余意其年富學銳方擅盛聲于時則夷視余澁拙適不足為取不若緘致之學士君其有以相發籥不倦如昨夀承其知之余何能為役望之夀承其猶學士君也隴西彭昉題王伯穀云勒石者以臨書為易摹畫為難刻石畫圖自武梁祠堂而下僅僅數本余所見惟宋人所鐫劉商觀奕最為精絶毫髪絲縷纎㣲不移以為千載無兩丁亥七夕同里氷鐵老人社弟駱雲程為玉翁盟兄校讐時坐岳謙菴款雲堂中并記珊瑚網卷二十六
