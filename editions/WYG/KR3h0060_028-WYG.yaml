body:
  text: 珊瑚網卷二十八明汪砢玉撰名畫題跋四米海岳雲山卷自題紹興乙夘初夏十九日自溧陽來游苕川忽見此卷於李振叔家實余兒戲得意作也世人知余喜畫競欲得之尠有曉余所以為畫者非具頂門上慧眼者不足以識不可以古今畫家者流畫求之老境於世海中一毛髪事泊然無著染每靜室僧趺忘懷萬慮與碧寥廓同其流蕩焚生事折腰為米大非得已此卷慎勿與人元章早年涉學既多晩迺則法鍾王此元祐初作也風神蕭㪚所謂天成者非世間墨工槧人之可髣髴伯玉出以相示因書其後紹興壬午仲冬晦日平丘曹覿純文李琪家藏子孫永為寳用銅印隴西伯玉此是玉印篆刻精絶宋印如此者甚少洪武五年嵗壬子九月十四日東魯元顔思敬拜觀子敬雲山烟樹總模糊此是南宫鶻突圖自笑頂門無慧眼臨窓墨迹澹如無米老此圖初藏於苕川李振叔後入嚴尚書府今宫保閔公得之葢嚴與李同郡而宫保為尚書外孫流傳有自而收蓄得所此老亦無所恨矣𢎞治癸亥九月既望長洲吳寛書米南宫於畫深自秘惜世不多有予平生所見咫尺小幅紙弊墨渝者亦無幾焉而此卷長八尺烟雲變滅氣象晦冥正與敷文瀟湘圖同一機杼紙墨如新真秘寳也墨林子項元汴米南宫雲山掛幅芾岷江還舟至海應寺國祥老友過談舟間無事因索畫遂爾草筆為之不在工拙論也漠漠雲林小小山誰家茅屋隠松間石橋雨過天台逺采藥仙人去未還魏了翁余昔年得米畫一幅雲山明滅烟樹霏㣲竹間茅屋鸚鵡在花前學語聲聲呌顛絶也玉水記元人題米家山雨過石生五色雲過山餘數層時有炊烟出樹中多隠士高僧元章用王洽之潑墨㕘以破墨積墨焦墨故融厚有味祝枝山題老米雲山卷襄陽松瀋未曽乾十里瀟湘五尺寛樵逕不禁苔露滑漁蓑長帶水雲寒澄澄僧眼連天碧澹澹蛾眉隔霧㸔恐為醉翁當日寫平山堂上雨中觀宋人洞天清錄云米南宫多游江浙間毎卜居必擇山水明秀處其初本不能作畫後以目所見日漸模放之遂得天趣其作墨戲不専用筆或以紙筋子或以蔗滓或以蓮房皆可為畫畫紙不用膠礬不肯於絹上壁上作一筆今所見米畫用絹者皆後人偽作米父子不如此米敷文楚山清曉卷小簡附友仁承録示文字深荷勤意併俟面謝友仁悚息再拜老樹筆間生竒石筆下出濃淡高低逺近山陰晴一半雲烟沒漠漠江天杳杳空不勞施力自然中便於沙際尋歸路却憶霜林葉不紅子昻冥冥濛濛方寸天不知所以然而然無根老槎濕風烟霾雲懵懂栖蒼𤣥晴牕開卷作三呌看得米家神氣小濃蘭塗墨幻東西丐我瀟湘山色曉海粟老人怪怪道人楚山清曉畫圖成㸃滴烟雲不亂真被遇先皇名愈震宣和到此幾經春永嘉吳沂夫題吳融賦曉人服其妙元暉作曉圖吾知其難况復有楚山耶過庭出此卷狼山五峰峨眉六合隠見雲靄中晨光熹㣲人行鳥飛不足以盡其形容故詠歌之當與李咸熈嵐烟曉晴許道寧秋山詩意同入能品小山江南張小山濛濛烟樹楚江湄寂寞漁村䕶短籬雲夢舟中春睡足醉餘猶記牧之詩鄧文原綵筆悠悠閲嵗華白頭人競幾塵沙夕陽過盡春風老空使吟箋説舊家春風作悲風觀復老叟八十八嵗書丙寅季秋七日李壽莊米友仁瀟湘竒觀卷卷高尺餘水墨山峰畫在繭紙上先公居鎮江四十年作庵於城之東高岡上以海岳命名一時國士皆賦詩不能記翰林承㫖翟公詩楚米仙人好樓居植桐崇岡結精廬下瞰赤縣賔蟾烏東西跳丸天馳驅腹藏萬卷胸垂胡論古如河决九渠掀髯送目轉八區欲呌虞舜起蒼梧云云餘不能記也卷乃庵上所見山大抵山之竒觀變態萬層多在晨晴晦雨間世人鮮復知此余生平熟瀟湘竒觀毎於登臨佳處輒復寫其真趣於卷以悦吾目並非他人使為之此豈悦他人物者乎此紙滲墨本不可運筆仲謀勤請不容辭故為戲作紹興闕孟春建康闕官舍友仁題羊毫作字正如此紙作畫耳欵上有陽文友仁印右將仕郎米友仁畫瀟湘竒觀一卷且自識之葢其父元章為禮部員外郎先居太原後徙襄陽過潤州羡山川佳麗於是結庵於城東號曰海嶽宣和間嘗進友仁所畫楚江清曉圖上悦因得名當世然其筆意大率圖與竒觀相似却無畫工習故士大夫寳之嗟乎一門清適自宗荐許亦可以見其父子之能矣上清外史薛羲題米氏父子書畫擅當世是卷沉著痛快字如其圖尤合作也臨川葛元喆題米家父子最風流㸃染毫端滿紙秋海岳庵前天欲曙𤓰洲渡口望滄洲呉匏碩晉安曽環敬觀沛郡朱希文觀於鄭氏愚樂齋甬東邊猛生拜觀於鄭氏飛雲樓江南竒觀在北固諸山而北固竒觀在東岡海岳晴雨晦明中執筆描寫非其人胸中先有千巖萬壑者孰能神融意適收景象於毫芒咫尺之間哉米家父子何奪天巧之多也宣城貢師泰題此卷友仁真蹟無疑山川浮紙烟雲滿前脱去唐宋習氣别是一天胸次可謂自渠作祖當共知者論至正癸夘立夏後五日劉守中書於三山之枕石行軒細觀米友仁瀟湘竒觀筆墨温粹㸃染渾成信夫鍾山川之秀而復發其秀於山川者也其後跋語若貢公泰甫葛公元喆劉公守中言之盡矣至於上清外史薛公𤣥卿素與呉興趙松雪評論書畫尤為精到且知其父元章宣和間嘗進友仁所畫楚江清晚圖為當時稱賞况竒觀者尤晩年之作也居貞其寳之雪鶴山人鄧宇志余家藏倪迂遺集有與陳叔方書云海岳庵圖旦晚臨畢即全璧以歸而集中復附載陳書云海岳庵圖謹授山甫盧君以達雲林胸次清曠筆意蕭逺當咄咄逼真矣暇日能寄小幅如對可人也因展觀錄之小米墨戲余所見瀟湘白雲圖沈啓南䟦云三十年耳聞求一見而主人靳不出晩嵗始得觀則無及也其尊重如此此卷亦瀟湘之流亞也壬寅至日董其昌書瀟湘圖與此卷今皆為余有擕以自隨今日舟行洞庭湖中正是瀟湘竒境輒出展觀覺情景俱勝也乙巳五月十九日董其昌不知倪雲林所臨安在定當佳𤣥宰米敷文瀟湘長卷三紙連屬計一丈二尺元暉戲作題畫上夜雨欲霽曉烟既泮則其狀類此余葢戲為瀟湘寫千變萬化不可名神竒之趣非古今畫家者流畫也惟是京口翟伯夀余生平至交昨豪奪余自秘著色袖卷盟於天而後不復力取歸往嵗掛冠神武門居京口舊廬以白雪詞寄之世所謂念奴嬌也洞天晝永正中和時候凉飈初起羽扇綸巾雩詠處水遶山重雲委好雨新晴綺霞明麗全是丹青戲豪攘横卷誓天應解深秘留滯字學書林折腰緣為米無機涉世投組歸來欣自肆目仰雲霄醒醉論少卑之家聲接武月旦許吾子憑高臨望桂輪徒共千里昨與呉傅朋蜀冷金牋上戲作一幅比與達功相遇知亦為此郎奪因追省此詞跋於小卷後舊曽寫寄蔡天任以白雪易其名舊名可謂惡甚懶拙老人元暉疊蒙友仁二字印米元暉作逺山長雲出沒萬變古未有輩安得匹紙以盡其筆勢之妙乎至於林麓近而雄深岡巒逺而挺拔木露榦而想高茂水見涯而知渺瀰皆發於筆墨之外此常人所難元暉之所易也達功他日以此示之儻以為知言則當得山川之勝卧以遊之紹興五年七月二十日㑹稽闗注書達功下第後便有放浪山水意米元暉作招隠之圖僕以為此公未宜置丘壑中也謝伋伯思父頃在京師時方允迪嘗示僕以和人求米元暉畫楚山清曉圖詩恨未見其畫也今觀元暉此紙自云夜雨初霽曉烟既泮其狀類此豈其所為瀟湘千變萬化久落人間亦楚山圖中之一也㑹稽韓滸懋遵書畫手自高前輩雲山已屬吾曹若㑹瀟湘物色便合醉讀離騷籛後人端禮處和丘壑之士久寂寞則起朝市之念朝市之士久喧囂則懷丘壑之放古今之理一也予贊治丹丘雖環郛皆山可以拄頰而霞城雲嶼亦得駕言窮覽然塵纓之所羈束終不能瑩心而醒目米西清所作瀟湘圖曲盡林阜烟波之勝遐想鷗鳥之樂良不可及紹興十七年三月二十二日鄱陽洪适書元暉戲作横幅直造巨然北苑妙處開卷恍然如行下蜀棲霞烟雨中益増土思之念紹興丁夘三月壬午南豐曽惇題僕十五年前見此畫把玩不能去手今復開卷恍如夢寐不如老之將至云耳錢端禮書於東陽郡齋紹興五月十有四日紹興庚午十一月二十日姑蘇曹筠觀於平江余氏之西園昔陶隠居詩云山中何所有嶺上多白雲但可自怡悦不能持寄君余深愛此詩屢用其韻跋與人袖卷漫書一二於此其一山氣最佳處卷舒晴晦雲心潛帝鄉者願作乘彼君其一與翟伯夀横披書其上云山中宰相有仙骨獨愛嶺頭生白雲壁張此畫定驚倒先請喚人扶著君紹興辛酉嵗孟秋初八日過嘉禾獲再觀懶拙老人米元暉書憶年十六時識達功於檇李後七年得詞塲名第行卷贄謝諸公米老為兵部侍郎謁之之明日親袖啓扣旅舍立須予出乃肯去轉眼三十四年二君久歸山丘予亦老矣觀此使人太息淳熈己亥夏四月七日鄱陽洪邁景盧蔡天啓作米襄陽墓志言元符初進其子所畫萬里長江圖時元暉年尚少其小筆已知名當世矣方此老亡恙時諸公貴人求索者日填門不勝厭苦往往多令門下士傚作親識元暉二字於後嘗自言遇合作處渾然天成荐為之不復相似此卷寂寞簡短不過數筆而淺深濃澹姿態横生使人應接不暇葢是其得意筆自其云亡畫益難得矧題識皆一時名勝之士終日把玩不能去手也淳熈辛丑二月中休梁谿尤袤題水際天低岸逺山腰霧卷雲鋪擬喚松江小艇歸來好趂蓴鱸建袁説友起巖書於池陽郡齋太湖水入霅溪寒疊嶂連山幾萬般此景古今無盡藏總歸懶拙一毫端籛後人聞詩書僕昔嵗南遊繫舟黄陵廟下適江山風嘆古詩人不能賦今觀米公山水瀟湘舊遊隠然似夢紹興乙丑清明後兩日洛陽朱敦儒題淳熈己亥中夏新安朱熹觀於江東道院元暉作字作畫深得南宫筆法非特能繼其家聲亦不負山谷兩詩也紹興丁夘三月壬午南豐曽惇觀於丹丘郡齋余常客毘陵一葦太湖舊矣去之六年風朝月夕毎思怒濤裂山澄漪見雲夢寐間時一往焉觀此恍然所謂逃空谷而喜聞足音者紹興十七年三月二十二日鄱陽洪适書此畫今為中朝第一誠可寳而愛也己巳中夏錢端禮書元暉寫山水真態出人意表觀之者如登高臨逺有超出塵外之想紹興庚午十一月中澣日姑溪曹筠跋米元章品題諸家山水得其妙處意謂未離筆墨畦逕晩乃出新意寫林巒間烟雲霧雨隂晴之變以為横披元暉葢傳家法也温革叔皮父此軸紙墨俱不甚精而造㣲入妙乃爾使得妙墨佳楮固當益竒善御者羊腸九折亦中鸞和之音端非虚語紹興丙子春仲三山林仰書東坡云論畫以形似見與兒童鄰觀元暉此軸則此已㕘公活句之妙處和父予理圃於畨城之西所謂蠙洲者江山横前烟雲吐吞晴陰朝暮千變萬態有口不能説也誰能起懶拙老人於九原為我寫貌邪淳熈六年四月七日野處洪邁景盧書建陽崇安之間有大山横出峰巒特秀余嘗結茒其顛小平處毎當晴晝白雲坌入牕牖間輒咫尺不可辨嘗題小詩云閒雲無四時㪚漫此山谷幸乏霖雨姿何妨媚幽獨下山累月毎竊諷此詩未嘗不悵然自失今觀米公所為左侯戲作横卷隠隠舊題詩處似已在第三四峯間也又得并覽諸名勝舊題想像其人益深歎息淳熈己亥中夏廿九日新安朱熹仲晦父書於江東道院萬里江天杳靄一村烟樹㣲茫只欠孤篷聽雨恍如身在瀟湘淡淡曉山横霧茫茫逺水平沙安得綠蓑青笠往來泛宅浮家淳熈辛丑中春十八日梁谿尤袤觀于秋浦余讀賈誼度湘水賦其言造託湘流之意悲矣恨未身到也今觀米公横卷而弔原思賈使人興懷愧無健筆以賦之淳熈辛丑三月上巳日建袁説友起巖甫書於池陽清靜寮𨽻書雨山晴山畫者易唯晴欲雨雨欲霽宿霧晩烟既泮復合景物昧昧時一出沒於有無間難狀也此非墨妙天下意超物表者斷不能到故侍郎米公或得之必寳玩珍愛靳不與人與人而又戒其勿他與也淳熈辛丑秋八月吉籛後人聞詩子言書淳熈丁未旻天季月重陽前一日洙泗時佐季雄獲觀於蘄春郡齋𨽻古氏滕國時印齊鄧張紳觀於陳氏春草堂瀟湘圖攷故宋兵部侍郎襄陽米公友仁元暉所畫瀟湘圖一卷其自題識凡兩見南渡後諸名勝跋語凡若干人而文公朱夫子手澤又先後出也此圖之末自署曰元暉戲作且有印文曰元暉其上一字與其父禮部公之字皆從此者葢豫章黄太史嘗得此古玉印因命為侍郎字而以授且作二絶句贈禮部以述此意今見山谷集中圖有别紙侍郎前題自謂夜雨初霽曉烟既泮其狀類此葢戲為瀟湘寫變化神竒之妙而不言其題為何名或曰是即所謂楚山清曉圖者然卷内韓懋遵云元暉楚山清曉圖恨未見今觀此紙亦建山圖中之一則自别有楚山清曉圖矣而洪文惠直書此卷曰米西清所作瀟湘圖則此固自為瀟湘圖也又侍郎自謂京口翟伯夀昨豪奪余自秘著色袖卷盟於天而後不復力取歸者别卷也又自謂昨與呉傅朋蜀冷金牋作一幅比與達功遇知亦為奪去者又别卷也後題自謂用陶隠居韻作白雲詩其一與翟伯夀横披書其上者又别卷也前題不知年後題紹興辛酉過嘉禾再觀則紹興十一年赴召為兵部侍郎至十五年以敷文閣待制提舉神祐觀奉朝請葢高宗好米禮部書而侍郎得其家法故眷遇之厚如此伯夀名耆年㕘政汝文之子而邢恕外孫也此其人姓字在前後題屢見葢知畫者哉傅朋名説其外大父王逢原逢原妻吳氏王荆公妻之女弟也逢原蚤死吳不嫁有遺腹女嫁吳思禮而生説即傅朋也以書名當世而元暉乃以古書法作畫傅朋固知之矣然此卷不言為何人作乃曰比與達功相遇諸跋語多言達功至朱夫子獨云米公所為左侯戲作横卷則其人葢姓左氏而字達功也卷内謝伯思云達功下第後元暉作招隠圖洪文惠亦云憶年十六時識達功後七年得詞塲名則達功固名進士矣凡諸跋語其人大抵皆可攷見闗注字子東㑹稽人一曰錢塘人嘗為太學博士此題紹興五年則其登進士第時也謝伋字伯思一字景思上蔡人㕘政克家之子以文名嘗為太常少卿錢端禮字處和常為婺州守此凡三題故其一云書於東陽郡齋其一特書紹興己巳則十九年也洪适字景伯鄱陽人忠宣公皓之長子乾道元年為右僕射諡文惠兩題皆在紹興十七年三月其一作十五年葢七字已損或妄填寫作五字耳是時通判台州至十一月以言者罷去曽惇字谹父南豐人右僕射布之孫也兩題皆紹興丁夘則十七年惇知台州與洪文惠不相能而文惠罷去時也惇嘗上詩秦檜稱為聖相故有台州之命朱敦儒字希真洛陽人以詩名此紹興乙丑則十五年也嘗仕為館職矣既告老去至二十五年秦檜孫塤欲學詩因薦以為鴻臚少卿曹筠姑熟人紹興廿五年殿中侍御史湯鵬舉言筠因檜薦為臺臣凡有所陳盡出於檜詔奪職罷祠此題紹興庚午則二十年也洪邁字景盧文惠弟也以博學宏辭賜第仕至翰林學士諡文敏兩題皆淳熈六年己亥是時閒居鄱城其一自署其姓名上曰野處者孝宗御書以賜之者也尤袤字延之無錫人嘗侍光宗春坊官至禮部尚書諡文簡此凡兩題皆淳熈辛丑二月時通判池州故其一觀於秋浦辛丑八年也袁説友字起巗建安人嘉泰三年由同知樞密為參知政事凡兩題其一書尤文簡辛丑書於池陽清淨寮則自平江守赴召後為池守時也錢聞詩字子言此不書姓字但云籛後人者固錢氏也成都人嘗知南康軍與朱夫子交此兩題皆在淳熈辛丑是嵗三月朱夫子自南康東歸而此題在八月則子言已上任矣卷内錢端禮亦或書籛後人者子言弟也時佐字季雄魯人嘗為蘄州守此淳熈丁未書於蘄春郡齋則十四年也又有韓滸者字懋遵㑹稽人林仰者三山人其字未聞温革者字叔皮不知何郡人云惟朱夫子手澤傑然特出為百世所尊仰前題但云淳熈己亥中夏廿八日新安朱熹觀於江東道院後題則自述其建安結􅈋處雲山之勝因記其舊題云閒雲無四時㪚漫此山谷幸乏霖雨姿何妨媚幽獨且言今見此卷隠隠舊題詩處似已在第三四峰間其末所書年月姓名及所在書處皆與前題同但此為廿九日而姓名下有仲晦父三字以雲谷考之則其地葢即雲谷而結茒處即晦庵也己亥為淳熈六年自去嵗差知南康軍辭不允是嵗三月到任此題皆在五月乃到任後其曰書於江東道院者姑孰有郡齋曰江東道院而此自在南康也葢嘗歴觀卷内年月紹興五年者趙忠簡張忠獻並相方欲恢復中原而岳武穆建功時也十一年者秦檜主和議構害武穆時也自是十數年間皆秦檜用事而國勢止於東南矣淳熈以來則在湯思退和議既成之後於是東南勢定而不復有志於中原矣又歴觀卷内人姓名曽惇曹筠皆諂事秦檜者固不足道而朱希真亦不免為檜所起洪氏兄弟雖皆一時重望而亦嘗為湯思退門客不免沮張忠獻配享高廟之議若袁説友之㕘大政乃在韓侂胄禁偽學之日則其闕此攷為王彞宗常先生敘列先生居崐山又徙嘉定少貧讀書天台山中目楊鐵崕為文妖後與高太史啓同坐魏觀事卒時稱其為文精嚴縝密於此攷見之矣惜乎失去後一紙不害其為缺文也小米瀟湘圖卷再題自稱珎僕從少時知慕為杭張氏所蓄高價而錮吝人罕獲見後遊杭兩度仲孚亦辱往來但啓齒借閲便唯唯而終弗果今七十五年矣意余生與此圖斷為欠緣亦嘆仲孚隠為拂人意事兹廷貴忽爾攜至猶景星鳳皇為之重沐者再得一快覩忽然三湘九疑瀰漫尺楮如朱夫子之題象内見畫錢子言畫表求象斯圖之妙盡括於二作矣又有王宗常先生一一論疏諸名勝出處之迹無餘辭誠為翰墨之寳設使著色袖卷楚山清曉冷金蜀牋等筆尚在恐亦無此爛漫之題信乎仲孚之知重亦可謂之不俗矣後學沈周米元暉司馬端衡詩意卷山稠隘石泉闕密密萬山重一𣲖哀湍瀉此志入瑶琴當有知音者潺潺石澗溜闕峰迴石路轉足可娛瞻聽其中如有屋便是醉翁亭萬頃長江水接天中有峰巒聳蒼綠清宵影蘸白蟾蜍浩浩澄波見寒玉少陵詩名冠古今一生苦吟吟不足端衡寫作無聲詩留與拙堂伴幽獨次仲司馬君實米元章德行文采本朝第一等人恨予生晚不及前輩今觀二公墨妙追想終日為之慨然二公非畫師何迺精絶至是豈鳳雛驥子其天資超詣種種自不同乎癡叟田如鼇書紹興十八年九月廿六日端叔集少陵詩句己自可喜又摘其可畫者為圖得元暉端衡墨妙朝夕展玩其胸中丘壑定自不凢夢山王珉中玉書紹興己巳秋九月十有九日金華王與道觀於冝春郡齋米元暉馬端衡二畫如王謝子弟别有一種風流少陵詩句超軼絶塵非後人可及二公墨妙灑落不羣非碌碌者能辦亦可謂三絶也洛陽愚叟富元衡獲觀於富春郡齋右米元暉司馬端衡隨意命筆黙以神㑹然元暉自成一家云宋景濓米敷文烟巒曉景老米題昔吾嘗赴吳江宰同寮語曰陳叔達善作烟巒雲巗之意吾子友仁亦能奪其善昨晩出局過伯新家出近景烟雲之狀友仁得其意耳襄陽老人米元章題襄陽米友仁作畫但畫意須㬰筆研間淋漓走元氣雷門唐珙温如父題不見廬山五老峰九江秀色繞雲松㣲茫欲識圖中意疊巘層巒翠萬重㑹稽夏泰亨夏氏叔通白文昔米芾嘗謁見宋帝於宣和殿帝乃從容顧芾問曰聞卿復工畫然乎否乎芾適置米友仁所筆楚山清曉圖在懷袖間因即出以獻御覽則稱羡今元章墨帖謂吳江宰同寮語陳叔達善作烟巒雲巗吾子友仁亦能奪其善駉遂知元章沉痼於譽兒癖矣至正十五年青龍乙未八月十又二日東原申屠駉敬書於越州寓邸之戒得齋申屠子迪昔時米南宫父子同畫癖油然烟雨態千里入盈尺近代宋尚書筆意妙欲逼置之几格間新舊莫辨識應是前後身神㑹造化迹鴻濛迷日月澒洞飛霹􅋬蒼崖晦中斷天闕杳高隔洪瀾漲無際龍虎移窟宅農夫怨昏墊樵牧絶行迹破屋兩三家摇撼已傾側得非杜少陵無乃陶彭澤簷茅委泥濘籬菊沒狼藉空江無舟楫汗漫安所適披圖瞻青冥惆悵坐終夕高作宋未詳伯温劉誠意基一曲溪山類輞川何人筆意澹風烟月明鏡水秋無影照見長虹貫客船浚儀趙友藺書於㑹稽山陰之蘭亭廉友白文江上亂峰生暮烟隔江遥望水雲連西風戰艦今無數不見米家書畫船錢用壬成夫二王書法翰林所宗米友仁畫見稱於南宫老子皆得夫家傳之妙者也南宫書不下二王米家書畫此卷兼有之具眼者當知所寳矣嚴陵汪汝懋以敬過雲含雨濕層巒江樹和烟曉色寒何似清秋凌絶頂山青雲白望長安米家父子擅名流一紙千金未足酬本與蘇黄為後進豈期章蔡是同遊京兆宇文公諒子貞米元暉水墨雲山卷前山既層疊後山復嶻嶭高低逺近分好景參差林樾見深檝若人隠者徒遁世逺車轍或畊谷口雲或釣溪頭月了知造物長虛幻彈指生成隨起滅元暉自是三昧手吮墨金壺足怡悦公去人間幾百載遺迹猶存世竒絶玉函錦囊出斯圖頓使山林清興發匡廬武夷彷彿似妙趣經營在毫末東南山水我粗覽過眼烟雲慨丘垤何當一上最高頂笑御泠風碧瑶闕素心道人倪瓚曽覽海岳山川秀不羣乾坤變態㡬氤氲向來寓興石門近日日軒窓見白雲沂陽董復首楞嚴經云不知色身外泊山河虚空大地咸是妙明心中之物由是則知畫工以毫端三昧寫出自己江山耳不然何曲盡其妙也耶觀此圖者當作如是觀可也玉芝巖老人題米元暉自稱有設色袖珍卷為生平第一當時已為翟伯夀所豪奪此卷在水墨游戲中深入北苑三昧可稱神品矣董其昌題米元暉雲山短卷所至之地為人迫作片幅莫知其幾千萬億在諸好事家矣此幅為祐之何處得出示索跋元暉芳艸孤舟渡幽居一徑通江湖春雨外墟里暮烟中機息鷗先下花飛水自東臨流無限意畫史若為工巴西鄧文原米元暉自言所至為人墨戲幾千萬億今傳世寥寥如星鳳予所藏瀟湘白雲差為爛漫沈啓南借觀七十五年不可得晚而見之自嘆無益畫道如晚進然其重如此因觀此圖及之董其昌米敷文大姚村圖石田模本已入六硯齋筆記兹錄其所遺者相城沈啓南妙於詩畫然字不甚工後乃倣黄山谷書輒得其筆意葢書畫同一機也今觀此卷雖不純用米家筆仗要之自有一種風致可愛可愛李禎伯書畫一致也在古兼善者則鮮迨宋米氏父子乃擅名當世敷文居吳嘗作大姚村圖復大書三詩於後可謂兼善為呉中翰墨光耀二百有餘嵗至國初失之王雲浦而得於沈良醫則為沈氏珍玩又百餘年矣成化末被綠林之豪强力攘去汝融為沈氏宗孫以青氊弗遺惋懊莫自釋同邑沈石田翁妙於書畫今之南宫也未失前嘗假以搨一過甚逼真貽其甥藏之緣是遂臨而歸諸汝融不惟掃其胸中芥蒂尤可見造物者巧於謀為宛然俾其舊物之在目雖失猶不失矣後之觀者有弗以石翁之筆為敷文吾未之信𢎞治庚申蜡月哉生明如醮老人張習識敷文畫山何可得況復銀鈎鐵為畫雲林妙句雲浦遺一字真堪數縑直流傳幸遇沈休文題品當朝總名筆無何檢括獻彤庭却付王瘤私篋匿炎炎氣勢那敢問神物誰能不追憶石田補寫更有神雲山烟樹沉沉濕匏翁文章世希有午夜光芒動虚斗𤓰涇累幅感慨多世事悠悠獨回首休文索我重續貂欲慰遐思見交厚古人父書不忍讀不飲杯棬憶慈母祖研持時悲曷勝名字至願不垂朽移卷九迴腸翻作思親心一紐羮牆昌歜孝子思傳與兒孫可常守青囊濟物廣陰功世澤天長兼地久要知詞翰身外物轉眼隨落他人手我觀東坡寳墨文棄軀忘親資笑口鍾繇發冢事宜徵曽有聲色移人否又聞有道古聖人不物其物物芻狗題詩我為發長嘯驚㪚無何一杯酒郡人陳琦南宫真迹已同夜壑之舟所幸石田猶能追寫彷彿葢蔡中郎之丰神尚於虎賁士見之語云雖無老成人尚有典刑王鏊題米西清雲山小卷余墨戲氣韻頗不凢他日未易量也元暉書蘭隠至樂軒畫卷妙品第一劉珍庭玉宋裱畫在澄心堂紙上長丈餘雲山細潤迥出諸卷卷首一圓印朱文芝山二字周敏仲從新安汪景純家得之崇禎丙子四月望後二日觀於舟次源崑子砢玉小米雲山卷南徐楊氏鑒賞之章龍字號原價八十金芳草孤舟渡幽居一徑雲江湖春雨外墟里暮烟分機息鷗先下花飛水亦芬氤氲無限意畫裏識敷文巴西鄧文原嘉興吳仲圭書畫記王氏子明家藏清玩竹懶云米元暉潑墨妙處在作樹株向背取態與山勢相映然後濃淡積染分出層數其連雲合霧洶湧興波一任其自然而為之所以有高山大川之象若夫布置段落視營丘摩詰輩入細之作更嚴也譬之祝公妙八風舞旋轉如鬼物而按其耳目鼻口與人不差分毫也今人効之類推而納之荒烟勃烟中豈復有米法哉珊瑚網卷二十八
