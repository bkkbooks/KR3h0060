body:
  text: 珊瑚網卷二十四上明汪砢玉撰法書題䟦六朝劉宋羊欣敘古來能書人姓名秦丞相李斯善大篆中車令趙髙亦善大篆圄吏程邈善篆得罪始皇囚於雲陽獄増减篆體去其繁複始皇喜之出為御史曰𨽻書後漢扶風曹喜善篆𨽻見師一時左中郎將蔡邕採斯喜法作篆𨽻傳真定宜父碑文杜陵陳遵不知其官善篆𨽻每書一座皆驚時人謂為陳驚座上谷王次仲亦後漢人作八分楷法師宜官後漢人能為大字方一丈小字一寸千言甚自矜重或空至酒家先書其壁觀者雲集酒因大售俟飲足削書而退耿球碑猶存安定梁鵠官至選部尚書得授師宜官之法魏武重之常以鵠書懸帳中宫殿題署多是鵠手也陳留邯鄲淳為魏臨淄侯得次仲法亦有名毛𢎞為鵠弟子今秘書八分皆傳鵠法又有左子邑與鵠小異亦有名京兆杜度為魏齊相始有草名安定崔瑗後漢濟北人亦善草書王子敬愛其書云極似張伯英子實官至尚書亦有草名𢎞農張芝髙尚不仕草書精絶家之衣帛必先書而後練臨池學書池水盡墨每書云匆匆不暇草書人目之為草聖弟昶漢黄門侍郎亦能草書姜詡梁宣田彦和韋誕皆英弟子並善草誕書最優字仲將京兆人官至鴻臚少卿尤工楷漢魏宫署皆出誕手魏明帝起凌雲臺先釘榜未題以籠盛誕轆轤表絙引之使就去地二十五丈誕甚懼下擲其筆誡子孫絶此楷法乃誕子少季亦有能稱羅暉趙襲不詳何許人與伯英同稱西川而矜許自與衆頗惑之伯英與朱寛書自叙云上比崔杜不足下方羅襲有餘河間張超善草不及瑗英劉德升善為行書不詳何許人潁川鍾繇魏太尉同郡胡昭公車徵二子俱學于德升而胡書肥鍾書痩鍾書有三種一曰銘石之書二曰章程書三曰行押書三法皆世人所善繇子㑹鎮西將軍絶能學父書改易鄧艾上事莫有知者河東衞覬字伯儒魏尚書僕射善草及古文字體微痩而筆跡精熟子瓘字伯玉為晉太保採張芝法以父㕘之更為草藁瓘子恒亦善書博識古文燉煌索靖字幼安張芝姊之孫晉征南司馬善草書陳國何元公亦善草書吳人皇象草書最沉著痛快名重海内滎陽陳暢晉秘書令史善八分宫觀城門皆其手作滎陽楊肇晉荆州刺史善草𨽻海内知名潘岳誄之曰草𨽻兼擅尺牘必珍足無輟行手不擇文翰動若飛紙落如雲孫名經亦善草𨽻行于世足稱繩武京兆杜畿魏尚書僕射子恕東郡太守孫預荆州刺史三世皆善草藁晉齊王攸善草行書京洛以為楷法㤗山羊忱晉徐州刺史羊固晉臨海太守並善行書江夏李式晉侍中善𨽻草子定子公府皆能名同式晉中書院李充母衞夫人善鍾法作筆陣圖嘗為王逸少之師瑯琊王廙晉平南將軍能章楷謹傳鍾法廙從兄導晉丞相善藁行亦師鍾衞楷法好愛無厭喪亂狼狽猶以宣示帖衣帶過江後在右軍處右軍借王敬仁敬仁死其母見脩平生所愛遂以入棺王恬導第二子也晉中將軍㑹稽内史善𨽻書王洽恬之弟晉中書令領軍將軍衆書通善尤能𨽻行兄羲之云弟書遂不减吾王珉晉中書令筆力過于子敬書舊品云有四疋素自朝操筆至暮便竟首尾如一又無悞字子敬戲云弟書如騎騾駸駸恒欲度驊騮前謝安亦入能流殊亦自重乃為子敬書嵇中散詩得子敬書有時裂作校紙王羲之晉右將軍㑹稽内史博精羣法特善行楷古今無二王獻之晉中書令善行𨽻藁骨勢不及父而媚趣過之兄𤣥之徽之兄子淳之並善草行王允之衞軍將軍㑹稽内史亦善草行太原王濛晉司徒左長史能草𨽻子脩瑯琊王文學善𨽻行與羲之善故殆窮其妙早亡未盡其美子敬每省脩書云咄咄逼人王綏晉冠軍將軍㑹稽内史善𨽻行髙平郗愔晉司空㑹稽内史善章草𨽻子超晉中書郎亦能草潁川庾亮晉太尉善草行弟翼荆州刺史善𨽻行時與羲之齊名後右軍書大進翼不忿在荆與都下書云小兒輩賤家鷄而愛野鶩俟吾還當比之髙陽許静民鎮軍參軍善𨽻草羲之髙足晉穆帝時有張翼善學人書冩羲之自書表表出經日不覺後云小子幾欲亂真㑹稽隠士謝敷胡人康昕並攻𨽻草謝靈運書乃不倫遇其合時亦得入流孔琳之丘道䕶與欣並受業子敬書亦並重一時行草乃佳真多不稱謝綜顔騰之賀道力陸機並便尺牘吳時張𢎞特善飛白自秦至晉凡七十三人梁庾肩吾書品論𤣥静先生曰予遍求邃古逖訪厥初書名起於𤣥洛字勢𤼵於蒼史故遣結繩取諸文象諸形㑹諸人事未有廣此緘縢深兹文契是以一畫加大天尊可知二力増土地卑可審日以君道則字勢圓月以臣輔則文體缺其轉注假借之流指事㑹意之類莫不狀範毫端形呈字表開篇翫古則千載共期削簡傳今則萬里對面記善則惡自削書賢則過必改玉厯須正而化俗帝載陳言而設教變通不極日用無窮與聖同功參神並運爰洎中葉捨繁從省漸失潁川之言竟遂雲陽之字若乃鳥迹孕於古文壁書存於科蚪符陳帝璽摹調蜀漆署表宫門銘顯禮器魚猶捨鳳鳥已分蟲仁義起於麒麟威形𤼵於龍虎雲起時飄五色仙人還作兩童龜若浮溪蛇如赴穴流星疑燭垂露似珠芝英轉車飛白掩素參差倒薤既思種栁之謡長短懸針復想定情之製蚊脚傍低鵠頭仰立填飄板上謬起印中波回墮鏡之鸞楷顧雕陵之鵲並以篆籀重復見重昔時或巧能售酒或妙令鬼哭信無味之竒珍非趨時之急務具録前訓今不復論惟草正踈通専行于世其或繼之者雖百代可知𨽻體發源秦時程邈所作始皇見而重之以奏事繁多篆字難製故曰𨽻書今之正書是也草勢起于漢時解散𨽻法用以赴急本因草創之義故曰草書余自少迄長留心兹義敏手謝于臨池銳意同于削板而蕺山之扇竟未増錢凌雲之臺無因誡子求諸故迹或有淺深輙刪善書者一百二十八人伯英以稱聖居首法髙以追駿處末推能相越小例而九引類相附大等而三復為畧論總名書品張芝伯英鍾繇元常王羲之逸少右三人上之上論曰𨽻既𤼵源秦史草乃激流齊相跨七代而彌遵將千載而無革誠開博者也均其文總六書之要指其事籠八體之竒能拔篆籀于繁蕪移楷真于重宻分行紙上類出垤之蟻結畫篇中似間琹之鶴峯崿間起瓊山慙其歛霧漪瀾逓震碧海愧其下風抽絲散水定其下筆倚力欠尺驗于成字真草既分于星芒烈火復成于珠佩或横牽豎掣或濃㸃輕拂或將放而更留或因挑而還置敏思藏於胸中巧意𤼵於毫銛詹君端策故以迷其變化英韶傾耳無以察其音聲殆善射之不注妙斲輪之不傳是以鷹爪含利出彼毫龍管潤霜游兹蠆尾學者鮮能具體窺者罕得其門若探妙測微盡形得勢烟華落紙將動風彩帶字欲飛疑神化之所為非人世之所學惟張有道鍾元常王右軍其人也張工夫第一天然次之衣帛先書稱為聖體鍾天然第一工夫次之妙盡許昌之碑窮極鄴下之牘王工夫不及張天然過之天然不及鍾工夫過之羊欣云貴越羣品古今莫一兼撮衆法備成一家若孔門以書三子入室矣允為上之上崔瑗子玉杜度伯度師宜官張昶文舒王獻之子敬右五人上之中論曰崔子玉擅名北中跡罕南度世有得其摹者王子敬見之稱美以為功類伯英杜度濫觴於草書取竒於漢帝詔復奏事皆作草書師宜官鴻都為最能大能小文舒聲劣於兄時云亞聖子敬泥帚早驗天骨兼以掣筆復識人工一字不遺兩葉傳妙此五人允為上之中索靖幼安梁鵠孟皇韋誕仲將皇象休明胡昭孔明鍾㑹士李衛瓘伯玉荀輿長𦙍阮研文機右九人上之下論曰幼安歛蔓舅氏抗名衞令孟皇功盡筆力字入帳中仲將不妄染毫須張左紙孔明動見模楷所為胡肥而鍾痩休明斟酌二家驅駕八絶士季之範元常猶子敬之禀逸少而工拙兼効真草皆成伯玉逺慕張芝近參父迹長𦙍狸骨方擬而難迨阮研居今觀古盡窺衆妙之門雖復師王祖鍾終成别構一體此九人允為上之下張超子並郭伯道劉德昇君嗣崔寔子真衛夫人茂猗李式景則庾翼稚恭郗愔方回謝安安石王珉季琰桓𤣥敬遒羊欣敬元王僧䖍孔琳之彦琳殷鈞右十五人中之上論曰子並崔家州里頗相倣效可謂醬鹹於鹽冰寒於水伯道里居朝廷逺討其迹徳昇之妙鍾胡各採其美子真俊才門法不墜李氏衛氏自出華宗景則毫素流靡稚恭聲彩遒越郗愔安石草正並驅季琰桓𤣥筋力俱駿羊欣早隨子敬最得其傳孔琳之聲髙宋氏王僧䖍雄𤼵齊氏殷鈞躭著愛好終得肩隨此一十五人允為中之上魏武帝操孫皓吳主衛覬伯儒左子邑名伯衛恒巨山杜預元凱王廙世將張彭祖任靖韋昶文休王脩敬仁張永范懐約吳休尚施方㤗右十五人中之中論曰魏帝筆墨雄贍吳主體裁綿宻伯儒兼叙𨽻草子邑分鏕梁邯巨山三世元凱累葉王廙為右軍之師彭祖取羲之之道任靖矯名文休題柱敬仁清舉致畏逼之詞張范逓時俱東南之美施吳鄴下並驅同年後萃此十五人允為中之中羅暐叔景趙襲元嗣劉輿張昭陸機士衡朱誕王導庾亮元規王洽敬和郗超景興張翼康昕宋文帝劉義隆徐希秀謝眺𤣥暉劉繪陶隠居通明名𢎞景王崇素右十八人中之下論曰叔景元嗣並稱西州劉輿之筆扎張昭之無懈陸機以𢎞才掩跡朱誕以偏藝流聲王導則列聖推能庾亮則羣公挹切王洽以下並通諸法郗超以晩年取譽張翼善効宋帝康昕希秀孤生謝眺劉繪文宗書範近來少前陶隠居仙才翰彩狀於山谷王崇素繪靡篇書筆傳於里閭此十八人允為中之下姜詡梁宣魏徵𤣥成韋秀鍾輿向泰羊忱晉元帝景文支道人范􅁮蔚宗宗炳薄紹之敬叔謝靈運蕭思話齊高帝蕭道成庾黔婁費元瑶孫奉伯王薈羊祜叔子右二十人下之上論曰此二十人並擅毫翰動成楷則殆逼前良見希後彦允為下之上楊經諸葛融楊潭張炳岑淵張輿王濟李夫人劉穆之朱齡石庾景休張融思充褚元明孔敬通王籍文海右十五人下之中論曰此十五人雖未窮字奥書尚文情披其藂薄非無香草視其崖岸皆有潤珠故遺斯紙以為世玩允為下之中衛宣李韞陳基傅廷堅張紹隂光韋熊張暢曹任宋嘉裴邈羊固傅夫人辟閭訓謝晦徐羡之孔閭顔寶光周仁皓張欣泰張熾僧岳道人法髙道人右二十三人下之下論曰此二十三人皆五味一和五色一彩視其雕文非特刻鵠人人下筆寜止追嚮遺跡見珍餘芳可折誠以驅馳並駕不逮前鋒而中擁後殿各盡其美允為下之下今以九例該此衆賢猶如𤣥圃積玉炎洲聚桂其中實相推謝故有兹多品然終能振此鱗翼俱上龍門儻後之學者更隨㸃曝云爾梁袁昂古今書評李斯書世為冠葢不易施評張伯英書如武帝受道憑虚欲仙蔡邕書骨氣特達爽爽有神鍾司徒書字有十二種意意外殊妙實亦多竒王右軍書字勢雄强如龍跳天門虎卧鳳閣故歴代寶之永以為訓王僧䖍書如王謝子弟縱復不端正奕奕有一種風氣王子敬書如河洛間少年雖有充恱而舉體沓拖殊不可耐羊欣書如大家婢作夫人不堪位置而舉止羞澁終不似真阮研書如貴胄失品次不復排突英賢王儀同書如晉安帝非不處尊位而都無神明殷均書如髙麗人抗浪甚有意氣姿韵終乏精味徐淮南書如南岡士夫徒尚風軌不免寒乞陶隠居書如吳興小兒形狀雖未長成而骨體甚峭快施肩吾書如新亭傖父一往似見揚州人共語便音態出袁崧書如深山道士見人便欲退縮曹喜書如經論道士言不可絶程曠平書如鴻鵠弄翅頡頏布置初雲見白日蕭思話書如舞女低腰仙人嘯樹李鎮東書如芙蓉之出水文彩之鏤金桓𤣥書如快馬入陣隨人屈曲豈須乆譜皇象書如韵音繞梁孤飛獨舞孔琳之書如散花空中流徽自得薄紹之書如龍游在霄繾綣可愛揮毫振紙有疾閃飛動之勢李巖之書如鏤金素月屈玉自照崔子玉書如危峯阻日孤松單枝有絶望之意師宜官書如鵬羽未息翩翩自逝韋誕書如龍威虎振劒拔弩張衛恒書如揷花舞女援鏡笑春索靖書如飄風忽舉鷙鳥乍飛鍾繇書如雲鶴遊天羣鴻戲海行間茂宻實亦難過邯鄲淳書應規入矩方圓乃成蕭子雲書如上林春花逺近瞻望無處不𤼵孟光禄書如崩山絶崖人見可畏張芝驚竒鍾繇特絶逸少鼎能獻之冠世四賢共類洪芳不㓕羊真孔草蕭行范篆各一時絶妙右共三十三人奉勅遣臣評古今書臣既愚短豈敢謬量江海但聖㫖委臣斟酌是非謹品字法如前伏願炤覽謹啓普通四年二月五日内侍中尚書令袁昂啓陶隠居與梁武帝論書啓董𤣥宰以啓中此一人或即許先生也逸少自吳興以前諸書猶為未稱凡厥好跡皆是向㑹稽時永和十許年中者從去郡告墓後略不復自書皆使一人而此人書世不能别見其緩異呼為末年書子敬年十七八專倣此人書故遂與之相似梁虞龢二王書論據此可以知衆說所引之是非夫翰墨之美多以身後騰聲二王之書當世見貴姑以存著者存而録之舊説羲之罷㑹稽住蕺山下見一老嫗捉十許六角扇出市王聊問一枚幾錢答云所直二十許右軍遂取筆書扇扇為五字嫗大悵惋云舉家朝飡惟仰于此何乃書壊耶王諭之曰但言王右軍書索一百市之入市市人競市去姥更復以十數扇來請書王笑而不答又云羲之常自書表與穆帝帝使張翼冩效一毫不異題後答之羲之初不覺更詳看乃歎曰小子幾欲亂真又羲之性好鵞山隂曇􅙓村有一道士養好鵞十餘羣王清旦乗小舟過往意大願樂乃告求市易道士不與百方譬說不能得道士乃言性好道乆欲冩河上公老子縑素早辦而無人能書府君若能自屈書道徳經各兩章便合羣以奉羲之便住半日為冩畢籠鵞而歸又嘗詣一門生家設佳饌供億甚盛感之欲以書相報見有一新棐牀几至滑净乃書之草正相半門生大喜乃送王歸郡還家其父已刮盡生失書警懊累日桓𤣥最愛重二王書法毎讌集輙出法書示賔客客有食寒具者仍以手捉書大㸃汚後出法書輙令客洗手兼除寒具子敬嘗牋與簡文帝十許紙題最後云民作此書甚合願存之簡文藏以為寶此書後為桓𤣥所珍髙祖後得以賜王武剛未審今何在庾翼昔嘗以書自名多不滿逸少逸少嘗以章草答庾亮亮以示翼翼嘆服不已因與逸少書云吾昔有伯英章草書十紙過江亡失常痛妙迹永絶忽見足下答家兄書煥若神明頓還舊觀雖伯英復生不過也謝奉起廟悉用棐材右軍取棐書之滿牀奉收得一大簀子敬後往謝為說右軍書甚佳而宻已削作數十藥板請子敬書之亦甚合奉並珍録奉後孫履分半與桓𤣥用履為揚州主簿餘一半孫恩破㑹稽略以入海羲之為㑹稽予敬七八嵗學書羲之從後掣其筆不脫歎曰此兒書後當有大名子敬出戲見北館新泥堊壁白净子敬取帚沾泥汁書方丈字觀者如市羲之見歎美問所作答云七郎羲之作書與親故云子敬飛白大有意是因於此壁也有一好事年少故作精白紙裓著詣子敬子敬便取書之草正諸體悉備兩袖及褾畧周年少覺王左右有凌奪之色掣裓而走左右果逐之及門外鬬争分裂少年僅得一袖耳子敬守吳興羊欣父不疑為烏程令欣時年十五六書已有意為子敬所知子敬往縣入欣齋欣衣白新絹裙晝眠子敬因書其裙幅及帶欣覺見之極歡樂遂寶之後以上朝廷中乃零失評者云逸少兼真行之要子敬執行草之權父之靈和子之神俊皆古今之獨絶也世之聞二王者莫不心醉是知徳不可偽立名不可虚成信然哉唐文皇書右軍書後書契之興肇乎中古龜文鳥跡不足可觀末代去朴歸華舒牋㸃翰争相誇尚競其工拙伯英臨池之妙無復餘踪宜官懸帳之竒罕有遺跡逮乎鍾王以降畧可言焉鍾雖播美一時亦為逈絶論其盡善或有所疑至於布纎濃分踈宻霞舒雲卷無所間然但其體則古而不今字則長而逾制論其大畧以此為瑕子敬雖有父風殊非新巧觀其字勢踈痩如隆冬之枯樹覽其筆蹤拘束若嚴家之餓𨽻其枯樹也雖槎枿而無屈伸其餓𨽻也則羈羸而不放縱兼斯二者政翰墨之病歟子雲近出擅名江表然僅得成書無丈夫之氣行行若縈春蚓字字如綰秋蛇卧王濛于紙上坐徐偃于筆下雖秃千牛之翰聚無一毫之筋窮萬糓之皮歛無半分之骨以兹播美非其濫名耶此數子者皆譽過其實所以評察古今研精窮索盡善盡美其惟王逸少乎觀其㸃曳之工裁成之妙烟霏露結狀若斷而還連鳳翥龍蟠勢如斜而反正翫之不覺為倦覽之莫識其端心慕手追此人而已其餘區區之類何足道哉孫䖍禮執要篇今之所陳務以裨諸學者惟右軍諸書代多稱習良可據為宗匠取立指歸豈惟㑹古通今亦乃情深調合致使摹搨日廣研習嵗滋先後著名多從散落歴代孤紹非其效歟試言其由略陳數意止如樂毅論黄庭經東方朔畫贊太師箴蘭亭集序告誓文斯並代俗所𫝊真行絶致者也冩樂毅則情多拂鬱書畫贊則意涉瓌竒黄庭經則怡懌虚無太師箴又從横争折暨乎蘭亭興集思逸神超私門告誓情拘志慘所謂涉樂方笑言哀已歎豈惟駐想流波將貽嘽緩之奏馳神雎渙方思藻繪之文雖其目撃道存尚或心迷義舛莫不强名為體共習分區豈知情動形言取㑹風騷之意陽舒隂慘本乎天地之心既失其情理乖其實原夫所致安有體哉韋述叙唐朝書録貞觀六年正月八日命整理御府古今工書鍾王等真跡得一千五百一十卷至十年太宗嘗謂侍中魏徵曰虞世南死後無人可與論書徵曰褚遂良下筆遒勁甚得逸少之體太宗即日召令侍書嘗出御府金帛購求王羲之書迹天下争齎古書詣闕以獻當時莫能辨其真偽遂良鑒定備論所出一無舛誤十四年四月二十六日太宗嘗自為真草書屏風以示羣臣筆力遒勁為一時之絶初購求人間大王書凡真行三百九十紙裝為八十卷小王及張芝等亦各隨多少勒為卷帙以貞觀字印印縫及卷之首尾其草跡又令河南真書小字帖紙影之其古本亦有是梁隋官本者梁則滿騫徐僧權沈織文朱异隋則江總姚察等署記其後太宗又令魏褚等卷下更署名記其後皆飾以金縷玉躞裝以玳瑁牙軸萬幾之暇備加執玩蘭亭樂毅尤所寶重令搨書人湯普徹等搨之以賜房𤣥齡以下八人普徹竊搨以出故在外傳之太宗嘗謂朝廷曰書學小道初非急務時或留心猶勝棄日凡諸藝末未有不學而得者也亦未有學而不得者也病在心力懈怠不能専精耳朕少時為公子頻遭陣敵義旗之始乃平冦亂執金鼓必自指揮觀其陣則知其强弱每取吾弱對其强以吾强對其弱敵犯吾弱追奔不踰百數十步吾撃其弱必突過其陣自背而反撃之無不大潰多用此制勝思得其理深也今吾臨古人之書殊不學其形勢惟在求其骨力而形勢自生耳然吾之所為皆先作意是以果能成也十五年正月勅置𢎞文館選貴臣子弟有性識者為書學士内出書命之令學又民間凡有善書者追徵入館十數年間海内從風矣十八年二月十七日召三品已上賜宴于𤣥武門太宗操筆作飛白書衆臣乗酒就太宗手競取散騎常侍劉洎登御牀引手然後得之其不得者咸稱洎登御牀罪當死請以付法太宗笑曰昔聞婕妤辭輦今見常侍登牀二十三年三月聖躬不豫幸玉華宫含風殿臨崩謂髙宗曰吾欲從汝求一物汝誠孝也豈能違吾心耶汝意何如髙宗哽咽流涕引耳而聴受制命太宗曰吾所欲得者蘭亭可與我將去及弓劒不遺同軌畢至隨仙駕入𤣥宫矣龍朔二年四月上自為書與遼東諸將謂許敬宗曰許圉師常自愛書可於朝堂開示圉師見甚驚喜私謂朝官曰圉師見古跡多矣魏晉以來唯稱二王然逸少多力而少妍子敬多妍而少力今觀聖跡兼絶二王鳳翥鸞迴實古今書聖也大定二年則天太后賞納言狄仁傑能書傑云臣自幼以來不見好本只率愚性何幸得能后乃内出二王真跡二十卷遣五品中使示諸宰相待看訖表謝登時將入神功元年五月上謂鳳閣侍郎王方慶曰卿家多書合有右軍遺迹方慶奏曰臣十代再從伯祖羲之書先有四十餘紙貞觀十二年太宗購求先臣並以進訖惟有一卷見在今進臣十一代祖導十代祖洽九代祖珣八代祖曇七代祖僧綽六代祖仲寶五代祖騫髙祖規曽祖褒并九代三從伯祖晉中令獻之已下二十八人書共十卷並進上御武成殿示羣臣仍令中書舍人崔融為寶章集以叙其事復以集并金帛賜方慶當時舉朝咸以為榮也中宗時中書令宗楚客奏事承恩乃乞大小二王真跡勅賜二十卷大小各十軸楚客隨裝作十二扇屏風以褚遂良閒居賦枯樹賦為脚因讌大人貴要張以示之時薛稷崔湜盧藏用廢食歎美不復宴樂安樂公主壻武延秀在坐歸以告公主曰主言承恩未為富貴適過宗令别得賜書一席觀之輟飡忘食及明謁見頗有怨言帝令開緘傾庫悉與之延秀復㑹賔客舉櫃令看分散朝庭無復寶惜太平公主取五帙五十卷别造胡書四字印縫宰相各三十卷將軍駙馬各十卷自此内庫真跡散落諸家太平公主愛樂毅論以織成錦袋盛置箱裹之及籍沒後有咸陽老嫗竊舉袖中縣吏尋覺遽而奔趂嫗乃驚懼投之竈下香聞數里不可復得矣開元五年勅陸元悌魏哲劉懐信等提購天下名書并搜綴天府秘書共檢校得八十卷餘並墜失元悌等又割去前代名賢押署之迹惟以已之名氏代焉上自書開元二字印以印記之一卷分為兩卷右軍書凡百三十卷小王二十八卷張昶等各一卷悉收入内十六年正月内出二王真跡一百五十卷付集賢院搨二十本賜皇太子諸王習學至明年三月詔盡收入内十九年二月以中書令蕭嵩為學士令訪二王書尋奏滑州人家藏右軍扇上真書宣示及小王行書白騎遂等二卷勅命滑州給驛賫本赴京其書扇有貞觀舊標織成題字奉進上書本留内賜絹百疋以遣之竟不問得書所繇張懐瓘書斷三品神品十二人品妙品三人十九人能三十五神品二十五人大篆一史籀周宣王時為史官師模蒼頡古文謂之史書籀文一史籀二見小篆一李斯楚上蔡人少從荀卿學帝王術入秦官至丞相八分一蔡邕字伯喈陳留人官至中郎將封髙陽侯𨽻書三鍾繇字元常潁川人官至尚書僕射東武亭侯王羲之字逸少瑯琊人官至右軍將軍㑹稽内史王獻之字子敬逸少第七子官至中書令行書四王羲之二見王獻之二見鍾繇二見張芝字伯英燉煌人朝廷以有道徵不就故時人稱為張有道章草八張芝二見杜度字伯度京兆人章帝時為齊相崔瑗字子玉安平人官至濟北相索靖字幼安燉煌人贈太常衛瓘字伯玉河東人弱冠仕魏為尚書郎入晉為尚書令王羲之三見王獻之三見皇象字休明廣陵人官至侍中飛白三蔡邕二見王羲之四見王獻之四見草書三張芝三見王羲之五見王獻之五見妙品九十八人古文四杜林漢人字北山扶風人官至司空衛宻字次仲東海人官至給事中邯鄲淳字子淑潁川人官給事中衛恒字巨山瓘之子官至黄門侍郎大篆四李斯二見趙髙秦中車府令善史書教皇少子蔡邕三見邯鄲淳二見小篆五曹喜字仲則扶風人建初中秘書郎蔡邕三見邯鄲淳三見崔瑗二見衛瓘二見八分九張昶字文舒伯英季弟為黄門侍郎皇象二見邯鄲淳四見韋誕字仲将京兆人官至侍郎師宜官南陽人靈帝愛其書徵之後為袁術将令梁鵠字孟皇安定人舉孝廉為郎後遷幽州刺史鍾繇三見索靖二見王羲之六見𨽻書二十五張芝三見蔡邕四見鍾㑹字士季元常少子官至司徒邯鄲淳五見衛瓘三見韋誕二