亦猶八卦成列八音克諧聾瞽之人不知其謂耳然藝成而下徳成而上况書之為用施于竹帛千載不朽亦猶愈沒沒而無聞者哉萬事無情勝寄在我苟視迹而合趣或循翰而得人雖身沈而名飛冀托之以神契每見片善何慶如之懐瓘恨不逰目天府備觀名迹徒勤勞乎其所未聞祈求乎其所未見今録所聞見粗如前列學慚于博識不迨能繕竒纉異多所未盡且如抱絶俗之才孤秀之質不容于世或復何恨故孔子曰博學深謀而不遇者衆矣何獨丘哉然識貴行藏行忌明潔至人晦迹其可盡知開元甲子之嵗廣陵卧疾始焉草創其觸類生變萬物為象庶乎周易之體也其一字褒貶微言勸戒竊乎春秋之意也其不虚美不隠惡近乎馬遷之書也冀具衆美以成一家之言雖知不知為上然獨善之與兼濟取捨其為孰多童蒙有求思盈半矣且二王既沒語或在兹語曰能言之者未必能行能行之者未必能言何必備能而後能評哉嵗洎丁夘潛筆削焉以上總論唐徐浩論書周官内史教國子六書書之源流其來尚矣程邈變𨽻體邯鄲傳楷法事則朴略未有功能厥後真書張稱草聖右軍行法小令破體皆一時之妙近古蕭永歐虞頗傳筆勢褚薛已降自鄶不譏矣然人謂虞得其筋褚得其肉歐得其骨當矣夫鷹隼乏彩而翰飛戾天骨勁而氣猛也翬翟備色而翺翔百歩肉豐而力沉也若藻曜而髙翔書之鳳凰矣歐虞為鷹隼褚薛為翬翟焉率更云蕭書出於章草頗為知言然歐陽飛白曠古無比浩自言余年在齠齔便工翰墨力不可强勤而愈拙區區碑石之間矻矻几案之上亦古人所恥吾豈忘情耶徳成而上藝成而下則殷鑒不逺何學書為必以一時風流千里面目斯亦愈于博奕亞於文章矣凡初學之際冝先筋骨筋骨不立肉何所附用筆之勢特須藏鋒鋒若不藏字則有病病且未去能何有焉字不欲踈亦不欲宻不欲大亦不欲小小長令大大蹙令小踈肥令宻宻痩令踈斯其大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側竪令平平竣使側捷則須安徐則須利如此則其大較矣張伯英臨池學書池水盡黒永師登樓不下四十餘年張公精熟號為草聖永師拘滯終著能名以此而言非一朝一夕所能盡美矣俗云書無百日工葢悠悠之談也白首攻之尚不能精豈可百日乎傳授筆法人名葢自蔡邕授於神人而傳之崔瑗及女文姬文姬傳之鍾繇繇傳之衛夫人夫人傳之王羲之羲之傳之獻之獻之傳之外甥羊欣欣傳之王僧䖍僧䖍傳之蕭子雲子雲傳之智永智永傳之虞世南世南傳之歐陽詢詢傳之陸柬之柬之傳之姪彦逺彦逺傳之張旭旭傳之李陽氷陽氷授徐浩顔真卿鄔彤韋玩崔邈凡二十有三人書法之傳終于此矣南唐李後主評書善法書者各得右軍之一體若虞世南得其美韻而失其俊邁歐陽詢得其力而失其温秀褚遂良得其意而失於變化薛稷得其清而失於窘拘顔真卿得其筋而失於粗魯栁公權得其骨而失於生獷徐浩得其肉而失於俗李邕得其氣而失於體格張旭得其法而失於狂獨獻之俱得之而失於驚急無藴藉態度此歴代寶之為訓所以夐髙千古柔兆執徐暮春之初清輝西閣因觀修禊叙為張洎評此歐陽永叔論古法帖余嘗喜覽魏晉以來筆墨遺跡而想前人之髙致也所謂法帖者其事率皆弔哀候病叙暌雖通訊問施於家人朋友之間不過數行而已葢其初非用意而逸筆餘興淋漓揮洒或妍或醜百態横生披卷𤼵函爛然在目使人驟見驚絶徐而視之其意態愈無窮盡故使後世得之以為竒玩而想見其人也於髙文大冊何嘗用此又論蘇子美蔡君謨李邕書子美喜論用筆而書字不迨豈其力不副其心耶然萬事以心為本未有心至而力不能者余獨以為不然此所謂非知之難而行之難者也古之人不虚勞其心力故其學精而無不至葢方其幼也未有所為時専其力於學書及其漸長則其所學漸近於用今人不然多學書於晩年所以與古不同也君謨獨步當世然謙讓不肯主盟予嘗戲謂君謨學書如泝急流用盡氣力不離故處君謨頗笑以為能取譬余始得李邕書不甚好之然疑邕以書名家必有深趣及觀之乆遂謂他書莫及得之最晩好之尤篤譬猶結交其始也難則其合也必乆余雖學邕書為字絶不相類豈得其意而忘其形耶學書勾浪冩凡事有可記者他時便為故事往時有風法華者偶然至人家見筆便書初無倫理乆而禍福或應豈非好怪之士為之遷就其事􅁘余每見筆輙書故江鄰幾比余為風法華蘇玉局辨法帖及諸家書辨書之難正如聴響切脈知其美惡則可自謂必能正名之者皆過也今官本十卷法帖中真偽相雜至多逸少部中有出宿餞行一帖乃張說文又有不具釋智永白者亦在逸少部中此最踈謬余嘗於秘閣觀墨跡皆唐人硬黄上臨本惟鵞羣一帖似是獻之真筆後人於李瑋都尉家見謝尚王衍等數人書超然絶俗考其印記王涯家本其他但得唐人臨本皆可畜余嘗論書以謂鍾王之跡蕭散簡逺妙在筆畫之外至唐顔栁始集古今筆法而盡𤼵之極書之變天下翕然以為宗師而鍾王之氣益㣲衛夫人書既不甚工語意鄙俗而云奉勅勅字從力館字從舍皆流俗所為耳前史謂徐浩書鋒藏畫中力出字外杜子美云書貴痩硬方通神若用今時筆工虚鋒漲墨則人人皆作肥皮饅頭矣用吳說筆作此數字頗適人意李國主本無所得舍險與痩一字不成宋宣獻書清而復寒正類李西臺重而後印俱不能濟蘇子美兄弟並俊秀非有餘乃不足也歐陽文忠書自是學者所共儀刑庶幾如見其人者正使不工猶當傳寶况其精勤敏妙自成一家乎楊君畜二公書過黄州出以相示偶為評之歐陽永叔筆勢險勁字體新麗自成一家然公墨迹自當為世所寶自君謨死後筆法衰絶沈遼少時本學其家傳師者晩乃諱之自云學子敬病其似傳師也故出私意新之遂不如尋常人近日米芾行書王鞏小草亦頗有髙韵雖不逮古人然亦必有傳于世也荆公書得無法之法然不可學無法故僕書盡意作之似蔡君謨稍得意似楊風子更放似風法華草書秪要有筆霍去病所謂不至學古兵法者為過之魯直書去病穿域蹋鞠此正不學古兵法之過也學即不是不學亦不可魯直以平等觀作欹側字以真實相出游戲法以磊落人書細碎事可謂三反此䟦山谷為王晉卿小書爾雅歐陽叔弼謂余書大似李北海余亦自覺其然世或以余書似徐浩者非也古人用筆必有所自長史以劍器悟容有是理雷大簡云聴江聲而筆法進文與可亦言見蛇鬬而草書長非誕也蘇子瞻題唐氏六家書後永禪師書骨氣深穏體兼衆妙精能之至反造踈淡如觀陶彭澤詩初若散緩不收反覆不已乃識其竒趣今法帖中有云不具釋智永白者誤收在逸少部中然亦非禪師書也云謹此代伸此乃唐末五代流俗之語耳而書亦不工歐陽率更書妍𦂳㧞羣尤工於小楷髙麗遣使購其書髙祖嘆曰彼觀其書以為魁梧竒偉人也此非真知爾也知書者凡書象其為人率更貌寒寢敏悟絶人今觀其書勁險刻厲正稱其貌耳褚河南書清逺蕭散微雜𨽻體古之論書者兼論其平生苟非其人雖工不貴也河南固忠臣但有譛殺劉洎一事使人怏怏然余嘗攷其實恐劉洎末年褊忿實有伊霍之語非譛也若不然馬周明其無此語太宗獨誅洎而不問周何哉此殆天后朝許李所誣而史官不能辨也張長史草書頽然天放略有㸃畫處而意態自足號稱神逸今世稱善草書者或不能真行此大妄也真生行行生草真如立行如行草如走未有未能行立而能走者也今長安猶有長史真書郎官石柱記作字簡逺如晉宋間人顔魯公書雄秀獨出一變古法如杜子美詩格力天縱奄有漢魏晉季以來風流後之作者殆難復措手栁少師書本出於顔而能自出新意一字百金非虚語也其言心正則筆正者非獨諷諫理固然也世之小人書字雖工而其神情終有睢盱側媚之態不知人情隨想而見如韓子所謂竊斧者乎抑真爾也然至使人見其書而猶憎之則其人可知矣余謫居黄州唐林夫自湖口以書遺余云吾家有此六人書子為我略評之而書其後林夫之書過吾逺矣而反于余何哉此又未之解也元豐四年五月眉山蘇軾書東坡評楊所藏歐蔡書自顔栁氏沒筆法衰絶加以唐末喪亂人物凋落磨㓕五代文彩風流掃地盡矣獨楊公凝式筆迹雄傑有二王顔栁之餘此真可書之豪傑不為時勢所汩沒者國初李建中號為能書然格韻卑弱猶有唐末已來衰陋之氣其餘未見有卓然追配前人者獨蔡君謨書天資既髙積學深至心手相應變態無窮遂為本朝第一然行書最勝小楷次之草書又次之大字又次之分𨽻少劣又嘗出意作飛白自言有翔龍舞鳳之勢識者不以為過黄涪翁䟦蘭亭諸帖蘭亭叙草王右軍平生得意書也反覆觀之略無一字一筆不可人意摹冩或失之肥痩亦自成妍要各存之以心㑹其妙處爾蘭亭雖是真行書之原然不必一筆一畫以為凖譬如周公孔子不能無小過過而不害其聰明睿聖所以為聖人不善學者即聖人之過處而學之故蔽於一曲今世學蘭亭者多此也古人作蘭亭叙孔子廟堂碑皆作一淡墨本葢見古人用筆迴腕餘勢若深墨本但得筆中意耳今人但見深墨本收盡鋒鋭故以舊筆臨倣不知前輩書初亦有鋒鍔此不𫝊之妙也淡墨碑銘東坡有云大字難于結宻而無問小字難于寛綽而有餘寛綽有餘如東方朔畫賛樂毅論蘭亭禊事叙先秦古器蝌蚪文字結宻而無間如焦山崩崖瘞鶴銘永州磨崖中興頌李斯嶧山刻秦始皇及二世皇帝詔近世兼二美如楊少師之正書行草徐常侍之小篆此雖難為俗學者言要歸必竟如此如人眩時五色無主及其神澄意定青黄皂白亦自燦然佳帖時時臨摹可得形似大要多取古法細看令入神乃到妙處用心不離乃是入神要路余嘗戲為人評書云小字莫作痴凍蠅樂毅論勝遺教經大字無過瘞鶴銘隨人作計終後人自成一家始逼真然適作小楷亦不能擺脫規矩客曰子何捨子之凍蠅而謂人凍蠅余無以應之固知書雖棊鞠等技非得不傳之妙未易工也樂毅論舊石刻斷軼其半者字痩勁無俗氣後有人復刻此斷石文摹𫝊失真多矣完書者是國初翰林侍書王著冩用筆圓熟亦不易得如富貴人家子非無福氣但病在不韻耳東方曼倩畫賛筆圓净而勁肥痩得中但字身左長葢崔子玉字形如此前輩或隨時用一人筆法耳黄庭經王氏父子書皆不可復見小字殘缺者云是永禪師書既刓缺亦難辨真􅎓字差大者是吳通微書字形差長而痩勁筆圓肥徐浩書也佛遺教經一卷不知何世何人書或曰右軍羲之書黄庭堅曰吾嘗評此書在楷法中小不及樂毅論爾清勁方重葢度越蕭子雲數等頃見京口斷崖中瘞鶴銘大字右軍書其勝處乃不可名貌以此觀之良非右軍筆畫也若瘞鶴碑斷為右軍書端使人不疑如歐薛顔栁數公書最為端勁然纔得瘞鶴銘髣髴爾唯魯公宋開府碑痩健清拔在四五間蔡公遂委篤又加㿃下日數十行觀此語初和父所論疾證似是也當今人物眇然而囏疾如此令人短氣今年每讀此語便復意塞足下時事稍可數來主人相尋以下十一行語鄙字畫亦不韻非右軍簡體灼然不知那得濫吹阿堵中此卷中伯趙鳴而載隂爽鳩習而揚武與儻因行李願存故舊皆鄙語非右軍意書扎亦相去逺甚昨遂不奉恨深帖有秦漢篆筆中令自言故應不同真不虚爾中令中書有相勞苦語極佳讀之了不可解者當是牋素敗逸字多爾觀其可讀者知其爾耳米芾元章専治中令書皆以意附㑹解說成理故似杜元凱春秋癖耶謝太傅所稱道民安葢事五升米道耶右軍為獻之女玉潤請罪亦稱民也知足下故羸疾而冒暑逺涉而失一筆冒多一筆古帖或不可讀類皆如此索征西筆短意長誠不可及長沙古帖中有急就章數十字劣於此帖今人作字大槩筆多而意不足智果善學書合處不减古人然時有僧氣可恨羊欣書舉止羞澁蕭衍老翁亦善評書也宋儋筆墨精勁但文詞蕪穢不足發其書子瞻嘗云其人不解此狡獪書便不足觀王侍中學鍾繇絶近真行皆妙如此書乃可臨學謝太傅墨跡聞都尉李公炤有之不作姿媚態度惜不見爾若但如此卷中帖去右軍父子間可著數人郗方回書初不减王氏父子誠不浪語章草千字文集書家定為漢章帝書繆矣章草言可以通章奏耳乃周興嗣取右軍帖中所有字作韵語章帝時那得有之疑只是蕭子雲之最得意者右軍嘗戲為龍爪書今不復見余觀瘞鶴銘勢若飛動豈其遺法耶歐陽公以魯公書宋文貞碑得瘞鶴銘法詳觀其用筆意審如公說往在館中時於閣下一觀李懐琳臨右軍絶交書大有竒特處今觀續法帖十未得其二三以此言之十卷中大率皆如此又智永十八行判作右軍書蕭子雲臨索征西書便判作靖書此等難使鄭彰輩任其責劉無言箋題便不類今人書使之春秋髙江東又出一羊欣薄紹之矣頃年觀廟堂碑摹本竊怪虞永興名浮於實及見舊刻乃知永興得智永筆法為多又知蔡君謨真行簡扎能入永興之室也元祐四年在中都初見榮輯子雍家一本紹聖元年在湖隂又見張威福夷家一本其十二月在陳留又見蔡寶臣致君家一本以石本未刓缺不以摹本補綴則榮本第一張本第二蔡本第三亦嘗於他處見數本新舊雜探所謂海圖拆波濤舊繡移曲折天吳及紫鳳顛倒在短褐者也然尚有典型亦不可廢也陳留净土院書草書妙處須學者自得然學乆乃當知之墨池筆冢非傳者妄也虞永興常被中畫腹書末年尤妙貞觀中亦已耄矣而道塲碑之工唐人未有逮者歐率更書化度寺碑所謂直木曲鐵法也如介胄有不可犯之色然未能端冕而有徳威也道林嶽麓寺詩字勢豪逸真復竒崛所恨功力太深耳少令巧拙相半使子敬復生不過如此禁中板刻古法帖十卷當時皆用歙州貢墨墨本賜羣臣今都下用錢萬二千便可購得元祐中親賢宅從禁中借版墨百本分遺宫僚但用潘谷墨光輝有餘而不甚黟黒又多木横裂紋士大夫不能盡别也此本可當舊板價之半耳唐自歐虞後能備八法者獨徐㑹稽與顔太師耳然㑹稽多肉太師多骨而此碑尤姿媚可愛時人快其書以為如怒猊抉石渴驥奔泉余以為非是書家論徐㑹稽筆法怒猊抉石渴驥奔泉以余觀之誠不虚語如季海筆少令韵勝則與稚恭並驅争先可也季海長處正是用筆勁正而心圓若有工不論韵則王著優於季海不下子敬若論韵勝則右軍大令之門誰不服膺往時觀怒猊抉石渴驥奔泉之論茫然不知是何等語老年乃於季海書中見之如觀人眉目也三折肱知為良醫誠然哉季海暮年乃更擺落王氏規摹自成一家所謂盧蒲嫳其髪甚短而心甚長惜乎當時君子莫能以短兵伐此老賊也前朝翰林侍書王著筆法圓勁今所藏樂毅論周興嗣千字文皆著書墨蹟此其長處不减季海所乏者韻爾王著臨蘭亭序樂毅論補永禪師周散騎千字皆絶妙同時極善用筆若使胷中有書數千卷不隨世碌碌則書不病韵自勝李西臺林和靖葢美而病韵者王著勁而病韵者周越皆渠儂胸次之罪非學者不工也顔太師稱張長史雖姿性顛佚而書法極入規矩也故能以此終其身而名後世如京洛間人傳摹狂怪字不入右軍父子繩墨者皆非長史筆蹟也葢草書法壊於亞栖也䟦周子發帖魯公東西林題名宋開府神道永州磨崖諸竒書楊少師洛中十一碑懐素自叙草書千餘字當集為一它日可為䟦尾禪家云法不孤起仗境方生懸想而書不得一二又臂痛才能用筆三四分耳周秦古器銘皆科蚪文字其文章爾雅朝夕玩之可以披剥華偽自見至情雖戲弄翰墨不為無補山谷評諸名家書鍾大理表章致佳世間葢有數本肥瘠小大不同葢後來善臨搨本耳要自皆有佳處兩晉士大夫類能書右軍父子拔其萃耳觀魏晉間人論事皆語少而意宻大都猶有古人風澤略可想見論人物要是韻勝為尤難得蓄書者能以韻觀之當得髣髴右軍真行章草藁無不曲當其妙處往時書家置論以為右軍真行皆入神品藁書乃入能品不知憑何便作此語政如今日士大夫論禪師某優某劣吾了不解古人言坐無孔子焉别顔回真知言者右軍自言見秦篆及漢石經正書書乃大進故知局促轅下者不知輪扁斵輪有不傳之妙王氏來惟顔魯公楊少師得蘭亭用筆意右軍父子真行略相當相抗爾余嘗評書云字中有筆如禪家句中有眼須具此眼者始能知之右軍筆法如孟子道性善莊周談自然縱說横說無不如意非復可以常理拘之大令草法殊迫伯英淳古少可恨彌覺成就爾所以中間論書者以右軍草入能品而大令草入神品也余嘗以右軍草書比之文章右軍似左氏大令似莊周也由晉以來難得脫然都無風塵氣似二王者惟顔魯公楊少師髣髴大令耳魯公書今人隨俗多尊尚之少師書口稱善而腹非也欲深曉楊氏書當如九方臯相馬遺其𤣥黄牝牡乃得之宋齊間士大夫翰墨頗工合處便逼右軍父子葢其流風遺俗未逺師友淵源與今日俗學不同耳王謝承家學字畫皆佳要是其人物不凡各有風味耳觀王濛書想見其人秀整幾所謂毫髮無遺恨者王荆公嘗自言學濛書世間有石刻南澗樓詩者似其苗裔但不解古人所長乃爾難到唐太宗英睿不羣所學輙便過人計神堯初定四海太宗年二十許爾字畫已能如此所以末年詔敕有魏晉之風亦是富貴後能不廢學爾崇寜元年閏月初六日當塗江口折栁亭中書伯英書小紙意氣極類章書精神照人此翰墨妙絶無品者張長史千字及蘇才翁所補皆怪逸可喜自成一家然號為長史者實非張公筆墨余中年來稍悟作草故知非張公書後有人到余悟處乃當信耳張長史行草帖多出於􅎓作人聞張顛未嘗見其筆墨遂妄作狂蹶之書託之長史其實張公姿性顛逸其書字字入法度中也楊次公家見長史真蹟兩帖天下竒書非世間隔簾聴琵琶之比也顔魯公書雖自成一家然曲折求之皆合右軍父子筆法書家多不到此處故尊尚徐浩沈傳師爾九方臯得千里馬於沙丘衆相工猶笑之今之論書者多牡而驪者也觀魯公此帖竒偉秀㧞奄有魏晉隋唐以來風流氣骨回視歐虞褚薛徐沈輩皆為法度所窘豈如魯公蕭然出於繩墨之外而卒與之合哉葢自二王後能臻書法之極者唯長史與魯公二人其後楊少師頗得髣髴但少規矩復不善楷書然亦自冠絶天下後世矣觀唐人斷紙餘墨皆有妙處故知翰墨之勝不獨在歐虞禇薛也惟恃耳而疑目者葢難與共談耳觀江南李主手改表章筆力不减栁誠懸乃知今世石刻曽不得其髣髴余嘗見李主與徐鉉書數紙自論其文章筆法政如此但步驟太露精神不及此數字筆意深穏葢刻意與率爾為之工拙便相懸也余嘗評近世三家書楊少師如散僧入聖李西臺如法師㕘禪王著如小僧縛律恐來者不能易余此論也少師此詩草余二十五年前嘗得之日臨數紙未嘗不歎其妙少師為楊凝式季西臺出羣㧞萃肥而不剰肉如世間美女豐肌而神氣清秀者也但摹手或失其筆意可恨耳宋宣獻富有古人法度清痩而不弱此亦古人所難蘇子美蔡君謨皆翰墨之豪傑也歐陽文忠頗於筆中用力乃是古人法但未雍容耳徐鼎臣筆實而字畫勁亦似其文章至篆則氣質髙古與陽冰並驅争先也近世士大夫書富有古人法度唯宋宣獻公耳如前翰林侍書王著書樂毅論及周興嗣千字筆法圓勁幾似徐㑹稽然病在無韻如宣獻公能用徐季海筆莫年擺落右軍父子規摹自成一家當無遺恨矣往時士大夫罕能道宣獻書札之美者前日裕陵游心蓺文頗歸翰墨於宋氏於是天下靡然承風牆隅敗紙蛛絲煤尾之餘無不軸以象玉表以綈錦士大夫書尺間班班皆有筆勢老杜云太宗妙其書是以數子至有味其言也常山公書如霍去病用兵所謂顧方略如何耳不至學孫吳至其得意處乃如戴花美女臨鏡笑春後人亦未易超越耳紹聖五年五月晦避暑瀘州大雲寺子茂攜此書來妄意評之如此蔡明逺帖筆意縱横無一㸃塵埃氣可使徐浩伏膺沈傳師北面蔡君謨行書簡札甚秀麗可愛至於作草自云得蘇才翁屋漏法令人不解近見陳懶散草書數紙乃真得才翁筆意寒溪草堂待飰不至飢時書板殊無筆力蘇子美似古人筆勁蔡君謨似古人筆圓雖得一體皆自到也蔡君謨書如胡笳十八拍雖清氣頓挫時有閨房態度范文正公書落筆痛快沈著極近晉宋人書往時蘇才翁筆法妙天下不􅈕一世人惟稱文正公書與樂毅論同法余少時得此評初不謂然以謂才翁傲睨萬物衆人皆側目無王法必見殺也而文正待之甚厚愛其才而忘其短也故才翁評書少曲董狐之筆耳老年觀此書乃知用筆實處是其最工大槩文正妙於世故想其鈎指回腕皆優入古人法度中今士大夫喜書當不但學其筆法觀其所以教戒故舊親戚皆天下長者之言也深愛其書則深味其義推而涉世不為古人志士吾不信也司馬温公天下士也所謂左凖繩右規矩聲為律而身為度者也觀其書猶可想見其風采余嘗觀温公資治通鑑草雖數百卷顛倒塗抹訖無一字作草其行已之度葢如此昔余大父大夫公及外祖特進公皆學暢整遺教經及蘇靈芝北嶽碑字法清勁筆意皆到但不入俗人眼耳數十年來士大夫作字尚華藻而筆不實以風檣陣馬為痛快以插花舞女為姿媚殊不知古人用筆也客有惠棕心扇者念其太朴與之藻飾書老杜巴中十詩頗覺驅筆成字都不為筆所使亦是心不知手手不知筆恨不及二父時耳下筆痛快沉著最是古人妙處試以語今世能書人便十年分踈不下頓覺驅筆成字都不由筆又䟦東坡墨跡余嘗論右軍父子翰墨中逸氣破壊於歐虞褚薛及徐浩沈傳師幾於掃地惟顔尚書楊少師尚有髣髴比來蘇子瞻獨近顔楊氣骨如牡丹帖甚似白家寺壁百餘年後此論乃行爾東坡道人少日學蘭亭故其書姿媚似徐季海至酒酣放浪意忘工拙字特痩勁迺似栁誠懸中嵗喜學顔魯公楊風子書其合處不减李北海至於筆圓而韵勝挾以文章妙天下忠義貫日月之氣本朝善書自當推為第一數百年後必有知余此論者東坡書水陸賛圓勁成就所謂怒猊抉石渴驥奔泉恐不在㑹稽之筆而在東坡之手矣此數十行又兼董孝子碣禹廟詩之妙處士大夫多譏東坡用筆不合古法彼葢不知古法從何出爾杜甫云三尺安出哉前王所是以為律後王所是以為令余嘗以此論書而東坡絶倒也往時栁子厚劉禹錫譏評韓退之平淮西碑當時道聴塗說者亦多以為然今日觀之果如何耶或云東坡作戈多成病筆又腕著而筆卧故左秀而右枯此見管中窺豹不識大體殊不知西施捧心而顰雖其病處乃自成妍今人未解愛敬此書逺付百年公論自出但恨封徳彞輩無如許夀及見之耳余書自不工而喜論書雖不能如經生輩左規右矩形容王氏獨得其義味曠百世而與之友故作决定論耳東坡叙英皇事帖甚似虞世南公主墓銘草余嘗評東坡善書乃其天性往嘗於東坡見手澤二囊中有似栁公權褚遂良者數紙絶勝平時所作徐浩體字又嘗為余臨一卷魯公帖凡二十許紙皆得六七殆非學所能到手澤袋葢二十餘皆平生作字語意類小人不欲聞者輙付諸郎入袋中死而後可出示人者也東坡書真行相半便覺去羊欣薄紹之不逺余與東坡俱學顔平原然余手拙終不近也自平原以來惟楊少師蘇翰林可人意爾不無有筆類王家父子者然余不好也東坡先生常自比余顔魯公以余考之絶長補短兩公皆一代偉人也至於行草正書風氣皆畧相似嘗為余臨與蔡明逺委曲祭兄濠州刺史及姪季明文論魚軍容坐次書乞脯天氣殊未佳帖皆逼真也此一卷字形如東方朔畫賛俗子喜妄譏評故具之余嘗論右軍父子以來筆法超逸絶塵惟顔魯公楊少師二人立論者十餘年聞者瞠若晩識子瞻獨謂為然士大夫乃云蘇子瞻於黄魯直愛而不知其惡皆此類豈其然乎比來作字時時髣髴魯公筆勢然終不似子瞻暗合孫吳耳東坡書如華嶽三峯卓立參昴雖造物之鑪錘不自知其妙也中年書圓勁而有鈎大似徐㑹稽晩年沈著痛快乃似李北海此公葢天資解書比之詩人是李白之流往時許昌節度使薛能能詩號雄健時得前人句法然遂睥睨前輩髙自賢聖乃云我生若在開元日争遣名為李翰林此所謂蚍蜉撼大樹可笑不自量者也東坡居士極不惜書然不可乞有乞書者正色詰責之或終不與一字元祐中鎖試禮部每來見過案上紙不擇精粗書遍乃已性喜酒然不能四五龠已爛醉不辭謝而就卧鼻鼾如雷少馬蘇醒落筆如風雨雖謔弄皆有義味真神仙中人此豈與今世翰墨之士争衡哉東坡簡札字形温潤無一㸃俗氣今世號能書者數家雖規摹古人自有長處至於天然自工筆圓而韻勝所謂兼四子之有以易之不與也東坡書隨大小真行皆有娬媚可喜處今俗子喜譏評東坡彼葢用翰林侍書之繩墨尺度是豈知法之意哉余謂東坡書學問文章之氣鬱鬱芉􅇗𤼵於筆墨之間此所以他人終莫能及爾東坡書彭城以前猶可偽至黄州後掣筆極有力可望而知真贋也蘇翰林用宣城諸葛齊鋒筆作字踈踈宻宻隨意緩急而字間妍媚百出古來以文章名重天下例不工書所以子瞻翰墨尤為世人所重今日市人持之以得善價百餘年後想見其風流餘韵當萬金購藏耳盧州李伯時近作子瞻按藤杖坐盤石極似其醉時意態此紙妙天下可乞伯時作一子瞻像吾輩㑹聚時開置席上如見其人亦一佳事又䟦蘇潁濵王晉卿書子由書痩勁可喜反覆觀之當是捉筆甚急而腕着紙故少雍容耳余嘗得蕃錦一幅團窠中作四異物或無手足或多手足甚竒怪以為書囊人未有能識者今觀晉卿行書頗似蕃錦其竒怪非世所學自成一家魯直自評書學余學草書三十餘年初以周越為師故二十年抖擻俗氣不脫晚得蘇才翁子美書觀之乃得古人筆意其後又得張長史懐素髙閑墨迹乃窺筆法之妙今來年老懶作此書如老病人扶杖隨意顛倒不復能工顧異於人書者不紐提容止强作態度耳錢穆父蘇子瞻皆病余草書多俗筆葢余少時學周善部書初不自寤以故乆不作草數年來猶覺湔祓塵埃氣未盡紹聖甲戌在黄龍山中忽得草書三昧覺前所作太露芒角若得明窻净几筆墨調利可作數千字不倦但難得此時㑹爾余在黔南未甚覺書字綿弱及移戎州見舊書多可憎大槩十字中有三四字差可耳今方悟古人沉著痛快之語但難為知音耳書尾小字唯余與永州醉僧能之若亞棲輩見當羞晁美叔嘗背議予書唯有韵耳至於右軍波戈㸃畫一筆無也有附予者傳若言於陳留予笑之曰若美叔即與右軍合者優孟抵掌談笑乃是孫叔敖耶往有邱敬和者摹右軍書筆意亦潤澤使為繩墨所縛不得左右予嘗贈以詩云字身藏頴秀勁清問誰學之果蘭亭大字無過瘞鶴銘晩有名崖頌中興小字莫作癡凍蠅樂毅論勝遺教經隨人作計終後人自成一家始逼真不知美叔嘗聞此論乎珊瑚網卷二十四上欽定四庫全書珊瑚網卷二十四下明汪砢玉撰法書題跋海嶽名言一作米元章續書評歴觀前賢論書徴引迂逺比況竒巧如龍跳天門虎卧鳯闕是何等語哉或遣辭求工去法愈逺無益學者故吾所論要在入人不為溢辭耳余採隋唐至本朝書法得一十四家僧智永書氣骨清健大小相雜如十四五貴胄􅄶性方循繩墨怱越規矩禇遂良書如熟馭戰馬舉動從人而别有一種驕色虞世南書如學休糧道士神格雖清而體氣四疲歐陽詢書如新瘥病人顔色憔悴舉動辛苦栁公權書如深山得道之士修煉已成神氣清健無一㸃塵俗顔真卿書如項羽按劍樊噲排突硬弩欲張鐵柱將立昻然有不可犯之色李邕書如乍冨小民舉動崛彊禮節生踈徐浩書如藴德之人動容温厚舉止端正敦尚名節體氣純白沈傳師書如龍遊天表虎踞溪傍神情自若骨法清虚周越書如輕薄少年舞劒氣勢雄健而鋒刃交加錢易書如羙丈夫肌體充恱神氣清秀蔡襄書如少年女子體態嬌嬈行歩緩慢多飾鉛華蘇舜欽書如五陵少年訪雨尋雲駿馬青衫醉眠芳草狂歌院落張友直書如宫女揷花嬙嬪對鏡端正自然别有一種清態繼其人者誰歟有襄陽米芾字之八面惟尚真楷見之大小各自有分智永有八而已少鍾法丁道䕶歐虞筆始匀而古法亡矣栁公權師歐不及逺甚為醜怪惡札之祖世始為俗書歐虞褚栁顔皆一筆書也安排費工豈能垂世李邕脱子敬體之纎穠徐浩晩年力過更無氣骨皆不如作郎官時婺州碑也董孝子不空皆晚年惡札全無妍媚有識者當自知之沈傳師變格有超世真趣徐浩不及也御史蕭誠書太原題名唐人無出其右為司馬𨽻南嶽真君觀碑極有鍾王趣餘皆不及矣本朝太宗挺生五代人物已盡之間天縱好古之性真造八法草入三昧行書無對飛白入神一時公卿以上之所好遂悉學鍾王至李宗諤主文既乆士子始皆學其書肥褊樸拙是時不謄録以投其好用取科第自此惟趨時貴書矣宋宣獻公綬作參政傾朝學之號曰朝體韓忠獻公琦好顔書士俗皆學顔書及蔡襄貴士庶又皆學之王文公安石作相士俗亦皆學其體自此古法不講能𨽻書者武勝留後崔瑗能草書者承議郎滕中孚趙仲忽能行書者宣德郎鮑慎由能篆書者宣德郎趙霆已上是學古人書者餘未見楊凝式字景度其書天真爛漫縱逸類顔魯公争坐位帖紛披老筆王安石少嘗學之元豐六年余始識荆公于鍾山語及此公大賞歎其後與余書柬皆此等字唐人以徐浩書比僧䖍甚失當浩大小一倫猶吏楷也僧䖍蕭子雲傳鍾法與王子敬無異大小各有分不一倫徐浩為顔真卿辟客書韵自張顛血脉來教顔真卿大字促令小小字促令大非古法也歐陽詢草書也字末筆倒麽不見所出余得貞觀御府右軍三帖末後一帖也字乃歐法所出世之真蹟與石刻並無此也字孫過庭草書書譜甚有右軍法作字落脚差近前而直此乃過庭法凡世稱右軍書有此等字皆孫筆也凡唐草得二王法無出其右海岳以書學博士召對上問本朝名世者凡幾人海嶽各以其人對曰蔡京不得筆蔡卞得筆而乏逸韵蔡襄勒字沈遼排字黄廷堅描字蘇軾畫字張友直安字上復問之曰卿何如對曰臣書刷字諸名家評米書東坡云海嶽平生篆𨽻真行草書風檣陣馬沉著痛快當與鍾王並行非但不媿而已元章少時書法盖自沈傳師後始入大令之室結體超軼一用其筆意此帖元章摹王獻之帖臨池用功如此晩年放恣自成一家不復作狡獪變化矣米禮部行書草政用大令筆意稍跌宕遂自成一家後生習米者但得其踰繩越契之風則善學栁下恵者也范成大䟦嶽珂英光堂帖有米元章臨智永真草千文與今本大不同乃知古人臨帖不論形似也珂䟦其後云摹臨兩帖本不同摹帖如梓人作室梁櫨榱桷雖具凖繩而締創既成氣象自有工拙臨帖如雙鵠並翔青天浮雲浩蕩萬里各隨所至而息寳晉蓋進乎此者也為之贊曰永之法妍以婉芾之體峭以健馬牛其風神合志通彼妍我峭惟妙惟肖故曰袒裼不凂夜啓不啓善學栁下恵莫如魯男子本朝書米蔡為冠餘子莫及君謨始學周越書其變體出于顔平原元章始學羅遜濮王諱讓書其變體出于王子敬君謨泉州橋柱題記絶過平原元章鎮江焦山方丈六版璧所書與子敬行筆絶相類藝至于此亦難矣坡贈六觀老人詩云草書非學聊自悟落筆已喚周越奴則越之書本甚高也襄陽學記乃羅遜書元章亦襄陽人始效其作至于筆挽萬鈞沉著痛快處法豈能盡耶龔聖與曰評書家謂米書如快劍斫陣以其銛利無前故也是大不然米書超絶中自有妍美不専以險絶為工沈慶之貌如好女每臨陣必著假面而其威武所被能使丰姿掩抑不露其英雄之能事也徐季海書惟此一種有右軍父子筆法而無俗氣如開河碑超軼孝子碣老重然終非王家苖裔也頃見蘇子瞻錢穆甫論書不取張友正米芾余殊謂不然及見郭忠恕叙字源乃知當代二公極為别書者也米淮陽芾摹逸少平章帖筆趣翩翩固自佳但肆筆榻放殊不廓填非古也昔榻書欲如水月鏡像者故應廓填乃造㣲耳黄伯思䟦黄魯直書遒媚米元章書俊㧞薛道祖書温潤徐㑹稽之濁在跛偃李北海之濁在欹斜跛偃之弊流而誤吾坡公欹斜之弊流而為元章父子矣趙孟堅䟦此本定州蘭亭土中所得石米元章摹入棠梨板者字雖肥骨肉相稱觀其筆意右軍清真風韵冠映一時可想也今時論書者憎肥而喜痩黨同而妬異曽不夢見右軍脚汙氣豈可與言用筆法耶米海嶽書如快劒斫陳强弩射千里所當穿徹書家筆勢亦窮于此然亦似仲由未見孔子時氣象耳山谷米襄陽書政如黄太史作詩之變芒角刷掠求於匱藴川媚則蔑有其學魯獨居男子於薛道祖見之蔡君謨所摹右軍諸帖形模骨肉纎悉具備莫敢踰軼至米元章始變其法超越規矩雖有生氣而筆法悉絶矣玉峰陸友題唐人臨摹右軍得其形似而失其氣韵米元章得其氣韻而失其形似下云氣韻形似俱備者惟吳興趙子昻得之張雨云元章學王書而變薛河東學王者而不變陶宗儀稱趙文敏偶得米海嶽壮懐賦一卷中闕數行因取刻本摹榻以補其闕凡易五七紙終不如意乃嘆曰今不逮古多矣遂以刻本完之公之翰墨為國朝第一且猶服善如此近有一等人僅能㸃畫如意便自誇大者于公寜不愧乎子瞻似顔平原故極口平原魯直效瘞鶴故推尊瘞鶴元章出禇河南故左􅃝河南河南楷似行然自有楷平原草似楷然自有草李北海楊凝式及元章魯直無楷矣海嶽書于晉人最有功故其淵源高於宋一代比為慧日峰錄一菴記惜其起語處損缺數行行筆則規模聖教序而波法特佳識者當自著眼也陸深䟦南宫與眉山豫章莆陽擅聖宋室近時學者寡師王氏宗祖必先事四家為襄陽之學者大抵歩入狂狠允明固亦願學而資力兼乏乃不易耳而亦不易以語人此天馬帖為梁溪錢氏世藏其孫昌言出示舒翫未終第覺法度森出與尋常之論大異高陽馮几人口不幾于誤人耶昌言請識䟦稍附爾爾異時締觀著力或得畦徑一二當為再議以易此語枝山禇摹禊帖米元章謂禇的筆非也既稱勻填清潤又云以意改誤易數字未有雙鈎廓填而意易者盖唐人于河南臨本上加雙鈎耳虎兒實知之不欲矯其父誤謾定為諸葛正等于賜本雙鈎又非也正當作貞宋人避其廟諱故余始謂能辨陳家本作于定國耳今乃能於米家作董孤言畢不覺噴笋滿案右米南宫真蹟妙得晉人筆而以神俊發之往往于結構外取姿韻余嘗評其書如兒駒試風劍俠入道此卷為友人李子所藏前一紙是其本色奕奕有生氣後一紙尤精不失褚河南懸腕法余愛玩乆之乃以王履吉小楷南宫傳系其後而記以嵗月云又云黄長睿有書學而無書才米元章有書才而無書學以上弇州東觀餘論雲林子黄伯思自秦易篆為佐𨽻至漢世去古未逺當時正𨽻體尚有篆籕意象厥後鍾元常士季及晉王世將逸少子敬作小楷書法皆出于遷就漢𨽻運筆結體既圜勁淡雅字率扁而弗撱今傳世者若鍾書力命表尚書宣示世將上晉元帝二表逸少曹娥帖大令洛神帖雖經摹拓而古𨽻典型具存至江左六朝若謝宣城蕭挹輩雖不以書名世至其小楷若齊海陵王志開善寺碑猶有鍾王遺範至陳隋間正書結字漸方唐初猶爾獨歐陽率更虞永興易方為長以就姿媚後人競效之遽不及二人逺甚而鍾王楷法彌逺矣篆法之壊肇李監軍草法之弊肇張長史八分之俗肇韓擇木此諸人書非不工也而淵古人之原教俗士之升木於書家為患最深夫篆之方稳草之顛放八分之纎麗學便可至而天勢失矣彼觀鐘彛文識漢世諸碑王索遺迹寜不少損乎此可為知者道章草惟漢魏西晉人最妙至逸少變索靖法稍以筆勝世傳諸葛武侯對蜀照烈語及豹奴等章帖皆逸少書也蕭景喬出師頌雖不迨魏晉人然高古尚有遺風自其書中觀之過正𨽻逺矣隋智永又變此法至唐人絶罕為之近世遂􅆼然無聞盖去古既逺妙旨弗傳幾至于冺絶然世豈無人顧俗眼未識耳張懐瓘論書以㑹稽草書第八在世蔣茂宏輩諸人下意謂其拘法度少縱放也予謂草之狂怪乃書之下者因陋就淺徒足以障拙目耳若逸少草之佳處蓋與從心者契妙寜可以不踰矩少之哉若懐瓘者以形模求字不可告以天下之妙也唐文皇論鍾元常書云體則古而不今字則長而逾制今觀尚書宣示諸帖字皆匾濶殊無長體豈文皇誤以廣為脩乎十七帖長丈有二尺貞觀中内本也凡百七行九百四十三字逸少草書中烜赫著名帖也文皇帝購二王書大王草有三千紙率以一丈二尺為卷取其跡以類相從綴成卷以貞觀兩字印印之褚河南監裝率多紫檀軸首白檀身紫羅褾織成帶開元皇帝又以開元兩字印印之跡尾列當時大臣名此帖號十七帖者以卷首有十七字故以名凡二王書後人亦有取帖中一句語稍異者標為帖名大約多取卷首及帖首三兩字也王㑹稽七子皆能書凝操徽渙獻五人書跡具傳惟𤣥肅二子未見餘皆得家範而體格不同是善學逸少書者也猶顔延年對宋文帝自謂竣得臣筆測得臣文冀得臣義躍得臣酒書亦猶是也陶隠居集楊許三仙君真蹟論云楊君書最工不今不古能大能細大較雖祖效郗法筆力規矩兼於二王掾書乃是學楊字體勁利偏善冩經畫符與楊相似鬱勃峰勢殆非人工所逮長史章草乃能而正書古拙隠居昔見張道恩善别法書歎其神識今覩三君蹟一字一畫皆望影懸了自思非智藝所及特天假此鑒令有以題悟耳三君書蹟今無復有獨唐竇臮述書賦著楊真人行書𢃄名六行觀隠居之論想見其清致也惜哉今亦弗傳矣隠居書自竒世傳畫版帖及瘞鶴銘皆其遺迹也今人罕能辨之於戲妙識逺矣知音益稀安得隐居輩與之論書哉後魏北齊人書洛陽故城多有遺迹雖差近古然不脱氊裘氣文物從永嘉來自北而南故妙書皆在江左書苑云唐文皇製聖教序時都城諸釋諉𢎞福寺懐仁集右軍行書勒石累年方就逸少劇蹟咸萃其中今觀碑中字與右軍遺帖所有者纎微克肖書苑之説信然近世翰林侍書輩多學此碑學弗能至了無髙韵因自目其書為院體由唐吳通微兄弟已有斯目故今士大夫玩此者少然學弗至者自俗耳碑中字未嘗俗也非深於書者不足以語此洛人好楊凝式少師書信可傳寳但自唐中世來漢晉書法不傳如凝式軰所祖述者不逺㑹稽父子筆法似不如是洛人得楊真蹟誇詡以為希珍所謂子誠齊人耳紫陽先生李含光碑乃張從申書李陽氷題歐文忠不喜從申書集古錄屢言之殊不知從申乃效子敬書頗有東晉風尚唐人知書者多故見重于世今人反此歐陽公初不閑法書則從申之迹見棄冝矣近世書人惟章申公能傳筆意雖精巧不迨唐而筆勢超超意出褚薛上矣比來襄陽號知古法然但能行書正章書不工愛觀古帖而議論疎濶好摹古帖而㸃畫失真世言其搨本與真蹟同然比李建中周越輩則小過也書苑云從申結字縝密近古未有弟從師從義從約並工書皆得右軍風規時人謂之四龍書賦以張氏四龍名揚海内厥有季弟工夫少對右軍風規下筆斯在季謂從申也又云從申近古所無限於聞見不多右軍之外一歩不窺予觀從申雖學右軍其原出于大令筆意與李北海同科名重一時宜不虚得但所短者抑揚低昻太過又真不及行耳然唐人而有晉韻殊可佳尚既云從申有弟三人又云季謂從申不可曉玉局翁云希白作字自有江左風味故長沙法帖比淳化待詔所摹為勝世俗不知争購秘閣本誤矣黄長睿䟦章草急就補亡後自秦同書文丞相斯作倉頡篇中車府令趙高作爰厯篇太史敬作博學篇至文園令相如作凡將篇黄門令游作急就篇皆書文之林苑欲識字者不可不知惜哉凡將以上不可復見特急就存焉者以古賢多喜書之故也其文雖出小學家而亦西京文氣未衰之際詞致雅馴故顔籕賞其清靡籕注此書嘗得皇象鍾繇衛夫人王㑹稽等篇本備加詳覈今世所傳惟張芝索靖二家為真皆章草書而伯英本祗有鳯爵鴻鵠等數行至靖所書乃有三之二其闕者自母繜而下纔七百五十字此本是已蓋唐人摹而弗填者神韵筆勢古風宛然予遂手榻一通陶隠居謂之填郭書近世謂之雙鈎書蓋欲知筆徑所自故爾桑世昌澤卿論蘭亭法習褚遂良正行全法右軍洛都袁氏家遂良書帝京篇一卷體裁用筆竊効蘭亭山谷逰荆州得古本蘭亭愛玩不去手因悟古人用筆意作小楷日進曰他日當有知我者公家傳云楷法妍媚自成一家子瞻少時學蘭亭極遒媚中年以來筆墨重實李北海未足多也今時學蘭亭者不師其筆意便作行勢正如羡西子捧心而不自悟其醜也余嘗觀漢時石刻篆𨽻頗得楷法後生若以余説學蘭亭當得之魯直題南宋思陵翰墨志餘本朝士人殊乏以字畫名世縦有不過一二數誠非有唐之比然一祖八宗皆喜翰墨特書飛白分𨽻加賜臣不多矣余四十年間每作字固欲鼓動士類為一代操觚之盛以六朝居江左皆南中士夫而書名顯著非一豈謂今非昔比視書漠然無當畧不為意果時移事異習尚亦與之汙隆不可力為也本朝承五季之後無復字畫可稱至太宗始搜羅法書備盡求訪當時以李建中字形痩健始得時譽猶恨絶無秀異至熈豊以後蔡襄李時雍體制方如格律欲度華騮終以駸駸不為絶賞繼以蘇黄米薛筆勢瀾翻各有趣向然家雞野鵠識者自有優劣猶勝冺然與草木同腐者耶前人多能正書而後草書蓋二法不可不兼有正則端雅莊重結密得體若大臣冠劍儼立廊廟草則騰蛟起鳯振迅筆力頴脱豪舉終不失真所以齊高帝與王僧䖍論書謂我書何如卿僧䖍曰臣正書草書第三陛下草書第二而正書第三是臣無第二陛下無第一帝大笑故知學書者必知正草二體不當闕一所以鍾王諸家皆以此為榮名不可不務也闕而入其室至于草書飽十七帖而變其形可謂書之兼學力天資精奥神化而不可及矣周公謹論晉人小楷黄庭曹娥東方朔贊小楷極精配入樂毅論雖差校不及然皆墨池鳯毛也宋仲温手錄書法見前者刪去張芝書如老松獨倚岩壑錯落盤屈時飄飄風韵庾翼書少時與右軍齊名右軍後進庾猶不平在都下嘗與人書云小兒輩厭家雞皆學逸少書及過江見右軍所臨張芝衆帖始大驚服以為神范懐約真書有分而草行無功故知牘簡非易虞世南書剛而能柔却任自然其清健皆可人意如山林之士外夫塵俗抱琹獨咏王公一旦用之于朝曽無驕色歐陽詢書周圍端正㸃畫停勻曽無虚設雖清硬中法亦用力太過如揚雄大醇小疵山濤多可少怪褚遂良書善擇紙筆而意有餘如高祖得張良世祖得鄧禹皆謀議帷幄决勝千里李邕書筆端巧妙格高意逺論者謂之華嶽三峯黄河一曲張旭之書奮思狂逸更無凝滯如龔遂之便米芾負能書之名於海内其真楷篆𨽻不甚工惟於行草誠入能品以芾収六朝墨副在筆端故沉著痛快如乗驄馬進退裕如不煩鞭勒無不當人意然喜效其法者不過得外貌髙視濶歩氣韻軒昻殊不究其中本六朝妙處醖釀風骨自然超逸也昔人謂支遁道人愛馬不韻支曰貧道特愛其神駿耳余於芾書亦然楊凝式在五代最號能書每不自檢束號楊風子人莫測也其筆扎豪放傑出風塵之外厯後唐周漢卒能全其身名其知與書法俱高矣在洛中往往有題記平居好事者并壁匣寘坐右以為清玩本朝自建隆以後平定僭偽其間法書名蹟皆歸秘府先帝時又加採訪賞以官聨金帛至遣使詢訪殆盡命蔡京梁師成黄冕等編彚真贋備成卷帙皆用皂鸞鵲木錦標裭白玉珊瑚為軸秘在内府用大觀政和宣和印章其間法書以秦璽書法為寳後有内府印標題品次皆宸翰也舎此標軸悉非珍藏其次儲於外秘余渡江無復鍾王真蹟矣劉正夫論好竒字劉英伯好竒字六經自劉歆傳冩外無一難字豈可謂無竒哉舊見魏鶴山取篆字施之行書常笑其自苦無益鶴山書鄉字從邑有效之者卿亦從邑不知卿從節故草書為間者即節也近年楊慈湖畫心字文本心畫雲字在邯鄲匐匍中曲折愈不相似自書學以來鍾王眉目可喜何嘗顛倒横􅆆自不可及若總如彼所自為於字體則謬於經傳則乖不知何所取也朱文公議書歐陽文忠公作字如其為人外若優㳺中實剛勁惟觀其深者得之黄魯直自謂人所莫及自今觀之亦是有好處但自家既是冩得如此好何不教他方正須要得恁欹斜則甚又他也非不知端楷為是但自要如此冩亦非不知做人誠實端懿為是但自要恁他放縱道夫問何謂書窮八法曰只一㸃一畫皆有法度人言永字體其八法行夫問張于湖字何故人皆重之曰也是好但他是不把持愛放縱今本朝如蔡忠惠以前皆有典則及至米黄諸人出來便不肯恁地要之這便是世態衰下其為人亦然張敬夫嘗言平生所見王荆公書皆如大忙中冩不知公安得有許多忙事此雖戲言然切中其病今觀韓魏公與歐陽文忠帖因省平日得見韓公書蹟雖與親戚卑㓜亦皆端嚴謹重與此同未嘗一筆作行勢蓋其胸中安静詳審雍容和豫故無頃刻忙然亦無纎芥忙意與荆公之躁擾急迫正相反也書扎細事而於人之德性其相關有如此者余少時喜學曹孟德書時劉共父方學顔真卿書余以字書古今誚之共父正色謂余曰我所學者唐之忠臣公所學者漢之簒賊耳余嘿然亡以應是以取法不可不端也張南軒論蔡蘇書蔡君謨書如禮法之士盛服齋居不敢少有舒肆之意見者自是起敬坡公結字稳密姿態横生一字落紙固可寳玩而况平生大節如此竊嘗觀公議論不合于熙豐固宜至元祐初諸老在朝羣賢彚征及論役法與已意小異亦未嘗一語苟同可見公之心惟義之比初無適莫初貶黄州無一毫挫折意在他人已為難能然年尚壯也至投老炎荒剛毅凛凛畧不少衰此豈可及哉范太史家多藏公帖其間雖有壯老之不同然忠義之氣未嘗不蔚然見於筆墨間真可畏而仰焉陸務觀論法帖樂毅論縱横馳騁不似小字瘞鶴銘法度森嚴不似大字所以不可仰望也世傳中山古本蘭亭之流𢃄右天五字有殘闕處於是士大夫所藏蘭亭悉然又謂樂毅論古本至一海字而止于是凡樂毅論亦至海字而止其餘妄偽亂真大抵如此庚申重九陸游務觀書倪正父評蘇黄米諸家書本朝書惟東坡魯直元章三家然東坡多卧筆魯直多縱筆米老多曵筆若行草尚可使作小楷如黄庭樂毅洛神則不能矣其他如蘇子美周越近世如吴説輩皆不免於俗獨蔡君謨行書既好小楷如茶譜集古錄序頗有二王楷法若他大小楷法則亦不免於俗而氣骨多不蕭散有美堂記晝錦堂記及荔枝譜諺所謂厚皮饅頭是也大扺楷法貴於端重又要飄逸難乎兩全不可以瞞人故善書者尢以為難也鄭子經至朴篇至朴散而八卦興八卦興而書契肇書契肇而篆籕滋飛天八㑹以前不可得而詳也皇頡以降凡變五矣其人亡其書存古今一至作者十有三人焉予生千載之下每覽昔人殘銘斷碣未嘗不為之歔欷而三嘆也在昔結繩之政始分龍穂之章中輟于是蒼史氏仰觀俯察以造六書通天地之幽秘為百王之憲章非天下之至精其孰能與于此若稽古大禹既平水土鑄鼎象物勒銘告成而功被萬世三代之末周籕蔚有竒秀篆𨽻攸祖孔子採摭舊作縁飾篆文天授其靈剏物垂則吕政暴興天人之道壊亂極矣李斯適際其時陶埏偃仰専名擅作悉燔舊章天下行秦篆矣程邈參衍𨽻佐趨時便冝蔡邕鴻都石經為古今不刋之典張芝鍾繇咸得其道伯英聖于一筆書元常神妙于銘石王羲之有高人之才一發新韵晉宋能人莫敢讐擬李陽氷生于中唐獨蹈孔軌潛心改作􅂈於李斯張旭天分極深渾然無迹足以儀表衰俗五代而宋奔馳崩隤靡所底止蔡襄毅然獨起可謂間世之傑也嗚呼書其難哉文籍之來久矣能書者何濶希焉蓋夫人能書也吾求其能于夫人是以難也殫學篇秦廢古學力書不可行矣䝉恬書經胡母敬等剽掠遺範造蒼頡博學諸書散落復盡然道在兩間法出於道書雖不傳法則常在執筆貴圓字貴方篆貴圓𨽻貴方圓效天方法地圓有方之理方有圓之象𨽻不𨽻吾不知其為書也紫真授羲之其似乎或曰學者以二王比肩曰父作之子述之逸少無迹尋獻之則未至也羲之曰意在筆先字居心後存筋藏鋒􅌍迹隠端而分起伏偃仰又題筆陣圖曰夫書先引八分章草入𨽻字中草書象篆𨽻八分相襍斯言㫖哉衛氏曰善鑒者不書善書者不鑒又删李斯筆妙而分七勢可與八永參焉張懐瓘十法其成頌之緒論乎禁經𤼵諸家筆意背抛引蠆毒法趯戈曰清潤遲澁而左顧善於形容矣邉衫衂側其用闇築未善也蕭何韋誕其能署書乎或問廣成子應侯僧一行釋徴燕卿葛氏諸作極論題署其幾法乎曰法則法矣然衆忌諱適足以累法真卿之劍池陽氷之講䑓縱横生動不假修飾其署書之雄秀者乎陳旅之記能持論矣世稱李邕善題署然其銘刻歐虞褚諸公若優乎曰古之銘石典重端雅使人興起于千載之下邕以行押相參後世詭異百出邕作俑也歐虞褚深得書理信本傷于勁利伯施過于純熟登善少開闔之勢栁誠懸其㳺張顔之閫奥乎徐季沈宋諸家殆闖其藩落者乎韓擇木韓秀實李莒李儉綽有古意太白得無法之法子美行之昌黎知其理而功淺子厚雅有負抱而有永興公之餘韻議者以退之為極踈厲曰彼蓋不知九方歅之為相也黄山谷云書道弊于唐末惟楊凝有古人筆意曰中流失船一壺千金請問宋之名家曰錢忠懿杜祁公之流便蘇才翁倩仲之爽峭蘇子瞻之才瞻米元章之清㧞加于人一等矣踏道則未也若夫魯直之瓌變劉濤諸人所不能及惜乎態之靡靡也然其直行多得於瘞鶴問周越李時雍鍾離景伯曰如法何吴說張孝祥范成大法乎曰此而法天下無法矣然則即之諸人其稱降乎曰吁磔裂塗地矣或問蔡京卞之書曰其悍誕姦詭見於顔面吾知千載之下使人掩鼻而過之也曰張即之陳讜之書一時籍甚豐碑鉅刻散流江左迨今書家尚祖餘習曰速勿為所染如深焉雖盧扁無所容其靈矣人生不幸不聞過大不幸無恥蘇氏有言曰書于魯公文于昌黎詩于工部至矣或曰彼人耳若夫吕巖鍾離權之瑰雄神險不其愈乎曰吾論書不論仙然抱朴稱皇象為書聖陶真逸有頑仙之論或問懐素草書隣于長史君謨有僕奴之譏過乎曰人無百嵗之夀而有百嵗之信豪傑後起相知於畢世之下齺然若合符節未逹曰人莫不飲食也鮮能知味也夫張公者人龍也藐焉寡儔而素欲䇿駑駘與之方駕九地之下重天之巔乎然則高閑亞棲之流歟曰二僧跚若後矣程子之持敬可謂知其本矣或曰朱元晦諸賢其簡畢乎曰道德之充乎中而溢乎外也王子文書感興其幾矣書學何所止曰歾身而已然則張伯髙行業未彰獨以書酣身益乎曰吾聞之精于一則盡善偏用智則無成聖人疾没世而名不稱彼張公者東吴之精去之五伯再見伯英以此養生以此忘形以此玩世以此流名造書篇畧節古今書品其效尤班固古今人物表與孫䖍禮姜堯章之譜何誇乎曰語其細而遺其大趙伯暐之辨妄所以作也宣和譜石峻等書其誕章之尤者也蘭亭攷俞松續考濫采羣言吾不知其然也黄伯思之論其自欺者也虞伯生論子昻書趙松雪書筆既流麗學亦淵深觀其書得心應手㑹意成文楷法深得洛神賦而攬其標行書詣聖教序冝足可無拘文法栁公權書雖出自顔而意態自若如泰氏之御内得于心而外合于馬志取道致逺而氣力有餘徐浩書無甚議論肉多意微少然舉止精熟體不柔懦蔡君謨書落筆嚴重則無害其為濁如荀攸外柔弱而内强勇故人謂之錦囊裹錐米元章書筆鋒燦爛少竒多怪意到力寡正當逸處却有懶筆如高陽酒徒醉後便欲憑几元至正丙午十月卄夜為徐泰書此墨蹟一冊吉水解縉書學傳授譜書自蔡中郎邕字伯喈於松山石室中得八角垂芒之秘遂為書家授受之祖後傳崔瑗子玉韋誕仲將及其女琰文姬文姬傳魏相國鍾繇元常元常初與關枇杷學書抱犢山師曹喜劉得昇後得韋誕冢所藏書遂過於書無以為比繇傳庾征西翼衛夫人李氏及其猶子㑹衛夫人傳晉右將軍王羲之逸少逸少世有書學先於其父枕中窺見秘奥與征西相師友晩入中州師新衆碑𨽻兼崔蔡草並杜張真集韋鍾章齊皇索潤色古今登峯造極典午之興書家之盛若張丞相華嵇侍中康山吏部濤阮步兵籍向侍中秀輩翰墨竒秀皆非其匹故庾征西始疑而終服謝太傅得片紙而寳藏冠絶古今不可尚已右軍傳子若孫及郄超謝胐等而大令獻之獨擅厥美大令傳甥羊欣羊欣傳王僧䖍王僧虔傳梁蕭子雲阮研孔琳之子雲傳隋永興師智永智永傳唐虞世南伯施伯施傳歐陽率更詢信本褚河南遂良登善登善傳薛少保稷嗣道是為貞觀四家而孫虔禮過庭獨以草法為世所賞少保傳李北海邕與賀監知章同鳴開元之間率更傳陸長史東之東之傳猶子彦逺彦逺傳張長史旭旭傳顔平原真卿李翰林白徐會嵇浩真卿傳栁京兆公權零陵僧懐素藏真鄔彤韋玩崔邈張從申以至楊少師凝式凝式傳于南唐韓熙載徐鉉兄弟宋興李西臺建中周膳部越皆知名其後蘇太師軾黄太師庭堅米南宫芾蔡端明襄卓然為時名家蘇舜欽薛紹彭繼之以逮南渡小米傳其家法盛行于世王庭筠米南宫之甥擅名于金傳子澹㳺至張天錫元初鮮于樞伯機得之獨吳興趙文敏公孟頫始事張即之得南宫之傳而天資英邁積學功深盡掩前人超入魏晉當時翕然師之康里平章子山得其竒偉浦城楊翰林仲𢎞得其雅健清江范文白公得其洒落仲穆造其純和及門之徒惟桐江俞和子中以書鳴洪武初後進猶及見之子山在南臺時臨川危素太樸饒介介之得文敏傳授而太樸以教宋璲仲珩杜環叔循詹希元孟舉孟舉少親受業子山之門介之以授宋克仲温而在至正初掲文安公亦以楷法得名傳其子法其孫樞在洪武中仕為中書舎人與仲珩叔循聲名相埓云饒介字介之號醉翁華蓋山樵浮邱公童子亦曰介叟臨川人遊建康丁仲容壻畜之後卒于姑蘇時嵗丁未宋克字仲温一字克温吴郡人卒官鳯翔府同知時洪武丁邜宋璲字仲珩金華人太史潛溪公仲子仕止中書舎人卒于洪武辛酉俞和字子中號紫芝樵者桐江人寓居錢塘洪武中以布衣卒年八十餘杜環字叔循廬陵值夏人卒官水部員外郎時洪武戊辰詹希元後更名希原字孟舉新安人號逸庵丙寅訥叟㓜從父官勝國至洪武初為鑄印副使後卒官中書舎人胡布字子申旴江人一字建民得書法于宋克一云或謂與克同受學紹興老僧云掲樞字平仲豐城人右此文後有春雨二字用硃界行表白紙冩或正或行最為神妙盖先生下錦衣獄春雨必為指揮使紀綱書之而流落他家今為南京刑部尚書楊寜所得余又得先生遊絲字二幅於陜西秦府因併識之天順三年春月王佐識祝希哲評勝國人書虞集如鹵簿禮官贊導應節結束美姿稍逺大雅鮮于樞如三河壯俠長䄂善舞豪鷙自擅時落胡俗鄧文原如疊壁層城不勝沈實饒介如時花沐雨枝葉都新張雨如道士醮詞雖禮而野倪瓉如金錢野菊畧存别韵楊維禎如華譯夷語自墮侏􅍣陳壁如有若據坐尚有典型宋克如初筵卣彛忽見三代解縉如盾郎執㦸列侍明光又論楷法顔真卿黄庭經楷而不小褚遂良西昇經小而不楷一君欲静二臣欲平三佐四使以次短小此一法也徐文長評字手蹟黄山谷書如劍㦸構密是其所長瀟散是其所短蘇長公書専以老樸勝不似其人之瀟灑何耶米南宫書一種出塵人所難及但有生熟差不及黄之勻耳蔡書近二王其短者畧俗耳勁净而勻乃其所長孟頫雖媚猶可言也其似算子率俗書不可言也嘗有評吾書者以吾薄之豈其然乎倪瓚書從𨽻入輙在鍾元常薦季真表中奪舎投胎古而媚密而散未可以近而忽之也吾學索靖書雖梗槩亦不得然人並以章草視之不如章稍逸而近分索則超而倣篆分間布白指實掌虚以為入門迨布勻而不必勻筆態入净静媚天下無書矣掘入節乃大忌雷大簡云聞江聲而筆進噫此豈可與俗人道哉江聲之中筆法何從來哉隆慶庚午元日醉後呼管至無他書漫評古人何足依據先生評各家書即效各家體字畫竒肖傳有石文又䟦停雲館帖祝京兆書乃今時第一王雅宜次之京兆十七首書固亦縱然非甚合作而雅宜不収一字文老小楷從黄庭樂毅來無間然矣而獨収其行書早朝詩十首豈後人愛翻其刻者詩而不及計較其字耶王元美藝苑評書家者流稱鍾張羲獻古雅之士徃往左􅂻鍾張華俊之儔則必服膺羲獻今合諸家之論可以類推王羲之云頃尋諸名書鍾張信為絶倫其餘不足存又云吾書比之鍾張鍾當抗行或謂過之張草猶當雁行然張精熟池水盡墨假令寡人耽之若此未必謝之羊欣云羲之便是小推張不知獻之自謂云何又云張字形不如右軍自然不如小王謝安嘗問子敬君書何如右軍答云故當勝安云物論殊不爾子敬答云世人那得知梁武帝云世之學者宗二王元常逸跡曾不睥睨羲之有過之之論後生遂爾雷同元常謂之古肥子敬謂之今痩張芝鍾繇巧趣精細殆同機神肥痩古今豈易致意逸少至學鍾書勢巧形密及其獨運意踈字緩又子敬之不迨逸少猶逸少之不迨元常學子敬者如畫虎也學元常者如畫龍也陶貞白答梁武帝云伏覽書論使元常老骨更䝉榮迼子敬懦肌不沈夜泉逸少得進退其間則玉科顯然可觀又云此世皆高尚子敬海内非惟不復知有元常於逸少亦然今奉此論自舞自蹈未足逞泄日月願以所摹竊示洪逺思曠此二人皆是拘思者必當仰贊踴躍有盈半之益蕭子雲上武帝啓云臣昔不能拔賞隨世所貴規模子敬多歴年所始見勤㫖論書一卷商畧筆勢洞逹字體又以逸少不及元常猶子敬不迨逸少因此研思方悟𨽻式始變子敬全法元常庾肩吾云張工夫第一天然次之鍾天然第一功夫次之王功夫不及張天然過之天然不及鍾功夫過之唐太宗云鍾雖擅美一時亦為過絶論其盡善或有所疑至于布纎濃分踈密霞舒雲卷無所間然但其體則古而不今字則長而逾制語其大量以此為瑕獻之雖有父風殊非新巧觀其字勢踈痩如隆冬之枯樹筆蹤拘束若嚴家之餓𨽻其枯樹也雖槎枿而無屈伸其餓𨽻也則羈羸而不放縱詳察古今硏精篆素盡善盡美其惟王逸少乎觀其㸃畫之工裁成之妙烟霏露結狀若斷而還連鳯翥龍翔勢如斜而反直翫之不覺其倦覽之莫識其端心慕手追此人而已孫過庭云元常専工于𨽻書伯英尤精于草體彼之二美而逸少兼之擬草則餘真比真則餘草又云以子敬之豪翰擅右軍之筆札雖復粗傳楷則實恐未克箕裘是知逸少之比鍾張則専博斯别子敬之不及逸少無或疑焉張懐瓘云若真書古雅道合神明則元常第一若真行妍美粉黛無施則逸少第一若章草古逸極致高深則伯度第一若章則勁骨天縱草則變化無方則伯英第一其間備精諸體唯獨右軍次至大令然子敬可謂武盡美矣未盡善也逸少可謂韶盡美矣又盡善也山谷云右軍似左氏大令似莊周宋齊之際右軍幾為大令所掩梁武一評右軍復伸唐文再評大令大損若唐文之論是偏好語不足以服大令心也人謂右軍内擫故森嚴而有法大令外拓故散朗而多姿法自兼姿姿不能無累法也後人學右軍終不能似大令已自退漏李北海蘇眉山趙吴興筆然則大令之於右軍直父子耳不可稱伯仲也抱朴子曰吴之善書者則有皇象劉纂岑伯然朱季平中州則有鍾元常胡孔明張芝索靖並用古體俱足周事飄乎若起鴻之乗勁風騰鱗之躡驚雲按南史謂劉休者與王僧䖍同省而是時海内俱習羊欣書以右軍跡涉輕㣲多所不好休獨重之自是右軍之書復盛後至梁武時陶貞白尚云比世皆高尚子敬不復知有元常逸少亦然然則右軍之書得劉休而振得梁武而著得唐文而後大定猶之顧凱之畫亦至唐始定也羊欣學子敬者也故武帝評子敬為河朔子弟舉體充恱然沓拖不可耐而評羊欣如婢學夫人舉止羞澁是以文皇詆子敬為餓𨽻而學敬元者時人譏以為重儓子敬餓𨽻敬元成一重儓矣然同一人書也餓𨽻之與沓拖子弟一痩一肥毋乃太相牴牾歟武帝評蕭思話書仙人嘯樹而張伯英如漢武好道憑虚欲仙欲仙尚未仙也漢武欲仙則又去仙逺也伯英乃不如思話乎梁武始重元常而下子敬特許逸少躑躅其間觀陶隠居所云元常朽骨更䝉榮造子敬懦肌不淪長夜又武云逸少學鍾勢巧形宻及其獨運意踈字緩然則太平寺主臨池之趣全在鍾也及攷竇臮述書賦高祖叔逹恢𢎞厥躬冺規矩合童蒙張懐瓘書品云狀貌亦古乏於筋力既無竒姿異態有减于齊高然則梁武帝之聲價不振實以學元常之故也學鍾張殊極不易不得柔中之骨不究拙中之趣則鍾䧏而笨矣不得放中之矩不得變中之雅則張降而俗矣吾嚮者閱隋僧智果書梁武帝評鍾司徒字有十二種意外巧妙絶倫多竒後又有鍾繇書如雲鶴逰天羣鴻戯海行間茂密實亦難過語以為不應重下評意所謂司徒者繇子㑹也及覽前輩題評以十二種意外歸之太傅吾竊非之載閱繇父子本傳繇不為司徒㑹加司徒雖尋伏誅而所稱司徒者必㑹矣然又以梁武與陶隠居論書至數十往復皆不及㑹不應稱之若此及閲袁昻本文所謂十二種云云乃在啓内勅㫖具云如嚮所評臣謂鍾繇容氣密麗若飛鴻戲海舞鶴逰天等語蓋重贊之也此外又有武帝觀鍾繇書法十有二意云平直均密鋒力輕快補損巧稱字外之竒文所不書然則袁昻之稱司徒十二種法正謂繇也吾家蓄太傅薦季直表黄初二年司徒東武亭侯蓋是時華歆辭疾繇實轉司徒四年遷太尉而歆復代之史有脫漏故耳二者實可相證因記於此鍾太傅七十六其子司徒僅四十五右軍五十九子大令四十三天假以年不果勝尊公乎曰不爾格已定矣假之年有小變而不能有所加也右軍之書後世摹倣者僅能得其圜密已為至矣其骨在肉中趣在法外𦂳勢㳺力淳質古意不可到故智永伯施尚能繩其祖武也歐顔不得不變其真旭素不得不變其草永施之書學差勝筆旭素之書筆多學少學非謂積習也乃淵源耳顔書貴端骨露筋藏栁書貴遒筋骨盡露旭素之後不得不生􅈯光高閑顔栁之餘不得不生即之溥光智永伯施有書學而無書才顛旭狂素有書才而無書學河南北海有書姿而無書禮平原誠懸有書力而無書度楊用修云張旭妙於肥藏真妙於痩以予論之痩易而肥難用修此語未必能真知書者筆肥則結構易密筆痩則結構易踈此痩難而肥易也唯是既成之後痩近勁勁近古肥易豐豐近俗耳伯高之所以妙在肥而不肉也僧亞栖云書貴能變方自成家主右軍變白雲歐陽詢變右軍栁公權變歐陽此殆是囈語白雲先生何人亦未有書蹟存世蓋右軍偶一言之大抵托辭耳歐陽書法實一變然非變右軍若栁之於歐法少變而意故不變也山谷云王右軍初學衛夫人小楷不能造微入妙其後見李斯曹喜篆蔡邕𨽻八分于是楷法妙天下張長史觀古鍾鼎銘科斗篆而草聖不愧右軍父子易有云引而伸之觸類而長之天下之能事畢矣五代時楊少師凝式黄魯直極重之謂為散僧入聖又謂可繼顔魯公釋懐素楊於今𨽻極拙魯直所推行草耳而余見其一二行皆不甚合作聞朱象𤣥有韭花帖甚佳未及見之宋初王待詔著宋宣靖李西臺蘇參政皆稱名書家者然不甚得法山谷評待詔如小僧縳律西臺如講僧參禪然待詔猶有晉人意范文正伯夷頌見推亦以其人耳杜祁公蘇長史皆學懐素杜痩而生蘇痩而弱第覺玉潤微勝氷清蔡忠恵略取古法加以精工稍滯而不大暢蘇文忠正行出入徐浩李邕擘窠大書源自魯公而微欹近碑側記行草稍自結搆雖有墨豬之誚最為淳古黄山谷大書酷倣瘞鶴狂草極擬懐素姿態有餘儀度少乏米元章源自王大令褚河南神采奕奕射人終愧大雅是四君子者號為直無楷矣米元章有書才而少書學黄長睿有書學而少書才以故評隲古人墨刻真􅎓亦有相牴牾者然長睿引証各有據依不若元章之孟浪也如謂鍾太傅尚書宣示為右軍臨白騎遂帖為大令臨蓋不唯太傅宣示已殉王修葬而開元中滑臺人家用右軍扇書臨宣示大令臨白騎二帖應募入内府其事甚明謂長風帖為逸少少年未變體書蓋以右軍别帖有長風范母子語可證也此外辨右軍自適得書至慰馳竦耳酸感至此加下㿃宰相安知噉豆鼠伏想嫂等濶伯英殊愁體太今而乏古大令疾不退至分張筆過流而少節或以此疑非二公書可也元章論書見右軍稍大而逸者便以為子敬見伯英近今者與子敬近縱者便以為伯高藏真愚又推黄米之旨謂伯高僅有章法而無變法子敬僅有破體而無狂草則不敢信也按張懐瓘明言章草之書字字區别張芝變為今草拔茅連茹上下牽連或借上字之下而為下字之上竒形離合數意兼包唯王子敬明其心指故稱一筆書者起自伯英也又云伯英剏為今草天縱尤異率意超曠無惜是非至于蛟龍駭獸奔騰拏攫宋室之冠然小楷絶響矣山谷推王文公書似楊少師章惇有鍾王法談者以為曲筆蔡京卞兄弟皆擅書名御府法書墨妙皆其評跋彼人縱極八法無取一長况未必耶唐文皇以天下之力募法書以取天下之才習書學而不能脱人主面目𤣥徽亦然智永不能脱僧氣歐陽率更不能脫酸餡氣旭素顔栁趙吴興不能脱俗氣南晉宋齊之間可以脫矣宋齊之際人語曰買王得羊不失所望蓋時重大令而敬元為大令門人妙有大令法者也中睿之季時人語曰買褚得薛不落節蓋時重河南而少保為河南甥妙有河南法者也二事可謂切對李北海在唐人書品中不甚烺烺而趙文敏法之便自名世北海傷佻然自雅文敏稍穏然微俗眉山亦嘗學北海不如其學平原也孫䖍禮書書述謂其萬字一類風行草偃輕之也至矣今所書書譜令後人極力摹倣尚自隔塵以此知古人不可及也子瞻似顔平原故極口平原魯直效瘞鶴故推尊瘞鶴元章出褚河南故左袒河南河南楷似行然自有楷平原草似楷然自有草李北海楊凝式及元章魯直之勢心手隨變窈㝠而不知所如又云子敬如蹴海移山翻濤破嶽懸崕墮石驚電遺光此豈非草聖之極耶攷前後書亦未必似伯高蓋伯高時有肥筆渇筆不若是之勻和也若託桓江州一書又多逸少語子敬亦不合書之覺思光為近至于右軍雖結構緊密而變化靈異又不可以一節為拘也楊用修云古人例多能書如管寜人但知其清節而不知其銀鈎之敏又引管寜别傳云寜字畫若銀鈎及茅山碑云管寜銀鈎之敏是也余固知其誤按索靖字㓜安其章草法有銀鈎蠆尾及考陶隠居解真碑云㓜安銀鈎之敏允南風角之妙正謂索靖也蓋管寜亦字㓜安用修誤以為寜遂併其姓名改之耳考寜三國志註有高士傳傳子諸書俱無銀鈎語又云劉曜人知其獰凶而不知其字畫之工註見草書韻㑹當是時劉聰劉曜皆能書而聰之獰凶大出曜上俱見本載記用修又誤以劉德升為劉景升而云即表也表初在黨人中俊厨顧及之列其人品之高可知此尤可笑虞伯生謂坡谷出而魏晉之法盡米元章薛紹彭黄長睿諸公方知古法而長睿所書不逮所言紹彭最佳而世遂不傳米氏父子最盛行舉世學其竒怪弊流金朝而南方獨盛遂有張子湖之險澁張即之之思謬極矣此語大自有理又獨稱吴説傅朋書法深穏端潤非近時怒張筋脉屈折生柴之態且謂至吴越見傅朋書最多皆隨分贊歎圖來者稍知正法今傅明書世遂少見紹彭號翠微居士余有其詩數紙緊密藏鋒得晉人意惜少風韻耳鐵圍山叢談謂其父京善榜書妙出四家之工此雖曲筆然亦必有可觀者米芾元章自負以為前無古人然是行筆非真筆也用修又云南唐王文秉工小篆不在二徐下又有王逸老者善篆與八分其命名乃欲抗右軍不知何代人疑即文秉也按陶九成書史王升字逸老號羔羊居士草書殊有旭顛轉摺態宣和間進所作草書内庭稱之用修似未之見新鄭高少師拱藏東坡草聖醉翁亭記并石本䟦細閲無一坡法而渇筆遒逸飛動中有正書却近俗吾斷以為逸老書蓋南渡以後諸公不能辨此元人却不能作此結法也自歐虞顔栁旭素以至蘇黄米蔡各用古法損益自成一家若趙承㫖則各體俱有師承不必已撰評者有奴書之誚雖則太過然謂直接右軍吾未之敢信也小楷法黄庭洛神於精工之内時有俗筆碑刻出李北海北海雖佻而勁承㫖稍厚而軟惟於行書極得二王筆意然中間逗漏處不少不堪並觀承㫖可出宋人上比之唐人尚隔一舎楊又引東坡跋希白作字自有江左風味故長沙法帖比淳化為勝世俗不察争訪閣本誤矣乃知潭帖勝淳化多矣希白錢易也按希白乃潭州僧希白耳書家謂其有筆意而多率直無縈迴縹緲之勢楊以㓜安為管寜以希白為錢易其孟浪殊可對也元人自趙吴興外鮮于伯機聲價幾與之齊人或謂勝之極圓健而不甚去俗鄧文源有晉人意而微近粗庫庫子山有韻氣而結法少踈然是三人者吴興流亞也虞伯生差又雅鮮于必仁朗朗有父風掲曼碩父子羙而近弱張伯雨健而近佻柯敬仲老而近粗班彦功少頗遒爽晩成惡札龔璛陳深輩皆長于題跋倪元鎮雖微有韻而未成長人或許以得大令法何也元鎮以稚筆作畫尚能于筆外取意以稚筆作書不能于筆中求骨詎冝以汎愛推之也正鋒偏鋒之説古本無之近來専欲攻祝京兆故借此為談耳蘇黄全是偏鋒旭素時有一二筆即右軍行草中亦不能盡廢盖正以立骨偏取態自不容已也文待詔小楷時時出偏鋒固不特京兆何損法書解大紳豐人翁馬應圖縱盡出正鋒寜救惡札不識下字人妄談乃爾可恨可笑張即之非不遒勁而粗醜俗惡種種可恨是顔栁之踈裔辱家風者解大紳張汝弼非不圓熟而踈軟村野種種可鄙是旭素之重儓壊家法者臨書易得意難得體摹書易得體難得意臨進易摹進難離之而近者臨也合之而逺者摹也蒼頡九篇相傳是李斯其第九章乃云狶信是陳狶韓信劉京是大漢西土是長安右軍少從丞相渡江北蹤永絶其題筆陣圖云北㳺名山比見李斯曹喜等書又之許下見鍾繇梁鵠書之洛下見蔡邕石經二體書始知學衛夫人徒費年月王著集淳化帖有漢章帝書千字文紕繆如此徒資嗢噱法書中有王右軍千字文昔賢作笑端蓋知其為周興嗣撰不應右軍預有之然梁武帝命殷鐵石摹取右軍千字命興嗣次韻故當有右軍千字文非謬也又有衛夫人筆陣圖右軍題筆陣圖後及右軍筆勢圖一章筆勢論十二章昔賢皆辨其妄然是六朝善書者擬作苟能熟覽思亦過半矣孫過庭云樂毅論則情多怫欝東方贊則意絶瓌竒黄庭經則怡懌虚無太師箴又縱横争折蘭亭之興集思逸神超私門戒誓情拘志慘愚謂此在覽者以意逆之耳未必右軍作書時預有此狡獪也又一云黄庭如飛天仙人洛神如凌波神女曹娥碑如㓜女漂流于風浪間朱長文作續書譜而進石曼卿蘇子美於妙退裴行儉孫䖍禮王紹宗李邕鍾紹京韋陟賀知章裴休於能吾未敢信也閣帖真書自鍾太傅宣示外獨有王世將僧䖍兩䟽啓耳行草自二王外獨有皇象索靖及亮白一紙耳何也以其體最古雅不落塵也顔魯公家廟碑今𨽻中之有小篆筆者歐陽蘭臺道因碑今𨽻中之有古𨽻筆者皇象天發碑分篆中之有章法者瘞鶴銘行書中之有古𨽻者懐琳大急就嵇康絶交書皆托之右軍以應貞觀之募第結法雖沓拖多卧勢不能作山隂内擫筆然圓熟輕俊不妨張翼之亂真也千古楷行之妙無過鍾王鍾王之跡妙者宣示樂毅蘭亭而已樂毅論搨本佳者猶可什倍它刻也墨池璅錄右軍字似左傳大令字似莊周山谷為此言亦猶東坡以杜子美比司馬遷以江瑤柱比荔枝也孫過庭云既得平正須追險絶書家以險絶為功惟顔行與景度草得之吴寛云稱善書者必曰師鍾衛及覩顔栁諸家異體而同趣亦未必不自衛鍾來也若夫宋之蘇黄米蔡羣公交作極一代書家之盛其構勢雖各不侔要之於理又不能外顔栁他求者書譜雖運筆爛熟而中藏軌法故自森然董𤣥宰品書書家以分行布白謂之九宫元人作書經云黄庭有六分九宫曹娥有四分九宫是也内景經全在筆墨畦逕之外其為六朝人得意書無疑今人作書只信筆為波畫耳結構縱有古法未嘗真用筆也善用筆者清勁不善用筆者濃濁不獨連篇各體有分别一字中亦具此兩種不可不知也唐模右軍真跡以十七帖為致佳余臨數十本皆為好事者取去亦復有贋本如此本差稱意乃以王方慶進帖筆法參合用之所謂萬嵗通天帖者是也余曽有右軍行穰帖真蹟十五字正是十七帖一種書及武林楊侍御自安福傳來唐摹絶交書與行穰帖同中缺鸞字乃悟為右軍書蕭齋所摹避子鸞諱而後人誤以為李懷琳耳楷書以智永千文為宗極虞永興其一變耳文徴仲學千文得其姿媚予以虞書意入永師為此一家筆法若退頴滿五簏未必不合符前人顧經嵗不能成千字卷册何稱習者之門自分與此道逺矣虞永興常自謂于道字有悟蓋於發筆處出鋒如抽刄斷水正與顔太師錐畫沙屋漏㾗同趣前人巧處故應不傳學虞者輙成算子筆陣所訶以此李北海書荆門行刻於羣玉堂帖予疑李北海詩在太白集中者皆沉鬰高古無此流易及觀王建詩有荆門行乃知宋人所集雲麾碑等石刻䝉之北海也羣玉帖有虞永興馬贊亦見栁州集辛酉十月朔楊少師歩虚詞帖即米老家藏大仙帖也其書騫翥簡澹一洗唐朝姿媚之習宋四大家皆出於此余毎臨之亦得一斑蔡忠恵公書晝錦堂記凡一字數十更存其合者纔得顔碑什七耳今日得宋榻徐季海洺州府君碑以其意為此如黄金鑄范少伯一鑄而就正以速成自喜不計工拙也庚申八月朔王履道評東坡書云世學公書衆矣劍拔弩張􅂹奔猊抉則不能無至於尺牘狎書姿態横溢不矜而妍不束而整不軼而豪蕭散容與霏霏如甘雨之霖森踈掩暎熠熠如從月之星紆徐宛轉纚纚如縈繭之絲恐學者所未能至也此余學戎輅表王􅘙二表近之國朝書法當以吾松沈民則為正始至陸文裕正書學顔尚書行書學李北海幾無遺憾足為正宗非文待詔所及也然人地既高門風亦峻不與海内翰墨家盤旋賞㑹而吴中君子鮮助羽翅惟王弇州先生始為拈出然蘭之生谷豈待人而馥哉荆州仲宣樓所刻登樓賦為吾松喬懋敬書喬素無書名彼中士大夫亦不知為手也喬曽為荆南觀察乃從㳺莫廷韓是龍所書今為正之松江董原正為𤣥宰先生從兄工翰墨而蚤世人皆知有𤣥宰而董氏書法開山肇自原正罕知之者有雙鈎宋本十七帖在吾禾高公𤣥家陳眉公筆記宋時傳三昧蘭亭出于杜器之杜畜百本而唐刻為第一杜名寳晉其有寳晉印者不獨老米也東坡書是學王僧䖍而厯代評者謂學徐浩政不知浩故僧䖍衣缽耳東坡草亦學長沙今傳醉翁亭未必是真六一居士琴操得之東坡詩卷有一跋云觀此真跡殊覺偽者甚可笑也周公謹極喜此跋可謂善下語余嘗謂多見石刻少見真蹟往往覆以真者為偽此豈眼中有筋者乎余皇天藻飛翔雅好書法毎携獻之鴨頭丸帖虞世南臨樂毅論米芾文賦以自隨中書舎人趙士禎為言如此儒又考右軍曾書文賦褚河南亦有臨右軍文賦趙子昻亦書文賦李君實評帖沈存中云唐太宗力購羲之真跡唯樂毅論乃右軍親筆於石而鐫之以為家法者昭陵之殉亦以其石便于甃耳洎温韜盜發其石已碎用鐵索之皇祐中高紳學士之子安世為錢塘主簿存中就其家見之末後獨一海字竹嬾十年前購得一本正海字獨留本也但其闕處有斜書修字數個蓋歐陽文忠公再拓本也昔年於姑蘇韓氏見一絹素臨本相詡以為右軍手書可謂不識源委者矣樂毅論小中有楷黄庭經楷中有小東方朔畫贊五分中有方丈洛神賦方丈在五分中曹娥碑五分字四分畫力命表三分畫五分字此書家教典也不講求何由修證公孫大娘舞劒擔夫與公主争道錐畫沙折􅁫股屋漏雨蓬振沙飛怒猊渇􅂹此書家禪案也不參透何由悟入樂毅論王著所書李白狂草葛叔忱所書絶交書李懐琳所書大字蘭亭叙徐鉉所書天地間偽物亦有不可磨滅者宋黄伯思東觀餘論辨駁古今法書最為精刻乃其辨黄庭經一節實欠詳審伯思曰黄庭經帖為逸少書僕攷之非也按陶隠居真誥翼真檢云晉哀帝興寜二年南嶽魏夫人所授惟有黄庭經一篇得存蓋此經也逸少以穆帝升平五年卒後二年為興寜二年此經始降逸少安得預書之又按梁虞和論書表云山隂壜釀村養鵞道士謂羲之曰久欲冩河上公老子縑素已具無人能書府君能自屈書兩章更合羣以奉羲之為停半日冩畢攜鵞去晉書本傳亦著是説然隠居與梁武啓又云逸少有名之蹟不過數首黄庭勸進樂毅等不審猶有存否蓋此啓在著真誥前未之考耳而李太白乃有黄庭換白鵞之句相習之謬也伯思自以為至當矣不知右軍冩道德經換鵞又冩黄庭經換鵞自是兩畨事而太白詩亦兩見一云右軍本清真瀟灑在風塵山隂遇羽客要此好鵞賔掃素冩道徳筆精妙入神書罷籠鵞去何曽别主人一云鏡湖清水漾晴波狂客歸舟逸興多山隂道士如相見應冩黄庭換白鵞實互之也考道藏黄庭有數種有内景黄庭有外景黄庭又有黄庭遁甲縁身經黄庭玉軸經魏夫人所出乃内景一種係楊真人羲冩其外景經老君所作先出行世右軍所書兩不相溷也張懐瓘書斷張彦逺法書要錄並載右軍書黄庭六十行褚遂良右軍書目黄庭經書與山隂道士其時真蹟自在又武平一徐氏法書記親在禁中見武右曝書太宗所遺者六十餘函有黄庭何所復疑哉他人無誤正伯思自誤耳千字文前行書勅散騎員外郎周興嗣次韻考勅命之制始於唐當是書梁字之誤也又梁武令殷鐵石榻二王書今大令帖中有稱鐵石者即是殷所書而王著輩錯著之耳此亦殊非細故黄長睿赦而不攻何也孫過庭書可謂變動之極矣昔人又以千字一律如風偃草短之何也米南宫書大小天馬賦有掣銜頓轡不受羈絡之氣山谷注李伯時所冩天閑六馬贊矜栗聳峙如就駕鑾輿排仗閶閤蓄千里逺邁之意而不敢逞若坡翁作馬劵與李方叔則高朗卓犖宛然龍􅀈歩驟延頸顒目以顧草澤之羣三公筆墨變化往往隨事注精以展其妙如此古人論行書云八面拱心而無横畫余向未薦此㫖今春得米元章書朱樂圃墓表逐字玩之見其揉團凑合無有間隙乃始了然今人或謂學蘇米則沓拖不緊峭是未得真蹟到眼縫耳米元章論書於道君前曰蔡襄勒字沈遼排字黄庭堅描字蘇軾畫字上問卿何如對曰臣書刷字世皆不解其何語余為銓注曰勒字顔法也描字虞永興法也畫字徐季海法也刷字本出飛白運帚之義意信肘而不信腕信指而不信筆揮霍迅疾中含枯潤有天成之妙右軍法也隠然凌轢諸老自占一頭地姑壇記尤獨步者莫方伯張南安以草書勝陸詹事臨摹趙松雪大佳二沈公則有楷書䝉宸眷最渥陳别駕自成一家亦頗遒勁吴中草書當以祝京兆第一然畧少風骨耳文大史陸尚寳則楷書勝太史如文賦小楷尤精絶可愛王太學行書自一種風度而白雀寺臨没之筆尤竒陳方伯惟扁額大字擅長書家彭徴君作楷近顔真卿俞山人作楷近虞世南陸尚寳子傳廷試時内閣夏公言手其卷歎曰文漢魏而書晉唐擬第一上嫌其名置之二甲命矣墨花閣雜誌洛陽李處權云古今書稱右軍為首正書見曹娥碑妙絶超古與鍾元常抗衡黄庭經樂毅論若出兩手行書見蘭亭叙高風勝韻為一代冠秦太虚云黄庭遺教皆非逸少之蹟歐陽文忠公嘗謂黄庭特後人縁山隂換鵞事附益遺教出於唐冩經手及精考蘭亭樂毅論然後知文忠之言為不謬也東坡書劉景文所藏王大令帖詩云君家子敬十二字氣壓鄴侯三萬籖張愛賔稱惟王羲之能為一筆書陸探微能為一筆畫宋嚴羽卿論詩姜堯章論書皆精刻深至具有卓見及所自運顧逺出諸名家後大抵議論與實詣確然兩事議論者識也實詣者力也力旺者能蔑識識到者又能消力語云識法者懼毎多拘縮天趣不得泛溢也觀白石書詠滄浪詩自當得之元大德間錢塘錢國衡刻十種蘭亭筆法咸有異趣南宋内府五十餘種與韓氏羣玉堂賈氏悦生堂本爾時猶有存者故國衡得選其萃耳趙松雪云古人作字多不用濃墨太濃則失筆意然羲之書墨嘗積三分何也東坡真蹟墨如漆隠起楮素之上山谷亦謂其用墨太濃而風韻有餘然則松雪所云特楷書耳行書則不然樵史品三吳書雲間陸應陽云王弇州序三吴書家而漫及若干人第収其虚聲耳何足為公論余嘗擇其名不愧實者於蘇得八人焉祝京兆允明文待詔徵明王太學寵陳方伯鎏陸尚寳師道陳太學道復彭徴君年俞山人允文於松得七人焉沈學士度陳别駕璧沈大理粲張南安弼陸詹事深莫方伯如忠俞父子野先生識者謂先君子行草真楷出入晉唐而倣顔魯公麻畫張桓矦不特有八分刁斗銘又有流江縣記功碑云漢將張飛率精卒萬人大破賊首張郃于八濛立馬勒石董北苑云劉德升為書家祖師鍾繇胡昭皆受其學昭肥鍾痩各得一體定武本世罕傳已久即周憲王邸中所鐫五種蘭亭其間肥痩不一行楷雜亂非復右軍故歩矣相傳定武為歐陽率更臨則楷法多褚河南臨則行法勝米海嶽筆古佻逹故不欲為定武左袒即今所摹褚河南蘭亭亦我用我法以意為之耳然生趣森勃超然凌空之態仍不减山隂面目也唐書學有通微院體鍾紹京景龍中以院總監從討韋氏有功性嗜書家藏王羲之獻之褚遂良書至數十百卷以善書直鳯閣武后時榜諸宫殿明堂及銘九鼎皆紹京書也其字畫妍媚遒勁有法誠少與為比米南宫稱法書曰墨王可謂極稱非右軍大令東武亭侯不足當也懐素書意在筆前多意到而筆不到趙孟頫書弱中示競亦竟若綿裹鐵云鮮于奉常公常見葉秋臺書反覆諦視至欲下拜昔管仲變井田而成内政孔明變内政而成八陣李衛公變八陣而成六花君謨變右軍平原而成忠恵此子臧所謂太上逹節者也王著閣帖誤人千載世俗莫覺争相寳尚不幾享弊帚以千金哉自米一鑒而偽分黄再鑒而真出于是博古家始知不誣古矣此卷大令書標為澄清堂世傳賀蘭所摹然書譜未載不知何據余觀其神骨冷冷結構遒逸高出淳化十倍内領動等五帖又淳化中所無而他刻亦未始見尤可寳也卷後附索靖出師頌鍾繇賀捷表按出師頌昔人定為蕭子雲賀捷則鍾真筆二帖俱為希跡用以壓卷者蓋人由王索而窺元常真為百尺竿頭進一歩耳率更正書出大令森森若武庫矛㦸虞永興稱其不擇帋筆高麗亦知愛重遣使請之其名重如此是夣奠帖共七十六字而清痩古健遒勁之中不失腴潤較化度醴泉銘不無少變乃字畫之妙不在二帖下正如郭林宗雖標格極峻而虚和近人他書未免作李元禮謖謖松風矣真書鍾繇宣示力命尅㨗右軍樂毅畫贊黄庭告誓霜寒大命洛神六朝不知名氏曹娥平叔子遺教陶𢎞景瘞鶴舊館壇智永千文虞世南孔子廟碑歐陽詢九成宫化度寺虞恭公褚遂良哀冊聖教張旭郎官顔魯公麻姑仙壇放生池中興頌干禄字東方朔贊栁公權院羅尼行鍾丙舎吴人羸頓雪寒長風右軍蘭亭極寒麥熟官奴快雪來禽奉橘聖教序開元寺大令地黄嵗終衛軍授衣阿姨鵞羣嵗盡夏日奉對思戀天寳吴興黄門山隂東風轉勝相􅂈鵞還觸事夏節恨深黄耆礜石駱驛月内尊體謝安八月五日褚遂良枯樹李邕婆羅樹張從申𤣥静晉人書雖非名法之家亦有一種風流藴藉之態縁當時人士以清簡相尚虛曠為懐修容發語以韻相勝落筆㪚藻自然可觀可以精神觧領未可以言語求覔也譚子國轉運汪砢玉輯於峚山房半拾遺淳化閤帖無銀錠本祖帖在世余足跡海内厪見兩三部其中合凑者多皆非初榻内有銀綻紋為後榻無疑原傳宋大宗詔諸大臣購天下名蹟摹勒藏内府故不多傳後又為王著翻刻又差一層矣至著刻者余亦見之前有王著二字然閤本以紙墨為貴此帖紙是澄心堂墨是廷珪有目力者一見了然自明即不多見者亦知神彩奕奕為神物不知何由至江南得藏余齋也可勝欣幸餘清齋主人自識宋榻淳化閤帖海内無全本惟嘉項庻常有十卷亦史明古華東沙兩家合併而文待詔為之和㑹者庻常珍祕雖千金不與人一觀無論購也今吴用卿忽視余此十卷紙墨精好筆意備全又在項本之上何幸晩生見此竒寳戊午二月董其昌題珍觀淳化原本如探龍得珠得未曽有堪與項氏千金帖並傳陳繼儒題淳化閤帖行世後一經黄長睿之刋誤再經王弇州之抨擊而王著幾無處生活長睿既譏其不深書學又昩古今而弇州直嘲之為手如懸鎚腹無半册史在且謂當時三館無糾正者毎一開卷便為王著村老供一胡盧董狐之筆不啻嚴矣而波磔督䇿隃糜側理不能不歸美于摹榻之工蓋八法所在又何拘時代官位間余論閤帖惟以墨黒甚于漆字豐濃有神者即為真初榻本如兩府被賜親贈遺文章家雅語何從沾沾辨之哉用卿留心古法書此帖極為其所珍賞第五卷智果何氏帖皆全并無烏鎮福清三山殿司之疑也雁門文震享題余昔於安將軍處見此帖紙墨精妙快人心目辛酉秋余在京陵吴用卿出其淳化閤本示余不覺神情頓還舊觀東山太白仙機題為安將軍之藏想安將軍定是大賞鑒家方有此耳但不知安將軍為何處人謫仙之言諒有所據即其書使二王復起亦當服之也吴廷丙戌中秋余止角里清靄閤東與居停主高君看舊時月色出淳化無銀錠本示余云是其家𤣥期所遺𤣥期與余自㓜金石交知其精于鑒古況得自吴江村在在稱米家書畫船者兩人冝識拔此帖帖後歸任公給諌而寳書為左袒因復歸之永為高氏物不啻華氏和合矣第紙墨如新幸得陳董諸公而鑒定乃雜亂後余共兒淵幸獲觀神物哉砢玉識山谷道人題榮州祖無大師元上人詩如爐鑄鐵而筆力遒勁字勢飛颺猊虎鬭争龍蛇變化莫測去來之迹是殆日月星辰彰于天山川草木形于地而不知孰使之然也詩句字畫稱唐之盛也詩如李杜書如顔栁無加矣至宋元祐熈豐間乃有道人者出不惟可以追駕古人遂至兼取衆長集之一已近臣諸公詩句如村店酒望字畫如妓館歌兒而去古人益逺矣吾於是卷盖三嘆云吉州文天祥山谷老人以善翰墨鳴於宋元祐間與東坡先生并驅雖米蔡諸公亦出其妙也予嘗求見之而不得袁清容學士以珍藏答王周彦卷出示其書法之妙氣吐煙雲神拂星斗絶非他卷可及予覽焉不忍釋手丹立生柯敬仲跋黄文節公答王周彦詩卷筆法妙絶氣韻飛動優入神品乃卷法書第一此亦希世之寳豈易得哉袁清容學士博古知今鑒定真蹎尢為寳愛不惜重價収之且山谷嘗用澄心堂帋惟此卷用粉箋及李廷珪之墨謂之三絶於此閲之豈非幸歟浦城楊載跋家藏古人翰札自南晉鍾王後法帖并唐如栁公權輩者法書數卷惟宋黄山谷卷自有奪天工之妙觀之得趣處精神已為其闕焉而不闕者栁莊自䟦珊瑚網卷二十四下
