body:
  text: 珊瑚網卷三十二明汪砢玉撰名畫題䟦八高文簡倣老米青緑雲山卷青山半晴雨遥現行雲㡳佛髻欲争妍正空勤梳洗房山高彦敬作於雲巖精舍呉仲圭云空山兮寂歴石氣蒸兮蘢葱人家兮木末望雞犬兮雲中水流花謝淹冬春兮無窮江亭兮石嫩靄靄兮深松山中人兮歸來䬃長嘯兮天風彦敬尚書弄襄陽墨戲作此圖沙彌老人倣招仙之辭作此賛白日寒氷手皺龜拆雲川居士應笑我多事饒舌至正戊子正月高彦敬烟嶺雲林西村元不隔西泠未晚人家户半扄要覔巢居新閣處試從烟雨喚樵青句曲外史張雨江籬漠漠水泠泠林下幽人户未扄睡熟不知春雨過起來雲外數峰青徐賁次韻一個茅堂何處小橋古木溪灣但見山青雲白不知天上人間奕漠漠層巒障曉嵐參差沙樹似江南眼明見此房山筆不減當年海嶽菴逃虛子尚書生長燕臺下慣識風沙草漫野何由得見山水鄉烟嶺雲林逺能冩平時四海作宦㳺高興最愛江南秋霅溪清曉剡溪晚間解征轡尋扁舟此中謝屐曽經處半是啼鴉棲鶴樹斷橋旗下問農歸逺寺鐘邉訪僧去風流一沒嵗未遥坐覧遺跡成前朝何當徧覔畫中景聖恩已許作漁樵高君彦敬號房山拜尚書公畫山水無不佳者未若此幅大有米家意趣静菴張别駕持此晝索余拙作故賦一篇以塞請耳然余老草不工可􅀏時洪武庚戌嵗三月五日渤海高啓題梅之紅其色也海棠之香其韻致也畫之濃淡其神彩也高尚書潑墨濃淡成山林烟雲靈幻神彩飛動其上苑朱梅昌州香海棠乎真散聖安禪自能竒逸萬厯丙午小春初度日西呉汪砢玉題于自韻山丁巳春余以高彦敬烟嶺雲林與趙文敏杏花書屋倪元鎮翠竹喬柯王叔明鐡網珊瑚及王元章墨梅同供一室時董𤣥宰太史過齋頭見之因評房山云此幅墨氣絶佳其竒爽過南宫猶唐詩之於文選也余請即題是語㑹諸客踵至未果後為姑溪友人賺去不憚千里追索不啻珠還合浦也砢玉記於江村趙集賢林山小隱圖大徳八年十二月廿日子昂有呉郡徐霖子仁林山隠序不録苕水秋風動白蘋青錢學士玉為人山林物外别成趣造化手中殊有神寒具漫傳誰㸃染京華高卧不埃塵馮君韞匵長懐寳莫負當時此冩真宗道得此圖因以自號其向歸可知矣余賞之不足附記一律所幸亦同作卷中人耳癸亥重九呉郡祝允明志蘇子愛竒石雪浪號齋居米氏寳晉墨標榜亦復如瞻兹小隱圖按境結林廬於焉寓祖述雅致私契余因名寳豈戾匪云賦子虛溪山在屋上流水走堦渠衆鳥鳴樹㒹亦可觀跳魚耕釣托逺心城市即村墟知子日無事垂簾惟讀書長洲沈周展圖忽有契佳境留待人金陵山水處松雪與傳神子非滑稽口金門為弄臣亦非南昌尉忤世跡埋堙但甘布衣老供稅作齊民白雲自怡悦暇則琴尊親雖遭孔璋筆移文空爾陳嘉禾吕㦂松雪此圖全法董北苑大著色於絹素上溪山重叠漁舍秧畦不異武陵風景真肥遯之區恍然如隔世也世賢子趙承㫖𤣥真觀圖在絹素上重青緑山水掛幅對此山水咏使人塵慮消况兹構真館燕坐逺煩囂青林䕃石牖素雲冠山椒松風和澗泉雜佩生瓊瑶焚香玉女降長齊百靈朝仙道本不逺清都亦非遥自嘆衰耆年頗費猿鶴招安得生羽翰從子以逍遥子昻玉堂圖就幾經年秘録清修不卧氊心想逺期三島客夢魂不到九重天逍遥風月山中事放蕩形骸物外仙誰信長生真有訣豈知林下可通𤣥南屏山夷簡華髪驚心引暮年乆捐燈火伴吟氊迂疎願棄人間事放浪難拘甕裏天丹濟有時飛姹女酒酣長日夢逰仙從今已謝吞腥客秖就洪崖訪太𤣥關繡天慶重啼白髪年儒冠便脱卷吟氊蒼龍復佩遊三島𤣥鶴還騎朝九天靈運誰云先作佛稚川自信後來仙逍遥今出塵寰外應笑揚雄尚草𤣥京兆宇文公諒樂道幽人已有年蒲團應勝紫茸氊堦前影轉花當檻松外聲高鶴在天盃酒乆疎名利客經書惟考古今仙居㕓亦棄林泉趣何日相依細論𤣥碧虛道人盛昌月林棲遯樂餘年芳草緑苔為坐氊擬駕雲軿遊碧落還陪羽客聽鈞天興隨緱氏山頭鶴夢入邯鄲枕上仙從此超然埃􅅽表好尋真侣覆𤣥𤣥盧充􅜶趙子昻𤣥真圖不流外郡余慕之乆觀在玲瓏山去郭北一十八里相傳其山産玉怪石萬數旅乎如林孤峯拔秀繚繞雲巒中多洞壑懸崖崖上有沈休文書洞天福地四字後為取石者鑿損舊有雨花菴𤣥真觀長夀塢韻石書院巔有漏月峯子昻築一精舍於其旁供養中峯大師每顧大師必小憇𤣥𤣥堂故得子昻遺跡甚富飛甍華屋鐘鼓相聞迄今並廢按觀建自呉越王世出得道真人號𤣥𤣥子者諱龍字雲卿乃妙應淵得慈濟元君之裔子昻族叔也能詩好道中年棄家入山集道藏黄白異術善呼喚風雨而武宗屢聘不就遂採藥海上不知所終至元間谷翁真人從天台忽遇師于山隂道山叩𤣥乞道黙無片言惟授丹一粒而去故谷翁亦得蟬脱云此圖向鎮藏館中後為氷壺先生賺出復易數姓今得覩於幽蘭軒樹石精雅墨妙詩清可為子昻生平得意之作也寳諸寳諸己酉榖日弁山老人高輝志趙文敏晝謝幼輿丘壑圖倣趙千里著色横卷黄塵汚人廊廟具蕭散風流誰比數清言善畫浪相傳遺恨千年機上女呉興姚式題筠菴昔顧長康畫謝幼輿於巖石裏人問其故答曰幼輿一丘一壑自謂過之故宜置此子丘壑中也觀其清逸標致固足嘉尚然能確守臣節當時同幕罕有及之者今松雪翁後數百載心領神㑹作為此圖最是位置有方筆意竒妙使長康復生見此必當㸃頭東廬王琦一丘一壑絶塵坌坐看青山出白雲可使玉堂揮翰手却疑大小李將軍鄧榆木之身形似鶴􅁂􅆴􅆴消得松風置一龕幸自清清好山色無縁秪有幼輿堪虞集論者可方庾亮何如丘壑自專幸甚嘯歌不廢風流圖畫猶傳宋无右先承㫖早年所作幼輿邱壑圖真跡無疑拜觀之餘悲喜交集不能去手無言師宜寳之雍謹書宜著山巖謝幼輿鷗波落月夜忩虛虎頭癡絶無人識把筆臨池每自娯倪瓉洪武辛未夏六月十又二日三山周斌西甌趙友士李鐸上饒梁鵠同觀于建庠之春風堂萬厯丁未陳繼儒觀於項孟璜萬卷樓此圖乍披之定為趙伯駒觀元人題䟦知為鷗波筆猶是呉興刻畫前人時也詩書畫家成名以後不復模擬或見其杜徳機矣董其昌觀因題己酉九月晦日趙松雪作淵明歸田圖青緑山水横卷子昂欵陶令厭處貴處貧懐反開到官六十日賦辭歸去來輕舟颺素波浦溆相沿洄㣲風吹襟袖飄飄若毰毸衡宇方在瞻候門見僮孩孤松自堪撫三徑從荒萊容膝諒巳安豈受外嫌猜斯人有高蹈千春覧芳埃允文淵明千載人懐惟遇酒開竟辭五斗米浩然賦歸來扁舟下七澤蕩槳聊沿洄頭上漉酒巾􅁂髭已毰毸到家俱歡迎老稚雜童孩入門列罇罍相與鋤蒿萊松雪妙㸃筆圖成無疑猜誰云萬古後磨滅同塵埃趙承㫖此圖設色精妙師伯駒而雜以士氣又非止於伯駒也俞仲蔚詩亦冲逺蕭散可愛因遂和之茂苑文嘉陶令罷彭澤正及黄花開有酒不辭濁長歌歸去來千載義熈波誰能溯其洄學士葆天真椎髪白毰毸回首感宗周擲國一嬰孩藍輿蹇柴桑紫騮㨗蓬萊時暌跡更殊疇能不見猜惜哉丹青美托尚隔雲埃趙呉興畫陶彭澤歸去來縱極八法之妙不能不落豎儒吻葢以永初之不臣宋與至元之仕元趣相左耳若其風華秀潤標舉超逸虎頭㸃拂雲麾烘染所謂趙郎并其性情而得之者與彭澤人品文章真足三絶又不當以此論也余詩為惡韻所窘不免墜豎儒口業令嗜古見之其不罵為殺風景者幾希書畢一笑弇州山叟王世貞弇山題䟦載四部藁今得見此卷知此公鍳裁甚確口業自懴又是翻公案語其昌趙文敏白描淵明像後行書歸來辭在自製粉牋上横卷大徳四年春二月呉興趙孟頫書既書歸來餘興未盡乃作竹石淵明亦當愛此耶虛館坐清曉高秋零露時佳菊秀可餐寒葩含晩滋芳馨𤼵孤思冩此歸來辭餘興猶未巳𤣥玉生瓊枝孰謂公子懐不與幽人期撫卷三嘆息係年非義熈姑蘇王行典午山河已莫支先生歸去自嫌遲寄奴小草連天緑剛剰黄花一兩枝沈周右元趙文敏公手摹晉處士陶靖節先生像兼録其歸去來辭翰墨精妙楮隙復補以竹石且謂淵明亦當愛此豈謂其辭中偶不及此耶讀其辭想見其為人文敏公之尚友吾亦想見之矣苐靖節之孤松卓有定見而文敏公之愛或博而不專非後學可輕議也錫山鄒松石翁珍圖書甚富而於此尤珍之吾亦想見其尚友矣然獨出以示余豈亦謂知辭中趣耶書質諸有識者𢎞治已未仲秋後二日華亭後學錢福誌松雪書歸去來辭前作淵明像後餘興未盡又作竹石其風流瀟散可以想見予曽見人得一摹石乃東坡作銘自書後亦作小竹以盡興二公之文采情致大畧相類然也此松雪卷有王行題王行元末人沒於難詩亦清雅錫山鄒氏家藏正徳癸酉四月朔鄞陳沂志陳氏魯南朱文淵明曠世逸材出處卷舒匹之者鮮矣然耻向官折腰逹人每恨其􅄶豈先生託此以發歸來之興耶撫故園而不歸殉㣲官以自失先生固亦齒冷也此卷乃松雪真跡舊為錫山鄒氏珍藏今歸之楊氏七檜山房癸巳夏蘇門山人叔嗣赴山西省燈下醉題東藪白文印松雪作淵明像予見者數幅矣皆不若此卷為佳所畫歸去來辭用筆尤精不類他本其紙亦松雪齋自製箋粉中隱起有八分書子昻二字可證也卷末復作小竹石能令人想見古人雅致極為可愛舊為錫山周炫家藏嘉靖戊子夏予寓蘇王氏水閣中作溪光詩成炫從弟煌偶見之求書一通以去更嵗餘煌忽來余家自言攜此詩歸得消其家門骨肉之禍其事有出於意料之外者因以此卷為贈予辭之再四委之而去瓊瑶之報甚可愧也甚可笑也癸卯嵗十月廿日五川居士楊儀書於萬卷樓中楊夢羽氏華隂世家趙魏國臨羲獻像卷僕於京師見周文矩畫羲獻像歸而摹之時皇慶二年夏五月也呉興趙孟頫題後為姚公綬作羲獻二傳又有楊循吉吕㦂諸人䟦崇禎戊辰秋此卷在予家數月玉水記松雪翁桐隂高士圖延祐桼年十月八日子昻畫玉立桐隂十畆蒼托根何必在朝陽迎風􅉡􅉡秋聲早灑雨隂隂月色涼勝事只消琴在膝野情聊倚石為牀髙人自得坡頭趣不為花開引鳯凰古涪鄧文原題又玩花仕女圖絹素上重着色掛幅至元年月作翫花仕女圖子昻小楷書此余少年所作今十餘年矣嵗月易邁悲夫子昻再題篆書是圖為項又新家物董𤣥宰嘗共余過之時懸畫於讀易堂之松軒𤣥宰翫賞不已曰似此光景應為管夫人冩照耳聞松女徐安生曽倣其意作惜花春起早麗人披霧縠綰結於胷前薄映雪膚淺靸落紅苔翠憑欄看牡丹緑竹叢繞其後露華尚滴滴也余亟覔之不得無何人新物故所藏多散逸余得其書畫數拾種趙筆其一焉紅亭翠篠間高峯兀立姚黄魏紫參差其下玩花人正與徐娘當年所冩惜花人相若因念安生遺艶未知落誰手而又新墓木已拱不能不動念歳月易邁同文敏公之悲感云封禺添屬玉水汪砢玉識于月香居趙承㫖停琴撥阮圖項子京題籖雙幅卷堂畫大徳五年秋八月呉興趙孟頫作髙逸圖重青緑雲山巖下正靣坐一髙士葛巾深衣背靣坐一高士黒冠撥阮右有大松二樹樹旁童子鴛髻大䄂雙結手捧石榴一盆山足多鹿䓤花樹根細楷書欵脉望生記又杏花書屋圖余得後未幾而去詩欵俱失記書法二王畫法顧陸自宋元名家得其法者有幾而松雪翁乃兼之今觀此圖緑隂青樾紅雪飄香幽人兩兩向書屋敲落日看杏花種種入神境更靚妝明媚仍不失淡掃蛾眉之致有顧陸不得專美於前矣固能榮際五朝名滿四海也歟玉水子識萬厯乙卯冬日趙榮禄水村圖在紙上水墨冩意天啟壬戌春王觀於陳氏交園閣子昻水村圖學摩詰在王敬美太常家文太史臨摹一卷如出趙手予於白下得之眉公陳繼儒子昻春郊挾彈圖公子翩翩出大堤玉驄踏碎落花泥叮嚀莫打黄金彈恐有慈烏枝上棲金華宋濓洛陽二月百花紅金谷春閒歩障空匹馬閒行芳草地金丸十二盡皆空胡儼若思趙松雪宋宗室畫唐馬稱第一至今筆跡儼若生張􅃓彈雀意氣横㑹將文墨動元主拜官翰林貴無比詩辭婉麗字風流千金未許易片紙金蓮醉送玉堂仙父子歸來共被眠錦䌫牙檣非昨夢豈無十畆種𤓰田李潭州文丞相口血模糊尸鐵强一瓣香為有此何人慷慨崖山死董狐有筆直如絃元宋分明兩青史至正十年十月一日余過金華訪隱直雪坐草堂上有客自青城來亦同居客邸夜坐焚譚出此挾彈圖命題雪寒筆凍書不成字見者掩口黄溍題手挽青絲跨玉驄乘凉挾彈落花風應知田野經行處盡在咨詢一念中黄花老人誰畫開元玉雪驄黄門待駕驟春風南薫殿上承恩日只有車書四海同虛白道人草軟坡平午樹涼玉驄挾彈過山陽曽知亦有無閒者馬上雞聲滿地霜胡廣趙呉興挾彈走馬圖余以丙申嵗得之武林是時又有支遁洗馬圖亦呉興筆今皆與好事者相易古畫葢余好山水于畫馬非所習我用我法耳董其昌戊申重題於雪浪軒趙呉興秋原牧馬圖淺着色在絹素上馬凡有五健馬奔泉如渇虹活馬浴水如㳺龍竦身作勢蹴厚地仰首噴沫生長風倦思滚塵痒磨樹似是馬牙通馬語莫將意態問丹青天機正在忘形處西涯趙文敏秋郊飲馬圖皇慶元年十一月子昻右趙文敏公秋郊飲馬圖真跡予嘗見韋偃暮江五馬圖裴寛小馬圖與此氣韻相望豈公心摹手追有不期而得者耶至其林木活動筆意飛舞設色無一㸃俗氣高風雅韻沾被後人多矣奎章閣學士院鍳書博士柯九思䟦趙氏三世作人馬圖長卷在楮上最精元貞二年正月十日作人馬圖以奉飛卿亷訪清玩呉興趙孟頫題右第一幀子昻畫奚官牽澹黄馬西向至正十九年己亥秋八月余寓武林一日韓介石過余道松江同知謝伯理雅意俾介石持所藏先平章所畫人馬見示求予於卷尾亦作人馬以繼之拜觀之餘悲喜交集不能去手余雖未識伯理嘉其高致故慨然為作以授介石歸之伯理云趙雍書右第二幀仲穆畫畨人牽驄馬西向先大父魏國公所畫人馬圖裝潢成卷復請家君作于後而亦以命余竊惟伯理之意豈欲侈吾家三世之所傳歟自非篤於精雅不能用心若此也遂不辭而承命時至正己亥冬十月望日也承事郎江浙等處行中書省檢校官麟識右第三幀彦徴畫奚官牽玉花驄西向呉興趙公文章政事見重前代又以其餘以適情於翰墨之内故字畫之工㸃染之神妙天下而子孫亦克承其志焉清江王氏希和持其所藏公家三世所作人馬圖以示余葢自子昻公為之祖仲穆公為之子彦徴公為之孫覩其顧視隨立尊卑秩然親誼藹然然後知名賢措思運筆雖於圖冩之末而寓乎天理人心之正使後人於一展卷之頃孝敬之心自不能不興起於其衷也况蘭筋麴膝方首厚蹄目如懸鈴光流紫電竒情妍態宛如鏘如􅁮如翔如實可以充天閑而鳴和鸞也又何必伯樂之經九方臯之法然後可以見之哉希和今世名家素勤詩禮之教鄉先生稱道之者日益著是猶驥有其徳而又得其所養者它日充天閑鳴和鸞今將於此圖而徴希和之所至也再閱是圖敬書於後時永樂元年冬十一月五日將仕佐郎臨江府儒學教授錢塘沈大年清江王均希和所藏松雪齋三世人馬圖暇日持以示余余獲拜觀先朝文獻之懿繼述之雅亘古今而希有也楚書曰楚國無以為寳惟善以為寳希和寳此以傳家其亦善人也三肅以還珍重珍重永樂三年春龍在乙酉三月廿日前進士胡誠拜書集賢長子鳯字允文畫蘭竹與廼父亂真集賢每題作已趙子昻仲穆彦徴三馬圖延祐五年九月既望畫於大都寓舍子昻右第一幀趙魏國畫青驪一疋至正十九年嵗己亥秋九月畫於龍華寳閣仲穆右第二幀趙總管畫玉花驄一疋至正庚子十月初吉為雪庭作于錢塘龍筆閣彦徴右第三幀趙知州畫赤驥一疋僧房曾見冩麒麟人已云亡紙墨新寂寞九原無弔處至今猶見執鞭人驥子生來骨相竒滿溝汗血落胭脂空門縱有馱經日得似牽過白玉墀廬陵張昱為雪庭禪師題右湖州路總管趙公仲穆其子莒州知州趙彦徴所畫一馬氣韻精神各得其妙總管筆法得曹將軍為多知州筆法得韓幹為重獨文敏公兼曹韓而得其神妙此所以名重千古無愧前人雪庭禪師與總管公為心交父子之間同為知己王䝉在文敏公為外祖總管為母舅知州為表弟豈敢品題哉實識悲感耳王䝉謹書松雪當年稱獨歩子孫今日繼遺風香凝淡墨連錢碧色染秋毫汗血紅濟濟奚官顔似玉昻昻龍種氣如虹春風滿轡初牽出對立長鳴冀北空燕山哈珊沙下用朱文子山圖書呉興妙筆傳家世總畫天閑汗血駒萬里歸來秋露曉圉人牽去牧龍芻太守舊圖如璞玉拾遺新畫抵南金玉驄已向天閑老赤驥猶懐萬里心大食哲馬郭石之題趙文敏畫馬云世人但説李龍眠那知已出曹韓上文敏見之謂曹韓固不敢當使龍眠在固當與抗衡也其自許如此錫山安君嘗得其子集賢諸孫彦徴畫聯為軸王叔明題其後並論其父子筆法所出而尤甚稱文敏得曹韓之妙顧卷中無文敏之筆非闕典歟安君乃别購文敏一馬標諸卷首遂成合璧持來示余俾題其後於戲曹韓龍眠盛矣然其後皆無所聞豈若趙氏祖子孫三世具于一軸之中而並臻其妙殆古今一見耳豈曹韓諸人所得而擬耶若安君者其亦知所尚哉安君名國字民太號桂坡錫山人嘉靖壬辰三月既望文徴明題趙魏國雙馬圖飛騰自是真龍種健筆何年貎得來照室神光欲飛去秘圖不敢向人開至正二年四月廿二日子昻舊圖如璞玉遺墨等南金莫向天閑老猶懐萬里心大食哲馬天閑曾識玉花驄神駿驍雄萬馬中老去人間空見畫王孫遺墨動秋風林鏞大宛貢馬從西土來識天家十二閑駿骨不居千里後黄金已在築臺間雲東逸史如鹿如龍出宛西竹批雙耳玉為蹄大宛逺貢天朝用牽入君門不敢嘶江隂卞榮西極飛來八尺龍方臯一見萬羣空太平時節無征戰辜負華山汗血功趙呉興畫馬真與韓曹抗衡此卷尤為合作後有雲東題咏必江南好事家所藏可寳也其昌趙承㫖畨馬圖至大三年九月廿一日子昻一馬形軀百法全生時靈氣取山川英雄正用同生死那忍無聲立仗前海粟下有怪怪道人朱文印京口郭畀天錫敬觀松雪翁唐畨馬圖神駒初墮地雷電飛海水三嵗不敢騎萬里獻天子翰林直學士虞集題奎章閣鑒書博士丹邱柯九思敬仲審定曲江洗刷雲滿身雄姿逸態何超羣眼中但覺肉勝骨幹也合讓曹將軍嗟哉今人畫唐馬藝精亦出曹韓下玉堂學士重名譽一紙千金不當價山忩擁雪觀晝圖據鞍便欲擒於莵天厩真龍有時有老杜歌行絶代無史官察伋士安趙松雪作二胡羊逸筆題䟦已刻六硯齋三筆反遺其自䟦因補此子昻肖物之妙無所不造極此二紙乃其偶作而宛然置人于黄沙白草間評者紛紛徴蘇卿事我恐此妙趣正復當靣蹉過也吾深嘆其亡羊春波竹懶李日華趙榮禄畫杏花鸂􅈑并題余嘗泛舟溪上因過下若時值杏花盛開溪邉鸂􅈑黄色可愛恍如徐熈畫中行也乘興作此以記嵗月云至大二年二月九日子昻趙魏公落花㳺魚圖溶溶緑水濃如染風送落花春幾多頭白歸來舊池館閒看魚泳白漚波延祐三年二月六日春雨初霽溪光可人乗興作落花㳺魚圖就賦詩其上殊有清思耳進之在坐以為何如呉興趙孟頫趙集賢飛白石墨竹絹素上掛幅近水秋山兩㟁青明朝歸去獨揚舲平生是箇知音客纔過柯亭子細聽子昻管夫人題漁父圖人生貴極是王侯浮利浮名不自由争得似一扁舟弄月吟風歸去休管道昇𣺌𣺌烟波一葉舟西風木落五湖秋盟鷗鷺傲王侯管甚鱸魚不上鈎趙孟頫又懸崖朱竹掛軸網得珊瑚枝擲向篔簹谷明年錦䙀兒春風生靣目朱竹古無所本宋仲溫在畫院卷尾以朱筆掃之故張伯雨有偶見一枝石竹之句楊維禎瀟灑三君子是伊親弟兄所期持大節莫負嵗寒盟赤城陶君故家子也余寓西湖之東九成時來㑹談論竟日退有不忍舍者其仲季皆清爽真芝蘭玉樹百十晉之王謝家也遂題而歸之已丑夏五月二十二日㑹稽王冕又畫梅二幅幽姿不入少年塲無語只凄涼一个清虛身世十分冷澹心腸江頭月底新譜舊恨孤夢清香任是春風不管也曽先識東皇冬日集陳惟寅兄醉香館出示管夫人畫梅有感題之倪瓚欹帽垂鞭送客回小橋流水一枝梅醉後紅綃都不記剰有幽香却觧逐人來松畔竹間頻置酒攜手與君看到十分開少壯相從今雪鬢因甚流年清興兩相催庚寅臘月同天台陶九成訪雲棲子於玉山草堂是日㣲雪着紅梅上雲棲子見示管夫人雪梅與今日情境適合因題一調定風波云瓚記管仲姬着色蘭花卷善畫蘭者故宋推子固吾元稱子昻堪為伯仲兹卷管夫人所繪非固非昻復有一種清姿逸態出人意外且以承㫖手筆六法並臻尤稱雙璧得未曽有以余仲蔚蓬蒿而獲擊此于目頓覺埃垢盡洗五體俱香矣徃復披玩不能釋手敬識而歸之陸源管夫人畫竹與大士像恒多蘭亦僅見一斑今于李夢然獲觀六種種種精妍碧葉丹英玉莖水石掩映葳㽔荏苒恍若翩翩於湘江楚畹間幽芬可挹堪與盈川賦子昻書争工公其十襲秘之勿輕視俗眼也徐緬余家有漳蘭數十碙培之多歴年所矣每花發則􅂱􅂱猗猗罏薰可罷欲一冩其幽致恨無好手弄芳一旦得管氏蘭卷正貎漳種初作兩葉一莖花漸増至後繁英叢帶墨巒間更疎秀可喜夫人其化工在握矣余即以宋玻璃盞白玉柄紅拂水精辟邪壓繡易之嘗攜以遊秣陵嵗餘雖乏家植盈庭然時一展玩此圖覺滿前皆九畹香也尋香客子汪砢玉識於味蘭居趙魏國題子仲穆畫幅昨自杭回道經茅山西墅時夕陽欲墜松如偃蓋水若鳴琴青山萬重白雲千頃山下有乘駿馬者出沒於其間乃天然一圖畫心有所得以目疾未愈不能舉筆因命子雍代之至大四年五月既望識于鷗波亭雲白山青幾萬重溪邉遊子馬如龍眼前有景畫不盡歸去鷗波命阿雍子昻壬戌之秋義興呉友攜此幅來殊堪鍳賞舫中設古虬根榻天然無琢㾗瑩潤如玉真竒物也玉水趙仲穆自題畫黄梁夢贈張伯雨舉世通驚夢一塲何須扺死説黄粱勸君切莫頻開口恐起癡人論短長趙仲穆天閑騏驥枝山題人凢十有三馬十有六猿一騏驥昔在人間繼在毫墨今歸吾賈君駿在君矣走千里價千金浴瑶池而秣天山衛龍墀而驂鸞輅一旦事耳君尚稍加剪拂以伺之因君索題為采舊䟦語掲諸前而漫贅斯説嵗丁卯夏日蘇人祝允明記希哲枝指道人呉下阿明騏驥驊騮世有之不逢伯樂自長嘶却憑筆貎千金骨誰信相知是畫師呉郡唐寅南京解元畫史畫馬妙自知筆端變態毛骨竒長嘶逸歩畫不出幾番吟詠少陵詩宗正趙仲穆沙苑牧馬圖着色小横披沙樹歴歴沙草荒江上誰開芻牧塲羣馬所聚何劻攘飲秣而俯嘶而昻訛踶浴滚逐且驤或乳或卧或軋瘡三縱五横不成行五花雜沓駁而黄烏騅赤兎照夜白連錢桃花鬬文章牝兮牡兮未可辨亦莫可識駑與良相骨相肉信已矣老夫兩眼徒茫茫但愛各各無羈韁自縱自得肥更光肥哉肥哉空老死未試何以知爾長我知馬亦待駕御人馬兩得氣始揚請看溝汗流血漿争前欲縳左賢王追風逐電一般走五十之中當有强右馬五十疋畫者各極其態金鍳為趙仲穆親筆而題其上如此成化嵗在乙酉十月望沈周仙驥凢駘乆混同伊誰能使冀羣空拳竒獨有青龍骨合作觀風御史驄甲子仲吕之月呉瑄題奉全卿憲副是月既望日唐子華松石才子圖絹素掛幅霅水唐翁鶴髪垂郭熈松石晚尤竒闕思誰見清吟擁鼻時瓉題唐子華畫松石才子圖此幀葢唐君得意筆也甲寅三月拈花室中覧子華學松雪得其華潤森鬰之氣詩有味外味稿陸行直碧梧蒼石圖在絹上掛幅候蟲凄斷人語西風岸月落沙平流水漫驚見蘆花來鴈可憐瘦損蘭成多情因為卿卿只有一枝梧葉不知多少秋聲此友人張叔夏贈余之作也余不能記憶于至治元年仲夏廿四日戲作碧梧蒼石與冶仙西忩夜坐因語及此轉瞬二十一載今卿卿叔夏皆成故人恍然如隔世事遂書於卷首以記一時之感慨云季道陸行直題斜陽目斷秋晚蘆花岸去信來音俱散漫陣陣新寒驚鴈愁將梧石描成寄情只為思卿筆下淋漓水墨滿空雨響風聲冶仙陸留題柔腸先斷舟繫汾湖岸别恨離愁秋水漫冩入數行新鴈幽閨蘭夢初成猶將小字呼卿幾㸃梧桐夜雨一天霜月砧聲梅隱王鉉題因縁未斷江上湖平岸心事留連烟水漫愁見天邊孤鴈買蘭和粉方成因何辜負芳卿老樹不禁風落寒猿夜夜哀聲元卿題翠屏香斷夢繞瀟湘岸舊恨不禁愁汗漫分付秦筝斜鴈呉牋賦恨難成丹青惱殺蘇卿一片碧梧蒼石誰教冩出秋聲仲輿葉衡謹題西風吹斷帆逈潯陽岸水影碧涵天影漫倒印片雲孤鴈琵琶舊譜新成舟中應有蘇卿愁耳不堪重聽聲聲又復聲聲徳可徐再思寸腸愁斷目送斜陽岸楓落呉江秋水漫盼殺南來征鴈綺忩好夢初成夢回想見卿卿明月西風夜冷蒼梧亂影多聲竹月道人暮雲飛斷潮落呉江岸憶昔佳人愁思漫那更樓頭聞鴈此時有意還成争知惱殺蘭卿畫作碧梧蒼石至今圖得風聲青社元卿郝貞題楊枝歌斷春老鷪湖岸可笑楊花飛漫漫却作蘆花孤鴈國香欲賦難成向來錯怨輕卿縱使此心如石不禁梧葉離聲廬山人劉則梅琵琶絃斷冷落汾湖岸月墮湖天波汗漫空憶上林飛鴈誰將蒼石題成才華總是冠卿翻陋梨園舊譜當年靡靡新聲碧梧蒼石一幅姑蘇汾湖湖天居士陸行直甫之所作行直有家妓名卿卿者以才色見稱友人張叔夏為作古詞贈之所謂多情因為卿卿是也後二十一載行直以翰林典籍致政歸作此碧梧蒼石復與其宗人冶仙話舊因記憶叔夏之贈則張公卿卿皆杳隔塵世矣故并書張詞於卷端當時諸公仍踵而和之其辭㫖抑揚凄惋似寓乎悼惜無涯之意然自至治到今又百餘年矣而此圖無恙墨色如新豈非有類岐陽石鼓昭陵蠒紙人人得而珍之耶鄉先生朱公暇日特示余索賦遂書以續貂後公字孟寛號緑疇軒吾鄉詩禮右族其風流醞藉不減行直云緩軒劉稽書陸季道作碧梧蒼石圖蓋追冩故友張叔夏之詞意也按季道載叔夏清平調一詞於圖右云云且識其後曰至治月日與冶仙西忩夜坐偶語及此轉瞬二十一載卿卿叔夏皆成故人卿卿叔夏詞中云不知所指者誰疑亦當時妓妾之類但不宜序叔夏之上元室士大夫詩畫絶有可觀梧石清潤大似雲林葢季道人品亦與雲林相上下恨予生晚不能論其世徒賞其詞晝而擊節三歎也正統己未花朝前三日飲桂林朱孟寛第同觀者屠氷壺陶畊學云右四十餘載前客一清樓下寄題此畫葢稿也頃見劉緩軒所題誠足以啓予之寡陋丙午秋暮孟夏同一感懐也幸喬木家遺澤尚存又寛孫綱乞予再題念諸老故物正猶季道之念叔可為之一解頥焉成化二十二年九月庚申桐邨周鼎時年八十有六張子政畫水墨梨花鳴鳩小幅在白宋紙上子政為文敏春雨鳴鳩圖下有朱文守中印印又朱文張子政氏梨花枝上雨班班春滿西園十二䦨何事錦鳩聲不絶隂雲連日䕶溪山釣鰲一枝湘玉翠烟輕數㸃梨花雪色明上有鳴鳩正喚雨江南江北動春耕丹上樵下有朱文三省印榖雨暗時鳩亂鳴梨花枝上四三聲春風處處催耕急不似尋常百囀鶯天台王俊華一樹梨花春帶雨䦨干淚㵼玉容驚夫不也感當時恨應向東風呌不平沛郡鎦翼南風散蒼雲漾翠光枝浮白雪濕新香數聲催得如酥雨只為幽姿一洗妝四明王伯煇東風簾捲小紅樓三月梨花呌錦鳩曾記玉人將鳯管隔花低按小梁州朱武自解呼名繡領齊梨雲竹雨暗寒溪東風却憶江南北桑柘邨深處處啼呉郡梁用行故園烟樹隔重重夢斷梨花小院空自是啼鳩心獨苦一聲聲似怨春風呉興孫奕柯敬仲墨竹石如飛白木如籀冩竹應須八法通若也有人能㑹此須知書畫本來同柯九思善畫竹石嘗自謂冩幹用篆法寫枝用草書法冩葉用八分或用魯公撤筆法木石用金釵股屋漏㾗之遺意水晶宫道人丹丘自題晝竹生意滿孤根香凝粉節痕驚看雷雨夕化取老龍孫故人能冩竹標格似湖州静對西忩下清風滿紙秋此首失欵奎章閣上恣臨摹高節偏承雨露多冷澹故能追石室蕭疎應不減東坡張雨楊鐡崖題柯敬仲畫翠竹猗猗山石青慧雲寺近浙江亭明年我亦南屏住林下同翻貝葉經維禎又題架壑截流安尺宅客來如入市簷壺百年身外樗蒲局四月山中櫻筍厨雉雊烟叢朝日上魚潛瓦影夕涼初自餘眠食都忘却更擬求觀後世書老鐡欲求觀後世書吾輩可失目前帙耶乃余雖百拙惟此一勤或亦無愧於古人歟樂卿漫記王若水畫虎頭鷹若水王淵作新篁花石石上立雙鷹其雄者頭有兩角面如怒虎胷紋繡錯可異俗名虎頭鷹即杜工部所咏二角鷹目如愁胡視天地也雌者則局形如雉有杉雞竹兎俱可狎耳噫浩呼洶中有萬里之長江廻風滔日孤先動此畫其足吞之乎萬厯己未天中節汪砢玉鍳藏并識珊瑚網卷三十二
