body:
  text: 珊瑚網藝術類一書畫之屬提要臣等謹案珊瑚網四十八卷明汪砢玉撰砢玉有古今鹺畧已著録是書成于崇禎癸未凡法書題跋二十四卷名畫題跋二十四卷朱彞尊靜志居詩話稱砢玉留心著􅄒所輯珊瑚網一編與張丑清河書畫舫真蹟日録並駕葢丑自其髙祖維慶曾祖子和祖約之父茂實四世鑒藏砢玉亦以其父愛荆與嘉興項元汴交好築凝霞閣以貯書畫收藏之富甲于一時其有所凴藉約畧相等故皆能搜羅薈萃勒為巨編然丑之二書前後編次嵗月皆未明晰砢玉是書則前列題跋後附論説較丑書綱領節目秩然有條惟其所載法書頗有目睹耳聞據以著録不盡其所自藏乃一例登載皆不註明未免稍無區别中間原蹟全文或載或否亦絶無義例又如謂唐刻定武蘭亭有二石焦山瘞鶴銘有三石則真􅎓不别以李邕書雲麾將軍李秀碑誤為李思訓碑以宋人所刻臨江帖誤為唐搨則考据亦未盡精審其所載名畫則宋元諸家銘心絶品收録極詳贉素之富誠為罕有後來卞永譽式古堂書畫考厲鶚南宋院畫録實皆藉是書以成較在書跋之上至於書跋之後附以書㫖書品之類畫跋之後附以畫繼畫評之類皆雜録舊文挂一漏萬枝指駢拇兩集相同以原本所有姑仍録之云爾乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5ef4a2cae05335c87a909a31fb0b47e1c38108e0a9ce5b05797a422c7ce7e674
