body:
  text: 珊瑚網卷十一明汪砢玉撰法書題跋倪迂醉歌竹墨蹟昔聞杜陵之茅屋汀花㝠㝠汀樹綠舊題新咏答年華種术行椒繞山麓石牀丹竈青琅玕春渠流水夜潺湲當年寳劍淪黄土空餘山月照波間今我不樂懐往古短世紛紛誰凡數花下欣逢李白來山鳥溪童亦歌舞酒酣長嘯五情熱軒冕何榮築巗說邈然抗節餓首陽何異佯狂抱貞潔君歌已竟歌我詩賢愚榮悴百年期少文豈愛壁間畫老疾俱來難命駕仰視翕忽浮雲馳安得乗螭與雲化楊花縈夢滿情天迸壑春雷驚醉眠李侯神清色不動手敲茶雪落輕煙相逢為樂試章草更欲攜君卧煙島城郭秋風白鶴飛海上飡霞不知老右醉歌行次韻酬李徴君春日過草堂賦贈瓚雲林詩帖二月廿日笠澤留别勝伯徴君先生倪瓚再拜清修卓行虞徵士食粥三年致母喪詩學道園能入室字傳洪谷早升堂獨高落落松筠節不逐悠悠雁鶩行此日别君江海去孤帆回首指斜陽未句一作波光鷗影思微茫是日晩過徴君江寓笠澤道館東院解后董潘二君㽞宿寒㕔淹留至夜篝燈煑菜酌酒作黍夜分始歸田舎旅寓因嘆今人情世道日以偷薄見炎而趨遇冷而却之者皆是也虞衆而日不暇給乃能存念故舊以無而有留人宿食雖古人情乂不是過也儒衣冠而諂佞寜不愧死乎瓉賀公雅吴語嘗誦少陵詩逺孫有古風隠居淮水湄開牖望青山尋真歌紫芝鏡湖似清淮煙濤春𣺌瀰何當棹酒艇與爾相娱嬉永吉以鼓瑟獻酬斟酌之伊昔龍眠莊山水含清輝松桂蔚佳色田疇足芸耔結茒近松术忘言樂熙熙贈此以為好同心勿逺離瓚仲夏嘗賦一詩奉寄兹重改以呈求教益也吴淞江上宅青壁映丹楓欲覔幽人去遥憐雅好同珍圖藏顧陸蓮社憶雷宗聞道秋風夜清琴冩磵松天錫郭掾郎與余交最久死别忽忽二十餘載余之愴愴如何可言錫山弓河上𤣥元道館錫麓𤣥丘精舎其畫壁最多今或為軍旅之居或為狐兎之窟頽垣遺址風景亦異雖余之故鄉乃若異鄉矣因勝伯徴君携此卷相示為之展玩感慨并叙述其疇昔相與之所以然者其中有不能自己也捉筆悽然久之至正二十三年嵗在癸夘十二月夜笠澤蝸牛廬中冩郭髯吾所愛詩畫總名家水際三人路毫端五色霞米顛舩每泊陶令酒能賖猶憶相過處清吟夜煑茶為耕雲賦山居喬木垂帷密清池試鏡明蟲書葉字古風織浪紋輕悄悄悲秋思悠悠惜别情古人雖已矣得失未須驚過獅子蘭若密竹鳥啼䆳池清雲影閒茗闕爐煙裊松雨石苔斑心靜境恒寂何必居在山窮途有行旅日暮不知還幻霞子倪瓚何處問幽尋軒居湖上臨竹林堪坐釣苔迹響行吟晝日斜明耀殘霞夕暝隂相㸔有隣叟應只論閒心送王允剛歸義興倪瓚橋西緑水斜春樹隔煙霞隐處誰云淺千峰只一家雲林贈陳惟寅詩卷辛巳伏日白雲房裝褫戲為七言近體奉寄惟寅徴君賢伯仲聊以為乆間之懷耳倪瓉頓首上露下空階秋氣清一尊思為故人傾智囊自足包桓範藝圃深期訪馬卿城郭雲迷紫騮迹江湖雨冷白鷗盟老兵得失初何損司馬虚夷有逺情人還希報數字以慰老懐十八日空八月五日陳惟寅秀才來訪余南渚之上相與陳情道舊為留終日至暮葉舟絶湖而去一望雲濤𦕈然不能無惘惘于懐也明日賦此寄惟允賢昆季滄浪漫士倪瓚陳寅兄弟皆好修訪我逺來南渚頭原憲長貧甘所素摩詰示疾今其瘳白鷗波上五湖棹丹桂人間八月秋政使清虚足𤣥賞勿隨塵土逐悠悠僕一時肆筆為此非雕蟲篆刻比也吾佩韋先生見之精微要妙者必將唾視之耳瓚倪元鎮詩草遺蹟燕子低飛不動塵黄鶯嬌小未勝春東風緑盡門前草細雨寒煙愁殺人庚申春日雲林書澗雨松風解宿酲虎頭宅裏坐忘形清歌擊筑聊永日更倒君家雙玉瓶題松泉畫紙東海倪瓚丁未十一月一日在􅍩渚南窻清晨對雨後賦詩師以寄南榮尊師嘗置之左右如與僕對也瓚記服食清虚帶痩容菖蒲花發紫茸茸滌煩磯上營茒屋千仞巖懸一個松早間覺喉吻痛甚恐是酒熱大金花丸神萼丸各求一兩服也煩聒得罪罪瓚廿二日枯膓嗜酒復畏醉既醉渇心真欲狂為解曉酲喉吻痛大金花劑性偏凉昨日承蔬笋不托之供獲清言永日也别後與元舉叔陽攜琴過普渡精舎相與盤礴林影水光中而令子來始知從者散歩䟽墅橋急遣一介徃候則從者興盡已返矣經宿間雷雨大作想惟動履輕安昨見樽俎間韭芬蒿菜之屬秀色粲然今日得雨必是苖芽怒長更佳也况䝉許送乆伺不見至戲作小詩促之瓚頓首黙菴有道先生韭芥抽苖鋪翠玉曉經雷雨更敷腴莫笑措大眼孔小乞取先生一餉餘四月廿日過江渚茒屋雜興四絶句錄呈雲浦明公以代對面笑謔百年風雨幾興亡睡起西山尚夕陽四月維舟向茅屋一庭春草獨焚香燕子低迴掠地飛海鷗來去水侵扉中流雲渡它山影落日帆從何處歸燕雀生來喜近人家殘屋破去逡逡可人惟有閒庭草蓬戸朱門一様春姑蘇城郭草茫茫城外腥風舊戰塲花落空垣車馬絶獨餘梁燕說興亡我自無心何慢勤愛憎加我亦從人青山不改如如體雪後陽生依舊春五月隂風特地寒闔閶浦口怯衣單饑啼野哭浮村落我本無愁也廢飡虞趙虹光貫壁奎碧梧端合鳯來棲春泥滑滑江路永更著荒村呌竹雞眼底繁花一旦空寥寥南北馬生風鴻飛不與人間事山自白雲江自東僕欲亦一徃山中相見俟後遇便舟至彼矣靈巖寺山門上蔡氏題石一刻拓手倘便乞拓一二本見寄幸甚聞釀桑椹酒不異中原者飲未盡寄嘗一杯也友生瓚再拜曲全叟詩餘手跡東風花外小紅樓南浦山横眉黛愁春寒不管梅花痩無情水自流簷間燕闕語嬌柔闕驚回幽夢闕難尋舊游闕落日簾鈎右調水仙子吹簫聲斷更登樓獨自凭欄獨自愁斜陽緑慘紅消痩長江日際流百般嬌千種温柔金縷曲新聲􅊠按碧油車名園共㳺絳紗裙羅襪如鈎前調扶踈玉蟾宫樹影䦨干曲一襟香霧幾枝金粟姮娥鏡掩秋雲緑無端風雨聲相續不須澄霽為沽醽醁參差玉笙聲莫起瑶臺曲清風香侵夜凉肌粟黄雲巧綴飛霞緑清吟未斷秋霖續恐孤花意倒尊中醁右賦憶秦娥二闋春渚芹蒲秋郊梨􅀥西風沃綠収紅稻簷前炙背媚晴暘天涯轉瞬凄芳草魯望漁村陶朱煙島高風峻節如今掃黄雞啄黍濁醪香開門迎笑東隣老右調踏沙行夜永愁人偏起早容鬢蕭蕭鏡裏看枯槁雨葉鋪庭風為掃閒門寂寞生幽草竹路難行悲逺道説着客還真個令人惱乆客還家貧亦好無家謾自傷懐抱右調蝶戀花篷上雨潺潺篷底幽人夢故山磵户林扉元不閉蕭閒只有飛雲可徃還波冷玉珊珊一壑松風引珮環咏得池塘春草句更䦨行盡千峯半霎間右調南鄉子東林橋雨篷夢歸曲全叟倪瓚弇州以倪如風女兒灕漇長袖未知其蚤年筆也莫昌詩翰牕下紫端吾故物雲腴如潤玉如温驪龍光瑩夜生彩鸜鵒眼活秋無痕已逐銀杯同化去豈若青氊能復存却笑偷兒翻解事免使王家池水渾失硯失硯兼旬今復見邨童捧璧笑顔温墨光黯有風霜色石面净無沙玉痕詞翰發揮欣得助鬼神呵䕶幸仍存濡毫便欲閒圖冩貌我山莊似陸渾復硯新正清凉境失硯既而復獲遂賦二詩前以自解後復次韻雨窻漫書奉寄西湖静者賢翁季觀捕魚詩併和示為妙南屏莫昌稽首楊亷夫寄元鎮詩蹟祗陀山下問幽居新長青松六七株見說近前丞相怒歸來自冩草堂圗北窻高卧東臯嘯鄉里小兒懶折腰今朝一醉醉未醒小奚扶過虎溪橋晴春雪始消覺毫端有春樂為之書也維楨鐵崖書小逰僊詩鸞書趣燕五城東下視星辰在半空行過瑶臺重迴首玉清更在有無中虎豹耽耽守帝閽銀灣水氣曉氤氲石榴花下霓裳隊競染香雲製舞裙城闕芙蓉暁未分身騎金火謁元君青童不道天家近笑指空中五色雲三十六宫北内春邯鄲却憶夢中身帶將一箇城南樹去謁仙班十八人飄飄仙樂下珠庭又從麻姑降蔡經麟脯鳯脂皆可夀長生何必斸松苓溪頭流水飯胡麻曽折璚林第一花欲識道人藏密處一壺天地小於𤓰不到麟洲五百年歸來風日尚依然穉龍化作雪衣女來問東華古玉篇春宴瑶池日景高烏紗巾上揷仙桃長桑樹爛金雞死一笑黄塵變海濤高駕飈車過大瀛神官報道禇三清新裁鵝管銀簧澁一曲𤣥雲鼓未成天府官曹夙有期金枰玉粟賜漁師一彈指頃天台近始悟三生石上棋此余方外生余善追和張外史小遊仙詩一十解持藁來余不能加㸃讀至長桑樹爛天雞死座客遶牀三呌以為老鐵喉中語也又如一壺天地小於𤓰雖老鐵無以著筆矣故樂為之書至正癸夘春王正月上日鐵龍道人在玉山髙處試奎章賜墨書明德遊仙詞十首自天柱山傳來依韻繼作雲林道氣者觀之亦足自㧞於埃􅅽矣雨上白玉之盤滄海東滄滄下視逺如空請㸔端正山河影不滿拗堂盃水中鴻寳枕函雲積叠芝臺爐火煖氛氲子能試喫青精飯我亦聊書白練裙夜久摶桑海色分珠宫望拜赤龍君洞庭未省君山在元是崑崙小朶雲藤蘿石上尋長迹金粟圖中見小身抖搜幾重衣裓看情知不染散華人厭見霓裳舞廣庭罷看三十九章經道人腰著金鴉嘴自向松隂洗茯苓左股清池足漚麻池中肥水是松花蚤知魏帝一丸藥肯信東陵五色𤓰恥作深山服食仙伐毛洗髓固依然木蘭墜露研朱冩只冩南華秋水篇脚底琴生三尺鯉袖中阿母一雙桃别時勞動凌波襪爛月如銀曬夜濤眼中自小薄蓬瀛日月雙飛下始青見得明窻塵彷彿定知草創大丹成玉格金科自有期赤城何待逺尋師壁梭也解為龍去樵斧如何只看棋丙戌嵗四月廿日靈石山登善精舎冩向嘗次韵信都趙君季友父遊仙詞亡友虎林張君伯雨父見而愛之亦嘗倚韵以屬和崑山清真觀道士余君復初伯雨愛友也冩所和詩以遺復初復初今年冬欵余於吴郡之城南乞余冩昔所和合張君之什併藏之江空嵗晚朋友間能詩如伯雨寥寥絶響因冩舊作不能不興感云耳今年至正二十年庚子嵗之冬也遂昌鄭元祐明德父金碧樓臺瀛海東娉婷仙子下遥空聖凡千古無窮事都在鸞笙一曲中靄靄身中三素雲朝暉出海共氤氲桃霞沐雨輕匀面栁浪含漪細織裙鳯麟洲上水煙分女伴同祠李少君㸃定易遷宫裏籍歩虚回首踏紅雲煌煌朱樹四時春樹影玲瓏月滿身理罷玉笙朝斗去就中誰是避秦人雲旂阿母降珠庭母為雙成欲授經塵世登真無妄訣藥囊辛苦貯參苓纔吹松屑飯胡麻又見蟠桃一度花不為靈姝工服食金盤那得不如𤓰窈窕溪真十二仙靈犀分水夜長然珠宫每闕皇人筆㸃校青瑶第幾篇寳髻駢雲誰最高花間行數舊栽桃生洲月出星宫近騎著神魚舞翠濤紫皇親駕按寰瀛又見鯨波澈㡳清仙籍不能無謫降塵縁敢望有虧成欲採靈芝恐後期魚逰千里費尋師不因悟得長生著一局難終未了棋至正二十年庚午嵗冬十月書于吳郡城南之寓舎銀河萬里海雲東直泛靈槎上碧空仙女踏歌星漢裏老龍吹笛浪花中金粟天高碧殿雲鏡中空影夜氤氲白鸞樹下三千女一色龍綃玉雪裙月照旌旗夜未分行宫望拜玉華君衆中王母雙龍駕飛動神州五嶽雲令威化鶴已千春華表歸來是後身城郭悲歌荒冢在到頭應愧學仙人白鶴下啄瑶草庭道士夜讀神農經問之長生有寳訣授以松根千嵗苓溪水流香飯熟麻洞中千樹玉桃花金盤日日飛仙供敇賜安期海上𤓰鬱蕭臺上㑹羣仙龍燭飛光曉夜然玉殿歸來環珮冷白雲猶䕶古苔篇麟洲宫殿五雲高夜走瑶池燕碧桃借得仙人紅尾鳯月中飛影拂波濤鈞天按樂召蓬瀛手把芙蓉朝太清一曲霓裳羽衣舞仙家只數董雙成長生誰解問佺期黄石空為孺子師何似山中閒日月松隂自了著殘棋遊仙詩遂昌其最優乎貞居仙去不可復得清真余君復初請余和之以繼二妙之後其知言乎昔揚雄作太𤣥曰後世有揚子雲必好之盖謂作者非難知者為難也復初舊有能詩聲余故喜之遂為賦此但不可與不知者言耳太原郭翼識張伯雨草書單條登南峰絶頂詩緑雲覔路作清遊身似饑鷹曉脫鞲一上怒臨飛鳥背載盤驚立巨鰲頭神來甲帳風飄瓦月墜下方鐘隠樓為問登高能賦者陸沉誰復歎神州又山居即事詩帖寒食今年二月晦又分新火入厨煙碧花桃落閒誰掃白苧衣輕老自便發匣但餘金薤墨老年正在玉堂編大書絶類顏光禄小字駸駸逼墓田衣輕一作衣寛夕陽扶醉試登臨㟝嶁峰頭望不禁倦鳥欲憑高樹没短松時遇晚風吟雲開列岫争浮黛霞映卑湖盡躍金歸去主人情不淺重傾春酒細論心右登新豐山張貞居雜詩册凡五十五首載集不錄志逸心疲身清命濁逃同類而親猨狙毒厚味而美䔧藿學取益而不勝其損事知危而姑與之安一龍一蛇不厭已之深𦕈惡衣惡食先憂人之饑寒忽然為而反常若此若何以祛有身之患右自贊畫像己酉嵗自春徂夏霪雨之時多五月來僅一日見天處磵阿幽篁中未有裹飯過子桑者間弄筆研冩謬語盈冊以自料理耳語凡五十五首子英遇之持去勿示不知我者雨告右句曲外史與袁子英所冩詩凡五十五篇其首兩章迺此老道人傚鐵雅者也如道言清齋磵阿諸詩皆其道趣中流出者若犇月巵則又頑仙之横出者吁道人仙去已一紀矣鐵雅之友屬之何人開卷愴然不勝山陽之感至正二十又一年花朝日抱遺叟楊維楨在清真之竹洲館書至正壬寅秋八月十又八日海虞繆貞吳郡余大亨崑山顧元臣同觀弟子蕭登拜題𨽻古東淮顧安定之觀于映雪軒時年七十有四不識華陽舊隠居高情還憶聽松餘百篇真籙修都遍滿卷新詩手自書一去丹臺閒日月幾回飛珮在空虚重來化鶴應無恙華表春風動里閭至正甲辰冬月郡人後學陳世昌拜觀謹識至正二十五年乙巳春三月豐城余詮觀壬子正月五日過東婁十日耕學先生出以示僕乃知貞居之與耕學交好之情若是也倪瓚覽貞居先生清詩妙墨飄飄然自有一種仙氣信非世中人也此卷手書以遺余者屢罹兵燹似若有神物䕶持泉南陳君彦亷好古博雅與余同志故割愛以贈壬子夏六月汝陽袁華書張貞居詞翰政如月底疎松雲中修竹信非烟火食人所能賞識冝為吾子英之寳藏也貞居自題云非知我者勿示今子英出以示余豈别乆而弛其約束耶齊郡張紳觀於孫氏映雪軒中時戊申子月右磵阿雜詩墨蹟五十五首乃張貞居詞翰最得意者亦自慎重不輕示人觀其小序可見雖然非子英之知貞居不能久藏至今非彦亷之好古博雅亦不能得子英之割贈所愛以交誼之篤而歸諸春草堂可謂得其所矣子英亦知人哉保為陳袁之家子孫左劵珍之可也廬陵張昱題於凝香閣中余觀在昔右文之際文章翰墨蓋莫盛於東南矣不惟列侍從居舘閣者皆彬彬文學之徒至于方外名流亦或負其清才絶藝擅名一時之勝故釋之徒有笑隠訢上人道家者流有貞居張外史皆以詩文篇翰照映乎山林而與虞趙歐黄諸君子交接于後先迭響乎中外於是東南文物之盛殆前古所未聞今觀陳氏所藏外史墨蹟一册能詩者或無此書能書者或無此詩外史蓋兼之矣慨名筆之流傳念昔人之凋謝江空嵗宴不無有繼響者乎覽卷為之憮然吳郡謝徽識右張貞居自書詩一帙温陵陳君彦亷之所藏戊申嵗見於袁子英家今歸于君君别有貞居所書大小十餘幅可見物常聚於所好君作詩往往有物外意非獨愛貞居之書而已也壬子亥月張紳再題張貞居以詩名湖海而翰墨尤為人所重片縑尺楮往往見之蓋未有若此卷之富盛者也孫過庭云一時而有乖有合心遽體留日炎風燥皆其乖也神怡務閒時和氣潤偶然欲書皆其合也今貞居自言自春徂夏陰雨至五月之久故閒弄筆研以自料理則非心遽體留日炎風燥正所謂神怡務閒時和氣潤偶然欲書耳冝其聨篇接簡不覺其多而穠纎間出清婉流麗有合于古人之度也其詩傳之人口已有定論特語其書如此彦亷好古博雅必能加寳愛矣蘇人王行題余觀張外史自書雜詩一帙詞翰之妙使人如快雪時晴行山隂道中幽景所奪應接不暇披覽竟日不能去手勾吳張適識貞居蚤學書于趙文敏公後得茅山碑其體遂變故字畫清遒有唐人風格詩則出于蘇黄而雜以己語其意欲自為家也唐宋以來浮屠之能書與詩者雖衆然亦不能兩美況道流之久之人哉此自書襍詩也古律行草各臻其妙冝子英之慎與而彦亷之喜得矣高啓識右張貞居詩翰清原陳氏得於袁子英甫盧熊記篆書歴代史臣不為釋老氏立傳或老氏有可書者則以置方技傳中皇明詔修元史始别有釋老傳之目而老首丘處機釋氏首八思馬且各有數人焉張雨生東南以工書善詩為名道流一時學士大夫若趙文敏虞文靖黄文獻諸公多與逰乃不得入傳或者疑之然處機八思馬之徒其在太祖世祖時太抵皆以功業顯故釋老氏有傳蓋不徒以其法而然者則夫雨之可傳政不在此余嘗執筆從史官後得預是議今觀雨自書雜詩于温陵陳寳生家詞翰之妙如是自當與趙虞諸公詩集並傳也洪武壬子秋八月嵇岳王彛識洪武辛酉三月二十六日重書於春草堂周砥貞居真人詩文字畫皆為本朝道品第一雖獲片紙隻字猶為世人寳藏况彦亷所得若是之冨且妙耶舒展累日欣慨交心噫師友淪没古道寂寥今之才士方高自標致余方憂古之君子終陸沉耳吾知前人好修不以為賢於流俗而遂已不患人之不知栗里翁志不得遂飲酒賦詩但自陶冩而已豈求傳哉壬子初月八日倪瓚題貞居詩如月底踈松雲間脩竹字畫則若逺塞驚鴻春池科斗非特不染塵俗塵俗自不能染耳張紳壬戌陽月紳再觀於崆峒外史之丹室於是與彦亷别十載矣洪武丙辰秋九月彦亷自鳯陽還十有九日夜宿春草軒復出此冊同觀題者自鐵崖先生以下凡十五人存者惟八人耳撫卷不勝黯然汝陽袁華識温陵陳彦亷氏出家藏張貞居所書雜詩凡五十五首詞翰俱麗見之不忍去手子英袁先生與貞居友善書此以贈又於卷末書曰勿示不知我者子英以彦亷博雅故出而與之卷後題曰彦亷與余同志故割愛與之雖然貞居非至交則不出袁先生非知己亦不與彦亷既得每為珍玩余初學書即知有句曲外史為浙之擅名者雖急於采其規格而世甚鮮有及間獲觀數帖率皆真跡其於運腕指用紙墨之妙誠超於衆能而成家者也以之才氣則並於蘇米詞或有過之者故一時名重朝野得片紙如寳珠璧豈偶然哉此帖知久深慕一見二三不聞其定在兹獲一覽平昔所見猶霄壤矣孰不珍其傳哉時癸亥嵗孟夏月耆山無為謹書于朝天宫之桂堂張貞居平生慕米南宫之為人嘗為著中岳外史傳故其論議襟度往往類之獨其詩句字畫清新流麗不蹈南宫狂怪怒張之習蓋非獨其學問使然亦由貞居寄迹方外不為聲利所累而又居東南形勝之邦獲見故都文獻之懿優㳺林壑以養其真氣故其發於詞翰者如此今去貞居百餘年耳使人望而企之若古仙人可勝嘆哉友人陳彦亷氏得其翰墨二帙皆平生得意作也余家與貞居世契展詠之餘益増感舊之思云尋陽張來儀識張貞居詞翰俱清逸飄飄然如參白鸞遊霞鄉自非有仙風道骨者不能到唐之羽流中杜光庭輩詎足専美於前矣彦亷冝寳之時洪武十九年蒼龍丙寅吳僧道衍敬觀於春草堂余嘗愛張貞居此帖詞翰清㧞風致高逺當其神清氣和用筆遣意疾徐頓挫濃纎間出故雖連篇累幅不厭其多玩之如飛鳶戾空明珠映月飄光粲爛快人心目可謂絶類離倫特立道流之表自子英化去垂三十年意昔此帖亦遂淪沒今復覽於放鶴軒中展玩終日不能釋手信知至物終當有歸從道冝珍藏之東吴文泰謹識昔人作字類人若顔書之剛勁虞之美麗歐之清痩亦似之余謂非惟字類人作詩雖言志而剛勁清麗亦似其人今觀貞居字之隨體賦形殊不經意詩文隨詠冩志若出自然覽之清氣可掬深類貞居之為人昔人所云為信然貞居書此亦自得意者故題以勿示不知我噫示知尚不輕得之者必好古博雅也張昱為彦亷得之謂得其所陳從道得之可謂又得其所矣從道冝保諸浚儀張肯識僕平生最嗜外史詩集中諸律略皆上口僭評其高處當為元人第一家妄論自信不必世人之同也故其眞蹟所在特深貴之唯姚侍御家有稿一冊時獲寓觀以為樂事其它所見簡短寂寥無足充余嗜者戒卿何幸富有之如此當知貞居真跡流落人間雖有存者斷不能與之為敵矣使僕時時來過出而閲之味其㸃畫求其興致以開余情不亦暢乎晩學楊循吉奉題蔡天啓詩曰収拾三茅風雨様高堂六月是氷壺貞居収拾三茅風雨總入氷壺真得天啓賦詩之真趣矣貞居蛻骨仙去知在蓬萊第幾峰而仙迹長留人間世帝不役雷電下取俾後世得肆𤣥覽馳紫霞之逸想動白雲之遐思瀟洒送壺中之日月不亦神哉袁戒卿襲藏出以見示因題成化癸夘春三月朔旦郡人黄雲識此冊今藏余家向從文衡山處得之元汴方寸鐵志吳門朱珪氏師濮陽吳睿大小二篆習既久盡悟石鼔嶧山碑之法因喜為人刻印遇茅山張外史外史錫之名方寸鐵持以過錢塘訪余於吳山次舎求一言自其所謂方寸鐵者余笑曰予方以鐵石心故乖於世而子又欲乖吾之乖乎雖然古之豪傑修已治人必自方寸鐵始黄金白玉可磨此鐵不可磨也子以是鐵印諸金銀銅玉犀象使佩之者皆無媿於是鐵外史氏心印之教行矣吁豈真求工於刻畫無戾夫古制也哉今一妄男子釋蹻起閭巷取封侯印如斗大印咫尺書驅役帶甲有十萬如金翅鶚逐百鳥無一敢後者金斗之權重矣哉吾不知果能為天子剪狂冦佐中興為生人開太平無媿於汝鐵否不則徒以苟冨貴不至腐尸滅名不已使得珪方寸鐵印斯可以䝉金斗而爵榮名矣珪或為今將軍刻符印其亦以是告之時至正十有九年秋七月八日李黼榜相甲進士今奉訓大夫江西等處儒學提舉㑹稽楊維楨書并誌神斧磨天割紫雲仙葩殞玉發竒芬靈書寳訣開剛卯不數人間小篆文書刻輸君摠色絲前身想是伏靈芝虎頭食肉元無相鑄紐休傳左顧龜我家金粟道人章瓦欵蟠螭識未央千古典型今復見佩之何必獸頭囊鏤玉塗金與錯銀盡將工巧失天眞君能獨掃雕蟲技定品他年合入神伯盛朱隠君余西舜草堂之高隣也性孤潔不佞於世工刻畫及通字説故與交者皆文人韻士予偶得未央故瓦頭於石泥中伯盛為刻金粟道人私印因驚其篆文與製作甚似漢印又以趙松雪白描桃花馬圖求勒於石精妙絶世大合松雪筆法惜其不得從游於松雪之門使茅紹之専美於今世因題四絶於卷末以美之伯盛勿以余言為譽後必有鑒事者公論也時至正十七年中秋日書于玉山草堂金粟道人顧阿瑛方寸鐵歌贈伯盛朱隠君人心何危患多岐方寸之鐵貴自持百錬耿耿明秋暉彼柔繞指何詭隨朱盛剛勁真吳兒法書鐵畫逼秦斯晴窻握管儼若思學成變法出愈竒鐵耕代筆猶神錐用之切玉如切泥孤忠不媿月食詩清新便賦楊花詞元祐黨碑我所非驢鳴犬吠我所􅅓雕蟲小技同兒嬉屠龍妙割嗟奚為盛乎盛乎知不知北南車書得得來中興定勒磨崖碑大書深刻非子誰時至正二十年嵗次庚子夏六月初吉天台氏學者元鼎書于白蓮桂子軒吳僧虚中蓮花樂方寸鐵銘婁東朱瑶字伯盛工古籀篆文其於六書之義考之尢詳嘗以餘力刻印章則為吴中絶藝間遊錢塘過句曲張外史名之曰方寸鐵鐵以喻其能堅其志操期以進乎道亦若桑國僑志於鐵研之鐵云雖然科書廢已久必以篆籀為師法漢𨽻而下不在論能復其古其庻幾朱君乎朱君與予相㳺嘉其志操之日堅今年余來玉山中騐朱君之書法益有進是猶張旭悟公孫大娘之舞器也見其刻玉石如切泥則又若漆園氏誇庖丁觧牛而得肯綮也張得於舞劍庖丁得於解牛吾知朱君得於書而悟外史方寸鐵之㫖矣遂述其事而為之銘曰聖人作人文開龍馬出榮圖來神農氏尚結繩民弗犯俗龎淳史蒼頡肇有制譬孳乳乃曰字越夏商歴周秦科斗廢籀篆臻漢而晉書變作唐風媮政日惡曰逮今愈邈寥事刻畫昆吾刀鐘鼎隳石鼔頹心太古婁朱珪時至正嵗舎庚子夏四月二十有六日河南陸仁造方寸鐵頌猗方寸鐵嫓昆吾刀㳺刄發硎妙契縱操六書奥㫖探賾損勞史籀秦斯作則孔昭翔鸞翥鳯騰龍騫蛟為印為章奎壁麗霄文苑藝林世賴榮褒我頌匪私永言弗佻至正庚子八月十又八日淮海秦約造方寸鐵詩奉美伯盛有道隴右邾經上朱珪手持方寸鐵撫印能工漢篆文并剪分江龍噴月昆刀切玉鳯窺雲他年金馬須承詔此日雕蟲試䇿勲老我八分方漫冩詩成亦足張吾軍至正八月辛丑朔平湖草堂中冩西夏朱仲義𨽻古朱生心似鐵篆刻藝彌精應手多盤折纎毫不重輕么麽形獨辨蠣匾勢初呈漢印規模得秦碑出入明風流金石在潤色簡書并餘刄庖丁解風斤郢匠成逹觀應自我賞㑹足平生趣刻無多訝因君託姓名錢塘陳世昌袖裏昆吾一寸鐵江南碑碣萬家文玉符金印雲臺將大篆煩君為勒名雲間陸居仁十年兵興徧天下名山大澤罹野火野火盡燒秦漢碑咸陽􅄦哭無人打故人吳睿業篆𨽻好古乃有如珪者妙刻金粟道人章尤精白描桃花馬金印徒聞如斗大零落當時建章瓦君不見黄鶴仙人㐲靈芝北海文章長高價武夷山樵者錢惟善題于海嘯軒館閣諸公無不喜用名印雖草廬吳公所尚質朴亦所不免惟楊文安公絶不用其制吾竹房論著甚詳然其所用人多不合作趙文敏有一印文曰水精宫道人在京與李息齋袁子方同坐適用此印袁曰水精宫道人政可對瑪瑙寺行者闔坐絶倒蓋息齋元居慶夀寺也鮮于郎中一印曰鮮于伯機父吾子行曰可對尉遲敬德鞭滑稽大略相同子行嘗作一小印曰好嬉子蓋吳中方言一日魏國夫人作馬圖傳至子行處子行為題詩後倒用此印觀者曰先生倒用了印子行曰不妨坐客莫暁他日文敏見之罵曰箇瞎子他道倒好嬉子耳太平盛時文人滑稽如此情懐可見今不可得矣余座主張先生仲舉在杭一印曰平臯鶴叟盖用杭州三山名臨平臯亭黄鶴也古人亦有如此者如雲烟過眼録載姜白石印文鷹揚周郊鳯儀虞廷蓋以姓氏作隠語辛稼軒印曰六十一上人又以破其姓文米元章書史言劉巨濟符符字亦好竒耳雲門山樵張紳書于朱伯盛印譜後予嘗見故元時吴人印章刻畫古雅疑其多出於吾子行之手而不知有朱伯盛者今觀楊鐵崖顧玉山輩方寸鐵志并詩始知之伯盛名珪玉山稱其為西郊草堂之隣蓋昆山人葉君廷光與為同縣冝其獲此而藏之成化丁未三月晦吳寛題元名公為朱錬師本初七序墨蹟故元文章之盛雖方外道流亦有其人如吳全節薛元卿張伯雨輩是也此則朱本初所著貞一藁觀其所得尢為精深冝一時大家特為親書其首也本初臨川人出家上清宫而從吳宗師居都下其藁既無刻本不知此編何從傳至吴中幸而為抑夫縣人之所藏不然其亦泯矣吴寛元博本初一榻林下内境虚曠中夕夢回松月在窻夜氣閒然全體豁露于斯有得劉損損齋七序為勝國范楟劉有慶歐陽應丙虞集栁贊道吳全節諸人天啓癸亥春二月二十六日王二泉持此卷來以行促不及録序語玉水記珊瑚網卷十一
