body:
  text: 珊瑚網卷十六明汪砢玉撰法書題跋祝京兆行書在山記號琴者曰在山進善琴者希之爾鍾子之謂伯牙氏曰巍巍然若泰山時牙志果在髙山也夫本吾神明所趨髙而有山山而後有指指而後有絃絃而後有音音而後有耳耳而後有吾之音與絃與指與神明焉以有山於其間將山從志乎將志從山乎將山與志皆必從於絃乎將虚乎實乎當其時必有宫角徴商羽半宫半徴之調必有散引操曲之章必有䟽急脩促起止之度左之於徽右之於絲固不以類吾之思其諸有者則將有之乎將無之乎有則此實矣孰從而出是山無則不知何為必伺乎乎鳴而後識也期牙之談妙今古吾妄意其可疑者在此雖然吴札之論列國風尼父之見文王皆爾矣理必有不可破者吾其未臻故云爾意者説藴諸周易乎葢曰形而上者謂之道形而下者謂之器其妙矣乎吾未能以闚焉張文端能琴因問號號以在山所謂進牙而希之且列是記俾文端他日進焉則舉其所得以解我𢎞治乙夘重九鄉貢進士蘇臺祝允明記枝山文選跋書後自士以經術梯名昭明之選與醤瓿覆乆矣然或有以著者必事乎此者也吳中數年來以文競兹編始貴余向蓄三五種亦皆舊刻錢秀才髙本尤佳秀才既力文甚競助以佳本尤當增翰藻不可涯爾丁巳祝允明筆門人張靈時侍筆研文選自隋唐以來莫不習之余昔游南都求監本率多漏缺不可讀偶閲書肆獲部之半又非全書也其後赴試京師今少宰洞庭王公出其前帙見示儼然合璧遂留而成之孔周何從得此精好倍予所藏好學之篤又有好書濟其求宜有以慶賞楊循吉跋後題徐禎卿觀唐寅披玩余家尚有宋板𨽻篆五經左國諸子史漢通鑑文集種種净拭棐几展玩覺古香可愛後苕溪鐫五色硃批各書錯陳左右牙籖錦函燦爛相映奚百城之足云玉記枝山書語怪録有上下冊籖俱項子京題二編成後乆倦筆墨然予固東西南北之人也日溢于耳不期而積閒忩試録倐成十卷或疑事以罕怪今多而速若是曷為曰子不校之耳人生一日耳目涉閲幾許若試常者皆筆此一編殆數日事耳今以四方之衆二紀之永而若此尚何多速之有為此語以見世之有怪亦理之常乃不足怪且為洪公解嘲初既稱怪聊仍名以語怪正徳戊辰允明叙吴下阿明自古才士無不喜怪者是編迺祝希哲所輯昔常于張士魯舟中閒坐閲之不覺終帙此日士魯索跋偶盡一二紙始憶舊讀長夏無事即六經諸子豈能與此等書争勝哉癸夘立秋日夢禎識卷末有王守谿太傅筆記正徳間異聞二則為墨林項氏所珍後歸吳功甫太學名題科者功甫去世又歸之愛荆府君時得陸象𤣥作宣和装極精工友輩欲出重價購求愚父子莫許也萬厯壬子秋予應試留都得祝子辜知録附志怪五卷乃曾孫化甫所鐫云尚有續編失去而予家竟獲之可稱合璧也先生前序以語怪雖不若語常之為益然幽詭之物固宇宙之不能無而變異之事亦非人㝷常念慮所及今苟得其實而記之則卒然之頃而逢其物值其事者固知所以趨辟所以勸懲是已不為無益矣今余既資先生記載之益復鍳先生楷法之妙欣幸何如第未及與全録鋟行為欠事每不去心耳慧國十林弟子汪砢玉識于話夕軒祝希哲草書月賦卷九疇酒次鋪宋經箋索書爛漫為此試荘氏筆甚佳然而舊牋有盡書學此正矣九疇謂何乙酉七月秋枝山居士六十六嵗書吾鄉前輩書家稱武功伯徐公次為太僕少卿李公李楷法師歐顔而武功艸書出於顛素枝山先生武功外孫太僕之壻也早嵗楷筆精謹實師婦翁而草法奔放出於外大父葢兼二父之美而自成一家者也李公常為余言祝壻書筆嚴整而少姿態葢不及見晩年之作耳昔人評張長史書驚蛇入草飛鳥出林而郎官壁記乃極嚴整世固無有能草書而不能正書者因觀九疇所藏枝山月賦為拈出之徴明題祝京兆書法當時無輩而或者評其不出正鋒葢謂此老目視短不能懸筆運肘耳此巻藏毛氏不克見嘗見其刻本細騐于㸃畫間皆正鋒也丙寅冬獲觀手蹟竊謂所鑒不謬因識其末周天球題希逸此賦真江左琳琅一時膾炙人口然不無穉語希哲生書法波靡時乃能用素師銕手腕參以雙井逸趣超千載而上之尤可貴也余常謂希哲如王謝門中佳子弟雖偃蹇縱逸而不使人憎跳盪健鬬如祭將軍而有雅歌投壺風味識者以為知言此卷為故毛光祿書光祿嘗刻之石而其家貿以供何頴考兩日費今年春與張中丞肖甫閲之時陸叔平在坐曰此贋本也真蹟在故毛光祿所余笑謂叔平曰子知光祿之有此賦而不知此賦之不為光祿也耶叔平悟乃諦視之而笑嗟乎人閲物物亦能閲人聊以寓吾一時目而已萬厯癸酉秋日王世貞題枝山書偕美賦并叙檇李汪氏鑒藏二十載妻子好合如鼓瑟琴錦谷笑仙黄璋秉叔錦衣令公一江之仲氏其配錦叢坐仙童令人小字静娥大宗伯枕宏先生之令息也聫徳嫓年雙璧合一秉叔生以秋仲五日令人后一月其日同秉叔道於予為綴八韻美而祝之潤玉佳倩珍珠令妻較才華而允匹問日月而仍齊俊傑豪英拔千人於藝苑工容言徳暢四美於蘭閨金烏曜東玉望西秋水之芙蓉並蒂春塘之翡翠雙栖𤣥圃藍橋玉杵琤琤而夜搗仙源流水桃花片片以春迷門懸弧帨光連璧奎偕老之篇既􅆳迭為遐祝窈窕之章始闋看此新題温温淑人少保之子宛宛靈脩金吾之嗣女也同心兮式榖爾似士也合志兮云胡不喜閨儀㓜閑美有徳而有容華風日騰更何彼而何此追漢津之帝孫逐秦臺之簫史蘭襟婉孌以相依霞袂連翩而互倚綺閨乃移來之圓嶠鳯舞朝陽洞房有幻出之瀛洲魚遊春水聴爾話言和哉情抱雎鳩偶語於河洲鸞鳯協鳴于蓬島雖或黙或語之際必也雝雝在一嚬一笑之間何嘗草草芳詞出口囀闗闗春栁之鶯麗語成章掞翠翠秋江之藻助成君子之徳惟善是寳倡隨夫婦之宜永以為好適逓啓其初辰肆交陳於善禱撫松篁而胥慶百福攸宜捧壺觴以互酬君子偕老人亦有言天作之合誠權度其工能信宫商之應答朝為百賦鑑韶奏之九成暮就七襄粲組文之五雜朱墨交横篇章合沓金聲振相如之館瑶響滿易安之閤吟從幼課妙傳蛺蝶之瓊詞宫保自㓜日課一詩擬題甚煩其咏春燕等篇尤膾炙人口秀自少成俊出鳯凰之珠蠟藹五雲兮刺繡陸離綰秋蛇兮札牘紛遝裁霞作性三芝生九竅之香鏤月為情七寳藉雙􅊏之合工則爾矣容也何如訝靈鶼之比翼羡文鴛而乘居炯秋水兮湛壺寒煇宻透粲朝霞之暎日絢彩徐舒三生結合二妙相青百艷争竒奪氷蠶五色之錦一清相照涵摩尼九曲之珠春風濯栁夕露籠蕖擷芳蘭之仙佩珥瑤碧之華琚傾國傾城信瓊肌之宜象服如圭如璧當玉帶以挂金魚徴彼絮縷藉此斤斧寧惟才貌之兼具實乃襟情之合矩春城紫陌閒吟御栁之青烟暮日朱簾共醉桃花之紅雨静几譜雙閒忩格五孟徳曜三時爼案争道齊眉張京兆一㸃黛痕競傳樣嫵時歌彤管之舊章戲續霓裳之新譜賞月峰上追綵鸞以遇文簫乞巧樓頭笑天孫之嫁河鼓惟仙家之雙逸謫人間而妙匹樂只君子宜其家室英英稚齒都未踰花厯之三脉脉芳情尚不忘摽梅之七金舂玉應兮和瑤琴於錦瑟聲應氣求兮投鸞膠於鳯漆載頌淵淵之鶴筭五福斯全矧有嶷嶷之麟児萬事既畢其頌則和後簡有述誕朝聿臨春酒載斟樂而不淫續彦先相贈之句求之既得撫文王舊友之琴為此儷詞相爾一心請祈祉於方來爰徴效而自今徳與位以齊升誥同封而章同服年將情而並乆山其高兮海其深毋嫌綺語式播徽音維偕美之自天温其如玉試一舉而擲地聲必成金𢎞治十五年壬戌八月一日蘇臺祝允明在秦淮東院冩此卷前繪錦叢坐仙童小影如慧月天人坐花隂翠茵憑石几含毫構思一侍児跽向磨墨紅纎倒影緑莎設色穠艷而無欵後見大軸白描黄金吾像枝山書傳其上售者云像亦枝山筆也時匆匆在舟不及細閲復見枝山書異犬記即作墨犬於下宛然吠走則静娥之真或先生所寫乃丙辰冬是卷與諸玩好入盗手未幾為松陵汝姓者緝至邑尊劉玉受見偕美賦殊嘆賞今仍歸烏有矣䝉天笑者識于月香居祝希哲急就行草懐知詩帖詩失録卧病泊然􅃡懐平生知愛遂各為一詩少長隠顯逺近存歿皆非計祗以心腑之真凡十有八人共詩一十九首枝山居士祝允明書此卷為項氏物後識其值二十金購於文文水氏嘉靖甲子年重装崇禎初余獲一觀録其詩竟失去并逸嵗寒十人名姓先露八人則吳文定公寛王文恪公鰲韓襄毅公雍沈先生周東郡使君南海林公世逺陸冢宰完朱孝亷性甫朱文學羌民枝山真書古詩帖晉陽起唐祚王明紹巢封垂統已如此繼體宜昏風麀聚瀆天倫牝晨司祿凶朝綱一以墜天樞遂崇崇淫毒穢宸極虐焰燔蒼穹向非狄張徒誰辦取日功云胡歐陽子秉筆迷至公唐經亂周紀凡例孰此容侃侃范太史受説伊川翁春秋二三筞萬古開羣蒙又朱光遍炎宇微隂薶重淵寒威閉九野陽徳昭窮泉文明昩謹獨昏迷有開先幾微諒難忽善端本緜緜掩身事齋戒及此防未然閉闗息商旅絶彼柔道牽又微月墮西嶺爛然衆星光明河衺未落斗柄低復昻感此南北極樞軸遥相當太乙有常居仰曕獨煌煌中天照四國三辰環侍旁人心要如此寂感無邊方又放勲始欽明南面亦恭已大哉精一𫝊萬世立人紀猗歟歎日躋穆穆歌敬止戒􅋙光武烈待旦起周禮恭惟千載心秋月照寒水魯叟何常師刪述追聖軌又吾聞庖犧氏爰初闢乾坤乾行配天徳坤爻協地文仰觀𤣥渾周一息萬里奔頫察方儀静隤然萬象存悟彼立象意契彼入徳門勤行當不息敬守思彌敦又大易圖象隠詩書簡編譌禮樂矧交䘮春秋魚魯多瑶琴空寳柙絃絶將何如興言理餘韻龍門有遺歌又顔生躬四勿曽子日三省中庸首謹獨衣錦思尚絅偉哉鄒孟氏雄辨極馳騁操存一言要為我挈裘領丹青著明法今古垂煥炳何事千載餘無人踐斯境又元亨播羣品利貞固靈根非誠諒無有五性實斯存世人逞私見鑿智道彌昏豈若林居子幽探萬化原枝山祝允明書本朝名公楷法予家彚成一函首此希哲書古詩嗣為徴仲書阿房宫賦雅宜書唐宫詞隆池書紀遊諸帖亦偉觀也徽友程松蘿竟以漢玉兕鎮瑪瑙羣邪青緑小鬲易去惜哉樂卿漫記祝京兆書聞絃詩軸舟泊衢州城下暮赤脚苦蚊眼欲瞀逡巡就枕忽聞絃已覺再聴還恐誤披衣起見燈影紅柔指鶯喉暗輕度初聞乃是三絃語寂歴空江落烟霧少年慣向醉中聴老大聞之猶起妬須臾演入琵琶絃指撥聲清不似前疑是小璚更大生移宫換羽各争妍斯時夜静絃愈急潛鱗出浴棲羽寒珍珠錯落玉盤净鐵騎跂東闕可懸老夫聴乆毛髪豎恐有蛟龍來摶船右聞絃一首書於虎丘梅花樓枝指道人余嘗攜此幅於白下戊午春懸三山草堂小集諸工音律者為闗中姜還樸七絃婁水張䀻夫三絃蘓臺徐賀世二絃及陳玉素四絃東曲大小雪二十五絃一時聲傳九陌余因步祝韻紀之及今追憶猶自盈耳天外賔砢玉漫誌枝山詩草諸蹟長安昔日在闗中洛陽浙右亦相同江東自古帝王宅周秦已見氣葱葱人言石城如虎踞又道鍾阜似龍蟠千年王氣浮天表一日真人建法宫天府天開天闕起五門三殿當中峙五鳯樓前栁似烟奉天門外天如水金陵金闕勝金城玉陛連天接玉京星散羽林霜氣肅天臨華葢日華明十二飛樓石門繚百萬􅆛貅屯八表寳刹天花和月飛郊壇神樂穿雲窅御史當街百騎驄將軍納陛羅霜鋒五侯甲第遥迷霧七貴前驅響鬬風鳯凰臺上鳯凰遊𤣥武湖中水似油萬户鶯啼花裏曉千家砧搗月中秋會同館外白雉多包茅楛矢交經過重譯來賔醉卉服輕烟淡粉列青娥六樓六館鬬倡妍日日新聲沸管絃狹市斜街迷錯絡曲房洞户暗鈎連吳下書生好逺遊抱書來看帝王州那知髙卧西風邸蓬眉蕭颯長安秋右余所賦長安秋一首為希吉書之允明東南大澤名具區中有洞庭相對峙七十二峰湖上浮萬頃汪洋五湖水仙人隠士住高峯青天羅列金芙蓉巖窟巉岏蹲虎豹渚宫幽閴潛蛟龍山人茅屋翠微裏鷄犬聲遥白雲起昔聞綺皓留此山今日髙風亦相似湖山横黛畫中開湖水浮藍鏡中止還疑海上駕蓬瀛豈識人間有朝市朗然吟嘯入烟霞山中萬樹開桃花問津那許漁郎到伐木不知漁父家時見青崕麋鹿走朝出為羣暮為友我欲共君歌紫芝借問山中何所有贈洞庭張山人允明獨愛無人處幽棲不用名竹雞啼午寂松䑕落枝輕芳草初平路春深欲上城蕭然吾亦得擾擾自勞生右題畫一首枝山西望崚嶒擁國門秣陵秋氣動乾坤清江故有蛟龍窟白日元疑虎豹尊日滿荒城生墅色雲來别渚浸山村莫愁玉質歸黄土􅃒莫輕招月下魂允明春山雨新沐掩靄結綠濃一葉金芙蓉粲粲迎朝旭江亭小于艇松子落滿頂盡日無人來流水抱虚影右二首題子昻畫允明白雲媚蒼山寂寂太古春窅藹林薄中一區宅無隣楊子生清净閉門了𤣥文兩生勿輕過惟通問字人客子欲何歸中林猶獨步幸有蒼蒼松為辦去來路季冬雪重積十日竒寒沍啁啾閴不聞葱蒨失其故梧桐滴夜雨客香秋可憐盡是離人泪聲聲落枕邊右五首題畫幅枝山落日採薇歸蕭蕭兩布衣爾來人采少春雨長頑肥靈巖好個景鑿得不成山人自要頭白山頭也會斑右雜作二首枝山閒雲寂寂鏁龍宫萬頃春湖洗碧空惟有白猿聴講後向人長嘯月明中呼猿洞作枝山吟詩寫畫似㕘禪不向他人被裏眠生公堂前㸃頭石天平山上白雲泉秋浸具區天地寒老崕垂脚怒龍蟠仙人夜半騎鶴去木落潛窺古竈丹雲母薄梳青石髮水花肥㸃碧荷錢樹根一坐空山老不許時人問嵗年寒光交逗眼蒼然半夜人間别有天想得非仙亦非鬼四山風雨擁孤眠滿地松隂六月凉採芹歸去擔頭香相逢夕照誰家子倚樹喃喃話正長身在雲西夢想閒松頭鶴影枕屏間一聲隠隠啼花雉信手推忩滿眼山朝雲乍起千峰合暮雨初收萬壑鳴此地烟霞誰領畧却輸癡老筆縱横腰刀帕首報君恩初事將軍出雁門無限家門兒女念秋風吹上五陵原費却青錢換戲資世人多道小児癡不知世事誰非戲争得長年作小児右九首題畫枝山扇功本在驅炎上不似屏風只好看筭得題詩真拙計却供雙眼失清寒題箑允明本朝法書首推希哲其狂章有不可以素旭擬者項又新嘗過余煑霜鱸夜話索所藏扇册展玩見祝書身在雲西一首運筆如烟雲變幻莫測越明又新復過余云思竟夕得之矣出手録片紙對之相與撫掌呌絶又先君每撫松擊竹哦枝山句客香秋可憐想得非仙亦非鬼松濤竹籟答響清泠不得知有人間俗務今思之恍如隔世可勝浩歎日損玉居士識于𤣥隠齋祝枝山詞蹟燈火三更把筭籌風沙萬里覔封侯蠶児作繭生難罷蛾子親燈死却休身外苦夢中忙渾無些子為吾謀世間富貴真何物賺得英雄白了頭調鷓鴣天南阜小亭臺薄有山花取次開寄與多情熊少府睛也須來雨也須來隨意且銜杯莫惜春衣坐綠苔若待明朝風雨後人在天涯春在天涯調一剪梅唐伯虎詩蹟人生七十古來有處世誰能得長乆光隂真是過隙駒緑鬢看看成白首積金到斗俱是閒幾人買㫁鬼門闗白日昇天無此理自古有生還有死眼前富貴一枰棋身後功名半張紙古稱彭祖壽最多八百年後還如何請君聴我歌且舞窮通壽夭皆由他都憑乖黠討便宜我討便宜只是癡把日繫繩終不住待天倚杵是何時隨縁冷煖開懐盞不計輸贏伴手棋七尺形骸一棺土任他評我是和非漫興措身物外謝時名著眼閒中看世情人筭不如天筭巧機心争似道心平思量昨日疑前世睡起今朝是再生説與明人應曉得與愚人説也分明六如居士席地松隂樂有餘瓦盆盛酒炙枯魚心中洗盡閒居利一𣲖泉聲應讀書一雨江南水接天春山凝翠樹浮烟飽看山水歸來晩隔岸應須買渡船平日春醪賤可賖春來酒價忽然加山村野店如城市都為遊人賞杏花晉昌唐寅曲港踈籬野寺邊藍橋重叙舊因縁一宵折盡平生福醉抱山花月下眠丁丑十一月望夕夜宿廣福寺前作蘇臺唐寅此首在余家藏明人七帖内唐六如書嘆世詞八闋前四首已刻後四首未刻書在一卷因俱録入春去春來白頭空自捱花落花開紅顔容易改世事等浮埃光隂如過隙休慕雲臺功名安在哉休想蓬萊神仙真浪猜清閒兩字錢難買枉把身拘礙人生過百年便是超三界此外别無閒計策極品隨朝誰似倪宫保萬貫纒腰誰似姚三老富貴不堅牢達人須自曉蘭蕙蓬蒿筭來都是草鸞鳯鴟梟筭來都是鳥北邙路児人怎逃及早㝷懽樂痛飲一萬觴大唱三千套無常到來猶恨少禮拜彌陀也難憑信他懼怕閻羅也難迴避他枉自苦奔波回頭纔自可口是懸河也須牢閉呵手是揮戈也須牢袖呵越不聰明越快活省了些閒灾禍家私那用多官爵何須大我笑别人人笑我暮鼓晨鐘聴得咱耳聾春燕秋鴻盼得咱眼朦猶記做頑童俄然成老翁休逞姿容難逃青鏡中休使英雄都堆黄土中筭來不如閒打哄枉自把機闗㺯跳出麫烏盆打破酸虀甕誰是惺惺誰懵懂有酒無花端的為省酒有妓不佳也難當做有選妓要班頭方纔是對手不論酸甜酒須傾一百斗爛醉酕醄通宵不肯走老頭児非是要出醜世事多參透一朝那話児來要耍不能勾想人生有幾個到九十九荏苒春光不覺歸去早老朽容顔怎能又還小明月尚可邀昨宵難再找緑蟻紅裙一刻不可少萬事由天何勞空自炒甜的苦的一般様老甜的多歡樂赴了些有名席睡了些風流覺把一個張揭老児乾罷了一主一賔一個知心俵一味一壺一輪明月皎或把話兒嘲或將琵琶掃只唱新詞舊曲多丢了只論今畨徃事多勾倒今年覺比去年老𦂳要著光隂到今日説你忙明日説無鈔問先生那一日纔是個好競短争長世事何時已富貴貧窮由天不由已七十古來稀而今豈止你風雨憂愁又常多似喜屈指尋思前途能有幾是會的從今日受用起莫為千年慮對景且開懐有酒須招妓既為人須索要為到底右調對玉環清江引吳郡王荆石和嘆世詞十二首樂處酣歌時光容易過苦處奔波早晩偏難度世界號娑婆苦樂平分破佩玉鳴珂生辰不似他戴笠披蓑安閒不羡他别人騎馬我騎驢更有徒行個日月疾如梭天地旋如磨也非過意相摧挫美竹幽花便是清凉界淡飯粗茶且共蕭閒話白日苦喧嘩有約來良夜網得魚蝦壺傾問酒家筆走龍蛇詩成付會家世間禍福亂如麻我也難禁架休言鵲與鴉任作牛和馬只教方寸長瀟灑覆轍翻舟那個曾回首大劍長矛那個曾丢手無數世間愁憑著人承受拜將封侯是英雄釣鈎按簿持籌是愚夫枷杻休題能向死前休更筭千年後步步使機闗也要天公凑行年五十曽參透皂㡌絲縧一第猶難料紫緩緋袍一品猶嫌小量盡海波濤人心難忖料翠養翎毛為誰頭上好豕養脂膏為誰腸内飽千㝷鳥道上雲霄何必都經到平地好逍遥髙處多顛倒世人只是回頭少畫棟雕梁推収紙半張緑鬢紅妝消除淚幾行此事本㝷常謾説多魔障百草芬芳須防秋降霜萬木萎黄須逢春再陽假如傀儡一登塲多少悲欣状旁人費忖量兀自生惆悵不知刋定傳竒上百甕黄虀須了今生事一縷紅絲須是前生繋人事有推移總是天安置智似靈龜何常脱死期巧似蜘蛛何常不忍饑命通若在四更時夜半猶憔悴千年薦福碑九日滕王記勸君且等時辰至鐵鎻銅闗財寳終須散玉液金丹遲速難違限但放此心寛萬事從天斷不坐蒲團西方掉臂還不戴蓮冠南華合眼看人間苦海黒漫漫送盡聰明漢饑來粥與饘睡要牀和簟此外不須多繾綣麋鹿山邊終日防弓箭鸚鵡簷前終嵗愁猫犬身在畏途間頃刻憂機變恩愛纒綿多成仇恨縁涕泪流漣多因歡喜縁白駒過隙難留轉何苦又加鞭靈臺一寸間簇起和氷炭任教世事如電閃愁多病多早已􅁂毛皤恩多寵多轉入是非窩洗耳聴漁歌一一多嘲我漫天網羅方被浮名悮三載沈疴児被阿爺誤只今九表向天呼誓不上長安路黄粱夢已醒破衲還堪補聊就人間小結果一粒芝蔴救飢也是他一片黄瓜解渴也是他其餘萬事賖到了成虚話纔説西家殺牛與宰馬又説東家鑽龜共打瓦他們圖甚王和霸一任的閒搭掛待乘博望槎看過天河界那時碌碌纔干罷南陌東疇是児孫馬牛趙舞秦謳是歡喜寃仇萬事總悠悠勞生何所求一簇眉頭筭前又筭後三寸舌頭説强又説醜饒君一日可千秋空落得多僝僽青山夢裏遊𤣥牝空中守羲皇一夢君知否你會使乖别人也不呆你要錢財前生須帶來我命非我排自有天公在時該運該人來還你債時衰運衰你被他人賣常言作法可消災怕沒福難擔戴有酒且開懐見怪何須怪一任桑田變滄海右倣唐六如對玉環帶清江引王錫爵弇州評子畏書軟熟亦不惡此紙更稜峭可異乃子畏自稱江南第一風流才子又曰普救寺婚姻案主者而太原相業偉如生平不二色何嘆世詞相唱和至此兒淵云唐解元狂者也王文肅獧者也狂獧迹異而心同宜其相契合乎然子畏作風態以逺宸濠未常不介然自守耳至詞調率意縱横有如巵言伯虎共乞兒唱蓮花落少時亦復玉樓金埒故復不惡研山山長汪砢玉識於盟鷗小檻珊瑚網卷十六
