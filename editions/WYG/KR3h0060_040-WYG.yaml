垂釣石宛宛碧池隅翳荷窺浴鷺牽藻引游魚試詢淵上嘆何以臨池娛釣磯池源通中湖流水浮飄花窈窕泛朝日潺湲弄明霞倘逢漁舟入得訪秦人家花源汝南何景明仲黙思樂堂久家湖山上解攬湖山竒先君奉先地堂構開洪基慨昔未盡樂貽今無窮思傷心夜臺日不照春園枝假山湖山七十二朶朶青芙蓉詎意山中園盡納湖上峰雕䤹脱鬼斧撇捩騰蛟龍方逢路縹緲俗子焉能從水鑑樓清池若明鏡照見池上樓開簾對秋月影動紫綺裘海中金銀闕毛骨寒凝秋莫作彈劍舞夜久驚潜虬風竹軒幽軒繞藂竹四壁風淒清端居不出户日夕聞秋聲炎天洒冰雪虛谷張韶音塵氛自相逺獨醒非我情蕉石亭怪石如筆格上植蕉葉清黯然太古色得爾増娉婷欲攜一斗墨葉底書黄庭拂石更盤薄風雨秋㝠㝠觀畊臺微雨開青春田家事東作曉起臨平臺遂就農父約鞭牛莫鞭腹束草莫解縳腹裂傷神明草散滋蔓惡薔薇洞百丈薔薇枝繚繞成洞房密葉翠帷重穠花紅錦張對坐覽六博不知朱夏長香雲落衣袂一月留餘芳荷池紅蓮日相鮮白蓮色如故穠花多改移澹泊蠲外幕衆人愛顧色君子樂貞素蕩舟方池隂日暮獨延佇栢屏壁立青玉屏下見古栢根乃知嵗寒葉鬱作蒼雲屯貞姿洗霜雪老氣横乾坤名園非此種誰可當居門留月峰明月出海底掛向珊瑚枝玉鏡非不去中宵光陸離滿持洞庭酒長歌謫仙辭風吹桂花影歴亂翻金巵通泠橋横溪斷山麓危梁架雲徑飛雨鳴寒泉泠泠落清聽莊生濠上遊孫老天台興無勞千里求即此托相贈花源靈源出山逺曲流通溪斜春波自何来往往浮桃花我聞林屋巖中隠古洪崖遡流一相見共爾希餐霞釣磯子陵隠嚴瀨吕望栖磻溪龍潜抱雲霧虎變揚虹霓徐君一片石乃在震澤西功成拂衣去名與二公齊姑蘇顧璘思樂堂百年行樂地基構得文孫未覺風流逺居然謦咳存寒暉衰草色春雨舊苔痕手種雙槐樹清隂已覆門假山近割包山巧冥搜笠澤竒晴牕通玉女小有自仇池不假湍沙木聊歌桂樹枝百年行樂地春雨起遐思水鑑樓髙樓凌萬象正俯曲池端畫棟浮晴藻風簾㵼急湍秋容千丈碧天影一規寒落日相涵照依依十二欄風竹軒清真子猷室觸目總琳瑯隠几四筵雨開樽五月涼瑣忩晴送影金粉細吟香楚調無人㑹鳴簫引鳯皇蕉石亭春苔封白石風葉展寒蕉院靜浮蒼島牕虛拂翠翹空山歌磊磊疎雨聽蕭蕭尊酒邱亭上相看獨逺囂觀畊臺築臺臨野外髙處見畊耘春煖一犂雨秋成萬頃雲閒能歌嵗稔靜足念農勤陶令非能稼相看意自深薔薇洞天台何處是近不出家庭春盡花爭發山深洞不扃晴褰紫絲帳煖壓錦雲屏閒吟謫仙句祇覺思冥冥荷池綠冒小池平涼雲萬蓋傾細香浮露氣疎雨占秋聲巢葉龜真戲凌隂魚自驚芙蓉濯秋水欲折已愁生留月峰誰穴仇池石分明片月蒼虛涵萬象影常占九秋光玉女懷寒鏡蒼龍吐夜芒金風日夕至桂子靜吟香栢屏古栢難為用蒼龍且屈蟠稍從人束縳不逐世摧殘勁節宜藩屏深盟有嵗寒固因霜雪後不復美花欄通泠橋斷岸水融融飛橋絶水中不容方軌度潜與五湖通疎雨響璚珮潄瀾卧玉虹使君真長者小試濟川功花源何處碧桃雨飛花渺去津山中自流水物外有長春路轉纔通棹雲深不見人洞天曽不逺或有避秦民釣磯髙士投竿處臨清有釣磯寒潮洗塵蹟春雨上苔衣靜與鳥相狎坐看雲不歸閒遯有佳意不為鱖魚肥長洲文徵明思樂堂勝絶存朱栱因懷令德遺開堂祇杖履入室想光儀圖史貽謀逺湖山發興竒落成非不亟留待後人為石假山震澤殘山外嶙峋爾亦竒雲根移不斷蘚壁去常辭短竹煩相媚交藤恐見欺大觀寰宇足幽賞一拳宜水鑑樓樓居臨沼沚情景兩悠然俯鑒一泓水中涵萬象天魚行朱檻下人立碧波前可是玉堂署能追崦曲川風竹軒鳯鳥棲不定琳瑯時一鳴披牕殘帙亂洒石素琴清世外煩襟滌林間暑氣平昔賢多曠達千古剰髙名蕉石亭怪石峻嶒白山蕉綠更翩盤根深共結入罅巧相妍夢覺清隂覆書成翠色鮮寸心猶未展雅素獨君憐觀畊臺園亭意不極逺興忽然開沃野晴多曠春風綠又回老翁分耦去小婦荷鋤来為爾懷沮溺因憐濟世才薔薇洞旭日繁朝景星葩粲曉英閒神紛莫辨流態絶多情隂洞呈顔色芳春藉寵榮相憐惟謝眺風蕊寄新聲荷池水榭微薰動清香暗自通娟娟欣並蒂歴歴間深叢楚客留新製吳姬妬冶容雨微方日夕瀟洒玉池中栢屏古栢層霄立寒屏捧露開坐看青障合時見綠雲迴密榦風霜注重隂鶴鸛来坐憐蒼翠好持此謝寒梅留月峰中峰竒絶處竇月突然留谷響聲先應巖虛白自浮影斜如乍滿光射若探幽莫漫驚神女探珠夜出游通泠橋曲澗鳴寒玉涓涓雨後聞細流縈碧藻逺注濕青雲逕轉沿花出溪迴觸石分澄心無俗慮洗耳淨塵氛花源出澤凝香逺浮堦决溜遲不須穿虎豹徑可汲清漪勝地開靈脈浸淫泛曲池纎纎餘宿潤黙黙助春姿釣磯釣石平如掌臨淵意有餘藻含香餌潤波泛碧綸舒逺意聊觀物閒情豈羨魚因懷渭濵叟富貴有先書維揚朱應登思樂堂徂謝追遄期悠邈成今昔平生行樂地徬徨覩遺跡寒飈起危館曙霜倚幽石象設當如存神遊渺安適石假山君家洞庭畔猶言去山逺園隈搆石岫林際開雲巘迤邐帶華池﨑嶇入層苑不載扁舟来臨流詎能返水鑑樓可憐池上樓俯映池中水㸃綴畫難成分明鏡相似雲移芰荷下魚戲房櫳裏素景一披離知有微風起風竹軒琅玕倚易折翠羽紛難拾幽人最惆悵攬衣空佇立綠竹自便娟復值微風集暝已颯將寒秋聲輟還急蕉石亭芳草如翠握亭亭冒巖阿丹梯承晚映碧澗寫秋柯日入烟霧滿夜来風雨多預愁霜霰至為樂恐蹉跎觀畊臺東菑及農節髙臺試登陟町疃路逶迤陂塘水紆直歴歴原上畊依依隴間食雖無耒耜勞端居增嘆息薔薇洞洞口薔薇樹春来冉冉紅停舟綠水曲攜酒綵雲中穿林入􅆼窕牽葉望玲瓏祇謂躋攀盡去去轉難窮荷池臨池放蘭枻處處花相屬霞水互參差香風時斷續上看繡羽亂下睇文魚逐日暮未歸来聊就舟中宿栢屏何時别陵上移根来後庭柔條寫峰勢總葉學山形白雪不改綠綵雲相對青無勞六嶺側凌虛摶翠屏留月峰隂崖抱嵌竇側景如明月玉氣夜逾妍珠光朝未滅雲歸暈正滿霧上輪初缺西園讌客處臨玩情無輟通泠橋隔崦聞秋籟行尋窺碧山雨過沙岸曲泉吐石渠間雲深乍淅瀝風起更潺湲縁源興無極日夕未能還花源曲水寫珍池盈盈送紅萼朝来湖上雨吹此繁花落旖旎縈魚藻徘徊逗蘭薄含淒眺芳渚坐欲春銷鑠釣磯釣磯上斗折偃卧俯石瀨層雲来目眥清波鑒衣帶捫葛聊為綸持荷還作蓋髙情豈羡魚逍遙在塵外譙郡薛蕙君采思樂堂前饒景色仙郎行處即清虛怪来觸石飜成恨信有當年徐仲車思樂堂竒石何年出水濵峰巒結構儼如真尋常瞻拜非無意為憶當時逺致人石假山積水秋来一鏡平憑欄倒影太分明祇因宦轍多南北添得霜華兩􅁂生水鑑樓坐上吟詩増逸思簷前命酒動髙情知君對此意何限不獨蕭蕭十畝聲風竹軒怪石成峰堪閣筆青蕉似紙更宜書幽人習靜心無累長日臨池興有餘蕉石亭湖上青山山外田仙家種玉自年年登臺試課開雲力却愛烏犍不受鞭觀畊臺薔薇洞口花如織洞裏神仙天上還人世於今仰安石莫教常自卧東山薔薇洞荷花能紅更能白荷葉如蓋復如錢郎君欲聽採蓮曲試向西池夕照邊荷池山林種柏自幽事仙家結屏猶可憐何時攜酒共深酌應得飛花到綺筵柏屏道州月巖天下竒君家月竇未應私他年共飲秋峰下乞與清光照酒巵留月峰天台石梁跨烟起雁蕩飛泉遶澗鳴雨餘策杖獨行處試聽泠泠琴瑟聲通泠橋石磵泠泠流碧水桃花片片泛青春漁郎莫信放舟入此地原非世上人花源山脚磯頭日日来閒情真對水雲開持竿不是求魚者寄語沙鷗莫浪猜釣磯白沙景𤾉七十二峰浮五湖崦西山水賽蓬壺輞川金石聞人説薜荔園中即畫圖薜荔園髙棟層軒勢若飛夜臺溟漠掩泉扉昔人行樂今人憶祇有空梁舊燕歸思樂堂山生花石石成山幻出峰巒几牖間不是五丁神斧鑿何縁三島便齊扳石假山空明池水映朱樓秦女吹簫在上頭夜半素娥開寳匣一輪明月掛中秋水鑑樓仙家軒館極清幽疎竹千竿翠欲流自有冷風驅鬱暑翻疑長夏似深秋風竹軒太湖花石玉玲瓏更愛芭蕉弄晚風生久一亭雲影亂緑隂浮動酒盃中蕉石亭緑墅風和暑氣清東菑農作喜新晴食力豈慙徐孺子登臺親課隴頭畊觀畊臺密葉繁枝結洞房萬紅千紫鬭春妝莫教一日無歌舞錦繡叢中醉㡬場薔薇洞草閣隂隂俯碧紗清池緑水出蓮花風欹翠蓋翻珠露日射紅衣暈綵霞荷池編茅為户栢為屏黛色蒼蒼四序清蔣徑不除無客到閉門終日草𤣥經栢屏峰形如月影參差霧縠冰輪隠半規不用班姬將扇比祇疑張尹畫蛾眉留月峰泠泠山磵響松風絶壑雲深一徑通此去赤城知不逺石梁天上掛飛虹通泠橋春盡清溪泛落花中湖别自有烟霞武陵未必如西崦鷄犬桑麻邑萬家花源片石湖心作釣磯投竿終日坐忘歸得魚沽酒磯頭醉卧看青天白鷺飛釣磯後學袁袠謹書於逍遙遊袁氏永之珊瑚網卷四十
