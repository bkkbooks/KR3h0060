body:
  text: 珊瑚網卷四十明汪砢玉撰名畫題跋十六唐伯虎丹陽景圖後題隂雨浹旬㕑烟不繼滌硯吮筆蕭條若僧因題絶句八首奉寄孫思和十朝風雨苦昏迷八口妻孥併告饑信是老天真戲我無人来買扇頭詩青山白髪老癡頑筆硯生涯苦食艱湖上水田人不要誰来買我畫中山荒村風雨雜鳴雞轑釡朝㕑愧老妻謀寫一枝新竹賣市中笋價賤如泥書畫詩文總不工偶然生計寓其中肯嫌斗粟囊錢少也濟先生一日窮儒生作計太癡呆業在毛錐與硯臺問字昔人皆載酒寫詩亦望買魚来抱膝騰騰一卷書衣無重褚食無魚旁人笑我謀生拙拙在謀生樂有餘白板門扉紅槿籬比鄰鵝鴨對妻兒天然興趣難摹寫三日無烟不覺饑領解皇都第一名猖披歸卧舊茒衡立錐莫笑無餘地萬里江山筆下生正德戊寅四月中旬呉郡唐寅作於七峰精舍唐子畏垂虹别意垂虹不是灞陵橋送客能来路亦遙西望太湖山閣日東連滄海地通潮酒波汩汩翻荷葉别思茫茫在栁條更欵傳杯遲判袂月明倚柱喚吹簫伯虎江深草閣圖贈次明呉君唐子㺯造化發語鬼欲泣遊戲山水圖草樹元氣濕多能我亦忌造物還復惜願子斂光怪以俟嵗月積沈周子且不試藝西狩因麟泣密雲而無雨稿物何由濕空山来者稀白日成嘆惜唐君非畫師英華發於積吕㦂次韵子畏焦墨畫江干石壁作二松虬結根梢不可辨竒怪之筆自然動人松下一茅亭有幽人凭欄清坐子畏題署在石壁下夗上千秋漁長識夢筠圖聞説君家新闢庭參差滿種粉梢青炎時靜坐不覺暑畫日仰眠常見星一㸃虛心通曉夢百年手澤與忘形秋来四屋聲如雨悵掩薰爐獨自聽呉趨唐寅松閣幽花圖松間草閣倚巖開巖下幽花遶路臺誰叩柴扉驚鶴夢麻姑遣送酒肴来唐寅巖石髙士圖伯虎畫枝山題唐時巾服漢時冠日用於人止一般惟我識公心未老滿胷才思蟄龍蟠允明又巖中髙士圖伯虎畫元吉題襟屨深林下悠然樂事多細風披夏葛斜日閣烟蘿埜篠醒殘酒山禽和短歌還愁濟時出謝跡亦巖阿唐子畏山水文徵仲題溪亭面虛曠乃在山之陽俯瞰玉深深仰視巖蒼蒼幽人抱竒僻卜築鄰此方愜我清絶想謝彼馳驅場爰有同心人杖䇿来浮梁相尋無俗侣幽事與誰量子畏曠古風流超塵妙墨圖繪傳於人間真世寶也適叔貽攜示因題以歸之丁未徵明􅆏橋西畔唐居士浪迹圖成尺楮間莫訝晴牕頻展看分明筆下見荆關衡山又題子畏山水唐伯虎自題山水四軸雲樹含暗日烟嵐閣晚風髙人將木屐送目大江東山髙鳥不巢水清龍不住至察則無徒故寫模糊樹灌木倚道左流嘶鳴沙中欲涉未摳衣且乗君子風金風秋立至涼生雪􅁂虛梧桐一葉落打著手中書又伯虎自題諸畫俱七言絶巖居蕭散未全迂掌上清樽膝上書滿目繁花堪自老笑他金紫釡中魚金谷中分此水長問津從不到漁郎山添爽氣砭詩骨獨坐檉隂送夕陽亂山雜霧曉牕巃遙見懸魚是梵宫倚杖漫行行復坐一聲啄木在林中秋色蒼涼懷抱開古林泉石總詩材平頭鞋子方春盛青石橋邊散步来髙泉落澗玉淙淙怪石蟠旋似卧龍詩卷滿肩芝滿地吾能此處看吾蹤雲斂溪山秀色開滿溪新水綠於苔偶然二叟臨磯坐無數青山倒影来石磯平淨蒼苔合髙木空添接葉深二叟清談無俗事亦因與許二同心滿地松隂六月涼採芹歸去擔頭香相逢夕照誰家子倚樹喃喃話正長席地松隂樂有餘瓦盆盛酒炙枯魚心中洗盡閒名利一𣲖泉聲應讀書獨立茒門賴拄笻􅁂絲涼拂豆花風曙鴉無數盤旋處緑樹枝頭一線紅曉起騎驢八月下藍關借宿南州白塔灣壁上殘燈千里夢月中飛葉四更山唐寅贈感慈鄒先生山閣臨溪晚更佳繞崖秋樹集昏鴉何時再借西山榻相對寒燈細品茶紅樹青山飛亂雲白茅簷底帶斜曛此中大有逍遙處難説與君畫與君與所刻異白板黄扉隠者居家常聊辦一餐魚平橋落葉迷行徑時有鄰翁来借書背郭茅簷終日晴果林霜後葉無聲山僧不管門前路任爾行人終日行野寺空林落照低微鐘烟樹使人迷逢僧只道山門近不覺穿林又過溪百尺杉松帖地青布衣衲衲髮星星空山寂寞人聲絶狼虎中間讀道經重重樓閣凍雲連烟樹蒼茫帶瀑泉一夜空山千丈雪草𤣥人在玉壺天為髙太巖所藏雪霽天涯更泠嚴杜茒柴熟舊青帘瓦罏圍坐松明火短句時時信口占柴門雪霽榿林彊藤枕新開煑酒嘗正是騷人安穏處一編文字一爐香青雲臺殿泉聲隔黄葉關河雁影来别有詩人好懷抱西風雙􅁂一登臺蘇門後生唐寅畫呈何老大人先生濺沫飛流白練長亂山雲鎖樹千章忘機盡日惟猿隺應笑紅塵市裏忙山勢穹窿野色分飛泉滴處靜中聞蕭條風景誰為侣祇有蒼寮共白雲吴麒題前伯虎畫與西州别㡬三十年偶爾見過因書鄙作并圖請教殊無佳興草草見意而已唐寅畫題醉舞狂歌五十年見刻集不錄唐伯虎雖學李晞古亦深於李伯時故人物舟車樓觀無所不工此其合作也其昌版築求賢圖青緑堂畫聖主求賢按畫圖頓將天秩􅂌胥徒精神不是能𤣥㑹顔色安知非濫竿唐寅歙友黄越石欲余仇實父南極呈祥圖因此以畫相易云伯虎為某大老作尚有三軸余時亦欲其馬逺山水即出向得越石畫為伯虎金閶送别圖易之伯虎題云金閶楊栁麯塵絲又送吾兄上路歧若到長安見知己為言貧甚轉工詩書畫詩足稱三絶至今念之不已玉水記孟蜀宫妓圖蓮花冠子道人衣日侍君王宴紫微花栁不知人已去年年鬭緑與爭緋蜀後主每於宫中命宫妓衣道衣冠蓮花冠日尋花栁以侍酣宴蜀之謠巴已溢耳矣而主君猶挹注之竟至濫觴俾後想搖頭之令無不扼腕唐寅芙蓉城裏試仙衣詩酒留連致失微花栁豈關亡國恨降王原是愛朝緋余舞象時見家嚴凝霞閣中所懸唐六如畫乃白描宫人詩句即蓮花冠子也舉贈岐黄談經巖後於留都得是幅閲題恍然因步原韻未㡬復得六如弄玉圖其人物衣裝相似可匹焉玉記風雪歸窑圖妻兒且息怒風雪任漫漫幸有春風手能温天下寒此元貢理官詩也偶閱李以政風雪破窑圖遂為書此三橋文彭右風雪歸窑圖子畏先生筆也先生此卷全法宋李唐行筆如屈鐵絲而一種寒凍之狀宛在目前真頴端有化工者也豈惟冠絶一時自當不朽千古耳後學文嘉題倦繡圖夜合花開香滿庭玉人停繡自含情百花繡盡皆鮮巧惟有鴛鴦繡不成正德八年夏五月唐寅畫并題鞦韆圖梳成鬆髻懶騰騰打罷鞦韆倦不勝憑仗東風莫停泊少年心性自無憑唐寅王元美題唐六如花陣六竒調玉燭新余卷有六如自題詞吴宫新宴起喚兩隊嬌羞粉營紅壘阿平輕掉蘇家舌旋把靈犀參透兵符半紙偷送得君王春睡雲夢杳小網流蘇淮隂霎時拈繫滎陽斷送重瞳更七日平城總虧佳麗貂圍翠繞胡兒夣還滯漢家羅綺丹青妙理描寫盡六畨隂計雲臺後須與封侯温柔國裏掃愁將軍都督華胥以西諸軍事領長樂少府醉鄉侯食糟丘五百户天􅌢居士書唐子畏題堂上雙白頭圖海棠枝上白頭公頭映花枝轉覺紅恰似老夫髙興在醉欹紗帽領春風征鴻圖白露蒹葭八月秋征鴻又作稻粱謀一羣嘹嚦相呼處多在萍荒淺水洲唐寅桃花過雨圖桃花雨過水連天古樹髙巖亂玉泉獨立溪頭窮物理不知斜日落平川唐寅落花圖咏今朝春比昨朝春南阮畨成北阮貧借問牧童應没酒試嘗梅子又生仁六如偈送錢塘妾八斗才逢洛水神多少好花多落盡不曽遇著賞花人夕陽芳草笛悠悠春盡驚看又轉頭淅瀝風光搖草樹驂驔時節逐川留臨堦思數脂千片遶樹空煩繡半勾九十韶華梭脱手多情又作一番愁忍把殘紅掃作堆紛紛雨裏毁垣頽蛤蜊上市驚新味鶗鴂催人再洗盃肯唱驪歌送春去悔教羯鼔徹明吹爛開賺我平添老知到年来可爛開能賦相如己倦遊傷春杜甫不禁愁頭扶殘酒方中醉面對飛花怕倚樓萬片風飄難割捨五更人起可能留妍媸雙脚撩天去千古茫茫土十丘芒鞋布襪罷春遊粉蝶黄蜂各自愁池面風迴荷簇聚陌頭人散踘場休膠粘日月無長策酒對荼􅐘有近憂蘇小堤頭試翹首碧雲暮合隔紅樓溪水東流日轉西杏花零落草萋迷山翁既醉依然醒野鳥如歌復似啼六代寢陵埋國媛五陵車馬鬬家姬鄰東謝却看花伴陌上無心手共攜春歸不得駐須臾花落寧知剰有無新草漫添天際緑衰顔又改鏡中朱暎門未遇偷書掾墮溷翻成逐臭夫無限傷心多少淚朝来枕上眼應枯蟄燕還巢未定時村翁散社醉扶兒紛紛花事成無賴㸃㸃春心怨欲私雙臉胭脂開北地五更風雨𦵏西施匡牀自拂眠清晝一縷茶烟颺􅁂絲春盡愁中與病中花枝遭雨又遭風鬢邊舊白增新白樹底深紅換淺紅漏刻已隨香篆了錢囊甘為酒盃空向来行樂城東路青草池塘亂活東崔徽自寫鏡中真洛水誰傳賦裏神節序推移比彈指鉛華狼藉又辭春紅顔仙脱三生骨紫陌香消一丈塵繞樹百回心語口明年勾管是何人正德庚辰仲秋吉日偶錄落花詩并畫於上吳郡唐寅唐六如自題寫生諸幅故事開元重牡丹沈香亭北冷泉南如今顔色還依舊風雨江東月閏三吴郡唐寅筆牡丹北堂草樹發新枝堂上莱衣獻壽巵願祝一花添一嵗年年長慶賞花時萱花芳園秋色似春時紅紫芳菲映緑池朱露未乾啼絡緯曉風初拂颺蛛絲秋圃雜花錦里先生日晏眠客来髙論坐無氊酒資盡在東籬下散貯黄金萬斛錢畫菊故園三徑吐幽叢一夜𤣥霜墮碧空多少天涯未歸客借人籬落看秋風墨菊緑雲架上草龍蟠馬乳含秋露不乾昨日文園愁肺渇㡬丸嚼破蔗漿寒墨葡萄水養靈苗石養根根苗都在小池盆青青不老真仙草别有陽春雨露恩盆石菖蒲早起虛庭賦考槃稻田新納十分寛呼童摘取菖蒲葉驗到秋来白露團陳克養畫剪菖蒲圖在光懋處已及二十餘年矣正德己巳與克養之髙徒陳良器展觀之存没升沈不勝慨嘆重為書此而不知再得後二十年為何如也九月廿日蘇門唐寅鳩雨初晴苦竹生瀟江明月動秋聲他年鍊骨輕如葉擬踏風梢散袖行竹枝嵗寒有貞姿孤竹勁而直虛心足以容堅節不撓物可比君子人窮年交不易􅁮􅁮桃李花旦暮改顔色陳白陽烟巒疊嶂圖人恒謂畫曰丹青必將設色而後為専門而米氏父子戲㺯水墨遂垂名後世石田先生嘗作水墨花枝亦云當求我於形骸之外畫亦不可例論歟道復漫書予嘗見米南宫父子雲山特臻𤣥妙而倣之者如元之方壺國初時錢塘戴進雖各底極方特具體而微戴聊窺其一班耳未之擬也如我白陽陳先生用筆瀟洒覽如汗漫無統而波瀾有緒識者云縱横二米之間者此卷也予以為然不知鑒者亦與之否江夏黄學曾余有白陽大幅石塘圖設色工緻全學趙松雪不獨縱横二米間也白醉居士汪砢玉識陳道復自題山水幅何處尋髙隠雲山入望賒水邊林闕裏茒屋是誰家烟迷山下寺雲動寺中山一片朦朧景相看未擬還共步綠橋畔放懷同和吟誰知白頭叟来結野雲心雨過小猶滴嵐光翠不分繁烟起深樹縹緲接雲歸倣大癡筆淺色山水陳淳欵樹色搖空翠泉聲落寒玉朅来肆幽討中夜自秉燭又著色山水又水墨幅綠樹藏烟靄靄青山過雨娟娟一幅蒲帆髙掛十里荷花徑穿幽人去泛五湖船湖上青山隔暮烟紅樹白蘋秋滿目詩家生意迥無邊獨坐船頭理釣絲水清無處覔鼇魚不如歸向茒亭裏下個工夫飽讀書老圃秋容圖淺色大幅擘窠書欵汪氏鑒藏嘉靖乙酉春仲望後恒齋以此帋索圖談及石田先生嘗作老圃秋容蓋欲予髣髴之也圖畢漫記白陽山人陳淳王延陵題白陽山水出門大江横銀濤數千頃仙子御輕飈環珮搖虛影中宵月無光天地冰壺靜輕盈何所之飛夢