body:
  text: 珊瑚網卷四十四明汪砢玉撰名畫題跋二十宋徽廟題院畫册瑶臺無信託青鸞一寸芳心思萬端莫向東風倚修竹翠衫經得幾多寒右修竹士女圖消受南薰一味涼藕絲新織舞裙長臨池試展淩波步只恐紅蓮妬艷粧右荷花士女圖羅襪生香踏軟沙叉橫玉燕鬢鬆鴉春心正是芭蕉葉羞見宜男並蒂花右芭蕉士女圖軟繡屏風小象牀細風亭館玉肌涼含情學寫鴛鴦字墨洗蕉花露水香右滌硯士女圖濃黛消香淡兩蛾花陰試步學凌波専房自得傾城色不怕涼風到扇羅右團扇士女圖思陵題馬逺畫册桃李無言春告歸落紅如海亂鶯啼西村渡口斜陽裏渺渺煙波緑拍堤間來洞口訪劉君緩步輕抬玉線裙細白桃花擲流水更無言語倚彤雲高山流水意無窮三尺雲絃膝上桐默默此時誰會得坐憑江閣看飛鴻月午江空桂花落華陽道士雲衣薄石壇香散步虛聲杉露清泠滴棲鶴不禱自安緣夀骨人間難得是清名淺斟仙酒紅生頰永保長生道自成是畫竹下有冠者道士持酒杯侍以二童一鶴煙泉之間賜王都提舉為夀上有辛巳長印下有御書之璽唐寅識思陵題畫册花草四幀香蜜裁葩分外工疏枝幾點綴雛蜂嬌黃染就宫粧樣香暖尤宜愛日烘右蠟梅寒花婀娜露凝香風葉搖秋鳳尾涼夢入畫堂銀燭下翠屏深處隱紅粧右修竹芙蓉墨花垂頴千古尚漓漓翠羽風前葉秋聲雨一枝詩題春粉節繃脫玉嬰兒湘浦人何在空聞鳳管吹右墨竹名出本南山來依瓊苑間陳主歌前樹楊妃醉後顔為嫌脂太赤故著粉微斑共言攀折處已獲寶枝還右雪中山茶思陵題趙伯駒團扇月宫圖册清涼境界火雲藏但覺仙家日更長千嵗夀松誰宴坐星君午夜吐光芒賜王都提舉又題李唐畫册月團初碾瀹花瓷啜罷呼兒課楚辭風定小軒無落葉春蟲相對吐秋絲又題馬麟畫册已過穀雨十六日猶見牡丹開淺紅曽不爭先及開早能陪芍藥倒薰風趙松雪山水二册子昂二字欵陸瑾有山陰高會圖吳興此小景是臨陸瑾者吾松朱象玄司成家物其昌觀錢玉潭仇書圖册兩兩挾䇿遊康衢聚戲不異同隊魚忽然兒態起爭競捐棄篋笥仇詩書吳興錢選舜舉畫并題吳仲圭山水册古藤陰陰抱寒玉時向晴窗伴吾獨青青不改四時容絶勝凌霄倚凡木梅花道人戲作并題又漁父圖册三詩不在前卷內紅葉村西夕照餘黃蘆灘畔月痕初輕撥棹且歸與挂起漁竿不釣魚梅老戲墨點點青山照水光飛飛寒鴈背人忙衝小浦轉橫塘蘆花兩岸一朝霜醉倚漁舟獨釣謡等間入海即乘潮從浪擺任風飄束手懷中放却橈梅花道人畫師巨然多以船子和尚川撥棹詩題之吳門王文恪家藏其漁樂圖入妙品本與盛子昭比門而居四方以金帛求子昭畫者甚衆而仲圭之門閴然妻子頗笑之仲圭曰二十年後不復爾果如其言盛雖工實有筆墨畦徑非若仲圭之蒼蒼莽莽有林下風氣所謂氣韻非耶玄宰題盛懋溪山曳杖圖册二幀積水潛通渭連村不近城青雲浮野濶春氣與人清鶯響出幽谷琴歌非逺征客心在三益山水向人鳴雲莊吳炳子昭停舟觀鴈圖秋色淡江臯晴林風木凋逺村雲際擁孤島沼中搖鴈影雙翻水漁歌半倚潮停橈正回首霜信晚迢迢雲莊吳炳曹真素疏林寒色册嘉定乙丑十月雲西曹知白晴窗偶閲雲西畫今昔相殊感慨多桃李上陽春寂寞何如古木老巗阿子輿鐵石根柯螭虬資質風雷忽來變化莫測志古齋雲西山水師馮覲亦似郭河陽家資富盛而文采有餘嘗築臺以銀塗之名瑶臺月夜攜客痛飲倪王諸名士時為下榻以書畫相賞會焉雲林春山過板册欵云延陵倪瓚壬子春狂風二月獨憑闌青海微茫煙霧間酒伴提魚來就煮騎曺問馬只看山汀花岸栁渾無賴飛鳥孤雲相與還對此持杯竟須飲也知春物易闌珊自題倪迂今已矣真迹在人間無限天然趣白雲滿逺山楊士竒題凝霞閣舊藏畫册愛荆居士鑒定野水參差落漲痕疏林欹倒出霜根扁舟一棹歸何處家在江南黃葉村東坡書李世南畫襄陽松瀋未曽乾十里瀟湘五尺寬樵徑不禁苔露滑漁蓑長帶水雲寒澄澄僧眼連天碧淡淡蛾眉隔霧看恐為醉翁當日寫平山堂上雨中觀希哲題小米雲山雨後菰蒲翠色分水邊舒鴈已離羣杜陵對酒吟詩愛更憶山陰贈右軍靜學題崔白鵝石根夭矯出寒梢明月空山舞翠蛟散作江湖墨風雨曽隨海浪去南交仲賓曽使交趾故云大德二年春巴西鄧文原題於寓意齋李衎墨竹帝子不沉湘亭亭絶世粧曉煙橫薄袂秋瀨韻明璫洛浦應求友姚家合讓王殷勤歸水部雅意在分香錢選右題自畫水仙花後有枝山二絶罷散天花下紫壇露橫秋袂水鳴環凌波欲接君王去又恐繁霜不耐寒八斗才中畫洛神翠羅輕揚襪尖塵霅溪老子真能事更比陳王寫得親允明勇決端為士論怡青松黃菊是歸時心中惟有方寸赤巾下可無雙髻椎句曲外史題吳興公歸來圖木葉蕭蕭半欲空竹竿裊裊不成叢絶憐意匠經營處都在風煙慘淡中王紱題黃鶴不得意來棲珠樹中仙嶠隱光輝萬里空天風東海徐憲題前畫聞有風輪持世界可無筆力走山川巒容盡作飛來勢丈室居然擲大千吳鎮蒼洲老樹碧山前秋水茫茫一釣船昔日畫師非俗士東災莊子在藍田雲東逸史題有竹之地人不俗而况軒窗對竹開誰謂墨奴能倒景一枝獨上紙屏來梅道人自題淇園一枝春雨足渭川千畝秋風高先生青眼對君子撚落吟鬚如鳳毛允明題淡墨淋漓粉節香清風倣佛見瀟湘一般紅杏沾恩澤别有濃陰蓋草堂徴仲和詹仲和題梅道人竹册湖州逸法共東坡友石於今不可過一假天機真假際詹公妙手即詹何枝山和詹仲和題梅道人竹册樹欲化龍先帶雨泉將歸海已如濤直恐化人移幻境莫誇墨瀋與霜毫祝允明題吳仲圭畫册湖州昔在陵州日日日逢人寫竹枝一段枯梢三作折分明雪後上窗時顧阿瑛題竹册林木森森枝葉交小亭寂寂似書巢手中一卷皇易讀到先天第幾爻京兆杜瓊題陸天遊畫册石徑過雲棲鶴冷松堂留客煮茶香瓚題自畫誰劚巖巖華嶽根幽竒又見竹成文急呼米老拜石文更喚坡翁友墨君海漁題王叔明竹石西門春如東門春九山鳳凰刺眼黃娘人家花似錦白衣參府酒如銀亷夫題畫花下拋書枕石眠起來間嗽竹間泉紙窗石鼎灰猶暖殘燼時飄一縷煙元僧覺隱題自畫野市騎驢久涼風席帽人逍遙甘避地不肯問通津艷愛江南楊補之每將尺素寫氷姿暗香疏影渾如舊遮莫髙樓玉笛吹曲江錢惟善題元人畫梅前五絶另題山水老樹重開雪裏花倚風臨水見橫斜馬蹄踏遍西湖路誰識林逋處士家陋齋題前册江閣披風受暑降蓮歌隔水送新腔小姬且莫遮團扇老我懸眸正倚窗海西逸叟費昌題元人畫縹眇霞衣玉女裁珮搖華月下仙臺庭聞自是陽和早嵗晚碧桃千樹開元人題仙女圖山中老樹秋還青山下漁舟泊淺汀一笛月明人不識自家吹與自家聽元人題漁笛圖竹樹色依稀蒼蒼擁翠微枝頭應帶潤疑是泣湘妃元人自題畫古木竹石古木昂藏怪石傍湘筠幾箇色蒼蒼嵗寒共守氷霜操絶勝春花鬬艷陽尋樂題前册雲根磊砢紫苔封老樹蒼蒼倚碧空相友此君同嵗晚不隨凡卉閙春風麟齋鳯凰刷雨壓晴峯過雨湘江逈不同一日風雲從地起化龍飛在九霄宫翰林倪謙題元人畫竹月白湘江寒風生悵幽獨何處結同心情人在空谷季迪髙啓題元人寫蘭三吳吹殘集有儀霓裳縹眇玉參差月明花下如相見好似羅浮夢裏時巢雲子題團扇梅月美人半生無事傍煙霞策杖來追隱者家百舌鳥鳴山逺近數聲人語路橫斜鬱蔥佳氣春長曉靉靆禎雲錦又華盡日憑闌天外看水光山色艷仙槎豫章巢雲子題元人山水册可人山外更加山望逺朝朝憑玉闌樓外垂楊條又緑東風渾不放春間崆洞太史題團扇山水栁隂樓畔好青山拂拂南董入畫闌一點紅塵飛不到清涼世界玉人間步蟾子題前册樓臺突兀柳隂中樓外青山圖畫同此景不知何處是憑闌我欲納涼風艮齋題前册先君凝霞閣有畫屏二架面面俱宋元人筆一為斗方一為團扇各百葉如列廬山九疊屏又何有紀亮雲母武秋琉璃也哉歷四十餘年屏畫漸黴脫至天啓丁卯余轉運山左聞艱旋里於讀禮之暇付湯子裝潢成册一曰屏山餘曲原厥所自取唐句屏山六曲郎歸夜也畫即前抄欵識約半一曰藝圃晶英內多舊人臨本有題語者僅崆洞太史巢雲子數板餘選入英華三昧兩册為小李金碧四景江貫道諸幅未幾病餘需參適徽友何祕書攜官㨂數斤來正欲余屏山册遂以相易逮己巳秋納言姚公伯仲過余西垞閲畫品石欲得余白玉秋葵杯為陸子剛所碾而未果時秋海棠盈庭敷艷徘徊玩賞不已數年後岱芝公乃倩錢君偕駱友天遊見訪言及藝圃册因取質於姚司冦以宿所寓目也彚珊瑚網至此追思當年一屏圖畫中援琴動操有衆山皆響之致今何如耶蕭子雲飛白十二牒雖尚掩映五松然或不能韞櫝至徒四壁立猶百城自擁作書淫能免人揶揄哉砢玉記宋元名圖凡二十餘幅李龍眠畫臧孫之母誨子子皮之姊諌弟二則真迹米襄陽倣董源筆閻次平小景髙宗題云西來白水滿南池走馬池邊日暮時橋底荷花無限思清香乞與路人知又題繞池曳杖攜雙鶴架水澆花課小奴又汴榮題東風雙鶴啄蒼苔杖履從客一徑開分付澆花莫多水韓郎昨日染根來觀汴句非閻將仕筆明矣殆石城韓祐耶祐為紹興畫院祇候尤善寫生染色可並石橋王也砢玉馬和之棄瓢圖陶九成題真迹劉松年耕織圖董玄宰題學丘文播真迹髙房山畫李薊丘題玄宰云房山蒙古人其子避居吾松趙子昂畫馬尚左生題云王孫曽騎天廄驎每憶龍駒便寫真曺霸祇今那復得丹青剝落淚沾巾餘為徐賁諸人所題又吳興山水一幅陳趙合作文敏公題云陳仲美戲作此近世畫人皆不及也南陽仇逺跋云大德五年辛丑秋仲仲美訪昂學士於餘英松雪齋霜晴溪碧作此如活使崔艾復生當讓出一頭修飾潤色子昂有焉昔人有以千金換能言鴨者此雖不能言亦非千金而輕與是年除夕題於躬行齋又詩云良工苦思可心降底事文禽不解雙欲採芳華波浪濶芙蓉朵朵隔秋江是幅水鳬小景殊佳梅花老人漁舫圖黃大癡溪山髙逸圗濶幅不甚真曺真素樂陵溪山圖梧溪長老題云世治多福人時危多貴人貴人乃鬼朴福人真天民緬惟曺雲西生死太平辰髙秋下孤鶴想見美丰神菀菀露櫸間幽幽水石濵槳打甫里船角墊林宗巾往訪趙松雪滿載九峯春酒名斯圖作何年援筆為慨呻池廢餘野鴇井泄搖青薲此幅係真迹貫酸齋松圖未確元元儀倣李營丘筆對板人物極似梁楷盛叔章山水倪迂寫雲石古槎真迹方方壺作蒙天荒落又作玄黃絪緼松雨老人題不見佳張觀山水欵題樹身蓋國初人也崇禎四年九月十六日徽友王規仁攜册共唐拓臨江帖來賞菊夜話因留册逾日飽觀砢玉記畫苑大觀凡二十册大幅高頭或橫披可作挂軸五代關同溪山煙樹北宋人山水六橫幅無欵趙昌鸜鵒圖南宋李唐採薇圖馬逺松岸高逸元錢舜舉倣趙昌柏隼王叔明秋暉間眺張伯雨倣李龍眠四賢圖黃子久雲壑幽居至正四年春日黃公望送伯雨張鍊師歸句曲山張肯題云玄洲别駕鬱巃嵸滿谷間雲護萬松癡老留圖瓊笈祕隱居懸誥玉函封方方壺倣僧巨然山水雨窗談易方壺道人作於龍虎山東方丈也介山所寫一行在山內二行在山外吳仲圭在竹圖至正二年秋日張兄來儀訪我醉里因寫在竹圖以贈之梅花道人倪元鎮樂圃林居甲寅六月十日倪瓚徐幼文滸墅草堂圖西蜀徐賁作倣董北苑陳琳倣夏圭竹岸漁翁琳字仲美山水人物花鳥無不臻妙多資益於趙魏公又雲林畫六册唐六如題後云白髮蕭蕭迂懶生每將殘墨記經行名家孫子傳留得半紙千金不敢輕韓君東齋頭得世傳倪懶小册因為賦之時正德壬申中秋晉昌唐寅書前黃規仁持大册來只十一幅後越石又持是册來則多比宋人六幅倪雲林六幅及趙昌馬逺二板也余欲易其半垂成而不果玉水記勝國十二名家凡二十册堂庚申春仲煙溪重裝神遊目賞九十七翁殳忠八分書引首第一趙文敏大幅寫高松一雙小樹二幽人䇿杖過橋逺水抹遙山一帶淡墨蕭疏而腴澤子昂得意筆也自題云山重水復路縈回杖䇿危橋暝色開定向月下改作越中尋賀老酒船何事未歸來第二管夫人長明菴圖菴居曠野垣內有屋三層橫廊通門徑豎竿懸一燈所謂長明也傍有石蓮臺作施鳥食者垣外二長松下蔭又一樹參之門外坡臨水際水間有坡樹墨氣高古無兒女子態夫人欵云大德九年冬十一月草又五日仲姬管道升作有比邱尼妙湛詩云松樹陰陰落翠巗一燈千古破幽關也知諸法皆如幻甘老煙霞水石間小行書題其上此尼想即菴畫中人也第三趙仲穆著色山水欵云趙雍為如泰作一朱衣人坐鷁首艙內列圖書茶具幃間懸葫蘆童子踞梢烹茗舟橫丹楓殘緑之下水草叢叢逺山疊疊坡作濃翠色絶無寒酸氣第四亦仲穆潑墨成五樹森森臨澗又是一格第五黃鶴山樵為貞素寫句閉户著書多嵗月種松皆作老龍鱗淋漓酣暢足盡叔明逸致第六為雲林筆自題云曠逺蒼蒼天氣清空山人靜晝冥冥長風忽度楓林杪時送秋聲到野亭壬子七月十又六日寫於楓林亭中東海農倪瓚畫間層山四摺中露曠地外繞七樹向水纎淨淡玄得未曾有時余展玩此幅不已越石云可拆易也余瞿然曰若是則風雅罪人第七一峯道人筆重山疊嶂間溪橋斷續屋樹團簇真欲界之仙都也第八黃子久著色山水較前殊空曠征帆片片映帶漁舟大有氣韻第九是子久淺色山水較前尤空曠青林紅樹點綴其間山上一徑有浮圖矗起宛然句曲道中光景欵云大癡學人第十是子久雪景山前汀樹極蕭瑟閲之光搖銀海第十一亦子久設色山水絶似高房山山中屋字相向流泉山凹有蘭若作霞氣欵云大癡辛丑秋七月寫為子茂清玩第十二吳仲圭林巒古剎杖藜者度石梁向虛亭墨氣淋漓滿意欵至正元年春三月梅道人戲墨第十三亦仲圭寫岸竹縱橫如風樹竹下泊舟坐一人大是荒率草莽自題云涓涓多近水拂拂欲宜山吁嗟此君子何地不容間梅道人戲墨也第十四曹知白著色畫高山藏梵宇下臨松巘山凹內石路層層外為溪橋一人䇿馬而來有奚奴相隨欵云雲西老人作於常清靜齋第十五為丹丘柯九思山水疏林小寺殊簡曠欵云甲申人日過白雲窗觀雪坐中可如道人徴畫遂試繡兒墨為之第十六亦敬仲作秋林曉色絶壁半入天際下為重林林內一亭曠如也第十七為扶風馬文璧倣馬和之新栁濯濯可愛紅衣人坐釣船水邊嫩緑初放宛然早春景色第十八亦文璧著色山水樓臺隱現岡麓相吞泊二賈舶小欵落嶺側張憲題江閣臨汀夜泊船波光淡蕩逺生煙蕭蕭落木砧聲裏翹首天涯月正圓第十九方上清倣小米雲山欵云方方壺為華林先生寫題云石路絶經過山雲自來去欲共麋鹿羣當在幽深處第二十為武塘盛懋著色山水大松二株偃蓋石徑松下一曳杖人童子迎其前舒手似報幽事者坡外水紋縈回境界絶可想後有總跋余丱角時遂好繪事不減梁簡文詩僻嘗從先君過順甫錢先生家縱觀名畫先生乃謂余曰收藏圖畫宋人不如元人之文采絹本不如紙本之綿逺卷軸不如册頁之便覽今好事者所收册葉皆絹本即馬夏劉李之輩難脫畫院俗氣余耽之者勝國名家恨不多得此册余昔年在金陵時始得黃王者五幅後遇諸名公真迹善價收之迄今三十年來彚成百幅內有絹素神脫者標出名次者標出人物無邱壑者標出翎毛竹石標出有俗態者標出所擇者凡趙松雪以下十二家總二十幅為一册可為勝國羣賢之墨寶也趙松雪近宋撮諸家之妙運於毫端有李營丘遺意筆法精微駢麗圓融管仲姬長明菴圖發景外之趣可謂運斤成風其子仲穆二紙落筆肖乃翁誠一門三絶千古偉人黃子久四幅皆倣董源毫鋒頴脫燦爛逼人絶代筆也後一幅古氣蒼然令人可愛王叔明著書圖大似趙氏之遺風無一毫塵相倪元鎮楓野亭疏林曠逺清氣若秋水之神吳仲圭二紙墨暈神竒敻越繢表乃巨然之門戶也曹雲西著色雅淡意趣有餘柯敬仲二紙筆墨超軼瀟灑天然馬扶風二幅大幅擬倣於和之小幅近唐人而高逺盛子昭逼松雪之神方道士氣韻生動前諸名家真淩跨百代可望而不可及也癸巳十一月草又七日漁隱主人金文鼎識繪妙自余平生樂事雖不能步武古人亦能咀嚼個中旨味其二十幅想自有而絶無者余往時一聞勝國名畫輒多方覔購常有贋本不值一笑者亦有好事家與余鬬勝致釀成非者長明菴圖乃吳郡高叔寶之物甚有厥名昔青城王道夫與余爭售成讐後其子汝玉與家兒同榜忝於年家後會間兩覺汗顔而已曩同俞樂泉過武林獲趙松雪柯丹丘畫及還舟次橫塘晚遇戒心遊資罄失囊中無半文幸畫無恙欣然而歸過魏塘胡長卿處稱貸長卿同余所好留榻連旬出示名公書畫評隲真偽各半此長卿短於隻眼也是日徴余寫漁舟圖淋漓盈卷稍有得意處長卿已故此卷不識歸何人矣品藻最不可輕視往往有高手偽作第觀其氣韻然必須多蓄古人真迹披覽或自能動筆或潛心參究深知邃趣方可賞鑒邇來好事者多耳食一見有名書畫不審而圖之可笑可笑此册選元季十二名家自余生平寶愛之但愧不能追其萬一當為後來宗法者也次年端陽前一日文鼎重題金文鼎先生松江人永樂中以繪事名海內風流博古高尚不羣嘗見先生圖畫大得元人筆意余亦宗之此册先生所選十二家二十幅各各品定無不臻妙先生目力高也今為御史徐同美所藏同美乃先生郎君禮部之壻攜來見示可為勝國名家一時之賞會良足快也長洲沈周畫册以元季四大家為難余家藏百幅僅拔其尤物十八幅耳又有沈純父司馬之子久二十幅汪太學景純嵇太學沖凡二册宋元各半皆為畫苑之竒寶今又見此册原為吾鄉金文鼎所藏文鼎畫入能品冝其具擇法眼差覺盛子昭柯丹丘未能作諸公把臂入林侣耳然已海內不再得矣董其昌題崇禎甲戌重九日歙友黃越石攜是册至余家留閲再宿并示白定小鼎質瑩如玉花紋粗細相壓雲雷蟬翅蕉葉俱備兩耳亦作盤螭圓腹三足罏頂用宋做白玉鸂鶒烏木底有篆書云夏鼎九象殷周稟焉小大備物用知神姦孰是兹器貌玉衷埏夔龍叨餮咫也序旃載其馨薌庸永日宣東陽識底後鐫曲水印章越石云項子京一生賞鑒以不得此物為恨索價三千金吾里有償之什百不肯售真希世之寶也其挂幅有李營丘雪景什襲珍重殊甚然視吾家山水寒林猶傖父也米敷文雲山茅屋太模糊王叔明一梧圖亦贋物南村草堂圖更惡甚惟文徴仲倣小米鍾山景大軸有氣韻上題云君家住近青溪曲流水陰陰緑樹多最愛鍾山疏雨過白雲千疊擁蒼螺時越石欲余齋頭靈璧為漫興中名聽經鵝者以文畫相易余不割捨渠謂米家書畫船不可少此物遂強持去復示我宋榻閣帖硃繡白端硯坡仙雪浪齋緑端硯哥窰彛及乳罏種種曰此皆定鼎之媵也噫昔沈不疑寓金陵杏花村有破定彛朱蘭嵎宗伯因名其齋曰寶定今越石之舟亦可名寶定而余新得舊藏唐宋元畫册端可如蘇長公以寶繪名晉卿之堂也哉雖然閲世愈深當如玉局作糞土視之而蓬壺諸勝乃是我師耳重九後二日西吳菰蘆中人汪砢玉識吳仲圭寫明聖湖十景册縑素上此册曾見項又新齋頭又新墨竹師法仲圭得其手寫竹譜草幅天真爛漫真竒品也仲圭山水不多見一松石泉壑在余處一重林漁汀在池灣沈氏此册又新不知從何得之蒼率簡易大都規模巨然豈揮灑風枝風葉之後弄其餘瀋耶又新墓木已拱偶於玉水處展閲不能無黃公酒壚之感也崇禎己巳四月雨窗漫識竹懶李日華天啓丁邜嵗余自歷下歸至冬得册於又新家偶覩馮開之快雪日記有云己邜四月草九日看項氏所藏法書名畫有趙千里丹青三昧圖馬和之毛詩十二假閏四月初一日看吳仲圭西湖十景册文與可晚靄橫看高卷則斯册見重於當時可知得後至癸酉春余往婁江訪故扺蘇門顧友青霞招飲汗漫亭偶攜是册在舟索閲欲得之而未果乃以易還故物為霞上寶玩竟并去此册及今念之猶悒悒也砢玉記珊瑚網卷四十四
