body:
  text: 珊瑚網卷四十七明汪砢玉撰名畫題跋二十三宋宣和癸卯御府所藏見鐵圍山叢談孫吳曹不興作𤣥女授黄帝兵符圖為第一最高古魏高貴鄉公曹髦作卞莊子刺虎圖第二晉謝雉作烈女完節圖第三烈女謂緑珠實當時所筆自餘始數顧陸僧繇而下如長康古賢圖戴逵破琴圖黄龍負舟圖皆神絶不可一二紀次則鄭法士展子䖍有北齊後主幸晋陽宮圖又書法從之屬大率竒特甚至唐人圖牒已不足數然唐之度人經乃禇河南書字而閻博陵繪其相類多有此米海嶽畫史摘次殊費手細心閲者自得之顧愷之維摩天女飛仙長二尺所謂小身維摩也又净名天女長二尺五應名畫記所述之數唐鏤牙軸紫錦裝褾李公麟見之賞愛不已親琢白玉牌鼎銘古篆虎頭金粟字皆碾雲鶴以結縁也顧筆女史箴横卷人物三寸餘筆彩生動髭髪秀潤戴逵觀音在余家天男相無髭皆帖金家山乃逵故宅其女捨宅為寺寺僧傳得其相天男端靜舉世所覩觀音作天女相者皆不及也海州劉先生收王獻之畫符及神一卷咒小字五斗米道也李伯時只一見求摹不許蘇氏古賢象十人一卷衣紋自非晉筆漣漪藍氏收晉畫渾天圖直五尺素畫不作圏勢别作一小圏畫北斗紫極亦易扵㸃閱又位列多異扵常圖北史人物衣冠乗馬甚古在蘇之孟家蔣長源收姜后免冠諌圖宣王白帽此六朝冠也王戎象以懐素帖易于王晉卿家以上皆顧愷之筆梁武翻經象亦假顧天帝釋象皆僧繇畫張筆天女宫女面短而艶顧乃深靚為天人相武帝作居士服反唇露齒宫女四人擎花後四武士持戈劍髪如神宗室仲儀收古廬山圖一半幾是六朝筆位置寺基與唐及今不同石不皴林木格高舟製近古王球有兩漢而下至隋古帝王象云形狀有怪甚者恨未見之此可訪為秘閣物端州有陳髙祖之後收陳世諸佛帝真白畫唐使下御史姓韋作記頂幅巾不冠後主作醉舞狀李公麟家展子䖍朔方行小人物甚佳韓馬破裂四足如渉水中皆南唐文房物宗少文一筆畫唐人摹絹本在蘇之孟家潤州節推莊鼎收麻紙爾雅圖衣冠人物與蘇氏同蔡子駿家收老子度闗山水林石車從関令尹喜皆竒古老子乃作端正塑像戴翠色蓮花冠手持碧玉如意此盖唐為之祖故不敢畫其真容漢畫老子于蜀郡石室有聖人氣象想去古近當是也余家收唐人麻紙畫掦子雲腰下懸一兕觥細轉絛索蔣永叔收古銅兕觥其形勢骨髗凹凸全備轉旋絛索一如余家畫遂以帖易去以證謂之子雲觥唐畫嵇康廣陵散松石逺岸竒古所書故事空民字世未見同品畫真佳作也宗室仲爰收唐畫陶淵明歸去來其作廬山有趣不俗楊崇收唐畫村田踏歌樂上題唐政年入御府人物亦佳宗室君發以七百千置閻立本作太宗歩輦圖用熟絹通身背畫經梅便兩邊脱磨畫蘇落蘇洎收古茴香一枝題為閻令畫王球收西域圖謂之閻令畫禇遂良書與馮京家同假名耳道徳經一卷出相不知何人畫絹本字大小不匀真禇遂良書在范相堯夫家與馮當世家西昇經不同雖有裴度桞公權跋非閻令畫禇筆唐人自不鑒爾馮永功有日本着色山水南唐命為李思訓作宗室仲忽收孫可𤣥笠澤垂釣圖亦不俗然世無可𤣥筆又收唐出相道徳經人物三寸許皆如呉畫蘇子瞻收呉道子畫佛及侍者誌公十餘人破碎甚而當面一手精彩動人㸃不加墨口淺深暈成故最如活王元規家二天王皆是呉之入神畫行筆磊落揮霍如蓴菜條圜潤折算方圓凹凸裝色如新與子瞻者一同李伯時家天王雖佳細弱無氣格乃其弟子軰作貴侯家所收率皆此類今人得佛則命為吳未見真者唐人以呉集大成而為格式故多似尤難鑒定余白首止見四幅真筆也張修家有辟支佛下畫王維仙桃巾黄服合掌頂禮乃是自冩真與世所傳關中十大弟子真法相似世俗以蜀中畫騾綱圖劍門圖稱王維甚衆又多以江南人所作雪圖為維但見筆清秀者即命之王維畫小輞川摹本筆細在長安李氏人物好此定是真若比世俗所謂王維全不類或傳宜興楊氏本工摹得又王君玉收摩詰堯民鼔腹圖榮咨道收雪獵圖命為王維不類張氏辟支佛畫合掌像林木類蜀人筆雪山精好是唐物維則未也蘇子美有畢宏山水題云筆勢㓙險是也沈括收畢宏畫以大青和墨大筆直抹不皺云云張友正家收古栢一株枝枝如龍蛇糺結甚異石亦皴澁不凡題為韋侯錢藻收張璪松一株下有澗流上有斷句云近溪幽處濕全藉墨烟濃高公繪亦有張璪澗底松唐畫張志和顔魯公樵青圖在朱長文處杜牧之摹顧虎頭維摩百補在潁州公庫精彩照人蘇州丁氏五星圖宗室叔盎家金星一小幀並真蹟也沈括收周昉五星與下氏同沈存中收唐人壁畫两大軸或一手一面或半身是學者記其難處遂題為真馬本所見髙公繪二馬一齕草一嘶王詵家二馬相咬是一本後人分開賣蘇激家三疋王元規家一疋宗室令穣家五疋劉涇家三疋皆筆法相似並唐人妙手也劉所收白子母牛王仲修家令穣家黒牛皆命為戴甚相似貴侯家多不同亦命為戴不可數劉巨濟收唐人畫脫殻筍如生曺仁熈水今古無及四幅圖内中心一筆長丈餘自此分去高郵有水壁院李師端收薛稷二鶴李昇着色畫其一幅山水舟舫小人物精細两幅畫林石岸茆亭溪水數道士閒適人物差大反不工小者石岸天成都無筆蹤其三幅峯巒秀抜山頂蒙茸作逺林層際非嵗月不可了而種種木葉古未有倫王敏甫收李重光四時紙上横卷花一軸毎時則自冩論物更謝之意文一篇畫一幅字亦少時作花清麗可愛南唐顧閎中畫支許王謝仝㳺山隂圖三吳老僧寳之不肯傳借余與伯時説伯時率然㺯筆隨所說想像作之瀟洒有山隂放浪之思余家董源霧景横披全幅山骨隠顯林梢出没意趣髙古李冠卿收雙幅大折枝棠梨千葉桃向背各五百餘花命為徐熈余細閲於一花頭下金書臣崇嗣上進又収兩幅樓臺甚古上有三十餘宫人唐粧約略行筆法彩生動徐熈大小折枝吾家亦有士人家往往見之翎毛之倫非雅玩故不録桃一大枝謂之滿堂春色在予家余相國寺中八金得紙桃兩枝緑葉蟲透背二葉着桃上二桃突兀髙出紙素徐熈真筆也蘇汶有江南暝禽圖徐熈一酸榴余有丁晉公所收甜榴滕中孚有徐熈對花果子四軸石揚休有吾家唐畫韋侯故事六横幅山水人物車馬偹具後人題作張萱易李邕帖衆物之一也并熈牡丹海棠兩幅徐熈風牡丹圖葉幾千餘片花只三朶一花在正面一在右一在衆枝亂葉之背石竅圓潤上有一猫兒余惡畫猫欲剪去又蔣長源以二十千置黄筌畫狸猫顫葧荷甚工蘇子美藏黄筌鶺鴒圖只蘇州有三十本更無少異今院中作屏風畫用筌格稍舊退出却無處可辨余收易元吉逸色筆作蘆如真上一鸜鵒活動晉卿借去不歸艾宣張涇寳覺大師翎毛蘆雁不俗寳覺畫一鶴王安上見以謂薛稷筆取去杭士林生作江湖景蘆雁水禽氣格清絶南唐無此畫可並徐熈在艾宣張涇寳覺之上人罕得之趙叔盎家舊有出蟄圖江南畫魚蝦相隨山石林木人物如董源佳作也是龍吞珠圖王晉卿收江南畫小雪山二軸易余嵗餘小木一筆纒起作枝葉如草書不俗後易書與蘇之友王士元作漁村浦嶼雪景類江南畫范士珪有折枝梨花古筆非江南蜀畫杭僧真慧畫山水佛像近世出品惟翎毛墨竹有江南氣象冩一大牛大數尺形似虎蘇郎中道祖有花下一金盆盆旁鵓鳩謂之金盤鵓鳩豈是名畫可笑又収吳王斫鱠圖江南衣文金冠右袵紅衫大榻上背擦兩手呉王衣不當右袵池州匠作秋浦九峰師董源闗仝真蹟見二十本范寛見三十本其徒甚多滕昌祐邊鸞各見十木邱文播花木見三十木祝夢松雪竹見五本巨然劉道士各見十本餘董源見五本李成真見兩本贋見三百本徐熈崇嗣花果見三十本黄筌居宷居寳見百本李重光見二十本偽吳生見三百本山水李成在蘇州寳月大師處秀潤不凢松勁挺枝葉鬱然有隂荆楚小木無一冗筆不作龍虵鬼神狀又寳月收李成四幅路上一才子騎馬一童隨清秀如摩詰畫浩然成作人物不過如是他圖畫人醜怪賭博村野如伶人者皆許道寜耑作成時畫余收李成至李冠卿大扇愛之不已為天下冠時背扵真州昭宣使宋用臣自舒州召還見之太息云慈聖光獻太后扵上温凊小次盡購李成畫貼屏風以上所好至輒玩之因吴丞相冲卿夫人入朝太皇使引辨真偽成之孫女也内以四幅為真折奉上别購補之勅用臣背子内東門正與此類因語法然囑吾珍惜及得盛文肅家松石片幅如之幹挺可為隆棟枝茂凄然生隂作節處不用墨圏下一大㸃以通身淡墨空過乃如天成對面皴石圓潤突起至坡峯落筆與石脚及水中一石相平下用淡墨作水相凖乃是一磧直入水中不若世俗所效直斜落筆下更無地又無水勢如飛空中使妄評之人以李成無脚盖未見真耳劉涇自以李成筆多扵是出示之乃良久曰此必李師也余以范寛圖易僧夢休雪竹一幅巨石倒影下落葉數片浮水面旁一枯木亦倒影後易韋馬於蔣長源凡去十一種物方得蔣後易與王詵今蔡勝道有六幅長丈餘竒甚大屋梁方可掛森森如坐竹下張退傅丞相孫德淑收仁宗畫黑猿上有小御寳旁一印胡蘆王素字畫竒甚宗室令穣作小軸清麗雪景類世所收王維汀渚水鳥有江湖意鍾離公序收燕公畫一幅題曰禮部侍郎燕穆之畫付女五娘氣格如此余嘗與李伯時分布次第作子敬書練裙圖圖成乃歸權要余又嘗作支許王謝山水間行自掛齋室以山水古今相師少有出塵格因信筆作之多烟雲掩映樹石不取工細意似便已更不作大圖無一筆李成關仝俗氣此實開勝國逸筆為黄癡倪迂之祖宋潤州蘇氏家藏見淮海張邦基墨荘漫録顧凱之雪霽圖望五老峯圖北齊舞鶴圖閻立本醉道士圖吳道子六甲神薛稷戲鶴陳閎蕃馬韓幹御馬戴嵩牛圖王維卧雪圖邉鸞雀竹李將軍曉景屏風李成山水徐熈草蟲黄筌墨竹居寜翎毛董羽龍水劉道士鬼神刁處士竹石鍾尤乳兎物之尤異者有明皇賜蘇小許公四代相玉印賛皇父子石研石兎竹拂連理拄杖陳後主宫娃七寳束帶雷公斧珊瑚筆架玉連環皆希世之寳後皆散逸或有歸御府者今不知流落何處宋秘書省所藏見周公謹遊記董源作孔子笑魚丘子圖唐摹顧愷之洗經圖李成重巒寒溜孫太古畫誌公展子䖍畫伏生無名人三天女燕文貴紙畫山水小卷士雷小景符道士隠山水闗仝山水胡瓌馬陳晦栢文與可古木便面記云乙亥嵗秋監丞黄汝濟以蓬省勾㸃邀予偕行予于是具衣冠望拜右文殿然后逰道山堂堂故米老書扁後以理宗御書易之著作之庭胡邦衡所書曰蓬巒曰羣玉堂堂屏坡翁所作竹石相傳淳熈間南安守取之長樂寺壁間去其故土而皆施髹􅃮匣以持獻曽海曽卒復獻韓平原韓誅簿錄送官左為汗青軒軒後多古桂兩旁環石柱二小亭曰蓬萊曰濯纓曰方壺曰含章曰茹芝曰芸香射亭曰繹志曰采良門采良二字莫知所出登渾儀臺觀銅渾儀紹興間内侍邵諤所為精緻特甚色澤如銀如玉此器凡二一留司天臺一留此以偹測騐最後歩石渠登秘閣兩旁皆列龕藏先朝㑹要及御書畫别有朱漆巨匣五十餘皆古今法書名畫也是日僅閲秋収冬藏四匣畫皆以鸞鵲綾象軸為飾有御題者則加以金花綾毎卷表裏皆有尚書省印防閑雖甚嚴而往往以偽易真殊不可曉其佳者有如前所列餘悉常品不滿十焉暇日想像書之以為平生清賞之冠也王子才英孫號修竹所藏見周公謹雲烟過眼録董氏六隠圖一卷着色山水絶類小李將軍高宗跋司馬相如入蜀