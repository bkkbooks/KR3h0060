墨竹又梅花折枝揷瓶中以班竹方架承者及倪雲林山水又竹沈石田倣呉仲圭松石又桐石又竹鷄芙蓉文太史水仙柏舟圖仇十洲四皓圖已上各一軸管仲姬家書一卷更梅老畫册十三幅標其簽曰梅沙彌以畫說法萬厯己未重九日為沈止伯招赴花社在北山草堂乃陳白陽所書長松修竹間登舞袖各賦采菊篇又拈韻咏諸名勝并送譚帚菴伯仲閩行時魏仲雪先生主盟而黄葉老人係小年菴舊雨凡所藏舊書畫多經品題者因悉出示吾軰不减當年眉公鑒賞時也惜今日聞多散逸耳汪砢玉識珊瑚網卷四十七
