body:
  text: 珊瑚網卷一明汪砢玉撰法書題跋魏太傳鍾繇戎輅宣示帖真迹有宣和政和雙龍小璽米董諸印臣繇言戎路兼行履險冒寒臣以無任不獲扈從企仰懸情無有寧舍即日長史逯音録充宣示令命云云建安草四年閠月九日南蕃東武亭侯臣繇上御府所藏魏鍾繇宣示帖淳祐十一年嵗在辛亥至朔同日裝池松題記俞松印章尚書宣示已入閣帖薦季直表亦鐫華氏真賞齋矣此則宣示戎輅真迹為吾禾項氏所藏是宣示有二種也遂昌鄭元佑以戎路作戎輅世遂名戎輅帖耳余考廣川書跋以昔人辨鍾元常書謂字細畫短而逸少學此書最勝處得于勢巧形密然則察真偽者當求之此其失於徑密者可遙知其偽也賀表畫疏體枝鋒露筋絶不復結字此決非元常之為也永叔嘗辨此謂建安二十四年九月關侯未亡不應先作此表論辨如此然鄭遂昌以成侯戎輅表楷法傳世為不可及又以季直表其法度與戎輅無少異今三帖具存鑒别自在惟是墨本為閏月九日非九月也或誤以九日作九月抑閏在冬捷時耶有識者宜詳辨之嘉禾龍惕子汪砢玉鑒於城南之蓮登草堂晉右將軍王羲之敬和帖想清和士人佳也此平安安石過停數日日無為樂益增想想孔長史安善足下令知問纍有書也足下入年衰得俱還不思遲以日為嵗元素將還翰苑子瞻欲赴髙密與寶臣來同遊法會至言師舍同觀熙寧七年九月十七日題元祐四年七月草五日復至法會言公化去已七年矣見其小師微惘然如夢耳子瞻書熙寧八年八月朔過雪峯謁言師觀此帖莆陽蔡元度隴西李無悔寺僧潛聖微上人自西菴攜過山林因得一觀襄陽米黻甲子三月十九日泥金籖題宋御府祕藏有宣和政和印王右軍思想帖真迹羲之頓首不復見君甚有思想得告慰之故吾乏氣兼以帶下憂深不佳尅面王羲之頓首大德二年二月草三日霍肅清臣周密公謹郭天錫佑之張伯淳師道亷希貢端甫馬昫德昌喬簣成仲山楊肯堂子構李衎仲賔王芝子慶趙孟俯子昂鄧文原善之集鮮于伯機池上佑之出右軍思想帖真迹有龍跳天門虎卧鳳闕之勢觀者無不咨嗟歎賞神物之難遇也孟俯書小楷右軍真迹世所罕見此思想帖與余舊藏平安帖行筆墨色略同皆竒迹也平安帖有米海嶽簽題此帖無簽題而有趙魏公跋秉同觀者自霍清臣而下凡十有三人皆鑒賞名家咸咨嗟歎賞神物之難遇如此余何幸得附名其後哉嘉靖丁巳冬十一月十又三日長洲文徴明題時年八十有八王右軍此事帖明昌御鑒睿山谷道人黃長印比有此事以與卿共事每思不以法和欲不可長右軍瀟灑更清真落筆奔騰思入神裹鮓若能長住世子鸞未必可驚人蒼藤古木千年意野草間花幾日春書法不傳今已久楮君毛頴向誰陳揭徯斯拜題黃伯思辨帖文精别毛髮理析毫釐華光祿尚古嘗刋其所著行于時今收王帖片掌必有見于中耳昔人相馬妙盡神凝驪黃為别者未必良工也余何能為言唐寅王右軍二謝帖二謝書云即以七日大斂冥冥永畢不獲親臨見痛恨深至也無復己巳武妹修載在道終始永絶道婦等一旦哀窮並不可居處言此悲切倍劇常情諸不能自任未遂面緣撫念何已不一一羲之頓首熙寧九年十一月十四日趙抃閲越州清思堂之西至樂齋觀右軍真迹近世漸少觀二帖紙扎尚完殊可愛也案貞觀日録洎淳化法帖皆不收此豈當時為好事者祕藏不出耶熙寧丙辰冬至日丹陽蘇頌子容餘杭郡西閣題假守徐師回丁巳仲春十日覽之郡倅朱正民同觀熙寧九年七月六日書會稽關景暉存中熙寧九年五月草五日三司北軒觀華陽王仲修觀丙辰仲夏旦日清河崔彥博唐公元豐乙丑五月望日觀于西安縣東齋朝議大夫致仕何昌世元祐二年八月十七日觀衢州衙之大廳武夷范鏜觀元祐二年八月十有七日三衢龜峯廳筆右軍書法萬世所宗昔人稱歐虞之體謂如壯士美人者但能精于一偏尚且傳之後代而况得其全者哉是知此字當使好事寶之也元豐乙丑五月望日西安縣齋丹陽崔希仲德舉題東陽鄭汝言無伐同觀貞觀尤愛右軍書訪求殆盡其後并葬昭陵今所存法帖人謂皆哀疚之間故不復進上得傳于後豈其然乎此書亦然又法帖之所遺也當用文錦玉軸重裝以遺子孫寶之海陵曹輔子方信安郡齋書曹使君借觀出示通守郭庭誨與觀者五人林師醇醇仲余廙肅之梁秉文憲古林季淵萬宗葉常權之紹聖五年三月二十日元符二年季秋九月鄭子猶出此帖于滎陽尉舍以示余因得以觀右軍筆畫之妙第有嘉歎而已吳興劉欽止繩祖書樂安李炳崇寧元年十二月初九日滎陽澤思軒敬觀張子和髙適正梁濟道李海叔毋仲山同觀于陳留大觀元年五月草五日此右軍二謝帖結構踈緩紙弊墨渝了無晉人風度逮後人贋本宋諸公之題俱佳恐非原帖余嘗見黃素上眠食帖用章草後趙文敏公題識亦用章草又月半帖惜縑素殘裂不害為神品偶録此帖因并及之墨林項元汴王右軍瞻近帖墨迹在硬黃紙上右羲之瞻近帖行書之狎鄰于草者也典午沖靚放曠之風烏衣諸王富貴居養之素藹然見豪楮間宜其名百世也第宋淳化宣和搜羅晉帖靡遺此帖獨不見有所表識豈非金源得宋故物易故以新而然歟明昌七印籖帖金書全倣宣和其篆籀朱法精粗不侔後世瞭若在目假令當時不相師法政未為失觀辨章良公成甫家清玩見右軍之真迹二帖當亞快雪至正丁酉閏月己未廬陵歐陽玄識余居祕府時閲歷晉諸名家帖而右軍羣昆季居多荷華裏鮓神俊天出評者至以龍跳天門虎卧鳯闕褒之信不誣矣此帖骨相益豐豈操觚時在來禽喜色之前耶不見賞於徽宗而見珍于完顔臨風撫卷足為世道一慨前翰林孫􅀢都昌宋天章嘗示余獻之鄱陽帖每憾其絹素未古此帖與金華宋仲珩所收周益公家喜色帖紙墨相類筆法精妙真可無疑良金美玉可得而此卷不可得寶之寶之丙寅夏日孟夏鄱陽劉昺晉右將軍王羲之每思帖右軍瀟灑更清真落筆奔騰思入神裹鮓若能長住世子鸞未必可驚人蒼藤古木千年意野草間花幾日春書法不傳今已久楮君毛頴向誰陳揭徯斯拜題重黃伯思辨帖文精别毛髮理析毫釐華光祿尚古嘗刋其所著行于時今收王帖片掌必有見于中耳昔人相馬妙盡神凝驪黃為别者未必良工也余何能為言唐寅重南濠都穆觀於松陵史氏淡心齋墨林主人項元汴用價五十金得于無錫安氏時隆慶三年八月朔日飫字號前敬和帖子京定價三百金二王行穰中秋兩帖萬厯戊午于吳江周敏仲舟中獲觀右軍行穰帖止存二行約二十餘字在黃麻紙上書法精彩異常惜無前賢跋後項子京自敘數行董玄宰題云此帖所至處常有青雲覆其上但肉眼自不見耳又大令十二月帖截中秋三行紙色與行穰相似書法遒密亦無跋語玄宰題數行後書君家子敬十六字氣壓鄴侯三萬籖繡里汪砢玉識於潄六齋王大令送梨帖真迹子敬後幾百年而為柳誠懸誠懸又幾百年而為文與可前者紙渝故當墨敝後者筆近乃宜色鮮然而墨色濃淡文不及柳柳不及王前後幾如倒置乃知古今人不相及非獨用筆用墨亦然仲將之墨一點如漆吾不得而見也幸有子敬片楮在持是以觀凡稱右軍墨迹墨瀋昏淡者皆贋品也王世懋晉桓大司馬旱燥帖楮上臣溫言今東道地梁間又旱燥殊艱難人力可速而於公松為美謂不在便台臣溫言右旱燥帖晉臣溫手迹字法淳古無俗韻亦一代佳札臣之事君以忠而已非貴于虛拘苛禮也古者奏事乃用親札而不以繁文盡恭蓋君臣之義同父子各無所疑通其情實之為美於溫此帖可以見紹興戊午四月初四日臣米友仁恭題謝康樂古詩帖東明九芝蓋北燭五雲車飄颻入倒景出沒上煙霞春泉下玉雷青鳥向金華漢帝看桃核齊侯問棘花集作棗花應逐上元酒集作上元應送酒同來訪蔡家北闕臨丹水丹集作玄南宫生絳雲生集作坐龍泥印玉簡作策大火鍊真文大集作天上元風雨散中天歌吹分虛駕千尋上空香萬里聞右二首見庾信集步虛詞謝靈運王子晉贊淑質非不麗難以之百年儲宫非不貴豈若上登天王子愛清曠區中實囂喧既見浮丘公既集作異與爾共紛翻集作繽翻簷下一老公集作翁四五少年贊衡山采藥人路迷糧亦絶忽過巖下坐正見相對説一老四五少仙隱不可别其書非世教其人既賢哲既作必伯英妙迹永絶之後隋唐能書者論草聖惟言永禪師張長史而已今觀此卷始知元氣在天壤間代不乏人但藝有専兼流傳有顯晦耳豈謝公以佳詩雅韻掩其書名耶况宣和宸翰內外僉題玉璽於軸幹皆全譜中論評又極備推奬慶仰神物感惠難勝值而有之此生之幸會也不愧惡拙僭書卷末時至正庚午蕤賔節日前翰林國史院檢閲官滎僧肇薰香敬題右題中已極詳備如此余又嘗見宋嘉祐年不全拓墨本亦以為臨川內史謝康樂所書妙入神品今幸獲覩真迹殆不虛語筆勢縱逸使人真有凌雲之想書於五色箋上其箋大不盈尺上有五代以前印璽為庸人擦去可惜裝背錯序細尋繹之方能成章第前二篇見近世所刋六朝人詩庾信集味其詞氣頗不類謝公為可疑深愧淺陋不能考訂以破數百年之惑而使妙迹不遇知音悲夫墨林子項元汴梁摹樂毅論真迹余所見樂毅論宋拓本及唐貞觀摹真迹二本皆無付官奴三字獨此有之初甚完好聞吳氏購時主人故漫之殊可惋惜智永跋所云梁世摹出天下珍之即此帖自余定為梁摹以俟知者董其昌觀并題唐人雙鈎稱為絶詣余往亦嘗見鍾太傅薦季直表與右軍快雪時晴諸帖時不免有滯膩處獨此樂毅論筆勢流麗神彩煥發無異書者非工書家又非不問嵗月必逼古人安能為此即使右軍復生當為撫掌矣毗陵唐鶴徴余生平好古所見法書頗多海內所藏真楷惟韓宗伯家有墨迹樂毅論韓長公攜都門每過官舍必出一玩較之余藏者字稍大賈亦貴重余此卷已著蘭亭考米友仁跋乃米元章所藏之物梁摹樂毅論為正書第一其卷有異朱僧權鑒賞紹興印信又有米氏印章非此卷而何不知何幸得落余手王太史宇泰多方欲得之余實不能割舍借摹入石雖曰刻成與餘清齋石刻差别逺絶此卷在余所藏三十載尚未盡知深奧處偶病間細閲數次神彩煥發而肥瘦相停余年六十有一方真知其妙也宋拓本余有至佳者安能與此卷比論真稀世之物非千金不可輕棄也當同定武蘭亭行書第一並傳此二卷真是性命可輕至寶是寶餘清齋有此藏書之願足矣子子孫孫宜世守不負余生平苦心蹤迹海內竒品也餘清齋主人吳廷敬題昔人書估以雙鈎廓填為下真迹一等樂毅論是王右軍正書第一而此卷鋒鎩精到神明邁逸與墨迹無異不意垂老覩此罕物天啓初同錢宫諭觀褚河南真迹于吳蹇叔家以為妙絶然字稍大當知此更為逼真矣連叔持示余西湖僧舍命顓兒嚮拓一過書而歸之崇禎戊寅小暑偈菴道人陳嘉燧書濟南邢侗二跋已刻餘清齋法帖內故不贅入時崇禎己卯夏仲項氏出此帖索價六十金較吳江村定值三百鎰亷矣恨乏阿堵僅留覽數日玉記唐馮承素臨本樂毅論在黃麻紙上摺表右拓本樂毅論是貞觀十二年四月九日敕內出樂毅論是王右軍真迹令將仕郎直𢎞文館馮承素模寫賜司空趙國公長孫無忌開府儀同三司尚書左僕射梁國公房玄齡特進尚書左僕射申國公髙士亷吏部尚書侯君集特進鄭國公魏徴侍中護軍安德郡開國公楊師道等六人於是在外乃有六本並筆勢精妙備盡楷則也彥逺家有馮承素蘭亭元和十三年詔取進書畫遂入內今有承素樂毅論在並有太宗手批在後張彥逺記隆慶三年元旦焚香盥手謹觀文彭夀承甫記是日有禁不得賀節明窗淨几展玩數日甚樂甚樂再觀索幼安出師帖頌蓋天地間二寶也文彭再記山谷老人論書要字中有筆此帖近之然非有研臼筆簏者不足以知此隆慶己巳春日從三橋寓齋攜歸諦觀因題其後歸之建業胡汝嘉記事唐模蘭亭墨迹長樂許將熙丙辰孟冬開封府西亝閲喬氏簣成中山甫印臨川王安禮黃慶基同閲元豐庚申閏月十日至元甲午三月草日巴西鄧文原觀唐模蘭亭余見凡三本其一在宜興吳氏後有宋初諸名公題語李范菴每過荆溪必求一觀今其子孫亦不輕出示人其一藏吳中陳緝熙氏當時已刻石傳世陳好鈎摹遂拓數本亂真而又分散諸跋為可惜耳其三即此神龍本也嘉靖初豐考功存禮常手摹使章正甫刻石于烏鎮王氏然豫未見真迹惟孫鳴岐抄得郭祐之詩跋鮮于伯機長句每誦二詩慨然欲思一見而不可得蓋往來豫懷者五十餘年矣今子京項君以重價購于王氏遂令人持至吳中索余題語因得縱觀以償夙昔之願若其摹拓之精鈎填之妙信非馮承素諸公不能也子京好古博雅精於鑒賞嗜古人法書如嗜飲食每得竒書不復論價故東南名迹多歸之然所蓄雖多吾又知其不能出此卷之上也萬厯丁丑孟秋七月三日茂苑文嘉書朱光裔李之儀觀元豐五年三月二十七日李匱王景通同觀戊戌七日元豐四年孟春十日又同張保清馮澤縱觀文安王景修題仇伯玉朱光庭石蒼舒觀元豐五年四月草八日定武舊帖在人間者如晨星矣此又落落若啓明者耶元貞元年夏六月僕將歸吳興叔亮內翰以此卷求是正為鑒定如右甲寅日甲寅人趙孟俯書右唐賢摹晉右軍蘭亭宴集敘字法秀逸墨彩艷發竒麗超絶動心駭目此定是唐太宗朝供奉拓書人直𢎞文館馮承素等奉聖旨于蘭亭真迹上雙鈎所摹與米元章購于蘇才翁家褚河南檢校拓賜本張氏石刻對之更無少異米老論精妙數字皆具有之毫鋩轉摺纎微備盡下真迹一等豫家舊藏趙模拓本雖結體間有小異而義類良是然各有絶勝處要之俱是一時名手摹書前後二小半印神龍二字即唐中宗年號貞觀中太宗自書貞觀二字成二小印開元中明皇自書開元二字作一小印神龍中中宗亦書神龍二字為一小印此印在貞觀後開元前是御府印書者張彥逺名畫記唐貞觀開元書印及晉宋至唐公卿貴戚之家私印一一詳載獨不載此印蓋猶搜訪未盡也豫觀唐模蘭亭甚衆皆無唐代印跋未若此帖唐印宛然真迹入昭陵拓本中擇其絶肖似者祕之內府此本乃是餘皆分賜皇太子諸王中宗是文皇帝孫內殿所祕信為最善本宜切近真也至元癸巳獲于楊左轄都尉家傳是尚方資送物是年二月甲午重裝于錢塘甘泉坊僦居快雪齋壬子日易跋贊曰神龍天子文皇孫寶章小璽餘半痕鸞飛離離舞秦雲龍驚蕩蕩跳天門明光宫中春曦溫玉案卷舒娛至尊六百餘年今幸存小臣寧敢比璵璠金城郭天錫祐之平生真賞君家褉帖評甲乙和璧隋珠價相敵神龍貞觀苦未逺趙葛馮湯總名迹主人熊魚兩兼愛彼短此長俱有得三百二十有七字字字龍蛇怒騰擲嗟豫到手眼生障有數存焉豈人力吾聞神龍之初黃庭樂毅真迹尚無恙此帖尤為時所惜况今相去又千載古帖消磨萬無一有餘不足貴相通欲抱竒書求博易鮮于樞題趙參軍摹晉千文篆書周天球題太子右監門府鎧曹參軍臣趙模上行書千字文趙供奉所書千文如謹敕士不敢毫髮自縱在繩束外至今見者為之斂衽退步及觀困學翁跋則如神龍天馬殆不可羈其間法度出于自然噫此筆亦不可多得矣我輩何敢仰望下風因乘興效顰值子玉千文卷録以還延祐庚申夏五玉霄滕賔拜手吳郡錢佑觀于西湖寓舍吳伯顔觀大梁班惟志與仲亨子正敬思同觀嚴陵汪鵬升永嘉薛漠同觀大德九年吾道觀山陰繭紙入昭陵江右空傳瘞鶴銘賴有貞元供奉筆硬黃雙勒集儀型丹丘夏克復晉人之書見于今日者大抵石刻耳如趙公者去晉未逺其所摹集多豫昧于平生者固宜蓋褒鄂已沒庶幾見其英姿飄爽於縑素間者曹將軍之功也明古其謹藏之吳寬題吳郡楊循吉觀七月之望彭年觀于雙蛾寺夀承讀書樓禇登善有自書聖教序筆法極類右軍後人遂謂唐集聖教序非集聚之集乃學習之習也是殆不然今觀趙供奉所摹千字文一鈎一畫步武右軍極似聖教序乃知前人所集真集而書之者非習字書奴明矣千古之疑一朝盡釋快哉此筆今不可再得仲宣其寶之勿輕示人也天啓壬戌初夏范允臨題歐陽率更夢奠帖真迹仲尼夢奠七十有三周王九齡俱不滿百彭祖資以道養樊重任性裁過盈數終歸𡨕滅無有得停住者未有生而不老老而不死形歸丘墓神還所受痛毒辛酸何可熟念善惡報應如影隨形必不差二右唐銀青光祿大夫太子率更令渤海郡歐陽詢字信本書仲尼夢奠帖七十八字前後御府法書二小印後有紹興二小印合縫處古印甚多下跋一吉字未曉誰氏庚寅十月購于楊中齋家悅生圖書亦曾入賈秋壑文府率更初學王逸少書後漸變其體筆力嶮徑為一時之絶人得其尺牘咸以為楷範張懷瓘云歐陽真行出于大令自羊薄已後略無勍敵獨永師恃兵精鋭議欲旗鼓相攻歐惟猛鋭長驅永則破膽奪氣法書苑亦云信本行書蟬聨起伏凝結遒聳裁蕭永之柔懦拉羲獻之筋髓比之諸勢出于自然此本徑嶮刻厲森森然若武庫之戈戟向背轉摺渾得二玉風氣世之歐行第一書也辛卯二月辛未重裝九日丁丑跋於嚴陵官舍金城郭天錫審定真迹祕玩歐陽信本書清徑秀健古今一人米老云莊若對越俊若跳擲猶似未知其神竒也向在都下見勸學一帖是集賢官庫物後有開元題識具全筆意與此一同但官帖是硬黃紙為異耳信本為歐陽字至元草九年閏月望為右之兄書吳興趙孟俯韋續墨藪歐陽正行書在中上品歐教作書有八訣最利初學學者觀古人書必觀墨迹乃見妙處此夢奠帖七十八字真人間絶無僅有希世寶也蓋嘗入宋御府矣趙文敏公所題考碑志是三十八嵗筆故與後來特異吾家蓄古墨迹此為最久正統八年四月六日楊士竒謹書虞伯施東觀帖伯施世南字虞永興嘗自謂于道字有悟蓋于發筆處出鋒如抽刀斷水正與顔太師錐畫沙屋漏痕同趣前人巧處故應不傳學虞者輒成算子筆陳所訶以此余非能書能解之耳其昌墨禪室唐文皇哀册褚遂良墨迹戲鴻堂止鐫册文褚遂良書在唐賢諸名世士書中為秀頴得羲之法最多者真字有𨽻法自成一家非諸人可以比肩此書蓋其晚年紹興丙辰十二月初五日臣友仁審定褚公初以善書見知文皇後數直諫補益國事殊多遂受顧命以大節著為唐名臣卒之書為餘事此其書文皇哀册文藏于吳江史明古氏明古喜讀書能陽秋古人不獨貴其書也然于古人知所愛則得其模刻之語亦深玩之况其手迹哉則雖謂貴其書亦可也此卷于大行與崩字皆加塗改蓋嘗有入前代御府者為上諱爾成化戊戌嵗二月庚申吳寬書唐中書令河南公褚登善文學忠讜為貞觀人品第一觀其叩頭諫立武氏置笏殿陛乞歸田里不以禍福死生動其心古之所謂大臣與回視當時暖姝自悅為身謀者特狐鼠耳公書法之妙乃其餘事書家况之瑶臺青瑣窅映青春嬋娟美女不勝羅綺蓋狀其富艷之極文皇哀册覽之三嘆不已書法絶矣世鮮有知者惟米南宫知之米學褚最久知之為最深宜乎虎兒一見即賞鑒也哀册初落江南深山中且諱避不登御故得脫金燼著雍敦牂七月望日吳郡陳深書王元美跋已刻四部稿中褚河南書枯樹賦真迹趙松雪補圖賦鐫戲鴻堂右枯樹賦世皆以夀春魏氏為真丹陽蘇丞相辨識之墨帖既藏魏氏今所傳蘇丞相跋尾者亦模勒也至或以雍元直所臨仿為魏本而系蘇跋其後余此本得之壻汶陽梁正夀正夀雅好筆墨且自精賞魏鄭公嘗云褚河南下筆遒徑甚得逸少體資此本皆蘭亭筆法識者寡云開封丁禹錫毗陵胡承之以勒石大野朝無咎記乙丑中冬丙午松菊堂舊見陳了翁筆法精徑嘗疑其創自為家今乃知倣佛出枯樹賦耳豫章金陵所刻何曽有毫髮似哉朝補之字僅見此跌宕亦自有意况經前輩鑒定重以省印郡記纍纍無不可考胡氏世家在東南為盛世將摹刻又不一所此真迹尤其所寶故所在用意識之歷官大略備焉壬午五月廬陵劉辰翁題褚公書攬六朝衆長而成一家千代何獨枯樹賦而已子昂後五百年一振豪頃奪其符而代之豈規規學楮而能之抑胸中有所謂攬者也謂豫不信有木居士在錢塘白珽以下俱跋松雪臨本乃同前合一卷者褚登善書用𨽻法結體方嚴枯樹賦稍變乃從容於法度之中子昂落筆便得其意所謂不同而同者又繪圖于前樹雖枯而潤蓋其根本而生意存焉爾觀此信不徒作矣所感當甚子山也吳郡陳深寧極齋木生天地間為風霜之所夭折不能竟其天年不幸甚矣而騷人名士形諸賦咏著之翰墨精彩百倍垂于無窮實枯中之榮也豫老且衰撫卷為之一慨九山人崈古無盡菴白文褚書此為精妙子昻晚筆最得其意嘗聞賈師憲以江上功景定初元拜右相錫宴宣勸內府出金寶器賜甚厚中有枯樹賦真迹似道獨受此卷不敢辭今不知流落何所信人間世曽何足以把玩哉喜見以人而慨然者係之矣至大二年季春為吳門錢翼之題谷陽龔璛書褚河南多書枯樹賦猶王子敬多書洛神賦褚書僅見為燕公本亦猶王書止傳十三行異哉此本舊藏華補庵氏球得諦視之然亦雙鈎填廓想出柳誠懸手非褚初筆也其遒徑俊逸大都如褉帖臨本聖教碑刻骨立中氣韻自足非易窺者趙文敏綜攬晉唐法書舍筏登岸乃能師其意不泥其迹按臨本整密秀潤不少露北海姿態亦盡氣為褚敵者若武延秀時有此當亦取續屏腳矣王元美邃于書學得褚鈎本屬球鈎趙本合刻以傳球乏馮承素之藝多失趙神彩尚須具法眼者鑒之隆慶元年夏六月既望吳郡周天球題庾子山枯樹賦有盛聲于江左如許小公輩皆習之褚河南書此賦掩映斐亹極有好致武延秀集右軍大令墨迹于屏以此書裝腳其見重若此真迹在無錫華戶部處嘗命許元復雙鈎垂入石而户部物故真迹落盜手余所有趙吳興臨本亦一時妙品因請于華戶部之子明伯乞許本入石而趙本則周公瑕所鈎也褚書既極秀逸有美女嬋娟不勝羅綺之態趙則穩密端潤往往得筆外意俱在山陰堂室間正不當以時代論也元復公瑕俱名能臨池者故不啻作定武冡嫡耳隆慶改元八月天􅋶居士王世貞識崇禎辛酉春仲訪友玉峯婁水間花生日與成淵兒過東倉楊棘丞汝邁攜逰王氏雜花林返飲深柳堂會其舅吳庭堅出墨迹三卷為褚河南書哀册及枯樹賦子昻書歸去來辭又出古佩玦種種內有漢玉天馬羊脂美質沁血縷縷成細毛真竒物也然當年屬先君價只五十金今云百鎰矣歸蓬偶閲唐語林以褚遂良為太宗哀册文自朝還馬誤入人家而不覺是其摛詞工苦非獨書法擅絶也砢玉識於垂虹舟次褚登善兒寬贊真迹河南三龕孟法師二刻早年所書房公喬聖教序記長安同州本並晚年書此兒寬贊與房碑記序用筆同晚年書也容夷婉暢如得道之士世塵不能一毫嬰之觀之自鄙束縛于毫楮間耳諸王孫趙孟堅子固書羣玉帖中帝京篇贋迹可笑蓋枯且露矣河南晚年書雖瘦實腴孟堅又書褚河南漢兒寬贊正書三百四十字中刮去字蓋宋國諱也河南書豈待贊而顯子固所謂容夷婉暢者殆得之矣至順四年閏三月草四日柳貫識子固以此贊與三龕孟法師碑用筆不同定為河南晚年書碑有嵗月誠可信不疑然石刻視真迹自不無少異蓋其轉折精神處有非摹勒之巧所能盡也至正元年夏四月草三日黃溍記褚河南書清徑峻嶷平生大節蓋已見于筆墨之間古謂書類其人信哉豫章揭法記潛溪宋先生題褚河南書云登善初師虞世南晚入右軍之室故唐之能正書者僅二十八人而登善居三四之間其溫潤似虞結體則法右軍人徒見所書或與薛稷類者遂疑之不知先哲有兼人之才而作字或不拘一體張顛善草書至其小楷極端謹有法傳其學者惟顔真卿得之觀登善者宜以是求之此題識唐太宗哀册文也余長見之此所書兒寬贊筆意正同趙子固柳道傳先生黃文獻公揭伯防跋語皆真迹但柳先生以刮去五字為宋國諱則又見宋以前文字亦諱此不知何也此書非深識者不達其妙又試以余書求之翰林學士解縉大紳書褚河南工𨽻楷尤為當時所重近世罕見真迹此有以枯樹賦墨本示余殊不足以啓人意見其偽無疑今觀此書筆勢翩翩神爽超越大勝家姪帖諸刻誠可為希世之玩也永樂辛卯春正月庚寅廬陵胡廣觀畢拜手謹識褚遂良字登善善書與虞齊名世南嘗薦之文皇世南死登善獨擅大名當時御府所收右軍真迹贋者相半他人不能識登善輒能辨之至纎悉不爽後遇有所購必經登善審鑒為定及其自書乃獨得右軍微意評者謂其字裏金生行間玉潤變化開闔一本右軍其諸帖中西升經是學黃庭度人經是學洛神陰符學畫像湖州獨孤府君碑越州右軍祠記同州雁塔兩聖教序是其自家之法世傳蘭亭褚本亦與率更不類蓋亦多出自家機軸故也今觀永新文學鄧仲經甫所藏兒寬贊正與蘭亭聖教記諸相似筆意婉美似瘠而腴似柔而剛至于三過三折之妙特加之意誠褚法也後有趙子固及柳道傳黃晉卿揭伯防諸跋尾皆信而可徴柳公謂中間刮去𢎞字為宋國諱信然宋人以𢎞為弘是也𢎞宣祖諱永樂辛卯二月獨山王稱觀畢書于鍾山書舍唐人寫字多用硬黃其次則用槌熟紙蓋韓退之以為生紙緑文為不敏是也烏絲闌唐界墨而細宋人淡墨而理粗此唐界宋界之别惟作方眼格子為對待書則自唐始六朝以前無有也米元章嘗病此蓋一時之宜云稱又識褚河南博雅通識工𨽻楷初師虞永興晚得右軍筆法正書遒徑直班歐虞貞觀中諫議大夫兼起居注文皇嘗問曰朕有不善卿亦記耶對曰守道不如守官職在載筆君舉必書其為人忠直貞諒可知矣觀此書兒寬贊瑶臺青瑣春林綺羅之喻不虛也而剛方正直之氣溢于翰墨之間誠類其為人千載之下其流風餘韻即此可想見矣山東憲使雲間黃汝申出以見示不勝喜幸杜子美詩有云金鐘大鏞在東序冰壺玉磬懸清秋余于褚書亦云汝申其寶之正統四年七月丙辰豫章胡儼謹題此卷舊藏故人鄧宗經所宗經為廬陵永新潛山三縣學官攜以自隨洪武壬午豫獲觀于廬陵永樂丁亥又獲覩于永新是時學士解公赴桂林任余送至彼解公題此卷深欲效河南筆意題畢自謂與平日所書逈異從行有黃生學書于公熟識公字公戲以手掩其名召生試觀問為誰書生錯愕莫能辨因撫掌大噱後五年辛卯春宗經攜至南京寓豫官舍中翰林諸公俱來就望而檢討王公孟陽欣然許題其後且以就望為不足借歸觀之往返數四一日大雨中學士胡公肩輿來索而卷適留孟陽所亟命院吏二人荷氊衫往取留其家二日所題字亦異平日書蓋觀此而有以啓人有新意也今少傅東里楊先生時在春坊以少暇未及觀最後始與宗經攜卷詣其私第值暮秉燭展玩良久會公冗勿果題識宗經嘗闕然于懷宣德乙巳豫至潛山宗經抽此卷欲以遺豫且曰君子不留意于物吾老矣付之得人則於此卷無負矣余辭以素不善書當求善書者付之庶幾不負今年冬余至雲間大參黃公汝申忽出此卷示余自言前此兩月過安慶得之秀才李生生名善嘗從宗經逰豈宗經屬以擇人而授生生知黃公好古博雅而又長于法書故竟以歸乎黃公然則李生亦可謂能知人宗經亦無負于此卷矣展玩之餘俯仰今昔非但河南之墨迹足為寶玩而當時二三君子之餘韻猶可想見因詳著于卷尾正統二年丁巳十一月晦廬陵周忱書于雲間之三陸書院褚臨右軍曲水序世稱天厯蘭亭唐相褚河南臨褉帖白麻墨迹一卷曽入元文宗御府有天厯之寶及宣政紹興諸小璽宋景濓小楷題跋吾鄉張東海先生觀于曹涇楊氏之衍澤樓蓋雲間世家之藏也筆法飛舞神采奕奕可想見右軍真本風流實為希世之寶琅琊王世貞薛稷書真迹悠悠洛邑眇眇伊瀍屢移寒暑頻經嵗年丹壑幾變陵谷俄遷不覩碑碣空悼風煙薛稷為褚河南甥書法似河南三藏聖教序玄宰唐通天進帖模本唐李綽尚書故實云宰相石泉公王方慶進時萬嵗通天二年摹書得在位置失在神氣此直論下技耳觀此帖雲花滿眼奕奕生動并其用墨之意一一備具王氏家風漏泄殆盡是必薛稷鍾紹京諸名手雙鈎填廓所云下真迹一等項庶常家藏古人名迹雖多知無踰此文徴仲髦年作蠅頭跋尤可寶也萬厯壬子董其昌題宋元以來諸跋已刻真賞停雲二帖內珊瑚網卷一
