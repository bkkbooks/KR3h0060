body:
  text: 珊瑚網卷三十九明汪砢玉撰名畫題跋十五文太史倣米氏雲山卷余於畫獨喜二米雲山平生所見南宫特少惟敷文之蹟屢屢見之大要父子無甚相逺余所喜者以能脫略畫家意匠得天然之趣耳元章品題諸家謂皆未離筆墨畦徑晚乃出新意寫林巒間烟雲霧雨隂晴之變自謂髙出古人元暉亦云漢與六朝作山水者不復見於世惟王摩詰古今獨步既自悟丹青妙處觀其筆意但付一笑耳且謂百世之下方有公論又嘗自言遇合作處渾然天成荐為之不復相似其言雖涉誇詡要亦自有所得也余暇日漫寫此卷然人品庸下行筆拙劣不能於二公為役觀者以畦徑求正可發笑耳乙未冬十一月晦徵明書徵仲倣米青緑雲山小幅平村緑樹一溪分百疊晴巒鎖白雲貌得江南烟雨意錯教人唤米敷文徵明樹色猶含雨山容未斂雲草堂閒注目春意正氤氲榖祥雷平春色曉氤氲天外三峰碧玉文為問華陽洞中客可能持寄隴頭雲彭年春水沒漁磯春雲連樹緑葉落在遙山江南雨新足袁聚文待詔自跋關山積雪圖長卷古之髙人逸士往往喜弄筆作山水以自娛然多寫雪景者蓋欲假此以寄其嵗寒明潔之意耳若王摩詰之雪溪圖郭忠恕之雪霽江行李成之萬山飛雪李唐之雪山樓閣閻次平之寒巖積雪趙承㫖之袁安卧雪黃大癡之九峰雪霽王叔明之劍閣圖皆著名今古膾炙人口余皆幸及見之每欲效倣自歉不能下筆曩於戊子冬同履吉寓於楞伽僧舍值飛雪幾尺四顧千峰失翠萬木僵仆乃與履吉索素縑乘興濡毫為圖演作關山積雪一時不能就緒嗣後攜歸或作或輟五易寒暑而成但用筆拙劣雖不能追踪古人之萬一然寄情明潔之意當不自減也因識嵗以歸之嘉靖壬辰冬十月望日衡山文徵明衡山龍門覽勝三月韶華過雨濃暖蒸花氣自溶溶菜畦麥隴青黃接雲岫烟巒紫翠重一片垂楊春水渡兩崖啼鳥夕陽松晚風吹酒藍輿倦忽聽天平寺裏鐘偶與九逵先生談天平龍門之勝為寫小景并書近詩請教庚寅四月草又一日徵明記治平山寺圖遙遙治平寺乃在楞伽麓之子神情秀空山裹雲宿月冷石牀清孤眠豈能熟還持一束書起傍梅花讀燈昏夜參半饑鼠鳴古屋凄風西北來吹墮簷間木感此霜露繁坐覺芳華促少壯曾幾時嵗晏在空谷念此隔重城何能慰幽獨𤣥隂失昏旦朔吹號枯株懷君别未久奄忽嵗云徂空庭飄微霰慘淡集饑烏城郭黯以凄況復空村居空村白日短寒雲晴郊墟青山不為容黃葉繞精廬遙知松窗下時披古人書古人不可見願言掇其腴誰令事干祿雕鎔失其初嗟豫亦喪志與子同厥趨豈不懷逺業均受貧賤驅朱門富華屋長途有髙車寧知饑寒士一饑不願餘栖栖斥鷃翔豈與鴻鵠俱何當長風發共奮青雲衢履仁久留治平嵗暮有懷題此奉寄正德乙亥十二月五日徵明題石湖圖與陸子靜春盡南湖水拍空扁舟如坐畫圖中催詩忽送雲頭雨吹面時來柳外風人與青山原有約興隨流水去無窮自家不是陶元亮一笑應慚對逺公平生幽興碧雲深老去閒身縱壑人喜共白公修洛社何如逸少在山隂夕陽鐘梵烟藏寺修竹人家水繞林滿目溪山琴趣在底須絃上覔知音徵明又石湖圖并詞晚涼斜倚赤闌橋天逺白烟消酒醒顧見花間影浮雲散月在林梢野火青山隱隱漁歌緑水迢迢昔年曽此醉清宵共艤木蘭橈白頭重踏行春路同遊客半已難招靜山髙月小玉人何處吹蕭右調風入松并石湖圖夏月望日徵明寫丹泉草堂圖聞說仙人葛稚川丹成仙去已千年白雲渺渺都無蹟碧竇涓涓尚有泉秋老山空寒浸月草香沙暖玉生烟林堂俯仰成今古總屬風流顧彥先衡山徵明為清甫畫并題仙嶺媚春華浮泉雜綺霞雲中回碧草天上泛桃花流蔽金堂宅源成玉女家容成如可揖緑盞酌丹砂五嶽山人黃省曾殊不成字但盛名之下耳白描老子像後楷書清淨經及老子傳病困無聊寫此奉闕山煉師永充福濟觀常住一笑置之徵明頓首猶龍公道邈𤣥言吾夫子以為不可測識者而徵仲先生以筆墨追之幾得影響此不復當以藝事目矣必焚登流眉香一銖乃可開卷壬戌十二月李日華敬題袁安卧雪圖時為曹瞻明得此畫於項𤣥度因以見示趙松雪為袁道甫作卧雪圖老屋疏林意象蕭然自謂頗盡其能事而龔子敬題其後乃以不畫芭蕉為缺事余為袁君與之臨此遂於牆角著敗蕉似有生意又益以崇山峻嶺蒼松茂林庶以見孤髙拔俗之藴故不嫌於贅也壬寅六月二十日徵明識桐隂髙士圖舊畫重題二十年碧梧秋色尚依然而今㸃染渾忘却老去聰明不及前子寅自南都持余舊作桐隂髙士圖觀之蓋有年矣可見嵗月易增筆力易減較之於今大不如前為之悵然因題一過己巳春徵明記清賞凝霞四十年斷痕殘墨尚依然不堪香死人琴後秋色徒供韻石前先子英年得此畫每躍然稱快後義興吳二甫以白鏹一鎰求易先子笑却之余年來蹇遭多故書畫鼎彞幾不復存而此獨固守亦欲後之念今猶今之念昔也因和原韻一絶崇禎戊辰改元七夕立秋日懷日子砢玉記聽玉圖虛齊坐深寂涼聲送清美雜佩搖天風孤琴寫流水尋聲自何來蒼竿在庭圯冷然如有聲應耳相諾唯竹聲良已佳吾耳亦清矣誰云聲在竹要識聽由己人清比修竹竹瘦比君子聲入心自通一物聊彼此傍人漫求聲已在無聲裏不然吾自吾竹亦自竹耳雖日與竹居終然藐千里請看太始音豈入箏琶耳里中契家生文徵明為二郡程文畫并詩曹友瞻明初好古時即以此畫質先荆翁翁鑒賞不已後真贋莫别每來印正因憶當年髙君明水未第弱冠時與翁相叙書畫好玩滿前質疑問難常連宵纍夕彼後賢之繼起安知宗法所在乎為之撫卷三嘆戊辰長至日砢玉記竹居二大字為陳白陽書文太史作圖珍重閒情在竹間幽居深鎖碧琅玕清風自解絶塵土髙節還堪托嵗寒門掩夕陽容竟造詩成春雨倩誰刋已知胸次清虛甚莫作尋常肉食看徵明猗猗緑竹秩秩華榱翠文洞疏秀翳階壝白日潜照清風時披淡然幽獨君子之居葆生文伯仁種竹隨清况幽居逺俗氛誰知豹閹客能愛鳯團雲晚徑浮清月秋窗映緑濆王猷千載興瀟灑出人羣漳餘嶽岱東伯修竹堂開粵水潯野情蕭散一抽簪清秋卧聽瀟湘雨白日行歌翡翠林颯㳫時聞金玉奏孤髙猶見嵗寒心主人自是逃虛者披閲黃庭坐茂隂吳趨許閏右竹居卷皆吳中一時聞人為海寧王君作者王君不詳為何人觀其絹素精好交無雜賓亦可尚已不知何緣流落京師震川先生得之先生雅好種竹而亦姓王亦可以為竒矣偶攜過敝寓因嘆物之得其所歸而卷中諸人震川所交幾半時一展玩殆若為震川而設者題此以記嵗月蓋自戊子至今已三十九年又不勝存殁之感於諸公也嘉靖丙寅秋七月三橋文彭書萬厯庚辰四月晦日觀於耆英堂之東偏展玩數四不能去手卷中諸名士惟徐君猶在而先兄亦仙遊八年矣因題於後以識感茂苑文嘉書卷有汝南黃省曽撰竹居賦云海寧王侯雅崇經術其居羅以修竹五嶽山人聞而賦之詩有安陽杜璠吳下王穀祥澱峯徐𤣥度民則陽抱山人陸芝洞庭徐麟俱未及録樂卿記秋林泉石長松落髙䕃平臯出石罅修梁不通塵幽人寄容暇散柔搖竒情倐在疏林下萬木疊遙岑晴湖自天瀉何處得秋多凌空有虛榭文壁玉蘭圖綽約新妝玉有輝素娥千隊雪成圍要知姑射真仙子欣見霓裳試羽衣影落空階初月冷香生别院晚風微玉環飛燕元相敵笑比江梅不恨肥奕葉靈葩别種芳似舒還斂玉房房仙翹映月瑤臺迥素腕披風縞袂長拭面何郎疑傅粉前身韓壽有餘香夜深香霧空濛處髣佛羣姬解佩璫嘉靖辛亥二月八日訪補菴郎中適庭中玉蘭盛開連日賞玩感而賦此并系以圖長洲文徵明澤蘭圖草堂安得有琳琅傍案猗蘭奕葉光千里故人來解佩一窗幽意自生香夢回涼月甌江逺思入風雲楚畹長漸見不聞餘馥在始知身境兩相忘近承友人寄贈溫蘭秋來著花甚盛因作此詩謝之適張辨之以蘭卷相示既為補空録此詩於上文璧湘波平楚岫青美人羅袂障風橫光風綰作騷人佩還帶三閭一卷經允明秋日辨之攜此卷索余畫見吾文師墨戲不敢援筆敬書數語歸之丁卯陳淳謹識楷書一回展卷懷千古無數青峰近可招旅雁北征雲慘淡漁舟南下水迢遙蒼梧帝子魂應斷空谷佳人恨未消憔悴誰知吟澤畔欲傾緑醑慰無聊黃雲别來芳迹杳難尋千里相知契結深漢館月明幽客夢楚江秋盡美人心含風嫋嫋香生佩隔水悠悠思入琴百卉無情自春迹不堪於此易沾巾余嘗題文衡山墨蘭寄友人今為辨之録此時癸酉嵗九月十八日在松陵舟中書湖光月色相映且與衡山方别其情不言可知也陳沂飛雲石後有銘正德初海虞錢氏齊中獲覯此石上鏤飛雲二字筆法流動雖愛之未知所自㑹石田先生適至云此為倪元鎮所寶久在清祕閣中元鎮逝吳時猶攜以自隨後以贈所知遂為錢氏所有吾鄉毛九疇博雅好古乃從錢氏購歸復索余作圖以便展對云徴明經年不見九逵一日獨行溪上忽爾懷思輒賦短韻并系小圖奉寄簷樹扶疏帶亂鴉蕭亝只似野人家紙窗獵獵風生竹土盎浮浮火宿茶日色射雲時㺯采雨絲吹雪不成花庭中卉物雕零盡獨有蒼松領嵗華嘉靖二十有七年七月十日徵明書宛轉橫岡帶逺岑梅花燦燦竹深深人家盡住蒼雲塢拄杖時穿玉雪林風壑聲傳千澗雨曉山青落半湖隂剛憐珂里城闉隔經嵗不聞車馬音薄雲籠月夜微茫十里松蘿一徑長草澗伏流時送響野梅藏雪暗吹香冥烟突兀蒼山色逺火依稀破壁光十五年前舊遊路重來蹤蹟已都忘萬頃玻璃帶曲隈眼中圖畫自天開春風爛漫難忘酒落日登臨更有臺百疊蒼螺湖上島千林香雪崦邊梅故人何在空馳想縹眇峰頭獨自來癸卯十月同履學文學遊洞庭西山歸而圖此以記興云徵明一雨垂垂春欲徂弱雲狼藉草紛敷池塘水滿魚爭躍竹徑泥深鳥亂呼暝色排簷失昏旦涼聲入枕夢江湖山亝十日經過斷榻得南宫水墨圖戊午新夏雨窗戲墨并題徵明千巖萬壑圖尺素俄驚已數年秀巖流壑始依然感君意趣猶如昔顧我聰明不及前萬壑潺湲知水競千巖青翠為山妍詩中真境何容盡聊畢當年未了緣千巖競秀萬壑爭流乃余為子傳而作也子傳與豫相友善每有所往必方舟相與乘閒出此絹索豫圖數筆興闌則止如是者凡十有三年始克告成因系之以詩嘉靖己酉八月徵明烹茶圖嫩湯自愛魚生眼新茗還誇翠展旗穀雨江南佳節近惠山泉下小船歸山人紗帽籠頭處禪榻風花繞鬢飛酒客不通塵夢醒卧看春日下松扉文太史自題諸畫俱七言律東風吹春著幽谷宿雨浮烟樹新沐斜橋曲徑帶流泉白日疏籬䕃濃緑晴江隔世不隔山百疊蒼螺滿茒屋輸却長吟抱膝人鎮日臨磯弄晴緑正德丙子春三月徴明為啓之文學寫并題郭外青烟栁帶柔洞庭西去水悠悠故人不見沙棠楫燕子齊飛杜若洲日落晚風吹宿酒天寒江草喚新愁佳期寂寞春如許孤負山花插滿頭霜柯天矯蒼龍精霜根蝕雨莓苔青幽人睡起日亭午坐看涼影流空庭心閒無營靜於洗有時清風落書几試拈秃筆寫雲林一片秋光生眼底辛亥六月七日戲筆長洲徴明玲瓏蒼壁太湖姿浪蝕沙淘面面竒百穴晴窗通玉女一拳小石夢仇池乍逢合下南宫拜欲詠還輸白傅詞便擬髙齊題列岫朝來秀色滿簷帷右題古石圖徴明文徴仲雲峰石室圖欵云文璧題贈擊壤先生疏樹宿殘雨斷雲開亂山幽人住何處相憶有無閒此先君四十以前筆也雲峰石色縱橫參於造化非他人可能萬厯八年五月二十七日仲子嘉識徴仲自題山水凡三幅各一絶雲開逺島明木落秋江冷斜日下漁梁照見獨行影雨過山突兀秋清樹陸離閒情誰領略溪上有苑茨雨晴山逺近秋老樹參差小橋獨眺處斜陽總是詩又落木寒泉北風入空山古木翠蛟舞何處鳴天球寒泉灑飛雨又寫竹古木蒼龍影修篁碧玉枝相看兩不厭同保嵗寒姿橫塘詩意百疊春雲百疊山杏花三月雨班班分明記得橫塘路一葉輕舟載雨還正德庚午春仲坐雨停雲館題畫文璧花光惠崇喜用王洽潑墨法寫湘西山水極有神韻二米實祖迹之非創作也衡山公此卷蒼秀婉逸直追二衲不入南宫廡下詩筆以涪翁手腕鼓國初髙徐口頰俱可紫雪此畫并倣燕穆之山水卷余得之梁溪華氏李翁九疑過而見之鑒賞不去口因題其後云玉水倣燕穆之山水卷後有王雅宜行草長幅文徵仲先生繪事從宋入李營丘燕穆之方幅小景輒具百里之變貴於几端卷舒而遊趣足也此作是其倣燕者王履吉古詩行草楚楚秀逸若來與畫競爽真雙璧也春寒無事從玉水假過恣玩旬日意獨未飽㑹玉水治入燕裝促歸囊中系此李日華倣李唐滄浪濯足飛泉百丈晝生寒古樹蒼苔過雨班何似山人多道味洗心濯足自躋攀徵明盤空石壁雲難度古木蒼藤不計年最是碧山猿嘯處一條飛瀑破晴烟蔡羽百丈飛泉灑面涼桃花片片㵼滄浪道人白足元無垢自愛空山日月長王寵倣董北苑山水青山隱隱水漪漪映樹蘭舟晚更移一縷茶烟衝宿鷺無人知是陸天隨倣趙文敏滄浪濯足著色絹上楷書題欵溪上青松秀色開溪頭新水緑於苔偶然濯足臨溪上矗矗芙蓉倒影來為書記王澄甫所藏垂老食貧因以畫易余米玉水記越來溪上雨初收茶磨山前爛漫遊斜日正臨芳草渡飛花故㸃木蘭舟此倣松雪青緑小幅千里相思一旦逢半生心事此宵同話深不覺頻移席露下庭柯月滿空徵明為參孫作文徵仲畫大類趙承㫖第微尖利耳同能不如獨勝無取絶肖似所謂魯男子學柳下惠其昌題倣倪迂山林二幅各自題山寒有古意木落見清真不見倪迂叟誰能繼後塵遙山過雨翠微茫疏樹離離掛夕陽飛盡晚霞人寂寂虛亭無賴領秋光戊午四月既望倣雲林子筆徵明時年八十有九燕山春景燕山二月已春酣宫柳霏微水映藍屋角疏花紅自好相看終不是江南甲申晦日鄭正叔偶訪小亝坐語家山風物寫此寄意徵明古木幽居圖古木隂隂山徑回雨深門巷長蒼苔不嫌寂寞無車馬時有幽人問字來雨中承克承過訪山房寫此奉贈癸卯六月二日徵明古木髙逸圖文璧欵春風著柳弄鵝黃宿雨膏原細草香莫怪幽人坐忘去逺山偏自稱斜陽余又有泉石髙閒圖欵云嘉靖壬子九月既望徵明寫時年八十有三碧梧髙士圖漠漠疏桐灑面涼濺濺寒玉潄回塘馬蹄不到清隂寂始覺空山白日長孔周經時不見因想髙勝居然在懷因寫碧梧髙士圖并小詩寄意徵明河梁話别圖泣别河梁恨未銷歸心惻惻渾天遙李陵若論興亡事誰識蘇卿是久要徵明落盡旄頭信義全剛腸幾度茹羊羶雁書不與蘇卿便啼血東歸化杜鵑右題蘇武别李陵圖崑山黃雲鐵石心寧隨境改君臣義自與天通忠懷慷慨操窮節一任時窮道不窮琅琊王世貞明皇夜遊圖隔花雕輦度輕雷御酒初𫝊鳯管催别敕梨園千妓女月中齊唱紫雲回昭君圖琵琶彈淚翠眉顰白草黃花暗塞塵幾度穹廬明月夜夢魂猶憶漢宫春卷後有尤鳯丘按傳布景更艷異奪目國潤識洛神圖掛幅先內翰畫洛神倣龍眠居士筆嘉靖庚辰年作也至萬厯甲戌秋補書賦於上仲子嘉文徵仲白描宓妃雅得神光離合之趣而休承書亦儀靜體閒洵稱合作繡水汪氏鑒藏文太史自題山水諸幅俱七言絶三月江南欲暮春緑隂照水玉𥻘𥻘自憐身在奔馳地空羡苑亭共坐人春幅斜橋曲徑帶流水疏樹平臯䕃濃緑輸却長吟抱膝人鎮日臨磯弄寒玉夏幅髙樹扶疏弄夕暉秋光欲上野人衣尋行覔得空山句獨繞溪橋看竹歸秋幅雲樹埋踪鳥絶飛空江蓑笠弄寒絲良工妙得竹中趣故寫愚溪獨釣詩冬幅山中習靜避紅塵朝夕惟於木石親昨日渡頭春忽到東風緑水又𥻘𥻘萬樹千花盡放春逺峰個個玉嶙峋溪南䇿杖來遊者不是山隂雪後人曉山經雨洗青螺春水連天漾碧波此景此時誰㑹得扁舟行處賞心多水繞山回石路深幽懷都付膝前琴春來多謝垂楊柳分得溪亭半榻隂青山隱隱遮書屋緑樹隂隂覆釣船好似江南春欲暮嫩寒微雨落花天狼藉春風花事休凄涼啼鴂景深幽空山雨過人蹤少寂寂孤村水自流玉虹千丈落潺湲石壁巖巖擁翠鬟料得兩翁勞應接耳中流水眼中山小樓終日雨潺潺坐見城西雨裏山獨放扁舟湖上去空濛烟嶼有無間倪迂筆法類荆關㸃染烟巒杳靄間我亦年來有迂癖時時閒寫郭西山平生最愛雲林子能寫江南雨後山我亦雨中聊㸃染隔江山色有無間一作休承詩隔江為疏林一重山崦一重溪猶有人家住水西行過小橋回首望焙茶烟上午雞啼桐花半落東風軟山雨全收白晝長寂寂溪亭人不到鴨頭春漲緑波香亭下林隂掃不開庭前山色翠成堆日長自有讀書趣何用紛紛車馬來髙樹隂隂翠蓋長雨餘新水漲回塘何人得似山中叟對語溪頭五月涼嘉靖庚子仲夏望日寫於玉蘭堂徵明城居六月馬蹄忙日射流塵四散黃誰似溪山開草閣四簷風雨一窗涼松隂寂寂清於水草色茸茸軟似裀六月城居如坐甑水邊輸與納涼人隂隂灌木壓虛簷六月林亭意爽然百疊烟霞開絶壑一窗風雨聽飛泉隂隂夏木水平溪黃鳥飛來不住啼南畝已耕心緒靜看山斜倚曲闌西積雨初收消夏灣緑蘿吹雪覆潺湲何當湖上垂雙足俯看清流仰看山髙林雨過白烟生風動疏隂漏日明午困欲眠書在手紫薇花底拂桃笙潭潭虛閣帶灣崎山木蒼蒼結夏幃最是晚涼詩思就滿窗晴瀑雨飛飛長林結暝晝生寒坐愛虛亭帶淺灘吟就夕陽詩未就碧雲千疊上欄杆雨晴飛瀑寫潺湲地拔蒼松生晝寒詩思攪人眠不得起臨虛閣弄漁竿斜陽曲徑帶流水疏樹平臯䕃濃緑輸却長吟抱膝翁鎮日臨流弄寒玉草堂斜覆松隂底窗外青山雲外水扁舟何處未歸來無數沙鷗落前渚草堂無用設籬門賸有清隂隔世塵一路溪山歸路永斜陽照見獨行人雲罨遙空露碧巔涼聲風激半空泉憶曽倚醉包山下萬木圍簷聽雨眠茗杯書卷意蕭然燈火微明夜未眠竹樹雨收殘月出清聲涼影滿窗前風激飛藤葉亂流寒沙渺渺水悠悠碧烟半嶺斜陽淡滿目青山一片秋清溪汩汩帶遙灘過雨青山落照間三里漁梁歸路近竹西茒屋未曾關過荆溪舟中貽友謖謖松風灝碧川髙人蹤跡在漁船一痕斜日青山外萬頃晴波白鳥前蒼松落落帶滄灣秋在丹楓夕照間料得詩翁勞應接耳中流水眼中山與前首有異蒼山隱隱樹重重苑屋秋驚半落楓願我知音成逺訪蹇驢不憚路西東漠漠空江水見沙寒原日落樹交加幽人索莫詩難就停棹閒看繞樹鴉小蹇衝風引步遲忍寒偏稱覔新詩箇中别有難言處只許當年鄭五知小蹇衝風引步遲風融觸眼總新詩千山圍玉天開畫此意惟應鄭五知又雪景一幅詩句前後相同密樹緣山凍不分天垂暮色轉氤氲山童貰酒歸何處雪壓茒簷有隱君城中塵土三千文何似兩翁麋鹿蹤隔浦秋山供一笑離離自映夕陽紅扁舟自有江湖興眼底何人得此閒我亦世間求靜者久攖塵夢負青山倚空石壁開蒼雪映水髙柯舞翠蛟記取江南竒絶處石湖西畔獨平橈雨歇風清棹一橫微吟自愛晚湖平夕陽西下山千疊木落空山生逺情此先待詔小筆仲子既為鑒定復書此詩甲戌七月嘉識文衡山自題花鳥四幀錦雲零落楚江空翡翠翎邊夕照紅愁絶蘭橈烟水外秋香吹老一灘風蓮房翠禽習習春風上苑回一枝先傍曲江開莫嫌花氣能薰客自有鶯聲喚醒來杏花黃鸝叢叢花色映霞妝西域移來種自芳幽賞不知春已去尚聞野雀噪斜陽薔薇麻雀絶艷清芬名自竒相看總是嵗寒姿山禽應惜栖能穩兩兩飛來借一枝茶梅雙禽杏花雙鳩圖余得之髙明水後為姚汝為易去别院花飛雨乍晴暖風吹日困人情不知春色來多少試聽雙栖好鳥聲雖著色而㸃綴如生神品也小院秋葵圖菊棠荏苒紫羅裏秋日溶溶小院東零落萬紅炎景盡獨垂舞袖向西風徵明畫栗玉姿偏瑩鵝黃色未深已誇能衛足復道解傾心穀祥緑剪參差帶丹傾子細霞一番秋色起髙日映葵花顧聞又自題寫生諸幅雪片經春猶未消一庭寒玉逗清宵無端幽夢尋芳信香艷紛披意自嬌畫梅淵明老去不憂貧醉擷金莖滿意春却笑微花何幸㑹至今珍重為斯人墨菊透紙離離見墨花細香團玉見霜華江南五月炎無奈别有涼風屬畫家又未論搖月堪為佩若使凌波直欲仙香夢攪人眠不得為君親賦返魂篇徵明畫水仙并詩一片行雲隨碧波幻成玉質映江沱天風乍拂河津帶明月將搖溪上珂師道題葉颭東風翠帶斜白雲根底茁紅芽山中誰得稱君子滿地無名野草花寫蘭纎纎小雨作輕寒最好疏篁帶雨看正是美人無俗韻清風徐灑碧琅玕雨中祿之攜松雪畫蘭竹過訪即為作此徵明時年八十有一淡墨淋漓粉節香清風髣佛見瀟湘一般紅杏沾恩澤别有濃隂蓋草堂竹枝白石巖巖封翠苔喬柯落落委茫萊旁人莫作支離看猶是明堂有用材古木故里讀書圖一作還家志喜緑樹成隂徑有苔園廬無恙客歸來清朝自是容疏懶明主何曽棄不才井壑豈無投老地烟霞常護讀書臺石湖東畔橫塘路多少山花待我開徵明春田白社圖悠然白髮對青山輕健懸車十載前時㑹故人修白社不忘初業課春田老翁自是先朝舊遺愛猶為逺郡𫝊莫為有才施不盡只將閒散博長年西齊話舊圖木葉蕭蕭夜有霜清言欵欵酒盈觴碧窗重剪西風燭白髮還聫舊雨牀秋水不嫌交誼淡寒更何似故情長不堪又作明朝别次第鄰雞過短牆嘉靖甲午臘月四日訪從龍先生留宿西齊時與從龍别久秉燭話舊不覺漏下四十刻賦此寄情并系小圖如此徵明陸五湖題衡山畫溪流添水急樹色著寒深雨歇雲歸壑微茫見逺岑又院落溶溶夜色微月華偏與淨妝宜難明緑樹枝頭雪且續梅花夢裏詩師道彭孔嘉題衡山秋林獨釣圖策策霜林映水丹重重雲岫鎖輕寒西風斜日空江暮無限秋光屬釣竿彭年周公瑕題徵仲畫逺樹汀洲陳勢分風嘹月唳不堪聞扁舟多少天涯客腸斷鄉關又夕曛天球李君實題老文壽山福海圖重青緑山水大幅題時為余壽人一抹拖藍泰岱東虬枝拂斗掛桑弓銀河帶繞三三曲蓮嶺冠攢六六峰功業濟時膚寸雨文華蓋代駕梁虹海山秀色應無限攬取岡陵祝上公日華祝京兆允明題畫余有枝山義犬記即圖其狀殊肖故知書畫合一也吟詩寫畫似參禪不向他人被裏眠生公堂前㸃頭石天平山上白雲泉秋浸巨區天地寒老崖垂腳怒龍蟠仙人夜半騎龍去木客潜窺古竈丹雲母薄梳青石髮水花肥㸃碧荷錢樹根一坐雲山老不許時人問嵗年寒光交逗眼蒼然半夜人間别有天想得非仙亦非鬼四山風雨擁孤眠枝山題仙女圖阿房宫裏傾城質太華峰頭出世身澗草巖花為服食山雲水月是精神相逢記得同遊日一笑不知何處春却為龜臺侍下許東華還有女仙人六如居士題周東村畫鯉魚風急繫輕舟兩岸寒山宿雨收一抹斜陽歸雁盡白蘋紅蓼野塘秋唐寅題周舜卿繪事余有竹溪秋色寒林讀易濠樂等圖溪山淹潤草木華滋人物閒雅生色殆入宋人之室但俱乏題語不似勝國以來諸名碩王肯堂曰唐子畏畫多周臣筆要在巨眼别之子畏師周臣而青於藍雅俗之别也或問周畫何以俗曰祇少得唐生數卷書耳是論覺太過焉王伯穀云東村畫山水人物峽深嵐厚古面竒妝蒼蒼之色一時稱為作者若夫蕭寂之風逺淡之趣非其所諳斯言也庶乎近之天啓丁卯冬有芒氏樂卿父雪窗漫筆十畝芳園帶野堂白頭兄弟喜相將池塘入夢生春草風雨淹情接夜牀並集原鴒如有戀交花荆樹正吹香百年樂事真堪羡為賦斯干第一章大參正齊先生與其弟國聲友愛甚篤家有二宜園頗極游觀之勝余為作圖併係拙句如右嘉靖庚寅正月既望文徵明識珊瑚網卷三十九
