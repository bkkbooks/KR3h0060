body:
  text: 珊瑚網卷三十三明汪砢玉撰名畫題䟦九呉仲圭草亭詩意依村構草亭端方意匠宏林深禽鳥樂塵逺竹松清泉石俱延賞琴書悦性情何當謝凢近任適慰平生至正七年丁亥冬十月為元澤戲作草亭詩意梅沙彌書我友梅花翁巨老傳心印修此水墨縁種種得蒼潤樹石墮筆峰造化不能吝而今橡林下我願執掃汛後學沈周梅老秋江獨釣圖空山灌木參天長野水溪橋一徑開獨把釣竿箕踞坐白雲飛去復飛來倪輔秋落寒潭水更清釣竿裊裊一絲輕斜風細雨誰相問破帽青鞋却有情長沙李東陽楓葉蘆花送晚晴三江秋氣逼青㝠相看自信鱸魚美不為羊裘是客星沈周南山舊宅早來歸紅葉蒼松白石磯今日釣魚真取適海鷗還訝未忘機姚綬書於水竹邨策策霜林映水丹重重雲岫鏁輕寒西風斜日空江暮無限秋光屬釣竿匏菴呉寛木落秋容澹江空水氣寒長安有麈土不上釣魚竿龍池彭年梅道人臨荆浩漁父圖與六硯齋三刻大異洞庭湖上晚風生風觸湖心一葉横蘭棹穩草衣輕只釣鱸魚不釣名重整絲綸欲棹船江頭新月正明圓酒缾倒岸花懸抛却漁竿和月眠殘陽浦裏漾漁船青草湖中欲暮天看白鳥下平川㸃破瀟湘萬里烟如何小小作絲綸祇向湖中養一身任公子爾何人枉釣如山截海鱗極浦遥看兩岸斜碧波㣲影弄晴霞孤舟小去無涯那個汀洲不是家雪色髭鬚一老翁欲將短棹發長空㣲有雨正無風宜在五湖烟雨中緑楊灣裏夕陽㣲萬里霞光浸落暉擊楫去未能歸驚起沙鷗撲鹿飛月移山影照漁船船載山行月在前山突兀月嬋娟一曲漁歌山月邊無船風攪長江浪攪風魚龍混雜一川中藏深浦擊長松直待雲收月在空舴艋為舟力幾夕夕江頭雲雨半相和殷勤好下長波半夜潮生不那何殘霞返照四山明雲起雲收隂復晴風脚動浪頭生聽取虛篷夜雨聲無端垂釣空潭心魚大船輕力不任憂傾倒繫浮沉事事從輕不要深釣得鮮鱗拽水開緑萍漾漾逐鈎來摇頳尾噞紅腮不羡嚴陵坐釣臺五陵風光絶四鄰滿川鳬鴈是交親雲觸岸浪摇身青草烟深不見人舴艋舟人無姓名葫蘆提酒樂生平香稻飯滑蓴羮掉月穿雲任性情桃花浪起五湖春一葉隨風萬里身釣絲細香餌匀元來不是取魚人余昔喜關仝山水清勁可愛原其所以出于荆浩筆法後見荆浩畫唐人漁父圖有如此製作遂倣而為一軸流散而去今復見之乃知物有㑹遇時也一日維中持此卷來命識之吁昔之畫今之題殆十餘年矣流光易邁悲夫至正十二年壬辰九月廿一日梅花道人書於武塘慈雲之僧舍漁父圖一卷唐帽者六人一坦腹伸一足坐手撫枻而不釣一立而望家欲歸一横置枻手據船坐而回顧一俯睡倉口而身在内一睡方起出半體篷下一坐釣而丫角者操枻在尾冠者五人坦而仰視忘所事者卧而高枕篷忩洞開者不釣而䄂手坐者坐而釣或釣而跪者􅀈頭而力不勝魚撑兩足掀髯收釣者一人危坐而拽欲急歸者一人露髻而抱栧坐睡待月而後歸者一人笠而拽且髯胡者一人人自為舟獨一舟為操者焉人為志和詞一凢十六首一首注其旁曰無船吁非無船也崖樹掩之耳此梅華菴所畫詞亦其所自填非誠有其人使誠有之而詞句則一手出何耶世亦烏有若是之聚而漁皆志和之能言也耶此卷當載之滄江主人舟古稱非梅沙彌不能畫非丹丘主人不能有畫中意詞中景也卞民部誦坡仙客未佳之句正桐邨牧不在坐耳牧自謂狂不減志和丹邱以為何如立秋後八日桐邨周鼎客雲東書時年七十有七後有老友張萱䟦又江榮卞榮䟦余昔于戴上舍敬雩所得覩一卷景物與此正合題云姚丹丘臨梅沙彌滄洲漁舫烟波浩淼之趣常在夢中葢三十年所矣今得沙彌此卷又云倣荆浩筆而荆浩亦得自唐人乃知繪事惟創意之難如其成就今古相師所不諱也唐人重摩詰輞川皆乞本傳冩士大夫家有一本惟元人貴氣韻而輕位置以為一臨倣即共生動耳姚御史名綬别號丹丘子吾郡魏塘人半生雲水烟林不為圭組所困吾師也有一舟名滄江虹月故周伯器䟦中及之對此不能不憶姚臨為之三嘆竹懶日華梅花道人畫都倣巨然此又自稱師荆浩葢畫家醞釀顧無所不能與古人為敵乃成名家也其昌梅道人家武塘摹漁翁烟波景色如笠澤叢書又以荆巨筆力出之遂成大卷就中似有張志和輩呼之不得得此便可共逃名於菰蘆之間不復呼漁丈人矣陳繼儒梅花翁山水止見二幅在絹素上其一題云奉為太無錬師觀静堂作墨戲四幅永為青雲山中傳諸不朽云至正五年乙酉嵗冬十月梅花道人題又水竹山居圖結茅山隂溪之曲最愛軒忩對修竹四時謖謖動清風三逕蕭蕭寒玉也知一日不可無彼且惡乎免塵俗夜深飛夢繞湘江廿五清溪秋水緑梅道人戲作水竹山居至正戊子又水墨梅松蘭竹四友圖在紙上長卷共五段至正六年冬至日來見古泉出此卷俾畫梅花一枝以續嵗寒相對之意也梅花老戲墨此叚想後補入故年月在後耳研池漠漠墨吐汁蒼髯呼風山鬼泣濤聲破夢鐡骨冷露影漙空翠毛濕徂徠百畆老雲烟湖山九里甘蕭瑟何當置此明忩前長對詩人弄寒碧古泉講師索晝松遂書此塞請也梅花道人戲墨野竹野竹絶可喜枝葉扶疎有真態生平素守逺荆榛走壁懸崖穿石罅虛心抱節山之阿清風白月聊婆娑寒梢千尺將如何渭川淇澳風烟多至正五年乙酉嵗冬十月四日梅花道人為古泉老師戲作野竹於橡林舊隱夢復忩下舶䑲風下東呉舟桮土移入漳泉秋初疑紫筳横翠鳯恍如緑綬縈青虬猗猗九畹易消歇奕奕百畆多淹留軒忩相逢與一笑交結三友成風流梅道人戲墨題蘭與可畫竹不見竹東坡作詩忘此詩高麗老繭氷雪古戲成嵗寒巖壑姿紛紛蒼雪落碧篠謖謖好風扶舊枝狰獰頭角易變化細聽夜深雷雨時梅花道人㳺戲墨池間僅五十年技止於此古泉老師每以紙索作墨戲勉而為之一日出此卷囑之欲補於後以供清玩遂作以補之古泉呼童汲幽瀾泉㵸鳳髓茶延之于明碧軒焚香對坐終日略無半㸃俗塵涴人聊書此以識嵗月也至正五年冬十月四日梅花道人書嘉禾呉鎮仲圭書畫記白文印梅花菴朱文印章梅沙彌竹譜卷詩重前題欵異文可畫竹不見竹東坡作詩忘此詩高麗老繭氷雪冷戲冩嵗寒巖壑姿紛紛着雪荷碧篠謖謖好風扶舊枝試聽雷雨虛堂夜㧞地起作蒼虬飛梅道人為可行作竹譜時暮春三月憇於醉李春波之客舍因抽架頭之紙隨筆為此數竿雖出一時興緒亦自有天趣可行㳺研池乆矣日來筆力想亦健矣他時觀此拙作亦可𤼵笑而已以竹譜言之則吾豈敢至正十年春三月杜鵑花發梅道人頓首可行以為何如嘉靖三十六年春既望墨林項元汴得于呉門文氏又自題竹卷墨竹位置如畫竹幹節枝葉四者若不由規矩徒費工夫終不能成畫濡墨有深淺下筆有輕重逆順徃來須知去就濃淡粗細便見榮枯仍要葉葉着枝枝枝着節山谷云生枝不應節亂葉無所歸使筆筆有生意靣靣得自然四向團圞葉枝活動方為成竹古今作者雖多得其門者或寡不失於簡畧必失之于繁雜或根幹頗佳則枝葉謬誤或位置稍當而向背多乖方或葉似刀截或身如板束粗俗狼籍不可勝言其間縱有稍異常流僅能盡美於盡善良恐未暇獨文湖州挺天縱之才比生知之聖筆如神助妙合天成馳騁於法度之中逍遥於塵垢之外從心所欲不踰凖繩故余一依其法布列成圖庶幾後之學者不隱於俗惡云梅道人筆後四叚各有詩一首菲菲桃李花竟向春前開何如此君子四時清風來晴霏光煜煜曉日影曈曈為問東華塵何如北忩風亭亭月下隂挺挺霜中節寂寂空山深不改四時葉落落不對俗娟娟净無塵𬗟懐湘渭中嵗寒時相親為松巖和上竹卷後惠鑑䟦六硯齋三筆僅載數語呉仲圭墨竹初學文湖州運筆雖熟而野氣終不化此軸為松巖神師所作巖之族孫宏宗藏主請題予與仲圭松巖皆故人也天㳺既乆覧此不能無慨然宗雖族孫生苦晚而不及見今寳此軸其能永恩者歟繫之以詩懐人幾度詠淇詩空向琅玕節下題想見百年承雨露綿綿䕃到子孫枝湛然静者惠鑑又水石竹枝幅野色入高秋寒影逝湘水日午晩風涼清風為誰起梅道人晚興佳哉此幅余得之青浦曹氏後以易高明水乳窑紙槌瓶歴崇禎戊辰秋見石刻仲圭墨竹八紙為李氏鍳藏而此其一焉因憶昔年尚有梅沙彌推蓬竹亦為先荆翁易呉益之漢玉麻姑仙并去黄鶴山樵雙筍圖每開簾風動追憶恍然今崇禎壬午秋得梅花老人翠竹黄華真蹟覺頓還舊觀凌翠漫士汪砢玉梅花菴主自題墨竹翠羽風前葉秋聲雨一枝詩題春粉節棚脱玉嬰兒忽見不是畫近聽疑有聲落落不對俗娟娟净無塵吾以墨為戲畨因墨作奴當年若莽鹵何處役潛夫色經寒不動聲與静相宜只為嵗寒心似鐡也宜烟雨又宜晴我亦有亭深竹裏也思歸去聽秋聲以上自題隂涼生硯池葉葉秋可數京華客夢醒一片江南雨此鮮于學士題紙上竹愛之故録於此耳至正九年三月廿九日梅道人廣與可筆于橡林精舍鮮籜初聞粉節香拂雲又見影蒼蒼鳳凰不至伶倫老無奈荆榛特地長長憶前朝李薊丘墨君天下擅風流百年遺迹留人世冩破湘潭夢裏秋愁來白髪三千丈戲掃清風五百竿幸有頴奴知此意時來几上弄清寒五月廿四日竹忩孤坐清興遄發戲冩此枝且看果有文公法否至正十九年也梅花和尚一葉竹誰云古多福三莖四莖曲一葉硯池秋清風滿淇澳至元二年冬十月廿七日奉為竹叟禪師戲作梅花道人鎮頓首馮司成具區與客㳺魏塘謁道人墓慨然慕其風致有遺蹟零落不可多得之歎坐客有言里人藏此竹者公訪之遂輟以贈畫舊白牋上長可三尺濶尺許餘竹梢從左方倒垂叢條縱横筆法清異墨葉一片綴其上長幾三寸許真竒作也梅沙彌冩懸崖松偃蹇支離不耐秋摇風灑雨㡬時休轉身便是青山頂又有巖崖在上頭又古澗長松長松生風吹不歇古澗出泉鳴自幽玉屑飯餘移白日紫芝歌動振髙秋雨忩秃筆無事而書仲圭又畫菜菜葉䦨干長花開黄金細直須咬到根方識淡中味梅道人戲墨盛子昭山水小幅至正五年六月魏塘盛懋為士衡父造沉溟澹天際山光遏不流松高呼落翠隱約映孤樓應禎題盛子昭臨彞齋三友圖蒼髯玉骨與琅玕三友那知耐嵗寒今日故園摇落盡時時永雪澹相看退叟大夫君子操調鼎味滋深嵗晏氷霜冽還同鐡石心路入東風山水涯松髙竹痩更梅花江空嵗晏成三友日暮天空共一家潯陽鼇叟盛子昭之姪名著字叔章能全補圖畫運筆着色與古不殊洪武中供事内府高皇帝異之製盛叔章畫記烟霞泉石臣玉記劉仲賢冩應真像卷中山劉貫道畫悉宗晉唐故其于應真人物變化態度閒雅一展玩間恍然置身入五臺國與阿羅漢對語眉睫鼻孔皆動真神筆也雖呉道子王瓘亦當無忝矣茂苑文嘉題王元章墨梅為大父懐荆公遺物玉幼供藤花閣朔風吹寒氷作壘梅花枝上春如海清香散作天下春草木無名藉光彩長林大谷月色新枝南枝北清無塵廣平心事誰與論徒以鐡石磨乾坤嵗晩燕山雲𣺌𣺌居庸古北無人到白草黄沙羊馬羣璚樓玉殿寒花繞凢桃俗李争芬芳只有老梅心自常貞姿燦燦眩以玉正色凛凛欺風霜轉身西泠隔寒霧欲問逋仙杳無所夜深湖上酒船歸長嘯一聲雙鶴舞王冕元章題顔秋月冩鍾馗圖後沙公彦徳挾張華之識尤能精鍳古人名畫凡入神品者靡不購得之而拙工摸倣形似者不能以欺其明焉故家藏唐宋元三代名蹟甚富士大夫之好畫者必先經彦徳鍳定而後收蓄以是人益器重之今夏隆暑中彦徳持一卷示余曰此顔秋月所繪鍾進士元夜出逰圖也披而觀之乃冩衆鬼作小隊前導有鳴金者有擎大石者有顛立而欲飲者有肘甕而行者有持鎗者有揮刄者有舞盾者有卓大刀者有執壺漿者有捧觴進者有負椅者有攜琴書筆硯者鍾馗於後三鬼載之而行又數鬼擁從有張葢者鳴鼓者吹笛擊板者詭態異狀各盡形勢彦徳求余題其後余聞世傳鍾馗者終南人也不第而死階下因以進士袍笏賜之既而示形於𤣥宗夢中曰臣當為陛下除天下虛耗之孽今是圖也其所謂夢中者耶且鬼神無形視之不見何其有形之若是耶豈畫者揚其巧擅其妙窮其怪狀而其實無有耶終南進士死有靈爽尚為天下翦除妖孽彼明為人者視此圖寜不惕然驚省哉然則良工用心之苦蓋有諷于世道者深矣洪武己巳嵗夏六月紫芝山人識顔秋月名輝元之江山人生而頴敏有儒者風度善畫道釋人物嘗死而復生故畫鬼尤工兹卷為老馗元夜出㳺圖筆法竒絶有八靣生意展閲間令人駭目非深得造化之妙者曷克臻此當珍如拱璧世守勿失延陵呉寛馬文璧倣巨然秋巒烟樹欵云文璧為彜齋作樹沉沉兮獨古山藹藹兮相雄思石梁兮徑度忱隂磵兮多風雪泉先生出此晝徴題時朱旦方有執熱之嘆故云馬治壬戌夏五月廿又五日泉潺潺兮作壑嵐霏霏兮欲雨望江南兮嘆歸與悵􅍇人兮何許時亨李進士以高孝先先生題畫詞徴和為太祖九十三年後甲午乃成化十年也閏六月十一日亦執熱而書云後學張弼楊鐡崖題為文璧瀛海圖山頭朱閣與雲連山下長江浪接天若待桃花春水漲美人天上坐樓船抱遺叟曹知白雪闗雲棧單條雲西老人戊子之夏五月既望為士英作雪關雲棧時年七十七嵗有以自娛米文玩世之餘朱文曹雲西江山長卷至正壬辰清和月雲西老人曹知白冩贈同菴老友至正壬辰初夏寓上朔廻龍寺適雲西老人來聯榻數日值景清和或拄策喬林或放船幽渚江山延人佳思花月助我閒吟漫賦山居十首呈正雲西亦記圖所歴為江山長卷見贈投磚引玉深愧鄙俚因附録卷尾以識一時之雅㑹云天地存吾道山林老更親閒時開碧眼一望盡黄塵喜得無生意消磨有漏身幾多隨幻影都是去來人髪不如心白形還似木枯衆縁閑處盡一念看來孤天已容疎拙禪應離有無餘生當落日歩歩是歸途生理元無住流光不可扳誰將新日月換却舊容顔獨坐惟聽鳥開門但見山幻縁消歇盡不必更求閒混世多生厭歸山念自休幾曽千載計特為一人留浩浩成空刼涓涓積巨流但觀清浄理一切總如浮身已難憑藉支離各有因暫時連四大終是聚㣲塵萬籟含虛寂諸縁露本真從來聲色裏迷誤許多人斗大一菴居其中任卷舒雲霞生户牖星月挂庭除念息心愈寂塵消境自如南薰時一至颯颯六忩虛飯食無餘事高眠晝不分晦明殊自覺鐘鼓幾曽聞四靣幃青嶂和身卧白雲誰言茶力健能遣睡魔軍無意人間世逰神極樂天惟餘可漏子不放拍盲禪獨羡搏風翼堪多出水蓮回觀塵土客誰不為纒眠一性原無着何為示自由秖因生管帶故被世遷流不識空花影堪憐大海漚但開清浄眼明見一毛頭揮麈元吾事閒心奈嬾何聊將精進力調伏睡眠魔寂寂吹天籟悠悠逝水波從來無一事應不怪維摩南屏山人同菴夷簡松門曹真素山水軸小清秘閣藏雲西為明叔作重溪暮藹雲老與僕年相若執筆濡墨既有年矣老而益進於今諸名勝善畫家求之乃畫者甚多至于韻度清越則此翁當獨歩也至正九年五月廿五日大癡學人公望題識時年八十又一雲西吾松之湞溪人與倪迂大癡以畫相倡和勝國之末高人多隱於畫雲西為多田翁葢其家足置鄭莊之驛以延欵名勝者其昌題秋林亭子欵云雲西老人曹知白為月屋先生作又題一絶天風起長林萬影弄秋色幽人期不來空亭倚蘿薜題曹雲西山水旭日耀蒼巘翠嵐生嫩寒幽人詩夢醒清響得松湍㑹稽王元章烟鐘隱隱起蒼茫嶺日分輝到草堂昨夜前山春雨過小橋流水落花香㑹稽全美碧雲消盡好山多茆屋春深長薜蘿行處聽來心自惬野禽啼罷野樵歌巽志生劉宗器筆㡳江山不露鋒茅茨十尺倚長松採芝空谷歸來晚知在晴雲第幾重遂昌山人鄭明徳印晴旭流輝耀翠㣲蘿烟開處啓荆扉澗橋兩兩提筐子疑在深林採藥歸武林顧易黄公望溪山雨意文夀承大篆書卷首此是僕數年前寓平江光孝時陸明本將紙二幅用大陀石硯郭忠厚墨一時信手作之此紙未畢已為好事者取去今復為世長所得至正四年十月來溪上足其意時年七十有六是嵗十一月哉生明識黄氏子乆白文黄公望印朱文青山不趂江流去數㸃翠㣲林際雨漁屋逺模糊烟村半有無大癡飛醉墨秋與天争碧浄洗綺羅塵一巢棲亂雲調寄菩薩蠻筠菴王國器題黄翁子乆雖不能夢見房山鷗波要亦非近世畫手可及此卷尤其得意者甲寅春倪瓉題黄子乆層巒積翠至正七年正月上澣大癡道人為道𤣥處士作于草堂時年七十有九崇禎辛未重九日王越石持倪黄二畫來倪畫人物古雅樹石蒼秀世謂畫人止龍門僧一幅及不用圖書殆虚語耳大癡筆法尤古與荆巨頡頏矣長翟國派苔石一人識于釣雪篷子乆騎馬看山圖參卿昔在西安幙騎馬看山時出郭終南泰華勢最高横作秋雲掃寥廓秦川漢苑萬里開酒醒望逺登荒臺日斜渭上歸人渡嶽暗關中飛雨來此處竒觀絶天下何事歸來猶看畫畫中小景似江南黄葉漁村見烟舍莫戀江南真故鄉蓴鱸炊熟酒船香美人不是滄洲客此去宜登白玉堂東呉青丘子題此黄子乆學董北苑之筆其家有鐡崖圖似之其昌大癡畫獨此最稱澹蕩洗盡畫家縱横習氣又在鐡崖上眉公黄大癡縹緲仙居圖玉觀仙臺紫霧高背騎丹鳯恣遊遨雙成不喚吹簫侣閬苑春深醉碧桃至正已亥三月十五日過張外史山居觀此圖遂題一絶丹丘柯九思山在白雲中草樹𤼵青紅縹緲神仙居隱現金銀宫飛霞隔鸞鶴叢篁思閬風誰從此招手度我逍遥翁楊載題水紋風縐花影月翻此不染畫世也觀大癡畫不當于筆墨中求之壬子夏舟次荷葉汪砢玉題此圖余攜白下東倉楊汝邁見而愛之别後汝邁遥將紫筠筐一雙内盛弇州四部稿正續及敬美奉常稿又古玉名磁種種余因舉圖酬焉玉追記黄子乆淺綘色山水至正九年四月一日大癡曲曲溪流響夕輝杜鵑啼老落花稀為問連朝何處去􅀢箕泉下得圖歸風月福人鳥啄殘花汚草菴一春來到兩山探忽觀癡老圖中道南峰翠帶北峰嵐閒閒畫家初以古人為師復以造物為師向見黄子乆天池圖為􅎓本昨年遊呉中山策笻石壁下快心洞目狂呼曰黄石公黄石公同逰者不測余曰今日遇吾師耳觀此因追憶書之其昌又子乆山水井西道人壺中仙㧞足昔走江南天一丘一壑冩髙古三江三泖來盤旋盧子渡頭小茅屋墅田堆畔靈芝田能令寸筆涵萬化榖城黄石同其傳林泉民張夢辰子乆論畫凢破墨須由淡入濃此圖曲盡其致平淡天真從巨然風韻中來余家所藏富春山卷正可與同參也甲寅春三月董其昌題一峯道人秋山林木誰家亭子傍溪灣高樹扶疎出石間落葉盡隨溪雨去只留秋色滿空山大癡道人作大癡學北苑多作森梢勁挺之樹老杜云請君放筆為直幹此圖是矣𤣥宰觀于東雅堂因題謝伯誠焦墨山水下有髙士紅衣素裳立雙松間任昜謝伯誠畫法絶軼得董北苑風致今觀瀑布圖飄飄然有凌雲氣余為題詩其上云銀河忽如瓠子決㵼諸五老之峰前象疑天孫織素練素練脱軸垂青天便欲手借并州剪剪取一幅玻瓈烟相逢雲石子有似捉月仙酒喉無奈夜渇甚騎鱷吸海枯桑田居然化作十萬丈玉虹倒掛清泠淵鐵笛在快雪樓試葉茂實墨時奉熈春閣硯小凌波也陸天㳺谿山清眺古秀汪氏合璧鍳藏陸天㳺畫一幅好事者離為二軸玉水先得一幅凡十餘年又得其副遂若雌雄之劍復聚延津亦竒矣過長水鍳賞永日因題此以俟觀者董其昌陸天㳺畫品在幼文雲西間以蕭散幽澹為宗若濶幅雄肆之筆絶不易得也玉水此幅乃聨素為之者先得其左復得其右脗然延津之合也大竒大竒日華余弄鳩車時家甫得陸天㳺畫上題云谿山清眺陸廣為文伯作時父執呉功甫嘗過吾家凝霞閣極鍳賞此幅然惜其非全璧也至甲寅秋高友明水見之以天然花影棐几相易迨己未春潤州繆把亭持二畫來適董元宰先生過訪展閲間咤之曰何一軸而離為二也余相較曰何二幅而一為余家物也把亭云為文伯作者得之此地髙氏欵天㳺生者得之苕上閔氏初不知其相合也即舉以歸余元宰遂索紙題之𤣥宰又云天㳺生欵是原筆也而裝潢者湯玉林陸象元在舍即掲投水池前欵便洗去後欵揉素至碎字蹟終不脱於此徴太史善鍳并憶昔年功甫之論不謬也若畫中層巒叠嶂殿宇樓臺出沒烟雲間溪橋横亘其下草樹滃鬱掩映其憑髙者有振衣千仭之上其入林者有平巖物外之趣回視各半時殘山剰水作缺陷世界者忽得女媧氏補之頓成中央大庭之天矣後之人宜世守勿失庶留此一叚嘉話秀水汪砢玉樂卿甫識于潄六齋張伯雨山水谷翁真人當至元之初與趙榮禄相交多得其書畫徃徃散逸其存者不過十之一也我友養𤣥道人盡以出示稱嘆竟日戲冩此圖於靈石軒中至正戊子九月廿又三日張雨張貞居高逸振世文絶詩清韜光山水間黙契神㑹㸃染不羣然懶於應酬遺畫甚少余曩在梁溪周子仲處曽見靈峯山寺圖則逸而簡吾郡徐君美家見擬蘇長公竹石則秀而竒餘未嘗見也今觀此圖筆力圓潤高古驚人其山頽突其樹縱横大得董北苑之意即同黄王不能措手其氣韻蒼兀不遜趙榮禄宜乎飄飄然若羽化而登仙也錦川老人王瑞書於芝溪草堂昔張伯雨寄陳惟寅雙峯含翠圖髙拱辰畫録所載之詩黄篾樓中唯飲酒白雲廊下且題詩閒時描得雙峯寄變幻青山是我師世稱伯雨善畫予未嘗見今窺此圖令我駭目用筆古雅深得六朝氣韻借使北苑復生不能為也古松道人題於鶴翅舟中此一段題於畫外禙絹上此圖筆力高古未見其匹倪迂當拜下風矣太平清話張伯雨素不善畫嘗醉冩竒石具一種逸韻若見此圖定無此語閑止居士雨忩漫書張貞居潯陽歸興有巾者絺有杖者藜千載高風邈焉難追東籬之菊西山之薇葢異世而同歸者歟句曲外史為劉淵畫右潯陽歸興卷乃淵明歸休之圖而平江陳公立卿之所家藏者也公雖武弁而博雅好古失欵方方壺雲林圖方壺為太樸老友作至元四年戊寅嵗四月記故人𣺌在雲林端手植梓漆隂團團不憤讀書從鬼谷何言賣藥近長安白日定趨天禄閣青春宜著鵕䴊冠相思灑盡金壺墨三十六峯生暮寒句曲外史張天雨仙人危太樸屏迹雲林間河車運金液九轉成大還苦辛三十載得道鬢已斑弱水政清淺蓬萊那可扳嬌娥貯金屋霜露零秋山勿猜松柏操不及桃李顔丹丘生柯九思題抱樸先生學大還偶然為客未歸山迎陽館裏看圖畫夢繞白雲青樹間東陽呉師道海上三山樓觀開壺仙早晚御風回畫成定勝人間景為問何人寄得來雲林之高峰可望日出海君子居其間旦起飱沆瀣三年毛骨換九載神色改翩然升雲去鸞鳳翳五彩山中有神藥服食多所採寄語學仙人竚以立相待邵菴虞集方上清碧水丹山紙上水墨掛幅岸花汀鳥留幽意碧水丹山共隱情方壺作于金門之小洞天溪亭風致似蓬瀛古木寒泉也自清一笑相逢共忘世此身何用絆浮名大年地濶紅塵逺天空碧嶂遥有心懐徃古無計避喧囂坐乆閑情適談諧逸興飄卜鄰如可遂林下卧吹簫㑹稽袁鉉幽亭寂寂逺紅塵簾外東風栁色新四海雍熈春晝永水邉林下屬閒人月林張九芳方壺畫家甫得之呉功甫功甫為冡宰黙泉公孫博雅豪邁共宋几元羽皇習業嘉樹堂余嘗與其社課而功甫以餘閑交易古玩家甫曽購其饕餮鼎花紋粗細相壓飛翠襲人每以供此畫商周法物正宜享上清於雲半詎意丙辰冬鄰人不戒于火延爇吾家凝霞閣畫首亦燎去得蒼頭舉官碙惠泉一潑而熄至明付陸象𤣥裝潢竟遺失水池一宿化為烏有豈上清神丹餘紙故入水火二煉耶抑功甫仙逰所及復收還芙蓉城耶可憾也萬厯丁巳春玉水汪砢玉識於花嘆齋珊瑚網卷三十三
