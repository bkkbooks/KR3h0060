body:
  text: 珊瑚網卷十八明汪砢玉撰法書題䟦國朝名公詩翰前卷凝霞閣鍳藏野寺垂楊裏春畦亂水間美花多暎竹好鳥不歸山城郭終何事風塵益駐顔誰能共公子薄暮欲俱還髙陽許初元復青天嶒峨擁髙峰江光倒映千芙蓉長松窈窕晝無日飛泉迸出深林中緑樹倚石標仙客吞吐江山與丘壑沈先生丹青手冩出意態殊縱横千年不改秋山色萬古畫苑流芳名淋漓翠黛展此幅身在匡廬與天目濠南李攀龍謝却塵凡水上居推篷偏愛八窗虚櫓聲長雜書聲度波影遥連雲影踈客至烹茶沽市酒興來垂釣羡江魚多君佳趣雖云異終向林泉樂有餘劉謙吉文池館清虚落照紅麻衣凉拂蓼花風驚鷗厯亂平沙外老樹含芽曲水東過雨山光清似洗涵秋江色碧如空唱桃山女隔山採纎歩行雲入紫峰瓊維揚津藪浸江東渺渺三州烟霧中雲黑蛟龍噴凌薄天青日月度虚空山藏林屋陰符秘水接咸池灝氣通綵鷁朱旗留勝賞千秋文藻仰名公東南襟帶灌羣川汗漫遥將銀漢連吞吐雲霞朝浴日動摇星斗衣涵天潛蛟亂捲千重雪孤鶴斜衝萬里烟桂樹參差瑶草緑浮㳺真欲接飛仙右太湖二首王守春湖萬頃玉溶溶橋上春山翠掃空神女月明珠返浦仙人雲曉笛迎風花枝香覆琳宫外草色青迷紫洞中思挂一颿凌絶頂㸔圖翻愧賦難工踏破萬山雲言採千嵗藥歸來春莫時杏花㡬開落花落逺山出天空雲似低朝來賦秋興結社過橋西野鳥穿窗過流雲拂座來有時復對月懐抱得無開陳鎏書江頭春色曉重重萬樹桃花帶雨濃隨意尋芳出門去隔溪人語水聲中獨坐溪亭酒半酣閒看春色在江南沙燕舞風斜日裏晴烟漠漠栁毶毶近作二首上禹門仲山王問幽人每愛南村梅背郭誅苑結小堂靖節歸來存菊徑少陵老去卜林塘茶烟冉冉晴當户羅月紛紛夜到床何日杖藜尋酒伴悠然觴咏賦羲皇豫章胡儼長溪東注碧流清觀水能令道眼明暖浸桃花渾濯錦浄涵星斗若圍抨放歌自得林泉趣拂釣相忘物外情泉石徜徉無俗慮年來惟卧白鷗盟我齋沈璐地屬無桑流水濵青山白屋一閒人簾鈎皓魄先迎月宅近陽和早領春不到西陵無别業自知仁厚有比隣清秋相約荷衣去放棹滄洲採白蘋震川歸有光逺跡城市間築室傍林谷西丘俯簷楹流水通淇澳烟霞曳巖穴晨光射晴旭軒敞見平疇身閒理耕牧魚鳥日相親聲利不同躅時瞻天際雲或逐溪上月車轍往來稀翕言相和續花開繞林春草長縁溪緑世事竟無聞所居樂幽獨海濵浦南金溪上風輕雲淡溪頭栁媚花明借問誰家苑屋長聞鶴唳琴聲雪霽瑶林矗矗沙寒白鳥雙雙臘盡酒香麴甕月髙梅影陂塘觀蔡張志撰明光九級盡琉璃為答𤣥功詎惜貲地異赤烏寂教後基同白馬碣名時鷲峰直與諸天接鳳闕翻從下界窺登罷欲書多寳事柰無江總善題碑右報㤙寺浮圖皇甫百泉把酒登樓明月夜交㳺不似去年親踈花欲折偏憂雨北雁初來又送人稼穡有秋烟火少兵車無戰羽書頻却憐醉裏丹楓葉似與吟翁著意㸔謝時臣日日尋源繞白雲也憐童子每辛勤秦郎好事能成約陸羽無嫌許見分汲取豈辭風雨阻往來寧避虎狼羣㡬囬小集秋林下石鼎茶香滌酒醺謨次作畫漿雙扶一葉舸常時載酒泛滄波清風明月情無限水色山光興最多楊栁岸邊和雪釣蒹葭影裏扣舷歌塵塗擾擾勞形役為樂如君有㡬何友雲舞罷尋芳去花枝借粉香淺紅添醉色雅緑助新粧樸蝶闗春恨聴鶯去晝長武陵仙路杳何處問劉郎右賦得花間美人周繩祖湖水滿秋碧重橋寳帶分人歸青草路帆落洞庭雲山倒西南影鯨吞日月文尊前莫辭醉選勝重殷勤右寳帶橋作書於蓮石齋商谷居節江碧雲輕楚甸秋美人天逺思悠悠可憐空谷孤芳冷緑係清香無那愁顧問六十年來鬢未絲優㳺林壑澹無為青山滿户樽盈酒此是君家得意時錢榖天寒雲凍地欲裂飄風襲人草木折深崖墮氷飜白雪長谿滚滚水如立溪邊古樹烟火斷茅簷重閉無人迹中有老僧太竒絶獨舸悠悠自鳴枻笠頭垂垂散珠粒衲衣片片沾璚屑短葢那能障回颷手脚半皴脣齒齧罟舟漁子盡入淑笑教老僧太癡劣冒險無求自得意舉世寧能論巧拙子卿氊食非人願蔡州半夜真人傑按圖令予三歎息灞橋之思今已滅嘉靖癸已夏至後少華山人復初書于紫芝閣國朝名公詩翰後卷凝霞鑒藏柴門寂寂掩青蕪空谷音㣲聴欲無一水故人通尺鯉九霄仙令擁雙鳬可南宅有登龍句郢里人歸和雪孤早晚課書傳畫省于今淑問滿新都答丁明府王世貞玉漏初殘曙欲生千官端笏候華清煙消碧瓦參差見月晃金門上下明仙仗乍移雙扇合侍臣徐退萬花迎孤忠自許酬真主况復簪纓際太平春日早朝之作豐南禺嵩嶽盤雲陟處危羣峰那敢向争竒周圭日倒千尋影漢栢霜封萬嵗枝野色中原龍戰地鄉心南國雁來時西行不散登臨慨一與緱山子晉期中嶽一首從中嶽之麓西去為緱山故及之莫如忠雞鳴何如矯矯拂羽東烏未光落月承宇志士反側聞之起舞此生何為蓬虆踽踽振吾衣裳坐以待旦壬午春二月廿一日書于白龍潭舫莫是龍秋日幽尋物外期行行出郭得招提官閒自覺紅塵逺地勝何妨白日遲雲散空花堪結社京生别院試圍棋皇都車馬紛馳逐只隔城闉已不知文彭朝元山髙髙入雲青原玉笥連氛氲石蓮古銅鬱交翠蒼苔銀牓龜龍文從來人傑由地靈天降羅公應嵗星胸藏萬卷吐竒絶第一臚𫝊趨帝庭帝庭宛轉石渠側修眉玉頰桃花色雲光錯落錦袍新珊瑚出海秋月白丈夫得意須少年少年通預金閨籍忽然興動碧山棲飄然長往焚銀魚銀魚焚却歸蓮洞一編間誦長生書白飯黄精鍊道真洞門時挂蓮華巾齋房乞鉢飲玉液别有𤣥境無纎塵肇也窮途流浪客落魄無聞頭已白卅年誤落塵網中時一思公情悒悒當時遇公茂苑邊曽恵瑶草燦蓬壁一别迢迢入夢頻何時去會盧江濵盧江水逺蓬壺隔商山何處尋移民相逢古洞受寳訣桃開洞口三千春嘉靖乙未暮春寄羅念菴石蓮洞歌開雲文肇祉刺骨清寒病不禁空中牢落强登臨塵棲每下窮途淚幽晤難忘入社心竹院靜摇斜日影松壇徐拂梵天音朔風吹酒歸舟急􅎏皷嚴城憯沍陰亂後治平寺作文元發海擁峰頭路長松落日前笙歌隨處有羅綺照人妍池水和烟碧巖花着雨鮮生公片石在相與話因縁劍丘近作岐雲魯治龍藏炎氛隔蟬聲灌木通征帆指江上浪迹且山中晝永長林日凉分曠宇風秦淮醉花處還憶此㳺同虎阜别友口占袁尊尼垂楊夾御河廣陌冶㳺多雞取當塲鬬人將撫翠歌雲間馳畫轂花裏度鳴珂勝日不為樂其如春色何暎日窺金埒連雲峙玉樓豪華紛越綺俠少競吳鈎鳥囀全成曲林香元入甌欲知麗春賞不減在瀛洲燕遊二首戚元佐湖中日氣午氛氲風外歌聲洲上聞青天不動閣沉樹白鳥下處溪成雲浮空草緑春無盡隔浦橋平野欲分臨觴此日即修禊却自亭前憶右軍烟雨樓登眺溪邊坐流水水流心自閒不知山月上松影落衣間萬竹覆北窓長日睡初覺門前一片石新漲已堪濯中岳元佐書寒風吹暮雨蕭颼入簷除燈前花並落窓外葉同疎雁濕應難度蝸旋疑自書悠悠相憑几雲抱石堂虚賦得虚牕夜雨項元淇永日薰風夏序催西山遥望鬱崔嵬空中飛絮撩人去巖畔餘花待賞開寳樹芳林堪息影清泉碧澗可浮杯與君莫負山靈約早晩移文獻哨來初夏約㳺西山得杯字同禹門兄作元淇蕭踈短髪不勝冠卧起空齋過午餐㡬種鳥聲新雨霽一畨花信朔風寒桔橰學圃於陵子木榻忘年管㓜安懶漫不須酬客難酒杯聊欲重交歡喜所知過南園之作少岳山人書緇衣道者水雲家白學先生醉帽斜幽興不窮清晝永風前筆硯竹邊茶墨林項元汴猗猗谷中香清作琴上曲萬古聖人心幽花數枝玉雪居為蘭如美人作漢陽太守翡翠成雙戲晩汀楚天烟淡屬春晴騷人底事多題咏香蘂芳椒共此情心原野夫為蘭如姝克𢎞之印湖上堂開霽色分湖空風澹水如紋家家燕乳楊花落處處蠶眠柘葉紛修竹欲滋三徑雨養魚常䕶一溪雲不辭好事頻相過時向槎頭釣夕曛南溪别墅漫興張服采秀色凌寒益有神年來養就赤龍鱗和雲冩入髙堂上相伴人間住世人古松陳芹已入雲林調知無軒冕縁栖枝同息鷃抱葉類鳴蟬永日壺尊盡凉風枕簟偏石䦨間種藥不是慕長年長夏園居張鳳翼旅食游南國王程計北燕開襟期此日分手愴何年郎署秋増色儒衣夜泊船逢迎雖不減同調自相憐寄朱比部張獻翼天上佳期近林間暑氣収遥憐河北渡正及火西流日暮雲連夕星䦨月在樓七襄纔入咏還擬賦悲秋七夕立秋張燕翼雨収江水緑送别孝亷船陵到蝦蟇下磯來燕子前當壚女二八射䇿士三千贈子魚膓鍔成名在少年送友金陵應試王穉登欲識林中士言過山外栖諸天容客到樽酒為僧留心鏡巖巖曉松濤樹樹秋從來空寂地不用姓名投三堂杜天中書堂構千峰裏雲常載雨迴新篁青欲滴古木翠成堆難試謝公屐且傾陶令盃将窮竒絶處端不厭重來杜大綬石上松千尺橋西水一灣杖藜從此去隨意看青山吳門張元舉閒支角枕暗銷魂藥碗薰爐晝掩門忽憶天涯芳草路教人低首怨王孫荳䓻香清酒半醒回頭一盼最闗情誰能繫取西窓月下遣隣雞報五更項道民窮髪巉巖度懸絲石蔓捫無風雲自幻不雨晝常昏石似三生解人於百戰存飄飄任沙鳥何處出乾坤登雲岫談壬戌事有感許光祚霜月居然勝開軒面曲池團團青桂樹厯厯白榆枝好我如加膝何人不解頥坐來寒漏徹猶道酒行遲似愛荆詞丈李維禎昏黑尋山寺惟聴隔水鐘參差流荇藻窈窕削芙蓉十載彌天逺三春片席從祗應同笑語何事隠寒松訪友之作長干杜義欽三槐蔚然蒼翠中宛爾真人氣石上一跏趺門前雙虎踞予赴中侍齋師受天人供試問飽餐時滋味還殊衆右祖堂作雪浪共恩轉覺道路難豈料故人惜假我好樓居愛此春湖色湖上梅花出短墻一開半落湖水香春陽羞澁香花細桃花梨花亦不忙君家有酒藏床頭可憐花月未肯㳺願君醉我君亦醉花朝慎勿嗔莫愁房櫳窈窕嬌欲留懊恨歸來纎月流不知此景誰能酬空將好句為君投題項子京樓金華吳孺子瓢杖净如拭白頭何處來乾坤無汝並狂狷有人猜詩句經年鍜衣冠擬古裁每聞秋雨後蕭寺㸔莓苔贈吳𤣥鐵陳繼儒真心無散亂他事不須斷過去已過了未來何用筭𤣥宰書於墨禪齋鷗友鱸鄉兩不猜蒹葭千里散秋懐應憐六代風流地重有青蓮賦鳳臺右金陵作池邊荷葉衣無盡臺畔松花拾有餘剛被世人知姓氏又移茅屋入深居為愛荆先生書董其昌國朝名公手牘榮還未及參展顧承恵問屢屢且再頒佳貺雅意鄭重鄙劣潦倒何以克堪拜辱之餘獨有愧悚而已夏公壽詩草草應酬何煩撝謝沈公八圖是早年所作妙甚不敢容易着語亦縁近日病冗相併未暇及此望展限數日却得課程并後紙同上也使還丹此奉覆秋暑方熾萬萬若時珍愛徴明頓首奉覆允文郡博先生侍史七月晦日登髙落帽皆為風師雨伯阻之雖病後少飲安能鬱鬱獨抱膝坐屋子下對淋漓者乎駝蹄已熟請午前來呼盧浮白共銷之也允明夢椿仁兄契家連朝隂雨小牕寂寂欲得一二知已談心烏可得也偶有泉酒一瓶欲屈吾丈降舎同享之毋為街中泥濘而却弟之意也鎏頓首俊宇契兄大人日來坐冗不及過叙為歉心事未免種種必得足下商之方可以定奪如何如何向有手録曽令玉郎持上未得答教豈徘徊于山林泉石之間而未暇耶昨宅上阿周來頗知衷曲而晚間沽飲以為酒侑未知足下知之耶見時當作拍手以笑不盡弟王寵頓首子元文知已卷中尚有沈洪留宿文會軒札李東陽為兒延醫書玉守柬于穹窿文彭與元洲閣宜張鳯翼答孫漢陽周天球因汪子建遊楚寄王鳯洲開府有云自聞次公外補頗為之駭近聞吾公亦乞歸甚切不知何為豈有拂於江陵耶彼時處士不畏權要猶如此又彭年手報錢叔寳栢板雖小裂然太長反有二扁料也魯治覆吾未項少谿冩茉莉賦居節丐雪居翁相思子王穉登索仲玉紙砲佳者見餉此僕蟠蟲指𤓰之嗜可可想見一時風致第録之太繁姑置其他如徐賁沈度姚綬沈周唐寅諸名家赫蹏不下千餘紙収藏凝霞墨花二閣有年矣一旦自厯下旋大半售去間以遺所知朶雲與彩雲俱散矣人間清賞之樂信不多得也䝉天笑者識于蕭條髙寄之四五江岡㦦蹏名蹟人素工書牘多雅誼者聊割一臠樓頭縱觀羣玉之府重以牢醴竟日行時更辱嘉貺公家父子髙情何時有忘也大作略披一二作金石聲謝教不一其昌再頓首愚父子為索書三元福地走使金閶所囘柬也玉記不肖弟東海之鷾鴯子也字未窺斑藝非致逺不揣下里晉謁龍門遂蒙欵遇錫以佳玩頓使頹筆贈妍俚言獻笑不復藏拙更沐優容故渤海之不拒細流亦㤗山之不失拳石第不肖自顧徒有汗顔耳足下才華八斗文不加㸃何患非當宁用也敬羡敬羡歸想雅度令人時刻可挹恨衣帶之隔耳分袂後弟復往鵞湖鹽官近得抵舎承委三扇俱送在諸名公案頭矣圖書亦未就手少容數日盡附薛仲台兄完上也重九時再過檇李與足下共醉茰觴傾不盡欲言源崑大兄大人大元華亭教弟蔣元龍頓首復余弱冠時蔣徴君攜古圖史扁舟來訪留欵數日大而擘窠書小而蠅頭楷㡬練裙莫能盡也更剪燭聮句曉别賦贈意殷殷如昨焉蓋神卿與雲卿書法原一體兩人故無差别耳源崑余舊字砢玉記前追送不及為之悵然江行知一路平安為慰近閲邸報知張夢澤先生已陞秋曹所寓書乞即達之為荷塲前百凡為道珍重眷弟郁嘉慶頓首啟玉水世兄大人畿元左慎伯承博雅好事𤣥鐵稱之為貧孟嘗與季叔遇俱余忘年交叔遇至今神明不衰每示所録題䟦也伏讀佳製每一義終令人翩翩便欲仙去不知慧業文人何修得此方恨識兄之晩然猶喜未晚也有此中近作得恵發矇更望日縁積逋先兄而至者堆壅坐是尊扇尚未卒業且笥中所攜毛頴盡皆成童而此地復無處購買倘案頭有可濟之則不獨受賜不貲亦得籍以報命感當何如玉水詞丈太史通家小弟薛明並頓首賤恙戒飲拘攣可笑以對知已不諱直陳然雖自外芳筵而珠璣之文在握儼乎時奉紫芝而益芬彩不寧惟是醉飽已也管城君一員足矣何太奢至此又不敢不登容即藉是以報先此附謝總叩悉不盡玉水詞盟史席小弟明益頓首俚言借光佳箑出入懷袖良厚幸矣弟不靳竄削另當再書奉報承惠中書君太多令人顔甲為作拙楷一冊行草一軸表敬兼望大教天晴圖晤仲謝不盡樂卿仁兄畿元小弟薛明益頓首上先子嘗稱虞卿楷書衡山後一人也壬子秋得晤薛君子雞鳴山房時獲其墨妙欣幸為何如玉記昨承雅恵種種感愧何已顧日有山遊之興尚未具一樽少談雅事耳弟新刻有雲笈七籖此道藏類書計博洽家所必購馳上一部更求於交㳺中一一㳺揚使得盛行其感又何如耶其值一金并聞玉水詞丈先生教下弟安期頓首俞羡長不獨擅騷壇抑亦工臨池故存此一札玉記昨中坐慢去未盡傾倒當俟牡丹紅時圖再舉耳文畫卷承借觀容留數日作題語奉還也拙畫何足觀以本意欲馳往嚴州故不得奉他日有塗抺即須尊意任檢捨之何如季白屏上文當即圖之不盡玉水親家大雅日華頓首此竹懶翁諦姻時手裁也誌之以毋忘伊始耳辱教大篇新爽絶倫謹已什襲社題在卷中不及録奉即以卷附覽惟兄摘一題賦之閲畢望擲不一一玉水詞兄髙雅弟貞黙頓首復社所雖已具柬中但隔日尚有一邀柬亦不可少傍晩望再一傳其未熟識者當仍命小价致之柬内乞書多偹一幅送首社語弟處有新到恵泉竟載至舟中不一玉水社兄詞長弟貞黙頓首往見秣陵余仲茅司馬謂弟鴛水社刻獨無君姓氏何也弟甚愧之昨忽蒙許補輙以秋色八咏録上鑒定付梓為愛玉水仁兄大方家社弟士麟頓首鴛社雖已梓而一時同盟牋玉頗多兹僅存譚帚菴者以始事之人及姚叔祥者為塵逺之續且兩君兼工書耳月曼修月人汪砢玉識昨領清教竟日珍圖名墨目境豁然受益多矣兹啟元人短雲山卷蒙兄相許割愛景陽云恐兄裝成卷或有難色敢奉梅花詩畫扇一握以償裝潢之直惟兄哂留慨許為何如桂子將舒容屈領言教未一玉水世兄教厚即刻教弟道素頓首頓首瑶篇見贈時時捧誦如對芝宇百朋之錫感佩良深矣宋元諸短牘弟有數段以久質友人處近始取出剥落不堪正爾掲開重拓故未便奉覽俟月初小園桂花將開屈駕過我領竟日清談兼有一二種粗玩欲請教也字卷恐不足當大方敢云自愛乎玉水社兄世契教下弟髙道素頓首上萬厯壬寅間明水君即與愚父子相契斗酒論文聮床夜話彼此獲一佳玩相賞或互易聊録一二以誌懐明水嘗臨老天馬賦不復可辨玉記名牋草草以大癡意為之想亦當法眼古人哭子喪明而不肖尚有閒情事筆墨是亦大癡矣一哭一哭玉水契兄博雅教弟徳新頓首復初於此道為項氏白眉與余交最暱時追念也傾葢以來凡所受至眷者心藏之矣方忻倚玉倐悵歌驪道旁判袂咫尺各天令人黯然魂消歸更見羮見墻昕夕與玉潤譚對娓娓髙誼不去口始信交友止趣味兩言意氣相投便賅多言定久要耳向審布帆無恙行人安穏邇已上奉鶴髪下課麟趾兄于俯仰間寧不愉快甚又計焚香烹􅔩筆精墨妙詞翰富有日新視弟碌碌車塵馬足間尚了無脱離日何啻天淵矧一時萍聚漸次星散無功亦將舎我而南益復寂寥且奈何以介歸為寄此牘未既欲吐願言鑒在尊公老叔前萬望一叱致晤夷仲名之并道惓惓美神超冗極壽章容促之陳贊皇二十左右行附聞樂卿老仁兄莫逆長至後二日社弟洪邦基頓首慶之為忠宣公後能文工小楷此特其一斑也玉記尊箑録上小詩并祈正扇二事聊引意唯噱存不宣演再頓首天啟癸亥秋余在都門庶常陳贊皇師傾葢投分余臨行招餞宵半題扇贈詩意殷殷也砢玉記臨病經旬思膓遂槖讀老親翁西山品覺朝來寳氣落我床褥不惟病中可當七發後日遊覽挾兹以往庶可無迷津矣漫題數語不足形容萬一聊以見服膺之意惟郢削付梓乃可耳弟真拜上弟既乏𤣥晏之文深漸無換鵞之筆草草應命録上希檢到玉翁老親家詞伯弟真頓首項不損為吾郡書家龍鳳惜其作李北海盡頭耳長安晤言缺然一别猶荷記存翰貺逺賁敝邸懐兹雅誼如何門下官况冷寂蕭然自逺便見邁識計明公當即為一通勒此謝復不盡想馳鳳來再頓首天啟丙寅冬余轉運厯下蒙施羽皇師手報也師相素􅈺翰墨故存此七十二泉主人玉記令郎嘉禮一媒逺一媒多事所幸我兩家相知之素言語可以竟達鄙意一以簡静為主粗奩數事以一舟達潭府所遣僕輩不煩犒宴即尊使寵臨亦不及奏欵矣亦迫於時日勢不能紆徐也皷吹之類併亦可汰不失山林泉石之格何如特此專達不一玉翁老親翁大人日華頓首上太僕公婚啟已刻恬致堂集中附此以見青松白石之盟翥鳳驚龍之輩千載如在也砢玉識節間風雨竟以深秋未獲走晤為念弟南行只在月中尚未有定期也偶于朔日同孔孫請仙索得唁梅二絶録呈覽又有贈家君二絶深談内養容另日録呈亦可異耳梅花供尊犒先附壁深欲作數語附之簡末多冗未及捉管容續呈正不一玉水老親翁仁兄弟肇亨頓首承示珠玉韻險詞工既難追歩而諸君子和什愈出愈竒荒陋如弟但有歛手吟咏而已恐孤仁兄雅意勉强效顰徒令匠伯嘔噦耳唐榻樂毅論蒙割愛見許謹奉原值少佐買蘭之費望鑒存幸幸弟函光頓首唁梅者志感先子手澤故存此二則又李珂雪之摹禇曹瞻明之學鍾兩君書法有可觀耳玉記日者飽玩所藏圖書恨不作蠧魚歸時每與雒生談及便嘖嘖道兄髙致也所委冩右丞詩意先以二幀奉覽未識有合于尊意否想右丞見之必鼓掌在當世或可寓目兄翁以為然否右丞句再乞付三四聮擇其最精妙者補之何如諸名公筆便希賜覽并白玉水翁兄老親家眷小弟項聖謨頓首上日蒙髙雅示以名卷許我圖之何其幸也未及申報歉歉趙䟦三首并望示弟一録即奉歸想不吝也特此凟玉水老親翁大人千古眷弟聖謨頓首項君首冩摩誥句圖余假以韓滉畫卷臨倣一時雅韻足記乃孔彰近來書學與畫學俱進故誌之向蒙左顧偶往苕上有失倒屣所諭尊公大傳業經付梓佳什前從洪善之處領教一二亦已借重今再當更添刻以為邑乗光也耑此覆承昊頓首黄闇齋亷憲纂修嘉邑誌予為先大父明夫重建三元閣葺夷光學繡處蓮花醋坊諸橋補入古蹟先愛荆居士之髙行如朱文恪公所叙李冏卿君寳所傳姑撮一二附隠逸即蒙如請又濫及不肖之小賦俚句感何如也縱横河嶽之筆應共不朽郡賢詩蒐獵數年恐多掛漏未敢命梓承兄翁同調吉光片羽收拾無遺真海底鐵網也來翰領悉當一一披對以鴻篇壓卷為快尚有遺珠惟𤣥宴齋頭次第簡討見恵可也容晤不一社弟谷頓首曹侍御石倉為續檇李英華屢垂諮訪甚盛心也苐尚未竟大觀是望若此柬為書輪妙斵足重耳賢郎初試奏㨗此瞬息九萬之兆也弟忝四世通家深羡服徳門餘慶于今日發軔矣聊具芹私非敢云賀也希笑内是禱樂卿仁兄侍史弟孟超頓首萬厯中來吾郡書家首推髙元雅先生而擅其傳者為長公公𤣥與季季仙及元雅之仲嗣王氏者子逸子由父子在闗鐵門限也惜子由李仙俱蚤世猶賴老友公𤣥筆陣益雄向為兒淵下帷其先静村公又為吾荆翁師真可稱四世交如斯牋所云永永不替耳娛墨居士摩松皮硯記此玉臺翰墨餘芳係萬厯間人嗣未輕贅洞天去人九萬里凉風吹雲天似水珠扉髙啟赤霓翔氷簾漾中素練舉碧花瑶草簇䦨干張君危坐聴啼鸞翠蜃吹涎作樓閣青田小龍耕曉烟璇宫桂花秋露滑吳剛玉斧香凝屑綘節髙飄阿母來藕黄衫子翠羅鞋晏香鳴筝婉華舞笙歌沸空擁吹臺自向東王一巵壽啾啾白麟天半走貝闕人歸龍夜吼右天上謡東海徐媛小淑氏鳴蟬寂無聲閒夜凉颷發薜荔覆檐楹葉際見孤月流光入房櫳徘徊照華髪撫景一長嗟終古誰不沒棄世學神仙徒勞鍊金骨寒山趙氏陸平原内史華衮輕于一字褒儂家姊妹出蓬蒿媿無芳躅追彤火浪得虚名動彩毫廣陵雲濤烟鬟氏花牋處處有儂名欲動春風欲囀鶯對月瞻雲吟秀句幽閨一倍使人清適楚月液纎黛氏綺牕得聴梅花弄至今暗香猶襲人也小女姁妹告借秋鴻新譜特遣婢子顧影叩領贈戴氏二姬一絶附正雲鬟月面兩相冝濤作秋波液是脂吾見猶憐而况若江妃漢女莫猜疑外曲中衛宛若楊三秀作容録正一一品題之眉社女弟張徽卿柯亭内子計都門分袂抵家無日不思念賢姊暨令愛輩想吉人有天相自多獲福為慰夏初准望吾姊東歸妹在金閶奉迎以傾積懐近聞吾姊為太君納寵徳望斗山矣兹因鴻便聊附八行恭候歸楊門吳氏歛袵近代名壺以書表著者呉中為范夫人徐小淑趙大家陸卿子清漳為柯孝亷配張徽卿卿寓白下有女弟子雲濤月液與余清瑶君投分所遺詩札翔鸞舞鳳豈僅鸚哥嬌也清瑶亦有贈言及濤液其一云妙撫樂毅衍波牋鐵畫銀鈎字様圓姊正臨池洗端石妹先題葉弄輕烟又婁東楊棘丞夫人尤與清瑶子善别後發其郵筒穆若清氷㵼玉壺焉時秦淮女郎楊蕙娘曉英精黄庭小楷沙宛在彩姝擅蘭亭郝藝娥婉然工宣示楊叔卿婉素喜作麻姑壇潘髯稱得其一染齊紈可易百錦大足掩映林下風而吾禾有十三齡女童徐範能摹諸家體賣字自活為沈伯姬鳳華所書古詩十九首入石徐媛䟦有云筆彩芳生墨香含素歐率更允拜下風衛夫人終當北面至自慊每草搨便作凍蠅其推重可知矣伯姬妹瑶華詞翰亦佳惜咸蚤世月香居士徒搦琉璃管追之耳又范夫人為清瑶書五言于便面别號無為道人尚憶兩句扣齒風雷響挑燈日月光落筆灑灑應是墨池仙子鴛水定香居士玉識于書帶草草牕珊瑚網卷十八
