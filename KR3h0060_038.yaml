body:
  text: 珊瑚網卷三十八明汪砢玉撰名畫題跋十四沈啟南支硎冒雲圖林磎相值夕陽邊跡似無言意似仙髙笠冒雲宜我畫小詞磨石信僧鐫山逢佳處肩遲轎眼落閒時袖出編隨後擔夫亦殊俗花筐酒榼兩頭懸辛亥嵗二月二十一日余登支硎山林麓隠隠見一士戴笠手卷乗筍輿而来及近乃楊儀部若謙也且迫暮僅一揖而别明日遂繪其髙致并詩以寄沈周天台石梁圖靈源東接雁池遙裂石崩崖下九霄雲斷青天倚長劒月明泉室掛生綃江聲雨勢三秋急雲片冰花五月饒休勒移文北山去他年來赴石梁招沈周虎邱圖雙屐飛来入畫圖梵王宫殿白雲扶簾櫳日暖開滄海鐘鼓風清落木湖雁塔毫光紅舍利山塋靈氣玉於菟闔閣寶劍知何處留得空池卷轆轤沈周芝田圖卷董家報徳人栽杏天報君家芝滿田借氣生成本無種散人服食便長年新松拔地朝擎雨髙蓋敷春暖䕶烟十畝霞腴不征税但聞寄藉與神仙沈周除夜聚飲圖夜半鐘聲送酒杯五人坐暖覺春回一年好景今宵盡八載思親入夣来爆竹已曽時序發燈花還傍喜筵開弟兄􅍆酒莫成寐明日新正嵗又催沈周新春荔柿圖水墨荔枝柿子取利市同音起問梅花整角巾忻然草木已知春白頭無恙人惟舊黄厯多情嵗又新行酒不妨從小子耦耕還喜約東鄰年年天肯賒强健老為朝廷補一民右近作一首侑以荔柿圖奉吾宿田老兄新春一笑沈周平楚柳桃圖嫩黄楊柳未藏鴉隔岸紅桃半著花開眼闌干接平楚夾洲亭館跂平沙悠悠魚泳知人樂故故鷗飛照鬢華如此風光真入畫自然吾亦愛吾家沈周湖鄉悶雨圖破屋如舟只浮住茫茫魚鼈是比鄰頻年大瑰無乾土何處巢居著老身萬頃水田春澇富數聲雷腹晚飡貧詩書不飽還堪遣開卷時時感昔人丙辰夏日隂雨浹旬坐悶湖鄉賦此并圖以紀一時之興長洲沈周幽棲圖小亭臨水稱幽棲蓼渚莎坪咫尺迷山雨乍来茒溜細溪雲欲墮竹梢低簷頭故壘雌雄燕籬脚秋蟲子母鷄此段風光小韋杜可能無我一青藜沈周水次亭館圖山中地貴何錢買水次幽居却儘强恅愺杯柈無俗客清虛亭館但湖光弱雲過雨不多㸃髙水當風有許涼一咏一觴殊遣撥自家錯認住柴桑吳瑞卿能畫尚愛小筆又愛余唐律且品畫如倪雲林詩如陸放翁蓋愛之深而忘其拙淺併識其言云訪友圖莫嫌蹤跡發寒窮南國生涯論首功道體不彰存白賁心仁有造屬黄鍾隔煙如夣微微月臨水無言脈脈風髙尚難招我難逺為君頻過小橋東樽酒夜話圖坐深誰問夜何其數喚添衣且不辭情到老年難作别人非今日是相知月明髙樹鴉翻處風靜虛堂燭轉時再把一樽酬笑語憑君看取鬢如絲周與育菴先生各向老每别必有詩記之此記庚子嵗季冬望夜話也偶與育菴寫長卷漫書於左栁隂睡燕圖補巢銜罷落花泥困倚東風倦翼低金屋晝閒隨蝶化雕梁春靜怕鶯啼魂飛漢殿人應老夣入烏衣路欲迷却怪捲簾人喚醒小橋深巷夕陽西癸亥春日見栁隂睡燕賦此系圖寄奉膚菴先生一笑沈周蕉石錦雞圖物我神交即是盟白頭自嘆益庚庚繪成翠扇風難展寫出花冠曙不鳴代帋緘書懷素仰作人牕語宋宗驚贈君莫道無他意用世功多未可輕沈周又畫鷄云酉年酉月酉日酉時製非偶然也沈啟南自題四景山水碧嶂遙隠現白雲自吞吐空山不逢人心靜自太古避俗耽幽僻逃名學古狂深松無六月江閣有餘涼扁舟浸寒玉人影落清波髙情誰得似詩興料應多清流自繞崖疎樹不遮山寂寂秋光靜蕭蕭落照間春樹晏息圖以下俱石田自題樹根容我坐八座未云安芒履春泥濕荷泥曉露乾清溪亭子圖亭子清溪上疎林落照中懷人隔秋水無復覔幽蹤秋林待渡圖捧劍何方去秋江待渡来長年亦英士雙眼識竒才桐隂晏息圖是圖為王渭陽沈氏家物髙梧立雙玉綠䕃如秋水下有兀坐翁妙在澄懷裏尋詩圖一步一步閒隨雲并逐月消飯更尋詩不管屐齒折雪隠大雪壓茒屋縣官誰得知殷懃付杯酒貧自有便宜雪旅吟肩聳雙玉何獨灞橋宜天地不擇雪誰無驢背時倣雲林筆山竒水亦僻到此是閒人一个瓦亭子秋風空世塵芙蓉晩波映人面斜陽返孤嶼浩歌風吹衣芙蓉隨流水菊老我愛種菊自然宜野心秋風吹破屋貧亦有黄金竹石上有芳姿此君無俗氣其中佳趣多容我自来去蕉石記得西園裏題名在綠蕉十年風雨横舊墨可曾消慈烏此幅為汪氏先世遺物風勁月滿地林虛葉亦枯君家有孝義樹樹著慈烏水邊鵝曲項長鳴處青莎映掌紅銀塘縱微步不屬右軍籠大癡筆意此幅向藏墨花閣畫在大癡境中詩在大癡境外恰好二百年来翻身出世作怪石田沙彌説此偈於山風溪月樓中㟁栁渚蒲一一㸃首曰功德無量白石山水江上偏舟斜日亭邊淺水微波自把南華髙讀人人錯認漁歌沈周沈啟南吴山越水二大幅為盛氏易去聞又别售雨裏荆溪疊疊山濕雲藏翠有無間歸来老眼糢糊在水墨還消白日閒此近與沈豫軒工侍雨中話别見湖西諸山出没烟雲間可愛歸寫此以寄孤興正德己巳八十三翁沈周記别錢塘二十年夕陽山色晚潮邊隔江千里美人逺夣落西興舊渡船舊遊錢塘觀潮已二十餘年今老矣每老睇如夣即興作此奉寄槐雨先生以寓逺人之思沈周石翁冩吳山越水余耳之稔矣萬厯乙卯㫪仲松陵吳益之攜至得清賞竟日為襄陽據舷之索任其㨂去古豆小彞陸子剛白玉九螭玦關仝春山谿關白陽習齋圖諸物雖多割愛焉然並懸吾墨華閣有烟雲泉石歴落長松沙嶼江千風帆蕩漾覺一室之内千里非遙吳之山越之水故合而處其間乎呉山越水間人汪砢玉富春大嶺圖酒散燈殘夢富春墨痕依約寄嶙峋山光落眼渾如霧莫怪芙蓉看不真徵明燈下强予臨大癡富春大嶺圖老眼昏花執筆茫然以詩自誦不工爾八十翁沈周丙寅墨泉圖莫怪先生酷好泉老依泉住結泉縁書多染得泉成墨愧我無生石作田沈周味亞中泠此澗泉墨花浮動結清縁年来沃得毛錐潤畊破江南處處田錢承德和詩脾清祕一泓泉早與青山結靜縁書法擬看添紙價不須多買瀼東田莫息和来看山中第二泉暫時一借洗塵縁何如君子泉鄰住引取餘波入硯田邵寶和春到龍山處處泉茗煎墨洗總隨縁誰將分取東川派小潤湖南萬頃田余初為明之畫扇因咏墨泉而作後同訪石翁既和詩且補一圖成美事云己巳五月二十六日錢仁夫記事竹巖新霽圖醉墨淋漓興未闌滿堂烟靄坐来寒道人不託梅花勝仙骨全偷董巨丹成化辛丑春日為楊學士摹吳仲圭竹巖新霽圖并題沈周五柳圖花開爛漫屬秋風滿地黄金醉眼中千古陶潜晉徵士乾坤獨在此籬中𢎞治甲寅秋九月望集匏菴東莊作此沈周有竹居小横幅小橋溪路有新泥半日無人到水西殘酒欲醒茶未熟一簾春雨竹鷄啼此余有竹居即景詩也畫亦曩嵗筆非自不知少嫩蓋為天泉强之而留其迹觀者無深笑焉杏花鸚鵡秦雲越樹路悠悠鎖掣金籠百怨休中有能言綠衣鳥還呼萬嵗一回頭𢎞治改元聞朝廷縦放百禽一首舊為原博畫杏花鸚鵡遂錄上方以見草野老民歌頌聖化如此沈周擲地鏘清韻凌雲播美稱上林當繼作入奏白觚稜呉寛題千啁百唽巧音辭紺翼丹翎好羽衣為語隴頭須自惜文章言語總危機徵明題枯木新鵝木二本倚大石旁茸茸酒色正黄時記得揮毫廿載期幼稚何堪竟雋永白頭今日欲哇之此圖余舊作題之殊覺自醜云沈周石田牧犢圖綠隂深處伴牛眠笛㺯斜陽芳草間多少利途奔走客何如及得爾身閒沈周刺水新秋雨一犂柳隂山影綠參差長安回首風塵惡輸與江東牧犢兒王穉登田家嵗計在鋤犂茆屋髙眠唐子西牛背笛聲歸短徑已知山月印前溪張鳯翼力盡東菑雨半犂夕陽歸早步遲遲無人扣角行歌去宛似桃林放牧時周天球雙玉圖有客来從海上村早湖新喜得河豚齊穿青篾一雙玉侑我田家老瓦盆仲基正月下浣自海上来經寒出肫魚二尾雖城中巨家貴游尚未食新蓋重仲基之情舊物之早以余旦暮人且不能多次食也詩畫以答之陽岡圖陽岡亭子真堪畫櫸葉槐枝碧䕃中須要詩人相管領不教風月四時空啟南之畫故法大癡亦是其本色乃所圖陽岡亭子獨作老米筆苔㸃更圓活生動嘗聞翁積畫盈篋俱未㸃苔語人曰須清明澄徹時為之蓋山水林石家以苔為眉目古人極不草草董太史欲以子久山水相易而未果樂卿記關山積雪圖凍合千峯雪意驕山城落日路迢迢此時行旅在何處驢背西風酒正消沈啟南關山積雪與陽岡亭子為義興吳二甫持来愚父子俱欣然欲得之而吳友喜余几上官窑樽遂以相易又加雙綺一端二甫舟中有古樹根天然榻竒怪瑩潔真山房珍異惜不隨畫作媵殊怏怏也夗上汪子識於謨觴石室石田雲山軸二看雲疑是青山動誰道雲忙山自閒我看雲山亦忘我閒来洗硯寫雲山侵曉溪山半是雲草堂亦許白雲分故人到此雲相接欲去還須雲送君廬山歸宗志芝庵主臨江人有偈曰千峯頂上一間屋老僧半間雲半間昨夜雲隨風雨去回頭不似老僧閒覺更竿頭進步玉水記石田自題山水四幅行盡﨑嶇路萬盤滿山空翠濕衣寒松風澗水天然調抱得琴来不用彈竹樹人家在崦西山迴水抱路長迷溪亭兀坐還開卷時有書聲雜鳥啼秋葉墮紅風䇿䇿野色過橋秋正分獨自吟行知者少惟應流水與流雲江上雪晴驢背寒江山刺眼玉巑岏歸来不減灞橋路滿意新詩壓凍鞍石田自題諸畫俱七言絶口口稱揚皆有應家家供養普為縁千江有水千江月萬里無雲萬里天大士像花開爛漫屬秋風滿地黄金醉眼中千古陶潜晉徵士乾坤獨在此籬東淵明採菊圖老去心情付漫圖時時㺯墨手俱烏一峰道者我宗匠遼海茫茫不可呼倣大癡筆倪迂標致令人想步託邯鄲轉繆迷筆踪要是存蒼潤墨法還須入有無倣雲林筆秋霜未老溪頭樹野水瀠迴浦外山不是吟行小迂步如何消得老夫閒臨黄鶴山樵畫微茫烟浪接臨臯㡬度斜陽送短撓月小山髙如此夜更無人聽客吹簫赤壁參得黄梅嶺上禪魔空虎穴是諸天贈君一片江南雪洗盡炎荒瘴海烟江南雪酒香觸路酒旗青去馬来車到此亭信是利糟名粕釀行人醉殺未曾醒酒旗村雲是青山舊鉛粉一翻妝㸃一翻新鬢邊白髪偏無賴㸃著多成老醜人雲山鶻突溪山鶻突雲乾坤雙眼坐難分近来世界渾如此莫把聰明持贈君又雲山野服翩翩紫色裁臨風觸鼻磵花開浮雲不礙青山路一杖行吟任去来青綠山水半夜吹燈寫亂山墨痕燈影有無間亂山依舊秋江上聊借芙蓉送客還水墨山溪亭不到已春深漸覺飛花換綠隂猶有啼鶯相慰藉聲聲催賦惜春吟春景空堂灌木參天長野水溪橋一徑開獨把釣竿箕踞坐白雲飛去又飛来𢎞治甲寅夏長夏山林清暑池髙樓直要兩翁偕綠隂滿地泉聲裏醒酒題詩有好懷夏景短棹輕舟載夕陽獨尋新句下横塘白鷗疑是催詩使飛掠蘋洲醉墨香横塘詩思晴光射散雨𡨕𡨕露出芙蓉四面屏流水小橋人不見晚風吹斷蟄龍腥秋溪疊嶂誰倚扁舟號隠淪平沙淺瀨入秋萍釣竿却是功召具渭水桐江古有人秋瀨垂釣淨憐秋水明人目亂壓垂楊雜鬢絲一个石臺斜日裏消閒時閲大宗師秋景亭上不来凡十日個中自有十分秋髙人胷次清如水不著人間半㸃愁又秋景秋風掃地葉俱無一个藤枝借步趨滿眼吟情吟不盡夕陽歸去滿平湖又秋景水迴山絶小亭開旋把青錢買竹栽喜得碧梧清䕃在共看月色上階来秋亭話月此幅余小時齋供野樹蕭疎及暮秋西風色作故颼颼林坰一段清閒地不見倪迂空白頭林坰秋疎溪山落木正蕭蕭野客尋詩破寂寥一路夕陽秋色裏不知吟到段家橋溪山落木千山一白照人頭折竹琳琅路轉幽落日西風苦行旅誰家呼酒倚紅樓寒山行旅深雪擁寒山路迷蕭蕭一騎帽簷低只應賸有尋梅興不憚遙村與逺溪大幅雪景消暑桐隂宜野服倚雲山脚洗清泉一雙白鶴可為驥直借上天還下天仙鶴梧桐平生結好惟鷗鳥彼此能閒兩下猜信我忘機来復下扁舟載酒夕陽開白鷗圖海榴自是神仙物種托君家有異根不獨長生堪服食又期多子應兒孫海榴喜雀倪迂妙處不可學古木幽篁滿意清我在後塵聊試筆水痕何澀墨何生古木幽篁地氣厚培千嵗物雨痕深溜十圍身夜来忽被月移去紙上小中認不真寫松畫了梧枝又竹枝綠隂如水墨淋漓信人捲去糊牕壁雨雨風風總不知梧竹王維雪裏曾看爾亦自幽姿有嵗寒我有新詩還可託墨痕留葉未全乾墨蕉老去山農白髪饒深簾晴日坐無聊榮枯過眼無根蒂戲寫庭前一樹蕉綠蕉綠綠紅紅勝曉霞牡丹顔色不如他空教蝴蝶飛千遍此種原来不是花秋紅石田自畫題詞殘葉林梢風瑟瑟秋波照眼通天碧南北東西聊泛宅人不識江湖自有江湖客裊裊釣竿三百尺金龜未換鱸魚白船本窄一般自有容身䇿漁家傲林影下夕陽邊淨苔雙踞膝秋水一長編能消世慮江山外還度年華鬚鬢前自題山水十丈梧槎長身兀兀一半欹斜水洗孤根風搖瘦影月掛殘椏烟江渡口渠家宿㡬度斜陽暮鴉無意青黄無心雨露大老何耶右寄栁梢青圖而賦之將以自况云聞道灞陵橋山遙水更遙六十年踪跡寥寥牖下困人今老矣雙短鬢怕頻搔行著要詩瓢酒壺相伴挑望秦川千里翹翹再畫一驢䭾我去便不到也風騷石田自題畫卷此與灣東草堂得之呉冮周氏山水之勝得之目寓諸心而形於筆墨之間者無非興而已矣是卷於燈牕下為之蓋亦乗興也故不暇求其精焉觀者可見老生情事如此沈周石田天平山圖丙午文題碧山峻嶒髙㡬許螺鬟入雲翠翹舞萬壑松風響綠濤一線雲泉滴牕雨雨晴秀色開雲岑簇黛攢青萬笏林范公祠前白日没古木千章生夕隂文徵明桃花書屋圖桃花書屋吾家宅阿弟同居四十年今日看花惟我在一場春夣淚痕邊此桃花書屋圖也圖在繼南亡前兩年作嗚呼亡後又三易寒暑矣今始補題不勝感愴乙未九日沈周小隠新成水北灣桃花千樹屋三間讀書不作求名計時復褰帷只看山有貞結屋東林勝小山讀書終日掩柴關桃花千樹無人看一片風光春自閒吳寛石田有竹居畫卷徐武功題諸名公次韻風逆客舟緩日行三里餘遙知有竹處便是隠君居詩中火癡畫酒後老顛書人生行樂爾世事其何如余與廷美同訪啟南親家於有竹别業而舟逆溪風而上卯至酉乃達主人愛客甚盡出所有圖史與觀樂而賦此識嵗月云成化三年長至日天全翁有貞書烟水微茫外舟行一日餘既覔沈東老還尋陶隠居冰絃三疊㺯雪繭八分書醉和陽春曲空疎愧不如次徐武功訪沈啟南詩韻劉廷美氏朱文印徐劉二公詩蓋皆有唐人風韻其字畫亦不易得也詩云雖無老成人尚有典型吾於是亦云後學王鏊題濟之朱文見説君家竹涼隂十畝餘客容開徑入吾願卜鄰居頭白話今雨汗青藏古書嵗寒交莫逆髙義慕相如一别五年久相望三舍餘要於吾道重獨與此君居若許借半榻何勞枉尺書鳯毛雲五色食實近何如愛爾鴻兒好相過載拜餘言皆能謹節志不在安居勉進十年學飽涵千卷書人生何如此方可古人如成化八年秋八月十有二日嘉禾周鼎為有竹居主人書於呉城客樓時年七十有二伯器朱文東老清風勁西疇綠水餘過橋還有業因竹便移居君子歌淇澳畸人斷鶚書雅宜徐孺筆交誼極攣如温州郡君文林和一别石田老於今六載餘遙乗剡溪棹来訪杜陵居王宰偏能畫鄭䖍兼善書風流邁前輩吳下有誰如海虞李傑次武功徐先生韻繫舟髙柳下又是十年餘遙踏無媒徑重尋有竹居筆精知宋畫器古鑒商書前輩詩題在風流邈不如曩余訪啟南一宿有竹别業今復過之不覺十五年矣偶見閣老徐先生之作為次其韻以寫慨嘆是日啟南命其子維時出商乙父尊并李營丘董北苑畫為玩故及之嵗戊戌二月十八日吳寛書沈君天下士一别十年餘舟到逢人問竹深迷所居有田皆種石無屋不藏書一笑留旬日髙懷誰得如梅堰呉珵元玉朱文野竹娟娟淨清隂十畝餘沈郎能獨愛蔣詡合同居賔主皆忘俗兒童亦解書不知風月夜髙興復何如海虞王鼎元勛朱文住無一宿逺交近廿年餘華竹循牆種樓臺逐水居輞川髙士畫山谷老人書况有天仙句深慚百不如言里錢仁夫士𢎞白文放筯盤無肉生孫地有餘平安雖土著心性愛郊居玉戛纔成句鸞褰自入書不為官可敬摩詰豈能如秦瓛廷璧白文予性素懶且僻凡閱卷軸有不欲終者多矣此則展舒至再紙為之裂最後有紙空得附名焉幸也大理左丞同邑陳璚玉汝題武功伯徐公始歸吳時首為沈氏題祖墓自後與白石公父子遂為忘形之交故其翰墨留於有竹居者為多也此卷中諸詩皆武功同時一班人物亦有稍後者雖不能盡出於呉中然逺亦不在嘉湖之外也聞之前輩惟洪武間有此一盛至今時始復見也南濠楊循吉題劉廷美題石田畫隠侯何處覔家在水雲邊隺瘦原非病人閒即是仙詩題牕外竹茶煮石根泉老我惟疎放新圖擬巨然成化庚寅夏六月五日過啟南有竹居為作山水小幅復賦是詩後四日宿慶雲精舍天泉出啟南畫索題遂以前詩塞其白間觀者幸恕予懶完菴劉廷美書石田題劉完菴畫溪山錯認瀼東西茒屋人家竹樹齊不獨米翁能拜石我於遺墨便頭低此幅劉完菴先生得意筆以恥齊之賞識故有是贈沈周借觀於軒中僣題帋空完菴可作亦當鑒予心伏也劉廷美山水崇禎四年中秋日得之黄觀仁一泓清水識天池路入千巖勢更危頭白老僧初出定不知何事亦求詩山頭雲起濕如滋冒雨来遊事亦竒石壁巉然畫中見癡翁能事復何為雨裏遊驂固好竒而今我及雨晴時可傷白石疑無鼓不見青蓮喜有池未許淋漓遊客酒可能裝表貴人詩老僧頭髪霜垂領亦效逢迎似不宜沈周題完菴荷花清白僉憲翁寫此花深有貞潔君子之態披玩間或方為水仙洛神蓋未見此心之敷露耳噫世之不見知者豈獨是花為然愈跋姜廷憲題自畫功成已得繡為衣萬里青雲入壯懷回首九峰天際碧可能無夢到江淮東谿姜立綱題畫院中如戴靜菴林良吕紀諸人余皆有其真蹟第以無題跋故不載千頃生識於蓮濵之㺯芳閣張復陽山水余㺯鳩車時見先荆翁齋閣懸山水二幅云以墨洒之而成為張復陽筆復陽當湖人業儒棄去從朱艮菴學道妻亦為尼善詩工畫倣吳仲圭蒼鬱淋漓喜作雲水遊止金陵朝天宫與尹蓬頭為侣復擔書住餘杭洞霄宫凡廿年丹就還里南宫有司建一枝堂棲𤣥樓以居之𢎞治三年復陽八十有八矣竟尸解去仙樂滿空香氣經月不散舉棺甚輕至今以鐵索懸堂後如空器焉思白董老嘗見此畫曰仙真遺蹟不可不珍祕也蠡湖南白痴散仙水玉磊砢者記珊瑚網卷三十八
