body:
  text: 珊瑚網卷四明汪砢玉撰法書題跋蘇文忠公天際烏雲卷在白粉箋上中行草書天際烏雲含雨重樓前紅日照山明嵩陽居士今何在青眼看人萬里情此蔡君謨夢中詩也僕在錢塘一日謁陳述古邀余飲堂前小閣中壁上小書一絶君謨真迹也綽約新嬌生眼底侵尋舊事上眉尖問君别後愁多少得似春潮夜夜添又有人和云長垂玉筯殘妝臉肯為金叉玉指尖萬斛閒愁何日盡一分真態更難添二詩皆可觀後詩不知誰作也杭州營籍周韶多蓄竒茗常與君謨鬭勝之韶又知作詩子容過杭述古飲之韶泣求落籍子容曰可作一絶韶援筆立成曰隴上巢空嵗月驚忍看回首自梳翎開籠若放雪衣女長念觀音般若經韶時有服衣白一坐嗟歎遂落籍同輩皆有詩送之二人者最善胡楚云淡妝輕素鶴翎紅移入朱欄便不同應笑西園舊桃李强勻顔色待東風龍靚云桃花流水本無塵一落人間幾度春解佩暫酬交甫意濯纓還作武陵人固知杭人多慧也巖隱圗書朱文鑒定法書之印朱文袛今誰是錢塘守頗解湖中宿畫船曉起鬭茶龍井上花開陌上載嬋娟白樂天蔡君謨陳述古蘇子瞻皆杭守也老却眉山長帽翁茶烟輕揚鬢絲風錦囊舊賜龍團在誰為分泉落月中三生石上舊精魂邂逅相逢莫重論縱有繡囊留别恨已無明鏡著啼痕能言學得妙蓮花贏得春風對客誇乞食衲衣渾未老為題靈塔向金沙丹丘柯敬仲多蓄魏晉法書至宋人書殆百十函隨以與人弗留也他日獨見此軸在几格間甚怪之及取觀則吾坡翁書蔡君謨夢中詩及守居閣中舊題也第三詩以為不知何人作其軒轅彌明之流歟陳太守放營妓三詩亦辱翁翰墨傳流至今信亦有緣耶卷後多佳紙敬仲求集作詩識其後賦此四首是日試郭玘墨但目疾轉深不復能作字又不知年歲後雖若此者亦尚能作否臨楮慨然至順辛未二月望日蜀人虞集書山中覆鹿拾蕉葉眼底生花二月明不道人生俱夢裏新詩猶話夢中情緑窗度曲初含笑銀甲彈筝不露尖人生莫待頭如雪華屋春宵酒屢添雲中初下勢如驚白鳯蹁躚雪色翎多少舊游歌舞地不堪回首又重經桃花扇底露唇紅不復梳粧與衆同一曲山香春去也荼䕷無語謝東風一顆摩尼不染塵瑶池𤣥圃度千春昭陽殿裏雲深處誰是當時解珮人三月旌旗幸玉泉牙檣錦纜御龍船千官車馬如雲湧楊栁梢頭月色姢長憶眉菴鶴髮翁舊時阿閣贊皇風如今流落那堪說黼黻文章似夢中鼓瑟湘靈欲斷魂洞庭風浪不堪論遙知舊賜宫袍錦雙袖龍鍾總淚痕興聖宫中坐落花詩成應制每相誇廬山面目秋來好自杖青藜步白沙此卷天厯間得之都下豫愛坡翁所書之事俊拔而清麗令人持玩不忍釋手故侍書學士虞公見而題之豫攜歸江南㑹荆溪王子明同豫所好攜之而去他日再閲於環慶堂俯仰今昔為之慨然因走筆盡和卷中之詩以舒其悒鬱之氣傍觀者子明之兄德齊淮南潘純金壇張經長安莫浩至正三年夏五月丹丘柯九思書柯敬仲氏朱文日將公事湖中了醉入重城列炬明自古天藩財賦地古人偏得賦閒情謝女嬌吟雪比鹽北臺馬耳見雙尖衲衣政索歌姬笑不道春寒繡被添寫韻軒中塵不驚與誰同躡鳯皇翎采鸞可惜情緣重祗合清齊寫道經叉頭新緑荔枝紅那與江桃色味同聞道端明新進譜一時殿閣起薰風香辟春寒玉辟塵流蘇斗帳醉和春一雙明月都無價寂寞人間第二人江南在處烟波好浪迹先生不上船近就闔閭城外宿可憐霜月夜姢娟青城樵者一衰翁寫罷烏絲滿袖風消得玉堂金研匣至今傳入畫圖中聽碾龍團怯醉魂分茶故事待誰論纎纎玉腕親曽見祗有春衫舊酒痕白公種竹蘇公栁談笑功名後世誇依舊葑雲三萬丈斷橋誰與築隄沙奉同柯丹丘前後用韻凡九章言無倫次且有廣平媚語之罪信識法者懼也癸未冬十二月九日吳郡張兩為子明王君寫盈盈秋水眼波明脉脈逺山螺翠橫西北風帆江路永片雲不度若為情雨挾江潮來浦口霜凋木葉見山尖寒波曽照飛鴻影髭雪朝朝與恨添風雨翻江夢裏驚忽思風馭絳霄翎世間安得麻姑爪癢處爬搔憶蔡經湖邊窗户倚青紅此日應非舊日同太守與賓行樂地斷碑荒蘚卧秋風奎章閣下掌絲綸清淺蓬萊又幾春三十六宫秋寂寂金盤零露泣仙人戊申十月十七日瓚蔡公閩嶠雙龍壁蘇子儋州萬里船何似歸田虞閣老醉吟清浦月姢娟嗜酒狂吟秃鬢翁華陽壇館百花風晚年傳得登真訣歸卧南山澗谷中十九日又追和虞奎章韻東閣小書詩夢破後堂殘醉燭花明春風客散茶香在寂寞人間萬古情紅入兩顴春意滿翠籠雙袖曉寒尖雖知别後情難減也覺愁中醉易添彩筆詩成舉坐驚素衣新剪鶴毛翎多生應是蓮花女留得銀箏金字經透海丹沙一粟紅前身宜與後身同就中只換神仙骨塵業何由到素風滄海桑田復幾塵東風獨見落花春須知剩水殘山外氷雪肌膚别有人蜀人文彩相先後多在西湖載酒船腸斷至今湖上栁空殘眉翠簇連姢三百年來此兩翁詩人情性道人風醉中還似毗耶老花雨紛紛一笑中梅花香冷返氷魂往事茫茫迹未論寶劍已隨龍化去誰憐水上刻舟痕賦罷仙人萼緑華金聲玉色衆中誇歸來世上空塵土雲白江清月滿沙洪武十四年嵗次辛酉秋九月朔義興馬治此卷向在項又新處余嘗獲觀今為越石售去坡翁行書四詩真蹟蟹眼已過魚眼生颼颼欲作松風鳴䝉茸出磨細珠落旋轉繞甌飛雪輕銀瓶㵼湯誇第二未識古人煎水意君不見昔時李生好客手自煎貴從活大發新泉又不見今時潞公煎茶學西蜀定州花瓷琢紅玉我今貧病長苦飢分無玉碗捧蛾眉且學公家作茗飲甎罏石罀長相隨不願撑腸拄腹文字五千卷但願一甌長及睡足日髙時煎茶大絃春溫和且平小絃廣折亮以清平生未識宫與角但聞牛鳴盎中雉登木門前剝啄誰扣門山僧未閒君莫瞋歸家且覔千斛水淨洗從前箏笛耳聽賢師定慧琴云何見祖師為識本來面亭亭塔中人問我何所見可憐明上人萬法了一電飲水能自知指月無復眩我本修行人三世積精練中間一念錯受此百年譴摳衣禮真相感動淚雨霰借師瓶錫泉洗我綺語研過南華寺我欲乘輕舟東訪赤松子蓬萊不可到弱水三萬里不知金山去清風半帆耳中有妙高臺雲峰自孤起仰觀初無路誰信平如砥臺中老比丘碧眼照窗几巉巉玉為骨凜凛霜入齒機鋒不可觸千偈如翻水何須尋德雲即此比丘是長生未暇學請學長不死妙髙臺子瞻煮茗聽琴而神遊于南華妙髙臺之上真蓬萊瀛洲方丈謫仙人也就爇龍麝作嬰香供已時夜將半月出房心間風露浩然曲肱就睡夢與先生遇且賜余犧尊二義墨一鼠鬚筆三雪繭紙二十六曰汝往哉後二年五月當喚汝于集英龍池汝勿怖東嘉石樓後學徐龍友善大識文天祥陳文龍伏觀至再謹書篆書戊辰三月初七蒙二先生留名此卷二百餘年流傳之自其詳已載張果老卷中此文山先生書惜不記名嵗月陳懋欽堯俞鄭文寶仲登同三山林天覺彥修拜觀壬午冬至日謹志東海宗斗以南宗魯以禮宗文以道宗裕以仁同觀于跳珠軒怡怡如也立春後一日金謹志熙寧五年壬子先生在杭八月監試進士試院煎茶七年甲寅先生同於潛毛令方尉遊西菩提聽賢師琴元豐八年乙丑七月自常赴登題金山妙髙臺紹聖元年甲戌冬十月抵南過南華寺合四詩而觀相去二十三年事何緣一時迸在紙上山谷云東坡極不惜書遇紙無精粗書遍乃已坡亦自言春蚓秋蛇隨意畫往往一時隨意隨寫又安知好事者寶藏傳為萬古美觀哉雖然此紙既録題南華詩却是過海後書有風濤洶湧之氣龍友蘇文忠公文章字畫妙天下㸃墨落人間例能裹去為榮僕遊京師三十年乃獨未之見兹非恨與甲戌暮春於蜀人王君見公惠州帖二越翼日又得見公詩於石樓君家惠帖乃信筆書詩乃公作意書也流麗阿娜之態皆具顧思壯嵗誦公之文景慕公平生大節願為執鞭豎而不可得一旦獲覩翰墨遺芳於二百載之下世所謂洞心駭目之觀有踰是耶始知連城白璧未足為貴後學耦耕子王夢髙敬附賤姓名於下方彌卿朱文先生居海外尚以了論語書易謂是措大餘業今此疑有闕後學辟世東海之濱雖食無肉病無藥出無友冬無炭正先生所謂大率皆無爾然亦一意冊間以志先生之志者勿忘也丁丑良月朔日書于容膝所黎蛋雜居無復人理置之不足道此先生鐵石處變之夙心也今夏秋患孔殷腥羶泥潦亦汙及于香翰意先生以素患難之心處之又豈為之變色動容哉飛馭九霄度必有取於愚言戊寅冬至作皇象書後學龍友謹識右四詩毫采飛動真遇羽衣道士乃得孤鶴橫江蹁躚之句後五百餘年得獲展玩纍日是何多幸敬仰敬仰墨林項元汴蘇長公行書二詩真蹟詩雖刻以行款故録之江上愁心千疊山浮空積翠如雲烟山耶雲耶逺莫知烟空雲散山依然但見兩崖蒼蒼暗絶谷中有百道飛來泉縈林絡石隱復見下赴谷口為奔川川平山開林麓斷小橋野店依山前行人稍渡喬木外漁舟一葉江吞天使君何從得此本㸃綴毫末分清妍不知人間何處有此境欲往置買二頃田君不見武昌樊口幽絶處東坡先生留五年春風搖江天漠漠莫雲卷雨山娟姢丹楓翻鴉伴水宿長松落雪驚醉眠桃花流水在人世武陵豈必皆神仙江山清空我塵土雖有去路尋無緣還君此畫三歎息山中故人應有招我歸來篇書王定國所藏王晉卿烟江疊嶂圖一首東坡先生未歸時自種來禽與青李五年不踏江頭路夢逐東風泛蘋芷江梅山杏為誰容獨笑依依臨野水此間風物君未識花浪翻天雪相激明年我復在江湖知君對花三嘆息次韻王晉卿送梅花一首僕去黃州五周嵗矣飲食夢寐未嘗忘之方請江湖一郡書此二詩寄王文父子辨兄弟亦請一示李樂道也元祐四年三月十日趙郡蘇氏印行狎書四傳而至逸少七百年後始得的孫中豈無人歐虞禇薛諸公顧得其韻度標格耳筆諌公雖知此妙頗覺强獨東坡老人操甚鋭筆一㸃一畫鋒藏不露而右軍神氣骨力如合左契世不知入木之妙久矣僕特妄言之又不審孰能妄聽之旃䝉作噩九芝山道士書于雲莊時二月八日辛酉之星夕曝于交遊風月堂西偏蘇子瞻書武昌西山贈鄧聖求詩蹟春江渌漲蒲萄醅武昌官栁知誰栽憶從樊口載春酒步上西山尋野梅西山一上十五里風駕雨掖飛崔嵬同逰困卧九曲嶺褰衣獨到吳王臺中原北望在何許但見落日低黃埃歸來解劍亭前路蒼崕半入雲濤堆浪翁醉處今尚在石臼抔飲無樽罍爾來古意誰復嗣君有妙語留山隈至今好事除草棘常恐野火燒蒼苔當時相望不可見玉堂正對金鑾開豈知白首同夜直卧看椽燭髙花堆江邊曉夢勿驚斷連環玉鎖鳴春雷山人悵空猿鶴怨江湖水生鴻雁來願作君詩寄父老往和萬壑松風哀右武昌西山贈鄧聖求一首子瞻內翰昔竄謫黃岡遊武昌西山觀聖求所題墨迹時聖求已貴處北扉而子瞻方忤時逺放流落窮困不二年遂與聖求對掌誥命並驅朝門同優遊笑語於清切之禁在常人固足感歎有文而賦於情者宜何如哉此前詩之所以作也元祐丁卯二月因㑹飲子功侍郎宅子瞻為豫筆此遂記而藏之江陵岑象求巖起跋西山詩碑止有坡谷張右史三篇近嵗鄧公裔孫曽以前輩和篇數十首相示輒不揣次韻附見於後時在翰苑仍效周益公用印章蓋南渡以來官府印多更鑄惟翰林院猶用承平舊印鑄於景德二年蘇鄧二公俱曽用此也黨論一興誰可回賢路荆棘爭先栽竄留多能擅筆墨因拘或可為鹽梅雪堂先生萬人傑論議磊落心崔嵬向來羅織脫一死至今詩話存烏臺憑髙望逺相宏放眼界四海空無埃黃岡踏遍興未盡絶江浪破琉璃堆鄧郎神交信如在石為窪樽勝金罍鄧矦先曽訪遺迹銘文深刻山之隈山荒地僻分埋沒工分前後搜莓苔元祐一洗人間怨天地清寧公道開玉堂同念舊遊勝筆端萬物挫欲摧時哉難得復易失弟兄逺過崖與雷北歸天涯望陽羡買田不及歸去來我為長歌弔此老慟哭未抵長歌哀嘉定四年重陽日四明樓鑰書于攻愧齊有松自作山中醅有橘欲向江東栽未畫東坡滿堂雪且賞西山千樹梅探竒覽勝遍吳楚直從浩渺登崔㟴偶來此地騁遐矚風景不論凌虛臺酒酣一吸漢江山淨洗萬斛胸中埃神文逺到玉堂署歸夢忽驚金粟堆揮毫日對掌綸綍話舊夜共開尊罍遺篇斷墨半流落不在山巔還水隈何人傳襲得此本幸免石壁漫蒼苔因懷故鄉訪舊蹟使我一見心神開人才絶代可指數仕路觸眼多傾摧誰令青蠅㸃白璧已聽夜蟄鳴春雷終為列星天上去或化孤鶴橫江來文章氣節兩不朽安用弔古生悲哀宫保都憲陸君全卿得坡翁此詩乃為岑象求書贈鄧聖求者岑跋云子瞻謫黃岡遊西山觀聖求墨迹時聖求已處北扉不二年對掌誥命作詩感歎樓大防和章并及元次山遺迹有二公先後搜訪同念舊遊之語今坡集載此詩序之嘉祐中聖求為武昌令居黃相望常往來溪山間元祐元年十一月㑹宿玉堂偶話舊事而其詩乃有金鑾相望不可見之句意者聖求先入坡亦隨召其題武昌西山者則賦舊事為贈非山遊時作也集又載次韻一首序云和者三十餘人今皆不復見樓詩又出其後而坡亦不之見矣聖求名璧其在翰林為學士承㫖云正德八年七月四日長沙李東陽書東坡行草端硯詩墨蹟在宋楮上小橫卷披雲離北巖度嶺入中夏重藉剪楚茅方亟斫英檟騷壇意莫逆匠石語缺一字奓匪堊勞運斤如帶防毁銙礪缺四字觀隅整同厦津津剖馬肝索索模牛觟氣逼松滋豪姻聨雪濤姹登堂却蹣跚飲水何􅛦谺守墨面豈黥含貞缺一字終啞靜惟有壽焉玷尚可磨也魯史記獲麟晉帖題裹鮓供給到唐文護持等商斝眉形空愛纎風字仍嫌哆載觀七八評咸本六一寫退然敢摩肩信矣俱出跨始知尹公他不媚王孫賈銘詩與器傳篆刻當碑打巖韻拾子遺微才任聊且軾趙郡蘇氏朱文端硯聨句既成暮歸復拾餘韻别賦一首附録卷後書法大抵拘則取俗縱則失度蘇長公深知此法上追秦漢次造晉唐宋元來稱為諸名家班首今觀所書端硯銘帖尤勝于平昔他書宜傳後也至正三年上月望日吳興唐棣謹題子華朱文坡仙詞蹟虛飄飄畫簷蛛結網銀漢雀成橋塵漬雨桐葉霜飛風栁條露凝殘㸃見紅日星曳餘光橫碧霄虛飄飄比浮名利猶堅牢虛飄飄花飛不到地虹起漫成橋入夢雲千疊遊空絲萬條唇樓百尺橫滄海雁字一行書絳霄虛飄飄比人身世猶堅牢虛飄飄風寒吹細浪春水暖氷橋勢緩霜垂散聲乾葉下條雨中漚㸃隨流水風裏綵雲橫碧霄虛飄飄比時富貴猶堅牢東坡居士虛飄飄飛絮風中捲游絲空外遙浮雲欲歸岫别葉下辭條殘雪舞空風漸暖碧烟凝樹日將髙虛飄飄比浮名利猶堅牢虛飄飄莊周夢裏蝶蘇武節中旄五色慶雲現百匝月華交宫中野馬隙駒過海上樓臺蜃氣消虛飄飄比浮名利猶堅牢文嘉和又見衡山筆此玉幼時所録致失題跋不免遺珠之嘆蘇玉局養老篇墨蹟軟蒸飯爛煮肉溫羮湯厚氊褥少飲酒惺惺宿緩緩行雙拳曲虛其心實其腹喪其耳忘其目久久行金丹熟坡翁此卷筆意似徐季海尤覺天真爛漫也癸丑中同王學耕觀於徐良夫之耕漁軒倪瓚端明蘇子瞻書天慶觀乳泉賦賦見集中不録欵云庚辰七月十二日書軾數日病痢不果往謁想起居佳勝餞行詩輒跋尾匹紙亦作數百字餘皆馳納不一軾再拜晦夫推官閣下七月十三日乳泉賦切勿示人切切懇懇蘇長公以紹聖四年丁丑二月責授瓊州别駕安置儋州六月渡海七月十三日至儋僑寓城南鄰於天慶觀觀有乳泉故公為援筆賦此元符三年庚辰公居儋已四年㑹正月祐陵登極大赦天下五月移公廉州六月遷瓊州渡海至亷七月又以皇長子生國有大慶遷舒州團練副使重移永州八月終方自廉治行賦後題云庚辰七月十三日書則正在廉時也十一月行至英州又復朝奉郎提舉成都府玉局觀任便而居公遂渡嶺南還明年為建中靖國元年辛巳五月至毗陵六月因疾告老以本官致仕十月草八日遂薨公之書是賦年已六十有五距其薨僅隔一歲實為晚年之筆李侍郎微之謂其筆老墨秀挾海上風濤之氣當為海內蘇書第一誠知言也哉濓嘗見漳水酈元輿跋公眉子石硯頭四十五字斷簡謂日百閲而弗之厭使其見此吾知其日百拜而不止也然公之薨未幾辭翰皆為世大禁而狗鼠之徒如霍漢英輩猶鳴吠不已磨剗焚毁無所不用其極而斯卷無纎毫不完豈公妙墨所在誠有鬼物呵獲之耶金華宋濂謹書趙京兆所藏此軸竒偉特甚以嵗月驗之蓋蘇公元符北歸所書也時方厄于章蔡之餘而人之貴重如此豈待百年而後定耶若夫筆老墨秀挾海上風濤之氣以平生所見論之當為海內蘇書第一紹定癸巳嵗九月七日陵陽李心傳謹書天一生兮上浮羽人俟兮丹丘遡儋耳兮東注夾昆侖兮倒流嘉熙三年四月旦王遂題尤焴劉厚南蔡杭林希逸王璞趙時􅀈髙時得徐霖同觀于道山堂淳祐丙午季夏此卷舊藏霅川向澤民家澤民以遺施武子甲戌嵗同醉白記歸三桂晦夫姓歐陽梅聖俞嘗有詩贈之作八分體東坡數語於後今亦藏向氏云端平丙中暮春朔錫麓尤煓蘇公早聞道文章乃其戲乳泉出重海作賦聊記異玉池咽中夜挈瓶非小智氣者水之生此語可深味淳祐甲辰孟夏朔峴山王亞夫書于西湖孤山之陽坡翁謫海上人傳已仙去道逢章子厚遄復返塵路至言想世驚猶閟乳泉賦遙憐嵩山丘千古不可駐是日仙居陳仁玉同書後萬籟既寂一氣孔神吸彼沆瀣沃此肺膺至陽之精天一所生欽哉此詞展也大成煓乳泉賦不待多贊特恨此軸尚有餘紙安得起坡翁書滿卷後耶天台謝奕修書于西湖淳祐甲辰首夏望後二日腥波暗天濁浪翻日蛟蜃黿鼉之所出沒有屹其島清泉中發靜涵太虛寒浸孤月汲之無窮元氣所泄古今正理不可泯滅仰斯泉也為斯人設㑹稽孫子秀書蘇文忠公書韓舍人帖勤禪師帖草書不録重到招提十七年吟題墨色又成嫣蟠虬老檜枝垂舞刻像前碑石載鐫留賦縱然常滿壁𤣥機竟莫悟枯禪道場法子藂居盛奚復蘆花施釣船子固戊申載題道場已題壁素更留照師以傳永逺秋泊禪扉夜清吟入興頻風生水鱗甲雲放月精神禪有𤣥機祕詩無句法新舊題尋不見吹遍壁間塵此壬辰嵗子固漫題也照師不以為謬戊申重來請書與重題共存每不自知醜耳孟堅再拜右蘇長公二帖其一與韓舍人議論切當合乎經傳筆勢翩翩若行雲流水略不介意千載之下想見其風采使人起敬起慕其一與勤禪師雖病中信筆而書亦不易得子固題道場二詩附于後詩律字體别有一種風韻亦自可觀顒上人持以見示俾題於左方展讀數四勉書以歸之時永樂七年己丑秋姑蘇釋得完識崇禎甲戌秋抄王越石持此帖并東方朔像贊洛神賦二帖觀於細種諸名菊間秀古秋嘯翁識東坡病眼帖與徐得之札軾春時病眼不能開眉黃夢軒舊事露足下想已知之葛明塘添情告府昨求於僕此事不知錢君錫肯為一解不若果庶不難耳日來園中桃李顔色無塵同輩應移坐雪堂前可作一絶强支嵗月何如僕夜夢中有一杭人多惠龍團幾斛盡皆一時飲之請解意何也昨周淡間見訪送二水底余遂書落花詩二首暫酬軾上得之三月十六日昔山谷老人云蜀人極不能書而東坡獨以翰墨妙天下觀其字畫已無塵埃氣蓋其天資所發此豈與今世翰墨爭衡哉如是翁周景逺書蘇長公居黃州自號東坡居士在城南築一白雪堂四百三十步前有桃李林泉後有果菜堂大治長者往還惟徐得之陳季常張懷民參寥子乾明寺中菴可為莫逆餘者皆先輩也此札在黃州與徐得之者公為人風流𢎞暢日以詩酒騁雄所謂强支嵗月者是也又夢中杭人多惠龍團盡食復守杭龍團作記蓋其驗云甲辰二月既望梁山髙殿識東坡先生在當時諸公間第一品人也余每于人家見尺牘片紙未嘗不愛賞得其遺迹猶可想其風度况筆精墨妙耶紫芝生俞和又一怗蘇軾啓近人回奉狀必達比日履兹春候豈弟之化想已信服吏民坐嘯之樂豈有涯哉無緣陪接但深馳仰尚冀若時保練少慰區區不宣軾再拜質翁朝散使君老兄閣下正月草四日蘇子瞻書離騷九辨卷東坡先生中年愛用宣城諸葛豐雞毛筆故字畫稍加肥壯晚嵗自儋州回挾大海風濤之氣作字如古槎怪石如怒龍噴浪竒鬼搏人書家不可及也郭畀拜觀于靈濟寺山谷云坡書中年圓徑而有韻大似徐㑹稽至於老大精神可與顔魯公楊少師方駕觀此帖者當有味其言云泰定丁卯端陽日髙郵龔璛子敬甫書于甫里堂之西序自悲哉秋之為氣也蕭瑟豫起止憑鬱鬱其何極凡五篇字大於折二錢紙墨精神詳二跋語子京坡翁九歌卷真蹟東坡先生書楚詞乃黃州時書世人多購晚年書先生晚年字畫老徑雄放元豐中作字華麗工妙後生不見前作往往便謂贋本先生昔與猶子書論作文教其師法應制文章且曰至于書字亦然也松年自蚤歲尊慕先生家藏先生之文甚富近年購先生之書尤多獨此乃先生舊所書耳信可寶也宣和四年二月初八日劉沔書先生每論楚辭下風雅一等至鮮于子駿所作且歎稱之況九歌九辨乎筆墨之咏歌之尚何疑晉國張珗淵於書不識真贋獨識此書為先生真蹟三歎三歎倪嘗借觀於永康得助堂二月中浣日倪書右九歌與前九辨蓋先生一時書也跌宕超軼殆若神駿翩翩不可控御惜亡去大司命東君河伯國殤禮魂等五章字大于錢紙墨如新何緣遺逸不害為墨寶也元汴蘇長公書陶靖節清晨聞叩門詩一首元符庚辰九月草五日東坡先生醉書李北海學王而飄逸者也東坡學顔而飄逸者也戒庵老人漫筆東坡先生大楷書卷紹聖乙亥中元日書淵明飲酒詩一首右坡翁大字書淵明飲酒詩一卷乃過海後北歸時所作已駸駸絶筆矣曩昔醉翁亭記等書皆當退舍第𤣥黃牝牡能令凡目生華願武卿珍藏什襲以俟九方臯勿輕出以貽俗子嗤耶紹熙改元良月上浣尹猷識蘇文忠公手書唐方干詩卷東溪别業寄假郎中前山含逺翠羅落在窗中盡日人不到一尊誰與同凉隨蓮葉雨暑避栁條風豈分長岑寂明時有至公寄李頻衆木又搖落望君還不還軒居在何處雨雪滿前山思苦文星動鄉遙釣渚閒明年見名姓唯我獨何顏懷州客誤飲覃懷酒誰知去滯程朝昏大行色坐卧沁河聲白道穿秦甸巖鼙似戍城鄰鴻莫相促遊子自晨征中路寄喻鳬求名如未遂白首亦難歸送我尊前酒典君身上衣寒蕪隨楚盡落葉渡淮稀莫笑干時晚前心豈便非送趙明府還北故國路不住國一作林劍鶴在扁舟盡室無餘俸還家得白頭鐘催吳岫曉一作月晚送一作照渭河流曽是栖安邑恩期異日酬過朱協律故山地下無餘恨人間得盛名殘篇續大雅稚子託諸生度日山空莫緣溪鶴自鳴難收故交意寒笛一聲聲途中寄劉沆登車誤相逺談笑與何因路入瀟湘樹書隨巴蜀人斂衣寒犯雪傾篋病看春莫負髫年志清朝作獻臣送班主簿入謁荆南韋常侍束書成逺去還計莫經春倒篋惟求醉登船自笑貧波移彭蠡月樹沒漢陵人試吏曽趨府旌幢自可親夏日登靈隱寺後峰絶頂無煩暑登臨三伏中深蘿難透日喬木更含風山疊雲霞際川傾世界東那知兹夕興不與古人同聽新蟬寄張晝細聲頻斷續審聽亦難分倣佛應移處從容却不聞蘭棲朝咽露樹隱暝吟雲莫遣鄉愁起吾懷只似君送喻坦之下第還江東文戰偶未勝無令移壯心風塵辭帝里舟楫到家林過楚寒方盡浮淮月正沉持杯語來日不聽洞庭砧送姚舒下第還蜀蜀路何追遞憐君獨去遊風煙連北虜山水似一作勝東甌九折盤荒坂重江逺漠洲臨卭一壺酒能遣一作浣長卿愁旅次錢塘此地似鄉國堪為朝夕吟雲藏吳相廟樹引越山禽潮落海人散鐘遲秋寺深我來無舊識誰見寂寥心别喻鳬知心似古人嵗久分彌親離别波濤濶留連槐栁新蟇陵實貰酒漁浦夜垂綸自此星居後音書豈厭頻送相里燭相逢未作期相送定何之不得長年少那堪逺别離泛湖乘月蚤踏雪過山遲永望多時立翻如在夢思君不來閒夜未零落心緒已紛紛久客無人見新禽何處聞舟隨一水逺路出萬山分夜月生愁望孤光必照君將謁商州吕郎中出楚中留獻章中丞江流盤復直浮棹出家林商洛路猶逺山陽春已深青雲應可望白髮未相侵才小知難薦終勞許郭心金州客舍逺箔羣峰暮蕭條未掩關江流嶓冡雨路入漢家山落葉欹眠後孤砧倚望間此情偏耐醉難遣酒罍閒途中逢孫轄因得李頻消息灞上寒仍在柔條亦自新山河難渡臘雨雪未知春正憶同袍者堪逢共國人銜杯益無語與爾轉相親送從兄郜道路本無限又應何處逢流年莫虛擲華髮不相容野渡波搖月空城雨翳鐘此心隨去馬迢遞過千峰送許渾壯歲分彌切少年心即同當聞千里去難遣一尊空翳燭蒹葭雨吹帆橘柚風明年見親族盡集在懷中鏡中别業二首寒山壓鏡心此處是家林梁燕窺春醉巖猿學夜吟雲連平地起月向白波沉猶自聞鐘角棲身可在深世人如不容吾自縱天慵落葉憑風掃香粳倩水舂花朝連郭霧雪夜隔湖鐘身外能無事頭宜白此峰經周處士故居愁吟與獨行何事不傷情久立釣魚處惟聞啼鳥聲山蔬和草嫩海樹入籬生吾在兹溪上懷君恨不平贈喻鳬所得非衆語衆人那得知才吟五字句又白幾莖髭月閣欹鐘夜霜軒正坐時沉思心更苦恐作滿頭絲蚤發洞庭長天接廣澤二氣共含秋舉目無平地何心戀直鉤孤鐘鳴大岸片月落中流却憶鴟夷子當時此泛舟貽錢塘縣路明府志業一作學不得力至今猶苦吟吟成五字句用破一生心世路屈聲逺寒溪怨氣深前賢多晚達莫怕鬢霜侵湖上言事寄長城喻明府吟霜與卧雲此興亦甘貧吹箭落翠羽垂絲牽錦鱗一作爇葦蒸菰米垂絲牽錦鱗滿湖風撼月半日雨藏春却笑縈簪組勞心字逺人涵碧亭洋州于中丞宰東陽日置髙低竹雜松積翠復留風路極陰溪裏寒生暑氣中閒雲低覆草片水靜涵空方見洋源牧心侔造化工山中寄吳磻十韻莫問終休否林中事已成盤飱憐火種嵗計付刀耕掬水皆花氣聽松似雨聲書窗翹足臥避險側身行果傍閒軒落蒲連濕岸生禪僧知見理妻子笑無名更擬教詩苦何曽待酒清石溪魚不大月樹鵲頻驚砌下通樵路窗間見縣城雲山任重疊難隔故交情贈許牘山人才子醉更逸一吟傾一觴支頥忽有得搖筆便成章王粲實可重禰衡爭不狂何時應㑹面夢裏是瀟湘贈功成將定難在明略何曽勞戰爭飛書慰强冦計日下重城深雪移軍夜寒笳出塞情苦心殊易老新髮早年生白艾原客原上桑柘瘦東來還見貧滄洲幾年隱白髮一莖新敗葉平空塹殘陽滿近鄰閒言說知巳半是學禪人朔管寥寥落何處一夜過胡天送苦秋風外吹愁白髮邊望鄉皆下淚久戍盡休眠寂寞空沙曉開眸片月懸憶故山舊山長繫念終日卧邊亭道路知已逺夢魂空再經秋泉涼好引乳鶴靜宜聽獨上髙樓望蓬身且未寧冬夜泊僧舍江東寒近臘野寺水天昏無酒能消夜隨僧早閉門照牆燈焰細著瓦兩聲繁漂泊仍千里清吟欲斷魂新秋獨夜寄戴叔倫遙夜獨不卧寂寥庭户中河明五陵上月滿九門東萬里親朋散故園滄海空歸依正南望此夕起秋風送沛縣司馬丞之任舉酒一相勸逢春聊盡歡羇遊故交少逺别後期難路上野花發雨中春草寒悠悠兩都夢小沛與長安送盧評事東歸萬里楊栁色出關隨故人輕烟覆流水落日照行塵積夢江湖濶憶家兄弟貧徘徊灞亭上不語共傷春清明日送鄧苪還鄉鐘鼓喧離室車徒促夜裝曉厨新變火輕栁暗翻霜轉鏡看華髮傳杯語故鄉每嫌兒女淚今日自沾裳送崔拾遺出使江東九門思諫諍萬里采風謡關外逢秋月天涯過晚潮鴈飛雲杳杳木落浦蕭蕭空怨他鄉别回舟莫寂寥重陽日送洛陽李丞之任為文通絶境從宦及良辰洛下知名早腰邊結綬新且傾浮菊酒聊拂染衣塵獨恨滄洲侣愁來别故人江州送李侍郎歸東洛獨乘驄馬去不並旅人還中外名卿貴田園髙步閒莫春經楚縣新月上淮山道路空瞻望軒車不敢攀送郭太祝歸江東鄉人去欲盡北鴈又南飛京洛風塵久江淮音信稀舊山知獨往一醉莫相違未得解羈旅無勞問是非送李恬及第後還貝州成名年少日就業聖人書擢桂誰相比籝金已不如東城送歸客秋日待征車若列清潭畔儒風變里閭收兩京後還上都兼訪一二親故離堂千里客歸騎五陵人路轉函關晚煙開上苑新天涯將野服闕下見鄉親問得存亡事裁詩寄海濱送汶上王明府之任何時别故鄉歸去佩銅章親友移家盡閭閻百戰場背關餘草木出塞足風霜遺老應相賀知君不下堂湖南使院遣情送江夏賀侍郎雲雨一消散悠悠關復河俱從泛舟役遂隔洞庭波楚水去不盡秋風今更過無由得相見却恨寄書多過申州作萬人曽戰死幾户免刀兵井邑初安堵兒童未長成涼風吹古木野火燒殘營寥落千餘里山空水復清汝南過訪田評事移家近漢陰不復問華簪買酒宜城逺燒田夢澤深莫山逢鳥入寒水見魚沉與物皆為纍終年愜本心送道上人遊方律儀通外學詩酒入𤣥關煙景隨人别風姿與物閒貰花留靜室呪水渡空山誰識浮雲意悠悠天地間送王翁登科後歸江東南行無俗侣秋鴈與寒雲野性自心愜鄉名人共聞吳山中路斷淅水半江分此地登臨慣含情一送君送饒州王法司之任兼寄朱處士莫辭還作吏且喜速回車留醉悲殘嵗含情逺寄書共看衰老近轉覺宦名虛遙想清溪畔幽人得自知詹碏山居愛此棲心靜風塵路已賖十餘莖野竹一兩樹山花繞石開泉細穿蘿引徑斜無人㑹幽意來往在煙霞曉角畫角吹殘月寒聲發戍樓立霜嘶馬怨攢磧泣兵愁燕鴈鳴雲畔胡風冷草頭罷聞三㑹後天逈曉星流冬日燒火掩關坐窮居客訪稀凍雲愁暮色寒日淡斜暉穿牖竹風滿繞庭雲葉飛已嗟周一嵗羇寓尚何依殘秋送友蚤為千里别况復是秋殘木葉怨先老江雲愁莫寒交情如水淡離酒泛杯寬想料還家後休吟行路難客行藕葉綴為衣東西泣路岐鄉心日落後身計酒醒時觸目多添感凝情足所思羈愁難盡遣行路一低眉山中即事趨世非身事山中適野情野花多異色幽鳥少凡聲樹影搜凉卧苔光破碧行閒尋采藥處仙路漸分明秋夜度鴻驚睡醒欹枕已三更夢破寂寥思燈殘零落明空窗閒月色幽碧靜蟲聲况是離鄉久依然無限情新月入夜天西見蛾眉冷素光潭魚驚釣落雲雁怯弓張隱隱臨珠箔依依上粉牆更憐三五夕仙桂滿輪芳嘉興縣內池閣指畫應心成周回氣象清牀前沙鳥語案下錦鱗驚細柳風吹旋新荷露壓傾微芳緣岸落迸笋入波生舴艋舟中醉莓苔徑上行髙人莫歸去此處勝蓬瀛鏡湖西島言事寄陶校書樵獵兩三戶凋踈是近鄰風雷前壑雨花木後巖春文字不得辨桑麻難救貧山禽欺稚子夜犬吠漁人未必聖明代長將雲水親知音不延薦何路出泥塵此宋學士蘇文忠公手書唐方干詩也干在咸通乾符廣明中和間為詩家工匠江之南未有及者五代人評其詩為髙堅峻拔故坡公手書六十餘章為趙子固家藏舊物今為仇清父所得余在京時嘗見此卷或有議公書太肥而公自云短長肥瘦各有度玉環飛燕誰敢憎又云余書如綿裹鐵今觀此書雖肥而無墨猪之狀外柔內剛真所謂綿裹鐵也清父其寶之元貞三年五月一日水晶宫道人題蘇文忠公早師顔魯公大書醉翁亭袁州學記不改魯公家法晚喜李北海則稍去圭角今觀公手書唐𤣥英先生方干詩變為圓熟舊時方剛筆仗不能盡脫故小字難于寬綽有餘此書俊逸神雅顔李交離趙文敏跋為綿裏鐵信然洪武辛亥夏五月十日李善長右蘇長公真行小字方干詩有趙文敏李學士鑒定真蹟無疑然小字筆畫艱于踈爽此卷全類九歌楚頌筆法余昔年見小字前後赤壁賦於錫山華氏與此卷相似而內多模糊字想在當時有所避諱也後學文徴明跋蘇端明小楷録方干詩一卷癸亥長至次日觀其昌余刻晚香堂蘇帖恨得此最晚坡公有赤壁歸去來辭皆精楷異常方干隱于嚴州范文正祀之於客星間宜老坡手録其詩無一字放過也眉公朝無咎言蘇公少時手抄經史皆一通每一書成輒變一體卒之學成而後已乃知筆下變化皆自端楷中來爾不端其本而欺以求售吾知書中孟嘉自可默識也萬厯辛亥季秋望後長洲後學張丑跋天啓癸亥初夏獲觀是卷及漢玉天熊為王越石物余時匆匆北征以方詩無刋録而返之不及細玩蘇書後又見子昻跋公記蹟與此題語大同小異殊可怪也姑兩存之以俟鑒别焉玉記崇禎癸未夏社友屠用明為鹽官胡赤城刋唐詩統籖隻句必録因丐𤣥英卷并趙書杜子美神駿歌及韋泌諸詩去玉再記東坡書醉翁亭記北宋學士蘇公東坡之筆趙子固家藏舊物也今為伯田馮先生所得余在京時嘗見此卷於髙仁卿家前後有子固印識今業已乏想為俗工裁去詎謂神物而灾亦見侵如是然而字畫未損猶幸甚耳或者議坡公書太肥而公却自云短長肥瘦各有度玉環飛燕誰敢憎又云余書如綿裏鐵余觀此帖瀟灑縱橫雖肥而無墨猪之狀外柔內剛真所謂綿裹鐵也夫有志于法書者心力已竭而不能進見古名書則長一倍余見此豈止一倍而已不意伯田之所自得又幾何元貞二年四月初一日持來求跋聊為書之吳興趙孟俯蘇長公兄弟祭黃幾道文坡老兄弟祭黃幾道文一通傳襲至錫山華尚古氏福偕弟祚得伏覩之知非坡老不能及也幾道未能悉其為人而坡老稱許至謂天實愧之當自有見嘗稱頴濵黃樓賦稍振勵人徹謂其代作要亦自知有辨福讀古史頗覺其議論不合處與吾弟評訂之兹同見此乃書以歸尚古𢎞治辛酉九月三日華亭後學錢福敬識頴濵先生詩帖內胡跋有異朝議戴公逰宦蜀中愛其風物遂卜居成都方未能歸因其西還為短篇送之眉山蘇轍上岷山招我早歸來劒閣橫空未許回北叟忽驚鶗鴂晚西園欲及海棠開避仇賦客親田畝厭亂詩翁著酒杯但愛江山無一事為言父老莫相猜兩蘇公帖平生多見之蓋真􅎓相半也從季所藏如淵明詩一紙雖擲棄瓦礫當自有神光發見乾道七年十一月草九日洪邁書坡寫淵明詩藍縷茆簷下豈無㫖哉銓案欒武子云若敖蚡冒篳路藍縷以啓山林杜預云藍縷敝衣言勤儉以啓土然則坡老之㫖微矣乾道改元四月仲潘廬陵胡銓識二蘇兄弟行如氷雪足以下照百世望如九鼎足以坐銷羣奸學士大夫得以片文隻字輒藏弆以為榮蓋非特取其華藻也質翁帖是中年書南至帖疑叔黨輩代作寄米帖淵明詩遒媚秀傑晚年精妙蓋如此黃門嘗贊其兄云人言吾兄我曰吾師讀戴公詩便知斯言為實録乾道己酉五月一日東里周必大書兩蘇公醉墨斷藁不自愛惜求者輒豫往時士大夫多有之近嵗有力者喜奪人所好藏書者至不敢示人趙從季所藏甚富何以能然蓋所謂亷者不求貪者不與能如是所以得久存也乾道乙酉冬至後二日盧溪王庭圭書我思古人起于峨岷瑞我昭代鳴鳳儀麟揮毫落紙天葩吐芬端拜拭目我思古人乾道三年冬至後二日樂備書葉少由來過告其季父恭叔死矣且出其所藏坡帖二紙相示余欲留之諦玩而愴然感舊不暇也姑識嵗月於卷末而歸之庶他日冀復覽焉嘉定辛未中和節後八日趙汝談眉山二蘇先生文章氣節光曜典冊後世獲見其書翰如親侍焉安得妄言以取不自量之譏乾道諸公墨蹟亦不易得况洪內翰周益公之確論藏者寶惜之東干周泰識兩蘇翰墨貫文章瑞鳳祥麟奕世昌十襲珍藏傳不朽一天星斗燦光芒嵩叟王敬力題珊瑚網卷四
