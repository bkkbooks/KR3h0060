body:
  text: 珊瑚網卷十四明汪砢玉撰法書題跋吳文定公懷脩竹書隠詩卷春雲漠漠雨溟溟假寐書牀午夢醒十載客居便巷陌一時鄉思繞園亭繁花照檻知堪賞亂石鈎衣憶所經恰有古苔三畝緑都來脩竹萬竿青當牕好鳥通人語挂樹危藤學字形日射韭畦朝可翦香凝椶室晝長扄鹿場舊築猶存號鶴冢新封未刻銘架上殘篇歸擬讀移文不待北山靈鹿場居士匏菴書所詠詩册籊籊猗猗竦雨立豈獨衞風名始識倐将長身託放曠水墨似嫌依六逸臨風首肯對以臆謂我此言人莫敵嵗寒雅操從少習玉版禪機尤秘宻毛髪蕭蕭垂紺碧湘江新沐如膏濕鷓鴣日暮啼且集任公東海登釣石髙竿未斫礙雲石運思正慰王猷憶深林溟濛烟雨滴風動仍聴無孔笛湖州已逺休物色蘇州無復齋名息百年筆法尚能傳箧中喜為鄒陽得右題畫竹湯翁愛茶如愛酒不數三升并五斗先春堂前無長物只将茶竈連茶臼堂前無事常煑茶終日茶杯不離口當筵侍立惟茶童入門來謁惟茶友愛茶有詩學盧仝烹茶有賦擬黄乆茶經續篇不借人茶譜補遺將脱手平生種茶不辦租山下茶園知㡬畝世人肯向茶鄉遊此中亦有无何有右茶歌世間只有雲踈懶不道君猶懶似渠載雨從龍雲有意出家離俗子何踈雲常隨爾棲巖穴爾亦隨雲參太虚願爾與雲毋拆伴千秋萬古永如如右贈人霜染秋林葉未紅白雲如海晝溟濛山中鷄犬無塵到谷口漁樵有路通雙屐行踪㽞蘚逕五絃靈籟響松風浩歌招𨼆披圖畫目斷冥飛縹緲鴻右題山水累月不出門西山了無見新圖偶攜來如見西山面積雨過初晴踈雲藹層巘林堂接溪橋有客來獨便况有釣魚人不作臨流羡石湖在吾前卧遊殊未倦偶為陳冷菴憲副題石田山水以巖過醫俗亭見之請書于扇遂為執筆書之匏庵呉寛張汝弼翰墨友弟張弼頓首貳教用亨先生執事禮闈之火區區幸得無恙不勝幸矣秋間事尚未知何如今日仝羡執事之優㳺清適猶誇鸞鶴而翔寥廓也何可得哉火後移館偶賦栽杏一詩敢呈左右用發八千里外之一笑詩曰玉河東畔春坊裏借得閒齋寄此身偶見攜來山杏好買栽不計客囊貧孤根元荷乾坤力嫩葉都含雨露春擬醉紅雲香霧底曲江風景一番新右蔵本朝名公詩翰一卷為張汝弼徐楨卿聶大年呉元博祝允明陳道復願璘王履吉陳沂王榖祥今只存汝弼一簡尚憶元博句有塵逺筆牀臨禊帖凉生湘簟理南華也諸名賢垂虹别意詩并叙休寜宗弟戴生昭年富質美予教紹興府學時與其父思端有同譜之好往來情義甚篤然思端業賈什九在外不能内顧昭恐昭廢學負所禀因挈來游于呉訪可為師者師之初從唐子畏治詩又恐不知一言以蔽之之義乃去從薛世竒治易世竒仕去繼從雷東以卒業昭為人言動謙宻親賢好士故沈石田楊君謙祝希哲輩皆呉中名士昭悉得與交交輒㤀年忘情及昭學漸就緒去家且乆不能無庭闈之思將告歸衆作詩送之君謙詩云垂虹拂㠶過因題卷云垂虹别意盖垂虹者呉地石杠之名也送昭必於此地為别使送者可及夕而返故也昭自來請序予曰丈夫立身莫先於學不則縱富且貴不過血肉之軀耳富則敗禮亂俗貴則敗政厲下富貴將安用哉死則人皆垂詈不已其所過之地如孤鴻雪泥指𤓰易滅人亦不齒也惟人幼而能進於學以明其理以修其身故能入孝出弟行謹言信窮則善家厚俗出則忠君澤民生則人化之死則人思之所歴之地人皆稱述而歌咏之非私也人心之公道也古今之直道也昭生來游呉中而以明經講學為務呉之士夫亦樂與游及其去而送之以詩即昭他日所歴而使人思慕之權輿也不然則贈昭之言豈徒然耶昭歸以予言諗諸父兄宗族當必以予言為然昭字明甫同余出唐道國忠公胄之後盖徽之雙溪世家云正徳戊辰中秋吉旦浙江紹興府儒學訓導長洲戴冠拜手序垂虹不是灞陵橋送客能來路亦遥西望太湖山閣日東連滄海地通潮酒波汩汩翻荷葉别思忙忙在栁條更欲傳杯遲判袂月明倚柱喚吹簫沈周雲外晴虹類石橋送君歸省去程遥樹聲撼地天將雨颿影拖風晚帶潮短棹載書維古渡長亭折栁剰殘條離愁無限相思意其奈分襟月下簫謝表次韻把手江南竒絶處石欄髙拍袂初分胸中故有長虹在吐作天家補衮文祝允明卷束殘書上短槎臨行不用嘆摶沙惟餘似水交情在相逐雲㠶送到家古呉練同惪白社㤀年交子乆臨期握手思難禁垂虹橋下有流水别意與之同此深八十七翁雪厓陳儀楓落江隄晩帶烟行人把袂買歸船溪分野色東西路橋跨東西上下天酒為錦心澆磊塊詩憑玉軸寄留連何時又是逢君日夜雨聨牀語昔年東呉厚齋朱侗芙蓉動清秋凉颸拂衣袖逰子輕别離執手不可又長虹灔灔呉雲低闌干揷漢天為齊君不見臨卭橋柱侈今古相如亦是尋常題呉門陸稷秋江水清兮秋日明送所眤兮將逺行判兩袂兮何征營指歸岑兮雲英英羌道祖兮江之程酒拍拍兮滿兕觥君再飲兮延我情射續徐子立乆客懷鄉井陽陽不遂留自知歸計好何用别時愁酒盡鐘聲𤼵詩成夜氣浮相逢惜相别猶用上江樓黄紋秋雲隨彩動蛟龍客子行蹤氣貫虹無奈離盃重留戀不禁吹雨冷江楓臯橋浦䃤相逢憶昔自花村今忍相違賦此吟怨鳥啼殘歸去恨清風歆動仰髙心垂虹亭上有三髙祠半江寒送蘋花雪一路香浮桂子雲有約明年重過我不妨杯酒話更深山唐呉龍乆客懷歸辭舊知扁舟江上欲行時多情最是垂虹月千里悠悠照别離長洲文璧相送江頭水映空孤舟渺𣺌下垂虹秋深無限江楓思欲贈相思苦未工陳湖陳鍵栁脆霜前緑橋垂水上虹深杯惜離别明日路西東歡笑辜圓月平安附便風歸家説經歴挑盡短檠紅蘇門唐寅書劍客金閶梧桐葉又黄蛩歸催思早江𣺌去途長餘暑庇山影西風來桂香垂虹拂㠶過鳬鴈滿銀塘文學戴明父將歸新安詣草堂言别輒賦此為贈前進士𢎞農楊循吉垂虹橋下碧流長送子明經返故鄉道向南歸傳易學水流東去過呉江卦爻象著分竒耦交誼情深各慘傷婺邑晦翁生長地隣封英俊有餘光雲厓顧福秋風振喬柯客子歸意扤落日垂虹橋停橈待明𤼵渺渺兮予懷望望兮水濶暌違不足道鄙吝誰我豁一脉情衷𤼵短篷西風飄泊任行蹤于今莫問江南事夜月晨鐘兩地同長洲俞符臨流祖席正清秋歌罷新詞不自由此日送君和興去何須風雪夜乗舟練全璧臨岐慷慨擲離觴仗劔南歸發棹郎情似三忠橋下水逺隨君夢過錢塘魯參送君歸去上垂虹霜落呉江㡬樹楓堂上有人真倚望布㠶休挫送潮風太原祝續身懷親舍逺身上客船忙脉脉情千種匆匆酒一觴江波摇落日楓葉著餘霜顧此垂虹影種愁誰短長漕湖俞金送别江楓日已斜倚欄把酒思無涯驚心白髪思鄉國觸目青山感物華渺渺烟波牽客恨迢迢秋浦亂蘆花不堪回首天空濶一鶩棲飛𢃄落霞呉釋徳璇客子匆匆買棹回臨岐相别思悠哉石梁照水垂虹逺澤國涵空鳴鴈哀星斗光鋩堪淬劔風霜牢落且銜杯呉門䞉有相知在開遍梅花擬復來邢參乾坤上下恣遨遊獨鶴髙横萬里秋劔化延平津水上釣垂嚴瀨石磯頭時清不進圮橋履月白曽攜赤壁舟不似呂巖空誑世㠶飛直過岳陽樓長洲戴冠七澤三湘作勝遊楚天涼雨值新秋江湖來往多青眼山水登臨半白頭赤壁磯荒重弔古武昌城晩更維舟元之雖去清風在復讀遺文上竹樓廬山陳儀終嵗覽江山得得逾復游閒雲澤國天埜鶴林泉秋予少從親繼為宦急流勇退旋田頭足迹天下曾無半猶勝出門莫觧舟九垓汗漫擬黄鵠何時叙問城東樓長洲周同人新安十日程足為千里游江湖志汗漫仗劔氣横秋昨逢阿戎與之語知君楚尾并呉頭不須琵琶潯陽郭泊此書畫滄江舟飄然明發向何許長笛一聲黄鶴樓長洲朱存理壯懷未易惬直作汗漫遊長嘯楚江晚浩歌彭蠡秋一函圖書隨所適相逢誰不甘低頭春風㠶檣薄南郭飄作咸陽神仙舟為問賢郎讀書處古濠東畔元龍樓呉郡俞金人生亦弧矢志已在天遊彼昏罔克知苟延春與秋佳山佳水目未覩種種白髪已滿頭幡然便欲出門去光景又若逝水舟何如戴君逰汗漫朝登楚閣暮秦樓江楓未摇落江水正澄清水色君顔色相思無限情應祥瑟瑟西風透客衣懷鄉情與㕍南飛夕陽楓葉呉江上一片秋光送馬蹄海觀陸南寳帶秋波啓别筵垂虹晩日送行船白雲似與越山隔明月還同呉地懸後夜相思各杯酒來年重㑹賸詩篇殷勤再冩橋頭景江冷丹楓嵗暮天長洲朱存理相見無㡬又送君江楓釃酒話殷勤艣聲摇落山頭日㠶影沖開溪溆雲栁剰殘枝猶可折詞將前意不堪聞歸家談及呉中事挑盡寒燈坐夜分葑涇顧桐重别垂虹秋正雲相思從此散鷗盟東南一水分呉越書劔十年如弟兄黄葉不堪風雨路孤舟忍共酒盃情歸來有夢君何處明日杭州第㡬程城南欽遵松陵一水卧長虹多少行人感慨中此日送君無限意蕭蕭黄葉與丹楓昌谿王俸跋垂虹别意卷後蘇徽古呉越地今俱直隸為隣封故徽之客于蘇者甚衆且乆至歴㡬星霜忘歸者必其山川人物可嘉而可樂歟蘇多名士善詩賦為諸藩稱首戴君明甫與之遊獲其詩累卷抑明甫之言語事為忠信篤敬可欲而可慕與不然何客蘇者非一明甫别垂虹者亦非一明甫而獨能致諸名士重之以辭若是也明甫得此誠知重璠璵矣使徒知重之而不知所以重恐非贈言者之本意惟勉于學慎于行所謂忠信篤敬者益加修省而精進焉則徽士將不忍與之别而去蘇士又不忍與之别而歸矣豈非吾徽之光斯卷之華哉竊億贈言者之意固如此余敢附言於卷末者意亦如此也若夫紀述之詳勉進之切則橡庵先生之意言誠然余復何言正徳甲戌孟冬月既望眷生顧齊汪昱書沈啓南謝祝希哲詩卷附贈楊子詩踈林葉盡秋日晴與子把手林中行蕭條此地不足枉賁我一來林壑榮君今文名將盖代踪跡所至人争迎青袍獵獵風滿袖知者重者無公卿老夫朽憊人所棄子謂差長加其情臨分日落渺野水扁舟南騖迷孤城𢎞治甲寅十月二十四日希哲冒寒過訪申謝此卷不足罄懐沈周楊子勸秉良攻詩畧於琴我勸併二者手彈口還吟琴詩本性情淵淵入人深推自三百篇被樂為雅音雅音宣其文成古復成今悠然南薫詞煦矣當舜心石田行書中秋月詩掛幅少年漫見中秋月視與常時不分别老來珍重不易觀要把深杯戀佳節老人能得㡬中秋信是流光不可留古今換人不換月舊月新人風馬牛後生茫茫不知此年年見月年年喜老夫有眼見還同感慨滿懷聊復耳今宵十四已爛然七客賔争天下先庭空衣薄怯露氣深簷穂坐仍清圓東風軋雲輕浪作驀把太清渣滓却浮雲雖欲忌吾人酒政有律無譁賔逓歌李白問月句自覺白髮欺青春青春白髪固不及且捲酒杯連月吸舒菴與我六十人更問中秋賖四十沈周石田看花吟行草單條花下一壺酒人與花酬酢樹上百枝花花對人綽約昨日顔色正新鮮今朝少覺不如昨人若無花人不樂花若無人花寂寞看花不是乆逺事人生如花亦難託去年花下看花人今年已漸隨花落花且開酒且酌催花鼓板撾芍藥醉他三萬六千觴我與花神作要約沈周又書諸歌行卷今日九月九無菊且飲酒明年九月九有菊亦飲酒有花還問酒有無有酒不論花無有好花難開好時節好酒難逢好親友一盃兩盃常在手六印何消金握斗三杯五杯不離口萬事莫談瓶且守瓶云罄矣我即休載欲謀之已無有天應私我身獨在天不全人花乃後遲之明日興還存紫萼青苞得開否倘看爛漫即重陽借問東墻惱隣叟右九日無菊歌春暖秋涼山邊水隈訪黄菊尋白梅秋月自與我慮净春雲自與我懷開晝遊之地吾蓬萊夕息之處吾夜臺以殤視我吾老大以彭視我吾嬰孩信夀天吾何以外請享此見在不樂胡為哉右尋樂行打魚鼓唱道情説生説死説功名唱道情打魚鼓説神説仙説今古仙家自有山中樂凡家自有世間憂年頭年尾憂不休今夜又當年尾頭唱要髙鼓要急主勸賔酧忘拜揖蠟梅爍爍白璧光酒波濯濯青袍濕客莫言辭主須醉多情送年恐不及年送去還復來漁鼓聲中白髪催白髪不可變莫放掌中杯鼓砰蓬杯絡繹不知東方之既白舊年已盡客已散門前又接新年客新年别唱賀新郎送舊迎新漁鼓忙右送嵗歌去之嵗來之年一迎一送燈火邊迎新送舊大家事覺與老者偏無縁黄雞未號霜滿天一心百感誰愀然小兒自喜時節至催理靴服誇新鮮固知老者已異趣青春似因兒女妍青春懸老不多地白髪紅顔俱眼前去之嵗來之年譬如傳言相絡繹又如車輪相回旋誰從箇裏饒不死嚥氣苦苦修神仙我於所去已五十其來百嵗亦倘焉使我五十不為夭使我百嵗不為延尚有大而去者與來者在我先後計萬不計千其間豪傑夢幻耳㝠㝠漠漠真堪憐惟有汗竹數行墨待來追去名可傳勸兒必讀牀頭編莫惜買書吾無錢男兒所立須及早老夫代爾耕春田右除夕歌沈周沈啓南詩牋墨蹟五言律四首結廬城郭逺静勝此溪邊鷗鷺分家住烟波入簟眠釣魚償酒劵買藕補傭錢只隔斜陽岸經逰須倩船又舊有讀書處杏花深雨中人歸髪未白春好樹仍紅富貴浮生外弟兄吾道同眼前千樹合屋下兩陶翁又九十春將半陰陰何日収花含無蝶戀苔濕礙人㳺樹蔭呼朋鵲簷多逐婦鳩催詩應是酒何必與添愁詠人影愛欲揮杯勸其情有唱隨無違起居地尚保死生期明月成三處清波化百時㝠然通契誼曽莫假言辭書七言律諸作掃地焚香習燕清蕭然一榻謝將迎坐移白日花間影睡起春禽竹外聲心逺不妨人境寂道深殊覺世縁輕問竒尚有門前客却怪青山不撩名沈周書於獨墨亭今日都非昨日時紅消緑長不容私初驚雨過佳人夢漫送春歸老子詩繞樹空憐雙蛱蝶戲波忙殺小魚兒明年更有尋芳酒何用臨川費所思春風不到小樓前花事闌珊又一年處處揷秧梅子雨家家繅繭竹枝烟荷知有暑先擎盖栁為無寒已脱綿莫道山家無意味鳥聲啼破落花天城郭重來秋半過世情看熟嵗應磨後生氣大輕人易老者心寛奈事多空自感懷成永嘆不如對酒付髙歌韓休共是雙顛客松竹相依奈晩何風波境界立身難處世規模要放寛萬事盡從忙裏錯此心須向静中安路途平處經行稳人有常情耐久看直道世間無悔吝纔生枝葉便多端渺𣺌扁舟入浦雲琳宫一到愜前聞春泥夹道縈人跡野水交陂亂鴨羣洞裏朝元郭道士城中行樂鮑㕘軍相尋兩度俱相失石上留題漫有文上人何事作生涯半是仙家半出家丹竈火紅煨白术戒壇烟黒煑硃砂杏林春透菩提樹橘井泉涵優鉢花賣藥歸來無個事月明窓下誦蓮華右贈醫僧髙隠白雲深復深階除晴晝亦生陰山藏暝色迷歸鶴窓捲朝嵐恐潤琴忽爾去留那有迹飄然舒卷絶無心道人只自聞怡恱俗客要來難便尋右贈顔魯南隐君之作詩成三年未嘗寄適魯南持紙來索畫卷因糸此篇沈周顛毛脱盡野僧如世事多歸一懶除欲博晏眠髙著枕圖便老眼大抄書屋須矮小茅須厚窓要清虚竹要踈心與陶翁有相得時歌吾亦愛吾廬憨憨無役老人懐春日烘門晏始開游衍太平初試杖安排樂事且拈杯世情花黨富家𤼵公道燕均貧户來識字不多强不識小軒聊與物追陪昭明臺下芒鞋𦂳虞仲祠前石路迴老去登臨誇健在舊遊山水喜重來雨乾草愛相將發春淺梅嫌瑟縮開傳取梁前檜神去袖中疑道有風雷虞山至道觀有所謂七星檜者相傳為梁時物也今僅存其三餘則後人補植者而三株中又有雷震風擘者尤為詭異真竒觀也成化甲辰日周記爛漫初㸔蜀錦堆却疑春色隔墻來酒逢知己何辭醉花笑貧家不稱開紅亞較風憐弱榦粉含清露濕重臺明朝只恐多零落為轉長生託紙胎辛丑牡丹爛開余與允輝同賞有此詩壬寅開余不及往喜允輝亦凭闌因書前作以寄孤興沈周衆客巡籬待菊開吾家阿弟足清醅莫嫌蕋小劖先賞若使花殘悔後來宿雨尚摇枝上葉新香初入掌中杯頭巾墮地秋襟濕不怕傍人笑醉回乙夘十月四日賞翼南莊上半開菊因有是詠古梅莊座為録一過沈周誰放春雲下曲瓊一重薄隔萬重情珠光蕩日花無語𤨏影通風吹有聲外面令人倍惆悵裏邊容眼自分明知無縁分難輕入敢與楊花燕子争右咏簾滿城風雨近重陽寂寂寥寥破草堂彭澤花枝待晴把雲安麴米帶生嘗梳頭髪應吾年白潤屋金從别姓黄漸與潘郎續遺句沈郎痩不似潘郎沈周為冷菴先生作滿城風雨近重陽車轍何人顧草堂此日衣成聊自授明朝酒熟共誰嘗秋深澤國蓴空紫霜落洞庭柑未黄底怪白頭甘寂寞子雲曽是校書郎徵明奉次石田先生行書單條尋芳詩老子尋芳挑酒錢樂哉斯丘青嶂邊若教即死便埋我更是可生還聴天人生一日過一夢花下百壺酬百年還將醉墨寄絶壁風雨不洗山蒼然右題墓上絶壁沈周先荆翁最喜此幅嵗朝懸霞閣設梅蘭水仙于商彛周鼎間古翠新香作供不以題墓有嫌也又有啓南題磨詩在扇上余尚憶其中聨兩象合來分動静一心存處得中庸理趣盎然故尋芳行樂無礙生死深有契於先子耳砢玉記沈啓南雜題絶句墨蹟湖北歸來日落扁舟滿載西風目送一行白鷺秋懷欲與天空衣冠瀟洒本吾儒也學𤣥真作釣徒風月一竿休占盡客星昨夜照東呉酒盞詩聨不厭頻梅花已報滿城春踈燈一夜山窓雨却冩鄉心與故人不將緑醑醉春寒但把黄庭讀夜䦨三月溪亭新漲滿廬山瀑布捲簾㸔百尺飛泉木數章茒椒回互茯苓香白頭漁父抛魚舫結得盧鴻一草堂溪流泯泯帶斜汀樹色沉沉緑未明大似城南春雨歇碧山浮動晩烟生山路迢迢過翠微楓林斜日映人衣笻枝兀兀藤花去不得詩成且不歸樹裏幽亭久不來舊時行徑有蒼苔溪風四面涼如水袖得葩經手漫開艾葉葵榴亂揷瓶虚堂風約虎符靈樽前蒲玉須教醉溷俗由來忌獨醒溪頭待渡心不忙日落髙人猶偃仰歸來只恐到家遲隔岸行人豈吾黨鳩一聲兮鵲一聲鳩能唤雨鵲呼晴老天亦是無張主半日陰來半日晴春日春山春水流春田春地放春牛春花開在春園裏春鳥飛來春樹頭如來如來太乙裁掛鉢披裟海上來不為一身南北走願超千衆上蓮臺出入行藏要三思世情更變斗星移常將有日思無日莫待無時思有時富友髙親莫去攀他來問我奉承還錢財入手非容易用去方知來處難自家只道是童兒誰信光陰驀地移算來三萬六千日總成四十九年非分中自有魚羮飯意外休編虎口鬚莫怪老夫為妄語一生夢寐慣江湖此首題寄儀姪楊栁青青江水平聞郎江上唱歌聲東邊日出西邊雨道是無情却有情風前一曲動離愁那個行人不舉頭手把花枝半遮面不令人見轉風流毛簇黄茸嫩似鋪頸長髙閣玉胡慮老夫此筆非無意留與賢郎學弄雛甲午春三月望為冷菴憲副作沈周買書賣畫出春城著破青衣白髪生四海固無知我者空教啼殺樹頭鶯呉淞江上老迂踈自笑年來活計無只有硯田耕未了雲山還向筆端鋤秋日同友人歩虎丘倦坐可中庭上值談空上人持筆索書漫録舊作二首長洲沈周饑時思飯倦思眠只在茅簷日晷邊此是老夫真法計十年修得在家禪此石田先生詩也予愛其真率書之許光祚靈長沈石田詞蹟誰道金强焦亦稱兩朶芙蓉浸在玻璃鏡頭白老翁尋此勝過江先盡金山興隔水焦山闌小凭寄語西風後日來當定白鶴如期叅我乘一聲獨唳江聲静右春日登金山望焦山有作沈周殘葉林梢風瑟瑟秋波照眼通天碧南北東西聊泛宅人不識江湖自有江湖客裊裊釣竿三百尺金龜未換鱸魚白船本窄一般自有容身䇿右調漁家傲天地一癡仙冩畫題詩不換錢畫債詩逋忙到老堪憐白作人情白結縁無興是今年浪泊茅堂水漫田筆硯只宜収拾起休言但説移家上釣船右寄南村張處士白石翁柴門晴也喜山意方舒春湖堪冩拄著藤條門外走見打鼓喧村社逐􅀈隨行南閭北巷儘趂兒童耍强於逰宦去鄉萬里羸馬但願年年康健百年依舊白首甘田野天上多桃根杏柢處有裁培者儂柘雲屯儂秧雨潑未便風斯下將他博換都未各自難捨右暮春試筆和楊儀部無俗念一闋因録寄徳澂云無俗念即念奴嬌沈周楊用修太史詞草弓鞋一掬凌波迥冉冉盈盈羞顧影擎茶歩緩乳花凝鬭草歸遲苔露冷雪皺雲鬆倩郎整羅帳燈昏蓮瓣暝掌中無力搦瓊枝渇思半消殘酒醒右題情調寄木蘭花升庵楊慎蔡林屋詩翰老去倦茅屋五日頭不沐侵晨東家子邀我㸔新竹東風吹落梅忽見燒㾗緑上山雲推人下山泉躡足蒼鼠剥古栗白羊竄深谷丹竈雖生苔紫巗尚堪宿渺哉人間世千載見遺躅當時僧不知今日吏催促但恐有髙節無處著雲菊七十二㸃青對酒聊一掬右春日到鹿飲泉賦此書以尚之林屋蔡羽人龍未逢時林卧觀元化抗館碧山隈伏檻滄浪㵼連巖象雲壑嵌空紛石架明霞麗壁璫濺瀑翻甍瓦其陰負縹緲其陽展銷夏山川恣凝緑乾坤漭髙下端居慰營魂散帙豐逸暇觚管間時操觴酌巡筵亞我公自忘疲樂客𤣥秀夜時哉秉燭歡合坐同所藉右𤣥秀樓與諸友宴集蔡羽書短景仍多濕殘年畏客歸白雲谿上冷紅樹雪中稀乆住應難别重逢寒蹔違憑人問林屋烟霧滿征衣徳孚與余兩年往還頗宻忽欲觧館歸越不能為情話别之次賦此正徳丁丑閏臘日林屋蔡羽題盈盈金屋舊時紈自小題名喚合歡照夜巧憑螢㸃綴賽秋還與月團欒昭陽愛絶遮羞怯長信宫深滴淚寒抛棄從人氷素在桃花殘影自堪㸔右題紈扇蔡羽碧筠精舍記并詩卷秀水汪氏凝霞閣鍳藏天王寺洽南洲為精舎竹二畝池倍之閣十尋軒五竹之一客之造南洲先於軒次竹次池次閣還休於軒古器像充焉暑之月池於濯竹於巾窓於書席於琴於奕閣於風酒食之㑹則於軒其霄也池明竹明窓明席明而閣又極明城中之臺榭城外之雲山皆在閣其晦也池暝竹暝窓暝而閣亦暝聞蘋藻之聲竹之韵而已余之卧是軒也當壬午六月洞心澄觀則得之池焉灑襟臆颯毛髪則得之竹焉細書昏誦則得之窓焉馮空御逺觀中呉之氣雲物之變則得之閣焉憇息舒卷守神則得之軒焉彌月居得已久多使終身居之得又何如也書以為碧筠精舎記嘉靖八年己丑三月二十九日林屋山人蔡羽書于𤣥秀樓六月望日過寒翠軒避暑水滿清池竹滿樓長疑六月是深秋山僧愛客頻頻到受盡薫爐與茗甌應禎雨中同李范菴過天王寺看竹二首步來禪榻畔涼氣逼團蒲花雨檐前亂茶烟竹下孤乘閒攜畫卷習静對香罏到此忽終日浮生一事無又老禪趺坐處踈竹翠泠泠秀色分隣舍清陰覆佛經蕭蕭日暮雨曵履繞方庭呉寛宿天王禪院贈西洲講主檻外秋光落經卷土岡髙竹晩増幽煮茶燒笋能延客欲去因君復少留南濠居士辛巳八月朔過碧雲精舎偶題次韻踈篁今嵗似添稠不雨簾前翠欲流莫怪秋來涼思早暑中相過也如秋盧雍坐碧雲精舎髙幘短袍雲霞光扁舟繫纜野籬傍焚香潔坐了無語山寺閉門春竹長太白山人孫一元陪林屋師宴碧筠精舎逺公能愛客髙㑹兔園才畫室香貂滿天華寳樹開林端迷塹谷象外徹樓臺對此復能長醉歌甘草萊雅宜山人王寵日出池光欲上樓雨餘脩竹似鳴秋湘簾捲處龍團熟坐吸清風翠滿甌右和范菴先生韻隂敷鴨脚樹翠剪虎鬚蒲境寂心同逺僧閒興不孤覆碁松下石破茗竹間罏欲舉無生話相忘話亦無又雨苔春寂寂風鐸晝泠泠有客來看竹山僧自看經經殘客亦去秋鳥下空庭右和匏菴先生韻愛此森森竹萬頭涼陰覆榻草堂幽香消瓦鼎春眠覺何處一聲黄栗留右和南濠少卿韻覽勝平生雙不借穿林老去一扶留白雲每借髙僧榻黄葉時留野時秋右和盧師召韻竹影參差滿日光市僧不到定僧傍楞嚴轉罷殘陽在始覺空門白晝長右和孫太初韻上相逰行地羣賢賦咏才殘碑侵蘚卧遺跡自花開風遞清齋磬雅鳴施食臺故宫愁入望落日滿蒿萊右和王履吉韻徵明屢遊天王寺未嘗作詩戊戍南洲師出示諸賢留題詩卷因悉用韻和之共得七首所謂雖多亦奚以為也文徵明識珊瑚網卷十四
